body:
  text: 左傳杜林合注卷四十一明王道焜趙如源同編昭公八經辛巳二十有二年春齊侯伐莒宋華亥向寧華定自宋南里出奔楚言自南里别從國去大搜于昌間無傳夏四月乙丑天王崩林景王崩王子猛立是為悼王是冬卒敬王立六月叔鞅如京師葬景王杜叔鞅叔弓子三月而葬亂故速林如京師止此王室亂杜承叔鞅言而書之未知誰是故但曰亂林周亂不書書王室亂則天下無人紀矣昔者惠裏之世子頽亂卿虢討之子帶亂晉討之春秋不書猶有臣子焉耳於是景王崩悼王即位既葬矣子朝欲篡子猛而立凡厯悼敬五年而後定而訖於佚賊則天下無人紀矣劉子單子以王猛居於皇杜辟子朝難出居皇王猛書名未即位林猛未踰年稱王成猛之為王以猛為宜立也是故春秋之誼苟宜立也則糾雖未得國成之為子糾猛未得京師成之為王猛秋劉子單子以王猛入於王城杜晉助猛故得還王都林居於皇言失京師也入於王城言始得京師也冬十月王子猛卒杜未即位故不言崩諡曰悼王其曰王子猛卒未踰年也十有二月癸酉朔日有食之杜無傳此月有庚戌當為癸卯朔書癸酉誤傳二十二年春王二月甲子齊北郭啓帥師伐莒杜啓齊大夫北郭佐之後莒子將戰苑羊牧之諫牧之莒大夫曰齊帥賤其求不多不如下之林言北郭啓非卿帥師所求於莒者不多不如卑下服齊勿與戰帥所類反大國不可怒也弗聽敗齊師於夀餘莒地齊侯伐莒杜怒敗莒子行成司馬竈如莒蒞盟杜竈齊大夫莒子如齊涖盟盟於稷門之外稷門齊城門也莒於是乎大惡其君為明年莒子來奔傳楚薳越使告於宋林薳越前年帥師救華氏故使人告於宋曰寡君聞君有不令之臣為君憂無寧以為宗羞杜無寧寧也言華氏為宋宗廟之羞恥寡君請受而戮之對曰孤不佞不能媚於父兄華向公族也故稱父兄以為君憂拜命之辱抑君臣日戰君曰余必臣是助亦惟命人有言曰惟亂門之無過林兵亂之家無過其門過古禾反君若惠保敝邑無亢不衷以奬亂人林無為髙亢不叶中正之事以奬助叛亂之人孤之望也唯君圖之楚人患之杜患宋以義距之諸侯之戍謀曰若華氏知困而致死楚恥無功而疾戰非吾利也不如出之以為楚功林死守則戍不可解疾戰則師或致敗不如解圍聽華向出奔使楚人得取其救華氏之功其亦無能為也己言華氏不能復為宋患救宋而除其害又何求乃固請出之宋入從之已己宋華亥向寧華定華貙華登皇奄傷省臧士平出奔楚杜華貙已下五子不書非卿宋公使公孫忌為大司馬代華費遂邊卬為大司徒卬平公曽孫代華定樂祁為司城杜祁子罕孫樂祁犂仲幾為左師幾仲江孫代向寧幾音基樂大心為右師代華向樂挽為大司寇挽子罕孫挽音晚以靖國人終梓慎之言三年而後弭王子朝賓起有寵於景王杜子朝景王之長庶子賓起子朝之傅王與賓孟説之欲立之杜孟即起也王語賓孟欲立子朝為大子劉獻公之庶子伯蚠事單穆公杜獻公劉摯伯蚠劉狄穆公單旗蚠扶粉反又扶云反惡賓孟之為人也願殺之又惡王子朝之言以為亂願去之杜子朝有欲立之言故劉蚠惡之賓孟適郊見雄雞自斷其尾問之侍者曰自憚其犧也畏其為犧牲奉宗廟故自殘毁遽歸告王且曰雞其憚為人用乎人異於是杜雞犧雖見寵飾然卒當見殺若人見寵飾則當貴盛故言異於雞犧者實用人人犧實難已犧何害杜言設使寵人如寵犧則不宜假人以招禍難使犧在已則無患害己喻子朝欲使王早寵異之王弗應十五年太子夀卒王立子猛後復欲立子朝而未定賓孟感雞盛稱子朝王心許之故不應夏四月王田北山使公卿皆從將殺單子劉子杜北山洛北芒也王知單劉不從立子朝欲因田獵先殺之從才用反王有心疾乙丑崩於榮錡氏四月十九日河南鞏縣西有榮錡澗錡魚竒反戊辰劉子摯卒二十二日卒無子單子立劉蚠林蚠獻公之庶子杜蚠事單子故五月庚辰見王見王猛見賢遍反遂攻賓起殺之杜黨子朝故盟羣王子于單氏杜王子猛次王故單劉立之懼諸王子或黨子朝故盟之晉之取鼓也在十五年既獻而反鼓子焉杜獻於廟又叛於鮮虞杜叛晉屬鮮虞六月荀吳略東陽略行也東陽晉之山東邑魏郡廣平以北使師偽糴者林使晉師詐為將販糴於鼓者負甲以息於昔陽之門外昔陽故肥子所都遂襲鼓滅之以鼓子鳶鞮歸使涉他守之杜守鼓之地涉他晉大夫鳶悅全反鞮丁兮反他徒多反丁巳葬景王王子朝因舊官百工之喪職秩者與靈景之族以作亂杜百工百官也靈王景王之子孫喪息浪反帥郊要餞之甲杜三邑周地要一遙反餞賤淺反以逐劉子逐伯蚠壬戌劉子奔揚揚周邑單子逆悼王于莊宫以歸杜悼王子猛也王子還夜取王以如莊宫王子還子朝黨也不欲使單子得王猛故取之癸亥單子出失王故出奔王子還與召莊公謀杜莊公召伯奐子朝黨也召上照反曰不殺單旗不捷杜旗單子也與之重盟必來背盟而克者多矣從之杜從還謀也背音佩樊頃子曰非言也必不克杜頃子樊齊單劉黨林王子還之謀非有德之言必不勝頃音傾遂奉王以追單子杜王子還奉王及領大盟而復領周地欲重盟令單子劉子復歸殺摯荒以説杜委罪於荒説如字或音悅劉子如劉杜歸其采邑單子亡乙丑奔于平畤杜平畤周地知王子還欲背盟斂亡走羣王子追之林羣王子黨子胡來共追單子單子殺還姑發弱鬷延定稠杜八子靈景之族因戰而殺之子朝奔京其黨死故丙寅伐之單子伐京京人奔由劉子入于王城子朝奔京故得入辛未鞏簡公敗績于京乙亥甘平公亦敗焉杜甘鞏二公周卿士皆為子朝所敗叔鞅至自京師葬景王還言王室之亂也經所以書閔馬父曰子朝必不克其所與者天所廢也杜閔馬父閔子馬魯大夫天所廢謂羣喪職秩者單子欲告急於晉秋七月戊寅以王如平畤遂如圃車次干皇杜出次以示急戊寅七月三日經書六月誤也劉子如劉單子使王子處守于王城杜王子處子猛黨守王城距子朝盟百工于平宫杜平宫平王廟辛卯鄩肸伐皇鄩肸子朝黨鄩音尋大敗獲鄩肸壬辰焚諸王城之市杜焚鄩肸八月辛酉司徒醜以王師敗績于前城醜悼王司徒前城子朝所得邑百工叛司徒醜敗故己已伐單氏之宫敗焉杜百工伐單氏為單氏所敗庚午反伐之單氏反伐百工辛未伐東圉杜百工所在洛陽東南有圉鄉冬十月丁巳晉籍談荀躒帥九州之戎杜九州戎陸渾戎十七年滅屬晉州鄉屬也五州為鄉躒力狄反及焦瑕溫原之師焦瑕溫原晉四邑以納王于王城丁巳在十月經書秋誤庚申單子劉蚠以王師敗績于郊為子朝之黨所敗前城人敗陸渾于社杜前城子朝衆社周地十一月乙酉王子猛卒乙酉在十一月經書十月誤雖未即位周人諡曰悼王不成喪也釋所以不稱王崩己丑敬王即位杜敬王王子猛母弟王子丐館于子旅氏子旅周大夫十二月庚戌晉籍談荀躒賈辛司馬督杜司馬烏帥師軍于隂籍談所軍于侯氏荀躒所軍于溪泉賈辛所軍鞏縣西南有明溪泉次于社司馬督所次王師軍于汜于解次于任人杜王師分在三邑洛陽西南有大解小解汜音凡解音蟹任音壬閏月晉箕遺樂徵右行詭濟師取前城三子晉大夫濟師渡伊洛行户郎反軍其東南王師軍于京楚辛丑伐京毁其西南京楚子朝所在經壬午二十有三年春王正月叔孫婼如晉謝取邾師婼敕略反癸丑叔鞅卒無傳晉人執我行人叔孫婼稱行人譏晉執使人晉人圍郊杜討子朝也郊周邑圍郊在叔鞅卒前經書後從赴夏六月蔡侯東國卒于楚杜無傳未同盟而赴以名林悼侯卒弟昭公申立秋七月莒子庚輿來奔林齊納郊公戊辰吳敗頓胡沈蔡陳許之師于雞父杜不書楚楚不戰也雞父楚地安豐縣南有雞備亭父音甫胡子髠沈子逞滅國雖存君死曰滅髠若門反獲陳夏齧杜大夫死生通曰獲夏齧徵舒玄孫林夷狄交相敗不書必敗中國而後書吳敗頓胡沈蔡陳許之師胡子髠沈子逞滅獲陳夏齧自及春秋未之有也齧五結反天王居于狄泉杜敬王辟子朝也狄泉今洛陽城內大倉西南池水也時在城外林居于狄泉言未得京師也於是王猛卒敬王即位即王猛之母弟丐也居于狄泉謂之東王子朝入于王城謂之西王書曰天王居于狄泉黜子朝也尹氏立王子朝杜尹氏周世卿也書尹氏立子朝明非周人所欲立林此尹文公圉周世卿也書尹氏立王子朝猶曰尹氏所欲立也將以王天下獨尹氏立之則莫之與矣王子不名惟卒名之非卒也而名之者貶也是故救衛書子突奔名子瑕立名子朝八月乙未地震冬公如晉至河有疾乃復傳二十三年春王正月壬寅朔二師圍郊二師王師晉師也王師不書不以告癸卯郊鄩潰杜河南鞏縣西南有地名鄩中郊鄩二邑皆子朝所得鄩音尋丁未晉師在平隂王師在澤邑平隂今河隂縣王使告間林子朝敗故敬王使人告間暇于晉間音間庚戌還晉師還邾人城翼翼邾邑還將自離姑杜離姑邾邑從離姑則道徑魯之武城公孫鉏曰魯將御我鉏邾大夫御魚吕反欲自武城還循山而南杜至武城而還依山南行不欲過武城徐鉏丘弱茅地三子邾大夫曰道下謂此山道下隰遇雨將不出是不歸也林將阻雨水不能出是師不能歸也遂自離姑遂過武城武城人塞其前杜以兵塞其前道斷其後之木而弗殊杜殊絶也斷丁管反邾師過之乃推而蹶之杜蹶仆也及邾師既過斷木之地乃推斷木而蹶仆於地以絶邾師走路蹶其月反又音厥遂取邾師獲鉏弱地杜取邾師不書非公命邾人訴于晉晉人來討叔孫婼如晉晉人執之書曰晉人執我行人叔孫婼言使人也嫌外內異故異發傳使所吏反晉人使與邾大夫坐杜坐訟曲直叔孫曰列國之卿當小國之君固周制也林禮卿得會伯子男故曰當小國之君邾又夷也杜邾雜有東夷之風寡君之命介子服回在子服回魯大夫為叔孫之介副請使當之林請使當邾大夫不敢廢周制故也乃不果坐韓宣子使邾人聚其衆將以叔孫與之與邾使執之叔孫聞之去衆與兵而朝示欲以身死士彌牟謂韓宣子杜彌牟士景伯曰子弗良圖而以叔孫與其讐叔孫必死之魯亡叔孫必亡邾林必滅邾以報此恥邾君亡國將焉歸杜時邾君在晉若亡國無所歸將益晉憂焉於虔反下同子雖悔之何及所謂盟主討違命也若皆相執焉用盟主聽邾衆取叔孫是為諸侯皆得輒相執乃弗與使各居一館杜分别叔孫子服回士伯聽其辭而訴諸宣子乃皆執之林士伯即士景伯二子辭不屈故士伯訴而執之士伯御叔孫從者四人過邾館以如吏欲使邾人見叔孫之屈辱從才用反下同先歸邾子士伯曰以芻蕘之難從者之病將館子於都林以刈芻草採薪蕘者之艱難不易得魯之從者以此為病將改館叔孫於别都謂箕也叔孫旦而立期焉杜立待命也從且至旦為期期居其反乃館諸箕舍子服昭伯於他邑杜别囚之范獻子求貨於叔孫使請冠焉杜以求冠為辭取其冠法而與之兩冠曰盡矣杜既送作冠模法又進二冠以與之偽若不解其意為叔孫故申豐以貨如晉欲行貨以免叔孫為于偽反叔孫曰見我吾告女所行貨林言我當告汝以所行貨賄之地女音汝見而不出留申豐不使得出不欲以貨免吏人之與叔孫居於箕者請其吠狗弗與及將歸殺而與之食之示不愛叔孫所館者雖一日必葺其牆屋葺補治也去之如始至不以當去而有所毁壞夏四月乙酉單子取訾劉子取牆人直人杜三邑屬子朝者訾在河南鞏縣西南訾于斯反六月壬午王子朝入于尹杜自京入尹氏之邑癸未尹圉誘劉他殺之尹圉尹文公也劉他劉蚠族敬王黨他徒河反丙戌單子從阪道劉子從尹道伐尹單子先至而敗劉子還杜單子敗故己丑召伯奐南宫極以成周人戍尹杜二子周卿士子朝黨奐召莊公庚寅單子劉子樊齊以王如劉杜辟子朝出居劉子邑甲午王子朝入于王城次于左巷杜近東城秋七月戊申鄩羅納諸莊宫鄩羅周大夫鄩肸之子尹辛敗劉師于唐杜尹辛尹氏族唐周地林敗敬王之師丙辰又敗諸鄩甲子尹辛取西闈西闈周地丙寅攻蒯蒯潰林蒯敬王邑杜河南縣西南蒯鄉是也於是敬王居狄泉尹氏立子朝莒子庚輿虐而好劔苟鑄劔必試諸人林必以人試劔觀其利鈍好呼報反國人患之又將叛齊烏存帥國人以逐之杜烏存莒大夫庚輿將出聞烏存執殳而立於道左懼將止死殳長丈二而無刃殳音殊苑羊牧之曰君過之牧之亦莒大夫烏存以力聞可矣何必以弒君成名遂來奔齊人納郊公郊公著丘公之子十四年奔魯吳人伐州來楚薳越帥師杜令尹以疾從戎故薳越攝其事及諸侯之師奔命救州來吳人禦諸鍾離子瑕卒楚師熸杜子瑕即令尹不起所疾也吳楚之間謂火滅為熸軍之重主喪亡故其軍人無復氣勢熸子潛反吳公子光曰諸侯從於楚者衆而皆小國也畏楚而不獲己是以來吾聞之曰作事威克其愛雖小必濟克勝也言軍事尚威若能克勝其愛雖小國必有成功胡沈之君幼而狂杜狂無常陳大夫齧壯而頑頓與許蔡疾楚政楚令尹死其師熸帥賤多寵政令不一杜帥賤薳越非正卿也軍多寵人政令不一於越帥所類反下同七國同役而不同心杜七國楚頓胡沈蔡陳許帥賤而不能整無大威命楚可敗也若分師先以犯胡沈與陳必先奔三國敗諸侯之師乃搖心矣諸侯乖亂楚必大奔請先者去備薄威後者敦陳整旅杜請在軍之前行者去其戰備薄其威嚴示之以不整而誘之也在軍之後列者敦厚陳法整齊行列持之以整重而待之陳直覲反下未陳同吳子從之戊辰晦戰于雞父杜七月二十九日遣兵忌晦戰擊楚所不意吳子以罪入三千先犯胡沈與陳杜囚徒不習戰以示不整三國爭之吳為三軍以繫於後林此敦陳整族之衆也中軍從王杜從吳王光帥右掩餘帥左掩餘吳王夀夢子吳之罪人或奔或止林言不整也三國亂林三國爭之故紛亂吳師擊之三國敗獲胡沈之君及陳大夫舍胡沈之囚使奔許與蔡頓曰吾君死矣師譟而從之三國奔杜三國許蔡頓譟素報反楚師大奔書曰胡子髠沈子逞滅獲陳夏齧君臣之辭也杜國君社稷之主與宗廟共其存亡者故稱滅大夫輕故曰獲獲得也不言戰楚未陳也嫌與陳例相涉故重發之八月丁酉南宫極震經書乙未地動魯地也丁酉南宫極震周地亦震也為屋所壓而死萇𢎞謂劉文公曰君其勉之先君之力可濟也杜文公劉蚠也先君謂蚠之父獻公也獻公亦欲立子猛未及而卒周之亡也其三川震杜謂幽王時也三川涇渭洛水也地動川岸崩今西王之大臣亦震天棄之矣杜子朝在王城故謂西王東王必大克敬王居狄泉在王城之東故曰東王楚大子建之母在郥郥郥陽也平王娶秦女廢大子建故母歸其家郥古間反召吳人而啓之冬十月甲申吳太子諸樊入郥杜諸樊吳王僚之太子林案吳子遏號諸樊王僚是遏之弟子先儒又以為遏弟何容僚子乃取遏號為名恐傳寫誤耳未詳取楚夫人杜大子建母與其寶器以歸楚司馬薳越追之不及將死衆曰請遂伐吳以徼之杜徼要其勝負薳越曰再敗君師死且有罪此年秋敗於雞父設往復敗為再敗亡君夫人不可以莫之死也乃縊於薳澨薳澨楚地澨市制反公為叔孫故如晉及河有疾而復此年春晉為邾人執叔孫故公如晉謝之為丁偽反楚囊瓦為令尹杜囊瓦子囊之孫子常也代陽丐城郢楚用子囊遺言已築郢城矣今畏吳復增修以自固郢以井反沈尹戌曰子常必亡郢苟不能衛城無益也古者天子守在四夷林德及逺方故四夷不侵皆為之守衛守手又反下同天子卑守在諸侯杜政卑損林四夷交侵故藉諸侯以為守衛諸侯守在四鄰林親仁善鄰故鄰國不侵皆為之守衛諸侯卑守在四竟林鄰國交侵故完四竟以自守衛竟音境下同慎其四竟結其四援杜結四鄰之國為援助民狎其野狎安習也三務成功杜春夏秋三時之務民無內憂而又無外懼國焉用城林為之民者內無盜賊之憂外無敵國之懼國都之內安用修城以為固焉於虔反今吳是懼而城於郢守已小矣卑之不獲能無亡乎林卑損之極不得守其四境能不亡其國都乎昔梁伯溝其公宫而民潰在僖十八年民棄其上不亡何待夫正其疆場修其土田險其走集杜走集邊竟之壘辟疆居良反親其民人林使其相親相愛相救助相扶持明其伍候杜使民有部伍相為候望信其鄰國慎其官守守其交禮杜交接之禮不僣不貪林守其誠信尚其亷恥不懦不耆杜懦弱也耆強也耆巨之反又亘支反完其守備以待不虞又何畏矣詩曰無念爾祖聿修厥德杜詩大雅無念念也聿述也義取念祖考則述治其德以顯之無亦監乎若敖蚡冒至于武文林若敖楚八世祖蚡冒楚十世祖杜四君皆楚先君之賢者蚡扶粉反土不過同方百里為一同言未滿一圻慎其四竟猶不城郢今土數圻杜方千里為圻數所主反而郢是城不亦難乎言守若是難以為安也為定四年吳入楚傳經癸未二十有四年春王二月丙戌仲孫貜卒無傳孟僖子也貜俱縛反徐俱碧反婼至自晉喜得赦歸故書至夏五月乙未朔日有食之秋八月大雩丁酉杞伯郁釐卒杜無傳未同盟而赴以名丁酉九月五日有日無月平公卒子悼公成立釐力之反又音來冬吳滅巢楚邑也書滅用大師葬杞平公無傳傳二十四年春王正月辛丑召簡公南宫嚚以甘桓公見王子朝杜簡公召莊公之子召伯盈也嚚南宫極之子桓公甘平公之子見賢遍反劉子謂萇𢎞曰甘氏又往矣對曰何害同德度義杜度謀也言惟同心同德則能謀義子朝不能於我無害度待洛反大誓曰紂有億兆夷人亦有離德杜言紂衆億兆兼有四夷不能同德終敗亡余有亂臣十人同心同德杜武王言我有治臣十人雖少同心也今大誓無此語此周所以興也君其務德無患無人林君謂劉文公戊午王子朝入于塢杜緱氏西南有塢聚言子朝稍強塢烏户反晉士彌牟逆叔孫于箕將禮而歸之叔孫使梁其脛待于門內杜脛叔孫家臣脛户走反曰余左顧而咳林咳逆氣聲咳苦代反乃殺之杜疑士伯來殺已故謀殺之右顧而笑乃止叔孫見士伯士伯曰寡君以為盟主之故是以久子杜久執子以謝邾不腆敝邑之禮將致諸從者使彌牟逆吾子叔孫受禮而歸二月婼至自晉尊晉也貶婼族所以尊晉婼行人故不言罪已從才用反三月庚戌晉侯使士景伯涖問周故涖臨也就問子朝敬王知誰曲直士伯立于乾祭而問於介衆乾祭王城北門介大也乾音干祭側界反晉人乃辭王子朝不納其使林衆言子朝曲故辭之不納子朝之使使所吏反夏五月乙未朔日有食之梓慎曰將水隂勝陽故曰將水昭子曰旱也日過分而陽猶不克克必甚能無旱乎林五月建辰故日已過春分之節杜過春分陽氣盛時而不勝隂陽將猥出故為旱陽不克莫將積聚也杜陽氣莫然不動乃將積聚陽不克莫絶句六月壬申王子朝之師攻瑕及杏皆潰杜瑕杏敬王邑鄭伯如晉子大叔相見范獻子獻子曰若王室何對曰老夫其國家不能恤敢及王室林老夫子大叔自稱言我有鄭國不能憂恤不敢及王室之事相息亮反抑人亦有言曰嫠不恤其緯杜嫠寡婦也織者常苦緯少寡婦所宜憂嫠力之反而憂宗周之隕為將及焉杜恐禍及已今王室實蠢蠢焉蠢蠢動擾貌蠢昌允反吾小國懼矣然大國之憂也吾儕何知焉吾子其早圖之詩曰瓶之罄矣惟罍之恥杜詩小雅罍大器瓶小器常稟於罍者而所受罄盡則罍為無餘故恥之王室之不寧晉之恥也獻子懼林范鞅恐諸侯以義責己而與宣子圖之杜宣子韓起乃徵會於諸侯期以明年為明年會黃父傳秋八月大雩旱也杜終如叔孫之言冬十月癸酉王子朝用成周之寶圭于河杜禱河求福甲戌津人得諸河上圭自出水隂不佞以溫人南侵不佞敬王大夫晉以溫人助敬王南侵子朝拘得玉者取其玉將賣之則為石王定而獻之林及敬王定位不佞以圭來獻與之東訾杜喜得玉故與之邑鞏縣西南訾城是也訾子斯反楚子為舟師以略吳疆略行也行吳界將侵之疆居良反沈尹戌曰此行也楚必亡邑不撫民而勞之吳不動而速之杜速召也吳踵楚杜躡楚踵迹而疆埸無備邑能無亡乎越大夫胥犴勞王於豫章之汭杜汭水曲犴五旦反勞力報反越公子倉歸王乘舟杜歸遺也歸如字又其愧反乘繩證反又如字倉及夀夢帥師從王杜壽夢越大夫夢莫公反王及圉陽而還圉陽楚地吳人踵楚而邊人不備遂滅巢及鍾離而還杜鍾離不書告敗略沈尹戌曰亡郢之始於此在矣王一動而亡二姓之帥杜二姓之帥守巢鍾離大夫帥所類反幾如是而不及郢詩曰誰生厲階至今為梗杜詩大雅厲惡階道梗病也幾居豈反又音機其王之謂乎為定四年吳入郢傳經甲申二十有五年春叔孫婼如宋夏叔詣會晉趙鞅宋樂大心衛北宫喜鄭遊吉曹入邾人滕人薛人小邾人于黃父林傳言謀王室也於是天王謂之東王子朝謂之西王晉侯使蒞問周故期以明年而後為黃父之會又明年而荀躒趙鞅之師出是故天王書出入而晉師克鞏不書書克鞏是討子朝也詣五計反有鸜鵒來巢此鳥穴居不在魯界故曰來巢非常故書鸜其俱反鵒音欲秋七月上辛大雩季辛又雩季辛下旬之辛也言又重上事九月己亥公孫于齊次于陽州杜諱奔故曰孫若自孫讓而去位者陽州齊魯竟上邑未敢直前故次于竟林公行書次自莊以來未之有也於是再見其再見何以昭公之大國不可不詳其所如禮也孫音遜傳同齊侯唁公于野井杜濟南祝阿縣東有野井亭齊侯來唁公公不敢逺勞故逆之往至野井唁音彥冬十月戊辰叔孫婼卒杜公不與小斂而書日者公在外非無恩十有一月己亥宋公佐卒于曲棘杜陳留外黃縣城中有曲棘里宋地未同盟而赴以名元公卒子景公頭曼立十有二月齊侯取鄆取鄆以居公也鄆音運傳二十五年春叔孫婼聘于宋桐門右師見之右師樂大心居桐門語卑宋大夫而賤司城氏杜司城樂氏之大宗也卑賤謂其才德薄昭子告其人曰右師其亡乎君子貴其身而後能及人是以有禮唯禮可以貴身貴身故尚禮今夫子卑其大夫而賤其宗是賤其身也賤人人亦賤己能有禮乎無禮必亡為定十年樂大心出奔傳宋公享昭子賦新宫逸詩昭子賦車轄杜詩小雅周人思得賢女以配君子昭子將為季孫迎宋公女故賦之轄本又作合胡轄反明日宴飲酒樂宋公使昭子右坐杜坐宋公右以相近言改禮坐樂音洛下同語相泣也林相與語而皆泣下樂祁佐助宴禮退而告人曰今兹君與叔孫其皆死乎吾聞之哀樂可樂而哀而樂哀可哀而樂皆喪心也心之精爽是謂魂魄林精血也爽明也心之精血屬隂為魄心之神明屬陽為魂喪息浪反下同魂魄去之何以能久為此冬叔孫宋公卒傳季公若之姊為小邾夫人杜平子庶姑與公若同母故曰公若姊生宋元夫人杜宋元夫人平子之外姊生子林宋元夫人生女以妻季平子昭子如宋聘且逆之杜平子人臣而因卿逆季氏強橫妻七計反公若從杜從昭子從才用反又如字謂曹氏林曹氏即宋元夫人曹小邾姓也勿與林勿與女魯將逐之林言魯人將逐季平子曹氏告公公告樂祁樂祁曰與之如是魯君必出林若果欲逐季氏魯君必失其國政在季氏三世矣林文子武子平子魯君喪政四公矣林宣成襄昭無民而能逞其志者未之有也國君是以鎮撫其民詩曰人之云亡心之憂矣杜詩大雅言無人則憂患至魯君失民矣焉得逞其志靖以待命猶可動必憂林安靖以待天命猶可無事逆時而動必致憂患杜為下公孫傳焉於虔反夏會于黃父謀王室也杜王室有子朝亂謀定之趙簡子令諸侯之大夫杜簡子趙鞅輸王粟具戍人林輸粟米以供王具人徒以戍周曰明年將納王林納王於王城子太叔見趙簡子簡子問揖讓周旋之禮焉對曰是儀也非禮也簡子曰敢問何謂禮對曰吉也聞諸先大夫子産曰林時子産已死故稱先大夫此曰字以下並舉子産之言夫禮天之經也經者道之常地之義也義者利之宜民之行也行者人所履行下孟反天地之經而民實則之林天經地義其實一理故總而言之謂天地之經民生天地間必以天地為法則則天之明日月星辰天之明也因地之性高下剛柔地之性也生其六氣杜謂隂陽風雨晦明用其五行杜金木水火土氣為五味杜五行之氣適口養體為酸鹹辛苦甘之味發為五色杜青黃赤白黑發見也章為五聲杜宫商角徵羽淫則昏亂民失其性杜滋味聲色過則傷性是故為禮以奉之杜制禮以奉其性為六畜馬牛羊雞犬豕畜許又反又楮六反五牲麋鹿麏狼兔三犧祭天地宗廟三者謂之犧以奉五味林凡此所以奉成五味之用也為九文謂山龍華蟲藻火粉米黼黻也華若草華藻水草火盡火粉米若白米黼若斧黻若兩已相戾傳曰火龍黼黻昭其文也六采杜畫績之事雜用天地四方之色青與白赤與黑玄與黃皆相次謂之六色五章以奉五色杜青與赤謂之文赤與白謂之章白與黑謂之黼黑與青謂之黻五色備謂之繡集此五章以奉成五色之用為九歌八風七音六律以奉五聲杜解見二十年林凡此所以奉成五聲之用也為君臣上下以則地義君臣有尊卑法地有高下為夫婦外內以經二物杜夫治外婦治內各治其物林物事也以治內外經常之事為父子兄弟姑姊甥舅昏媾姻亞以象天明杜六親和睦以事嚴父若衆星之共辰極也妻父曰昏重昏曰媾壻父曰姻兩壻相謂曰亞為政事庸力行務以從四時杜在君為政在臣為事民功曰庸治功曰力行其德教務其時要禮之本也林以順從春耕夏耘秋收冬藏之事為刑罰威獄使民畏忌以類其震曜殺戮雷震電曜天之威也聖人作刑戮以象類之為溫慈惠和以效天之生殖長育林春生夏長天之恩也聖人施恩惠以效法之長丁丈反民有好惡喜怒哀樂生于六氣杜此六者皆稟隂陽風雨晦明之氣好呼報反惡烏路反樂音洛下皆同是故審則宜類林審其法則宜其象類以制六志為禮以制好惡喜怒哀樂六志使不過節哀有哭泣樂有歌舞喜有施舍怒有戰鬭喜生於好怒生於惡是故審行信令禍福賞罰以制死生生好物也死惡物也好物樂也惡物哀也哀樂不失乃能協於天地之性是以長久杜或哀或樂不失其正乃能則天因地和叶于陽生隂殺之性故能參天地與之長久簡子曰甚哉禮之大也對曰禮上下之紀天地之經緯也杜經緯錯居以相成者林天地以禮而成位猶織以經緯而成文也民之所以生也林民有禮則安無禮則危所資以生者也是以先王尚之故人之能自曲直以赴禮者謂之成人大不亦宜乎林人性之曲者自以禮弼之使就於直人性之直者自以禮弼之使就於曲能如此者而後謂之成人禮之所以為大宜也簡子曰鞅也請終身守此言也杜鞅能守此言故終免於晉陽之難宋樂大心曰我不輸粟我於周為客杜二王後為賓客若之何使客晉士伯曰自踐土以來踐土在僖二十八年宋何役之不會而何盟之不同曰同恤王室子焉得辟之子奉君命以會大事而宋背盟無乃不可乎右師不敢對受牒而退杜右師樂大心林受輸粟之牒命而退焉於虔反背音佩下同士伯告簡子曰宋右師必亡奉君命以使而欲背盟以干盟主無不祥大焉言不善無大此者為定十年宋樂大心出奔傳使所吏反有鸜鵒來巢書所無也師已曰異哉吾聞文武之世童謠有之杜師已魯大夫己音紀又音祀曰鸜之鵒之林鸜鵒二字分言之取其韻叶公出辱之言鸜鵒來則公出辱也鸜鵒之羽林羽飛貌公在外野往饋之馬杜饋遺也林季平子每嵗賈馬饋之鸜鵒跦跦公在乾侯跦跦跳行貌跦張于反又張留反徵褰與襦林徵求也褰袴也襦內衣也言平子每嵗歸從者之衣屨褰起虔反又音愆襦而朱反鸜鵒之巢逺哉遙遙杜言其逺而又逺裯父喪勞宋父以驕裯父昭公死外故喪勞宋父定公代立故以驕裯直留外父音甫喪息浪反鸜鵒鸜鵒往歌來哭林重呼鸜鵒傷之之甚杜昭公生出歌死還哭童謠有是今鸜鵒來巢其將及乎杜將及禍也秋書再雩旱甚也杜傳言再雩以旱甚故非過時旱祭也初季公鳥娶妻於齊鮑文子生申杜公鳥季公亥之兄平子庶叔父林申公鳥之子鮑女所生也公鳥死季公亥與公思展與公鳥之臣申夜姑相其室杜公亥即公若也展季氏族相治也夜本或作射音夜又音亦相息亮反及季姒與饔人檀通杜季姒公鳥妻鮑文子女饔人食官檀直丹反人名也而懼林懼公若公思展申夜姑討之乃使其妾抶已林抶朴也抶敕乙反以示秦遄之妻秦遄魯大夫妻公鳥妹秦姬也遄市專反曰公若欲使余林言公若欲使我以非禮余不可而抶余又訴於公甫杜公甫平子弟曰展與夜姑將要余杜要劫我以非禮要一遙反下同秦姬以告公之杜公之亦平子弟公之與公甫告平子平子拘展於卞而執夜姑將殺之公若泣而哀之曰殺是是殺余也杜公若哀夜姑無罪而泣下言若殺夜姑與殺我無異蓋公若與夜姑共相公鳥之室故欲當其罪將為之請平子使豎勿內林豎小臣也季平子不欲面拒公若戒小豎勿內公若之謁為于偽反日中不得請有司逆命執夜姑之有司欲迎受殺生之命公之使速殺之故公若怨平子季郈之雞鬭季平子郈昭伯二家相近故雞鬬郈音后季氏介其雞搗芥子播其羽也或曰以膠沙播之為介雞郈子為之金距平子怒杜怒其不下已益宫於郈氏杜侵郈氏室以自益且讓之杜讓責也故郈昭伯亦怨平子臧昭伯之從弟會昭伯臧為子從才用反後從者皆同為讒於臧氏而逃於季氏臧氏執旃平子怒拘臧氏老林事見此年冬十二月傳旃之也將禘於襄公萬者二人其衆萬於季氏杜禘祭也萬舞也於禮公當三十六人林孔子謂季氏八佾舞於庭恐亦指此事臧孫曰此之謂不能庸先君之廟不能用禮也蓋襄公别立廟大夫遂怨平子公若獻弓於公為杜公為昭公子務人且與之出射於外而謀去季氏公為告公果公賁果賁皆公為弟賁音奔又扶云反公果公賁使侍人僚柤告公公寢將以戈擊之林昭公佯怒將以戈擊僚柤祖側加反乃走公曰執之亦無命也杜獨言執之無敕命懼而不出數月不見公不怒又使言林果賁又使僚柤如前言之見賢遍反公執戈以懼之乃走又使言公曰非小人之所及也杜謂僚柤為小人公果自言林公果知公意順乃自進言公以告臧孫臧孫以難杜言難逐難如字告郈孫郈孫以可勸林郈昭伯以季氏為可逐勸昭公逐季氏郈孫以可絶句告子家懿伯杜子家羈莊公之玄孫懿伯曰讒人以君徼幸事若不克君受其名杜受惡名不可為也舍民數世以求克事不可必也且政在焉其難圖也林言魯君失其民心已數世矣今以此求勝事不可必其勝負且魯國之政在季氏難為國度也舍音捨公退之杜退使去辭曰臣與聞命矣言若泄臣不獲死乃館於公杜恐受泄命之罪故留公宫以自明與音預叔孫昭子如闞闞魯邑闞口暫反公居於長府杜官府名九月戊戌伐季氏殺公之于門遂入之平子登臺而請曰君不察臣之罪使有司討臣以干戈杜言魯君不察臣罪之有無遽使以兵見討臣請待於沂上以察罪弗許杜魯城南自有沂水平子欲出城待罪也大沂水出蓋縣南至下邳入泗請囚于費弗許請以五乘亡弗許子家子曰君其許之政自之出久矣隱民多取食焉杜隱約窮困乘繩證反為之徒者衆矣日入慝作弗可知也杜慝姦惡也日冥姦人將起叛君助季氏不可知衆怒不可蓄也林季氏之衆皆懷怒君之心不可使之蓄聚蓄而弗治將蕰杜蕰積也林將蓄積而生變蕰紆粉反蕰蓄民將生心林積其所聚之怒則民將生異心生心同求將合林與季氏同求叛君者將合其謀君必悔之弗聽郈孫曰必殺之林言必殺季平子公使郈孫逆孟懿子杜懿子仲孫何忌叔孫氏之司馬鬷戾言於其衆曰若之何莫對衆疑所助又曰我家臣也不敢知國凡有季氏與無於我孰利林言我輩乃私家之臣不敢知國家之利害凡魯國之有季氏與魯國之無季氏二者於叔孫氏孰利皆曰無季氏是無叔孫氏也林言二家同功一體若無季氏唇亡齒寒是無叔孫氏也鬷戾曰然則救諸帥徒以往陷西北隅以入杜陷公圍也公徒釋甲執氷而踞杜言無戰心也氷櫝丸蓋或云櫝丸是箭筒其蓋可以取飲遂逐之逐公徒孟氏使登西北隅以望季氏見叔孫氏之旌以告林孟懿子亦疑所助使登高望季氏觀勝負見叔孫氏之旌旗已往季氏候望之人以告孟孫孟氏執郈昭伯殺之於南門之西林昭伯時往迎孟懿子故就執之遂伐公徒子家子曰諸臣偽劫君者而負罪以出君止林諸臣謂公若等偽若劫昭公以伐季氏者負罪出奔使若非公本意若自可止不出意如之事君也不敢不改杜意如季平子名公曰余不忍也與臧孫如墓謀杜辭先君且謀所奔遂行己亥公孫於齊次於陽州齊侯將唁公於平隂公先至於野井齊侯曰寡人之罪也使有司待於平隂為近故也林弔失國曰唁平隂齊地杜齊侯自咎本不敕有司逺詣陽州而欲近會於平隂故令魯侯過境先至野井逺見迎逆自咎以謝公為于偽反書曰公孫於齊次於陽州齊侯唁公於野井禮也林得下人之禮將求於人則先下之禮之善物也杜物事也謂先往至野井齊侯曰自莒疆以西請致千社杜二十五家為社千社二萬五千家欲以給公以待君命杜待君伐季氏之命寡人將帥敝賦以從執事唯命是聽君之憂寡人之憂也公喜子家子曰天祿不再天若祚君不過周公以魯足矣失魯而以千社為臣誰與之立林言天之福祿不可再得天若報君以祿不能過於胙周公周公止封於魯則以魯封君足矣今失魯國而以二萬五千家之封為齊之臣則從亡者皆將棄公而去誰與之共立哉且齊君無信不如早之晉弗從臧昭伯率從者將盟載書曰戮力一心好惡同之信罪之有無信明也處者有罪從者無罪繾綣從公無通外內杜繾綣不離散林外言不入內言不出無得交通繾音遣綣起阮反以公命示子家子子家子曰如此吾不可以盟羈也不佞不能與二三子同心林羈子家子名二三子謂從亡者言不能與之同其好惡而以為皆有罪從者陷君留者逐君皆有罪也或欲通內外林或欲通外內之言彼此解説且欲去君杜去君偽負罪出奔不必繾綣從公二三子好亡而惡定焉可同也林諸從亡者好出奔而惡歸國安可同其好惡好呼報反惡烏路反焉於虔反陷君於難罪孰大焉通外內而去君君將速入弗通何為而何守焉乃不與盟林通外內之言而偽負罪以去君將速歸其國不通外內果欲何為何必守公而後為忠難乃旦反與音預昭子自闞歸見平子平子稽顙曰子若我何林言叔孫何以為我謀昭子曰人誰不死子以逐君成名子孫不忘不亦傷乎將若子何平子曰苟使意如得改事君所謂生死而肉骨也林言叔孫苟能使我得改心以事君是我已死而得生枯骨而復肉也稽音啓昭子從公于齊與公言林以平子悔過之意與昭公言子家子命適公館者執之林恐從者知叔孫謀故命執適公館者公與昭子言於幄內曰將安衆而納公杜昭子請歸安衆公徒將殺昭子伏諸道林伏兵於道左師展告公杜展魯大夫公使昭子自鑄歸杜辟伏兵平子有異志不欲復納公冬十月辛酉昭子齊於其寢使祝宗祈死戊辰卒杜恥為平子所欺因祈而自殺齊側皆反左師展將以公乘馬而歸公徒執之林乘騎也欲與昭公騎馬輕歸乘如字壬申尹文公涉于鞏焚東訾弗克杜文公子朝黨於鞏縣涉洛水也東訾敬王邑林焚以火攻也十一月宋元公將為公故如晉杜請納公為于偽反夢太子欒即位於廟已與平公服而相之杜太子欒元公太子也已元公也平公元公父也元公夢太子欒即位於宋廟已與平公朝服而輔相之相息亮反旦召六卿公曰寡人不佞不能事父兄杜父兄謂華向以為二三子憂寡人之罪也若以羣子之靈獲保首領以殁唯是楄柎所以藉幹者楄柎棺中笭牀也幹骸骨也楄蒲田反柎步口反又音附請無及先君欲自貶揖仲幾對曰君若以社稷之故私降昵宴羣臣弗敢知林仲幾宋大夫杜昵近也降昵宴謂揖親近聲樂飲食之事若夫宋國之法死生之度林送死事生之法度先君有命矣羣臣以死守之弗敢失隊臣之失職常刑不赦臣不忍其死林臣不忍曠禮廢法自速死罪隊直類反君命祗辱杜言君命必不行祗適也祗音支宋公遂行己亥卒于曲棘為明年梁丘據語起本十二月庚辰齊侯圍鄆欲取以居公不書圍鄆人自服不成圍初臧昭伯如晉臧會竊其寶龜僂句林臧會昭伯從弟杜僂句龜所出地名僂力主反又力具反句居其反以卜為信與僣林僣不信也以卜所為誠信與不信之事僣吉臧氏老將如晉問問昭伯起居會請往杜代家老行昭伯問家故盡對故事也及內子與母弟叔孫則不對杜內子昭伯妻不對若有他故再三問不對歸林昭伯自晉歸及郊會逆問又如初言又不對至次於外而察之皆無之林昭伯懷疑不入其家乃次舍於外而察其有無皆無他故執而戮之逸奔郈郈魴假使為賈正焉杜郈在東平無鹽縣東南魴假郈邑大夫賈正掌貨物使有常價若市吏魴音房賈音嫁計於季氏杜送計簿於季氏臧氏使五人以戈楯伏諸桐汝之閭林戈創也楯千也桐汝里名蓋杖兵以伏於桐汝之里門楯食凖反又音允會出逐之反奔執諸季氏中門之外平子怒曰何故以兵入吾門拘臧氏老季臧有惡杜相怨惡及昭伯從公平子立臧會杜立以為臧氏後會曰僂句不余欺也林僂句龜名言不信果驗傳言卜筮之驗善惡由人楚子使薳射城州屈復茄人焉還復茄人於州曲屈居勿反又其勿反茄音加城丘皇遷訾人焉移訾人於丘皇使熊相禖郭巢季然郭卷杜使二大夫為巢卷築郭也卷城在南陽葉縣南相息亮反褀音梅卷音權或眷勉反子大叔聞之曰楚王將死矣使民不安其土民必憂憂將及王弗能久矣為明年楚子居卒傳左傳杜林合注卷四十一
