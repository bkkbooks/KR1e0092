body:
  text: 左傳杜林合注卷二十九明王道焜趙如源同編襄公五經己酉二十有一年林是年十一月庚子孔子生何休注作己卯歲春王正月公如晉邾庶其以漆閭丘來奔杜二邑在髙平南平陽縣東北有漆鄉西北有顯閭亭以邑出為叛適魯而言來奔內外之辭林於是公猶在晉季孫宿納之也漆徐音七閭力於反夏公至自晉無傳秋晉欒盈出奔楚盈不能防間其母以取奔亡稱名罪之九月庚戌朔日有食之無傳冬十月庚辰朔日有食之無傳曹伯來朝公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商任商任地闕任音壬傳二十一年春公如晉拜師及取邾田也杜謝十八年伐齊之師漷水之田邾庶其以漆閭丘來奔庶其邾大夫季武子以公姑姊妻之杜計公不得有未嫁始姊蓋寡者二人公姑姊林以公之始及姊是二人也或曰列女傳稱梁有節姑妹渭父之姊也此云姑姊是父之姊也一人耳以杜氏為誤案成一年楚侵及陽橋孟孫往賂以公衡為質杜云衡成公子也楚師及宋公衡逃歸臧宣叔曾云衡父不忍數年之不宴以棄魯國則公衡之年下計猶十七八成公是其父固當三十有餘矣成二年至此三十八嵗姑又成公之姊則年近七十矣假令公衡非成公之子猶是成公之弟成五年伯姬歸于宋伯者長稱九年始嫁則為成公之妹成公不得有姊矣若成公别有庶長之姊以成公公衡之年推之亦不復堪嫁故知二人也唯公羊以成公即位年幼據左氏成四年傳云公如晉晉侯見公不敬公歸欲求成于楚得季文子諫而止此非年幼也反覆推之杜氏不誤妻七計反下同皆有賜於其從者林皆有嘗賜於庶其之從亡者從才用反下同於是魯多盜季孫謂臧武仲曰子盍詰盜詰治也詰起吉反武仲曰不可詰也紇又不能季孫曰我有四封而詰其盜何故不可子為司寇將盜是務去若之何不能武仲曰子召外盜而大禮焉何以止吾盜杜吾謂國中去起吕反下皆同子為正卿而來外盜使紇去之將何以能庶其竊邑於邾以來子以姬氏妻之而與之邑杜使食漆閭丘其從者皆有賜焉若大盜禮焉以君之姑姊與其大邑林大盜謂庶其則禮貌而嫁以君之姑及姊與之食邑其次皂牧輿馬杜其次庶其之從者林給其賤役從皂至牧凡八等之人皂在早反凡八等之人謂皂輿𨽻僚僕臺圉牧也其小者衣裳劒帶林其小如從者之微賤亦以衣裳劒帶賜之是賞盜也賞而去之其或難焉林賞其大盜去其小盜或者其難去焉紇也聞之在上位者灑濯其心一以待人軌度其信可明徵也林冼滌其利欲之私心専臺以待乎人其法皆一度於信前後所行皆可明驗灑西禮反濯直角反度待洛反而後可以治人夫上之所為民之歸也上所不為而民或為之是以加刑罰焉而莫敢不懲若上之所為而民亦為之乃其所也林若上之人賞盜而喜其所為則下之人亦為盜以肆其所為亦其所宜然也又可禁乎夏書曰念茲在茲此逸書也茲此也謂行此事當念使可施之於此釋茲在茲釋除也謂欲有所治除於人亦當顧已得無亦有之名言茲在茲名此事言此事亦皆當令可施於此允出茲在茲允信也信出於此則善亦在此惟帝念功言帝念功則功成也將謂由已一也言非但意念而已當須信已誠至信由已一而後功可念也林誠信之道由已専一而後念功則功可成庶其非卿也以地來雖賤必書重地也重地故書其人其人書則惡名彰以懲不義齊侯使慶佐為大夫慶佐崔杼黨復討公子牙之黨執公子買于句瀆之丘公子鉏來奔叔孫還奔燕三子齊公族言莊公斥逐親戚以成崔慶之勢終有弒殺之禍鉏仕居反還音旋夏楚子庚卒楚子使薳子馮為令尹訪於申叔豫杜叔豫叔時姑置薳子馮私問於叔豫叔豫曰國多寵而王弱言弱政教而貴人强微國不可為也遂以疾辭方暑闕地下氷而牀焉林掘地下氷其中而安牀於上闕求月反重繭衣裘鮮食而寢杜繭綿衣林重綿衣裘示其寒少食而寢示其弱繭古典反衣於既反鮮息淺反少也下鮮過同楚子使醫視之復曰瘠則甚矣杜瘠瘦也瘠在亦反而血氣未動杜言無疾乃使子南為令尹杜子南公子追舒也為二十二年殺追舒傳欒桓子娶於范宣子生懷子杜桓子欒黶懷子盈也范鞅以其亡也怨欒氏十四年欒黶疆逐范鞅使奔秦故與欒盈為公族大夫林十六年士鞅欒盈同為公族大夫而不相能桓子卒欒祁與其老州賓通杜欒祁桓子妻范宣子女盈之母也范氏堯後祁姓林老欒氏之家臣也能如字徐乃代反幾亡室矣杜言亂甚幾其依反懷子患之祁懼其討也林懼其治州賔之罪訴諸宣子曰盈將為亂以范氏為死桓主而専政矣林桓主即欒黶大夫稱主也謂欒盈以范氏欺欒黶為已死而専晉國之政曰吾父逐鞅也不怒而以寵報之林欒黶嘗逐范鞅宣子不為欒黶責怒范鞅而反與鞅寵位又與吾同官而専之杜同為公族大夫而鞅専其權勢吾父死而益富林自欒黶死而范宣子益富强死吾父而専於國有死而已吾蔑從之矣假言宣子専政盈欲以死作難其謀如是懼害於主吾不敢不言范鞅為之徴林范鞅素怨懷子故證其有此謀懷子好施士多歸之宣子畏其多士也信之杜范宣子畏欒懷子之多得士心遂信欒祁士鞅之譖好呼報反施式䜴反懷子為下卿杜下軍佐宣子使城著而遂逐之杜著晉邑在外易逐著直據反又張慮反秋欒盈出奔楚宣子殺箕遺黃淵嘉父司空靖邴豫董叔邴師申書羊古虎叔羆十子皆晉大夫欒盈之黨也羊舌虎叔向弟邴音丙羆彼皮反囚伯華叔向籍偃籍偃上軍司馬人謂叔向曰子離於罪其為不知乎杜離麗也林譏其受囚而不能去知音智下同叔向曰與其死亡若何杜言雖囚何若於死亡詩曰優哉游哉聊以卒嵗知也杜詩小雅言君子優游於衰世所以辟害卒其壽是亦知也詩小雅案今小雅無此全句唯采菽詩云優哉游哉亦是戾矣樂王鮒見叔向曰吾為子請叔向弗應出不拜杜樂王駙晉大夫樂桓子鮒音附其人皆咎叔向叔向曰必祁大夫杜祁大夫祁奚也食邑於祁因以為氏祁縣今屬大原室老聞之杜室老即叔向之家臣曰樂王鮒言於君無不行杜其言皆得行求赦吾子吾子不許杜謂不應出不拜祁大夫所不能也杜不能動君而曰必由之何也叔向曰樂王鮒從君者也何能行祁大夫外舉不棄讐內舉不失親其獨遺我乎林言樂王鮒不能匡正其君以順從為悅者也何能必行其言祁大夫之舉賢也其舉於外不棄解狐之讐其舉於內不失祁午之親其獨肯遺棄於我乎詩曰有覺德行四國順之杜詩大雅言德行直則天下順之行下孟反夫子覺者也林夫子謂祁大夫杜覺較然正直晉侯問叔向之罪於樂王鮒對曰不棄其親其有焉杜言叔向篤親親必與叔虎同謀林蓋樂王鮒恨叔向不應不拜故以此對於是祁奚老矣杜老去公族大夫聞之乘馹而見宣子林馹𫝊車也馹人實反曰詩曰惠我無疆子孫保之林詩周頌也言文武有惠訓之德加於百姓故子孫保賴之疆居良反書曰聖有謨勳明徵定保杜逸書謨謀也勳功也言聖哲有謀功者當明信定安之謨莫胡反勳如字書作訓夫謀而鮮過惠訓不倦者叔向有焉杜謀鮮過有謨勳也惠訓不倦惠我無疆也社稷之固也猶將十世宥之以勸能者林十成數故言十世之後子孫有罪猶將加以寬宥以勸勉才能之士宥音又今一不免其身以棄社稷林一以弟故不免叔向之身以棄絶社稷之所倚賴不亦惑乎鯀殛而禹興杜言不以父罪廢其子鯀古本反殛紀力反伊尹放太甲而相之卒無怨色杜太甲湯孫也荒淫失度伊尹放之桐宫三年改悔而復之而無恨心言不以一怨妨大德大音泰相息亮反管蔡為戮周公右王言兄弟罪不相及右音又若之何其以虎也棄社稷林如之何以叔虎之故而棄社稷之所倚賴子為善誰敢不勉多殺何為宣子說與之乘以言諸公而免之杜共載入見公說音悅乘繩證反不見叔向而歸杜言為國非私叔向也叔向亦不告免焉而朝杜不告謝之明不為已初叔向之母妬叔虎之母美而不使不使見叔向父妬丁故反其子皆諫其母其母曰深山大澤實生龍蛇杜言非常之地多生非常之物彼美余懼其生龍蛇以禍女女敝族也杜敝衰壤也龍蛇喻奇怪也女汝汝國多大寵不仁人間之不亦難乎余何愛焉林晉國六卿専權多大寵愛而有奇怪殘暴不仁之人間厠其間不亦難以免於禍乎我又何愛於此委而不使見於父哉使往視寢生叔虎美而有勇力欒懷子嬖之故羊舌氏之族及於難欒盈過於周周西鄙掠之林欒盈奔楚道過周地周西鄙之人劫掠其財物難乃旦反掠音亮辭於行人杜王行人也曰天子陪臣盈諸侯之臣稱於天子曰陪臣得罪於王之守臣范宣子為王所命故曰守臣守手又反將逃罪罪重於郊甸重得罪於郊甸謂為郊甸所侵掠也郭外曰郊郊外曰甸重直用反甸徒練反無所伏竄敢布其死布陳也昔陪臣書能輸力于王室王施惠焉杜輸力謂輔相晉國以翼戴天子林天子施惠賜之命服其子黶不能保任其父之勞大君若不棄書之力亡臣猶有所逃大君謂天王任音壬若棄書之力而思黶之罪臣戮餘也杜罪戮之餘將歸死於尉氏杜尉氏討姦之官不敢還矣敢布四體唯大君命焉杜布四體言無所隱王曰尤而效之其又甚焉尤晉逐盈而自掠之是效尤使司徒禁掠欒氏者歸所取焉林司徒以刑教民掌追胥盜賊之事故使禁掠欒氏者歸其所掠取之財物使候出諸轘轅杜候送迎賔客之官也轘轅關在緱氏縣東南轅音袁冬曺武公來朝始見也即位三年始來見公㑹于商任錮欒氏也禁錮欒盈使諸侯不得受錮音固齊侯衛侯不敬叔向曰二君者必不免㑹朝禮之經也禮政之輿也政身之守也林禮以㑹朝而定故㑹朝為禮之常經政須禮而行故禮為政之輿政存則身安故政為身之守衛怠禮失政失政不立是以亂也為二十五年齊弒光二十六年衛弒剽傳知起中行喜州綽邢蒯出奔齊四子晉大夫知音智行户郎反蒯苦怪反皆欒氏之黨也樂王鮒謂范宣子曰盍反州綽邢蒯勇士也宣子曰彼欒氏之勇也余何獲焉杜言不為已用王鮒曰子為彼欒氏乃亦子之勇也杜言子待之如欒氏亦為子用也齊莊公朝指殖綽郭最曰是寡人之雄也林雄猶勇也州綽曰君以為雄誰敢不雄然臣不敏平隂之役先二子鳴十八年晉伐齊及平陰州綽獲殖綽郭最故自比於雞鬬勝而先嗚先悉薦反莊公為勇爵設爵位以命勇士殖綽郭最欲與焉自以為勇與音預丁同州綽曰東閭之役臣左驂迫還於門中識其枚數杜識門板數亦在十八年枚本亦作板其可以與於此乎公曰子為晉君也林言子之勇乃為晉君非為齊也為干僞反反曰臣為𨽻新林言臣但為僕人尚新未得效勇耳然二子者譬於禽獸臣食其肉而寢處其皮矣譬言嘗射得之言未足以為勇也經庚戌二十有二年春王正月公至自㑹無傳夏四月秋七月辛酉叔老卒無傳子叔齊子冬公㑹晉侯齊侯宋公衛侯鄭伯曺伯莒子邾子薛伯杞伯小邾子于沙隨林沙隨宋地公至自㑹無傳楚殺其大夫公子追舒林子南也書名者寵近小人貪而多馬為國所患傳二十二年春臧武仲如晉公頻與晉侯外㑹今各將罷還魯之守卿遣武仲為公謝不敏故不書雨過御叔御叔在其邑將飲酒林御叔魯御邑大夫武仲過之遇雨過古禾反御魚吕反又魚據反曰焉用聖人武仲多知時人謂之聖焉於䖍反我將飲酒而已雨行何以聖為杜言我但欲飲酒而已無所用聖人且武仲出行而遇雨不知晴雨何以為知且聖也穆叔聞之曰不可使也而傲使人林言御叔不任使四方而傲慢武仲承命出使之人傲五報反使人所吏反國之蠧也令倍其賦古者家有國邑故以重賦為罰傳言穆叔能用教蠧下故反夏晉人徵朝于鄭杜召鄭使朝鄭人使少正公孫僑對杜少正鄭卿官也公孫僑子産少詩照反僑其驕反曰在晉先君悼公九年我寡君於是即位杜魯襄八年即位八月即位年之八月而我先大夫子駟從寡君以朝于執事執事不禮於寡君杜言朝執事謙不敢斥晉侯寡君懼因是行也我二年六月朝于楚杜因朝晉不見禮生朝楚心晉是以有戲之役在九年戲許宜反楚人猶競而申禮於敝邑敝邑欲從執事而懼為大尤林競强也是年冬楚伐鄭謂申禮於鄭蓋飾詞尤過也言鄭人雖欲從晉而懼為大過曰晉其謂我不共有禮是以不敢攜二於楚林言音其將責鄭不共順於有禮之國是以不敢攜離而冇二心於楚共音恭我四年三月先大夫子蟜又從寡君以觀釁於楚杜實朝言觀釁飾亂也言欲往視楚知可去否晉於是乎有蕭魚之役在十一年謂我敝邑邇在晉國譬諸草木吾臭味也杜晉鄭同姓故而何敢差池杜差池不齊一差初宜反又初佳反一音七河反池徐本作沱直知反又徒河反楚亦不競寡君盡其土實杜土地所有重之以宗器杜宗廟禮樂之器鐘罄之屬重直用反以受齊盟杜齊同也遂帥羣臣隨于執事以㑹嵗終言朝正于晉二於楚者子侯石孟歸而討之杜石孟石㚟林蓋飾詞也其實鄭使石㚟告絶于楚楚人執之湨梁之明年林湨梁在十六年明年則十七年矣子蟜老矣公孫夏從寡君以朝于君見于嘗酎杜酒之新熟重者為酎嘗新飲酒為嘗酎林蓋鄭伯見於晉君嘗酎之時見賢遍反又如字酎直又反與執燔焉林燔祭肉也與執燔肉以助祭與音預燔又作膰音煩間二年聞君將靖東夏杜謂二十年澶淵盟間間厠之間又如字四月又朝以聽事期杜先澶淵二月往朝以聽㑹期不朝之間林其間不朝于晉之時無嵗不聘無役不從以大國政令之無常國家罷病不虞薦至杜薦仍也罷音皮荐音薦反無日不惕豈敢忘職惕懼也惕他厯反大國若安定之其朝夕在廷何辱命焉杜言自將往不須來召若不恤其患而以為口實口實但有其言而已其無乃不堪任命而剪為仇讐杜剪削也謂見剝削不堪命則成仇讐任音壬敝邑是懼其敢忘君命委諸執事執事實重圖之傳言子産有辭所以免大國之討秋欒盈自楚適齊晏平仲言於齊侯曰商任之㑹受命於晉杜受錮欒氏之命今納欒氏將安用之小所以事大信也失信不立君其圖之弗聽退告陳文子曰君人執信臣人執共忠信篤敬上下同之天之道也君自棄也弗能久矣為二十五年齊弒其君光傳九月鄭公孫黑肱有疾歸邑于公杜黑肱子張召室老宗人立段杜段子石黑肱子而使黜官薄祭杜使其子段減黜其官無多受職省薄其祭無多用牲祭以特羊殷以少牢杜四時祭以一羊三年盛祭祀羊豕殷盛也足以共祀盡歸其餘邑林食邑足以供祭祀之外盡歸其餘於公盡津忍反曰吾聞之生於亂世貴而能貧民無求焉可以後亡林位雖貴而能不極其富國之貧民無所求欲於我可以免禍而死亡在他人後敬共事君與二三子生在敬戒不在富也人之所以保其生者在於共敬而戒謹不在於極其富有也己巳伯張卒君子曰善哉詩曰慎爾侯度用戒不虞鄭子張其有焉杜詩大雅侯維也義取慎法度戒未然冬㑹于沙隨復錮欒氏也晉知欒盈在齊故復錮也欒盈猶在齊晏子曰禍將作矣齊將伐晉不可以不懼為明年齊伐晉傳楚觀起有寵於令尹子南林子南即公子追舒未益祿而有馬數十乘林祿少而馬多蓋觀起恃其寵愛招權納賄所致杜言子南偏寵觀起令富數所主反乘繩證反楚人患之王將討焉子南之子棄疾為王御士杜御王車者王每見之必泣棄疾曰君三泣臣矣敢問誰之罪也林言康王凡三見臣而泣矣敢問所以泣者其罪在誰王曰令尹之不能爾所知也國將討焉爾其居乎杜問能止事我否對曰父戮子居君焉用之泄命重刑臣亦不為杜漏泄君命罪之重焉於䖍反下焉皆同王遂殺子南於朝轘觀起於四竟杜轘車裂以徇轘音患竟音境下同子南之臣謂棄疾請徙子尸於朝林子謂子南蓋欲犯命取殯曰君臣有禮唯二三子林言君之殺臣臣之事君皆有禮制唯二三家臣其少忍之杜不欲犯命移尸三日棄疾請尸王許之既葬其徒曰行乎行去也曰吾與殺吾父行將焉入林棄疾言我知王欲殺子南而不告是與殺吾父雖去他國將安所欲言無所容與音預殺如字一音弒曰然則臣王乎曰棄父事讐吾弗忍也於事是讐於實是君故雖謂讐而不敢報遂縊而死傳譏康王與人子謀其父失君臣之義縊一賜反復使薳子馮為令尹公子齮為司馬屈建為莫敖屈建子木也齮五綺反屈居勿反有寵於薳子者八人皆無祿而多馬他日朝與申叔豫言弗應而退從之入於人中杜申叔辟薳子不欲與語又從之遂歸杜申叔遂歸其家退朝見之杜薳子就申叔家見之曰子三困我於朝林子謂申叔不應入人中遂歸凡三困辱我於朝吾懼不敢不見吾過子姑告我何疾我也對曰吾不免是懼何敢告子言吾與子并罪故不敢與子語見賢遍反曰可何故對曰昔觀起有寵於子南子南得罪觀起車裂何故不懼自御而歸不能當道林薳子聞申叔之言惶懼自御其車而歸意不在御故不能當道至林薳子馮歸至其家謂八人者曰吾見申叔夫子所謂生死而肉骨也杜已死復生白骨更肉知我者如夫子則可杜夫子為申叔也如夫子謂以義匡已不然請止杜止不相知辭八人者而後王安之杜辭遣之十二月鄭游昄將如晉游昄公孫蠆子昄普扳反未出竟遭逆妻者奪之以館于邑林路遇迎妻以歸其家者奪其妻舍止其邑不復行丁巳其夫攻子明殺之以其妻行林子明即游昄杜十二月無丁巳丁巳十一月十四日也子展廢良而立大叔按良游昄子大叔昄弟大音泰曰國卿君之二也民之主也不可以苟請舍子明之類杜子明之罪而良又不賢故舍音捨求亡妻者使復其所使游氏勿怨林求亡妻而殺子明者使復其所居使游昄之家勿怨亡妻者蓋鄭國不討専殺之人所以抑疆扶弱臨時之宜曰無昭惡也杜交怨則久之不修益明也經辛亥二十有三年春王二月癸酉朔日有食之無傳三月己巳杞伯丐卒杜五同盟林孝公卒弟文公姑容立姑古害反夏邾畀我來奔無傳畀我是庶其之黨同有竊邑叛君之罪來奔故書畀必利反葬杞孝公無傳陳殺其大夫慶虎及慶寅書名皆罪其専國叛君言及史異辭無義例陳侯之弟黃自楚歸于陳諸侯納之曰歸黃至楚自理得直故為楚所納晉欒盈復入于晉以惡入曰復入入于曲沃兵敗奔曲沃據曲沃衆還與君爭非欲出附他國故不言叛秋齊侯伐衛遂伐晉杜兩事故言遂林此以其書遂何齊始伐盟主也自袁婁以來齊世從晉於是始叛則晉伯衰而諸侯二矣晉之衰諸夏之憂八月叔孫豹帥帥救晉次于雍榆豹救晉待命于雍榆故書次雍榆晉地汲郡朝歌縣東有雍城林次而後救匿其救之之形也救而先次宣其救之之聲也自救晉而天下益多故矣盟于宋而南北之勢成㑹于申而淮夷至戰于雞父而吳之敗者六國於越入吳春秋終焉蓋於是焉始故謹而書之也是故是救盟主他救皆不書如昭二十一年晉以諸侯之師救宋三十年楚救徐之類皆不書以為不足書也雍于用反己卯仲孫速卒孟莊子也冬十月乙亥臧孫紇出奔邾書名者阿順季氏為之廢長立少以取奔亡罪之晉人殺欒盈齊侯襲莒按輕行掩其不備曰襲因伐晉還襲莒不言遂者間有事耳春秋書襲者此特筆也傳二十三年春杞孝公卒晉悼夫人喪之杜悼夫人晉平公母杞孝公姊妹林以兄弟之禮喪之喪如字徐息浪反平公不徹樂非禮也不徹去也禮為鄰國闕禮諸侯絶期故以鄰國責之為于僞反下同陳侯如楚往朝也公子黃訴二慶於楚楚人召之杜二慶虎及寅也二十年二慶譖黃黃奔楚自理今陳侯往楚了信黃為召二慶訴悉路反使慶樂往殺之慶樂二慶之族二慶畏誅故不敢自往使慶樂往絶句慶氏以陳叛杜因陳侯在楚而叛之不書叛不以告夏屈建從陳侯圍陳陳人城杜治城以距君屈建楚莫敖從才用反又如字板隊而殺人役人相命各殺其長杜築城之版墜地慶氏忿其不用心遂殺築人執役之人怨慶氏殺人乃相告作亂各殺其隊伍之長隊直類反長丁丈反遂殺慶虎慶寅楚人納公子黃君子謂慶氏不義不可肆也林肆放也言不可放在人上故書曰惟命不于常杜周書康誥言有義則存無義則亡晉將嫁女于吳齊侯使析歸父媵之以藩載欒盈及其士林以藩車之有障蔽者載欒盈及其腹心瓜牙之士使若媵妾在其中析星厯反媵以證反藩方元反納諸曲沃欒盈邑也欒盈夜見胥午而告之杜胥午守曲沃大夫夜見不欲使人知對曰不可天之所廢誰能興之子必不免吾非愛死也知不集也杜集成也知音智又如字盈曰雖然因子而死吾無悔矣杜言因胥午舉事無成而死我亦無所悔恨我實不天子無咎焉林言我雖不為天所祐子無天咎故可因許諾伏之而觴曲沃人杜胥午匿盈而飲其衆樂作午言曰今也得欒孺子何如杜孺子欒盈名言今也得欒盈何以處之對曰得主而為之死猶不死也杜主謂欒盈皆歎有泣者爵行又言林爵行飲酒胥午又以欒盈為言皆曰得主何二之有林言得欒盈何敢復有二心盈出偏拜之謝衆之思巳四月欒盈帥曲沃之甲因魏獻子以晝入絳杜獻子魏舒絳晉國都林以晝入絳輕兵掩晉之不備也初欒盈佐魏莊子於下軍杜莊子魏絳獻子之父獻子私焉故因之杜私相親愛林魏獻子以事私請託於欒盈趙氏以原屏之難怨欒氏杜成八年莊姫譖之欒郤為徴屏薄輕反難乃旦反韓趙方睦杜韓起讓趙武故和睦中行氏以伐秦之役怨欒氏十四年晉伐秦欒黶違荀偃命曰余馬首欲東而固與范氏和親杜范宣子佐中行偃於中軍知悼子少而聽於中行氏杜悼子知罃之子荀盈也少年十七知氏中行氏同祖故相聽從知音智少詩照反程鄭嬖於公杜鄭亦荀氏宗嬖必計反唯魏氏及七輿大夫與之杜七輿官名唯魏獻子及七輿大夫與欒盈為好樂王鮒侍坐於范宣子或告曰欒氏至矣宣子懼桓子曰奉君以走固宫必無害也杜桓子樂王鮒林固宫宫之有臺觀守備者鮒音附走如字一音奏且欒氏多怨子為政欒氏自外子在位其利多矣既有利權又執民柄林宣子既有晉國財利之權又執賞罰生民之柄將何懼焉欒氏所得其唯魏氏乎而可强取也夫克亂在權子無懈矣林魏獻子雖與欒盈其心未固可以强劫而取之夫克勝禍亂之道在於有權宣子無懈怠於用權可矣强其大反懈佳買反公有姻喪杜夫人有杞喪王鮒使宣子墨縗冒絰杜晉自殽戰還遂常墨縗縗七雷反絰直結反冒絰以絰冒其首也一云縗冒絰三者皆墨之二婦人輦以如公杜恐欒氏有內應距之故為婦人服而入奉公以如固宫范鞅逆魏舒林鞅宣子子杜用王鮒計欲强取之則成列既乘林魏獻子之兵成行列既乘車乘繩證反將逆欒氏矣趨進曰欒氏帥賊以入鞅之父與二三子在君所矣杜二三子諸大夫使鞅逆吾子鞅請驂乘持帶驂乘必持帶備墮隊遂超乘杜跳上獻子車右撫劍左援帶杜劫之援音袁命驅之出僕請林范鞅命驅車出獻子之僕請其所至鞅曰之公杜之往也言往公所宣子逆諸階杜逆獻子也執其手賂之以曲沃杜恐不與已同心初斐豹𨽻也著於丹書杜蓋犯罪沒為官奴以丹書其罪斐音非又芳匪反欒氏之力臣曰督戎國人懼之斐豹謂宣子曰苟焚丹書我殺督戎宣子喜曰而殺之所不請於君焚丹書者有如日林而汝也杜言不負要明如日乃出豹而閉之林閉著門外督戎從之踰隱而待之林隱短牆也杜督戎見斐豹出門從之拒戰斐豹乃過短牆而待其至督戎踰入豹自後擊而殺之范氏之徒在臺後杜公臺之後欒氏乘公門欲乘登也宣子謂鞅曰矢及君屋死之林言賊之矢已及君屋令其致死力戰鞅用劔以帥卒杜用劒短兵接敵欲致死卒子忽反欒氏退攝車從之杜鞅攝宣子戎車遇欒樂樂盈之族曰樂免之林范鞅吁其名而謂之曰樂免之言不免汝死將訟女於天杜言雖死猶不舍女罪女音汝樂射之不中又注杜注屬矢於弦也射食亦反中丁仲反則乘槐本而覆杜樂樂車轢槐而覆槐音懷覆芳服反或以㦸鈎之斷肘而死欒魴傷欒盈奔曲沃晉人圍之魴欒氏族斷音短肘音九反秋齊侯伐衛先驅榖榮御王孫揮召揚為右杜先驅前鋒軍召士照反申驅成秩御莒恆申鮮虞之傳摰為右杜申驅次前軍傳摰申鮮虞之子鮮音仙摰音至曺開御戎晏父戎為右杜公御右也父音甫二廣上之登御邢公盧蒲癸為右杜二廣公副車廣古曠反邢音刑啓牢成御襄罷師狼蘧疏為右左翼曰啓牢魯刀反一作罕罷音皮徐音彼又皮買反蘧其居反胠商子車御侯朝桓跳為右右翼曰胠胠起居反徐音脅朝如字又直遙反跳徒雕反大殿商子游御夏之御寇崔如為右杜大殷後軍殷都練反御魚吕反燭庸之越駟乘杜四人共乘殿車也傳其載此言莊公廢舊臣任武力乘繩證反自衛將遂伐晉晏平仲曰君恃勇力以伐盟主若不濟國之福也不德而有功憂必及君林無文德而有武功憂患必將及君之身言必以驕縱致憂患崔杼諌曰不可臣聞之小國間大國之敗而毁焉林言齊間晉有欒盈之禍而伐之間閒厠之間又如字必受其咎君其圖之弗聽陳文子見崔武子林文子陳完之孫須無武子崔杼也曰將如君何杜言君將伐晉如之何武子曰吾言於君君弗聽也以為盟主而利其難羣臣若急君於何有林言有急不能顧君欲弒之以說晉難乃且反子姑止之文子退告其人曰崔子將死乎謂君甚而又過之弒君之惡過於背盟主不得其死過君以義猶自抑也况以惡乎林所行之義有過於君人臣之道猶自抑損不敢求過況欲以惡過其君乎齊侯遂伐晉取朝歌杜朝歌今屬汲郡為二隊入孟門登大行杜二隊分兵為二部孟門晉隘道大行山在河內郡北隊徒對反徐徒猥反大音泰行徐户郎反又如字張武軍於熒庭杜張武軍謂築壘壁熒庭晉地熒户扃反戍郫邵杜取晉邑而守之郫婢之反封少水封晉尸於少水以為京觀少詩照反下同以報平隂之役乃還平隂役在十八年趙勝帥東陽之師以追之獲晏氂杜趙勝趙㫋之子東陽晉之山東魏郡廣平以北晏氂齊大夫勝音升又申證反氂力之反徐音來八月叔孫豹帥師救晉次于雍榆禮也救盟主故曰禮季武子無適子公彌長而愛悼子欲立之杜公彌公鉏悼子紇也適丁歷反長丁丈反下皆同訪於申豐申豐季氏屬大夫曰彌與紇吾皆愛之欲擇才焉而立之林難言立少故言欲立有才者申豐趨退歸盡室將行他日又訪焉對曰其然將具敝車而行杜其然猶必爾林言已將具敝車而去不敢與聞敝婢世反徐扶滅反乃止杜止不立紇訪於臧紇臧紇曰飲我酒吾為子立之季氏飲大夫酒臧紇為客杜為上賔飲于鳩反下皆同吾為于僞反既獻已獻酒臧孫命北面重席新樽潔之杜命設重席於堂上北面酒樽既新復澡潔之重直恭反樽音尊召悼子降逆之大夫皆起杜臧孫下迎悼子及旅而召公鉏杜獻酬禮畢而通行為旅使與之齒杜使從庶子之禮列在悼子之下季孫失色恐公鉏不從季氏以公鉏為馬正杜馬正家司馬愠而不出杜公鉏怨怒而不肯出愠紆運反閔子馬見之杜閔子馬閔馬父曰子無然禍福無門惟人所召為人子者患不孝不患無所杜所位處敬共父命何常之有言廢置在父無常位也若能孝敬富倍季氏可也林父寵之則可富姦回不軌禍倍下民可也杜禍甚於貧賤公鉏然之敬共朝夕恪居官次杜次舍也恪謹居守司馬官舍恪苦各反季孫喜使飲已酒而以具往盡舍㫋林使公鉏為武子設燕禮季武子以享燕之具往公鉏家盡棄其具以與公鉏旃之也舍音捨故公鉏氏富又出為公左宰杜出季氏家臣仕於公孟孫惡臧孫杜不相善惡烏賂反下同季孫愛之杜愛其成已志孟氏之御騶豐㸃好羯也杜羯孟莊子之庶子孺子秩之弟孝伯也騶側留反㸃都簞見又之亷反好呼報反羯居竭反曰從余言必為孟孫杜為孟孫後再三云林豐㸃再三為羯言之羯從之孟莊子疾豐㸃謂公鉏苟立羯請讐臧氏使孟氏與公鉏共憎臧孫公鉏謂季孫曰孺子秩固其所也杜言孟孫死孺子秩為其長于固所當立也若羯立則季氏信有力於臧氏矣杜臧氏因季孫之欲而為定之猶為有力今若専立孟氏之少則季氏有力過於臧氏弗應己卯孟孫卒公鉏奉羯立于户側杜戶側喪主季孫至入哭而出曰秩焉在公鉏曰羯在此矣季孫曰孺子長公鉏曰何長之有唯其才也季孫廢鉏立紇云欲擇才故以此答之焉於䖍反且夫子之命也林夫子謂孟莊子遂誣以為孟莊子之命遂立羯秩奔邾臧孫入哭甚哀多涕林哀甚則涕多出其御曰孟孫之惡子也而哀如是季孫若死其若之何臧孫曰季孫之愛我疾疢也杜常志相順從身之害疢耻忍反孟孫之惡我藥石也常志相違戾猶藥石之療疾美疢不如惡石夫石猶生我杜愈已疾也疢之美其毒茲多孟孫死吾亡無日矣林愚按此乃臧武仲廢鉏立紇作不順於先及見公鉏廢秩立羯則知禍將及已哭甚哀多涕蓋冇所感而傷之也其御不解而問故據理以答之此其所以為多知也孟氏閉門告於季孫曰臧氏將為亂不使我葬杜欲為公鉏讐臧氏季孫不信臧孫聞之戒戒為備也冬十月孟氏將辟藉除於臧氏杜辟穿藏也於臧氏借人除葬道辟婢亦反徐甫亦反藉徐音借又如字臧孫使正夫助之杜正夫隧正除於東門甲從已而視之杜畏孟氏故從甲士視作者從才用反又如字孟氏又告季孫季孫怒命攻臧氏杜見其有甲故乙亥臧紇斬鹿門之關以出奔邾杜魯南城東門初臧宣叔娶于鑄生賈及為而死杜鑄國濟北蛇丘縣所治林鑄女生二子賈及為而鑄女死娶七住反鑄之樹反繼室以其姪杜女子為兄弟之子為姪姪大結反又丈一反穆姜之姨子也姪穆姜姨母之子與穆姜為姨昆弟生紇長於公宫姜氏愛之故立之杜立為宣叔嗣臧賈臧為出在鑄杜還舅氏也臧武仲自邾使告臧賈且致大蔡焉杜大蔡大龜大蔡龜名也一云龜出蔡地因以為名曰紇不佞失守宗祧林近祖廟為宗逺祖廟為祧祧他雕反敢告不弔杜不為天所弔恤紇之罪不及不祀杜言應有後子以大蔡納請其可杜請為先人立後賈曰是家之禍也非子之過也賈聞命矣再拜受龜使為以納請杜賈使為為已請遂自為也杜為自為請臧孫如防防臧孫邑使來告曰紇非能害也知不足也言使甲從已但慮事淺耳知音智非敢私請為其先人請也苟守先祀無廢二勳杜二勳文仲宣叔林王功曰勳敢不辟邑林敢不辟防邑而去杜據邑請後故孔子以為要君乃立臧為臧紇致防而奔齊杜魯從其請乃立臧為為臧氏後臧紇得立後乃致其邑而奔齊其人曰杜防邑之人其盟我乎謂陳其罪惡盟請大夫以為戒臧孫曰無辭廢長立少季孫所忌故謂無辭以罪已將盟臧氏季孫召外史掌惡臣而問盟首焉惡臣謂奔亡者盟首載書之章首對曰盟東門氏也林在宣公十八年曰毋或如東門遂不聽公命殺適立庶文公命立子惡公子遂殺之立宣公毋音無聽口定反適丁歷反盟叔孫氏也林在成公十六年曰毋或如叔孫僑如欲廢國常蕩覆公室謂譖公與季孟於晉覆芳服反季孫曰臧孫之罪皆不及此孟椒曰盍以其犯門斬關林言何不以其犯鹿門之禁斬關以出之罪而盟之季孫用之乃盟臧氏曰無或如臧孫紇干國之紀犯門斬關干亦犯也臧孫聞之曰國有人焉誰居其孟椒乎杜孟椒孟獻子之孫子服惠伯居猶與也居音基晉人克欒盈于曲沃林得雋曰克傳言克欒盈見盈之雋傑非常也盡殺欒氏之族黨欒魴出奔宋書曰晉人殺欒盈不言大夫言自外也杜自外犯君而入非復晉大夫齊侯還自晉不入不入國遂襲莒門于且于且于莒邑且于余反傷股而退杜齊侯傷明日將復戰期于夀舒壽舒莒地杞殖華還載甲夜入且于之隧宿於莒郊杜二子齊大夫且于隧狹路苑市力反華胡化反還音旋明日先遇莒子於蒲侯氏蒲侯氏近莒之邑莒子重賂之使無死曰請有盟欲以盟要二子無致死戰華周對曰貪貨棄命亦君所惡也杜華周即華還林貪莒子之賄賂棄齊君之命令有臣如此亦莒子所惡也昏而受命日未中而遽棄之何以事君莒子親鼓之從而伐之獲杞梁杞梁即杞殖莒人行成杜勝大國益懼故行成齊侯歸遇杞梁之妻于郊杜梁戰死妻行迎喪使弔之辭曰殖之有罪何辱命焉杜言若有罪不足弔若免於罪猶有先人之敝廬在下妾不得與郊弔杜婦人無外事故下猶賤也廬力居反與音預齊侯弔諸其室傳善婦人有禮齊侯將為臧紇田杜與之田邑臧孫聞之見齊侯與之言伐晉齊侯自道伐晉之功臧孫聞之見齊侯絶句一讀以見字絶句齊侯向下讀對曰多則多矣林戰功曰多上多字戰功也下多字多少也言伐晉之戰功則不為少矣抑君似鼠夫鼠晝伏夜動不穴於寢廟畏人故也今君聞晉之亂而後作焉寧將事之非鼠如何乃弗與田林夫鼠之為物畫則藏伏夜方出動寢廟人多鼠不即以為巢冗惟其畏人所以如此今君聞晉有欒盈之亂而後起兵伐亂若晉國安寧將服事之非鼠之所為而何杜臧孫知齊侯將敗不欲受其邑故以比鼠欲使怒而止仲尼曰知之難也有臧武仲之知杜謂能辟齊禍知音智而不容於魯國抑有由也作不順而施不恕也林循理為順如心為恕武仲廢長立少是作事不順而施事不恕也夏書曰念茲在茲杜逸書也念此事在此身言行事當常念如在巳身也順事恕施也左傳杜林合注卷二十九
