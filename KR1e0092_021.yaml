body:
  text: 左傳杜林合注卷二十一明王道焜趙如源同編成公一公名黑肱宣公子諡法安民立政曰成周定王十七年魯成公五年定王崩子簡王立鄭襄公十五年魯成公四年襄公卒悼公費立成公六年悼公卒弟成公㫻立齊頃公九年魯成公九年頃公卒子靈公環立宋文公二十一年魯成公二年文公卒子共公固立成十五年共公卒子平公成立晉景公繼霸十年時郤克為政魯成公四年欒書為政成十年景公有疾晉人立太子州蒲以為君伐鄭是為厲公是年景公卒成十八年厲公弒悼公周立是年韓厥為政衛穆十一年魯成公二年穆公卒子定公臧立成十四年定公卒子獻公衎立蔡景公二年曹宣公五年魯成公十五年宣公卒弟成公負芻立滕文公十年魯成公十六年文公卒成公原立陳成公九年杞桓公四十七年薛詳見僖公九年莒魯成公十四年見莒子朱卒一名渠丘公黎北公密州立又名買主鉏邾定公二十四年魯成公十七年定公卒宣公牼立許霛公二年魯成公十五年許遷于葉小邾詳見僖公元年楚共王元年魯成公二年載令尹子重救齊成十六年司馬子反將中軍子重將左戰于鄢陵敗績晉射共王中目楚殺子反秦桓公十五年魯成公十四年桓公卒子景公立吳魯成公七年吳伐郯始見經即吳子壽夢也壽夢一名乘越詳見隱公元年經辛未元年春王正月公即位無傳二月辛酉葬我君宣公無傳無冰無傳周二月今之十二月而無冰書冬溫三月作丘甲周禮九夫為井四井為邑四邑為丘丘十六井出戎馬一匹一匹牛三頭四丘為甸甸六十四井出長轂一乘戎馬四匹牛十二頭甲士三人步卒七十二人此甸所賦今魯使丘出之譏重斂故書夏臧孫許及晉侯盟于赤棘晉地秋王師敗績于茅戎茅戎戎别種也不言戰王者至尊天下莫之得校故以自敗為文不書敗地而書茅戎明為茅戎所敗書秋從告茅亡交反史記二傳皆作貿冬十月傳元年春晉侯使瑕嘉平戎于王杜平文十七年􅮖垂之役詹嘉處瑕故謂之瑕嘉單襄公如晉拜成杜單襄公王卿士謝晉為平戎單音善劉康公徼戎將遂伐之杜康公王季子也戎平還欲要其無備徼古堯反叔服曰背盟而欺大國此必敗杜叔服周內史林新與戎盟而伐之是背盟晉為平戎而背之是欺大國背音佩下同背盟不祥欺大國不義神人弗助將何以勝杜背盟則得罪于神不為神之所佑欺大國則得罪於人不為人之所義神於人皆不相佑助將何所持而可以勝戎不聽遂伐茅戎三月癸未敗績于徐吾氏徐吾氏茅戎之别也為齊難故作丘甲杜前年魯乞師於楚欲以伐齊楚師不出故懼而作丘甲難乃旦反聞齊將出楚師夏盟于赤棘杜與晉盟懼齊楚秋王人來告敗杜解經所以秋乃書冬臧宣叔令修賦繕完林令魯國之人修賦車馬治完城郭繕市善反具守備曰齊楚結好我新與晉盟晉楚爭盟齊師必至雖晉人伐齊楚必救之是齊楚同我也林晉楚二國爭為盟主齊既黨楚必來伐魯雖晉為魯伐齊楚必以結好之故而救齊是齊楚共伐我也杜同共也守乎又反好呼報反知難而有備乃可以逞林逞解也乃可以解於難杜為二年齊侯伐我傳經壬申二年春齊侯伐我北鄙夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績杜新築衛地皆陳曰戰大崩曰敗績四月無丙戌丙戌五月一日林衛書大夫帥師于是始築音竹六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師會晉卻克衛孫良夫曺公子首及齊侯戰于鞍齊師敗績杜魯乞師於晉而不以與謀之例者從盟主之令上行於下非匹敵和成之類例在宣七年曺大夫常不書而書公子首者首命於國備於禮成為卿故也林鞍齊地去齊五百里書魯四卿是各自為帥也自文之季年而無使價至是而無將佐魯三家之勢成也僑其驕反卻去逆反秋七月齊侯使國佐如師己酉及國佐盟于袁婁杜穀梁曰袁婁去齊五十里林楚屈完來盟于師齊桓公退師而後盟于召陵修禮如楚也齊侯使國佐如師晉卻克進師而後盟于袁婁不禮于齊也夫以齊桓公之所不敢而四國之大夫敢為之甚矣鞍戰之忿也八月壬午宋公鮑卒杜未同盟而赴以名林文公卒子共公固立鮑步卯反庚寅衛侯速卒杜宣十七年盟于斷道據傳庚寅九月七日林穆公卒子定公立取汶陽田晉使齊還魯故言取不以好得故不言歸汶音問冬楚師鄭師侵衛杜于重不書不親伐十有一月公會楚公子嬰齊于蜀杜公與大夫會不貶嬰齊者時有許蔡之君故林自屈完以來楚大夫皆無氏族而書公子自嬰齊始丙申公及楚人秦人宋人陳人衛人鄭人齊人曺人邾人薛人鄫人盟于蜀杜齊在鄭下非卿傳曰卿不書匱盟也然則楚卿于是始與中國凖自此以下楚卿不書皆貶惡也傳二年春齊侯伐我北鄙圍龍杜龍魯邑在泰山博縣西南頃公之嬖人盧蒲就魁門焉杜攻龍門也頃音傾嬖必計反魁苦回反龍人囚之齊侯曰勿殺吾與而盟無入而封林而汝也我與汝為盟誓無以師入汝之封土弗聼殺而膊諸城上膊磔也膊普各反齊侯親鼓士陵城三日取龍遂南侵及巢丘取龍侵巢丘不書其義未聞衛侯使孫良夫石稷寧相向禽將侵齊與齊師遇杜齊伐魯還相遇於衛地良夫孫林父之名石稷石碏四世孫寧相寧俞子林未至齊境故言將侵齊相息亮反向舒亮反石子欲還孫子曰不可以師伐人遇其師而還將謂君何林本欲以師伐齊反遇齊師而歸將何以答君命若知不能則如無出今既遇矣不如戰也夏有闕文大新築戰事石成子曰師敗矣子不少須衆懼盡杜成子石稷也衛師已敗而孫良夫復欲戰故成子欲使須救子喪師徒何以復命皆不對又曰子國卿也隕子辱矣杜隕見禽獲林言良夫乃衛國之臣見獲則為衛國之辱喪息浪反隕于敏反子以衆退我此乃止林使良夫自以其衆而退我止於此為禦齊師且告車來甚衆杜新蔡人救孫桓子故並告令軍中齊師乃止次于鞫居林齊師知衛救至乃止不敢追杜鞫居衛地鞫居六反新築人仲叔于奚救孫桓子桓子是以免林于奚守新築大夫孫桓子即孫良夫既言既卒事也衛人賞之以邑杜賞于奚辭請曲縣軒縣也周禮天子樂宫縣四面諸侯軒縣闕南方縣音玄繁纓以朝許之杜繁纓馬飾皆諸侯之服林以朝朝于君也繁步于反仲尼聞之曰惜也不如多與之邑唯器與名不可以假人杜器車服名爵號君之所司也林此器與名乃人君之所司主也名以出信杜名位不愆為民所信信以守器林動不失信則車服可保器以藏禮杜車服所以表尊卑禮以行義杜尊卑有禮各得其宜義以生利杜得其宜則利生利以平民林何以聚人曰財故利所以平民政之大節也若以假人與人政也政亡則國家從之弗可止也已林若以器名假借於人是以國家之政而與他人也國既無政則國家從而滅亡弗可救正也已孫桓子還於新築不入杜不入國遂如晉乞師臧宣叔亦如晉乞師皆主卻獻子杜宣十七年卻克至齊為婦人所笑遂怒故魯衛因之孫桓子臧宣叔皆不以國命各自詣卻克故不書晉侯許之七百乘五萬二干五百人乘繩證反下同卻子曰此城濮之賦也杜城濮在僖二十八年濮音卜有先君之明與先大夫之肅故捷克於先大夫無能為役杜無能為之役使請八百乘許之杜六萬人卻克將中軍士燮佐上軍杜范文子代荀庚將子匠反欒書將下軍代趙朔韓厥為司馬以救魯衛臧宣叔逆晉師且道之林臧宣叔乞師先歸故往逆晉師且為晉師向道道音導季文子帥師會之及衛地韓獻子將斬人卻獻子馳將救之林韓獻子即韓厥將以軍法斬人卻克驅馳而往將救止之至則既斬之矣卻子使速以徇告其僕曰吾以分謗也林卻克使韓厥速以徇於軍不欲使韓氏獨受殺人之謗徇以俊反師從齊師于莘莘齊地莘所先反六月壬申師至于靡笄之下杜靡笄山名靡如字又音摩笄音雞齊侯使請戰曰子以君師辱於敝邑不腆敝賦詰朝請見杜詰朝平旦林言平旦請以軍禮相見腆他典反詰起吉反朝如字下同見賢遍反對曰晉與魯衛兄弟也來告曰大國朝夕釋憾於敝邑之地林三國皆姬姓故言兄弟也又大國謂齊敝邑魯衛自稱憾胡暗反本又作感寡君不忍使羣臣請於大國無令輿師淹於君地林晉君不忍魯衛受伐之慘使羣將帥為魯衛請命於齊無令晉之衆師久淹於齊之土地令力呈反師如字下同一音所類反能進不能退林言晉師能進攻不能退保君無所辱命杜言自欲戰不復須君命齊侯曰大夫之許寡人之願也若其不許亦將見也齊髙固入晉師桀石以投人杜桀擔也禽之而乘其車杜既獲其人因釋己車而載所獲者車繫桑本焉以徇齊壘杜將至齊壘以桑樹繫車而走欲自異曰欲勇者賈余餘勇杜賈賣也言已勇有餘欲賣之賈音古癸酉師陳于鞍邴夏御齊侯逢丑父為右晉解張御卻克鄭丘緩為右齊侯曰余姑翦滅此而朝食杜姑且也剪盡也林言我且剪滅此輩而後早食輕敵之甚也陳直覲反邴音丙又彼命反解音蟹張如字一音直亮反不介馬而馳之杜甲介也林馬不被甲而馳晉師卻克傷於矢流血及屨未絶鼓音杜中軍將自執旗鼓故雖傷而擊鼓不息曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之杜張侯解張也朱血色血色久則殷殷音近煙今人謂赤黑為殷色言血多汚車輪御猶不敢息林解張凡中兩矢折其矢以御兵車貫古亂反用竹九反折之設反殷於間反徐於辰反緩曰林即鄭丘緩自始合苟有險余必下推車子豈識之然子病矣杜以其不識已推車推昌誰反反他回反下推車同張侯曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事若之何其以病敗君之大事也杜殿鎮也集成也林言三軍之耳目在吾將軍之旗鼓三軍皆視我以為進退此戎車一人鎮之可以集成勝齊之事如何可以一身之病而敗晉君戰齊之大事殿多練反擐甲執兵固即死也杜擐貫也即就也林貫甲而執兵器固將以死敵也擐音患病未及死吾子勉之左并轡右援枹而鼓馬逸不能止師從之林卻克聞張侯之言乃左手并執馬轡右手援鼓槌而擊鼓戎馬奔逸不可復止晉師從郤克之軍并必政反徐方聘反援音爰抱音浮鼓槌也字林云擊鼓柄也本亦作浮齊師敗績逐之三周華不注杜華不注山名林繞華不注之山凡三匝也華如字又户化反注之住反韓厥夢子輿謂已曰且辟左右杜子輿韓厥父林言且辟車左右兩偏故中御而從齊侯杜居中代御者自非元帥御者皆在中將在左邴夏曰射其御者林邴夏以御者居中故以韓厥為御欲射之君子也公曰謂之君子而射之非禮也齊侯不知戎禮射食亦反下同射其左越于車下林射韓厥之車左車左隊于車下射其右斃于車中林筱射韓厥之車右車右死于軍中綦母張喪車從韓厥曰請寓乘杜綦母晉大夫寓寄也綦音其母音無喪息浪反乘繩證反從左右林綦母張欲從左右而載皆肘之使立於後杜以左右皆死不欲使立其處韓厥俯定其右俯俯也右被射仆車中故俯安隱之俯音勉逢丑父與公易位林逢丑父為車右見事急故易位居公之處將及華泉驂絓於木而止杜驂馬絓也華户化反絓户絓反一音卦驂七南反丑父寢於轏中杜轏士車林轏卧車也丑父寢于其中轏仕産反字林仕諌反蛇出于其下以肱擊之傷而匿之故不能推車而及林有蛇出於轏車之下丑父以手肱打蛇傷其肱而藏匿之丑父肱傷故不能推車而為晉師所及肱古𢎞反匿文力反韓厥執縶馬前杜縶馬絆也執之示修臣僕之職縶張立反再拜稽首奉觴加璧以進進觴璧亦以示敬觴式羊反曰寡君使羣臣為魯衛請曰無令輿師陷入君地杜本但為二國救請不欲乃過入君地謙辭為于偽反令力呈反下臣不幸屬當戎行無所逃隱杜屬適也林下臣韓厥自稱正當戎車之行列無所逃遁而隱避屬音燭行下郎反且懼奔辟而忝兩君臣辱戎士杜若奔辟則為辱晉君并為齊侯羞故言二君此蓋韓厥自處臣僕謙敬之飾言辟音避徐扶臂反服氏扶赤反敢告不敏攝官承乏杜言欲以已不敏攝承空乏從君俱還丑父使公下如華泉取飲林時丑父代為齊侯故詐使公下車往華泉取水而飲欲使公因而走逸鄭周父御佐車宛茷為右載齊侯以免杜佐車副車宛紆元反茷扶廢反韓厥獻丑父卻獻子將戮之呼曰自今無有代其君任患者有一於此將為戮乎林僅有我一人代君任患乃以為罪而戮之乎呼火故反任音壬卻子曰人不難以死免其君我戮之不祥赦之以勸事君者乃免之齊侯免求丑父三入三出杜重其代已故三入晉軍求之難乃旦反每出齊師以帥退入于狄卒齊師大敗皆有退心故齊侯輕出其衆以帥厲退者遂進入狄卒狄卒者狄人從晉計齊者卒子忽反下同狄卒皆抽戈楯冒之以入于衛師衛師免之杜狄衛畏齊之強故不敢害齊侯皆共免護之楯食隼反又音允冒亡報反遂自徐關入齊侯見保者曰勉之齊師敗矣杜所過城邑皆勉勵其守者辟女子杜使辟君也齊侯單還故婦人不辟之辟音避一音扶亦反女子曰君免乎曰免矣曰鋭司徒免乎曰免矣杜鋭司徒主鋭兵者鋭悅嵗反曰苟君與吾父免矣可若何言餘人不可復如何乃奔杜走辟君齊侯以為有禮杜先問君後問父故也既而問之辟司徒之妻也杜辟司徒主壘壁者辟音璧必覓反徐甫亦反豫之石窖杜石窖邑名濟北盧縣東有地名石窖窖力救反一音力到反晉師從齊師入自丘輿擊馬陘杜丘輿馬陘皆齊邑陘音刑齊侯使賔媚人賂以紀甗玉磬與地杜媚人國佐也甗玉甑皆滅紀所得媚美異反甗魚輦反徐音彥又音言字林牛健反不可則聽客之所為林客謂晉也賔媚人致賂晉人不可曰必以蕭同叔子為質同叔蕭君之字齊侯外祖父子女也難斥言其母故逺言之質徐音致下同而使齊之封內盡東其畝杜使壟畝東西行盡津忍反對曰蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也林若以齊晉匹敵言之則齊君之母亦晉君之母其為君母一也吾子布大命於諸侯而曰必質其母以為信其若王命何林先王以孝治天下今質其母是違王命且是以不孝令也詩曰孝子不匱永錫爾類杜詩大雅言孝心不乏者又能以孝道長賜其志類若以不孝令於諸侯其母乃非德類也乎杜不以孝德賜同類先王疆理天下物土之宜而布其利杜疆界也理正也物土之宜播殖之物各從王宜故詩曰我疆我理南東其畝杜詩小雅或南或東從其土宜今吾子疆理諸侯而曰盡東其畝而已唯吾子戎車是利杜晉之伐齊循壟東行易無顧土宜其無乃非先王之命也乎反先王則不義何以為盟主其晉實有闕杜闕失四王之王也言禹湯文武王于况反樹德而濟同欲焉杜樹立也濟成也林自立明德而成諸侯之所同欲五伯之霸也杜夏伯昆吾商伯大彭豕韋周伯齊桓晉文或曰齊桓晉文宋襄秦穆楚莊勤而撫之以役王命林雖不能立德以成同欲然皆勤力以撫綏諸侯以奔走服役於王命不敢改先王之制度杜役事也今吾子求合諸侯以逞無疆之欲杜疆竟也詩曰布政優優百祿是遒詩頌殷湯布政優和故百祿來聚遒聚也遒在由反又徐子由反子實不優而棄百祿諸侯何害焉杜言不能為諸侯害不然杜不見許寡君之命使臣則有辭矣曰子以君師辱於敝邑不腆敝賦以犒從者戰而曰犒為孫辭使所吏反犒苦報反從才用反畏君之震師徒撓敗林畏晉君震動之威齊之師徒撓曲喪敗撓乃教反吾子惠徼齊國之福不泯其社稷使繼舊好唯是先君之敝器王地不敢愛子又不許請收合餘燼杜燼火餘木泯彌忍反好呼報反合如字一音閣燼姒刃反背城借一杜欲於城下復借一戰背音佩敝邑之幸亦云從也况其不幸敢不唯命是聽杜若齊幸而得勝亦云從晉求和而况不幸而又戰敗敢不唯晉之命是從魯衛諫曰齊疾我矣杜諌卻克也其死亡者皆親䁥也子若不許讐我必甚唯子則又何求子得其國寶杜謂甗碁䁥女乙反我亦得地杜齊歸所侵而紓於難杜齊服則難緩紓音舒緩也一音直吕反難乃旦反其榮多矣齊晉亦唯天所授豈必晉林齊晉戰勝亦唯天意之所授豈必晉盛可以勝齊晉人許之對曰羣臣帥賦輿杜賦輿猶兵車以為魯衛請若苟有以藉口而復於寡君杜賦薦復白也為于偽反藉在夜反君之惠也敢不唯命是聽禽鄭自師逆公禽鄭魯大夫歸逆公會晉師秋七月晉師及齊國佐盟于爰婁使齊人歸我汶陽之田林汶陽之田本魯地為齊所侵故晉使齊歸之于我公會晉師于上鄍上鄍地闕公會晉師不書史闕鄍覓經反賜三帥先路三命之服三帥卻克士燮欒書已嘗受王先路之賜今改而易新并此車所建所服之物帥所類反司馬司空輿帥候正亞旅皆受一命之服杜晉司馬司空皆大夫輿帥主兵車候正主斥候亞旅亦大夫也皆魯侯賜八月宋文公卒始厚葬用蜃炭益車馬始用殉杜燒蛤為炭以瘞壙多埋車馬用人從葬蜃市忍反蛤也炭吐旦反殉以俊反重器備林重猶多也器備葬器甲兵之備重直恭反椁有四阿棺有翰檜杜四阿四注椁也翰旁飾檢上飾皆王禮椁音郭翰户旦反一音韓檜古外反徐音會君子謂華元樂舉於是乎不臣林華元樂舉皆宋卿臣治煩去惑者也是以伏死而爭今二子者君生則縱其惑杜謂文十八年殺母弟須去起吕反爭爭鬬之爭死又益其侈是棄君於惡也何臣之為杜若言何用為臣侈昌氏反又式氏反九月衛穆公卒晉三子自役弔焉哭於大門之外杜師還過衛故因弔之未復命故不敢成禮衛人逆之逆於門外設喪位婦人哭於門內喪位婦人哭於堂賔在門外故移在門內送亦如之林送客禮亦如初至遂常以葬至葬行此禮楚之討陳夏氏也在宣十一年夏户雅反莊王欲納夏姬申公巫臣曰林巫臣為申縣公不可君召諸侯以討罪也今納夏姬貪其色也貪色為淫淫為大罰林言楚莊王召諸侯而伐陳以討徵紓弒君之罪令納夏姬於嬪御是貪夏姬之色也貪慕女色則為淫亂淫亂為先王之大罰周書曰明德慎罰杜周書康誥文王所以造周也明德務崇之之謂也慎罰務去之之謂也若興諸侯以取大罰非慎之也林非先王謹慎刑罰之意君其圖之王乃止子反欲取之巫臣曰是不祥人也是夭子蠻杜子蠻鄭靈公夏姬之兄殺死無後殺御叔御叔夏姬之夫亦早死御魚據反弒靈侯杜陳靈公也戮夏南杜夏姬子徵舒出孔儀林孔寧儀行父喪陳國杜楚滅陳喪息浪反何不祥如是人生實難其有不獲死乎言死易得無為取夏姬以速之天下多美婦人何必是子反乃止王以豫連尹襄老襄老死於邲不獲其尸杜邲戰在宣十二年其子黑要蒸焉杜黑要襄老子要一遙反蒸之承反巫臣使道焉曰歸吾聘女杜道夏姬使歸鄭道音導女音汝又使自鄭召之曰尸可得也林巫臣又使人詐自鄭來召夏姫言其夫襄老之尸可得也必來逆之姬以告王王問諸屈巫杜屈巫巫臣屈居勿反對曰其信知罃之父成公之嬖也而中行伯之季弟也杜知罃父荀首也中行伯荀林父也邲之戰楚人囚知罃知音智罃於栟反新佐中軍而善鄭皇戌林荀首佐中軍與鄭皇戌相善甚愛此子杜愛知罃也其必因鄭而歸王子與襄老之尸以求之杜王子楚公子縠臣也邲之戰荀首囚之林荀首欲得其子其必因鄭皇戌以穀臣與襄老之尸求易知罃于楚鄭人懼於邲之役而欲求媚於晉其必許之王遣夏姬歸將行謂送者曰不得尸吾不反矣巫臣聘諸鄭鄭伯許之杜聘夏姬及共王即位將為陽橋之役楚伐魯至陽橋在此年冬共音恭使屈巫聘于齊且告師期巫臣盡室以行林巫臣因出聘盡挈其家室以去申叔跪從其父將適郢遇之杜叔跪申叔時之子跪其委反從才用反郢以井反又以政反曰異哉夫子有三軍之懼而又有桑中之喜宜將竊妻以逃者也杜桑中衛風淫奔之時林言巫臣往告師期是有三軍之懼將淫夏姬是有桑中之喜及鄭使介反幣而以夏姬行杜介副也幣聘物介音界將奔齊齊師新敗曰吾不處不勝之國遂奔晉而因卻至至卻克族子以臣於晉晉人使為邢大夫邢晉邑邢音刑子反請以重幣錮之林欲以重幣賂晉禁錮巫臣勿使之仕錮音固王曰止其自為謀也則過矣其為吾先君謀也則忠忠社稷之固也所蓋多矣林言巫臣之自為謀與夏姬淫奔則有過失為楚莊王謀勿納夏姬以貪女色則為忠矣人臣盡忠社稷所由以安固也諫君之惠足以蓋覆其淫奔之罪多矣又蓋覆也為于偽反且彼若能利國家雖重幣晉將可乎杜言不許若無益于晉晉將棄之何勞錮焉為七年楚滅武臣族晉南通吳張木晉師歸范文子後入武子曰無為吾望爾也乎杜武子王會文子之父蓋言文子後入獨不為我望汝之切乎對曰師有功國人喜以逆之先入必屬耳目焉是代帥受名也故不敢武子曰吾知免矣林范文子言晉師新有大功晉國之人喜其有功而往迎之若先入國人必屬耳目於我以為皆我之功是我代元帥受有功之名故不敢先入武子喜曰吾知免於禍矣以文子謙遜知其不益已禍屬章欲反後同帥所類反卻伯見公曰子之力也夫對曰君之訓也二三子之力也臣何力之有焉林卻伯卻克見賢遍反下同夫音扶范叔見勞之如卻伯對曰庚所命也克之制也燮何力之有焉林范叔即范文子杜荀庚將上軍時不出范文子上軍佐代行故稱帥以讓勞力報反欒伯見公亦如之對曰燮之詔也士用命也書何力之有焉詔告也欒書下軍帥故推功上軍傳言晉將帥克讓所以能勝齊宣公使求好于楚莊王卒宣公薨不克作好杜在宣十八年好呼報反下同公即位受盟于晉杜元年盟赤棘會晉伐齊衛人不行使于楚杜不聘楚使所吏反而亦受盟于晉從於伐齊故楚令尹子重為陽橋之役以救齊林楚侵魯及陽橋故曰為楊橋之役以救齊將起師子重曰君弱傳曰寡人生十年而喪先君共王即位至是二年蓋年十二三矣羣臣不如先大夫師衆而後可詩曰濟濟多士文王以寧杜詩大雅言文王以衆士安濟子禮反夫文王猶用衆况吾儕乎林文王之聖猶以衆士為安况我儕輩去文王甚逺可不恃衆以安乎儕儕等儕仕皆反且先君莊王屬之曰無德以及逺方莫如惠恤其民而善用之林楚莊王臨終屬託羣臣之辭言君無明德以服逺方諸侯之國莫如加惠撫恤其民而善用其力以爭諸侯乃大户閲民户口已責棄逋責逮鰥施及老鰥救乏赦罪悉師杜悉起楚師王卒盡行彭名御戎蔡景公為左許靈公為右杜王卒盡行故王戎車亦行雖無楚王令二君當左右之位卒子忽反二君弱皆強冠之林欲使攝戎車左右故強冠之使若成人強其丈反冠古亂反冬楚師侵衛遂侵我師于蜀杜公賂之而退故不書侵使臧孫往杜臧孫宣叔也林魯使臧孫往使楚師辭曰楚逺而久固將退矣無功而受名臣不敢林言楚道逺而又久出固將自退師奉使無功而虛受退楚之名臣不敢蓋臧宣叔不欲使楚而孫辭以求免楚侵及陽橋杜陽橋魯地孟孫請往賂之杜楚侵遂深故孟孫請以賂往孟孫獻子也以執斫執針織紝杜執斫匠人執針女工織紝織繒布者斫竹角反針之林反紅女金反徐而鴆反皆百人公衡為質杜公衡成公子質音致以請盟楚人許平十一月公及楚公子嬰齊蔡侯許男秦右大夫説宋華元陳公孫寧衛孫良夫鄭公子去疾及齊國之大夫盟于蜀杜齊大夫不書其名非卿也説音悅去起吕反卿不書匱盟也於是乎畏晉而竊與楚盟故曰匱盟林匱乏也言匱乏而盟蔡侯許男不書乘楚車也謂之失位杜乘楚王車為左右則失位也卿不書則稱人諸侯不書皆不見經君臣之别君子曰位其不可不慎也乎蔡許之君一失其位不得列於諸侯况其下乎林位大位也言諸侯不可不謹慎於其位也蔡許二國之君一失其位為楚左右不得復在諸侯之列况其下之卿大夫可不謹慎其位乎詩曰不解于位民之攸塈杜詩大雅言在上者勤正其位則國安而民惠也攸所也塈息也解佳賣反塈許器反其是之謂矣林言蔡許解怠於位所以不能國安而民息楚師及宋公衡逃歸臧宣叔曰衡父不忍數年之不宴杜宴樂也林衡父即公衡言公衡不忍為質於楚數年之不宴樂數所主反以棄魯國國將若之何誰居後之人必有任是夫國棄矣林逃楚而歸是棄魯國之好居辭也猶言誰與後之人必有當其咎者不知為誰魯國之事衡父忍棄之矣居音基任音壬夫音扶是行也晉辟楚畏其衆也君子曰衆之不可以已也大夫為政猶以衆克况明君而善用其衆乎林言衆之不可以止而不用公子嬰齊為政猶以楚師之衆克遂有功何况英明之君而得衆以善用之乎大誓所謂商兆民離周十人同者衆也杜大誓周書萬億曰兆民離則弱合則成衆言殷以散亡周以衆興晉侯使鞏朔獻齊捷于周王弗見使單襄公辭焉曰蠻夷戎狄不式王命杜式用也捷在接反淫湎毁常王命伐之則有獻捷王親受而勞之所以懲不敬勸有功也林淫於色湎于酒毁壞其典常於是方伯奉王命而征伐之則有獻捷于王之禮天子親受其捷而勸勞之所以懲戒夷狄之不敬勸奬諸侯之有功也湎面善反勞力報反兄弟甥舅侵敗王略王命伐之告事而已不獻其功所以敬親昵禁淫慝也林兄弟同姓諸侯甥舅異姓諸侯侵敗王室之經略法度方伯奉王命而征伐之告成事於王室而已不以囚獲俘馘獻功天子所以敬重親戚昵愛禁止淫亂邪慝也杜淫慝謂暴掠百姓取囚俘也敗必邁反昵女乙反慝他得反今叔父克遂有功于齊林天子謂同姓諸侯曰叔父杜克能也而不使命卿鎮撫王室所使來撫余一人而鞏伯實來未有職司於王室林大國三卿其二卿命于天子天子自稱曰余一人鞏伯即鞏朔為上軍大夫名位卑微未達於王室又姦先王之禮杜謂獻齊捷姦音干余雖欲於鞏伯杜欲受其獻其敢廢舊典以忝叔父夫齊甥舅之國也而大師之後也杜齊世與周昏故曰甥舅林天公為周大師封於齊故曰大師之後大音泰寧不亦淫從其欲以怒叔父抑豈不可諫誨林言齊豈不亦以淫亂從肆其嗜欲以取怒於晉國抑豈不可諫止而教誨之乃至戰伐兵爭之慘從才用反亦作縱士莊伯不能對杜莊伯鞏朔王使委于三吏杜委屬也三吏三公也林三公者天子之吏也禮之如侯伯克敵使大夫告慶之禮降於卿禮一等王以鞏伯宴而私賄之林禮鞏朔以侯伯克敵使大夫告慶于周之禮鞏朔晉大夫故降於卿禮一等定王既詰鞏朔復與之私宴以好賄私結之使相告之曰非禮也勿籍杜相相禮者籍書也王畏晉故私宴賄以慰鞏朔林言此宴賄皆非禮之正也勿書此以為禮典相息亮反經癸酉三年春王正月公會晉侯宋公衛侯曺伯伐鄭杜宋衛未葬而稱爵以接鄰國非禮也辛亥葬衛穆公無傳二月公至自伐鄭無傳甲子新宫災三日哭無傳三年喪畢宣公神主新入廟故謂之新宫書三日哭善得禮宗廟親之神靈所憑居而遇災故哀而哭之乙亥葬宋文公無傳七月而葬緩夏公如晉鄭公子去疾帥師伐許林鄭始書大夫將公至自晉無傳秋叔孫僑如帥師圍棘杜棘汶陽田之邑在濟北蛇丘縣大雩無傳以過時書晉卻克衛孫良夫伐牆咎如杜赤狄别種牆在良反咎古刀反冬十有一月晉侯使荀庚來聘衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟杜先晉後衛尊霸主林聘而遂盟之於是始鄭伐許杜無傳不書將帥告辭略林狄鄭也楚之伯鄭為之也由齊桓以來爭鄭於楚桓公卒鄭始朝楚諸夏之變於夷鄭為亂階也至辰陵鄭帥諸夏而事楚矣敗晉于邲盟十四國之君大夫于蜀皆鄭為之是故狄秦而後狄鄭微秦鄭中國無左祍矣傳三年春諸侯伐鄭次于伯牛討邲之役也伯牛鄭地邲役在宜十二年遂東侵鄭晉潛軍深入鄭公子偃帥師禦之偃穆公子使東鄙覆諸鄤杜覆伏兵也林公偃使鄭東鄙之人設伏兵於鄤以攻晉師覆扶又反鄤亡袁反徐武旦反一音萬敗諸丘輿杜鄤丘輿皆鄭地晉偏軍為鄭所敗故不書皇戌如楚獻捷林獻丘輿之捷于楚夏公如晉拜汶陽之田前年晉使齊歸魯汶陽田故許恃楚而不事鄭鄭子良伐許林子良即公子去疾晉人歸楚公子穀臣與連尹襄老之尸于楚以求知罃杜邲之戰楚獲知罃于是荀首佐中軍矣杜荀首知罃父林佐晉中軍故晉人為求其子故楚人許之王送知罃曰子其怨我乎對曰二國治戎臣不才不勝其任以為俘馘執事不以釁鼓杜以血塗鼓為釁鼓勝音升俘芳夫反馘古獲反釁許覲反使歸即戮君之惠也臣實不才又誰敢怨言臣實自無才能以至於此又敢歸怨於誰人言無所怨也王曰然則德我乎對曰二國圖其社稷而求紓其民杜紓緩也林晉楚圖謀其安社稷之事而求紓緩其民力紓音舒各懲其忿以相宥也杜宥赦也懲直升反宥音又兩釋纍囚以成其好杜纍繫也纍力誰反好呼報反下同二國有好臣不與及其誰敢德林言二國本不為已而和又敢歸德於誰人言亦無所德也與音預王曰子歸何以報我對曰臣不任受怨君亦不任受德無怨無德不知所報林任當也言臣不當受怨楚之名楚君亦不當受德臣之名既不思報怨又不思報德王曰雖然必告不榖對曰以君之靈纍臣得歸骨於晉寡君之以為戮死且不朽林若晉君戮其不勝任之罪則此身雖死而感楚之恩終不朽腐若從君之惠而免之以賜君之外臣首杜稱於異國君曰外臣首其請於寡君而以戮於宗林得請而以戮於知氏之宗亦死且不朽若不獲命杜君不許戮而使嗣宗職杜嗣其祖宗之位職次及於事而帥偏師以修封疆林以次第而及於晉國之政事以修治晉國疆場之事疆居良反雖遇執事杜遇楚將帥其弗敢違杜違辟也其竭力致死無有二心以盡臣禮所以報也林當竭盡忠力致效死命以與楚戰不敢有攜二之心以盡人臣事君之禮所以報楚之德不過如此王曰晉未可與爭重為之禮而歸之秋叔孫僑如圍棘取汶陽之田林在前年棘不服故圍之杜僑如叔孫得臣子晉卻克衛孫良夫伐牆咎如討赤狄之餘焉杜宣十五年晉滅赤狄潞氏其餘民散入牆咎如故討之牆咎如潰上失民也林民逃其上曰潰杜此傳釋經之文而經無牆咎如潰蓋經闕此四字潰户內反冬十一月晉侯使荀庚來聘且尋盟杜尋元年赤棘盟荀庚林父之子衛侯使孫良夫來聘且尋盟杜尋宣七年盟公問諸臧宣叔曰中行伯之於晉也其位在三林中行伯即荀庚以荀林父為晉中行因以為氏故亦謂中行伯晉下卿故位在第三孫子之於衛也位為上卿將誰先對曰次國之上卿當大國之中中當其下下當其上大夫杜降一等小國之上卿當大國之下卿中當其上大夫下當其下大夫杜降大國二等上下如是林其上卿下卿相當如是古之制也衛在晉不得為次國晉為盟主其將先之林古制公為大國侯伯為次國子男為小國衛之視晉春秋時以強弱為大小故衛雖侯爵猶為小國計等則衛為小國上卿與晉大國之下卿名位正敵以盟主故先晉可也丙午盟晉丁未盟衛禮也林得大小先後之禮十二月甲戌晉作六軍為六軍僭王也萬二千五百人為軍韓厥趙括鞏朔韓穿荀騅趙旃皆為卿賞鞍之功也杜韓厥為新中軍趙括佐之鞍朔為新上軍韓穿佐之荀騅為新下軍趙旃佐之晉舊自有三軍今增此故為六軍林賞二年戰鞍敗齊之功騅音佳齊侯朝于晉將授玉杜行朝禮林執玉為贄卻克趨進杜卻克以宣十七年笑辱之憾故趨進曰此行也君為婦人之笑辱也寡君未之敢任杜言齊侯之來以謝婦人之辱非為修好故云晉君不任當此惠為于偽反下同任音壬晉侯享齊侯齊侯視韓厥杜齊侯鞍之戰識韓厥故熟視之韓厥曰君知厥也乎齊侯曰服改矣杜戎朝異服也言服改明識其人韓厥登舉爵曰臣之不敢愛死為兩君之在此堂也林爵飲酒器韓厥乃登堂舉酒爵言臣之致死力於行陳之間為欲齊晉和好兩君之會聚于此堂也荀罃之在楚也林荀罃即知罃鄭賈人有將置諸褚中以出既謀之未行而楚人歸之賈人如晉荀罃善視之如實出已林褚絮也鄭之賈人貿易于楚有將藏荀罃於褚絮之中以出歸晉既與荀罃成謀未及行而楚人歸知罃及鄭賈人來晉荀罃以禮厚待賈人如真實藏已於褚中以出賈音古置之豉反褚中吕反賈人曰吾無其功敢有其實乎吾小人不可以厚誣君子林未嘗有實出知罃之功敢受知罃厚禮如有其實乎我商賈小人也不可以一時虛謀重誣君子受其實惠遂適齊杜傳言知罃之賢左傳杜林合注卷二十一
