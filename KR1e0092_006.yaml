body:
  text: 左傳杜林合注卷六明王道焜趙如源同編莊公二經戊戌十有一年春王正月無傳夏五月戊寅公敗宋師于鄑杜鄑魯地傳例曰敵未陳曰敗某師鄑子斯反秋宋大水公使弔之故書冬王姬歸于齊魯主昏不書齊侯逆不見公傳十一年夏宋為乘丘之役故侵我公禦之宋師未陳而薄之林宋師未成列而薄之迫與之戰也為于偽反敗諸鄑凡師敵未陳曰敗某師通謂設權譎變詐以勝敵彼我不得成列成列而不得用故以未陳獨敗為文陳直覬反下同皆陳曰戰堅而有備各得其所成敗決於志力者也大崩曰敗績師徒撓敗若沮岸崩山喪其功績故曰敗績得雋曰克謂若大叔段之比才力足以服衆威權足以自固進不成為外寇強敵退復狡壯有二君之難而實非二君克而勝之則不言彼敗績但書所克之名雋音俊本或作俊覆而敗之曰取某師覆謂威力兼備若羅綱所掩覆一軍皆見禽制故以取為文京師敗曰王師敗績于某王者無敵於天下天下非所得與戰者然春秋之世據有其事事列於經則不得不因申其義有時而敗則以自敗為文明天下莫之得校京師敗本或作京師敗績者非秋宋大水公使弔焉曰天作淫雨害於粢盛林黍稷為粢在器為盛言粢盛蓋以宗廟祭祀為重若之何不弔不為天所愍弔對曰孤實不敬林言孤實不敬天地宗廟諸侯降名稱孤天降之災又以為君憂拜命之辱杜謝辱厚命臧文仲曰宋其興乎臧文仲魯大夫禹湯罪已其興也悖焉杜悖盛貌悖蒲忽反一作勃同桀紂罪人其亡也忽焉杜忽速貌紂直久反且列國有凶稱孤禮也杜列國諸侯無凶則常稱寡人林不以常辭稱寡人而以降名稱孤得引咎自責之禮言懼而名禮其庶乎杜言懼罪已名禮稱孤其庶庶幾於興言懼而名禮絶句或以名絶句者非既而聞之曰公子御説之辭也杜宋莊公子御魚呂反本或作禦説音悅臧孫達林即臧文仲曰是宜為君有恤民之心林蓋明年御説立為宋君之後文仲方聞其辭故曰是宜得為宋君百姓有過在于一人是恤民也故傳以宋引咎自責為恤民蓋宋興之言既不驗而御説得為君傳因備其事以為證驗冬齊侯來逆共姬林共姬即王姬齊桓公之夫人二共姬其一也共音恭乘丘之役杜在十年公以金僕姑射南宫長萬杜金僕姑矢名南宫長萬宋大夫射食亦反長丁丈反公右歂孫生搏之杜搏取也不書獲萬時未為卿歂市專反搏音博宋人請之宋公靳之杜戲而相愧曰靳魯聽長萬還靳居覬反服云恥而惡之曰靳曰始吾敬子今子魯囚也吾弗敬子矣林萬嘗為魯獲故謂之魯囚此皆戲萬之言病之杜萬不以為戲而以為已病為宋萬弒君傳經己亥十有二年春王三月紀叔姬歸于􅈶杜無傳紀侯去國而死叔姬歸魯紀季自定於齊而後歸之全守節義以終婦道故繫之紀而以初嫁為文賢之也來歸不書非寧且非大歸􅈶音擕夏四月秋八月甲午宋萬弒其君捷及其大夫仇牧杜捷閔公不書葬亂也萬及仇牧皆宋卿仇牧稱名不警而遇賊無善事可褒林閔公捷弒桓公御説立冬十月宋萬出奔陳杜奔例在宣十年傳十二年秋宋萬弒閔公于蒙澤杜蒙澤宋地梁國有蒙縣林宋萬即南宫長萬遇仇牧于門批而殺之林宋萬多力故以手批仇牧而殺之批普述反又蒲冗反字林云擊也遇大宰督于東宫之西又殺之杜殺督不書宋不以告大音泰立子遊杜子遊宋公子羣公子奔蕭公子御説奔亳杜蕭宋邑今沛國蕭縣亳宋邑蒙縣西北有亳城亳步各反南宫牛猛獲帥師圍亳杜牛長萬之子猛獲其黨冬十月蕭叔大心杜叔蕭大夫名及戴武宣穆莊之族宋五公之子孫以曹師伐之殺南宫牛于師殺子遊于宋林以曹師伐南宫牛圍亳之師乘勝入宋而殺子遊立桓公桓公御説猛獲奔衛南宫萬奔陳以乘車輦其母一日而至乘車非兵車駕人曰輦宋去陳二百六十里言萬之多力南宫萬本或作長萬長衍字也下亦然乘繩證反宋人請猛獲于衛衛人欲勿與石祁子曰不可石祁子衛大夫天下之惡一也惡於宋而保於我保之何補得一夫而失一國與惡而棄好非謀也林言弒逆為天下之大惡其惡則一宋人以為大惡而我獨保庇之保庇猛獲何補於衛得一猛獲而失一衛輿猛獲之惡而棄衛國之好非善謀也杜宋衛本同好國好呼報反衛人歸之亦請南宫萬于陳以賂陳人使婦人飲之酒而以犀革裹之比及宋手足皆見宋人皆醢之林萬多力故設計先使婦人醉之以酒乘其醉而以犀牛之革裹之皮去毛曰革萬蹴踏犀革皆破故萬之手足皆見益見萬之多力杜醢肉醬并醢猛獲故言皆亦請南宫萬于陳以賂絶句飲於鴆反犀音西裹音果比必利反見賢遍反醢音海經庚子十有三年春齊侯宋人陳人蔡人邾人會于北杏林北杏齊地衣裳之會一序齊於諸侯之上而獨書爵始伯之辭也自是無特相會者矣王風之什絶筆於莊王而僖王之立齊桓之伯皆在是年此王伯興衰之機也杏尹猛反夏六月齊人滅遂杜遂國在濟北蛇丘縣東北林舜之後秋七月冬公會齊侯盟于柯杜此柯今濟北東阿齊之阿邑猶祝柯今為祝柯林曹劌劫盟魯之從齊獨後他國而復劫盟所以為禮義之國也柯古河反傳十三年春會于北杏以平宋亂宋有弒君之亂齊桓欲修霸業遂人不至夏齊人滅遂而戍之杜戍守也冬盟于柯始及齊平也始與齊桓通好宋人背北杏之會林齊人既會北杏而背齊好背音佩經辛丑十有四年春齊人陳人曹人伐宋杜背北杏會故夏單伯會伐宋杜既伐宋單伯乃至故曰會伐宋單伯周大夫林於是諸侯初用王師秋七月荆入蔡杜入例在文十五年冬單伯會齊侯宋公衛侯鄭伯干鄄杜鄄衛地今東郡甄城也齊桓修霸業卒平宋亂宋人服從欲歸功天子故赴以單伯會諸侯為文林衣裳之會二此諸侯會王臣之始是年鄭殺子儀鄭厲公復國會鄄即鄭厲公也鄄音絹傳十四年春諸侯伐宋齊請師于周杜齊欲榮天子故請師假王命以示大順經書人傳言諸侯總衆國之辭夏單伯會之取成于宋而還林周使單伯會齊伐宋宋人聼命諸侯取成而反鄭厲公自櫟侵鄭杜厲公以桓十五年入櫟遂居之櫟音厯及大陵獲傅瑕杜大陵鄭地傳瑕鄭大夫傅瑕曰苟舍我吾請納君與之盟而赦之六月甲子傅瑕殺鄭子及其二子而納厲公杜鄭子莊四年稱伯會諸侯今見殺不稱君無諡者微弱臣子不以君禮成喪告諸侯舍音捨鄭子子儀初內蛇與外蛇鬭於鄭南門中內蛇死六年而厲公入林先時鄭南門內一蛇與門外一蛇相鬭門內之蛇死後六年傅瑕殺鄭子納厲公應內蛇死外蛇勝之象蛇市奢反公聞之問於申繻曰猶有妖乎對曰人之所忌其氣焰以取之妖由人興也杜尚書洛誥無若火始焰焰未盛而進退之時以喻人心不堅正林子儀在鄭常畏忌厲公之奪其國畏忌之氣焰足以致蛇妖之異妖由子儀畏忌厲公太過所致故曰由人興也繻音須妖于驕反焰音豔人無釁焉妖不自作人棄常則妖興故有妖林苟人無釁隙之可乘則妖不能自作興言子儀棄其常道則蛇妖乘其釁隙而興故鄭有蛇妖之禍釁許靳反厲公入遂殺傅瑕使謂原繁曰傅瑕二杜言有二心於已周有常刑既伏其罪矣納我而無二心者吾皆許之上大夫之事吾願與伯父圖之林諸侯皆用周法故言周家有典常之刑杜上大夫鄉也伯父謂原繁疑原繁有二心且寡人出伯父無裏言杜無納我之言裏音里入又不念寡人杜不親附已寡人憾焉對曰先君桓公命我先人典司宗祏林桓公鄭始受封君也宗祏宗廟中藏主石室言已世為宗廟守臣憾戶暗反祏音石社稷有主而外其心其何二如之茍主社稷國內之民其誰不為臣臣無二心天之制也子儀在位十四年矣而謀召君者庸非二乎林子儀既為鄭國社稷之主更復謀納厲公是外其心其何二心如之苟主鄭國之社稷以為君凡在國內之民其誰敢不為之臣為人臣不敢懷二心事君此上天之所制鄭既有君而謀召厲公者用非有二心者乎杜庸用也莊公之子猶有八人若皆以官爵行賂勸二而可以濟事君其若之何臣聞命矣乃縊而死林設使八人者皆如厲公以上大夫之官爵行賂而勸二心之臣使之納已而可以齊其篡奪之事則二心之臣又將殺厲公以取厚利厲公亦將末如之何也已莊公之子猶有八人傳唯見四人子忽子亹子儀並死獨厲公在八人名字記傳無聞縊一賜反蔡哀侯為莘故繩息媯以語楚子杜莘役在十年繩譽也林蔡哀侯為息侯誘蔡而敗之于莘之故譽息媯之美以告楚文王為于偽反莘所巾反語魚據反繩食承反説文作譝楚子如息以食入享遂滅息杜偽設享食之具食音嗣以息媯歸生堵敖林息媯長子楚人謂未成君為敖堵丁古反敖五羔反史記作杜敖及成王焉林息媯次子未言杜未與王言楚子問之對曰吾一婦人而事二夫縱弗能死其又奚言楚子以蔡侯滅息遂伐蔡秋七月楚入蔡林楚子感息媯之言因思滅息取媯之故實由蔡侯伐蔡以説息媯弗地曰入言入蔡弗有其地也君子曰商書所謂惡之易也如火之燎于原不可鄉邇其猶可撲滅者其如蔡哀侯乎杜尚書盤庚言惡易長而難滅易以豉反燎力召反又力弔反鄉許亮反撲普十反冬會于鄄宋服故也經壬寅十有五年春齊侯宋公陳侯衛侯鄭伯會于鄄林衣裳之會三齊桓公始伯夏夫人薑氏如齊無傳夫人文薑齊桓公姊妹父母在則禮有歸寧殁則使卿寧秋宋人齊人邾人伐郳林郳即小邾宋主兵故序齊上郳五兮反鄭人侵宋冬十月傳十五年春復會焉齊始霸也杜始為諸侯長復扶又反秋諸侯為宋伐郳郳附庸屬宋而叛故齊桓為之伐郳為于偽反鄭人間之而侵宋林間諸侯有伐郳之事間間厠之間一本作聞經癸卯十有六年春王正月夏宋人齊人衛人伐鄭杜宋主兵也班次上下以國大小為次征伐則以主兵為先春秋之常也他皆放此林齊楚爭鄭於是始秋荆伐鄭林荆患自蔡及鄭矣冬十有二月會齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽杜書會魯會之不書其人微者也言同盟服異也陳國小每盟會皆在會下齊桓始霸楚亦始強陳侯介在三大國之間而為三恪之客故齊桓因而進之遂班在衛上終於春秋滑國都費河南緱氏縣幽宋地林衣裳之會四齊桓公初主盟也自是無特相盟者矣邾子克卒杜無傳克儀父名稱子者蓋齊桓請王命以為諸侯再同盟林儀父卒邾子瑣立傳十六年夏諸侯伐鄭宋故也杜鄭侵宋故宋故也本或作為宋故鄭伯自櫟入杜在十四年緩告于楚林緩遣使告入國于楚秋楚伐鄭及櫟為不禮故也為于偽反鄭伯治與于雍糾之亂者林桓十五年鄭祭仲殺雍糾逐厲公今厲公返國祭仲已死故治與於殺糾逐君之亂者與音預九月殺公子閼刖強鉏二子祭仲黨斷足曰刖閼安末反按隱十一年鄭有公孫閼距此三十五年不容復有公子閼若非閼字誤則子當為孫刖音月又五刮反鉏仕魚反公父定叔出奔衛共叔假之孫定諡也父音甫三年而復之曰不可使共叔無後於鄭使以十月入曰良月也就盈數焉林定叔奔衛三年後而復召之言定叔雖有罪不可絶共叔假之祀使定叔以十月入鄭數始於一盈於十故以盈數為良月君子謂強鉏不能衛其足杜言其不能早辟害冬同盟于幽鄭成也林得鄭之成也王使虢公命曲沃伯以一軍為晉侯杜曲沃武公遂并晉國僖王因就命為晉侯小國故一軍初晉武公伐夷執夷詭諸杜夷説諸周大夫夷采地名詭九委反蒍國請而免之杜蒍國周大夫林請詭諸于晉武而免其執蒍于委反既而弗報杜詭諸不報施於蒍國故子國作亂謂晉人曰與我伐夷而取其地林子國即蒍國怨詭諸而作亂使晉人與我伐夷而以其地與晉遂以晉師伐夷殺夷詭諸周公忌父出奔虢杜周公忌父王卿士辟子國之難惠王立而復之魯桓十五年經書桓王崩魯莊三年經書葬桓王自此以來周有莊王又有僖王崩葬皆不見於經傳王室微弱不能復自通於諸侯故傳因周公忌父之事而見惠王惠王立在此年之末經甲辰十有七年春齊人執鄭詹杜齊桓始霸鄭既伐宋又不朝齊詹為鄭執政大臣詣齊見執不稱行人罪之也行人例在襄十一年諸執大夫皆稱人以執之大夫賤故詹之亷反夏齊人殱于遂殱盡也齊人戊遂玩而無備遂人討而盡殺之故時史因以自盡為文殱子廉反秋鄭詹自齊逃來無傳詹不能伏節守死以解國患而遁逃苟免書逃以賤之冬多麋無傳麋多則害五稼故以災書麋亡悲反傳十七年春齊人執鄭詹鄭不朝也夏遂因氏領氏工婁氏須遂氏饗齊戌醉而殺之齊人殱焉杜饗酒食也四族遂之強宋齊滅遂戊之在十三年林四族以酒食享齊戍乘齊戍之醉而殺之齊人盡為所殺無得免者領烏納反又苦答反婁力侯反饗本又作享經乙巳十有八年春王三月日有食之無傳不書日官失之夏公追戎于濟西杜戎來侵魯公逐之於濟水之西林魯始治戎秋有􅈮杜􅈮短狐也蓋以舍沙射人為災􅈮本又作作蜮音或本草謂之射工冬十月傳十八年春虢公晉侯朝王王饗醴命之宥林時惠王新即位故西虢公與晉獻公俱朝于周杜王之覲羣后始則行饗禮先置醴酒示不忘古飲宴則命以幣物宥助也所以助勸敬之意言備設醴音禮宥音又皆賜玉五瑴馬三匹非禮也杜雙玉為瑴林非命宥之禮也瑴音角本又作珏王命諸侯名位不同禮亦異數不以禮假人林公侯之名位不同上公八命侯伯七命杜侯而與公同賜是借人禮虢公晉侯鄭伯使原莊公逆王后于陳陳媯歸于京師杜虢晉朝王鄭伯又以齊執其卿故求王為援皆在同倡義為王定昏陳人敬從得同姓宗國之禮故傳詳其事不書不告實惠后陳媯後號惠后寵愛少子亂周室事在僖二十四年故傳于此並正其后稱夏公追戎于濟西不言其來諱之也戎來侵魯魯人不知去乃追之故諱不言其來秋有􅈮為災也初楚武王克權使鬬緡尹之杜權國名南郡嘗陽縣東南有權城鬬緡楚大夫緡亡巾反以叛圍而殺之緡以權叛以叛絶句本或作畔遷權於那處杜那處楚地南郡編縣東南有那口城那又作𣆀同乃多反處昌吕反又吕慮反使閻敖尹之閻敖楚大夫及文王即位與巴人伐申林在六年而驚其師楚驚巴師巴人叛楚而伐那處取之遂門于楚杜攻楚城門閻敖遊涌而逸杜涌水在南郡華容縣閻敖既不能守城又遊涌水而走涌音勇楚子殺之其族為亂冬巴人因之以伐楚林楚又討其罪而殺之閻敖之族為亂巴人因閻敖之亂以伐楚國經丙午十有九年春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟無傳公子結魯大夫公羊穀梁皆以為魯女媵陳侯之婦其稱陳人之婦未入國略言也大夫出竟有可以安社稷利國家者則專之可也結在鄄聞齊宋有會權事之冝去其本職遂與二君為盟故備言之木非魯公意而又失媵陳之好故冬各來伐媵以證反又繩證反送也夫人薑氏如莒無傳非父母國而往書姦冬齊人宋人陳人伐我西鄙無傳幽之盟魯使微者會鄄之盟又使媵臣行所以受敵鄙邊邑傳十九年春楚子禦之大敗於津杜禦巴人為巴人所敗津楚地或曰江陵縣有津鄉林承上文禦巴人伐楚之師還鬻拳弗納遂伐黃杜鬻拳楚大閽黃嬴姓國今弋陽縣林弗納楚子激其志使别立功楚子感其忠遂伐黃國鬻音育拳求圓反敗黃師于踖陵杜踖陵黃地踖在亦十略二反還及湫有疾杜南郡鄀縣東南有湫城湫子小反夏六月庚申卒林楚文王卒子堵敖立鬻拳葬諸夕室杜夕室地名夕朝夕之夕亦自殺也而葬於絰皇杜絰皇冢前闕生守門故死不失職絰田結反初鬻拳強諫楚子楚子弗從臨之以兵懼而從之鬻拳曰吾懼君以兵罪莫大焉遂自刖也楚人以為大閽謂之大伯林言我以兵懼吾君人臣之罪莫大于此遂自刖其足以示劫君之罪楚子以鬻拳為賢但既自刖不可復用故以為大閽杜若今城門校尉官強其丈反大音泰使其後掌之杜使其子孫常主此官君子曰鬻拳可謂愛君矣諫以自納於刑刑猶不忘納君於善林以兵諫君而自刖其足既刖其足猶時進忠諫不忘納君於善此言鬻拳所為非人臣之法但其心忠愛宛轉自白惟楚文王能盡其忠愛所以興也初王姚嬖于莊王生子頽杜王姚莊王之妾也姚姓也姚羊消反嬖必計反頽徒回反子頽有寵蒍國為之師林其母嬖故子頽有寵莊王使蒍國為子頽師及惠王即位杜周惠王莊王孫取蒍國之圃以為囿杜圃園也囿苑也圃必古反又音布囿音又邊伯之宫近於王宫王取之杜邊伯周大夫林惠王又取邊伯之宫室以益王之宫室王奪子禽祝跪與詹父田杜三子周大夫跪求委反而收膳夫之秩杜膳夫石速也秩祿也收式周反故蒍國邊伯石速詹父子禽祝跪作亂因蘇氏林傳詳言六人作亂之由杜蘇氏周大夫桓王奪其十二邑以與鄭自此以來遂不和秋五大夫奉子頽以伐王杜石速士也故不在五大夫數不克出奔溫林溫燕氏邑五大夫奉子頽以奔蘇蘇子奉子頽以奔衛衛師燕師伐周林衛惠公亦抗莊王以入國者與周不和故蘇子奉子頽以奔衛國燕南燕冬立子頽經丁未二十年春王二月夫人薑氏如莒無傳夏齊大災杜無傳來告以大故書天火曰災例在宣十六年秋七月冬齊人伐戎林無傳齊始治戎傳二十年春鄭伯和王室不克林鄭厲公與惠王子頽為和欲使各復其舊不能得和執燕仲父材燕仲父南燕伯為伐周故夏鄭伯遂以王歸王處于櫟秋王及鄭伯入于塢杜塢王所取鄭邑塢烏苦反遂入成周取其寶器而還冬王子頽享五大夫樂及遍舞林王子頽既立乃為蒍國等五大夫設享燕之禮遍舞黃帝堯舜憂商周六代之樂遍音遍鄭伯聞之見虢叔杜叔虢公字曰寡人聞之哀樂失時殃咎必至今王子頽歌舞不倦樂禍也林人之哀樂各有其時當哀而樂當樂而哀謂之失時凡失時者災殃咎戾必至其身時頽已立而稱王子不與其為王也樂必歌舞協律故曰歌舞不倦言不怠也是以王室之禍為可樂也樂音洛殃于良反咎其久反夫司寇行戮司冦刑官君為之不舉杜去盛饌而况敢樂禍乎姦王之位禍孰大焉臨禍忘憂憂必及之盍納王乎林謂子頽姦犯惠王而篡其位天下之患難孰大于此子頽當王室之禍而無憂戚之心必有殺戮之憂及乎其身何不相輿以討子頽而舉納王之義乎姦音干盍胡臘反何不也虢公林虢叔之父曰寡人之願也經戊申二十有一年春王正月夏五月辛酉鄭伯突卒杜十六年與魯大夫盟于幽林鄭厲公卒子文公捷立秋七月戊戌夫人薑氏薨杜無傳薨寢祔姑赴於諸侯故具小君禮書之冬十有二月葬鄭厲公無傳八月乃葬緩慢也傳二十一年春胥命于弭夏同伐王城杜鄭虢相命弭鄭地弭而爾反鄭伯將王自圉門入虢叔自北門入殺王子頽及五大夫鄭伯享王于闕西辟樂備杜闕象魏也林鄭厲公以惠王復辟故為王設享禮于象魏之西偏亦備六代之樂樂及遍舞樂備其理則一特文樂之變圉魚呂反辟蒲歷反王與之武公之略自虎牢以東杜略界也鄭武公傅平王平王賜之自虎牢以東後失其地故惠王今復與之虎牢河南成臯縣原伯曰鄭伯效尤其亦將有咎杜原伯原莊公也言效子頽舞遍樂林言鄭伯效學子頽之過備樂享燕於子頽新死之餘蓋子頽惠王之叔父雖有罪當誅豈可從而歌舞之乎言鄭伯亦必有殃咎及之效戶教反五月鄭厲公卒王巡虢守杜巡守于虢國也天子省方謂之巡守守音狩本或作狩後放此虢公為王宫干玤杜玤虢地玤蒲項反王與之酒泉杜酒泉周邑鄭伯之享王也王以后之鞶鑑豫之杜后王后也鞶帶而以鑑為飾也今西方羌胡猶然古之遺服鞶步于反紳帶也又蒲官反鑑工暫反鏡也虢公請器王豫之爵杜爵飲酒器鄭伯由是始惡于王林鄭厲公以王與虢厚與鄭薄由是始與王室有惡為僖二十四年鄭執王使張本惡烏路反又如字冬王歸自虢傳言王之偏也經己酉二十有二年春王正月肆大眚無傳赦有罪也易稱赦過宥罪書稱眚災肆赦傳稱肆眚圉鄭皆放赦罪人蕩滌衆故以新其心有時而用之非制所常故書眚所景反癸丑葬我小君文薑無傳反哭成喪故稱小君陳人殺其公子御寇宣公大子也陳人惡其殺大子之召故不稱君父以國討公子告御音禦本亦作禦夏五月林無事以首時書者五十九惟此書五月昭十年書十二月秋七月丙申及齊髙傒盟于防無傳髙傒齊之貴卿而與魯之微者盟齊桓謙接諸侯以崇霸業冬公如齊納幣無傳公不使卿而親納幣非禮也母喪未再期而圖昏二傳不見所譏左氏又無傳失禮明故傳二十二年春陳人殺其大子御寇杜傳稱太子以實言陳公子完與顓孫奔齊公子完顓孫皆御寇之黨顓音專顓孫自齊來奔杜不書非卿齊侯使敬仲為卿杜敬仲陳公子完辭曰羇旅之臣杜羇寄也旅客也幸若獲宥及於寬政林所幸得陳君之赦宥及於齊國寬大之政赦其不間於教訓而免於罪戾弛於負擔林赦其不間習教訓之罪而不計其出奔之罪戾去其負擔奔走之勞而得息肩於此杜弛去離也弛失氏反擔丁暫反君之惠也所獲多矣敢辱髙位以速官謗林敢不敢也言不敢辱齊卿之高位以速召官府之謗讟蓋當官不能共職則謗讟繁興故云官謗謗布浪反請以死告杜以死自誓林請昧死告免齊鄉之位詩云翹翹車乘招我以弓豈不欲往畏我友朋杜逸詩也翹翹遠貌古者聘士以弓言雖貪顯命懼為朋友所譏責翹祁堯反乘繩證反使為工正杜掌百工之官飲桓公酒樂杜齊桓賢之故就其家會據主人之辭故言飲桓公酒飲於鴆反樂音洛下同公曰以火繼之辭曰臣卜其晝未卜其夜不敢君子曰酒以成禮不繼以淫義也以君成禮弗納於淫仁也林樂餘不忍輒散故欲繼之以燭臣之享君禮當卜日重其事也故曰臣嘗卜其畫曰若夜飲則未之卜也飲酒之道以成歡敬之禮而已淫沉湎也不敢夜飲而繼之以淫湎是為合宜之義以其君成飲酒之禮不敢夜飲而納君于淫湎是為愛君之仁初懿氏卜妻敬仲杜懿氏陳大夫龜曰卜妻七計反其妻占之曰吉杜懿氏妻是謂鳯凰于飛和鳴鏘鏘杜雄曰鳯雌曰皇雄雌俱飛相和而鳴鏘鏘然猶敬仲夫妻相隨適齊有聲譽和如字又戶臥反鏘七羊反本又作將有媯之後將育于薑杜媯陳姓薑齊姓林言敬仲將長育于齊也五世其昌並于正卿八世之後莫之與京杜京大也林此皆所占之辭並下本或作並為誤陳厲公蔡出也杜姊妹之子曰出故蔡人殺五父而立之杜五父陳他也殺陳他在桓六年生敬仲其少也周史有以周易見陳侯者林敬仲年少時周大史有以周易象數之學見陳侯言吉凶者少詩照反見如字又賢遍反陳侯使筮之杜蓍曰筮筮上制反遇觀杜坤下巽上觀觀古亂反之否坤下乾上否觀六四爻變而為否否備矣反曰是謂觀國之光利用賔于王杜此周易觀卦六四爻辭易之為書六爻皆有變象又有互體聖人隨其義而論之林舉觀六四之爻以為六四近五六之君是謂觀國家之光華利用作賔于王家此其代陳有國乎林此下乃周史釋爻辭之義以為陳為舜後作賔於周家者也今敬仲得此卦其當代陳有國乎不在此其在異國非此其身在其子孫光逺而自他有耀者也坤土也巽風也乾天也風為天于土上山也林言敬仲代陳不在此國當在他國非此敬仲之身代陳有國在敬仲之子孫其光尚逺而自他處逺地有光明者也坤為土此觀下卦巽為風此觀上卦乾為天此觀六四變為乾卦巽變為乾乾上坤下故曰於土上此否卦正卦三四五爻為艮變卦二三四爻亦為艮故曰山也此互體乾其然反有山之材而照之以天光於是乎居土上杜山則材之所生上有乾下有坤故言居土上照之以天光林艮為山巽為木故曰有山之材此以互體言之巽變為乾故曰照之以天光此以變卦言山之材天之光皆居坤之上故曰居土上此以正卦變卦互體詳言之故曰觀國之光利用賔于王杜四為諸侯變而之乾有國朝王之象庭實旅百奉之以玉帛天地之美具焉故曰利用賔于王杜艮為門庭乾為金玉坤為布帛諸侯朝王陳贄幣之象旅陳也百言物備猶有觀焉故曰其在後乎杜因觀文以傳占故言猶有觀非在已之言故知在子孫林此以卦義言觀感而化非朝夕所能故曰在後觀古亂反風行而著於土故曰其在異國乎林行而著於土則不在本國明矣故曰在異國著直略反若在異國必薑姓也薑大嶽之後也杜薑姓之先為堯四嶽大音泰嶽音嶽山嶽則配天物莫能兩大陳衰此其昌乎杜變而象艮故知當興於大嶽之後得大嶽之權則有配天之大功故知陳必衰林山嶽之大則興雲降雨有配天之功此亦以艮乾變卦互體言凡天下之物莫能兩大陳國衰微敬仲子孫其昌盛乎及陳之初亡也昭八年楚滅陳陳桓子始大於齊杜桓子敬仲五世孫陳無宇其後亡也哀十七年楚復滅陳成子得政成子陳常也敬仲八世孫陳完有禮於齊子孫世不忘德德協於卜故傳備言其終始卜筮者聖人所以定猶豫決疑似因生義教者也尚書洪範通龜筮以同卿士之數南蒯卜亂而遇元吉惠伯答以忠信則可臧會卜僣遂獲其應丘明故舉諸懸驗于行事若以示來世而君子志其善者逺者他皆放此左傳杜林合注卷六
