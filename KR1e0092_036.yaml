body:
  text: 左傳杜林合注卷三十六明王道焜趙如源同編昭公三經甲子五年春王正月舍中軍林襄十一年始主中軍至是舍之舍中軍從祀先公皆善辭也非國史無以知舍中軍為季氏専魯從祀先公為陽虎専季氏也舍音捨傳同楚殺其大夫屈申書名罪之公如晉夏莒牟夷以牟婁友防兹來奔杜城陽平昌縣西南有防亭姑幕縣東北有兹亭林牟婁防兹莒三邑牟亡侯反秋七月公至自晉戊辰叔弓帥師敗莒布于蚡泉蚡泉魯地蚡扶粉反秦伯卒杜無傳不書名未同盟林景公卒子哀公卒冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吴林越始見經而常夀過得稱人越驟强也通吴以疲楚者晉謀之失也通越以困吴者楚謀之失也傳五年春王正月舍中軍卑公室也罷中軍季孫稱左師孟氏稱右師叔孫氏則自以知孫為軍名毁中軍于施氏成諸臧氏杜季孫不欲親其議勑二家㑹諸大夫發毁置之計又取其令名臧子郎反初作中軍三分公室而各有其一三家各有一軍家屬季氏盡征之無所入於公叔孫氏臣其子弟以父兄歸公孟氏取其半焉復以子弟之半歸公及其舍之也四分公室季氏擇二杜簡擇取二分二子各一皆盡征之而貢于公杜國人盡屬三家三家隨時獻公而已以書使杜洩告於殯杜告叔孫之柩殯必刃反曰子固欲毁中軍既毁之矣故告杜洩曰夫子唯不欲毁也故盟諸僖閎詛諸五父之衢昔在襄十一年詛側慮反受其書而投之杜投擲也林受季孫之書而投棄之不以告帥士而哭之痛叔孫之見誣叔仲子謂季孫曰林叔仲子即叔仲帶受豎牛賂惡杜洩者帶受命於子叔孫曰葬鮮者自西門不以壽終為鮮西門非魯朝正門鮮音仙徐息淺反季孫命杜洩杜命使從西門杜洩曰卿喪自朝魯禮也杜從生存朝覲之正路吾子為國政未改禮而又遷之林吾子謂季孫為魯國之政未改典禮而又遷易其法羣臣懼死不敢自也自從也既葬而行杜善杜洩能辟禍仲至自齊林仲壬聞父喪而來季孫欲立之南遺曰叔孫氏厚則季氏薄彼實家亂子勿與知不亦可乎南遺使國人助豎牛以攻諸大庫之庭攻仲壬也魯城内有大庭氏之虚於其上作庫與音預司宫射之中目而死豎牛取東鄙三十邑以與南遺杜取叔孫氏邑射食亦反中丁仲反昭子即位朝其家衆曰豎牛禍叔孫氏使亂大從杜使從於亂林使亂大和順之道從如字殺適立庶又披其邑將以赦罪披析也謂以邑與南遺昭子不知豎牛餓殺其父故但言其見罪適丁厯反披普皮反罪莫大焉必速殺之豎牛懼奔齊孟仲之子林孟丙仲壬之子殺諸塞闗之外杜齊魯界上闕塞悉代反投其首于寧風之棘上寧風齊地仲尼曰叔孫昭子之不勞不可能也杜不以立已為功勞據其所言善之時魯人不以餞死語昭子周任有言曰為政者不賞私勞不罰私怨詩云有覺徳行四國順之杜詩大雅覺直也言徳行直則四方順從之任音壬行下孟反初穆子之生也莊叔以周易筮之杜莊叔穆子父得臣也遇明夷離下坤上明夷之謙艮下坤上謙明夷初九變為謙以示卜楚丘杜楚丘卜人姓名曰是將行林此子主先出奔而歸為子祀杜奉祭祀以讒人入其名曰牛卒以餒死明夷日也林雛為日明入地中故為夷傷日之數十杜甲至癸故有十時亦當十位日中當王食時當公平旦為卿鷄鳴為士夜半為皂人定為輿黄昏為隸日入為僚脯時為僕日昳為臺隅中日出闕不在第尊王公曠其位自王以下其二為公其三為卿林王天子也天子至尊故居盛位公諸侯降於天子故其位居於第二卿大夫也降於諸侯故其位居於第三日上其中杜日中盛明故以當王食日為二杜公位旦日為三杜卿位明夷之謙明而未融其當旦乎杜融朗也離在坤下日在地中之象又變為謙謙道卑退故曰明而未融日明未融故曰其當旦乎故曰為子祀杜莊叔卿也卜豹為卿故知為子祀日之謙當鳥故曰明夷于飛杜離為日為鳥離變為謙日光不足故當鳥鳥飛行故曰于飛明而未融故曰垂其翼於日為未融於烏為垂翼象日之動林日動物也雖有夷傷其動不爽君子象之故曰君子于行明夷初九得位有應君子象也在明傷之世居謙下之位故將辟難而行當三在旦故曰三日不食旦位在三又非食時故日三日不食離火也艮山也離為火火焚山山敗林離屬南方故為火離變為艮為火焚山火焚山則革木焦枯山敗可知於人為言艮為言敗言為讒杜為離所焚故言敗故曰有攸徃主人有言言必讒也杜離變為艮故言有所徃徃而見燒故主人有言言而見敗故必讒言純離為牛仕易離上離下離畜牝牛吉故言純離為牛世亂讒勝勝將適離故曰其名曰牛杜離焚山則離勝譬世亂則讒勝山焚則離獨存故知名牛也豎牛非牝牛故不吉謙不足飛不翔杜謙道沖退故飛不逺翔垂不峻翼不廣杜峻髙也翼垂下故不能廣逺故曰其為子後乎杜不逺翔故知不逺去吾子亞卿也抑少不終杜旦日正卿之位莊叔父子世為亞卿位不足以終盡卦體蓋引而致之楚子以屈申為貳於吴乃殺之杜造生貳心以屈生為莫敖杜生屈建子使與令尹子蕩如晉逆女林子蕩即薳罷過鄭鄭伯勞子蕩于汜勞屈生于菟氏林汜菟氏皆鄭地所以别勞二使者盡敬也過古禾反勞力報反後皆同汜扶嚴反菟大胡反晉侯送女于邢丘子産相鄭伯㑹晉侯于邢丘杜傳言楚强諸侯畏敬其使相息亮反公如晉即位而徃見自郊勞至于贈賄杜來有郊勞去有贈賄無失禮杜揖讓之禮晉侯謂女叔齊曰林女叔齊即司馬侯女音汝魯侯不亦善于禮乎對曰魯侯焉知禮公曰何為自郊勞至于贈賄禮無違者何故不知對曰是儀也不可謂禮林言揖讓進退此儀文也不可謂之禮經焉於䖍反禮所以守其國行其政令無失其民者也今政令在家林在大夫不能取也有子家羈弗能用也杜羈莊公𤣥孫懿伯也林此言昭公不知禮無以守其國家羈居宜反奸大國之盟林奸犯元年㑹虢之盟陵虐小國謂伐莒取鄆利人之難杜謂徃年莒亂而取鄫難乃旦反下同不知其私杜不自知有私難林此言昭公不知禮無以行其政令公室四分民食於他他謂三家也言魯君與民無異思莫在公不圖其終杜無為公謀終始者林此言昭公不知禮盡失其民思息吏反謂羣臣慮也又如字為國君難將及身不恤其所禮之本末將於此乎在在恤民與憂國而屑屑焉習儀以亟杜言以習儀為急屑先結反亟紀力反言善於禮不亦逺乎君子謂叔侯於是乎知禮杜時晉侯亦失政叔齊以此諷諌晉韓宣子如楚送女叔向為介鄭子皮子大叔勞諸索氏杜河南城臯縣東有大索城大音泰索悉洛反大叔謂叔向曰楚王汰侈已甚子其戒之叔向曰汰侈已甚身之災也焉能及人若奉吾幣帛慎吾威儀守之以信行之以禮敬始而思終終無不復林事雖已終皆可復行焉於䖍反從而不失儀杜從順也敬而不失威道之以訓辭奉之以舊法林先王訓辭道之以通其意奉使舊法奉之以致其命考之以先王杜以先王之禮成其好度之以二國度晉楚之勢而行之度待洛反雖汰侈若我何及楚楚子朝其大夫曰晉君仇敵也苟得志焉無恤其他今其來者上卿上大夫也若吾以韓起為閽杜刖足使守門閽音昏以羊舌肸為司宫杜加宫刑肸許乙反足以辱晉吾亦得志矣可乎大夫莫對薳啓疆曰可苟有其備何故不可恥匹夫不可以無備況恥國乎是以聖王務行禮不求恥人朝聘有珪林朝聘之禮皆以珪為信上公圭九寸聘珪八寸侯伯珪七寸聘珪六寸子男琮璧五寸聘璧四寸臣降於君一等也享頫有璋林享頳服云獻也以為獻國所有杜云享也以為既朝聘而享享頫見也其義皆通有璋執璋以行禮也視他弔反徐他彫反小有述職林諸侯適天子曰述職述所治國之功職也大有巡功林天子巡守曰巡功巡所守之功績也設機而不倚爵盈而不飲林朝聘之禮有設機進爵之時朝禮雖亡而聘禮有其畧也聘義曰聘射之禮至大禮也質明而始行事日幾中而後禮成非强有力者弗能行也故設機而不倚酒清人渇而不敢飲肉敗人餒而不敢食故爵盈而不飲杜言務行禮机音几宴有好貨宴飲以貨為好衣服車馬在容所無好呼執反飱有陪鼎熟食為飱陪加也加鼎所以厚殷勤飱音孫入有郊勞賓至逆勞之於郊出有贈賄杜去則贈之以貨賄禮之至也國家之敗失之道也則禍亂興杜失朝聘晏好之道城濮之役在僖二十八年晉無楚備以敗於邲在宣十二年言兵禍始於城濮邲皮必反邲之役楚無晉備以敗於鄢在成十六年鄢於晩反自鄢以來晉不失備而加之以禮重之以睦杜君臣和也重直用反是以楚弗能報而求親焉既獲姻親又欲恥之以召冦讐備之若何杜言何以為備誰其重此杜重怨也若有其人恥之可也杜謂有賢人以敵晉則可恥之若其未有君亦圖之晉之事君臣曰可矣求諸侯而麇至杜麇羣也麇丘隕反又其隕反求昏而薦女杜薦進也君親送之林晉平公親送女至于邢丘上卿及上大夫致之猶欲恥之君其亦有備矣不然奈何韓起之下趙成中行吴魏舒范鞅知盈杜五卿位在韓起之下皆三軍之將佐也成趙武之子吴荀偃之子行户郎反鞅於丈反知音智羊舌肸之下祁午張趯籍談女齊梁丙張骼輔躒苗賁皇皆諸侯之選也杜言非凡人趯他厯反骼古百反或音各躒力狄反音各反賁扶云反一音悉變反韓襄為公族大夫韓須受命而使矣襄韓無忌子也為公族大夫須起之門子年雖㓜已任出使使所吏反箕襄邢帶叔禽叔椒子羽皆大家也韓賦七邑林韓襄起之兄子箕襄邢帶二人韓氏族韓須叔禽叔椒子羽四人皆韓起子凡七人人一邑皆成縣也杜成縣賦百乗也羊舌四族皆彊家也銅鞮伯華叔向叔魚叔虎兄弟四人晉人若喪韓起楊肸五卿八大夫五卿趙成以下八大夫祁午以下喪息浪反叔向本羊舌氏食采於於楊故又號楊肸輔韓須楊石石叔向子食我也因其十家九縣杜韓氏七羊舌氏四而言十家舉大數也羊舌四家其二縣故但言彊家長轂七百長轂戎車也縣百乗其餘四十縣遺守四干計遺守國者尚有四千乗遺唯季反奮其武怒以報其大恥伯華謀之杜伯華叔向兄中行伯魏舒帥之杜伯中行吴其蔑不濟矣君將以親易怨杜失婚姻之親實無禮以速冦而未有其備使羣臣徃遺之禽林使楚之羣臣徃遺晉之禽獲以逞君心何不可之有林反説何有不可言其甚不可也王曰不榖之過也大夫無辱杜謝薳啓疆厚為韓子禮王欲敖叔向以其所不知而不能言叔向之多知敖五報反所不知絶句亦厚其禮韓起反鄭伯勞諸圉圉鄭地名辭不敢見禮也杜奉使君命未反故見賢遍反鄭罕虎如齊娶於子尾氏杜自為逆也晏子驟見之陳桓子問其故對曰能用善人民之主也杜謂授子産政夏莒牟夷以牟婁及防兹來奔牟夷非卿而書尊地也尊重也重地故書以名其人終為不義莒人愬于晉杜愬魯受牟夷愬悉路反晉侯欲止公范獻子曰不可人朝而執之誘也討不以師而誘以成之惰也為盟主而犯此二者無乃不可乎請歸之閒而以師討之杜閒暇也閒音閑又如字乃歸公秋七月公至自晉莒人來討杜討受牟夷不設備林莒人不設攻戰之備戊辰叔弓敗諸蚡泉莒未陳也嫌君臣異故重發例陳直覲反冬十月楚子以諸侯及東夷伐吴以報棘櫟麻之役役在四年薳射以繁揚之師㑹于夏汭林薳射楚大夫杜㑹楚子射食夜反又食亦反越大夫常夀過帥師㑹楚子于瑣瑣楚地過古禾反聞吴師出薳啓疆帥師從之杜從吴師也遽不設備吴人敗諸鵲岸廬江舒縣有鵲尾渚遽其據反楚子以馹至于羅汭杜馹𫝊也羅水名馹人實反吴子使其弟蹶由犒師杜犒勞蹶居衛反犒苦報反楚人執之將以釁鼓王使問焉曰女卜來吉乎對曰吉寡君聞君將治兵於敝邑卜之以守龜林卜之以守國之龜女音汝守手又反下同曰余亟使人犒師請行以觀王怒之疾徐而為之備尚克知之林言我急使人徃勞楚師以觀楚王忿怒之緩急而為之戰守之備庶幾能知其意言吴卜龜如此亟紀力反龜兆告吉曰克可知也林卜龜之辭止此君若驩焉好逆使臣兹敝邑休怠杜林解也好呼報反使所吏反下並同而忘其死亡無日矣今君奮焉震電馮怒杜馮盛也林奮發盛怒如雷震電製馮皮水反虐執使臣將以釁鼓則吴知所備矣敝邑雖羸若早修完杜完器備羸力危反其可以息師杜息興之師難易有備林度事勢之難易而有其備易以䜴反可謂吉矣且吴社稷是卜豈為一人使臣獲釁軍鼓而敝邑知備以禦不虞其為吉孰大焉國之守龜其何事不卜言常卜豈為于偽反一臧一否其誰能常之林不可必其常吉否悲矣反舊方育反城濮之兆其報在邲杜城濮戰楚卜吉其效乃在邲今此行也其庸有報志杜言吴有報楚意乃弗殺楚師濟於羅汭沈尹赤㑹楚子林沈尹赤楚大夫次於萊山薳射帥繁揚之師先入南懷楚師從之及汝清杜南懐汝清皆楚界吴不可入杜有備楚子遂觀兵於坻箕之山杜觀示也坻直夷反是行也吴早設備楚無功而還以蹶由歸楚子懼吴使沈尹射待命于巢薳啓疆待命于雩婁禮也杜善有備雩音于徐泥于反婁力侯反徐力俱反秦后子復歸于秦杜元年奔晉景公卒故也終五稔之言經乙丑六年春王正月杞伯益姑卒杜再同盟林文公卒平公立葬秦景公夏季孫宿如晉葬杞文公無傳宋華合比出奔衛杜合比事君不以道自取奔亡書名罪之華户化反比如字又昆志反秋九月大雩楚薳罷帥師伐吴罷音皮冬叔弓如楚齊侯伐北燕傳六年春王正月杞文公卒弔如同盟禮也杜魯怨杞因晉取其田而今不廢喪紀故禮之大夫如秦葬景公禮也合先王士弔大夫送葬之禮二月鄭人鑄刑書鑄刑書於鼎以為國之常法叔向使詒子産書杜詒遺也詒以之反曰始吾有虞於子虞度也言準度子産以為已法今則已矣已止也昔先王議事以制不為刑辟懼民之有爭心也杜臨事制刑不豫設法也法豫設則民知爭端辟婢亦反下皆同猶不可禁禦是故閑之以義糾之以政行之以禮守之以信奉之以仁林防閑以義使得其宜糾舉以政使莫不正施行以禮使莫不敬諱守以信使莫不實奉養乏以仁心使若民若物各得其所制為禄位以勸其從杜勸從教嚴㫁刑罰以威其淫杜淫放也㫁丁亂反下同懼其未也林懼其未盡治民之道故誨之以忠聳之以行杜聲懼也聳息勇反行下孟反敎之以務杜時所急使之以和杜説以使民臨之以敬涖之以彊施之於事為涖涖音利又音類㫁之以剛杜義㫁恩猶求聖哲之上明察之官上公王也官卿大夫也忠信之長慈恵之師民於是乎可任使也而不生禍亂林禮義洋溢禍亂消弭長丁丈反民知有辟則不忌於上權移於法故民不畏上並有爭心以徵於書而徼幸以成之杜因危文以生爭緣徼幸以成其巧偽徼古堯反巧如字又苦孝反弗可為矣杜如此則有罪者或至幸免無罪者或墮飛文民不可得以治也夏有亂政而作禹刑商有亂政而作湯刑杜夏商之亂著禹湯之法言不能議事以制周有亂政而作九刑杜周之衰亦為刑書謂之九刑林按書吕刑周穆王享國百年耄荒度作刑以告四方恐即此也三辟之興皆叔世也杜言刑書不起于始盛之世今吾子相鄭國作封洫在襄三十年相息亮反立謗政杜作丘賦在四年制參辟鑄刑書杜制參辟謂用三代之末法參七南反一音三將以靖民不亦難乎詩曰儀式刑文王之徳日靖四方杜詩頌言文王以徳為儀式故能日有安靖四方之功刑法也又曰儀刑文王萬邦作孚杜詩大雅言文王作儀法為天下所信孚信也如是何辟之有杜言詩唯以徳興信不以刑也民知爭端矣將棄禮而徵於書杜以刑書為徴錐刀之末將盡爭之杜錐刀末喻小事亂獄滋豐賄賂並行林或以賄賂文致人罪或以賄賂幸脱刑辟終子之世鄭其敗乎肸聞之國將亡必多制杜數改法其此之謂乎復書曰若吾子之言杜復報也僑不才不能及子孫吾以救世也既不承命敢忘大恵林言我無才能不能為後世子孫慮吾以救當世之弊也既不能承順教命改其所為敢忘叔向箴戒之大恵士文伯曰火見鄭其火乎火心星也周五月昏見見賢遍反火未出而作火以鑄刑器刑器鼎也藏爭辟焉林藏爭罪之法也火如象之不火何為杜象類也同氣相求火未出而用火相感而致災夏季孫宿如晉拜莒田也謝前年受牟夷邑不見討晉侯享之有加籩籩豆之數多于常禮武子退使行人告曰小國之事大國也苟免於討不敢求貺杜貺賜也得貺不過三獻周禮大夫三獻今豆有加下臣弗堪林下臣季武子自謂言弗能當此貺賜無乃戾也杜懼以不堪為罪韓宣子曰寡君以為驩也杜以加禮致驩心驩音歡對曰寡君猶未敢杜未敢當此加也況下臣君之𨽻也敢聞加貺固請徹加而後卒事晉人以為知禮重其好貨杜晏好之貨好呼報反宋寺人柳有寵杜有寵於平公柳良久反寺人名大子佐惡之華合比曰我殺之杜欲以求媚大子惡烏路反柳聞之乃坎用牲埋書林掘地為坎用牲埋盟書詐為盟處而告公曰合比將納亡人之族亡人華臣也襄十七年奔衛既盟于北郭矣公使視之有焉遂逐華合比合比犇衛于是華亥欲代右師杜亥合比弟欲得合比處乃與寺人栁比從為之徴曰聞之久矣杜聞合比欲納華臣比昆志反公使代之代合比為右師見於左師杜左師向戍見賢遍反又如字左師曰女夫也必亡杜夫謂華亥女音汝下同夫方于反女喪而宗室於人何有人亦於女何有杜言合比與汝同宗汝忍喪而亡之所厚者薄無所不薄且何有於他人出乎爾者反乎爾者也故人亦不能有愛於汝喪息浪反詩曰宗子維城毋俾城壞毋獨斯畏杜詩大雅林言宗子之固若城毋使宗室衰落若城之有墮壞城壞則藩屏皆壞獨居則親戚叛之可畏者至矣女其畏哉為二十年華亥出奔傳六月丙戌鄭災終士文伯之言楚公子棄疾如晉報韓子也報前年送女過鄭鄭罕虎公孫僑游吉從鄭伯以勞諸柤辭不敢見杜不敢當國君之勞柤鄭地過古臥反又古禾反從才用反或如字勞力報反下同相側加反見賢遍反下同固請見之見如見王見鄭伯如見楚王言棄疾共而有禮以其乗馬八匹私面私見鄭伯乗繩證反見子皮如上卿如見楚卿以馬六匹見子産以馬四匹見子大叔以馬二匹降殺以兩禁芻牧採樵林禁止芻牧牛羊者採樵供焚者不入田不犯田種不樵樹不采蓺林不伐嘉樹為樵不採蓺種為芻不抽屋不强匄誓曰有犯命者君子廢小人降君子則廢黜不得居位小人則退給下劇也强其丈反又其良反匄音蓋乞也舍不為暴主不慁賓杜慁患也林其所舍止不為暴虐主人不以賓客為患慁户困反徃來如是鄭三卿皆知其將為王也林三卿罕虎公孫僑游吉皆知棄疾將為楚王以其愛人也韓宣子之適楚也林前年如楚致女楚人弗逆公子棄疾及晉竟晉侯將亦弗逆叔向曰楚辟我衷杜辟邪也衷正也竟音境辟匹亦反下同衷音忠若何效辟詩曰爾之教矣民胥效矣杜詩小雅言上教下效從我而已焉用效人之辟書曰聖作則杜逸書則法也焉於䖍反無寧以喜人為則無寧寧也而則人之辟乎匹夫為善民猶則之况國君乎晉侯説乃逆之傳言叔向知禮説音悦秋九月大雩旱也徐儀楚聘于楚儀楚徐大夫楚子執之逃歸懼其叛也使薳洩伐徐薳洩楚大夫洩息列反吴人救之令尹子蕩帥師伐吴師于豫章而次于乾谿杜乾谿在譙國城父縣南楚東竟吴人敗其師于房鍾房鍾吴地獲宫廐尹棄疾林鬬韋龜之父非公子棄疾也廐九又反子蕩歸罪於薳洩而殺之林歸罪於薳洩以其始禍伐徐也杜不以敗告故不書冬叔弓如楚且弔敗也杜弔為吴所敗十一月齊侯如晉請伐北燕也告盟主士匄相士鞅逆諸河禮也林士匄即士文伯杜士匄晉大夫相為介得敬逆來者之禮相息亮反鞅於丈反晉侯許之十二月齊侯遂伐北燕將納簡公杜簡公北燕伯三年出奔齊晏子曰不入林言北燕簡公不得入國燕有君矣民不貳吾君賄左右諂諛作大事不以信未嘗可也為明年暨齊平傳謁敇檢反諛羊朱反經丙寅七年春王正月暨齊平杜暨與也燕與齊平前年冬齊伐燕間無異事故不重言燕從可知林平不書必鬬天下之大故而後書是故昭定而下春秋多罪齊書伐衛遂伐晉同圍齊襲莒暨齊平盟平鹹次于伍氏皆特筆也夫子曰齊景公有馬千駟死之日民無得而稱焉蓋不予齊也暨其器反傳同三月公如楚叔孫婼如齊涖盟無傳公將逺適楚故叔孫如齊尋舊好婼敕畧反夏四月甲辰朔日有食之秋入月戊辰衛侯惡卒杜元年大夫盟于虢林襄公卒子靈公元立九月公至自楚冬十有一月癸未季孫宿卒十有二月癸亥葬衛襄公傳七年春王正月暨齊平齊求之也齊伐燕燕人賂之反從求平如晏子言癸巳齊侯次于虢虢燕竟虢𤓰百反燕人行成曰敝邑知辠敢不聴命先君之敝器請以謝辠敝器瑶罋玉櫝之屬公孫晳曰受服而退俟釁而動可也杜晳齊大夫林燕人已服始受而退俟燕釁隙而後再動其亦可也晳星厯反徐思益反釁許覲反二月戊午盟于濡上杜濡水出髙陽縣東北至河間鄭縣入易水濡音須又女于反燕人歸燕姬杜嫁女與齊侯賂以瑶罋玉櫝斚耳瑶玉也櫝匱也斚耳玉爵斚古雅反一音嫁禮記夏曰醆殷曰斚周曰爵不克而還林不克納簡公而歸楚子之為令尹也為王旌以田析羽為旌王旌游至於軫芋尹無宇㫁之林斷子圉之旌芋于付反斷音短曰一國兩君其誰堪之及即位為章華之宫納亡人以實之杜章華南郡華容縣無宇之閽入焉有罪亡入章華宫無宇執之有司弗與杜王有司也曰執人於王宫其罪大矣執而謁諸王林執無宇也杜謁告也王將飲酒遇其歡也無宇辭曰天子經畧杜經營天下畧有四海故曰經畧諸侯正封杜封疆有定分古之制也封略之内何非君土食土之毛誰非君臣杜毛草也林君者天子諸侯之總名故詩曰普天之下莫非王土率土之濱莫非王臣杜詩小雅濱涯也天有十日杜甲至癸人有十等杜天至臺下所以事上上所以共神也故王臣公林臣者服屬之以為臣也下皆同共音㳟公臣大夫大夫臣士士臣皁皁臣輿輿臣隸隸臣僚僚臣僕僕臣臺林士謂能理庶事卓謂造成事也輿衆也謂佐皁舉衆事也隸謂隸屬於吏也僚勞也謂供勞事也僕僕豎生藏者也臺給臺下厮役所謂人之十等也馬有圉牛有牧養馬曰圉養牛曰牧以待百事今有司曰女胡執人於王宫將焉執之林如此則將安所執其逃亡之臣女音汝焉於䖍反周文王之法曰有亡荒閲荒大也閲蒐也有亡人當大蒐其衆所以得天下也吾先君文王杜楚文王作僕區之法僕區刑書名區烏侯反徐如字服云僕隠也區匿也為隠匿亡人之法也曰盜所隠器杜隠盜所得器與盜同罪所以封汝也杜行善法故能啓疆北至汝水若從有司是無所執逃臣也逃而舍之是無陪臺也王事毋乃闕乎林臣僕逃亡而遂舍止之則皆將相帥而逃亡是無陪臺之臣也國家之事無乃有所廢闕乎昔武王數紂之辠以告諸侯曰紂為天下逋逃主萃淵藪杜萃聚也天下逋逃悉以紂為淵藪集而歸之林亡人歸紂如魚集於深淵獸集于大藪也數色具反又色主反逋布吴反藪素口反故夫致死焉杜人欲致死討紂夫音扶又方于反君王始求諸侯而則紂無乃不可乎若以二文之法取之盜有所在矣林言王亦為盜王曰取而臣以徃林言取汝之臣閽人以去盜有寵未可得也林盜有寵靈王戲言若以二文之法指我為盜則我方有寵于君未可得而取也杜為葬靈王張本遂赦之杜赦無宇楚子成章華之臺願與諸侯落之杜宫室始成祭之為落臺今在華容城内大宰薳啓疆曰臣能得魯侯薳啓疆來召公辭曰昔先君成公命我先大夫嬰齊林嬰齊楚令尹子重也曰吾不忘先君之好將使衡父照臨楚國林成二年魯使公衡為質於楚以請盟故言照臨楚國好呼報反鎮撫其社稷以輯寧爾民嬰齊受命于蜀杜蜀盟在成二年輯音集奉承以來弗敢失隕而致諸宗祧林言奉成公此語以告宗廟祧他彫反曰我先君共王引領北望林楚居南方故引領北向以望中原共音恭日月以冀杜冀魯朝傳序相授於今四王矣杜四王共康郯敖及靈王傳直專反嘉恵未至唯襄公之辱臨我喪杜襄公二十八年知楚臨康王喪孤與其二三臣悼心失圖林哀感之中其心傷悼失所圖謀杜在哀喪故社稷之不皇況能懷思君徳杜皇暇也言有大喪多不暇今君若步玉趾辱見寡君趾足也寵靈楚國以信蜀之役林以示于蜀之言有信致君之嘉恵是寡君既受貺矣何蜀之敢望杜言但欲使君來不敢望如蜀復有質子其先君鬼神實嘉賴之豈唯寡君君若不來使臣請問行期問魯見伐之期使所吏反寡君將承質幣而見于蜀以請先君之貺杜請問也以問成公所賜何不踐言質音至徐之二反又如字見賢遍反公將徃夢襄公祖杜祖祭道神梓慎曰君不果行襄公之適楚也夢周公祖而行今襄公實祖君其不行子服恵伯曰行先君未嘗適楚故周公祖以道之林先君謂襄公道音導下同襄公適楚矣而祖以道君不行何之林之去也三月公如楚鄭伯勞于師之梁杜鄭城門勞力報反下同孟僖子為介不能相儀杜僖子仲孫貜相息亮反及楚不能答郊勞為下僖子病不能相禮張本夏四月甲辰朔日有食之晉侯問于士文伯曰誰將當日食對曰魯衛惡之杜受其凶惡惡如字衛大魯小公曰何故對曰去衛地如魯地杜衛地豕韋也魯地降婁也日食於豕韋之末及降婁之始乃息故禍在衛大在魯小也周四月今二月故日在降婁於是有災魯實受之杜災發於衛而魯受其餘禍其大咎其衛君乎魯將上卿林其衛君實當此咎魯將上卿當之杜八月衛侯卒十一月李孫宿卒公曰詩所謂彼日而食于何不臧者何也杜感日食而問詩對曰不善政之謂也國無政不用善則自取謫于日月之災林言所謂不臧者不善政之所感召也國無善政不能信用善人則自取言謫于天而有日月薄食之災謫直革反故政不可不慎也務三而已一曰擇人杜擇賢人二曰因民因民所利而利之三曰從時杜順四時之所務晉人來治杞田前女叔侯不盡歸今公適楚晉人恨故復來治杞田季孫將以成與之成孟氏邑本杞田謝息為孟孫守不可杜謝息僖子家臣為于偽反守手又反下同曰人有言曰雖有挈缾之知守不假器禮也杜挈缾汲者喻小知為人守器猶知不以借人挈苦結反缾蒲丁反知音智夫子從君而守臣喪邑夫子謂孟僖子從公如楚喪息浪反雖吾子亦有猜焉杜言季孫亦將疑我不忠猜七才反季孫曰君之在楚於晉罪也言晉罪君之至楚又不聴晉魯罪重矣晉師必至吾無以待之不如與之間晉而取諸杞候晉問隙可復伐杞取之間如字吾與子桃杜晉國汴縣東南有桃虚成反誰敢有之是得二成也林他日取成而歸必復歸之孟氏誰敢有此成邑是孟氏得桃并成為二也魯無憂而孟孫益邑子何病焉辭以無山林謝息又辭以為桃邑無山與之萊柞杜萊柞二山柞子洛反又音昨乃遷于桃杜謝息遷也晉人為杞取成不書非公命楚子享公于新臺杜章華臺也使長鬛者相鬛鬚也欲先夸魯侯鬛力輒反相息亮反好以大屈杜晏好之賜大屈弓名好呼報反屈居勿反大屈賈云良金可以為劒出大屈也既而悔之薳啓疆聞之見公公語之林昭公以所賜告之見賢遍反語魚據反拜賀公曰何賀對曰齊與晉越欲此久矣寡君無適與也而𫝊諸君君其備禦三鄰言齊晉越將伐魯而取之適下厯反傳直專反慎守寶矣敢不賀乎公懼乃反之杜傳言楚靈不信所以不終鄭子産聘于晉晉侯有疾韓宣子逆客林逆迎也客謂子産私焉杜私語曰寡君寢疾於今三月矣並走羣望晉所望祀山川皆走徃祈禱有加而無瘳林病勢有加增無瘳減今夢黄熊入于寢門其何厲鬼也對曰以君之明子為大政其何厲之有昔堯殛鯀于羽山羽山在東海祝其縣西南瘳敕留反熊音雄獸名亦作能三足鼈也解者云獸非入水之物故是鼈也案説文及字林皆云能熊屬足似鹿殛記力反鯀古本反其神化為黄熊以入于羽淵實為夏郊三代祀之鯀禹父夏家郊祭之厯殷周二代又通在羣臣之數非見祀晉為盟主其或者未之祀也乎言周衰晉為盟主得佐天子杞羣神韓子祀夏郊祀鯀晉侯有間間差也賜子産莒之二方鼎方鼎莒所貢子産為豐施歸州田於韓宣子林豐施鄭公孫段之子三年晉以州田賜段今段卒故子産歸之於晉為于偽反下為初言同曰日君以夫公孫段為能任其事而賜之州田今無禄早世不獲久享君徳其子弗敢有不敢以聞於君私致諸子此年正月公孫段卒夫音扶任音壬下同宣子辭子産曰古人有言曰其父析薪其子弗克負荷林言其父析木而為薪其子不能背負肩荷以歸其家荷擔也以㣲薄喻貴重荷何可反又音河施將懼不能任其先人之禄其况能任大國之賜縱吾子為政而可後之人若屬有疆埸之言敝邑獲戾杜恐後代宣子者將以鄭取晉邑罪鄭屬音燭疆居良反埸音亦而豐氏受其大討林豐施之家遽有此邑必受大討吾子取州是免敝邑於戾而建置豐氏也敢以為請杜傳言子産貞而不諒宣子受之以告晉侯晉侯以與宣子宣子為初言初言謂與趙文子爭州田病有之林以有取州田為已病以易原縣於樂大心林樂大心宋大夫原晉邑以賜樂大心鄭人相驚以伯有曰伯有至矣則皆走不知所徃杜襄三十年鄭人殺伯有言其男至鑄刑書之嵗二月在前年或夢伯有介而行杜介甲也曰林此曰字以下至又將殺段也皆夢伯有言壬子余將殺帶也杜駟帶助子晳殺伯有壬子六年三月三日明年壬寅余又將殺段也杜公孫段豐氏黨人壬寅此年正月二十八日及壬子駟帶卒國人益懼齊燕平之月杜此年正月壬寅公孫段卒國人愈懼其明月子産立公孫洩及良止以撫之乃止杜公孫洩子孔之子也襄十九年鄭殺子孔良止伯有子也立以為大夫使有宗廟洩息列反子大叔問其故子産曰鬼有所歸乃不為厲吾為之歸也林言鬼有宗廟則得其所鬼乃不為惡厲以害於民我立二人使有宗廟以為之依歸也太叔曰公孫洩何為杜子孔不為厲問何為復立洩子産曰説也為身無義而圖説伯有無義以妖鬼故立之恐惑民并立洩使若自以大義存誅絶之後者以解悦民心説如字徐始鋭反從政有所反之以取媚也杜民不可使知之故治政或當反道以求媚於民不媚不信林説而後信之民苟不説不信之招也不信民不從也林信而後從其言民苟不信不從之漸也及子産適晉趙景子問焉景子晉中軍佐趙成曰伯有猶能為鬼乎子産曰能人生始化曰魄林魄形也始化為形其神形曰魄此有生之初也魄普白反既生魄陽曰魂林魄屬靜主靜至靜生動陽也魄陽為氣其神氣曰魂此既生之後也用物精多則魂魄彊杜物權勢林居移氣故魂彊養移體故魄彊是以有精爽至於神明杜爽明也林精者神之未著爽者神之未融是以積精而至於神積爽而至於明匹夫匹婦彊死其魂魄猶能馮依於人以為淫厲杜彊死不病也人謂匹夫匹婦賤身彊其丈反馮皮水反下同況良霄我先君穆公之胄子良之孫子耳之子敝邑之卿從政三世矣林去疾輙良霄三世執鄭政鄭雖無腆杜腆厚也腆他典反抑諺曰蕞爾國蕞小貌蕭在最反而三世執其政柄其用物也宏矣其取精也多矣林其用權勢則甚宏大其致精爽則甚衆多其族又大所馮厚矣杜良霄魂魄所馮者貴重而彊死能為鬼不亦宜乎傳言子産之博敏子皮之族飲酒無度相尚以奢相困以酒故馬師氏與子皮氏有惡杜馬師氏公孫詛之子竿叔也襄三十年馬師頡出奔公孫詛代之為馬師與子皮俱同一族齊師還自燕之月杜在此年二月罕朔殺罕魋杜魋子皮弟魋徒曰反罕朔奔晉韓宣子問其位於子産杜問朔可使在何位子産曰君之羈臣林謂罕朔出奔乃晉君羈旅之臣苟得容以逃死何位之敢擇卿違從大夫之位杜謂以禮去者降位一等罪人以其罪降杜罪重則降多古之制也朔於敝邑亞大夫也其官馬師也杜大夫位馬師職獲戾而逃唯執政所寘之得免其死為恵大矣又敢求位宣子為子産之敏也使從嬖大夫杜嬖大夫下大夫也罕朔本亞大夫今從下大夫但降一等不以罪降為子于偽反秋八月衛襄公卒晉大夫言於范獻子曰衛事晉為睦杜睦和也晉不禮焉庇其賊人而取其地杜賊人孫林父其地戚也林謂襄二十六年晉疆戚田取懿氏邑六十以與林父庇必利反又音秘故諸侯貳詩曰䳭鴒在原兄弟急難杜詩小雅䳭鴒雖梁也飛則鳴行則採喻兄弟相救於急難不可自舍䳭精亦反鴒力丁反難如字又乃旦反又曰死喪之威兄弟孔懷杜威畏也言有死喪則兄弟宜相懷思兄弟之不睦於是乎不弔杜不相弔恤况逺人誰敢歸之今又不禮於衛之嗣嗣新君也衛必叛我是絶諸侯也獻子以告韓宣子宣子説使獻子如衛弔且反戚田傳言戚田所由還衛説音悦衛齊惡告喪于周且請命王使成簡公如衛弔杜簡公王卿士也且追命襄公曰叔父陟恪在我先王之左右以佐事上帝杜陟登也恪敬也帝天也叔父謂襄公命如今之哀策恪苦各反余敢忘髙圉亞圉二圉周之先也為殷諸侯亦受殷王追命者九月公至自楚孟僖子病不能相禮杜不能相禮答郊勞以此為已病相息亮反乃講學之杜講習也苟能禮者從之及其將死也杜二十四年孟僖子卒傳終言之召其大夫杜僖子屬大夫曰禮人之幹也無禮無以立林人之有禮如木之有幹人無禮無以立其身木無幹無以立其形吾聞將有達者曰孔丘杜僖子卒時孔丘年三十五聖人之後也杜聖人殷湯而滅於宋孔子六代祖孔父嘉為宋督所殺其子奔魯其祖弗父何以有宋而授厲公杜弗父何孔父嘉之高祖宋閔公之子厲公之兄何適嗣當立以讓厲公及正考父林弗父何之曽孫孔父嘉之父也佐戴武宣杜三人皆宋君三命兹益共杜三命上卿也言位髙益共故其鼎銘云杜考父廟之鼎一命而僂再命而傴三命而俯杜俯共於傴傴共於僂僂力主反傴紆羽反循牆而走杜言不敢妄行亦莫余敢侮杜其共如是亦不敢侮慢之饘於是鬻於是以餬余口杜於是鼎中為饘鬻饘鬻餬屬言至儉饘之然反鬻之六反孫炎云淖麇也餬音胡其共也如是臧孫紇有言杜紇武仲也曰聖人有明徳者若不當世其後必有達人杜聖人之後有明徳而不當大位謂正考父今其將在孔丘乎我若獲没杜得以壽終必屬説與何忌於夫子使事之杜説南宫敬叔何忌孟懿子皆僖子之子林夫子謂仲尼屬音燭而學禮焉以定其位杜知禮則位安故孟懿子與南宫敬叔師事仲尼仲尼曰能補過者君子也詩曰君子是則是效杜詩小雅孟僖子可則效已矣杜孟僖子能補過合此詩則效之義單獻公棄親用羈杜獻公周卿士單靖公之子頃公之孫羈寄客也單音善冬十月辛酉襄頃之族殺獻公而立成公杜襄公頃公之父成公獻公弟頃音傾十一月季武子卒晉侯謂伯瑕杜伯瑕士文伯曰吾所問日食從矣可常乎杜衛侯武子皆卒故林言我此年四月所問日食災福皆順從子之言可常必不差否對曰不可六物不同林嵗時日月星辰各異其時民心不壹杜政教殊事序不類杜有變易官職不則治官居職非一法同始異終胡可常也詩曰或燕燕居息或憔悴事國杜詩小雅林燕燕安閑貌言同為王臣或安閑而居息或憔悴以從國事憔在遙反詩作盡瘁其異終也如是公曰何謂六物對曰嵗時日月星辰是謂也公曰多語寡人辰而莫同何謂辰林言詳以告我凡謂之辰如北辰大辰之類其義莫同何者謂之辰語魚據反對曰日月之㑹是謂辰杜一嵗日月十二㑹所㑹謂之辰故以配日謂以子丑配甲乙衛襄公夫人姜氏無子杜姜氏宣姜嬖人婤姶生孟縶孔成子夢康叔謂已立元杜成子衛卿孔達之孫烝鉏也元孟縶弟夢時元未生婤音周又直周反姶烏答反縶張立反余使羈之孫圉與史苟相之杜羈烝鉏子苟史朝子羈居宜反相息亮反下同史朝亦夢康叔謂已余將命而子苟與孔烝鉏之曾孫圉相元史朝見成子告之夢夢協杜協合也晉韓宣子為政聘于諸侯之嵗在二年婤姶生子名之曰元孟縶之足不良弱行跛也孔成子以周易筮之曰元尚享衛國主其社稷杜令蓍辭林尚庶幾也言元庶幾享有衛國能主衛之社稷遇屯震下坎上屯屯張倫反又曰余尚立縶尚克嘉之林嘉善也庶幾縶能善於元遇屯之比杜坤下坎上比屯初九爻變比昆志反以示史朝史朝曰元亨又何疑焉北周易曰屯元亨亨許庚反成子曰非長之謂乎杜言屯之元亨謂年長非謂名元長丁丈反對曰康叔名之可謂長矣杜善之長也孟非人也將不列於宗不可謂長杜足跛非全人不可列為宗主且其繇曰利建侯杜繇卦辭繇直又反嗣吉何建建非嗣也林嗣子有常位故無所卜又無所建今以位不定卜嗣得吉則當從吉而建之也二卦皆云謂再得屯卦皆有建侯之文子其建之康叔命之二卦告之筮襲於夢武王所用也弗從何為杜外傳云大誓曰朕夢協朕卜襲於休祥戎商必克此武王辭弱足者居跛則偏弱居其家不能行侯主社稷臨祭祀奉民人事鬼神從㑹朝又焉得居各以所利不亦可乎孟跛利居元吉利建焉於䖍反故孔成子立靈公十二月癸亥葬衛襄公杜靈公元也左傳杜林合注巻三十六
