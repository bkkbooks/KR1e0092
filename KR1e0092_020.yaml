body:
  text: 左傳杜林合注卷二十明王道焜趙如源同編宣公三經乙丑十有三年春齊師伐莒夏楚子伐宋秋螽無傳為災故書冬晉殺其大夫先縠書名以罪討傳十三年春齊師伐莒莒恃晉而不事齊故也林莒近齊而不事齊故齊伐之夏楚子伐宋以其救蕭也林救蕭在前年君子曰清丘之盟唯宋可以免焉宋討陳之二今宋見伐晉衛不顧盟以恤宋而經同貶宋大夫傳嫌華椒之罪纍及其國故曰唯宋可以免秋赤狄伐晉及清先縠召之也杜邲戰不得志故召狄欲為變清一名清原冬晉人討邲之敗與清之師歸罪於先縠而殺之盡滅其族君子曰惡之來也已則取之其先縠之謂乎杜盡滅其族謂誅已甚故曰惡之來也林此言惡不積不足以滅身其先縠之謂也清丘之盟晉以衛之救陳也討焉杜尋清丘之盟以責衛使人弗去曰罪無所歸將加而師孔逹曰苟利社稷請以我説杜欲自殺以説晉林孔逹衛正卿使所吏反説音悅又如字罪我之由我則為政而亢大國之討將以誰任杜亢禦也謂禦宋討陳也亢苦浪反任音壬我則死之為明年殺孔逹傳經丙寅十有四年春衛殺其大夫孔逹書名背盟于大國之罪夏五月壬申曹伯夀卒杜無傳文十四年盟新城林文公卒子宣公廬立晉侯伐鄭秋九月楚子圍宋葬曹文公無傳冬公孫歸父會齊侯于榖傳十四年春孔逹縊而死衛人以説于晉而免以殺告故免于伐縊一賜反遂告于諸侯曰寡君有不令之臣逹搆我敝邑于大國既伏其罪矣敢告林言衛君有不美之臣孔逹使我衛國結怨于晉既伏其罪就刑辟矣杜諸殺大夫亦皆告衛人以為成勞復室其子杜以有平國之功故以女妻之復扶又反使復其位杜襲父祿位夏晉侯伐鄭為邲故也晉敗於邲鄭遂屬楚為于偽反告于諸侯搜焉而還搜簡閲車馬中行桓子之謀也曰示之以整使謀而來林言治兵示鄭人以整使鄭自謀而來服晉行户郎反鄭人懼使子張代子良于楚杜十二年子良質于楚子張穆公孫鄭伯如楚謀晉故也鄭以子良為有禮故召之杜有讓國之禮楚子使申舟聘于齊曰無假道於宋杜申舟無畏亦使公子馮聘于晉不假道于鄭申舟以孟諸之役惡宋文十年楚子田孟諸無畏扶宋公僕馮皮冰反惡烏路反曰鄭昭宋聾杜昭明也聾暗也聾力工反晉使不害我則必死林晉使不假道于鄭不害于事我使齊不假道于宋必為所殺使所吏反下同王曰殺女我伐之見犀而行杜犀申舟子以子託王示必死見女音汝賢遍反及宋宋人止之華元曰過我而不假道鄙我也鄙我亡也杜以我比其邊鄙是與亡國同過古卧反又古禾反殺其使者必伐我伐我亦亡也亡一也乃殺之楚子聞之投袂而起杜投振也袂袖也袂靣世反屨及於窒皇杜窒皇寢門闕屨九其反窒直結反劒及於寢門之外林劒及門外比窒皇又差逺車及於蒲胥之市林蒲胥楚市名屨及窒皇劒及寢門外車及楚市言其速也秋九月楚子圍宋冬公孫歸父會齊侯于榖見晏桓子與之言魯樂桓子告高宣子杜桓子晏嬰父宣子高固樂音洛曰子家其亡乎懷於魯矣子家歸父字懷思也懷必貪貪必謀人謀人人亦謀已一國謀之何以不亡杜一國之人畏其貪而皆謀之何以得不滅亡為十八年歸父奔齊傳孟獻子言於公曰臣聞小國之免於大國也聘而獻物杜物玉帛皮幣也於是有庭實旅百主人亦設籩豆百品實於庭以答賓朝而獻功杜獻其治國若征伐之功於牧伯於是有容貌采章嘉淑而有加貨容貌威儀容顔也采章車服文章也嘉淑令辭稱讃也加貨命宥幣帛也言往共則來報亦備謀其不免也誅而薦賄則無及也林誅責也杜薦進也見責而往則不足解罪今楚在宋君其圖之林君其圖謀所以自免公説杜為明年歸父會楚子傳説音悅經丁卯十有五年春公孫歸父會楚子于宋林吾大夫始特會楚夏五月宋人及楚人平杜平者總言二國和故不書其人林凡平不書必關天下之故也而後書文九年陳平不書宣十年鄭平不書昭二十四年宋嘗及楚平矣不書必莊王得宋天下將有南北之勢始書之六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸杜潞赤狄之别種潞氏國故稱氏子爵也林父稱師從告林林父稱師滅國之大夫猶貶也是故荀林父滅潞氏不書隨會滅申氏不書潞音路秦人伐晉無傳王札子殺召伯毛伯稱殺者名兩丁相殺之辭兩丁相殺則殺者有罪王札子王子札也蓋經文倒札字札側八反徐側乙反召上照反秋螽無傳螽音終仲孫蔑會齊高固于無婁無傳無婁杞邑初稅畝公田之法十取其一今又履其餘畝復十收其一故哀公曰二吾猶不足遂以為常故曰初稅始鋭反冬蝝生螽子以冬生遇寒而死故不成螽蝝稅全反字林尹絹反劉歆云蚍蜉子也董仲舒云蝗子飢風雨不和五稼不豐傳十五年春公孫歸父會楚子于宋杜終前年傳宋人使樂嬰齊告急于晉林楚自前年秋圍宋至今不解故使人告急于晉晉侯欲救之伯宗曰不可伯宗晉大夫古人有言曰雖鞭之長不及馬腹林捶馬不及其腹言非所當擊也天方授楚未可與爭雖晉之強能違天乎諺曰高下在心杜度時制宜川澤納汙林流水為川止水為澤汙濁之水無不容納汙音烏山藪藏疾杜山之有林藪毒害者居之藪素口反瑾瑜匿瑕杜匿亦藏也雖美玉之質亦或居藏瑕穢瑾其斳反瑜羊朱反匿女力反國君含垢杜忍垢恥垢古口反本或作詬音同天之道也晉侯恥不救宋故伯宗為説小惡不損大德之喻君其待之杜待楚衰乃止使解揚如宋使無降楚曰晉師悉起將至矣鄭人囚而獻諸楚楚子厚賂之使反其言杜反言晉不救解音蟹降户江反不許三而許之登諸樓車使呼宋人而告之杜樓車車上望櫓遂致其君命林解揚既見宋人遂以晉君悉師將至之命致之楚子將殺之使與之言曰爾既許不榖而反之何故非我無信女則棄之速即爾刑對曰臣聞之君能制命為義臣能承命為信信載義而行之為利謀不失利以衛社稷民之主也林為人君者能制作命令是為合宜之義為人臣者能承順命令是為共時之信以臣之信載君之義而行之是為國家無疆之利人臣謀國而不失以信載義之利以扞衛其社稷如此則可為萬民之主女音汝義無二信欲為義者不行兩信信無二命欲行信者不受二命君之賂臣不知命也受命以出有死無霣林楚子之賂解揚是不知制命之義也臣受君命以出奉使有死而已不敢廢隊杜霣廢隊也霣于敏反又可賂乎臣之許君以成命也杜成其君命死而成命臣之祿也林為臣而不辱君命以死是能享其天祿也寡君有信臣杜已不廢命下臣獲考杜考成也死又何求楚子舍之以歸林以解揚歸于晉夏五月楚師將去宋在宋積九月不能服宋故申犀稽首於王之馬前曰毋畏知死而不敢廢王命林申犀申舟之子母畏申舟名也君前臣名故名其父王棄言焉王不能答杜未服宋而去故曰棄言申叔時僕杜僕御車曰築室反耕者宋必聽命從之杜築室于宋分兵歸田示無去志王從其言宋人懼使華元夜入楚師登子反之牀起之曰寡君使元以病告杜兵法因其鄉人而用之必先知其守將左右謁者門者舍人之姓名因而利道之華元蓋用此術得以自通曰敝邑易子而食析骸以㸑杜㸑炊也析思歷反骸户皆反本一作骨㸑七亂反雖然城下之盟有以國斃不能從也杜寧以國斃不從城下盟斃婢世反去我三十里唯命是聽子反懼林子反既為所劫又聞其辭強故懼與之盟而告王退三十里宋及楚平華元為質盟曰我無爾詐爾無我虞杜楚不詐宋宋不備楚盟不書不告質音致潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目杜酆舒潞相酆芳忠反晉侯將伐之諸大夫皆曰不可酆舒有三雋才杜雋絶異也言有才藝勝人者三雋音俊不如待後之人伯宗曰必伐之狄有五罪雋才雖多何補焉不祀一也耆酒二也棄仲章而奪黎氏地三也杜仲章潞賢人也黎氏黎侯國上黨壺國縣有黎亭耆市志反黎禮兮反虐我伯姬四也傷其君目五也怙其雋才而不以茂德茲益罪也後之人或者將敬奉德義以事神人而申固其命杜審其政令若之何待之不討有罪曰將待後後有辭而討焉毋乃不可乎夫恃才與衆亡之道也商紂由之故滅杜由用也天反時為災杜寒暑易節地反物為妖杜羣物失信民反德為亂亂則妖災生林人有禍亂故羣物失信之妖寒暑失節之災並生焉故文反正為乏盡在狄矣林文字反其正則為乏字災妖亂乏之理盡在狄矣晉侯從之六月癸卯晉荀林父敗赤狄于曲梁辛亥滅潞杜曲梁今廣平曲梁縣也書癸卯從赴酆舒奔衛衛人歸諸晉晉人殺之王孫蘇與召氏毛氏爭政杜三人皆王卿士使王子捷殺召戴公及毛伯衛杜王子捷即王世子卒立召襄杜襄召戴公之子林不絶召伯之後秋七月秦桓公伐晉次于輔氏杜晉地壬午晉侯治兵于稷以略狄土杜略取也稷晉地河東聞喜縣西有稷山壬午七月二十九日晉時新破狄土地未安權秦師之弱故别遣魏顆距秦而東行定狄地立黎侯而還杜狄奪其地故晉復立之及雒魏顆敗秦師于輔氏杜晉侯還及雒也雒晉地獲杜回秦之力人也初魏武子有嬖妾無子武子疾命顆曰必嫁是武子魏犨顆之父嬖必計反疾病則曰必以為殉及卒顆嫁之曰疾病則亂吾從其治也林言疾病則神昏亂我從其治命也殉似俊反本或作必以殉治直吏反下同及輔氏之役顆見老人結草以亢杜回杜亢禦也亢苦浪反杜回躓而顛林杜回履之而躓失足以仆于地躓陟吏反徐丁四反故獲之夜夢之曰余而所嫁婦人之父也杜而女也爾用先人之治命余是以報杜傳舉此以示報晉侯賞桓子狄臣千室林以狄臣千家賞荀林父亦賞士伯以瓜衍之縣杜士伯士貞子衍以善反曰吾獲狄土子之功也微子吾喪伯氏矣杜伯桓子字邲之敗晉侯將殺林父士伯諌而止喪息浪反羊舌職説是賞也杜職叔向父林以是賞典為可喜悅説音悅曰周書所謂庸庸祗祗者謂此物也夫杜周書康誥庸用也祗敬也物事也言文王能用可用敬可敬夫音扶士伯庸中行伯杜言中行伯可用君信之亦庸士伯此之謂明德矣文王所以造周不是過也故詩曰陳鍚載周能施也杜錫賜也詩大雅言文王布陳大利以賜天下故能載行周道福流子孫施式䜴反率是道也其何不濟晉侯使趙同獻狄俘于周不敬劉康公曰不及十年原叔必有大咎杜劉康公王季子也原叔趙同也俘芳夫反不敬一本作而傲天奪之魄矣杜心之精爽是謂魂魄為成八年晉殺趙同傳初稅畝非禮也林非取民之禮也榖出不過藉周法民耕百畝分田十畝借民力而治之稅不過此以豐財也林百姓足君孰與不足此豐財之道也冬蝝生飢幸之也蝝未為災而書之者幸其冬生不為物害時歲雖飢猶喜而書之經戊辰十有六年春王正月晉人滅赤狄甲氏及留吁杜甲氏留吁赤狄别種晉既滅潞氏今又并盡其餘黨士會稱人從告吁况于反夏成周宣榭火杜傳例曰人火之也成周洛陽宣榭講武屋别在洛陽者爾雅曰無室曰榭謂屋歇前秋郯伯姬來歸郯音談冬大有年無傳傳十六年春晉士會帥師滅赤狄甲氏及留吁鐸辰杜鐸辰不書留吁之屬鐸待洛反三月獻狄俘杜獻于王也晉侯請于王戊申以黻冕命士會將中軍且為太傅杜代林父將中軍且加以太傅之官黻冕命卿之服太傅孤卿黻音弗將子匠反大音泰於是晉國之盜逃奔于秦羊舌職曰吾聞之禹稱善人不善人逺此之謂也夫林言夏禹舉用善人不善之人自然逺去晉用士會亦猶禹之用善也夫逺于萬反夫音扶詩曰戰戰兢兢如臨深淵如履薄冰善人在上也杜言善人居位則無不戒懼兢居陵反本亦作矜善人在上則國無幸民林賞不僭刑不濫也諺曰民之多幸國之不幸也是無善人之謂也林賞僭則及淫人刑濫則及善人此國家之不幸也是無善人在上位之謂也諺音彥夏成周宣榭火人火之也凡火人火曰火天火曰災秋郯伯姬來歸出也林伯姬魯女嫁郯者被出故大歸也為毛召之難故王室復亂杜毛召難在前年林毛召之黨欲報仇故復亂為于偽反難乃旦反復扶又反王孫蘇奔晉晉人復之杜毛召之黨欲討蘇氏故出奔冬晉侯使士會平王室定王享之原襄公相禮杜原襄公周大夫相佐也相息亮反殽蒸杜蒸升也升殽于俎殽户交及蒸之承反武季私問其故杜享當體薦而殽蒸故怪問之武士會諡季其字王聞之召武子曰季氏而弗聞乎王享有體薦杜享則半解其體而薦之所以示其儉宴有折俎杜體解節折升之於爼物皆可食所以示慈惠也折之設反公當享卿當宴王室之禮也杜公謂諸侯林言士會卿也雖享亦當用宴禮武子歸而講求典禮以修晉國之法杜傳言典禮之廢久經己巳十有七年春王正月庚子許男錫我卒杜無傳再與文同盟林昭公卒靈公立錫星歷反丁未蔡侯申卒杜無傳未同盟而赴以名丁未四月四日林文公卒子景侯固立夏葬許昭公無傳葬蔡文公無傳六月癸卯日有食之無傳不書朔官失之己未公會晉侯衛侯曹伯邾子同盟于斷道杜斷道晉地林同盟至新城而再見斷道之後不曰同盟者寡矣斷直管反一音短秋公至自會無傳冬十有一月壬午公弟叔肸卒杜傳例曰公母弟肸許乙反傳十七年春晉侯使郤克徴會于齊徵召也欲為斷道會齊頃公帷婦人使觀之郤子登婦人笑於房林帷幕帟也穀梁謂婦人乃蕭同叔子頃公之母杜跛而登階故笑之頃音傾獻子怒出而誓曰所不此報無能涉河不復渡河而東獻子先歸林獻子即郤克使欒京廬待命于齊曰不得齊事無復命矣杜欒京廬郤克之介使得齊之罪乃復命廬音盧又力於反郤子至請伐齊晉侯弗許請以其私屬又弗許杜私屬家衆也為成二年戰于鞍傳齊侯使高固晏弱蔡朝南郭偃會杜晏弱桓子林齊侯不出故使四子往會斷道朝如字及斂盂高固逃歸杜聞郤克怒故斂徐音亷一音力漸反盂音于夏會于斷道討二也盟于卷楚杜卷楚即斷道卷音權一音居免反辭齊人晉人執晏弱于野王執蔡朝于原執南郭偃于溫杜執三子不書非卿野王縣今屬河內苗賁皇使見晏桓子杜賁皇楚鬬椒之子楚滅鬬氏而奔晉食邑于苗地晏弱時在野王故因使而見之賁扶云反使所吏反下同歸言於晉侯曰夫晏子何罪昔者諸侯事吾先君皆如不逮杜言汲汲也逮音代或大計反舉言羣臣不信諸侯皆有二志杜舉亦皆也齊君恐不得禮杜不見禮待故不出而使四子來左右或沮之杜沮止也沮在吕反曰君不出必執吾使故高子及斂盂而逃夫三子者曰若絶君好寧歸死焉林寧來會而歸死於晉好呼報反為是犯難而來吾若善逆彼杜彼齊三人為于偽反難乃旦反以懷來者杜以綏懷諸侯來歸于我者吾又執之以信齊沮林以信齊人沮止三子之言吾不既過矣乎過而不改而又久之以成其悔何利之有焉林久執三子以成三子悔來之心則于晉國亦何利益之有使反者得辭杜反者高固謂得不當來之辭而害來者以懼諸侯將焉用之晉侯緩之逸杜緩不拘執使得逃去也傳言晉不能修禮諸侯所以二焉於虔反秋八月晉師還林君行師從故斷道盟歸稱晉師還范武子將老杜老致仕初受隨故曰隨武子後更受范復為范武子召文子曰燮乎吾聞之喜怒以類者鮮杜文子士會之子燮其名燮素協反鮮息淺反易者實多杜易遷怒也詩曰君子如怒亂庶遄沮君子如祉亂庶遄已杜詩小雅也遄速也沮止也祉福也林如而也遄市專反祉音恥君子之喜怒以已亂也弗已者必益之郤子其或者欲已亂於齊乎不然余懼其益之也林懼郤克畜憾日深必且增益禍亂於齊余將老使郤子逞其志庶有豸乎杜豸解也欲使郤子從政快志以止亂豸本又作鳴直是反或音居牛反非也爾從二三子唯敬杜二三子晉諸大夫乃請老郤獻子為政冬公弟叔肸卒公母弟也凡大子之母弟公在曰公子不在曰弟林父在則以父為尊故稱公子父不在則以兄為尊故稱弟凡稱弟皆母弟也杜此策書之通例也庶弟不得稱公弟而母弟或稱公子若嘉好之事則仍舊史之文唯相殺害然後據例以示義所以篤親親之恩崇友于之好釋例論之備矣經庚午十有八年春晉侯衛世子臧伐齊郎臧子反公伐杞林無傳自是內不書君將征伐在大夫也宣公而下征伐在大夫是故自伐邾取繹凡取皆不書其人自伐杞凡伐皆不書公夏四月秋七月邾人戕鄫子于鄫傳例曰自外曰戕邾大夫就鄫殺鄫子戕在良反徐在精反鄫才陵反甲戌楚子旅卒林莊王卒子共王立楚始書卒杜宋同盟而赴以名吳楚之葬僭而不與故絶而不書同之夷蠻以懲求名之偽公孫歸父如晉冬十月壬戌公薨于路寢歸父還自晉至笙遂奔齊大夫還不書春秋之常也今書歸父還奔善其能以禮退不書族者非常所及今特書略之笙魯竟也故不言出笙音生徐又勑貞反傳十八年春晉侯衛大子臧伐齊林大子臧穆公子至于陽榖齊侯會晉侯盟于繒以公子疆為質于晉晉師還蔡朝南郭偃逃歸杜晉既興齊盟守者解緩故得逃繒才陵反質音致夏公使如楚乞師欲以伐齊杜公不事齊齊與晉盟故懼而乞師于楚不書微者行秋邾人戕鄫子于鄫凡自虐其君曰弒自外曰戕杜弒戕皆殺也所以别內外之名弒者積微而起所以相測量非一朝一夕之漸戕者卒暴之名楚莊王卒楚師不出既而用晉師杜成二年戰于鞍楚於是乎有蜀之役杜在成二年冬蜀魯地泰山博縣西北有蜀亭公孫歸父以襄仲之立公也有寵歸父襄仲子欲去三桓以張公室時三桓強公室弱故欲去之以張大公室去起吕反張如字一音陟亮反與公謀而聘于晉欲以晉人去之林欲藉晉之力以去三桓冬公夢季文子言於朝曰使我殺適立庶以失大援者仲也夫適謂子惡齊外甥襄仲殺之而立宣公南通于楚既不能固又不能堅事齊晉故云失大援也林季文子怨歸父欲去三桓故借此以為之罪適丁歷反援于眷反夫音扶臧宣叔怒曰當其時不能治也後之人何罪子欲去之許請去之杜宣叔文仲子武仲父許其名也時為司冦主行刑言子自以歸父害巳欲去者許請為子去之遂逐東門氏襄仲居東門故曰東門氏子家還及笙杜子家歸父字壇帷復命於介杜除地為壇而張帷介副也將去使介反命於君壇音善介音界既復命袒括髮林袒衣以麻約髮從初喪之服袒音但括古活反即位哭三踊而出杜依在國喪禮設哭位公薨故遂奔齊書曰歸父還自晉善之也左傳杜林合注卷二十
