  - {type: page-break, offset: 0, content: '', id: KR1e0092_WYG_037-1a, image: WYG0171/WYG0171-0737a.png}
body:
  text: 趙如源同編昭公四經丁卯八年春陳侯之弟招殺陳世子偃師以首惡從殺例故稱弟又稱世子招常遙反夏四月辛丑陳侯溺卒杜襄二十七年大夫盟于宋林哀公卒是年滅陳十三年楚平王復封陳惠公吳立叔弓如晉楚人執陳行人于徵師殺之稱行人明非行人罪于古舟反陳公子留出奔鄭留為昭所立未成君而出奔秋搜于紅杜革車千乘不言大者經文闕也紅魯地沛國蕭縣西有紅亭逺疑林書搜始此搜狩不書必違禮而後書於是舍中軍四分公室季氏擇一二子各一皆盡征之而貢於公搜于紅地自根牟至于商衛革車千乘皆三家之師也自是以屢搜三家所以輝武焉爾是故桓莊之狩必言公昭定之搜不言公矣搜所求反紅户東反陳人殺其大夫公子過與招共殺偃師書名罪之過古禾反大雩無傳不旱而秋雩過也冬十月壬午楚師滅陳杜不稱將帥不以告壬午月十八日執陳公子招放之于越無傳復稱公子兄已卒殺陳孔奐無傳招之黨楚殺之奐呼亂反葬陳哀公嬖人袁克葬之魯往會故書傳八年春石言于晉魏榆林晉魏邑之榆地有石忽作人言晉侯問於師曠曰石何故言對曰石不能言或馮焉杜謂有精神馮依石而言馮皮氷反不然民聽濫也林濫夫也謂石本不言民聽之失妄為言也抑臣又聞之抑疑辭曰作事不時林興作土木之事妨害民時怨讟動于民則有非言之物而言林乖氣致異時則有不能言之物而作人言讟徒木反今宫室崇侈民力雕盡杜雕傷也怨讟並作莫保其性性命也民不敢自保其性命石言不亦宜乎於是晉侯方築虒祈之宫杜虒祈地名在絳西四十里臨汾水虒音斯叔向曰子野之言君子哉杜子野師曠字君子之言信而有徵故怨逺于其身杜怨咎逺其身也逺于萬反小人之言僭而無徵故怨咎及之詩曰哀哉不能言匪舌是出唯躬是瘁杜詩小雅也不能言謂不知言理以嘗言見退者其言非不從舌出以僭而無知自取瘁病故哀之僭子念反出如字又尺遂反哿矣能言巧言如流俾躬處休其是之謂乎杜哿嘉也巧言如流謂非正言而順敘以聽言見答者言其可嘉以信而有徵自取安逸師曠此言緣問流轉終歸于諫故以比巧言如流也當叔向時詩義如此故與今説詩者小異哿古可反毛詩傳云可也是宫也成諸侯必叛君必有咎夫子知之矣謂十年晉侯彪卒傳陳哀公元妃鄭姬生悼太子偃師杜元妃嫡夫人也二妃生公子留下妃生公子勝二妃嬖留有寵屬諸司徒招與公子過杜招及過皆哀公弟也屬音燭哀公有廢疾三月甲申公子招公子過殺悼太子偃師而立公子留夏四月辛亥哀公縊杜憂患自縊經書辛丑從赴縊一䜴反干徵師赴于我于徵師陳大夫且告有立君公子勝訴之于楚杜以招過殺偃師告訴也楚人執而殺之殺于徵師公子留奔鄭書曰陳侯之弟招殺陳世子偃師罪在招也林言招有專殺之非楚人執陳行人于徵師殺之罪不在行人也疑為招赴楚當同罪故重發之叔弓如晉賀虒祁也賀宫成遊吉相鄭伯以如晉亦賀虒祁也史趙見子大叔曰甚哉其相蒙也杜蒙欺也林言鄭伯來賀宫成實甚相欺相鄭息亮反可弔也而又賀之杜窮土木興怨謗是可弔也子大叔曰若何弔也其非唯我賀將天下實賀杜言諸侯畏晉非獨鄭秋大搜于紅自根牟至于商衛革車千乘杜大搜數軍實簡車馬也根牟魯東界琅琊陽都縣有牟鄉商宋地魯西竟衛宋衛也言千乘明大搜且見魯衆之大數也乘繩證反七月甲戌齊子尾卒子旗欲治其室杜子旗樂施也欲并治子尾之家政丁丑殺梁嬰梁嬰子尾家宰八月庚戌逐子成子工子車杜三子齊大夫子尾之屬子成頃公子固也子工成之弟鑄也子車頃公之孫捷也皆來奔杜不書非鄉而立子良氏之宰杜子良子尾之子髙強也于旗為子良立宰其臣曰杜子尾之家臣孺子長矣杜孺子謂子良長丁丈反而相吾室欲兼我也杜兼拜也授甲將攻之陳桓子善於子尾亦授甲將助之林陳桓子亦授甲於其家之徒衆將助子尾氏以攻子旗或告子旗子旗不信則數人告將往又數人告於道林子旗不信或人之言則數人接續來告子旗將往子尾氏之家又數人接續告變於道路數色主反下同遂如陳氏桓子將出矣聞之而還杜聞子旗至遊服而逆之杜去戎備著常遊戲之衣請命杜問桓子所至對曰聞強氏授甲將攻子子聞諸林強氏即髙強子良也子謂子旗曰弗聞子盍亦授甲無宇請從林桓子詐謂子旗子何不亦授甲我請從子攻強氏杜無宇桓子名盍胡臘反下同從才用反子旗曰子胡然彼孺子也吾誨之猶懼其不濟吾又寵秩之謂為之立宰其若先人何林先人謂子尾子雅先世相好今若相攻何以見其先人子盍謂之杜謂之使無攻我周書曰惠不惠茂不茂杜周書康誥也言當施惠於不患者勸勉於不勉者茂勉也康叔所以服宏大也杜服行也桓子稽顙曰頃靈福子林頃公靈公欒氏所事之君言其降福於子稽音啓吾猶有望杜望子旗惠及已遂和之如初杜和欒髙二家陳公子招歸罪於公子過而殺之杜言招所以不死而得放九月楚公子棄疾帥師奉孫吳圍陳杜孫吳悼太子偃師之子惠公宋戴惡會之戴惡宋大夫冬十一月壬午滅陳壬午十月十八日傳言十一月誤輿嬖袁克殺馬毁玉以葬輿衆也袁克嬖人之貴者欲以非禮厚葬哀公楚人將殺之請置之林袁克請置馬玉不用既又請私林既置馬王袁克又請私盡君臣恩私於幄加絰於顙而逃杜幄帳也逃不欲為楚臣幄於角反絰直結反使穿封戎為陳公杜戌楚大夫滅陳為縣使戍為縣公戌音恤曰城麇之役不諂杜城麇役在襄二十六年戌與靈王爭皇頡麇九倫反諂敇檢反侍飲酒於王王曰城麇之役女知寡人之及此女其辟寡人乎杜及此謂為王女音汝下同對曰若知君之及此臣必致死禮以息楚杜息寧靜也林言若蚤知靈王篡位為寧君我必為郟敖盡臣禮致死以殺君以息楚國之禍晉侯問於史趙曰陳其遂亡乎對曰未也公曰何故對曰陳顓頊之族也陳祖舜舜出顓頊嵗在鶉火林歲歲星也鶉火南方栁星午位鶉市春反是以卒滅陳將如之杜顓頊氏以嵗在鶉火而滅火盛而水滅林陳顓頊之後將如顓頊之數今在析木之津猶將復由杜箕斗之間有天漢故謂之析木之津由用也林今嵗星在寅位故陳猶將復用且陳氏得政于齊而後陳卒亡杜物莫能兩盛林齊陳氏乃陳敬仲之後自幕至于瞽瞍無違命幕舜之生瞽瞍舜父從幕至瞽瞍間無違天命廢絶者瞍素口反舜重之以明德置德於遂遂舜後蓋殷之興存舜之後而封遂言舜德乃至於遂重直用反遂世守之及胡公不淫故周賜之姓使祀虞帝杜胡公滿遂之後也事周武王賜姓曰媯封諸陳紹舜後臣聞盛德必百世祀虞之世祀未也繼守將在齊林自舜至今未及百世之數繼陳以守舜之祀者必將在齊其兆既存矣言陳氏興盛於齊形兆已見經戊辰九年春叔弓會楚子于陳杜以事往非行會禮林於是叔弓及宋華亥鄭遊吉衛趙黶會楚子于陳諸夏之大夫旅見於楚於是始舉魯以見其餘也許遷于夷許畏鄭欲遷故以自遷為文夏四月陳災天火曰災陳既已滅降為楚縣而書陳災者猶晉之梁山沙鹿崩不書晉災害繫於所災所害故以所在為名秋仲孫貜如齊貜居縳反冬築郎囿林囿苑也築苑于郎也傳九年春叔弓宋華亥鄭遊吉衛趙黶會楚子于陳楚子在陳故四國大夫往非盟主所召不行會神故不總書黶於滅反二月庚申楚公子棄疾遷許于夷實城父此時改城父為夷故傳實之城父縣屬譙郡取州來淮北之田以益之益許田伍舉授許男田然丹遷城父人於陳林伍舉奉新國之土地圖籍以授之許男然丹即右尹子華楚以城父之地遷許又遷城父人于陳故地以夷濮西田益之以夷田在濮水西者與城父人濮音卜遷方城外人於許杜成十五年許遷於葉因謂之許今許遷於夷故以方城外人實其處傳言靈王使民不安周甘人與晉閻嘉爭閻田杜甘人甘大夫襄也閻嘉晉閻縣大夫閻以廉反晉梁丙張躍率隂戎伐潁杜隂戎陸渾之戎潁周邑躍他厯反王使詹桓伯辭於晉杜辭責讓之桓伯周大夫曰我自夏以后稷魏駘芮岐畢吾西土也杜在夏世以后稷功受此五國為西土之長駘在始平武功縣所治釐城岐在扶風美陽縣西北駘他來反依字應作郃芮如鋭反及武王克商蒲姑商奄吾東土也林二國在東方杜樂安博昌縣北有蒲姑城蒲如字一音薄奄於檢反巴濮楚鄧吾南土也林四國在南方蕭慎燕亳吾北土也林三固在北方杜肅慎北夷在玄莵北三千餘里燕於賢反亳步各反吾何邇封之有杜邇近也林我周封疆外薄四海何近之有文武成康之建母弟以蕃屏周亦其廢隊是為為後世廢隊兄弟之國當救濟之蕃方元反屏必井反隊直類反為于偽反豈如辨髦而因以敝之林童子辨髦始冠必以辨蓋緇布冠也故謂之辨髦既三加冠成禮而棄其始冠緇布之冠永不復用故言因以敝之辨皮彥反髦音毛先王居檮杌于四裔以禦螭魅言檮杌略舉四凶之一下言四裔則三苖在其中螭敇知反故允姓之姦居于瓜州杜允姓隂戎之祖與三苖俱放三危者瓜州今敦煌伯父惠公歸自秦而誘以來杜僂十五年晉惠公自秦歸二十三年秦晉遷陸渾之戎於伊川使逼我諸姬入我郊甸林邑外為郊郊外為甸言戎取周郊甸之地則戎焉取之林若非惠公誘戎則戎安得取周之地馬於虔反又如字戎有中國誰之咎也杜咎在晉后稷封殖天下今戎制之不亦難乎杜后稷修封疆殖五穀今戎得之唯以畜牧殖時力反伯父圖之我在伯父猶衣服之有冠冕木水之有本原民人之有謀主也杜民人謀主宗族之師長林衣服必有冠冕然後貴重木水必有本原然後久長民人必有宗族師長然後親疏長幼各得其序伯父若裂冠毁冕拔本塞原専棄謀主雖戎狄其何有余一人杜伯父猶然則雖戎狄無所可責晉率陰戎伐周邑故云然林余一人周王自稱也叔向謂宣子曰文之伯也豈能改物杜言文公雖霸未能改正朔易服色伯如字又音霸翼戴天子而加之以共杜翼佐也自文以來世有衰德而暴滅宗周杜宗周天子以宣示其侈諸侯之二不亦宜乎且王辭直子其圖之宣子説王有姻喪杜外親之喪説音悅使趙成如周弔且致閻田與襚杜趙城中軍佐林襚送死衣襚音遂反潁俘王亦使賔滑執甘大夫襄以説於晉晉人禮而歸之賔滑周大夫俘芳夫反滑乎八反説如字又音悅夏四月陳災鄭禆竈曰五年陳將復封封五十二年而遂亡子産問其故對曰陳水屬也杜陳顓頊之後故為水屬火水妃也火畏水故謂之妃妃芳非反一音配而楚所相也相治也楚之先祝融為髙辛氏火正主治火事相息亮反今火出而火陳杜火心星也火出於周為五月而以四月出者以長厯推前年誤置閻逐楚而建陳也水得妃而興陳興則楚哀故曰逐楚而建陳妃以五成故曰五年妃合也五行各相妃合得五而成故五嵗而陳復封為十三年陳侯吳歸于陳傳妃音配嵗五及鶉火而後陳卒亡楚克有之天之道也故曰五十二年杜是嵗嵗在星紀五嵗及大梁而陳復封自大梁四嵗而及鶉火後四周四十八嵗凡五及鶉火五十二年天數以五為紀故五及鶉火火盛水衰晉荀盈如齊逆女杜自為逆還六月卒于戲陽杜魏郡內黃縣北有戲陽城戲許宜反殯于絳未葬晉侯飲酒樂膳宰屠蒯趨入請佐公使尊杜公之使人執尊酌酒請為之佐樂音洛蒯苦怪反使如字又所吏反許之杜公許之而遂酌以飲工林工樂師師曠也屠蒯酌酒飲之以示罰飲於鵊反下同曰女為君耳將司聰也樂所以聰耳女音汝下皆同辰在子卯謂之疾日杜疾日謂紂以甲子喪桀以乙卯日亡故國君以為忌日君徹宴樂學人舍業林學人謂習樂之人舍音捨為疾故也君之卿佐是謂股肱股肱或虧林苟盈死喪如股肱虧損為子偽反下為是同何痛如之杜言痛疾過於忌日女弗聞而樂是不聰也杜不聞是義而作樂又飲外嬖嬖叔杜外都大夫之嬖者曰女為君目將司明也杜職在外故主視服以旌禮林衣服精粗所以旌表吉凶之禮禮以行事林禮節輕重所以推行政令之事事有其物林物類也奉承其事各從其類如辨冕為吉衰麻為凶之類物有其容林容貌也服從其物各動其容如辨冕執敬衰麻執哀之類今君之容非其物也杜有卿佐之喪而作樂歡會故曰非其物而女不見是不明也亦自飲也曰味以行氣氣以實志林滋味調和所以食人行其氣血氣血平和所以悅人實其志慮志以定言在心為志發口為言言以出令臣實司味二御失官而君弗命臣之罪也杜工與嬖叔侍御君者失官不聰明公説徹酒初公欲廢知氏而立其外嬖為是悛而止林知氏即荀氏説音悅知音智悛七全反秋八月使荀躒佐下軍以説焉杜躒荀盈之子知文子也佐下軍代父也説自解説躒力伙反徐音洛孟僖子如齊殷聘禮也杜自叔老聘齊至今二十年禮意久曠今修盛聘以無忘舊好故曰禮冬築郎囿書時也季平子欲其速成也叔孫昭子曰詩曰經始勿亟庶民子來杜詩大雅言文王始經營靈臺非急疾之衆民自以子義來勸樂為之亟紀力反焉用速成其以勦民也杜勦勞也焉於虔反勦初交反又豫小反無囿猶可無民其可乎經已巳十年春王正月夏齊欒施來奔耆酒好內以取敗亡故書名秋七月季孫意如叔弓仲孫貜帥師伐莒杜三大夫皆卿故書之季孫為主二子從之林舍中軍矣曷為書三卿帥師四分公室叔弓為意如伐也內取邑悉書也於是取郠不書取邑不足詳也由是定六年取鄭匡不書哀元年取晉蒲棘不書戊子晉侯彪卒杜五同盟林平公卒子昭公夷立彪彼蚪反九月叔孫婼如晉葬晉平公三月而葬速十有二月甲子宋公成卒杜十一同盟也無冬史闕文林平公卒子元公佐立成音城傳十年春王正月有星出于婺女杜客星也不書非孛婺武付反鄭禆竈言于子産曰七月戊子晉君將死今兹嵗在顓頊之虛嵗嵗星也顓頊之虛謂玄枵禆婢支反虛起魚反薑氏任氏實守其地薑齊姓任薛姓齊薛二國守玄枵之地任音壬居其維首而有妖星焉告邑薑也林客星居玄枵之維首客星出非其地故曰妖星邑薑齊大公女晉唐叔之母星占婺女為既嫁之女織女為處女邑薑齊之既嫁女妖星在婺女齊得嵗故知禍歸邑薑邑薑晉之妣也天以七紀二十八宿四七戊子逢公以登星斯於是乎出林逢公殷諸侯居齊地者會以戊子日卒登卒也逢公未死之先妖星出婺女時非嵗星所在故齊自當禍而以戊子日卒吾是以譏之杜為晉侯彪卒傳齊惠欒髙氏皆耆酒杜樂髙二族皆出惠公信內多怨杜説婦人言故多怨強於陳鮑氏而惡之杜惡陳鮑惡烏路反夏有告陳桓子曰子旗林即欒施子雅之子也子良林即髙強子尾之子也將攻陳鮑亦告鮑氏桓子授甲而如鮑氏遭子良醉而騁杜欲及子良醉故驅告鮑文子騁敕應反遂見文子杜文子鮑國則亦授甲矣使視二子杜二子子旗子良則皆將飲酒桓子曰彼雖不信杜彼傳言者聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒髙氏子良曰先得公陳鮑焉往林髙強欲先得公以自輔助陳鮑失公其將安往言必敗也焉於虔反下焉歸同遂伐虎門杜欲入公不聽故伐公門林寢門書虎故曰虎門晏平仲端委立于虎門之外杜端委朝服四族召之無所往杜四族欒髙陳鮑其徒曰助陳鮑乎曰何善焉杜言無善義可助助欒髙乎曰庸愈乎杜罪惡不差於陳鮑然則歸乎曰君伐焉歸公召之而後入公卜使王黑以靈姑銔率吉請斷三尺焉而用之杜王黑齊大夫靈姑銔公旗名斷三尺不敢與君同銔扶屆反又音平率所律反徐所類反斷丁管反五月庚辰戰于稷杜稷祀后稷之處稷地名六國時齊有稷下館欒髙敗又敗諸莊莊六軌之道國人追之杜國人助公追欒髙之師又敗諸鹿門鹿門齊城門欒施髙強來奔髙強不書非卿陳鮑分其室晏子謂桓子必致諸公讓德之主也讓之謂懿德凡有血氣皆有爭心故利不可強杜不可強取強其丈反思義為愈義利之本也杜見利思義乃為愈勝行義則有自然之利是利之本也蕰利生孽蕰畜也孽妖害也蕰紆粉反孽魚列反姑使無蕰乎可以滋長桓子盡致諸公而請老于莒杜莒齊邑長丁丈反桓子召子山子山子商子周襄三十一年子尾所逐羣公子私具幄幕器用從者之衣屨杜私具不告公幄於角反從才用反而反棘焉杜棘子山故邑齊國西安縣東有于里亭子商亦如之而反其邑子周亦如之而與之夫于杜子周本無邑故更與之濟南於陵縣西北有于亭反子城子公公孫捷三子八年子旗所逐而皆益其祿凡公子公孫之無祿者私分之邑杜桓子以已邑分之國之貧約孤寡者私與之粟曰詩云陳錫載周能施也杜詩大雅言文王能布陳大利以賜天下行之周遍載如字詩作哉施始䜴反桓公是以霸杜齊桓公亦能施以致霸公與桓子莒之旁邑辭杜讓不受穆孟姬為之請髙唐陳氏始大杜穆盂姬景公母傳言陳氏所以興為于偽反秋七月平子伐莒取郠林平子即季孫意如郠莒邑取郠不書公見討平丘諱之郠古杏反獻俘始用人於亳社杜以人祭殷社林亳社殷社魯有殷社所謂兩社是也俘芳夫反臧武仲在齊聞之曰周公其不享魯祭乎周公享義魯無義林周公之所歆享者義也魯殺人以祭是為無義詩曰德音孔昭視民不佻杜詩小雅佻偷也言明德君子必愛民林言君子德聲孔甚昭明視民如傷不敢偷薄佻他雕反佻之謂甚矣而一用之將誰祠哉杜臺同也同人於畜牲戊子晉平公卒如禆竈之言鄭伯如晉及河晉人辭之遊吉遂如晉杜禮諸侯不相弔故辭九月叔孫婼齊國弱宋華定衛北宫喜鄭罕虎許人曺人莒人邾人滕人薛人杞人小邾人如晉葬平公也經不書諸侯大夫者非盟會鄭子皮將以幣行杜見新君之贄子産曰喪焉用幣用幣必百兩杜載幣用車百乘焉於虔反百兩必千人千人至將不行杜百乘之車必以千人致之以千人而致百乘之車將以喪故不得見新君而用之杜行用也不行必盡用之杜不得見新君將自費用盡千幾千人而國不亡杜言千人之費不可數林言小國能當幾千人之賣而不滅亡哉幾居豈反子皮固請以行既葬諸侯之大夫欲因見新君叔孫昭子曰非禮也林言因喪而見非禮弗聽叔向辭之曰大夫之事畢矣杜送葬禮畢而又命孤林孫頃公自稱孤斬焉在衰絰之中既葬未卒哭故猶服斬衰衰七雷反絰直結反其以嘉服見則喪禮未畢其以喪服見是重受弔也大夫將若之何皆無辭以見子皮盡用其幣歸謂子羽曰非知之實難將在行之言不患不知患不能行見賢遍反重直用反夫子知之矣我則不足言已由子産之戒既知其不可而遂行之是我之不足書曰欲敗度縱敗禮杜逸書林舉商書大甲篇欲心不防必致敗壞其法度縱心不禁必至敗壞其禮制敗必邁反下同我之謂矣夫子知度與禮矣我實縱欲而不能自克也欲自喪以慶新君故縱而行之不能自勝昭子至自晉大夫皆見高強見而退杜高強子良昭子語諸大夫曰為人子不可不慎也哉昔慶封亡林慶封亡在襄二十八年語魚據反子尾多受邑而稍致諸君君以為忠而甚寵之將死疾于公宫在公宫被疾輦而歸君親推之推其車而逆之推如字又他回反其子不能任是以在此忠為令德其子弗能任罪猶及之難不慎也杜以見為人子難以不謹慎任音壬下同喪夫人之力棄德曠宗以及其身不亦害乎杜夫人謂子尾曠空也喪息浪反夫音扶詩曰不自我先不自我後其是之謂乎杜詩小雅言禍亂不在他正當已身以喻高強身自取此禍冬十二月宋平公卒初元公惡寺人柳欲殺之元公平公太子佐也惡烏路反及喪柳熾炭于位杜以溫地熾尺志反將至則去之林去炭火使公坐其處比葬又有寵杜言元公好惡無常比必利反經庚午十有一年春王二月叔弓如宋葬宋平公夏四月丁巳楚子虔誘蔡侯般殺之于申蔡侯雖弒父而立楚子誘而殺之刑其羣士蔡大夫深怨故以楚子名告虔其連反般音班楚公子棄疾帥師圍蔡五月甲申夫人歸氏薨昭公母胡女歸姓大搜于比蒲比音昆仲孫貜會邾子盟于祲祥祲祥地闕祲子鴆反徐七林反秋季孫意如會晉韓起齊國弱宋華亥衛北宫他鄭罕虎曺人杞人于厥憖厥憖地闕他徒何反憖魚靳反徐五市反九月己亥葬我小君齊歸杜齊諡冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之用之殺以祭山傳十一年春王二月叔弓如宋葬平公也杜兼以聘事行故傳具之景王問於萇𢎞曰今兹諸侯何實吉何實凶萇𢎞周大夫萇直良反對曰蔡凶此蔡侯般弒其君之嵗也嵗在豕韋杜襄三十年蔡世子般弒其君嵗在豕韋至今十三嵗嵗復在豕韋般即靈侯也弗過此矣言蔡凶不過此年楚將有之然壅也蔡近楚故知楚將有之楚無德而享大利所以壅積其惡壅於勇反嵗及大梁蔡復楚凶天之道也杜楚靈王弒立之嵗嵗在大梁到昭十三年嵗復在大梁美惡周必復故知楚凶林此天道循環不窮之理楚子在申召蔡靈侯靈侯將往蔡大夫曰王貪而無信唯蔡於感杜蔡近楚之大國故楚常恨其不服順感户暗反今幣重而言甘誘我也不如無往蔡侯不可三月丙申楚子伏甲而享蔡侯於申醉而執之夏四月丁巳殺之刑其士七十人公子棄疾帥師圍蔡杜傳言楚子無道韓宣子問于叔向曰楚其克乎對曰克哉蔡侯獲罪於其君杜謂弒父而立而不能其民杜不能施德天將假手於楚以斃之杜借楚手以討蔡斃婢世反何故不克然肸聞之不信以幸不可再也林以詐不信僥幸而成不可再就楚王奉孫吳以討於陳曰將定而國陳人聽命而遂縣之林遂滅陳國以為楚縣杜事在八年今又誘蔡而殺其君以圖其國雖幸而克必受其咎弗能久矣桀克有緡以喪其國紂克東夷而隕其身杜紂為黎之兔東夷叛之桀為仍之會有緡叛之故伐而克之緡武巾反喪息浪反下同楚小位下而亟暴於二王林楚國小於夏殷而位卑於桀紂而數行暴虐甚于桀紂二王亟欺冀反能無咎乎天之假助不善非祚之也厚其凶惡而降之罰也且譬之如天其有五材而將用之力盡而敝之是以無拯不可沒振杜金木水火土五者為物用久則必有敝盡盡則棄捐故言無拯拯猶救助也不可沒振猶沒不可復振林以喻楚靈王力盡自敝無復救助沒而不可復振也祚在路反振之慎反五月齊歸薨大搜于比蒲非禮也林君有母喪國不廢搜故曰非禮孟僖子會邾莊公盟于祲祥修好禮也搜非存亡之由故臨喪不宜為之盟會以安社稷故喪盟謂之禮好呼報反泉丘人有女薨以其帷幕孟氏之廟杜泉丘魯地遂奔僖子其僚從之鄰女為僚友者隨而奔僖子盟于清丘之社曰有子無相棄也杜二女自共僖子使助薳氏之簉簉副倅也薳氏之女為僖子副妾别居在外故僖子納泉丘人女令副坐之薳為彼反簉初又反反自祲祥宿于薳氏生懿子及南宫敬叔於泉丘人其僚無子使字敬叔杜字養也似雙生楚師在蔡向四月之師晉荀吳謂韓宣子曰不能救陳又不能救蔡物以無親林物事也事事無所親附晉之不能亦可知也已為盟主而不恤亡國將焉用之秋會于厥憖謀救蔡也不書救蔡不果救焉於虔反鄭子皮將行子産曰行不逺不能救蔡也蔡小而不順楚大而不德天將棄蔡以壅楚盈而罰之林言此行必不能逺到雖欲救蔡將不能也蔡小國也而弒逆不順楚大國也而強暴不德天將素絶蔡國而以壅滿楚惡罪惡盈滿而降之罰蔡必亡矣且喪君而能守者鮮矣三年王其有咎乎美惡周必復林周嵗星一周十二年也鮮息淺反王惡周矣元年楚子弒君而立嵗在大梁後三年十三嵗嵗星周復于大梁晉人使狐父請蔡于楚弗許狐父晉大夫單子會韓宣子于戚杜單子單成公視下言徐林其視過下惴惴然其言太徐奄奄然叔向曰單子其將死乎朝有著定杜著定朝內列班之地謂之表著著似住反徐治居反會有表杜野會設表以為位衣有禬帶有結杜禬領會結帶結也禬古郊反説文云帶所結也會朝之言必聞于表著之位所以昭事序也視不過結襘之中所以道容貌也林凡會朝之言語其聲溫厲適中必達於表著之位不過於徐所以昭明行事之次序也會朝之瞻視不過於衣禬帶結之中不過於下所以道達容貌之恭敬也道音導下同言以命之容貌以明之失則有廢林言語足以命之毋失其和容貌足以明之毋失其敬失言失貌則於事有所廢闕今單子為王官伯杜伯長也而命事于會視不登帶言不過步貌不道容而言不昭矣林視不登于大帶之上過下也言不過於踐步之外大徐也是貌不足以道恭敬之容而言不足以昭行事之序不道不共不昭不從貌正曰共言順日從無守氣矣林神氣不守其體矣為此年冬單子卒起本九月葬齊歸公不戚晉士之送葬者歸以語史趙史趙曰必為魯郊言昭公必出在郊野不得有國語魚據反侍者曰何故曰歸姓也林姓生也言昭公歸氏所生不思親祖不歸也杜言不思親則不為祖考所歸祐叔向曰魯公室其卑乎君有大喪國不廢搜杜謂搜比蒲有三年之喪而無一日之戚國不恤喪不忌君也杜忌畏也君無戚容不顧親也國不忌君君不顧親能無卑乎殆其失國杜國不畏君不忠也君不念親不孝也忠孝俱失卑弱之漸也為二十五年公孫於齊傳冬十一月楚子滅蔡用隱大子于岡山杜蔡靈公之大子蔡侯廬之父申無宇曰不祥五牲不相為用况用諸侯乎杜五牲牛羊犬豕雞林不相為用如祭馬先不用馬之類為于偽反或如字王必悔之悔為暴虐十二月單成公卒終叔向之言楚子城陳蔡不羮杜陳蔡皆為楚縣不羮有二一在襄城東南一在定陵西北皆楚要地楚靈王始為城羹音郎漢書作更字使棄疾為蔡公林楚諸縣尹皆稱公也玉問於申無宇曰棄疾在蔡何如對曰擇子莫如父擇臣莫如君鄭莊公城櫟而置子元焉使昭公不立杜子元鄭公子莊公置子元於櫟桓十五年屬公因之以殺櫟大夫檀伯遂居櫟卒使昭公不安位而見殺櫟力狄反齊桓公城榖而置管仲焉至于今賴之杜城榖在莊三十二年臣聞五大不在邊五細不在庭杜土古金木水火土謂之五官玄烏氏丹烏氏亦有五又有五鳩鳩民五雉為五工正蓋立官之木也末世隨事施職是以官無常數今無宇稱習故言故云五大也言五官之長専盛過節則不可居邊細弱不勝任亦不可居朝廷親不在外羈不在內林親用之人不使久居於外羈旅之人不使久居於內今棄疾在外鄭丹在內林棄疾親也而居外為蔡公然丹羈也居內為右尹杜襄十九年丹奔楚君其少戒王曰國有大城何如對曰鄭京櫟實殺曼伯曼伯檀伯也厲公得櫟又并京曼音萬宋蕭亳實殺子遊杜在莊十二年齊渠丘實殺無知杜在莊九年渠丘今齊國西安縣也齊大夫壅廩邑衛蒲戚實出獻公杜蒲寧殖邑戚孫林父邑出獻公在襄十四年若由是觀之則害於國林都城過大必為國之害末大必折杜折其本尾大不掉君所知也為十三年陳蔡作亂傳掉徒弔反左傳杜林合注卷三十七
