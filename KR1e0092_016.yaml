body:
  text: 左傳杜林合注卷十六明王道焜趙如源同編文公二經辛丑七年春公伐邾三月甲戌取須句杜須句魯之封內屬國也僖公反其君之後邾復滅之書取易也例在襄十三年句其俱反遂城郚杜無傳因伐邾師以城郚郚魯邑卞縣南有郚城備邾難郚音吾夏四月宋公王臣卒杜二年與魯大夫盟於垂隴林成公卒昭公杵臼立王如字又往方反宋人殺其大夫杜宋人攻昭公并殺二大夫故以非罪書戊子晉人及秦人戰于令狐杜趙盾廢嫡而外求君故貶稱人晉諱背先蔑而夜薄秦師以戰告林令狐秦地令力呈反晉先蔑奔秦杜不言出在外奔狄侵我西鄙秋八月公會諸侯晉大夫盟于扈杜扈鄭地滎陽卷縣西北有扈亭不分别書會人總言諸侯晉大夫盟者公後會而及其盟林不序諸侯散辭也晉於是始失霸也扈音户冬徐伐莒杜不書將帥徐夷告辭略公孫敖如莒涖盟涖音利又音類傳七年春公伐邾間晉難也杜公因霸國有難而侵小間間厠之間或如字難乃旦反三月甲戌取須句置文公子焉非禮也杜邾文公子叛在魯故公使為守須句大夫也絶大皥之祀以與鄰國叛臣故曰非禮置之豉及下同夏四月宋成公卒於是公子成為右師杜莊公子公孫友為左師杜目夷子樂豫為司馬杜戴公玄孫鱗矔為司徒杜楨公孫矔古亂反公子蕩為司城杜桓公子也以武公名廢司空為司城華御事為司冦杜華元父也傳言六卿皆公族昭公不親信之所以致亂御魚吕反本又作禦音同昭公將去羣公子樂豫曰不可公族公室之枝葉也林公室猶木之本根公族其枝葉也若去之則本根無所庇廕矣葛藟猶能庇其本根杜葛之能藟蔓繁滋者以本枝廕庥之多林葛之藟蔓繁滋者猶能庇其根本去起吕反下同庇必利反又悲位反下同廕本又作蔭於鴆反藟本或作虆力軌反故君子以為比杜謂詩人取以喻九族兄弟比必爾反况國君乎此諺所謂庇焉而縱尋斧焉者也林八尺曰尋所以量木者也引俗諺所謂藉本之庇而縱放尋以量之斧以伐之者也必不可君其圖之親之以德皆股肱也誰敢攜二若之何去之不聽穆襄之族率國人以攻公杜穆公襄公之子孫昭公所欲去者殺公孫固公孫鄭于公宫杜二子在公宫故為亂兵所殺六卿和公室樂豫舍司馬以讓公子卭林右師等六卿使穆襄之族與昭公為和卬昭公弟樂豫以已之官遜之此以為和之道舍音捨下同卬五郎反昭公即位而葬林然後宋國復安昭公即君位而葬成公書曰宋人殺其大夫不稱名衆也且言非其罪也杜不稱殺者及死者名殺者衆故名不可知死者無罪則例不稱名秦康公送公子雍于晉曰文公之入也無衛故有吕郤之難杜僖二十四年文公入難乃旦反乃多與之徒衛穆嬴日抱太子以啼于朝曰先君何罪其嗣亦何罪舍適嗣不立而外求君將焉置此杜穆嬴襄公夫人靈公母也嬴音盈適本又作嫡同丁厯反焉於虔反下焉用同出朝則抱以適趙氏頓首於宣子曰先君奉此子也而屬諸子曰林此述襄公屬託之辭屬音燭此子也才吾受子之賜不才吾唯子之怨杜欲使宣子教訓之今君雖終言猶在耳杜在宣子之耳而棄之若何宣子與諸大夫皆患穆嬴且畏逼林皆患穆嬴之言有理且畏國人以大義來逼已逼彼力反乃背先蔑而立靈公林初使先蔑逆子雍故言背先蔑佩而立靈公即太子夷皋也背音以禦秦師箕鄭居守趙盾將中軍先克佐之杜克先且居子代狐射姑箕音基守手又反將子匠反下同荀林父佐上軍杜箕鄭將上軍居守故佐獨行先蔑將下軍先都佐之步招御戎戎津為右及堇隂杜先蔑士會逆公子雍前還晉晉人始以逆雍出軍卒然變計立靈公故車右戎御猶在職堇隂晉地招上遙反堇音謹一音靳宣子曰我若受秦秦則賓也不受冦也林言秦送子雍若我受之則當以待賓客之禮待秦若不受秦送子雍則當以治冦敵之法治秦既不受矣而復緩師秦將生心先人有奪人之心林秦若知晉已立靈公必將生心謀害晉國先發制人可以奪敵人之戰心掩其不備也復扶又反先悉薦反有奪人之心本或此下有後人待其反誤軍之善謀也逐冦如追逃軍之善政也訓卒利兵秣馬蓐食潛師夜起杜蓐食早食於寢蓐也林潛師銜枚使之無聲夜起掩秦之不備卒子忽反秣音末蓐音辱戊子敗秦師于令狐至于刳首己丑先蔑奔秦士會從之林從刳首去也令狐在河東當與刳首相接刳苦胡反先蔑之使也荀林父止之曰夫人太子猶在而外求君此必不行林此事必不可行使所吏反子以疾辭若何不然將及杜禍已將及攝卿以往可也何必子同官為寮吾嘗同寮敢不盡心乎弗聽為賦板之三章杜板詩大雅其三章義取芻蕘之言猶不可忽况同寮乎僖二十八年林父將中行先蔑將左行寮本又作僚力雕反為于偽反下為同寮同又弗聽及亡林及先蔑奔秦荀伯盡送其帑及其器用財賄於秦曰為同寮故也杜荀伯林父士會在秦三年不見士伯杜士伯先蔑其人曰能亡人於國杜言能與人俱亡於晉國不能見於此焉用之杜何用如此士季曰吾與之同罪杜俱有迎公子雍之罪非義之也將何見焉杜言同罪故同奔非慕先蔑之義而從之何以見先蔑為及歸遂不見杜責先蔑為正卿而不匡諫且俱出奔惡有黨也士會歸在十三年狄侵我西鄙公使告于晉趙宣子使因賈季問酆舒且讓之林時賈季奔在狄故趙宣子使人因賈季介紹以問勞酆舒杜酆舒狄相讓其伐魯酆芳忠反酆舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也杜冬日可愛夏日可畏秋八月齊侯宋公衛侯陳侯鄭伯許男曹伯會晉趙盾盟于扈晉侯立故也公後至故不書所會凡會諸侯不書所會後也杜不書所會謂不具列公侯及卿大夫後至不書其國辟不敏也林後至則不書其國之主名避不敏于會事也此傳還自繹凡例之意穆伯娶於莒曰戴已生文伯其娣聲已生惠叔杜穆伯公孫敖也文伯穀也惠叔難也已音紀一音祀娣大計反戴已卒又聘于莒莒人以聲已辭林莒人辭以戴已雖死其娣聲已尚在當繼室則為襄仲聘焉林襄仲與公子遂公孫敖從父昆弟為于偽反下且為自為同冬徐伐莒莒人來請盟杜見伐故欲結援穆伯如莒涖盟且為仲逆及鄢陵登城見之美杜鄢陵莒邑鄢於晚反自為娶之仲請攻之公將許之叔仲惠伯諫杜惠伯叔牙孫曰臣聞之兵作於內為亂於外為冦冦猶及人亂自及也林兵戈之起于國家之內則為內亂於邊鄙之外則為外冦冦猶及於他人亂則自及其身今臣作亂而君不禁以啓冦讐林魯國有亂則將開冦讐之心若之何公止之惠伯成之杜平二子使仲舍之杜舍不娶舍音捨公孫敖反之杜還莒女復為兄弟如初從之杜為明年公孫敖奔莒傳復音服又扶又反晉卻缺言於趙宣子曰日衛不睦故取其地杜日往日取衛地在元年今已睦矣可以歸之叛而不討何以示威服而不柔何以示懷杜柔安也非威非懷何以示德無德何以主盟子為正卿以主諸侯而不務德將若之何夏書曰林夏書大禹謨戒之用休林休美也人有美德則以休美警戒之使有無窮之休美休許虯反董之用威杜董督也有罪則督之以威刑勸之以九歌勿使壞林復以九敘之歌勸勉之使歌詠其事樂以忘勞使九功勿壞九功之德皆可歌也謂之九歌六府三事謂之九功水火金木土穀謂之六府林六者人之府藏也疏鑿鑽灼煆鑄刻削耕墾播種則六者有無窮之用故謂之府藏正德利用厚生謂之三事林三者國之政事也正民之德使無偏而無黨利民之用使求得而欲遂厚民之生使家給而人足故謂之政事義而行之林六府三事皆合其宜而行之謂之德禮杜德正德也禮以制財用之節又以厚生民之命無禮不樂林若無禮以制財用厚生民則民不樂樂音洛所由叛也若吾子之德莫可歌也其誰來之杜來猶歸也盍使睦者歌吾子乎林何不歸衛侵田使諸侯之睦于晉者歌詠吾子之德乎盍戶臘反宣子説之杜為明年晉歸鄭衛田張本説音悅經壬寅八年春王正月夏四月秋八月戊申天王崩林襄王崩子頃王立冬十月壬午公子遂會晉趙盾盟于衡雍杜壬午月五日林衡雍鄭地雍於用反乙酉公子遂會雒戎盟于暴杜乙酉月八日也暴鄭地公子遂不受命而盟宜去族善其解國患故稱公子以貴之會雒戎本或作伊雒之戎此後人妄取傳文加耳雒音洛公孫敖如京師不至而復丙戌奔莒杜不言出受命而出自外行螽杜無傳為災故書宋人殺其大夫司馬宋司城來奔杜司馬死不舍節司城奉身而退故皆書官而不名貴之傳八年春晉侯使解揚歸匡戚之田于衛林解揚晉大夫杜匡本衛邑中屬鄭孔達伐不能克今晉令鄭還衛及取戚田皆見元年解音蟹且復致公壻池之封自申至于虎牢之竟杜公壻池晉君女壻又取衛地以封之今并還衛也申鄭地傳言趙盾所以能相幼主而盟諸侯復扶又反壻音細俗作壻竟音境夏秦人伐晉取武城以報令狐之役杜令狐役在七年秋襄王崩杜為公孫敖如周弔傳晉人以扈之盟來討杜前年盟扈公後至冬襄仲會晉趙孟盟于衡雍報扈之盟也林以扈盟後至故盟衡雍以報之遂會伊雒之戎杜伊雒之戎將伐魯公子遂不及復君故專命與之盟書曰公子遂珍之也杜珍貴也大夫出竟有可以安社稷利國家者專之可也穆伯如周弔喪不至以幣奔莒從已氏焉杜已氏莒女林以弔周之幣奔莒從前年還莒之女宋襄夫人襄王之姊也昭公不禮焉杜昭公適祖母夫人因戴氏之族杜華樂皇皆戴族以殺襄公之孫孔叔公孫鍾離及大司馬公子卭皆昭公之黨也司馬握節以死故書以官杜節國之符信也握之以死示不廢命司城蕩意諸來奔效節於府人而出杜效猶致也意諸公子蕩之孫教放户反公以其官逆之皆復之亦書以官皆貴之也杜違卿從大夫公賢其效節故以本官逆之請宋而復之司城官屬悉來奔故言皆復夷之搜晉侯將登箕鄭父先都杜登之於上軍也夷搜在六年而使士縠梁益耳將中軍杜士縠本司空縠户木反將子匠反先克曰狐趙之勳不可廢也杜狐偃趙衰有從亡之勳從之林六年以狐射姑趙盾為中軍將佐先克奪蒯得田于堇隂杜七年晉禦秦師於堇隂以軍事奪其田也先克中軍佐蒯苦瞶反故箕鄭父先都士縠梁益耳蒯得作亂林傳著五人作亂之由為明年殺先克張本經癸卯九年春毛伯來求金杜求金以共葬事雖踰年而未葬故不稱王使林求金止此自是魯雖不修貢周無求矣夫人薑氏如齊杜無傳歸寧二月叔孫得臣如京師辛丑葬襄王杜卿共葬事禮也林前年公子遂葬襄公今年得臣葬襄王是夷周於晉也晉人殺其大夫先都杜下軍佐也以作亂討故書名三月夫人薑氏至自齊杜無傳告于廟晉人殺其大夫士縠及箕鄭父杜與先都同罪也楚人伐鄭杜楚子師于狠淵不親伐公子遂會晉人宋人衛人許人救鄭夏狄侵齊杜無傳秋八月曹伯襄卒杜無傳七年同盟于扈林襄公卒子文公夀立九月癸酉地震杜無傳地道安靜以動為異故書冬楚子使椒來聘杜稱君以使大夫其禮辭與中國同椒不書氏史略文林楚君臣始並見於經秦人來歸僖公成風之襚杜衣服曰襚秦辟陋故不稱使不稱夫人從來者辭襚音遂説文作裞云贈終者衣被曰裞以此襚為衣死人衣葬曹共公杜無傳共音恭傳九年春王正月己酉使賊殺先克杜箕鄭等所使也亂殺先克不赴故不書乙丑晉人殺先都梁益耳杜乙丑正月十九日經書二月從告毛伯衛來求金非禮也杜天子不私求財故曰非禮不書王命未葬也二月莊叔如周葬襄王林莊叔即得臣三月甲戌晉人殺箕鄭父士縠蒯得杜梁益耳蒯得不書皆非卿范山言於楚子曰晉君少不在諸侯北方可圖也杜范山楚大夫林時晉靈公幼小志不在於諸侯楚居南方故言北方諸侯可圖也少詩照反楚子師于狼淵以伐鄭杜陳師狼淵為伐鄭援也潁川潁隂縣西有狼陂囚公子堅公子尨及樂耳林生獲曰囚杜三子鄭大夫尨莫江反鄭及楚平公子遂會晉趙盾宋華耦衛孔達許大夫救鄭不及楚師卿不書緩也以懲不恪林以懲諸大夫奉命出會而不共恪者杜華耦華父督曽孫公子遂獨不在貶者諸魯事自非指為其國褒貶則皆從國史不同之於他國此春秋大意他皆倣此懲直升反恪苦各反夏楚侵陳克壺丘杜壺丘陳邑以其服於晉也秋楚公子朱自東夷伐陳杜子朱息公也陳人敗之獲公子茷陳懼乃及楚平杜以小勝大故懼而請平也傳言晉君少楚陵中國明年所以有厥貉之會茷扶廢反冬楚子越椒來聘執幣傲杜子越椒令尹子文從子傲不敬傲五報反下同叔仲惠伯曰是必滅若敖氏之宗傲其先君神弗福也杜十二年傳曰先君之敝器使下臣致諸執事明奉使皆告廟故言傲其先君也為宣四年楚滅若敖氏張本林反鬼神害盈而福謙則知越椒之傲神弗福也倣五刀秦人來歸僖公成風之襚禮也杜秦慕諸夏欲通敬於魯因有翟泉之盟故追贈僖公并及成風本非魯方嶽同盟無相赴弔之制故不譏其緩而以接好為禮諸侯相弔賀也雖不當事苟有禮焉書也以無忘舊好杜送死不及尸故曰不當事書者書於典䇿垂示子孫使無忘過厚之好經甲辰十年春王三月辛卯臧孫辰卒杜無傳公與小斂故書日夏秦伐晉杜不稱將帥告辭略林狄秦也楚之霸秦之力也於是狄秦夏之變於夷秦為之也又二十年而狄鄭又五十年而狄晉狄鄭猶可也狄晉甚矣楚殺其大夫宜申杜宜申子酉也謀弒君故書名自正月不雨至于秋七月杜無傳義與二年同及蘇子盟于女栗杜女栗地名闕蘇子周卿士頃王新立故與魯盟親諸侯也女音汝一音如字冬狄侵宋杜無傳楚子蔡侯次于厥貉杜厥貉地名闕將伐宋而未行故書次林以見楚之圖伯而未集也是故書次于郎以見齊霸之難書次厥貉以見楚霸之難傳十年春晉人伐秦取少梁杜少梁馮翊夏陽縣林秦邑少商照反夏秦伯伐晉取北徴林晉邑報少梁也徴如字三蒼云縣屬馮翊音懲一音張里反初楚范巫矞似杜矞似范邑之巫矞尹必反謂成王與子玉子西曰三君皆將強死林言三君皆將不得以夀終強其丈反城濮之役王思之故使止子玉曰毋死不及止子西子西縊而縣絶杜在僖二十八年濮音卜毋音無縊一跂反縣音懸王使適至遂止之林傳言子西所以不死使所吏反使為商公杜商楚邑今上雒商縣林楚僭王其縣尹皆稱公沿漢泝江將入郢杜沿順流泝逆流林郢楚都沿悅專反泝息路反郢以井反又以政反王在渚宫杜小洲曰渚渚章吕反下見之懼而辭林子西倉卒見王而懼以辭謝王曰臣免於死又有讒言謂臣將逃臣歸死於司敗也杜陳楚名司冦為司敗子西畏讒言不敢之商縣王使為工尹杜掌百工之官又與子家謀弒穆王穆王聞之五月殺鬭宜申及仲歸杜仲歸子家不書非卿秋七月及蘇子盟于女栗頃王立故也杜僖十年狄滅溫蘇子奔衛今復見蓋王復之陳侯鄭伯會楚子于息冬遂及蔡侯次于厥貉杜陳鄭及宋麇子不書者宋鄭執卑苟免為楚僕任受役於司馬麇子恥之遂逃而歸三君失位降爵故不列於諸侯宋鄭猶然則陳侯必同也將以伐宋宋華御事曰楚欲弱我也先為之弱乎何必使誘我我實不能民何罪乃逆楚子勞且聽命杜時楚欲誘呼宋共戰御事華元父勞力報反遂道以田盂諸杜盂諸宋大藪也在梁國睢陽縣東北道音導宋公為右盂鄭伯為左盂杜盂田獵陳名盂音于期思公復遂為右司馬杜復遂楚期思邑公今弋陽期思縣子朱及文之無畏為左司馬林子朱無畏皆楚大夫將獵張兩甄故置二左司馬然則右司馬一人當中央命夙駕載燧林命諸侯從田者卑駕馬於車載燧以備取火之用命眉病反燧音遂本又作燧宋公違命杜不夙駕載燧無畏抶其僕以徇林撻宋昭公之御者以徇于諸侯正達命之罰抶恥乙反徇似俊反或謂子舟曰國君不可戮也子舟曰當官而行何強之有杜子舟無畏字林言當官而行刑罰不當以宋君為強而避之也舟音州詩曰剛亦不吐柔亦不茹杜詩大雅美仲山甫不辟強禦茹如吕反毋縱詭隨以謹罔極杜詩大雅詭人隨人無正心者謹猶愼也罔無也極中也詭九委反是亦非辟強也林此兩詩之意皆非見強禦而避之也敢愛死以亂官乎杜為宣十四年宋人殺子舟張本厥貉之會麇子逃歸杜為明年楚子伐麇傳經乙巳十有一年春楚子伐麇杜討前年逃厥貉會林楚書君將於是始自是楚師必圍滅而後貶人之麇九倫反夏叔仲彭生會晉卻缺于承匡杜承匡宋地在陳留襄邑縣西彭生叔仲惠伯郤缺冀缺叔仲彭生叔又作州本或作叔彭生仲衍字缺立悅反秋曹伯來朝公子遂如宋狄侵齊冬十月甲午叔孫得臣敗狄于鹹杜鹹魯地鹹音咸傳十一年春楚子伐麇成大心敗麇師于陳渚杜成大心子玉之子大孫伯也陳渚麇地潘崇復伐麇至于錫穴林潘崇楚大師錫穴麇地麇未服故復扶又反鍚音羊或作錫星厯反夏叔仲惠伯會晉郤缺于承匡謀諸侯之從于楚者杜九年陳鄭及楚平十年宋聽楚命秋曹文公來朝即位而來見也林曹文公九年即位故來見于魯見賢遍反襄仲聘于宋且言司城蕩意諸而復之杜八年意諸來奔歸不書史失之因賀楚師之不害也杜往年楚次厥貉將以伐宋鄋瞞侵齊杜鄋瞞狄國名防風之後漆姓鄋所求反説文作云北方長狄國也在夏為防風氏殷為汪芒氏瞞莫干反遂伐我公卜使叔孫得臣追之吉侯叔夏御莊叔杜莊叔得臣夏户雅反綿房甥為右富父終甥駟乘杜駟乘四人共車乘繩證反下同冬十月甲午敗狄于鹹獲長狄僑如杜僑如鄋瞞國之君蓋長三丈獲僑如不書賤夷狄也僑本又作喬其驕反長如字又直亮反富父終甥摏其喉以戈殺之杜摏猶衝也摏舒容反喉音侯戈古木反埋其首於子駒之門杜子駒魯郭門骨節非常恐後世怪之故詳其處以命宣伯杜得臣待事而名其三子因名宣伯曰僑如以旌其功初宋武公之世鄋瞞伐宋杜在春秋前司徒皇父帥師禦之耐斑御皇父充石杜皇父戴公子充石皇父名禦本亦作御魚吕反耐音而公子穀甥為右司冦牛父駟乘以敗狄于長丘杜長丘宋地獲長狄緣斯杜緣斯僑如之先皇父之二子死焉杜皇父與穀甥及牛父皆死故耐斑獨受賞宋公於是以門賞耐斑使食其征杜門闕門征稅也謂之耐門林以門賞耐斑故以斑之姓名其門晉之滅潞也杜在宣十五年潞音路獲僑如之弟焚如齊襄公之二年杜魯桓之十六年鄋瞞伐齊齊王子成父獲其弟榮如杜榮如即焚如之弟焚如後死而先説者欲其兄弟伯季相次榮如以魯桓十六年死至宣十五年一百三嵗其兄猶在傳言既長且夀有異於人王子成父齊大夫埋其首於周首之北門杜周首齊邑濟北穀城縣東北有周首亭衛人獲其季弟簡如杜伐齊退走至衛見獲鄋瞞由是遂亡杜長狄之種絶郕太子朱儒自安於夫鍾杜安處也夫鍾郕邑郕音成儒如朱反夫音扶國人弗徇杜徇順也為明年郕伯來奔傳徇侣俊反經丙午十有二年春王正月郕伯來奔林此郕太子朱儒也其曰郕伯見魯以諸侯之禮逆之也是故郕太子朱儒魯謂之郕伯晉太子州蒲晉謂之晉侯從而書之徒見其悖禮焉者爾杞伯來朝杜復稱伯舍夷禮二月庚子子叔姬卒杜既嫁成人雖見出棄猶以恩録其卒夏楚人圍巢杜巢吳楚間小國廬江六縣東有居巢城秋滕子來朝秦伯使術來聘杜術不稱氏史略文林秦君臣始並見冬十有二月戊午晉人秦人戰于河曲杜不書敗績交綏而退不大崩也稱人秦晉無功以微者告也皆陳曰戰例在莊十一年河曲在河東蒲坂縣南季孫行父帥師城諸及鄆杜鄆莒魯所爭者城陽姑幕縣南有員亭員即鄆也以其逺逼外國故帥師城之鄆音運傳十二年春郕伯卒林朱儒之父卒郕人立君杜太子自安於外邑故太子以夫鍾與郕邽來奔杜郕邽亦邑邽音圭公以諸侯逆之林公重土地故以諸侯禮逆之非禮也杜非公寵叛人故書曰郕伯來奔不書地尊諸侯也林既尊以為諸侯故不復見其竊邑之罪所以深責魯也杞桓公來朝始朝公也杜公即位始來朝且請絶叔姬而無絶昏公許之杜不絶昏立其娣以為夫人不書來歸未笄而卒二月叔姬卒不言杞絶也杜既許其絶故不言杞書叔姬言非女也杜女未嫁而卒不書楚令尹大孫伯卒成嘉為令尹杜若敖曽孫子孔羣舒叛楚杜羣舒偃姓舒庸舒鳩之屬今廬江南有舒城舒城西南有龍舒夏子孔執舒子平及宗子遂圍巢杜平舒君名宗巢二國羣舒之屬秋滕昭公來朝亦始朝公也秦伯使西乞術來聘且言將伐晉襄仲辭玉林魯以秦將伐晉故辭玉曰君不忘先君之好照臨魯國林言其光寵魯國如日月之照臨鎮撫其社稷重之以大器寡君敢辭玉杜大器圭璋也不欲與秦為好故辭玉好呼報反下皆同重直用反對曰不腆敝器不足辭也杜腆厚也腆他興反主人三辭賓答曰寡君願徼福于周公魯公以事君林主人即襄仲賓即西乞術杜徼要也魯公伯禽也言願事君以并蒙先君之福徼古堯反不腆先君之敝器使下臣致諸執事以為瑞節杜出聘必告廟故稱先君之器林節信也以圭璋為信故言以為瑞節瑞垂偽反要結好命林要約交結二國交好之命所以藉寡君之命結二國之好杜藉薦也藉在夜反是以敢致之襄仲曰不有君子其能國乎國無陋矣厚賄之杜賄贈送也賄呼罪反秦為令狐之役故冬秦伯伐晉取羈馬杜令狐役在七年羈馬晉邑為于偽反令力丁反晉人禦之趙盾將中軍荀林父佐之杜林父代先克將子匠反下皆同卻缺將上軍杜代箕鄭臾駢佐之杜代林父駢步邊反欒盾將下軍杜欒枝子代先蔑欒力官反盾徒本反胥甲佐之杜胥臣子代先都范無恤御戎杜代步招以從秦師於河曲臾駢曰秦不能久請深壘固軍以待之林請深溝高壘堅固軍屯待秦自退而擊之勿與戰壘力軌反從之秦人欲戰秦伯謂士會曰若何而戰杜晉士會七年奔秦對曰趙氏新出其屬曰臾駢必實為此謀將以老我師也杜臾駢趙盾屬大夫新出佐上軍趙有側室曰穿晉君之壻也杜側室支子穿趙夙庶孫穿音川有寵而弱不在軍事林君壻故有寵年少故弱未嘗涉知軍事好勇而狂且惡臾駢之佐上軍也若使輕者肆焉其可林言若使輕兵暫往攻之而速退則激怒趙穿可得一戰惡烏路反輕遣政反肆音四秦伯以璧祈戰於河杜禱求勝十二月戊午秦軍掩晉上軍林秦從士會之計以輕兵掩襲晉之上軍趙穿追之不及杜上軍不動趙穿獨追之反怒曰裹糧坐甲林裹糧包裹糧食也坐甲戰士被甲不得復卧坐而待敵也裹音果固敵是求敵至不擊將何俟焉軍吏曰將有待也杜待可擊穿曰我不知謀將獨出乃以其屬出宣子曰秦獲穿也獲一卿矣杜僖三十三年晉侯以一命命郤缺為卿不在軍帥之數然則晉自有散位從卿者秦以勝歸我何以報乃皆出戰交綏杜司馬法曰逐奔不逺從綏不及逐奔不逺則難誘從綏不及則難陷然則古名退軍為綏秦晉志未能堅戰短兵未至爭而兩退故曰交綏秦行人夜戒晉師曰兩君之士皆未憖也明日請相見也杜憖缺也憖魚覲反又魚轄反方言云傷也字林云問也牛吝反臾駢曰使者目動而言肆懼我也杜目動心不安言肆聲放失常節使所吏反將遁矣薄諸河必敗之杜薄迫也遁徒困反薄蒲莫反下同敗卑賣反胥甲趙穿當軍門呼曰死傷未收而棄之不惠也不待期而薄人於險無勇也乃止杜晉師止為宣元年放胥甲傳秦師夜遁復侵晉入瑕復扶又反城諸及鄆書時也林得城築之時經丁未十有三年春王正月夏五月壬午陳侯朔卒杜無傳再同盟林共公卒子靈公平國立邾子蘧蒢卒杜未同盟而赴以名林文公卒子定公貜且立蘧其居反蒢丈居反自正月不雨至于秋七月杜無傳義與二年同大室屋壞杜大廟之室大音泰傳同冬公如晉衛侯會公於沓杜沓地闕沓徒答反狄侵衛杜無傳十有二月己丑公及晉侯盟杜十二月無己丑己丑十一月十一日公還自晉鄭伯會公于棐林棐鄭地楚次厥貉而晉遂不競於是公朝晉衛侯會公公還自晉鄭伯會公諸夏之懼甚矣棐勞味反又非尾反傳十三年春晉侯使詹嘉處瑕以守桃林之塞杜詹嘉晉大夫賜其瑕邑令師衆守桃林以備秦桃林在𢎞農華隂縣東潼關詹章亷反塞悉代反晉人患秦之用士會也林晉以前年士會為秦畫計故患秦用之夏六卿相見於諸浮杜諸浮晉地趙宣子曰隨會在秦賈季在狄難日至矣若之何林隨會即士會杜六年賈季奔狄難乃旦反日人實反中行桓子曰請復賈季杜中行桓子荀林父也僖二十八年始將中行故以為氏行户郎反能外事林用賈季能任在外之事且由舊勳杜有狐偃之舊勳郤成子林即卻缺曰賈季亂且罪大杜殺陽處父故不如隨會能賤而有恥柔而不犯林能處卑賤而有亷恥之心雖善柔順而不可犯以不義其知足使也且無罪林其奔秦以迎子雍之故非其罪也知音智乃使魏夀餘偽以魏叛者以誘士會執其帑於晉使夜逸杜魏夀餘畢萬之後帑夀餘子帑音奴請自歸于秦林夀餘請以弘邑自歸降于秦秦伯許之杜許受其邑履士會之足于朝杜躡士會足欲使行秦伯師于河西杜將取魏魏人在東杜今河北縣於秦為在河之東壽餘曰請東人之能與夫二三有司言者吾與之先杜欲與晉人在秦者共先告喻魏有司夫音扶使士會士會辭曰晉人虎狼也若背其言臣死妻子為戮無益于君不可悔也林言晉人虎狼之性暴不可測若反背其言不以魏降秦臣往魏必為晉人所殺妻子留秦必被誅戮無補益於秦君追悔亦不可及杜辭行示巳無去心背音佩下同秦伯曰若背其言所不歸爾帑者有如河杜言必歸其妻子明白如河林蓋康公指河興士會為誓乃行繞朝贈之以䇿杜䇿馬撾臨别授之馬撾並示已所䇿以展情繞朝秦大夫繞如字又張遙反䇿本又作策初革反曰子無謂秦無人吾謀適不用也杜示已覺其情既濟魏人譟而還杜喜得士會譟素報反還音旋秦人歸其帑其處者為劉氏林秦康公不背指河之誓歸士會妻子于晉其處秦不歸者别為劉氏杜士會堯後劉纍之胤别族復纍之姓邾文公卜遷于繹杜繹邾邑魯國鄒縣北有繹山繹音亦史曰林邾大史掌龜卜者利於民而不利於君邾子曰苟利於民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民林言國家之命在於養育民人民生厚用利則大命不窮與音預死之短長時也民苟利矣遷也吉莫如之杜左右以一人之命為言文公以百姓之命為主一人之命各有短長不可如何百姓之命乃傳世無窮故徙也遂遷于繹五月邾文公卒君子曰知命林君子謂邾文公知天命之在民不以死生惑其心所謂知命也秋七月大室之屋壞書不共也杜簡慢宗廟使至傾圯故書以見臣子不共冬公如晉朝且尋盟林尋八年衡雍之盟衛侯會公于沓請平于晉公還鄭伯會公于棐亦請平于晉公皆成之杜鄭衛二于楚畏晉故因公請平鄭伯與公宴于棐子家賦鴻雁杜子家鄭大夫公子歸生也鴻雁詩小雅義取侯伯哀恤鰥寡有征行之勞言鄭國寡弱欲使魯侯還晉恤之季文子曰寡君未免于此杜言亦同有微弱之憂文子賦四月杜四月詩小雅義取行役踰時思歸祭祀不欲為還晉子家賦載馳之四章杜載馳詩鄘風四章從下峩取國有急欲引大國以救助文子賦采薇之四章杜采薇詩小雅取其豈敢定居一月三捷許為鄭還不敢安居鄭伯拜杜謝公為行公答拜左傳杜林合注卷十六
