body:
  text: 左傳杜林合注卷十七明王道焜趙如源同編文公三經戊申十有四年林是年周頃王崩子匡王立春秋皆不書崩𦵏春王正月公至自晉杜無傳告於廟邾人伐我南鄙叔彭生帥師伐邾夏五月乙亥齊侯潘卒杜七年盟於扈乙亥四月二十九日書五月從赴林昭公卒子舍立潘判于反六月公㑹宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟於新城杜新城宋地在梁國穀熟縣西秋七月有星孛入於北斗孛彗也既見而後入北斗非常所有故書之孛音佩徐扶憒反公至自㑹無傳晉人納捷菑於邾弗克納杜邾有成君晉趙盾不度於義而大興諸侯之師涉邾之竟見辭而退雖有服義之善所興者廣所害者衆故貶稱人菑側其反九月甲申公孫敖卒於齊既許復之故從大夫例書卒齊公子商人弑其君舍舍未逾年而稱君者先君既𦵏舍已即位弑君例在宣四年林商人弑舍自立是為懿公舍未踰年稱君者正商人之罪也宋子哀來奔大夫奔例書名氏貴之故書字冬單伯如齊單伯周卿士為魯如齊故書單音善齊人執單伯諸侯無執王使之義故不依行人例齊人執子叔姬叔姬魯女齊侯舍之母不稱夫人自魯録之父母辭傳十四年春頃王崩周公閲與王孫蘓爭政故不赴凡崩薨不赴則不書禍福不告亦不書奔亡禍也歸復福也頃音傾閲音恱懲不敬也杜欲使怠慢者自戒懲直升反邾文公之卒也在前年公使弔焉不敬邾人來討林邾人來治魯使不敬之罪伐我南鄙故惠伯伐邾林惠伯即叔彭生報南鄙之役也子叔姬妃齊昭公生舍叔姬無寵舍無威公子商人驟施於國杜驟數也商人桓公子妃音配本亦作配驟仕救反施式䜴反而多聚士盡其家貸於公有司以繼之杜家財盡從公及國之有司富者貸盡津忍反貸音待又音忒夏五月昭公卒舍即位邾文公元妃齊姜生定公二妃晉姬生捷菑文公卒邾人立定公捷菑奔晉六月同盟於新城從於楚者服杜從楚者陳鄭宋且謀邾也杜謀納捷菑秋七月乙夘夜齊商人弑舍而讓元杜元商人兄齊惠公也書九月從告七月無乙夘日誤弑本作殺音試元曰爾求之久矣我能事爾爾不可使多蓄憾杜不為君則恨多蓄勑六反本又作畜憾本又作感户暗反將免我乎爾為之杜言將復殺我有星孛入於北斗周内史叔服曰不出七年宋齊晉之君皆將死亂杜後三年宋弑昭公五年齊弑懿公七年晉弑靈公史服但言事徴而不論其占固非末學所得詳言晉趙盾以諸侯之師八百乗納捷菑於邾八百乘六萬人言力有餘乘繩證反邾人辭曰齊出貜且長林貜且定公齊姜所生居長貜俱縛反徐居碧反且子餘反長丁丈反宣子曰辭順而弗從不祥乃還杜立適以長故曰辭順林傳言宣子聞義而服周公將與王孫蘇訟於晉王叛王孫蘇杜王匡王叛不與而使尹氏與聃啓訟周公於晉杜訟理之尹氏周卿士聃啓周大夫聃乃甘反趙宣子平王室而復之杜復使和親楚莊王立杜穆王子也子孔潘崇將襲羣舒使公子燮與子儀守而伐舒蓼即羣舒燮昔協反守手又反蓼音了二子作亂城郢而使賊殺子孔不克而還八月二子以楚子出將如商密杜國語曰楚莊王幼弱子儀為師王子燮為傅還音旋廬戢黎及叔麋誘之遂殺鬭克及公子燮杜廬今襄陽中盧縣戢黎廬大夫叔麋其佐鬭克子儀也廬力於反又音盧戢側立反麋九倫反初鬭克囚於秦在僖二十五年秦有殽之敗在僖三十三年而使歸求成成而不得志杜無賞報也公子燮求令尹而不得故二子作亂林傳言二子作亂之由杜傳言楚莊幼弱國内亂所以不能與晉競穆伯之從已氏也在八年已音紀又音祀魯人立文伯穆伯之子穀也穆伯生二子於莒而求復文伯以為請襄仲使無朝聽命復而不出杜不得使與聽政事終寢於家故出入不書林襄仲與穆伯争妻者使穆伯復國而無朝於君不得使與聽魯國政事穆伯急於復國故聽襄仲無朝之命既復國而不出入終寢於家為如字又於偽反下為請同十五年亦放此三年而盡室以復適莒文伯疾而請林及文伯疾病而請立後於君盡津忍反復扶又反曰穀之子弱杜子孟獻子年尚少請立難也林請立難為孟氏後難穀弟難乃多反又如字許之文伯卒立惠叔穆伯請重賂以求復惠叔以為請許之將來九月卒於齊告喪請𦵏弗許請以卿禮𦵏宋髙哀為蕭封人以為卿杜蕭宋附庸仕附庸還升為卿不義宋公而出遂來奔杜出而待放從放所來故曰遂書曰宋子哀來奔貴之也貴其不食汙君之禄辟禍速也齊人定懿公使來告難故書以九月杜齊人不服故三月而後定書以九月明經日月皆從赴難乃旦反齊公子元不順懿公之為政也林公子元懿公之兄終不曰公曰夫已氏猶云某甲夫音扶已音紀襄仲使告於王請以王寵求昭姬於齊林請借周之恩寵以請齊求歸子叔姬曰殺其子焉用其母請受而罪之冬單伯如齊請子叔姬齊人執之杜恨魯恃王勢以求女故焉於䖍反又執子叔姬杜欲以恥辱魯經己酉十有五年春季孫行父如晉三月宋司馬華孫來盟華孫奉使隣國能臨事制宜至魯而後定盟故不稱使其官皆從故書司馬華户化反夏曹伯來朝齊人歸公孫敖之喪大夫喪還不書善魯感子以赦父敦公族之恩崇仁孝之教故特録敖喪歸以示義六月辛丑朔日有食之鼔用牲於社杜傳例曰非禮也單伯至自齊晉郤缺帥師伐蔡戊申入蔡杜傳例曰獲大城曰入林入國書大夫於是始是故自伐書陽處父入書郤缺侵書趙穿由是凡役書大夫秋齊人侵我西鄙季孫行父如晉冬十有一月諸侯盟於扈將伐齊晉侯受賂而止故總曰諸侯言不足序列十有二月齊人來歸子叔姬齊人以王故來送子叔姬故與直出者異文齊侯侵我西鄙遂伐曹入其郛林兵事言遂必天下之大過也此言遂伐曹以齊始敗夏盟晉遂不競也杜郛郭也郛音孚傳十五年林是年蔡莊侯卒子文侯申立春季文子如晉為單伯與子叔姬故也杜因晉請齊為于偽反下為孟氏同三月宋華耦來盟其官皆從之書曰宋司馬華孫貴之也古之盟㑹必備威儀崇贄幣賔主以成禮為敬故傳曰卿行旅從春秋時率多不能備儀華孫能率其屬以從古典所以敬事而自重使重而事敬則魯尊而禮篤故貴而不名從才用反又音如字公與之宴辭曰君之先臣督得罪於宋殤公名在諸侯之策臣承其祀其敢辱君杜耦華督曽孫也督弑殤公在桓二年耦自以罪人子孫故不敢屈辱魯君對共宴㑹請承命於亞旅杜亞旅上大夫也亞於嫁反魯人以為敏杜無故揚其先祖之罪是不敏魯人以為敏明君子所不與也夏曹伯來朝禮也諸侯五年再相朝以脩王命古之制也十一年曹伯來朝雖至此乃來亦五年傳為東齊侯伐曹張本齊人或為孟氏謀孟氏公孫敖家慶父為長庶故或稱孟氏曰魯爾親也飾棺寘諸堂阜杜堂阜齊魯竟上地飾棺不殯示無所歸寘之鼔反魯必取之從之卞人以告杜卞人魯卞邑大夫卞皮彦反惠叔猶毁以為請敖卒則惠叔請之至今期年而猶未已毁過喪禮立於朝以待命林立於公朝以待見許之命示哀戚也許之取而殯之杜殯於孟氏之寢終叔服之言齊人送之書曰齊人歸公孫敖之喪為孟氏且國故也為惠叔毁請且國之公族故聽其歸殯而書之為于偽反𦵏視共仲杜制如慶父皆以罪降共音恭聲已不視帷堂而哭杜聲已惠叔母怨敖從莒女故不視敖喪以帷自蔽於堂而哭已音紀襄仲欲勿哭杜怨敖取其妻惠伯曰林即叔彭生喪親之終也雖不能始善終可也林死喪之事此親戚終天之别也雖襄仲與敖始不相能善送其終可也史佚有言曰兄弟致美杜各盡其美義乃終救乏賀善弔災祭敬喪哀情雖不同母絶其愛親之道也林兄弟之情雖有齟齬不相和同毋絶其天性之至愛親親之道也母音無子無失道何怨於人襄仲說帥兄弟以哭之他年其二子來杜敖在莒所生說音悦孟獻子愛之聞於國杜獻子穀之子仲孫蔑聞音問或如字下同或譖之曰將殺子獻子以告季文子二子曰夫子以愛我聞我以將殺子聞不亦逺於禮乎逺禮不如死一人門於句鼆一人門於戾丘皆死杜句鼆戾丘魯邑有宼攻門二子禦之而死林蓋欲致死以明其無欲殺獻子之心逺于萬反下同句古侯反鼆又作黽莫幸反戾力計反六月林周六月夏之四月也辛丑朔日有食之鼔用牲於社林並同莊公二十五年非禮也得常鼔之月而於社用牲為非禮日有食之林言日食之禮天子不舉去盛饌而不舉樂伐鼔於社杜責羣隂伐猶擊也諸侯用幣於社杜社尊於諸侯故請救而不敢責之伐鼔於朝杜退自責以昭事神訓民事君盖天子不舉諸侯用幣所以事禆尊卑異制所以訓民示有等威古之道也杜等威威儀之等次齊人許單伯請而赦之使來致命杜以單伯執節不移且畏晉故許之林使單伯來魯致歸子叔姬之命書曰單伯至自齊貴之也單伯為魯拘執既免而不廢禮終來致命故貴而告廟新城之盟在前年蔡人不與杜不㑹盟與音預下同晉郤缺以上軍下軍伐蔡杜兼帥二軍曰君弱不可以怠杜怠解也戊申入蔡以城下之盟而還凡勝國曰滅之杜勝國絶其社稷有其土地還音旋獲大城焉曰入之得大都而不有秋齊人侵我西鄙故季文子告於晉冬十一月晉侯宋公衛侯蔡侯陳侯鄭伯許男曹伯盟於扈尋新城之盟林在前年且謀伐齊也杜齊執王使且數伐魯齊人賂晉侯故不克而還於是有齊難是以公不㑹杜明今不序諸侯不以公不㑹故難乃旦反書曰諸侯盟於扈無能為故也杜惡其受賂不能討齊凡諸侯㑹公不與不書諱君惡也杜謂國無難不㑹義事故為惡不書謂不國别序諸侯與而不書後也杜謂後期也今貶諸侯似為公諱故傳發例以明之齊人來歸子叔姬王故也單伯雖見執能守節不移終達王命使叔姬得歸齊侯侵我西鄙謂諸侯不能也杜不能討已遂伐曹入曹郛討其來朝也杜此年夏朝季文子曰齊侯其不免乎林言齊懿公必不得以夀終已則無禮杜執王使而伐無罪已音紀而討於有禮者曰女何故行禮禮以順天林先王制禮本因上天下澤之理故曰順天女音汝天之道也已則反天而又以討人難以免矣詩曰胡不相畏不畏於天杜詩小雅相息亮反又如字君子之不虐幼賤畏於天也在周頌曰畏天之威于時保之杜詩周頌言畏天威于是保福禄不畏於天將何能保以亂取國林言懿公以篡弑取國奉禮以守猶懼不終多行無禮弗能在矣林不能久居人上矣為十八年齊弑商人傳守手又反經庚戌十有六年春季孫行父㑹齊侯於陽穀林齊地齊侯弗及盟及與也夏五月公四不視朔林諸侯毎月必告朔聽政因朝於廟今公以疾闕不得視二月三月四月五月朔也春秋十二公以疾不視朔非一也義無所取故特舉此以表行事因明公之實有疾非詐齊六月戊辰公子遂及齊侯盟於郪丘杜言公疾且以賂故郪丘齊地郪音西又七西反秋八月辛未夫人姜氏薨僖公夫人文公母也毁泉臺泉臺臺名毁壊之也楚人秦人巴人滅庸巴必麻反冬十有一月宋人弑其君杵臼稱君君無道也例在宣四年林昭公弑弟文公鮑立杵昌莒反臼强抑反傳十六年春王正月及齊平齊前年再伐魯魯為受弱故平公有疾使季文子㑹齊侯於陽穀請盟齊侯不肯曰請候君間杜間疾瘳間如字夏五月公四不視朔疾也公使襄仲納賂於齊侯故盟於郪丘有蛇自泉宫出入於國如先君之數林泉宫即泉臺自伯禽至僖公十七君此蛇妖數亦十七也史記魯世家魯公伯禽子考公酋弟煬公熙子幽公宰弟魏公費子厲公躍子獻公具子順公濞弟武公敖子懿公獻弟孝公稱子惠公弗皇子隠公息姑弟桓公允子莊公周子閔公開兄僖公申十七君魏公世本作徽公順公一作慎公秋八月辛未聲姜薨毁泉臺魯人以為蛇妖所出而聲姜薨故壊之楚大饑戎伐其西南至於阜山師於大林又伐其東南至於陽丘以侵訾枝戎山夷也大林陽丘訾枝皆楚邑饑音飢一音机訾子斯反庸人率羣蠻以叛楚杜庸今上庸縣屬楚之小國麇人率百濮聚於選將伐楚杜選楚地百濮夷也麇九倫反濮音卜選息兖反又息戀反於是申息之北門不啓杜備中國楚人謀徙於阪髙林楚以羣蠻共叛故謀徙於阪髙之險地以避難阪音反一音扶板反蒍賈曰不可我能往宼亦能往不如伐庸夫麇與百濮謂我饑不能師故伐我也若我出師必懼而歸百濮離居將各走其邑誰暇謀人乃出師旬有五日百濮乃罷林蒍賈伯嬴也孫叔敖之父杜濮夷無屯聚見難則散歸蒍于委反自廬以往振廪同食杜往往伐庸也振發也廩倉也同食上下無異饌也廬力於反又音盧廩力甚反次於句澨杜楚西界地句古侯反澨市世反使廬戢黎侵庸戢黎廬大夫及庸方城杜方城庸地上庸縣東有方城亭庸人逐之囚子揚窻窻戢黎官屬窻初江反三宿而逸林被囚三宿而走歸曰庸師衆羣蠻聚焉不如復大師杜還復句澨師且起王卒合而後進林與王師合勢而後進兵伐庸卒子忽反師叔曰不可師叔楚大夫潘尫也姑又與之遇以驕之彼驕我怒林庸屢勝故驕楚屢敗故怒而後可克先君蚡冒所以服陘隰也杜蚡冒楚武王父陘隰地名可克或作可擊蚡扶粉反冒莫報反史記楚世家云蚡冒卒弟熊逹殺蚡冒子而伐立是為楚武王與杜異陘音刑隰音習又與之遇七遇皆北軍走曰北北如字一音佩唯禆鯈魚人實逐之杜禆鯈魚庸三邑魚魚復縣今巴東永安縣輕楚故但使三邑人逐之禆婢支反鯈直畱反庸人曰楚不足與戰矣遂不設備楚子乘驛㑹師於臨品杜驛傳車也臨品地名驛人實反分為二隊杜隊部也兩道攻之隊徒對反子越自石溪子貝自仞以伐庸杜子越鬭椒也石溪仞入庸道溪苦兮反本又作谿貝補蓋反今俗本多作員音云仞人慎反秦人巴人從楚師羣蠻從楚子盟杜蠻見楚强故遂滅庸傳言楚有謀臣所以興宋公子鮑禮於國人鮑昭公庶弟文公也鮑步夘反宋饑竭其粟而貸之林言鮑之䘏民也年自七十以上無不饋詒也時加羞珍異林羞進也言鮑之養老上時掌反饋其媿反詒以支瓜又以志反遺也無日不數於六卿之門杜數不疏數音朔國之材人無不事也杜有賢材者林言鮑之尊賢親自桓以下無不恤也杜桓鮑之曽祖林言鮑之親親公子鮑美而艶襄夫人欲通之杜鮑適祖母艷移騐反而不可杜以禮自防閑乃助之施昭公無道國人奉公子鮑以因夫人於是華元為右師元華督曽孫代公子成施式䜴反公孫右為左師林友目夷子華耦為司馬代公子卬鱗矔為司徒林矔桓公孫矔古亂反蕩意諸為司城公子朝為司寇代華御字朝如字初司城蕩卒公孫夀辭司城壽蕩之子請使意諸為之杜意諸壽之子既而告人曰君無道吾官近懼及焉杜禍及已棄官則族無所庇子身之貳也姑紓死焉杜姑且也紓緩也庇必利反又悲丘反紓音舒雖亡子猶不亡族杜已在故也既林既卒事也夫人將使公田孟諸而殺之公知之盡以寳行蕩意諸曰盍適諸侯公曰不能其大夫至于君祖母以及國人杜君祖母諸侯祖母之稱謂襄夫人林謂得罪於上下盍户臘反諸侯誰納我且既為人君而又為人臣不如死盡以其寳賜左右而使行杜行去也夫人使謂司城去公對曰臣之而逃其難若後君何言無以事後君難乃旦反冬十一月甲寅宋昭公將田孟諸未至夫人王姬使帥甸攻而殺之杜襄夫人周襄王姊故稱王姬帥甸郊甸之師甸徒遍反蕩意諸死之杜不書不告書人宋人弑其君杵臼君無道也杜始例發於臣之罪今稱國人故重明君罪文公即位使母弟須為司城代意諸華耦卒而使蕩虺為司馬虺意諸之弟虺况鬼反經辛亥十有七年春晉人衛人陳人鄭人伐宋自閔僖以下終於春秋陳侯常在衛侯上今大夫㑹在衛下傳不言陳公孫寧後至則寜位非上卿故也夏四月癸亥𦵏我小君聲姜齊侯伐我西鄙西當為北蓋經誤六月癸未公及齊侯盟於穀諸侯㑹於扈昭公雖以無道見弑而文公猶宜以弑君受討故林父伐宋以夫所稱人晉侯平宋以無功不序明君雖不君臣不可不臣所以督大教秋公至自穀無傳冬公子遂如齊傳十七年春晉荀林父衛孔逹陳公孫寧鄭石楚伐宋討曰何故弑君猶立文公而還卿不書失其所也杜卿不書謂稱人林失其所討之罪夏四月癸亥𦵏聲姜有齊難是以緩林聲姜前年八月薨杜過五月之例難乃旦反下同齊侯伐我北鄙襄仲請盟六月盟於穀杜晉不能救魯故請服晉侯蒐於黄父杜一名黒壊晉地父音甫遂復合諸侯於扈平宋也傳不列諸國而言復合則如一十五年㑹扈之諸侯可知也復扶又反公不與㑹齊難故也書曰諸侯無功也杜刺欲平宋而復不能與音預於是晉侯不見鄭伯以為貳於楚也鄭子家使執訊而與之書以告趙宣子杜執訊通訊問之官為書與宣子訊音信曰寡君即位三年魯文二年召蔡侯而與之事君林時蔡未服晉故鄭召蔡侯與之事晉九月蔡侯入於敝邑以行杜行朝晉也敝邑以侯宣多之難寡君是以不得與蔡侯偕宣多既立穆公恃寵專權偕音皆十一月克減侯宣多而隨蔡侯以朝於執事杜减損也雖未盡而行言汲汲於朝晉十二年六月歸生佐寡君之嫡夷歸生子家名夷太子名嫡丁歴反以請陳侯於楚而朝諸君杜請陳於楚與俱朝晉十四年七月寡君又朝以蕆陳事杜蕆勑也勑成前好蕆勑展反十五年五月陳侯自敝邑往朝於君往年正月燭之武往朝夷也杜將夷往朝晉八月寡君又往朝以陳蔡之密邇於楚而不敢貳焉則敝邑之故也密邇比近也雖敝邑之事君何以不免杜免免罪也在位之中林言穆公在君位之中一朝於襄杜襄公朝直遙反而再見於君杜君靈公也見賢遍反夷與孤之二三臣相及於絳杜孤之二三臣謂燭之武歸生自謂也絳晉國都雖我小國則蔑以過之矣今大國曰爾未逞吾志敝邑有亡無以加焉林雖我鄭之小國則無以復加此矣今晉國乃曰爾之事我未足以快吾之志願鄭國但有滅亡而已無以復加其事晉之禮古人有言曰畏首畏尾身其餘幾杜言首尾有畏則身中不畏者少林喻鄭雖小國北畏晉南畏楚則中間之不畏者少矣幾居豈反又曰鹿死不擇音林音所茠蔭之處古字聲同皆相假借言鹿死不擇茠蔭之所喻鄭既滅亡當不擇所從之國也小國之事大國也徳則其人也以徳加已則以人道相事不徳則其鹿也鋌而走險急何能擇林不加徳而亂以徼之則不免以鹿死不擇蔭自比林鋌疾走貌言急則欲䕃茠於楚如鹿赴險鋌他頂反命之罔極亦知亡矣林言晉命令無所止極鄭國亦知不免滅亡之禍將悉敝賦以待於鯈唯執事命之鯈晉鄭之竟言欲以兵距晉鯈直留反文公二年六月壬申朝於齊杜鄭文二年六月壬申魯莊二十三年六月二十四日四年二月壬戌為齊侵蔡杜魯莊二十五年二月無壬戌壬戌三月二十日為於偽反亦獲成於楚杜鄭與楚成居大國之間而從於强令豈其罪也杜令號令也林此言鄭文公背齊從楚亦非其罪蓋逺引前事之騐以為近世之證大國若弗圖無所逃命林晉國若不圖恤鄭之社稷無所逃於見討之罪言將叛晉也晉鞏朔行成於鄭趙穿公壻池為質焉趙穿卿也公壻池晉侯女壻鞏九勇反質音致下同秋周甘歜敗戎於垂乘其飲酒也杜歜周大夫垂周地河南新城縣北有垂亭為成元年晉侯平戎於王張本歜昌欲反音審冬十月鄭太子夷石楚為質於晉林夷靈公也石楚鄭大夫為質於晉報趙穿公壻池之質襄仲如齊拜穀之盟林在六月復曰臣聞齊人將食魯之麥林言齊人將伐魯以臣觀之將不能齊君之語偷臧文仲有言曰民主偷必死杜偷猶苟且也偷他侯反經壬子十有八年春王二月丁丑公薨於臺下秦伯罃卒杜無傳未同盟而赴以名林康公卒子共公立罃於耕反夏五月戊戌齊人弑其君商人杜不稱盜罪商人林懿公弑兄惠公元立六月癸酉𦵏我君文公秋公子遂叔孫得臣如齊書二卿以兩事行非相為介冬十月子卒先君既𦵏不稱君者魯人諱弑以未成君書之子在喪之稱夫人姜氏歸於齊季孫行父如齊無傳莒弑其君庻其稱君君無道也傳十八年春齊侯戒師期將以伐魯而有疾醫曰不及秋將死公聞之卜曰尚無及期杜尚庶幾也欲令先師期死惠伯令龜杜以卜事告龜卜楚丘占之曰齊侯不及期非疾也林非以疾終將見弑君亦不聞杜言君先齊侯終令龜有咎杜言令龜者亦有凶咎見於卜兆為惠伯死張本二月丁丑公薨齊懿公之為公子也與邴歜之父争田弗勝及即位乃掘而刖之林時邴􅧬之父已死乃掘其尸而刖斷其足邴音丙又彼病反歜昌欲反掘其勿反又其月反刖音月又五刮反而使歜僕杜僕御也納閻軄之妻而使軄驂乘杜驂乘陪乘驂七南反乘繩證反夏五月公遊於申池齊南城西門名申門齊城無池唯此門左右有池疑此即是二人浴於池歜以扑抶軄扑箠也抶撃也欲以相感激扑音卜反字宜從手作木邊非也抶勑乙反軄怒歜曰人奪女妻而不怒一抶女庸何傷軄曰與刖其父而弗能病者何如杜言不以父刖為病恨女音汝乃謀殺懿公納諸竹中林納懿公於申池之竹中傳焚申池之竹本是此地有竹也歸舍爵而行杜飲酒訖乃去言齊人惡懿公二人無所畏舍音赦置也齊人立公子元杜桓公子惠公六月𦵏文公林五月而𦵏秋襄仲莊叔如齊惠公立故且拜𦵏也襄仲賀惠公立莊叔謝齊來㑹塟文公二妃敬嬴生宣公敬嬴嬖而私事襄仲宣公長而屬諸襄仲襄仲欲立之叔仲不可杜叔仲惠伯嬴音盈嬖必計反長丁丈反屬音燭仲見於齊侯而請之齊侯新立而欲親魯許之見賢遍反冬十月仲殺惡及視而立宣公杜惡太子視其母弟殺視不書賤之書曰子卒諱之也仲以君命召惠伯杜詐以子惡命其宰公冉務人止之曰入必死叔仲曰死君命可也公冉務人曰若君命可死非君命何聽林若有君命死之可也若非子惡之命雖死而何聽聽吐定反弗聽乃入殺而埋之馬矢之中杜惠伯死不書者史畏襄仲不敢書殺惠伯公冉務人奉其帑以奔蔡既而復叔仲氏杜不絶其後夫人姜氏歸於齊大歸也杜惡視之母出姜也嫌與有罪出者異故復發傳將行哭而過市曰天乎仲為不道殺適立庶市人皆哭魯人謂之哀姜所謂出姜不允於魯過古禾反又古卧反適丁歴反莒紀公生大子僕又生季佗愛季佗而黜僕且多行無禮於國杜紀號也莒夷無諡故有别號佗徒何反僕因國人以弑紀公林大子僕因國人之怒而殺其父以其寳玉來奔納諸宣公公命與之邑曰今日必授季文子使司寇出諸竟曰今日必逹杜未見公而文子出之故來不書竟音境公問其故季文子使大史克對曰先大夫臧文仲敎行父事君之禮行父奉以周旋弗敢失隊曰見有禮於其君者林有禮謂恪守名分盡敬於所事之君大音泰隊直類反事之如孝子之養父母也林盡其心力而養之養餘亮反見無禮於其君者林無禮謂好犯名分悖亂於所事之君誅之如鷹鸇之逐鳥雀也林盡其心力而搏之鷹于陵反鸇之然反說上文仙反字林已僊反先君周公制周禮曰則以觀徳徳以處事事以度功功以食民林則者君臣父子兄弟夫婦朋友之法則也合此法則為吉徳違此法則為凶徳故以觀徳徳之吉凶所以處制事之是非事之是非所以量度功之成否功之成否所以食養民之厚薄度待洛反下同食音嗣作誓命曰毁則為賊杜誓要信也毁則壊法也掩賊為藏杜掩匿也竊賄為盜杜賄財也盜器為姦杜器國用也主藏之名以掩賊為名賴姦之用杜用姦器也為大凶徳林毁君臣父子兄弟夫婦朋友之法則故為大凶徳有常無赦杜刑有常在九刑不忘杜誓命以下皆九刑之書九刑之書今亡行父還觀莒僕莫可則也杜還猶周旋還音旋孝敬忠信為吉徳盜賊藏姦為凶徳夫莒僕則其孝敬則弑君父矣則其忠信則竊寳玉矣其人則盜賊也其器則姦兆也杜兆域也保而利之則主藏也以訓則昏民無則焉不度於善而皆在於凶徳是以去之林若保其人而利其物則是我有主藏之名若以敎訓則為昏亂無一事可為民人之法則莒僕不居於孝敬忠信之善而皆在於盜賊藏姦之凶徳是以逐去莒僕而不聽少留也去起吕反昔髙陽氏有才子八人髙陽帝顓頊之號八人其苗裔蒼舒隤敳檮戭大臨尨降庭堅仲容叔達此即垂益禹臯陶之倫庭堅即臯陶字隤徒回反敳五才反一音五回反幸昭音瑰檮直由反韋昭音桃戭以善反漢書作戭韋昭已震反尨莫江反降下江反齊聖廣淵明允篤誠天下之民謂之八愷杜齊中也淵深也允信也篤厚也愷和也愷開在反髙辛氏有才子八人髙卒帝嚳之號八人亦其苗裔伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍此即稷契朱虎熊羆之倫奮甫問反熊音雄貍力之反忠肅共懿宣慈惠和天下之民謂之八元杜肅敬也懿美也宣徧也林慈愛之出於心者也惠愛之及乎人者也和中節也元善也此十六族也世濟其美不隕其名杜濟成也隕隊也隕于敏反以至於堯堯不能舉舜臣堯舉八愷使主后土后土地官禹作司空平水土即主地之官以揆百事莫不時序地平天成杜揆度也成亦平也林以揆度百工之事莫不一時得其次序而無廢事水土既平天道亦成揆葵癸反舉八元使布五敎於四方契作司徒五教在寛故知契在八元之中父義母慈兄友弟共子孝内平外成林内諸夏外夷狄昔帝鴻氏有不才子杜帝鴻黄帝也掩義隠賊好行凶徳醜類惡物頑嚚不友是與比周林有義之人則掩蔽而不用賊盜之人則隠庇而必用平日所好惟行凶徳凡惡人之不可親友者則不才子是與之比近而周密杜醜亦惡也好呼報反嚚魚巾反心不則徳義之經為頑口不道忠信之言為嚚比毗志反天下之民謂之渾敦杜謂驩兠渾敦不開通之貌渾户本反敦徒本反少皥氏有不才子少皥金天氏之號次黄帝少詩照反皥胡老反毁信廢忠崇飾惡言靖譖庸回服讒蒐慝以誣盛徳林毁壞誠信之道廢棄忠直之人崇聚修飾穢惡之言安於讒譖用其回邪行人之讒言求人之隠慝以誣衊盛徳之士蒐所留反慝地得反天下之民謂之窮奇杜謂共工其行窮其好竒竒其宜反顓頊氏有不才子不可教訓不知話言杜話善也話户快反告之則頑杜徳義本天心舍之則嚚杜不道忠信舍音赦傲狠明徳以亂天常林傲慢狠暴不修明徳以悖亂天地之常理傲五報反狠户墾反天下之民謂之檮杌杜謂鯀檮杌頑凶無儔匹之貌檮徒刀反杌五忽反此三族也世濟其凶増其惡名以至於堯堯不能去杜方以宣公比堯行父比舜故言堯亦不能去須賢臣而除之去起吕反下同縉雲氏有不才子縉雲黄帝時官名貪於飲食冒於貨賄侵欲崇侈林恣已之欲盡人之才貪食甚則侵欲於人貪財甚則崇侈於己不可盈厭聚歛積實不知紀極不分孤寡不恤窮匱杜盈滿也實財也厭於艶反匱其媿反天下之民以比三凶杜非帝王子孫故别以比三凶謂之饕餮貪財為饕貪食為餮饕他刀反餮他結反舜臣堯杜為堯臣賔於四門闢四門逹四聰以賔禮衆賢流四凶族案四凶罪狀而流放之渾敦窮奇檮杌饕餮投諸四裔以禦魑魅杜投棄也裔逺也放之四逺使當魑魅之災魑魅山林異氣所生為人害者禦魚吕反魑勑知反山神獸形魅亡備反說文作魅云老精物也是以堯崩而天下如一同心戴舜以為天子以其舉十六相去四凶也故虞書數舜之功曰慎徽五典五典克從無違敎也杜徽美也典常也此八元之功戴多代反相息亮反去起吕反數色主反徽許歸反曰納於百揆百揆時序無廢事也杜此八愷之功曰賔于四門四門穆穆無凶人也林去四凶之功舜有大功二十而為天子杜舉十六相去四凶也今行父雖未獲一吉人去一凶矣於舜之功二十之一也庶幾免於戾乎史克激稱以辨宣公之惑釋行父之志故其言美惡有過辭蓋事宜也宋武氏之族林宋武公之子孫本或作宋武穆之族者後人取下文妄加也道昭公子將奉司城須以作亂杜文公弑昭公故武族欲因其子以作亂司城須文公弟道音導十二月宋公殺母弟須及昭公子使戴莊桓之族攻武氏於司馬子伯之館杜戴族華樂也莊族公孫師也桓族向魚麟蕩也司馬子伯華耦也遂出武穆之族杜穆族黨於武氏故使公孫師為司城林公孫師莊公之孫代母弟須公子朝卒使樂吕為司寇以靖國人杜樂吕戴公子曽孫為宣三年宋師圍曹傳左傳杜林合注卷十七
