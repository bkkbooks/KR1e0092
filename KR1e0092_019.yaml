body:
  text: 左傳杜林合注卷十九明王道焜趙如源同編宣公二經辛酉九年春王正月公如齊無傳公至自齊無傳夏仲孫蔑如京師齊侯伐萊無傳秋取根牟杜根牟東夷國也今琅邢陽都縣東有牟鄉林取言公不言公非公命也自宣而下征伐在大夫矣八月滕子卒杜未同盟昭公卒文公立九月晉侯宋公衞侯鄭伯曹伯㑹于扈林扈鄭地晉荀林父帥師伐陳辛酉晉侯黑臀卒于扈杜卒于竟外故書地四與文同盟九月無辛酉曰誤成公卒子景公儒立冬十月癸酉衞侯鄭卒杜無傳三與文同盟林成公卒子穆公遫立宋人圍滕林滕恃晉而宋圍滕以見晉霸之衰也楚子伐鄭晉郤缺帥師救鄭陳殺其大夫洩冶杜洩冶直諌於淫亂之朝以取死故不為春秋所貴而書名洩息列反冶音也傳九年春王使來徴聘杜徴召也言周徵也徵聘不書微加諷諭不指斥孟獻子聘於周王以為有禮厚賄之林孟獻子即仲孫蔑也厚其贈賄之禮賄呼罪反字林音悔秋取根牟言易也易以豉反滕昭公卒為宋圍滕傳㑹于扈討不睦也杜謀齊陳陳侯不㑹杜前年與楚成故晉荀林父以諸侯之師伐陳杜不書諸侯師林父帥之無將帥晉侯卒于扈乃還冬宋人圍滕因其喪也陳靈公與孔寧儀行父通於夏姬皆衷其衵服以戲於朝杜二子陳卿夏姬鄭穆公女陳大夫御叔妻衷懐也衵服近身衣林詩人所為賦株林澤陂者也夏户雅反衷音忠王丁仰反衵女乙反一音汝栗反說文云日日所衣裳也洩冶諫曰公卿宣滛民無效焉林言靈公與二卿宣示滛亂于朝國之人民無所視效以為法則且聞不令君其納之林且所聞非令美之事君其納藏衵服無示淫亂聞如字一音問公曰吾能改矣公告二子二子請殺之公弗禁遂殺洩冶孔子曰詩云民之多辟無自立辟其洩冶之謂乎杜辟邪也辟法也詩大雅言邪辟之世不可立法國無道危行言孫禁居鴆反又音金多辟本又作僻匹亦反立辟婢亦反楚子為厲之役故伐鄭六年楚伐鄭取成于厲既成鄭伯迯歸事見十一年為于偽反晉郤缺救鄭鄭伯敗楚師于桞棼桞棼鄭地桞力手反棼扶云反國人皆喜唯子良憂曰是國之災也林子良襄公弟弃疾也獨以勝楚為憂言以小勝大是鄭國之災也吾死無日矣自是晉楚交兵伐鄭十二年卒有楚子入鄭之禍經壬戌十年春公如齊公至自齊無傳齊人歸我濟西田元年以賂齊也不言來公如齊因受之濟子禮反夏四月丙辰日有食之無傳不書朔官失之己巳齊侯元卒林未同盟而赴以名林惠公卒子頃公無野立齊崔氏出奔衞齊略見舉族出因其告辭以見無罪公如齊林魯朝于齊止此五月公至自齊無傳癸已陳夏徴舒弑其君平國杜徴舒陳大夫也靈公惡不加民故稱臣以弑林靈公弑子成公午立夏户雅反六月宋師伐滕公孫歸父如齊𦵏齊恵公杜無傳歸父襄仲之子晉人宋人衛人曹人伐鄭鄭及楚平故秋天王使王季子來聘杜王季子者公羊以為天王之母弟然則字季子天子大夫稱字王季子即劉康公周聘止此公孫歸父帥師伐邾取繹杜繹邾邑魯國鄒縣北有繹山林宣公而下征伐在大夫故自取繹凡取皆不書其人自伐杞凡伐皆不書公繹音亦大水無傳季孫行父如齊冬公孫歸父如齊杜宣公聘齊止此齊侯使國佐來聘杜既𦵏成君故稱君命使林齊魯之交自是疎矣饑無傳有水災嘉穀不成楚子伐鄭傳十年春公如齊齊侯以我服故歸濟西之田公比年朝齊故夏齊恵公卒崔杼有寵於惠公髙國畏其偪也林崔杼齊大夫髙國二家齊正郷杼直吕反偪彼力反公卒而遂之奔衞書曰崔氏非其罪也且告以族不以名杜典策之法告者皆當書以名今齊特以族告夫子因而存之以示無罪又言且告以族不以名者明春秋有因而用之不皆改舊史凡諸侯之大夫違違奔放也告於諸侯曰某氏之守臣某杜上某氏者姓下某名守手又反失守宗廟林大夫出奔故言失守其宗廟敢告所有玉帛之使者則告玉帛之使謂聘林言有聘問徃來則告使所吏反不然則否杜恩好不接故亦不告公如齊奔喪公親奔喪非禮也公出朝㑹奔喪㑹𦵏皆書如不言其事史之常也陳靈公與孔寧儀行父飲酒於夏氏公謂行父曰徴舒似女林徴舒夏姬子也女音汝對曰亦似君徵舒病之杜靈公即位於今十五年徴舒已為卿年大無嫌是公子盖以夏姬淫放故謂其子多似以為戲公出自其廏射而殺之二子奔楚廏居又反射食亦反滕人恃晉而不事宋六月宋師伐滕鄭及楚平杜前年敗楚師恐楚深怨故與之平諸侯之師伐鄭取成而還秋劉康公來報聘杜報孟獻子之聘即王季子也其後食采於劉師伐邾取繹為子家如齊傳季文子初聘于齊杜齊侯初即位冬子家如齊伐邾故也魯侵小恐為齊所討故徃謝國武子來報聘報文子也楚子伐鄭晉士㑹救鄭逐楚師於潁北杜潁水出河南陽城至于蔡入淮諸侯之師戍鄭鄭子家卒鄭人討幽公之亂斵子家之棺而逐其族杜以四年弑君故也斵薄其棺不使從卿禮斵竹角反改葬幽公諡之曰靈林靈公初諡幽公葬不如禮故改葬經癸亥十有一年春王正月夏楚子陳侯鄭伯盟于辰陵杜楚復伐鄭故受盟也辰陵陳地潁川長平縣東南有辰亭林序楚子於陳侯鄭伯之上初予楚莊以霸也公孫歸父㑹齊人伐莒無傳秋晉侯㑹狄于欑函以晉侯徃㑹之故以狄為㑹主欑函狄地林楚方倡義于天下而晉孜孜於羣狄至徃㑹焉晉卑甚矣欑才端反函音咸冬十月楚人殺陳夏徵舒經不言楚子而稱人討賊辭也丁亥楚子入陳杜楚子先殺徵舒而欲縣陳後得申叔時諌乃復封不有其地故書入在殺徵舒之後楚入國書爵始此先書殺後書入予楚以討賊之義也不以利陳累莊王也納公孫寧儀行父于陳杜二子淫昏亂人也君弑之後能外託楚以求報君之讐内結強援於國故楚莊得平歩而討陳除弑君之賊於時陳成公播蕩於晉定亡君之嗣靈公成喪賊討國復功足以補過故君子善楚復之傳十一年春楚子伐鄭及櫟子良曰晉楚不務徳而兵爭與其來者可也晉楚無信我焉得有信乃從楚夏楚盟于辰陵陳鄭服也林言二國不先尚徳而惟以兵爭諸侯因其來伐而與之和其亦可也晉楚無信可以主盟我安得有信而不兩屬於晉楚杜傳言楚與晉狎主盟櫟力狄反爭爭鬬之爭焉於䖍反楚左尹子重侵宋杜子重公子嬰齊莊王弟王待諸郔郔楚地郔音延令尹蔿艾獵城沂杜艾獵孫叔敖也沂楚邑艾五蓋反獵力渉反沂魚依反使封人慮事封人其時主築城者慮事謀慮計功慮如字一音力於反以受司徒司徒掌役量功命日杜命作日數分財用杜財用築作具林分之使均平板榦杜榦楨也林立榦而後施板以築之平之使治榦古旦反稱畚築杜量輕重畚盛土器林築實土器畚音本程土物杜為作程限議逺邇杜均勞逸略基趾杜趾城足略行也趾音止具餱糧餱乾食也餱音侯糧音良度有司杜謀監主度待洛反事三旬而成十日為句不愆于素不過素所慮之期也傳言叔敖之能使民愆起䖍反晉郤成子求成于衆狄林郤成子即郤缺衆狄疾赤狄之役遂服于晉杜赤狄潞氏最強故服役衆狄秋㑹于欑函衆狄服也是行也諸大夫欲召狄郤成子曰吾聞之非徳莫如勤非勤何以求人能勤有繼其從之也杜言非徳足以服人則莫如勤以求之若非勤力何以求人能勤力則有功繼之其從狄以求㑹已詩曰文王既勤止詩頌文王勤以創業文王猶勤况寡徳乎冬楚子為陳夏氏亂故伐陳杜十年夏徴舒弑君為于偽反謂陳人無動將討於少西氏杜少西徴舒之祖子夏之名林告陳人無得輕動拒師言將討徵舒弑君之罪少師照反遂入陳殺夏徴舒轘諸栗門杜轘車裂也栗門陳城門轘音患因縣陳杜滅陳以為楚縣陳侯在晉杜靈公子成公午申叔時使於齊反復命而退王使讓之曰夏徴舒為不道弑其君寡人以諸侯討而戮之諸侯縣公皆慶寡人林申叔時楚大夫林楚縣大夫皆僭稱公使所吏反女獨不慶寡人何故對曰猶可辭乎林言尚可有辭以自解乎女音汝王曰可哉曰夏徴舒弑其君其罪大矣討而戮之君之義也抑人亦有言曰牽牛以蹊人之田杜抑辭也蹊徑也蹊音兮而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣諸侯之從也曰討有罪也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎王曰善哉吾未之聞也反之可乎對曰可哉吾儕小人所謂取諸其懐而與之也叔時謙言小人意淺謂譬如取人物於其懐而還之為愈於不還儕仕皆反乃復封陳鄉取一人焉以歸謂之夏州杜州鄉屬示討夏氏所獲也復扶又反夏户雅反故書曰楚子入陳納公孫寧儀行父于陳書有禮也没其縣陳本意全以討亂存國為文善其得禮厲之役鄭伯逃歸杜蓋在六年傳所稱楚人伐鄭取成而還也自是楚未得志焉鄭既受盟于辰陵又徼事于晉為明年楚圖鄭傳十事年鄭及楚平既無其辰陵盟後鄭徼事晉又無端跡傳皆特發以明經也自厲之役鄭南北兩屬故未得志九年楚子伐鄭不以黑壤興伐逺稱厲之役者恨在厲役此皆傳上下相包通之義也徼古堯反經甲子十有二年春葬陳靈公無傳賊討國復二十二月然後得葬楚子圍鄭前年盟辰陵而又徼事晉故夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績杜晉上軍成陳故書戰邲鄭地邲扶必反一音弼秋七月冬十有二月戊寅楚子滅蕭按蕭宋附庸國十二月無戊寅戊寅十一月九日晉人宋人衞人曹人同盟于清丘杜晉衞背盟故大夫稱人宋華椒承羣偽之言以誤其國宋雖有守信之善而椒猶不免譏清丘衞地在今濮陽縣東南書人同盟猶曰人自為盟也書法如惡曹鹿上中國又無霸也宋師伐陳衞人救陳伐背清丘之盟傳十二年春楚子圍鄭旬有七日鄭人卜行成不吉卜臨于大宫杜臨哭也大宫鄭祖廟臨力鳩反大音泰且巷出車吉出車於巷示將見遷不得安居國人大臨守陴者皆哭杜陴城上僻倪皆哭所以告楚窮也陴婢支反徐扶移反楚子退師鄭人修城進復圍之三月克之杜哀其窮哭故為退師而猶不服故復圍之九十日復扶又反入自皇門至於逵路杜塗方九軌曰逵逵求龜反爾雅云九逹謂之逵說文作馗云九逹道似龜背故謂之馗逵或馗字鄭伯肉袒牽羊以逆杜肉袒牽羊示服為臣僕袒徒旦反曰孤不天言不為天所祐不能事君使君懐怒以及敝邑孤之罪也敢不唯命是聴其俘諸江南以實海濵亦唯命林楚國土地多在江南故言其俘囚鄭以歸江南以實南海之濱亦唯楚君之命俘芳扶反濱音賔其剪以賜諸侯使臣妾之亦唯命杜剪削也林其剪削鄭以賜從楚之諸侯使鄭國之人男為臣女為妾亦唯楚君之命剪子淺反若惠顧前好杜楚鄭世有盟誓之好好呼報反徼福於厲宣桓武不泯其社稷杜周厲王宣王鄭之所自出也鄭桓公武公始封之賢君也願楚要福于此四君使社稷不泯泯猶滅也厲宣鄭桓公友周厲王之子宣王之母弟桓武鄭武公名滑突桓公之子泯彌忍反使改事君夷於九縣楚滅九國以為縣願得比之九縣莊十四年滅息十六年滅鄧僖五年滅弦十二年滅黄二十六年滅夔文四年滅江五年滅六滅蓼十六年滅庸傳稱楚武王克權使鬬緡尹之又稱文王縣申息凡十一國不知何以言九君之惠也孤之願也非所敢望也敢布腹心君實圖之左右曰不可許也得國無赦王曰其君能下人必能信用其民矣庸可幾乎林言鄭之君能肉袒牽羊以下於人必能誠信以用其國之民矣庸可幾望得其國乎下遐嫁反幾音冀退三十里而許之平杜退一舍以禮鄭潘尫入盟子良出質潘尫楚大夫子良鄭伯弟尫烏黄反質音致夏六月晉師救鄭荀林父將中軍杜代郤缺將子匠反下皆放此先縠佐之杜彘季代林父子穀户木反本又作榖同士㑹將上軍河曲之役郤缺將上軍宣八年代趙盾為政將中軍士㑹代將上軍郤克佐之郤缺之子代臾駢趙朔將下軍代欒盾欒書佐之欒盾之子代趙朔趙括趙嬰齊為中軍大夫括嬰齊皆趙盾異母弟鞏朔韓穿為上軍大夫荀首趙同為下軍大夫荀首林父弟趙同趙嬰兄鞏九勇反韓厥為司馬韓萬𤣥孫及河聞鄭既及楚平桓子欲還曰無及於鄭而勦民焉用之杜桓子林父勦勞也勦初交反徐子小反焉於䖍反楚歸而動不後林待楚師既歸而動兵以伐鄭未為後時隨武子曰善杜武子士㑹㑹聞用師觀釁而動林釁罪也釁許靳反服云閒也徳刑政事典禮不易不可敵也林徳刑政事典禮六者無所變易則是國強盛不可敵也不為是征言征伐為有罪不為有禮為于偽反楚軍討鄭怒其貳而哀其卑叛而伐之服而舍之徳刑成矣伐叛刑也柔服徳也二者立矣昔歳入陳謂討徴舒今兹入鄭民不罷勞君無怨讟杜讟誘也言無有怨嗟謗讟於其君者罷音皮讟徙木反政有經矣杜經常也荆尸而舉荆楚也尸陳也楚武王始更為此陳法遂以為名商農工賈不敗其業而卒乘輯睦林行商坐賈農主耕種工執技藝各得其業毋有敗闕步曰卒車曰乘皆安輯而和睦賈音古卒子忽反乘繩證反輯音集又七入反事不奸矣杜奸犯也奸音干蔿敖為宰擇楚國之令典敖宰令尹蔿孫叔敖蔿干委反軍行右轅左追蓐杜在車之右者挾轅為戰偹在左者追求草蓐為宿備傳曰令尹南轅又曰改乗轅楚陳以轅為主蓐音辱前茅慮無慮無如今軍行前有斥候蹹伏皆持以絳及白為幡見騎賊舉絳幡見歩賊舉白幡備慮有無也茅明也或曰時楚以茅為旌幟中權後勁杜中軍制謀後以精兵為殿勁吉政反百官象物而動軍政不戒而備杜物猶類也戒勑命林楚之百官皆象其物類而後動無妄動也楚之軍政不待勅令而先備無不備也能用典矣其君之舉也内姓選於親外姓選於舊林内姓之有才者則選於親戚之中外姓之有才者則選於故舊之中杜言親踈並用舉不失徳賞不失勞老有加惠杜賜老則不計勞旅有施舍旅客來者施之以惠舍不勞役君子小人物有服章杜尊卑别也貴有常尊賤有等威林其處貴者有常尊之勢分其處賤者有威儀之等差禮不逆矣徳立刑行政成事時典從禮順若之何敵之見可而進知難而退軍之善政也兼弱攻昧武之善經也子姑整軍而經武乎猶有弱而昧者何必楚林徳以柔服而立刑以伐叛而行政以有經而成事以不奸而得其時稽之典故有從無違揆之禮經有順無逆若之何而能與楚敵見時之可則進而與爭知時之難則退而不校此行軍之善政也弱不自振者則兼而有之昧而昏亂者則攻而取之凡用武之善經也言桓子且整頓軍旅而經畧武備乎天下猶有衰弱而昏昧可攻者何必獨與楚爭昧音妹仲虺有言曰取亂侮亡兼弱也杜仲虺湯左相薛之祖奚仲之後虺許鬼反汋曰於鑠王師遵養時晦杜汋詩頌篇名鑠美也言美武王能遵天之道須暗昧者惡積而後取之汋章畧反於音烏鑠舒若反耆昧也杜耆致也致討於昧耆音㫖昧其夷反武曰無競惟烈杜武詩頌篇名烈業也言武王兼弱取昧故成無疆之業撫弱耆昧以務烈所可也杜言當務從武王之功業撫而取之以務烈所絶句彘子曰不可杜彘子先穀晉所以霸師武臣力也今失諸侯不可謂力有敵而不從不可謂武由我失霸不如死林晉之所以為霸于諸侯以兵師之武勇與羣臣之勤力也今當吾世而失諸侯不可謂之勤力有敵在前而不從之决戰不可謂之武勇由我不力不武而失霸業不如决死之為愈且成師以出聞敵彊而退非夫也言非丈夫命為軍帥而卒以非夫唯羣子能我弗為也以中軍佐濟林言受命於君而為軍帥而終之以非丈夫唯羣子能受此辱我不能為此事中軍佐彘子所帥故彘子以之先濟帥所類反下同知莊子曰此師殆哉杜莊子荀首知音智周易有之在師坎下坤上師之臨兌下坤上臨師初六變而之臨曰師出以律否臧凶盖此師卦初六爻辭律法否不也臧子郎反執事順成為臧逆為否林凡執事之人順命以成其功則為臧善今彘子逆命不順成故應否臧之凶衆散為弱杜坎為衆今變為兌兌柔弱川壅為澤坎為川今變為兌兌為澤是川見壅壅於勇反本又作壅有律林言師之有法以如已也如從也法行則人從法法敗則法從人坎為法象今為衆則散為川則壅是失法之用從人之象故曰律否臧且律竭也竭散也坎變為兌是法敗盈而以竭言水以盈為功以竭則敗也夭且不整所以凶也水遇夭塞不得正流則竭涸也夭於表反不行之謂臨水變為澤乃成臨卦澤不行之物有帥而不從臨孰甚焉此之謂矣臨有元帥而不從其命令不行之臨孰甚于此杜譬彘子之違命亦不可行果遇必敗彘子尸之雖免而歸必有大咎言若果遇敵師必敗衂彘子實主此禍雖幸免而歸國必有大殃咎為明年晉殺先穀傳韓獻子謂桓子杜獻子韓厥曰彘子以偏師陷子罪大矣子為元帥師不用命誰之罪也失屬亡師為罪已重不如進也今鄭屬楚故曰失屬彘子以偏師陷故曰亡師事之不捷惡有所分杜捷成也與其專罪六人同之不猶愈乎言三軍皆敗則六卿同罪不得獨責元帥師遂濟楚子北師次于郔林楚荘王以師向北行次郔鄭北地郔音延沈尹將中軍沈或作寢寝縣也今汝隂固始縣沈音審子重將左子反將右將飲馬於河而歸杜子反公子側飲於鳩反聞晉師既濟王欲還嬖人伍參欲戰參伍奢之祖父嬖必計反又甫詣反字林方豉反參七南反令尹孫叔敖弗欲曰昔歳入陳今兹入鄭不無事矣戰而不捷參之肉其足食乎林言前年入陳今年入鄭在楚國不為無事勞民矣若與晉戰而不勝捷雖食其肉足以雪恥乎參曰若事之捷孫叔為無謀矣不捷參之肉將在晉軍可得食乎令尹南轅反斾杜迴軍南鄉斾軍前大旗斾蒲貝反伍參言於王曰晉之從政者新未能行令林言晉之林父新將中軍執晉政未能專行其號令其佐先縠剛愎不仁未肯用命杜愎狠也林既剛且狠又無仁心未肯用其上人之命愎皮逼反其三帥者專行不獲言其上中下三軍之師欲專其所行而不得聴而無上衆誰適從杜聴彘子趙同趙括則為軍無上令衆不知所從適丁歴反此行也晉師必敗且君而逃臣若社稷何林言晉師號令不一必敗且楚王以君而逃晉之諸臣若楚國之社稷何王病之告令尹改乘轅而北之次于管以待之晉師在敖鄗之間杜滎陽京縣東北有管城敖鄗二山在滎陽縣西北乗繩證反管古緩反管城管叔所封也敖五刀反鄗苦交反鄭皇戌使如晉師曰鄭之從楚社稷之故也未有貳心楚師驟勝而驕其師老矣而不設備子撃之鄭師為承杜承繼也以鄭師為晉後繼戌雖律反使所吏反驟仕救反楚師必敗彘子曰敗楚服鄭於此在矣必許之欒武子曰杜武子欒書敗必邁反楚自克庸以來在文十六年其君無日不討國人而訓之杜討治也于民生之不易禍至之無日戒懼之不可以怠杜于日也曰斯民生理之艱難無日不虞禍患之至警戒恐懼之心不可少有怠忽易以豉反在軍無日不討軍實而申儆之于勝之不可保紂之百克而卒無後林及其治兵也無一日不治軍資器械而申重儆戒之命曰戰勝之不可保恃昔商紂恃其百戰百克之威其後武王滅之卒殄其祀儆敬領反紂直九反訓之以若敖蚡冒篳路藍縷以啟山林杜若敖蚡冒皆楚之先君篳路柴車藍縷敝衣言此二君勤儉以啟土蚡扶粉反冒莫報反篳音必藍力甘反縷力主反箴之曰民生在勤勤則不匱不可謂驕杜箴誡林言民之生理惟在勤力勤以治生則不匱乏楚能如此不可謂之驟勝而驕章金反匱其位反先大夫子犯有言曰師直為壯曲為老我則不徳而徼怨于楚我曲楚直不可謂老杜不徳謂以力爭諸侯徼要也其君之戎分為二廣杜君之親兵廣古曠反下同廣有一卒卒偏之兩杜十五乘為一廣司馬法百人為卒二十五人為兩車十五乘為大偏今廣十五乘亦用舊偏法復以二十五人為承副卒子忽反右廣初駕數及日中左則受之以至于昏林每日右廣鷄鳴而初駕馬數其時刻至日向中而止左廣則代而受之至于日入昏黄而止内官序當其夜杜内官近官序次也序當其夜一本作序當其次以待不虞不可謂無備子良鄭之良也師叔楚之崇也杜師叔潘尫為楚人所崇貴師叔入盟子良在楚楚鄭親矣來勸我戰我克則來不克遂徃以我卜也鄭不可從林言鄭人來勸我與楚戰我若克楚則鄭來晉我若不克則鄭遂徃從楚是以我卜其去就也鄭人之言不可從趙括趙同曰率師以來唯敵是求克敵得屬又何俟必從彘子林言率師以來救鄭惟求勝敵勝楚是克敵國服鄭是得屬國又將何待知季曰原屏咎之徒也杜知季荘子也原趙同屏趙括徒黨也咎指彘子知音智荀首後為智氏屏歩丁反趙莊子曰欒伯善哉杜莊子趙朔欒伯武子實其言必長晉國林實猶充也言欒書之身行能充此言則當執晉國之政也長丁丈反楚少宰如晉師杜少宰官名少詩照反下同曰寡君少遭閔凶不能文杜閔憂也林言楚荘王立時少小遭楚國憂凶之難不能文飾其辭聞二先君之出入此行也杜二先君楚成王穆王将鄭是訓定豈敢求罪于晉林将取鄭人而教訓安定之謙言豈敢與晉爭戰而求得罪于晉二三子無淹乆杜淹留也隨季對曰昔平王命我先君文侯曰與鄭夾輔周室毋廢王命今鄭不率杜率遵也夾古洽反舊古恊反毋音無寡君使羣臣問諸鄭豈敢辱候人杜候人謂伺候望敵者候户豆反敢拜君命之辱彘子以為諂使趙括從而更之曰行人失辭杜言誤對諂勅檢反寡君使羣臣遷大國之迹於鄭杜遷徙也曰無辟敵羣臣無所逃命林言受命如此羣臣無所逃之楚子又使求成于晉晉人許之盟有日矣杜有期日楚許伯御樂伯攝叔為右以致晉師單車挑戰又示不欲崇和以疑晉之羣帥許伯曰吾聞致師者林此言御車者致師之道御靡旌摩壘而還杜靡旌驅疾也摩近也林近敵人之軍壘而還摩末多反壘力軌反樂伯曰吾聞致師者林此言乘車者致師之道左射以菆杜左車左也菆矢之善者射食亦反下同菆側留反代御執轡御下兩焉掉鞅而還杜兩飾也掉正也言自代其御以執轡使御下車飾馬正鞅以示閒暇而還兩或作檷皆力掌反又音亮掉徒吊反鞅於丈反攝叔曰吾聞致師者林此言車右致師之道左入壘折馘執俘而還林車右入敵人之營壘折馘取其左耳執俘取其俘囚也折之設反馘古獲反皆行其所聞而復晉人遂之左右角之杜張兩角從旁夾攻之樂伯左射馬而右射人角不能進矢一而已林樂伯矢盡僅存其一麋興於前射麋麗龜杜麗著也龜背之隆高當心者麋亡悲反晉鮑癸當其後使攝叔奉麋獻焉曰以歳之非時獻禽之未至敢膳諸從者林言以歳之不時獻獸之人或者未至敢以此供從者之膳此蓋射麋以恐晉師而以善能求免從才用反鮑癸止之曰其左善射其右有辭君子也既免杜止不復逐晉魏錡求公族未得林錡魏犨子欲為公族大夫錡魚竒反而怒欲敗晉師請致師弗許請使許之遂徃請戰而還楚潘黨逐之及滎澤見六麋射一麋以顧獻曰子有軍事獸人無乃不給於鮮敢獻於從者林魏錡見六麋在其前射一麋中之以顧潘黨而獻之言子有三軍之事掌禽獸之人無乃不供給於新殺之鮮敢獻於從行者杜滎澤在滎陽縣東新殺為鮮見六得一言其不如楚敗必邁反又如字使所吏反榮户扄反射食亦反鮮音仙叔黨命去之杜叔黨潘尫之子命逐去魏錡勿復趙旃求卿未得杜趙旃穿子且怒於失楚之致師者林且怒於失楚樂伯致師之徒請挑戰弗許請召盟許之與魏錡皆命而徃郤獻子曰杜獻子郤克二憾徃矣弗備必敗林言趙旃魏錡二有恨之人徃矣若弗設備必為楚敗憾胡愔反彘子曰鄭人勸戰勿敢從也楚人求成弗能好也師無成命多備何為林言鄭皇戌來勸晉戰既弗敢從鄭人之請楚使人來求成又不能成其和好出師而不能决和戰之成命雖多設備欲何所為好呼報反下同士季曰備之善若二子怒楚楚人乘我喪師無日矣杜乘猶登也林楚人卒然進兵乘我不備晉師喪敗必不乆矣喪息浪反不如備之楚之無惡除備而盟何損於好若以惡來有備不敗且雖諸侯相見軍衞不徹警也林若楚人無有惡意則除去兵備而相從為盟何損於二國之好若以惡意而來有兵備亦必不至喪敗且雖諸侯以和好之禮相見君行師從故軍衞不徹去戒之至也彘子不可不肯設備士季使鞏朔韓穿帥七覆於敖前杜帥將也覆為伏兵七處覆扶又反故上軍不敗趙嬰齊使其徒先具舟于河故敗而先濟潘黨既逐魏錡言魏錡見逐而退趙旃夜至于楚軍杜二人雖俱受命而行不相隨趙旃在後至席於軍門之外使其徒入之杜布席坐示無所畏也楚子為乘廣三十乘分為左右右廣鷄鳴而駕日中而說林乘廣兵車名也說舍也乘䋲證反下同說舒鋭反下同左則受之日入而說許偃御右廣養由基為右彭名御左廣屈蕩為右杜楚王更迭載之故各有御右屈居勿反乙卯王乘在廣以逐趙旃趙旃棄車而走林屈蕩搏之得其甲裳衣下曰裳林蓋得趙旃之甲裙搏音博晉人懼二子之怒楚師也使軘車逆之杜軘車兵車名軘徙温反潘黨望其塵使騁而告曰晉師至矣楚人亦懼王之入晉軍也遂出陳孫叔曰進之寧我薄人無人薄我詩云元戎十乘以先啟行先人也林楚師既陳而無晉軍故孫叔敖使之進兵寧使我師先進迫人無使他人進來迫我杜元戎戎車在前也詩小雅言王者軍行必有戎車十乗在前問道先人為備騁勅景反陳直勤反下同先悉存反下同軍志曰先人有奪人之心薄之也林先登制人所以奪敵人之戰心迫之使不暇為謀遂疾進師車馳卒奔杜車馬馳驟歩卒趨走志其速也卒子忽反下同乘晉軍桓子不知所為鼓於軍中曰先濟者有賞中軍下軍爭舟舟中之指可掬也杜兩手曰掬言二軍爭舟故砍斷手指在舟中者可以兩手掬之言其多也掬九六反晉師右移上軍未動杜言餘軍皆移去唯上軍在經所以書戰言猶有陳工尹齊將右拒卒以逐下軍杜工尹齊楚大夫右拒陳多拒音矩下同楚子使唐狡與蔡鳩居告唐惠侯杜二子楚大夫唐屬楚之小國義陽安昌縣東南有上唐鄉狡古卯反曰不榖不徳而貪以遇大敵不榖之罪也述楚子自稱不穀言不穀無徳而貪有功以遇晉之大敵此皆我之罪也然楚不克君之羞也敢藉君靈以濟楚師林唐屬楚故楚之羞亦唐之羞也杜藉猶假借也使潘黨率㳺闕四十乘杜㳺車補闕者乘䋲證反下同從唐侯以為左拒以從上軍駒伯曰待諸乎杜駒伯郤克上軍佐也林言且待楚之來與之戰乎隨季曰楚師方壯若萃於我吾師必盡林言楚兵方強盛若萃集以攻於我軍則我之上軍必盡為所敗萃似醉反不如收而去之分謗生民不亦可乎杜同奔為分謗不戰為生民殿其卒而退不敗杜以其所將卒為軍後殿殿多練反王見右廣將從之乘屈蕩尸之曰君以此始亦必以終林言楚王以左廣始出亦必以左廣終歸杜尸止也中易乘則恐軍人惑自是楚之乘廣先左杜以乘左得勝故晉人或以廣隊不能進杜廣兵車林車重故不能進隊互類反楚人惎之脱扄杜惎教也扄車上兵闌惎其器反扄古熒反徐公冥反服云扄横木校輪間一曰車前横木也西京賦云旗不脱扄薛綜云扄所以止旗也少進馬還又惎之㧞斾投衡乃出杜還便旋不進斾大旗也㧞斾投衡上使不㠶風差輕顧曰吾不如大國之數奔也林晉師既出險乃顧楚人而慢之言我師不熟奔北不如楚為大國數奔之習熟也數所角反趙旃以其良馬二濟其兄與叔父以他馬反遇敵不能去林自以他馬駕車而歸馬鈍車遲故遇楚不能疾驅而去棄車而走林逢大夫與其二子乘林逢大夫晉人乘䋲證反謂其二子無顧杜不欲見趙旃顧曰趙傁在後杜傁老稱也傁素口反怒之使下指木曰尸女於是授趙旃綏以免林逢大夫怒其子違命使其二子下車指木而謂之曰止汝尸於此木綏轡也以車綏授趙旃女音汝明日以表尸之即表所指木取其尸皆重獲在木下林兄弟累尸而死故重獲於木下累直龍反楚熊負羈囚知罃知荘子以其族反之杜負覊楚大夫知罃知荘子之子嗾家兵反還戰罃於耕反厨武子御杜武子魏錡厨直誅反下軍之士多從之杜知荘子下軍大夫故每射抽矢菆納諸厨子之房杜抽擢也菆好箭房箭舍林蓋知莊子擇好反箭而納諸厨子之箭舍射食亦反又食夜厨子怒曰非子之求而蒲之愛杜蒲楊桞可以為箭林本為求子而來而反愛楊柳之箭何也董澤之蒲可勝既乎林董澤晉澤名其地多出楊栁杜河東聞喜縣東北有董池陂既盡也勝音升知季曰不以人子吾子其可得乎吾不可以苟射故也林言不得他人之子我子其可得乎我必擇其人而以好箭射之不可苟然而射故也射連尹襄老獲之遂載其尸射公子榖臣囚之以二者還杜榖臣楚王子射食亦反下同及昏楚師軍於邲晉之餘師不能軍杜不能成營也宵濟亦終夜有聲杜言其兵衆將不能用丙辰楚重至於邲杜重輜重也重直勇反又直用反遂次于衡雍潘黨曰君盍築武軍杜築軍營以彰武功雍於用反盍户臘反而收晉尸以為京觀積尸封土其上謂之京觀按觀古亂反下同臣聞克敵必示子孫以無忘武功杜克勝敵國必留以示子孫使子孫無忘先君之武功楚子曰非爾所知也夫文止戈為武杜文字林武字之義以止戈也武王克商作頌曰載戢干戈載櫜弓矢引周頌時邁詩戢藏也櫜韜也詩美武王能誅滅暴亂而息兵戢側立反櫜古刀反我求懿徳肆於時夏允王保之杜肆遂也夏大也言武王既息兵又能求美徳故遂大而信王保天下夏户雅反又作武其卒章曰耆定爾功杜武頌篇名耆致也言武王誅紂致定其功耆音㫖其三曰鋪時繹思我徂惟求定杜其三三篇鋪布也繹陳也時是也思辭也頌美武王能布政陳教使天下歸徃求安定鋪普吳反徐音敷繹音亦其六曰綏萬邦屢豐年杜其六六篇綏安也屢數也言武王既安天下數致豐年此三六之數與今詩頌篇次不同蓋楚樂歌之次第屢力住反夫武禁暴戢兵保大定功安民和衆豐財者也杜此武七徳故使子孫無忘其章著之篇章使子孫不忘今我使二國暴骨暴矣觀兵以威諸侯兵不戢矣暴而不戢安能保大猶有晉在焉得定功所違民欲猶多民何安焉無徳而强爭諸侯何以和衆利人之幾而安人之亂以為已榮何以豐財林使晉楚之民暴骨以戰是不能禁暴也觀兵以威服諸侯是不能戢兵也既暴亂而不能戢兵是不能保大也晉雖敗而尚在必來求報是不能定功也用兵則四民失業故所違其欲猶多是不能安民也楚則無徳而恃兵力以爭諸侯是不能和衆也以人之危而為己利以人之亂而為己安以晉之危亂而勝之以為楚榮兵動則年荒是不能豐財也杜幾危也骨蒲卜反焉於䖍反強其丈反武有七徳我無一焉何以示子孫其為先君宫告成事而已武非吾功也林告服鄭勝晉之成事於先君而已盖古者出軍必載遷廟之主以行今作先君宫告成事謂祭告所載主于宫中而已築武軍以示子孫非吾之功業也古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀以懲淫慝杜鯨鯢大魚名以喻不義之人吞食小國言取而殺之以土封其尸骸以為大戮辱以戒來者於是有京觀之號京大也觀示也鯨其京反鯢五兮反懲直升反慝它得反今罪無所杜晉罪無所犯也而民皆盡忠以死君命又可以為京觀乎林言晉之死者非有淫慝可以示戒又何所取以為京觀示子孫乎祀于河作先君宫告成事而還杜傳言楚荘有禮所以遂興是役也鄭石制實入楚師按石制鄭大夫將以分鄭而立公子魚臣辛未鄭殺僕叔及子服杜僕叔魚臣也子服石制也林鄭知其謀故殺之以弭禍君子曰史佚所謂毋怙亂者謂是類也杜言恃人之亂以要利佚音逸毋音無怙音户詩曰亂離瘼矣爰其適歸杜詩小雅離憂也瘼病也爰於也言禍亂憂病於何所歸乎歎之瘼音莫歸於姑亂者也夫杜恃亂則禍歸之夫音扶鄭伯許男如楚為十四年晉伐鄭傳秋晉師歸桓子請死晉侯欲許之士貞子諌曰不可杜貞子士渥濁城濮之役晉師三日榖杜在僖二十八年濮音卜文公猶有憂色左右曰有喜而憂如有憂而喜乎林言戰勝當喜如有憂而反喜乎言文公憂喜失時公曰得臣猶在憂未歇也杜歇盡也林言子玉必思報怨則晉之憂未盡也歇許竭反困獸猶鬭况國相乎及楚殺子玉公喜而後可知也杜喜見於顔色相息亮反曰莫余毒也已是晉再克而楚再敗也楚是以再世不競杜成王至穆王競其敬反今天或者大警晉也杜警戒也而又殺林父以重楚勝其無乃乆不競乎林父之事君也進思盡忠退思補過社稷之衞也若之何殺之林進諌於君則思盡已之忠退食於公則思補君之過此晉國社稷之扞衞也若之何聴其自盡重直用反夫其敗也如日月之食焉何損於明林日月雖食而無傷於本體之明林父雖敗而無傷於本體之善晉侯使復其位杜言晉景所以不失霸冬楚子伐蕭宋華椒以蔡人救蕭蕭人囚熊相宜僚及公子丙王曰勿殺吾退蕭人殺之王怒遂圍蕭蕭潰申公巫臣曰林巫臣楚申縣尹僚子雕反潰户内反師人多寒王巡三軍拊而勉之杜拊撫慰勉之拊芳甫反三軍之士皆如挾纊纊綿也言說以忘寒扶户牒反纊音曠遂傅於蕭還無杜與司馬卯言號申叔展還無杜蕭大夫司馬卯申叔展皆楚大夫也無杜素識叔展故因卯呼之傅音附還音旋卯馬鮑反號徐户到反一音户力反叔展曰有麥麴乎曰無有山鞠窮乎曰無杜麥麴鞠窮所以禦濕欲使無杜逃泥水中無杜不解故曰無軍中不敢正言故謬語麴去六反鞠起弓反河魚腹疾奈何杜叔展言無禦濕藥將病曰目於眢井而拯之杜無杜意解欲入井故使叔展視虛廢井而求拯已出溺為拯眢烏丸反字林云井無水也拯拯救之拯若為茅絰哭井則已杜叔展又教結茅以表井須哭乃應以為信絰直結反已音紀舊音以明日蕭潰申叔視其井則茅絰存焉號而出之杜號哭也傳言蕭人無守心號户刀反晉原縠宋華椒衞孔達曹人同盟于清丘杜原穀先穀曰恤病討貳於是卿不書林經俱稱人不實其言也宋伐陳衞救之不討貳也楚伐宋晉不救不恤病也宋為盟故伐陳林陳貳於楚故爲于偽反衞人救之孔達曰先君有約言焉若大國討我則死之杜衞成公與陳共公有舊好故孔逹欲背盟救陳而以死謝晉為十四年衞殺孔達傳約於妙反又如字左傳杜林合注卷十九
