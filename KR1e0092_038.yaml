body:
  text: 左傳杜林合注卷三十八明王道焜趙如源同編昭公五經辛未十有二年春齊髙偃帥師納北燕伯于陽杜三年燕伯出奔齊髙偃髙傒玄孫齊人入陽即於燕别邑中出有唐縣不言于燕未得國都林於是齊景公有志於復霸三月壬申鄭伯嘉卒林五同盟杜簡公卒子定公寧立夏宋公使華定來聘定華椒孫公如晉至河乃復晉人以莒故辭公五月葬鄭簡公三月而葬速楚殺其大夫成熊林成熊即成虎杜傳在葬簡公上經從赴熊音雄秋七月冬十月公子憗出奔齊書各謀亂故也憗魚覯反一讀為整楚子伐徐杜不書圍以乾溪師告晉伐鮮虞杜不書將帥史闕文林狄晉也晉主諸夏之盟春秋狄秦以故也狄鄭亦以晉故則其狄晉何晉之君卿無中國之志也於是楚方橫行中原而晉獨從事於伐鮮虞雖吳入郢於越入吳晉猶圍鮮虞也於是狄晉以其無復中國之志也傳十二年春齊髙偃納北燕伯款于唐因其衆也言因唐衆欲納之故得先入唐三月鄭簡公卒將為葬除杜除葬道為于偽反及遊氏之廟遊氏子大叔族將毁焉子大叔使其除徒執用以立而無庸毁杜用毁廟具曰子産過女而問何故不毁乃曰不忍廟也諾將毁矣杜教毁廟者之辭女音汝既如是子産乃使辟之林除徒既如大叔之教子産不忍毁其廟乃使遷道避之司墓之室有當道者簡公别營葬地不在鄭先公舊墓故道有臨時可迂直也司墓之室鄭之掌公墓大夫徒屬家毁之則朝而塴杜塴下棺林道直故早朝而下棺朝如字塴比鄧反徐雨贈反禮家作窆彼驗反義同弗毁則日中而塴林道迂故日中而下棺子大叔請毁之曰無若諸侯之賔何杜不欲久留賔子産曰諸侯之賔能來會吾喪豈憚日中無損於賔而民不害林少待片時於賓客無所損不毁墓室於氏人必有所益吾何故不為遂弗毁日中而葬君子謂子産於是乎知禮林以不毁遊氏之廟及司墓之室為知禮禮無毁人以自成也夏宋華定來聘通嗣君也宋元公新即位享之為賦蓼蕭弗知又不答賦杜蓼蕭詩小雅義取燕笑語兮是以有譽處兮樂於華定燕語也又曰既見君子為龍為光欲以寵光賓也文曰宜兄宜弟令德壽凱言賓有令德可以壽樂也又曰和鸞雍雍萬福攸同言欲與賓同福祿也為于偽反蓼音六昭子曰必亡宴語之不懷寵光之不宣令德之不知同福之不受將何以在林首章有燕語之義而華定不能懷思二章有寵光之義而華定不能宣揚三章有令德之義而華定不能知識四章有同福之義而華定不能享受將何以從在其位為二十年華定出奪傳齊侯衛侯鄭伯如晉朝嗣君也杜晉昭公新位公如晉亦欲朝嗣君至河乃復取郠之役在十年莒人訴于晉晉有平公之喪未之治也故辭公公子憗遂如晉杜魯大夫如晉不書還不復命而奔故史不書於䇿晉侯享諸侯子産相鄭伯辭於享請免喪而後聽命杜簡公未葬相息亮反下同晉人許之禮也杜善晉不奪孝子之情晉侯以齊侯宴中行穆子相杜穆子荀吳投壺晉侯先林晉侯為盟主故先舉矢穆子曰有酒如淮有肉如坻杜淮水名坁山名林詩云宛在水中坁是坻乃水中髙地也坁直疑反徐直夷反寡君中此為諸侯師中之齊侯舉矢曰有酒如澠有肉如陵杜澠水出齊國臨淄縣北入時水陵大阜也中丁仲反下同澠音蠅寡人中此與君代興杜代更也亦中之伯瑕謂穆子杜伯瑕士文伯曰子失辭吾固師諸侯矣壺何為焉林何假投壼以為輕重其以中俊也杜言投壺中不足為俊異齊君弱吾君歸弗來矣林齊君欲與晉君代興是輕晉君以為弱也齊君既歸必叛晉矣穆子曰吾軍帥強禦卒乘競勸林言我三軍諸師強盛禦止步卒車乘競強勸勉帥所類反卒子忽反采繩證反今猶古也齊將何事晉德不哀於古齊不事晉將無所事公孫叟趨進曰日旰君勤可以出矣以齊侯出叟齊大夫傳言晉之哀叟素口反徐所流反旰古旦反楚子謂成虎若敖之餘也遂殺之杜成虎令尹子玉之孫與鬬氏同出於若敖宣四年鬬椒作亂今楚子信譖而託討若敖之餘或譖成虎於楚子成虎知之而不能行林成虎知或人之譛已而不能見幾去以避禍書曰楚殺其大夫成虎懷寵也林言其懷思寵祿也解經所以書名六月葬鄭簡公傳終子産辭享明既葬則為免喪經書五月誤晉荀吳偽會齊師者假道於鮮虞遂入昔陽林偽若將以師與齊師會者杜鮮虞白狄别種在中山新市縣昔陽肥國都樂平沽縣東有昔陽城秋八月壬午滅肥以肥子綿臯歸杜肥白狄也綿臯其君名巨鹿下曲陽縣西南有肥纍城為下晉伐解處起周原伯絞虐其輿臣使曺逃原伯絞周大夫原公也輿衆也曺羣也絞古弗反冬十月壬申朔原輿人逐絞而立公子跪尋跪尋絞弟跪求委反又音詭絞奔郊郊周地甘簡公無子立其弟過甘簡公周卿士過古禾反下同過將去成景之族成公景公皆過之先君成景之族賂劉獻公杜欲使殺過劉獻公亦周卿士劉定公子丙申殺甘悼公悼公即過而立成公之孫鰌杜鰌平公鰌音秋丁酉殺獻大子之傅庾皮之子過過劉獻公太子之傅殺瑕辛于市及宫嬖綽王孫沒劉州鳩隂忌老陽子杜六子周大夫及庾過皆甘悼公之黨傳言周衰原甘二族所以遂微季平子立林立在七年而不禮於南蒯蒯南遺之子季孫費邑宰蒯苦性反南蒯謂子仲杜子仲公子憗吾出季氏而歸其室於公杜室季氏家財子更其位杜更代也更音庚我以費為公臣子仲許之南蒯語叔仲穆子且告之故杜穆子叔仲帶之子叔仲小也語以欲出季氏以不見禮故語魚據反季悼子之卒也叔孫昭子以再命為卿悼子季武子之子平子父也傳言叔孫之見命乃在平子為卿之前及平子伐莒克之更受三命杜十年平子伐莒以功加三命昭子不伐莒亦以例加為三命叔仲子欲搆二家杜欲搆使相憎謂平子曰三命踰父兄非禮也杜言昭子受三命自踰其先人平子曰然故使昭子杜使昭子自貶黜昭子曰叔孫氏有家禍殺適立庶故婼也及此林竪牛禍叔孫氏在四年適丁厯反若因禍以斃之則聞命矣言因亂討己不敢辭若不廢君命則固有者矣杜著位次昭子朝而命吏曰婼將與季氏訟書辭無頗杜頗偏也林言我將與季氏子訟曲直于朝書辭無敢偏頗頗曾何反季孫懼而歸罪於叔仲子林以三命踰父兄出於叔仲小欲歸罪於小以自解説故叔仲小南蒯公子憗謀季氏憗告公而遂從公如晉林在今年夏杜憗子仲南蒯懼不克以費叛如齊子仲還及衛聞亂逃介而先林介副使子仲逃其副先歸及郊聞費叛遂奔齊言及郊解經所以書出南蒯之將叛也其鄉人或知之過之而歎杜鄉人過蒯而歎且言曰恤恤乎湫乎攸乎杜恤恤憂患湫愁隘攸懸危之貌湫子小反又在酒反一音秋攸如字徐以帚反深思而淺謀邇身而逺志家臣而君圖杜家臣而圖人君之事故言思深而謀淺身近而志逺思息嗣反有人矣哉言今有此人微以感之南蒯枚筮之不指其事泛卜吉凶遇坤坤上坤下坤之比杜坤下坎上比坤六五爻變比毗志反曰黃裳元吉坤六五爻辭以為大吉也示子服惠伯曰即欲有事何如惠伯曰吾嘗學此矣忠信之事則可不然必敗外強內溫忠也杜坎險故強坤順故溫強而能溫所以為忠和以率貞信也杜水和而土安正和正信之本也故曰黃裳元吉黃中之色也裳下之飾也元善之長也中不忠不得其色言非黃長丁丈反下不共不得其飾不為裳事不善不得其極失中德外內倡和為忠杜不相違也倡昌亮反和户卧反率事以信為共率猶行也供養三德為善三德謂正直剛克柔克也供九用反養餘克反非此三者弗當杜非忠信善不當此卦當如字或了浪反且夫易不可以占險將何事也且可飾乎杜夫易猶此易謂黃裳元吉之卦問共何事欲令從下之飾林易道正大故險事不可以占夫音扶中美能黃上美為元下美則裳林心居中故其美者能為黃色元道居上故其美者為體元之義足居下故其美者為平裳之服參成可筮參美盡備吉可如筮參七南反又音三猶有闕也筮雖吉未也杜有闕謂不參成將適費飲鄉人酒南蒯自其家還適費飲於鴆反鄉人或歌之曰我有圃生之杞乎杜言南蒯在費欲為亂如杞生於園圃非宜也杞世所謂枸杞也從我者子乎杜子男子之通稱言從己可不失今之尊去我者鄙乎倍其鄰者恥乎杜鄰猶親也林去我必至為人之所鄙薄倍叛其親必有恥辱之事已乎已乎非吾黨之士乎杜已乎已乎言自遂不改平子欲使昭子逐叔仲小林蓋叔仲小構二家故季平子欲使昭子逐之以自解説小聞之不敢朝昭子命吏謂小待政於朝曰吾不為怨府杜言不能為季氏逐小生怨禍之聚為明年叔弓圍費傳楚子狩于州來杜狩冬獵也狩手又反次于潁尾杜潁水之尾在下蔡西使蕩侯潘子司馬督嚻尹午陵尹喜帥師圍徐以懼吳杜五子楚大夫徐吳與國故圍之以逼吳囂五刀反徐許驕反楚子次于乾溪在譙國城父縣南以為之援杜以為五大夫之援雨雪王皮冠秦復陶奉所遺羽衣也兩豫付反復音服一音福陶徒刀反翠被以翠羽飾被豹舄杜以豹皮為履舄音昔藝鞭以出執鞭以教今鞭必綿反僕析父從杜楚大夫從才用反右尹子革夕杜子革鄭丹夕莫見王見之去冠被舍鞭杜敬大臣舍音捨與之語曰昔我先王熊繹杜楚始封君繹音亦與吕伋齊大公之子丁公王孫牟衛康叔子康伯燮父晉康叔之子燮素協反父音甫下同禽父周公子伯禽並事康王康王成王子四國皆有分我獨無有杜四國齊晉魯衛分珍寶之器分扶問反下同今吾使人於周求鼎以為分林禹鑄九鼎三代傳之以為有國之寶今求此九鼎以為楚之分器王其與我乎對曰與君王哉昔我先王熊繹辟在荆山杜在新城沶鄉縣南辟匹亦反篳路藍縷林路車也以柴為車衣服藍縷篳音必以處草莽跋涉山林以事天子唯是桃弧棘矢以共禦王事杜桃弧棘矢以禦不祥言楚在山林少所土産其音恭齊王舅也成王母齊大公女晉及魯衛王母弟也楚是以無分而彼皆有今周與四國服事君王將唯命是從豈其愛鼎王曰昔我皇祖伯父昆吾舊許是宅陸終氏生六子長曰昆吾少曰季連季連楚之祖故謂昆吾為伯父昆吾嘗居許地故曰舊許是毛今鄭人貪賴其田而不我與林此時舊許之地屬鄭故云我若求之其與我乎對曰與君王哉周不愛鼎鄭敢愛田王曰昔諸侯逺我而畏晉今我大城陳蔡不羮賦皆千乘子與有勞焉諸侯其畏我乎對曰畏君王哉是四國者専足畏也杜四國陳蔡二不羮逺于萬反羮音郎乘繩證反與音預又加之以楚敢不畏君王哉工尹路請曰君王命剝圭以為鏚柲杜鏚斧也柲柄也破圭玉以飾斧柄萬邦角反鏚音鏚祕音祕敢請命杜請制度之命王入視之析父謂子革吾子楚國之望也今與王言如響國其若之何杜譏其須王心如響應聲子革曰摩厲以須王出吾刃將斬矣杜以已喻鋒刃欲自摩厲以斬王之淫慝王出復語左史倚相趨過杜倚相楚史名倚於綺反徐其綺反相息亮反王曰是良史也子善視之是能讀三墳五典八索九丘杜皆古書名林三墳即伏羲神農黃帝之書也五典即少昊顓頊髙辛唐堯虞舜之書八卦之説謂之八索九州之志謂之九丘墳扶云反索所自反本又作素對曰臣嘗問焉昔穆王欲肆其心杜周穆王肆極也周行天下將皆必有車轍馬迹焉杜周遍也穆王乘八駿馬造父為御偏行天下欲車馬轍迹無所不遍祭公謀父作祈招之詩以正王心杜謀父周卿士祈父周司馬世掌甲兵之職招其名祭公方諫遊行故指司馬官而言此詩逸祭側界反招常遙反又音招王是以獲沒于祗宫林穆王聞諫而止是以得善終於祗宮免於篡弒祗音支又音祁臣問其詩而不知也若問逺焉其焉能知之林言聞穆王近事且不知若問三墳五典之逺事倚相又安能該通其義其焉於虔反王曰子能乎對曰能其詩曰祈招之愔愔式昭德音杜愔愔安和貌式用也昭明也林言祈父掌甲兵愔愔然安和不用用能昭明王之德聲愔一心反徐於林反思我王度式如玉式如金杜金玉取其堅重形民之力而無醉飽之心林言國之用民當隨其力任如金冶之器隨器而制形故言形民之力去其醉飽過盈之心蓋是時穆王逺遊過用民力宴飲無度故其詩如此王揖而入饋不食寢不寐數日深感子革之言饋其位反數所主反不能自克以及於難杜克勝也難乃旦反仲尼曰古也有志克己復禮仁也信善哉楚靈王若能如是豈其辱于乾溪林明年楚果反弒王晉伐鮮虞因肥之役也肥役在此年經壬申十有三年春叔弓帥師圍費杜不書南蒯以費叛不以告廟林費魯邑內不言叛言圍皆叛也費音祕夏四月楚公子比自晉歸于楚弒其君虔于乾溪杜比去晉而不送書歸者依陳蔡以入言陳蔡猶列國也比歸而靈王死故書弒其君靈王無道而弒稱臣比非首謀而反書弒比雖脅立猶以罪加也靈王死在五月又不在乾溪楚人生失靈王故本其始禍以赴之靈王弒比立棄疾殺比代立是為平王溪苦兮反楚公子棄疾殺公子比比雖為君而未列於諸侯故不稱爵殺不稱人罪棄疾秋公會劉子晉侯齊侯宋公衛侯鄭伯曺伯莒子邾子滕子薛伯杞伯小邾子于平丘杜平丘在陳留長垣縣西南林晉復合諸侯也晉合諸侯由是止鄟陵之後參盟復作晉非盟主矣八月甲戌同盟于平丘杜書同齊復故林書同盟劉子與盟也公不與盟魯不堪晉求讒慝𢎞多公不與盟非國惡故不諱與音預晉人執季孫意如以歸公至自會無傳蔡侯廬歸于蔡陳侯吳歸于陳杜陳蔡皆受封于楚故稱爵諸侯納之曰歸林於是楚平王封陳蔡而復之隱大子之子廬歸于蔡悼大子之子吳歸于陳則其書曰陳侯蔡侯何不于楚専封也歸辭有三突歸于鄭慕公子之辭也蔡季自陳歸于楚宜得國公子之辭也衛侯鄭歸于衛嘗失國之君之辭也此未嘗有國也使之如失國辭然者不與楚専封也廬音盧又力居反冬十月葬蔡靈公蔡復而後以君禮葬之公如晉至河乃復晉人辭去吳滅州來州來楚邑用大師焉曰滅傳十三年春叔弓圍費弗克敗焉林為費人所敗不書諱之平子怒令見費人執之以為囚俘冶區夫曰非也林區夫魯大夫言平子執費人非䇿俘芳夫反冶音也區烏侯反又丘千反若見費人寒者衣之飢者食之為之令主而共其乏困費來如歸南氏亡矣民將叛之誰與居邑若憚之以威懼之以怒民疾而叛為之聚也若諸侯皆然費人無歸不親南氏將焉入矣林若臨之以威武使之畏憚壓之以忿怒使之畏懼費邑之人莫不疾惡而怨叛是為南蒯結聚其衆也設若諸侯皆如我之所為費人窮困無所依歸雖欲不與南氏相親密將安所入以庇其身衣於既反食者嗣其音恭為于偽反焉於虔反平子從之費人叛南氏費叛南氏在明年傳善區夫之謀終言其效楚子之為令尹也殺大司馬薳掩而取其室在襄三十年薳干委反掩於撿反及即位奪薳居田居掩之族言薳氏所以怨遷許而質許圍遷許在九年圍許大夫質音致蔡洧有寵於王林洧蔡人仕楚者洧于軌反王之滅蔡也其父死焉楚滅蔡在十一年洧仕楚其父在國故死王使與於守而行杜使洧守國王行至乾溪與音預守手又反申之會越大夫戮焉杜申會在四年王奪鬬韋龜中犫杜韋龜令尹子文玄孫中犫邑名犫尺州反又奪成然邑而使為郊尹成然韋龜子郊尹治郊竟大夫蔓成然故事蔡公林蔓成然即成然杜蔡公棄疾也故猶舊也韋龜以棄疾有當璧之命故使成然事之蔓去聲故薳氏之族及薳居許圍蔡洧蔓成然皆王所不禮也因羣喪職之族林因楚之羣大夫失職而怨主者喪息浪反啓越大夫常夀過作亂常夀過申會所戮者過古禾反圍固城克息舟城而居之杜息舟楚邑城之堅固者觀起之死也其子從在蔡事朝吳觀起死在襄二十二年朝吳故蔡大夫聲子之子從如字朝如字曰今不封蔡蔡不封矣我請試之觀從以父死怨楚故欲試作亂以蔡公之命召子干子晳二子皆靈王弟元年子干奔晉子晳奔鄭晳星厯反及郊而告之情杜告以蔡公不知謀強與之盟入襲蔡蔡公將食見之而逃杜不知其故驚起辟之強其丈反觀從使子干食坎用牲加書而速行杜使子干居蔡公之牀食蔡公之食並偽與蔡公盟之徵驗以示衆已徇於蔡已觀從也已音紀徇似俊反曰蔡公召二子將納之與之盟而遣之矣將師而從之杜詐言蔡公將以師助二子蔡人聚將執之林將執觀從以為妖言辭曰失賊成軍而殺余何益乃釋之杜賊謂子干子晳也言蔡公已成軍殺已不解罪朝吳曰二三子若能死亡則如違之以待所濟杜言若能為靈王死亡則可違蔡公之命以待成敗如何若求安定則如與之以濟所欲杜言與蔡公則可得安定且違上何適而可杜言不可違上也上謂蔡公衆曰與之乃奉蔡公召二子而盟于鄧杜潁川召陵縣西南有鄧城二子子干子晳依陳蔡人以國林封陳蔡之國而依倚之楚公子比子干公子黑肱子晳公子棄疾蔡公蔓成然蔡朝吳帥陳蔡不羮許葉之師因四族之徒四族薳氏許圍蔡洧蔓成然羮音郎葉始涉反以入楚林時靈王在乾溪故乘虛以入楚及郊陳蔡欲為名故請為武軍杜欲築壘壁以示後人為復讐之名蔡公知之曰欲速杜言欲速入楚且役病矣請藩而已乃藩為軍杜藩籬也藩方元反蔡公使須務牟與史禆先入因正僕人殺大子祿及公子罷敵杜須務牟史禆楚大夫蔡公之黨也正僕大子之近官林祿罷敵皆靈王之子牟亡侯反禆皮皆反徐扶蟹反又扶移反罷音皮徐甫綺反又蒲買反公子比為王公子黑肱為令尹次于魚陂杜竟陵縣城西北有甘魚陂陂彼宜反公子棄疾為司馬先除王宫使觀從從師于乾溪而遂告之杜從乾溪之師告使叛靈王且曰先歸復所後者劓林先歸國者各安其所後歸者坐以截鼻之刑劓魚器反師及訾梁而潰杜靈王還至訾梁而衆散訾子斯反潰户內反王聞羣公子之死也自投於車下曰人之愛其子也亦如余乎侍者曰甚焉小人老而無子知櫅于溝壑矣杜櫅隊也林言小人若身已老而無子息死而墜填溝壑可知櫅子細反王曰余殺人子多矣能無及此乎右尹子革曰請待于郊以聽國人杜聽國人之所與王曰衆怒不可犯也曰若入於大都而乞師於諸侯王曰皆叛矣林言大都如陳蔡不羮許葉之屬皆同叛矣曰若亡於諸侯以聽大國之圖君也王曰大福不再秖取辱焉然丹乃歸于楚杜然丹子革棄王而歸楚王沿夏將欲入鄢杜夏漢别名順流為沿順漢水南至鄢沿以全反夏户雅反鄢於建反又于脕反芋尹無宇之子申亥曰吾父再姦王命杜謂斷王旌執人於章華宫芋于付反徐音羽姦音干王弗誅惠孰大焉君不可忍惠不可棄吾其從王乃求王遇諸棘闈以歸棘里名闈門也夏五月癸亥王縊于芋尹申亥氏杜癸亥五月二十六日皆在乙卯丙辰後傳終言之經書四月誤申亥以其二女殉而葬之觀從謂子干曰不殺棄疾雖得國猶受禍也林以棄疾有當璧之命子干必受其禍殉以俊反子干曰余不忍也自言因棄疾得楚不忍殺之子玉曰人將忍子杜子玉觀從林人謂棄疾將忍於殺汝吾不忍俟也乃行國每夜駭曰王入矣杜相恐以靈王也乙卯夜棄疾使周走而呼曰王至矣杜周遍也乙卯十入日呼好故反下同國人大驚使蔓成然走告子干子晳林蔓成然棄疾黨故使走告二子曰王至矣國人殺君司馬將來矣杜司馬謂棄疾也言司馬見殺以恐子干君若早自圖也可以無辱衆怒如水火焉不可為謀林衆怒難犯如水火之狂言不可更為他謀又有呼而走至者曰衆至矣二子皆自殺不書弒君位未定也丙辰棄疾即位名曰熊居葬子干于訾實訾敖不成君無號諡者楚皆謂之敖熊音雄殺囚衣之王服而流諸漢乃取而葬之以靖國人林取囚詐以為靈王而葬之以安靖楚國之人衣於既反使子旗為令尹杜子旗蔓成然旗音其楚師還自徐前年圍徐之師吳人敗諸豫章獲其五帥定二年楚人伐吳師于豫章吳人見冉于豫章而潛師于巢以軍楚師於豫章又柏舉之役吳人舍舟于淮􅜉而自豫章與楚夾漢此皆當在江北淮水南蓋後徙在江南豫章帥所類反謂蕩侯潘子司馬督囂尹午陵尹喜五人平王封陳蔡復遷邑林立陳惠公吳于陳蔡平公廬于蔡復其故國陳蔡巳滅故言封九年遷許于夷遷城父人於陳遷方城外人於許至是皆復其舊致羣賂杜始舉事時所貨賂賂音路施舍寬民林施恩惠舍通責以寬民力宥罪舉職杜舉職修廢官宥音又召觀從王曰唯爾所欲觀從教子干殺棄疾今召用之明在君為君之義對曰臣之先佐開卜乃使為卜尹佐卜人開龜兆使枝如子躬聘于鄭林枝如子躬楚大夫且致犫櫟之田犫櫟本鄭邑楚中取之平王新立故還以賂鄭櫟力狄反事畢弗致知鄭自説服不復須賂故鄭人請曰聞諸道路將命寡君以犫櫟敢請命對曰臣未聞命既復王聞犫櫟降服而對降服如今解冠也謝違命曰臣過失命未之致也王執其手曰子母勤林謂子躬母自勤辱毋音無姑歸不榖有事其告子也王善其有權有事將復使之他年芉尹申亥以王柩告乃改葬之初靈王卜曰余尚得天下杜尚庶幾柩其久反不吉投龜詬天而呼曰是區區者而不余畀杜區區小天下詬呼豆反徐許后反余必自取之民患王之無厭也故從亂如歸林民樂於從亂如歸家然厭於鹽反初共王無冡適冡大也共音恭適丁厯反有寵子五人無適立焉杜欲立為大子不知適從乃大有事于羣望杜羣望星辰山川而祈曰請神擇于五人者使主社稷乃遍以璧見於羣望曰當璧而拜者神所立也誰敢違之既乃與巴姬密埋璧於大室之庭杜巴姬共王妾大室祖廟見賢遍反巴必加反大音泰使五人齊而長入拜杜從長幼以次拜齊側皆反長丁丈反下同康王跨之杜過其上也跨苦化反靈王肘加焉子干子晳皆逺之平王弱抱而入再拜皆厭紐杜微見璧紐以為審識肘中九反逺于萬反厭於甲反徐於輒反紐女九反鬭韋龜屬成然焉杜知其將立故託其子屬音燭且曰棄禮林棄立長之禮謂卜於神違命林違當璧之命謂立康王楚其危哉終致靈王之亂子干歸韓宣子聞於叔向曰子干其濟乎對曰難宣子曰同惡相求如市賈焉何難杜宣子謂棄疾親侍子干共同好惡故言如市賈屬利以相求賈音古對曰無與同好誰與同惡杜言棄疾本不與子干同好則亦不得同惡取國有五難有寵而無人一也杜寵須賢人而固有人而無主二也杜雖有賢人當須內主為應有主而無謀三也林雖有內主而無策謀可成有謀而無民四也杜雖有謀䇿而無民人歸附有民而無德五也四者既備當以德成子干在晉十三年矣林元年奔晉至此十三年晉楚之從不聞達者可謂無人杜晉楚之士從子干遊皆非達人族盡親叛可謂無主杜無親族在楚無釁而動可謂無謀杜召子干時楚未有大釁釁許靳反為羈終世可謂無民杜終身羈客在晉是無民亡無愛徵可謂無德杜楚人無愛念之者王虐而不忌靈王暴虐無所畏忌將自亡楚君子干涉五難以弒舊君誰能濟之杜言楚借君子干以弒靈王終無能成有楚國者其棄疾乎君陳蔡城外屬焉杜城方城也時穿封戍既死棄疾并領陳事苛慝不作盜賊伏隱林上不為虐惡之政以厲民民不為盜賊之行以姦上苛音何慝他得反私欲不違不以私欲違民事民無怨心先神命之先神謂羣望國民信之芉姓有亂必季實立楚之常也林楚芉姓季少子也芉彌爾反獲神一也當璧拜有民二也民信之令德三也無苛慝寵貴四也貴妃子居常五也杜棄疾季有五利以去五難誰能害之子干之宫則右尹也數其貴寵則庶子也林右尹宫畀庶子寵卑去起吕反數所主反以神所命則又逺之其貴亡矣杜位不尊逺千萬反亡音無又如字其寵棄矣父既沒故民無懷焉杜非合德國無與焉杜無內主將何以立宣子曰齊桓晉文不亦是乎杜皆庶賤對曰齊桓衛姬之子也有寵於僖衛姬齊僖公妾有鮑叔牙賓須無隰朋以為輔佐有莒衛以為外主杜齊桓出奔莒衛有舊氏之助有國髙以為內主杜國氏髙氏齊上卿從善如流甚言其疾也下善齊肅杜齊嚴也肅敬也下遐嫁反齊側皆反不藏賄杜清也賄呼罪反不從欲杜儉也從子用反施舍不倦按施舍猶言布恩德求善不厭是以有國不亦宜乎我先君文公狐季姬之子也有寵於獻好學而不二杜言篤志厭於艷反好呼報反生十七年有士五人杜狐偃趙衰顛頡魏武子司空季子五士從出有先大夫子餘子犯以為腹心杜子餘趙衰子犯狐偃有魏犨賈他以為股肱杜魏犨魏武子也稱五人而説四士賈他又不在本數蓋叔向所賢他徒何反有齊宋秦楚以為外主齊妻以女宋贈以馬楚王享之秦伯納之有欒郤狐先以為內主杜謂欒枝郤穀狐突先軫也欒魯官反郤去逆反亡十九年守志彌篤惠懷棄民言惠公懷公不恤民也民從而與之獻無異親民無異望林獻公之子九人惟文公在是無異親惠懷不恤其民民歸文公故無異望天方相晉將何以代文林天方助晉成其霸業將有何君可以代文公者相息亮反此二君者異於子干共有寵子國有奧主杜謂棄疾也共音恭無施於民無援於外去晉而不送歸楚而不逆何以冀國杜傳言子干所以蒙弒君之名棄疾所以得國施式豉反晉成虒祁在八年虒音斯諸侯朝而歸者皆有二心賤其奢也為取郠故杜取郠在十年為于偽反郠工杳反晉將以諸侯來討叔向曰諸侯不可以不示威人知晉德薄欲以威服之乃並徵會告于吳秋晉侯會吳子于良林下邳有良城縣水道不可杜水道不通不可為會吳子辭乃還辭不會七月丙寅治兵于邾南甲車四千乘三十萬人乘繩證反下同羊舌鮒攝司馬杜鮒叔向弟也欇兼官也鮒音附遂合諸侯于平丘子産子大叔相鄭伯以會子産以幄幕九張行杜幄幕軍旅之帳林四合象官室曰幄在上曰幕幄於角反幕音莫子大叔以四十既而悔之每舍損焉林一宿為舍每遇宿舍減損其數及會亦如之杜亦九張也傳言子産之適宜大叔之從善次于衛地叔鮒求貨於衛淫芻蕘者林飼牲曰芻草薪曰蕘縱淫芻蕘之人欲使衛患之而致貨芻初俱反蕘如遙反衛人使屠伯饋叔向羮與一篋錦杜屠伯衛大夫屠音徒饋其位反篋苦協反曰諸侯事晉未敢擕二况衛在君之宇下杜屋宇之下喻近也而敢有異志芻蕘者異於他日敢請之杜請止之叔向受羮反錦杜受羮示不逆其意且非貨曰晉有羊舌鮒者瀆貨無厭杜瀆數也瀆徒水反厭於鹽反亦將及矣杜將及禍為此役也役事也為如字或于偽反子若以君命賜之其已林子謂屠伯若以衛君之命以錦賜之其可禁止客從之未退而禁之林客謂屠伯衛客未退而叔鮒已禁芻蕘者言其賣貨之甚晉人將尋盟齊人不可杜有二心故晉侯使叔向告劉獻公杜獻公王卿士劉子曰抑齊人不盟若之何對曰盟以底信底致也底音旨君苟有信諸侯不二何患焉告之以文辭董之以武師雖齊不許君庸多矣杜董督也庸功也討之有辭故功多也天子之老請帥王賦元戎十乘以先啓行杜天子大夫稱老元戎戎車在前者啓開也行道也遲速唯君欲佐晉討齊叔向告于齊曰諸侯求盟已在此矣今君弗利寡君以為請對曰諸侯討二則有尋盟若皆用命何盟之尋託用命以拒晉叔向曰國家之敗有事而無業事則不經杜業貢賦之業林經常也有業而無禮經則不序杜須禮而有次序有禮而無威序則不共林禮須威嚴而後共有威而不昭共則不明威須昭告神而後信義著明不明棄共百事不終所由傾覆也信義不明則棄威不威棄禮無禮無經無經無業故百事不成覆芳服反是故明王之制使諸侯嵗聘以志業志識也嵗聘以修其職業間朝以講禮三年而一朝正班爵之義率長幼之序間間厠之間再朝而會以示威六年而一會以訓上下之則制財用之節再會而盟以顯昭明杜十二年而一盟所以昭信義也凡八聘四朝再會王一巡守盟于方嶽之下志業於好講禮於等示威於衆昭明於神林志貢賦之業在於交好故使聘講上下之禮在於等列故使朝示可畏之威在於聚衆為會故使會昭盟誓之信義在於要告神明故使盟好呼報反自古以來未之或失也存亡之道恆由是興林守之則安存廢之則危亡常由此起晉禮主盟依先王先公舊禮先諸侯盟懼有不治奉承齊犧杜齊盟之犧牲犧許宜反而布諸君求終事也杜終竟也君曰余必廢之何齊之有杜何齊肅為盟之有唯君圖之寡君聞命矣齊人懼對曰小國言之大國制之杜小國言其情大國制其義敢不聽從既聞命矣敬共以往遲速唯君叔向曰諸侯有間矣言間隙也不可以不示衆八月辛未治兵習戰建而不斾杜建立旌旗不曳其斾斾遊也斾步貝反壬申復斾之諸侯畏之軍將戰則斾故曳斾以恐之復扶又反邾人莒人訴于晉曰魯朝夕伐我幾亡矣自昭公即位邾魯同好又不朝夕伐莒無故怨訴晉人信之所謂讒慝𢎞多我之不共魯故之以杜不共晉貢以魯故也共音恭晉侯不見公使叔向來辭曰諸侯將以甲戌盟寡君知不得事君矣請君無勤杜託謙辭以絶魯子服惠伯對曰君信蠻夷之訴蠻夷謂邾莒以絶兄弟之國棄周公之後亦唯君寡君聞命矣叔向曰寡君有甲車四千乘在雖以無道行之必可畏也況其率道其何敵之有牛雖瘠僨於豚上其畏不死林僨仆也豚小豬也以瘠牛仆於小豚之上牛不畏豚之不死亦猶晉不畏魯之不亡也瘠在亦反僨方問反南蒯子仲之憂林事在前年其庸可棄乎杜棄猶忘也若奉晉之衆用諸侯之師因邾莒杞鄫之怒四國近魯數以小事相忿鄫已滅其民猶存故并以恐魯鄫才陵反以討魯罪間其二憂因南蒯子仲二憂為間隙何求而弗克魯人懼聽命不敢與盟甲戌同盟于平丘齊服也杜經所以稱同令諸侯日中造于除除地為壇盟會處造亡報反癸酉退朝先盟朝晉子産命外僕速張於除杜外僕掌次舍大夫也子産使之速張幄幕於所除地子大叔止之使待明曰及夕子産聞其未張也使速往乃無所張矣杜地已滿也傳言子産每事敏於大叔及盟子産爭承承貢賦之次曰昔天子班貢輕重以列杜列位也列尊貢重周之制也杜公侯地廣故所貢者多卑而貢重者甸服也甸服謂天子畿內共職貢者鄭伯男也而使從公侯之貢杜言鄭國在甸服外爵列伯子男不應出公侯之貢懼弗給也敢以為請諸侯靖兵好以為事杜靖息也好呼報反行理之命行理使人通聘問者無月不至貢之無藝杜藝法制小國有闕所以得罪也諸侯修盟存小國也貢獻無極亡可待也存亡之制將在今矣林貢賦法輕則小國存貢賦法重則小國亡在今日立法自日中以爭至于昏晉人許之既盟子大叔咎之曰諸侯若討其可瀆乎杜瀆易也咎其九反子産曰晉政多門杜政不出一家二偷之不暇何暇討杜二不一偷苟且國不競亦陵何國之為杜不競爭則為人所侵陵不成為國公不與盟信邾莒之訴欲討魯故晉人執季孫意如以幕蒙之杜蒙裹也使狄人守之司鐸射魯大夫鐸待洛反射食亦反食又夜反懷錦奉壺飲氷以蒲伏焉守者御之乃與之錦而入林氷箭筒可以取飲司鐸射懷錦奉壺飲以氷承之蓋蒲伏竊往飲季孫也奉芳勇反蒲步都反伏蒲北反又音服御魚吕反飲於鴆反晉人以平子歸子服湫從杜湫子服惠伯從至晉湫子小反徐音椒從才用反子産歸未至聞子皮卒哭且曰吾已已猶決竟無為為善矣唯夫子知我杜言子皮知己之善仲尼謂子産於是行也足以為國基矣詩曰樂只君子邦家之基杜詩小雅言樂與君子為治乃國家之基本子産君子之求樂者也且曰合諸侯藝貢事林藝極貢賦之事使有定制禮也嫌爭競不順故以禮明之鮮虞人聞晉師之悉起也五年傳曰遺守四千以甲車四千乘故為悉起而不警邊且不修備言夷狄無謀晉荀吳自著雍以上軍侵鮮虞及中人驅衝競杜中山望都縣西北有中人城驅衝車與狄爭起大獲而歸為十五年晉伐鮮虞起楚之滅蔡也靈王遷許胡沈道房申於荆焉平王即位既封陳蔡而皆復之禮也杜滅蔡在十一年許胡沈小國也道房申皆故諸侯楚滅以為邑荆荆山也傳言平王得安民之禮汝南有吳防縣即防國隱大子之子廬歸于蔡禮也杜隱大子大子有也廬蔡平侯悼大子之子吳歸于陳禮也杜悼大子偃師也吳陳惠公冬十月葬蔡靈公禮也杜國復成禮以葬也此陳蔡事傳皆言禮言楚所封不得比諸侯故明之公如晉荀吳謂韓宣子曰諸侯相朝講舊好也執其卿而朝其君有不好焉林執季孫意如而受昭公之朝於和好有不順焉舊好呼報反不如辭之乃使士景伯辭公于河景伯士文伯之子彌年也吳滅州來令尹子旗請伐吳王弗許曰吾未撫民人未事鬼神未修守備未定國家而用民力敗不可悔州來在吳猶在楚也林州來之邑雖為吳有可以復取而有之猶在楚無異也守手又反子姑待之傳言平王所以能有國季孫猶在晉子服惠伯私於中行穆子杜私與之語曰魯事晉何以不如夷之小國魯兄弟也土地猶大所命能具杜晉之命令尚能供給若為夷棄之使事齊楚其何瘳於晉杜瘳差也為千偽反下同瘳敕留反親親與大賞共罰否所以為盟主也子其圖之諺曰臣一主二言臣必有二主道不合得去事他國吾豈無大國言非獨晉可事穆子告韓宣子且曰楚滅陳蔡不能救而為夷執親將焉用之乃歸季孫惠伯曰寡君未知其罪合諸侯而執其老杜老尊卿稱焉於虔反若猶有罪死命可也杜死晉命也若曰無罪而惠免之諸侯不聞是逃命也何免之為請從君惠於會杜欲得盟會見遣不欲私去宣子患之謂叔向曰子能歸季孫乎對曰不能鮒也能杜鮒叔魚乃使叔魚叔魚見季孫曰昔鮒也得罪於晉君自歸于魯君杜蓋襄公十一年坐叔虎與欒氏黨并得罪微武子之賜不至於今武子季平子祖父雖獲歸骨於晉猶子則肉之杜猶已死枯骨而季氏再生其肉也敢不盡情歸子而不歸林言己歸子而子不肯歸鮒也聞諸吏將為子除館於西河杜西使近河其若之何且泣杜泣以信其言平子懼先歸惠伯待禮待見遣之禮左傳杜林合注三十八
