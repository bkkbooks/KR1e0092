body:
  text: 左傳杜林合注卷十一明王道焜趙如源同編僖公三經丁丑十有六年春王正月戊申朔隕石于宋五杜隕落也聞其隕視之石數之五各隨其聞見先後而記之莊七年星隕如雨見星之隕而墜於四逺若山若水不見在地之騐此則見在地之騐而不見始隕之星史各據事而書隕十敏反是月六鷁退飛過宋都杜是月隕石之月重言是月嫌同日鷁水鳥高飛遇風而退宋人以為災告於諸侯故書林言是月與隕石同月而不同日也望之六見之鷁察之退飛此亦隨聞見先後而記之與上同是月本或作是日鷁五厯反本或作鷁音同六其數也過古禾反三月壬申公子季友卒杜無傳稱字者貴之公與小歛故書日林自是季氏世為卿夏四月丙申鄫季姬卒無傳鄫似陵反秋七月甲子公孫兹卒無傳冬十有二月公㑹齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮杜臨淮郡左右林兵車之㑹四邢音刑淮音懷傳十六年春隕石于宋五隕星也杜但言星則嫌星使石隕故重言隕星林星陽物隕至地則化為石六鷁退飛過宋都風也六鷁遇迅風而退飛風高不為物害故不記風之異周内史叔興聘于宋宋襄公聞焉曰是何祥也吉凶焉在杜祥吉凶之先見者襄公以為石隕鷁退能為禍福之始故問其所在焉於䖍反對曰今兹魯多大喪杜今兹此嵗林魯季友公孫兹卒明年齊有亂君將得諸侯而不終杜魯喪齊亂宋襄公不終别以政刑吉凶他占知之退而告人曰君失問是隂陽之事非吉凶所生也杜言石隕鷁退陰陽錯逆所為非人所生襄公不知陰陽而問人事故曰君失問叔興自以對非其實恐為有識所譏故退而告人吉凶由人吾不敢逆君故也杜積善餘慶積惡餘殃故曰吉凶由人君問吉凶不敢逆之故假他占以對夏齊伐厲不克救徐而還杜十五年齊伐厲以救徐秋狄侵晉取狐廚受鐸涉汾及昆都因晉敗也杜狐廚受鐸昆都晉三邑平陽臨汾縣西北有狐谷亭汾水出太原南入河狐音胡㕑直誅反鐸徒各反汾扶云反王以戎難告于齊齊徴諸侯而戍周杜十一年戎伐京師以來遂為王室難難乃旦反冬十一月乙卯鄭殺子華終管仲之言事在十年十二月㑹于淮謀鄫且東略也杜鄫為淮夷所病故林畧巡行也終九年宰孔之言城鄫役人病有夜登丘而呼曰齊有亂不果城而還杜役人遇厲氣不堪久駐故作妖言呼火故反還音旋經戊寅十有七年春齊人徐人伐英氏英於京反夏滅項杜項國今汝陰項縣公在㑹别遣師滅項不言師諱之林公猶在㑹而師滅項非公命也此失兵權之漸項胡講反魯滅之也二傳以為齊滅秋夫人姜氏㑹齊侯于卞杜卞今魯國下縣卞皮彦反九月公至自㑹公既見執於齊猶以㑹致者諱之冬十有二月乙亥齊侯小白卒杜與僖公八同盟赴以名林桓公卒齊亂明年孝公立傳十七年春齊人為徐伐英氏以報婁林之役也英氏楚與國婁林役在十五年為于偽反夏晉大子圉為質于秦秦歸河東而妻之杜秦征河東置官司在十五年圉魚吕反質音致下同妻七計反下同惠公之在梁也林惠公以六年奔梁梁伯妻之梁嬴孕過期杜過十月不産懐子曰孕嬴音盈下同孕以證反過古禾反卜招父與其子卜之卜招父梁太卜招上遙反其子曰將生一男一女招曰然男為人臣女為人妾故名男曰圉女曰妾杜圉養馬者不聘曰妾及子圉西質妾為宦女焉林秦居西方故曰西質妾亦同時宦事秦為妾志招父之言騐宦音患師滅項杜師魯師淮之㑹公有諸侯之事未歸而取項杜淮㑹在前年冬諸侯之事㑹同講禮之事齊人以為討而止公杜内諱執皆言止秋聲姜以公故㑹齊侯于卞聲姜僖公夫人齊女林為僖公被執之故㑹齊以請僖公九月公至書曰至自㑹猶有諸侯之事焉林猶若有諸侯㑹同之事焉且諱之也恥見執故託㑹以告廟齊侯之夫人三王姬徐嬴蔡姬皆無子齊侯好内林好女色也好呼報反多内寵内嬖如夫人者六人林妾媵之得嬖寵如夫人禮秩者六人嬖必計反長衛姬生武孟杜武孟公子無虧林有衛二姬故以長少别之長丁丈反少衛姬生惠公杜公子元少詩照反鄭姬生孝公杜公子昭葛嬴生昭公杜公子潘密姬生懿公杜公子商人宋華子生公子雍杜華氏之女子姓華户化反公與管仲屬孝公於宋襄公以為大子雍巫有寵於衛共姬因寺人貂以薦羞於公杜雍巫雍人名巫即易牙林共姬長衛姬寺人閹宦名貂者有寵於桓公故易牙因之而薦食味於公羞食味也易牙善烹羞故以滋味進屬音燭共音恭本亦作恭貂音彫亦有寵公許之立武孟杜易牙既有寵於公為長衛姬請立武孟管仲卒五公子皆求立冬十月乙亥齊桓公卒杜乙亥月八日林此言齊桓公不能修身齊家以至身死國亂為天下笑易牙入與寺人貂因内寵以殺羣吏杜内寵内官之有權寵者而立公子無虧孝公奔宋十二月乙亥赴辛巳夜殯杜六十七日乃殯殯必刃反經己卯十有八年春王正月宋公曹伯衛人邾人伐齊納孝公夏師救齊無傳五月戊寅宋師及齊師戰于甗齊師敗績無虧既死曹衛邾先去魯亦罷歸故宋師獨與齊戰不稱宋公不親戰也大崩曰敗績甗齊地甗魚免反又魚偃反又音言一音彦狄救齊無傳救四公子之徒秋八月丁亥葬齊桓公杜十一月而葬亂故八月無丁亥日誤冬邢人狄人伐衛杜狄稱人者史異辭傳無義例林狄稱人之始傳十八年春宋襄公以諸侯伐齊林宋襄公受齊侯管仲立孝公之託孝公又奔在宋故宋以諸侯伐齊納之三月齊人殺無虧杜以説宋鄭伯始朝于楚中國無覇故楚子賜之金林金銅鐵之屬既而悔之與之盟曰無以鑄兵杜楚金利故鑄之樹反故以鑄三鐘杜古者以銅為兵傳言楚無霸者逺畧齊人將立孝公不勝四公子之徒遂與宋人戰杜無虧已死故曰四公子勝音升又升證反夏五月宋敗齊師于甗立孝公而還秋八月葬齊桓公孝公立而後得葬冬邢人狄人伐衛圍菟圃衛侯以國讓父兄子弟及朝衆曰茍能治之燬請從焉杜燬衛文公名林衛文公遭狄之禍乃以衛國遜讓其諸伯父叔父兄弟及在朝之臣言衛國患害茍父兄諸臣能治衛國之事請從其後也莬音徒圃布古反又音布燬吁委反衆不可杜不聼衛侯讓而後師于訾婁杜訾婁衛邑林蓋衛文公以讓國激怒國人而後陳師禦狄于訾婁之邑訾子斯反婁即句反又即釣反狄師還杜獨言狄還則邢畱距衛言邢所以終為衛所滅梁伯益其國而不能實也杜多築城邑而無民以實之命曰新里秦取之林秦乘其虚而取其地經庚辰十有九年春王三月宋人執滕子嬰齊杜稱人以執宋以罪及民告例在成十五年傳例不以民為義書名及不書名皆從赴見宋襄公圗覇嬰于盈反夏六月宋公曹人邾人盟于曹南無傳曹雖與盟而猶不服不肯致餼無地主之禮故不以國地而曰曹南所以及秋而見圍鄫子㑹盟于邾不及曹南之盟諸侯既罷鄫乃㑹之於邾故不言如㑹己酉邾人執鄫子用之杜稱人以執宋以罪及民告也鄫雖失大國㑹盟之信然宋用之為罰已虐故直書用之言若用畜産也不書社赴不及也不書宋使邾而以邾自用為文南面之君善惡自專不得託之於他命秋宋人圍曹林諸夏圍國始此衛人伐邢伐邢在圍曹前經書在後從赴冬㑹陳人蔡人楚人鄭人盟于齊杜地於齊齊亦與盟林楚始與夏盟書法如盟幽翟泉謹始也梁亡杜以自亡為文非取者之罪所以惡梁傳十九年春遂城而居之豕上年傳取新里故不復言秦也為此冬梁亡傳宋人執滕宣公林即經書嬰齊夏宋公使邾文公用鄫子于次睢之社欲以屬東夷杜睢水受汴東經陳畱梁譙沛彭城縣入泗此水次有妖神東夷皆社祠之蓋殺人而用祭林宋襄公圖霸故使邾殺鄫子為犠牲以祭之欲徼福于神以屬東夷之衆睢音雖屬邾欲反司馬子魚曰古者六畜不相為用杜司馬子魚公子目夷也六畜不相為用謂若祭馬先不用馬林六畜牛馬羊犬豕雞也畜許又反為于偽反下為人同又如字小事不用大牲林謂若釁廟用羊釁門及夾室用雞之類而况敢用人乎祭祀以為人也民神之主也用人其誰享之齊桓公存三亡國以屬諸侯杜三亡國魯衛邢林閔二年立僖城魯僖元年城邢夷儀二年城衛楚丘或曰城邢城衛城縁陵也以存亡繼絶之義聯屬中國之諸侯義士猶曰薄徳杜謂欲因亂取魯緩救邢衛今一㑹而虐二國之君杜宋公三月以㑹召諸侯執滕子六月而㑹盟其月二十三日執鄫子故云一㑹而虏二國之君又用諸淫昬之鬼杜非周社故將以求霸不亦難乎得死為幸杜恐其亡國秋衛人伐邢以報菟圃之役杜邢不速退所以獨見伐於是衛大旱卜有事于山川不吉林有事祭也卜祭山川以祈雨甯莊子曰昔周飢克殷而年豐今邢方無道諸侯無伯伯長也林諸侯無伯長以任征討天其或者欲使衛討邢乎從之師興而雨林釋言伐邢合天意宋人圍曹討不服也曹南盟不修地主之禮故子魚言於宋公曰文王聞崇徳亂而伐之軍三旬而不降杜崇崇侯虎降户江反下同退修教而復伐之因壘而降林壘軍壘也言不増兵但因舊壘而崇自服復扶又反一本作而復之伐衍字壘力軌反詩曰刑于寡妻至于兄弟以御于家邦杜詩大雅言文王之教自近及逺寡妻嫡妻謂大似也刑法也御如字治也詩音五嫁反迎也今君徳無乃猶有所闕而以伐人若之何林此言不正已而正人如之何可以服人盍姑内省徳乎無闕而後動盍胡臘反陳穆公請修好於諸侯以無忘齊桓之徳冬盟于齊修桓公之好也杜宋襄暴虐故思齊桓好呼報反下同梁亡不書其主自取之也不書取梁者主名初梁伯好土功亟城而弗處民罷而弗堪則曰某宼將至乃溝公宫林亟城其邑而無民以居處其地民人罷勞而弗堪其工役則誑其民曰某處之寇盜將至乃塹公宫蓋鑿池環城公宫杜溝塹亟欺冀反罷音皮曰秦將襲我民懼而潰秦遂取梁林無故而塹其宫懼民不從役乃誑之以秦將掩我之不備民懼秦宼遂恐懼而逃散潰户外反經辛巳二十年春新作南門杜魯城南門也本名稷門僖公更高大之今猶不與諸門同改名高門也言新以易舊言作以興事皆更造之文也夏郜子來朝無傳郜姬姓國郜古報反字林工竺反五月乙巳西宫災杜無傳西宫公别宫也天火曰災例在宣十六年鄭人入滑杜入例在襄十三年林滑姬姓國滑于八反秋齊人狄人盟于邢冬楚人伐隨傳二十年春新作南門書不時也失土功之時也凡啟塞從時門户道橋謂之啟城郭牆塹謂之塞皆官民之開閉不可一日而闕故特隨壊時而治之今僖公修餙城門非開閉之急故以土功之制譏之傳嫌啟閉皆從土功之時故别起從時之例塞素則反滑人叛鄭而服於衛夏鄭公子士洩堵宼帥師入滑杜公子士鄭文公子洩堵宼鄭大夫洩息列反堵丁吕反又音者秋齊狄盟于邢為邢謀衛難也林二國為盟衛伐邢故為于偽反難乃旦反於是衛方病邢林衛自前年伐邢至今常為邢病隨以漢東諸侯叛楚林隨居漢水之東故以漢東諸侯叛背楚國冬楚鬭榖於菟帥師伐隨取成而還林取平於隨而還師穀奴口反於音烏菟音徒君子曰隨之見伐不量力也量力而動其過鮮矣善敗由已而由人乎哉林善成也成敗無不由已求之也鮮息淺反下同詩曰豈不夙夜謂行多露杜詩名南言豈不欲早暮而行懼多露之濡已以喻違禮而行必有汚辱是亦量宜相時而動之義宋襄公欲合諸侯林宋襄公圖霸故欲合諸侯臧文仲聞之曰以欲從人則可杜屈己之欲從衆之善以人從欲鮮濟林屈人之情從已之欲少有能濟者杜為明年鹿上盟傳經壬午二十有一年春狄侵衛無傳為邢故宋人齊人楚人盟于鹿上杜鹿上宋地汝陰有原鹿縣宋為盟主故在齊人上夏大旱雩不獲雨故書旱自夏及秋五稼皆不收秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂杜盂宋地楚始與中國行㑹禮故稱爵林楚始書子宋楚初爭長也盂音于執宋公以伐宋杜不言楚執宋公者宋無徳而爭盟為諸侯所疾故總見衆國共執之文林不言楚執宋公不以夷狄執中國之辭也冬公伐邾無傳為邾滅須句故楚人使宜申來獻㨗杜無傳獻來㨗也不言宋者秋伐宋冬來獻㨗事不異年從可知不稱楚子使來不稱君命行禮林楚大夫始見經獻軒建反㨗在接反十有二月癸丑公㑹諸侯盟于薄釋宋公杜諸侯既與楚兵伐宋宋服故為薄盟以釋之公本無㑹期聞盟而往故書公㑹諸侯林書諸侯不予楚之専執専釋也薄如字傳二十一年春宋人為鹿上之盟以求諸侯於楚林乞靈於楚以求諸侯為霸楚人許之公子目夷曰小國爭盟禍也宋其亡乎幸而後敗林宋小於楚而爭為盟主禍難之階宋其將有滅亡之憂以敗軍為天幸夏大旱公欲焚巫尫杜巫尫女巫也主祈禱請雨者或以為尫非巫也瘠病之人其面上向俗謂天哀其病恐雨入其鼻故為之旱林公以巫舞雩不雨尫上向致旱欲焚之尫烏黄反臧文仲曰非旱僃也修城郭貶食省用務穡勸分此其務也林修築城郭則飢民得就食君去盛饌減省用以稼穡為先務如今貨種借牛之類勸富民分財粟以賑貧民此五者備旱之先務杜穡儉也貶彼撿反省所景反巫尫何為天欲殺之林殺之可以弭旱是天欲殺之則如勿生若能為旱焚之滋甚林焚之則逆天意將愈甚其旱公從之是嵗也饑而不害林以饑民得食賑恤有方故雖饑而不為害杜不傷害民秋諸侯㑹宋公于盂子魚曰禍其在此乎君欲已甚其何以堪之林宋君之貪欲已甚其何以堪成霸之事言必不堪得諸侯也於是楚執宋公以伐宋冬㑹于薄以釋之子魚曰禍猶未也未足以懲君林子魚見宋公得釋殊無戒懼之心知襄公猶貪諸侯禍尚未已杜為二十二年戰泓傳懲直升反任宿須句顓臾風姓也實司大皥與有濟之祀杜司主也大皥伏羲四國伏羲之後故主其祀任今任城縣也顓臾在泰山南武陽縣東北須句在東平須昌縣西北四國封近於濟故世祀之任音壬顓音専臾羊朱反風姓也本或作皆風姓太音泰皥胡老反濟子禮反以服事諸夏與諸夏同服王事夏户雅反下同邾人滅須句須句子來奔因成風也林成風僖公之母須句之女故須句子因之成風為之言於公曰崇明祀保小寡周禮也杜明祀太皥有濟之祀保安也林尊崇神明之祭祀保安小國之寡弱周室之典禮也為于偽反蠻夷猾夏周禍也杜此邾滅須句而曰蠻夷昭二十三年叔孫豹曰邾又夷也然則邾雖曹姓之國迫近諸戎雜用夷禮故極言之猾夏亂諸夏林諸侯皆周之臣子故言周室之禍猾于八反若封須句林須句已為邾所滅故勸公封之是崇皥濟而修祀紓禍也林是尊崇太皥有濟而修周室祭祀之禮警蠻夷而紓周室猾夏之禍杜紓嶰也為明年伐邾傳紓音舒經癸未二十有二年春公伐邾取須句杜須句雖别國而削弱不能自通為魯私屬若顓臾之比魯謂之社稷之臣故滅奔及反其君皆略不備書唯書伐邾取須句林春秋嚴義利之辨茍以為利一以取書之是故雖邾滅須句須句子來奔伐邾取須句反其君焉書取須句鉏莒著丘公立而不撫鄫鄫叛而來書取鄫夏宋公衛侯許男滕子伐鄭秋八月丁未及邾人戰于升陘杜升陘魯地邾人縣公胄于魚門故深恥之不言公又不言師敗績陘音刑冬十有一月己巳朔宋公及楚人戰于泓宋師敗績杜泓水名宋伐鄭楚救之故戰也楚告命不以主帥人數故畧稱人傳二十二年春伐邾取須句及其君焉禮也得恤寡小之禮三月鄭伯如楚夏宋公伐鄭子魚曰所謂禍在此矣杜怒鄭至楚故伐之為下泓戰起林前年所謂爭盟之禍在此役矣蓋知楚必救鄭也初平王之東遷也杜周幽王為犬戎所滅平王嗣立故東遷洛邑辛有適伊川見被髮而祭於野者辛有周大夫伊川周地伊水也被皮寄反曰不及百年此其戎乎其禮先亡矣杜被髮而祭有象夷狄林中國衣冠之禮先亡知其必為夷狄也秋秦晉遷陸渾之戎于伊川杜允姓之戎居陸渾在秦晉西北二國誘而徙之伊川遂從戎號至今為陸渾縣也計此去辛有過百年而云不及百年傳舉其事驗不必其年信渾户門反一音胡因反晉大子圉為質於秦將逃歸謂嬴氏曰與子歸乎杜嬴氏秦所妻子圉懐嬴也質音致對曰子晉大子而辱於秦子之欲歸不亦宜乎寡君之使婢子侍執巾櫛杜婢子婦人之卑稱也林懐嬴謙言秦君使我陪侍執巾櫛之賤役巾以帨手櫛以理髮皆賤役櫛側已反以固子也林蓋欲以安固子之心也從子而歸棄君命也不敢從亦不敢言遂逃歸林不敢從汝而歸恐失君臣之義不敢漏泄此言恐傷夫婦之恩傳終史蘇之占富辰言於王曰請召大叔杜富辰周大夫大叔王子帶十二年奔齊大音泰詩曰協比其鄰昏姻孔云杜詩小雅言王者為政先和協近親則昏姻甚相歸附也鄰猶近也孔甚也云旋也比毗志反吾兄弟之不恊焉能怨諸侯之不睦林子帶為襄王之貴介弟尚出奔在外而不能和恊又安能怨四方諸侯之不親睦於王室哉焉於䖍反王説王子帶自齊復歸于京師王召之也傳終仲孫湫之言也為二十四年天王出居于鄭起説音悦邾人以須句故出師林邾以取須句之役怨魯故出師伐魯公卑邾不設僃而禦之杜卑小也御本亦作御音魚呂反臧文仲曰國無小不可易也林既謂之國無有弱小言不可輕易易以豉反下同無僃雖衆不可恃也林無戰守之備則我師雖衆多不可恃以必勝詩云戰戰兢兢如臨深淵如履薄冰杜詩小雅言常戒懼兢居陵反本或作矜又曰敬之敬之天惟顯思顯明也思猶辭也命不易哉杜周頌言有國宜敬戒天明臨下奉承其命甚難先王之明徳猶無不難也無不懼也况我小國乎君其無謂邾小蠭蠆有毒而况國乎林我周先王之有明徳奉若天道猶以天命不易為難保猶以戰兢臨深履薄為懼况魯之小國未有先王之明徳其可易而忽之乎蜂蠆至微之物螫人尚有毒何況鄰國甲兵之力比之蠭蠆不亦多乎蠭芳林容及本又作螽俗作蜂皆同蠆勅邁反一音勅戒反字作蠆丑介反又他割反弗聼八月丁未公及邾師戰于升陘我師敗績邾人獲公胄縣諸魚門杜胄兠鍪魚門邾城門升陘本亦作登陘縣音𤣥楚人伐宋以救鄭宋公將戰大司馬固諌曰天之棄商乆矣君將興之弗可赦也已杜大司馬固莊公之孫公孫固也言君興天所棄必不可不如赦楚勿與戰弗聼冬十一月己巳朔宋公及楚人戰于泓宋人既成列楚人未既濟杜未盡渡泓水司馬曰杜子魚也彼衆我寡及其未既濟也請擊之公曰不可既濟而未成列又以告公曰未可林請乘其半濟而擊之襄公曰不可迫人於險請乘其陣亂而擊之襄公曰未可乘人之亂既陳而後擊之宋師敗績公傷股門官殲焉門官守門者師行則在君左右殱盡也陳直覲反殱将廉反國人皆咎公公曰君子不重傷不禽二毛林言君子之用兵敵人被傷者不忍重傷之杜二毛頭白有二色咎其久反重直用反下同古之為軍也不以阻隘也不因阻隘以求勝隘於賣反寡人雖亡國之餘宋商紂之後不鼓不成列林鼓以進兵故不鼓以擊不成列之人恥以詐勝子魚曰君未知戰林言襄公末知戰鬭之道勍敵之人隘而不列天贊我也杜勍强也言楚在險隘不得陳列天所以佐宋勍其京反阻而鼓之不亦可乎猶有懼焉杜雖因阻擊之猶恐不勝且今之勍者皆吾敵也雖及胡耉獲則取之何有於二毛林且今之與吾競强者皆我之仇敵也雖及元老之尊為三軍獲則取之以歸何愛於班白二毛之人杜胡耉元老之稱耉音苟明恥教戰求殺敵也杜明設刑戮以恥不果傷未及死如何勿重杜言尚能害已若愛重傷則如勿傷愛其二毛則如服焉杜言茍不欲傷殺敵人則本可不須鬭三軍以利用也林以利興軍國之用金鼓以聲氣也杜鼓以佐士衆之聲氣林兵金鉦也鼓以進兵鉦以収利而用之阻隘可也聲盛致志鼓儳可也林既以利而興軍國之用迫敵人之隘以利吾國可也既以聲盛而致士卒勇鋭之志乘敵人之儳巖未陳阻而鼓之可也儳仕銜仕減二反丙子晨鄭文夫人芉氏姜氏勞楚子於柯澤杜楚子還過鄭鄭文公夫人芉氏楚女姜氏齊女也柯澤鄭地芉彌爾反楚姓也勞力報反柯音哥楚子使師縉示之俘馘杜師縉楚樂師也俘所得囚馘所截耳縉音晉俘芳扶反馘古獲反君子曰非禮也婦人送迎不出門見兄弟不踰閾林婦人送迎賔客不出門此言二夫人往勞非禮接見兄弟不踰門限此言芉氏與楚子兄弟也相見非禮杜閾門限閾音域一音况域反戎車不邇女器杜邇近也器物也言俘馘非近婦人之物丁丑楚子入享于鄭杜為鄭所享九獻用上公之禮九獻酒而禮畢庭實旅百杜庭中所陳品數百也加籩豆六品杜食物六品加於籩豆禮食器享畢夜出文芉送于軍取鄭二姬以歸杜二姬文芉女也叔詹曰林叔詹鄭大夫詹章亷反楚王其不没乎杜不以夀終没門忽反為禮卒于無别無别不可謂禮將何以没諸侯是以知其不遂霸也林受享為禮也而終之以取二甥女是終於尊卑無别多行無禮故知其將不得其死杜言楚子所以師敗城濮終為商臣所弑卒子恤反别彼列反下同經甲申二十有三年春齊侯伐宋圍緍杜緍宋邑高平昌邑縣東南有東緍城緍亡巾反夏五月庚寅宋公兹父卒杜三同盟襄公卒子成公王成立秋楚人伐陳冬十有一月杞子卒杜傳例曰不書名未同盟也杞入春秋稱侯莊二十七年絀稱伯至此用夷禮貶稱子林成公卒弟桓公姑容立傳二十三年春齊侯伐宋圍緡以討其不與盟于齊也十九年盟于齊以無忘桓公之徳而宋獨不㑹復召齊人共盟鹿上故今討之與音預夏五月宋襄公卒傷於泓故也林戰泓傷股而病以至於死終子魚之言得死為幸秋楚成得臣帥師伐陳討其貳於宋也成得臣子玉也遂取焦夷城頓而還杜焦今譙縣也夷一名城父今譙郡城父縣二地皆陳邑頓國今汝陰南頓縣焦子消反子文以為之功使為令尹林使子玉代已為令尹叔伯曰子若國何杜叔伯楚大夫薳呂臣也以為子玉不任令尹對曰吾以靖國也夫有大功而無貴仕其人能靖者與有幾林言我正欲以安靖楚國夫人有莫大之功而無顯貴之仕以處之其人能安靖而不矜功者歟不矜而安靖能有幾人言不多也杜言必矜功為亂不可不賞其人能靖者與絶句與音餘幾居豈反九月晉惠公卒杜經在明年從赴懐公命無從亡人杜懐公子圉亡人重耳期期而不至無赦林約朞月而不歸殺之無所赦宥期期上如字下音基本亦作朞狐突之子毛及偃從重耳在秦弗召杜偃子犯也從才用反冬懐公執狐突曰子來則免杜未期而執突以不召之故對曰子之能仕父教之忠古之制也策名委質貳乃辟也林自子之長能仕於君為父者則教其子以忠於所事此乃古先之法制杜名書於所臣之䇿屈膝而君事之則不可以貳辟罪也質如字辟婢亦反今臣之子名在重耳有年數矣若又召之教之貳也父教子貳何以事君刑之不濫君之明也臣之願也淫刑以逞誰則無罪林狐毛狐偃名書重耳之策非一年於此矣若又召之使歸是教之懐二心父不教子以忠而教子以貳何以盡事君之道若用刑罰而不滛濫君徳之明我所願欲若欲滛濫刑罰以快君心誰無辭可加罪濫力暫反臣聞命矣乃殺之卜偃稱疾不出曰周書有之乃大明服杜周書康誥言君能大明則民服已則不明而殺人以逞不亦難乎民不見徳而唯戮是聞其何後之有言懐公必無後於晉為二十四年殺懐公張本逞本亦作呈勑景反十一月杞成公卒書曰子杞夷也杜成公始行夷禮以終其身故於卒貶之杞實稱伯仲尼以文貶稱子故傳言書曰子以明之不書名未同盟也凡諸侯同盟死則赴以名禮也杜隠七年已見今重𤼵不書名者疑降爵故也此凡又為國史承告而書例赴以名則亦書之杜謂未同盟不然則否謂同盟而不以名告辟不敏也杜敏猶審也同盟然後告名赴者之禮也承赴然後書策史官之制也内外之宜不同故傳重詳其義晉公子重耳之及於難也晉人伐諸蒲城事在五年難乃旦反蒲城人欲戰重耳不可曰保君父之命而享其生禄杜享受也保猶恃也林言臣子所恃者以有君父之命而受其養生之禄邑於是乎得人林有禄邑而後能聚人有人而校罪莫大焉杜校報也林有民人而與君父校勝負其罪莫大于此校音教吾其奔也遂奔狄從者狐偃趙衰杜衰趙夙弟衰初危反顛頡魏武子武子魏犨頡月結反司空季子胥臣臼季也時狐毛賈佗皆從而獨舉此五人賢而有大功狄人伐廧咎如廧咎如赤狄之别種也隗姓屬在良反咎古刀反獲其二女叔隗季隗納諸公子公子取季隗生伯鯈叔劉以叔隗妻趙衰生盾杜盾趙宣子鯈直由反妻七計反下同盾徒本反將適齊謂季隗曰待我二十五年不來而後嫁對曰我二十五年矣又如是而嫁則就木焉杜言將死入木不復成嫁請待子處狄十二年而行林請終身待子不嫁重耳以五年奔狄至十六年適齊凡十二年而去請待子絶句過衛衛文公不禮焉出於五鹿杜五鹿衛地今衛縣西北有地名五鹿陽平元城縣東亦有五鹿乞食於野人野人與之塊公子怒欲鞭之子犯曰天賜也杜得土有固之祥故以為天賜塊苦對及又苦怪反稽首受而載之林重耳聞狐偃之言乃稽首禮謝受所予土而載之車及齊齊桓公妻之林以宗女姜氏妻重耳有馬二十乘四馬為乘八十匹也乘䋲證反下同公子安之林以齊為可安不復有四方之志從者以為不可將行謀於桑下杜齊桓既卒知孝公不可恃故蠶妾在其上林姜氏肓蠶之妾適采桑在其上而聞其謀以告姜氏姜氏殺之杜姜氏重耳妻恐孝公怒其去故殺妾以滅口而謂公子曰子有四方之志其聞之者吾殺之矣公子曰無之姜曰行也懐與安實敗名林懷人之寵與安已之居實足以敗壊功名敗必邁反公子不可姜與子犯謀醉而遣之林醉重耳以酒使從者載之而去醒以戈逐子犯杜無去志故怒醒星頂反及曹曹共公聞其駢脅欲觀其裸浴薄而觀之杜薄迫也駢脅合幹林駢合也脅肋也蓋腋下肋骨合比若一裸赤體也肋骨合比非赤體不可見故欲觀其裸伺重耳就浴迫近而觀之共音恭聞其駢脅絶句駢薄賢反脅許業反説文駢脅并也廣雅云脅幹謂之肋通俗云腋下謂之脅欲觀如字絶句一讀至裸字絶句裸力果戸化二反浴音欲薄如字國語云薄簾也僖負羈之妻曰林僖負羈曹大夫羈紀宜反吾觀晉公子之從者皆足以相國若以相若遂以為傳相相息亮反夫子必反其國林夫子謂重耳必得復反晉而為君反其國必得志於諸侯得志於諸侯而誅無禮曹其首也子盍蚤自貳焉杜自貳自别異于曹盍户臘反蚤音早乃饋盤飱寘璧焉臣無竟外之交故用盤藏璧飱中不欲令人見饋其貴反送也飱音孫説文云餔也字林云水澆飯也寘之豉反公子受飱反璧林受飱以領其意反璧以示不貪及宋宋襄公贈之以馬二十乘杜贈送也及鄭鄭文公亦不禮焉叔詹諌曰臣聞天之所啓人弗及也杜啓開也林天意所欲聞道之人人皆不可及晉公子有三焉天其或者將建諸林重耳有人不可及者三事疑是天意將建立之以為君也君其禮焉男女同姓其生不蕃晉公子姬出也而至于今一也林凡男女配合而以同姓者其美先盡故其子孫必不蕃盛故古者娶妻不娶同姓買妾不知其姓則卜之重耳乃犬戎狐姬所生而蕃盛至于今日此天意之可疑者也杜蕃息也蕃音煩離外之患而天不靖晉國殆將啓之二也林遭離驪姬之難出奔在外國而天不安靖晉國禍亂相仍庶幾將開道之此天意之可疑者二有三士足以上人而從之三也林國語狐偃趙衰賈佗三人皆相材足以居人之上而從重耳以為左右此天意之可疑者三從如字一音才用反晉鄭同儕杜儕等也儕壯皆反其過子弟固將禮焉况天之所啓乎弗聼及楚楚子饗之曰公子若反晉國則何以報不穀林不穀諸侯謙稱言何以報我之徳將以觀其志也過古禾反對曰子女玉帛則君有之羽毛齒革則君地生焉其波及晉國者君之餘也其何以報君林子女聲色之奉玉帛府庫之積則楚君之所素有鳥之長羽細毛獸之齒牙皮革則君地之所素産其餘波沾溉以及晉國者皆楚君享用之棄物也其將何物以報君徳曰雖然何以報我對曰若以君之靈得反晉國晉楚治兵遇於中原其辟君三舍若不獲命林三十里為一舍杜三退不得楚止命也其左執鞭弭右屬櫜鞬以與君周旋杜弭弓末無縁者櫜以受箭鞬以受弓屬著也周旋相追逐也弭莫國反屬音燭櫜古刀反鞬九言反子玉請殺之杜畏其志大楚子曰晉公子廣而儉杜志廣而體儉文而有禮林言雖文華而能約之以禮其從者肅而寛忠而能力林遇事肅敬而濟之以寛容盡忠事主而加之以勤力晉侯無親外内惡之杜晉侯惠公也林外如秦國内如里平之黨無不惡之惡烏路反吾聞姬姓唐叔之後其後衰者也其將由晉公子乎天將興之誰能廢之違天必有大咎乃送諸秦秦伯納女五人懐嬴與焉杜懷嬴子圉妻子圉諡懐公故號為懷嬴咎其九反與音預奉匜沃盥既而揮之杜匜沃盥器也揮煎也林奉匜以供沃盥既盥而揮匜水湔湎重耳奉芳勇反匜以支反一音以紙反説文云似羮魁柄中有道可注水盥古緩反揮許韋反怒曰秦晉匹也何以卑我林言秦晉匹敵之國也何故不敬吾君而使我奉匜供沃公子懼降服而囚去上服自拘囚以謝之他日公享之子犯曰吾不如衰之文也杜有文辭也衰初危反下同請使衰從公子賦河水河水逸詩義取河水朝宗于海海喻秦公賦六月六月詩小雅道尹吉甫佐宣王征伐喻公子還晉必能匡王國古者禮㑹因古詩以見意故言賦詩斷章也其全稱詩篇者多取首章之義他皆放此趙衰曰重耳拜賜林君前臣名故名重耳使拜秦賜公子降拜稽首公降一級而辭焉杜下階一級辭公子稽首級音急衰曰君稱所以佐天子者命重耳重耳敢不拜杜詩首章言匡王國次章言佐天子故趙衰因通言之為明年秦伯納之張本左傳杜林合注卷十一
