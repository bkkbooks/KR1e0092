body:
  text: 左傳杜林合注卷十明王道焜趙如源同編僖公二經庚午九年春王三月丁丑宋公御説卒杜四同盟林桓公卒子襄公兹父立御魚吕反説音悅夏公會宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘杜周公宰孔也宰官周采地天子三公不字宋子襄公也傳例曰在喪公侯曰子陳留外黃縣東有葵丘林衣裳之會九秋七月乙酉伯姬卒杜無傳公羊穀梁曰未適人故不稱國已許嫁則以成人之禮書不復殤也婦人許嫁而笄猶丈夫之冠九月戊辰諸侯盟于葵丘杜夏會葵丘次伯姬卒文不相比故重言諸侯宰孔先歸不與盟林桓之會有天子之事三於洮序王人於諸侯之上而同盟焉於葵丘而序周公於諸侯之上而不敢同盟焉盟於首止不但不同盟也而帥諸侯以會世子桓知節矣春秋是以子桓也甲子晉侯佹諸卒杜未同盟而赴以名甲子九月十一日戊辰十五日也書在盟後從赴林獻公卒子奚齊立佹九委反冬晉里克殺其君之子奚齊杜獻公未葬奚齊未成君故稱君之子奚齊受命繼位無罪故里克稱名林是年晉里克殺其君卓子晉惠公夷吾立殺如字傳同公羊音弒傳九年春宋桓公卒未葬而襄公會諸侯故曰子凡在喪王曰小童公侯曰子杜在喪未葬也小童者童蒙幼末之稱子者繼父之辭公侯位尊上連王者下絶伯子男周康王在喪稱豫一人釗禮稱亦不言小童或所稱之辭各有所施此謂王自稱之辭非諸下所得書故經無其事傳通取舊典之文以事相接夏會于葵丘尋盟且修好禮也好呼報反下于好同王使宰孔賜齊侯胙杜胙祭肉尊之比二王後胙才素反曰天子有事于文武杜有祭事也使孔賜伯舅胙杜天子謂異姓諸侯曰伯舅齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜林賜胙之後且有别命七十曰耋級等也言加賜一等無下階拜賜音耋田節反一音他結反勞力報反級急對曰天威不違顔咫尺杜言天鑒察不逺威嚴常在顔面之前八寸曰咫咫之氏反小白余敢貪天子之命無下拜杜小白齊侯名余身也恐隕越于下書隕越顛隊也據天王居上故言恐顛隊於下以遺天子羞敢不下拜下拜登受林貪命顚越是貽天子之羞耻敢不下階而拜杜拜堂下受胙於堂上遺於季反秋齊侯盟諸侯于葵丘曰凡我同盟之人既盟之後言歸于好杜義取修好故傳顯其盟辭宰孔先歸既會先諸侯去遇晉侯曰可無會也林時晉侯來會葵丘故言可不必往會齊侯不務德而勤逺略故北伐山戎在莊三十一年南伐楚在四年西為此會也東略之不知西則否矣其在亂乎君務靖亂無勤於行林更能經略東方則不可知西會既畢必無心經理四方縱晉國有亂必不遑恤也在察也其察禍亂之盟乎此以齊桓盛極而衰為禍亂之萌微戒晉獻殺嫡立庶言晉將有亂齊不能救君先務安靖晉國之禍難無勞逺行以來求會晉侯乃還不復會齊九月晉獻公卒里克丕鄭欲納文公故以三公子之徒作亂杜丕鄭晉大夫三公子申生重耳夷吾林以三公子之黨在晉國者作亂丕晉悲反初獻公使荀息傅奚齊公疾召之曰以是藐諸孤杜言其幼賤與諸子縣藐藐妙小反又亡角反辱在大夫其若之何欲屈辱荀息使保護之稽首而對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之公曰何謂忠貞對曰公家之利知無不為忠也林凡可以利益國家者茍知其事莫不盡心力而為之是謂盡忠於君送往事居耦俱無猜貞也林送往而死者謂獻公事居而生者謂奚齊杜耦兩也送死事生兩無疑恨所謂正也猜七才反及里克將殺奚齊先告荀息曰三怨將作杜三公子之徒秦晉輔之林秦與晉之國人皆輔佐而與之子將何如荀息曰將死之里克曰無益也荀叔曰吾與先君言矣不可以二能欲復言而愛身乎杜荀叔荀息也林吾嘗以死輔奚齊之言許獻公矣不可以有二心信近于義言可復也能欲其言之可復而愛其身之死乎雖無益也將焉辟之且人之欲善誰不如我我欲無二而能謂人已乎林謂里克欲盡忠於申生重耳等誰不如我欲盡忠於奚齊我欲無二心於奚齊不能止里克使不忠於申生等焉於虔反冬十月里克殺奚齊于次次喪寢書曰殺其君之子未葬也荀息將死之人曰不如立卓子而輔之荀息立公子卓以葬林卓子驪姬之娣所生子也人以卓子亦獻公嬖娣之子故勸使立而輔之荀息從其計立公子卓以葬獻公十一月里克殺公子卓于朝荀息死之君子曰詩所謂白圭之玷尚可磨也斯言之玷不可為也杜詩大雅言此言之缺難治甚於白圭玷丁簟反又丁念反荀息有焉有此詩人重言之義齊侯以諸侯之師伐晉及高梁而還討晉亂也杜高梁晉地在平陽縣西南令不及魯故不書林伐晉之令不及魯國杜前已發不書例今復重發嫌霸者異於凡諸侯令力政反本又作命晉郤芮使夷吾重賂秦以求入杜郤芮郤克祖父從夷吾者林夷吾即惠公也曰人實有國我何愛焉杜言國非已之有何愛而不以賂秦入而能民土於何有從之杜能得民不患無土齊隰朋帥師會秦師納晉惠公杜隰朋齊大夫隰音習秦伯謂郤芮曰公子誰恃對曰臣聞亡人無黨有黨必有讐杜言夷吾無黨無黨則無讐易出易入以微勸秦夷吾出奔在外故言亡人夷吾弱不好弄杜弄戲也林自幼弱時不好戲弄好呼報反能鬭不過杜有節制長亦不改不識其他林及既長成不改其行其他則不知也言其可以君晉長丁又反公謂公孫枝曰夷吾其定乎杜公孫枝秦大夫子桑也林言夷吾入晉能定其國乎對曰臣聞之唯則定國林唯有法則可以安定其國家詩曰不識不知順帝之則文王之謂也杜詩大雅帝天也則法也言文王暗行自然合天之法又曰不僭不賊鮮不為則杜僣過差也賊傷害也皆忌克也能不然則可為人法則僭子念反鮮息淺反無好無惡不忌不克之謂也林不識知則無好惡不僭賊則不忌克好呼報反又如字惡烏路反今其言多忌克難哉林今夷吾之言多猜疑好勝是僭賊而忌克也能定其國難哉公曰忌則多怨又焉能克是吾利也杜其言雖多忌適足以自害不能勝人也秦伯慮其還害已故曰是吾利宋襄公即位以公子目夷為仁使為左師以聽政於是宋治故魚氏世為左師杜子魚之後以王父字為氏故曰魚氏其後子孫世為左師之官反治直吏經辛未十年春王正月公如齊杜無傳林魯始屈於大國朝齊之始狄滅溫溫子奔衛林溫王畿地蓋中國之狄滅而居其地晉里克弒其君卓及其大夫荀息杜弒卓在前年而以今春書者從赴也獻公既葬卓已免喪故稱君也荀息稱名者雖欲復言本無逺謀從君於昏夏齊侯許男伐北戎無傳北戎山戎晉殺其大夫里克杜奚齊者先君所命卓子又以在國嗣位且未為無道而里克親為三怨之主纍弒二君故稱名以罪之秋七月冬大雨雪無傳平地尺為大雪雨于付反傳十年春狄滅溫蘇子無信也蘇子叛王即狄又不能於狄狄人伐之王不救故滅蘇子奔衛林蘇子周司寇蘇公之後也國於溫故曰溫子叛王事在莊十九年林反覆無常故曰無信也即狄之後又與狄人不相能夏四月周公忌父王子黨會齊隰朋立晉侯周公忌父周卿士王子黨周大夫晉侯殺里克以説杜自解説不篡將殺里克公使謂之曰微子則不及此林微猶無也言非因子之力則無由得反晉國為君雖然子弒二君與一大夫為子君者不亦難乎林謂殺奚齊卓子荀息則繼是而為子之君者不亦難與子同朝乎對曰不有廢也君何以興欲加之罪其無辭乎林不有奚齊卓子之廢則惠公將何以得興起而為君今君若欲加我之罪又何患無辭以殺我乎臣聞命矣伏劍而死于是丕鄭聘于秦且謝緩賂林謝秦以緩報入晉之賂故不及杜丕鄭里克黨以在秦故不及里克俱死晉侯改葬共大子杜共大子申生也共音恭本亦作恭大音泰秋狐突適下國杜下國曲沃新城遇大子大子使登僕忽如夢而相見狐突本為申生御故復使登車為僕而告之曰夷吾無禮余得請於帝矣杜請罰夷吾林夷吾為申生改葬加諡而曰無禮或謂指其蒸於賈君之事見十五年將以晉畀秦秦將祀余對曰臣聞之神不歆非類民不祀非族君祀母乃殄乎杜歆享也殄絶也林凡祭祀必以其族非其族類則神不歆享其祭祀神非其族類則民亦不恪奉其祭祀言秦晉非其族類則神不歆民不祀大子之祀必絶畀必利反歆許金反且民何罪失刑乏祀君其圖之林因怒夷吾而濫及其民是失刑以晉畀秦而自絶其祀是乏祀君曰諾吾將復請七日新城西偏將有巫者而見我焉杜新城曲沃也將因巫而見遍匹綿反許之遂不見杜狐突許其言申生之象亦沒見賢遍反又如字及期而往告之曰帝許我罰有罪矣敝於韓杜敝敗也韓晉地獨敝惠公故言罰有罪明不復以晉畀秦夷吾忌克多怨終於失國雖改葬加諡申生猶忿傳言鬼神所馮有時而信林為十五年秦獲晉侯張本丕鄭之如秦也林在今年夏言於秦伯曰吕甥郤稱冀芮實為不從若重問以召之杜三子晉大夫不從不與秦賂問聘問之幣稱尺證反又如字臣出晉君君納重耳蔑不濟矣杜蔑無也冬秦伯使泠至報問且召三子林秦穆公用丕鄭之計使大夫冷至報丕鄭之聘且召吕郤等泠力丁反卻芮曰幣重而言甘誘我也遂殺丕鄭祁舉杜祁舉晉大夫及七輿大夫林侯伯七命副車七乘故有七輿大夫之官左行共華右行賈華叔堅騅歂纍虎特宫山祁皆里丕之黨也杜七子七輿大夫行户剛反下同共音恭騅音佳歂市専反纍力追反祁巨之反又上户反丕豹奔秦杜丕豹丕鄭之子言於秦伯曰晉侯背大主而忌小怨民弗與也伐之必出林言晉惠公背秦穆之大主而不與秦賂忌里丕之小怨而多殺不辜以若所為故不為晉人所與秦若伐晉無民誰戰故必出奔背音佩公曰失衆焉能殺違禍誰能出君林謂惠公若失衆心安能殺里丕之黨丕豹既避禍在外誰能逐出其君杜為明年晉殺丕鄭傳焉於虔反經壬申十有一年春晉殺其大夫丕鄭父以私怨謀亂國書名罪之書春從告夏公及夫人薑氏會齊侯于陽穀杜無傳婦人送迎不出門見兄弟不踰閾輿公俱會齊侯非禮林齊侯之志荒矣秋八月大雩無傳過時故書冬楚人伐黃傳十一年春晉侯使以丕鄭之亂來告杜釋經書在今年天王使召武公內史過賜晉侯命天王周襄王召武公周卿士內史過周大夫諸侯即位天子賜之命圭為瑞遇古禾反受玉惰過歸告王曰晉侯其無後乎王賜之命而惰於受瑞先自棄也已其何繼之有禮國之幹也敬禮之輿也不敬則禮不行禮不行則上下昏何以長世林受瑞而有惰敖之容先自棄其顯命也已豈有可繼之道國恃禮而立猶木恃幹而立敬載禮而行猶車載人而行不敬是無與也故上慢下暴禮不能自行無禮是無幹也故上下昏亂國不能自立何以長永世祚乎為惠公不終張本惰徒卧反長直良反又丁丈反夏揚拒泉臯伊雒之戎同伐京師入王城焚東門杜揚拒泉臯皆戎邑及諸雜戎居伊水雒水之間者今伊闕北有泉亭拒俱字反臯古刀反王子帶召之也王子帶甘昭公也召戎欲因以篡位秦晉伐戎以救周秋晉侯平戎于王林晉惠公為周與戎講和言平戎于王尊卑之辭也為二十四年天王出居鄭傳黃人不歸楚貢冬楚人伐黃杜黃人恃齊故經癸酉十有二年春王三月庚午日有食之無傳不書朔官失之夏楚人滅黃林書伐書滅病桓公也以從會盟徒以亡其國耳秋七月冬十有二月丁丑陳侯杵臼卒杜無傳遣世子與僖公同盟寧母及洮林宣公卒子穆公款立杵昌吕反臼其九反傳十二年春諸侯城衛楚丘之郛懼狄難也杜楚丘衛國都郛郭也為明年春狄侵衛傳林知狄將侵衛故先完其城郭以備之郛芳扶反難乃旦反黃人恃諸侯之睦于齊也林黃從桓公之會盟見諸侯親睦于齊故恃之以為固不共楚職曰自郢及我九百里焉能害我夏楚滅黃林以見人之不可有所恃也杜郢楚都共音恭馬於虔反王以戎難故討王子帶杜子帶前年召戎周秋王子帶奔齊冬齊侯使管夷吾平戎于王使隰朋平戎于晉杜平和也前年晉救周伐戎故戎與周晉不和王以上卿之禮饗管仲林管仲下卿王為加禮設享宴故以上卿之禮饗之管仲辭曰臣賤有司也有天子之二守國高在林大國三卿其二卿命於天子則曰天子之守臣杜國子高子天子所命為齊守臣皆上卿也莊二十二年高傒始見經僖二十八年國歸父乃見傳歸父之父曰懿仲高傒之子曰莊子不知今當誰世守手又反若節春秋來承王命何以禮焉杜節時也林若春秋時事國高二子來聘于周奉承王室之命令臣既受上卿之禮則王室何以禮國高陪臣敢辭林諸侯之臣稱於天子曰陪臣陪步回反王曰舅氏伯舅之使故曰舅氏余嘉乃勳應乃懿德謂督不忘往踐乃職無逆朕命杜功勳美德可謂正而不可忘者不言位而言職者管仲位卑而執齊政故欲以職尊之林言我嘉美汝尊奬王室之功勳報應汝懿美之德行謂汝功德督厚不可弭忘其往受享居汝之職無違逆我之命令督音篤管仲受下卿之禮而還管仲不敢以職自高卒受本位之禮君子曰管氏之世祀也宜哉讓不忘其上林國高之位在上而能讓遜不忘其職詩曰愷悌君子神所勞矣杜詩大雅愷樂也悌易也言樂易君子為神所勞來故世祀也管仲之後於齊沒不復見傳亦舉其無驗愷本亦作凱開在反悌音弟本亦作弟勞力報反經甲戍十有三年春狄侵衛傳在前年春夏四月葬陳宣公無傳公會齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹杜鹹衛地東郡濮陽縣東南有鹹城林兵車之會二秋九月大雩無傳書過冬公子友如齊無傳傳十三年春齊侯使仲孫湫聘于周且言王子帶林仲孫湫齊大夫杜前年王子帶奔齊言欲復之事畢不與王言杜不言子帶事歸復命曰未可王怒未怠其十年乎不十年王弗召也林十者數之盈也子帶罪重必十年乃可復易曰女子貞不字十年乃字蓋十者盈數也夏會于鹹淮夷病杞故且謀王室也林淮夷東夷也王室亦有戎難故謀杞并謀王室之難秋為戎難故諸侯戍周齊仲孫湫致之杜戍守也致諸侯戍卒于周為于偽反難乃旦反冬晉荐飢杜麥禾皆不熟荐在薦反重也飢音飢使乞糴于秦秦伯謂子桑林即公孫枝糴直厯反與諸乎對曰重施而報君將何求杜言不損秦施式鼓反下同重施而不報其民必攜攜而討焉無衆必敗杜不義故民離謂百里與諸乎杜百里秦大夫林即百里奚對曰天災流行國家代有救災恤鄰道也行道有福林言飢饉乃天降之災如水流行無有定止有國家者更代而有此災救飢荒之政以恤鄰國此天地之常理也順理而行則天降之福丕鄭之子豹在秦請伐晉杜欲為父報怨秦伯曰其君是惡其民何罪秦於是乎輸粟于晉自雍及絳相繼杜雍秦國都絳晉國都雍於用反絳古巷反命之曰泛舟之役杜從渭水運入河汾泛芳劍反經乙亥十有四年春諸侯城緣陵杜緣陵杞邑辟淮夷遷都於緣陵林不序諸侯散辭也是故但曰諸侯者不係之伯者之辭也但曰大夫者不係之君之辭也夏六月季姬及鄫子遇于防使鄫子來朝杜季姬魯女鄫夫人也鄫子本無朝志為季姬所召而來故言使鄫子來朝鄫國今琅邪鄫縣鄫似陵反本或作繒秋八月辛卯沙鹿崩杜沙鹿山名平陽元城縣東有沙鹿土山在晉地災害繫於所災所害故不繫國狄侵鄭無傳冬蔡侯肹卒杜無傳未同盟而赴以名林穆侯卒子莊公甲午立肹許乙反傳十四年春諸侯城緣陵而遷杞焉不書其人有闕也杜闕謂器用不具城池未固而去為惠不終也澶淵之會既而無歸大夫不書而國别稱人今此總曰諸侯君臣之辭不言城杞杞未遷也鄫季姬來寧公怒止之以鄫子之不朝也杜來寧不書而後年書歸鄫更嫁之文也明公絶鄫昏既來朝而還夏遇于防而使來朝秋八月辛卯沙鹿崩晉卜偃曰期年將有大咎幾亡國杜國主山川山崩川竭亡國之徵期音基咎其尤反幾音祈又音機冬秦飢使乞糴于晉晉人弗與慶鄭曰背施無親慶鄭晉大夫林背秦之施是為無親背音佩後皆周施式豉反幸災不仁貪愛不祥怒鄰不義林幸秦之災是為不仁貪愛已物不以分災是為不祥背施幸災貪愛以怒鄰國是為不義四德皆失何以守國虢射曰皮之不存毛將安傅杜虢射惠公舅也皮以喻所許秦城毛以喻糴言既背秦施為怨已深雖與之糴猶無皮而施毛林毛依皮而生皮既不在則毛將安所附也蓋惠公入國之初許貽秦五城歸而背之傅音附慶鄭曰棄信背鄰患孰恤之無信患作失援必斃是則然矣林棄許秦城之信背秦輿晉糴之施如此所為脫有患難孰復恤之無小大之信則禍患必作失內外之援則必至滅亡此皆事理之必然矣虢射曰無損於怨而厚於寇不如勿與杜言與秦粟不足解怨適足使秦強慶鄭曰背施幸災民所棄也近猶讐之况怨敵乎林言以若所為雖近事猶為讐敵况素有深怨之敵乎弗聼退曰君其悔是哉經丙子十有五年春王正月公如齊杜無傳諸侯五年再相朝禮也例在文十五年楚人伐徐林楚至伐徐伯事可知也三月公會齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘杜牡丘地名闕林兵車之會三牡茂后反遂次于匡杜匡衛地在陳留長垣縣西南公孫敖帥師及諸侯之大夫救徐杜公孫敖慶父之子諸侯既盟次匡皆遣大夫將兵救徐故不復具列國别也夏五月曰有食之秋七月齊師曹師伐厲杜厲楚與國義陽隨縣北有厲鄉八月螽無傳為災螽音終本亦作􅏑九月公至自會杜無傳林桓公之會不至至此始書桓德衰矣季姬歸于鄫無傳來寧不書此書者以明中絶己卯晦震夷伯之廟杜夷伯魯大夫展氏之祖父夷諡伯字震者雷電擊之大夫既卒書字晦音誨冬宋人伐曹楚人敗徐于婁林杜婁林徐地下祁僮縣東南有婁亭婁力侯反十有一月壬戌晉侯及秦伯戰于韓獲晉侯例得大夫曰獲晉侯背施無親愎諫違上故貶絶下從衆臣之例而不言以歸不書敗績晉師不大崩林韓晉地秦始見經此晉秦兵端之始是故晉秦兵交始於韓而終於十三國之伐傳十五年春楚人伐徐徐即諸夏故也林徐自三年取舒以披楚黨威公服楚徐與有功焉夏户雅反三月盟于牡丘尋葵丘之盟且救徐也葵丘盟在九年孟穆伯帥師及諸侯之師救徐諸侯次于匡以待之林穆伯即公孫敖次于匡以待大夫之救齊之怠荒可知矣夏五月日有食之不書朔與日官失之也林日官失日志慢也秋伐厲以救徐也林大夫救徐楚師不退故二師伐厲以救徐晉侯之入也秦穆姬屬賈君焉杜晉侯入在九年穆姬申生姊秦穆夫人賈君晉獻公次妃賈女也林託於惠公使善視之屬音燭且曰盡納羣公子杜羣公子晉武獻之族宣二年傳曰驪姬之亂詛無畜羣公子晉侯蒸于賈君又不納羣公子是以穆姬怨之晉侯許賂中大夫中大夫國內執政里丕等蒸之承反既而皆背之林既入國而殺里丕等事在十年賂秦伯以河外列城五東盡虢略南及華山內及解梁城既而不與林既入國而不與秦城見十年使丕鄭謝緩賂杜河外河南也東盡虢略從河南而東盡虢界也解梁城今河東解縣也華山在𢎞農華陰縣西南解音蟹晉飢秦輸之粟在十三年秦飢晉閉之糴在十四年故秦伯伐晉卜徒父筮之吉徒父秦之掌龜卜者卜人而用筮不能通三易之占故據其所見雜占而言之涉河侯車敗詰之林言是卦主秦伯之軍涉河而晉侯車敗也秦伯不解其旨故詰問之詰起吉反對曰乃大吉也三敗必獲晉君其卦遇蠱巽下艮上蠱蠱音古曰千乘三去三去之餘獲其雄狐夫狐蠱必其君也林曰以下連三句皆卜筮之繇辭千乘諸侯也言千乘三度敗去晉師三敗之後獲其狐之雄者杜於周易利涉大川往有事也亦秦勝晉之卦也今此所言藎卜筮書雜辭以狐蠱為君其義欲以喻晉惠公其象未聞乘繩證反去起居反又起據反一音起吕反下同蠱之貞風也其悔山也杜內卦為貞外卦為悔巽為風秦象艮為山晉象歲云秋矣我落其實而取其材所以克也杜周九月夏之七月孟秋也艮為山山有木今嵗已秋風吹落山木之實則材為人所取實落材亡不敗何待三敗及韓林晉侯車三壞秦師進至韓地晉侯謂慶鄭曰寇深矣若之何對曰君實深之可若何公曰不孫卜右慶鄭吉弗使林言晉君棄信幸災所以召秦而深其寇不可如何也杜惡其不孫不以為車右此夷吾之多忌孫音遜步揚御戎家僕徒為右杜步揚卻犨之父乘小駟鄭入也杜鄭所獻焉名小駟駟音四慶鄭曰古者大事必乘其産生其水土而知其人心安其教訓而服習其道唯所納之無不如志今乘異産以從戎事及懼而變將與人易林國之大事在祀與戎其所乘馬必用其土地之所産水土既同則與人心素相諸委安其國人之教訓生長其地故於其道路素相服習唯所用之馳驅進退無不如人之志今乘異國所産之馬以從兵戎戰闕之事及臨戎畏懼而變其常度將與人易心而變化人意亂氣狡憤陰血周作張脈僨興外強中乾杜狡戾也僨動也氣狡憤於外則血脈必周身而作隨氣張動外雖有強形而內實乾竭狡古卯反憤扶粉反張中亮反脈音麥僨方問反進退不可周旋不能君必悔之弗聼九月林應嵗云秋矣之占晉侯逆秦師使韓簡視師杜韓簡晉大夫韓萬之孫林往秦師觀強弱復曰師少於我鬭士倍我林言秦師少於晉士有鬭志加倍於我公曰何故對曰出因其資杜謂奔梁求秦入用其寵杜為秦所納飢食其粟三施而無報是以來也今又擊之我怠秦奮倍猶未也林秦有三施而晉無一報是以秦人來討今不責已求和而又迎擊秦師我師不直其君故解怠秦師怒晉無禮故奮發以此觀之秦之鬭志倍猶未止施式氏反公曰一夫不可狃况國乎杜狃􅏸也言辟秦則使􅏸來林言匹夫尚不可狃狎况晉與秦為敵國其可以師狃我乎狃女九反遂使請戰曰寡人不佞能合其衆而不能離也君若不還無所逃命林無所逃辟秦師戰鬭之命秦伯使公孫枝對曰君之未入寡人懼之入而未定列猶吾憂也杜列位也茍列定矣敢不承命林茍位定而能合其衆矣敢不承順晉君請戰之命韓簡退曰吾幸而得囚杜得囚為幸言必敗壬戌戰于韓原杜九月十三日晉戎馬還濘而止杜濘泥也還便旋也小駟不調故墮泥中濘乃定反公號慶鄭慶鄭曰愎諌違卜固敗是求又何逃焉遂去之林惠公急而呼慶鄭救已愎戾也謂違慶鄭之諌而乘小駟卜右慶鄭吉而弗使是自求敗又何所逃避其禍遂去而弗顧號户刀反又户報反梁由靡御韓簡虢射為右輅秦伯將止之杜輅迎也止獲也林將獲秦伯輅五嫁反鄭以救公誤之林慶鄭不知其將獲秦伯呼使救惠公遂誤其師遂失秦伯秦獲晉侯以歸杜經書十一月壬戌十四日經從赴晉大夫反首拔舍從之反首亂頭髮反下垂也拔草舍止壞形毁服林以示憂戚而從秦師拔蒲未反秦伯使辭焉曰二三子何其戚也寡人之從君而西也亦晉之妖夢是踐豈敢以至杜狐突不寐而與神言故謂之妖夢申生言帝許罰有罪今將晉君而西以厭息此語踐厭也林豈敢至於已甚晉大夫三拜稽首曰君履后土而戴皇天皇天后土實聞君之言羣臣敢在下風穆姬聞晉侯將至林言穆公足履首戴於天地之間天神地祗實間君豈敢以至之言穆公云豈敢以至是已有歸晉君之意故羣臣敢在秦之下風順下風而請也穆姬即秦穆夫人聞秦執惠公將至史記秦將以惠公祀上帝以大子罃𢎞與女簡璧登臺而履薪焉杜罃康公名𢎞其母弟也簡璧罃𢎞姊妹古之宫閉者皆居之臺以抗絶之穆姬欲自罪故登臺而薦之以薪左右上下者皆履柴乃得通林愚按穆姬為惠公告罪登臺履薪宜也而帥子女以同登臺蓋暗用劫制之術罃於耕反履如字徐本作履九具反使以免服衰絰逆且告杜免裒絰遭喪之服令行人服此服迎秦伯且告將以耻辱自殺免音問又作絻音同衰七雷反經大結反曰上天降災使我兩君匪以玉帛相見而以興戎若晉君朝以入則婢子夕以死夕以入則朝以死唯君裁之乃舍諸靈臺在京兆鄠縣周之故臺亦所以抗絶令不得通外內曰上天降災此下四十七字撿古本皆無朝杜注亦不得有有是後人加也大夫請以入林秦大夫請執晉侯以入國公曰獲晉侯以厚歸也既而喪歸焉用之林言我之執獲晉侯以歸以示厚獲俘囚夫人或自殺是以喪歸將安所用之焉於虔反大夫其何有焉杜何有猶何得且晉人戚憂以重我杜謂反首拔舍天地以要我不圖晉憂重其怒也我食吾言背天地也林我若不圖謀晉國之憂是重晉人之怒我自消食我豈敢以至之言是我自背天地杜食消也要於遙反重直用反下同重怒難任背天不祥必歸晉君杜任當也任音壬公子縶曰不如殺之無聚慝焉杜公子縶秦大夫恐夷吾歸復相聚為惡縶張執反又丁立反慝他得反子桑曰歸之而質其大子必得大成林歸惠公而質其大子以為信如此則晉惠感德自愛其大子必得大成和好於晉質音致晉未可滅而殺其君祗以成惡杜祗適也祗音支且史佚有言曰無始禍杜史佚周武王時大史名佚佚音逸無怙亂杜恃人亂為已利怙音户無重怒重怒難任陵人不祥林恃勢陵人與背天等天人一致也乃許晉平晉侯使卻乞告瑕吕飴甥且召之杜卻乞晉大夫也瑕吕飴甥即吕甥也蓋姓瑕吕名飴甥字子金晉侯聞秦將許之平故告吕甥召使迎已飴音怡子金教之言曰朝國人而以君命賞杜恐國人不從故先賞之於朝且告之曰孤雖歸辱社稷矣其卜二圉也杜二代也圉惠公大子懷公衆皆哭杜哀君不還國晉於是乎作爰田杜分公田之稅應入公者爰之於所賞之衆林爰易也爰于元反吕甥曰君亡之不恤而羣臣是憂惠之至也將若君何林言惠公處喪亡在外而不自憂恤而賞賜羣臣憂其匱乏恩惠至厚也國人將何以圖吾君衆曰何為而可對曰征繕以輔孺子杜征賦也繕治也孺子大子圉孺如喻反諸侯聞之喪君有君羣臣輯睦甲兵益多好我者勸惡我者懼庶有益乎林諸侯聞我征繕之事雖喪惠公復有子圉人心和親國勢強盛使諸侯與我為好者有所勸勉與我相惡者有所畏懼庶有利益於我國家喪息良反輯音集又士八反好呼報反惡烏路反衆説晉於是乎作州兵五黨為州州二千五百家也因此又使州長各繕甲兵説音悅初晉獻公筮嫁伯姬於秦遇歸妹兑下震上歸妹之暌兑下離上暌歸妹上六爻變而為暌暌若圭反徐音圭史蘇占之曰不吉杜史蘇晉卜筮之史其繇曰士刲羊亦無衁也女承筐亦無貺也林震為長男故稱士兑為羊刲羊者士之職刲割刺也衁血也上六與六三正應而兩陰相值無復相應故始刲羊無血不足以供祭祀也離為中女故稱女離為大腹故稱筐承筐者女之職承奉筐篚也離中虛故為虛筐上九居卦之極上無所承亦虛筐之象無貺賜也歸妹上六爻辭止言女承筐無實士刲羊無血此蓋占繇之辭繇直救反刲苦圭反衁音荒筐曲方反貺音况本亦作况西鄰責言不可償也林兑西方也兑為口舌以兑從震是口舌雷動杜將嫁女於西而遇不吉之卦故知有責讓之言不可報償責側介反又如字償市亮反又音常歸妹之睽猶無相也杜歸妹女嫁之卦睽乖離之象故曰無相相助也相息亮反震之離亦離之震林震為雷離為電故二卦變而氣相通為雷為火為嬴敗姬杜嬴秦姓姬晉姓震為雷離為火火動熾而害其母女嫁反害其家之象故曰為嬴敗姬嬴音盈車説其輹火焚其旗不利行師敗于宗丘杜輹車下縳也丘猶邑也震為車離為火上六爻在震則無應故車脫輹在離則失位故火焚旗言皆失車火之用也車敗旗焚故不利行師火還害母故敗不出國近在宗邑説吐活反輹音福又音服案車旁著畐音福老子所云三十輻共一轂是也車旁著復音服是車下伏莬歸妹睽孤寇張之弧杜此睽上九爻辭也處睽之極故曰睽孤失位孤絶故遇寇難而有弓矢之警皆不吉之象姪其從姑杜震為木離為火火從木生離為震妹於火為姑謂我姪者我謂之姑謂子圉質秦姪待結反字林文一反六年其逋逃歸其國而棄其家杜逋亡也家謂子圉婦懷嬴逋補吾反明年其死於高梁之虛杜惠公死之明年文公入殺懷公于高梁高梁晉地在平陽楊氏縣西南凡筮者用周易則其象可推非此而往則臨時占者或取於象或取於氣或取於時日王相以成其占若盡附會以爻象則構虛而不經故略言其歸趣他皆放此虛去魚反及惠公在秦曰先君若從史蘇之占吾不及此夫韓簡侍曰龜象也筮數也物生而後有象象而後有滋滋而後有數先君之敗德及可數乎史蘇是占勿從何益林龜以象示凡方功又弓之兆皆象也筮以數告凡奇耦老少之數皆數也天地細緼萬物化醇故生而後有形象可言男女構精萬物化生故象而後滋生益衆一生二二生三三生萬物故滋而後有數先君所行當致喪敗之德及今言之可一二數之乎占所以知吉凶不能變吉凶故先君敗德當主喪敗非由筮數所生從史蘇不能損禍勿從不能益禍夫音扶先君之敗德及絶句可數乎一讀及可數乎數色主反詩曰下民之孽匪降自天僔沓背憎職競由人杜詩小雅言民之有邪惡非天所降僔沓面語背相憎疾皆人競所主作因以諷諌惠公有以召此禍也孽魚列反僔尊本反沓徒合反震夷伯之廟罪之也於是展氏有隱慝焉杜隱惡非法所得尊貴罪所不加是以聖人因天地之變自然之妖以感動之知達之主則識先聖之情以自厲中下之主亦信妖祥以不妄神道助教唯此為深冬宋人伐曹討舊怨也莊十四年曹與諸侯伐宋楚敗徐于婁林徐恃救也杜恃齊救林以諸侯罷兵故卒為楚所敗十月晉陰飴甥會秦伯盟于王城杜陰飴甥即吕甥也食采於隂故曰隂飴甥王城秦地馮翊臨晉縣東有王城今名武鄉林盟以求成也秦伯曰晉國和乎對曰不和小人恥失其君而悼喪其親杜痛其親為秦所殺不憚征繕以立圉也林不以賦車馬治兵甲為難以立大子圉為君憚徒旦反曰必報讐寧事戎狄林寧可事戎狄以為君言欲致死於秦君子愛其君而知其罪不憚征繕以待秦命林以待秦歸惠公之命曰必報德有死無二以此不和林以君子小人所見各有不同故不和秦伯曰國謂君何對曰小人戚謂之不免君子恕以為必歸林小人憂戚哀懷謂惠公必不免禍君子持心公恕謂惠公必得反國小人曰我毒秦秦豈歸君林毒謂三施不報君子曰我知罪矣秦必歸君二而執之服而舍之德莫厚焉刑莫威焉服者懷德二者畏刑此一役也杜言還惠公使諸侯威服復可當一事之功舍如字又音捨秦可以霸納而不定廢而不立以德為怨秦不其然林言秦既納惠公復執之而不安定其位既執惠公遂廢之而不立之為晉君以納晉侯之德而為廢晉侯之怨秦穆公之志必不肯如此秦伯曰是吾心也改館晉侯饋七牢焉林秦伯喜其言而答曰此言是知我之心也始更晉侯之館舍加以禮貌杜牛羊豕各一為一牢饋其位反蛾析謂慶鄭曰盍行乎蛾析晉大夫也蛾魚綺反或作蟻一音五何反析本或作晳星厯反盍户臘反對曰陷君於敗杜謂呼不往誤晉師失秦伯敗而不死又使失刑非人臣也林晉師敗而不能死戰君歸而出奔又使不得正誤師之刑非為人臣之道也臣而不臣行將焉入林言不為他人所容焉於虔反十一月晉侯歸丁丑殺慶鄭而後入林以見其忌刻終不化也杜丁丑月二十九日是嵗晉又飢秦伯又餼之粟杜餼猶饋也以粟餼晉言非糴也餼許計反曰吾怨其君而矜其民且吾聞唐叔之封也箕子曰其後必大晉其庸可冀乎杜唐叔晉始封之君武王之子箕子殷王帝乙之子紂之庶兄林言晉國未可取也姑樹德焉以待能者於是秦始征晉河東置官司焉杜征賦也林秦置官司以征河東之賦此即惠公許賂秦以河外列城五之地至是始歸之秦也左傳杜林合注卷十
