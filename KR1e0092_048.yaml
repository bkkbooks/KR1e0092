body:
  text: 左傳杜林合注卷四十八明王道焜趙如源同編哀公二經癸丑七年春宋皇瑗帥師侵鄭瑗子眷反晉魏曼多帥師侵衛夏公會吳于鄫杜鄫今琅邪鄫縣鄫才陵反秋公伐邾八月己酉入邾以邾子益來他國言歸於魯言來內外之辭宋人圍曹冬鄭駟𢎞帥師救曹林自魯救晉凡晉楚之救皆不書六十年矣其再見以中國無伯而諸侯自相救也諸侯自相救猶可也吳救陳諸夏亦幾於亡矣傳七年春宋師侵鄭鄭叛晉故也定八年鄭始叛晉師侵衛衛不服也五年晉伐衛至今未服夏公會吳于鄫吳欲霸中國吳來徵百牢子服景伯對曰先王未之有也吳人曰宋百牢我是時吳過宋得百牢魯不可以後宋且魯牢晉大夫過十杜晉大夫范鞅也在昭二十一年吳王百牢不亦可乎景伯曰晉范鞅貪而棄禮以大國懼敝邑故敝邑十一牢之君若以禮命於諸侯則有數矣杜有常數若亦棄禮則有淫者矣杜淫過也周之王也制禮上物不過十二上物天子之牢以為天之大數也天有十二次故制禮象之今棄周禮而曰必百牢亦惟執事吳人弗聽景伯曰吳將亡矣棄天而背本杜棄天十二之數背周制禮之本不與必棄疾於我杜放棄曰疾來伐擊我乃與之大宰嚭召季康子嚭吳大夫康子使子貢辭大宰嚭曰國君道長杜蓋言君長大於道路長丁丈反而大夫不出門此何禮也對曰豈以為禮畏大國也杜畏大國不敢虛國盡行大國不以禮命於諸侯苟不以禮豈可量也林苟命諸侯不以禮法則其包藏禍心豈可量度寡君既共命焉其老豈敢棄其國林大夫稱老魯君既出會其吳之命令季康子豈敢輕出虛棄國家共音恭大伯端委以治周禮仲雍嗣之斷髮文身羸以為飾豈禮也哉有由然也杜大伯周大王之長子仲雍大伯弟也大伯仲雍讓其弟季厯俱適荆蠻遂有民衆大伯卒無子仲雍嗣立不能行禮致化故效吳俗言其權時制宜以辟災害非以為禮也端委禮衣也林端委端服委冠也大音泰斷丁管反裸力果反反自都以吳為無能為也棄禮知其不能霸也季康子欲伐邾乃饗大夫以謀之子服景伯曰小所以事大信也大所以保小仁也背大國不信杜大國吳也伐小國不仁民保於城城保於德失二德者危將焉保杜二德信與仁也焉於虔反孟孫曰二三子以為何如怪諸大夫不言故指問之惡賢而逆之杜孟孫賢景伯欲使大夫不逆其言惡猶安也林言安有賢如景伯而可不順其言者惡音烏對曰禹合諸侯於塗山執玉帛者萬國林諸大夫對也諸侯執玉附庸執帛塗山在夀春東北今其存者無數十焉唯大不字小小不事大也杜言諸侯相伐古來以然數所主反知必危何故不言杜知伐邾必危自當言今不言者不危故也大夫以答孟孫所怪且阿附季孫魯德如邾而以衆加之可乎杜孟孫忿答太夫今魯德無以勝邾但欲恃衆可乎言不可不樂而出杜季孟意異佞直不同故罷饗樂音嶽又音洛秋伐邾及范門杜邾郭門也猶聞鐘聲杜邾不禦寇大夫諫不聽茅成子請告於吳杜成子邾大夫茅夷鴻不許曰魯擊柝聞於邾林柝兩木相擊以行夜也魯邾擊柝相聞言其近聞音問又如字吳二千里不三月不至何及於我且國內豈不足杜言足以距魯成子以茅叛林成子知邾必亡故先以其邑叛杜高平西南有芽鄉亭師遂入邾處其公宫衆師晝掠杜晝掠取財物也掠音亮邾衆保于繹杜繹邾山也在鄒縣北師宵掠以邾子益來杜益邾隱公也晝夜掠傳言康子無法獻于亳社杜以其亡國與殷同囚諸負瑕負瑕故有繹杜負瑕魯邑髙平南平陽縣西北有瑕丘城前者魯得邾之繹民使在負瑕故使相就以辱之邾茅夷鴻以束帛乘韋自請救於吳杜無君命故言自乘繩證反下同曰魯弱晉而逺吳林欺晉為弱鄙吳為逺馮恃其衆杜馮依也馮皮氷反而背君之盟辟君之執事杜辟陋辟匹亦及以陵我小國邾非敢自愛也懼君威之不立林邾之滅亡不敢自惜所恐懼者吳之威令不能植立君威之不立小國之憂也若夏盟於鄫衍杜鄫衍即鄫也鄫盟不書吳行夷禮禮儀不典非所以結信義故不録秋而背之成求而不違杜言魯成其所求無違逆也四方諸侯其何以事君且魯賦八百乘君之二也杜二敵也魯以八百乘之賦貢于吳言其國大邾賦六百乘君之私也杜為私屬以私奉二林以私屬而奉敵國使之強大唯君圖之吳子從之為明年吳伐我傳宋人圍曹鄭桓子思曰林子思子産子國參也桓諡也宋人有曹鄭之患也不可以不救冬鄭師救曹侵宋初曹人或夢衆君子立于社宫杜社宫社也而謀亡曹曹叔振鐸請待公孫強許之林請衆君子待公孫強為政而後亡曹杜振鐸曹始祖強其良反旦而求之曹無之林無所謂公孫強者戒其子林夢者告戒其子曰我死爾聞公孫強為政必去之及曹伯陽即位好田弋曹鄙人公孫強好弋林弋繳射也言鄙人小吏也好呼報反獲白雁獻之且言田弋之説説之因訪政事大説之有寵使為司城以聽政夢者之子乃行強言霸説於曹伯曹伯從之乃背晉而姦宋宋人伐之晉人不救築五邑於其郊曰黍丘揖丘大城鍾邘林宋取曹五邑而城築之於其近郊杜為明年入曹傳也梁國下邑縣西南有黍丘亭説之音悅下大説同霸説如字又始鋭反揖音集又於一反邘音汙經甲寅八年春王正月宋公入曹以曹伯陽歸杜曹人背晉而姦宋是以致討宋公既還而不忍褚師之詬怒而反兵一舉滅曹滅非本志故以入告林檜亡東周之始曹亡春秋之終夫子之刪詩也繫曹檜於國風之後檜之卒篇曰思周道也傷天下之無王也曹之卒篇曰思治也傷天下之無伯也吳伐我夏齊人取歡及闡杜不書伐兵未加而魯與之邑闡在東平剛縣北歡音歡闡尺善反歸邾子益于邾秋七月冬十有二月癸亥杞伯過卒杜無傳未同盟而赴以名林僖公卒子閔公維立過古禾反齊人歸歡及闡不言來命歸之無官使也傳八年春宋公伐曹將還褚師子肥殿杜子肥宋大夫殿丁練反曹人詬之不行杜詬詈辱也不行殿兵止也詬呼豆反師待之林曹師見殿兵不行遂待之公聞之怒命反之遂滅曹執曹伯及司城強以歸殺之終曹人之夢吳為邾故將伐魯問於叔孫輒杜問可伐否輒故魯人為于偽反叔孫輒對曰魯有名而無情杜有大國名無情實伐之必得志焉退而告公山不狃不狃亦故魯人狃女九反公山不狃曰非禮也君子違不適讐國杜違奔亡也未臣而有伐之奔命焉死之可也杜未臣所適之國若有伐本國者則可還奔命死其難所託也則隱曽所因託則為之隱惡且夫人之行也不以所惡廢鄉不以其私怨惡廢棄其鄉黨之好夫音扶行下孟反又如字惡烏路反又如字今子以小惡而欲覆宗國不亦難乎輒魯公族故謂之宗國覆芳服反若使子率子必辭王將使我子張病之杜子張輒也林以其言為己病王問於子泄杜子泄不狃對曰魯雖無與立緩時若無能自立必有與斃急則人人知懼皆將同死諸侯將救之未可以得志焉晉與齊楚輔之是四讐也杜與魯而四夫魯齊晉之脣脣亡齒寒君所知也不救何為杜魯居齊晉之東自吳觀之是為脣三月吳伐我子泄率故道險從武城故由險道欲使魯成備子泄率絶句故道險絶句初武城人或有因於吳竟田焉杜僑田吳界拘鄫人之漚菅者曰何故使吾水滋杜鄫人亦僑田吳滋濁也林鄫人漚漬菅草於水而魯人拘執之言何故滋濁我水漚烏豆反菅古顔反滋音兹亦作兹字林云黑也及吳師至拘者道之以伐武城克之杜鄫人教吳必可克道音導王犯嘗為之宰淡臺子羽之父好焉國人懼杜王犯吳大夫故嘗奔魯為武城宰淡臺子羽武城人孔子弟子也其父與王犯相善國人懼其為內應淡待甘反好呼報反懿子謂景伯若之何林問吳來伐何以禦之對曰吳師來斯與之戰何患焉且召之而至又何求焉言犯盟伐邾所以召吳吳師克東陽而進舍於五梧明日舍于蠶室林三邑魯地公賓庚公甲叔子與戰于夷獲叔子與析朱鉏杜公賓庚公甲叔子井析朱鉏為三人皆同車傳互言之獻於王王曰此同車必使能國未可望也杜同車能俱死是國能使人故不可望得明日舍于庚宗林每日遷舍見師行速而疾遂次于泗上微虎欲宵攻王舍微虎魯大夫私屬徒七百人三踊於幕庭杜於帳前設格令士試躍之屬音燭卒三百人有若與焉杜卒終也終得三百人任行有若孔子弟子與在三百人中與音預及稷門之內杜三百人行至稷門或謂季孫曰不足以害吳而多殺國士不如己也乃止之吳子聞之一夕三遷畏微虎也三息暫反吳人行成求與魯成將盟景伯曰楚人圍宋易子而食析骸而爨在宜十五年猶無城下之盟我未及虧林雖被吳師而於國勢未有虧損而有城下之盟是棄國也吳輕而逺林吳師輕窕國又阻逺輕遺政反不能久將歸矣請少待之弗從景伯負載造於萊門杜以言不見從故負載書將欲出盟造七報反乃請釋子服何於吳吳人許之以王子姑曹當之而後止林子服何即子服景伯杜釋舍也魯人不以盟為事欲因留景伯為質於吳既得吳之許復求吳王之子以交質吳人不欲留王子故遂兩止吳人盟而還杜不書盟恥吳夷齊悼公之來也在五年季康子以其妹妻之即位而逆之季魴侯通焉魴侯康子叔父妻七計反魴音房女言其情弗敢與也林女即康子之妹齊侯怒夏五月齊鮑牧帥師伐我取歡及闡或譛胡姬於齊侯林胡姬景公妾六年以安孺子如賴者曰安孺子之黨也六月齊侯殺胡姬傳言齊侯無道所以不終齊侯使如吳請師將以伐我乃歸邾子杜齊未得李姬故請師也吳前為邾討魯懼二國同心故歸邾子邾子又無道吳子使大宰子餘討之杜子餘大宰嚭囚諸樓臺栫之以棘栫擁也栫在薦反使諸大夫奉大子革以為政杜革邾大子桓公也為十年邾子來奔傳秋及齊平九月臧賓如如齊涖盟杜賓如臧會子齊閭丘明來涖盟杜閭丘明嬰之子也盟不書諱略之且逆季姬以歸嬖杜季姬魴侯所通者鮑牧又謂羣公子曰使女有馬千乘乎杜有馬千乘使為君也鮑牧本不欲立陽生又諷動羣公子女音汝乘繩證反公子訴之林羣公子以鮑牧之言訴於悼公公謂鮑子或譛子子姑居於潞杜潞齊邑以察之林以察罪之有無若有之則分室以行若無之則反子之所出門使以三分之一行半道使以二乘及潞麇之以入遂殺之杜麇亦束縛麇丘隕反冬十二月齊人歸歡及闡季姬嬖故也林季姬嬖故詣而歸之也經乙卯九年春王二月葬杞僖公無傳三月而葬速宋皇瑗帥師取鄭師于雍丘杜書取覆而敗之雍丘縣屬陳留雍於勇反夏楚人伐陳秋宋公伐鄭冬十月傳九年春齊侯使公孟綽辭師于吳齊與魯平故辭吳師吳子曰昔嵗寡人聞命今又革之不知所從將進受命於君林言往嵗我聞齊乞師伐魯之命今又欲革而易之不知二命何者當從將進師伐齊以受齊君之命為十年吳伐齊傳鄭武子賸之嬖計瑕求邑無以與之杜賸罕達也瑕武子之屬賸以證反請外取許之杜瑕請取於他國故圍宋雍丘宋皇瑗圍鄭師杜許瑕師每日遷舍杜作壘塹成輒徙舍合其圍壘合鄭師哭林許瑕之師知不免故哭子姚救之大敗杜子姚武子賸也二月甲戌宋取鄭師于雍丘使有能者無死惜其能也以郲張與鄭羅歸杜鄭之有能者夏楚人伐陳陳即吳故也宋公伐鄭杜報雍丘秋吳城𨝍溝通江淮於邗江築城穿溝東北通射陽湖西北至宋口入淮通糧道也今廣陵邗江是𨝍音寒晉趙鞅卜救鄭遇水適火杜水火之兆占諸史趙史墨史龜杜皆晉史史龜曰是謂沈陽杜火陽得水故沈可以興兵杜兵隂類也故可以興兵利以伐薑不利子商薑齊姓子商謂宋林薑火師之後火弱故伐薑則利子商姓屬水故伐商不利伐齊則可敵宋不吉史墨曰盈水名也子水位也杜趙鞅姓盈宋姓子水盈坎乃行子姓又得北方水位名位敵不可干也杜二水俱盛故言不可干炎帝為火師杜神農有火瑞以火名官薑姓其後也水勝火伐薑則可史趙曰是謂如川之滿不可遊也杜既盈而得水位故為如川之滿不可馮遊言其波流盛鄭方有罪不可救也杜鄭以嬖寵伐人故以為有罪救鄭則不吉不知其他救鄭則當伐宋故不吉也陽貨以周易筮之遇泰乾下坤上泰之需乾下坎上需泰六五變曰宋方吉不可與也杜不可與戰泰六五曰帝乙歸妹以祉元吉帝乙紂父立為天子故稱帝乙隂而得中有似王者嫁妹得如其願受福祿而大吉微子啓帝乙之元子也宋鄭甥舅也杜宋鄭為昏姻甥舅之國宋為微子之後今卜得帝乙卦故以為宋吉祉祿也若帝乙之元子歸妹而有吉祿我安得吉焉乃止杜吉在彼則我伐之為不吉冬吳子使來警師伐齊前年齊與吳謀伐魯齊既與魯成而止故吳恨之反與魯謀伐齊經丙辰十年春王二月邾子益來奔林大子革為政公會吳伐齊書會從不與謀三月戊戌齊侯陽生卒杜以疾赴故不書弒林悼公卒子簡公壬立夏宋人伐鄭無傳晉趙鞅帥師侵齊五月公至自伐齊無傳葬齊悼公無傳衛公孟彄自齊歸于衛無傳書歸齊納之彄苦侯反薛伯夷卒杜無傳赴以名故書秋葬薜惠公無傳冬楚公子結帥師伐陳吳救陳杜季子不書陳人來告不以名林此延州來季子也不書義不在季子也吳救陳諸夏幾於亡也傳十年春邾隱公來奔林吳囚之使奉大子革以為政故來奔齊甥也故遂奔齊杜終子貢之言公會吳子邾子郯子伐齊南鄙師于鄎杜鄎齊地邾郯不書兵井屬吳不列於諸侯郯音談鄎音息齊人弒悼公赴于師以説吳吳子三日哭于軍門之外徐承帥舟師將自海入齊齊人敗之吳師乃還杜承吳大夫夏趙鞅帥師伐齊杜經書侵以侵告大夫請卜之趙孟曰吾卜於此起兵謂往嵗卜伐宋不吉利以伐薑故今興兵事不再令再令瀆也卜不襲吉林襲重也卜不重吉瀆則不告也行也於是乎取犂及轅林犂一名隰濟南有隰隂縣祝阿縣西有轅城毁髙唐之郭侵及賴而還秋吳子使來復警師伐齊未得志故為明年吳伐齊傳冬楚子期伐陳陳即吳故吳延州來季子救陳林延陵州來皆季札邑故曰延州來季子謂子期曰二君不務德杜二君吳楚而力爭諸侯民何罪焉我請退以為子名林以成子期伐陳之名務德而安民乃還季子吳王壽夢少子也夀夢以襄十二年卒至今七十七嵗夀夢卒季子已能讓國年當十五六至今蓋九十餘經丁巳十有一年春齊國書帥師伐我夏陳轅頗出奔鄭書名貪也頗破可反又普多反五月公會吳伐齊甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書杜公與伐而不與戰艾陵齊地林齊魯交兵止此秋七月辛酉滕子虞母卒杜無傳赴以名故書之冬十有一月葬滕隱公無傳衛世叔齊出奔宋書名淫也傳十一年春齊為鄎故杜鄎在前年為于偽反國書髙無丕帥師伐我及清杜清齊地濟北盧縣東有清亭丕普悲反季孫謂其宰冉求冉求魯人孔子弟子曰齊師在清必魯故也若之何求曰一子守林一子謂季孫守國守手又反二子從公禦諸竟季孫曰不能杜自度力不能使二子禦諸竟從如字又才用反求曰居封疆之間杜封疆竟內近郊之地季孫告二子杜二子叔孫孟孫也二子不可求曰若不可則君無出一子帥師背城而戰林若二子不可則魯君無用親出季孫自帥魯師背城而與齊戰於城下不屬者非魯人也杜屬臣屬也言不戰為不臣魯之羣室衆於齊之兵車杜羣室都邑居家一室敵車優矣林一都之衆敵齊之兵車有餘用子何患焉二子之不欲戰也宜政在季氏言二子恨季氏專政故不盡力二子之不欲戰也宜絶句當子之身齊人伐魯而不能戰子之恥也大不列於諸侯矣季孫使從於朝杜使冉求隨己之公朝俟於黨氏之溝黨氏溝朝中地名黨音掌武叔呼而問戰焉林武叔即叔孫州仇杜問冉求對曰君子有逺慮小人何知懿子強問之對曰小人慮材而言量力而共者也林小人冉求自稱杜言子所問非己材力所及故不能言強其丈反共音恭武叔曰是謂我不成丈夫也杜知冉求非己不欲戰故不對退而搜乘杜搜閲乘繩證反孟孺子泄帥右師杜孺子孟懿子之子武伯彘顔羽御邴泄為右杜二子孟氏臣冉求帥左師管周父御樊遲為右杜樊遲魯人孔子弟子樊須父音甫季孫曰須也弱有子曰就用命焉杜須年少能用命有子冉求也季氏之甲七千冉有以武城人三百為已徒卒杜步卒精兵老幼守宫次于雩門之外杜南城門也雩音于五日右師從之林右師孟孺子泄所帥之師也五日乃從言不欲戰公叔務人杜務人公為昭公子見保者而泣杜保守城者曰事充杜繇役煩政重賦稅多上不能謀士不能死何以治民吾既言之矣敢不勉乎杜既言人不能死已不敢不死師及齊師戰于郊齊師自稷曲杜稷曲郊地名師不踰溝樊遲曰非不能也不信子也林言魯師非不能踰溝也不信子之號令也請三刻而踰之與衆三刻約信如之衆從之杜如樊遲言乃踰溝師入齊軍冉求之師右師奔齊人從之逐右師陳瓘陳莊涉泗林二陳齊大夫涉泗水以從魯師瓘古喚反孟之側後入以為殿杜之側孟氏族也字反殿丁練反抽矢策其馬曰馬不進也不欲伐善林不狃之伍曰走乎杜不狃魯士五人為伍敗而欲走不狃曰誰不如杜我不如誰而欲走曰然則止乎不狃曰惡賢言止戰惡足為賢皆無戰志惡音烏徐步而死徐行而死言魯非無壯士但季孫不能使師獲甲首八十杜冉求所得齊人不能師杜不能整其師宵諜曰齊人遁杜諜間也冉有請從之三林請逐齊師之奔季孫弗許孟孺子語人曰我不如顔羽而賢於邴泄杜二子與孟孺子同車語魚據反子羽鋭敏杜子羽顔羽鋭精也敏疾也言欲戰我不欲戰而能默心雖不欲口不言奔泄曰驅之言驅馬欲奔公為與其嬖僮汪錡乘皆死皆殯杜皆俱也錡魚綺反乘繩證反孔子曰能執干戈以衛社稷可無殯也時人疑童子當殯冉有用矛於齊師故能入其軍孔子曰義也杜言能以義勇不書戰不皆陳也不書敗勝負不殊夏陳轅頗出奔鄭初轅頗為司徒賦封田以嫁公女封內之田悉賦稅之有餘以為已大器杜大器鐘鼎之屬國人逐之故出道渴其族轅咺進稻醴梁糗腶脯焉林以稻米為醴酒糗乾飯以梁米為乾飯加薑桂曰脯咺况阮反糗起九反腶丁亂反喜曰何其給也對曰器成而具林所鑄大器方成即具此醴糗之屬曰何不吾諫對曰懼先行恐言不從先見逐為郊戰故公會吳子伐齊欲以報也為于偽反五月克博壬申至于嬴杜博嬴齊邑也二縣皆屬泰山中軍從王杜吳中軍胥門巢將上軍王子姑曹將下軍展如將右軍杜三將吳大夫齊國書將中軍髙無丕將上軍宗樓將下軍陳僖子謂其弟書爾死我必得志杜書子占也欲獲死事之功宗子陽與閭丘明相厲也杜相勸厲致死子陽宗樓也桑掩胥御國子杜國子國書公孫夏曰二子必死杜亦勸勉也將戰公孫夏命其徒歌虞殯虞殯送葬歌曲示必死陳子行命其徒具含玉杜子行陳逆也具含玉亦示必死行如字又户郎反公孫揮命其徒曰人尋約吳髮短杜約繩也八尺為尋吳髮短欲以繩貫其首東郭書曰三戰必死於此三矣杜三戰夷儀五氏與今使問弦多以琴杜弦多齊人也六年奔魯問遺也曰吾不復見子也言將死戰陳書曰此行也吾聞鼓而已不聞金也鼓以進軍金以退軍不聞金言將死也傳言吳師強齊人皆自知將敗甲戌戰于艾陵展如敗髙子杜齊上軍敗國子敗胥門巢杜吳上軍亦敗王卒助之大敗齊師獲國書公孫夏閭丘明陳書東郭書革車八百乘甲首三千以獻于公杜公以兵從故以勞公乘繩證反將戰吳子呼叔孫叔孫武叔州仇曰而事何也杜問何職對曰從司馬從吳司馬所命王賜之甲劔鈹曰奉爾君事敬無廢命叔孫未能對衛賜進杜賜子貢孔子弟子鈹普悲反曰州仇奉甲從君而拜杜拜受之公使大史固歸國子之元杜歸於齊也元首也吳以獻魯置之新篋褽之以玄纁林褽薦也褽薦其首以玄纁之服褽音尉加組帶焉置書于其上曰天若不識不衷何以使下國林衷善也下國魯自稱即天而言故稱下國杜言天識不善故殺國子吳將伐齊越子率其衆以朝焉王及列士皆有饋賂吳人皆喜唯子胥懼曰是豢吳也夫杜豢養也若人養犧牲非愛之將殺之夫音扶諫曰越在我心腹之疾也壤地同而有欲於我杜欲得吳夫其柔服求濟其欲也不如早從事焉杜從事擊之得志於齊猶獲石田也無所用之杜石田不可耕越不為沼吳其泯矣使醫除疾而曰必遺類焉者未之有也盤庚之誥曰其有顛越不共則劓殄無遺育無俾易種于兹邑杜盤庚商書也顛越不共從橫不承命者也劓割也殄絶也育長也俾使也易種轉生種類共音恭劓魚器反殄大典反種章勇反是商所以興也今君易之杜言除惡去根此商所由以興今君欲反易其道留惡易種將以求大不亦難乎弗聽使於齊屬其子於鮑氏為王孫氏杜私使人至齊屬其子改姓為王孫欲以辟吳禍使所吏反屬音燭下同反役王聞之使賜之屬鏤以死杜艾陵役也屬鏤劔名鏤力俱反又力侯反將死曰樹吾墓檟檟可材也吳其亡乎三年其始弱矣盈必毁天之道也杜越人朝之伐齊勝之盈之極也為十三年越伐吳起本秋季孫命修守備曰小勝大禍也齊至無日矣善有備守手又反冬衛大叔疾出奔宋杜疾即齊也初疾娶于宋子朝子朝宋人仕衛為大夫其娣嬖杜娣所娶女之娣子朝出出奔孔文子使疾出其妻而妻之林自以其女妻大叔疾妻之七計反疾使侍人誘其初妻之娣置於犂犂衛邑而為之一宫林别為一宫以居之如二妻文子怒欲攻之仲尼止之遂奪其妻或淫于外州林孔文子遂奪其女不嫁大叔疾大叔疾或時往淫于外州外州衛邑外州人奪之軒以獻杜軒車也以獻於君恥是二者故出林大叔疾以奪妻奪軒二事為恥故出奔衛人立遺使室孔姞杜遺疾之弟孔姞孔文子之女疾之妻姞其乙反疾臣向魋為宋向魋臣魋徒回反納美珠焉與之城鉏杜城鉏宋邑宋公求珠魋不與由是得罪及桓氏出林桓氏即向魋出在十四年城鉏人攻大叔疾衛莊公復之杜聽使還使處巢死焉殯于鄖葬于少禘杜終言疾之失所也巢鄖少禘皆衛地鄖音云少詩照反初晉悼公子憖亡在衛使其女僕而田杜僕御田獵大叔懿子止而飲之酒杜懿子大叔儀之孫飲於鴆反遂聘之生悼子杜悼子大叔疾悼子即位故夏戌為大夫杜夏戍悼子之甥悼子亡衛人翦夏戍杜翦削其爵邑孔文子之將攻大叔也訪於仲尼仲尼曰胡簋之事則嘗學之矣胡簋禮器名夏曰胡周曰簋簋音軌甲兵之事未之聞也退命駕而行曰鳥則擇木木豈能擇鳥林以鳥自喻以木喻孔文子文子遽止之曰圉豈敢度其私訪衛國之難也林圉文子名度謀也度待洛反難乃旦反將止仲尼止魯人以幣召之乃歸於是自衛反魯樂正雅頌各得其所季孫欲以田賦丘賦之法因其田財通出馬一匹牛三頭今欲别其田及家財各為一賦故言田賦使冉有訪諸仲尼仲尼曰丘不識也林言不識其可行與否三發杜三發問卒曰卒終也子為國老待子而行若之何子之不言也仲尼不對杜不公答而私於冉有曰君子之行也杜行政事度於禮施取其厚事舉其中斂從其薄如是則以丘亦足矣杜丘十六井出戎馬一匹牛三頭是賦之常法若不度於禮而貪冒無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲苟而行又何訪焉弗聽為明年用田賦傳經戊午十有二年春用田賦杜直書之者以示改法重賦林以丘賦一乘為未足又以田賦之也田賦之也者家一人也家一人管子內政之法也諸侯之益兵自齊始晉次之州兵是也春秋之季魯亦行之也是故作丘甲用田賦不書初夏五月甲辰孟子卒杜魯人諱娶同姓謂之孟子春秋不改所以順時公會吳于橐臯槖臯在淮南逡遒縣東南槖章夜反一音託秋公會衛侯宋皇瑗于鄖林卒辭吳盟杜鄖發陽也廣陵海陵縣東南有發繇亭宋向巢帥師伐鄭冬十有二月螽杜周十二月今十月是嵗應置閏而失不置雖書十二月實今之九月司厯誤一月九月之初尚溫故得有螽傳十二年春王正月用田賦終前年事夏五月昭夫人孟子卒昭公娶于吳故不書姓諱娶同姓故謂之孟子若宋女死不赴故不稱夫人不稱夫人故不言薨不反哭故不言葬小君反哭者夫人禮也以同姓故不成其夫人喪孔子與弔適季氏季氏不絻放絰而拜杜孔子始老故與弔也絻喪冠也孔子以小君禮往弔季孫不服喪故去絰從主簡制與音預絻音紊公會吳于橐臯吳子使大宰嚭請尋盟杜尋鄫盟公不欲使子貢對曰盟所以周信也林言為盟者所以周固其誠信也故心以制之杜制其義玉帛以奉之杜奉贄明神言以結之杜結其信明神以要之杜要以禍福要一遙反寡君以為苟有盟焉弗可改也已若猶可改日盟何益今吾子曰必尋盟若可尋也亦可寒也杜尋重也寒歇也乃不尋盟吳徵會于衛初衛人殺吳行人且姚而懼謀于行人子羽子羽衛大夫且子餘反子羽曰吳方無道無乃辱吾君不如止也子木曰吳方無道杜子木衛大夫國無道必棄疾於人吳雖無道猶足以患衛杜為衛患也往也長木之斃無不摽也林譬如長木斃踣於地不擇物而後摽擊之摽敷蕭反又普交反國狗之瘈無不噬也林譬如國狗狂瘈噬人不擇人而後噬齧之瘈吉世反而况大國乎秋衛侯會吳於鄖公及衛侯宋皇瑗盟杜盟不書畏吳竊盟而卒辭吳盟吳人藩衛侯之舍林吳人執衛侯作藩籬圍其館舍以困辱之子服景伯謂子貢曰夫諸侯之會事既畢矣侯伯致禮地主歸餼杜侯伯致禮以禮賓也地主所會主人也餼生物以相辭也杜名以禮相傳讓今吳不行禮於衛而藩其君舍以難之杜難苦困也難乃旦反子盍見大宰乃請束錦以行林十端為束以賂吳語及衛故若本不為衛請者大宰嚭曰寡君願事衛君衛君之來也緩寡君懼故將止之杜止執子貢曰衛君之來必謀於其衆其衆或欲或否是以緩來其欲來者子之黨也其不欲來者子之讐也若執衛君是墮黨而崇讐也墮毁也墮許規反下同夫墮子者得其志矣林衛之墮毁吳人不欲來會者其言驗故得志且合諸侯而執衛君誰敢不懼墮黨崇讐而懼諸侯或者難以霸乎大宰嚭説乃舍衛侯衛侯歸效夷言林學為吳人方言説音悅下同舍音捨又音赦子之尚幼杜子之公孫彌牟曰君必不免其死於夷乎執焉而又説其言從之固矣林從夷之心固不可改矣衛公輒後卒死於越冬十二月螽林時已間蟄猶有螽災季孫問諸仲尼仲尼曰丘聞之火伏而後蟄者畢杜火心星也火伏在今十月今火猶西流司厯過也杜猶西流言未盡沒知是九月厯官失一閏釋例論之備宋鄭之間有隙地焉杜隙地間田曰彌作頃丘玉暢嵒戈錫凡六邑彌亡支反又亡爾反頃苦穎反又音順巖五咸反錫音羊又星厯反子産與宋人為成曰勿有是林約二國俱棄之及宋平元之族自蕭奔鄭在定十五年鄭人為之城嵒戈錫杜城以處平元之族為于偽反九月宋向巢伐鄭林以鄭背盟城三邑故討之取錫殺元公之孫遂圍嵒十二月鄭罕達救嵒丙申圍宋師杜此事經在十二月螽上今倒在下更具列其月以為别者丘明本不以為義例故不皆齊同經己未十有三年春鄭罕達帥師取宋師于嵒書取覆而敗之夏許男成卒林無傳元公卒公會晉侯及吳子于黃池杜陳留封丘縣南有黃亭近濟水夫差欲霸中國尊天子自去其僣號而稱子以告令諸侯故史承而書之林書會晉侯及吳子兩伯之辭也楚公子申帥師伐陳無傳於越入吳秋公至自會無傳晉魏曼多帥師侵衛無傳葬許元公無傳九月螽無傳書災冬十有一月有星孛于東方無傳平旦衆星皆沒而孛乃見故不言所在之次盜殺陳夏區夫無傳稱盜非大夫區烏侯反十有二月螽無傳前年季孫雖聞仲尼之言而不正厯失閏至此年故復十二月螽實十一月傳十三年春宋向魋救其師救前年圍巖師鄭子賸使徇曰林鄭子賸即罕達得桓魋者有賞魋也逃歸遂取宋師于嵒獲成歡郜廷鄭子宋大夫歡火官反郜古報反又古毒反以六邑為虛空虛之名不有夏公會單平公晉定公吳夫差于黃池杜平公周卿士也不書尊之不與會單音善六月丙子越子伐吳為二隧隧道也疇無餘謳陽自南方二子越大夫先及郊吳太子友王子地王孫彌庸夀於姚自泓上觀之杜觀越師泓水名泓烏宏反彌庸見姑蔑之旗杜姑蔑越地今東陽大宋縣曰吾父之旗也杜彌庸父為越所獲故姑蔑人得其旌旗不可以見讐而弗殺也大子曰戰而不克將亡國請待之彌庸不可屬徒五千屬會也屬音燭王子地助之乙酉戰彌庸獲疇無餘地獲謳陽越子至王子地守林守國守下又反丙戌復戰大敗吳師獲大子友王孫彌庸夀於姚杜地守故不獲丁亥入吳吳人告敗于王王惡其聞也杜惡諸侯聞之惡烏路反自剄七人於幕下杜以絶口秋七月辛丑盟吳晉爭先杜爭歃血先後吳人曰於周室我為長杜吳為大伯後故為長長丁丈反下同晉人曰於姬姓我為伯杜為侯伯趙鞅呼司馬寅杜寅晉大夫曰日旰矣杜旰晚也旰古旦反大事未成二臣之罪也杜大事盟也二臣鞅與寅建鼓整列二臣死之長幼必可知也林勝者為長負者為幼必可知也對曰請姑視之反曰肉食者無墨杜墨氣生下林言肉食爵祿之人無氣色下者今吳王有墨國勝乎杜國為敵所勝太子死乎且夷德輕不忍久請少待之杜少待無與爭乃先晉人杜盟不書諸侯恥之故不録吳人將以公見晉侯子服景伯對使者曰王合諸侯則伯帥侯牧以見於王杜伯王官伯侯牧方伯見賢遍反使所吏反伯合諸侯則侯帥子男以見於伯杜伯諸侯長自王以下朝聘玉帛不同故敝邑之職貢於吳有豐於晉無不及焉以為伯也今諸侯會而君將以寡君見晉君則晉成為伯矣敝邑將改職貢魯賦於吳八百乘若為子男林若吳以魯見晉侯是魯為子男之國乘繩證反下同則將半邾以屬於吳杜半邾三百乘而如邾以事晉杜如邾六百乘且執事以伯召諸侯而以侯終之何利之有焉吳人乃止既而悔之林謂景伯欺之將囚景伯景伯曰何也立後於魯矣杜何景伯名林言己巳立後不避囚執將以二乘與六人從遲速唯命遂囚以還及户牖杜户牖陳留外黃縣西北東昏成是從才用反謂大宰曰魯將以十月上辛有事於上帝先王季辛而畢何世有職焉杜有職於祭事自襄以來未之改也杜魯襄公若不會祝宗將曰吳實然杜言魯祝宗將告神云景伯不會坐為吳所囚吳人信鬼故以是恐之且謂魯不共而執其賤者七人何損焉林景伯非卿故言賤者七人大宰嚭言於王曰無損於魯而祗為名適為惡名共音恭祗音支不如歸之乃歸景伯吳申叔儀乞糧於公孫有山氏牡申叔儀吳大夫公孫有山魯大夫舊相識曰佩玉蕊兮余無所繫之杜蕊然服飾備也己獨無以繫佩言吳王不恤下蕊而捶反又而水反旨酒一盛兮余與褐之父睨之杜一盛一器也睨視也褐寒賤之人言但得視不得飲盛音成又市政反父如字又音甫對曰粱則無矣粗則有之林粱精美也若登首山以呼曰庚癸乎則諾林蓋有山氏素備糧食登山待其呼則諾而與之也杜軍中不得出糧故為私隱庚西方主穀癸北方主水傳言吳子不與士共飢渴所以亡王欲伐宋殺其丈夫而囚其婦人杜以宋不會黃池故言吳子悖惑大宰嚭曰可勝也而弗能居也杜吳強宋弱故可必勝吳去宋逺故不能居乃歸冬吳及越平杜終伍員之言左傳杜林合注卷四十八
