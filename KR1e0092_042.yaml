body:
  text: 左傳杜林合注卷四十二明王道焜趙如源同編昭公九經乙酉二十有六年春王正月葬宋元公三月而葬速三月公至自齊居于鄆夏公圍成杜成孟氏邑不書齊師帥賤衆少重在公秋公會齊侯莒子邾子杞伯盟于鄟陵杜鄟陵地闕林此參盟也參盟自齊桓以來未之有也於是再見其再見何晉不復主盟矣十六年齊徐莒郯嘗盟於蒲隧十九年宋邾郳徐嘗盟于蟲則諸侯有不待伯主而自盟會者矣於是書以晉之不復主盟也晉不復主盟而後齊専盟矣鄟音專公至自會居于鄆無傳九月庚申楚子居卒杜未同盟而赴以名林平王卒子昭王軫立冬十月天王入于成周杜傳言王入在子朝奔後經在前者子朝來告晚林言始得京師也昔者惠王出入皆不書襄王雖書出猶不書入也於是悼王自皇敬王自狄泉則曷為皆書入幸之也王室亂矣入無足諱焉爾于成周猶未得王都也尹氏召伯毛伯以王子朝奔楚杜召伯當言召氏經誤也尹召族奔非一人故言氏書奔在王入下者王入乃告諸侯林尹氏獨欲立子朝耳以二卿序尹氏之下則從之者而已傳二十六年春王正月庚申齊侯取鄆前年已取鄆至是乃發傳者為公處鄆起葬宋元公如先君禮也善宋人違命以合禮三月公至自齊處于鄆言魯地也入魯竟故書至猶在外故書地夏齊侯將納公命無受魯貨申豐從女賈豐賈二人皆季氏家臣女音汝以幣錦二兩杜二丈為一端二端為一兩所謂匹也二兩二匹縳一如瑱杜瑱充耳縳卷也急卷使如充耳易懷藏縳直轉反瑱他殿反適齊師謂子猶之人高齮杜齮子猶家臣子猶梁丘據齮魚綺反能貨子猶為高氏後粟五千庾杜言若能為我行貨於子猶當為請使得為高氏後又當致粟五千庾庾十六斗凡八千斛高齮以錦示子猶子猶欲之齮曰魯人買之百兩一布以道之不通先入幣財杜言魯人買此甚多布陳之以百兩為數林財猶材也言以此二兩為先幣蓋許賂子猶以百兩子猶受之言於齊侯曰羣臣不盡力于魯君者非不能事君也杜欲行其説故先示欲盡力納魯君然據有異焉杜異猶怪也宋元公為魯君如晉卒于曲棘林在前年為于偽反叔孫昭子求納其君無疾而死林亦在前年不知天之棄魯邪抑魯君有罪於鬼神故及此也君若待于曲棘使羣臣從魯君以卜焉杜卜知可伐否若可師有濟也君而繼之兹無敵矣若其無成君無辱焉齊侯從之使公子鉏帥師從公杜鉏齊大夫林使從魯公伐魯成大夫公孫朝謂平子曰有都以衛國也請我受師林成孟氏邑言國之有都邑將以為國之屏衛也請以成邑禦齊師許之請納質杜恐見疑質音致弗許曰信女足矣告于齊師曰孟氏魯之敝室也杜敝壞也女音汝用成已甚弗能忍也林用成之力雕敝已甚不能復堪忍受請息肩于齊杜公孫朝詐齊師言欲降使來取成齊師圍成成人伐齊師之飲馬于淄者曰將以厭衆杜以厭衆心不欲使知已降也淄水出泰山梁父縣西北入汶飲於鴆反厭於冉反又於葉反魯成備而後告林待魯人守備既成而後告齊師曰不勝衆林言衆不欲降已不能勝勝音升又始證反師及齊師戰于炊鼻杜季氏師距公非公命則不書炊鼻魯地炊昌垂反齊子淵捷從泄聲子林聲子魯大夫齊子淵捷逐之泄息列反射之中楯瓦瓦楯脊射食亦反下同中丁仲反下同楯常允反又音允繇朐汰輈七入者三寸杜入楯瓦也朐車軛輈車轅繇過也汰矢激七矢鏃也繇音由朐其俱反汰他達反匕必履反聲子射其馬斬鞅殪改駕人以為鬷戾也而助之林在腹曰鞅聲子射淵捷之馬斬其係腹之鞅馬死淵捷改駕他馬魯人不識淵捷誤以為鬷戾而助之杜人魯人也鬷戾叔孫氏司馬子車曰齊人也子車即淵捷將擊子車林魯人之先助淵捷者知其誤將擊之子車射之殪其御曰又之又欲使射餘人子車曰衆可懼也而不可怒也林言衆人之衆可以射恐之而不可屢射激之使怒子囊帶從野泄叱之囊帶齊大夫野泄即聲子泄曰軍無私怒報乃私也將亢子杜欲以公戰禦之不欲私報其叱又叱之杜子囊復叱之亦叱之野泄亦叱也言齊無戰心但相叱冉豎射陳武子中手林冉豎季氏臣陳武子即陳子疆失弓而罵杜武子罵以告平子曰有君子白皙鬒鬚眉甚口林甚有口辨鬒之恐反黑也平子曰必子強也毋乃亢諸杜子強武子字林言無乃亢禦之以致其怒對曰謂之君子何敢亢之杜偽言不敢違季氏林雍羞為顔鳴右下林皆魚人羞為右故下車戰苑何忌取其耳何忌齊大夫不欲殺雍但截其耳以辱之顔鳴去之杜其右見獲懼而去之苑子之御曰視下顧復欲使苑子擊其足苑子刜林雍斷其足鑋而乘於他車以歸鑋一足行刜芳弗反説文云擊也又父勿反斷丁管反鑋遣政反又音磬顔鳴三入齊師呼曰林雍乘林呼林雍共載杜言魯人皆致力於季氏不以私怨而相棄乘繩證反四月單子如晉告急五月戊午劉人敗王城之師于尸氏杜劉人劉蚠之屬王城子朝之徒尸氏在鞏縣西南偃師城戊辰王城人劉人戰于施谷劉師敗績施谷周地秋盟于鄟陵謀納公也杜齊侯謀七月己巳劉子以王出杜師敗懼而出庚午次于渠渠周地王城人焚劉杜燒劉子邑丙子王宿于禇氏杜洛陽縣南有禇氏亭禇張吕反丁丑王次于萑谷庚辰王入于胥靡辛巳王次于滑杜萑谷胥靡滑皆周地胥靡滑本鄭邑萑音丸晉知躒趙鞅帥師納王使女寬守闕塞女寬晉大夫闕塞洛陽西南伊闕口也守之備子朝知音智躒音厯女音汝塞索代反九月楚平王卒令尹子常欲立子西杜子西平王之長庶曰大子壬弱其母非適也杜壬昭王也適丁厯反王子建實聘之林本王子建所聘而平王奪之也子西長而好善立長則順建善則治王順國治可不務乎子西怒曰是亂國而惡君王也林廢嫡立庶是亂楚國之政言王子建聘之是彰平王之惡長丁文反好呼報反國有外援不可瀆也杜外援秦也瀆慢也王有適嗣不可亂也敗親速讐杜不立壬秦將來討是速讐也亂嗣不祥我受其名杜受惡名賂我以天下吾滋不從也杜滋益也楚國何為必殺令尹令尹懼乃立昭王冬十月丙申王起師于滑杜起發也辛丑在郊郊子朝邑遂次于尸十一月辛酉晉師克鞏杜知躒趙鞅之師召伯盈逐王子朝伯盈本黨子朝晉師克鞏知子朝不成更逐之而逆敬王玉子朝及召氏之族毛伯得尹氏固南宫嚚奉周之典籍以奔楚召尹二族皆奔故稱氏重見尹固名者為後還見殺隂忌奔莒以叛隂忌子朝黨莒周邑召伯逆王于尸及劉子單子盟召伯新還故盟遂軍圉澤次于隄上杜圉澤隄上皆周地隄音低或音啼癸酉王入于成周成周今洛陽甲戌盟于襄宫襄王之廟晉師使成公般戍周而還杜般晉大夫般音班十二月癸未王入于莊宫莊宫在王城王子朝使告于諸侯曰昔武王克殷成王靖四方康王息民並建母弟以藩屏周亦曰吾無専享文武之功杜不敢専故建母弟且為後人之迷敗傾覆而溺入于難則振救之至于夷王王愆于厥身杜夷王厲王父也愆惡疾也覆芳服反難乃旦反諸侯莫不並走其望以祈王身林諸侯莫不遍走禱祀羣望之神以祈王疾之瘳至于厲王王心戾虐萬民弗忍居王于彘杜不忍害王也厲王之末周人流王于彘彘直例反諸侯釋位以間王政杜間猶與也去其位與治王之政事林周召二公與治王之政事號曰共和間間厠之間宣王有志而後效官林宣王厲王子彘之亂宣王尚少召公虎取而長之有志言長而有立志也效授也二公乃共立之而授其官政於王至于幽王天不弔周王昏不若用愆厥位杜幽王宣王子若順也愆失也攜王姦命諸侯替之而建王嗣用遷郟鄏杜攜王幽王少子伯服也王嗣宜臼也幽王后申薑生太子宜臼王幸褒姒生伯服欲立之而殺大子大子奔申申伯與鄫及西戎伐周戰于戲幽王死諸侯廢伯服而立宜臼是為平王東遷郟鄏攜户圭反姦音干下同則是兄弟之能用力於王室也至于惠王天不靖周生頽禍心施于叔帶惠襄辟難越去王都杜惠王平王六世孫頽惠王庶叔也莊十九年作亂惠王適鄭襄王惠王子叔帶襄王弟僖二十四年叔帶作難襄王處汜頽徒回反施以䜴反難乃旦反則有晉鄭咸黜不端杜黜去也晉文殺叔帶鄭厲殺子頽為王室去不端直之人以綏定王家則是兄弟之能率先王之命也在定王六年秦人降妖杜定王襄王孫定王六年魯宣八年林衣服歌謠草木之怪謂之妖此蓋妖言降秦也曰周其有頿王林頿口上鬚也言周當有王生而有頿頿子斯反亦克能修其職諸侯服享二世共職杜二世謂靈景共音恭王室其有間王位諸侯不圖而受其亂災杜間王位謂子朝也今子朝以為王猛受亂災謂楚也今子朝以為晉間間厠之間下同至于靈王生而有頿靈王定王孫王甚神聖無惡於諸侯靈王景王克終其世景王靈王子今王室亂單旗劉狄剝亂天下一行不若杜單旗穆公也劉狄劉蚠也一専也林専一行此不順之事謂先王何常之有言先王無常法唯余心所命林唯我心所欲則命以為君其誰敢討之帥羣不弔之人弔至也弔如字舊丁厯反以行亂于王室侵欲無厭規求無度貫瀆鬼神杜貫習也瀆易也厭於鹽反貫古患反慢棄刑法倍姦齊盟傲狠威儀矯誣先王林傲惰狼戾以為一身之威儀矯詐誣罔以干先王之命令倍音佩晉為不道是攝是贊杜攝持也贊佐也先王謂景王思肆其罔極杜肆放也兹不穀震蕩播越竄在荆蠻杜兹此也此不穀于朝自謂未有攸底杜底至也攸所也底音旨若我一二兄弟甥舅奬順天法無助狡猾以從先王之命毋速天罰赦圖不穀赦其憂而圖其難毋音無則所願也敢盡布其腹心及先王之經而諸侯實深圖之林而汝也昔先王之命曰王后無適則擇立長年鈞以德德鈞以卜杜言王后若無嫡子則擇庶子之長者而立之年同則論其德之厚薄德同則論其卜之吉凶林此所謂先王之經適丁厯反王不立愛公卿無私古之制也穆后及太子夀早夭即世在十五年單劉贊私立少林單子劉子贊助景王私意而立少子以間先王間錯先王之制亦惟伯仲叔季圖之伯仲叔季總謂諸侯閔馬父聞子朝之辭曰文辭以行禮也子朝干景之命逺晉之大以専其志無禮甚矣文辭何為林閔馬父魯大夫杜傳終王室亂逺于萬反齊有彗星杜出齊之分野不書魯不見彗似嵗反又息遂反齊侯使禳之祭以禳除之晏子曰無益也祗取誣焉杜誣欺也天道不諂諂疑也不二其命林禍福明白不可攜二若之何禳之且天之有彗也以除穢也林星象似帚故有除穢之象君無穢德又何禳焉若德之穢禳之何損林雖使祭禳何損於禍詩曰惟此文王小心翼翼昭事上帝聿懷多福厥德不回以受方國杜詩大雅翼翼共也聿惟也回違也言文王德不違天人故四方之國歸往之君無違德方國將至何患於彗詩曰我無所監夏后及商用亂之故民卒流亡杜逸詩也言追監夏商之亡皆以亂故若德回亂民將流亡祝史之為無能補也公説乃止齊侯與晏子坐于路寢林路寢齊君之正寢也説音悅公歎曰美哉室其誰有此乎杜景公自知德不能久有國故歎也晏子曰敢問何謂也公曰吾以為在德對曰如君之言其陳氏乎林必陳氏代齊而有之也陳氏雖無大德而有施於民豆區釡鍾之數林四升為豆四豆為區四區為釡釡十為鍾此公量也若陳氏私量五升為豆四豆為區四區為釡鍾乃大矣詳見二年傳注施式䜴反下同區烏侯反其取之公也薄謂以公量收其施之民也厚謂以私量貸施如字又始䜴反公厚斂焉陳氏厚施焉民歸之矣詩曰雖無德與女式歌且舞杜詩小雅義取雖無大德要有喜説之心欲歌舞之式用也斂力驗反女音汝陳氏之施民歌舞之矣後世若少惰陳氏而不亡則國其國也已林後世子孫若少怠惰不自強於德政陳氏而不先亡則齊國必為陳氏之所有公曰善哉是可若何對曰唯禮可以己之在禮家施不及國民不遷農不移工賈不變士不濫官不滔大夫不收公利林大夫之家所施恩澤不得及於國人四民不得遷改其業農主稼穡工治器用賈主貿遷各守常業為士者不濫失其職為官者不滔慢其事大夫不得作福以取人心賈音古滔吐刀反公曰善哉我不能矣吾今而後知禮之可以為國也對曰禮之可以為國也久矣與天地並有天地則禮義興君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣共而不二父慈而教子孝而針杜針諫也共音恭兄愛而友弟敬而順夫和而義妻柔而正姑慈而從杜從不自專婦聽而婉杜婉順也禮之善物也公曰善哉寡人今而後聞此禮之上也林恨不早知此禮之可尊尚也對曰先王所稟於天地以為其民也是以先王上之杜稟受也林為治也經丙戌二十有七年春公如齊自鄆行公至自齊居于鄆夏四月吳弒其君僚杜僚亟戰民罷又伐楚喪故光乘間而動稱國以弒罪在僚林僚弒公子光立是為闔廬楚殺其大夫郤宛杜無極楚之讒人宛所聞知而信近之以取敗亡故書名罪宛郤去逆反宛於阮反又於元反秋晉士鞅宋樂祁犂衛北宫喜曹人邾人滕人會于扈林外大夫自為會冬十月曹伯午卒杜無傳未同盟而赴以名林悼公卒弟聲公野立邾快來奔杜無傳快邾命卿也故書公如齊自鄆行公至自齊居于鄆無傳傳二十七年春公如齊公至自齊處于鄆林前年齊取鄆以居也言在外也杜在外邑故書地吳子欲因楚喪而伐之前年楚平王卒使公子掩餘公子燭庸帥師圍潛杜二子皆王僚母弟潛楚邑在廬江六縣西南使延州來季子聘于上國杜季子本封延陵後復封州來故曰延州來林上國即中國吳居水鄉故以中國為上國遂聘于晉以觀諸侯杜觀強弱楚莠尹然工尹麋帥師救潛杜二尹楚官然麋其名麋九倫反左司馬沈尹戌帥都君子與王馬之屬以濟師杜都君子在都邑之士有復除者王馬之屬王之養馬官屬校人也濟益也戌音恤與吳師遇于窮令尹子常以舟師及沙汭而還沙水名汭如鋭反左尹郤宛工尹夀帥師至于潛吳師不能退林遇窮之師當吳之前至潛之師要吳之後楚師強盛故吳不得退去吳公子光曰此時也弗可失也杜欲因其師徒在外國不堪役以弒王告鱄設諸林鱄設諸二十年伍員所見勇士鱄音専曰上國有言曰不索何獲我王嗣也吾欲求之林光吳王諸樊子故曰王嗣蓋夀夢生四子諸樊也餘祭也夷昧也季札也而季札賢諸樊餘祭不以國與子而與弟凡為季子也季子不受則國宜及諸樊之子僚夷昧之子也越光而代札故光自言王嗣而欲求之事若克季子雖至不吾廢也杜至謂聘還鱄設諸曰王可弒也母老子弱是無若我何猶言我無若是何欲以老弱託光光曰我爾身也杜言我身猶爾身林言事汝母當如我母待汝子當如我子也夏四月光伏甲於堀室而享王堀地為室堀苦忽反王使甲坐於道及其門杜坐道邊至光門門階户席皆王親也夾之以鈹羞者獻體改服於門外林直門者直階者主户者主席者皆王僚親密之人又夾之以劒言守衛嚴密羞進食也獻體解衣也進食者必解衣易服於門外防姦細也鈹普皮反劔也執羞者坐行而入杜坐行膝行也執鈹者夾承之林執劔者二人夾承執羞者及體以相授也杜鈹及進羞者體以所食授王光偽足疾入于堀室杜恐難作王黨殺已素辟之鱄設諸置劔於魚中以進杜全魚炙故可置劒以進抽劔刺王鈹交於胸杜交鱄諸胸遂弒王闔廬以其子為卿杜闔廬光也以鱄諸子為卿季子至曰苟先君無廢祀民人無廢主社稷有奉國家無傾乃吾君也吾誰敢怨哀死事生以待天命林哀王僚之死喪事闔廬之生存以待天命之自定非我生亂立者從之先人之道也吳自諸樊以下兄弟相傳而不立適是亂由先人起也季子自知力不能討光故云爾復命哭墓杜復使命於僚墓復位而待杜復本位待光命吳公子掩餘奔徐公子燭庸奔鍾吾鍾吾小國楚師聞吳亂而還言聞吳亂明郤宛不取賂而還郤宛直而和國人説之林郤宛楚左尹以直事君以和接類説音悅鄢將師為右領杜右領官名鄢於晚反又烏户反與費無極比而惡之杜惡郤宛費扶味反比毗志反惡烏路反令尹子常賄而信讒無極譖郤宛焉謂子常曰子惡欲飲子酒杜子惡郤宛林言郤宛欲為子常設宴飲於鴆反又謂子惡令尹欲飲酒於子氏林言令尹欲飲酒於子家子惡曰我賤人也不足以辱令尹令尹將必來辱為惠已甚吾無以酬之若何杜酬報獻無極曰令尹好甲兵子出之吾擇焉林出其家所有之甲兵為選擇取其佳者以進子常好呼報反取五甲五兵曰置諸門令尹至必觀之而從以酬之林此以上四句皆無極辭及享日帷諸門左林張帷陳甲兵其中無極謂令尹曰吾幾禍子子惡將為子不利甲在門矣子必無往且此役也此春救潛之役吳可以得志子惡取賂焉而還又誤羣帥使退其師曰乘亂不祥林此曰字舉郤宛當時之辭帥所類反吳乘我喪林此以下皆無極之辭我乘其亂不亦可乎令尹使視郤氏則有甲焉不往召鄢將師而告之杜告子惡門有甲兵將害己將師退遂令攻郤氏且爇之杜爇燒也爇如悅反子惡聞之遂自殺也國人弗爇林國人知其寃不肯燒其家令曰不爇郤氏與之同罪或取一編菅焉或取一秉秆焉杜編菅苫也秉把也秆稿也菅古顔反秆古但反木莖也國人投之杜國人投而棄之遂弗爇也令尹炮之炮燔郤宛炮步交反盡滅郤氏之族黨殺陽令終與其弟完及他杜令終陽丐子他從河反與晉陳及其子弟杜晉陳楚大夫皆郤氏之黨晉陳之族呼於國曰鄢氏費氏林鄢將師費無極自以為王専禍楚國弱寡王室蒙王與令尹以自利也言蒙欺也令尹盡信之矣國將如何令尹病之為下殺無極張本秋會于扈令戍周且謀納公也宋衛皆利納公林宋衛二國與昭公相好皆以納公為利固請之范獻子取貨於季孫謂司城子梁與北宫貞子林范獻子即士鞅杜子梁宋樂祁也貞子衛北宫喜曰季孫未知其罪而君伐之請囚請亡於是乎不獲林謂請囚于費請以五乘亡魯昭公皆不許君又弗克而自出也夫豈無備而能出君乎季氏之復天救之也休公徒之怒而啓叔孫氏之心不然豈其伐人而説甲執氷以遊林復猶安也言其既危復安天意實救助之休息公徒之忿怒而開導叔孫氏之心志苟不如此豈有以師致伐於人而其衆乃自解甲執箭筒敖遊之理説他活反叔孫氏懼禍之濫而自同於季氏天之道也魯君守齊三年而無成季氏甚得其民淮夷與之杜淮夷魯東夷有十年之備有齊楚之援杜公雖在齊言齊不致力有天之贊林謂天救之有民之助林謂甚得其民有堅守之心林謂有十年之備有列國之權林謂有齊楚之援而弗敢宣也林堅守臣節不敢宣用事君如在國書公行告公至是也故鞅以為難二子皆圖國者也而欲納魯君鞅之願也請從二子以圍魯無成死之林示不徒還以恐二子二子懼皆辭乃辭小國而以難復杜以難納白晉君孟懿子陽貨伐鄆陽貨季氏家臣伐鄆欲奪公鄆人將戰子家子曰天命不慆久矣杜慆疑也言棄君不疑使君亡者必此衆也言君據鄆衆以與魯戰必敗亡天既禍之而自福也不亦難乎猶有鬼神此必敗也嗚呼為無望也夫其死於此乎公使子家子如晉公徒敗于且知杜且知近鄆地也夫音扶且子餘反楚郤宛之難國言未已進胙者莫不謗令尹杜進胙國中祭祀也謗詛也難乃旦反沈尹戌言於子常曰夫左尹與中廏尹莫知其罪而子殺之以興謗讟至于今不已杜左尹郤宛也中廏尹陽令終戌也惑之仁者殺人以掩謗猶弗為也今吾子殺人以興謗而弗圖不亦異乎林仁者之人假使殺人可以掩息謗議尚不肯為此殺人利己之事今子常殺人以起謗議而不早自圖謀不亦異於仁者之所為乎夫無極楚之讒人也民莫不知去朝吳在十五年出蔡侯朱在二十一年喪大子建殺連尹奢在二十年喪息浪反屏王之耳目使不聰明不然平王之溫惠共儉有過成莊無不及焉所以不獲諸侯邇無極也杜邇近也今又殺三不辜以興大謗杜三不辜郤氏陽氏晉陳氏幾及子矣子而不圖將焉用之夫鄢將師矯子之命以滅三族國之良也而不愆位杜在位無愆過幾音祈又音機焉於虔反吳新有君杜光新立也疆埸日駭楚國若有大事子其危哉林衆情不附恐生他變此危道也知者除讒以自安也今子愛讒以自危也甚矣其惑也子常曰是瓦之罪敢不良圖九月己未子常殺費無極與鄢將師盡滅其族以説于國謗言乃止知音智冬公如齊齊侯請饗之杜設饗禮子家子曰朝夕立於其朝又何饗焉其飲酒也乃飲酒使宰獻而請安比公於大夫也禮君不敵臣晏大夫使宰為主獻獻爵也請安齊侯請自安不在坐也子仲之子曰重為齊侯夫人曰請使重見杜子仲魯公子憖也十二年謀逐季氏不能而奔齊今行飲酒禮而欲使重見從宴媟也重直勇反又直恭反見賢遍反子家子乃以君出辟齊夫人十二月晉籍秦致諸侯之戍于周魯人辭以難杜經所以不書戍周籍秦籍談子經丁亥二十有八年春王三月葬曹悼公無傳六月而葬緩公如晉次于乾侯杜乾侯在魏郡斤丘縣晉竟內邑夏四月丙戌鄭伯寧卒杜無傳未同盟而赴以名林定公卒獻公蠆立六月葬鄭定公無傳三月而葬速秋七月癸巳滕子寧卒杜無傳未同盟而赴以名林悼公卒頃公結立冬葬滕悼公無傳傳二十八年春公如晉將如乾侯齊侯卑公故適晉子家子曰有求於人而即其安人孰矜之其造於竟杜欲使次於竟以待命造七報反弗聽使請逆於晉晉人曰天禍魯國君淹恤在外君亦不使一個辱在寡人杜一個單使個古賀反而即安於甥舅其亦使逆君言自使齊逆君使公復于竟而後逆之杜逆著乾侯也言公不能用子家所以見辱晉祁勝與塢臧通室杜二子祁盈家臣也通室易妻塢於庶反祁盈將執之盈祁午之子訪於司馬叔遊叔遊司馬叔侯之子叔遊曰鄭書有之惡直醜正實蕃有徒杜鄭書古書名也言害正直者實多徒衆林醜亦惡也言世衰道微反以正直為醜惡實蕃多其徒衆已上兩句此出鄭書惡如字又烏路反無道立矣子懼不免杜言世亂讒勝詩曰民之多辟無自立辟杜詩大雅林辟法也言民多僻邪之行當同流合汙無自立辟法以違於衆多辟匹亦反立辟婢亦反姑已若何姑且也已止也盈曰祁氏私有討國何有焉杜言討家臣無與國事遂執之祁勝賂荀躒荀躒為之言於晉侯晉侯執祁盈杜以其専戮為于偽反祁盈之臣曰鈞將皆死林鈞同也言三人同被執皆將戮死憗使吾君聞勝與臧之死也以為快杜憗發語之音也吾君謂祁盈憗魚覲反乃殺之夏六月晉殺祁盈及楊食我楊叔向邑食我叔向子伯石也食音嗣食我祁盈之黨也而助亂故殺之遂滅祁氏羊舌氏初叔向欲娶於申公巫臣氏杜夏姬女也其母欲娶其黨林叔向之母欲為叔向娶於母氏叔向曰吾母多而庶鮮吾懲舅氏矣杜言父多妾媵而庶子鮮少嫌母氏性不曠鮮息淺反其母曰子靈之妻殺三夫杜子靈巫臣妻夏姬也三夫陳御叔楚襄老及巫臣也時巫臣已死一君陳靈公一子夏徵舒而亡一國陳也兩卿矣孔寧儀行父可無懲乎吾聞之甚美必有甚惡林天地之理循環無窮故甚美者必有甚惡存乎其間是鄭穆少妃姚子之子子貉之妹也林是謂夏姬杜子貉鄭靈公夷少詩照反貉亡白反子貉早死無後而天鍾美於是杜是夏姬也鍾聚也子貉死在宣四年將必以是大有敗也昔有仍氏生女黰黑杜有仍古諸侯也美髮為黰黰之忍反稠髮也而甚美光可以鑑髮膚光色可以照人名曰玄妻以髮黑故樂正后夔取之夔舜典樂之君長取如字又七住反生伯封實有豕心貪婪無饜忿纇無期謂之封豕杜纇戾也封大也林因其名伯封謂之封豕婪力耽反饜於鹽反纇立對反有窮后羿滅之林羿有窮君名篡夏后者夔是以不祀林言夔因取有仍之美女生子以致滅亡絶其祭祀且三代之亡共子之廢皆是物也杜夏以妹喜殷以妲己周以褒姒三代所由亡也共子晉申生以驪姬廢共音恭女何以為哉夫有尤物足以移人苟非德義則必有禍杜尤異也女音汝叔向懼不敢取平公強使取之生伯石林伯石即陽食我取七住反又如字強其丈反伯石始生子容之母走謁諸姑子容母叔向嫂伯華妻也姑叔向母曰長叔姒生男社兄弟之妻相謂姒長叔謂叔向也長丁丈反姑視之及堂聞其聲而還曰是豺狼之聲也狼子野心林豺狼之子山野之心不可馴服非是莫喪羊舌氏矣遂弗視喪息浪反秋晉韓宣子卒林即韓起魏獻子為政杜獻子魏舒分祁氏之田以為七縣七縣塢祁平陵梗陽塗水馬首盂也分羊舌氏之田以為三縣銅鞮平陽楊氏司馬彌牟為塢大夫杜大原塢縣賈辛為祁大夫杜大原祁縣司馬烏為平陵大夫魏戊為梗陽大夫林戊魏舒庶子梗陽在大原晉陽縣南戊音茂知徐吾為塗水大夫林徐吾知盈孫塗水大原榆次縣知音智韓固為馬首大夫固韓起孫孟丙為盂大夫杜大原盂縣樂霄為銅鞮大夫杜上黨銅鞮縣趙朝為平陽大夫杜朝趙勝曽孫平陽平陽縣僚安為楊氏大夫杜平陽楊氏縣謂賈辛司馬烏為有力於王室杜二十二年辛烏帥師納敬王故舉之杜舉以宰邑賞其勤王之功謂知徐吾趙朝韓固魏戊餘子之不失職能守業者也卿之庶子為餘子其四人者皆受縣而後見於魏子以賢舉也杜四人司馬彌牟孟丙樂霄僚安也受縣而後見言采衆而舉不以私也見賢遍反魏子謂成鱄杜鱄晉大夫鱄音鄟又甫轉反又音附吾與戊也縣人其以我為黨乎對曰何也林何可以為黨也戊之為人也逺不忘君近不逼同居利思義在約思純林其在疏逺不敢忘君其忠如此其在近密不逼同位其共如此其處財利則思合義無苟得之心也其處窮約則思純正無僣濫之心也有守心而無淫行雖與之縣不亦可乎昔武王克商光有天下林光大也以光大之德奄有天下行下孟反其兄弟之國者十有五人姬姓之國者四十人林之往也按武王兄弟封國者管蔡郕霍魯衛毛聃郜雍曹滕畢原豐邭凡十六人此言十五人紀載不同不必強為之説四十人亦約言之皆舉親也夫舉無他惟善所在親疏一也詩曰唯此文王帝度其心莫其德音其德克明克明克類克長克君王此大國克順克比比于文王其德靡悔既受帝祉施于孫子杜詩大雅美文王能王大國受天福施及子孫林帝上帝也言上帝實揆度文王之心凡事皆得其中莫安定貌言德教之聲莫然清淨其德能如日月之明臨照物使皆得所不失其類能有長人之道能有君人之德故能興王於此周之大國能使天下順從又能比方善事而用之天下之人長短相成能否相濟比方於文王之德其德皆合無有悔咎施猶廣也唯此文王詩作唯此王季度待洛反莫亡白反又如字長丁丈反王此于况反施以䜴反心能制義曰度德正應和曰莫按此以下覆解詩之九德言文王之心能制合宜之義是以帝度其心其德端正民皆應和是以莫其德音照臨四方曰明勤施無私曰類杜施而無私物得其所無失類也施式䜴反教誨不倦曰長教誨長人之道賞慶刑威曰君杜作威作福君之職也慈和遍服曰順杜唯順故天下遍服擇善而從之曰比杜比方善事使相從也經緯天地曰文杜經緯相錯故織成文九德不愆作事無悔社九德言人備德皆無愆過則動無悔吝故襲天祿子孫賴之杜襲受也主之舉也杜大夫稱主近文德矣所及其逺哉杜舉魏戊等勤施無私也其四人者擇善而從故曰近文德所及逺也賈辛將適其縣見於魏子魏子曰辛來昔叔向適鄭鬷蔑惡林鬷蔑即鄭然明言其貌醜惡鬷于工反欲觀叔向從使之收器者杜從隨也隨使人應斂俎豆者而往立於堂下一言而善叔向將飲酒聞之曰必鬷明也杜素聞其賢故聞其言而知之下執其手以上曰昔賈大夫惡賈國之大夫惡亦醜也上時掌反娶妻而美三年不言不笑御以如臯杜為妻御之臯澤射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射女遂不言不笑夫今子少不揚林子謂鬷蔑顔貌少不揚顯射食亦反女音汝下同夫音扶子若無言吾幾失子矣言之不可以已也如是遂如故知今女有力於王室吾是以舉女杜因賈辛有功而後舉之言人不可無能幾音祈行乎敬之哉毋墮乃力杜墮損也毋音無墮許規反仲尼聞魏子之舉也以為義曰近不失親謂舉魏戊逺不失舉以賢舉可謂義矣又聞其命賈辛也以為忠杜先賞王室之功故為忠詩曰永言配命自求多福忠也杜詩大雅永長也言能長配天命致多福者唯忠魏子之舉也義其命也忠其長有後於晉國乎冬梗陽人有獄魏戊不能斷林魏戊為梗陽大夫望輕故不敢斷決其曲直斷丁亂反以獄上杜上魏子其大宗賂以女樂杜訟者之大宗魏子將受之魏戊謂閻沒女寬二人魏子之屬大夫曰主以不賄聞于諸侯若受梗陽人賄莫甚焉吾子必諫皆許諾退朝待於庭杜魏子朝君退而待於魏子之庭聞如字又音問饋入召之杜召二大夫食比置林自始食至食盡比必利反三歎既食使坐杜更命之令坐魏子曰吾聞諸伯叔諺曰唯食忘憂吾子置食之間三歎何也同辭而對曰或賜二小人酒不夕食杜或他人也言飢甚饋之始至恐其不足是以歎林恐不足以飽其所欲中置林至食及半自咎曰豈將軍食之而有不足是以再歎魏子中軍帥故謂之將軍食音嗣及饋之畢願以小人之腹為君子之心屬厭而已杜屬足也言小人之腹飽猶知厭足君子之心亦宜然屬之玉反厭於鹽反又於艷反獻子辭梗陽人林悟二大夫規辭不受其賂傳言魏氏所以興也左傳杜林合注卷四十二
