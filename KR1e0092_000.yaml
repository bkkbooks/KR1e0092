body:
  text: 左傳杜林合注春秋類提要臣等謹案左傳杜林合注五十卷明王道焜趙如源同編案朱彛尊經義考載宋林堯叟春秋左傳句解四十卷引鄭玥之言曰堯叟字唐翁崇禎中杭州書坊取其書合杜注行之又載此書五十卷引陸元輔之言曰王道焜杭州人中天啟辛酉鄉試與里人趙如源濬之共輯此書云云今書肆所行卷數與彛尊所記合而削去道焜如源之名又首載凡例題為堯叟所述而中引永樂春秋大全殆足咍噱葢即以二人編書之凡例改題堯叟也杜預注左氏號為精密雖隋劉炫已有所規元趙汸明邵寳傅遜陸粲國朝顧炎武惠棟又遞有所補正而宏綱巨目終越諸家堯叟之書徒以箋釋文句為事實非其匹第古注簡奥或有所不盡詳堯叟補苴其義使淺顯易明于讀者亦不無所益且不似朱申句解于傳文横肆刋削故仍録存之以備一解中附陸徳明音義當亦道焜等所加原本所有今亦並存焉乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書春秋左傳原序春秋者魯史記之名也記事者以事繫日以日繫月以月繫時以時繫年所以紀逺近别同異也故史之所記必表年以首事年有四時故錯舉以為所記之名也周禮有史官掌邦國四方之事逹四方之志諸侯亦各有國史大事書之於策小事簡牘而巳孟子曰楚謂之檮杌晉謂之乘而魯謂之春秋其實一也韓宣子適魯見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之徳與周之所以王韓子所見蓋周之舊典禮經也周徳既衰官失其守上之人不能使春秋昭明赴告策書諸所記註多違舊章仲尼因魯史策書成文考其真偽而志其典禮上以遵周公之遺制下以明將來之法其教之所存文之所害則刋而正之以示勸戒其餘則皆即用舊史史有文質辭有詳畧不必改也故傳曰其善志又曰非聖人孰能修之蓋周公之志仲尼從而明之左丘明受經於仲尼以為經者不刋之書也故傳或先經以始事或後經以終義或依經以辯理或錯經以合異隨例而發其例之所重舊史遺文畧不盡舉非聖人所修之要故也身為國史躬覽載籍必廣記而備言之其文緩其㫖逺將令學者原始要終尋其枝葉究其所窮優而柔之使自求之饜而飫之使自趨之若江海之浸膏澤之潤渙然冰釋怡然理順然後為得也其發凡以言例皆經國之常制周公之垂法史書之舊章仲尼從而修之以成一經之通體其微顯闡幽裁成義類者皆據舊例而發義指行事以正褒貶諸稱書不書先書故書不言不稱書曰之類皆所以起新舊發大義謂之變例然亦有史所不書即以為義者此蓋春秋新意故傳不言凡曲而暢之也其經無義例因行事而言則傳直言其歸趣而已非例也故發傳之體有三而為例之情有五一曰微而顯文見於此起義在彼稱族尊君命舍族尊夫人梁亡城縁陵之類是也二曰志而晦約言示制推以知例參㑹不地與謀曰及之類是也三曰婉而成章曲從義訓以示大順諸所諱辟璧假許田之類是也四曰盡而不汙直書其事具文見意丹楹刻桷天王求車齊侯獻捷之類是也五曰懲惡而勸善求名而亡欲蓋而章書齊豹盜三叛人名之類是也推此五體以尋經傳觸類而長之附于二百四十二年行事王道之正人倫之紀備矣或曰春秋以錯文見義若如所論則經當有事同文異而無其義也先儒所傳皆不其然答曰春秋雖以一字為褒貶然皆須數句以成言非如八卦之爻可錯綜為六十四也固當依傳以為斷古今言左氏春秋者多矣今其遺文可見者十數家大體轉相祖述進不得為錯綜經文以盡其變退不守丘明之傳於丘明之傳有所不通皆没而不說而更膚引公羊穀梁適足自亂預今所以為異專修丘明之傳以釋經經之條貫必出於傳傳之義例總歸諸凡推變例以正褒貶簡二傳而去異端蓋丘明之志也其有疑錯則備論而闕之以俟後賢然劉子駿創通大義賈景伯父子許惠卿皆先儒之美者也末有頴子嚴者雖淺近亦復名家故持舉劉賈許頴之違以見同異分經之年與傳之年相附比其義類各隨而解之名曰經傳集解又别集諸例及地名譜第厯數相與為部凡四十部十五卷皆顯其異同從而釋之名曰釋例將令學者觀其所聚異同之説釋例詳之也或曰春秋之作左傳及穀梁無明文說者以為仲尼自衛反魯修春秋立素王丘明為素臣言公羊者亦云黜周而王魯危行言孫以辟當時之害故微其文隱其義公羊經止獲麟而左氏經終孔丘卒敢問所安答曰異乎余所聞仲尼曰文王既没文不在兹乎此制作之本意也歎曰鳳鳥不至河不出圖吾巳矣夫蓋傷時王之政也麟鳳五靈王者之嘉瑞也今麟出非其時虚其應而失其歸此聖人所以為感也絶筆於獲麟之一句者所感而起固所以為終也曰然則春秋何始於魯隠公答曰周平王東周之始王也隠公讓國之賢君也考乎其時則相接言乎其位則列國本乎其始則周公之祚𦙍也若平王能祈天永命紹開中興隠公能𢎞宣祖業光啟王室則西周之美可尋文武之迹不隊是故因其厯數附于行事采周之舊以㑹成王義垂法將來所書之王即平王也所用之厯即周正也所稱之公即魯隠也安在其黜周而王魯乎子曰如有用我者吾其為東周乎此其義也若夫制作之文所以彰徃考來情見乎辭言髙則㫖逺辭約則意微此理之常非隠之也聖人包周身之防既作之後方復隠諱以辟患非所聞也子路欲使門人為臣孔子以為欺天而云仲尼素王丘明素臣又非通論也先儒以為制作三年文成致麟既巳妖妄又引經以至仲尼卒亦又近誣據公羊經止獲麟而左氏小邾射不在三叛之數故余以為感麟而作作起獲麟則文止於所起為得其實至於反袂拭面稱吾道窮亦無取焉春秋提要周十二王春秋歴十有四王悼王立未踰年敬王崩在春秋後故止曰十二王平王四十九年入春秋隠元年也三年崩在位五十一年桓王元年隠四年也相十五年崩在位二十三年荘王元年桓十六年也荘十二年崩在位十五年僖王元年荘十三年也十七年崩在位五年惠王元年莊十八年也僖八年崩在位二十五年襄王元年僖九年也文八年崩在位三十三年頃王元年文九年也十四年崩在位六年匡王元年文十五年也宣二年崩在位六年定王元年宣三年也成五年崩在位二十一年簡王元年成六年也襄元年崩在位十四年靈王元年襄二年也二十八年崩在位二十七年景王元年襄二十九年也昭二十二年崩在位二十五年敬王元年昭二十三年也崩在春秋後列國見於年表者十九魯蔡曹衛滕晉鄭齊秦楚宋杞陳呉邾莒薛許小邾魯十二公隠公不書即位桓公四年七年去秋冬二時莊公不書即位閔公不書即位僖公不書即位文公宣公成公襄公昭公定公元年無正月哀公五伯春秋終入呉黄池之役呉越亦爭伯矣齊桓公莊十三年㑹北杏宋襄公僖十九年盟曹南晉文公僖二十八年戰城濮秦穆公文三年伐晉楚莊王宣十一年盟辰陵晉十一世文公僖二十八年立三十二年卒襄公僖三十三年立文六年卒靈公文七年立宣二年卒成公宣三年立宣九年卒景公宣九年立成十年卒厲公成十一年立十八年卒悼公成十八年立襄十五年卒平公襄十六年立昭十年卒昭公昭十一年立十六年卒頃公昭十七年立三十年卒定公昭三十年立卒在春秋後魯三桓仲孫氏又曰孟孫叔孫氏季孫氏晉八卿智罃士匄荀偃韓起欒黶士魴魏絳趙武晉六卿趙氏范氏智氏荀氏魏氏韓氏晉三卿魏斯韓䖍趙籍周來聘七隠七年凡伯九年南季桓四年宰渠伯糾五年仍叔之子八年家父僖三十年宰周公宣十年王季子周錫命三莊元年榮叔文元年毛伯成八年召伯周歸脤一定十四年石尚周賵塟四隠元年宰咺文元年叔服五年榮叔召伯周來求三隠三年武氏子求賻桓十五年家父求車文九年毛伯求金魯君臣朝聘于周八文元年叔孫得臣二十二年叔鞅㑹塟故不數僖二十八年公兩朝王所成十三年公如京師僖三十年公子遂文元年叔孫得臣八年公孫敖宣九年仲孫蔑襄二十四年叔孫豹公如齊十有一春秋公如齊者十有五桓莊四如齊非朝故不數僖公三宣公六昭公二公如晉二十文公二成公四襄公五昭公八定公一公如楚二襄公一昭公一魯大夫聘列國五十有六又如齊四如宋三如晉二如陳滕各一皆因事而徃非専行聘禮故不數如齊十有九如晉二十有五如陳二如宋五如牟如衛如楚如莒如邾各一諸侯朝魯四十曹滕小邾各五杞邾各七郯二薛紀穀鄧鄫郜葛牟蕭各一齊聘魯五隠七年弟年桓三年弟年僖三十三年國歸父宣十年國佐襄二十七年慶封晉聘魯十有一成三年荀庚八年士燮十一年卻犫十八年士匄襄元年荀罃八年士匄十二年士魴二十六年荀呉二十九年士鞅昭二年韓起昭二十一年士鞅宋聘魯四成四年華元八年華元襄十五年向戌昭十二年華定衛聘魯四文四年寗俞成三年孫良夫襄元年公孫剽襄七年孫林父陳鄭秦呉聘魯各一莊二十五年陳女叔文十二年秦術襄五年鄭公子發襄二十九年呉札楚聘魯三莊二十三年荆人文九年椒襄三十年薳罷盟一百有九凡盟㑹侵伐内為主書及外為主書㑹所以别首從而謹善惡之首也始隠元年蔑終哀二年句繹特盟參盟同盟始終石門于鹹特盟之始終也瓦屋鄟陵參盟之始終也于幽平丘同盟之始終也同盟十有六齊盟二皆同尊周也晉盟十有四皆同外楚也兩幽齊桓新城晉靈清丘斷道虫牢馬陵于蒲晉景于戚柯陵晉厲虚朾雞澤于戲亳城北晉悼重丘晉平平丘晉昭殊盟二僖五年首止僖九年葵丘涖盟四僖三年公子友如齊文七年公孫敖如莒昭七年叔孫婼如齊定十一年叔還如鄭來盟五桓十四年鄭弟語閔二年齊髙子僖四年楚屈完文十五年宋司馬華孫宣七年衛孫良夫外大夫聘而遂盟五成三年荀庚良夫十一年卻犫襄七年林父十五年向戌㑹九十七始隠二年潛終哀十三年黃池殊㑹四僖五年首止成十五年鍾離襄十年于柤襄十四年于向遇七志内之遇者四而皆書及若曰以此及彼然也志外之遇者三而皆以爵若曰以尊及卑然也隠四年遇清莊二十三年遇穀三十年遇魯濟僖十四年遇防隠八年宋衛遇垂莊四年齊陳鄭遇垂三十二年宋齊遇梁丘平五如宣四年平莒及郯為六隠六年鄭來輸平宣十五年宋及楚平昭七年暨齊平定十年及齊平定十一年及鄭平來七隠元年祭伯來桓六年實來八年祭公來閔元年齊仲孫來僖二十九年兩介葛盧來襄十八年白狄來人自為盟三桓十一年惡曹中國未有伯而人自為盟僖二十一年鹿上中國始無伯而人自為盟宣十二年清丘中國又將無伯而人自為盟侵六十潛師掠境曰侵始莊十年公侵宋終哀十三年晉魏曼多侵衛伐二百十有三聲罪致討曰伐始隠二年鄭人伐衛終哀十三年楚公子申伐陳戰二十三兩兵相接曰戰書敗績者十五又内兵書敗曰戰若僖公戰于井陘我師敗績獲公冑懸諸魚門諱不書敗唯莊公乾時之敗以與讐戰雖敗不諱始桓十年來戰于郎終哀十一年戰于艾陵圍四十四繯其城邑曰圍始隠五年宋圍長葛終哀七年宋人圍曹入二十七造其國都曰入始隠二年莒人入向終哀十三年於越入呉遷十徙其朝市曰遷始莊元年齊師遷紀郱鄑郚終哀二年蔡遷州來滅三十毁其宗廟社稷曰滅内兵書滅曰取若取鄟取邿取鄫是也唯僖公滅項乃公在㑹而季孫滅之故不諱始莊十年齊師滅譚終定十五年楚子滅胡敗師十有六詭道而勝之曰敗始隠十年公敗宋師于菅終定十四年於越敗呉于檇李取師三悉虜而俘之曰取隠十年伐戴取之哀九年雍丘十三年于嵒取國邑十有六胡氏曰取者收奪之名趙子曰凡力得之曰取始隠四年取牟婁終哀八年取讙及闡襲一輕行而掩之曰襲襄二十三年齊侯襲莒追二巳去而躡之曰追莊十八年公追戎于濟西僖二十六年公追齊至酅弗及戌三聚兵而守之曰戌僖二十八年公子買戌衛襄五年戌陳十年戌鄭虎牢以一國而用諸侯之師三以弱假強而能左右之曰以桓十四年宋以四國伐鄭僖二十六年魯以楚師伐齊定四年蔡以呉子伐楚城二十有九城者完舊也内城二十三不時害義固為罪矣雖時且義亦書見勞民為重事也齊伯外城三邢也楚丘也縁陵也獨城邢為美晉伯外城三虎牢也杞也成周也獨成周無譏始隠七年城中丘終哀六年城邾瑕築八築者創始也莊元年築王姬之館二十八年築郿三十一年三築臺成十八年築鹿囿昭九年築郎囿定十三年築蛇淵囿執三十有一齊執者五晉執者十五宋執者三邾執者一楚執者七始桓十一年宋人執鄭祭仲終哀四年晉執戎蠻子赤歸于楚獲六凡君戰而死者曰滅生禽曰獲大夫生死皆曰獲僖元年于酈獲莒拏十五年于韓獲晉侯宣二年大棘獲宋華元襄八年鄭侵蔡公子燮昭二十三年雞父獲陳夏齧哀十一年艾陵獲齊國書降二降者脅服之詞莊八年郕降于齊師莊三十年齊人降鄣潰四民逃其上曰潰僖四年侵蔡蔡潰文三年伐沈沈潰成九年伐莒莒潰昭二十九年鄆潰講武二桓公有所畏而大閲非其時莊公有所俟而治兵非其地桓六年大閱簡車馬也莊八年治兵習戰也申明軍法以整齊之也蒐五中春教振旅遂以蒐謂蒐索擇取不孕者大云者僭天子之制也昭八年蒐于紅十一年大蒐比蒲二十二年大蒐昌間定十三年大蒐比蒲十四年大蒐比蒲狩四中冬教大閲遂以狩謂守取之無所擇也桓四年于郎莊四年于禚僖二十八年河陽哀十四年獲麟乞師五乞者卑遜自屈之辭又曰乞不保得之辭僖二十六年公子遂如楚成十三年晉郤錡來十六年晉欒黶來十七年晉荀罃來十六年晉士魴來次師十有三齊次者四魯次者四齊衛次者三晉楚次者各一伐而書次其次為善伐楚次陘是也救而書次其次為貶聶北救邢是也又曰莊十年次于郎見齊伯之難文十年次厥貉見楚伯之難襄元年次于鄫見晉復伯之難矣始莊三年公次于滑終定十五年齊衛次于渠蒢制楚得失七召陵以義勝城濮以威勝鄢陵以幸勝蕭魚以善勝于泓以不度徳不量力而敗于邲以將不用命而敗召陵以求貨弗得而還救二十三救在王室則罪諸侯子突救衛是也救在逺國則罪四鄰晉陽處父救江是也救在夷狄則罪中國楚貞救鄭狄救齊呉救陳是也始莊六年子突救衛終哀十年呉救陳獻捷二獻者下奉上之詞軍獲曰捷莊三十一年齊侯來獻戎捷僖二十一年楚宜申來獻捷雩二十有一旱祭也諸便雩于境内之山川蓋以山川百源能興雲雨故也書秋者七書八月者四書七月者二書九月者七書冬者一郊九龜違者四牛災者四非時大不敬者一盖郊所以祭天魯諸侯而用天子之祭僭也僖三十一年四月卜郊宣三年正月牛傷乃不郊成七年正月牛傷不郊十年四月五卜郊十七年九月辛丑用郊襄七年四月三卜郊十一年四月四卜郊定十五年正月牛傷五月辛亥郊哀元年正月牛傷四月辛已郊望三望祭也望于山川僖三十一年宣三年成七年烝嘗三冬曰烝衆也謂萬事畢成所薦衆多也秋曰甞以物成而薦新為義桓八年春正月已夘烝夏五月丁丑烝十四年乙亥嘗土田十假一取五歸我一歸之于一疆一來歸一災異一百二十二日食三十六星孛三星隕隕石各一不雨七無氷三大雨震電一雨雪三大雨雹三地震五山崩二大水九有年二大旱二饑三無麥苖一大無麥禾一隕霜不殺草李梅實一隕霜殺菽一雨木氷一多麋有􅈮有蜚蝝生各一六鷁退飛一螟三螽十牛傷四牛死二宫室災六震廟一屋壊二齊大災一宋陳衛鄭災一宋陳災各一齊桓衣裳之㑹十有一北杏兩鄄兩幽于檉于貫陽榖首止寗母葵丘齊桓兵車之㑹四于洮于鹹牡丘于淮晉文五書爵侵曹伐衛入曹城濮踐土晉襄退三强僖三十三年敗秦于殽敗狄于箕伐許許貳於楚伐許所以離楚也晉悼五㑹雞澤于戚救陳于鄬邢丘晉悼三駕襄十年伐鄭十一年伐鄭同年伐鄭晉平七合諸侯溴梁祝何澶淵商任沙隨兩夷儀晉平五合諸侯澶淵于宋城杞澶淵于虢春秋五始元者氣之始春者四時之始王者受命之始正月者政教之始即位者一國之始孔子相魯定十年㑹于夾谷齊人來歸鄆讙龜隂田十二年叔孫墮郈季孫仲孫墮費十四年石尚來歸脤子路用魯定十二年墮郈墮費子貢用魯定十五年邾子來朝哀七年公㑹呉于鄫十二年公㑹呉于槖皋公㑹衛宋于鄓冉求用魯哀十一年齊國書伐我王人三莊六年子突救衛僖八年于洮僖二十九年翟泉命大夫三魯單伯鄭祭仲陳女叔魯三家所始即三桓也僖元年公子友敗莒于酈是役公賜季友汶陽之田及費而季孫氏始四年公孫兹侵陳叔孫氏始十五年公孫敖救徐孟孫氏始
