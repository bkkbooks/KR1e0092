body:
  text: 左傳杜林合注卷二十八明王道焜趙如源同編襄公四經癸卯十有五年春宋公使向戌來聘二月己亥及向戌盟于劉劉夏逆王后于齊劉采地夏名也天子卿書字劉夏非卿故書名天子無外所命則成故不言逆女夏齊侯伐我北鄙圍成公救成至遇無傳遇魯地書至遇公畏齊不敢至成季孫宿叔孫豹帥師城成郛傳齊故夏城非例所譏秋八月丁巳日有食之杜無傳八月無丁巳丁巳七月一日也日月必有誤邾人伐我南鄙冬十有一月癸亥晉侯周卒凡四同盟悼公卒子平公彪立傳十五年春宋向戌來聘且尋盟報二年豹之聘尋十一年亳之盟見孟獻子尤其室尤責過也曰子有令聞而美其室非所望也對曰我在晉吾兄為之毁之重勞且不敢間傳言獻子友于兄且不隱其實聞音問重直用反間間厠之間官師從單靖公逆王后于齊卿不行非禮也杜官師劉夏也天子官師非卿也劉夏獨過魯告昏故不書單靖公天子不親昏使上卿逆而公監之故曰卿不行非禮楚公子午為令尹林公子午即子庚杜代子囊公子罷戎為右尹蒍子馮為大司馬杜子馮叔敖從子罷音皮蒍于委反馮皮氷反公子橐師為右司馬公子成為左司馬屈到為莫敖杜屈到屈蕩子槖音託成音城屈居勿反公子追舒為針尹杜追舒莊王子子南針之林反屈蕩為連尹養由基為宫廄尹以靖國人君子謂楚於是乎能官人官人國之急也能官人則民無覦心杜無覬覦以求幸廄徐音救覦羊朱反覦音喻詩云嗟我懷人置彼周行能官人也杜詩周南也置置也行列也周遍也詩則人嗟歎言我思得賢人置之遍於列位是后妃之志以官人為急置之豉反行户郎反下同王及公侯伯子男甸采衛大夫各居其列所謂周行也杜言自王以下諸侯大夫各任其職則是詩人周行之志也甸采衛五服之名也天子所居千里日圻其外曰侯服次曰向服次曰男服次曰采服次曰衛服五百里為一服不言侯男略舉也鄭尉氏司氏之亂其餘盜在宋亂在十年鄭人以子西伯有子産之故納賂于宋林鄭人以三子之父皆為尉氏所殺故納賂于宋以請餘盜以馬四十乘百六十匹乘繩證反下同與師筏師慧樂師也筏慧其名筏扶廢反徐音伐三月公孫黑為質焉公孫黑子晢質音致司城子罕以堵女父尉翩司齊與之良司臣而逸之林以司臣為賢而放之女音汝託諸季武子武子置諸卞言子罕以司臣托季氏卞皮彥反鄭人醢之三人也杜三人堵女父尉翩司齊林别言三人以見司臣獨存師慧過宋朝將私焉私小便其相曰朝也相師者相息亮反下同慧曰無人焉林言無人焉可以便旋相曰朝也何故無人慧曰必無人焉若猶有人豈其以千乘之相易淫樂之矇必無人焉故也杜千乘相謂子産等也言不為子産殺三盜得賂而歸之是重淫樂而輕相國易以豉反輕也矇音蒙子罕聞之固請而歸之言子罕能改過夏齊侯圍成二於晉故也杜不畏霸王故敢伐魯於是乎城成郛林郛郭也於是魯城成郛以備齊秋邾人伐我南鄙亦二於晉故使告于晉晉將為會以討邾莒杜十二年十四年莒人伐魯未之討也晉侯有疾乃止冬晉公卒遂不克會為明年會溴梁傳鄭公孫夏如晉奔喪子蟜送葬杜夏子西也言諸侯畏晉故卿共葬宋人或得玉獻諸子罕子罕弗受獻玉者曰以示玉人杜玉人能治玉者玉人以為寶也故敢獻之子罕曰我以不貪為寶爾以玉為寶若以與我皆喪寶也不若人有其寶稽首而告曰小人懷璧不可以越鄉言必為盜所害喪息浪反納此以請死也杜請免死子罕置諸其里使玉人為之攻之杜攻治也富而後使復其所林賣玉得富而後使或人歸於其所居十二月鄭人奪堵狗之妻而歸諸范氏林堵狗者女父之族狗娶於晉范氏鄭人既誅女父畏狗因范氏而作亂故奪其妻歸范氏先絶之傳言鄭之有謀堵音者狗或作苟經甲辰十有六年春王正月葬晉悼公踰月而葬速也三月公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于溴梁杜不書髙厚逃歸故也溴水出河內軹縣東南至溫入河溴古閴反徐公壁反戊寅大夫盟杜諸大夫本欲盟髙厚髙厚逃歸故遂自共盟雞澤會重序諸侯今此間無異事即上諸侯大夫可知林凡伯在焉而但曰諸侯者無伯也君在焉而但曰大夫者無君也是故自文而下盟于扈會于扈則有斥言諸侯而不序自襄而下溴梁之盟則有斥言大夫而不序晉人執莒子邾子以歸杜邾莒二國數侵魯又無道於其民故稱人以執而以歸京師非禮也執以歸始此齊人伐我北鄙無傳齊二晉故夏公至自會無傳五月甲子地震無傳叔老會鄭伯晉荀偃衛寧殖宋人伐許杜荀偃主兵當序鄭上方示叔老可以會鄭伯故荀偃在下林鄭非主兵也則曷為書鄭伯春秋不以大夫主諸侯則推而屬之鄭也春秋之大義夷夏之主君臣之分而已是故僖十九年盟于齊陳非主盟也不以夷狄主中國則書會陳今年伐許鄭非主兵也不以大夫主諸侯則書會鄭秋齊侯伐我北鄙圍郕郕音成大雩無傳書過冬叔孫豹如晉傳十六年春葬晉悼公平公即位平公悼公子彪羊舌肸為傅肸叔向也代士渥濁肸許吉反張君臣為中軍司馬張老子代其父祁奚韓襄欒盈士鞅為公族大夫祁奚去中軍尉為公族大夫去劇職就間官韓襄無忌子也虞丘書為乘馬御代程鄭乘繩證反改服修官蒸于曲沃既葬改喪服修官選賢能曲沃晉祖廟蒸冬祭也諸侯五月而葬既葬卒哭作主然後蒸祭於廟今晉踰月葬作主而蒸祭傳言晉將有溴梁之會故速葬警守而下會于溴梁林警戒晉國守備順河東行故曰下警居領反守手又反命歸侵田杜諸侯相攻取之田以我故執邾宣公莒犂比公犂比莒子號也十二年十四年莒人侵魯前年邾人伐魯晉將為魯討之悼公卒不克會故平公終其事犂徐力私反又力兮反比音毗且曰通齊楚之使杜邾莒在齊楚往來道中故并以此責之經書執在大夫盟下既盟而後告使所吏反晉侯與諸侯宴于溫使諸大夫舞林使諸侯之大夫起舞以助歡宴曰歌詩必類歌古詩當使各從義類齊髙厚之詩不類齊有二心故荀偃怒且曰諸侯有異志矣使諸大夫盟髙厚髙厚逃歸齊為大國髙厚若此知小國必當有從者於是叔孫豹晉荀偃宋向戌衛寧殖鄭公孫蠆小邾之大失盟曰同討不庭杜自曹以下大夫不書故傳舉小邾以包之林凡諸侯朝聘皆成禮於庭中故欲同討不來庭服者向舒亮反戌音恤蠆勑邁反許男請遷于晉杜許欲叛楚諸侯遂遷許許大夫不可晉人歸諸侯唯以其師討許之不肯遷鄭子蟜聞將伐許遂相鄭伯以從諸侯之師杜鄭與許有宿怨故其君親行蟜居表反相息亮反穆叔從公杜從公歸從才用反又如字齊子帥師會晉荀偃林齊子即叔老書曰會鄭伯為夷故也杜夷平也春秋於魯事所記不與外事同者客主之言所以為文固當異也魯卿每會公侯春秋無譏故於此示例不先書主兵之荀偃而書後至之鄭伯時皆諸侯大夫義取皆平故得會鄭伯林杜氏謂不先書主兵之荀偃而書後至鄭伯義取皆平故得會鄭伯然於義無取當以經注止齊之説為正夏六月次于棫林庚寅伐許次于函氏杜棫林函氏皆許地棫為逼反徐于目反函音咸晉荀偃欒黶帥師伐楚以報宋揚梁之役晉師獨進揚梁役在十二年黶於斬反楚公子格帥師及晉師戰于湛阪杜襄城昆陽縣北有湛水東入汝湛市林反又直斬反阪音反徐扶板反楚師敗績晉師遂侵方城之外杜不書不告復伐許而還許未遷故復扶又反秋齊侯圍成成魯孟氏邑二晉故伐魯孟孺子速徼之杜孟獻子之子莊子速也徼要也徼古堯反齊侯曰是好勇去之以為之名林齊靈公言孟莊子好勇以師去之不與之戰以成其名好呼報反速遂塞海陘而還杜海陘魯隘道陘音刑徐古定及冬穆叔如晉聘且言齊故言齊再伐魯晉人曰以寡君之未禘祀禘祀三年喪畢之吉祭禘大計反與民之未息新伐許及楚不然不敢忘穆叔曰以齊人之朝夕釋憾於敝邑之地是以大請林是以大有請於晉國朝夕如字下同憾户暗反敝邑之急朝不及夕引領西望曰庶幾乎庶幾晉來救比執事之間恐無及也林若欲待晉國間暇之時恐魯已亡無及於事比必利反間音間見中行獻子賦圻父杜圻父詩小雅周司馬掌封畿之兵甲故謂之圻父詩人責圻父為王爪牙不修其職使百姓受困苦之憂而無所止居行户郎反圻其依反父音甫獻子曰偃知罪矣敢不從執事以同恤社稷而使魯及此林及此無所止居之禍見范宣子賦鴻雁之卒章杜鴻鴈詩小雅卒章曰鴻鴈于飛哀鳴嗸嗸唯此哲人謂我劬勞言魯憂困嗸嗸然若鴻鴈之失所大曰鴻小曰鴈宣子曰丐在此敢使魯無鳩乎林鳩集也豈敢使魯無所鳩集如鴻雁卒章所云乎丐古害反鳩居牛反經乙巳十有七年春王二月庚午邾子牼卒杜無傳宣公也四同盟宣公卒悼公華立牼苦耕反徐戶耕反宋人伐陳夏衛石買帥師伐曹買石稷子秋齊侯伐我北鄙圍桃魯辨縣東南有桃虛髙厚帥師伐我北鄙圍防林伐我大夫將書大夫始此自隱以來齊伐我皆書人若君將書君自文十五年始大夫將書大夫自髙厚始九月大雩無傳書過宋華臣出奔陳杜暴亂宗室懼而出奔竇以冬出書秋者以始作亂時來告華戶化反冬邾人伐我南鄙傳十七年春宋莊朝伐陳獲司徒卬卑宋也杜司徒卬陳大夫卑宋不設備朝如字凡人名字皆放此卬五郎反衛孫蒯田于曹隧杜越境而獵孫蒯林父之子蒯苦怪反隧音遂飲馬于重丘重丘曹邑飲於鴆反重直龍反毁其瓶林或以瓶為飲器但於飲馬義類不相干未知是否重丘人閉門而詬之詬罵也詬呼豆反曰親逐而君爾父為厲杜厲惡鬼林父逐君在十四年前而汝也言孫蒯之父親逐汝君死當為厲鬼是之不憂而何以田為夏衛石買孫蒯伐曹取重丘杜孫蒯不書非卿曹人訴于晉為明年晉人執石買傳訴悉路反齊人以其未得志于我故前年圍成辟孟孺子秋齊侯伐我北鄙圍桃髙厚圍臧紇于防防臧紇邑紇恨發反師自陽關逆臧孫至于旅松林魯師自陽關往逆臧紇杜陽關在泰山巨平縣東旅松近防地也魯師畏齊不敢至防郰叔紇臧疇臧賈帥甲三百宵犯齊師送之而復杜郰叔紇叔梁紇臧疇臧賈臧紇之昆弟也三子與臧紇共在防故夜送臧紇於旅松而復還守防郰側留反齊師去之杜失臧紇故齊人獲臧堅堅臧紇之族齊侯使夙沙衛唁之且曰無死使無自殺言音彥堅稽首曰拜命之辱抑君賜不終姑又使其刑臣禮於士以杙抉其傷而死杜言使賤人來唁已是惠賜不終也夙沙衛奄人故謂之刑臣林杙小木也椽屬臧堅義不受辱乃以杙自抉其所傷而死木杙羊職反扶烏穴反徐古穴反冬邾人伐我南鄙為齊故也齊未得志於魯故邾助之為于偽反宋華閲卒華臣弱臯比之室杜臣閲之弟臯比閲之子弱侵易之也比音毗使賊殺其宰華吳賊六人以鈹殺諸盧門合左師之後杜盧門宋城門合向戌邑後屋後林鈹刀劍屬鈹普皮反左師懼曰老夫無罪賊曰臯比私有討於吳遂幽其妻林向戌見賊而懼言已無罪賊謬言臯比私有討於華吳遂幽閉華吳之妻曰畀余而大璧林畀與也而汝也言與我以汝大璧玉宋公聞之曰臣也不唯其宗室是暴大亂宋國之政林華臣與華閲為兄弟故言不惟侵暴其宗室使賊私殺華吳是大亂宋國之政刑必逐之左師曰臣也亦卿也大臣不順國之恥也不如蓋之林言華臣亦宋之卿也國有大臣不相從順此國家之恥辱不如掩蓋其罪勿問乃舍之左師為已短䇿苟過華臣之門必騁林策馬捶也向戌悔其初謀之失乃自為短馬捶助御鞭馬惡華臣不欲俱相見故過其門必馳聘而去騁敕領反十一月甲午國人逐瘈狗瘈狗入於華臣氏國人從之華臣懼遂奔陳林瘈狗征狗也杜華臣心不自安見逐狗而驚走瘈徐居世反一音制宋皇國父為大宰為平公築臺妨於農收杜周十一月今九月收斂時大音泰為于偽反妨音房子罕請俟農功之畢公弗許築者謳曰澤門之晳實興我役澤門宋東城南門也皇國父白晳而居近澤門謳烏侯反晳星厯反徐思益反邑中之黔實慰我心子罕黑色而居邑中黔徐音琴又其廉反子罕聞之親執撲杜撲杖撲普卜反以行築者而抶其不勉者曰吾儕小人皆有闔廬以辟燥濕寒暑杜抶決罰也林闔謂門戶閉塞行下孟反抶恥乙反闔戶臘反廬力居反今君為一臺而不速成何以為役杜役事也謳者乃止林謳者本為子罕有緩役之請今見其督役遂疑其過言乃止不謳或問其故子罕曰宋國區區而有詛有祝禍之本也林言以區區不足道之宋國而有詛興役者有祝緩役者詛祝不同則喜惡不同此禍亂之本也傳善子罕分謗區丘于反詛茌慮反祝之又反齊晏桓子卒杜晏嬰父也晏嬰粗縗斬杜斬不絶之也縗在胸前粗三升布縗七雷反苴絰帶杖菅屨苴麻之有子者取其粗也杖竹杖菅屨草屨苴七徐反絰直結反以苴麻為絰及帶杖禮記云苴杖竹也菅古顔反屨九具反食鬻居倚廬寢苫枕草此禮與士喪禮略同其異惟枕草耳然枕苫亦非喪服正文鬻之六反謂朝一溢米暮一溢米倚於綺反廬倚東牆而為之故曰倚廬苦傷廉反編草也枕之鴆反王儉云夏枕苫冬枕草其老曰非大夫之禮也時之所行士及大夫縗服各有不同晏子為大夫而行士禮其家臣不解故譏之曰唯卿為大夫杜晏子惡直已以斥時失禮故孫辭略答家老林諸侯之制降於天子一等故惟卿然後得用大夫之禮晏子自言已乃大夫也視士故不當用大夫之禮經丙午十有八年春白狄來不言朝不能行朝禮夏晉人執衛行人石買石買即是伐曹者宜即懲治本罪而晉因其為行人之使執之故書行人以罪晉秋齊師伐我北鄙不書齊侯齊侯不入竟冬十月公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同盟齊杜齊數行不義諸侯同心俱圍之林同圍齊非但晉志也自圍齊之後晉師無君將雖大夫之師出無與於諸夏之義矣曹伯負芻卒于師無傳禮當與許男同三同盟芻初俱反楚公子午帥師伐鄭傳十八年春白狄始來白狄狄之别名未嘗與魯接故曰始夏晉侯執衛行人石買于長子執孫蒯于純留杜長子純留二縣今皆屬上黨郡孫蒯不書父在位蒯非卿長丁丈反或如字純徒溫反或如字地理志作屯為曹故也杜前年衛伐曹為于為反秋齊侯伐我北鄙中行獻子將伐齊夢與厲公訟弗勝厲公獻子所弒者公以戈擊之首隊於前跪而戴之奉之以走見梗陽之巫臯杜梗陽晉邑在太原晉陽縣南臯巫名也夢并見之隊直位反跪其委反奉芳勇反梗古杏反他日見諸道與之言同巫亦夢見獻子與厲公訟巫曰今兹主必死若有事於東方則可以逞林主大夫之稱齊居東方有事謂伐齊也巫知獻子有死徵故勸使決意伐齊獻子許諾晉侯伐齊將濟河獻子以朱絲係玉二玨雙玉曰瑴玨古學反而禱曰齊環怙恃其險負其衆庶杜環齊靈公名負依也估音户棄好背盟陵虐神主杜神主民也謂數伐魯殘民人好呼報反背音佩曽臣彪將率諸侯以討焉杜彪晉平公名稱臣者明上有天子以謙告神曾臣猶未臣其官臣偃實先後之杜守官之臣偃獻子名先悉薦反後户豆反苟捷有功無作神羞杜羞恥也官臣偃無敢復濟偃信巫前故以死自誓唯爾有神裁之沈玉而濟林沈玉於河以質信於神而後濟沈音鴆或如字冬十月會于魯濟尋溴梁之言同伐齊溴梁在十六年盟曰同討不庭濟子禮反齊侯禦諸平陰塹防門而守之廣里杜平陰城在濟北廬縣東北其城南有防防有門於門外作塹橫行廣一里故經書圍塹七艷反廣古曠反夙沙衛曰不能戰莫如守險謂防門不足為險弗聽諸侯之士門焉齊人多死范宣子告析文子析文子齊大夫子家曰吾知子敢匿情乎林言我與子相知不敢隱匿其情實匿女力反魯人莒人皆請以車千乘自其鄉八林千乘十萬五千人魯莒在齊之東言自其鄉八蓋自東道以八齊乘繩證反既許之矣林晉既許魯莒之請若入君必失國子盍圖之子家以告公公恐晏嬰聞之曰君固無勇而又聞是弗能久矣不能久敵晉齊侯登巫山以望晉師林巫山正盧縣東北晉人使司馬斥山澤之險雖所不至必斾而疏陳之杜斥候也疏建旌旗以為陳示衆也斥音尺又昌夜反斾步蓋反陳直覲反使乘車者左實右偽以斾先杜偽以衣服為人形也建斾以先驅輿曳柴而從之杜輿衆也衆曳柴從車後而揚塵齊侯見之畏其衆也乃脫歸脫不張旗幟脫勑活反又他外反丙寅晦齊師夜遁師曠告晉侯曰鳥烏之聲樂齊師其遁杜鳥烏得空營故樂也遁徒固反樂音洛邢伯告中行伯杜邢伯晉大夫邢侯也中行伯獻子曰有班馬之聲林班别也夜遁馬不相見故作離别聲齊師其遁叔向告晉侯曰城上有烏齊師其遁林兵衆守城烏不敢止今齊城上有烏齊師其必遁走十一月丁卯朔入平陰遂從齊師夙沙衛連大車以塞隧而殿林以大車連相塞隧道而殿軍後此衛所欲守險殿都練反下同殖綽郭最曰子殿國師齊之辱也林殖綽郭最齊之勇士杜奄人殿師故以為辱最徐子會反子姑先乎乃代之殿衛殺馬於隘以塞道杜恨二子故塞其道欲使晉得之隘於懈反晉州綽及之射殖綽中肩兩矢夾脰脰頸也射食亦反中下仲反夾古洽反或古協反脰音豆曰止將為三軍獲林生為三軍俘獲不止將取其衷杜不止復欲射兩矢中央衷音忠顧曰為私誓州綽曰有如日杜言必不殺女明如日乃弛弓而自後縛之杜反縛之弛式氏反本又作施音同其右具丙杜州綽之右亦舍兵林右主擊刺故舍兵舍音捨而縛郭最皆襟甲面縛林皆不解甲反縛惟露其面襟其鴆反坐于中軍之鼓下晉人欲逐歸者魯衛請攻險杜險固城守者己卯荀偃士丐以中軍克京兹杜在平陰城東南乙酉魏絳欒盈以下軍克邿欒黶死其子盈佐下軍平陰西有邿山邿音詩趙武韓起以上軍圍盧林盧齊邑弗克十二月戊戌及秦周伐雍門之萩秦周魯大夫趙武及之其伐萩也雍門齊城門雍於用反萩音秋范鞅門于雍門其御追喜以戈殺犬于門中杜殺犬示間暇孟莊子斬其橁以為公琴杜莊子孺子速也橁木名橁勑倫反又相倫反己亥焚雍門及西郭南郭劉難士弱率諸侯之師焚申池之竹木林二子晉大夫申池齊南城西門齊城無池惟北門有池文十八年殺懿公納諸竹中其地多竹木難乃多反又如字壬寅焚東郭北郭范鞅門于揚門齊西門州綽門于東閭齊東門左驂迫還于東門中以枚數闔林州綽之左驂追還于齊東門之中杜枚馬檛也闔門扇也數其板示不恐驂七南反還音旋一音患數所主反闔户臘反齊侯駕將走郵棠郵棠齊邑郵音尤太子與郭榮扣馬杜太子光也榮齊大夫扣音口曰師速而疾略也言欲略行其地無久攻意將退矣君何懼焉且社稷之主不可以輕輕則失衆君必待之將犯之大子抽劒斷鞅乃止林齊侯將犯之而行太子恐齊侯不止乃抽劒斷乘馬之鞅齊侯乃止不奔在馬腹曰鞅輕遣政反斷音短甲辰東侵及濰南及沂杜濰水在東莞東北至北海都昌縣入海沂水出東莞蓋縣至下邳入泗濰本又作維音同沂魚依反鄭子孔欲去諸大夫林子孔即公子嘉杜欲専權將叛晉而起楚師以去之林知晉不輿已故將叛晉而起楚師伐鄭藉楚力以去之使告子庚子庚弗許杜子庚楚令尹公子午楚子聞之使揚豚尹宜林揚豚邑大夫名宜豚徒門反告子庚曰國人謂不穀主社稷而不出師死不從禮杜不能承先君之業死不得從先君之隆禮不穀即位於今五年林即位在十四年師徒不出人其以不榖為自逸而忘先君之業矣杜謂己未嘗統師自出大夫圖之其若之何子庚歎曰君王其謂午懷安乎吾以利社稷也杜言君王其謂我懷土而安逸乎所以不許鄭人之請者正以休息楚國而利社稷也見使者稽首而對曰諸侯方睦於晉臣請嘗之杜嘗試其難易也使所吏反若可君而繼之不可收師而退可以無害君亦無辱杜若鄭可攻楚君則以師繼其後若不可攻臣請收兵而歸可以不為楚之患害楚君亦不至親出以受恥辱子庚帥師治兵於汾杜襄城縣東北有汾丘城汾扶云反於是子蟜伯有子張從鄭伯伐齊杜子張公孫黑肱子孔子展子西守二子知子孔之謀二子子展子西守手又反下同完守入保完城郭內保守子孔不敢會楚師林子孔見二子有備故不敢出會楚師楚師伐鄭次於魚陵杜魚陵魚齒山也在南陽犨縣北鄭地右師城上棘遂涉潁次于旃然杜將涉潁故於水邊權築小城以為進退之備旃然水出滎陽成臯縣束入汴旃之然反蒍子馮公子格率鋭師侵費滑胥靡獻于雍梁杜胥靡獻于雍梁皆鄭邑河南陽翟縣東北有雍氏城蒍本又作薳干委反馮皮氷反費扶味反滑了八反雍於用反右回梅山林楚師右回鄭之梅山杜在滎陽密縣東北回如字徐胡猥反侵鄭東北至于蟲牢而反子庚門于純門信于城下而還信再宿也純如字又市荀反涉於魚齒之下魚齒山之下有滍水故言涉甚雨及之林甚雨及於楚師楚師多凍役徒幾盡晉人聞有楚師師矌曰不害吾驟歌北風又歌南風南風不競杜歌者吹律以詠八風南風音微故曰不競也師矌唯歌南北風者聽晉楚之強弱凍丁弄反幾音祈多死聲林南風之中又多肅殺之聲楚必無功董叔曰林晉大夫天道多在西北歲在豕韋月又建亥故曰多在西北南師不時必無功不時謂觸歲月叔向曰在其君之德也言夫時地利不如人和經丁未十有九年春王正月諸侯盟于祝柯前年圍齊之諸侯也祝柯縣今屬濟南郡柯古多反晉人執邾子稱人以執惡及民也公至自伐齊無傳取邾田自漷水杜取邾田以漷水為界也漷水出東海合鄉縣西南經魯國至髙平湖陸縣入泗漷好虢反徐音郭又虎伯反字林口郭口獲二反季孫宿如晉葬曹成公無傳夏衛孫林父帥師伐齊秋七月辛卯齊侯環卒杜世子光三與魯同盟林靈公卒子莊公光立晉士丐帥師侵齊至穀聞齊侯卒乃還詳録所至及還者善得禮八月丙辰仲孫蔑卒無傳齊殺其大夫髙厚鄭殺其大夫公子嘉冬葬齊靈公無傳城西郛魯西郭郛若夫反叔孫豹會晉士丐于柯杜魏郡內黃縣東北有柯城城武城杜泰山南武城縣傳十九年春諸侯還自沂上盟于督揚曰大毋侵小督揚即祝柯也毋音旡執邾悼公以其伐我故伐魯在十七年遂次于泗上疆我田杜正邾魯之界也泗水名疆居良反取邾田自漷水歸之于我邾田在漷水北今更以漷為界故曰取邾田晉侯先歸公享晉六卿于蒲圃杜六卿過魯賜之三命之服軍尉司馬司空輿尉候奄皆受一命之服杜如鞍戰還之賜唯無先輅賄荀偃束錦加璧乘馬先吳壽夢之鼎荀偃中軍元帥故特賄之五匹為束四馬為乘壽夢吳子乘也獻鼎於魯因以為名古之獻物必有以先今以璧馬為鼎之先乘繩證反先悉薦反又如字夢莫公反荀偃疸疽生瘍於頭杜疸疽惡創林瘍疸屬在頭曰瘍荀偃既患惡創又生瘍於頭疸丁但反徐音旦疽七徐反瘍音羊濟河及著雍病目出林因病痛而目睛努出著張慮反雍於用反大夫先歸者皆反士丐請見弗內請後曰鄭甥可杜士丐中軍佐故問後也鄭甥荀吳其母鄭女見賢遍反二月甲寅卒而視不可含杜目開口噤視如字徐市至反含户暗反下同宣子盥而撫之曰事吳敢不如事主猶視杜大夫稱主林言不合其心目猶開視盥音管欒懷子曰其為未卒事於齊故也乎杜懷子欒盈為于偽反乃復撫之曰主苟終所不嗣事於齊者有如河乃瞑受含杜嗣續也瞑亡丁反又亡千反桓談以為荀偃病而目出初死其目未合尸冷乃合非其有所知也傳因其異而記之耳宣子出曰吾淺之為丈夫也自愧以私待人晉欒魴帥師從衛孫文子伐齊為懷子之言故也欒魴欒氏族不書兵并林父不别告也經書夏從告季武子如晉拜師杜謝討齊晉侯享之范宣子為政代荀偃將中軍賦黍苗杜黍苗詩小雅美召伯勞來諸侯如陰雨之長黍苗也喻晉君憂勞魯國猶召伯季武子興再拜稽首曰小國之仰大國也如百穀之仰膏雨焉若常膏之其天下輯睦豈唯敝邑賦六月六月尹吉甫佐天子征伐之詩以晉侯比吉甫出征以匡王國仰如字徐五亮反下同膏如字徐古報反輯音集季武子以所得於齊之兵作林鐘而銘魯功焉林鐘律名鑄鐘應林鐘因以為聲名臧武仲謂季孫曰非禮也夫銘天子令德天子銘德不銘功諸侯言時計功杜舉得時動有功則可銘也大夫稱伐銘其功伐之勞今稱伐則下等也計功則借人也林今林鐘銘功若從稱伐之例則三等之中此為最下若欲計其功勞則借晉之力非已功也借如字又積亦反言時則妨民多矣何以為銘且夫大伐小取其所得以作彛器杜彛常也謂鐘鼎為宗廟之常器夫音扶彛以之反銘其功烈以示子孫昭明德而懲無禮也杜昭已之明德而懲戒他人之無禮今將借人之力以救其死若之何銘之小國幸於大國杜以勝大國為幸而昭所獲焉以怒之亡之道也林昭明其所獲之兵器以取怒大國是乃危亡之道為城西郛武城傳齊侯娶于魯曰顏懿姬無子其姪鬷聲姬生光以為太子杜兄子曰姪顏鬷皆二姬母姓因以為號懿聲皆諡姪直結反鬷子公反諸子仲子戎子戎子嬖諸子諸妾姓子者二子皆宋女嬖必計反仲子生牙屬諸戎子材仲子以戎子嬖幸故以所生子托之屬之蜀反戎子請以為大子許之齊侯許之仲子曰不可廢常不祥廢立嫡之常間諸侯難林間諸侯之列事難成也間間側之間光之立也列于諸侯矣杜列諸侯之會今無故而廢之是專黜諸侯謂光已有諸侯之尊而以難犯不祥也林又以難成之事而犯不善君必悔之公曰在我而已遂東太子光杜廢而徙之東鄙使髙厚傅牙以為大子夙沙衛為少傅齊侯疾崔杼微逆光疾病而立之光殺戎子林崔杼使徵服迎故大子光靈公疾病而立光以為君光怨戎子廢已故殺之少詩照反杼直吕反尸諸朝非禮也婦人無刑無黥刖之刑雖有刑不在朝市杜謂犯死刑者猶不暴尸夏五月壬辰晦齊靈公卒經書七月辛卯光定位而後起莊公即位大子光也執公子牙於句瀆之丘以夙沙衛易已衛奔髙唐以叛杜光謂衛教公易已髙唐在祝柯縣西北句古侯反瀆音豆晉士丐侵齊及穀聞喪而還禮也杜禮之常不必待君命林禮不伐喪故善其還師於四月丁未於此年四月鄭公孫蠆卒赴於晉大夫范宣子言於晉侯以其善於伐秦也十四年晉伐秦子蟜見諸侯師而勸之濟涇六月晉侯請於王王追賜之大路使以行禮也杜大路天子所賜車之總名以行葬禮傳言大夫有功則賜服路秋八月齊崔杼殺髙厚於灑藍而兼其室林髙厚為公子牙太傅故殺之林灑藍齊地灑色買反徐所綺反藍力甘反書曰齊殺其大夫從君於昏也傳解經不言崔杼殺而為國討文鄭子孔之為政也專杜專權國人患之乃討西宫之難十年尉止等作難西宫子孔知而不言難乃旦反下同與純門之師前年子孔召楚師至純門子孔當罪以其甲及子革子良氏之甲守杜以自守也守手又反下同甲辰子展子西率國人伐之殺子孔而分其室書曰鄭殺其大夫專也亦以國討為文子然子孔宋子之子也子然子華父士子孔圭媯之子也杜宋子圭媯皆鄭穆公妾士子孔子良父媯居危反圭媯之班亞宋子而相親也亞次也士子孔亦相親也林二毋相親故士子孔與子然子孔亦甚相親愛僖之四年子然卒杜鄭僖四年魯襄六年簡之元年士子孔卒杜魯襄八年司徒孔實相子革子良之室杜司徒孔即子孔林司徒孔與二父相親故相助其子相息亮反三室如一杜言同心故及於難杜故二子并及難子革子良出奔楚子革為右尹林子革即鄭舟為楚右尹之官鄭人使子展當國子西聽政立子産為卿林簡公猶幼故大夫當國齊慶封圍髙唐弗克杜夙沙衛以叛故圍之冬十一月齊侯圍之見衛在城上號之乃下杜衛下與齊侯語號徐胡報反召也又戶刀反問守備焉以無備告揖之乃登杜齊侯以衛告誠揖而禮之欲生之也衛志於戰死故不順齊侯之揖而還登城聞師將傅食髙唐人殖綽工僂會夜縋納師杜殖綽工僂會齊大夫因其會食夜縋城納齊師傅音附食音嗣僂力侯反縋直偽反醢衛于軍醢音海城西郛懼齊也杜前年與晉伐齊又鑄其器為鐘故懼齊及晉平盟于大隧大隧地闕隧音遂故穆叔會范宣子于柯齊晉平魯懼齊故為柯會以自固穆叔見叔向賦載馳之四章四章曰控于大邦誰因誰極控引也取其欲引大國以自救助叔向曰肸敢不承命叔向度齊未肯以盟服故許救齊穆叔歸曰齊猶未也不可以不懼林言齊猶未服於晉不可以不知所懼乃城武城衛石共子卒杜石買共音恭悼子不哀杜買之子石惡孔成子曰是謂蹶其本杜蹶猶拔也林孔成子衛大夫言父死不哀是謂拔其本蹶其月反又居衛反必不有其宗為二十八年石惡出奔傳經戊申二十年春王正月辛亥仲孫速會莒人盟于向向莒邑向舒亮反夏六月庚申公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子盟于澶淵杜澶淵在頓丘縣南今名繁汗此衛地又近戚田澶市然反秋公至自會無傳仲孫速帥師伐邾蔡殺其大夫公子燮莊公子蔡公子履出奔楚夑母弟也陳侯之弟黃出奔楚稱弟明無罪也叔老如齊冬十月丙辰朔日有食之無傳季孫宿如宋傳二十年春及莒平孟莊子會莒人盟于向督揚之盟故也杜莒數伐魯前年諸侯盟督揚以和解之故二國自復共盟結其好夏盟于澶淵齊成故也杜齊與晉平邾人驟至以諸侯之事弗能報也林驟數也謂十五年十七年伐魯以魯國前年從諸侯之役不能報伐於邾秋孟莊子伐邾以報之杜既盟而又伐之非蔡公子燮欲以蔡之晉林欲背楚以蔡服事於晉蔡人殺之公子履其母弟也故出奔楚杜與兄同謀故陳慶虎慶寅畏公子黃之逼二慶陳卿恐黃逼奪其政訴諸楚曰與蔡司馬同謀林蔡司馬即公子燮杜同欲之晉楚人以為討杜楚責陳公子黃出奔楚奔楚自理初蔡文侯欲事晉曰先君與於踐土之盟杜先君文侯父莊侯甲午也踐土盟在僖二十八年與音預晉不可棄且兄弟也畏楚不能行而卒林畏逼於楚不能行其言而卒宣十七年文侯卒楚人使蔡無常林徵發無準公子燮求從先君以利蔡不能而死林求從先君從晉之言以為蔡國之利與蔡人不相能而死於禍書曰蔡殺其大夫公子燮言不與民同欲也杜罪其違衆陳侯之弟黃出奔楚言非其罪也稱弟罪陳侯及二慶公子黃將出奔呼於國曰慶氏無道求專陳國暴蔑其君而去其親五年不滅是無天也林言三慶所為無道求專制陳國之權陵暴欺蔑於陳侯而去陳侯兄弟之親若過五年而不滅亡是無天道福善禍淫之理也為二十三年陳殺二慶傳呼好故反去起吕反齊子初聘于齊禮也林齊子即叔老齊魯有怨朝聘禮絶今始復通故曰初繼好息民故曰禮冬季武子如宋報向戌之聘也向戌聘在十五年褚師假逆之以受享杜假共公子子石也逆以入享受享禮褚張吕反賦常棣之七章以卒杜武子賦也七章以卒盡八章取其妻子好合如鼓瑟琴宜爾室家樂爾妻帑言二國好合宜其室家相親如兄弟棣大計反宋人重賄之歸復命公享之賦魚麗之卒章杜魚麗詩小雅卒章曰物其有矣維其時矣喻聘宋得其時麗力馳反公賦南山有臺杜南山有臺詩小雅取其樂只君子邦家之基邦家之光喻武子奉使能為國光輝武子去所曰臣不堪也杜去所避席衛寧惠子疾召悼子杜悼子寧喜曰吾得罪於君悔而無及也名藏在諸侯之䇿曰孫林父寧殖出其君林逐衛獻公在十四年出如字徐音黜君入則掩之杜掩惡名若能掩之則吾子也林若能為我納君掩其惡名則有光其父可以為我之子若不能猶有鬼神吾有餒而已不來食矣杜餒餓也餒奴罪反悼子許諾惠子遂卒為二十六年衛侯歸傳左傳杜林合注卷二十八
