body:
  text: 左傳杜林合注卷十八明王道焜趙如源同編宣公一公名倭一名接又作委文公子母敬嬴諡法善問周達曰宣周匡王五年魯宣公二年匡王崩弟定王立鄭穆公三十年魯宣公三年穆公卒靈公夷立宣四年靈公弒弟襄公堅立齊惠公元年魯宣公十年惠公卒子頃公無野立宋文公三年晉靈公繼霸十三年趙盾為政魯宣公二年靈公弒成公黑臀立宣八年郤缺為政宣九年成公卒子景公孺立宣十一年荀林父為政宣十六年士㑹為政宣十七年郤克為政衛成公二十七年魯宣公九年成公卒子穆公遫立蔡文公四年魯宣公十七年文公卒子景侯固立曹文公十年魯宣公十四年文公卒子宣公廬立陳靈公六年魯宣公十年靈公弒子成公午立杞桓公二十九年薛詳見僖公元年莒季陀元年邾定公六年許昭公十四年魯宣公十七年昭公卒靈公立小邾詳見僖公元年楚莊王六年魯宣公十一年盟辰陵討陳春秋始子楚莊王以霸宣十一年楚孫叔敖為令尹宣十二年敗晉於邲宣十八年莊王卒共王立秦共公元年魯宣公四年共公卒桓公立吳詳見隱公元年及成公元年越詳見隱公元年經癸丑元年春王正月公即位無傳公子遂如齊逆女杜不譏喪娶者不待貶責而自明也卿為君逆例在文四年三月遂以夫人婦姜至自齊稱婦有姑之辭不書氏史闕文夏季孫行父如齊晉放其大夫胥甲父於衛放者受罪黜免宥之以逺公㑹齊侯於平州杜平州齊地在泰山牟縣西公子遂如齊六月齊人取濟西田魯以賂齊齊人不用司徒故曰取秋邾子來朝無傳楚子鄭人侵陳遂侵宋晉趙盾率師救陳杜傳言救陳宋經無宋字蓋闕林侵蔡遂伐楚以見齊霸侵陳遂侵宋以見楚霸盾徒本反宋公陳侯衛侯曹伯㑹晉師於棐林伐鄭杜晉師救陳宋四國君往㑹之共伐鄭也不言㑹趙盾取於兵㑹非好㑹也棐林鄭地榮陽宛陵縣東南有林鄉林此趙盾也大夫而用諸侯之師於是始其曰㑹晉師則不與大夫用諸侯之辭也棐芳尾反冬晉趙穿帥師侵崇林自伐書陽處父入書郤缺侵書趙穿而後凡役書大夫崇本亦作崈晉人宋人伐鄭傳元年春王正月公子遂如齊逆女尊君命也諸侯之卿出入稱名氏所以尊君命也傳於此發者與還文不同故釋之三月遂以夫人婦姜至自齊尊夫人也杜遂不言公子替其尊稱所以成小君之尊也公子當時之寵號非族也故傳不言舍族釋例論之備矣夏季文子如齊納賂以請㑹宣公篡立未列於㑹故以賂請之晉人討不用命者放胥甲父於衛杜胥甲下軍佐文十二年戰河曲不肯薄秦於險林胥甲趙穿當軍門呼今胥甲獨當罪想趙穿以晉君之壻又趙之側室故趙盾庇之而立胥克克甲之子先辛奔齊辛甲之屬大夫㑹於平州以定公位杜篡立者諸侯既與之㑹則不得復討臣之殺之與弒君同故公與齊㑹而位定東門襄仲如齊拜成謝得㑹也六月齊人取濟西之田為立公故以賂齊也杜濟西故曹地僖三十一年晉文以分魯林㑹平州以定公位故言立公季文子納賂請㑹故也為於僞反宋人之弒昭公也在文十六年晉荀林父以諸侯之師伐宋林在文十七年宋及晉平宋文公受盟於晉又㑹諸侯於扈將為魯討齊林齊屢伐魯故將為魯討齊皆取賂而還文十五年十七年二扈之盟皆受賂鄭穆公曰晉不足與也林鄭於是始背晉遂受盟於楚陳共公之卒楚人不禮焉杜卒在文十二年林楚之弔葬不以禮共音恭陳靈公受盟於晉林十四年盟新城十五十七年兩盟扈秋楚子侵陳遂侵宋晉趙盾率師救陳宋㑹於棐林以伐鄭也楚蒍賈救鄭遇於北林杜與晉師相遇榮陽中牟縣西南有林亭在鄭北囚晉解揚晉人乃還解揚晉大夫解音蟹晉欲求成於秦趙穿曰我侵崇秦急崇必救之林言我以師侵秦之與國曰崇者秦以崇為急秦必來救崇秦急崇絶句本或作崇急秦必救之是後人改耳吾以求成焉林我因秦來救而求成於秦冬趙穿侵崇秦弗與成林秦知其計故弗與成晉人伐鄭以報北林之役林報囚解揚於是晉侯侈趙宣子為政驟諫而不入故不競於楚林驟數也數諌靈公而不受故不競强於楚蓋為明年鄭伐宋張本侈昌氏反又尸氏反驟仕救反經甲寅二年春王三月壬子宋華元帥師及鄭公子歸生帥師戰於大棘宋師敗績獲宋華元杜得大夫生死皆曰獲例在昭二十三年大棘在陳留襄邑縣南林大夫書戰於是始於是凡戰書大夫秦師伐晉夏晉人宋人衛人陳人侵鄭杜鄭為楚伐宋獲其大夫晉趙盾興諸侯之師將為宋報恥畏楚而還失霸者之義故貶稱之秋九月乙丑晉趙盾弒其君夷臯杜靈公不君而稱臣以弒者以示良史之法深責執政之臣例在四年林靈公弒成公黑臀立臯古刀反冬十月乙亥天王崩無傳林匡王崩弟定王立傳二年春鄭公子歸生受命於楚伐宋杜受楚命也受命於楚本或作命於楚宋華元樂吕御之二月壬子戰於大棘宋師敗績囚華元獲樂呂杜樂呂司寇獲不書非元帥也獲生死通名經言獲華元故傳特護之曰囚以明其生獲故得見贖而還及甲車四百六十乘林甲車每兵車一乘甲士三人步卒七十二人乘繩證反下同俘二百五十人馘百人狂狡輅鄭人鄭人入於井林俘獲也馘取左耳也狂狡宋大夫輅迎也迎而伐之鄭人入於井而避之俘芳夫反馘古獲反馘百人或作馘百者人衍字狡古卯反輅五嫁反倒㦸而出之獲狂狡林狂狡自倒其㦸以聽鄭人之出因倒㦸反為鄭人所獲倒丁老反君子曰失禮違命宜其為禽也林失行軍之禮違殺敵之命宜為反為人禽獲也宜其為禽一本作宜其禽也戎昭果毅以聽之之謂禮林戎軍制也昭明也軍制昭明於上果敢也毅必行也聽為常存於耳著於心想聞其政令毅魚既反殺敵為果致果為毅易之戮也林敢於殺敵果也必行其果敢以致於敵毅也反易其道如狂狡倒㦸之類受戮之道也將戰華元殺羊食士其御羊斟不與杜食享也華元殺羊為羮以享戰士羊羮闕少故分不及其御羊斟御戎御也食音嗣斟之金反與音預及戰曰疇昔之羊子為政杜疇昔猶前日也林為政猶言為主言有無之權在子今日之事我為政林言進退之權在我與入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民杜憾恨也殄盡也憾本亦作感户暗反敗必邁反又如字殄大典反於是刑孰大焉詩所謂人之無良者詩小雅義取不良之人相怨以亡其羊斟之謂乎殘民以逞林殘害宋國之民以快其志逞勑領反宋人以兵車百乘林蓋甲士三百人步卒七千二百人文馬百駟杜畫馬為文四百匹以贖華元於鄭半入華元逃歸林宋人以華元為賢故贖之兵車文馬之賂半入鄭國時鄭人以宋納賂之故寬其防守故華元得乘亂逃歸立於門外告而入告宋城門而後入言不苟見叔牂曰子之馬然也杜叔牂羊斟也卑賤得先歸華元見而慰之牂子郎反對曰非馬也其人也杜叔牂知前言以顯故不敢讓罪既合而來奔杜叔牂言畢遂奔魯合猶答也宋城華元為植巡功杜植將主也林華元為築城之將主巡行察見功役之事植直吏反城者謳曰睅其目皤其腹棄甲而復杜睅出目皤大腹棄甲謂亡師謳烏侯反睅户板反說文字林云大目也蘇林云寢視不安貌皤步何反于思于思棄甲復來于思多鬢之貌思如字又西才反賈逵云白頭貌來力知反又如字以協上韻使其驂乘謂之曰牛則有皮犀兕尚多棄甲則那林言牛有皮可用為甲犀兕之皮尚多皆可用以為軍裝之飾棄甲則何害杜那猶何也驂七南反犀音西兕徐履反那乃多反役人曰從其有皮丹漆若何林縱使有皮可以為甲何如丹而漆之使益堅固勿棄之若何華元曰去之夫林言此役夫其口衆我寡杜傳言華元不吝其咎寬而容衆秦師伐晉以報崇也杜伐崇在元年遂圍焦焦晉河外邑夏晉趙盾救焦遂自隂地及諸侯之師侵鄭隂地晉河南山北自上洛以東至陸渾以報大棘之役林在今年二月楚鬭椒救鄭曰能欲諸侯而惡其難乎林言能欲諸侯從楚而惡救鄭禦晉之難惡烏路反難乃旦反遂次於鄭以待晉師趙盾云彼宗競於楚待將斃矣杜競强也鬬椒若敖之族自文子以來世為令尹斃婢世反姑益其疾乃去之杜欲示弱以驕之傳言趙盾所以稱人且為四年楚滅若敖氏張本晉靈公不君杜失君道也以明於例應稱國以弒厚斂以雕牆林厚重也重賦斂於民以雕畫牆壁斂力艷反從臺上彈人而觀其辟丸也林丸彈子也觀人之善趕彈丸與否以資笑噱彈徒丹反宰夫胹熊蹯不熟殺之置諸畚使婦人載以過朝杜畚以草束為之筥屬林不欲令人知之故使婦人載以過晉朝胹音而煮也蹯扶元反置之䜴反畚音本趙盾士季見其手問其故而患之林士季即士㑹二臣見宰夫之手露於畚外問婦人以宰夫被殺之故而患靈公之無道手一本作首將諫士季曰諫而不入則莫之繼也㑹請先不入則子繼之林言若同諫靈公而不受則莫之或繼其後㑹請先進諫若靈公不受諫則使趙盾為繼其後三進及溜而後視之三進三伏公不省而又前也公知欲諌故佯不視林溜屋霤即中堂也溜力救反曰吾知所過矣將改之稽首而對曰人誰無過過而能改善莫大焉詩曰靡不有初鮮克有終杜詩大雅也言人君之道莫不有其初少能有終者也言謹終如始之難鮮息淺反少也下同夫如是則能補過者鮮矣君能有終則社稷之固也豈唯羣臣賴之林夫如是詩所言可見人有過失而能補其過失者少矣今靈公始雖有過能改過遷善是有終也則安固社稷之道豈惟晉之羣臣之所依賴言天下之所望也又曰衮職有闕唯仲山甫補之能補過也杜詩大雅也衮君之上服闕過也言衮服者有過則仲山甫能補之林仲山甫宣王之相衮古本反君能補過衮不廢矣杜常服衮也猶不改宣子驟諫公患之使鉏麑賊之杜鉏麑晉力士鉏仕俱反麑音迷一音五兮反晨往寢門闢矣盛服將朝尚早坐而假寐杜不解衣冠而睡闢婢亦反盛音成本或作成睡垂僞反麑退歎而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一于此不如死也觸槐而死杜槐趙盾庭樹槐音懷又音回秋九月晉侯飲趙盾酒伏甲將攻之其右提彌明知之杜右車右飲於鴆反提上支反彌面皮反趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫􅋙焉明搏而殺之林􅋙猛犬也靈公嗾使猛犬齧盾想是以嗾犬為興甲之號扶扶孚反服䖍注作跣先典及云徒跣也今杜注本往往而有跣者嗾素口反說文云使犬也服本作㖩夫音扶􅋙五羔反尚書傳云大犬也爾雅云狗四尺為􅋙搏音博盾曰棄人用犬雖猛何為杜責公不養士而更以犬為己用鬭且出提彌明死之林因與公之甲士且鬬且出初宣子田於首山舍於翳桑杜田獵也翳桑桑之多蔭翳者首山在河東蒲坂縣東南翳於計反見靈輒餓問其病靈輒晉人曰不食三日矣食之舍其半問之曰宦三年矣杜宦學也食音嗣下同舍音捨未知母之存否今近焉杜去家近請以遺之使盡之而為之簞食與肉杜簞笥也遺唯季反簞音丹置諸橐以與之既而與為公介杜靈輒為公甲士槖他洛反與音預介音界倒㦸以禦公徒而免之問何故對曰翳桑之餓人也林言昔餓翳桑母子俱感宣子賜故以此報問其名居林問其姓名與其所居不告而退杜不望報也遂自亡也杜輒亦去乙丑趙穿攻靈公於桃園杜穿趙盾之從父昆弟子乙丑九月二十七日攻如字本或作弒宣子未出山而復杜晉竟之山也盾出奔聞公弒而還太史書曰趙盾弒其君以示於朝宣子曰不然對曰子為正卿亡不越竟反不討賊非子而誰林言宣子為晉之正卿其出亡也不越竟而適他國其反國也不討弒君之賊非子弒君而誰弒之言宣子當其罪也大音泰宣子曰嗚呼我之懷矣自詒伊戚其我之謂矣杜逸詩也言人多所懷戀則自遺憂杜言我因懷戀晉國以及此憂孔子曰董狐古之良史也書法不隱杜不隱盾之罪趙宣子古之良大夫也為法受惡杜善其為法受屈為于僞反惜也越竟乃免杜越竟則君臣之義絶可以不討賊林杜氏以為越竟則君臣之義絶可以不討賊遂致議論紛紛或疑以為非孔子之言愚按此越竟乃免當為遂奔他國則弒在出奔之後可免弒君之名非為越竟而反可不討賊得免弒君之名也上文亡不越竟反不討賊亦是兩事不可與此相牽宣子使趙穿逆公子黑臀於周而立之黑臀晉文公子臀徒門反壬申朝於武公杜壬申十月五日既有日而無月冬又在壬申下明傳文無較例初麗姬之亂林在僖四年麗力知反詛無畜羣公子杜詛盟誓詛側慮反自是晉無公族無公子故廢公族之官及成公即位乃宦卿之適子而為之田以為公族杜宦仕也為置田邑以為公族大夫適丁歷反又宦其餘子亦為餘子杜餘子適子之母弟也亦治餘子之政其庶子為公行庶子妾子也掌率公戎行行户郎反下同晉於是有公族餘子公行杜皆官名趙盾請以括為公族杜括趙盾異母弟趙姬之中子屏季也括古活反曰君姬氏之愛子也杜趙姬文公女成公姊也微君姬氏則臣狄人也公許之杜盾狄外孫也姬氏逆之以為適事見僖二十四年冬趙盾為旄車之族旄車公行之官盾本卿適其子當為公族辟屏季故更掌旄車旄音毛一本作軞使屏季以其故族為公族大夫盾以其故官屬與屏季使為衰之適經乙卯三年春王正月郊牛之口傷改卜牛牛死乃不郊牛不稱牲未卜日猶三望葬匡王無傳四月而葬速楚子伐陸渾之戎夏楚人侵鄭秋赤狄侵齊杜無傳林赤狄始見經先儒謂唐叔子孫别在狄者宋師圍曹冬十月丙戌鄭伯蘭卒杜再與文同盟穆公卒靈公夷立葬鄭穆公無傳傳三年春不郊而望皆非禮也杜言牛雖傷死當更改卜取其吉者郊不可廢也前年冬天王崩未葬而郊者不以王事廢天事禮記曽子問天子崩未殯五祀不行既殯而祭自啓至於反哭五祀之祭不行已葬而祭望郊之屬也不郊亦無望可也杜已有例在僖三十一年復發傳者嫌牛死與卜不從異晉侯伐鄭及郔鄭及晉平士㑹入盟杜郔鄭地為夏楚侵鄭傳郔音延楚子伐陸渾之戎林在伊川遂至於雒觀兵於周疆杜雒水出上洛冡領山至河南鞏縣入河林周都雒陽故楚至伊雒而觀兵於周室之疆界疆居良反定王使王孫滿勞楚子王孫滿周大夫勞力報反楚子問鼎之大小輕重焉杜示欲逼周取天下林鼎禹之九鼎也三代相傳以為寶對曰在德不在鼎昔夏之方有德也杜禹之世逺方圖物杜圖畫山川竒異之物而獻之貢金九牧杜使九州之牧貢金鑄鼎象物象所圖物著之於鼎百物而為之備使民知神姦杜圖鬼神百物之形使民逆備之故民入川澤山林林高流為川卑淤為澤髙峻為山深密為林不逢不若杜若順也林不遇妖怪不順之物螭魅罔兩杜螭山神獸形魅怪物罔兩水神螭勑知反魅亡備反木又作魅罔亡丈反兩本作蜽音同說文云罔兩山川之精物也莫能逢之杜逢遇也林人皆知其情狀而善避之故怪莫能遇用能協於上下以承天休杜民無災害則上下和而受天祐桀有昏德鼎遷於商載祀六百杜載祀皆年載祀爾雅云商曰祀唐虞曰載周曰年夏曰嵗商紂暴虐鼎遷於周德之休明雖小重也其姦回昏亂雖大輕也林當三代君德休美光明之時則九鼎雖小有德則重不可遷移及奸慝回邪昏迷暴亂之時則九鼎雖大無德則輕可遷移紂直九反天祚明德有所底止杜底致也林言有所致止之時祚才故反底音㫖成王定鼎於郟鄏杜郟鄏今河南也武王遷之成王定之郟卜古洽反鄏音辱世三十卜年七百天所命也林此蓋天祚明德有所底止之定命周德雖衰天命未改鼎之輕重未可問也夏楚人侵鄭鄭即晉故也宋文公即位三年殺母弟須及昭公子武氏之謀也杜武公謀奉母弟須及昭公子以作亂事在文十八年使戴桓之族攻武氏於司馬子伯之館盡逐武穆之族林事竝在文十八年武穆之族以曹師伐宋秋宋師圍曹報武氏之亂也冬鄭穆公卒初鄭文公有賤妾曰燕姞杜姞南燕姓林鄭文公穆公父燕姞穆公母姞其乙反又其吉反夢天使與已蘭杜蘭香草曰余為伯鯈余而祖也杜伯鯈南燕祖鯈直留反以是為而子杜以蘭為女子名以蘭有國香人服媚之如是杜媚愛也欲令人愛之如蘭既而文公見之與之蘭而御之林以蘭與燕姞使薦寢御辭曰妾不才幸而有子將不信敢徴蘭乎杜懼將不見信故欲計所賜蘭為懷子月數公曰諾生穆公名之曰蘭文公報鄭子之妃曰陳媯杜鄭子文公叔父子儀也漢律淫季父之妻曰報媯九危反生子華子臧子臧得罪而出杜出奔宋誘子華而殺之南里杜在僖十六年南里鄭地使盜殺子臧於陳宋之間在僖二十四年又娶於江生公子士朝於楚楚人鴆之及葉而死杜葉楚地今南陽葉縣鴆直蔭反葉式涉反又娶於蘇林蘇寰內諸侯生子瑕子俞彌俞彌早卒泄駕惡瑕文公亦惡之故不立也杜泄駕鄭大夫俞音愈惡烏路反下同公逐羣公子公子蘭奔晉從晉文公伐鄭在僖三十年從如字又才用反石癸曰吾聞姬姞耦其子孫必蕃林石癸鄭大夫杜姞姓宜為姬配耦癸居揆反蕃音煩下同姞吉人也后稷之元妃也姞姓之女為后稷妃周是以興故曰吉人今公子蘭姞甥也天或啓之必將為君其後必蕃先納之可以亢寵林亢極也可以極恃其寵愛亢苦浪反與孔將鉏侯宣多納之盟於大宫而立之杜大宫鄭祖廟鉏仕俱反大音泰以與晉平林此以上並僖三十年事穆公有疾曰蘭死吾其死乎吾所以生也林我所以生由此夢之祥刈蘭而卒傳言穆氏所以大興於鄭天所啓也刈魚廢反經丙辰四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向杜莒剡二國相怨故公與齊侯共平之向莒邑東海承縣東南有向城逺疑也郯音談向舒亮反秦伯稻卒杜無傳未同盟林共公卒桓公立稻徒老反夏六月乙酉鄭公子歸生弒其君夷杜傳例曰稱臣臣之罪也子公實弒而書子家罪其權不足也靈公弒弟襄公堅立赤狄侵齊無傳秋公如齊公至自齊杜無傳告於廟例在文二年冬楚子伐鄭傳四年春公及齊侯平莒及郯莒人不肯公伐莒取向非禮也平國以禮不以亂林平國之道當以禮遜不以兵亂伐而不治亂也杜責公不先以禮治之而用伐治直吏反以亂平亂何治之有無治何以行禮林莒郯本兵亂魯復兵亂平之其亂無由可治既不能治何以行其平國之禮楚人獻黿於鄭靈公杜穆公太子夷也林黿似龞而大黿音元公子宋與子家相見杜宋子公也子家歸生見賢遍反子公之食指動杜第二指也以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑林二子意公將享大夫故相視而笑以為食指動之驗解如字一音蟹公問之杜問所笑子家以告及食大夫黿召子公而弗與也杜欲使指動無效食音嗣子公怒染之於鼎嘗之而出公怒欲殺子公林靈公怒其不遜恐其跋扈故欲殺之子公與子家謀先杜先公為難先悉薦反子家曰畜老猶憚殺之林言六畜之老者猶以其老而難於殺蓋有不忍之心畜許又反上許六反憚徒旦反難也而况君乎反譖子家子家懼而從之譖子家於公夏弒靈公書曰鄭公子歸生弒其君夷權不足也子家權不足以禦亂懼譖而從弒君故書以首惡君子曰人而不武無能達也初稱畜老仁也不討子公是不武也故不能自通於仁道而陷弒君之罪凡弒君稱君君無道也稱臣臣之罪也杜稱君謂唯書君名而稱國以弒言衆所共絶也稱臣者謂書弒者之名以示來世終為不義改殺稱弒辟其惡名取有漸也書弒之義釋例論之備矣鄭人立子良杜穆公庶子辭曰以賢則去疾不足杜去疾子良名去起吕反下同以順則公子堅長乃立襄公杜襄公堅也長丁丈反襄公將去穆氏杜逐羣兄弟而舍子良杜以其讓已舍音赦下同子良不可曰穆氏宜存則固願也若將亡之則亦皆亡去疾何為杜何為獨留乃舍之皆為大夫初楚司馬子良生子越椒子文曰必殺之子文子良之兄是子也熊虎之狀而豺狼之聲弗殺必滅若敖氏矣林子文子良皆楚若敖之子孫諺曰狼子野心是乃狼也其可畜乎林言豺狼之子心在山野不可馴服此越椒乃豺狼也其可畜而養之乎子良不可子文以為大戚及將死聚其族曰椒也知政乃速行矣無及於難林言知政無待其執政之時也難乃旦反且泣曰鬼猶求食若敖氏之鬼不其餒而杜而語助言必餒餒奴罪反及令尹子文卒鬭般為令尹杜般子文之子子揚般音班子越為司馬林子越即子越椒蒍賈為工正譖子揚而殺之子越為令尹已為司馬林工正掌百工之長賈為椒譖子揚而已得椒處蒍于委反子越又惡之林椒既為令尹又惡蒍賈逼已惡烏路反乃以若敖氏之族圄伯嬴於轑陽而殺之杜圄囚也伯嬴蒍賈也轑陽楚邑林蓋子越以其私族囚蒍賈於轑陽而殺之非國討也圄魚吕反嬴音盈轑音遼遂處蒸野將攻王王以三王之子為質焉弗受杜蒸野楚邑三王文成穆質音致師於漳澨杜漳澨漳水邊漳音章澨市制反秋七月戊戌楚子與若敖氏戰於臯滸臯滸楚地滸呼五反伯棼射王汰輈及鼓跗著於丁寧杜伯棼越椒也輈車轅汰過也箭過車轅上丁寧鉦也林跗所以架鼓箭及於鼓跗也棼扶云反射食亦反下同汰他末反輈涉留反跗芳跗反著直略反又射汰輈以貫笠轂兵車無蓋尊者則邊人執笠依轂而立以禦寒暑名曰笠轂此言箭遇車轅及王之蓋貫古亂反笠音立轂古禾反師懼退王使巡師曰吾先君文王克息獲三矢焉伯棼竊其二盡於是矣林所以釋楚師之懼心鼓而進之遂滅若敖氏初若敖娶於䢵林若敖楚之八世祖杜䢵國名䢵本又作鄖音云生鬭伯比若敖卒從其母畜於鄖杜畜養也畜許六反淫於䢵子之女生子文焉䢵夫人使棄諸夢中杜夢澤名江夏安陸縣城東南有雲夢城夢音蒙又亡貢反虎乳之䢵子田見之懼而歸夫人以告杜告女私通所生遂使收之楚人謂乳穀謂虎於莵故命之曰鬭穀於莵以其女妻伯比杜伯比所淫者縠奴口反於音烏莵音徒妻七計反實為令尹子文杜鬬氏始自子文為令尹其孫針尹克黃杜針尹官名克黃子揚之子針之金反使於齊還及宋聞亂其人曰不可以入矣針尹曰棄君之命獨誰受之林言君命使齊不歸復命是棄君命也雖奔他國誰獨受此棄命之人使所吏反君天也天可逃乎遂歸復命而自拘於司敗林司敗即司寇拘音俱王思子文之治楚國也曰子文無後何以勸善使復其所林使克黃復其所任針尹之官改命曰生杜易其名也林言其更生冬楚子伐鄭鄭未服也前年楚侵鄭不獲成故曰未服經丁巳五年春公如齊夏公至自齊秋九月齊高固來逆叔姬髙固齊大夫不書女歸降於諸侯叔孫得臣卒杜無傳不書日公不與小斂冬齊高固及子叔姬來杜叔姬寧固反馬楚人伐鄭傳五年春公如齊高固使齊侯王公請叔姬焉杜留公强成昏夏公至自齊書過也公既見止連昏於鄰國之臣厭尊毁列纍其先君而於廟行飲至之禮故書以示過秋九月齊高固來逆女自為也故書曰逆叔姬卿自逆也杜適諸侯稱女適大夫稱字所以别尊卑也此春秋新例故稱書曰而不言凡也不於莊二十七年發例者嫌見過而成昏因明之為于僞反冬來反馬也禮送女留其送焉謙不敢自安三月廟見遣使反馬高固遂與叔姬俱寧故經傳具見以示譏楚子伐鄭陳及楚平晉荀林父救鄭伐陳林陳見楚伐鄭故請平于楚楚伐鄭故救鄭陳從楚故伐陳杜為明年晉衛侵陳傳經戊午六年春晉趙盾衛孫免侵陳夏四月秋八月螽無傳冬十月傳六年春晉衛侵陳陳即楚故也夏定王使子服求后於齊子服周大夫秋赤狄伐晉圍懷及邢丘林懷邢丘皆晉邑邢丘今河內平臯縣晉侯欲伐之中行桓子曰林即荀林父使疾其民杜驕則數戰為民所疾以盈其貫將可殪也杜殪盡也貫猶習也林民疾其君習俗既滿則衆莫為用一舉擊之將可盡殪貫古患反殪於計反周書曰殪戎殷杜周書康誥也義取周武王以兵伐殷盡滅之此類之謂也杜為十五年晉滅狄傳冬召桓公逆王后於齊召桓公王卿士事不關魯故不書為成二年王甥舅張本召上照反楚人伐鄭取成而還九年十一年傳所稱厲之役蓋在此鄭公子曼滿與王子伯廖語欲為卿杜二年鄭大夫林曼滿欲圖鄭之卿位曼音萬廖力雕反伯廖告人曰無德而貪其在周易豐離下震上豐之離豐上六變而為純離也周易論變故雖不筮必以變言其義豐上六曰豐其屋蔀其家關其户闃其無人三嵗不覿凶義取無德而大其屋不過三嵗必滅亡弗過之矣杜不過三年間一嵗鄭人殺之間間厠之間經己未七年春衛侯使孫良夫來盟夏公㑹齊侯伐萊杜傳例曰不與謀也萊國今東萊黃縣萊音來秋公至自伐萊無傳大旱無傳書旱而不書雩雩無功或不雩冬公㑹晉侯宋公衛侯鄭伯曹伯于黑壤壤如丈反傳七年春衛孫桓子來盟杜桓子即良夫始通且謀㑹晉也杜公即位衛始修好夏公㑹齊侯伐萊不與謀也凡師出與謀曰及不與謀曰㑹杜與謀者謂同志之國相與講議利害計成而行之故以相連及為文若不獲已應命而出則以外合為文皆據魯而言師者國之大事存亡之所由故詳其舉動以例别之與音預下同赤狄侵晉取向隂之禾杜此無秋字蓋闕文晉用桓子謀故縱狄林向隂晉地此時禾苗未熟蓋狄以師蹂踐取之向舒亮反鄭及晉平公子宋之謀也林宋子公也弒靈公故謀從晉以求媚故相鄭伯以㑹冬盟於黑壤王叔桓公臨之以謀不睦杜王叔桓公周卿士銜天子之命以監臨諸侯不同歃者尊卑之别也相息亮反晉侯之立也杜在二年公不朝焉又不使大夫聘晉人止公於㑹盟於黃父公不與盟以賂免黃父即黑壤故黑壤之盟不書林據經書㑹不書盟諱之也慢盟主以取執止之辱故諱之經庚申八年春公至自㑹杜無傳義與五年書過同夏六月公子遂如齊至黃乃復無傳蓋有疾而還大夫受命而出雖死以尸將事遂以疾還非禮也辛巳有事於大廟仲遂卒於垂杜有事祭也仲遂卒與季同日略書有事為繹張本不言公子因上行還間無異事省文從可知也稱字時君所嘉無義例也垂齊地非魯竟故書地大音泰傳同壬午猶繹萬入去籥繹又祭陳昨日之禮所以賔尸萬舞名籥管也猶者可止之辭魯人知卿佐之喪不宜作樂而不知廢繹故內舞去籥惡其聲聞去起吕反籥羊略反戊子夫人嬴氏薨無傳宣公母也晉師白狄伐秦林白狄始見經楚人滅舒蓼秋七月甲子日有食之既無傳月三十日食冬十月己丑葬我小君敬嬴杜敬諡嬴姓也反哭成葬故稱葬小君雨不克葬庚寅日中而克葬克成也城平陽今泰山有平陽縣楚師伐陳傳八年春白狄及晉平夏㑹晉伐秦杜經在仲遂卒下從赴晉人獲秦諜殺諸絳市六日而蘇林諜往來間探者絳市晉所都之市也凡死六日而復蘇醒蓋記異也諜徒協反間也今謂之細作絳古巷反有事於太廟襄仲卒而繹非禮也楚為衆舒叛故伐舒蓼滅之杜舒蓼二國名為于僞反楚子疆之杜正其界也疆几良反及滑汭杜滑水名林水之隈曲曰汭蓋楚拓疆至滑汭之界滑於八反汭如鋭反一音如恱反盟吳越而還杜吳國今吳郡越國今㑹稽山隂縣也傳言楚彊吳越服從晉胥克有蠱疾杜惑以喪志按胥克晉下軍佐也蠱音古郤缺為政代趙盾秋廢胥克使趙朔佐下軍朔盾之子代胥克為成十七年胥童怨郤氏張本冬葬敬嬴旱無麻始用葛茀杜記禮變之所由茀所以引柩殯則有之以備大葬則以下柩茀方勿反引棺索也雨不克葬禮也禮卜葬先逺日林卜葬日先卜逺日辟不懷也杜懷思也城平陽書時也陳及晉平林陳自五年從楚至是始及晉平楚師伐陳取成而還杜言晉楚爭强左傳杜林合注卷十八
