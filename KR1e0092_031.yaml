body:
  text: 左傳杜林合注卷三十一明王道焜趙如源同編襄公七𫝊㑹于夷儀之歳齊人城郟在二十四年不直言㑹夷儀者别二十五年夷儀㑹郟古洽反其五月秦晉為城林自十四年十三國伐秦二國不平至今年始為平晉韓起如秦涖盟秦伯車如晉涖盟杜伯車秦伯之弟鍼也涖音利又音類車音居成而不結杜不結固也𫝊為後年修成起本當繼前年之未而特跳此者傳寫失之經甲寅二十有六年春王二月辛卯衛甯喜弑其君剽杜殤公弑獻公復歸衛剽匹妙反衛孫林父入于戚以叛杜衎雖未居位林父専邑背國猶為叛也書叛始于此凡叛賤者不書是故成十七年齊髙無咎之子弱以盧叛襄一十九年齊髙止之子竪以盧叛不書必卿佐而後書然宋魚石入於彭城晉欒盈入于曲沃未可以書叛必若衛孫林父而後可以書叛必不能討者也甲午衛侯衎復歸于衛復其位曰復歸名與不名傳無義例夏晉侯使荀呉來聘呉苟偃子公㑹晉人鄭良霄宋人曺人于澶淵杜鄉㑹公侯皆應貶方賁宋向戌後期書良霄以駮之若皆稱人則嫌向戌直以㑹公貶之澶淵近戚地葢以討衛而疆戚田也澶市延反秋宋公殺其世子痤稱君以殺惡其父子相殘害痤未禾反晉人執衛甯喜八月壬午許男甯卒于楚杜未同而而赴以名林靈公卒悼公立冬楚子蔡侯陳侯伐鄭𦵏許靈公傳二十六年春秦伯之弟鍼如晉修成杜修㑹夷儀歳之成叔向命召行人子員欲使答秦命員音云行人子朱曰朱也當御林子朱亦晉行人杜御進也言次當行三云叔向不應子朱怒曰班爵同杜同為大夫何以黜朱於朝林謂三不應杜黜退也撫劍從之欲從叔向也叔向曰秦晉不和久矣今日之事幸而集言集成也晉國賴之不集三軍暴骨子員道二國之言無私子常易之姦以事君者吾所能御也拂衣從之林謂子朱之為行人常變易其往來之言凡拂姦邪之心以事其君者我之所能御止不畏也拂衣褰裳也暴蒲卜反徐扶沃反道音導御魚呂反人救之平公曰晉其庶乎杜庶㡬于治吾臣之所爭者大林言叔向子朱所爭者公忿非私怒也師曠曰公室懼卑臣不心競而力爭襄謂二子不心競為忠而撫劍拂衣不務徳而爭善林不以徳之厚薄為先而爭謂所行為善私欲已侈能無卑乎杜私欲侈則公義廢衛獻公使子鮮為復杜使為已求反國林子鮮即母弟鱄也鮮音仙為于偽反辭杜辭不能敬姒强命之杜敬姒獻公及子鮮之母姒音姒強其丈反對曰君無信臣懼不免敬姒曰雖然以吾故也林言雖獻公不可託以我之故必為求之許諾初獻公使與甯喜言杜言復國甯喜曰必子鮮在不然必敗子鮮賢國人信之必欲使在其間故公使子鮮子鮮不獲命於敬姒林子鮮受敬姒強命不獲已以公命與甯喜言曰苟反政由甯氏祭則寡人林言苟獻公得反衛國衛國之政事皆與甯喜已伹欲守其祭祀而已甯喜告蘧伯玉伯玉曰瑗不得聞君之出敢聞其入林敢不敢也言已不知獻公因何出奔亦不敢聞獻公因何而入蘧其居反瑗于眷反又于萬反遂行從近關出林據十四年孫氏欲逐獻公蘧伯玉從近關出今年甯喜欲復獻公蘧伯玉又從近關出其全身逺害如此告右宰榖杜衛大夫右宰榖曰不可獲罪於兩君前出獻公今弑剽天下誰畜之畜猶容也畜許六反悼子曰吾受命於先人不可以貳杜悼子甯喜也受命在二十年榖曰我請使焉而觀之杜觀知可還否使所吏反遂見公於夷儀反曰君淹恤在外十二年矣杜淹久也林書衛獻公淹留憂恤在於外國自十四年出奔至今凡十二年見賢遍反又如字淹於亷反徐於嚴反而無憂色亦無寛言林無憂戚之顔色亦無寛暇之言語猶夫人也言其為人猶如故夫音扶若不已死無日矣已止也悼子曰子鮮在右宰榖曰子鮮在何益多而能亡於我何為林子鮮若欲踐言多不過能出亡於我果何所為悼子曰雖然弗可以已孫文子在戚林文子即林父在其私邑孫嘉聘於齊孫襄居守杜二子孫文子之子守毛又反二月庚寅甯喜右宰榖伐孫氏不克伯國傷杜伯國孫襄也父兄皆不在故乘弱攻之甯子出舍于郊杜欲奔伯國死孫氏夜哭國人召甯子甯子復攻孫氏克之辛夘殺子叔及大子角子叔衛侯剽言子叔剽無諡故書曰甯喜弑其君剽言罪之在甯氏也嫌受父命納舊君無罪故發之孫林父以戚如晉杜以邑屬晉書曰入于戚以叛罪孫氏也臣之禄君實有之義則進否則奉身而退専禄以周旋戮也林専據其禄邑出入與之周旋此罪戮之大者林父事剽而衎入義可以退唯以専邑自隨為罪故傳發之甲午衛侯入書曰復歸國納之也本晉納之夷儀今從夷儀入國嫌若晉所納故發國納之例言國之所納而復其位大夫逆於竟者執其手而與之言道逆者自車揖之林獻公敬心漸衰故自車而揖之竟音境逆於門者頷之而已杜頷揺其頭言衎驕心易生頷戸感反公至使讓大叔文子曰寡人淹恤在外二三子皆使寡人朝夕聞衛國之言杜二三子諸大夫林言朝夕皆來相存問大音泰吾子獨不在寡人杜在存問之公聞文子答寗喜之言故忿之古人有言曰非所怨勿怨寡人怨矣杜所怨在親親對曰臣知罪矣臣不佞不能負羈絏以從扞牧圉臣之罪一也林羈馬繮絏繋也養牛日牧養馬曰圉羈居宦反絏息列反扞户幹反圉魚呂反有出者有居者杜出謂衎居謂剽也臣不能貳通外内之言以事君臣之罪二也有二罪敢忘其死乃行從近闗出公使止之林獻公尋悔其言使止大叔文子勿出奔傳言衛侯不能安和大臣衛人侵戚東鄙以林父叛故孫氏愬于晉晉戍茅氏茅氏戚東鄙愬息路反殖綽伐茅氏殺晉戍三百人殖綽齊人今來在衛孫蒯追之弗敢撃文子曰厲之不如杜厲惡鬼也林蓋比殖綽為惡鬼而責其子反不之如遂從衛師敗之圉杜蒯感父言更還逐殖綽圉衛地雍鉏獲殖綽雍鉏孫氏臣復愬於晉為下晉討衛張本鄭伯賞入陳之功入陳在前年三月甲寅朔享子展林子展為元帥故鄭伯享之賜之先路三命之服杜先路次路皆王所賜車之總名葢請之於王先八邑林以路及命服為邑先八邑三十二井先徐悉薦反下同或如字賜子産次路再命之服先六邑林二十四井也子産辭邑曰自上以下隆殺以兩禮也林自上而至於下其隆殺皆以爾為數此禮之定制也殺所界反臣之位在四上卿子展次卿子西十一年良霄見經十九年乃立子産為卿故位在四且子展之功也臣不敢及賞禮請辭邑杜賞禮以禮見賞謂六邑也公固予之乃受三邑杜位次當受二邑以公固與之故受三邑公孫揮曰子産其將知政矣杜知國政讓不失禮林遜讓而不失其班次之禮晉人為孫氏故召諸侯將以討衛也夏中行穆子來聘林穆子即荀呉為于偽反召公也杜召公為澶淵㑹楚子秦人侵呉及雩婁聞呉有備而還雩婁今屬安豐郡雩音于徐况于反韋昭音虚或一呼反婁如字徐力俱反如淳音樓遂侵鄭五月至于城麇鄭皇頡戍之杜皇頡鄭大夫守城麇之邑麇九倫反頡戸結反出與楚師戰敗林言楚師秦不與戰穿封戌囚皇頡公子圍與之爭之林公子圍共王子靈王也與穿封戌爭所獲之囚戍音恤正於伯州犁杜正曲直也伯州犁曰請問於囚乃立囚林乃立皇頡於庭而問之伯州犁曰所爭君子也其何不知杜言王子圍及穿封戌皆非細人易别識也上其手曰夫子為王子圍寡君之貴介弟也林伯州犁乃髙舉其手作勢指王子圍以示皇頡夫子亦尊王子圍之辭介大也言其乃楚君之貴寵大弟也上時掌反下其手曰此子為穿封戌方城外之縣尹也誰獲子林復下埀其手作勢指穿封戌以示皇頡此子亦卑穿封戌之辭言戍乃楚方城外之縣尹也觀伯州犁聽説之間其手勢心口言語輕重皆道囚意使曲證玉子圍獲已以媚權要囚曰頡遇王子弱焉林皇頡已解其意杜弱敗也言為王子所得戍怒抽戈逐王子圍弗及楚人以皇頡歸印堇父與皇頡戍城麇印堇父鄭大夫堇音謹楚人囚之林楚人敗城麇之師併囚印堇父以獻於秦鄭人取貨於印氏以請之林鄭人使印氏出貨賄請贖堇父於秦子太叔為令正杜主作辭令之正以為請林以貨為請為于偽反又如字子産曰不獲杜謂大叔辭以貨請堇父必不得受楚之功而取貨於鄭不可謂國秦不其然杜受楚獻功大名也以貨免之小利故謂秦不爾若曰拜君之勤鄭國微君之恵楚師其猶在敝邑之城下其可林其辭如此歸功於秦則堇父可得弗從遂行秦人不予更幣從子産而後獲之杜更遣使執幣用子産辭乃得堇父傳稱子産之善六月公㑹晉趙武宋向戌鄭良霄曺人于澶淵以討衛疆戚田杜正戚之封疆疆居良反取衛西鄙懿氏六十以與孫氏杜戚城西北五十里有懿城因姓以名城取田六十并也趙武不書尊公也杜罪武㑹公侯左氏以為趙武㑹公侯故貶書人以尊魯公義例頗淺愚按澶淵之㑹為臣討君武之罪也貶書晉人其義甚明向戌不書後也謂後㑹期鄭先宋不失所也杜如期至於是衛侯㑹之杜晉將執之不得與㑹故不書晉人執甯喜北宮遺使女齊以先歸杜討其弑君伐孫氏也遺北宮括之子女齊司馬侯歸晉而後告諸侯故經書在秋女音汝衛侯如晉晉人執而囚之於士弱氏士弱晉主獄大夫秋七月齊侯鄭伯為衛侯故如晉欲共請之為于偽反下同晉侯兼享之晉侯賦嘉樂杜嘉樂詩大雅取其嘉樂君子顯顯令徳宜民宜人受禄于天嘉户嫁反國景子相齊侯杜景子國弱相息亮反下同賦蓼蕭杜蓼蕭詩小雅言大平澤及逺若露之在蕭以喻晉君恩澤及諸侯蓼音六子展相鄭伯賦緇衣杜緇衣詩鄭風義取適子之館兮晉還予授子之粲兮言不敢違逺於緇側其反叔向命晉侯拜二君曰寡君敢拜齊君之安民先君之宗祧也敢拜鄭君之不二也杜蓼蕭緇衣二詩所趣各不同故拜二君辭異祧他彫反國子使晏平仲私於叔向杜私與叔向語曰晉君宣其令徳於諸侯恤其患而補其闕正其違而治其煩林憂恤其災患而補益其闕失匡正其違邪而討治其煩勞所以為盟主也今為臣執君若之何杜謂晉為林父執衛侯叔向告趙文子文子以告晉侯晉侯言衛侯之罪使叔向告二君言自以殺晉戍三百人為罪不以林父故國子賦轡之柔矣逸詩見周書義取寛政以安諸侯若柔轡之御剛馬子展賦將仲子兮杜將仲子詩鄭風義取衆言可畏衛侯雖别有罪而衆人猶謂晉為臣執君將七羊反本亦無兮字此依詩序晉侯乃許歸衛侯叔向曰鄭七穆罕氏其後亡者也子展儉而壹杜子展鄭子罕之子居身儉而用心壹鄭穆公十一子子然二子孔三族已亡子羽不為卿故唯言七穆鄭七穆謂僑子展公孫舍之罕氏也子西公孫夏駟氏也子産公孫國氏也伯有良霄良氏也子大叔游吉游氏也子石公孫段豐氏也伯石印段印氏也穆公十一子謂子良公子去疾也子罕公子喜也子駟公子騑也子國公子發也子孔公子嘉也子游公子偃也子豐也子印也子羽也子然也士子孔也子然二子孔已亡子羽不為卿故止七也初宋芮司徒生女子杜苪司徒宋大夫苪鋭鋭反赤而毛葉諸堤下林色赤而體生毛畏其異相故棄諸堤下堤丁兮反共姬之妾取以入共姫宋伯姫也共音恭名之曰棄林取見棄之義長而羙平公入夕林平公共姫子也入宮夕見其母長丁丈反共姬與之食公見棄也而視之尤尤甚也姬納諸御嬖生佐杜佐元公惡而婉杜佐貌惡而心順婉紆阮反大子痤羙而狠貌羙而心狼戾狠胡墾反合左師畏而惡之林合左師向戌惡鳥路反下皆同寺人恵牆伊戾為大子内師而無寵恵牆氏伊戾名戾力計反秋楚客聘於晉過宋杜上已有秋復發傳者中間有初不言秋則嫌楚客過在他年大子知之請野享之林大子痤與楚客相知請於宋公欲野享楚客公使往伊戾請從之公曰夫不惡女乎杜夫謂大子也夫音扶女音汝對曰小人之事君子也惡之不敢逺好之不敢近敬以待命敢有貳心乎縱有共其外莫共其内杜伊戾為大子内師不行恐内侍廢闕逺于萬反好呼報反共音恭臣請往也遣之至則欿用牲加書徵之林伊戾詐作盟處掘地作欿用牲加盟書為大子反徵騐也欿口感反而騁告公杜騁馳也騁勑景反曰大子將為亂既與楚客盟矣公曰為我子又何求對曰欲速杜言欲速得公位公使視之則信有焉謂有盟徵也問諸夫人與左師杜夫人佐母棄也則皆曰固聞之林言固聞大子欲反公囚大子大子曰唯佐也能免我杜以其婉也召而使請曰日中不來吾知死矣左師聞之聒而與之語杜聒讙也欲使佐失期聒古活反下同過期乃縊而死佐為大子公徐聞其無罪也乃亨伊戾左師見夫人之歩馬者杜歩馬習馬縊一賜反亨普彭及問之對曰君夫人氏也林言君夫人氏之馬也左師曰誰為君夫人余胡弗知林向成謬言不知誰為君夫人氏我何不知其姓氏葢棄非平公之嫡夫人圉人歸以告夫人夫人使饋之錦與馬先之以玉以玉為錦馬之先饋其位反先悉薦反又如字曰君之妾棄使某獻左師改命曰君夫人而後再拜稽首受之杜左師令使者改命也傳言宋公閽左師諛大子所以無罪而死鄭伯歸自晉杜請衛侯歸使子西如晉聘辭曰寡君來煩執事懼不免於戾言自懼失敬於大國而得罪使夏謝不敏夏子西名君子曰善事大國將求於人必先下之言鄭所以能自安初楚伍參與蔡大師子朝友其子伍舉與聲子相善也杜聲子子朝之子伍舉子胥祖父椒舉也朝如字伍舉娶於王子牟王子牟為申公而亡林王子牟為申縣公得罪而出亡牟亡侯反為如字舊于為反楚人曰伍舉實送之伍舉奔鄭將遂奔晉林伍舉王子年之壻故謂伍舉實送之出亡伍舉懼禍故出奔鄭鄭不足恃故自鄭將奔晉聲子將如晉遇之於鄭郊班荆相與食而言復故林班布也布荆籍地而坐相與飲食朋友世親故共議歸楚事聲子曰子行也吾必復子及宋向戌將平晉楚杜平在明年聲子通使於晉杜為國通平事還如楚令尹子木與之語問晉故焉杜故事也且曰晉大夫與楚孰賢對曰晉卿不如楚其大夫則賢皆卿材也如杞梓皮革自楚往也林言晉卿之賢不如楚卿之賢晉之大夫則賢於楚其材皆可為卿譬如木之杞梓獸之皮革皆産於楚而用於晉杞音起梓音子雖楚有材晉實用之杜言楚亡臣多在晉子木曰夫獨無族姻乎夫謂晉對曰雖有而用楚材實多林言晉雖有宗族與姻親而用楚之賢材居多歸生聞之杜歸生聲子名善為國者賞不僭而刑不濫賞僭則懼及淫人刑濫則懼及善人若不幸而過寜僭無濫與其失善寜其利淫無善人則國從之杜從之亡也僭子念反下皆同濫力暫反詩曰人之云亡邦國殄瘁無善人之謂也杜詩大雅殄盡也瘁病也殄徒典反瘁在醉反故夏書曰與其殺不辜寜失不經懼失善也杜逸書也言與其刑濫而及於無辜之人寜失刑而不用經常之法懼失善人之用也啇頌有之曰不僭不濫不敢怠皇命于下國封建厥福杜詩商頌言殷湯賞不僭差刑不濫溢不敢怠解自寛暇故能為下國所命為天子林福禄鞏固如封建之永世也此湯所以獲天福也古之治民者勸賞而畏刑杜樂行賞而憚用刑恤民不倦賞以春夏刑以秋冬杜順天時是以將賞為之加膳加膳則飫賜杜飫饜也酒食賜下無不飫足所謂加膳也為于偽反下同飫於據反此以知其勸賞也林即此喜心可以知其樂於用賞將刑為之不舉不舉則徹樂杜不舉盛饌徹去也不舉之道則聲樂之類慆心娛且皆不忍聞此以知其畏刑也林即此憂心可以知其憚於用刑夙興夜寐朝夕臨政此以知其恤民也林即此勤勞可以知其勤恤民隠三者禮之大節也有禮無敗今楚多淫刑其大夫逃死於四方而為之謀主以害楚國不可救療所謂不能也杜療治也所謂楚人不能用其材也子儀之亂析公奔晉在文十四年晉人寘諸戎車之殿以為謀主杜殿後軍寘之鼓反殿多練反繞角之役晉將遁矣析公曰楚師輕窕易震蕩也若多鼔鈞聲以夜軍之林言楚軍不能持重茍震恐揺蕩使亂其軍多撃軍鼔鈞同其聲夜攻楚軍使不知虚實窕勑堯反又通弔反易以鼓反鈞音均徐居旬反楚師必遁晉人從之楚師宵潰晉侯侵蔡襲沈獲其君敗申息之師於桑隧獲申麗而還杜成六年晉欒書救鄭與楚師遇於繞角楚師還晉侵沈獲沈子八年復侵楚敗申息獲申麗林據成六年楚公子申公子成以申息之師救蔡禦諸桑隧欒書不戰而還成八年傳只載欒書侵蔡遂侵楚獲申驪却不載桑隧之敗但既獲申驪則敗申息之師曉然在八年特桑隧之名偶同傳不詳載麗力馳反鄭於是不敢南靣楚失華夏則析公之為也雍子之父兄譖雍子君與大夫不善是也林雍子之事無所考證想是雍子諸父諸兄共譖雍子善能也是正也君與大人信其父兄不能正其曲直雍子奔晉晉人與之鄐杜鄐晉邑鄐許六反徐超六反以為謀主彭城之役晉楚遇於靡角之谷杜在成十八年晉將遁矣雍子發命於軍曰歸老㓜反孤疾二人役歸一人林一家有二人從役者則聽其一人歸家簡兵蒐乘杜簡擇蒐閲蒐所留反乘䋲證反秣馬蓐食師陳焚次林穀秣戰馬食於寢蓐杜次舍也焚舍示必死秣音末蓐音辱陳直覲反明日將戰行歸者而逸楚囚林凡軍中老幼孤疾應歸者皆遣之行而縱楚之被囚者使得走逸欲楚知之楚師宵潰晉降彭城而歸諸宋以魚石歸杜在元年降戸江反楚失東夷子辛死之則雍子之為也楚東小國及陳見楚不能救彭城皆叛五年楚人討陳叛故殺令尹子辛子反與子靈爭夏姫杜子靈巫臣而雍害其事子反亦雍害巫臣不使得取夏姫雍於勇反子靈奔晉晉人與之邢杜邢晉邑邢音刑以為謀主扞禦北狄通呉於晉教呉叛楚教之乘車射御驅侵言教呉以中國陣法使其子狐庸為呉行人焉呉於是伐巢按巢屬楚小國取駕克棘入州來杜駕棘皆楚邑譙國鄼縣東北有棘亭楚罷於奔命至今為患則子靈之為也杜事見成七年罷音皮若敖之亂伯賁之子賁皇奔晉晉人與之苖杜若敖亂在宣四年苖晉下邑林伯賁即鬬椒賁扶云反下同以為謀主鄢陵之役在城十六年鄢音偃楚晨壓晉軍而陳晉將遁矣苖賁皇曰楚師之良在其中軍王族而已杜言楚之精卒唯在中軍壓於甲反徐於輙反陳直覲反下同若塞井夷竈成陳以當之杜塞井夷竈以為陳欒范易行以諉之欒書時將中軍范變佐之易行謂簡易兵備欲令楚貪已不復顧二穆之兵易以豉及下同賈音亦行户郎反下同賈音衡中行二郤必克二穆郤錡時將上軍中行偃佐之郤至佐新軍令此三人分良以攻二穆之兵楚子重子辛皆出穆王故曰二穆吾乃四萃於其王族必大敗之杜四萃四面集攻之萃在醉反晉人從之楚師大敗王夷師熸林夷傷也呉楚之間謂火滅為熸葢射共王中目大敗楚師也熸子潛反子反死之林楚殺子反並在城十八年鄭叛呉興楚失諸侯則苖賁皇之為也子木曰是皆然矣聲子曰今又有甚於此椒舉娶於申公子牟子牟得戾而亡君大夫謂椒舉女實遺之懼而奔鄭引領南望曰庶㡬赦余亦弗圖也杜言楚亦不以為意女音汝今在晉矣晉人將與之縣以比叔向杜以舉材能比叔向彼若謀害楚國豈不為患子木懼言諸王益其爵禄而復之聲子使椒鳴逆之椒鳴伍舉子傳言聲子有辭伍舉所以得反子孫復仕於楚許靈公如楚請伐鄭十六年晉伐許他國皆大夫獨鄭伯自行故許恚欲報之曰師不興孤不歸矣八月卒于楚楚子曰不伐鄭何以求諸侯林言許靈公以死請師而我不能為之伐鄭懈怠如此何以求諸侯而主霸業冬十月楚子伐鄭杜為許鄭人將禦之子産曰晉楚將平諸侯將和杜和在明年楚王是故昧於一來杜昧猶貪冒不如使逞而歸乃易成也杜逞快也夫小人之性釁於勇嗇於禍以足其性而求名焉者非國家之利也若何從之杜釁動也嗇貪也言鄭之欲與楚戰者皆釁勇貪名之人非能為國計慮久利不可從也釁許覲反足子住反又如字子展説不禦冦十二月乙酉入南里墮其城杜南里鄭邑説音悦墮許規反渉於樂氏樂氏津門門於師之梁杜鄭城門縣門發獲九人焉林鄭人發縣門而禦攻者獲楚攻門者九人縣音𤣥渉于汜而歸於汜城下涉汝水南歸汜音几徐扶嚴反而後𦵏許靈公卒靈公之志而後𦵏之衛人歸衛姫於晉乃釋衛侯杜衛侯以女説晉而後得免君子是以知平公之失政也林重女色而輕齊鄭之請此平公之失政傳言晉之衰晉韓宣子聘于周王使請事杜問何事來聘對曰晉士起將歸時事於宰旅無他事矣杜趙宣子名禮諸侯大夫入天子國稱士時事四時貢職宰旅冢宰之下士言獻職貢于宰旅不取斥尊王聞之曰韓氏其昌阜於晉乎辭不失舊杜阜大也傳言周衰諸侯莫能如禮唯韓起不失舊齊人城郟之歳在二十四年其夏齊烏餘以廩丘奔晉杜烏餘齊大夫廩丘今東郡廩丘縣故城是廩力甚反襲衛羊角取之杜今廩丘縣所治羊角城是遂襲我髙魚杜髙魚城在廩丘縣東北有大雨自其竇入雨故水竇間竇音豆介于其庫入髙魚庫而介其甲以登其城克而取之杜取魯髙魚無所諱而不書其義未聞又取邑于宋於是范宣子卒杜宣子范匄諸侯弗能治也林諸侯以范匄新死不能治烏餘之罪及趙文子為政乃卒治之文子言於晉侯曰晉為盟主諸侯或相侵也則討而使歸其地今烏餘之邑皆討類也杜言於比類宜見討而貪之是無以為盟主也請歸之林請以其地歸於諸侯公曰諾孰可使也對曰胥梁帶能無用師晉侯使往胥梁帶晉大夫能無用師言有權謀經乙卯二十有七年春齊侯使慶封來聘景公即位通嗣君也夏叔孫豹㑹晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曺人于宋杜按傳㑹者十四國齊秦不交相見邾滕為私屬皆不與盟宋為主人地於宋則與盟可知故經唯序九國大夫楚先晉歃而書先晉貴信也陳于晉㑹常在衛上孔奐非上郷故在石惡下晉楚始同主夏盟也以諸侯分為晉楚之從而交相見於是始則是南北二伯也天下之大變也於溴梁而無君臣之分於宋而無夷夏之辨昭定哀之春秋將以終於呉越焉爾矣奐呼亂反衛殺其大夫甯喜杜甯喜弑剽立衎衎今雖不以弑剽致討於大義宜追討之故經以國討為辭書名也書宋㑹下乃從赴衛侯之弟鱄出奔晉按衛侯始者云政由甯氏祭則寡人而今復患其専緩答免餘既負其前信且不能友于賢弟使至出奔故書弟以罪兄鱄市轉反又音専秋七月辛巳豹及諸侯之大夫盟于宋杜夏㑹之大夫也豹不倚順以顯弱命之君而辨小是以自從故以違命貶之釋例論之備矣林於是晉楚爭先乃先楚人則其書先晉何春秋不以夷狄先中國也自來以來晉不専主盟矣虢之盟讀舊書加於牲上而已至剸陵則齊主諸侯至臯鼬則魯及諸侯晉之不足以主夏盟自宋始宋之盟趙武之偷也孔子曰庭燎之禮自齊桓公始也大夫之奏肆夏自趙文子始也此王霸之所以興衰也冬十有二月乙亥朔日有食之今長厯推十二月朔非十二月傳曰辰在申再失閠若是十二月則為三失閏故知經誤傳二十七年春胥梁帶使諸䘮邑者具車徒以受地必周杜諸䘮邑謂齊魯宋也周宻也必宻來勿以受地為名䘮息浪反使烏餘具車徒以受封烏餘以地來故詐許封之烏餘以其衆出杜出受封也使諸侯偽效烏餘之封者杜效致也使齊魯宋偽若致邑封烏餘者而遂執之盡獲之皆獲其徒衆皆取其邑而歸諸侯諸侯是以睦於晉傳言趙文子賢故平公雖失政而諸侯猶睦齊慶封來聘其車羙孟孫謂叔孫曰慶季之車不亦羙乎杜季慶封字叔孫曰豹聞之服羙不稱必以惡終羙車何為叔孫與慶封食不敬為賦相鼠亦不知也杜相鼠詩鄘風日相鼠有皮人而無儀人而無儀不死何為慶封不知此詩為已言其闇甚為明年慶封來奔傳稱尺證反為賦于偽反相息亮反衛甯喜専公患之公孫免餘請殺之免餘衛大夫公曰微甯子不及此及此反國也吾與之言矣杜言政由甯氏事未可知祗成惡名杜恐伐之未必勝祗適也祗音支止也對曰臣殺之君勿與知乃與公孫無地公孫臣謀二公孫衛大夫與音預使攻甯氏弗克皆死杜無地及臣皆死公曰臣也無罪父子死余矣獻公出時公孫臣之父為孫氏所殺夏免餘復攻甯氏殺甯喜及右宰榖尸諸朝杜榖不書非卿也石惡將㑹宋之盟受命而出衣其尸枕之股而哭之欲歛以亡懼不免且曰受命矣乃行林石惡寗喜之黨杜行㑹于宋為明年石惡奔傳衣與既反桃之鳩反歛力驗反子鮮曰逐我者出杜謂孫林父納我者死杜謂甯喜賞罰無章何以沮勸君失其信而國無刑林章明也在獻公則失政由寗氏之信在衛國則無沮惡勸善之刑不亦難乎杜難以治國且鱄實使之杜使甯喜納君遂出奔晉公使止之不可杜不晉留及河又使止之止使者而盟於河杜誓不還使所吏反託於木門木門晉邑不郷衛國而坐杜怨之深也郷許亮反木門大夫勸之仕不可曰仕而廢其事罪也從之昭吾所以出也將誰愬乎杜從之謂治其事也事治則明已出欲仕無所自愬愬悉路反吾不可以立於人之朝矣終身不仕杜自誓不仕終身公䘮之如税服終身税即繐也䘮服繐衰裳縷細而希非五服之常本無月數痛愍于鮮故特為此服此服無月數而獻公尋薨故言終身䘮息郎反又息浪反税徐讀曰繐音歳服吐外反公予免餘邑六十辭曰唯卿備百官臣六十矣下有上禄亂也此一乘之邑非四井之邑論語稱千室又云十室明通稱臣弗敢聞且甯子唯多邑故死臣懼死之速及也公固與之受其半以為少師公使為卿辭曰大叔儀不貳能贊大事杜贊佐也少詩照反君其命之乃使文子為卿杜文子大叔儀宋向戌善於趙文子又善於令尹子木欲弭諸侯之兵以為名欲獲息民之名弭武婢反如晉告趙孟趙孟謀於諸大夫韓宣子曰兵民之殘也財用之蠧杜蠧害物之蟲蠧丁故反小國之大菑也將或弭之雖曰不可必將許之杜言雖知兵不得久弭今不可不許菑音災弗許楚將許之以召諸侯則我失為盟主矣晉人許之如楚楚亦許之如齊齊亦難之陳文子曰晉楚許之我焉得已且人曰弭兵而我弗許則固攜吾民矣將焉用之齊人許之告於秦秦亦許之皆告於小國為㑹於宋五月甲辰晉趙武至於宋丙午鄭良霄至六月丁未朔宋人享趙文子叔向為介司馬置折爼禮也杜折爼體解節折升之於爼合郷享宴之禮故曰禮也周禮司馬掌㑹同之事難乃旦反焉於䖍反下皆同折之設反徐音制爼莊呂反仲尼使舉是禮也以為多文辭宋向戌自羙弭兵之意敬逆趙武趙武叔向因享宴之㑹展賔主之辭故仲尼以為多文辭舉謂記録之也戊申叔孫豹齊慶封陳須無衛石惡至杜須無陳文子甲寅晉荀盈從趙武至趙武命盈追已故言從趙武後武遣盈如楚丙辰邾悼公至小國故君自來壬戌楚公子黑肱先至成言於晉杜時令尹子木止陳遣黑肱就晉大夫成盟載之言兩相然可丁卯宋向戊如陳從子木成言於楚林楚子木止陳故向戊如陳杜就於陳成楚之要言戊辰滕成公至亦小國君自來子木謂向戌請晉楚之從交相見也杜使諸侯從晉楚者更相朝見庚午向戌復於趙孟趙孟曰晉楚齊秦匹也晉之不能於齊猶楚之不能於秦也杜不能服而使之楚君若能使秦君辱於敝邑寡君敢不固請於齊杜請齊使朝楚壬申左師復言於子木子木使馹謁諸王杜馹𫝊也謁告也馹人實反王曰釋齊秦他國請相見也杜經所以不書齊秦秋七月戊寅左師至杜從陳還是夜也林向戊還之夜趙孟及子晳盟以齊言杜子晳公子黑肱素要齊其言至盟時不得復訟爭庚辰子木至自陳陳孔奐蔡公孫歸生至杜二國大夫與子木俱至曺許之大夫皆至以藩為軍林諸國各以藩籬為軍不築營主示不相思藩方元反晉楚各處其偏晉處北楚處南伯夙謂趙孟杜伯夙荀盈曰楚氛甚惡懼難林氛氣也言楚有襲晉之氣恐有患難氣芳云反趙孟曰吾左還入於宋若我何杜營在宋北東頭為上故晉營在東有急可左迴入宋東門辛巳將盟於宋西門之外楚人𠂻甲杜甲在衣中欲因㑹撃晉𠂻音忠又丁仲反伯州犁曰合諸侯之師以為不信無乃不可乎夫諸侯望信於楚是以來服若不信是棄其所以服諸侯也固請釋甲子木曰晉楚無信久矣事利而已苟得志焉焉用有信大宰退杜大宰伯州犁告人曰令尹將死矣不及三年求逞志而棄信志將逞乎志以發言言以出信信以立志林志者氣之帥也志之所之然後發而為言言無實不祥言之所出必以信為之主民無信不立信著於人乃能成立其志參以定之杜志言信三者具而後身安存信亡何以及三林志言信其數三故知其不能及三年為明年子木死起本趙孟患楚衷甲以告叔向叔向曰無害也匹夫一為不信猶不可單斃其死林言微賤之人一為不信之事猶不可立於世盡斃踣其死杜單盡也斃踣也單音丹斃婢世反若合諸侯之卿以為不信必不捷矣食言者不病不病者單斃於死非子之患也杜楚食言當死晉不食言故無患夫以信召人而以僭濟之林僭不信也濟成也僭子念反必莫之與也安能害我且吾因宋以守病杜為楚所病則欲入宋城則夫能致死與宋致死雖倍楚可也宋為地主致死助我則力可倍楚夫如是或音扶子何懼焉又不及是林言不幸而死曰弭兵以召諸侯而稱兵以害我稱舉也吾庸多矣非所患也晉獨取信故其功多季武子使謂叔孫以公命曰視邾滕杜兩事晉楚則貢賦重故欲比小國季武子恐叔孫不從其言假公命以敦之既而齊人請邾宋人請滕皆不與盟杜私屬二國故與音預叔孫曰邾滕人之私也我列國也何故視之宋衛吾匹也乃盟林乃視宋衛以受盟故不書其族言違命也杜季孫専政於國魯君非得有命今君唯以此命告豹豹宜崇大順以顯弱命之君而遂其下是故貶之晉楚爭先杜爭先歃血晉人曰晉固為諸侯盟主未有先晉者也楚人曰子言晉楚匹也若晉常先是楚弱也且晉楚狎主諸侯之盟也久矣杜狎更也先悉薦反或如字狎古甲反豈専在晉叔向謂趙孟曰諸侯歸晉之徳只非歸其尸盟也杜只語辭也尸主也言諸侯之所以歸晉以其有徳也非歸晉之能主盟也只之氏反子務徳無爭先且諸侯盟小國固必有尸盟者楚為晉細不亦可乎林諸侯為盟小國固必有尸盟主辨具者楚欲尸盟自同於小國任晉之細事不亦可從其請乎乃先楚人書先晉晉有信也杜葢孔子追正之壬午宋公兼享晉楚之大夫趙孟為客杜客一坐所尊故季孫飲大夫酒臧紇為客子木與之言弗能對使叔向侍言焉子木亦不能對也乙酉宋公及諸侯之大夫盟于蒙門之外杜前盟諸大夫不敢敵公禮也今宋公以近在其國故謙而重盟重盟故不書蒙門宋城門子木問於趙孟曰范武子之徳何如杜士㑹賢聞於諸侯故問之對曰夫子之家事治言於晉國無隠情其祝史陳信於鬼神無愧辭林夫子謂范武子身修家齊故事無不治所行之香事皆可告人故情無所隠祝大祝史大史陳其馨徳足副之故辭無所媿子木歸以語王王曰尚矣哉尚上也語魚據反下同能歆神人歆享也使神享其祭人懐其徳宜其光輔五君以為盟主也杜五君謂文襄靈成景子木又語王曰宜晉之伯也有叔冋以佐其卿楚無以當之不可與爭晉荀盈遂如楚涖盟重結晉楚之好鄭伯享趙孟于垂隴杜自宋還過鄭隴力勇反子展伯有子西子産子大叔二子石從杜二子石印叚公孫段從寸用反趙孟曰七子從君以寵武也請皆賦以卒君貺武亦以觀七子之志歌詩以言志故武亦以觀七子向皆之志子展賦草蟲杜草蟲詩召南曰未既見君子憂心忡忡亦見止木既覯止我心則降以趙孟為君子趙孟曰善哉民之主也在上不忘降故可以主民抑武也不足以當之杜辭君子伯有賦鶉之賁賁杜鶉之賁賁詩鄘風衛人刺其君淫亂鶉鵲之不若義取人之無良我以為兄我以為君也鶉順倫反貴音奔趙孟曰牀笫之言不踰閾况在野乎非使人之所得聞也杜笫簀也此詩刺淫亂故云牀笫之言閾門限使人趙孟自謂笫側里反閾音域徐况逼反使所吏反子西賦黍苖之四章杜黍苖詩小雅四章曰肅肅謝功召伯營之烈烈征師召伯成之比趙孟於召伯趙孟曰寡君在武何能焉推善於其君子産賦隰桑杜隰桑詩小雅義取思見君子盡心以事之曰既見君子其樂如何趙孟曰武請受其卒章卒章曰心乎愛矣遐不謂矣中心藏之何日忘之趙武欲子産之見規誨子大叔賦野有蔓草杜野有蔓草詩鄭風取其邂逅相遇適我願兮蔓音萬趙孟曰吾子之惠也大叔喜於相遇故趙孟受其惠印段賦蟋蟀杜蟋蟀詩唐風曰無以大康職思其居好樂無荒良士瞿瞿言瞿瞿然顧禮儀蟀所律反趙孟曰善哉保家之主也吾有望矣能戒懼不荒所以保家公孫段賦桑扈杜桑扈詩小雅義取君子有禮文故能受天之祜趙孟曰匪交匪敖福將焉往杜此桑扈詩卒章趙孟因以取義敖五報反焉於䖍反下同若保是言也欲辭福禄得乎卒享文子告叔向曰伯有將為戮矣詩以言志志誣其上而公怨之以為賔榮杜言誣則鄭伯未有其實趙孟倡賦詩以自寵故言公怨之以為賔榮林伯有之詩譏刺鄭故公怨之其能久乎幸而後亡言必先亡叔向曰然已侈林伯有汰侈已甚所謂不及五稔者夫子之謂矣林稔年豐熟也榖一熟故謂一年夫子謂伯有杜為三十年鄭殺良霄傳稔而甚反文子曰其餘皆數世之主也子展其後亡者也在上不忘降謂賦草蟲曰我心則降數所主反印氏其次也樂而不荒謂賦蟋蟀曰好樂無荒樂以安民林樂與民同故民得其安不滛以使之林不淫縱其欲以虐使之後亡不亦可乎宋左師請賞曰請免死之邑杜欲宋君稱功加厚賞故謙言免死之邑也公與之邑六十林此亦非四井之邑説與上文與免餘邑六十同以示子罕林以賞典示宋子罕子罕曰凡諸侯小國晉楚所以兵威之畏而後上下慈和慈和而後能安靖其國家以事大國所以存也無威則驕驕則亂生亂生必滅所以亡也林有所畏懼而後大小上下慈愛而和順慈愛和順而後國家賴以安靖以聽大國之政令此大小所以常安存也無威則驕縱易生驕縱則禍亂則滅亡隨之此大小所以至滅亡也天生五材杜金木水火土也民並用之廢一不可誰能去兵兵之設久矣所以威不軌而昭文徳也聖人以興杜謂湯武亂人以廢杜謂桀紂廢興存亡昏明之術皆兵之由也而子求去之不亦誣乎以誣道蔽諸侯林以誣罔之道欺蔽諸侯罪莫大焉縱無大討而又求賞無厭之甚也削而投之杜削賞左師之書厭於鹽反徐於亷反左師辭邑向氏欲攻司城杜司城子罕左師曰我將亡夫子存我林言我邑多將有滅亡之禍子罕責我以義是存我也徳莫大焉又可攻乎君子曰彼已之子邦之司直杜詩鄭風司主也彼已之子此子也言其為邦國主直道者已音記樂喜之謂乎杜樂喜子罕也善其不阿向戌何以恤我我其收之杜逸詩恤憂也收取也林言何以憂恤而規儆於我我則收取此言以為藥石向戌之謂乎杜善向戌能知其過齊崔杼生成及疆林崔杼先取妻生子曰成曰疆而寡杜偏䘮曰寡寡持也娶東郭姜林事在二十五年生明東郭姜以孤入林無父曰孤葢東郭姜以先夫之子自隨曰棠無咎無咎棠公之子與東郭偃相崔氏林偃東郭姜之弟葢崔杼既取姜遂以姜弟及前夫之子為家相相息亮反崔成有疾而廢之杜有惡疾也而立明成請老于崔杜濟南東朝陽縣西北有崔氏城成欲居崔邑以終老崔子許之偃與無咎弗子曰崔宗邑也必在宗主杜宗邑宗廟所在宗主謂崔明成與疆怒將殺之林成不得邑疆成之親母弟故與俱怒將殺偃與無咎告慶封曰夫子之身亦子所知也唯無咎與偃是從父兄莫得進矣大恐害夫子敢以告杜夫子謂崔杼林言其身事亦慶封之所素知也崔杼平日唯棠無咎與東郭偃之言是從凡崔氏諸父諸兄皆莫得進用矣大恐貽害於崔杼之身崔慶同功一體故敢以此告之慶封曰子姑退吾圖之告盧蒲嫳嫳慶封屬大夫封以成疆之言告嫳嫳普結反徐敷結反盧蒲嫳曰彼君之讐也天或者將棄彼矣彼實家亂子何病焉杜君謂齊莊公為崔杼所弑林彼謂崔杼實其家有難將何以彼為病崔之薄慶之厚也杜崔敗則慶専權他日又告杜成疆復告慶封曰苟利夫子必去之難吾助女林言苟有利於崔氏必去偃與無咎若有他難我助汝去之難力旦反女音汝九月庚辰崔成崔疆殺東郭偃棠無咎於崔氏之朝崔子怒而出其衆皆逃求人使駕不得使圉人駕寺人御而出圉人養馬者寺人奄士且曰崔氏有福止余猶可恐滅家禍不止其身遂見慶封慶封曰崔慶一也杜言如一家是何敢然言是崔成崔疆何故敢如此請為子討之使盧蒲嫳帥甲以攻崔氏崔氏堞其宮而守之林堞短垣使其衆居短垣内以守為于偽反下同堞音牒徐養渉反弗克使國人助之遂滅崔氏殺成與疆而盡俘其家其妻縊杜妻東郭姜嫳復命於崔子且御而歸之嫳為崔子御至則無歸矣乃縊終入於其宫不見其妻凶崔明夜辟諸大墓林辟開也開先人之冢以藏之辟婢亦反徐甫亦反辛巳崔明來奔慶封當國杜當國秉政楚薳罷如晉涖盟杜罷令尹子蕩報荀盈也罷音皮晉侯享之將出賦既醉杜既醉詩大雅曰既醉以酒既飽以徳君子萬年介爾景福以羙晉侯比之太平君子也叔向曰薳氏之有後於楚國也宜哉承君命不忘敏子蕩將知政矣敏以事君必能養民林敏逹以事其君必能為君牧養其民政其焉往言政必歸之崔氏之亂杜在二十五年申鮮虞來奔僕賃於野林申鮮虞莊公之黨來奔魯貧無資為人僕賃於魯之野賃女鴆反以䘮莊公為齊莊公服䘮䘮如字又思浪反冬楚人召之遂如楚為右尹傳言楚能用賢十一月乙亥朔日有食之辰在申司厯過也再失閏矣謂斗建指申周十一月今之九月斗當建戍而在申故知再失閏也文十一年三月甲子至今年七十一歳應有二十六閏今長厯推得二十四閠通計少再閠釋例言之詳矣左傳杜林合注卷三十一
