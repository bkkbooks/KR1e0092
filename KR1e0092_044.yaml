body:
  text: 左傳杜林合注卷四十四明王道焜趙如源同編定公一公名宋襄公之子昭公之弟諡法安民大慮曰定周敬王十一年鄭獻公五年魯定公九年獻公卒子聲公勝立齊景公三十九年宋景公八年晉定公三年晉魏舒為政是年卒范鞅為政定十四年晉逐范中行氏趙鞅歸于晉自是晉知氏韓氏魏氏趙氏並彊分晉之勢成矣衛靈公二十六年蔡昭侯十年曹隱公元年魯定公四年聲公弟露弒隱公代立是為靖公定八年靖公卒子伯陽立滕頃公五年陳惠公二十一年魯定公四年悼公卒子懷公栁立定八年懷公卒子閔公越立杞悼公九年魯定公四年悼公卒子隱公乞立是年七月隱公弟遇弒隱公自立是為僖公薛襄公二年魯定公十二年襄公卒比立定十三年比弒惠公夷立又名寅莒郊公邾莊公三十三年魯定公三年莊公卒隱公益立許許男斯十四年魯定公六年鄭滅許以斯歸元公成立小邾詳見昭公元年楚昭王七年魯定公四年吳入楚楚令尹子常奔鄭昭王復國子西為令尹秦哀公二十八年魯定公九年哀公卒孫惠公立吳闔廬六年魯定公四年吳入楚於越入吳定十四年於越敗吳於檇李闔廬傷而卒子夫差立越允常魯定公四年越入吳定十四年允常卒勾踐立吳闔廬聞允常死吳師伐越越勾踐襲敗吳于檇李射殺闔廬經壬辰元年春王公之始年而不書正月公即位在六月故三月晉人執宋仲幾于京師杜晉執人于天子之側而不以歸京師故但書其執不書所歸林大夫専執於是始幾音機夏六月癸亥公之喪至自乾侯告於廟故書至戊辰公即位定公不得以正月即位失其時故詳而日之記事之宜無義例秋七月癸巳葬我君昭公公在外薨故八月乃葬九月大雩無傳過也立煬宫杜煬公伯禽子也其廟已毁季氏禱之而立其宫書以譏之煬羊讓反冬十月隕霜殺菽無傳周十月今八月隕霜殺菽非常之災傳元年春王正月辛巳晉魏舒合諸侯之大夫于狄泉林狄泉在王城東將以城成周魏子涖政涖臨也代天子大夫為政衛彪傒衛大夫曰將建天子杜立天子之居而易位以令非義也林以晉大夫代周大夫為政是易位以號令諸侯大事奸義必有大咎晉不失諸侯魏子其不免乎是行也魏獻子屬役於韓簡子及原夀過杜簡子韓起孫不信也原夀過周大夫林屬役以役事記之也奸音干屬之欲反過古禾反而田於大陸焚焉杜禹貢大陸在巨鹿北嫌絶逺疑此田在汲郡吳澤荒蕪之地火田并見燒也爾雅廣平曰陸還卒於寧寧今修武縣近吳澤范獻子去其柏椁以其未復命而田也杜范獻子代魏子為政去其柏椁示貶之孟懿子㑹城成周杜不書公未即位林孟懿子即仲孫何忌庚寅栽栽設版築栽才代反又音再宋仲幾不受功曰滕薛郳吾役也杜欲使三國代宋受功役也林郳即小邾舊號郳五兮反薛宰曰宋為無道絶我小國於周以我適楚林絶我小國使不得自通於天子以我服事蠻夷之楚故我常從宋晉文公為踐土之盟在僖二十八年曰凡我同盟各復舊職若從踐土若從宋亦唯命林若從踐土復舊職以役於天子若從宋共舊職以役於諸侯惟晉所以命之仲幾曰踐土固然杜固曰從舊薛舊為宋役薛宰曰薛之皇祖奚仲居薛以為夏車正杜皇大也奚仲為夏禹掌車服大夫奚仲遷于邳杜邳下邳縣邳皮悲反仲虺居薛以為湯左相仲虺奚仲之後虺許鬼反相息亮反若復舊職將承王官何故以役諸侯杜承奉也林若如踐土之言復其舊職當如奚仲仲虺奉天子為王官何故舍天子從宋諸侯之服役仲幾曰三代各異物薛焉得有舊杜言居周世不得以夏殷為舊焉於䖍反為宋役亦其職也士彌牟曰晉之從政者新言范獻子新為政未習故事子姑受功子謂仲幾歸吾視諸故府杜求故事仲幾曰縱子忘之子謂士彌牟山川鬼神其忘諸乎杜山川鬼神盟所告士伯怒謂韓簡子曰薛徵於人杜典籍故事人所知也宋徵於鬼杜取證於鬼神宋罪大矣且已無辭而抑我以神誣我也啓寵納侮其此之謂矣林開寵過分則納受侵侮商書說命有此言今仲幾侮晉正合此義必以仲幾為戮乃執仲幾以歸三月歸諸京師杜知以歸不可故復歸之京師城三旬而畢乃歸諸侯之戍林先是昭二十七年晉籍秦致諸侯之戍于是至是歸之齊高張後不從諸侯杜後期不及諸侯之役晉女叔寬曰周萇𢎞齊高張皆將不免杜叔寬女寬也萇直良反萇叔違天高子違人杜天既厭周德萇𢎞欲遷都以延其祚故曰違天諸侯相帥以崇天子而高子後期故曰違人天之所壞不可支也衆之所為不可奸也為哀三年周人殺萇𢎞六年高張來奔起夏叔孫成子逆公之喪于乾侯杜成子叔孫婼之子季孫曰子家子亟言于我未嘗不中吾志也吾欲與之從政子必止之且聽命焉林言子家羈屢諌昭公言我之事其所言皆與我志合我欲用之使助為政子謂叔孫必留子家子勿聽其去諸臣之去留皆咨問於子家子聽從其命令亟起冀反中丁仲反子家子不見叔孫易幾而哭幾哭㑹也不欲見叔孫故朝夕哭不同㑹叔孫請見子家子子家子辭曰羈未得見而從君以出杜出時成子未為卿羈居宜反見賢遍反從才用反下同君不命而薨羈不敢見杜言未受昭公之命託辭以距叔孫叔孫使告之曰公衍公為實使羣臣不得事君二子始謀逐季氏若公子宋主社稷則羣臣之願也杜宋昭公弟定公凡從君出而可以入者將唯子是聽子家氏未有後季孫願與子從政此皆季孫之願也使不敢以告不敢叔孫成子名對曰若立君則有卿士大夫與守龜在羈弗敢知若從君者則貌而出者入可也貌出謂以義從公與季氏無實怨守手又反寇而出者行可也杜與季氏為寇讐者自可去若羈也則君知其出也杜君昭公而未知其入也羈將逃也喪及壞隤公子宋先入從公者皆自壞隤反杜出奔壞音懷又户怪反隤徒回反六月癸亥公之喪至自乾侯戊辰公即位杜諳侯薨五日而殯殯則嗣子即位癸亥昭公喪至五日殯於宫定公乃即位季孫使役如闞公氏將溝焉杜闞魯羣公墓所在也季孫惡昭公欲溝絶其兆域不使與先君同林公氏猶言公之墓宅榮駕鵝曰生不能事死又離之以自旌也杜駕鵝魯大夫榮成伯也旌章也林以自章其逐君之惡駕音加鵝五何反縱子忍之後必或恥之林後世子孫必恥其惡乃止季孫問於榮駕鵝曰吾欲為君諡使子孫知之杜為惡諡對曰生弗能事死又惡之以自信也將焉用之乃止林信明也以自明其不臣之迹惡如字又烏路反焉十䖍反秋七月癸巳葬昭公於墓道南林雖不為溝猶别葬于先君墓道之外孔子之為司寇也林在定公十年後溝而合諸墓林自昭公墓外為溝使與先君墓合明臣無貶君之義昭公出故季平子禱于煬公九月立煬宫杜平子逐君懼而請禱於煬公昭公死於外自以為獲福故立其宫周鞏簡公棄其子弟而好用逺人杜簡公周卿士逺人異族也為明年鞏氏賊簡公張本好呼報反經癸巳二年春王正月夏五月壬辰雉門及兩觀災無傳雉門公宫之南門兩觀闕也天火曰災觀古亂反下同秋楚人伐吳杜囊瓦稱人見誘以敗軍冬十月新作雉門及兩觀無傳傳二年夏四月辛酉鞏氏之羣子弟賊簡公傳言棄親用疏所以敗也桐叛楚林桐小國廬江舒縣西南有桐鄉吳子使舒鳩氏誘楚人社舒鳩楚屬國曰以師臨我教舒鳩誘楚使以師臨吳我伐桐為我使之無忌吳伐桐也僞若畏楚師之臨已而為伐其叛國以取媚者也欲使楚不忌吳所謂多方以誤之為于僞反下同秋楚囊瓦伐吳師于豫章從舒鳩言吳人見舟于豫章僞將為楚伐桐見賢遍反而潛師于巢杜實欲以擊楚冬十月吳軍楚師于豫章敗之林吳出不意攻楚師于豫章楚不忌吳故敗遂圍巢克之獲楚公子繁杜繁守巢大夫邾莊公與夷射姑飲酒私出林射姑邾大夫出辟酒射音亦又音夜閽乞肉焉奪之杖以敲之杜奪閽杖以敲閽頭也為明年邾子卒傳敲苦孝反又苦學反經甲午三年春王正月公如晉至河乃復無傳二月辛卯邾子穿卒杜再同盟莊公卒子隱公乞立夏四月秋葬邾莊公六月乃葬緩冬仲孫何忌及邾子盟于拔拔地闕拔皮入反傳三年春二月辛卯邾子在門臺門上有臺臨廷閽以瓶水沃廷邾子望見之怒閽曰夷射姑旋焉杜旋小便命執之見其不潔執射姑弗得滋怒自投于牀廢于爐炭爛遂卒廢墮也先葬以車五乘殉五人杜欲藏中之潔故先內車及殉别為便房蓋其遺命先悉薦反又如字乘繩證反莊公卞急而好潔故及是卞躁疾也好呼報反下同秋九月鮮虞人敗晉師于平中平中晉地獲晉觀虎恃其勇也林觀虎恃勇故獲為五年士鞅圍鮮虞張本冬盟于郯杜郯即拔也郯音談修邾好也杜公即位故修好蔡昭侯為兩佩與兩裘佩佩玉也以如楚獻一佩一裘於昭王昭王服之以享蔡侯蔡侯亦服其一子常欲之弗與三年止之唐成公如楚有兩肅爽馬子常欲之成公唐惠侯之後肅爽駿馬名肅如字人所六反爽音霜弗與亦三年止之唐人或相與謀請代先從者許之飲先從者酒林僞若受代而飲先從人以酒從才用反飲於鴆反醉之竊馬而獻之子常子常歸唐侯自拘於司敗杜竊馬者自拘曰君以弄馬之故隱君身杜隱憂約也棄國家羣臣請相夫人以償馬必如之杜相助也夫人謂養馬者林言請相助養馬者養馬以償君必有駿馬如肅爽者相息亮反夫音扶唐侯曰寡人之過也二三子無辱皆賞之蔡人聞之固請而獻佩于子常林不言裘承上文子常朝見蔡侯之徒命有司曰蔡君之久也官不共也杜言楚所以禮遣蔡侯之物不共備故共音恭明日禮不畢杜遣蔡侯之禮將死林將坐以死罪蔡侯歸及漢執玉而沈曰余所有濟漢而南者有若大川杜自誓言若復渡漢當受禍明如大川沈音鳩蔡侯如晉以其子元與其大夫之子為質焉而請伐楚杜為明年㑹召陵張本質音致經乙未四年春王二月癸巳陳侯吳卒杜無傳未同盟而赴以名癸巳正月七日書二月從赴林惠公卒子懷公栁立三月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚杜於召陵先行㑹禮入楚竟故書侵林晉楚國交止此傳曰劉文公合諸侯至平丘而止則是役劉子為之也劉文定內難復辟于周而楚納子朝於是合十有六國之師伐楚雖五伯未有盛於此者也以周之不競而能合諸侯盛於五伯俄而劉子卒君子蓋深悲之也夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之姓音生又作生五月公及諸侯盟于臯鼬杜召陵㑹劉子諸侯總言之也繁昌縣東南有城臯亭復稱公者㑹盟異處故林有晉侯在何以書公及諸侯盟非晉主盟也公㑹諸侯盟于薄公㑹諸侯盟于宋皆後至之文也非後至也而曰公及諸侯盟則以魯主之也是故書及劉卷卒諸侯無㑹同於是有特相盟者矣鼬由又反杞伯成卒于㑹無傳六月葬陳惠公無傳許遷于容城無傳秋七月公至自㑹無傳劉卷卒杜無傳即劉蚠也劉子奉命出盟召陵死則天王為告同盟故不具爵林王卿士不卒有關於天下之故則卒之於襄王之難有王子虎焉於敬王之難有劉卷焉君子曰王室其庶幾乎而無救於周室故特卒之也司馬遷蓋知此者也於諸國世家多卒孔子知此者也卷音權又眷勉反葬杞悼公無傳楚人圍蔡不服故也晉士鞅衛孔圉帥師伐鮮虞杜無傳孔圉孔羈孫士鞅即范鞅葬劉文公無傳冬十有一月庚午蔡侯以吳子及楚人戰于柏舉楚師敗績杜師能左右之曰以皆陳曰戰大崩曰敗績吳為蔡討楚從蔡計謀故書蔡侯以吳子言能左右之也囊瓦稱人貪以致敗不能死難罪賤之柏舉楚地昭三十一年傳曰六年十二月庚辰吳其入郢今以十一月者并數閏林於是晉辭蔡侯天下諸侯無與憂蔡者而訴之吳吳子興師以伐楚是則夷狄憂中國也是故吳始稱子書戰書伐書敗績皆進吳而楚囊瓦敗稱人楚囊瓦出奔鄭杜書名惡之庚辰吳入郢杜弗地曰入吳不稱子史略文林郢楚都也入國不言邑入楚也而曰入郢非得國之辭也前曰吳子今曰吳復從其舊號也㑹黃池書吳而已傳四年春正月劉文公合諸侯于召陵謀伐楚也杜文公王官伯也晉人假王命以討楚之久留蔡侯故曰文公合諸侯晉荀寅求貨於蔡侯林荀寅荀吳之子弗得言於范獻子曰國家方危諸侯方二將以襲敵不亦難乎水潦方降疾瘧方起林春雨正時故多水潦寒燠不常故多疾疫中山不服杜中山鮮虞棄盟取怨無損於楚杜晉楚同盟伐之為取怨而失中山不如辭蔡侯吾自方城以來楚未可以得志晉敗楚侵方城在襄十六年祗取勤焉林適以自取勤勞之辱祗音支乃辭蔡侯晉人假羽旄於鄭鄭人與之杜析羽為旌王者遊車之所建鄭私有之因謂之羽旄借觀之明日或斾以㑹杜或賤者也繼旐曰斾令賤人施其斾執以從㑹示卑鄭晉於是乎失諸侯傳言晉無禮所以遂弱將㑹衛子行敬子言于靈公子行敬子衛大夫曰㑹同難難得宜嘖有煩言莫之治也林嘖至也至有忿爭之煩言恐莫之能治嘖仕責反一音責其使祝他從杜祝他大祝子魚他徒河反從才用反下同公曰善乃使子魚子魚辭曰臣展四體以率舊職猶懼不給而煩刑書若又共二徼大罪也林言臣展布四肢之力以率循大祝之舊職猶恐不能供給得罪以煩瀆於刑書若又使供二職是自要求其大罪也共音恭下同且夫祝社稷之常𨽻也杜𨽻賤臣也夫音扶社稷不動祝不出竟官之制也社稷動謂國遷竟音境下同君以軍行祓社釁鼓杜師出先有事祓禱於社謂之宜社於是殺牲以血塗鼓鼙為釁鼓祓音弗徐音廢祝奉以從杜奉社主也從如字又才用反於是乎出竟若嘉好之事杜謂朝㑹好呼報反君行師從卿行旅從林二千五百人為師五百人為旅臣無事焉杜言臣無與於從行之制公曰行也及臯鼬將盟將長蔡於衛欲令蔡先衛歃長丁丈反衛侯使祝他私於萇𢎞曰聞諸道路不知信否若聞蔡將先衛信乎萇𢎞曰信蔡叔康叔之兄也杜蔡叔周公兄康叔周公弟先衛不亦可乎子魚曰以先王觀之則尚德也昔武王克商成王定之選建明德以藩屏周故周公相王室以尹天下杜尹正也相息亮反於周為睦杜睦親厚也以盛德見親厚分魯公以大路大旗魯公伯禽也此大路金路錫同姓諸侯車也交龍為旗周禮同姓以封分扶問反下並同夏后氏之璜璜美玉名璜音黃封父之繁弱封父古諸侯也繁弱大弓名父音甫下同繁扶元反殷氏六族林殷之遺民凡六族條氏徐氏蕭氏索氏長勺氏尾勺氏使帥其宗氏輯其分族將其類醜杜醜衆也林使帥領其同宗之親輯睦其分族之屬將帥其同類之衆索素各反下同勺市灼反下同輯音集又七吉反以法則周公用即命于周杜即就也使六族就周受周公之法制是使之職事于魯共魯公之職事以昭周公之明德杜昭顯也分之土田陪敦杜陪增也敦厚也分封魯為大國土田增厚凡七百里陪步回反祝宗卜史大祝宗人大卜大史凡四官備物典䇿典策春秋之制官司彛器杜官司百官也彛器常用器因商奄之民商奄國名也與四國流言或迸散在魯皆令即屬魯懷柔之命以伯禽伯禽周公世子時周公唯遣伯禽之國故皆以付伯禽而封於少皥之虛少皥虛曲阜也在魯城內少詩照反虛起居反下皆同分康叔康叔衛之祖以大路少帛綪茷旃旌少帛雜帛也綪茷大赤取染草名也通帛為旃析羽為旌綪七見反茷步貝反又音吠大吕鐘名殷民七族林殷之遺民凡七族陶氏施氏繁氏錡氏樊氏饑氏終葵氏封畛土略自武父以南及圃田之北竟畛塗所徑也略界也武父衛北界圃田鄭藪名繁步何反錡魚綺反畛之忍反一音真取於有閻之土以共王職杜有閻衛所受朝宿邑蓋近京畿林取其土地之入以供王室之職貢也取於相土之東都以㑹王之東搜杜為湯沐邑王東巡守以助祭泰山相息亮反𥅆季授土杜𥅆季周公弟司空𥅆乃甘反陶叔授民杜陶叔司徒命以康誥而封於殷虛杜康誥周書殷虛朝歌也林成王封康叔周公懼其幼弱作康誥以命之皆啓以商政疆以周索杜皆魯衛也啓開也居殷故地因其風俗開用其政疆理土地以周法索法也疆居良反下同分唐叔唐叔晉之祖以大路密須之鼓林密須國名昔周文王伐密須獲其大鼓闕鞏甲名姑洗鐘名洗息典反懷姓九宗職官五正杜懷姓唐之餘民九宗一姓為九族職官五正五官之長林杜云五官之長則謂五官之長子孫耳典禮云天子之五官曰司徒司馬司空司土司寇鄭𤣥云此殷時制也然則殷時五官居在唐地世為貴族以賜唐叔使主領之所以榮寵唐叔也或以為懷姓之內立五正使分主九宗未知誰是命以唐誥而封於殷虛杜唐誥誥命篇名也夏虛大夏今大原晉陽也啓以夏政亦因夏風俗開用其政疆以戎索杜大原近戎而寒不與中國同故自以戎法三者皆叔也林周公康叔成王叔父唐叔康王叔父故曰皆叔而有令德故昭之以分物不然文武成康之伯猶多而不獲是分也唯不尚年也管蔡啓商惎間王室杜惎毒也周公攝政管叔蔡叔開道紂子祿父以毒亂王室惎音忌間間厠之間王於是乎殺管叔而蔡蔡叔杜周公稱王命以討二叔蔡放也蔡蔡叔上素達反下如字以車七乘徒七十人林尚書四蔡叔于郭鄰以車七乘杜與蔡叔車徒而放之乘繩證反其子蔡仲改行帥德周公舉之以為已卿士為周公臣行卜孟反見諸王而命之以蔡杜命為蔡侯見賢遍反其命書云林尚書蔡仲之命王曰胡胡蔡仲名無若爾考之違王命也林生曰父死曰考若之何其使蔡先衛也林言康叔之明德如此蔡仲之惎間如彼何可使蔡先衛武王之母弟八人周公為大宰康叔為司寇聃季為司空五叔無官豈尚年哉五叔管叔鮮蔡叔度成叔武霍叔處毛叔聃也曹文之昭也文王子與周公異母昭上饒反說文作紹晉武之穆也武王子曹為伯甸非尚年也林曹伯以伯爵居甸服言小於晉文昭國反小武穆國反大故知非尚年也今將尚之林今將以蔡叔為兄而先康叔是反先王也晉文公為踐土之盟衛成公不在林僖二十八年衛成公時奔楚不在於㑹夷叔林即衛叔武其母弟也猶先蔡踐土召陵二㑹經書蔡在衛上霸主以國大小之序也子魚所言盟歃之次其載書云王若曰林時王子虎盟諸侯故稱王命晉重文公重直龍反魯申僖公衛武叔武蔡甲午莊侯鄭捷文公齊潘昭公宋王臣成公王或作壬如林反莒期杜兹㔻公也齊序鄭下周之宗盟異姓為後藏在周府可覆視也吾子欲復文武之略林略道也吾子謂萇𢎞覆芳服反而不正其德將如之何萇𢎞說告劉子與范獻子謀之乃長衛侯於盟反自召陵鄭子大叔未至而卒晉趙簡子為之臨甚哀曰黃父之㑹在昭二十五年說音悅為于僞反下同臨力鴆反父音甫夫子語我九言杜夫子謂子大叔語魚據反曰無始亂林無為禍首無怙富無恃寵林富而好禮寵而不驕無違同無敖禮林以欲從人執禮無失敖五報反無驕能杜以能驕人無復怒林復重也不重人之怒無謀非德無犯非義林不德之事非所謀也不義之事非所為也傳言簡子能用善言所以遂興沈人不㑹于召陵晉人使蔡伐之夏蔡滅沈秋楚為沈故圍蔡伍員為吳行人以謀楚楚之殺卻宛也在昭二十七年員音云伯氏之族出杜卻宛黨伯州犂之孫嚭為吳大宰以謀楚楚自昭王即位林在魯昭公二十六年犂力兮反嚭普鄙反無嵗不有吳師林自闔廬立始為三軍以肄楚蔡侯因之以其子乾與其大夫之子為質於吳冬蔡侯吳子唐侯伐楚唐侯不書兵屬於吳蔡乾其連反質音致舍舟于淮汭杜吳乘舟從淮來過蔡而舍之舍音赦置也又音捨棄也自豫章與楚夾漢林豫章漢東江北地名吳自此與楚人夾漢水而軍左司馬戍謂子常曰子㳂漢而與之上下杜㳂緣也緣漢上下遮使勿渡我悉方城外以毁其舟杜以方城外人毁吳所舍舟還塞大隧直轅冥厄三者漢東之隘道冥亡丁反或作置之鼓反厄於懈反子濟漢而伐之我自後擊之必大敗之既謀而行武城黑謂子常黑楚武城大夫曰吳用木也我用革也不可久也林吳用木為兵椎鈍我用革為兵犀利不必久與相持不如速戰史皇謂子常楚人惡子而好司馬杜史皇楚大夫司馬沈尹戍惡烏路反好呼報反若司馬毁吳舟于淮塞城口而入杜城口三隘道之總名是獨克吳也子必速戰不然不免乃濟漢而陳自小别至于大别禹貢漢水至大别南入江然則此二别在江夏界陳直覲反下同三戰子常知不可欲奔知吳不可勝史皇曰安求其事難而逃之將何所入林楚國安寧則求知其政事有難則逃避以求免將入何國以安其身難乃旦反子必死之初罪必盡說言致死以克吳可以免貪賄致寇之罪十一月庚午二師陳于柏舉杜經所以書戰二師吳楚師闔廬之弟夫槩王晨請於闔廬曰楚瓦不仁杜瓦子常名其臣莫有死志林君之視臣如犬馬則臣視君如國人故無死戰之志先伐之其卒必奔而後大師繼之必克弗許夫槩王曰所謂臣義而行不待命者其此之謂也今日我死楚可入也林言古書所謂人臣之道見義則為有不待君命者今日之事正合此語若我致死必可乘勝以入楚國以其屬五千先擊子常之卒子常之卒奔楚師亂吳師大敗之子常奔鄭史皇以其乘廣死杜以戰死乘繩證反廣古曠反吳從楚師及清發清發水名將擊之夫槩王曰困獸猶鬭况人手若知不免而致死必敗我若使先濟者知免後者慕之蔑有鬭心矣半濟而後可擊也從之又敗之楚人為食吳人及之奔食而從之敗諸雍澨五戰及郢林楚師將為食吳人追而及之楚師奔走不暇食故吳人食其食而又從之杜奔食食者走不陳故不在戰數澨市制反己卯楚子取其妹季芊畀我以出林世族譜季芊畀我皆平王女也服云畀我季芊之字未知孰是芊面爾反楚姓涉雎杜睢水出新城昌魏縣東南至枝江縣入江是楚王西走睢七餘反下同針尹固與王同舟王使執燧象以奔吳師杜燒火燧繫象尾使赴吳師驚却之針之林反庚辰吳入郢以班處宫以尊卑班次處楚王宫室子山處令尹之宫子山吳王子夫槩王欲攻之林夫槩王子山叔父怒其軋已欲攻之懼而去之夫槩王入之杜入令尹宫也言吳無禮所以不能遂克左司馬戍及息而還杜息汝南新息也聞楚敗故還敗吳師于雍澨傷杜司馬先敗吳師而身被創初司馬臣闔廬故恥為禽焉杜司馬嘗在吳為闔廬臣是以今恥于見禽謂其臣曰誰能免吾首吳句卑曰臣賤可乎林言我若戰死誰能取我首以免句卑吳人為司馬臣言我賤人也可用乎句古侯反司馬曰我實失子可哉杜失不知子賢三戰皆傷曰吾不可用也已句卑布裳剄而裹之司馬已死剄取其首頸古頂反藏其身而以其首免杜傳言司馬之忠壯楚子涉睢濟江入于雲中入雲夢澤中所謂江南之夢夢如字又音蒙王寢盜攻之以戈擊王王孫由于以背受之中肩王奔鄖鍾建負季芊以從鍾建楚大夫巾丁仲反鄖音云從才用反下同又如字由于徐蘇而從杜以背受戈故當時悶絶鄖公辛之弟懷將弒王曰平王殺吾父我殺其子不亦可乎辛蔓成然之子鬬辛也昭十四年楚平王殺成然辛曰君討臣誰敢讐之君命天也若死天命將誰讐詩曰柔亦不茹剛亦不吐不侮矜寡不畏彊禦唯仁者能之杜詩大雅言仲山甫不辟强陵弱茹音汝矜古頑反違彊陵弱非勇也乘人之約非仁也滅宗廢祀非孝也弒君罪應滅宗動無令名非知也必犯是余將殺女鬭辛與其弟巢以王奔隨吳人從之謂隨人曰周之子孫在漢川者楚實盡之天誘其衷致罰於楚而君又竄之竄匿也知音智女音汝周室何罪君若顧報周室施及寡人以奬天衷奬成也施以䜴反君之惠也漢陽之田君實有之楚子在公宫之北杜隨公宫也吳人在其南子期似王子期昭王兄公子結也逃王而已為王曰以我與之王必免隨人卜與之不吉乃辭吳曰以隨之辟小而密邇於楚楚實存之世有盟誓至於今未改若難而棄之何以事君執事之患不唯一人杜一人楚王辟匹亦反難乃旦反若鳩楚竟敢不聽命吳人乃退鳩安集也竟音境爐金初宦於子期氏實與隨人要言要言無以楚王與吳并欲脫子期爐本又作鑢王使見王喜其意欲引見之以比王臣且欲使盟隨人見賢遍反辭曰不敢以約為利此約謂要言也此一時之事非為德舉故辭不敢見亦不肯為盟主約如字又於妙反王割子期之心以與隨人盟杜當心前割取血以盟示其至心初伍員與申包胥友包胥楚大夫其亡也杜伍員出奔吳在昭二十年謂申包胥曰我必復楚國復報也申包胥曰勉之子能復之我必能興之及昭王在隨申包胥如秦乞師曰吳為封豕長蛇以荐食上國杜荐數也言吳貪害如蛇豕荐在薦反虐始於楚寡君失守社稷越在草莽使下臣告急曰夷德無厭若鄰於君疆埸之患也林吳有楚則與春鄰厭於鹽反疆居良反埸音亦逮吳之未定君其取分焉杜與吳共分楚地分抉問反若楚之遂亡君之土也若以君靈撫之世以事君杜撫存恤也秦伯使辭焉曰寡人聞命矣子姑就館將圖而告對曰寡君越在草莽未獲所伏伏猶處也下臣何敢即安立依於庭牆而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣杜詩秦風取其王于興師修我戈矛與子同仇與子偕作與子偕行勺市灼反又音灼為于僞反九頓首而坐杜無衣三章章三頓首秦師乃出為明年包胥以秦師至張本左傳杜林合注卷四十四
