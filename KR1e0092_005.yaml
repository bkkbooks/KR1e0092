body:
  text: 左傳杜林合注卷五明王道焜趙如源同編莊公一公名同桓公之子母文姜謚法勝敵堯亂曰莊周莊王四年魯莊公十二年莊王崩子僖王立莊十七年僖王崩孫惠王立鄭子儀元年魯莊公十四年鄭傳瑕殺子儀而納厲公莊二十一年厲公卒子文公捷立齊襄公五年魯莊公八年襄公弑莊九年齊桓公小白入于齊是年齊管仲為政宋莊公十八年魯莊公二年宋莊公卒子閔公捷立莊十二年閔公弑弟桓公御說立晉翼晉侯緡十四年侯緡之二十七年魯莊公之十六年也曲沃武公伐晉滅之曲沃武公二十三年魯莊公十六年滅晉侯緡周僖王命曲沃伯以一軍為晉侯始更號曰晉武公魯莊公十七年武公卒子獻公佹諸立衛惠公七年黔牟四年魯莊公六年齊納惠公放黔牟于周莊二十五年惠公卒子懿公赤立蔡哀侯二年魯莊公十年楚敗蔡師執哀侯以歸莊十九年哀侯卒于楚蔡人自立其子肸為繆侯曹莊公九年魯莊公二十三年曹莊公卒子僖公夷立魯莊公三十二年僖公卒子昭公班立滕詳見隱公元年陳魯莊公元年十月莊公林卒弟宣公杵臼立杞詳見隱公元年及僖公元年薛魯莊公三十一年薛伯卒邾魯莊公十六年邾子克卒即儀父也邾子瑣立莊公二十八年邾子瑣卒文公籧篨立許許叔入許五年即僖公四年許穆公新臣也小邾魯莊公五年郳犂來來朝詳見隱公元年楚武王四十八年魯莊公四年卒子文王熊貲立莊十九年文王卒子堵敖熊囏立莊二十二年熊惲弑兄堵敖代立是為楚成王史記以莊十八年為堵敖元年堵敖立五年遇弑楚成立十六年齊桓公以兵侵楚至陘莊公三十年楚子文為令尹秦詳見隱公元年吳詳見隱公元年越詳見隱公元年經戊子元年春王正月三月夫人孫于齊夫人莊公母也魯人責之故出奔内諱奔謂之孫猶孫讓而去孫本亦作遜音同傳同夏單伯送王姬杜無傳單伯天子卿也單采地伯爵也王將嫁女于齊既命魯為主故單伯送女不稱使也王姬不稱字以王為尊且别於内女也天子嫁女於諸侯使同姓諸侯主之不親昬尊卑不敵單音善秋築王姬之館于外公在諒闇慮齊侯當親迎不忍便以禮接於廟又不敢逆王命故築舍于外冬十月乙亥陳侯林卒杜無傳未同盟而赴以名林莊公卒子宣公杵臼立王使榮叔來錫桓公命杜無傳榮叔周大夫榮氏叔字錫賜也追命桓公褒稱其徳若昭七年王追命衛襄之比林此錫命之始桓弑君兄自立不請命而王追錫命故王不稱天王姬歸于齊無傳不書逆公不與接齊師遷紀郱鄑郚杜無傳齊欲滅紀故徙其三邑之民而取其地郱在東莞臨朐縣東南郚在朱虛縣東南北海都昌縣西有訾城林此遷邑之始郱蒲丁反鄑子斯反郚音吾傳元年春不稱即位文姜出故也文姜與桓俱行而桓為齊所殺故不敢還莊公父弑母出故不忍行即位之禮據文姜未還故傳稱文姜出也姜於是感公意而還不書不告廟三月夫人孫于齊不稱姜氏絶不為親禮也林文姜之義宜與齊絶而復奔齊故於其奔去姜氏絶不使之為親所以存兄弟夫婦之禮也秋築王姬之館于外為外禮也杜齊彊魯弱又委罪於彭生魯不能讐齊然喪制未闋故異其禮得禮之變林穀梁傳云築之外變之正也仇讐之人非所以接昏姻也衰麻非所以接弁冕也不使齊侯得與吾為禮也經己丑二年春王二月葬陳莊公杜無傳魯往會之故書例在昭六年夏公子慶父帥師伐於餘丘杜無傳於餘丘國名也莊公時年十五則慶父莊公庶兄秋七月齊王姬卒杜無傳魯為之主比之内女冬十有二月夫人姜氏㑹齊侯于禚杜夫人行不以禮故還皆不書不告廟也禚齊地禚諸若反乙酉宋公馮卒杜無傳再與桓同盟林莊公卒子閔公捷立馮皮冰反傳二年冬夫人姜氏會齊侯于禚書姦也杜文姜前與公俱如齊後懼而出奔至此始與齊好㑹㑹非夫人之事顯然書之傳曰書姦姦在夫人文姜比年出㑹其義皆同經庚寅三年春王正月溺㑹齊師伐衛杜溺魯大夫疾其專命而行故去氏溺乃狄反夏四月葬宋莊公無傳五月葬桓王秋紀季以􅈶入于齊杜季紀侯弟􅈶紀邑在齊國東安平縣齊欲滅紀故季以邑入齊為附庸先祀不廢社稷有奉故書字貴之􅈶戸圭反本亦作擕冬公次于滑杜滑鄭地在陳留襄邑縣西北傳例曰凡師過信為次兵未有所加所次則書之既書兵所加則不書其所次以事為宜非虚次林此書次之始滑乎入反又干入反傳三年春溺會齊師伐衛疾之也杜傳重明上例夏五月葬桓王緩也以桓十五年三月崩七年乃葬故曰緩秋紀季以􅈶入于齊紀於是乎始判判分也言分為附庸始於此冬公次于滑將會鄭伯謀紀故也鄭伯辭以難林鄭伯子儀也公將㑹鄭子儀謀紀國之難也時厲公在櫟故子儀辭以厲公之難難乃旦反凡師一宿為舍再宿為信過信為次杜為經書次例也舍宿不書輕也林君行師從卿行旅從言凡師通君臣之稱經辛卯四年春王二月夫人姜氏享齊侯于祝丘無傳享食也兩君相見之禮非夫人所用直書以見其失祝丘魯地三月紀伯姬卒杜無傳隱二年裂繻所逆者内女唯諸侯夫人卒葬皆書恩成於敵體夏齊侯陳侯鄭伯遇于垂杜無傳林自參以上非邦交之舊矣紀侯大去其國以國與季季奉社稷故不言滅不見迫逐故不言奔大去者不反之辭六月乙丑齊侯葬紀伯姬杜無傳紀季入􅈶為齊附庸而紀侯大去其國齊侯加禮初附以崇厚義故攝伯姬之喪而以紀國夫人禮葬之秋七月冬公及齊人狩于禚無傳公越竟與齊微者俱狩失禮可知狩首又反傳四年春王三月楚武王荆尸授師孑焉以伐隨杜尸陳也荆亦楚也更為楚陳兵之法楊雄方言孑者㦸也然則楚始於此參用㦸為陳孑吉熱反將齊入告夫人鄧曼曰余心蕩杜將授兵於廟故齊蕩動散也齊側皆反鄧曼歎曰王禄盡矣盈而蕩天之道也先君其知之矣故臨武事將發大命而蕩王心焉杜楚為小國辟陋在夷至此武王始起其衆僣號稱王陳兵授師志意盈滿臨齊而散故鄧曼以天地鬼神為懲應之符林言楚王享天之禄盡此矣志意盈滿而心始蕩散虧盈益謙此天道自然也楚之宗廟先君其知之矣按楚世家楚僣王號雖始於熊繹其後畏厲王暴虐又去其王號至魯桓公六年楚武王侵隨隨為楚往周請尊楚號不聽桓公八年楚熊通乃自立為武王至是年周召隨侯數以立楚為王楚怒以隨背已伐隨武王卒師中而兵罷則鄧曼之言蓋指楚武僣以為盈而知今日心蕩殆將死也若師徒無虧王薨於行國之福也杜王薨於行不死於敵王遂行卒於樠木之下林樠木木名果如鄧曼之言樠郎蕩反又莫昆武元二反令尹鬭祁莫敖屈重除道梁溠營軍臨隨隨人懼行成杜時秘王喪故為竒兵更開直道溠水在義陽厥縣西東南入鄖水梁橋也隨人不意其至故懼而行成林營軍築軍壘也營軍臨隨示將深溝高壘為持久計重直用反一音直容反溠高貴鄉公音側嫁反字林壯加反莫敖以王命入盟隨侯且請為會於漢汭而還林時秘王喪故屈重以王命入隨與隨侯盟請與隨為㑹于漢水之曲而歸示隨不疑杜汭内也謂漢西汭如銳反水曲曰汭濟漢而後發喪紀侯不能下齊以與紀季杜不能降屈事齊盡以國與季明季不叛下遐嫁反夏紀侯大去其國違齊難也杜違辟也林避齊之難故大去其國而不反也難乃旦反經壬辰五年春王正月夏夫人姜氏如齊師無傳書姦秋郳犂來來朝杜附庸國也東海昌慮縣東北有郳城犂來名郳五兮反後為小邾犂力兮反冬公會齊人宋人陳人蔡人伐衛傳五年秋郳犂來來朝名未王命也未受爵命為諸侯傳發附庸稱名例也其後數從齊桓以尊周室王命以為小邾子冬伐衛納惠公也惠公朔也桓十六年出奔齊經癸巳六年春王正月王人子突救衛杜王人王之㣲官也雖官卑而見授以大事故稱人而又稱字林書救始此自救衛無功而後王命益不行於天下夏六月衛侯朔入于衛杜朔為諸侯所納不稱歸而以國逆為文朔懼失衆心以國逆告也歸入例在成十八年秋公至自伐衛無傳告於廟也螟無傳為災螟亡丁反冬齊人來歸衛俘杜公羊穀梁經傳皆言衛寶此傳亦言寶唯此經言俘疑經誤俘囚也俘芳夫反傳六年春王人救衛夏衛侯入林諸侯抗王師而納惠公也放公子黔牟于周放甯跪于秦殺左公子洩右公子職杜寗跪衛大夫宥之以逺曰放甯乃定反跪其毁反乃即位君子以二公子之立黔牟為不度矣夫能固位者必度於本末而後立𠂻焉不知其本不謀知本之不枝弗强杜本末終始也衷節適也譬之樹木本弱者其枝必披非人力所能强成林衷中也節適也蓋度終始而後立中為之節適不知其本之可託不謀其事度待洛反下同衷丁仲反王音忠强其丈反詩曰本枝百世杜詩大雅言文王本枝俱茂蕃滋百世也冬齊人來歸衛寶文姜請之也公親與齊共伐衛事畢而還文姜淫於齊侯故求共所獲珍寶使以歸魯欲說魯以謝慙楚文王伐申過鄧鄧祁侯曰吾甥也杜祁諡也姊妹之子曰甥林楚文王鄧曼所生故為鄧甥祁巨支反字林上尸反止而享之騅甥聃甥養甥請殺楚子杜皆鄧甥仕於舅氏也騅音佳鄧侯弗許三甥曰亡鄧國者必此人也若不早圖後君噬齊杜若齧腹齊喻不可及噬市制反齊柤兮反其及圖之乎圖之此為時矣林其及今時圖殺之乎若圖殺楚子此為得機便之時鄧侯曰人將不食吾餘林言自害其甥必為人所賤故不食吾餘食對曰若不從三臣抑社稷實不血食而君焉取餘杜言君無復餘林凡宗廟之祭必薦毛血故曰血食焉於䖍反弗從還年楚子伐鄧伐申還之年十六年楚復伐鄧滅之杜魯莊公十六年楚終强盛為經書楚事張本經甲午七年春夫人姜氏會齊侯于防防魯地夏四月辛卯夜恒尾不見恒常也謂常見之星辛卯四月五日月光尚微蓋時無雲日光不以昬没見賢遍反傳同夜中星隕如雨如而也夜半乃有雲星落而且雨其數多皆記異也日光不匿恒星不見而云夜中者以水漏知之夜中夜半也中丁仲反又如字隕于閔反秋大水無傳無麥苗今五月周之秋平地出水深殺熟麥及五稼之苗冬夫人姜氏會齊侯于穀杜無傳榖齊地今濟北榖城縣傳七年春文姜會齊侯于防齊志也文姜數與齊侯會至齊地則姦發夫人至魯地則齊侯之志故傳畧舉二端以言之夏恒星不見夜明也星隕如雨與雨偕也林日光不匿故夜明隕而且雨故與雨偕杜偕俱也偕音皆秋無麥苗不害嘉穀也杜黍稷尚可更種故曰不害嘉穀經乙未八年春王正月師次于郎以俟陳人蔡人無傳期共伐郕陳蔡不至故駐師于郎以待之甲午治兵治兵於廟習號令將以圍郕夏師及齊師圍郕郕降于齊師二國同討而齊獨納郕降戸江反傳皆同秋師還時史善公克已復禮全軍而還故特書師還冬十有一月癸未齊無知弑其君諸兒杜稱臣臣之罪也林諸兒襄公名兒如字一音五兮反傳八年春治兵于廟禮也林凡師行必告於大廟而奉桃廟之主以行故曰治兵于廟得出師之禮夏師及齊師圍郕郕降于齊師仲慶父請伐齊師杜齊不與魯共其功故欲伐之公曰不可我實不德齊師何罪罪我之由夏書曰臯陶邁種德林我實無徳可以服郕齊君實專其功齊之師衆何罪罪由我之無徳杜夏書逸書也稱臯陶能勉種德邁勉也夏戸雅反後放此陶音遙德乃降姑務脩德以待時乎杜言茍有德乃為人所降服姑且也秋師還君子是以善魯莊公杜傳言經所以即用舊史之文齊侯使連稱管至父戍葵丘杜連稱管至父皆齊大夫戍守也葵丘齊地臨淄縣西有地名葵丘稱尺證反又如字𤓰時而往曰及瓜而代林蓋以瓜熟之時而使之往戍與之約曰明年及瓜熟之時則遣代期戍公問不至杜問命也期音基本亦作朞請代弗許故謀作亂僖公之母弟曰夷仲年林僖公之同母弟襄之叔父也生公孫無知有寵於僖公衣服禮秩如適襄公絀之二人因之以作亂林衣服禮數品秩一如適子適襄公也襄公既立而絀減其恩數連稱管至父因無知之怨而奉之以作亂適丁厯反絀勑律反連稱有從妹在公宫無寵使間公杜伺公之間隙從才用反下從者同間如字或古莧反非曰捷吾以女為夫人杜捷克也宣無知之言捷在接反女音汝冬十二月齊侯㳺于姑棼遂田于貝丘杜姑棼貝丘皆齊地田獵也樂安博昌縣南有地名貝丘棼扶云反貝補蓋反見大豕從者曰公子彭生也杜公見大豕而從者見彭生皆妖鬼林彭生蓋桓十八年襄公所殺者公怒曰彭生敢見林言彭生既死敢見形以見我見賢遍反射之豕人立而啼公懼隊于車傷足喪屨反誅屨於徒人費杜誅責也林既獵而反責取所失之屨於徒役之人名費者射食亦反啼田兮反隊直類反喪息浪反屨九具反費音祕弗得鞭之見血走出遇賊于門劫而束之費曰我奚御哉袒而示之背信之費請先入林費被鞭而走出遇作亂之賊已至于門賊劫費而束縛之費謂賊曰我何嘗以禦汝曹為事哉告之被鞭而袒衣以示之背賊見其背創而信之費請先入助賊御魚吕反袒音但伏公而出鬭死于門中石之紛如死于階下林告公以亂而匿之賊信費未入故費復出鬬而死于門中杜石之紛如齊小臣亦鬭死紛敷文反遂入殺孟陽于牀盂陽亦小臣代公居牀牀七良反曰非君也不類見公之足于戸下林公匿戸後其足獨出戸下故為賊所見遂弑之而立無知杜經書十一月癸未長厯推之月六日也傳云十二月傳誤初襄公立無常政令無常鮑叔牙曰君使民慢亂將作矣奉公子小白出奔莒杜鮑叔牙小白傅小白僖公庶子林言襄公之使民有慢易之心如葵丘期戍公問不至請代弗許是有慢易之心也語曰以逸道使民雖勞不怨古之使民豈敢慢哉鮑歩卯反亂作管夷吾召忽奉公子糾來奔杜管夷吾召忽皆子糾傅也子糾小白庶兄來不書皆非卿也為九年公伐齊納子糾齊小白入于齊傳召時照反糾居黝反初公孫無知虐于雍廩杜雍廩齊大夫爲殺無知傳廩力錦反經丙申九年春齊人殺無知杜無知弑君而立未列於㑹故不書爵例在成十六年公及齊大夫盟于蔇杜齊亂無君故大夫得敵於公蓋欲迎子糾也來者非一人故不稱名蔇魯地琅邪繒縣北有蔇亭蔇其器反夏公伐齊納子糾齊小白入于齊二公子各有黨故雖盟而迎子糾當須伐乃得入又出在小白之後小白稱入從國逆之文本無位秋七月丁酉葬齊襄公無傳九月乃葬亂故八月庚申及齊師戰于乾時我師敗績杜小白既定而公猶不退師厯時而戰戰遂大敗不稱公戰公敗諱之乾時齊地時水在樂安界歧流旱則竭涸故曰乾時乾音干九月齊人取子糾殺之公子為賊亂則書齊實告殺而書齊取殺者時史惡齊志在譎以求管仲非不忍其親故極言之冬浚洙杜無傳洙水在魯城北下合泗浚洙深之為齊備浚蘇俊反洙音殊傳九年春雍廩殺無知公及齊大夫盟于蔇齊無君也林齊無君故不討以大夫敵我公詳見經註夏公伐齊納子糾桓公自莒先入杜桓公小白秋師及齊師戰于乾時我師敗績公喪戎路傳乘而歸杜戎路兵車傳乘乘他車喪息浪反傳直專反又丁戀反乘繩證反秦子梁子以公旗辟于下道杜二公子御及戎右也林公既敗師失其戎車恐為齊禽故二子以公旗辟于下道以誤齊師辟音避本亦作避一音婢亦反是以皆止杜止獲也林皆為齊所獲鮑叔帥師來言曰子糾親也請君討之杜鮑叔乘勝而進軍志在生得管仲故託不忍之辭管召讐也請受而甘心焉杜管仲射桓公故曰讐甘心言欲快意戮殺之召時照反讐市由反乃殺子糾于生竇杜生竇魯地林魯乃為齊殺子糾于生竇竇音豆召忽死之管仲請囚林召忽義不生辱故從子糾而死管仲知鮑叔必欲薦已故請囚繫以畀齊鮑叔受之及堂阜而稅之杜堂阜齊地東莞蒙隂縣西北有夷吾亭或曰鮑叔解夷吾縛於此因以為名稅本又作說同吐活反一音失銳反歸而以告曰管夷吾治於高傒杜高傒齊卿髙敬仲也言管仲治理政事之才多於敬仲林公從鮑叔之言而相管仲此管仲所謂生我者父母知我者鮑叔者也治直吏反傒音兮使相可也公從之相息亮反經丁酉十年春王正月公敗齊師于長勺杜齊人雖成列魯以權譎稽之列成而不得用故以未成為文例在十一年長勺魯地勺上酌反二月公侵宋杜無傳侵例在二十九年三月宋人遷宿杜無傳宋强遷之而取其地故文異於邢遷林此遷國之始夏六月齊師宋師次于郎杜不言侵伐齊為兵主背蔇之盟義與長勺同林其言次何以桓公圖伯而未集也是故書次郎以見齊伯之難書次厥貉以見楚伯之難書次于鄫以見復伯之難公敗宋師于乘丘乘丘魯地乘繩證反秋九月荆敗蔡師于莘荆楚本號後改為楚楚辟陋在夷於此始通上國然告命之辭猶未合典禮故不稱將帥莘蔡地林此書荆之始亦荆猾夏之始亦荆專執諸侯之始此夷夏之大變也荆敗蔡師于莘是猾夏之始也呉敗頓胡沈蔡陳許之師于鷄父則諸侯之不亡者寡矣是故書荆自此始而春秋以呉終始焉莘所巾反以蔡侯獻舞歸杜獻舞蔡季冬十月齊師滅譚杜譚國在濟南平陵縣西南傳曰譚無禮此直釋所以見滅經無義例他皆放此滅例在文十五年林此滅國之始管仲攻瑕之術也譚徒南反譚子奔莒不言出奔國滅無所出傳十年春齊師伐我杜不書侵伐齊背蔇之盟我有辭公將戰曹劌請見杜曹劌魯人劌古衛反見賢遍反下同其鄉人曰肉食者謀之又何間焉林肉食謂在位有禄食肉者言國有大事肉食者已有定謀間猶厠也又何必厠其間劌曰肉食者鄙未能遠謀乃入見問何以戰公曰衣食所安弗敢專也必以分人林衣食二者雖吾身之所安弗敢自專其有必以分與人之凍餒者對曰小惠未徧民弗從也杜分公衣食所惠不過左右故曰未徧林民未懷惠必不從公所使徧音遍公曰犧牲玉帛弗敢加也必以信林犠牲牛羊豕之屬玉珪璧帛幣也皆祭祀禮神之物牲玉自有常數弗敢有加於舊祝史必陳信於鬼神不敢以小為大以惡為美犧許宜反對曰小信未孚神弗福也林此特一念之小信未孚於上下神未必降之福杜孚大信也公曰小大之獄雖不能察必以情林言爭訟刑罰之類雖不能徧察其曲直當否必盡已之情以求人之情對曰忠之屬也可以一戰林上思利民忠也故言莊公以情察獄為忠之一端民感其忠思欲報上故可用以一戰屬音蜀戰則請從公與之乘杜共乘兵車從才用反乘繩證反戰于長勺公將鼓之劌曰未可齊人三鼓劌曰可矣齊師敗績公將馳之林大崩曰敗績莊公將馳軍以追齊之奔三息暫反又如字劌曰未可下視其轍杜視車跡也轍直列反登軾而望之林又登車前横木為軾者以望齊師之旌旂軾音式曰可矣遂逐齊師既克公問其故林莊公問曹劌以不鼓及視轍登軾之故對曰夫戰勇氣也一鼔作氣再而衰三而竭彼竭我盈故克之夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之林爭戰之道以勇氣為主兵以鼔進方一鼔之初正勇氣𤼵作之時至再鼔則敵有玩心而勇漸衰及至三鼓則敵有怠心而勇氣竭矣彼既三鼔則軍心玩怠而竭我軍久不得進驟而鼓之則勇氣方盛此我所以克齊師夫齊為大國難測恐其詐奔若詐奔必設伏兵以要我故懼其有伏焉詐奔則轍跡必整今轍亂知其非詐詐奔則旗旂必整今旗倒知其非詐見其怖遽之甚故逐其師而克伏如字舊扶又反旗音其靡音美夏六月齊師宋師次于郎公子偃曰宋師不整可敗也公子偃魯大夫宋敗齊必還請擊之公弗許自雩門竊出蒙臯比而先犯之杜雩門魯南城門臯比虎皮林公子偃又請自雩門潛師竊出以虎皮蒙馬而先犯宋師胥臣蒙馬以虎皮亦此術雩音于比音毗公從之大敗宋師于乘丘齊師乃還蔡哀侯娶于陳息侯亦娶焉林息侯亦娶陳女息嬀將歸過蔡蔡侯曰吾姨也妻之姊妹曰姨止而見之弗賔杜不禮敬也息侯聞之怒使謂楚文王曰伐我吾求救於蔡而伐之杜設計使楚以兵伐息求救於蔡而致其師而共伐蔡師楚子從之秋九月楚敗蔡師于莘以蔡侯獻舞歸林敗蔡而執其君經不言執蔡侯以歸蓋蔡自是服於楚也齊侯之出也林桓公為公子出奔莒之時過譚譚不禮焉及其入也諸侯皆賀譚又不至杜以九年入過古禾反冬齊師滅譚譚無禮也譚子奔莒同盟故也傳言譚不能及遠所以亡左傳杜林合注卷五
