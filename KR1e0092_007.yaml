body:
  text: 左傳杜林合注卷七明王道焜趙如源同編莊公三經庚戌二十有三年春公至自齊無傳祭叔來聘杜無傳穀梁以祭叔為祭公來聘魯天子内臣不得外交故不言使不與其得使聘祭側界反夏公如齊觀社齊因祭社蒐軍實故公往觀之公至自齊無傳荆人來聘杜無傳不書荆子使某來聘君臣同辭者蓋楚之始通未成其禮公及齊侯遇于榖無傳穀音谷蕭叔朝公杜無傳蕭附庸國叔名就榖朝公故不言來凡在外朝則禮不得具嘉禮不野合此僣朝於方嶽之禮秋丹桓宫楹桓公廟也楹柱也楹音盈冬十有一月曹伯射姑卒杜無傳未同盟而赴以名林曹莊公卒子僖公夷立射示亦反又音亦十有二月甲寅公會齊侯盟于扈杜無傳扈鄭地在榮陽卷縣西北扈音戸傳二十三年夏公如齊觀社非禮也曹劌諫曰不可夫禮所以整民也故會以訓上下之則制財用之節朝以正班爵之義帥長㓜之序征伐以討其不然諸侯有王王有巡守以大習之非是君不舉矣君舉必書書而不法後嗣何觀林觀蒐軍實非交鄰國之禮也先王辨上下定民志所以整齊萬民也故制為會同之禮以教訓諸侯上下尊卑之法制制貢賦多少之節度制為朝覲之禮以王五等班爵後先之冝其班爵同者則以年齒長㓜為次序不然不用命也謂不朝不㑹則以征伐討之諸侯朝於天子曰述職有王事也天子適於諸侯曰巡守省方也以大習㑹朝之禮如舜覲羣后禹㑹塗山之類非是㑹朝之事國君不輕舉動矣人君舉動史官必書扵䇿書之史䇿而不合先王之法後嗣子孫何所觀瞻以為貽謀燕翼之道長丁丈反晉桓莊之族偪桓叔莊伯之子孫强盛偪廹公室偪彼力反獻公患之士蒍曰去富子則羣公子可謀也已杜士蒍晉大夫富子二族之富強者林去富子伐其本根之法也本根既去則枝葉随之也蒍于委反去起吕反下同公曰爾試其事林爾試用去富子之策士蒍與羣公子謀譛富子而去之杜以罪狀誣之同族惡其富强故士蒍得因而間之用其所親為譛則似信離其骨肉則黨弱羣公子終所以見滅秋丹桓公之楹經辛亥二十有四年春王三月刻桓宫桷刻鏤也桷椽七將逆夫人故為盛飾刻音克桷音角字林云齊魯謂榱為桷葬曹莊公無傳夏公如齊逆女無傳親逆禮也秋公至自齊無傳八月丁丑夫人姜氏入杜哀姜也公羊傳以為姜氏要公不與公俱入蓋以孟任故丁丑入而明日乃朝廟戊寅大夫宗婦覿用幣杜宗婦同姓大夫之婦禮小君至大夫執贄以見明臣子之道莊公欲奢夸夫人故使大夫宗婦同贄俱見覿徒歴反大水無傳冬戎侵曹無傳曹羈出奔陳無傳羈蓋曹世子也先君既葬而不稱爵者㣲弱不能自定曹人以名赴赤歸于曹無傳赤曹僖公也蓋為戎所納故曰歸郭公無傳蓋經闕誤也自曹覊以下公羊穀梁之説既不了又不可通之於左氏故不采用傳二十四年春刻其桷皆非禮也杜并非丹楹故言皆御孫諫曰臣聞之儉徳之共也侈惡之大也杜御孫魯大夫林司馬公訓儉文引此言儉者上下共行之徳而後漢翟輔疏亦引此作恭御魚呂反本亦作禦侈昌紙反又已民反先君有共徳而君納諸大惡無乃不可乎杜以不丹楹刻桷為共秋哀姜至公使宗婦覿用幣非禮也杜傳不言大夫惟舉非常御孫曰男贄大者玉帛公侯伯子男執玉諸侯世子附庸孤卿執帛贄真至反小者禽鳥卿執羔大夫執鴈士執雉以章物也杜章所執之物别貴賤林兼取其羣而不失其類鴈取其侯而行雉取其守介而死不失其節女贄不過榛栗棗脩以告䖍也杜榛小栗脩脯䖍敬也皆取其名以示敬林栗取其戰栗也棗取其早起也脩取其自脩也惟榛無説蓋以榛聲近䖍取其䖍扵事也榛側巾反鍜脯加薑桂曰修䖍音乾今男女同贄是無别也男女之别國之大節也而由夫人亂之無乃不可乎林家齊而後國治所以為國之大節今乃由覿夫人而亂男女之别言其甚不可也晉士蒍又與羣公子謀使殺游氏之二子杜游氏二子亦桓莊之族士蒍告晉侯曰可矣不過二年君必無患林自去年受命獻公曰爾試其事至是乃復命言富子既去游氏之二子又死桓莊之族漸徵君必無害矣經壬子二十有五年春陳侯使女叔來聘杜女叔陳卿女氏叔字女音汝夏五月癸丑衛侯朔卒杜無傳惠公也書名十六年與内大夫盟于幽林惠公卒子懿公赤立六月辛未朔日有食之鼓用牲于社杜鼔伐鼓也用牲以祭社傳例曰非常也伯姬歸于杞杜無傳不書逆女逆者微秋大水鼓用牲于社于門杜門國門也傳例曰亦非常也冬公子友如陳杜無傳報女叔之聘諸魯出朝聘皆書如不果彼國必成其禮故不稱朝聘春秋之常也公子友荘公之母弟稱公子者史策之通言母弟至親異於他臣其相殺害則稱弟以示義至於嘉好之事兄弟篤睦非例所興或稱弟或稱公子仍舊史之文也母弟例在宣十七年林此内大夫出聘之始傳二十五年春陳女叔來聘始結陳好也嘉之故不名杜季友相魯原仲相陳二人有舊故女叔來聘季友冬亦報聘嘉好接􅊀卿以字為嘉則稱名其常也夏六月辛未朔日有食之鼓用牲于社非常也非常鼓之月長厯推之辛未實七月朔置閏失所故致月錯唯正月之朔慝未作杜正月夏之四月周之六月謂正陽之月今書六月而傳云唯者明此月非正陽月也慝隂氣林正陽之月建已六陽用事故隂氣未作正音政建已之月慝他得反日有食之於是乎用幣于社伐鼓于朝杜日食厯之常也然食扵正陽之月則諸侯用幣于社請救於上公伐鼓於朝退而自責以明隂不宜侵陽臣不宜掩君以示大義秋大水鼓用牲于社于門亦非常也失常禮凡天災有幣無牲杜天災日月食大水也祈請而已不用牲也非日月之𤯝不鼓杜𤯝猶災也月侵日為𤯝隂陽逆順之事賢聖所重故特鼔之𤯝所景反晉士蒍使羣公子盡殺游氏之族乃城聚而處之林聚晉邑乃城聚邑而處羣公子外示優寵聚才喻反冬晉侯圍聚盡殺羣公子杜卒如士蒍之計經癸丑二十有六年春公伐戎無傳夏公至自伐戎無傳曹殺其大夫杜無傳不稱名非其罪例在文七年秋公㑹宋人齊人伐徐無傳宋序齊上主兵冬十有二月癸亥朔日有食之無傳傳二十六年春晉士蒍為大司空杜大司空郷官林賞去桓荘之功夏士蒍城絳以深其宫杜絳晉所都也今平陽絳邑縣林以深公宫備豫也史記是年晉始都絳秋虢人侵晉冬虢人又侵晉杜為傳明年晉將伐虢張本此年經傳各自言其事者或經是直文或策書雖存而簡牘散落不究其本末故傳不復申解但言傳事而已經甲寅二十有七年春公㑹杞伯姬于洮伯姬莊公女洮魯地洮他刀反夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽林衣裳之㑹五齊初主盟於是書公矣秋公子友如陳葬原仲杜原仲陳大夫原氏仲字也禮臣既卒不名故稱字季友違禮㑹外大夫葬具見其事亦所以知譏冬杞伯姬來傳例曰歸寧莒慶來逆叔姬杜無傳慶莒大夫叔姬莊公女卿自為逆則稱字例在宣五年杞伯來朝無傳杞稱伯者蓋為時王所黜公㑹齊侯于城濮無傳城濮衛地將討衛也濮音卜傳二十七年春公會杞伯姬于洮非事也非諸侯之事也天子非展義不巡守杜天子巡守所以宣布德義諸侯非民事不舉卿非君命不越竟林諸侯非經理民事則不輕舉動諸侯之卿大夫非将其君之命則不越出其國之境土竟音境夏同盟于幽陳鄭服也杜二十二年陳亂而齊納敬仲二十五年鄭文公之四年獲成于楚皆有二心於齊今始服也秋公子友如陳葬原仲非禮也林非大夫不越竟之禮也原仲季友之舊也冬杞伯姬來歸寧也杜寧問父母安否凡諸侯之女歸寧曰來出曰來歸林言凡春秋書諸侯之女出入之法歸而寧問父母則書之曰來為人所出而歸其國則書曰來歸言不反其國也夫人歸寧曰如某出曰歸于某林此言書夫人出入之法歸寧其父母則書曰如某為吾國所出而歸其國則曰歸于某晉侯將伐虢士蒍曰不可虢公驕若驟得勝於我必弃其民無衆而後伐之欲禦我誰與夫禮樂慈愛戰所畜也夫民讓事樂和愛親哀喪而後可用也林言虢公為人驕矜時號屢伐晉而晉不能報是驟得勝於我必易晉而不撫養其民人棄民則失其心是無衆也然後從而伐之虢公雖欲禦我晉師誰與之效死哉孟子曰城非不髙池非不深兵甲非不堅利米粟非不多委而去之是誰與之守也禮以導中樂以導和父慈子孝兄愛弟恭人君以此四者教民涵養有素然後以我之中和慈愛討彼之不中不和不慈不愛名正言順戰無不克杜上之使民以義讓哀樂為本言不可力强畜勅六反下同樂音洛虢弗畜也亟戰將饑杜虢弗畜此禮樂慈愛之道而以數戰為事則妨奪農時將有饑饉之患此謂兵戈之後必有凶年是也亟欺冀反饑居疑反又音機王使召伯廖賜齊侯命杜召伯廖王卿士賜命為侯伯召音邵廖力彫反且請伐衛以其立子頽也林衛立子頽在十九年後惠王復辟未會正衛人立子頽之罪經乙卯二十有八年春王三月甲寅齊人伐衞衞人及齊人戰衞人敗績齊侯稱人者諱取賂而還以賤者告不地者史失之夏四月丁未邾子瑣卒杜無傳未同盟而赴以名林文公籧篨立瑣素果反秋荆伐鄭公會齊人宋人救鄭林會諸侯救始此冬築郿杜郿魯下邑傳例曰邑曰築郿亡悲反大無麥禾書於冬者五穀畢入計食不足而後書也臧孫辰告糴于齊杜臧孫辰魯大夫臧文仲糴徒歴反傳二十八年春齊侯伐衞戰敗衞師數之以王命取賂而還林言不能正衛之罪晉獻公娶于賈無子杜賈姬姓國也烝於齊姜杜齊姜武公妾烝之承反生秦穆夫人及大子申生又娶二女於戎大戎狐姬生重耳杜大戎唐叔子孫别在戎狄者林姬姓以狐為氏是為狐姬狐偃其兄弟也重直龍反小戎子生夷吾杜小戎允姓之戎子女也晉伐驪戎驪戎男女以驪姬杜驪戎在京兆新豐縣其君姬姓其爵男也納女于人曰女林獻公五年伐驪戎是為莊公二十三年蓋驪戎受伐而納其女於獻公以求成也驪力知反女眤據反歸林獻公以驪姬歸晉生奚齊其娣生卓子驪姬嬖欲立其子賂外嬖梁五與東關嬖五杜姓梁名五在閨闥之外者東關嬖五别在關塞者亦名五皆大夫為獻公所嬖幸視聼外事卓勅角反使言於公曰曲沃君之宗也杜曲沃桓叔所封先君宗廟所在蒲與二屈君之疆也杜蒲今平陽蒲子縣二屈今平陽北屈縣或云二當為北林晉國疆場之邑屈求勿反又居勿反疆居良反不可以無主宗邑無主則民不威疆場無主則啓戎心戎之生心民慢其政國之患也林戎生心則窺伺扵外民不威則慢政於内此二者晉國之大患場音亦若使大子主曲沃而重耳夷吾主蒲與屈則可以威民而懼戎且旌君伐杜旌章也伐功也使俱曰林又使二人合辭而稱羙其事狄之廣莫於晉為都晉之啓土不亦宜乎杜廣莫狄地之曠絶也即謂蒲子北屈也言遣二公子出都之則晉方當大閒土界林蓋二人始進使太子居曲沃重耳夷吾居蒲與屈之説獻公未決故復使稱説此羙晉侯説之夏使大子居曲沃重耳居蒲城夷吾居屈羣公子皆鄙杜鄙邊邑説音悦唯二姬之子在絳二五卒與驪姬譛羣公子而立奚齊林二五梁五東關五也蓋大子以下皆出居外故讒譖得行譖責鴆反晉人謂之二五耦二耜相耦廣一尺共起一伐言二人俱共墾傷晉室若此楚令尹子元欲蠱文夫人杜文王夫人息媯也子元文王弟蠱惑以淫事蠱音古爲館於其宫側而振萬焉杜振動也萬舞也夫人聞之泣曰先君以是舞也習戎備也今令尹不尋諸仇讎而於未亡人之側不亦異乎杜尋用也婦人既寡自稱未亡人林舞者以羽為文以干為武國之祀戎皆習用之仇讎謂鄭也言子元不用此樂習武備以討鄭而用於我未亡人之側不亦與先君用樂之意異乎御人以告子元杜御人夫人之侍人子元曰婦人不忘襲讎我反忘之秋子元以車六百乘伐鄭入于桔柣之門杜桔柣鄭遠郊之門也林伐鄭欲以説文夫人之心乘繩證反桔戸結反柣侍結反子元鬭御彊鬭梧耿之不比為斾子元自與三子特建斾以居前廣充幅長尋曰旐繼旐曰斾御魚呂反本亦作禦彊其良反又居良反梧音吾比并里反施蒲具反鬭班王孫游王孫喜殿杜二子在後爲反禦殿丁見反衆車入自純門及逵市杜純門鄭外郭門也逵市郭内道上市純如字逵求龜反縣門不𤼵楚言而出子元曰鄭有人焉縣門施於内城門鄭示楚以閒暇故不閉城門出兵而效楚言故子元畏之不敢進縣音𤣥諸侯救鄭楚師夜遁鄭人將奔桐丘杜許昌縣東北有桐丘城林鄭亦畏楚將奔于桐丘之地遁徒困反諜告曰楚幕有烏乃止杜諜間也幕帳也林大將所居以幕帳蔽禦風雨軍衆屯聚烏不敢止今楚幕有烏知楚師已遁也諜音牒幕音莫冬饑臧孫辰告糴于齊禮也杜經書大無麥禾傳言饑傳又先書饑在築郿上者說始糴經書在下須得糴嫌或諱饑故曰禮築郿非都也凡邑有宗廟先君之主曰都無曰邑邑曰築都曰城杜周禮四縣為都四井為邑然宗廟所在則雖邑曰都尊之也言凡邑則他築非例經丙辰二十有九年春新延廏傳例曰書不時言新者皆舊物不可用更造之辭廐居又反夏鄭人侵許杜傳例曰無鐘鼓曰侵秋有蜚杜傳例曰為災蜚扶味反冬十有二月紀叔姬卒無傳紀國雖滅叔姬執節守義故繫之紀賢而錄之城諸及防杜諸防皆魯邑傳例曰書時也諸非備難而興作傳皆重云時以釋之他皆放此諸今城陽諸縣傳二十九年春新作延廏書不時也杜經無作字葢闕凡馬日中而出日中而入杜日中春秋分也治廄當以秋分因馬冋入而修之今以春作故曰不時林春分百草始繁則牧于坰野故日中而出秋分農功始藏水寒草枯則馬還廄故日中而入向本或作嚮許亮反夏鄭人侵許凡師有鐘鼓曰伐杜聲其罪無曰侵杜鐘鼓無聲輕曰襲杜掩其不備林言襲者如風寒之襲人不知其至輕遣政反秋有蜚為災也凡物不為災不書冬十二月城諸及防書時也凡土功龍見而畢務戒事也杜謂今九月周十一月龍星角亢晨見東方三務始畢戎民以土功事見賢遍反下同火見而致用杜大火心星次角亢見者致築作之物水昏正而栽杜謂今十月定星昏而中於是樹板幹而興作栽才代反一音再説文云築牆長板日至而畢日南至微陽始動故土功息樊皮叛王杜樊皮周大夫樊其采地皮名經丁巳三十年春王正月夏次于成杜無傳將卑師少故直言次齊將降鄣故設備秋七月齊人降鄣杜無傳鄣紀附庸國東平無鹽縣東北有鄣城小國孤危不能自固葢齊遙以兵威脅使降附八月癸亥葬紀叔姬無傳以賢錄也無臣子故不作諡九月庚午朔日有食之鼔用牲于社無傳冬公及齊侯遇于魯濟濟水歴齊魯界在齊界為齊濟在魯界為魯濟葢魯地濟子禮反齊人伐山戎杜山戎北狄傳三十年春王命虢公討樊皮夏四月丙辰虢公入樊執樊仲皮林即樊皮歸于京師林歸于周也天子所居故曰京師楚公子元歸自伐鄭而處王宮欲遂蠱文夫人鬭射師諌則執而梏之射師鬭亷也足曰桎手曰梏射食亦反又食夜反梏古毒反秋申公鬭班殺子元申楚縣也楚僣號縣尹皆稱公鬭榖於莵為令尹自毁其家以紓楚國之難杜鬭穀於莬令尹子文也毁減紓緩也林楚國之難由家强而國弱故子文自毁其家以緩楚國之患難穀奴走反楚人謂乳曰穀漢書作穀音同於音烏莵音徒紓音舒又直汝反難乃旦反冬遇于魯濟謀山戎也以其病燕故也杜齊桓行霸故欲為燕謀難燕國今薊縣經戊午三十有一年春築臺于郎無傳刺奢且非土功之時夏四月薛伯卒無傳未同盟築臺于薛無傳薛魯地六月齊侯來獻戎㨗杜傳例曰諸侯不相遺俘捷獲也獻奉上之辭齊侯以獻捷禮來故書以示遏捷在妾反秋築臺于秦杜無傳束平范縣西北有秦亭林魯地冬不雨杜無傳不書旱不為災例在僖三年傳三十一年夏六月齊侯來獻戎㨗非禮也凡諸侯有四夷之功則獻于王王以警于夷杜以警懼夷狄警音景中國則否林若伐中國諸侯有功則不獻其㨗於王崇恩愛示不忍也諸侯不相遺俘杜雖夷狄俘猶不以相遺林俘囚警也遺唯季反經已未三十有二年春城小穀林小穀齊邑濟北穀城縣城中有管仲井大都國名通者則不繫國林齊管仲私邑夏宋公齊侯遇于梁丘杜齊善宋之請見故進其班梁丘在高平昌邑縣西南秋七月癸巳公子牙卒杜牙慶父同母弟僖叔也飲酖而死不以罪告故得書卒書日者公有疾不貴公不與小歛林是為叔孫氏八月癸亥公薨于路寢路寢正寢也公薨皆書其所詳凶變冬十月己未子般卒子般莊公大子先君未葬故不稱爵不書殺諱之也般音班公子慶父如齊無傳慶父既弑子般季友出奔國人不與故懼而適齊欲以求援時無君假赴告之禮而行狄伐邢杜無傳邢國在廣平襄國縣林此狄人伐之始傳三十二年春城小穀為管仲也公感齊桓之徳故為管仲城私邑為于偽反下同齊侯為楚伐鄭之故請㑹于諸侯杜楚伐鄭在二十八年謀為鄭報楚宋公請先見于齊侯夏遇于梁丘林宋公志輔齊霸請先與齊侯相見齊桓公從宋之請故簡禮遇于梁丘見賢遍反又如字秋七月有神降于莘杜有神聲以接人莘虢地莘所巾反惠王問諸内史過曰是何故也内史過同大夫林言神何故而降過古禾反對曰國之將興明神降之監其德也林監察其君徳之厚薄監本亦作鑑古暫反將亡神又降之視其惡也林觀視其積惡之深淺故有得神以興亦有以亡虞夏商周皆有之杜亦有神異王曰若之何林將何道以處之對曰以其物享焉其至之日亦其物也杜享祭也若以甲乙口至癸先脾玉用蒼服上青以此類祭之王從之内史過徃林使内史過往以其物享神聞虢請命杜聞虢請於神求賜土田之命反曰虢必亡矣虐而聽於神林夫民神之主也虢公虐民而聽命於神此以知其必亡神居莘六月虢公使祝應宗區史嚚享焉神賜之土田杜祝大祝宗宗人史大史應區嚚皆名區丘于反嚚五巾反史嚚曰虢其亡乎吾聞之國將興聽於民杜政順民心將亡聽於神杜求福於神神聰明正直而壹者也林聰則無所不聞明則無所不見正則自正於已直則能正於人而一者專一於聰明正直無有二心者也依人而行杜唯徳是與林善則降之福惡則降之禍神無私其禍福故依人善惡而行虢多涼德其何土之能得林言賜之土田皆以禍之也杜涼薄也為僖二年晉滅下陽傳涼音良初公築臺臨黨氏杜黨氏魯大夫築臺不書不告廟黨音掌見孟任從之閟杜孟任黨氏女閟不從公閔音秘而以夫人言許之杜許以為夫人割臂盟公林孟任割臂血以與莊公盟生子般焉雩講于梁氏女公子觀之杜雩祭天也講肆也梁氏魯大夫女公子子般妹圉人犖自牆外與之戲圉人掌飬馬者以慢言戲之犖音洛又力角反子般怒使鞭之公曰不如殺之是不可鞭犖有力焉能投蓋于稷門杜蓋覆也稷門魯南城門走而自投接其屋之桷反覆門上林言其有勇力之甚公疾問後於叔牙對曰慶父材杜蓋欲進其同母兄問於季友對曰臣以死奉般杜季友莊公母弟故欲立般公曰鄉者牙曰慶父材成季使以君命命僖叔侍于鍼巫氏杜成季季友也鍼巫氏魯大夫林成季聞叔牙欲立慶父乃矯君命使人命叔牙侍命于魯大夫鍼巫氏鄕許亮反鍼其亷反使鍼季酖之杜酖鳥名其羽有毒以晝酒飲之則死曰飲此則有後於魯國不然死且無後飲之歸及逵泉而卒立叔孫氏杜逹泉魯地不以罪誅故得立後世其禄八月癸亥公薨于路寢子般即位次于黨氏杜即喪位次舍也冬十月己未共仲使圉人犖賊子般于黨氏杜共仲慶父共音恭成季奔陳杜出奔不書國亂史失之立閔公杜閔公莊公庻子於是年八嵗閔亡謹反左傳杜林合注卷七
