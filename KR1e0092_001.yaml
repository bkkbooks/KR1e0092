body:
  text: 左傳杜林合注卷一明王道焜趙如源同編隱公一公名息姑魯惠公之子姬姓侯爵自周公子伯禽始受封傳世二十三而至隱公攝主國事諡法不尸其位曰隱周文武開基姑都豐鎬幽厲板蕩平王東遷洛陽盡舉故都而棄之秦所謂東周也于是王室微弱至平王四十九年而入春秋魯隱公三年平王崩桓王立鄭姬姓伯爵自桓公始受封周厲王之子宣王之弟也傳世武公莊公莊公元年封弟段于京二十二年克段于鄢入春秋齊姜姓侯爵自太公相武王定殷受封于齊受命專征侯伯傳世十三至僖公九年入春秋宋子姓公爵周武王定殷邦封微子啓于宋以奉殷祀傳世十四至穆公七年入春秋魯隱公三年穆公卒弟殤公與夷立晉姬姓侯爵自唐叔始受封傳世十一而至昭侯昭侯封文侯之弟成師于曲沃晉始亂分為二以翼曲沃别之翼昭侯之後傳孝侯鄂侯鄂侯二年入春秋隱公五年曲沃伐翼翼侯奔隨王命虢公立鄂侯之子光于翼是為哀侯隱公六年晉逆晉侯于隨納諸鄂謂之鄂侯曲沃成師之後傳曲沃莊伯曲沃莊伯之十一年十一月魯隱公之元年正月也蓋用夏正建寅之月為嵗首不惟改元又改厯矣隱公七年曲沃莊伯卒子稱代立是為曲沃武公衛姬姓侯爵自康叔始受封傳世十三至桓公十三年入春秋魯隱公四年衛州吁弒桓公自立冬殺州吁宣公晉立蔡姬姓侯爵蔡叔之子蔡仲率德改行成王復封于蔡傳世十三至宣公二十八年入春秋魯隱公八年宣公卒子桓侯封人立曹姬姓伯爵自曹叔振鐸始受封傳世十二至桓公終生三十五年入春秋滕姫姓侯爵至魯隱公七年見滕侯卒其後稱子蓋為時王所黜陳媯姓侯爵舜之後自胡公始受封傳世十二至桓公二十三年入春秋杞姒姓侯爵夏禹之後自東樓公始受封傳五世至武公二十二年入春秋魯莊公二十七年書杞伯來朝蓋為時王所黜其後又稱子薛任姓侯爵至魯隱公十一年見來朝莊公三十一年書薛伯卒蓋為時王所黜其後至昭公三十一年見葬薛獻公莒已姓子爵至魯文公十八年見庶其邾曹姓附庸國自儀父入春秋後為子至魯莊公十六年書邾子克卒許姜姓太嶽之後至魯隱公十一年見許莊公及許叔魯桓公十五年許叔入于許即魯僖公四年許男新臣卒葬許穆公也小邾曹姓顓頊之後魯莊公五年書郳黎來來朝蓋附庸而未爵命其後數從齊桓公尊王室王命為諸侯至魯僖公七年始書小邾子楚芊姓子爵自熊繹始受封八世至熊渠立其長子康為句亶王中子紅為鄂王少子執庇為越章王此僭王之始也又八世至熊儀是為若敖又二世至熊㫬是為蚡晉又一世熊通是為楚武王武王十九年入春秋秦嬴姓伯爵顓頊之後也殷有蜚亷周有造父周孝王使非子畜馬蕃息分土為附庸邑之秦六世至襄公將兵救周送平王東遷有功封為諸侯襄公卒文公立文公四十四年是為隱公元年又六世至穆公任好十五年魯僖公十五年始見春秋吳姬姓子爵自大伯祚吳五世至周章而武王克殷因封之吳又十四世至壽夢而吳始益大稱王魯成公七年始見春秋越其先禹之苖裔少康之庶子也封於㑹稽以奉禹祀後二十餘世至於允常魯昭公五年偕楚伐吳始見于春秋允常與闔閭戰而相怨伐定公十四年允常卒子句踐立是為越王是年吳伐越越敗之于檇李傳惠公元妃孟子杜言元妃明始適夫人也子宋姓林元大也嘉耦曰妃始嫡夫人也惠公名不皇諡法愛人好與曰惠其子隱公讓國之君妃芳非反孟子卒杜不稱薨不成喪也無諡先夫死不得從夫諡繼室以聲子生隱公杜聲諡也蓋孟子之姪娣也諸侯始娶則同姓之國以姪娣媵元妃死則次妃攝治內事猶不得稱夫人故謂之繼室宋武公生仲子仲子生而有文在其手曰為魯夫人林蓋手理自然成文字如魯季友有文在其手曰友唐叔有文在其手曰虞之類故仲子歸于我杜婦人謂嫁曰歸以手理自然成字有若天命故嫁之于魯生桓公而惠公薨杜言歸魯而生男惠公不以桓生之年薨是以隱公立而奉之杜隱公繼室之子當嗣世以禎祥之故追成父志為桓尚少是以立為太子帥國人奉之為經元年春不書即位傳經己未元年春王正月杜隱公之始年周王之正月也凡人君即位欲其體元以居正故不言一年一月也隱雖不即位然攝行君事故亦朝廟告朔也告朔朝正例在襄二十九年即位例在隱莊閔僖元年林孔子因魯史作春秋故以魯紀年而書王正月見周之正朔猶行於天下也周正建子正月子月也其曰元年春王正月者謂之體元居正告朔朝正其義皆通無事而書春王正月者無事必書首時謹始也三月公及邾儀父盟于蔑杜附庸之君未王命例稱名能自通于大國繼好息民故書字貴之名例在莊五年邾今魯國鄒縣也蔑姑蔑魯地魯國卞縣南有姑城林此私盟之始父音甫邾子之字凡人名字皆倣此蔑亡結反夏五月鄭伯克段于鄢杜不稱國討而言鄭伯譏失教也段不弟故不言弟明鄭伯雖失教而段亦凶逆以君討臣而用二君之例者言段強大雋傑據大都以耦國所謂得雋曰克也國討例在莊二十二年得雋例在莊十一年母弟例在宣十七年鄭在熒陽宛陵縣西南鄢今潁川鄢陵縣段徒亂反鄭伯弟名鄢於晚反又於建反又於然反秋七月天王使宰咺來歸惠公仲子之賵杜宰官咺名也咺贈死不及尸弔生不及哀豫凶事故貶而名之此天子大夫稱字之例仲子者桓公之母婦人無諡故以字配姓來者自外之文歸者不反之辭林賵助喪之物時惠公巳葬仲子未薨因賵惠公而併賵仲子也賵惠公而併賵仲子者皆非禮也咺吁阮反賵芳鳯反九月及宋人盟于宿杜客主無名皆微者也宿小國東平無鹽縣也凡盟以國地者國主亦與盟例在僖十九年宋今梁國睢陽縣林魯宋宿三國共為盟參盟之端見矣冬十有二月祭伯來杜祭伯諸侯為王卿士者祭國伯爵也傳曰非王命也釋其不稱使林寰內諸侯為王卿士者私來魯也此私交之始祭側界反傳祭仲同公子益師卒杜傳例曰公不與小斂故不書日所以示薄厚也春秋不以日月為例唯卿佐之喪獨記日以見義者事之得失既未足以褒貶人君然亦非死者之罪無辭可以寄文而人臣輕賤死日可略故特假日以見義傳元年春王周正月杜言周以别夏殷林言周正月以見建子且别夏殷也不書即位攝也杜假攝君政不修即位之禮故史不書於䇿傳所以見異於常林隱公將讓國於桓公故假攝君事也三月公及邾儀父盟于蔑邾子克也未王命故不書爵曰儀父貴之也杜毛未賜命以為諸侯其後儀父服事齊桓以奬王室王命以為邾子故莊十六年經書邾子克卒林及者內為主也邾子名克字儀父也王未命為諸侯未有爵可書名不如字今書字以知其貴之也至莊十六年書邾子克卒得王命矣故不書爵一本無故字公攝位而欲求好於邾林及我欲之以知隱公欲求好於邾好呼報反故為蔑之盟杜解所以與盟也夏四月費伯帥師城郎不書非公命也杜費伯魯大夫郎魯邑髙平方與縣東南有郁郎亭傳曰君舉必書然則史之䇿書皆君命也今不書于經亦因史之舊法故傳釋之諸魯事傳釋不書他皆倣此林君舉必書今不書城郎以知其非君命故也費音祕初鄭武公娶于申曰武姜杜申國今南陽宛縣諡林姜申姓武姜從夫生莊公及共叔段杜段出奔共故曰共叔猶晉侯在鄂謂之鄂侯共音恭共地名凡國名地名人名字氏族皆不重音疑者復出後倣此莊公寤生驚姜氏故名曰寤生遂惡之杜寤寐而莊公巳生故驚而惡之林杜氏謂寐寤而莊公已生非也如此當喜何得復驚而惡之史記云寤生生之難是也此當為難生故武姜困而後寤武姜因寤而驚以其事名莊公寤五故反惡烏路反愛共叔段欲立之林惡長子故受次子欲立以為太子亟請於武公公弗許及莊公即位為之請制林亟數也武姜數請于武公使立段武公不從姜請武公既卒莊公即位為君武姜為段請於莊公欲以制邑封假亟欺冀反為于僞反公曰制巖邑也林制邑在鄭巖險之邑也巖本又作嚴五銜反虢叔死焉他邑唯命杜虢叔東虢君也恃制巖險而不修德鄭滅之恐段復然故開以他邑虢國今熒陽縣林言制不可封段若欲他邑則唯武姜之命是聽虢爪伯反請京使居之謂之京城大叔杜公順姜請使段居京謂之京城大叔言寵異於衆臣京鄭邑今熒陽京縣大音泰下皆同祭仲曰都城過百雉國之害也杜祭仲鄭大夫方丈曰堵三堵曰雉一雉之牆長三丈髙一丈侯伯之城方五里徑三百雉故其大都不得過百雉林凡邑有宗廟先君之主曰都無曰邑邑曰築都曰城過百雉言城之周圖過三百丈之數過古卧反復不音者皆同先王之制大都不過參國之一中五之一小九之一今京不度非制也君將不堪林總言先王建立都城之法制大邑參分其國城一分之大小中邑五分其國城一分之大小小邑九分其國城一分之大小今京城太廣不合三等之法度非先王都城之制也此言尾大不掉莊公將不堪叔段據有大都之害韓曰此數言遂為後世封宗藩之本魏以之疑晉以之敗猜無任皆不合也參七南反又音三公曰姜氏欲之焉辟害林言武姜欲大封叔段安所逃避其楇害焉於䖍反對曰姜氏何厭之有不如早為之所無使滋蔓蔓難圖也蔓草猶不可除况君之寵弟乎林言武姜何厭足之有不如早為區處使得其所無使叔段之惡如草之滋長蔓延及至蔓延難為圖謀草之蔓延尚不可芟除何况叔段為莊公愛寵之弟可得而治乎獻平聲蔓音萬公曰多行不義必自斃子姑待之林不忠於君不義也言段據有大邑必多行不義之事惡不積不足以滅身不義既多必自斃踣子謂祭仲言仲且少待之杜斃踣也姑且也斃婢世反本又作弊既而大叔命西鄙北鄙二於已林既卒事也鄙鄭邊邑二兩屬也令屬鄭之邑兩屬于巳公子吕曰國不堪二君將若之何欲與大叔臣請事之若弗與則請除之無生民心林公子吕鄭大夫言國家不可使人有攜二兩屬之心若欲以鄭國傳與叔段我請服事大叔無生其怨若不與叔段則請除去大叔無長其惡生鄭國攜二之心蓋異者可同離者可合生者不死不死則日長日大甚可畏也杜叔久不除則舉國之民當生他心公曰無庸將自及杜言無庸除之段將自及於禍大叔又收二以為已邑杜前兩屬者今皆取以為巳邑至于廩延杜言轉侵多也廩延鄭邑陳留酸業縣北有延津林段收鄭邑以廩延為界廩力錦反子封曰可矣厚將得衆杜子封公子吕也厚謂土地廣大林言段土地豐厚將得衆民之心公曰不義不昵厚將崩杜不義於君不親於兄非衆所附雖厚必崩林言不義之人不為衆所親昵厚而無基將如牆屋自然崩壞昵女乙反親也大叔完聚繕甲兵具卒乘林完城郭聚人民繕治其甲胄與兵器具備其步卒與車乘杜步曰卒車曰乘繕市戰反卒尊忽反下同乘繩證反下同將襲鄭夫人將啓之林無鐘鼓曰襲將掩鄭國之不備夫人即武姜將開段而道之杜啓開也公聞其期曰可矣林可以有辭討段命子封帥車二百乘以伐京京叛大叔段段入于鄢公伐諸鄢五月辛丑大叔出奔共林古者兵車一乘甲士三人步卒七十二人二百乘蓋甲士六百人步卒一萬四千四百人以伐段於京邑京城之人叛渙不助叔段段既為京人所叛乃走入于鄭之鄢邑莊公伐段于鄢大叔大敗出奔共國杜共國今汲郡共縣共音恭書曰鄭伯克段于鄢段不弟林不盡為弟之道故不言弟如二君林言段強大雋傑與鄭如二君然觀諸叔于田等詩段之強大可知故曰克稱鄭伯譏失教也林直書鄭伯克段不為之諱譏刺鄭莊公失教訓子弟之道至於用兵母子兄弟自相殘賊謂之鄭志不言出奔難之也杜傳言夫子作春秋改舊史以明義不早為之所而養成其惡故曰失教段實出奔而以克為文明鄭伯志在於殺難言其奔難乃旦反遂置姜氏于城潁而誓之曰不及黃泉無相見也林城穎鄭地遂繼事也克段繼事置武姜于别邑以絶之也地中之泉曰黃泉言生無復與母相見至死後方相見於地下置之䜴反置也既而悔之穎考叔為穎谷封人聞之有獻於公公賜之食食舍肉公問之對曰小人有母皆嘗小人之食矣未嘗君之羮請以遺之林既誓卒事悔其誓言之失潁谷即城潁之谷時穎考叔為穎谷典封疆之人稱人小吏也獻者卑奉尊之辭或以計謀或以時物獻于莊公皆曰獻莊公賜考叔以飲食考叔食公所賜之食而舍置其肉味公問舍肉之故考叔自稱有母在母所食遍嘗小人之食矣未曽得食國君之羮請留所賜以遺母氏杜食而不啜羮欲以發問也宋華元殺羊為羮饗士蓋古賜賤官之常舍音捨遺唯季反下同公曰爾有母遺繄我獨無林言考叔有母可以遺食我獨無母可遺杜繄語助繄烏兮反又鳥帝反穎考叔曰敢問何謂也公語之故且告之悔林據莊公母武姜尚在故疑而問公告以置姜誓姜之故且告以今悔之無及巳語魚據反對曰君何患焉若闕地及泉隧而相見其誰曰不然林言莊公何憂於黃泉之誓闕掘也若掘地及泉水之處即是黃泉隧地中道也為地中隧道與姜相見雖敢以此說為不然也杜隧若今延道闕其月反隧音遂公從之公入而賦大隧之中其樂也融融林賦賦詩也大隧之中想當時所賦之詩今無存不可復考融融和樂相得之貌樂音洛下同融羊弓反姜出而賦大隧之外林想亦當時武姜所賦之詩其樂也泄泄林泄泄舒散相得之貌泄羊世反遂為母子如初君子曰穎考叔純孝也愛其母施及莊公林按左傳稱君子曰多是採取當時君子之言或斷以巳意後稱君子曰倣此施猶廣也言能廣施孝道感悟莊公施以豉反又式智反詩曰孝子不匱永錫爾類其是之謂乎杜不匱純孝也莊心公雖失之於初孝不忘考叔感而通之所謂永錫爾類詩人之作各以情言君子論之不以文害意故春秋傳引詩不皆與今說詩者同他皆倣此林舉大雅既醉詩孝子之心無有窮匱長以已之孝誠錫及其儔類皆為孝也言考叔之孝足當是詩之所謂也匱其位反秋七月天王使宰咺來歸惠公仲子之賵緩且子氐未薨故名杜惠公葬在春秋前故曰緩也子氏仲子也薨在二年林一舉兩事皆非禮故名咺示貶天子七月而葬同軌畢至杜言同軌以别四夷之國林中國廣大不七月不足以盡逺人之情車同軌言極四海之內同軌之諸侯莫不盡至諸侯五月同盟至林五月而葬殺於天子同方嶽之盟其地漸近故五月可至不言畢至至不至無所拘也大夫三月同位至林三月而葬殺於諸侯古者行役不踰時故三月而同位至士踰月外姻至林過月而葬殺於大夫姻親也外親愈近故過月可至杜此言赴弔各以逺近為差因為葬節贈死不及尸杜尸未葬之通稱林贈賵死者不及其尸在殯之時弔生不及哀杜諸侯巳上既葬則纕麻除無哭位諒暗終喪林赴弔生者不及其哀哭方盛之時豫凶事非禮也杜仲子在而來賵故曰豫凶事林二事皆非禮也韓曰數語巳備喪禮覺徐勉之為煩八月紀人伐夷夷不告故不書杜夷國在城陽莊武縣紀國在東莞劇縣隱十一年傳例曰凡諸侯有命告則書不然則否史不書於䇿故夫子亦不書于絰傳見其事以明春秋例也他皆倣此有蜚不為災亦不書杜莊二十九年傳例曰凡物不為災不書又於此發之者明傳之所據非唯史策兼采簡牘之記也他皆倣此林蜚負蠜也蓋食苖蟲之屬不為田野之害亦不書於經也蜚扶味反惠公之季年敗宋師于黃杜黃宋邑陳留外黃縣東有黃城敗必邁反敗他也後倣此公立而求成焉九月及宋人盟于宿始通也杜經無義例故傳直言其歸趣而巳他皆倣此林魯宋始通好命冬十月庚申改葬惠公公弗臨故不書杜以桓為大子故隱公讓而不敢為喪主隱攝君政故據隱而言惠公之薨也有宋師大子少葬故有闕林葬禮有所闕少少詩照反是以改葬林詳述所以改葬之故衛侯來㑹葬不見公亦不書杜諸侯㑹葬非禮也不得接公成禮故不書於䇿他皆倣此衛國在汲郡朝歌縣鄭共叔之亂林即叔段公孫滑出奔衛杜公孫滑共叔段之子滑于八反又乎八反衛人為之伐鄭林為公孫滑伐鄭報仇為于僞及取廩延鄭人以王師虢師伐衛南鄙杜虢西虢國也𢎞農陜縣東南有虢城林凡師能左右之曰以蓋鄭以周虢之師伐衛南鄙討公孫滑之亂也請師於邾邾子使私於公子豫杜公子豫魯大夫私請師林鄭請濟師於邾邾使人私請師於豫豫音預豫請往公弗許遂行及邾人鄭人盟于翼林預請於公欲往㑹師隱公不從豫之請豫專擅而往及邾鄭盟翼邾地不書非公命也杜豫私㑹盟故曰非隱公之命新作南門不書亦非公命也杜非公命不書三見者皆興作大事各舉以備文林二事以見大夫專擅之端十二月祭伯來非王命也林以王臣無王命而私交於魯王室事可知矣衆父卒杜衆父公子益師字衆音終公不與小斂故不書日杜禮卿佐之喪小斂大斂君皆親臨之崇恩厚也始死情之所篤禮之所崇故以小斂為文至于但臨大斂不親及不臨喪亦同不書日林小斂始死之斂蓋隱公臨衆父始死之斂故不書衆父卒日蓋傳者釋經有書日書月書時之例與音預斂力驗反經庚申二年春公㑹戎于潛杜戎狄夷蠻皆氐羌之别種也戎而書㑹者順其俗以為禮皆謂居中國若戎子駒支者陳留濟陽縣東南有戎城潛魯地林戎之近於魯者此外交之始也是故㑹戎于潛春秋之始㑹吳黃池春秋之終此春秋之所以終始也夏五月莒人入向杜向小國也譙國龍亢縣東南有向城莒圍今城陽莒縣也將卑師少稱人弗地曰入例在襄十三年林此入國之始也向舒亮反無駭帥師入極杜無駭魯卿極附庸小國無駭不書氏未賜族賜族例在八年林無駭帥師大夫專兵之端見矣駭户楷反秋八月庚辰公及戎盟于唐杜高平方與縣北有武唐亭八月無庚辰庚辰七月九日也日月必有誤林唐魯地此盟戎之始也九月紀裂繻來逆女杜裂繻紀大夫傳曰卿為君逆也以别卿自逆也逆女或稱使或不稱使昏禮不稱主人史各隨其實而書非例也他皆倣此裂音列繻音須冬十月伯姬歸于紀杜無傳伯姬魯女裂繻所逆者紀子帛莒子盟于密杜子帛裂繻字也莒魯有怨紀侯既昏于魯使大夫盟莒以和解之子帛為魯結好息民故傳曰魯故也比之內大夫而在莒子上稱字以嘉之也字例在閔元年密莒邑城陽淳于縣東北有密鄉林此外特相盟之始也帛音白十有二月乙卯夫人子氏薨杜無傳桓未為君仲子不應稱夫人隱讓桓以為大子成其母喪以赴諸侯故經於此稱夫人也不反哭故不書葬例在三年鄭人伐衛杜凡師有鐘鼓曰伐例在莊二十九年林伐天子之權此諸侯專征伐之始傳二年春公㑹戎于潛修惠公之好也戎請盟公辭杜許其修好而不許其盟禦夷狄者不一而足林惠公與戎有好隱公立而修之戎請與公盟公辭戎不與之盟好呼報反下同莒子娶于向向姜不安莒而歸夏莒人入向以姜氏還杜傳言失昏姻之義凡得失小故經無異文而傳備其事案文則是非足以為戒他皆倣此林姜向女姓不安莒者琴瑟不和故不安于莒而歸其父母之國莒怒其妻而入其父母之國以其妻歸還音旋後皆同司空無駭入極費庈父勝之杜魯司徒司馬司空皆卿也庈父費伯也前年城郎今因得以勝極故傳於前年發之庈音琴戎請盟秋盟于唐復修戎好也林戎復請與魯盟隱公與戎盟再修和戎之好也復扶又反九月紀裂繻來逆女卿為君逆也林言卿為君逆以别非裂繻自逆也為于僞反冬紀子帛莒子盟于密魯故也鄭人伐衛討公孫滑之亂也杜治元年取廩延之亂經辛酉三年春王二月已巳日有食之杜無傳日行遲一嵗一周天月行疾一月一周天一嵗凡十二交㑹然日月動物雖行度有大量不能不小有盈縮故有雖交㑹而不食者或有頻交而食者惟正陽之月君子忌之故有伐鼓月幣之事今釋例以長厯推經傳明此食是二月朔也不書朔史失之書朔日例在桓十七年林日月交㑹于朔食之則食未有非交㑹而食者也此不食朔官失之也已巳上音紀下音祀後倣此食如字本或作蝕音同三月庚戌天王崩杜周平王也實以壬戌崩欲諸侯之速至故逺日以赴春秋不書實崩日而書逺日者即傳其僞以懲臣子之過也襄二十九年傳曰鄭上卿有事使印段如周㑹葬今不書葬魯不㑹林平王崩桓王立夏四月辛卯君氏卒林隱公之母也隱不敢從正君之禮亦不敢備禮於其母秋武氏子來求賻杜武氏子天子大夫之嗣也平王喪在殯新王未得行其爵命聽於冢宰故傳曰王未葬釋其所以稱父族又不稱使也魯不共奉王喪致令有求經直文以示不敬故傳不復具釋也林賻助喪之物此來求之始賻音附八月庚辰宋公和卒杜稱卒者略外以别內也元年大夫盟於宿故來赴以名例在七年林穆公卒殤公立冬十有二月齊侯鄭伯盟于石門杜來告故書石門齊地或曰濟北盧縣故城西南濟水之門林此特相盟之始書石門以志諸侯之合書醎以志諸侯之散以見春秋之終始齊鄭為之也癸未葬宋穆公杜無傳魯使大夫㑹葬故書始死書卒史在國承赴為君故惡其薨名改赴書也書葬則舉諡稱公者㑹葬者在外據彼國之辭也書葬例在昭六年傳三年春王三月壬戌平王崩赴以庚戌故書之夏君氏卒聲子也不赴于諸侯不反哭于寢不祔于姑故不曰薨不稱夫人故不言葬杜夫人喪禮有三薨則赴于同盟之國一也既葬日中自墓反虞于正寢所謂反哭于寢二也卒哭而祔於祖姑三也若此則書曰夫人某氏薨葬我小君某氏此備禮之文也其或不赴不祔則為不成喪故死不稱夫人薨葬不言葬我小君某氏反哭則書葬不反哭則不書葬今聲子三禮皆闕釋例論之詳矣祔音附不書姓為公故曰君氏杜不書姓辟正夫人也隱見為君故特書於經稱曰君氏以别凡妾媵為于僞反鄭武公莊公為平王卿士杜卿士王卿之執政者言父子秉周之政王二于虢杜虢西虢公亦仕王朝王欲分政於虢不復專任鄭伯鄭伯怨王王曰無之故周鄭交質王子狐為質於鄭鄭公子忽為質於周林交質子以為信王子狐平王子忽鄭莊公子質音致下同王崩周人將畀虢公政杜周人遂成平王本意畀必二反與也四月鄭祭足帥師取溫之麥秋又取成周之禾杜四月今二月也秋今之夏也麥禾皆未熟言取者蓋芟踐之溫今河內溫縣成周洛陽縣也祭側界反周鄭交惡杜兩相疾惡君子曰信不由中質無益也明恕而行要之以禮雖無有質誰能間之林言周鄭之誠信不出於中心以子交質無益於事明則彼此相知恕則彼此相諒若能明恕而行其事要結之以上下大小之禮節雖無以子交質之事誰能離間其交要於遙反間去聲茍有明信澗溪沼沚之毛林山溪為澗通川為溪方池為沼小渚為沚毛草也溪苦兮反爾雅云山夾水曰澗山瀆無所通曰溪沼之紹反沚音止亦音市本又作畤蘋蘩蕰藻之菜杜蘋大蓱也蘩皤蒿蕰藻聚藻也林皆可以為菜蘋音頻蘩音煩蕰紆紛反藻音卑筐筥錡釜之器林方曰筐圖曰筥皆竹器有足曰錡無足曰釡皆金器筐丘芳反筥九吕反錡其綺反筐筥皆器也潢汙行潦之水杜潢汙停水行潦流潦潢音黃汙音烏潦音老可薦於鬼神林薦享也鬼神天神人鬼也言雖微物可薦享於鬼神也可羞於王公杜羞進也林亦言微物可進於王公之貴也而况君子結二國之信行之以禮又焉用質杜通言盟約彼此之情故言二國焉於䖍反風有采蘩采蘋杜采蘩采蘋詩國風義取於不嫌薄物雅有行葦泂酌杜詩大雅也行葦篇義取忠厚也泂酌篇義取雖行潦可以共祭祀也葦于鬼反泂音迥昭忠信也杜明有忠信之行雖薄物皆可為用武氏子來求賻王未葬也林平王未葬故求賻以葬王室事可知巳宋穆公疾召大司馬孔父而屬殤公焉曰林孔父嘉為宋大司馬孔子六世祖也殤公名與夷宣公之子穆公之姪蓋以殤公託之孔父使立為國君此以下並穆公託孔父之辭屬章欲反殤舒羊反先君舍與夷而立寡人寡人弗敢忘若以大夫之靈得保首領以沒先君若問與夷其將何辭以對請子奉之以主社稷寡人雖死亦無悔焉林先君謂宣公穆公之兄也蓋言宣公舍其子與夷而立寡人不敢忘宣公之德若以汝之威靈得保全首領而善終宣公若問其子將以何言辭對宣公之問請奉與夷以為君以主宋國社稷之事我雖即死亦無愧悔於先君之前舍音捨與如字一音餘沒本亦作殁同對曰羣臣願奉馮也杜馮穆公子莊公也林言羣臣願奉馮為君不願立殤公馮皮氷反本亦作慿公曰不可先君以寡人為賢使主社稷若棄德不讓是廢先君之舉也豈曰能賢光昭先君之令德可不務乎吾子其無廢先君之功林言不可立馮宣公以國社我為有賢德使我為宋稷祭祀之主若我棄遜讓之德不與與夷是廢宣公舉賢之意也豈足稱賢宣公以國讓我今我又以國讓與夷是光明宣公讓國之美德可不以此為先務乎謂孔父當成我意其無廢先君舉賢之功杜先君以舉賢為功我若不賢是廢之使公子馮出居于鄭杜辟殤公也八月庚辰宋穆公卒殤公即位君子曰宋宣公可謂知人矣立穆公其子饗之命以義夫林言宣公可謂有知人之明不立其子而立弟穆公卒又立宣公之子是其子享有天祿也讓國義也言宣公能以義制命杜命出於義也夫語助夫音扶商頌曰殷受命咸宜百祿是荷其是之謂乎杜詩頌言殷湯武丁受命皆以義故任荷天之百祿也帥義而行則殤公宜受此命宜荷此祿公子馮不帥父義忿而出奔因鄭以求入終傷咸宜之福故知人之稱唯在宣公也殷禮有兄弟相及不必傳子孫宋其後祿也故指稱商頌林言宣公以義制命能使其子任荷天合此詩之義也頌似用反荷本又作何何可反冬齊鄭盟于石門尋盧之盟也杜盧盟在春秋前盧齊地今濟北盧縣故城尋盟修好也庚戌鄭伯之車僨于濟林既盟而遇大風傳記異也十仆也二月無庚戌日誤僨弗問及衛莊公娶于齊東宫得臣之妹曰莊姜杜得臣齊大子也大子不敢居上位故常處東宫林妹大子女弟蓋衛莊姜齊大子之妹也莊姜從夫諡也美而無子衛人所為賦碩人也杜碩人詩義取莊姜美于色賢于德而不見答終以無子國人憂之為于僞反又娶于陳曰厲媯生孝伯早死其娣戴媯生桓公莊姜以為巳子杜陳今陳國陳縣媯陳姓也厲戴皆諡雖為莊姜子然大子之位未定林莊姜無子故養桓公猶巳之子媯九危反公子州吁嬖人之子也杜嬖親幸也吁况于反嬖必計反賤而得幸曰嬖有寵而好兵公弗禁林母嬖故州吁有寵而好甲兵之事莊公不禁止好呼報反禁居鴆反一音金莊姜惡之石碏諫曰臣聞愛子教之以義方杜石碏衛大夫林義以方外教子以方外之義惡烏路反碏七略反弗納于邪驕奢淫泆所自邪也四者之來寵祿過也將立州吁乃定之矣若猶未也階之為禍林納入也弗入邪僻不正驕矜陵物奢侈僭上淫欲無度泆蕩放恣此四者不正之自起四者皆自外至故曰來寵祿大過則四者不期而自生也杜言將立為大子則宜卑定若不早定州吁必緣寵而為禍邪似嗟反下周泆音逸夫寵而不驕驕而能降降而不憾憾而能眕者鮮矣杜如此者少也降其身則必恨恨則思亂不能自安自重林得君寵愛而不驕矜巳驕而能自降其心強降其心而不怨憾有怨憾之心而能自重其身能如是者少矣夫音扶發句之端後倣此憾本又作感同胡暗反恨也眕之忍反重也鮮匆淺反少也且夫賤妨貴少陵長逺間親新間舊小加大淫破義所為六逆也君義臣行父慈子孝兄愛弟敬所謂六順也去順效逆所以速禍也君人者將禍是務去而速之無乃不可乎林以庶孽之賤而妨害嫡長之貴以卑少而陵犯尊長以疏逺而離間親近以新進而離間耆舊以小國而加兵大國以淫欲而破壞義理此六者皆逆天之理君能制命為義臣能行君之義為父而慈愛其子為子而孝順其父為兄而友愛其弟為弟而恭敬其兄此六者皆順天之理去六順而效六逆所以自速其禍難也君乎人者將禍難是先去寵州吁而弗禁其好兵是去順效逆以速禍難必不可也杜小國而加兵於大國如息侯伐鄭之比妨音芳少詩照反長丁文反去起吕反弗聽其子厚與州吁游禁之不可桓公立乃老杜老致仕也四年經書州吁弒其君故傳先經以始事經壬戌四年春王二月莒人伐杞取牟婁杜無傳書取言易也例在襄十三年杞國本都陳留雍丘縣推尋事跡桓六年淳于公亡國杞似并之遷都淳于僖十四年又遷緣陵襄二十九年晉人城杞之淳于杞又遷都淳于年婁杞邑城陽諸縣東北有婁鄉林此伐國取邑之始杞音起牟亡侯反戊申衛州吁弒其君完杜稱臣弒君臣之罪也例在宣四年戊申三月十七日有日而無月弒本又作殺同音試凡弒君之例皆倣此可以意求不重音完音丸夏公及宋公遇于清杜遇者革次之期二國各簡其禮若道路相逢遇也清衛邑濟北東阿縣有清亭林此特相遇之始宋公陳侯蔡人衛人伐鄭林此諸侯㑹伐之始亦東諸侯分黨之始于是齊鄭一黨也魯宋陳蔡衛一黨也東諸侯分黨而天下始多故也秋翬帥師㑹宋公陳侯蔡人衛人伐鄭杜公子翬魯大夫不稱公子疾其固請強君以不義也諸外大夫貶皆稱人至於內大夫貶則皆去族稱名於記事之體他國可言某人而巳魯之卿佐不得言魯人此所以為異也翬溺去族傳曰疾之叔孫豹則曰言違命此其例也林此大夫專將之始於是翬得兵而循至於弒君矣翬許歸反九月衛人殺州吁于濮杜州吁弒君而立未列於㑹故不稱君例在成十六年濮陳地水名林於是州吁不稱公子石碏得書人討賊之義著矣濮音卜冬十有二月衛人立晉杜衛人逆公子晉而立之善其得衆故不書入於衛變文以示義例在成十八年林桓公弟宣公立傳四年春衛州吁弒桓公而立公與宋公為㑹將尋宿之盟未及期衛人來告亂夏公及宋公遇于清杜宿盟在元年林因衛亂而簡其禮以相見宋殤公之即位也公子馮出奔鄭鄭人欲納之及衛州吁立將修先君之怨於鄭杜謂二年鄭人伐衛之怨而求寵於諸侯以和其民杜諸篡立者諸侯既與之㑹則不復討故欲求此寵使告於宋曰君若伐鄭以除君害杜害謂宋公子馮君為主敝邑以賦與陳蔡從則衛國之願也杜言舉國之賦調林敝邑衛自謂言以衛國之賦調與陳蔡之兵從宋從才用反宋人許之於是陳蔡方睦於衛杜蔡今汝南上蔡縣故宋公陳侯蔡人衛人伐鄭圍其東門五日而還公問於衆仲曰衛州吁其成乎杜衆仲魯大夫林言州吁其成為君乎對曰臣聞以德和民不聞以亂林惟有德可以得民和不聞以兵亂之道杜亂謂阻兵而安忍以亂猶治絲而棼之也杜絲見棼緼益所以亂林治絲之道以和緩為先棼猶紛也若紛之益見亂而難治和民之道猶是棼扶云反夫州吁阻兵而安忍阻兵無衆安忍無親衆叛親離難以濟矣林恃其兵戈而安於殘忍杜恃兵則民殘民殘則衆離叛安忍則刑過刑遇則親夫兵猶火也弗戢將自焚也林譬之于火若不戢止將自焚其身戢莊立反夫州吁弒其君而虐用其民於是乎不務令德而欲以亂成必不免矣林文德武德是為令德令美也此言州吁不先務於文武之美德而欲以兵亂成功必不免於禍秋諸侯復伐鄭宋公使來乞師杜乞師不書非卿公辭之杜從衆仲之言羽父請以師㑹之杜羽父公子翬公弗許固請而行林隱公不從羽父之請羽父固請于公而以師行故書曰翬帥師疾之也林疾惡羽父專兵以㑹諸侯故不書公子翬惡之也諸侯之師敗鄭徒兵取其禾而還林重言諸侯之師以見非翬獨敗鄭兵言敗徒兵以别其時非車戰州吁未能和其民厚問定君於石子林州吁好亂故未能和其人民厚石厚石子石碏厚之父也厚以州吁不安咨問於其父石子曰王覲為可林石碏答其子惟朝王為可安覲其靳反見也曰何以得覲曰陳桓公方有寵於王陳衛方睦若朝陳使請必可得也厚從州吁如陳林陳桓公方有眷寵於王陳方與衛親睦若州吁往朝于陳使陳為衛請命於王必可得朝覲於王也如往也往陳行朝禮此時陳桓公尚存未應有諡蓋左氏追書之朝直遙反石碏使告于陳曰衛國褊小老夫耄矣無能為也此二人者實弒寡君敢即圖之杜八十曰耄稱國小巳老自謙以委陳使因其往就圖之林言國小身老無能為役敢請陳因其來朝而就圖討之褊必淺反一音必殄反耄毛報反陳人執之而請涖於衛林從石碏而報州吁石厚請衛人自臨討之涖音利又音類臨也九月衛人使右宰醜林右宰官名醜衛臣涖殺州吁于濮石碏使其宰獳羊肩林石碏之家宰也獳奴侯反涖殺石厚于陳君子曰石碏純臣也惡州吁而厚與焉大義滅親其是之謂乎杜子從弒君之賊國之大逆不可不除故曰大義滅親明小義則當兼子愛之林言石碏純直之臣也惡州吁弒君之賊以厚臣事州吁而併殺之伸君臣之大義而滅父子之私親合於古語大義滅親之說惡烏路反與音預衛人逆公子晉于邢冬十二月宣公即位杜公子晉也邢音刑國名書曰衛人立晉衆也林公子晉先出在邢衛人迎而立之經癸亥五年春公矢魚于棠杜書陳魚以示非禮也書索譏逺地也今髙平方與縣北有武唐亭魯侯觀魚臺夏四月葬衛桓公秋衛師入郕杜將卑師衆但稱師此史之常也郕音成國名九月考仲子之宫初獻六羽杜成仲子宫安其主而祭之惠公以仲子手文娶之欲以為夫人諸侯無二嫡蓋隱公成父之志為别立宫也公問羽數故書羽婦人無諡因姓以名宫林仲子桓母也隱人故將讓桓故以桓母為夫人諸侯無二嫡既以孟子為夫為仲子别立廟以六佾獻于仲子之廟邾人鄭人伐宋杜邾主兵故序鄭上螟杜無傳螟蟲食苖心者為災故書螟亡丁反冬十有二月辛已公子彄卒杜大夫書卒不書葬葬者臣子之事非公寡所及彄苦侯反宋人伐鄭圍長葛林長葛鄭邑此書圃之始也伐國不言圍邑僖之前書之杜潁川長社縣北有長葛城傳五年春公將如棠觀魚者林如往也隱公將往棠陳魚而觀之魚本亦作漁臧僖伯諫曰凡物不足以講大事杜臧僖伯公子彄也僖諡也大事祀與戎其材不足以備器用則君不舉焉杜材謂皮革齒牙骨角毛羽也器用軍國之器林總言田獵所取之物不足以講習祀戎之事凡物之材不足以供軍國之器用則人君不為是舉動焉蓋君人之道以軍國祀戎為重以遊觀宴樂為輕君將納民於軌物者也故講事以度軌量謂之軌取材以章物采謂之物不軌不物謂之亂政亂政亟行所以敗也杜言器用衆物不入法度則為不軌不物亂敗之所起林軌法也物采也可法謂之軌可采謂之物言君之所為將納民於可法可采之中故講習大事以準度軌法非苟然而講事取鳥獸之材以章明物采非茍然而取材不合度量不可采飾謂之亂國之政為人君而數行亂政此國家所以敗壞也度待洛反又如字亟欺冀反數也故春搜夏苖秋獮冬狩杜搜索擇取不孕者苖為苗除害也獮殺也以殺為名順秋氣也狩圍守也冬物畢成獲則取之無所擇也搜所求反獮息淺反說文作􅸦穀梁傳云春曰田秋曰搜狩手又反皆於農隙以講事也杜各隨時事之間林古者藏兵於農故四時之田皆於農事之間隙恐其妨農隙去逆反三年而治兵入而振旅杜雖四時講武猶復三年而大習出曰治兵始治其事入曰振旅治兵禮畢整衆而還振整也旅衆也振之慎反歸而飲至以數軍實杜飲于廟以數車徒器械及所獲也數所主反昭文章明貴賤林昭著也君大夫士車服旌旗各有文章田獵之制貴者先殺所以明君大夫士庶人之貴賤辨等列林辨上下之等第行列坐作進退皆是也辨如字又方免反别也順少長林出則少者在前趍敵之義還則少者在後殿師之義所謂順也少詩照反長丁文反下同習威儀也林有威而可畏謂之威有儀而可象謂之儀皆所以講習上下之威儀也鳥獸之肉不登於俎杜爼祭宗廟器林飛禽走獸之肉不足登於俎以供祭祀鳥獸之肉一本作其肉俎莊吕反皮革齒牙骨角毛羽不登於器杜謂以飾法度之器林有毛曰皮去毛曰革小齒曰齒項上大齒曰牙翼上長毛曰羽不足升於法度之器以為采飾則公不射古之制也林君不親射此古先之法制也射食亦反若夫山林川澤之實器用之資皂𨽻之事官司之守非君所及也林山林謂林木樵薪之類川澤謂菱芡魚鱉之類所資取以為器用者杜士臣卑皂臣輿輿臣𨽻言取此雜猥之物以資器備是小臣有司之職非諸侯之所親也皂才早反公曰吾將略地焉杜孫辭以略地略總攝巡行之名傳曰東略之不知西則否矣遂往陳魚而觀之杜陳設張也公大設捕魚之備而觀之僖伯稱疾不從書曰公矢魚于棠非禮也且言逺地也杜矢亦陳也棠實他竟故曰逺地從才用反曲沃莊伯以鄭人邢人伐翼杜曲沃晉别封成師之邑在河東聞喜縣莊伯成師子也翼晉舊都在平陽絳邑縣東邢國在廣平襄國縣沃烏毒反王使尹氏武氏助之翼侯奔隨杜尹氏武氏皆周世族大夫也晉內相攻伐不告亂故不書傳具其事為後晉事張本曲沃及翼本未見桓二年隨晉地夏葬衛桓公衛亂是以緩杜有州吁之亂十四月乃葬傳明其非慢也四月鄭人侵衛牧杜牧衛邑經書夏四月葬衛桓公今傳直言憂而更以四月附鄭人侵衛牧者於下事宜得月以明事之先後故不復備舉經文三年君氏卒其義亦同他皆放此牧州牧之牧徐音目以報東門之役杜東門役在四年衛人以燕師伐鄭杜南燕國今東郡燕縣燕於賢反鄭祭足原繁泄駕以三軍軍其前林軍其前攻其前也羅與盧戎兩軍之鄭子罕宵軍之皆此義也泄息列反使曼伯與子元潛軍軍其後燕人畏鄭三軍而不虞制人林制人鄭北制之人曼伯子元之軍也不虞不料度也杜制鄭邑今河南成皋縣也一名虎牢曼音萬六月鄭二公子以制人敗燕師于北制杜二公子曼伯子元也林因燕不虞制人遂用制人敗之君子曰不備不虞不可以師林不備禦不虞度不可以行師此傳言燕師不備以取敗曲沃叛王秋王命虢公伐曲沃林西虢君仕於王朝者也而立哀侯于翼杜春翼侯奔隨故立其子光衛之亂也郕人侵衛故衛師入郕杜郕國也東平剛父縣西南有郕鄉九月考仲子之宫將萬焉杜萬舞也公問羽數於衆仲杜問執羽人數對曰天子用八杜八八六十四人諸侯用六杜六六三十六人大夫四杜四四十六人士二林二二四人士有功賜用樂夫舞所以節八音而行八風杜八音金石絲竹匏土革木也八風八方之風也以八音之器播八方之風手之舞之足之蹈之節其制而聚其情林節八音者使人手舞足蹈節其禮制使不荒淫故曰舞者樂之主也以八音之器宣播八方之風次序人情阜財解愠使不藴結也八音金鐘石磬絲琴瑟竹簫管土塤木柷敔匏笙草鼓也八方之風謂東方谷風東南清明風南方凱風西南凉風西方閭闔風西北不周風北方廣莫風東北方融風故自八以下杜唯天子得盡物數故以八為列諸侯則不敢用八公從之於是初獻六羽始用六佾也杜魯唯文王周公廟得用八而他公遂因仍僭而用之今隱公特立此婦人之廟詳問衆仲衆仲因明大典故傳亦因言始用六佾其後季氏舞八佾於庭知惟在仲子廟用六佾音逸宋人取邾田邾人告於鄭曰請君釋憾於宋敝邑為道杜釋四年再見伐之恨道音導本亦作導鄭人以王師㑹之杜王師不書不以告也林鄭莊尚為王卿故得用周師伐宋入其郛以報東門之役杜郛郭也東門役在四年郛芳夫反下同宋人使來告命杜告命䇿書公聞其入郛也將救之問於使者曰師何及對曰未及國杜忿公知而故問責窮辭使所吏反下同公怒乃止辭使者曰君命寡人同恤社稷之難林怒使者言不遜君謂殤公寡人自謂命猶令也命魯同憂恤宋國社稷之難難乃旦反今問諸使者曰師未及國非寡人之所敢知也杜為七年公伐邾傳冬十二月辛已臧僖伯卒林即公子彄公曰叔父有憾於寡人杜諸侯稱同姓大夫長曰伯父少曰叔父有恨恨諫觀魚不聽寡人弗敢忘葬之加一等杜加命服之等宋人伐鄭圍長葛以報入郛之役也林入郛在今年秋左傳杜林合注卷一
