body:
  text: 左傳杜林合注卷二十七明王道焜趙如源同編襄公三經已亥十有一年春王正月作三軍林増立中軍萬二千五百人為軍此志三家分公室之始夏四月四卜郊不從乃不郊無傳鄭公孫舍之帥師侵宋公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭杜世子光至復在莒子之先故晉悼亦進之林此悼公三駕之二秋七月己未同盟於亳城北亳城鄭地伐鄭而書同盟鄭與盟可知亳蒲洛反公至自伐鄭無傳楚子鄭伯伐宋公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭杜晉遂尊光林此悼公三駕之三㑹于蕭魚杜鄭服而諸侯㑹蕭魚鄭地林伐鄭而㑹蕭魚序績也自是鄭不叛晉者二十四年公至自㑹杜無傳以㑹至者觀兵而不果侵伐楚人執鄭行人良霄杜良霄公孫輒子伯有也霄音消冬秦人伐晉傳十一年春季武子將作三軍魯本無中軍唯上下二軍皆屬於公有事三卿更帥以征伐季氏欲專其民人故假立中軍因以改作告叔孫穆子曰請為三軍各征其軍征賦稅也三家各征其軍之家屬穆子曰政將及子子必不能杜政者霸國之政令禮大國三軍魯次國而為大國之制貢賦必重故憂不能堪武子固請之穆子曰然則盟諸杜穆子知季氏將復變易故盟之乃盟諸僖閎在僖宫之門閔音宏詛諸五父之衢杜五父衢道名在魯國東南詛以禍福之言相要詛側慮反父音甫衢其俱反正月作三軍三分公室而各有其一杜三分國民衆三子各毁其乘杜壊其軍乘分以足成三軍乘繩證反季氏使其乘之人以其役邑入者無征杜使軍乗之人率其邑役入季氏者無公征不入者倍征不入季氏者則使公家倍征之設利病欲駈使入已故昭五年傳曰季氏盡征之民辟倍征故盡屬季氏孟氏使半為臣若子若弟杜取其子弟之半也四分其乘之人以三歸公而取其一叔孫氏使盡為臣盡取子弟以其父兄歸公不然不舍制軍分民不如是則三家不舍其故而改作也此蓋三家盟詛之本言舍音捨鄭人患晉楚之故諸大夫曰不從晉國幾亡林自八年侵蔡獲燮以來晉楚交伐鄭國至今未巳杜幾近也幾音機徐音幾楚弱於晉晉不吾疾也林疾急也言晉不急於争鄭晉疾楚將辟之何為而使晉師致死於我楚弗敢敵而後可固與也林若晉急來爭鄭楚將避逃不敢與爭當作何計而使晉師致死力以爭鄭楚畏晉強不敢與之為敵而後鄭可固與晉子展曰與宋為惡諸侯必至吾從之盟楚師至吾又從之則晉怒甚矣晉能驟來楚將不能吾乃固與晉大夫說之使疆場之司惡於宋杜使守疆場之吏侵犯宋說音悅疆居良反場音亦宋向戌侵鄭大獲子展曰師而伐宋可矣若我伐宋諸侯之伐我必疾吾乃聽命焉且告於楚楚師至吾又與之盟而重賂晉師乃免矣杜言如此乃免於晉楚之難夏鄭子展侵宋杜欲以致諸侯四月諸侯伐鄭已亥齊太子光宋向戌先至於鄭門於東門傳釋齊太子光所以序莒上也向戌不書宋公在㑹故其莫杜其日之暮莫音暮晉荀罃至於西郊東侵舊許許之舊國鄭新邑衛孫林父侵其北鄙六月諸侯㑹於北林師於向杜向地在潁川長社縣東北向舒亮反右還次於瑣杜北行而西為右還滎陽宛陵縣西有瑣侯亭瑣素果反圍鄭觀兵於西門觀示也西濟於濟隧濟隧水名濟子禮反隧音遂鄭人懼乃行成秋七月同盟於亳范宣子曰不慎必失諸侯杜慎敬威儀謹辭令諸侯道敝而無成能無貳乎林諸侯數伐鄭罷敝於道路而無成功乃盟載書曰凡我同盟毋蕰年林蕰積年穀而不分災毋音無下皆同蕰紆粉反毋壅利杜専山川之利壅於勇反毋保姦杜藏罪人毋留慝杜速去惡慝他得反下同救災患恤禍亂同好惡奬王室杜奬助也好惡並如字又上呼報反下烏路反奬將丈反或間兹命司慎司盟名山名川二司天神閒間厠之間羣神羣祀杜羣祀在祀典者先王先公杜先王諸侯之太祖宋祖帝乙鄭祖厲王之比也先公始封君七姓十二國之祖七姓晉魯衛鄭曹滕姬姓邾小邾曹姓宋子姓齊姜姓莒已姓杞姒姓薛任姓實十三國言十二誤也明神殛之杜殛誅也殛紀力反俾失其民隊命亡氏踣其國家杜踣斃也隊直類反踣蒲北反徐敷豆反楚子囊乞旅於秦乞師旅于秦秦右大夫詹帥師從楚子將以伐鄭鄭伯逆之丙子伐宋鄭逆服故更伐宋也秦師不書不與伐宋而還詹之廉反九月諸侯悉師以復伐鄭此夏諸侯皆復來故曰悉師鄭人使良霄大宰石㚟如楚告將服于晉曰孤以社稷之故不能懷君君若能以玉帛綏晉不然則武震以攝威之孤之願也楚人執之書曰行人言使人也書行人言非使人之罪古者兵交使在其間所以通命示整或執殺之皆以為譏也既成而後告故書在蕭魚下石㚟為介故不書㚟勑畧反攝如字又之涉反使所吏反諸侯之師觀兵于鄭東門鄭人使王子伯駢行成甲戌晉趙武入盟鄭伯冬十月丁亥鄭子展出盟晉侯杜二盟不書不告十二月戊寅㑹于蕭魚杜經書秋史失之庚辰赦鄭囚皆禮而歸之納斥候杜不相備也斥徐音尺又昌夜反禁侵掠林諸侯各止侵掠務相信厚晉侯使叔肸告于諸侯杜叔肸叔向也告諸侯亦使赦鄭囚掠音亮肸許乙反公使臧孫紇對曰凡我同盟小國有罪大國致討苟有以藉手鮮不赦宥寡君聞命矣杜言晉封小國有藉手之功則赦其罪人徳義如是不敢不承命藉在夜反鮮息淺反宥音又鄭人賂晉侯以師悝師觸師蠲悝觸蠲皆樂師名悝苦回反蠲古𤣥反又音圭廣車軘車淳十五乘甲兵備杜廣車軘車皆兵車名淳耦也林廣軘車相耦允十五乗廣古曠反軘徒温反淳述倫反徐之倫反乗繩證反下同凡兵車百乘他兵車及廣軘共百乗歌鐘二肆肆列也縣鐘十六為一肆二肆三十二枚肆音四及其鎛磬鎛磬皆樂器鎛音博女樂二八十六人晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華在四年八年之中九合諸侯如樂之和無所不諧杜諧亦和也九合諸侯謂五年㑹戚又㑹城棣救陳七年㑹戚八年㑹刑丘九年盟于戲十年㑹柤又伐鄭戌虎牢十一年同盟亳城此又㑹蕭魚請與子樂之杜共此樂樂音洛一音岳辭曰夫和戎狄國之福也八年之中九合諸侯諸侯無慝林諸侯無邪慝之行君之靈也二三子之勞也臣何力之有焉抑臣願君安其樂而思其終也詩曰樂只君子殿天子之邦杜詩小雅也謂諸侯有樂美之徳可以鎮撫天子之邦殿鎮也殿都遍反下同樂只君子福祿攸同攸所也便蕃左右亦是帥從便蕃數也言逺人相帥來服從便蕃然在左右蕃音煩夫樂以安徳義以處之禮以行之信以守之仁以厲之而後可以殿邦國同福祿來逺人所謂樂也林樂以導和故可以安和心中之徳義者宜也故可以處置天下之事禮者理也故可順理以行其教令信者實也故可慤實以守其所行仁者忠厚之至也故可以仁厚飭厲其風俗五徳皆備而後可以鎮安邦國同受上天之福祿懷來逺方之人所謂樂也以徳為主非但金石書曰居安思危逸書思則有備有備無患林先事而思則事事有其備先事而備則憂患自無敢以此規杜規正公公曰子之教敢不承命抑微子寡人無以待戎杜待遇接納不能濟河林晉有戎患則日虞四竟之狎聳不能濟河而南服鄭夫賞國之典也藏在盟府司盟之府有賞功之制不可廢也林君不可廢而不用臣不可廢而不受子其受之魏絳於是乎始有金石之樂禮也禮大夫有功則賜樂秦庶長鮑庶長武帥師伐晉以救鄭杜庶長秦爵也不書救鄭已屬晉無所救長丁丈反鮑先入晉地士魴御之少秦師而弗設備林士魴以庶長鮑之師少弱而弗設戰守之備御魚吕反壬午武濟自輔氏杜從輔氏渡河與鮑交伐晉師己丑秦晉戰于櫟晉師敗績易秦故也杜不書敗績晉恥易秦而敗故不告也櫟晉地櫟力的反徐失灼反易以豉反經庚子十有二年春王三月莒人伐我東鄙圍台杜琅邪費縣南有台亭台勑才反又音臺又翼之反季孫宿帥師救台遂入鄆鄆莒邑鄆音運夏晉侯使士魴來聘秋九月吳子乘卒杜五年㑹於戚公不與盟而赴以名林夀夢卒子諸樊立吳始書卒冬楚公子貞帥師侵宋公如晉傳十二年春莒人伐我東鄙圍台林台魯東鄙邑季武子救台遂入鄆杜乘勝入鄆報見伐取其鐘以為公盤林盤食器也以鐘之金鑄為襄公之盤器夏晉士魴來聘且拜師杜謝前年伐鄭師秋吳子壽夢卒杜夀夢吳子之號臨於周廟禮也林臨哭也杜周廟文王廟也周公出文王故魯立其廟吳始通故曰禮臨力蔭反下同凡諸侯之喪異姓臨於外杜於城外向其國同姓於宗廟杜所出王之廟同宗於祖廟杜始封君之廟同族於禰廟杜父廟也同族謂髙祖以下禰乃禮反是故魯為諸姬臨於周廟杜諸姬同姓國為干偽反下皆同為邢凡蔣茅胙祭臨於周公之廟杜即祖廟也六國皆周公之支子别封為國共祖周公邢音刑蔣將丈反案富辰所稱邢在蔣下今傳在凡上未知何者為是胙才故反祭惻界反徐知字冬楚子囊秦庶長無地伐宋師于楊梁以報晉之取鄭也林無地庶長名杜取鄭在前年梁國雎陽縣東有地名楊梁長丁丈反下同靈王求后于齊齊侯問對於晏桓子桓子對曰先王之禮辭有之林言先王講禮之辭命有之天子求后於諸侯諸侯對曰夫婦所生若而人杜不敢譽亦不敢毁故曰若如人妾婦之子若而人杜言非適也無女而有姊妹及姑姊妹則曰先守某公之遺女若而人齊侯許昏王使陰里結之陰里周大夫結成也為十五年劉夏逆王后傳守手又反公如晉朝且拜士魴之辱禮也杜士魴聘在此年夏嫌君臣不敵故曰禮秦嬴歸于楚林秦景公妹為楚共王夫人歸嫁也嬴音盈楚司馬子庚聘于秦為夫人寧禮也杜子庚莊王子午也諸侯夫人父母既沒歸寧使卿故曰禮經辛丑十有三年春公至自晉夏取邿杜邿小國也任城亢父縣有邿亭傳例曰書取言易也邿音詩秋九月庚辰楚子審卒杜共王也成二年大夫盟于蜀林共王卒子康王昭立冬城防林防臧氏邑傳十三年春公至自晉孟獻子書勞于廟禮也杜書勲勞於策也桓二年傳曰公至自唐告於廟也凡公行告於宗廟反行飲至舍爵䇿勲馬禮也桓十六年傳又曰公至自伐鄭以飲至之禮也然則還告廟及飲至及書勞三事偏行一禮則亦書至悉闕乃不書至傳因獻子之事以發明凡例釋例詳之夏邿亂分為三杜國分為三部志力各異師救邿遂取之魯師也經不稱師不满二千五百人傳通言之凡書取言易也不用師徒及用師徒而不勞雖國亦曰取用大師焉曰滅敵人距戰斬獲俘馘用力難重雖邑亦曰滅弗地曰入謂勝其國邑不有其地荀罃士魴卒林荀罃中軍將士魴下軍佐晉侯蒐于緜上以治兵為將命軍帥也必蒐而命之所以與衆共使士匄將中軍辭曰伯游長杜伯游荀偃長丁丈反昔臣習於知伯是以佐之非能賢也七年韓厥老知罃代將中軍士匄佐之匄今將讓故謂爾時之舉不以已賢事見九年請從伯游荀偃將中軍杜代荀罃士匄佐之位如故使韓起將上軍辭以趙武又使欒黶杜以武位卑故不聴更命黶辭曰臣不如韓起韓起願上趙武君其聽之使趙武將上軍武自新軍超四等代荀偃韓起佐之位如故欒黶將下軍魏絳佐之杜黶亦如故絳自新軍佐超一等代士魴新軍無帥杜將佐皆遷晉侯難其人使其什吏率其卒乗官屬以從於下軍禮也得慎舉之禮難乃且反或如字什音十卒子忽反乗繩證反晉國之民是以大和諸侯遂睦君子曰讓禮之主也范宣子讓其下皆讓欒黶為汰弗敢違也晉國以平數世賴之刑善也夫林范宣子始以中軍讓其下諸卿皆從而讓雖以欒黶最為汰侈亦讓韓起弗敢違戾晉國之政所以和平數世子弟猶足倚賴刑法也言士每以遜讓為羣臣法至善也汰音泰數所主反夫音扶一人刑善百姓休和可不務乎林一人以善而示法於衆百姓化於善皆休美而和平可不以行善為先務乎書曰一人有慶兆民賴之其寧惟永其是之謂乎杜周書吕刑也一人天子也寧安也永長也義取上有好善之慶則下賴其福周之興也其詩曰儀刑文王萬邦作孚杜詩大雅言文王善用法故能為萬國所信孚信也言刑善也及其衰也其詩曰大夫不均我從事獨賢杜詩小雅刺幽王役使不均故從事者怨恨稱已之勞以為獨賢無讓心言不讓也世之治也君子尚能而讓其下杜能者在下位則貴尚而讓之小人農力以事其上是以上下有禮而讒慝黜逺由不爭也謂之懿徳及其亂也君子稱其功以加小人杜加陵也君子在位者逺于萬反又如字小人伐其技以馮君子杜馮亦陵也自稱其能為伐技其綺反馮皮氷反是以上下無禮亂虐並生由爭善也爭自善也謂之昬徳國家之敝恒必由之杜傳言晉之所以興楚子疾告大夫曰不穀不徳少主社稷生十年而喪先君未及習師保之教訓而應受多福林師保皆教太子官言少小未及習熟教訓多福謂為君少詩照反喪息浪反是以不徳而亡師于鄢杜鄢在成十六年鄢音偃以辱社稷為大夫憂其𢎞多矣林𢎞大也既辱且憂𢎞大衆多若以大夫之靈獲保首領以殁於地唯是春秋窀穸之事杜窀厚也穸夜也厚夜猶長夜春秋謂祭祀長夜謂葬埋殁音沒窀張倫反又徒門反穸音夕所以從先君於禰廟者杜從先君代為襧廟請為靈若厲欲受惡諡以歸先君也亂而不損曰靈戮殺不辜曰厲大夫擇焉莫對及五命乃許秋楚共王卒子囊謀諡大夫曰君有命矣子囊曰君命以共若之何毁之林言君臨終之命其辭甚恭若之何以惡諡而毁滅之共音恭下同赫赫楚國而君臨之撫有蠻夷奄征南海以屬諸夏而知其過可不謂共乎請諡之共大夫從之杜傳言子囊之善吳侵楚養由基奔命子庚以師繼之杜子庚楚司馬養叔曰吳乘我喪謂我不能師也杜養叔養由基也必易我而不戒戒備也易以䜴反子為三覆以待我杜覆伏兵林令子庚設伏兵三處以待我師覆扶又反我請誘之子庚從之戰于庸浦杜庸浦楚地浦判五反大敗吳師獲公子黨君子以吳為不弔杜不用天道相弔恤詩曰不弔昊天亂靡有定杜言不為昊天所恤則致罪也為明年㑹向傳冬城防書事時也土功雖有常節通以事聞為時於是將早城臧武仲請俟畢農事禮也林得城築之禮鄭良霄太宰石㚟猶在楚杜十一年楚人執之至今石㚟言於子囊曰先王卜征五年杜先征五年而卜吉凶也征謂巡守征行而歳習其祥祥習則行杜五年五卜皆同吉乃巡狩不習則増修徳而改卜不習謂卜不吉不習則増絶句一本無増字則連下總為句今楚實不競行人何罪杜不能修徳與晉競止鄭一卿以除其偪杜一卿謂良霄使睦而疾楚以固於晉焉用之位不偪則大臣睦怨疾楚則事晉固焉於䖍反使歸而廢其使杜行而見執於楚鄭又遂堅事晉是鄭廢本見使之意其使所之反怨其君以疾其大夫而相牽引也林使相牽引令鄭國不和而事晉不固不猶愈乎楚人歸之經壬寅十有四年春王正月季孫宿叔老㑹晉士匄齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人㑹吳于向林叔老聲伯子也魯使二卿㑹晉敬事霸國晉人自是輕魯幣而益敬其使故叔老雖介亦列於㑹也齊崔杼宋華閔衛北宫括在㑹惰慢不攝故貶稱人蓋欲以督率諸侯奬成霸功也吳來在向諸侯㑹之故曰㑹吳向鄭地二月乙未朔日有食之無傳夏四月叔孫豹㑹晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人伐秦杜齊宋大夫不書義與向同林晉秦兵爭始於韓而終於十三國之伐己未衛侯出奔齊杜諸侯之䇿書孫寗逐衛侯春秋以其自取奔亡之禍故諸侯失國者皆不書逐君之賊也不書名從告林獻公出奔衛人立公孫剽莒人侵我東鄙無傳報入鄆秋楚公子貞帥師伐吳冬季孫宿㑹晉士匄宋華閱衛孫林父鄭公孫蠆莒人邾人于戚林戚孫林父邑於是衛孫林父立公孫剽而晉㑹於戚以定之襄昭之際大夫無君之禍晉為之也悼公之徳衰矣傳十四年春吳告敗于晉杜前年為楚所敗㑹于向為吳謀楚故也謀為吳伐楚為于偽反范宣子數吳之不徳也以退吳人杜吳伐楚喪故以為不徳數而遣之卒不為伐楚執莒公子務婁在位不書非卿務徐莫侯反又如字婁力侯反或力俱反以其通楚使也莒貳於楚故比年伐魯使所吏反將執戎子駒支駒支戎子名范宣子親數諸朝行之所在亦設朝位曰來姜戎氏昔秦人迫逐乃祖吾離于瓜州四嶽之後皆姜姓又别為允姓瓜州地在今燉煌迫音百瓜古華反乃祖吾離被苫蓋林蓋苫之别名杜言汝祖無氊裘可衣所被服者苫蓋也被曽皮反苫式占反蓋戸臘反爾雅曰自蓋謂之苫蒙荆棘以來歸我先君林汝祖無土地可居所蒙冒者荆棘也我先君恵公有不腆之田腆厚也腆他典反與女剖分而食之中分為剖女音汝下同剖曽口反今諸侯之事我寡君不如昔者蓋言語漏洩則職女之由杜職主也林由汝諸戎實主漏洩泄息列反徐以世反詰朝之事爾無與焉杜詰朝明旦不使復得與㑹事詰起吉反朝如字與音預亦同與將執女對曰昔秦人負恃其衆貪于土地逐我諸戎恵公蠲其大徳杜蠲明也林明其存亡繼絶之大徳謂我諸戎是四嶽之裔胄也四嶽堯時方伯姜姓也裔逺也冑後也裔以制反胄直又反母是翦棄杜翦削也母音無賜我南鄙之田狐狸所居豺狼所嘷我諸戎除翦其荆棘驅其狐狸豺狼以為先君不侵不叛之臣至于今不貳林言其地荒穢皆狐狸所居處其地辟野皆豺狼所嘷嘯我諸戎除剗翦削其荆棘而耕種之驅逐其狐狸豺狼而居處之以臣事晉之先君不内侵亦不外叛至于今日不敢攜貳貍力之反豺仕皆反嘷户羔反昔文公與秦伐鄭秦人竊與鄭盟而舍戌焉杜在僖二十年於是乎有殽之師在僖三十三年殽户交反晉禦其上戎亢其下亢猶當也亢苦浪反秦師不復我諸戎實然林殽之戰秦人匹馬隻輪無返者我諸戎效力攻秦實使之然譬如捕鹿晉人角之諸戎掎之林角者當其頭也掎者踣其足也捕音步徐又音賦掎居綺反與晉踣之杜踣僵也踣蒲北反又敷豆反戎何以不免自是以來晉之百役與我諸戎相繼于時言給晉役不曠時以從執政猶殽志也杜意常如殽無中二也豈敢離逷今官之師旅無乃實有所闕以攜諸侯而罪我諸戎我諸戎飲食衣服不與華同贄幣不通言語不達何惡之能為林諸戎飲食腥羶之味衣服氊毳之服不與中國同其嗜好執贄奠幣不通中國之禮交言接語不達中國之俗何能漏洩言語為惡於晉逷他厯反不與於㑹亦無瞢焉瞢悶也與音預瞢莫贈反徐武登反又武忠反賦青蠅而退杜青蠅詩小雅取其愷悌君子無信讒言蠅以仍反宣子辭焉杜辭謝使即事於㑹成愷悌也成愷悌不信讒也不書者戎為晉屬不得特達於是子叔齊子為季武子介以㑹自是晉人輕魯幣而益敬其使杜齊子叔老字也言晉敬魯使經所以並書二卿使所吏反吳子諸樊既除喪諸樊吳子乗之長子也乘卒至此春已七月既葬而除喪將立季札杜札諸樊少弟札側八反季札辭曰曹宣公之卒也諸侯與曹人不義曹君杜曹君公子負芻也殺大子而自立事在成十三年將立子臧其事在成十五年子臧去之遂弗為也以成曹君林子臧遂奔宋不肯為君成十六年晉歸曹伯君子曰能守節君義嗣也杜諸樊適子故曰義嗣誰敢奸君有國非吾節也札雖不才願附於子臧以無失節固立之棄其室而耕乃舍之傳言季札之讓且明吳兄弟相𫝊奸音干夏諸侯之大夫從晉侯伐秦以報櫟之役也櫟役在十一年晉侯待于竟使六卿帥諸侯之師以進杜言經所以不稱晉侯竟音境及涇不濟杜諸侯之師不肯渡也涇水出安定朝那縣至京兆髙陸縣入渭叔向見叔孫穆子穆子賦匏有苦葉杜詩邶風也義取於深則厲淺則揭言已志在於必濟匏白交反叔向退而具舟魯人莒人先濟鄭子蟜見衛北宫懿子曰與人而不固取惡莫甚焉若社稷何林子蟜即公孫蠆懿子即北公括言與人同伐而持心不固不肯濟水取惡於人莫甚於此懿子說二子見諸侯之師而勸之濟濟涇而次杜傳言北宫括所以書於伐秦說音悦秦人毒涇上流師人多死杜飲毒水故鄭司馬子蟜帥鄭師以進師皆從之至于棫林杜棫林秦地棫位逼反徐十自反又於鞠反不獲成焉杜秦不服荀偃令曰雞鳴而駕塞井夷竈示不反唯余馬首是瞻言進退從已欒黶曰晉國之命未是有也余馬首欲東乃歸黶惡偃自專故棄之歸下軍從之林黶將下軍故下軍從之歸左史謂魏莊子曰不待中行伯乎杜中行伯荀偃也莊子魏絳也左史晉大夫莊子曰夫子命從帥杜夫子謂荀偃林言荀偃命馬首是瞻是使人各從其帥帥所類反下同欒伯吾帥也吾將從之從帥所以待夫子也杜以從命為待也欒黶下軍帥莊子為佐故曰吾帥伯游曰吾令實過悔之何及多遺秦禽杜軍帥不和恐多為秦所禽獲遺唯季反乃命大還晉人謂之遷延之役遷延却退欒鍼曰此役也報櫟之敗也役又無功晉之恥也吾有二位於戎路杜欒鍼欒黶弟也二位謂黶將下軍鍼為戎右敢不恥乎與士鞅馳秦師死焉士鞅反杜鞅士匃子欒黶謂士匄曰余弟不欲往而子召之余弟死而子來是而子殺余之弟也弗逐余亦將殺之士鞅奔秦杜欒黶汰侈誣逐士鞅也而女也於是齊崔杼宋華閱仲江㑹伐秦不書惰也杜臨事惰慢不修也仲江宋公孫師之子向之㑹亦如之林向之㑹書齊人宋人亦如此義衛北宫括不書於向亦惰書於伐秦攝也能自攝整從鄭子蟜俱濟涇秦伯問於士鞅曰晉大夫其誰先亡對曰其欒氏乎秦伯曰以其汰乎對曰然欒黶汰虐已甚猶可以免其在盈乎盈黶之子秦伯曰何故對曰武子之徳在民如周人之思召公焉愛其甘棠況其子乎杜武子欒書黶之父也召公奭聽訟於甘棠之下周人思之不害其樹而作勿伐之詩在召南林言晉人之思欒書如周人之思召公周人猶愛召公之樹何況晉人而不愛欒書之子召上照反欒黶死盈之善未能及人武子所施沒矣而黶之怨實章將於是乎在秦伯以為知言為之請於晉而復之杜為傳二十一年晉滅欒氏張本施如字又始豉反為之于偽反衛獻公戒孫文子寗恵子食杜勅戒二子欲共宴食皆服而朝杜服朝服待命於朝日旰不召旰晏也旰古且反而射鴻於囿二子從之杜從公於囿射食亦反不釋皮冠而與之言杜皮冠田獵之冠也既不釋冠又不與食二子怒孫文子如戚杜戚孫文子邑孫蒯入使杜孫蒯孫文子之子使所吏反又如字公飲之酒使大師歌巧言之卒章杜巧言詩小雅其卒章曰彼何人斯居何之麋無拳無勇職為亂階戚衛河上邑公欲以喻文子居河上而為亂大師掌樂大夫飲於鴆反大師辭師曹請為之杜辭以為不可師曹樂人初公有嬖妾使師曹誨之琴杜誨教也嬖必計反師曹鞭之公怒鞭師曹三百故師曹欲歌之以怒孫子以報公公使歌之遂誦之林師曹既歌恐孫蒯不解故遂誦言之蒯懼告文子文子曰君忌我矣弗先必死杜欲先公作亂并帑於戚林帑妻子也乃并妻子皆居於戚并必政反帑音奴而入見蘧伯玉曰君之暴虐子所知也大懼社稷之傾覆將若之何杜伯玉蘧瑗蘧其居反覆芳服反對曰君制其國臣敢奸之杜奸猶犯也雖奸之庸知愈乎杜言逐君更立未知當差否遂行從近闗出杜懼難作欲速出竟公使子蟜子伯子皮與孫子盟于丘宫孫子皆殺之杜三子衛羣公子疑孫子故盟之丘公近戚地蟜居表反四月己未子展奔齊子展衛獻公弟公如鄄杜鄄衛地鄄音絹使子行於孫子孫子又殺之杜使往請和也子行羣公子公出奔齊孫氏追之敗公徒于阿澤杜濟北東阿縣西南有大澤鄄人執之杜公徒因敗散還故為公執之初尹公佗學射於庾公差庾公差學射於公孫卞二子追公杜二子佗與差為孫氏逐公佗徒何反差初佳反徐初宜反公孫丁御公杜為公御也子魚曰射為背師不射為戮射為禮乎杜子魚庾公差禮射不求中射食亦反下同皆音侃射兩軥而還杜軥車軛卷者軥其俱反徐古豆反尹公佗曰子為師我則逺矣乃反之杜佗不從丁學故言逺始與公差俱退悔而獨逺射丁為於偽反公孫丁授公轡而射之貫臂杜貫佗臂貫古亂反一音官子鮮從公子鮮公母弟鮮音仙及竟公使祝宗告亡且告無罪杜告宗廟也定姜曰無神何告若有不可誣也杜誣欺也定姜公適母林言若無鬼神尚何所告若有鬼神不可欺誣也有罪若何告無舍大臣而與小臣謀一罪也先君有冡卿以為師保而蔑之二罪也杜謂不釋皮冠之比舍音捨余以巾櫛事先君而暴妾使余三罪也林巾悅手者櫛理髪者言我事定公為夫人而暴虐使我如遇婢妾櫛側乙反告亡而已無告無罪杜時姜在國故不使得告無罪公使厚成叔弔于衛曰寡君使瘠聞君不撫社稷而越在他竟杜越逺也瘠厚成叔名瘠在亦反若之何不弔以同盟之故使瘠敢私於執事杜執事衛諸大夫曰有君不弔有臣不敏君不赦宥臣亦不帥職増淫發洩其若之何林為人君而不弔恤為臣之難為人臣而不敏達為君之難君既不赦宥其臣之過失臣亦不帥循其臣之職分君臣如此増其淫慝發洩而為逐君之事其將如之何哉洩息列反衛人使大叔儀對杜大叔儀衛大夫大音泰曰羣臣不佞得罪於寡君寡君不以即刑而悼棄之林不以羣臣就於刑戮乃自傷悼違棄之而去以為君憂君不忘先君之好辱弔羣臣又重恤之林重恤謂愍其不達也好呼報反重直用反下同敢拜君命之辱重拜大貺杜謝重恤之賜厚孫歸林厚孫即厚成叔復命語臧武仲曰衛君其必歸乎有大叔儀以守杜守於國語魚據反守手又反有母弟􅡈以出或撫其内或營其外林母弟􅡈即子鮮大叔儀鎮撫於其内母弟􅡈經營於其外鱄徐市戀反又音専能無歸乎齊人以郲寄衛侯郲齊所滅郲國郲音來及其復也以郲糧歸林言其貪右宰穀從而逃歸衛人將殺之杜穀衛大夫也以其從君故欲殺之從才用反又如字辭曰余不說初矣言初從君非說之不獲已耳說音悅下同余狐裘而羔袖林以狐為裘至美也以羔為袖則有少惡喻已一身盡美雖從君以出其惡不多神在又反乃赦之衛人立公孫剽杜剽穆公孫林是為殤公剽匹妙反又甫遙反字林父召反孫林父甯殖相之以聽命於諸侯杜聽盟㑹之命相息亮反衛侯在郲臧紇如齊唁衛侯林弔失國曰唁唁魚變反衛侯與之言虐林衛侯與臧武仲言皆暴虐之事退而告其人曰衛侯其不得入矣其言糞土也亡而不變何以復國林其言皆踐踏羣臣如土芥者也既亡而不改變其志何以為反國之本杜武仲不書未為卿子展子鮮聞之見臧紇與之言道杜順道理臧孫說林臧孫即臧武仲謂其人曰衛君必入夫二子者或輓之或推之欲無入得乎林前牽為輓後送為推杜為二十六年衛侯歸傳輓音晚推如字又他回反師歸自伐秦晉侯舍新軍禮也林晉悼公廢新軍不用得侯國置軍之禮舍音捨下同成國不過半天子之軍林成國大國也軍制不過居天子之半周為六軍諸侯之大者三軍可也於是知朔生盈而死杜朔知罃之長子盈朔弟也盈生而朔死知音智盈生六年而武子卒彘裘亦幼皆未可立也新軍無帥故舍之杜裘士魴子也十三年荀罃士魴卒其子皆幼未任為卿故新軍無帥遂舍之彘直例反帥所類反師曠侍於晉侯師曠晉樂太師名晉侯曰衛人出其君不亦甚乎對曰或者其君實甚良君將賞善而刑淫養民如子蓋之如天容之如地民奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆其可出乎夫君神之主而民之望也林奉祭祀故為神之主施徳恵故繫民之望出如字徐音黜霆徒丁反又音挺本又作電若困民之主林困苦其民以主其國匱神乏祀百姓絶望社稷無主將安用之弗去何為天生民而立之君使司牧之勿使失性林使司主萬民而牧養之勿使其民失其性情之正去起吕反有君而為之貳杜貳卿佐使師保之勿使過度林使為師為保以輔導其君之德業勿使其君越於法度之外是故天子有公諸侯有卿卿置側室杜側室支子之官大夫有貳宗杜貳宗宗子之副貳者士有朋友庶人工商皂𨽻牧圉皆有親暱林執技藝曰工通貨賄曰商造成事曰皂屬於吏曰𨽻養牛曰牧養馬曰圉暱女乙反以相輔佐也善則賞之杜賞謂宣揚過則匡之杜匡正也患則救之杜救其難也失則革之杜革更也自王以下各有父子兄弟以補察其政杜補其愆過察其得失史為書杜謂大史之官瞽為詩瞽盲者為詩以風刺工誦箴諫工樂人也誦箴諫之辭箴之林反大夫規誨規正諌誨其君士傳言杜士卑不得徑達聞君過失傳告大失傳直専反庶人謗庶人不與政聞君過則誹謗商旅于市旅陳也陳其貨物以示時所貴尚百工獻藝獻其技藝以喻政事故夏書曰遒人以木鐸徇于路林舉夏書𦙍征篇杜逸書遒人行人之官也木鐸木舌金鈴徇於路求歌謠之言遒在由反徐在幽反官師相規官師大夫自相規正工執藝事以諌杜所謂獻藝正月孟春於是乎有之諫失常也杜有道人徇路之事杜恐人君失其常度故諌之也天之愛民甚矣豈其使一人肆於民上肆放也以從其淫而棄天地之性必不然矣杜傳善師曠能因問盡言從子用反或作縱秋楚子為庸浦之役故在前年為于偽反子囊師于棠以伐吳吳不出而還子囊殿杜殿軍後殿多練反以吳為不能而弗儆吳人自臯舟之隘要而擊之臯舟吳險阨之道隘於懈反要一遙反楚人不能相救吳人敗之獲楚公子宣穀傳言不備不可以師王使劉定公賜齊侯命杜將昏於齊故也定公劉夏位賤以能而使之傳稱諡舉其終曰昔伯舅太公右我先王股肱周室師保萬民世胙大師以表東海杜胙報也表顯也謂顯封東海以報太師之功右音又胙才故反王室之不壞繄伯舅是賴杜繄發聲壊如字服本作懐繄烏兮反今余命女環環齊靈公名女音汝環户闗反兹率舅氏之典纂乃祖考無忝乃舊敬之哉無廢朕命杜纂繼也因昏而加褒顯傳言王室不能命有功晉侯問衛故於中行獻子杜問衛逐君當討否獻子荀偃對曰不如因而定之衛有君矣杜謂剽已立伐之未可以得志而勤諸侯史佚有言曰因重而撫之重不可移就撫安之佚音逸仲虺有言曰亡者侮之亂者取之推亡固存國之道也杜仲虺湯左相林亡者人侮之亂者人取之因其亡而推之因其存而固之此國家之常道也虺許鬼反君其定衛以待時乎杜待其昏亂之時乃伐之冬㑹於戚謀定衛也定立剽范宣子假羽毛於齊而弗歸齊人始貳析羽為旌王者游車之所建齊私有之因謂之羽毛宣子聞而借觀之楚子囊還自伐吳卒將死遺言謂子庚必城郢林子庚司馬公子午也當代子囊為令尹故子囊遺言令必城郢蓋楚徙都郢未有城郭公子燮公子儀因築城為亂事未得訖子囊欲訖而未暇故遺言見意君子謂子囊忠君薨不㤀増其名杜謂前年諡君為共將死不㤀衛社稷可不謂忠乎忠民之望也詩曰行歸于周萬民所望忠也杜詩小雅忠信為周言徳行歸於忠信即為萬民所瞻望行下孟反左傳杜林合注卷二十七
