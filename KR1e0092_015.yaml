body:
  text: 左傳杜林合注卷十五明王道焜趙如源同編文公一公名興僖公子母聲姜諡法慈惠愛民曰文忠信接禮曰文周襄王二十六年魯文公八年襄王崩子頃王立文十四年頃王崩子匡王立鄭穆公二年詳見僖公元年齊昭公七年魯文公十四年昭公卒子舍立九月舍弑懿公商人立文十八年懿公弑惠公元立宋成公十一年魯文公七年成公卒昭公杵臼立文十六年昭公弑弟文公鮑立晉襄公繼霸二年魯文六年襄公卒子靈公夷臯立是年趙盾為政衛成公九年詳見僖公元年蔡莊公二十年魯文公十五年莊公卒子文侯申立曹共公二十七年魯文公九年共公卒子文公夀立滕詳見隱公元年魯文公十二年滕昭公來朝陳共公六年魯文公十三年共公卒子靈公平國立杞詳見僖公元年薛詳見隱公元年及僖公元年莒魯文公十八年莒大子僕弑莒公庻其子季佗立邾文公四十一年魯文公十三年邾文公卒子定公玃且立許僖公二十九年魯文公五年僖公卒昭公錫我立小邾詳見僖公元年楚成王四十六年魯文公元年冬成王遇弑子穆王商臣立文十年次于厥貉文十三年穆王卒子莊王立楚莊王爭霸秦穆公三十四年秦用孟明以為政魯文公三年秦伯伐晉濟河焚舟遂霸西戎史記穆公三十七年益國十二開地千里天子使召公過賀穆公以金鼓文六年穆公卒子康公罃立文十八年康公卒子共公稻立吳詳見隱公元年越詳見隱公元年經乙未元年春王正月公即位杜無傳先君未葬而公即位不可曠年無君二月癸亥日有食之杜無傳癸亥月一日不書朔官失之天王使叔服來㑹葬杜叔氏服字諸侯喪天子使大夫㑹葬禮也夏四月丁巳葬我君僖公杜七月而葬緩天王使毛伯來錫公命杜毛國伯爵諸侯為王卿士者諸侯即位天子賜以命圭合瑞為信僖十一年王賜晉侯命亦其比也林自隱至文六君惟桓文書即位而後書錫命以其自即位也錫呈歴反晉侯伐衞杜晉襄公先告諸侯而伐衞雖大夫親伐而稱晉侯從告辭也叔孫得臣如京師杜得臣叔牙之孫衞人伐晉林衛孔達為政不共盟主興兵鄰國受討喪邑故貶稱人秋公孫敖㑹晉侯于戚杜戚衞邑在頓丘衞縣西禮卿不㑹公侯而春秋魯大夫皆不貶者體例已舉故據用魯史成文而已内稱公卒稱薨皆用魯史冬十月丁未楚世子商臣弑其君頵杜商臣穆王也弑君例在宣四年頵憂倫反又丘倫反公孫敖如齊杜傳例曰始聘焉禮也傳元年春王使内史叔服來㑹葬公孫敖聞其能相人也杜公孫敖魯大夫慶父之子林叔服能視人顔色知吉凶相息亮反見其二子焉叔服曰榖也食子難也收子林穀公孫敖長子文伯也難公孫敖次子惠叔也杜食子奉祭祀供養者也收子葬子身也見賢遍反食音嗣難乃多反又如字穀也豐下必有後於魯國杜豐下盖面方為八年公孫敖奔莒傳於是閏三月非禮也杜於厯法閏當在僖公末年誤於今年三月置閏盖時達厯者所譏先王之正時也履端於始舉正於中歸餘於終林日月運轉於天猶人之行歩故推厯謂之歩厯歩厯之始以為術之端首謂以十一月一日子初一刻冬至為厯首朞之日三百六十有六日日月之行又有遲速而必分為十二月舉中氣以正月月朔之與月節毎月各剰一日所有餘日歸餘於終積成一月則置之為閏故言歸餘於終履端於始序則不愆杜四時無愆過愆起䖍反舉正於中民則不惑杜斗建不失其次寒暑不失其常故無疑惑歸餘於終事則不悖杜四時得所則事無悖亂悖必内反夏四月丁巳葬僖公杜傳皆不虚載經文而此經孤見知僖公末年傳宜在此下王使毛伯衞來錫公命杜衞毛伯字一本作毛伯衞來錫公命一本作天王使叔孫得臣如周拜杜謝賜命晉文公之季年林季末也諸侯朝晉衞成公不朝使孔達侵鄭伐緜訾及匡杜孔達衞大夫匡在潁川新汲縣東北訾子斯反晉襄公既祥杜諸侯雖諒闇亦因祥祭為位而哭使告于諸侯而伐衞及南陽杜今河内地先且居曰林時為中軍帥效尤禍也杜尤衞不朝故伐今不朝王是效衞致禍時王在温故勸之且子餘反請君朝王臣從師晉侯朝王于温先且居胥臣伐衞五月辛酉朔晉師圍戚六月戊戌取之獲孫昭子昭子衛大夫食戚邑衛人使告于陳陳共公曰更伐之我辭之杜見伐求和不競大甚故使報伐示已力足以距晉林我為衛以辭謝晉求和共音恭更古孟反又音庚衛孔達帥師伐晉君子以為合古者越國而謀合古之道而失今事霸主之禮故國失其邑身見執辱秋晉侯疆戚田故公孫敖㑹之杜晉取衛田正其疆界疆居良反初楚子將以商臣為太子訪諸令尹子上子上曰君之齒未也杜齒年也言尚少而又多愛黜乃亂也林若已立為太子而又黜之乃取亂之道也楚國之舉恒在少者杜舉立也且是人也蠭目而豺聲忍人也杜能忍行不義蠭本又作蜂芳逢反豺仕皆反不可立也弗聽既又欲立王子職而黜太子商臣杜職商臣庻弟商臣聞之而未察林商臣得聞其事而未辨其信否告其師潘崇曰若之何而察之潘崇曰享江芊而勿敬也杜江芊成王妹嫁於江芉亡氏反史記以為成王妾從之江芊怒曰呼役夫杜呼發聲也役夫賤者稱呼好賀反役夫如字宜君王之欲殺女而立職也林言汝無禮如此宜成王之欲廢殺女而立王子職女音汝告潘崇曰信矣潘崇曰能事諸乎杜問能事職否曰不能能行乎曰不能能行大事乎曰能杜大事謂弑君林此鬭勃所謂忍人也冬十月以宫甲圍成王杜大子宫甲僖二十八年王以東宮卒從子玉盖取此宮甲王請食熊蹯而死杜熊掌難熟冀久将有外救林蹯熊掌也蹯音煩弗聽丁未王縊諡之曰靈不瞑曰成乃瞑杜言其忍甚未斂而加惡諡瞑亡丁反又亡千反穆王立以其為大子之室與潘崇使為大師且掌環列之尹杜環列之尹宫衞之官列兵而環王宮大音泰環如字又音患穆伯如齊始聘焉禮也杜穆伯公孫敖林文公即位始聘齊凡君即位卿出並聘林卿出並聘列國踐修舊好要結外援杜踐猶履行也好呼報反下同要於遙反援于眷反好事鄰國以衞社稷忠信卑讓之道也忠徳之正也信徳之固也卑讓徳之基也林盡心為民為忠君徳之正大也盡已盡人為信君徳之堅固也謙卑遜讓君徳之基本也𫝊因此發凡以明諸侯諒闇則國事皆用吉禮殽之役杜在僖年三十三晉人既歸秦帥秦大夫及左右皆言於秦伯曰是敗也孟明之罪也必殺之秦伯曰是孤之辠也周芮良夫之詩曰大風有隧貪人敗類杜詩大雅隧蹊徑也周大夫芮伯刺厲王言貪人之敗善類若大風之行毁壊衆物所在成蹊徑帥所類反芮如銳反詩大雅桑柔篇隧音遂道也敗必邁反聽言則對誦言如醉杜言昏亂之君不好典誦之言聞之若醉得道聽塗說之言則喜而答對誦似用反匪用其良覆俾我悖杜覆反也俾使也不用良臣之言反使我為悖亂覆芳服反俾本亦作卑必爾反是貪故也孤之謂矣孤實貪以禍夫子夫子何罪復使為政杜為明年秦晉戰彭衙傳復扶又反經丙申二年春王二月甲子晉侯及秦師戰于彭衙秦師敗績杜孟明名氏不見非命卿也大崩曰敗績馮翊郃陽縣西北有彭衙城林彭衙秦地衙音牙丁丑作僖公主杜主者殷人以柏周人以栗三年喪終則遷入於廟三月乙巳及晉處父盟杜處父為晉正卿不能匡君以禮而親與公盟故貶其族族去則非卿故以㣲人常稱為耦以直厭不直不地者盟晉都朝而遂盟之於是始夏六月公孫敖會宋公陳侯鄭伯晉士縠盟于垂隴杜垂隴鄭地滎陽縣東有隴城士縠出盟諸侯受成於衞故貴而書其氏林大夫而與諸侯敵於是始是故書士縠而後凡役書大夫縠户木反本亦作縠同隴力勇反自十有二月不雨至于秋七月杜無傳周七月今五月也不雨足為災不書旱五縠猶有收八月丁邜大事於大廟躋僖公杜大事禘也躋升也僖公閔公庻兄繼閔而立廟坐宜次閔下今升在閔上故書而譏之時未應吉禘而于大廟行之其譏已明徒以逆祀故特大其事異其文大廟音泰傳同躋子兮反冬晉人宋人陳人鄭人伐秦杜四人皆卿秦穆悔過終用孟明故貶四國大夫以尊泰伯公子遂如齊納幣杜傳曰禮也僖公喪終此年十一月則納幣在十二月也士昏六禮其一納采納徴始有𤣥纁束帛諸侯則謂之納幣其禮與士禮不同盖公為大子時已行昏禮也傳二年春秦孟明視帥師伐晉以報殽之役二月晉侯禦之先且居將中軍趙衰佐之杜代郤溱禦魚吕反將子匠反衰初危反王官無地御戎杜代梁𢎞狐鞫居為右杜鞫居續簡伯鞫九六反甲子及秦師戰于彭衙秦師敗績晉人謂秦拜賜之師杜以孟明言三年將拜君賜故嗤之戰于殽也晉梁𢎞御戎萊駒為右林原前時事並在僖三十三年戰之明日晉襄公縳秦囚使萊駒以戈斬之囚呼萊駒失戈狼瞫取戈以斬囚禽之以從公乗遂以為右林戈刀也禽獲也因上文萊駒失戈故言禽之生死皆曰禽因代萊駒為右與公乗戰襄公喜其勇遂以為車右呼火故反瞫尺甚反字林式衽反乗繩證反箕之役杜箕役在僖三十三年先軫黜之而立續簡伯狼瞫怒其友曰盍死之瞫曰吾未獲死所杜未得可死處盍户獵反其友曰吾與汝為難林欲共殺先軫女音汝難乃旦反瞫曰周志有之勇則害上不登于明堂杜周志周書也明堂祖廟也所以䇿功序徳故不義之士不得升死而不義非勇也共用之謂勇杜共用死國用共音恭吾以勇求右無勇而黜亦其所也杜言今死而不義更成無勇宜見退謂上不我知黜而宜乃知我矣杜言今見黜而合宜則吾不得復言上不我知子姑待之及彭衙既陳以其屬馳秦師死焉杜屬屬已兵陳直覲反晉師從之大敗秦師君子謂狼瞫於是乎君子詩曰君子如怒亂庻遄沮杜詩大雅遄疾也沮止也林言君子而有所怒禍亂庻幾其疾止也遄市専反沮在汝反又曰王赫斯怒爰整其旅杜詩大雅言文王赫然奮怒則整師旅以討亂赫火百反怒不作亂而以從師可謂君子矣秦伯猶用孟明孟明增修國政重施於民林秦穆公不以孟明再敗猶用之以為政益修治秦國之政事厚施恩惠於民欲用之以報晉施式䜴反趙成子言於諸大夫曰杜成子趙衰秦師又至將必辟之懼而增徳不可當也林言孟明再敗能增修其徳秦民必樂為之效死不可敵也辟音避詩曰毋念爾祖聿修厥徳杜詩大雅言念其祖考則宜述修其徳以顯之毋念念也毋音無孟明念之矣念徳不怠其可敵乎杜為明年秦人伐晉傳丁丑作僖公主書不時也杜過葬十月故曰不時例在僖三十三年晉人以公不朝來討杜晉以我公即位不朝于晉來治其罪公如晉夏四月己巳晉人使陽處父盟公以恥之杜使大夫盟公欲以恥辱魯也經書三月乙巳經傳必有誤書曰及晉處父盟以厭之也杜厭猶損也晉以非禮盟公故文厭之以示譏厭於渉反適晉不書諱之也杜不書公如晉林以公不得禮於晉故為公諱公未至林公朝晉未歸至國六月穆伯㑹諸侯及晉司空士縠盟于垂隴晉討衛故也杜討元年衛人伐晉士縠士蒍子林傳釋我公未歸穆伯出㑹書士縠堪其事也杜晉司空非卿也以士縠能堪卿事故書書士縠或作書曰晉士縠陳侯為衛請成于晉執孔逹以說杜陳始與衛謀謂可以強得免今晉不聽故更執孔逹以苟免也為于偽反秋八月丁邜大事于大廟躋僖公逆祀也杜僖是閔兄不得為父子嘗為臣位應在下令居閔上故曰逆祀於是夏父弗忌為宗伯杜宗伯掌宗廟昭穆之禮夏户雅反尊僖公且明見曰吾見新鬼大故鬼小杜新鬼僖公既為兄死時年又長故鬼閔公死時年少弗忌明言其所見先大後小順也躋聖賢明也杜又以僖公為聖賢明順禮也君子以為失禮禮無不順祀國之大事也而逆之可謂禮乎子雖齊聖不先父食久矣杜齊肅也臣繼君猶子繼父林言子雖有齊肅聖明之徳其祭於宗廟不以子先父食先悉薦反下不先皆同故禹不先鯀湯不先契杜鯀禹父契湯十三世祖鯀古本反契息列反殷始封之君文武不先不窋杜不窋后稷子窋知律反宋祖帝乙鄭祖厲王猶上祖也杜帝乙㣲子父厲王鄭桓公父二國不以帝乙厲王不肖而猶尊尚之是以魯頌曰春秋匪解享祀不忒皇皇后帝皇祖后稷杜忒差也皇皇羙也后帝天也詩頌僖公反郊祭上天配以后稷解佳賣反忒他得君子曰禮謂其后稷親而先帝也林后稷雖親而先稱帝知所尊也詩曰問我諸姑遂及伯姊杜詩邶風也衞女思歸而不得故願致問於姑姊林言先致問勞於諸姑然後致問勞及於長姊伯長也君子曰禮謂其姊親而先姑也林長姊雖親而先問姑知所尊也杜僖親文公父夏父弗忌欲阿時君先其所親故傳以此二詩深責其意仲尼曰臧文仲其不仁者三不知者三下展禽杜展禽栁下惠也文仲知桞下惠之賢而使在下位非已欲立而立人之道知音智下同廢六闗杜塞關陽關之屬凡六闗所以禁絶末㳺而廢之妾織蒲三不仁也杜家人販席言其與民争利作虛器杜謂居蔡山節藻税也有其器而無其位故曰虛縱逆祀杜聽夏父躋僖公祀爰居三不知也杜海鳥曰爰居止於魯東門外文仲以為神命國人祀之爰居爾雅一名雜縣樊光云似鳯凰爰居事見國語莊子云魯侯御而觴之于廟冬晉先且居宋公子成陳轅選鄭公子歸生伐秦取汪及彭衙而還以報彭衙之役卿不書為穆公故尊秦也謂之崇徳林為穆公之賢人諸大夫以尊秦也謂之尊崇有徳成音城本或作戌音恤選息兖反汪烏黄反為于偽反襄仲如齊納幣禮也凡君即位好舅甥修昏姻娶元妃以奉粢盛孝也杜謂諒闇既終嘉好之事通于外内外内之禮始備此除凶之即位也於是遣卿申好舅甥之國修禮以昏姻也元妃敵夫人奉粢盛供祭祀好呼報反娶七住反妃芳菲反粢音咨盛音成孝禮之始也經丁酉三年春王正月叔孫得臣㑹晉人宋人陳人衞人鄭人伐沈沈潰杜傳例曰民逃其上曰潰沈國名也汝南平輿縣北有沈亭沈尸甚反潰户内反夏五月王子虎卒杜不書爵者天王赴也翟泉之盟雖輒假王命周王因以同盟之例為赴林王卿不卒惟王子虎劉卷書秦人伐晉杜晉人恥不出以㣲者告林濟河焚舟晉人不出秦於是始伯西戎秋楚人圍江雨螽于宋杜自上而墮有似於雨宋人以其死為得天祐喜而來告故書雨于付反傳同螽音終冬公如晉十有二月己巳公及晉侯盟晉陽處父帥師伐楚以救江林晉大夫書帥師於是始自士穀専盟書大夫處父専將書大夫於是常書大夫貶而後人之傳三年春莊叔㑹諸侯之師伐沈林莊叔即得臣以其服於楚也沈潰凡民逃其上曰潰在上曰逃杜潰衆散流移若積水之潰自壊之象也國君輕走羣臣不知其謀與匹夫逃竄無異是以在衆曰潰在上曰逃各以類言之衞侯如陳拜晉成也杜二年陳侯為衞請成于晉夏四月乙亥王叔文公卒林文公即王子虎來赴弔如同盟禮也杜王子虎與僖公同盟於翟泉文公是同盟之子故赴以名𫝊因王子虎異於諸侯王叔又未與文公盟故於此顯示體例也經書五月又不書日從赴也秦伯伐晉濟河焚舟杜示必死也取王官及郊杜王官郊晉地晉人不出遂自茅津濟封殽尸而還杜茅津在河東大陽縣西封埋藏之遂霸西戎用孟明也君子是以知秦穆公之為君也舉人之周也杜周徧也不偏以一惡棄其善與人之壹也杜壹無二心孟明之臣也其不解也能懼思也林不以敗軍而生解怠之心能知懼而思改其所行為解佳買反下同子桑之忠也其知人也能舉善也杜子桑公孫枝舉孟明者詩曰于以采蘩于沼于沚于以用之公侯之事秦穆有焉杜詩國風言沼沚之蘩至薄猶采以共公侯以喻秦穆不遺小善林方者曰沼小者曰沚蘩音煩沼之紹反沚音止夙夜匪解以事一人孟明有焉杜詩大雅羙仲山甫也一人天子也詒厥孫謀以燕翼子子桑有焉杜詒遺也燕安也翼能成也詩大雅美武王遺其子孫善謀以安成子孫反言子桑有舉善之謀詒以之秋雨螽于宋隊而死也杜螽飛至宋隊地而死若雨隊直類反楚師圍江晉先僕伐楚以救江林先僕晉大夫杜晉救江在雨螽下故使圍江之經隨在雨螽下冬晉以江故告于周杜欲假天子之威以伐楚王叔桓公晉陽處父伐楚以救江杜桓公周卿士王叔文公之子桓公不書示威名不親伐門于方城遇息公子朱而還杜子朱楚大夫伐江之帥也聞晉師起而江兵解故晉亦還晉人懼其無禮於公也請改盟杜改二年處父之盟公如晉及晉侯盟晉侯享公賦菁菁者莪杜菁菁者莪詩小雅取其既見君子樂且有儀菁子丁反莪王多反莊叔以公降拜杜謝其以公比君子也曰小國受命于大國敢不慎儀林襄公賦詩云樂且有儀故魯答曰敢不慎儀君貺之以大禮何樂如之抑小國之樂大國之惠也晉侯降辭杜降堦辭讓公登成拜杜俱還上成拜禮公賦嘉樂杜嘉樂詩大雅義取其顯顯令徳宜民宜人受禄于天嘉户嫁反樂如字經戊戌四年春公至自晉杜無傳夏逆婦姜于齊杜稱婦有姑之辭秋侵齊杜無傳秋楚人滅江杜滅例在文十五年晉侯伐秦衛侯使甯俞來聘俞辛朱反冬十有一月壬寅夫人風氏薨杜僖公母風姓也赴同祔姑故稱夫人傳四年春晉人歸孔達于衞以為衞之良也故免之杜二年衞執孔達以說晉夏衞侯如晉拜杜謝歸孔達曹伯如晉㑹正杜㑹受貢賦之政也傳言襄公能繼文之業而諸侯服從逆婦姜于齊卿不行非禮也杜禮諸侯有故則使卿逆君子是以知出姜之不允於魯也杜允信也始來不見尊貴故終不為國人所敬信也文公薨而見出故曰出姜曰貴聘而賤逆之林公子遂納幣是使貴卿聘逆婦卿不行是使賤者逆君而畀之立而廢之杜君小君也不以夫人禮迎是卑廢之棄信而壊其主在國必亂在家必亡林棄納幣之信而壊其内主以魯國言之則在國必亂其國以宫中言之則在家必亡其家為十八年姜氏歸齊張本壊音怪不允宜哉詩曰畏天之威于時保之敬主之謂也杜詩頌言畏天威於是保福禄林此言君以天為主國家以君夫人為主成王畏天即是敬主今魯不敬其夫人宜出姜之不能保其福禄也秋晉侯伐秦圍邧新城以報王官之役杜邧新城秦邑也王官役在前年邧願晩反一音元楚人滅江秦伯為之降服出次不舉過數杜降服素服也出次辟正寢不舉去盛饌鄰國之禮有數今秦伯過之為于偽反下同大夫諫公曰同盟滅雖不能救敢不矜乎吾自懼也杜秦江同盟不告故不書矜居陵反君子曰詩云惟彼二國其政不獲惟此四國爰究爰度其秦穆之謂矣杜詩大雅言不夏商之君政得人心故四方諸侯皆懼而謀度其政事也言秦穆亦能感江之滅懼而思政爰於也究度皆謀也究音救度待洛反衛甯武子來聘公與之宴為賦湛露及彤弓杜非禮之常公特命樂人以示意故言為賦湛露彤弓詩小雅湛直減反彤徒冬反不辭又不答賦使行人私焉林行人掌賔客之官魯人怪之故使行人私問其故對曰臣以為肄業及之也杜肄習也魯人失所賦寗武子佯不知此其愚不可及林臣以為樂工肄習樂歌自及此詩非為宴臣而設也肆字又作肆以二反昔諸侯朝正於王杜朝而受政教也王宴樂之於是乎賦湛露則天子當陽諸侯用命也杜湛露曰湛湛露斯匪陽不晞晞乾也言露見日而乾猶諸侯稟天子命而行林陽日也樂音洛晞音希諸侯敵王所愾而獻其功杜敵猶當也愾恨怒也林言諸侯盡力以當王所恨怒之人獻其成功於天子愾苦愛反王於是乎賜之彤弓一彤矢百玈弓矢千林彤弓赤色之弓玈黑色也玈音盧以覺報宴杜覺明也謂諸侯有四夷之功王賜之弓矢又為歌彤弓以明報功宴樂覺音角今陪臣來繼舊好杜方論天子之樂故自稱陪臣林此尊天子之辭非稱陪臣於魯也好呼報反君辱貺之其敢干大禮以自取戾杜貺賜也干犯也戾罪也林此明已所以不辭亦不答賦之意貺音況戾力計反冬成風薨杜為明年王使來含賵傳經己亥五年春王正月王使榮叔歸含且賵杜珠玉曰含含口實車馬曰賵含本亦作唅户暗反說文作琀云送終口中玉賵芳鳯反三月辛亥葬我小君成風杜無傳反哭成䘮故曰葬我小君王使召伯來㑹葬杜召伯天子卿也召采地伯爵也來不及葬不譏者不失五月之内林王不稱天於追賜桓公見之至是再見貶也桓以少簒長成風以庻亂嫡王道熄矣而莊襄不能正又從而褒賞之是以天命施之天討也是故皆不稱天召二照反夏公孫敖如晉杜無傳秦人入鄀杜入例在十五年鄀音若秋楚人滅六杜六國今盧江六縣冬十月甲申許男業卒杜無傳與僖公六同盟林僖公卒昭公錫我立傳五年春王使榮叔來含且賵召昭公來㑹葬禮也林成風莊公之妾天子以夫人禮賵之明母以子貴故曰禮初鄀叛楚即秦又貳于楚林鄀楚屬國故叛楚就秦既即秦又有貳心而從楚夏秦人入鄀六人叛楚即東夷秋楚成大心仲歸帥師滅六杜六楚屬國林仲歸子家冬楚子燮滅蓼杜蓼國今安豐蓼縣燮息列反蓼音了字或作鄝音同臧文仲聞六與蓼滅曰臯陶庭堅不祀忽諸徳之不建民之無援哀哉杜蓼與六皆臯陶後也傷二國之君不能建徳結援大國忽然而亡林庭堅臯陶字陶音遙晉陽處父聘于衛林四年衛朝于晉故聘以報之反過甯甯嬴從之杜甯晉邑汲郡修武縣也盈嬴逆旅大夫嬴音及温而還其妻問之嬴曰以剛林言處父為人純乎任剛商書曰沈漸剛克髙明柔克杜沈漸猶滯溺也髙明猶亢爽也言各當以剛柔勝已本性乃能成全也此在洪範今謂之商書林沈漸尚書作沈潛漸似廉反夫子壹之其不沒乎林處父純一於任剛其不得善終乎天為剛徳猶不干時杜寒暑相順林天秉純陽故為剛徳猶不干犯四時之序况在人乎且華而不實怨之所聚也林言過其行猶草木有華而不結實仇怨必聚㑹於其身犯而聚怨不可以定身杜剛則犯人林不能以先定其身必過實也余懼不獲其利而離其難是以去之林我懼從處父不獲成其身之利離遭也言處父遇禍則我以其黨必遭入於難杜為六年晉殺處火傳難乃旦反晉趙成子欒貞子霍伯臼季皆卒杜成子趙衰新上軍帥中軍佐也貞子欒枝下軍帥也霍伯先且居中軍帥也臼季胥臣下軍佐也為六年蒐於夷傳經庚子六年春葬許僖公杜無傳夏季孫行父如陳杜行父季孫友子秋季孫行父如晉八月乙亥晉侯驩卒杜再同盟林襄公卒明年子靈公夷臯立驩喚官反冬十月公子遂如晉葬晉襄公杜卿共葬事文襄之制也三月而葬速晉殺其大夫陽處父杜處父侵官宜為國討故不言賈季殺晉狐射姑出奔狄杜射姑狐偃子賈季也奔例在宣十年射音亦一音夜閏月不告月猶朝于廟杜諸侯每月必告朔聽政因朝宗廟文公以閏非常月故闕不告朔怠慢政事雖朝于廟則如勿朝故曰猶猶者可止之辭不告月月或作朔誤也傳六年春晉蒐于夷舍二軍杜僖三十一年晉蒐清原作五軍今舍二軍復三軍之制夷晉地前年四卿卒故蒐以謀軍帥舍音捨使狐射姑將中軍杜代先且居將子匠反趙盾佐之杜代趙衰也趙盾衰子盾徒本反陽處父至自温杜往年聘衞過温今始至改蒐于董易中軍杜易以趙盾為帥射姑佐之河東汾陰縣有董亭陽子成季之屬也杜處父嘗為趙衰屬大夫故黨於趙氏且謂趙盾能曰使能國之利也是以上之宣子於是乎始為國政杜自中軍佐推而上之使為元帥宣子趙盾諡也中軍乃晉政卿制事典林制國事之典常正法罪林正法罪之輕重辟刑獄林理刑獄之淹滯辟婢亦反後同者更不音董逋逃材督竄逃有罪之人逋補吾反由質要林用質要劵契之法治舊洿林治舊日洿穢不理之事洿烏木反又作汙同本秩禮杜貴賤不失其本續常職杜修廢官出滯淹杜拔賢能也既成杜宣子既有成法以授大傅陽子與大師賈佗使行諸晉國以為常法林處父時為大傅之官杜賈佗以公族從文公而不在五人之數大音泰下同佗徒何反臧文仲以陳衞之睦也欲求好於陳夏季文子聘于陳林季文子即行父且娶焉杜臣非君命不越竟故因聘而自為娶好呼報反娶七住反秦伯任好卒杜任好秦穆公名林子康公罃立任音壬以子車氏之三子奄息仲行鍼虎為殉杜子車秦大夫氏也以人從葬為殉林秦穆公卒葬雍從死者百七十七人子車氏三子與焉車音居仲本亦作中音仲行户郎反鍼其亷反殉似俊反殺人從死曰殉字林弋絹反皆秦之良也國人哀之為之賦黄鳥杜黄鳥詩秦風義取黄鳥止于棘桑往來得其所傷三良不然為于偽反君子曰秦穆之不為盟主也宜哉死而棄民林善人者民之望也今殺之以殉葬是棄民之望先王違世猶詒之法林古之先王違棄世故猶作法以遺子孫詒以之反而况奪之善人乎詩曰人之云亡邦國殄瘁杜詩大雅言善人亡則國瘁病瘁似醉反無善人之謂林國無善人所以致殄絶瘁病之禍若之何奪之古之王者知命之不長林知有生必有死夀命之不可永長王如字一音于況反是以並建聖哲杜建知立聖以司牧民樹之風聲杜因土地風俗為立聲敎之法分之采物林以旌旗衣服分别其采章物色分扶問反著之話言杜話善也為作善言遺戒話户快反為之律度杜鍾量律度所以治厯明時陳之藝極杜藝準也極中也貢獻多少之法傳曰貢之無藝又曰貢獻無極引之表儀杜引道也表儀猶威儀予之法制林與天下以吉凶軍賓嘉之法制告之訓典杜訓典先王之書教之防利杜防惡興利委之常秩杜委任也常秩官司之常職道之以禮則林開道天下以禮節法則使毋失其土宜衆𨽻賴之而後即命聖王同之林使民任之無失其土地之所宜衆民之𨽻于官于士于農工賈者皆依頼其法而後就用上命古先聖王皆同此道今縱無法以遺後嗣而又收其良以死難以在上矣君子是以知秦之不復東征也杜不能復征討東方諸侯為霸主遺唯季反復扶又反秋季文子將聘于晉使求遭喪之禮以行杜季文子季孫行父也聞晉侯疾故其人曰將焉用之杜其人從者焉於䖍反文子曰備豫不虞古之善教也求而無之實難杜難幸得過求何害杜所謂文子三思八月乙亥晉襄公卒靈公少林襄公之子少詩照反晉人以難故欲立長君杜立少君恐有難難乃旦反長丁丈反下皆同趙孟曰立公子雍杜趙孟趙盾也公子雍文公子襄公庻弟杜祁之子好善而長先君愛之且近於秦秦舊好也置善則固事長則順立愛則孝結舊則安林子雍好善而置立之則其位固居長而君事之則其理順為先君所愛而立之則能盡孝秦晉有舅甥舊好而結之則可久安好呼報反下皆同為難故故欲立長君有此四徳者難必抒矣杜抒除也抒直吕反又時吕反賈季曰林即狐射姑不如立公子樂杜樂文公子林懷嬴所生樂音岳一音活辰嬴嬖於二君杜辰嬴懷嬴也二君懐公文公也嬖必計反立其子民必安之趙孟曰辰嬴賤班在九人林言其卑賤班位在九人之下其子何震之有杜震威也且為二嬖淫也為先君子不能求大而出在小國辟也林不能求仕於大國而仕於陳之小國是辟陋也辟匹亦反又作僻下同母淫子辟無威陳小而逺無援將何安焉杜祁以君故讓偪姞而上之杜杜祁杜伯之後祁姓也偪姞姞姓之女生襄公為世子故杜祁讓使在已上祁巨之反偪彼力反姞其吉反又其乙反以狄故讓季隗而已次之故班在四杜以季隗是文公託狄時妻故復讓之然則杜祁本班在二隗五罪反先君是以愛其子而仕諸秦為亞卿焉杜亞次也言其賢故位尊亞於嫁反秦大而近足以為援母義子愛足以威民林杜祁能讓偪姞季隗故為有義子雍有寵于文公故為有愛足以威服晉國之民立之不亦可乎使先蔑士㑹如秦逆公子雍杜先蔑士伯也士㑹隨季也賈季亦使召公子樂于陳趙孟使殺諸郫杜郫晉地郫婢支反賈季怨陽子之易其班也杜本中軍帥易以為佐而知其無援於晉也杜少族多怨九月賈季使續鞫居殺陽處父杜鞫居狐氏之族書曰晉殺其大夫侵官也杜君已命帥處父易之故曰侵官冬十月襄仲如晉葬襄公十一月丙寅晉殺續簡伯林討其殺處父也杜簡伯續鞫居十一月無丙寅十二月八日也日月必有誤賈季奔狄杜射姑懼討而奔宣子使臾駢送其帑杜帑妻子也宣子以賈季中軍之佐同官故臾羊朱反駢蒲賢反又蒲丁反帑音奴夷之蒐林在今年春賈季戮臾駢林戮誅也非必殺死凡刑罰皆是時賈季為中軍以事誅罰臾駢臾駢之人欲盡殺賈氏以報焉臾駢曰不可吾聞前志有之曰敵惠敵怨不在後嗣忠之道也林敵猶對也言有恩惠有怨讐與我敵對者若在後世子孫則為非對非對是遷怒也盡津忍反夫子禮於賈季我以其寵報私怨林趙盾盡禮於賈季而送其妻子宣子使我送帑是寵任我也我反因其寵任以報私怨毋乃不可乎介人之寵非勇也杜介因也介音界損怨益仇非知也杜殺季家欲以除怨宣子將復怨已是益仇知音智以私害公非忠也釋此三者何以事夫子盡具其帑與其器用財賄親帥扞之送致諸竟杜扞衞也扞户且反竟音境閏月不告朔非禮也杜經稱告月傳稱告朔明告月必以朔林非敬授人時之禮閏以正時杜四時漸差則致閏以正之時以作事杜順時命事事以厚生林事不失時則年榖豐而民生厚生民之道于是乎在矣林言其所闗者重不告閏朔棄時政也林是棄民之時與國之政也何以為民為如字治也或音于偽反非也左傳杜林合注卷十五
