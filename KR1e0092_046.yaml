body:
  text: 左傳杜林合注卷四十六明王道焜趙如源同編定公三經辛丑十年春王三月及齊平平前八年再侵齊之怨夏公㑹齊侯于夾谷杜平故林夾谷齊地孔子相夾古洽反又古協反公至自夾谷無傳晉趙鞅帥師圍衛林報夷儀也齊人來歸鄆讙龜隂田杜三邑皆汶陽田也泰山博縣北有龜山隂田在其北也㑹夾谷孔子相齊人服義而歸魯田林未有言來歸田者言來歸鄆讙龜隂田以是為齊人之願也濟西言取讙闡言取鄆讙龜隂田不言取以是為齊人之願則以夫子相夾谷之㑹也鄆音運讙火官反叔孫州仇仲孫何忌帥師圍郈郈叔孫氏邑郈音后秋叔孫州仇仲孫何忌帥師圍郈宋樂大心出奔曹杜傳在前年春書名罪其稱疾不適晉宋公子地出奔陳杜貪弄馬以距君命書名罪之也冬齊侯衛侯鄭游速㑹于安甫無傳安甫地闕叔孫州仇如齊宋公之弟辰暨仲佗石彄出奔陳杜暨與也宋公寵向魋不聴辰請辰忿而將大臣出奔虚請自忿稱弟示首惡也仲佗石彄皆為國卿不能匡君靖難而為辰所牽帥出奔稱名亦罪之也佗徒何反彄苦侯反傳十年春及齊平夏公㑹齊侯于祝其實夾谷杜夾谷即祝其也孔丘相相㑹儀也相息亮反犂彌言于齊侯林犂彌前年夷儀讓登者曰孔丘知禮而無勇若使萊人以兵劫魯侯必得志焉萊人齊所滅萊夷也齊侯從之孔丘以公退曰士兵之林令士官以兵撃萊人兩君合好而裔夷之俘以兵亂之杜裔逺也萊已滅故言逺夷之俘好呼報反下同非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不偪好於神為不祥林盟將告神犯之為不善於德為愆義於人為失禮君必不然林齊君本心必不如此齊侯聞之遽辟之杜辟去萊兵也辟婢亦反又音避將盟齊人加於載書曰齊師出竟而不以甲車三百乗從我者林三百乗二萬二千五百人竟音境乗繩證反有如此盟如此盟詛之禍孔丘使兹無還揖對無還魯大夫還音旋曰而不反我汶陽之田吾以共命者亦如之林汶陽田即鄆讙龜隂田杜須齊歸汶陽田乃當共齊命於是孔子以公退賤者終其事要盟不潔故略不書共音恭齊侯將享公孔丘謂梁丘據曰齊魯之故吾子何不聞焉杜故舊典事既成矣杜㑹事成而又享之是勤執事也且犧象不出門嘉樂不野合杜犧象酒器犧尊象尊也嘉樂鐘磬也林禮器用於朝廷宗廟不可出於國門禮樂設於朝廷宗廟不可合於原野犧許宜反又息倚反享而既具是棄禮也若其不具用秕稗也杜秕穀不成者稗草之似穀者言享不具禮穢薄若秕稗秕音鄙稗皮賣反用秕稗君辱棄禮名惡林若禮不成如用秕稗是辱兩君也若禮成而棄其舊典是取惡名也子盍圖之夫享所以昭德也不昭不如其己也乃不果享孔子知齊侯懐詐故以禮距之齊人來歸鄆讙龜隂之田陽虎九年以此奔齊經文倒者次魯事晉趙鞅圍衛報夷儀也杜前年齊為衛伐晉夷儀故伐衛以為報初衛侯伐邯鄲午於寒氏杜邯鄲廣平縣也午晉邯鄲大夫寒氏即五氏也前年衛人助齊伐五氏邯音寒鄲音丹城其西北而守之宵熸午衆宵散熸子替反及晉圍衛午以徒七十人門於衛西門殺人於門中林衛開門與午鬬故殺人於門中曰請報寒氏之役涉佗曰夫子則勇矣然我往必不敢啓門林夫子謂邯鄲午弑人門中可謂勇矣然我若往攻其門衛人必不敢開門與我鬭佗徒河反亦以徒七十人且門焉步左右皆至而立如植杜至其門下步行門左右然後立待如立木不動以示整日中不啓門乃退反役林圍衛反役晉人討衛之叛故曰由涉佗成何於是執涉佗以求成於衛林涉佗捘衛侯手成何比衛温原以捘手罪重故獨執佗衛人不許晉人遂殺涉佗成何奔燕君子曰此之謂棄禮必不鈞杜言必見殺不得與人等詩曰人而無禮胡不遄死涉佗亦遄矣哉杜詩鄘風遄速也初叔孫成子欲立武叔公若藐固諫曰不可林成子即叔孫不敢武叔即叔孫州仇藐叔孫氏之族成子立之而卒公南使賊射之不能殺林公南叔孫家臣武叔之黨使賊射公若藐射食亦反下同公南為馬正使公若為郈宰武叔既定使郈馬正侯犯殺公若弗能其圉人曰杜武叔之圉人吾以劔過朝公若必曰誰之劔也吾稱子以告必觀之吾偽固而授之末則可殺也杜偽為固陋不知禮者以劔鋒末授之使如之公若曰爾欲吴王我乎杜見劔向己逆呵之鱄諸殺吴王亦用劔刺之遂殺公若郈犯以郈叛杜犯以不能副武叔之命故叛叛而以圍告廟故書圍武叔懿子圍郈弗克秋二子及齊師復圍郈弗克叔孫謂郈工師駟赤杜工師掌工匠之官曰郈非唯叔孫氏之憂社稷之患也將若之何對曰臣之業在揚水卒章之四言矣杜揚水詩唐風卒章四言曰我聞有命叔孫稽首杜謝其受己命駟赤謂侯犯曰居齊魯之際而無事必不可矣林言郈邑居齊魯之間既叛魯又不事齊必不可以乆存子盍求事於齊以臨民不然將叛侯犯從之齊使至駟赤與郈人為之宣言於郈中杜詐為齊使言也使所吏反為于偽反曰侯犯將以郈易于齊齊人將遷郈民杜為易其民人衆兇懼杜不欲遷兇音凶又凶勇反駟赤謂侯犯曰衆言異矣杜不與始同子不如易於齊與其死也猶是郈也而得紓焉何必此杜言以郈民易取齊人與郈無異勝于守郈為叛人所殺齊人欲以此偪魯必倍與子地杜言非徒得民又將得齊地倍步罪反且盍多舍甲于子之門以備不虞侯犯曰諾乃多舍甲焉侯犯請易于齊齊有司觀郈林齊使有司觀郈度其虚實將至駟赤使周走呼曰齊師至矣郈人大駭介侯犯之門甲以圍侯犯林介因也因侯犯之門甲圍侯犯將殺之駟赤將射之杜偽為侯犯射郈人侯犯止之曰謀免我杜言且思謀免我於禍侯犯請行許之郈人許之駟赤先如宿宿東平無鹽縣故宿國侯犯殿每出一門郈人閉之閉其後門殿丁見反及郭門止之曰子以叔孫氏之甲出有司若誅之羣臣懼死林子謂侯犯帶叔孫氏之甲以出奔有司若誅責其數羣臣恐得死罪駟赤曰叔孫氏之甲有物吾未敢以出杜物識也赤還救侯犯也林言叔孫之甲自有識别我未當敢以之出奔犯謂駟赤曰子止而與之數數甲以相付數色主反駟赤止而納魯人林納魯圍郈之師侯犯奔齊齊人乃致郈致其名簿也為下武叔如齊傳宋公子地嬖蘧富獵杜地宋景公弟辰之兄也十一分其室而以其五與之杜與富獵也公子地有白馬四公嬖向魋魋欲之杜向魋司馬桓魋也公取而朱其尾鬛以與之杜與魋也鬛力輒反馬髪也地怒使其徒抶魋而奪之魋懼將走公閉門而泣之目盡腫母弟辰曰子分室以與獵也而獨卑魋亦有頗焉林子謂地以五分家財與富獵獨愛四馬不與向魋是卑魋也亦有所偏頗不平抶勅亦反腫章勇反頗普多反子為君禮杜禮辟君也子過出竟君必止子林既無大過君必使人留行公子地出奔陳公弗止辰為之請弗聴辰曰是我廷吾兄也杜廷欺也為于偽反廷求往反又古况反吾以國人出君誰與處林我以國人之賢者出宋君當與誰共守其國冬母弟辰暨仲佗石彄出奔陳佗仲幾子彄褚師段子皆宋卿衆之所望故言國人武叔聘于齊杜謝致郈也經書辰奔在聘後者從告齊侯享之曰子叔孫若使郈在君之他竟寡人何知焉屬與敝邑際故敢助君憂之杜以致郈徳叔孫屬音燭對曰非寡君之望也所以事君封疆社稷是以林以猶為也言將以為其封疆社稷之大事敢以家𨽻勤君之執事林言不敢以家臣勤勞齊君之執事夫不令之臣天下之所惡也君豈以為寡君賜杜言義在討惡非所以賜寡君惡烏路反經壬寅十有一年春宋公之弟辰及仲佗石彄公子地自陳入于蕭以叛杜蕭宋邑稱地例在前年夏四月秋宋樂大心自曹入于蕭入蕭從叛人叛可知故不書叛冬及鄭平杜平六年侵鄭取匡之怨林平不書必關天下之大故而後書書渝平以志諸侯之合書及鄭平以志諸侯之散此春秋之所以終始也叔還如鄭涖盟林還叔弓曾孫一云叔詣曽叔誤還音旋傳十一年春宋公母弟辰暨仲佗石彄公子地入于蕭以叛秋樂大心從之林樂大心九年被逐今從辰地以叛大為宋患寵向魋故也惡宋公寵不義以致國患冬及鄭平始叛晉也魯自僖公以來世服於晉至今而叛故曰始經癸夘十有二年春薛伯定卒杜無傳四年盟臯鼬林襄公卒比立夏葬薛襄公無傳叔孫州仇帥師墮郈杜墮毁也患其險固故毁壊其城林郈叔孫氏之邑也費季氏之邑也叔孫州仇墮郈季孫斯墮費以是為二家之願也則以孔子之事魯也墮許規反下傳同衛公孟彄帥師伐曹彄孟縶子彄苦侯反季孫斯仲孫何忌帥師墮費費音秘秋大雩無傳書過冬十月癸亥公㑹齊侯盟于黄杜無傳結叛晉十有一月丙寅朔日有食之無傳公至自黄無傳十有二月公圍成林成孟氏邑公至自圍成杜無傳國内而書至者成彊若列國興動大衆故出入皆告廟林公行不越竟不至至圍成危之也初作三軍三分公室而各有其一季氏盡征之叔孫氏臣其子弟孟氏取其半焉三家之强孟氏為有君也莫難于墮郈費墮成易耳而公自將圍成弗克是不足與有為也齊人歸女樂三日不朝是以微罪行也傳十二年夏衛公孟彄伐曹克郊郊曹邑還滑羅殿杜羅衛大夫殿丁見反下同未出不退於列杜未出曹竟羅不退在行列之後其御曰殿而在列其為無勇乎羅曰與其素厲寧為無勇杜索空也厲猛也言伐小國當如畏者以誘致之仲由為季氏宰杜仲由子路將墮三都杜三都費郈成也彊盛將為國害故仲由欲毁之於是叔孫氏墮郈季氏將墮費公山不狃叔孫輒帥費人以襲魯不狃費宰也輒不得志於叔孫氏公與三子入于季氏之宫登武子之臺費人攻之弗克入及公側杜至臺下仲尼命申句須樂頎下伐之二子魯大夫仲尼時為司寇句音劬頎音祈費人北國人追之敗諸姑蔑二子奔齊杜二子不狃叔孫輒遂墮費將墮成公歛處父謂孟孫墮成齊人必至于北門成在魯北竟故且成孟氏之保障也無成是無孟氏也子偽不知杜佯不知我將不墮冬十二月公圍成弗克經甲辰十有三年春齊侯衛侯次于垂葭林垂葭衛地二君將使師伐晉次垂葭以為之援夏築蛇淵囿無傳書不時也大蒐于比蒲無傳夏蒐非時比音毘衛公孟彄帥師伐曹無傳秋晉趙鞅入于晉陽以叛杜書叛惡可知冬晉荀寅士吉射入于朝歌以叛杜吉射士鞅子林荀寅士吉射伐趙氏鞅奔晉陽韓魏伐范中行氏寅吉射奔朝歌鞅非始禍者也則曷為皆以叛書之春秋之季家有藏甲邑有百雉之城矣鞅必奔晉陽寅吉射必奔朝歌則是皆叛也射食亦反又食夜反晉趙鞅歸于晉杜韓魏請而復之故曰歸言韓魏之彊猶列國林歸易辭也欒盈魚石猶言入至鞅而後言歸則晉無人之辭也此韓趙魏分晉之本也叛臣至於書歸則佚賊不足録矣薛弑其君比杜無傳稱君君無道林比弑惠公夷立又名寅傳十三年春齊侯衛侯次于垂葭實郥氏杜垂葭改召郥氏高平鉅野縣西南有郥亭郥古閴反使師伐晉將濟河諸大夫皆曰不可邴意兹曰可杜意兹齊大夫邴彼命反又音丙鋭師伐河内杜今河内汲郡傳必數日而後及絳林傳車告晉亦必數日而後至晉之絳都傳張戀反又直専反絳不三月不能出河則我既濟水矣林晉自絳都非九十日不能出河而救河内則我已卒事濟河而歸矣乃伐河内齊侯皆歛諸大夫之軒林大夫乗軒皆收歛之以示薄罰唯邴意兹乗軒杜以其言當齊侯欲與衛侯乗共載乗繩證反下同與之宴而駕乗廣載甲焉使告曰晉師至矣齊侯曰比君之駕也寡人請攝林比猶待也言待衛君必駕恐緩不及事請以己車攝代衛車廣古曠反比必利反乃介而與之乗驅之林介甲也或告曰無晉師乃止傳言齊侯輕所以不能成功晉趙鞅謂邯戰午曰歸我衛貢五百家吾舍諸晉陽午許諾杜十年趙鞅圍衛衛人懼貢五百家鞅置之邯鄲今欲徙著晉陽晉陽趙鞅邑歸告其父兄父兄皆曰不可衛是以為邯鄲言衛以五百家在邯鄲當為是故與邯鄲親為于偽反而寘諸晉陽絶衛之道也不如侵齊而謀之侵齊則齊當來報欲因懼齊而徙則衛與邯鄲好不絶乃如之而歸之于晉陽杜欲如是謀而後歸衛貢趙孟怒召午而囚諸晉陽杜趙鞅不察其謀謂午不用命故囚之使其從者説劔而入涉賓不可涉賓午家臣不肯説劔入欲謀叛從才用反説他活反乃使告邯鄲人曰吾私有討于午也二三子唯所欲立午趙鞅同族别封邯鄲故使邯鄲人更立午宗親遂殺午趙稷涉賔以邯鄲叛稷趙午子夏六月上軍司馬籍秦圍邯鄲邯鄲午荀寅之甥也林午之母荀寅姊妹故為甥荀寅范吉射之姻也壻父曰姻荀寅子娶吉射女而相與睦故不與圍邯鄲將作亂杜作亂攻趙鞅不與音預又如字董安于聞之安于趙氏臣告趙孟曰先備諸趙孟曰晉國有命始禍者死為後可也林待其先發而後應之可也安于曰與其害於民寧我獨死杜懼見攻必傷害民請以我説趙孟不可晉國若討可殺我以自解説秋七月范氏中行氏伐趙氏之宫趙鞅奔晉陽晉人圍之范臯夷無寵於范吉射而欲為亂於范氏臯夷范氏側室子行户郎反梁嬰父嬖於知文子杜文子荀躒知音智文子欲以為卿韓簡子與中行文子相惡杜簡子韓起孫不信也中行文子荀寅也惡如字又烏路反下同魏襄子亦與范昭子相惡杜襄子魏舒孫曼多也昭子士吉射故五子謀杜五子范臯夷梁嬰父知文子韓簡子魏襄子將逐荀寅而以梁嬰父代之逐范吉射而以范臯夷代之荀躒言於晉使曰君命大臣始禍者死載書在河杜為盟書沈之河躒力狄反今三臣始禍而獨逐鞅刑已不鈞矣請皆逐之冬十一月荀躒韓不信魏曼多奉公以伐范氏中行氏弗克二子將伐公齊高彊曰三折肱知為良醫杜高彊齊子尾之子昭十年奔魯遂適晉林言必三折其臂厯病痛多者然後深知良醫治療之法三如字又息暫反折之設反唯伐君為不可民弗與也我以伐君在此矣三家未睦杜三家知韓魏可盡克也克之君將誰與若先伐君是使睦也林是急三家使相親睦而拒我也弗聴遂伐公國人助公二子敗從而伐之丁未荀寅士吉射奔朝歌韓魏以趙氏為請林以趙鞅非始禍請復趙氏杜經所以書趙鞅歸十二月辛未趙鞅入于絳盟于公宫林傳録晉衰亂以見三家分晉之始初衛公叔文子朝而請享靈公杜欲令公臨其家退見史鰌而告之杜史鰌史魚鰌音秋史鰌曰子必禍矣子富而君貪罪其及子乎文子曰然吾不先告子是吾罪也君既許我矣其若之何史鰌曰無害子臣可以免杜言能執臣禮富而能臣必免于難上下同之杜言尊卑皆然難乃旦反戍也驕其亡乎戍文子之子富而不驕者鮮吾唯子之見林我之所見惟有子耳鮮息淺反驕而不亡者未之有也戍必與焉杜與禍難與音預及文子卒衛侯始惡於公叔戍以其富也公叔戍又將去夫人之黨杜靈公夫人南子黨宋朝之徒惡烏路反夫人愬之曰戍將為亂為明年戍來奔傳經乙巳十有四年春衛公叔戍來奔衛趙陽出奔宋陽趙黶孫書名者親富不親仁二月辛巳楚公子結陳公孫佗人帥師滅頓以頓子牂歸林頓欲事晉而絶陳好故佗吐何反牂子郎反夏衛北宫結來奔杜亦黨公叔戍皆惡之五月於越敗吴于檇李杜於越越國也使罪人詐吴亂陳故從未陳之例書敗也檇李吴郡嘉興縣南醉李城林此越勾踐元年也史記吴闔廬聞越允常死興師伐越勾踐襲敗吴師射殺闔廬檇音醉吴子光卒杜未同盟而赴以名林闔廬卒子夫差立公㑹齊侯衛侯于牽杜魏郡黎陽縣東北有牽城林齊魯為㑹止此晉人圍朝歌公㑹齊侯衛侯于脾上梁之間謀救范中行氏也鄭得罪於王而齊挾之以叛晉范中行得罪於君而齊挾之以撓晉景公問政子曰君君臣臣其以是歟公至自㑹無傳秋齊侯宋公㑹于洮杜洮曹地洮吐刀反天王使石尚來歸脤杜無傳石尚天子之士石氏尚名脤祭社之肉盛以脤器以賜同姓諸侯親兄弟之國與之共福林周魯之交止此脤市軫反衛世子蒯聵出奔宋蒯苦怪反瞶五怪反衛公孟彄出奔鄭杜彄書名與蒯瞶黨罪之宋公之弟辰自蕭來奔杜無傳稱宋公之弟例在十年大蒐于比蒲林大蒐止此自舍中軍公不與兵政者四十年矣於是蒐比蒲則以季孫斯叔孫州仇之墮郈費也故曰政逮於大夫四世矣故夫三桓之子孫微矣比音毗邾子來㑹公杜無傳㑹公于比蒲來而不用朝禮故曰㑹城莒父及霄杜無傳公叛晉助范氏故懼而城二邑也此年無冬史闕文父音甫傳十四年春衛侯逐公叔戍與其黨故趙陽奔宋戍來奔終史魚之言梁嬰父惡董安于謂知文子曰不殺安于使終為政於趙氏趙氏必得晉國盍以其先發難也討于趙氏文子使告於趙孟曰范中行氏雖信為亂安于則發之是安于與謀亂也晉國有命始禍者死二子既伏其辠矣敢以告杜告使討安于惡烏路反知音智難乃旦反與音預趙孟患之安于曰我死而晉國寧趙氏定將焉用生人誰不死吾死莫矣乃縊而死趙孟尸諸市而告於知氏曰主命戮罪人安于既伏其罪矣敢以告知伯從趙孟盟杜知伯荀躒焉於䖍反莫音暮縊一賜反而後趙氏定祀安于於廟林祀安于於趙氏之廟報其忠也頓子牂欲事晉背楚而絶陳好二月楚滅頓傳言小不事大所以亡背音佩好呼報反夏衛北宫結來奔公叔戍之故也吴伐越杜報五年越入吴越子句踐禦之陳于檇李杜句踐越王允常子句古侯反陳直覲反句踐患吴之整也使死士再禽焉不動杜使敢死之士往輒為吴所禽欲使吴師亂取之而吴不動使罪人三行屬劔於頸杜以劔注頸行户郎反下同屬之欲反而辭曰二軍有治杜治軍旅臣奸旗鼓杜犯軍令不敏於君之行前不敢逃刑敢歸死林以不敏達在君行陣之前不敢逃竄於刑戮敢自歸死於吴遂自剄也師屬之目林吴師怪其所為皆注目而視之頸古頂反越子因而伐之大敗之靈姑浮以戈撃闔廬姑浮越大夫闔廬傷將指取其一屨杜其足大指見斬遂失屨姑浮取之將子匠反還卒於陘去檇李七里釋經所以不書滅陘音刑夫差使人立於庭杜夫差闔廬嗣子夫音扶苟出入必謂己曰夫差而忘越王之殺而父乎林而汝也則對曰唯不敢㤀三年乃報越杜後三年哀元年林為哀元年吴入越傳唯唯癸反舊以水反晉人圍朝歌公㑹齊侯衛侯于脾上梁之間杜脾上梁間即牽脾脾支反謀救范中行氏杜齊魯叛晉故助范中行也析成鲋小王桃甲率狄師以襲晉二子晉大夫范中行氏之黨戰于絳中不克而還士鮒奔周小王桃甲入于朝歌秋齊侯宋公㑹于洮范氏故也謀救范氏衛侯為夫人南子召宋朝杜南子宋女也朝宋公子舊通于南子在宋呼之為于偽反㑹于洮大子蒯聵獻盂于齊過宋野杜蒯聵衛靈公大子孟邑名也就㑹獻之故自衛行而過宋野野人歌之曰既定爾婁豬盍歸吾艾豭林婁豬求子豬也得牡則定以喻南子艾老也豭牡豕也以喻宋朝豭音加太子羞之謂戲陽速曰從我而朝少君杜速大子家臣林少君即夫人南子戲許宜反少詩照反少君見我我顧乃殺之速曰諾乃朝夫人夫人見大子大子三顧速不進夫人見其色啼而走杜見大子色變知其欲殺己曰蒯聵將殺余公執其手以登臺大子奔宋盡逐其黨故公孟彄出奔鄭自鄭奔齊大子告人曰戲陽速禍余戲陽速告人曰大子則禍余大子無道使余殺其母余不許將戕於余若殺夫人將以余説余是故許而弗為以紓余死林我不許為之用則將殘殺於我若己殺其母南子又將殺我以自解説我是故陽許大子而不殺夫人以紓緩我之死諺曰民保於信林言民必有信然後保其身吾以信義也杜使義可信不必信言冬十二月晉人敗范中行氏之師於潞林潞晉地獲籍秦高彊二子黨范氏者終景王言籍父無後又敗鄭師及范氏之師于百泉林鄭助范氏故并敗百泉鄭地經丙午十有五年春王正月邾子來朝鼷䑕食郊牛牛死改卜牛無傳不言所食處舉死重也改卜禮也鼷音兮二月辛丑楚子滅胡以胡子豹歸夏五月辛亥郊無傳書過壬申公薨于高寢高寢宫名不於路寢失其所鄭罕達帥師伐宋齊侯衛侯次于渠蒢林渠蒢宋地不果救故書次蒢直居反邾子來奔喪杜無傳諸侯奔喪非禮林諸侯來奔喪於是終秋七月壬申姒氏卒定公夫人八月庚辰朔日有食之無傳九月滕子來㑹葬無傳諸侯㑹葬非禮也丁巳葬我君定公雨不克葬戊午日不昃乃克葬辛巳葬定姒辛巳十月三日有日無月冬城漆邾庶其邑傳十五年春邾隱公來朝邾子益子貢觀焉邾子執玉高其容仰公受玉卑其容俯杜玉朝者之贄子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之體也林死生存亡皆係於禮如人之有體將左右周旋進退俯仰於是乎取之朝祀喪戎於是乎觀之今正月相朝而皆不度杜不合法度心已亡矣言心之精爽已先亡矣嘉事不體何以能乆林朝禮嘉事也而不得其體之正何以能乆居其位高仰驕也卑俯替也驕近亂替近疾君為主其先亡乎為此年公薨哀七年以邾子益歸傳吴之入楚也在四年胡子盡俘楚邑之近胡者杜俘取也楚既定胡子豹又不事楚曰存亡有命事楚何為多取費焉二月楚滅胡傳言小不事大所以亡費芳味反夏五月壬申公薨仲尼曰賜不幸言而中是使賜多言者也林賜子貢名杜以微知著知之難者子貢言語之士今言而中仲尼懼其易言故抑之中丁仲反鄭罕達敗宋師于老丘罕達子齹之子老五宋地宋公子地奔鄭鄭人為之伐宋欲取地以處之事見哀十二年齊侯衛侯次于蘧挐謀救宋也林蘧挐即渠蒢挐女居反又女加反秋七月壬申姒氏卒不稱夫人不赴且不祔也赴同祔姑夫人之禮三者皆闕故不曰夫人葬定公雨不克襄事禮也杜襄成也雨而成事若汲汲於欲葬林次日雨霽而葬得必誠必信之道故曰禮葬定姒不稱小君不成喪也公未葬而夫人薨煩於喪禮不赴不祔故不稱小君臣子怠慢也反哭於寢故書葬冬城漆書不時告也實以秋城冬以告廟魯知其不時故緩告從而書之以示譏左傳杜林合注卷四十六
