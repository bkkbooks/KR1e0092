body:
  text: 左傳杜林合注卷十二明王道焜趙如源同編僖公四經乙酉二十有四年春王正月夏狄伐鄭秋七月冬天王出居于鄭杜襄王也天子以天下為家故所在稱居天子無外而書出者譏王敝於匹夫之孝不顧天下之重因其辟母弟之難書出言其自絶於周晉侯夷吾卒杜文公定位而後告未同盟而赴以名傳二十四年春王正月秦伯納之不書不告入也杜納重耳也及河子犯以璧授公子曰臣負羈絏從君巡於天下杜羈馬羈絏馬韁羈紀宜反説文云馬絡頭也絏息列反説文云係也從才用反又如字臣之罪甚多矣臣猶知之而況君乎請由此亡公子曰所不與舅氏同心者有如白水林臣猶自知其罪何况於君而不記臣之罪乎請君自歸國我由此而逃去也杜子犯重耳舅也言與舅氏同心之明如此白水猶詩言謂子不信有如皎日投其璧于河杜質信於河濟河圍令狐入桑泉取臼衰杜桑泉在河東解縣西解縣東南有臼城令力丁反衰初危反二月甲午晉師軍於廬柳杜懷公遣軍距重耳廬力居反柳力九反秦伯使公子縶如晉師師退軍於郇林晉師從秦命納文公故退師杜解縣西北有郇城縶張立反郇音荀辛丑狐偃及秦晉之大夫盟于郇壬寅公子入于晉師丙午入于曲沃丁未朝于武宫杜文公之祖武公廟戊申使殺懷公于高梁不書亦不告也杜懷公奔高梁高梁在平陽楊縣西南再發不告者言外諸侯入及見殺亦皆須告乃書於䇿吕郤畏逼吕甥卻芮惠公舊臣故畏為文公所逼害逼音逼將焚公宫而弒晉侯林將焚公宫因救火作難而弒晉文公弒音試又作殺寺人披請見公使讓之且辭焉林披嘗得罪於文公故使人貴之且辭不見寺本又作侍披普皮反見賢遍反曰蒲城之役杜在五年君命一宿女即至杜即日至女音汝下皆同其後余從狄君以田渭濵杜田獵渭音謂水名濵音賔女為惠公來求殺余命女三宿女中宿至雖有君命何其速也夫袪猶在杜披所斬文公衣袂也為于偽反中丁仲反女中宿至或無至字祛起魚反女其行乎林言看女以逺也對曰臣謂君之入也其知之矣若猶未也又將及難林謂君之以艱難得國也其知為君之道矣若猶未知為君之道又將及於患難難乃旦反君命無二古之制也除君之惡惟力是視蒲人狄人余何有焉林言我奉君命則為除去君之惡惟視吾力之所能及謂即至蒲次宿至狄當此之時我知為獻公惠公而已何有於文公哉當二君世君為蒲狄之人於我有何義今君即位其無蒲狄乎林其無如蒲如狄欲為君害者乎齊桓公置射鈎而使管仲相杜乾時之役管仲射桓公中帶鈎射食亦反相息亮反君若易之何辱命焉杜言若反齊桓已將自去不須辱君命行者甚衆豈唯刑臣林懼罪而出奔者甚多豈止我一人而已杜披奄人故稱刑臣甚一本作其公見之以難告杜告吕卻欲焚公宫三月晉侯潛會秦伯于王城林不使吕郤知己丑晦公宫火瑕甥郤芮不獲公乃如河上秦伯誘而殺之晉侯逆夫人嬴氏以歸秦穆公女文嬴也秦伯送衛於晉三千人實紀綱之僕杜新有吕郤之難國未輯睦故以兵衛文公請公諸門户僕𨽻之事皆秦卒共之為之紀綱初晉侯之豎頭須守藏者也杜頭須一曰里鳬須豎左右小吏林晉文公之守帑藏者豎上注反藏才浪反下同韓詩外傳云晉文公亡過曹里鳬須從因盜重耳資而亡重耳無糧餒不能行介子推割股以食重耳然後能行其出也竊藏以逃杜文公出時盡用以求納之杜求納文公盡津忍反及入求見公辭焉以沐謂僕人曰沐則心覆心覆則圖反宜吾不得見也林洗頭曰沐沐則頭低而心則反覆心主謀盡心既反覆則所圖謀者宜亦反覆宜我求見而不得見見賢遍反覆芳服反居者為社稷之守行者為羈絏之僕其亦可也何必罪居者林居者行者皆可以事君何必以居者為有罪守手又反又如字國君而讐匹夫懼者甚衆矣僕人以告公遽見之言文公棄小怨所以能安衆甚衆本或作其衆遽其據反狄人歸季隗于晉而請其二子杜二子伯鯈叔劉林請其進退之命文公妻趙衰生原同屏括樓嬰林文公以女妻趙衰杜原屏樓三子之邑妻七計反屏步丁反括古活反趙姬請逆盾與其母杜趙姬文公女也盾狄女叔隗之子子餘辭杜子餘趙衰字姬曰得寵而忘舊何以使人林得新寵而忘舊愛何以使人心悅服必逆之固請許之來林叔隗與盾來歸至晉以盾為才固請于公以為嫡子而使其三子下之以叔隗為內子而已下之杜卿之嫡妻為內子皆非此年事蓋因狄人歸季隗遂終言叔隗嫡本亦作適丁厯反下遐嫁反晉侯賞從亡者介之推不言祿祿亦弗及介推文公微臣之語助從才用反介音界推昌誰反推曰獻公之子九人唯君在矣惠懷無親外內棄之天未絶晉必將有主主晉祀者非君而誰天實置之而二三子以為已力不亦誣乎林惠公懷公無親黨之援外之親鄰內之臣民皆共棄之天意未忍絶晉之祀必將有君以主其社稷主晉國宗廟社稷之祭祀者非屬之文公而誰屬天實置立以為晉君而二三從亡之臣乃以復國為已力所致不亦欺天而罔人乎竊人之財猶謂之盜况貪天之功以為已力乎下義其罪上賞其姦上下相蒙林貪天之功罪也在下者反以為立君之義貪天之功姦也在上者反以推立君之賞下不知其罪而求之是欺其上上不討其姦而賞之是欺其下杜蒙欺也難與處矣其母曰盍亦求之以死誰懟對曰尤而效之罪又甚焉且出怨言不食其食林不求而死將以誰怨尤過也以彼之貪天為過而又效之求賞知而故犯其罪又甚於不知而冒犯者且我既出怨言謂上下相蒙難與處矣不當更食共食肉之祿盍户臘及懟直類反其母曰亦使知之若何杜既不求之且欲令推達言於文公對曰言身之文也身將隱焉用文之是求顯也林是偽隱而有求顯達之心焉於虔反其母曰能如是乎與女偕隱杜偕俱也女音汝遂隱而死晉侯求之不獲以綿上為之田曰以志吾過且旌善人林以綿上之地為介推私田以供祭祀以記吾推賞忘善之過且表介推隱逸不貪之善杜旌表也西河界休縣南有地名綿上鄭之入滑也滑人聼命入滑在二十年師還又即衛言鄭師既歸又叛鄭通好於衛鄭公子士泄堵俞彌帥師伐滑堵俞彌鄭大夫俞羊朱反彌亡皮反王使伯服遊孫伯如鄭請滑杜二子周大夫鄭伯怨惠王之入而不與厲公爵也又怨襄王之與衛滑也怨王助衛為滑請故不聼王命而執二子王怒將以狄伐鄭富辰諌曰不可臣聞之大上以德撫民杜無親疏也聼吐定反而執二子本或作而執其二子其衍字也大音泰其次親親以相及也杜先親以及疏推恩以成義昔周公弔二叔之不咸故封建親戚以蕃屏周杜弔傷也咸同也周公傷夏殷之二叔世疏其親戚不能同心以至滅亡故廣封兄弟建為諸侯以為周室之蕃翰屏蔽或以二叔為管蔡者非蓋下文方列管蔡為文昭故不得以二叔為管蔡又管叔蔡叔霍叔三叔不得稱二叔蕃方元反管蔡郕霍魯衛毛聃郜雍曹滕畢原鄷郇文之昭也杜十六國皆文王子也管國在滎陽京縣東北雍國在河內山陽縣西畢國在長安縣西北酆國在始平鄠縣東林文王於周為穆穆生昭故曰文之昭郕音成𣆀乃甘反雍於用反酆音豐郇音荀邗晉應韓武之穆也杜四國皆武王子應國在襄陽城父縣西南韓國在河東郡界河內野王縣西北有邗城林武王於周為昭昭生穆故曰武之穆邗音干凡蔣邢茅胙祭周公之胤也杜胤嗣也蔣在戈陽期思縣高平昌邑縣西有茅鄉東郡燕縣西南有胙亭蔣將文反茅亡交反胙才故反祭側界反召穆公思周德之不類故糾合宗族于成周而作詩杜類善也糾收也召穆公周卿士名虎召采地扶風雍縣東南有召亭周厲王之時周德衰微兄弟道缺召穆公于東都收會宗族特作此周公之樂歌常棣詩屬小雅召上照反糾居黝反曰常棣之華鄂不韡韡杜常棣棣也鄂鄂然華外發貌韡韡光明貌以喻兄弟和睦則強盛而有光輝韡韡然卾五各反不方九反韡音偉凡今之人莫如兄弟言致韡韡之盛莫如親兄弟其四章曰兄弟鬩于牆外禦其侮林鬩訟爭貌言內雖不和然有外侮則同心禦之矣此詩乃周公閔管蔡失道而作今富辰以為召穆公所作者蓋樂章久廢召穆公所作周公樂歌也鬩呼厯反毛詩傳云狠也禦魚吕反不同侮亡甫反詩作務如是則兄弟雖有小忿不廢懿親杜懿美也今天子不忍小忿以棄鄭親其若之何庸勳親親昵近尊賢德之大者也杜庸用也昵親也昵女乙反即聾從昧與頑用嚚姦之大者也棄德崇姦禍之大者也杜崇聚也聾鹿工反昧音妹嚚魚巾反鄭有平惠之勳平王東遷晉鄭是依惠王出奔虢鄭納之是其勳也又有厲宣之親鄭始封之祖桓公友周厲王之子宣王之母弟棄嬖寵而用三良杜七年殺嬖臣申侯十六年殺寵子子華也賢三良叔詹堵叔師叔所謂尊於諸姬為近林鄭居河洛北之姬姓諸侯去周最近所當親昵四德具矣耳不聼五聲之和為聾目不别五色之章為昧心不則德義之經為頑口不道忠信之言為嚚狄皆則之林五聲宫商角徴羽樂之正聲也故有耳而不聽五聲之和諧是其聾也五色蒼赤白黑黃五方之正色也故有目而不辨五色之文章是其昧也有得於已之謂德合宜之謂義故有心而不法德義之經常是其頑也盡已之謂忠誠實之謂信故有口而不談道忠信之言是其嚚也狄皆以四者為法則别彼列反四姦具矣周之有懿德也猶曰莫如兄弟故封建之杜當周公時故言周之有懿德其懷柔天下也猶懼有外侮扞禦侮者莫如親親故以親屏周林以同姓諸侯為周屏翰召穆公亦云周公作詩召公歌之故言亦云今周德既衰於是乎又渝周召以從諸姦無乃不可乎杜變周召親兄弟之道林以狄伐鄭是從狄之諸姦渝羊朱反民未忘禍王又興之杜前有子頽之亂中有叔帶召狄故曰民未忘禍其若文武何言將廢文武之功業王弗聼使頽叔桃子出狄師杜二子周大夫桃如字本或作姚亦宜音桃夏狄伐鄭取櫟王德狄人將以其女為后富辰諌曰不可臣聞之曰報者倦矣施者未厭林言報人之施者力已倦怠自謂所報已過有勞而望報者未有厭足之心杜施功勞也有勞則望報過甚櫟力狄反施如字厭於艷反又於鹽反狄固貪婪王又啓之林戎狄之性本自貪婪無厭王又開其無厭之心將以其女為后婪力南反方言云殺人而取其財曰婪女德無極婦怨無終杜婦女之志近之則不知止足逺之則忿怨無已終猶已也狄必為患林言狄貪女怨必為異日之患害王又弗聼初甘昭公有寵於惠后杜甘昭公王子帶也食邑於甘河南縣西南有甘水惠后將立之未及而卒林未及立子帶而惠后先死昭公奔齊杜奔齊在十二年王復之杜在二十二年又通於隗氏杜隗氏王所立狄后王替隗氏杜替廢也替他計反頽叔桃子曰我實使狄狄其怨我林我實使狄師伐鄭及其女為后今廢狄女則狄將以其怨王者而怨我遂奉大叔以狄師攻王王御士將禦之杜周禮王之御士十二人王曰先后其謂我何杜先后惠后也誅大叔恐違先后志寧使諸侯圖之林蓋不欲親誅叔帶王遂出及坎欿國人納之杜坎欿周地在河南鞏縣東林國人納襄王于周不聼王出坎若感反欿大感反秋頽桃子奉大叔以狄師伐周大敗周師獲周公忌父原伯毛伯富辰杜原毛皆采邑林四子皆襄王黨王出適鄭處于汜杜鄭南汜也在襄城縣南汜音凡後皆同大叔以隗氏居于溫鄭子華之弟子臧出奔宋十六年殺子華故好聚鷸冠鷸鳥名聚鷸羽以為冠非法之服好呼報反鷸尹橘反翠鳥也鄭伯聞而惡之惡其服非法惡烏路反使盜誘之八月盜殺之于陳宋之間君子曰服之不衷身之災也杜𠂻猶適也言衣服之不適其中則災必及其身𠂻音忠一音丁仲反詩曰彼己之子不稱其服杜詩曹風刺小人在位言彼人之德不稱其服已音記稱尺證反下同子臧之服不稱也夫林無德以稱之也之服一本作之及夫音扶詩曰自詒伊戚其子臧之謂矣杜詩小雅詒遺也戚憂也取其自遺憂詒以支反夏書曰地平天成稱也杜夏書逸書地平其化天成其施上下相稱為宜夏户雅反後夏書皆放此宋及楚平林宋自於泓之敗與楚不睦至是成公改紀始及楚平宋成公如楚還入於鄭鄭伯將享之問禮於皇武子杜皇武子鄭卿對曰宋先代之後也於周為客天子有事膰焉杜有事祭宗廟也膰祭肉尊之故賜以祭胙膰符袁反周禮又作膰反音義皆同有喪拜焉宋弔周喪王特拜謝之豐厚可也林言天子尚尊敬之則鄭享宋公宜豐厚其禮鄭伯從之享宋公有加禮也杜禮物事事加厚善鄭能尊先代享宋公有加絶句禮也一本無也字讀總為一句冬王使來告難曰不穀不德得罪于母弟之寵子帶鄙在鄭地泛林王引咎自責故云得罪於同母弟以子帶為惠后所寵故云寵子帶鄙野也言野處於鄭國之泛地難乃旦反下同敢告叔父杜天子謂同姓諸侯曰叔父臧文仲對曰天子蒙塵于外敢不奔問官守杜官守王之羣臣林天子出奔謂之蒙塵不敢斥尊故言奔問王之官守守手又反王使簡師父告于晉使左鄢父告于秦杜二子周大夫鄢於晚反天子無出杜普天之下莫非王土故無出書曰天王出居于鄭辟母弟之難也杜叔帶襄王同母弟天子凶服降名禮也杜凶服素服降名稱不穀林得恐懼修省之禮鄭伯與孔將鉏石甲父侯宣多省視官具于泛林三子鄭大夫省官司具器用鉏仕居反而後聼其私政禮也得先君後已之禮聼吐定反衛人將伐邢禮至曰不得其守國不可得也杜禮至衛大夫守謂邢正卿國子我請昆弟仕焉林我請為衛間謀先以兄弟往邢求仕焉此其為得國子之道乃往得仕林果得仕為明年滅邢傳經丙戌二十有五年春王正月丙午衛侯燬滅邢杜衛邢同姬姓惡其親親相滅故稱名罪之燬况委反夏四月癸酉衛侯燬卒杜無傳五同盟林文公卒子成公鄭立宋蕩伯姬來逆婦杜無傳伯姬魯女為宋大夫蕩氏妻也自為其子來逆稱婦姑存之辭婦人越竟迎婦非禮故書宋殺其大夫無傳其事則未聞於例為大夫無罪故不稱名秋楚人圍陳納頓子于頓杜頓迫於陳而出奔楚故楚圍陳以納頓子不言遂明一事也子玉稱人從告頓子不言歸興師見納故葬衛文公無傳冬十有二月癸亥公會衛子莒慶盟于洮杜洮魯地衛文公既葬成公不稱爵者述父之志降名從未成君故書子以善之莒慶不稱氏未賜族洮吐名反傳二十五年春衛人伐邢二禮從國子巡城掖以赴外林禮至兄弟從國子巡城申警守備手掖國子以赴外師殺之正月丙午衛侯燬滅邢同姓也故名禮至為銘曰余掖殺國子莫余敢止林言我手掖而殺國子莫我敢止言其勇也惡其不知耻詐以滅同姓而反銘功於器掖音亦説文云以手持人臂曰掖秦伯師于河上將納王狐偃言於晉侯曰求諸侯莫如勤王杜勤納王也諸侯信之且大義也繼文之業而信宣於諸侯今為可矣杜晉文侯仇為平王侯伯匡輔周室林勤王之信義宣布於諸侯今機會為可乘矣使卜偃卜之林此大卜名偃非狐偃也曰吉遇黃帝戰于阪泉之兆杜黃帝與神農之後薑氏戰於阪泉之野勝之今得其兆故以為吉公曰吾不堪也文公自以為已當此兆故曰不堪對曰周禮未改今之王古之帝也杜言周德雖衰其命未改今之周王自當帝兆不謂晉林禮天子之禮公曰筮之筮之遇大有乾下離上大有之暌兑下離上暌大有九三變而為暌曰吉遇公用享于天子之卦大有九三爻辭也三為三公而得位變而為兑兑為説得位而説故能為王所宴饗也戰克而王享吉孰大焉林言卜筮協占卜遇阪泉之兆是戰克筮得大有九三之卦是王享也且是卦也方更總言二卦之義不繫於一爻天為澤以當日天子降心以逆公不亦可乎乾為天兑為澤乾變為兑而上當離離為日日之在天垂曜在澤天子在上説心在下是降心逆公之象大有去暌而復亦其所也杜言去暌卦還論大有亦有天子降心之象乾尊離卑降尊下卑亦其義也晉侯辭秦師而下林晉文辭讓秦師使還獨以晉師順流而下以納襄王三月甲辰次于陽樊右師圍溫杜大叔在溫故左師逆王夏四月丁巳王入于王城取大叔于溫殺之于隰城戊午晉侯朝王王饗醴命之宥杜既行饗禮而設醴酒又加之以幣帛以助歡也宥助也隰音習醴音禮宥音又請隧弗許闕地通路曰隧王之葬禮也諸侯皆縣柩而下隧音遂今之延道曰王章也章顯王者與諸侯異未有代德而有二王林言周德雖衰天下未有代周之德者而晉欲擬天子之禮是有二王亦叔父之所惡也與之陽樊溫原攢茅之田晉於是始啓南陽林此襄王不許晉隧葬而割周四邑以塞晉文之意也晉於是始開南陽之疆土四邑在晉山南河北故曰南陽惡烏路反攢才官反陽樊不服圍之倉葛呼曰杜倉葛陽樊人呼喚故反德以柔中國刑以威四夷宜吾不敢服也此誰非王之親姻其俘之也乃出其民林言惟德之善者可以柔懷中國亦惟刑之善者可以威懼四夷晉不尚德政而尚威刑宜吾之不敢服晉凡居此地者誰非王室之親戚姻婭若何執拘以為俘囚晉聞倉葛之言知不可強取乃出陽樊之民取其土而已俘芳夫反秋秦晉伐鄀鄀本在商密秦楚界上小圍其後遷於南郡鄀縣鄀音若字林云楚邑楮斫反楚鬭克屈禦寇以申息之師戍商密杜鬭克申公子儀屈禦寇息公子邊商密鄀别邑今南鄉丹水縣戍守也二子屯兵於析以為商密援禦魚吕反秦人過析隈入而係輿人以圍商密昏而傅焉杜析楚邑一名白羽今南鄉析縣隈隱蔽之處係縳輿人詐為克析得其囚俘者昏而傅城不欲令商密知囚非祈人過古卧反又音戈析星厯反隈烏回反係音計輿音餘傅音附宵坎血加書偽與子儀子邊盟者杜掘地為坎以埋盟之餘血加盟書其上商密人懼曰秦取析矣戍人反矣林見縳囚故疑取析見盟徵故疑二子已與衆及叛乃降秦師囚申公子儀息公子邊以歸商密既降析戍亦敗故得囚二子降户江反後皆同楚令尹子玉追秦師弗及不復言晉者秦為兵主遂圍陳納頓子于頓為頓圍陳冬晉侯圍原林原亦如陽樊不服故晉文公圍原命三日之糧原不降命去之林三日期滿故命撤圍而去之諜出杜諜間也諜音牒曰原將降矣軍吏曰靖待之公曰信國之寶也民之所庇也得原失信何以庇之所亡滋多林民無信不立故以信庇其身我命三日降原復少待之是得一原而失信於我師無信何以庇民得原所得少失信所失多庇必利反又音祕退一舍而原降遷原伯貫于冀杜伯貫周守原大夫也貫古亂反趙衰為原大夫狐溱為溫大夫杜狐溱狐毛之子溱側申反衛人平莒于我十二月盟于洮修衛文公之好且及莒平也杜莒以元年酈之役怨魯衛文公脟平之未及而卒成公追成父志降名以行事故曰修文公之好好呼報反晉侯問原守於寺人勃鞮杜勃鞮披也守手又反勃步忽反鞮丁兮反對曰昔趙衰以壺飱從徑餒而弗食林飱脯也水澆飯也言趙衰昔者以壺承飯從文公於行役雖飢而不敢食杜言其亷且仁不忘君也徑猶行也飱音孫從才用反舊如字徑古定反一讀以壺飱從絶句讀徑為經連下句乖於杜義餒奴罪反餓也故使處原從披言也衰雖有大功猶簡小善以進之示不遺勞經丁亥二十有六年春王正月己未公會莒子衛寧速盟于向杜向莒地寧速衛大夫莊子也向舒亮反齊人侵我西鄙公追齊師至酅弗及杜公逐齊師逺至齊地故書之齊北穀城縣西有地名􅈶下􅈶本又作嶲户圭反一音似轉反夏齊人伐我北鄙杜孝公未入魯竟先使微者伐之林此齊侯也其稱人何自隱以來以兵加我君大夫將皆書人君將書君自文十五年齊懿公始大夫將書大夫自齊高厚始訖春秋惟邾莒書人衛人伐齊公子遂如楚乞師杜公子遂魯卿也乞不保得之辭林乞師始此內乞師不書書乞師于楚志中國之屈於夷狄也秋楚人滅夔以夔子歸杜夔楚同姓國今建平秭歸縣夔有不祀之罪故不譏楚滅同姓夔求龜反冬楚人伐宋圍緡公以楚師伐齊取穀杜傳例曰師能左右之曰以林穀齊地緡亡巾反公至自伐齊無傳傳二十六年春王正月公會莒兹丕公兹丕時君之號莒夷無諡以號為稱丕普悲反寧莊子林即寧速盟于向尋洮之盟也洮盟在前年齊師侵我西鄙討是二盟也杜討魯與衛莒為洮向之二盟夏齊孝公伐我北鄙衛人伐齊林衛救魯故伐齊洮之盟故也公使展喜犒師杜勞齊師犒若報反使受命于展禽林使展喜受勞師之辭命于栁下惠齊侯未入竟展喜從之曰寡君聞君親舉玉趾將辱於敝邑使下臣犒執事杜言執事不敢斥尊趾音止足也齊侯曰魯人恐乎對曰小人恐矣君子則否林言小人無知則畏恐也其君子有見識則不畏恐齊侯曰室如縣罄野無青草何恃而不恐杜如而也時夏四月今之二月野物未成故言居室而資糧縣盡在野則無蔬食之物所以當恐恐曲勇反下同縣音玄罄亦作磬盡也對曰恃先王之命昔周公大公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也載在盟府林言魯之所恃者以有先王之命所以不恐周公魯之祖太公齊之祖二公相成王為周室之股肱成王嘉二公之功而慰勞之賜二公以盟齊魯二國世世之子孫無得相為患害此二句乃載書之辭載在盟書而藏於司盟之府杜載載書也太音泰下同夾古洽反舊音古協反太師職之杜職主也大公為太師兼主司盟之官桓公是以糾合諸侯而謀其不協林桓公承齊之緒是以能糾率列國之諸侯有不和協者則會盟以圖謀之彌縫其闕而匡救其災昭舊職也林言桓公所以成霸業者昭明大公夾輔之舊職縫扶容反及君即位諸侯之望曰其率桓之功杜率循也我敝邑用不敢保聚杜用此舊盟故不聚衆保守曰豈其嗣世九年而棄命廢職林棄先王之命廢大公之職其若先君何君必不然恃此以不恐齊侯乃還東門襄仲臧文仲如楚乞師杜襄仲居東門故以為氏臧文仲為襄仲副使故不書林襄仲即公子遂臧孫見子玉而道之伐齊宋以其不臣也杜言其不臣事周室可以此罪責而伐之道音導夔子不祀祝融與鬻熊祝融高辛氏之火正楚之逺祖也鬻熊祝融之十一世孫夔楚之别封故亦世紹其祀融餘忠反鬻音育楚人讓之對曰我先王熊摰有疾鬼神弗赦而自竄于夔杜熊摰楚嫡子有疾不得嗣位故别封為夔子林熊摰即楚熊渠之中子紅立為卾王者也摰音至竄七亂反字林又于外反吾是以失楚又何祀焉杜廢其常祀而飾辭文過秋楚成得臣鬭宜申帥師滅夔以夔子歸杜成得臣令尹子玉也鬭宜申司馬子西也宋以其善於晉侯也杜重耳之出也宋襄公贈馬二十乘叛楚即晉林宋自二十四年朝楚為平至是叛楚即晉冬楚令尹子玉司馬子西帥師伐宋圍緍公以楚師伐齊取穀凡師能左右之曰以杜左右謂進退在已左右並如字置桓公子雍於穀易牙奉之以為魯援雍本與孝公爭立故使居穀以逼齊置之豉反援于眷反楚申公叔侯戍之為二十八年楚子使申叔去穀張本桓公之子七人為七大夫於楚言孝公不能撫公族左傳杜林合注卷十二
