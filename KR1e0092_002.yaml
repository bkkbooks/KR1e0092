body:
  text: 左傳杜林合注卷二明王道焜趙如源同編隱公二經甲子六年春鄭人來渝平林和而不盟曰平書渝平以志諸侯之合書及鄭平以志諸侯之散諸侯合而天下始多故矣渝羊朱反變也夏五月辛酉公會齊侯盟于艾杜泰山牟縣東南有艾山林艾齊地此齊魯交好之始艾五蓋反秋七月杜雖無事而書首月其四時以成嵗他皆倣此冬宋人取長葛杜秋取冬乃告也上有伐鄭圍長葛長葛鄭邑可知故不言鄭也前年冬圍不克而還今冬乘長葛無備而取之言易也傳六年春鄭人來渝平更成也杜渝變也公之為公子戰於狐瓖為鄭所執逃歸怨鄭鄭伐宋公欲救宋宋使者失辭公怒而止忿宋則欲厚鄭鄭因此而來故經書渝平傳曰更成翼九宗五正頃父之子嘉父逆晉侯于隨杜翼晉舊都也唐叔始封受懷姓九宗職官五正遂世為晉強家五正五官之長九宗一姓為九族也頃父之子嘉父晉大夫頃音傾納諸鄂晉人謂之鄂侯杜鄂晉别邑諸地名疑者皆言有以示不審闕者不復記其闕他皆倣此前年桓王立翼侯之子於翼故不得復入翼别居鄂林既有哀侯在翼遂以鄂侯别其號鄂五各反夏盟于艾始平於齊也杜春秋前魯與齊不平今乃棄惡結好故言始平於齊五月庚申鄭伯侵陳大獲林大獲俘馘往歲鄭伯請成于陳成猶平也陳侯不許五父諫曰親仁善鄰國之寶也君其許鄭杜五父陳公子他林親近仁人善事鄰國國家之重寶陳侯曰宋衛實難杜可畏雖也難乃旦反鄭何能為林宋衛大國實可畏難鄭小國何能為害遂不許君子曰善不可失惡不可長其陳桓公之謂乎長惡不悛從自及也林言為善之機不可失為惡之念不可長陳桓不許鄭成是失善機而長惡念長其惡而不改隨而自及於禍也杜悛止也從隨也悛七全反雖欲救之其將能乎商書曰惡之易也如火之燎于原不可鄉邇杜商書盤庚言惡易長如火焚原野不可鄉近燎力召反又音力弔反鄉本又作嚮同許亮反其猶可撲滅杜言不可撲滅撲普卜反周任有言曰杜周任周大夫任音壬為國家者見惡如農夫之務去草焉芟夷蕰崇之絶其本根勿使能殖則善者信矣林見惡非獨惡人凡惡念惡事皆是如農夫之治田圃必以去草為先務併草之本根而絶之勿使草能生殖信伸同義惡者既屈則善者自伸矣杜芟刈也夷殺也蕰積也崇聚也去起吕反芟所銜反説文作癹匹未反云以足踏夷草藴紆粉反信如字一音申秋宋人取長葛林經書冬而傳書秋蓋秋取冬乃告也冬京師來告飢公為之請糴於宋衛齊鄭禮也杜告飢不以王命故傳言京師而不書於經也雖非王命而公共以稱命已國不足旁請鄰國故曰禮也傳見隱之賢林京大也師衆也天子之居必以衆大之辭言之五穀不熟曰飢周以飢告于魯也魯國不足故請糴於鄰國以供王命得救荒事君之禮為于偽反糴直厯反鄭伯如周始朝桓王也杜桓王即位周鄭交惡至是乃朝故曰始王不禮焉林桓王不加禮貌於鄭周桓公言於王曰我周之東遷晉鄭焉依杜周桓公周公黑肩也周采地扶風雍縣東北有周城幽王為犬戎所殺平王東徙晉文侯鄭武公左右王室故曰晉鄭焉依林言平王東遷洛陽之時晉文侯鄭武公扞王於艱此我周之所依賴者也焉如字或於虔反善鄭以勸來者猶懼不蔇况不禮焉鄭不來矣林厚善撫鄭以勸奬諸侯來朝猶恐諸侯之不至况不禮於鄭鄭伯不復來朝矣杜蔇至也為桓五年諸侯從王伐鄭傳蔇其器反經乙丑七年春王三月叔姬歸于紀杜無傳叔姬伯姬之娣也至是歸者待年於父母國不與嫡俱行故書滕侯卒杜傳例曰不書名未同盟也滕國在沛國公丘縣東南夏城中丘杜城例在莊二十九年中丘在琅邪臨沂縣東北林魯邑此書城之始也齊侯使其弟年來聘杜諸聘皆使卿執玉帛以相存問例在襄九年林此齊聘之始也秋公伐邾林此伐邾之始也冬天王使凡伯來聘杜凡伯周卿士凡國伯爵也汲郡共縣東南有凡城林周聘之始戎伐凡伯于楚丘以歸杜戎鳴鐘鼓以伐天子之使見夷狄強暴不書凡伯敗者單使無衆非戰陳也但言以歸非執也楚丘衛地在濟隂城武縣西南林此戎患之始也凡伯家父皆大雅之舊人傳七年春滕侯卒不書名未同盟也凡諸侯同盟於是稱名故薨則赴以名杜盟以名告神故薨亦以名告同盟告終稱嗣也以繼好息民杜告亡者之終稱嗣位之主嗣位之主當奉而不忘故曰繼好好同則和親故曰息民好呼報反謂之禮經杜此言凡例乃周公所制禮經也十一年不告之例又曰不書於策明禮經皆當書於策仲尼修春秋皆承策為經丘明之傳博采衆記故始開凡例特顯此二句他皆倣此林經常也謂之常禮夏城中丘書不時也林夏非城築之時妨農事也齊侯使夷仲年來聘結艾之盟也林艾盟在六年林即弟年秋宋及鄭平七月庚申盟于宿公伐邾為宋討也杜公距宋而更與鄭平欲以鄭為援今鄭復與宋盟故懼而伐邾欲以求宋故曰為宋討為于偽反初戎朝于周發幣于公卿凡伯弗賓杜朝而發幣於公卿如今計獻詣公府卿寺林如今奉使而私覿之禮冬王使凡伯來聘還戎伐之于楚丘以歸杜傳言凡伯所以見伐陳及鄭平杜六年鄭侵陳大獲今乃平十二月陳五父如鄭涖盟杜涖臨也壬申及鄭伯盟歃如忘杜志不在于歃血也歃色洽反忘亡亮反服虔云如而也泄伯曰五父必不免不賴盟矣林言五父必不免於禍不籍盟歃以為重林泄伯鄭泄駕泄息列反鄭良佐如陳涖盟杜良佐鄭大夫辛巳及陳侯盟亦知陳之將亂也杜入其國觀其政治故總言之也皆為桓五年六年陳亂蔡人殺陳他傳鄭公子忽在王所故陳侯請妻之林忽鄭莊公子三年為質於周以忽有王寵故請以女妻之妻七計反鄭伯許之乃成昏杜為鄭忽失齊昏援以至出齊傳經丙寅八年春宋公衛侯遇于垂杜垂衛地濟隂句陽縣東北有垂亭林特相遇不書書宋衛將以為參盟也三月鄭伯使宛來歸祊杜宛鄭大夫不書氏未賜族祊鄭祀泰山之邑在琅邪費縣東南宛於阮反祊必彭反庚寅我入祊杜桓元年乃卒易祊田知此入祊未肯受而有之夏六月己亥蔡侯考父卒杜無傳襄六年傳曰杞桓公卒始赴以名同盟故也諸侯同盟稱名者非唯見在位二君也嘗與其父同盟則亦以名赴其子亦所以繼好也蔡未與隱盟蓋春秋前與惠公盟故赴以名林宣公卒桓侯封人立辛亥宿男卒杜無傳元年宋魯大夫盟于宿宿與盟也晉荀偃禱河稱齊晉君名然後自稱名知雖大夫出盟亦當先稱已君之名以啓神明故薨皆從身盟之例當告以名也傳例曰赴以名則亦書之不然則否辟不敏也今宿赴不以名故亦不書名諸例或發於始事或發於後者因宜有所異同亦或丘明所得記注本末不能皆備故林元年同盟不赴以名故不名秋七月庚午宋公齊侯衛侯盟于瓦屋杜齊侯尊宋使主會故宋公序齊上瓦屋周地林此參盟之始也有參盟然後有主盟八月葬蔡宣公杜無傳三月而葬速九月辛卯公及莒人盟于浮來杜莒人微者不嫌敵公侯故直稱公例在僖二十九年浮來紀邑東莞縣北有邳鄉邳鄉西有公來山號曰邳來開杜此好莒之始吾君特會外大夫始此螟杜無傳為災冬十有二月無駭卒杜公不與小斂故不書日卒而後賜族故不書氏傳八年春齊侯將平宋衛杜平宋衛於鄭有會期宋公以幣請於衛請先相見林宋敬齊命故以幣帛將意請命于衛先與衛侯相見衛侯許之故遇于犬丘杜犬丘垂也地有兩名鄭伯請釋泰山之祀而祀周公以泰山之祊易許田三月鄭伯使宛來歸祊不祀泰山也杜成王營王城有遷都之志故賜周公許田以為魯國朝宿之邑後世因而立周公别廟焉鄭桓公周宣王之母弟封鄭有助祭泰山湯沐之邑在祊鄭以天子不能復巡守故欲以祊易許田各從本國所近之宜恐魯以周公别廟為疑故云已廢泰山之祀而欲為魯祀周公遜辭以有求也許田近許之田林此鄭莊公請于魯欲舍周祭泰山之從祀而為魯祀周公之别廟祊鄭人從祀泰山之湯沐邑許田魯人朝宿之邑祊近魯許近鄭歸祊於魯不從祀於泰山也泰如字東嶽夏虢公忌父始作卿士于周杜周人于此遂畀之政四月甲辰鄭公子忽如陳逆婦媯辛亥以媯氏歸甲寅入于鄭陳針子送女先配而後祖針子曰是不為夫婦誣其祖矣非禮也何以能育杜針子陳大夫禮逆婦必先告祖廟而後行故楚公子圍稱告莊共之廟鄭忽先逆婦而後告廟故曰先配而後祖林針子見其事而譏之曰是不能終為夫婦誣罔其祖矣非娶婦之禮也娶妻本為繼宗守祀計今誣其祖則不為祖宗所佑何以能生育乎針其亷反誣亡符反齊人卒平宋衛于鄭林春將平宋衛而未結故曰辛平宋衛于鄭秋會于溫盟于瓦屋以釋東門之役禮也杜會溫不書不以告也定國息民故曰禮也平宋衛二國忿鄭之謀鄭不與盟故不書林以解四年圍鄭東門之憾八月丙戌鄭伯以齊人朝王禮也杜言鄭伯不以虢公得政而背王故禮之齊稱人略從國辭上有七月庚午下有九月辛卯則八月不得有丙戌林鄭莊因齊僖在周地故以齊朝王得事上之禮公及莒人盟于浮來以成紀好也杜二年紀莒盟于密為魯故今公尋之故曰以成紀好好呼報反冬齊侯使來告成三國杜齊侯冬來告稱秋和三國公使衆仲對曰君釋三國之圖以鳩其民君之惠也寡君聞命矣敢不承受君之明德林言齊僖解釋三國相圖之患使三國不相攻戰以安集其民人安諸侯之恩惠寡君謂我公聞齊之成命矣周易乘承之義在上曰乘在下曰承此言承受蓋謙辭敢不順下風而承受齊君之明德也杜鳩集也無駭卒羽父請諡與族公問族於衆仲林無駭魯大夫羽父公子翬也諡死者易名之稱號也族氏也羽父為無駭請諡及為其子請族氏於君也諡不必問故但問何以為無駭之族氏衆仲對曰天子建德杜立有德以為諸侯因生以賜姓杜因其所由生以賜姓謂若舜由媯汭故陳為媯姓胙之土而命之氏林報之以土地因其所封地為之族氏若胡公封於陳命曰陳氏也胙才故反請侯以字杜諸侯位卑不得賜姓故其臣因氏其王父字為諡因以為族杜或使即先人之諡稱以為族官有世功則有官族邑亦如之杜謂取其舊官舊邑之稱以為族皆稟之時君林謂世世居其官而有功者則以其官為族若晉之士氏中行氏之類或以所封之邑若趙氏韓氏魏氏之類公命以字為展氏杜諸侯之子稱公子公子之子稱公孫公子之子以王父字為氏無駭公子展之孫故為展氏經丁卯九年春天王使南季來聘杜無傳南季天子大夫也南氏李字也三月癸酉大雨震電庚辰大雨雪杜三月今正月電徒練反雨于付反傳同挾卒杜無傳挾魯大夫未賜族挾音協夏城郎秋七月冬公會齊侯于防杜防魯地在琅邪華縣東南傳九年春王三月癸酉大雨霖以震書始也杜書癸酉始始雨日林經書大雨震電傳言霖以震見自癸酉日始以後皆雨霖以震霖音林爾雅云久雨謂之淫淫雨謂之霖庚辰大雨雪亦如之書時失也杜夏之正月微陽始出未可震電既震電又不當大雨雪故皆為時失林霖震電而又雨雪所以為異蓋自庚辰以後亦連綿雨雪不止也凡雨自三日以往為霖杜此解經書霖也而經無霖字經誤平地尺為大雪林言凡春秋書雨書霖書大雪之義夏城郎書不時也林凡土功水昏正而栽木營室星也小雪十月中氣昏見正中今書夏故曰不時宋公不王杜不共王職鄭伯為王左卿士以王命討之伐宋林時周人雖畀虢公政鄭莊公猶為左卿士也故得奉王命討其不共王職宋以入郛之役怨公不告命杜入郛在五年公以七年伐邾欲以説宋而宋猶不和也林以隱公五年辭宋使不救宋故怨魯不告魯以受伐之命公怒絶宋使林隱公怒宋絶其往來之泛使也使所吏反秋鄭人以王命來告伐宋杜遣使致王命也伐宋未得志故復更告之冬公會齊侯于防謀伐宋也林春秋之初齊鄭一黨也故鄭告伐宋而齊僖公會魯以謀之北戎侵鄭鄭伯禦之患戎師曰彼徒我車林言北戎以别戎之雜處中國者也徒步兵言戎皆步兵車車戰言鄭皆車戰懼其侵軼我也林懼車戰難於進退為步兵之所侵突杜軼突也軼直結反又音逸公子突曰使勇而無剛者嘗冦而速去之杜公子突鄭厲公也嘗試也勇則能往無剛不恥退林勇而輕進可以試敵之堅鋭無剛易退可以致敵之追躡君為三覆以待之杜覆伏兵也林使鄭君為伏兵三處以待戎之追躡覆扶又反下同戎輕而不整貪而無親勝不相讓敗不相救先者見獲必務進進而遇覆必速奔後者不救則無繼矣乃可以逞林言戎兵輕易而不整其行伍貪利而不相親附惟貪利故得勝不肯相讓而獨進不相親附故遇敗不肯相救而先奔在前者見有所獲必務先進先進者遇伏兵必速奔走而歸後者見先者敗走必不相救則戎兵無後繼矣乃可以快志於戎杜逞解也輕遣政反逞敕領反從之戎人之前遇覆者奔祝𣆀逐之衷戎師前後擊之盡殪林祝聃鄭大夫師勇而無剛者先犯戎而速奔至後伏兵起戎還走祝聃反逐之伏兵衡擊戎師之中第一伏擊其前祝聃與第二伏擊其後并第三伏擊其中戎前後中三處受敵故曰衷戎師前後擊之戎人之前者盡死杜殪死也聃乃甘反又土甘反衷丁仲反又音忠殪於計反戎師大奔杜後駐軍不復繼也林戎人之在後駐軍不救者皆大奔十一月甲寅鄭人大敗戎師杜此皆春秋時事雖經無正文所謂必廣記而備言之將令學者原始要終尋其枝葉究其所窮他皆放此經戊辰十年春王二月公會齊侯鄭伯于中丘杜傳言正月會癸丑盟釋例推經傳日月癸丑是正月二十六日知經二月誤夏翬帥師會齊人鄭人伐宋杜公子翬不待公命而貪會二國之君疾其專進故去氏齊鄭以公不至故亦更使微者從之伐宋不言及明翬專行非鄭之謀也及例在宣七年六月壬戌公敗宋師于菅杜齊鄭後期故公獨敗宋師書敗宋未陳也敗例在莊十一年菅宋地菅古頑反辛未取郜辛巳取防杜鄭後至得郜防二邑歸功于魯故書取明不用師徒也濟隂成武縣東南有郜城高平昌邑縣西南有西防城林郜防宋二邑鄭入之以歸于我也鄭取郜防歸于我不書鄭譏不在鄭晉取濟西汶陽邾田歸于我不書晉譏不在晉也郜古報反字林又工竺反秋宋人衛人入鄭宋人蔡人衛人伐戴鄭伯伐取之杜三國伐戴鄭伯因其不和伐而取之書伐用師徒也書取克之易也戴國今陳留外黃縣東南有戴城戴音再字林作戴冬十月壬午齊人鄭人入郕傳十年春王正月公會齊侯鄭伯于中丘癸丑盟于鄧為師期杜尋九年會于防謀伐宋也公既會而盟盟不書非後也蓋公還告會而不告盟鄧魯地林九年會于防謀伐宋故今會盟為出師之期日夏五月羽父先會齊侯鄭伯伐宋杜言先會明非公本期釋翬之去族六月戊申公會齊侯鄭伯于老桃杜會不書不告於廟也老桃宋地六月無戊申戊申五月二十三日日誤壬戌公敗宋師于菅庚午鄭師入郜辛未歸于我庚辰鄭師入防辛巳歸于我杜壬戌六月七日庚午十五日庚辰二十五日鄭伯後期而公獨敗宋師故鄭頻獨進兵以入郜防入而不有命魯取之推公上爵讓以自替不有其實故經但書魯取以成鄭志善之也君子謂鄭莊公於是乎可謂正矣以王命討不庭林言鄭莊公以王命討宋之不王其曰不庭者下之事上皆成禮於庭中猶言不趨走於王庭也不貪其土以勞王爵正之體也杜勞者敘其勤以答之諸侯相朝逆之以饔餼謂之郊勞魯侯爵尊鄭伯爵平故言以勞王爵林不貪郜防土地之利以答勤勞之魯行師之正有體有用不貪者正之體也勞力報及蔡人衛人郕人不會王命林三國不會伐宋蓋九年鄭以王命來告伐宋想皆告于諸侯故曰不會王命秋七月庚寅鄭師入郊猶在郊杜鄭師還駐兵於逺郊宋人衛人入鄭杜宋衛竒兵乘虛入鄭蔡人從之伐戴杜從宋衛伐戴也八月壬戌鄭伯圍戴癸亥克之取三師焉杜三國之軍在戴故鄭伯合圍之師者軍旅之通稱林得雋曰克取宋衛蔡三師取言易也宋衛既入鄭而以伐戴召蔡人蔡人怒故不和而敗林言蔡人不與入鄭伐戴乃召之蔡人怒宋衛不同其入鄭之功不與宋衛和以至於敗也杜言鄭取之易也九月戊寅鄭伯入宋杜報入鄭也九月無戊寅戊寅八月二十四日冬齊人鄭人入郕討違王命也林討郕拒違王命不會伐宋經己巳十有一年春滕侯薛侯來朝杜諸候相朝例在文十五年林此諸侯朝魯之始亦旅見之始薛息列反夏公會鄭伯于時來杜時來郲也熒陽縣東有釐城鄭地也秋七月壬午公及齊侯鄭伯入許杜與謀曰及還使許叔居之故不言滅也許潁川許昌縣冬十有一月壬辰公薨杜實弒書薨又不地者史䇿所諱也傳十一年春滕侯薛侯來朝爭長杜薛魯國薛縣林滕薛同為侯爵故爭為長長丁丈反薛侯曰我先封杜薛祖奚仲夏所封在周之前滕侯曰我周之卜正也杜卜正卜官之長薛庶姓也我不可以後之杜庶姓非周之同姓林薛任姓滕姬姓故指薛為庶姓同姓之親不可以後於庶姓公使羽父請於薛侯曰君與滕君辱在寡人周諺有之曰山有木工則度之賓有禮主則擇之林欲薛讓滕為長故獨使人請於薛侯周之俗語有之山林有木工師則度其材之小大而用之賓客有禮主人則擇其序之尊卑而行之諺音彥俗言也度大洛反周之宗盟異姓為後杜盟載書皆先同姓例在定四年寡人若朝于薛不敢與諸任齒林言周家宗室有盟誓之事皆先同姓而後異姓設若我公來朝薛國我姬姓諸侯不敢與任姓諸侯並列杜齒列也任音壬君若辱貺寡人則願以滕君為請林謙言薛若辱加貺賜於魯君則願請以滕君為長薛侯許之乃長滕侯夏公會鄭伯于郲謀伐許也鄭伯將伐許五月甲辰授兵于大宫林郲即經書時來之地魯鄭共謀伐許授兵賦車馬也大宫鄭祖廟也蓋授兵車於祖廟也凡出師必告于祖廟而奉遷廟之主以行大音泰公孫閼與穎考叔爭車杜公孫閼鄭大夫林爭車者爭所賦之車閼於葛反穎考叔挾輈以走杜輈車轅也林授車之時未有馬故以手挾轅而走挾音協輈張留反子都拔棘以逐之杜子都公孫閼棘戟也及大逵弗及子都怒杜逵道方九軌也林益拔戟以逐穎考叔逵求龜反爾雅云九達謂之逵杜云道方九軌此依考工記秋七月公會齊侯鄭伯伐許庚辰傅于許林傅附也三師附于許之城下傅音附穎考叔取鄭伯之旗蝥弧以先登林穎考叔取鄭莊公之旗名蝥弧者率先鄭兵以登許國之城蝥亡侯反弧音胡子都自下射之顚杜顚隊而死射食亦反瑕叔盈又以蝥弧登林瑕叔盈鄭大夫考叔既顚越而下故瑕叔盈又以蝥弧登周麾而呼曰君登矣杜周遍也麾招也麾許危反又許偽反呼火故反鄭師畢登林鄭師見君之旗信君已登故師盡登城壬午遂入許許莊公奔衛杜奔不書兵亂遁逃未知所在齊侯以許讓公林既入許以其土地讓與魯公曰君謂許不共杜不共職貢共音恭本亦作供音同故從君討之許既伏其罪矣雖君有命寡人弗敢與聞乃與鄭人鄭伯使許大夫百里奉許叔以居許東偏林許君出奔是伏不共之罪雖齊有以許與魯之命魯不敢聞此命而輒受齊魯既不受許乃以與鄭鄭莊公見齊魯相遜亦不敢自有許國乃使許大夫名百里者奉許莊公之弟許叔居許束偏以見不全得國也杜東偏東鄙也與音預曰天禍許國鬼神實不逞于許君而假手于我寡人林言上天降禍於許國鬼神實怒許君而不得自逞其志而降之罰借手於我以討許罪杜借手於我寡德之人以討許寡人唯是一二父兄不能共億杜父兄同姓羣臣共給億安也林不能共給而億安之億於力反其敢以許自為功乎寡人有弟不能和協而使糊其口於四方杜弟共叔段也糊鬻也段出奔在元年林不能和睦而叶比之而使叔段寄食於四方之國糊音胡説文云寄食其況能久有許乎吾子其奉許叔以撫柔此民也吾將使獲也佐吾子林吾子謂百里其奉許莊公之弟以撫綏柔順此許東偏之氏也我將使鄭大夫公孫獲佐助百里以治許若寡人得沒于地杜以壽終天其以禮悔禍于許杜言天加禮於許而悔禍之無寧兹許公復奉其社稷杜無寧寧也兹此也林言寧止此許叔居許東偏許莊公復還國而奉其社稷之祭祀復扶又反又音服唯我鄭國之有請謁焉如舊昏媾杜謁告也婦之父曰昏重昏曰媾林如舊日姻媾之親媾古豆反其能降以相從也杜降降心也林降心以從鄭之請告無滋他族實逼處此以與我鄭國爭此土也吾子孫其覆亡之不暇而况能禋祀許乎林無生他姓族類之心處此許地以逼害鄭以與我鄭爭此許國之土地若他族處此相逼害則我鄭國之子孫救覆亡之不暇而况能禋祀許之山川乎杜潔齊以享謂之禋祀謂許山川之祀覆芳服反暇行嫁反禋音因寡人之使吾子處此不唯許國之為亦聊以固吾圉也林言我之使許叔處許東偏之地不惟為許國之社稷亦賴汝以固我之邊陲也杜圉邊陲也為于偽反圉魚吕反乃使公孫獲處許西偏曰凡而器用財賄無置於許我死乃亟去之吾先君新邑於此林言汝之器用財物貨賄無置於許西偏之地鄭自桓公受封至莊公才二世故曰新邑於鄭杜此今河南新鄭舊鄭在京兆賄呼罪反字林音悔置之豉反置也亟紀力反急也王室而既卑矣周之子孫日失其序林鄭與周同姓諸姬之子孫日失其次序夫許大嶽之胤也杜大嶽神農之後堯四嶽也胤繼也大音泰天而既厭周德矣吾其能與許爭乎君子謂鄭莊公於是乎有禮林王室卑子孫失序則天棄周德可知我鄭國豈能以天之所厭而與許爭為雄長哉此言鄭莊公得伐叛討二存已繼絶之禮厭於艷反禮經國家定社稷序民人利後嗣者也許無刑而伐之服而舍之杜刑法也度德而處之量力而行之相時而動無纍後人林言禮之用經理其國家安定其社稷教民長幼尊卑之序為後嗣萬世無疆之利者也許國家無刑法而伐之許服其罪而舍其國度許德之厚薄而處之度鄭力之強弱而行之聊以固吾圉是相時而動我死乃亟去之是無纍後人也度待洛反量音良下同相息亮反纍考偽反可謂知禮矣鄭伯使卒出豭行出犬雞以詛射穎考叔者杜百人為卒二十五人為行行亦卒之行列疾射穎考叔者故令卒及行間皆詛之卒尊忽反豭音加豬别名行户剛反詛側慮反君子謂鄭莊公失政刑矣政以治民刑以正邪既無德政又無威刑是以及邪杜大臣不睦又不能用刑於邪人林謂失政正刑邪之道政者正也所以治民刑者測也所以正邪既無德以美其政又無威以用其刑臣下不懷德畏威是以及邪僻之行邪似嗟反下同邪而詛之將何益矣林邪不能治而假詛祝將何益於國家之事矣王取塢劉杜二邑在河南緱氏縣西南有塢聚西北有劉亭塢烏户反蒍邘之田于鄭杜為邘鄭二邑林周桓王取鄭四邑之田蒍尤委反邘音于而與鄭人蘇忿生之田杜蘇忿生周武王司冦蘇公也林蓋蘇公受此田以為采邑蘇氏叛王桓王不能有其田故以易四邑于鄭忿芳粉反溫杜今溫縣原杜在沁水縣西絺杜在野王縣西南絺勑之反樊杜一名陽樊野王縣西南有陽城樊扶袁反隰郕杜在懷縣西南隰詳立反郕尚征反櫕茅杜在修武縣北櫕才官反向杜軹縣西有地名向上向舒亮反盟杜今盟津盟音孟州杜今州縣陘杜闕陘音刑隤杜在修武縣北隤徒回反懷杜今懷縣凡十三邑皆蘇忿生之田櫕茅隤屬汲郡餘皆屬河內君子是以知桓王之失鄭也恕而行之德之則也禮之經也已弗能有而以與人人之不至不亦宜乎林已所不欲勿使於人今王以已所不能有之十二邑而易鄭人所自有之四邑君子是以知桓王失鄭莊之心也推已及人之謂恕恕者德之法則也禮之經紀也十二邑非王所有而與鄭人使自取之人謂鄭也宜鄭之不臣服乎周也杜為桓五年從王伐鄭張本鄭息有違言杜以言語相違恨息侯伐鄭鄭伯與戰于竟息師大敗而還林與息戰于鄭之境蓋逆息師而戰杜息國汝南新息縣竟音境息一本作鄎音息君子是以知息之將亡也林師敗亡國之兆也為莊公十四年楚滅息不度德杜鄭莊賢度待洛反不量力杜息國弱不親親杜鄭息同姓之國不徴辭不察有罪杜言語相恨當明徵其辭以審曲直不宜輕鬭犯五不韙而以伐人其喪師也不亦宜乎杜韙是也林五者不是息皆犯之而興師以伐鄭其取敗也宜其然也韙韋鬼反喪息浪反冬十月鄭伯以虢師伐宋壬戌大敗宋師以報其入鄭也杜入鄭在十年宋不告命故不書凡諸侯有命告則書不然則否杜命者國之大事政令也承其告辭史乃書之於䇿若所傳聞行言非將君命則記在簡牘而已不得記於典䇿此蓋周禮之舊制師出臧否亦如之杜臧否謂善惡得失也滅而告敗勝而告克此皆互言不須兩告乃書否音鄙又方九反雖及滅國滅不告敗勝不告克不書于䇿羽父請殺桓公將以求大宰杜大宰官名林欲為隱殺桓以求大宰之官大音泰公曰為其少故也吾將授之矣林為桓公尚少故攝魯國吾將以君位授桓公矣為于偽反少詩照反使營菟裘吾將老焉杜菟裘魯邑在泰山梁父縣南不欲復居魯朝故别營外邑菟兔都反裘音求羽父懼反譖公于桓公而請弒之林以隱公不從而懼禍及已反譖隱公於桓公謂隱將殺桓請為桓弒隱以下殺反上曰弒譖側鴆公之為公子也與鄭人戰于狐壤止焉杜內諱獲故言止狐壤鄭地鄭人囚諸尹氏杜尹氏鄭大夫賂尹氏而禱于其主鍾巫林隱公行賄賂於尹氏祈禱於尹氏所主祭鍾巫之神賂音路禱丁老反或多報反巫亡夫反遂與尹氏歸而立其主林遂與尹氏俱逃歸魯國而立鍾巫之廟於魯十一月公祭鍾巫齊于社圃杜社圃園名圃布古反館于寪氏杜館舍也寪氏魯大夫寪于委反壬辰羽父使賊弒公于寪氏立桓公而討寪氏有死者杜欲以殺君之罪加寪氏而復不能正法誅之傳言進退無據不書葬不成喪也齊桓弒隱篡立故喪禮不成左傳杜林合注卷二
