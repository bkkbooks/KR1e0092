body:
  text: 左傳杜林合注卷四十七明王道焜趙如源同編哀公一公名蔣定公之子蓋夫人定姒所生諡法恭仁短折曰哀周敬王二十六年敬王四十一年孔子卒魯哀公十九年敬王崩子元王立此據哀傳載敬王崩故也按諸本敬王崩皆不同或作哀十七年十八年或作哀二十年未詳孰正鄭聲公七年聲公二十二年孔子卒齊景公五十四年魯哀公五年景公卒安孺子荼立是年弑悼公陽生立哀十年悼公弑子簡公壬立哀十四年田常弑簡公立其弟騖為平公而相之専其國權齊自是為田氏矣宋景公二十三年景公三十八年孔子卒晉定公十八年晉霸衰微魯哀公十三年㑹吴黄池吴始稱霸定三十三年孔子卒衛靈公四十一年魯哀公二年靈公卒孫出公輒立是年六月晉納衛大子蒯聵于戚父子爭國哀十五年蒯聵入是為莊公輒出奔哀十七年莊公弑立公孫般師十二月齊伐衛立公子起執般師以歸哀十八年衛逐起衛侯輒復入蔡昭侯二十五年魯哀公四年昭侯弑子成侯立成侯十三年孔子卒曹伯陽八年魯哀公八年宋滅曹滕頃公十六年魯哀公四年頃公卒隱公虞母立哀十一年隱公卒陳閔公八年魯哀公十六年楚滅陳弑閔公杞僖公十二年魯哀公八年僖公卒子閔公維立薛惠公三年魯哀公十年惠公卒莒郊公邾隱公十三年魯哀公七年魯入邾執邾子益哀八年歸吴又討邾子囚諸樓臺栫之以棘使諸大夫奉子革以為政哀十年邾子益來奔許元公十年魯哀公十三年元公卒小邾詳見昭公元年楚昭王二十二年魯哀公六年昭王卒子惠王章立哀十六年楚白公勝殺令尹子西攻恵王葉公攻白公自公自殺惠王復國哀十八年恵王卒秦惠公七年魯哀公三年惠公卒悼公立魯哀公十八年悼公卒子厲共公立吴夫差二年魯哀公元年入越棲越㑹稽越行成哀十年吴謀伍員哀十四年㑹晉黄池越入吴哀二十年越圍吴哀二十二年越滅吴越句踐二年魯哀公元年吴入越棲于㑹稽以行成用大夫種范蠡為政哀十四年入吴哀二十年圍吴哀二十一年始來聘魯哀二十二年滅吴乃以兵北渡淮與齊晉諸侯㑹于徐州周元王使人賜句踐胙命為伯當是時越兵横行于江淮東諸侯畢賀號稱霸王經丁未元年春王正月公即位無傳楚子陳侯隨侯許男圍蔡杜隨世服於楚不通中國吴之入楚昭王奔隨隨人免之卒復楚國楚人德之使列於諸侯故得見經定六年鄭滅許此復見者蓋楚封之林鄭滅許矣其再見何復正矣復正有三辭莫善於自尅復者也是故襄王嘗書出已而書王則愈於敬王書人矣許嘗書滅已而書許男則愈於陳蔡書歸矣春秋善復正襄王許男則善之善者也鼷鼠食郊牛改卜牛夏四月辛巳郊杜無傳書過也不言所食所食非一處秋齊侯衛侯伐晉林伐夷儀不書書次五氏伐河内不書書次垂襲公㑹齊衛于牽帥狄襲晉戰于絳中猶不書也諸侯之無伯春秋誠有不忍書也必於是而後書春秋益將終焉是故春秋之初諸侯無王者齊鄭宋魯衛也春秋之季諸侯無伯者亦齊鄭宋魯衛也冬仲孫何忌帥師伐邾無傳傳元年春楚子圍蔡報柏舉也在定四年里而栽杜栽設板築為圍壘周匝去蔡城一里栽才代反又音再築牆長板廣丈高倍壘厚一丈高二丈廣古擴反夫屯晝夜九日夫猶兵也壘未成故令人在壘裏屯守蔡屯徒門反如子西之素子西本計為壘當用九日而成蔡人男女以辨辨别也男女各别係纍而出降辨扶免反使疆于江汝之間而還楚欲使蔡徙國在江水之北汝水之南求田以自安也蔡權聴命故楚師還疆居良反蔡於是乎請遷于吴楚既還蔡人更叛楚就吴為明年蔡遷州來傳吴王夫差敗越于夫椒報檇李也杜檇李在定十四年夫椒吴郡吴縣西南大湖中椒山林所謂三年乃報越夫音扶檇音醉遂入越越子以甲楯五千保于㑹稽上㑹稽山也在㑹稽山隂縣南楯食允反又音允㑹古外反使大夫種因吴大宰嚭以行成林嚭故楚臣奔吴為大宰寵幸於夫差故種因之種章勇反大音泰嚭普鄙反吴子將許之伍員曰不可臣聞之樹德莫如滋去疾莫如盡林言樹立有德必使滋長除去惡疾必使盡淨員音云昔有過澆殺斟灌以伐斟鄩杜澆寒浞子封於過者二斟夏同姓諸侯襄四年傳曰澆用師滅斟灌過古禾反國名下同澆五呌反又五報反下同鄩音㝷滅夏后相夏后相啓孫也后相失國依於二斟復為澆所滅相息亮反后緍方娠逃出自竇后緍相妻娠懐身也緍亡巾反娠音震又音身竇音豆歸于有仍后緍有仍氏女生少康焉為仍牧正杜牧官之長少詩照反惎澆能戒之杜惎毒也戒備也林能戒備其毒害惎音忌澆使椒求之林椒澆臣使求少康欲殺之逃奔有虞為之庖正以除其害杜虞舜後諸侯也梁國有虞縣庖正掌膳羞之官頼此以得除己害虞思於是妻之以二姚杜思有虞君也虞思自以二女妻少康姚虞姓妻七計反而邑諸綸綸虞邑綸音倫有田一成有衆一旅杜方十里為成五百人為旅能布其徳而兆其謀杜兆始以收夏衆撫其官職杜襄四年傳曰靡自有鬲氏收二國之燼以滅浞而立少康使女艾諜澆杜女艾少康臣諜侯也女如字又音汝諜音牒使季杼誘豷杜豷澆弟也季杼少康子后杼也杼直吕反豷許器反遂滅過戈復禹之績杜過澆國戈豷國祀夏配天不失舊物杜物事也今吴不如過而越大於少康或將豐之不亦難乎杜言與越成是使越豐大必為吴難句踐能親而務施施不失人杜所加惠賜皆得其人施始䜴反下同親不棄勞推親愛之誠則不遺小勞與我同壤而世為仇讐於是乎克而弗取將又存之違天而長寇讐杜猶言天與不取長丁丈反下同後雖悔之不可食已杜食消也已止也姬之衰也日可俟也杜姬吴姓言可計日而待介在蠻夷而長寇讐以是求伯必不行矣弗聴退而告人曰越十年生聚而十年教訓杜生民聚財富而後教之伯如字又音霸二十年之外吴其為沼乎謂吴宫室廢壊當為汙池為二十二年越入吴起本三月越及吴平吴入越不書吴不告慶越不告敗也嫌夷狄不與華同故復發傳夏四月齊侯衛侯救邯鄲圍五鹿杜趙稷以邯鄲叛范中行氏之黨也五鹿晉邑邯音寒鄲音丹吴之入楚也在定四年使召陳懐公懐公朝國人而問焉曰欲與楚者右欲與吴者左陳入從田無田從黨杜都邑之人無田者隨黨而立不知所與故直從所居田在西者居右在東者居左逢滑當公而進杜當公不左不右曰臣聞國之興也以福其亡也以禍今吴未有福楚未有禍楚未可棄吴未可從而晉盟主也若以晉辭吴若何公曰國勝君亡非禍而何杜楚為吴所勝對曰國之有是多矣何必不復林言國家有此成敗其類甚多豈必皆亡不能復振小國猶復况大國乎臣聞國之興也視民如傷是其福也杜如傷恐驚動林民歸之則天佑之此吾所謂福其亡也以民為土芥是其禍也杜芥草也林斬艾民力如治土芥惟恐其不盡民怨則神怒此吾所謂禍楚雖無徳亦不艾殺其民吴日敝於兵暴骨如莽杜草之生于廣野莽莽然故曰草莽艾魚廢反暴步卜反而未見德焉天其或者正訓楚也杜使懼而改過禍之適吴其何日之有言今至陳侯從之及夫差克越乃修先君之怨林召陳不至闔廬事也故夫差為修先君之怨秋八月吴侵陳修舊怨也傳言吴不修德而修怨所以亡齊侯衛侯㑹于乾侯救范氏也師及齊師衛孔圉鮮虞人伐晉取棘蒲杜魯師不書非公命也孔圍孔烝鉏曽孫鮮虞狄帥賤故不言吴師在陳楚大夫皆懼曰闔廬惟能用其民以敗我於柏舉今聞其嗣又甚焉將若之何子西曰二三子恤不相睦無患吴矣昔闔廬食不二味居不重席室不崇壇林平地作室不起壇也重直龍反器不彤鏤杜彤丹也鏤刻也宫室不觀杜觀臺榭觀古亂反舟車不飾衣服財用擇不取費選取堅厚不尚細靡費芳味反在國天有菑癘杜癘疾疫也親巡孤寡而共其乏困在軍熟食者分而後敢食杜必須軍士皆分熟食不敢先食分猶徧也共音恭其所嘗者卒乗與焉杜所嘗甘珍非常食乗繩證反與音預勤恤其民而與之勞逸是以民不罷勞死知不曠杜知身死不見曠棄罷音皮吾先大夫子常易之所以敗我也杜易猶反也今聞夫差次有臺榭陂池焉杜積土為高曰臺有木曰榭過再宿曰次林鄣澤曰陂積水曰池言夫差三宿以上即備臺池之樂陂彼宜反宿有妃嬙嬪御焉林妃嬙貴者嬪御賤者皆内官言夫差一宿之寓亦備子女之奉嬙在羊反嬪毗人反一日之行林一日所行之地所欲必成玩好必從珍異是聚觀樂是務視民如讐而用之日新林用之爭戰日新不已好呼報反夫先自敗也已安能敗我杜為二十二年越滅吴起本夫音扶冬十月晉趙鞅伐朝歌杜討范中行氏經戊申二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田杜邾人以賂取之易也林見三家之専兵權也漷火虢反又音郭癸巳叔孫州仇仲孫何忌及邾子盟于句繹杜句繹邾地取邑盟以要之林自是内外反盟皆不書不足書也句古侯夏四月丙子衛侯元卒杜定四年盟臯鼬靈公卒蒯瞶之子輒立滕子來朝杜無傳滕朝止此晉趙鞅帥師内衛世子蒯聵于戚林于戚内弗受也輒拒父也後十二年而蒯瞶自戚入于衛衛侯輒來奔則是輒拒父也世子正也屬辭比事則輒萬世不可掩矣秋八月甲戌晉趙鞅帥師及鄭罕逵帥師戰于鐵鄭師敗績杜皆陳曰戰大崩曰敗績鐵在戚城南罕逵子皮孫冬十月葬衛靈公無傳七月而葬緩十有一月蔡遷于州來畏楚而請遷故以自遷為文蔡殺其大夫公子駟懐土而欺大國故罪而書名傳二年春伐邾將伐絞絞邾邑邾人愛其土故賂以漷沂之田而受盟初衛侯遊于郊子南僕子南靈公子郢也僕御也公曰余無子將立女杜蒯聵奔無大子女音汝不對他日又謂之對曰郢不足以辱社稷君其改圖君夫人在堂三揖在下杜三揖卿大夫士林三揖者孤卿特揖大夫以其等旅揖士旁三揖見周禮司士君命祗辱言立適當以禮與外内同之今君又命事必不從適為辱祗音支夏衛靈公卒夫人曰命公子郢為大子君命也對曰郢異於他子杜言用意不同且君没於吾手林靈公没時我在其左右若有之郢必聞之言當以臨没為正且亡人之子輒在杜輒剻聵之子出公也靈公適孫乃立輒六月乙酉晉趙鞅納衛大子于戚宵迷林夜行迷路陽虎曰林陽虎奔晉趙氏右河而南必至焉杜是時河北流過元城界戚在河外晉軍已渡河故欲出河右而南使大子絻絻者始發喪之服絻音問八人衰絰偽自衛逆者欲為衛人逆故衰絰成服衰七雷反絰田結反告于門哭而入遂居之林告於戚之邑門舉哀而後入遂居于戚蓋輒以子拒父不受也秋八月齊人輸范氏粟林范氏乆居朝歌糧食不足故齊以粟輸之鄭子姚子般送之杜子姚罕達子般駟𢎞般音班士吉射逆之趙鞅禦之遇於戚陽虎曰吾車少以兵車之斾與罕駟兵車先陳杜斾先驅車也以先驅車益以兵車以示衆林罕駟即子姚子般陳直覲反罕駟自後隨而從之彼見吾貌必有懼心杜晉人先陳鄭人隨之不知其虚實見車多必懼於是乎㑹之杜㑹合戰必大敗之從之卜戰龜焦兆不成樂丁曰詩曰爰始爰謀爰契我龜杜樂丁晉大夫詩大雅言先人事後卜筮契苦計反又苦結反謀協以故兆詢可也杜詢諮詢也故兆始納衛大子卜得吉兆言今既謀同可不須更卜謀協以故兆絶句簡子誓曰范氏中行氏反易天明林反易天之明德不事其君斬艾百姓欲擅晉國而滅其君寡君恃鄭而保焉林晉國恃鄭以保守其國艾魚廢反今鄭為不道棄君助臣二三子順天明從君命經德義林經常其助順之德義除詬恥在此行也克敵者上大夫受縣下大夫受郡杜周書作雒篇千里百縣縣有四郡詬呼豆反又音苟士田十萬杜十萬畝也庶人工商遂得遂仕進人臣𨽻圉免杜去厮役志父無罪君實圖之杜志父趙簡子之一名也言已事濟君當圖其賞父音甫服云趙鞅入晉陽以叛後得歸改名志父春秋仍舊猶書趙鞅若其有罪絞縊以戮杜絞所以縊人物桐棺三寸不設屬辟杜屬辟棺之重數林棺用難朽之木桐木易壊故以為罰夫子制于中都棺四寸三寸亦罰也屬次大棺也辟拖棺也王棺四重被水牛及兕之革為一重辟為二重屬為三重大棺為四重君再重屬與辟為一重大棺為二重大夫一重無辟唯屬與大棺為一重今云不設辟者僭君制耳非正禮也屬音燭辟步厯反素車樸馬杜以載柩樸普角反無入于兆杜兆葬域下卿之罰也林為衆設賞自設罰所以能克敵甲戌將戰郵無恤御簡子衛大子為右杜郵無恤王良也登鐵上鐵丘名望見鄭師衆大子懼自投于車下子良授大子綏林子良即王良而乗之曰婦人也杜言其怯簡子巡列曰畢萬匹夫也七戰皆獲有馬百乗死於牖下杜畢萬晉獻公卿也皆獲有功死於牖下言得夀終乗䋲證反羣子勉之死不在冦杜言有命繁羽御趙羅宋勇為右杜三子晉大夫羅無勇麇之杜麇束縛也林趙羅無勇不能乗車束縛趙羅使在於車麇丘隕反吏詰之御對曰痁作而伏林言趙羅痁瘧疾作而伏故束縛之詰起吉反痁詩占反衛大子禱曰曽孫蒯瞶敢昭告皇祖文王杜周文王皇大也烈祖康叔杜烈顯也文祖襄公杜繼業守文故曰文祖蒯瞶襄公之孫鄭勝亂從勝鄭聲公名釋君助臣為從於亂晉午在難林午晉定公名國有叛臣為在於難難乃旦反不能治亂使鞅討之杜鞅簡子名蒯聵不敢自佚備持矛焉杜戎右持矛敢告無絶筋無折骨無面傷以集大事無作三祖羞林徼福于神無中戈矛斬絶筋脈無使車馬損折骨肉無中弓矢傷損面目集成軍旅之大事無作我三祖之羞恥大命不敢請佩玉不敢愛杜不敢愛故以祈禱鄭人撃簡子中肩斃于車中杜斃踣也中肩丁仲反獲其蠭旗蠭旗旗名蠭芳恭反大子救之以戈林蒯瞶為車右故以戈救簡子鄭師北獲温大夫趙羅羅無勇故鄭師雖北猶獲羅大子復伐之鄭師大敗獲齊粟千車趙孟喜曰可矣杜趙孟簡子也喜大子前怯今更勇傅傁曰雖克鄭猶有知在憂未艾也杜傅傁簡子屬也言知氏將為難後竟有晉陽之患傁素口反知音智艾魚廢反又五蓋反初周人與范氏田公孫尨稅焉尨范氏臣為范氏收周人所與田之稅尨武江反趙氏得而獻之林趙氏之衆得尨以獻於趙簡子吏請殺之趙孟曰為其主也何罪止而與之田還其所稅為于偽反及鐵之戰以徒五百人宵攻鄭師取蠭旗於子姚之幕下林取鄭師所獲之蠭旗於鄭罕達帳幕之下獻曰請報主德追鄭師姚般公孫林殿而射前列多死林晉前列姚般子姚子般殿丁電反射食亦反趙孟曰國無小杜言雖小國猶有善射者既戰簡子曰吾伏弢嘔血弢弓衣嘔吐也弢吐刀反嘔烏口反鼓音不衰今日我上也杜功為上大子曰吾救主於車退敵於下我右之上也郵良曰我兩靷將絶吾能止之林在胸曰靷言我馬之兩靷皆將㫁絶吾能止使不絶靷以刃反我御之上也駕而乗材兩靷皆絶林乗載也材横木明細小也駕馬而載細小之横木使簡子觀之兩靷同時皆絶以明止使不絶之功傳言簡子不讓下自伐吴洩庸如蔡納聘而稍納師師畢入衆知之林洩庸吴大夫杜元年蔡請遷于吴中悔故因聘襲之洩息列反蔡侯告大夫殺公子駟以説杜殺駟以説吴言不時遷駟之為哭而遷墓將遷與先君辭故哭冬蔡遷于州來經己酉三年春齊國夏衛石曼姑帥師圍戚杜曼姑為子圍父知其不義故推齊使為兵首戚不稱衛非叛人林蒯瞶在戚而齊偕衛以圍之父子之義景公未之察也曼音萬夏四月甲午地震無傳五月辛夘桓宫僖宫災天火曰災季孫斯叔孫州仇帥師城啟陽杜無傳魯黨范氏故懼晉比年四城啟陽今琅邪開陽縣宋樂髠帥師伐曹無傳髠若孫反秋七月丙子季孫斯卒蔡人放其大夫公孫獵于吴無傳公子駟之黨冬十月癸夘秦伯卒杜無傳不書名未同盟林惠公卒悼公立叔孫州仇仲孫何忌帥師圍邾無傳傳三年春齊衛圍戚求援于中山杜中山鮮虞夏五月辛夘司鐸火司鐸宫名火踰公宫桓僖災杜桓公僖公廟救火者皆曰顧府林顧府庫之藏言常入爱財南宫敬叔至命周人出御書俟于宫杜敬叔孔子弟子南宫适周人司周書典籍之官御書進於君者也使待命於宫曰庀女而不在死林庀具也言具汝所職而有不在其罪死庀匹婢反女音汝子服景伯至命宰人出禮書杜景伯子服何也宰人家宰之屬以待命命不共有常刑杜待求之命共音恭校人乗馬巾車脂轄杜校人掌馬巾車掌車乗馬使四四相從為駕之易林以脂膏轄為行之易校户教反乗繩證反下皆同百官官備林國之百官各備其官府庫慎守官人肅給杜國有火災恐有變難故慎為備濟濡帷幕鬱攸從之杜鬱攸火氣也濡物於水出用為濟林從火氣而為之備濟子細反又于禮反攸音由蒙葺公屋杜以濡物冒覆公屋自大廟始外内以悛杜悛次也先尊後卑以次救之悛七全反助所不給有不用命則有常刑無赦公甫文伯至命校人駕乗車林乗車公車也駕之備緩急季桓子至御公立于象魏之外杜象魏門闕命救火者傷人則止財可為也杜火勢傷人則止勿救有財則可為不欲重財而輕民命命藏象魏周禮正月縣教令之法于象魏使萬民觀之故謂其書為象魏曰舊章不可亡也富父槐至曰無備而官辦者猶拾瀋也林槐富父終生之後瀋汁也備豫無素而欲責辦於官猶拾汁終不可得父音甫瀋尺審反於是乎去表之槀表表火道風所向者去其槀積道還公宫開除道周匝公官使火無相連還本又作環户關反又音患孔子在陳聞火曰其桓僖乎言桓僖親盡而廟不毁宜為天所災劉氏范氏世為婚姻劉氏周卿士范氏晉大夫萇𢎞事劉文公杜為之屬大夫故周與范氏趙鞅以為討杜責周與范氏六月癸夘周人殺萇𢎞終違天之禍秋季孫有疾命正常曰無死正常桓子之寵臣欲付以後事故敕令勿從已死南孺子之子男也則以告而立之杜南孺子季桓子之妻言若生男告公而立之女也則肥也可杜肥康子也季孫卒康子即位既葬康子在朝杜在公朝也南氏生男正常載以如朝告曰夫子有遺言命其圉臣曰林夫子謂季桓子圉臣正常自稱以為養馬之僕南氏生男則以告於君與大夫而立之今生矣男也敢告遂奔衛康子請退杜退辟位也公使共劉視之共劉魯大夫共音恭則或殺之矣乃討之討殺者召正常正常不反畏康子也傳備言季氏家事冬十月晉趙鞅圍朝歌師于其南范中行所在荀寅伐其俘杜伐其北郭圍郛芳夫反使其徒自北門入已犯師而出杜荀寅使在外救己之徒撃趙氏圍之北門用外内攻得出癸丑奔邯鄲林趙稷以邯鄲叛黨於范氏故荀寅等奔之十一月趙鞅殺士臯夷林士臯夷即定十三年范臯夷惡范氏也惡范氏而殺其族言遷怒惡烏路反經庚戌四年春王二月庚戌盜殺蔡侯申杜賤者故稱盜不言弑其君賤盜也林昭侯殺子成侯立殺申志反案宣十七年蔡侯申卒是文侯也今昭侯是其𤣥孫不容與高祖同名未詳何者誤也蔡公孫辰出奔吴杜弑君賊之黨故書名林書公薨夫人姜氏孫于邾公子慶父出奔莒則夫人慶父與聞乎弑矣書盜殺蔡侯申公孫辰出奔吴則公孫辰與聞乎殺矣葬秦惠公無傳宋人執小邾子杜無傳邾子無道於其民故稱人以執夏蔡殺其大夫公孫姓公孫霍皆弑君黨姓音生晉人執戎蠻子赤歸于楚杜晉恥為楚執諸侯故稱人以告若蠻子不道於其民也赤本屬楚故言歸林晉執戎蠻子不歸天子而歸于楚是京師楚也城西郛無傳魯西郭備晉也六月辛丑亳社災杜無傳天火也亳社殷社諸侯有之所以戒亡國林亡國之社有屋使不得上通於天故災秋八月甲寅滕子結卒杜無傳同盟於臯鼬林頃公卒隱公虞母立冬十有二月葬蔡昭公無傳亂故是以緩葬滕頃公無傳頃音傾傳四年春蔡昭侯將如吴諸大夫恐其又遷也承杜承音懲蓋楚言公孫翩逐而射之入於家入而卒杜翩蔡大夫射食亦反下同以兩矢門之衆莫敢進杜翩以矢自守其門文之鍇後至杜鍇蔡大夫鍇音楷又音皆又客駭反曰如牆而進多而殺二人林使衆人並行如牆俱進翩以兩矢多則殺二人少不能也鍇執弓而先翩射之中肘鍇遂殺之故逐公孫辰而殺公孫姓公孫盱林盱即霍也中丁仲反盱兄于反夏楚人既克夷虎夷虎蠻夷叛楚者乃謀北方左司馬眅申公夀餘葉公諸梁致蔡於負函杜三子楚大夫也此蔡之故地人民楚因以為邑致之者㑹其衆也眅普版反又匹姦反葉始涉反致方城之外於繒關杜負函繒關皆楚地繒才陵反曰吴將泝江入郢逆流曰泝將奔命焉為一昔之期襲梁及霍林一昔一夜也杜偽辭當備吴夜結期明日便襲梁霍使不知之梁河南梁縣西南故城也梁南有霍陽山皆蠻子之邑也單浮餘圍蠻氏蠻氏潰杜浮餘楚大夫單音善蠻子赤奔晉隂地隂地河南山北自上雒以東至陸渾司馬起豐析與狄戎杜楚司馬服也析縣屬南鄉郡析南有豐鄉皆楚邑發此二邑人及戎狄以臨上雒左師軍于莬和杜莬和山在上雒東也莬音徒右師軍于倉野杜倉野在上雒縣使謂隂地之命大夫士蔑杜命大夫别縣監尹曰晉楚有盟好惡同之若將不廢寡君之願也不然將通於少習以聴命杜少習商縣武關也將大開武關道以伐晉少詩照反士蔑請諸趙孟趙孟曰晉國未寧安能惡於楚必速與之杜未寧時有范中行之難士蔑乃致九州之戎杜九州戎在晉隂地陸渾者將裂田以與蠻子而城之林許將為之築城且將為之卜杜卜城為于偽反蠻子聴卜遂執之與其五大夫以畀楚師于三户杜今丹水縣北三户亭林此經所以書歸于楚司馬致邑立宗焉以誘其遺民杜楚復詐為蠻子作邑立其宗主而盡俘以歸秋七月齊陳乞弦施衛寗跪救范氏杜陳乞僖子弦施弦多齊衛黨范中行故救之庚午圍五鹿五鹿晉邑九月趙鞅圍邯鄲林范中行所在冬十一月邯鄲降荀寅奔鮮虞趙稷奔臨臨晉邑降户江反十二月弦施逆之遂墮臨林遂墮臨邑以處趙稷墮許規反國夏伐晉取邢任欒鄗逆畤隂人盂壺口杜八邑晉地欒在趙國平棘縣西北鄗即高邑縣也路縣東有壺口關任音壬鄗呼洛反畤音止㑹鮮虞納荀寅于柏人杜晉邑也今趙國伯人縣也弦施與鮮虞㑹也經辛亥五年春城毗無傳備晉也夏齊侯伐宋無傳晉趙鞅帥師伐衛林衛助范氏故秋九月癸酉齊侯杵臼卒杜再同盟也景公卒安孺子荼立冬叔還如齊閏月葬齊景公無傳傳五年春晉圍柏人荀寅士吉射奔齊初范氏之臣王生惡張栁朔言諸昭子使為柏人杜為柏人宰也昭子范吉射也惡烏路反下同昭子曰夫非而讐乎對曰私讐不及公杜公家之事也夫音扶好不廢過惡不去善義之經也臣敢違之及范氏出杜出柏人之齊好呼報反張栁朔謂其子爾從主勉之我將止死林使其子從吉射出奔勉盡忠力已將止此距戰以死王生授我矣杜授我死節吾不可以僭之林僭不信也遂死於柏人杜為吉射距晉戰死夏趙鞅伐衛范氏之故也遂圍中牟杜衛助范氏故也齊燕姬生子不成而死杜燕姬景公夫人不成未冠也燕于賢反諸子鬻姒之子荼嬖杜諸子庶公子也鬻姒景之妾荼安孺子荼音舒又音徒嬖必計反諸大夫恐其為大子也言於公曰君之齒長矣未有大子若之何公曰二三子間於憂虞則有疾疢亦姑謀樂何憂於無君林言諸大夫當國家閒暇而無憂虞則恐疾疢不得為樂亦且謀為歡樂之事杜景公意欲立荼而未發故以此言塞大夫請長丁丈反間音閑又音間厠之間疢勅覲反樂音洛公疾使國惠子高昭子立荼杜惠子國夏昭子髙張寘羣公子於萊杜萊齊東鄙邑秋齊景公卒冬十月公子嘉公子駒公子黔奔衛公子鉏公子陽生來奔皆景公子在萊者黔巨亷反又音琴萊人歌之曰景公死乎不與埋三軍之事乎不與謀師乎師乎何黨之乎杜師衆也黨所也之往也稱諡蓋葬後而為此歌哀羣公子失所與音預鄭駟秦富而侈嬖大夫也而常陳卿之車服於其庭林示其富侈鄭人惡而殺之子思曰詩曰不解于位民之攸塈杜子思子産子國參也詩大雅攸所也墍息也林言不敢解怠於其職位民之所安息也此言與民同樂惡烏路反解佳賣反塈許器反不守其位而能乆者鮮矣商頌曰不僭不濫不敢怠皇命以多福林賞不僭差及於無功罰不淫濫及於無罪不敢怠惰暇逸故能膺天命以受多福杜僭差也濫溢也皇暇也言駟秦違詩商頌故受禍鮮息淺反經壬子六年春城邾瑕杜無傳備晉也任城亢父縣北有邾婁城晉趙鞅帥師伐鮮虞吴伐陳夏齊國夏及高張來奔杜二子阿君廢長立少既受命又不能全書名罪之也叔還㑹吴于柤無傳柤莊加反秋七月庚寅楚子軫卒杜未同盟而赴以名林昭王卒恵王立軫之忍反史記作珍齊陽生入于齊杜為陳乞所逆故書入林衛侯入于夷儀衛寗喜弑其君剽則喜為衛侯弑也齊陽生入于齊齊陳乞弑其君荼則乞為陽生弑也齊陳乞弑其君荼杜弑荼者朱毛與陽生也而書陳乞所以明乞立陽生而荼見弑則禍由乞始也楚比劫立陳乞流涕子家憚老皆疑於免罪故春秋明而書之以為弑主林荼弑悼公陽生立冬仲孫何忌帥師伐邾無傳宋向巢帥師伐曹無傳傳六年春晉伐鮮虞治范氏之亂也四年鮮虞納荀寅于柏人吴伐陳復修舊怨也元年未得志故也楚子曰吾先君與陳有盟不可以不救乃救陳師于城父杜陳盟在昭十三年父音甫齊陳乞偽事高國者髙張國夏受命立荼陳乞欲害之故先偽事焉每朝必驂乗焉所從必言諸大夫林凡所從行陳乞必言諸大夫之罪過乗繩證反曰彼皆偃蹇將棄子之命杜偃蹇驕傲皆曰林詐作諸大夫之言高國得君杜得君寵也必偪我盍去諸固將謀子子早圖之圖之莫如盡滅之需事之下也杜需疑也及朝則曰彼虎狼也杜彼謂諸大夫見我在子之側殺我無日矣請就之位杜欲與請大夫謀高國故求就之又謂諸大夫曰二子者禍矣林言高國二子將召禍矣恃得君而欲謀二三子曰國之多難貴寵之由盡去之而後君定既成謀矣盍及其未作也先諸作而後悔亦無及也大夫從之夏六月戊辰陳乞鮑牧牧鮑圉孫難乃旦反及諸大夫以甲入于公宫昭子聞之與惠子乗如公林昭子即高張惠子即國夏乗繩證反戰于莊敗高國敗也莊六軌之道國人追之國夏奔莒遂及高張晏圉弦施來奔圉晏嬰之子圉施不書非卿秋七月楚子在城父將救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死杜前已敗於柏舉今若退還亦是敗棄盟逃讐杜棄先君好陳之盟誓逃吴人累世之仇讐亦不如死死一也其死讐乎命公子申為王不可則命公子結亦不可則命公子啟杜申子西結子期啟子閭皆昭王兄五辭而後許杜子閭五辭不肯而後許王以立將戰王有疾庚寅昭王攻大㝠卒于城父大㝠陳地吴師所在子閭退曰君王舍其子而讓羣臣敢㤀君乎從君之命順也杜從命許立舍音捨立君之子亦順也二順不可失也與子西子期謀潛師閉塗逆越女之子章立之而後還杜潛師密發也閉塗不通外使也越女昭王妾章惠王是嵗也有雲如衆赤鳥夾日以飛三日楚子使問諸周太史周太史曰其當王身乎日為人君妖氣守之故以為當王身雲在楚上唯楚見之故禍不及他國大音泰若禜之可移於令尹司馬杜榮禳祭禜音詠王曰除腹心之疾而寘諸股肱何益林腹心昭王自喻股肱以喻令尹司馬不穀不有大過天其天諸有罪受罰又焉移之林不穀諸侯謙稱言我若無大過失天必不令我夭折以死若因有罪而受夭折之罰又安得而移易其罰夭於表反焉於䖍反遂弗禜初昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望諸侯望祀竟内山川星辰祟息遂反竟音境江漢睢漳楚之望也杜四水在楚界睢七餘反禍福之至不是過也林所以能降禍福於楚國者不過竟内之山川星辰而已不穀雖不德河非所獲罪也杜無由得罪於河而受其禍罰遂弗祭孔子曰楚昭王知大道矣其不失國也宜哉夏書曰惟彼陶唐帥彼天常杜逸書言堯循天之常道有此冀方林堯都平陽舜都蒲坂禹都安邑皆在冀州有此冀方實自堯始今失其行亂其紀綱乃滅而亡杜滅亡謂夏桀也唐虞及夏同都冀州不易地而亡出於不知大道故行如字又下孟反又曰允出兹在兹杜又逸書言信出己則福亦在己林允信也由已率常可矣林此二句乃孔子合論楚昭王以合書文言人能信由己出以帥天常可以不亡矣八月齊邴意兹來奔杜高國黨陳僖子使召公子陽生林陳僖子即齊陳乞杜召在七月今在八月下記事之次陽生駕而見南郭且于林且于即齊公子鉏前年與陽生同奔居魯南郭謂之南郭且于且子餘反曰嘗獻馬於季孫不入於上乗林馬不良不得入於上乗乗繩證反故又獻此請與子乗之畏在家入聞其言故欲二人共載以試馬為辭出萊門而告之故杜魯郭門也闞止知之先待諸外杜闞止陽生家臣子我也待外欲俱去闞苦暫反公子曰事未可知反與壬也處杜壬陽生子簡公戒之遂行杜戒使無洩言逮夜至於齊國人知之杜故以昏至不欲令人知也國人知而不言言陳氏得衆僖子使子士之母養之杜隱於僖子家内子士母僖子妾與饋者皆入陳僖子又令陽生隨饋食之人入處公宫冬十月丁夘立之將盟盟諸大夫鮑子醉而往其臣差車鮑㸃㸃鮑牧臣也差車主車之官差所宜反曰此誰之命也杜言立陽生出於誰之命令陳子曰受命于鮑子遂誣鮑子曰子之命也杜見其醉故誣之鮑子曰女忘君之為孺子牛而折其齒乎而背之也杜孺子荼也景公嘗銜繩為牛使荼牽之荼頓地故折其齒女音汝背音佩悼公稽首杜悼公陽生曰吾子奉義而行者也若我可不必亡一大夫杜言己可為君必不怨鮑子若我不可不必亡一公子杜公子自謂也恐鮑子殺己故要之義則進否則退敢不惟子是從廢興無以亂林或廢或立勿以其亂則所願也鮑子曰誰非君之子乃受盟杜言陽生亦君之子固可立使胡姬以安孺子如頼杜胡姬景公妾也頼齊邑安號也去鬻姒荼之母殺王甲拘江説囚王豹于句竇之丘杜三子景公嬖臣荼之黨也林或拘或囚文之變也説音悦句音鈎公使朱毛告於陳子杜朱毛齊大夫曰微子則不及此然君異於器不可以二器二不匱君二多難林人之置君與置器不同國但一君不可以兩器有副二更迭為用不至匱乏國有兩君彼此嫌疑多至禍難匱其位反難乃旦反敢布諸大夫僖子不對而泣曰君舉不信羣臣乎舉皆也以齊國之困困又有憂杜内有饑荒之困又有兵革之憂少君不可以訪是以求長君庶亦能容羣臣乎林庶幾長君閲厯多而識見明亦能與羣臣相容少詩照反長丁丈反不然夫孺子何罪毛復命公悔之杜悔失言夫音扶毛曰君大訪於陳子而圖其小可也杜大謂國政小謂殺荼使毛遷孺子於駘不至殺諸野幕之下葬諸殳冒淳杜恐駘人不從故毛駐於野張帳而殺之駘齊邑殳冒淳地名實以冬殺經書秋者史書秋記始事遂連其死通以冬告魯駘他才反又徒來反殳音殊左傳杜林合注卷四十七
