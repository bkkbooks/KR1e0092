body:
  text: 左傳杜林合注卷四明王道焜趙如源同編桓公二經丙子七年春二月己亥焚咸丘杜無傳焚大田也咸丘魯地高平巨野縣南有咸亭譏盡物故書焚扶云反夏榖伯綏來朝綏須唯反鄧侯吾離來朝杜不總稱朝者各自行朝禮也榖國在南鄉筑陽縣北林榖鄧書名貶也魯在泰山之下榖鄧在方城之外兩君之好不相及也有朝桓公者必若榖鄧而後貶傳七年春榖伯鄧侯來朝名賤之也杜辟陋小國賤之禮不足故書名以春來夏乃行朝禮故經書夏夏盟向求成于鄭既而背之盟向三邑名隱十一年王以與鄭故求與鄭成盟音孟向傷亮反背音佩秋鄭人齊人衛人伐盟向王遷盟向之民于郟林郟王城盟向之民不欲從鄭故王遷盟向之民于郟郟古洽反冬曲沃伯誘晉小子侯殺之杜曲沃伯武公也小子侯哀侯子林以計誘而殺之非用兵也經丁丑八年春正月己卯蒸無傳此夏之仲月非為過而書者為下五月復蒸見瀆也例在五年蒸之承反天主使家父來聘杜無傳家父天子大夫家氏父字林家父凡伯皆大雅之舊人也夏五月丁丑蒸無傳秋伐邾無傳冬十月雨雪無傳今八月也書時失雨于付反祭公來遂逆王后于紀杜祭公諸侯為天子三公者王使魯主昏故祭公來受命而迎也天子無外故因稱王后卿不書舉重略輕林祭公來不稱王使王未有成命也遂專也是故書遂始於此祭側界反傳八年春滅翼曲沃滅之隨少師有寵楚鬭伯比曰可矣讎有釁不可失也林言前年張隨之計可行矣讐者指隨而言謂少師無德而有寵此隨之釁隙可乘不可失此機會杜釁瑕隙也無德者寵國之釁也釁許覲反夏楚子合諸侯于沈鹿林沈鹿楚地欲以求隙討隨也黃隨不㑹杜黃國今弋陽縣使薳章讓黃責其不㑹楚子伐隨軍於漢淮之間季梁請下之弗許而後戰杜下之請服也林待楚弗許而後交戰下遐嫁反所以怒我而怠冦也林所以怒我而欲怠冦志也欲使隨人怒楚之不恕而楚人不直其君亦有怠心也少師謂隨侯曰必速戰不然將失楚師林此蓋以六年嬴師之事入隨侯之左腹故謂今若不速戰當又如前年失楚師也將失楚師一本無師字隨侯禦之望楚師杜遙見楚師季梁曰楚人上左君必左君楚君也無與王遇且攻其右右無良焉必敗偏敗衆乃攜矣林蓋見當時楚之精兵皆在左故言楚以左為上楚君必在左無與楚王之精兵合戰且先攻其右師右無精兵在焉必先敗偏師敗楚師之衆乃有攜二之心矣少師曰不當王非敵也弗從戰于速杞隨師敗績隨侯逸林不當楚王之左師不足以言對敵也不從季梁之謀杜速杞隨地逸逃也鬭丹獲其戎車與其戎右少師杜鬭丹楚大夫戎車君所乘兵車也戎右車右也寵之故以為右秋隨及楚平楚子將不許鬭伯比曰天去其疾矣杜去疾謂少師見獲而死林蓋以少師為隨之疾今少師見獲是天去其疾矣言隨國未可克去起呂反隨未可克也乃盟而還冬王命虢仲立晉哀侯之弟緡于晉杜虢仲王卿士虢公林父緡亡巾反祭仲來遂逆王后于紀禮也天子娶于諸侯使同姓諸侯為之主祭公來受命於魯故曰禮經戊寅九年春紀季姜歸于京師杜季姜桓王后也季字姜紀姓也書字者伸父母之尊夏四月秋七月冬曹伯使其世子射姑來朝曹伯有疾故使其子來朝射音亦又音夜傳九年春紀季姜歸于京師凡諸侯之女行唯王后書杜為書婦人行例也適諸侯雖告魯猶不書林女子謂嫁曰有行此言凡諸侯之女嫁也蓋以王后母儀天下為天地宗廟社稷之主不可不書巴子使韓服告于楚請與鄧為好杜韓服巴行人巴國在巴郡江州縣好呼報反楚子使道朔將巴客以聘於鄧道朔楚大夫巴客韓服鄧南鄙鄾人攻而奪之幣杜鄾在今鄧縣南沔水之北林要巴客于道攻而奪其往聘之幣帛鄾音憂殺道朔及巴行人林行人即韓服楚子使薳章讓於鄧鄧人弗受杜言非鄾人所攻夏楚使鬭廉帥師及巴師圍鄾杜鬭廉楚大夫林圍鄾討其殺使奪幣也鄧養甥聃甥帥師救鄾三逐巴師不克二甥皆鄧大夫聃乃甘反鬭廉衡陳其師於巴師之中以戰而北杜衡橫也分巴師為二部鬭廉橫陳於其間以與鄧師戰而僞北北走也衡如字一音橫陳直覲反又如字北如字一音佩稽康音胸背鄧人逐之背巴師而夾攻之杜楚師僞走鄧師逐之背巴師巴師攻之楚師自前還與戰背音佩夾古洽反又皆協反鄧師大敗鄾人宵潰林陷於兩師之中前後受敵故民逃其上曰潰鄾人見鄧敗故懼而夜潰杜宵夜也潰戶對反秋虢仲芮伯梁伯荀侯賈伯伐曲沃杜梁國在馬翊夏陽縣荀賈皆國名林虢仲八年立晉侯于晉故以四國伐曲沃武公冬曹大子來朝賔之以上卿禮也諸侯之適子未誓於天子而攝其君則以皮帛繼子男故賔之以上卿各當其國之上卿享曹大子初獻樂奏而歎杜酒始獻享許兩反施父曰曹大子其有憂乎非歎所也杜施父魯大夫林言曹大子其有憂患之事乎朝享所以觀威儀省禍福故曰非歎所也施色豉反人名字父音甫經己卯十年春王正月庚申曹伯終生卒杜未同盟而赴以名林桓公卒子莊公姑射立夏五月葬曹桓公無傳秋公㑹衛侯于桃丘弗遇杜無傳衛侯與公為㑹期中背公更與齊鄭故公獨往而不相遇也桃丘衛地濟北東阿縣東南有桃城冬十有二月丙午齊侯衛侯鄭伯來戰于郎改侵伐而書來戰善魯之用周班惡三國封有辭傳十年春曹桓公卒終施父之言虢仲譖其大夫詹父於王杜虢仲王卿士詹父屬大夫譖側鴆反詹章亷反詹父有辭以王師伐虢夏虢公出奔虞林詹父有自直之辭訴于王王右詹父故以師伐虢杜虞國在河東大陽縣秋秦人納芮伯萬于芮林三年芮伯奔魏芮人更立君秦以四年為芮所敗故圍魏執芮伯以歸至是而納之以困芮也初虞叔有玉杜虞叔虞公之弟虞公求旃杜旃之也林虞公從虞叔求之虞姬姓國公爵周太王之于仲雍之後周武王封之于虞旃之然反弗獻既而悔之曰周諺有之匹夫無罪懷璧其罪林言匹夫本無罪蓋由其懷璧則人利其璧以害其身此其所以為罪璧美玉也諺音彥吾焉用此其以賈害也林行商曰商坐肆曰賈賈者坐而待價者也此言賈禍蓋謂懷玉坐而待禍害之至如賈之坐而待價賈買也焉於䖍反賈音古乃獻之又求其寶劍叔曰是無厭也無厭將及我杜將殺我厭於鹽反下同遂伐虞公故虞公出奔共池杜共池地名闕共音洪一音恭冬齊衛鄭來戰于郎我有辭也初北戎病齊在六年諸侯救之鄭公子忽有功焉齊人餼諸侯使魯次之林使魯為之班次魯以周班後鄭鄭人怒請師於齊齊人以衛師助之故不稱侵伐不稱侵伐而以戰為文明魯直諸侯曲故言我有辭以禮自釋交綏而退無敗績先書齊衛王爵也鄭主兵而序齊衛下者以王爵次之也春秋所以見魯猶秉周禮經庚辰十有一年春正月齊人衛人鄭人盟于惡曹林戰郎之諸侯也戰稱君盟稱人略之也鄭敗王師齊滅后之母家衛亦抗子突而自立自有參盟莫甚於惡曹故略之也杜惡曹地闕夏五月癸未鄭伯寤生卒杜同盟於元年赴以名林世子忽立是為昭公秋七月葬鄭莊公杜無傳三月而葬速九月宋人執鄭祭仲杜祭氏仲名不稱行人聽迫脅以逐君罪之也行人例在襄十一年釋例詳之林此書執之始突歸于鄭杜突厲公也為宋所納故曰歸例在成十八年不稱公子從告也文連祭仲故不言鄭鄭忽出奔衛杜忽昭公也莊公既葬不稱爵者鄭人賤之以名赴林此書奔衛始忽繫鄭而突不繫鄭以突為篡也柔㑹宋公陳侯蔡叔盟于折杜無傳柔魯大夫未賜族者蔡叔蔡大夫叔名也折地闕林此大夫㑹盟諸侯之始故貶之至公子結不貶矣折之設反又市列反公㑹宋公于夫鍾杜無傳夫鍾郕地夫音扶冬十有二月公㑹宋公于闞杜無傳闞魯地在東平須昌縣東南闞口暫反傳十一年春齊衛鄭宋盟于惡曹宋不書經闕楚屈瑕將盟二軫林二軫二國名將以師盟之屈居忽反楚大夫氏二音二軫之忍反皆國名鄖人軍於蒲騷將與隨絞州蓼伐楚師杜鄖國在江夏雲杜縣東南有鄖城蒲騷鄖邑絞國名州國在南郡華容縣東南蓼國今義陽棘陽縣東南胡陽城鄖音云國名騷音蕭又音縿絞古卯反蓼音了本或作鄝同隨絞州蓼四國名莫敖患之莫敖楚官名即屈瑕敖五刀反鬭亷曰鄖人軍其郊必不誡林言鄖人軍於蒲騷未出其國之郊邑恃其近郊必不戒謹設備且日虞四邑之至也杜虞度也四邑隨絞州蓼也邑亦國也且人逸反君次於郊郢以禦四邑杜君謂屈瑕也郊郢楚地林謂屈瑕次師於楚地之郊郢以禦四國之兵使不得來郢以井反又以政反我以鋭師宵加於鄖鄖有虞心而恃其城莫有鬭志若敗鄖師四邑必離林我鬬亷自稱統精鋭之兵以夜而加伐於鄖師鄖有虞度四國之心必不虞楚師之來恃其城近則小小失利必走保其城必無致死戰鬬之志若我既敗鄖師四國聞鄖之敗必驚而離散不復來至莫敖曰盍請濟師於王杜盍何不也濟益也盍戶各反濟箋計反對曰師克在和不在衆商周之不敵君之所聞也林言用兵克敵在師衆和同一心不在師徒之衆多杜商紂也周武王也傳曰武王有亂臣十人紂有億兆夷人成軍以出又何濟焉莫敖曰卜之對曰卜以决疑不疑何卜遂敗鄖師於蒲騷卒盟而還林鄖既敗四國不至故屈瑕終與二軫為盟而還鄭昭公之敗北戎也在六年齊人將妻之昭公辭祭仲曰必取之君多內寵子無大援將不立林言鄭莊公內多寵妾子謂昭公若無大國之援將不得立為君妻七計反下同援於眷反三公子皆君也杜子突子亹子儀之母皆有寵林皆將抗寵以為君也弗從夏鄭莊公卒初祭封人仲足有寵於莊公杜祭鄭地陳留長垣縣東北有祭城封人守封疆者因以所守為氏莊公使為卿為公娶鄧曼生昭公故祭仲立之林自祭封人升為鄭卿為鄭莊娶鄧女曰鄧曼曼鄧姓為于僞反曼音萬宋雍氏女於鄭莊公曰雍姞生厲公雍氏姞姓宋大夫也以女妻人曰女雍於恭反女尼據反姞其吉反又其秩反雍氏宗有寵於宋莊公故誘祭仲而執之杜祭仲之如宋非會非聘見誘而以行人應命林宋為雍氏欲立其所出故誘祭仲至宋而執之曰不立突將死亦執厲公而求賂焉林宋亦執突而求報謝之賂祭仲與宋人盟以厲公歸而立之秋九月丁亥昭公奔衛己亥厲公立經辛巳十有二年春正月夏六月壬寅公會杞侯莒子盟于曲池杜曲池魯地魯國汶陽縣北有曲水亭秋七月丁亥公會宋公燕人盟于穀丘杜榖丘宋地燕人南燕大夫八月壬辰陳侯躍卒杜無傳厲公也十一年與魯大夫盟於折不書葬魯不會也壬辰七月二十三日書於八月從赴林厲公卒莊公林立躍羊略反公會宋公于虛虛宋地虛去魚反冬十有一月公會宋公于龜龜宋地丙戌公會鄭伯盟于武父杜武父鄭地陳留濟陽縣東北有武父城武父地名音甫有父字者皆同甫音丙戌衛侯晉卒杜無傳重書丙戌非義例因史成文也未同盟而赴以名林宣公卒惠公朔立十有二月及鄭師伐宋丁未戰于宋林既書伐宋又重書戰者以見宋之無信也莊十一年傳例曰皆陳曰戰尤其無信故以獨戰為文傳十二年夏盟于曲池平杞莒也杜隱四年莒人伐杞自是遂不平林於是魯為盟以平之公欲平宋鄭秋公及宋公盟于句瀆之丘杜句瀆之丘即榖丘也宋以立厲公故多責賂於鄭鄭人不堪故不平林時責賂在宋故欲平宋鄭而獨先盟宋句古侯反瀆音豆宋成未可知也故又會于虛冬又會于龜林宋未肯許平魯又會宋以速其成宋公辭平故與鄭伯盟于武父杜宋公貪鄭賂故與公三會而卒辭不與鄭平林公以三會宋公卒不得宋成故怒而與鄭盟遂帥師而伐宋戰焉宋無信也君子曰茍信不繼盟無益也詩云君子屢盟亂是用長無信也杜詩小雅言無信故數盟數盟則情疏情疏而憾結故云長亂林舉詩以深責宋盟之無信也屢力具反本又作婁音同長丁丈反楚伐絞軍其南門莫敖屈瑕林即十一年敗鄖蒲騷者曰絞小而輕輕則寡謀請無扞采樵者以誘之林絞小國而輕狂輕狂則寡於謀畫請無以師衛采樵以誘絞之出杜扞衛也樵薪也輕遣政反扞戶旦反樵在遙反從之絞人獲三十人林獲楚采樵者三十人明日絞人爭出驅楚役徒於山中林絞人不知其計明日爭出驅楚執役采樵之徒於山中楚人坐其北門而覆諸山下杜坐猶守也覆設伏兵而待之覆扶又反大敗之為城下之盟而還城下盟諸侯所深恥伐絞之役楚師分涉於彭杜彭水在新城昌魏縣林楚人分其師以涉於彭水言涉者深厲淺揭非以舟濟也羅人欲伐之使伯嘉諜之三巡數之林欲伐涉彭之師使羅大夫伯嘉諜伺楚師三偏數其師之多少杜羅熊姓國在宜城縣西山中後徙南郡枝江縣諜伺也巡偏也諜徒協反數色阻反經壬午十有三年春二月公會紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績杜大崩曰敗績例在莊十一年或稱人或稱師史異辭也衛宣公未葬惠公稱侯以接鄰國非禮也三月葬衛宣公無傳夏大水無傳秋七月冬十月傳十三年春楚屈瑕伐羅鬭伯比送之還謂其御曰莫敖必敗舉趾高心不固矣林討其去年欲伐楚師莫敖即屈瑕也言屈瑕必為羅所敗凡人志氣揚揚則舉足髙蹈謂人莫已若也今莫敖舉趾髙蓋驕甚備敵之心已不固矣杜趾足也遂見楚子曰必濟師難言屈瑕將敗故以益師諷諫見賢遍反濟箋計反楚子辭焉不解其㫖故拒之入告夫人鄧曼鄧曼曰大夫其非衆之謂杜鄧曼楚武王夫人言伯比意不在於益衆也其謂君撫小民以信訓諸司以德而威莫敖以刑也莫敖狃於蒲騷之役將自用也林撫慰士卒小民以恩信教訓諸司將佐以文武之令德刑非獨刑罰也傳曰一人刑善百姓昭明凡國之政事皆刑也以下文見莫敖而告諸天之不䬦易知此是欲以嚴明之政成莫敖使之恐懼修省莫敖以十一年敗鄖于蒲騷十二年敗絞將狃而恃之以勝為可常故曰狃於蒲騷之役將自用而不信人言杜狃快也狃女久反必小羅君若不鎮撫其不設備乎林必以羅國為小而忽之君若不鎮壓而撫綏之必以不設備取敗也夫固謂君訓衆而好鎮撫之杜撫小民以信也好呼報反又如字召諸司而勸之以令德杜訓諸司以德也見莫敖而告諸天之不假易也杜諸之也言天不借貸慢易之人威莫敖以刑也易以豉反不然夫豈不知楚師之盡行也楚子使賴人追之不及林若曰不然彼伯比豈不知楚師之盡行而有濟師之請也楚子因鄧曼之言悟伯比之㫖乃使賴國之人仕於楚者往追屈瑕杜賴國在義陽隨縣盡津忍反此類可以意求莫敖使徇于師曰諫者有刑杜徇宣令也林言敢以伐羅事諫者有刑罰徇似俊反及鄢亂次以濟杜鄢水在襄陽宜城縣入漢林亂其前後行伍之次序以濟鄢水鄢於晚反又於萬反亂次以濟本或作亂次以濟其水遂無次且不設備及羅羅與盧戎兩軍之杜盧戎南蠻盧如字本或作廬音同大敗之莫敖縊于荒谷羣師囚于冶父杜縊自經也荒谷冶父皆楚地縊一豉反荒如字本或作巟音同冶音也以聽刑林以聽楚之典刑楚子曰孤之罪也林楚子引咎自責曰是孤不能從諫之罪非羣師之過諸侯自稱曰孤皆免之宋多責賂於鄭杜立突賂鄭不堪命故以紀魯及齊與宋衛燕戰不書所戰後也公後地期不及其戰故不書所戰之地鄭人來請修好林鄭厲公使人來請修盟于武父之好好呼報反經癸未十有四年春正月公會鄭伯于曹杜修十二年武父之好于曹地會與會無冰無傳書時失夏五不書月闕文鄭伯使其弟語來盟秋八月壬申御廩災杜御廩公所親耕以奉粢盛之倉也天火曰災例在宣十六年廩力錦反乙亥嘗杜先其時亦過也既戒日致齊廩雖災茍不害嘉榖則祭不應廢故書以示法冬十有二月丁巳齊侯祿父卒杜無傳隱六年盟于艾僖公卒襄公立宋人以齊人蔡人衛人陳人伐鄭杜凡師能左右之曰以例在僖二十六年林以一國而用諸侯之師於是始此伯者之所由興也傳十四年春會于曹曹人致餼禮也杜熟曰饔生曰餼林會于曹故曹人致生餼之餽得地主之禮也夏鄭子人來尋盟且修曹之會杜子人即弟語也其後為子人氏林來尋武父盟且修曹會之好秋八月壬申御廩災乙亥嘗書不害也林災其屋救之則息不及榖不妨祭祀故春秋先書廩災後書嘗以見不害冬宋人以諸侯伐鄭報宋之戰也林報十二年戰于宋之役焚渠門入及大逵杜渠門鄭城門逵道方九軌逵求龜反伐東郊取牛首杜東郊鄭郊牛首鄭邑以大宫之椽歸為盧門之椽杜大宫鄭祖廟盧門宋城門告伐而不告入取故不書林以鄭祖廟之椽為宋城門之椽辱之也大音泰椽直專反榱也圖曰椽方曰桷說文云周謂之椽齊魯謂之桷經甲申十有五年春二月天王使家父來求車三月乙未天王崩杜無傳桓王也林桓王崩莊王立桓王至莊三年葬夏四月己巳葬齊僖公無傳五月鄭伯突出奔蔡杜突既篡立權不足以自固又不能倚任祭仲反與小臣造賊盜之計故以自奔為文罪之也例在昭三年鄭世子忽復歸于鄭杜忽實居君位故今還以復其位之例為文也稱世子者忽為大子有母氏之寵宗卿之援有功於諸侯此太子之盛者也而守介節以失大國之助知三公子之彊不從祭仲之言修小善潔小行從匹夫之仁忘社稷之大計故君子謂之善自為謀言不能謀國也父卒而不能自君鄭人亦不君之出則降名以赴入則逆以大子之禮始於見逐終於見殺三公子更立亂鄭國者實忽之由復歸例在成十八年林世子忽即昭公也已居君位而復稱世子者明突之篡也許叔入于許杜許叔莊公弟也隱十一年鄭使許大夫奉許叔居許東偏鄭莊公既卒乃入居位許人嘉之以字告也叔本不去國雖稱入非國逆例公會齊侯于艾林齊地邾人牟人葛人來朝杜無傳三人皆附庸之世子也其君應稱名故其子降稱人牟國今泰山牟縣葛國在梁國寧陵縣東北牟亡侯反秋九月鄭伯突入于櫟杜櫟鄭别都也今河南陽翟縣未得國直書入無義例也櫟音厯冬十有一月公㑹宋公衛侯陳侯于袲伐鄭杜袲宋地在沛國相縣西南先行會禮而後伐也袲昌氏反傳十五年春天王使家父來求車非禮也諸侯不貢車服杜車服上之所以賜下天子不私求財杜諸侯有常職貢祭仲專鄭伯患之使其壻雍糾殺之將享諸郊雍姬知之林將為祭仲設享於鄭郊而殺之雍姬雍糾之妻祭仲之女知其將殺祭仲之謀謂其母曰父與夫孰親其母曰人盡夫也父一而已胡可比也杜婦人在室則天父出則天夫女以為疑故母以所生為本解之林言凡人皆可嫁以為夫生我者一父而已夫之親安可以父為比遂告祭仲曰雍氏舍其室而將享子于郊林子謂其父子者男子之通稱也舍音捨吾惑之以告祭仲殺雍糾尸諸周氏之汪杜汪池也周氏鄭大夫殺而暴其尸以示戮也汪烏黃反公載以出杜愍其見殺故載其尸共出國曰謀及婦人宜其死也林言雍糾機事不密而與其妻共謀宜其為祭仲所殺而死也夏厲公出奔蔡林厲公畏祭仲害已故出奔蔡六月乙亥昭公入林即經書世子忽厲公既出奔故昭公得入國許叔入于許公會齊侯于艾謀定許也秋鄭伯因櫟人殺檀伯而遂居櫟杜檀伯鄭守櫟大夫檀徒干反冬會于袲謀伐鄭將納厲公也弗克而還林先會而後謀伐鄭故經書會袲伐鄭厲公居鄭别都之櫟故諸侯伐鄭將納之經乙酉十有六年春正月公會宋公蔡侯衛侯于曹夏四月公會宋公衛侯陳侯蔡侯伐鄭春既謀之今書會者魯諱議納不正蔡常在衛上今序陳下蓋後至秋七月公至自伐鄭杜用飲至之禮故書林此書至伐之始冬城向杜傳曰書時也而下有十一月舊說因謂傳誤此城向亦俱是十一月但本事異各隨本而書之耳經書夏叔弓如滕五月葬滕成公傳云五月叔弓如滕即知但稱時者未必與下月異也又推校此年閏在六月則月却而節前水星可在十一月而正也詩云定之方中作于楚官此未正中也功役之事皆總指天象不與言厯數同也故傳之釋經皆通言一時不月别向失亮及十有一月衛侯朔出奔齊杜惠公也朔讒構取國故不言二公子逐罪之也傳十六年春正月㑹于曹謀伐鄭也杜前年冬謀納厲公不克故復更謀夏伐鄭秋七月公至自伐鄭以飲至之禮也林以行飲至舍爵䇿勳故曰用飲至之禮詳見桓二年冬城向書時也林凡土功水昏正而栽今已冬水星將正故曰書時初衛宣公蒸於夷姜生急子夷姜宣公之庶毋也上淫曰蒸蒸之承反急如字詩作伋屬諸右公子為之娶於齊而美公取之林即下文右公子職蓋以急子託公子職宣公為急子娶妻於齊公知其其遂自取之即新臺之詩所謂納伋之妻作新臺于河上以要之是也屬音燭下同為于僞反生壽及朔屬壽於左公子林即下文左公子泄蓋以壽託左公子泄杜左右媵之子因以為號夷姜縊杜失寵而自經死宣姜與公子朔構急子杜宣姜宣公所取急子之妻構會其過惡構古豆反公使諸齊使盜待諸莘將殺之杜莘衛地陽平縣西北有莘亭使所吏反莘所中反壽子告之使行行去也不可曰弃父之命惡用子矣有無父之國則可也及行飲以酒壽子載其旌以先盜殺之急子至曰我之求也此何罪請殺我乎又殺之二公子故怨惠公十一月左公子泄右公子職立公子黔牟林壽子宣姜所生故知其謀以告急子使急子出奔他國急子不肯曰父命使齊若出奔是弃其父之命也安用此子為若奔他國必不為人所容若有無父之國則可往奔也及急子將出行夀子欲代急子之死故假設祖道而醉急子以酒旌使者之旗壽子乘急子之醉而竊其使旌以先行盜見壽子載旌以為急子故誤殺之急子後至盜所語盜曰君將使汝求殺我也此夀子何罪而枉被殺請殺我以成汝事盜又殺急子即二子乘舟之詩所謂宣公二子爭相為死是也二公子左公子泄右公子職也以殺其所託公子之故怨惠公黔牟衛之羣公子惡音烏飲於鳩反一本以作之泄息列反黔其亷反又音琴惠公奔齊經丙戌十有七年春正月丙辰公會齊侯紀侯盟于黃黃齊地二月丙午公會邾儀父盟于趡杜趡魯地稱字義與蔑盟同二月無丙午丙午三月四日也日月必有誤趡翠軌反夏五月丙午及齊師戰于奚杜奚魯地皆陳曰戰林此齊魯交兵之始齊魯之兵始於奚而終於艾陵六月丁丑蔡侯封人卒杜十一年大夫盟于折林桓侯卒哀侯立秋八月蔡季自陳歸于蔡季蔡侯弟也言歸為陳所納癸巳葬蔡桓侯杜無傳稱侯蓋謬誤三月而葬速及宋人衛人伐邾冬十月朔日有食之杜甲乙者厯之紀也晦朔者日月之㑹日食不可以不存晦朔晦朔須甲乙而可推故日食必以書朔日為例林是年冬鄭之高渠彌弒昭公忽而立子亹十八年齊殺子亹鄭祭仲立昭公弟子儀傳十七年春盟于黃平齊紀且謀衛故也林紀為魯親齊襄欲滅紀故魯為盟以平齊紀衛逐其君故為盟而併謀衛故及邾儀父盟于趡尋蔑之盟也林蔑盟在隱元年尋盟修好也夏及齊師戰于奚疆事也杜爭疆界也疆居良反下同於是齊人侵魯疆疆吏來告公曰疆埸之事愼守其一而備其不虞杜虞度也不度猶不意也埸音亦姑盡所備焉事至而戰又何謁焉杜齊背盟而來公以信待故不書侵伐林言汝司疆場之事謹守其一定之疆界而防備其不虞度不意之事且盡汝所備禦之道若有兵事至則與之接戰又何必先來告謁蔡桓侯卒蔡人召蔡季于陳杜桓侯無子故召季而立之季內得國人之望外有諸侯之助故書字以善得衆稱歸以明外納秋蔡季自陳歸于蔡蔡人嘉之也杜嘉之故以字告伐邾宋志也邾宋爭彊魯從宋志背趡之盟冬十月朔日有食之不書日官失之也林日官失其甲乙之日天子有日官諸侯有日御杜日官日御典厯數者日官居卿以底日禮也杜日官天子掌厯者不在六卿之數而位從卿故言居卿也底平也謂平厯數林重敬授人時之禮也底音㫖下同日御不失日以授百官于朝杜日官平厯以班諸侯諸侯奉之不失天時以授百官初鄭伯將以高渠彌為卿昭公惡之固諫不聽昭公立懼其殺已也林言初時鄭莊公將以高渠彌為鄭國之卿昭公時為世子惡高渠彌之為人及昭公立為君高渠彌懼昭公惡而殺之惡烏路反下同辛卯弒昭公而立公子亹杜公子亹昭公弟亹音尾君子謂昭公知所惡矣公子達曰公子達魯大夫高伯其為戮乎復惡已甚矣林髙伯即高渠彌其為戮乎者將必有人禍天刑之誅戮杜復重也本為昭公所惡而復弒君重為惡也復扶又反一音服則乖注意經丁亥十有八年春王正月公㑹齊侯于濼杜濼水在濟南厯城縣西北入濟濼盧篤反又力角反一音洛說文匹沃反公與夫人姜氏遂如齊公本與夫人俱行至濼公與齊侯行㑹禮故先書㑹濼既㑹而相隨至齊故曰遂夏四月丙子公薨于齊杜不言戕諱之也戕例在宣十八年丁酉公之喪至自齊杜無傳告廟也丁酉五月一日有日而無月秋七月冬十有二月己丑葬我君桓公無傳九月乃葬緩慢也傳十八年春公將有行遂與姜氏如齊杜始議行事申繻曰女有家男有室無相瀆也謂之有禮易此必敗杜女安夫之家夫安妻之室違此則為瀆今公將姜氏如齊故知其當致禍亂瀆徒木反公會齊侯于濼遂及文姜如齊齊侯通焉公謫之林齊襄公與文姜私通此詩人所為賦南山之詩鳥獸之行淫乎其妹者也杜謫譴也謫直革反責也又丁革反以告杜夫人告齊侯夏四月丙子享公齊侯為公設享燕之禮使公子彭生乘公公薨于車杜上車曰乘彭生多力拉公幹而殺之乘如字又繩證反魯人告于齊曰寡君畏君之威不敢寧居來修舊好禮成而不反無所歸咎惡於諸侯請以彭生除之林言桓公畏齊君之威靈不敢安居於國來齊修舊日之盟好朝享禮畢而不反其國不知君死之由故咎無所歸恥辱之惡聞於諸侯因彭生與公同車而薨請殺彭生而除君之恥辱好呼報反咎其九反齊人殺彭生杜不書非卿秋齊侯師于首止杜陳師首止討鄭弒君也首止衛地陳留襄邑縣東南有首鄉子亹會之高渠彌相林子亹鄭所立以為君者不知齊將討已故會之相息亮反七月戊戌齊人殺子亹而轘高渠彌杜車裂曰轘討其弒昭公也轘音患祭仲逆鄭子于陳而立之杜鄭子昭公弟子儀也林先出在陳故祭仲逆于陳而立之是行也祭仲知之故稱疾不往曰祭仲以知免仲曰信也杜時人譏祭仲失忠臣之節仲以子亹為渠彌所立本既不正又不能固位安民宜其見除故即而然譏者之言以明本意知音智又如字周公欲弒莊王而立王子克杜莊王桓王大子王子克莊王弟子儀弒申志反辛伯告王遂與王殺周公黑肩王子克奔燕杜辛伯周大夫林以周公之謀告莊王先其事而殺之克恐王殺已故出奔燕初子儀有寵於桓王桓王屬諸周公辛伯諫曰並后杜妾如后屬音燭匹嫡杜庶如嫡嫡丁厯反兩政杜臣擅命耦國杜都如國亂之本也周公弗從故及林辛伯以子儀庶子以寵秩如適欲使周公稍減抑之以消禍難周公弗從其言故及於難左傳杜林合注卷四
