body:
  text: 左傳杜林合注卷三十三明王道焜趙如源同編襄公九經戊午三十年春王正月楚子使薳罷來聘林郟敖書楚子薳罷書名氏儼然無異於中國矣罷音皮夏四月蔡世子般弑其君固按景公弑靈公般立般音班五月甲午宋災天火曰災宋伯姫卒天王殺其弟佞夫稱弟以惡王殘骨肉王子瑕奔晉不言出奔周無外秋七月叔弓如宋葬宋共姫共姫從夫諡也叔弓叔老之子卿共葬事禮過厚三月而葬速共音恭鄭良霄出奔許耆酒荒淫書名罪之自許入于鄭不言復入獨還無兵鄭人殺良霄冬十月葬蔡景公無傳晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人㑹于澶淵宋災故杜㑹未有言其事者此言宋災故以惡宋人不克己自責而出㑹求財諸候之大夫不序晉不足以為盟主也晉之不足以主盟自宋始傳言不書魯大夫諱之也澶古然反傳三十年春王正月楚子使薳罷來聘通嗣君也郟敖即位穆叔問王子之為政何如杜王子圉為令尹對曰吾儕小人食而聽事猶懼不給命而不免於戾焉與知政林言我軰小人食其禄而聽其政事猶恐不給於君之命令而不能免於罪戾安能與知楚國之政事儕土皆反焉於䖍反與音預下同固問焉不告穆叔告大夫曰楚令尹將有大事子蕩將與焉林言王子圉將有弑君之大事子蕩即薳罷將與其事助之匿其情矣林薳罷不言其為政是助子圍藏匿其邪慝之情矣葢子圉素責郟敖微弱諸候皆知其將為亂故穆叔問之慝其乙反子産相鄭伯以如晉叔向問鄭國之政焉對曰吾得見與否在此歳也林言禍亂方興死生未可必得見不得見未可知決在今年相息亮反駟良方爭未知所成駟氏子晳也良氏伯有也若有所成吾得見乃可知也林若得所平我不死而得見乃可知其政之所歸叔向曰不既和矣乎林前平大夫已與兩家為和盟于伯有氏對曰伯有侈而愎杜愎狠也愎彼力反子晳好在人上莫能相下也雖其和也猶相積惡也惡至無日矣杜為此年秋良霄出奔傳好呼報反下遐稼反二月癸未晉悼夫人食輿人之城杞者杜輿衆也城杞在徃年食音嗣絳縣人或年長矣無子而徃與於食林以無子息故自受役向自受役故今亦自徃受享長下丈反有與疑年使之年林將有所與見其年老疑其年使言其年曰臣小人也不知紀年臣生之歳正月甲子朔四百有四十五甲子矣其季於今三之一也杜所稱正月謂夏正月也林其未至於今自甲子甲戌至癸未凡二十日故為三分六甲之一吏走問諸朝因皆不知故問之師曠曰魯叔仲惠伯㑹郤成子于承匡之歳也杜在文十一年林老人以是嵗生是歳也林兼言此年事狄伐魯叔孫莊叔於是乎敗狄于鹹獲長狄僑如及虺也豹也而皆以名其子七十三年矣杜叔孫僑如叔孫豹皆取長狄名林自乙巳至今年戊午七十四年而言七十三年以甲子計之也鹹音咸僑其驕反虺虚鬼反史趙曰林晉大史名趙亥有二首六身下二如身是其日數也林古亥字二畫在上三人在下故以二為首以二為身下亥字上二畫䜿置身傍始身當為亥字此是老人始生至今之日數也葢以二首為二萬六身為六千六百六十日也士文伯曰然則二萬六千六百有六旬也杜文伯士弱子林此説四百四十五甲子其季於今三之一也之日數四百四十五甲子合得二萬六千七百日以其未三分六甲之一故少四十日實得二萬六千六百六十日也趙孟問其縣大夫則其屬也杜屬趙武召之而謝過焉林趙孟以老人為賢故召而見之且謝已不知人之過曰武不才任君之大事以晉國之多虞不能由吾子由用也使吾子辱在泥塗乆矣武之罪也敢謝不才遂仕之使助為政辭以老與之田使為君復陶杜復陶王衣服之官復音服又音福以為絳縣師杜縣師掌地域辨其夫家人民而廢其輿尉林以絳縣輿尉之官役使孤老而廢其職於是魯使者在晉歸以語諸大夫季武子曰晉未可媮也杜媮薄也使所吏反語魚據反媮他候反有趙孟以為大夫有伯瑕以為佐杜伯瑕士文伯有史趙師曠而咨度焉有叔向女齊以師保其君其朝多君子其庸可媮乎勉事之而後可傳言晉所以強不失諸候且明厯也度待洛反夏四月己亥鄭伯及其大夫盟杜駟良爭故君子是以知鄭難之不已也杜鄭伯微弱不能制其臣下君臣詛盟故曰亂未巳難乃旦反蔡景侯為大子般娶于楚通焉大子弑景侯杜終子産言有子禍也為干偽反初王儋季卒儋季周靈王弟儋丁甘反其子括將見王而歎杜括除服見靈王入朝而歎括古活反見賢遍反單公子愆期為靈王御士林愆期周卿士單公子也單音善愆起䖍反過諸廷愆期行過王廷聞其歎而言曰林此曰字以下述儋括之言烏乎必有此夫欲有此朝廷之權夫音扶入以告王且曰必殺之不慼而願大視躁而足髙心在他矣不殺必害林顔容不慼面志願甚大目視躁疾而舉足其髙儋括之心有他圖矣不殺儋括必為王室之害躁早報反王曰童子何知林童子謂愆期及靈王崩儋括欲立王子佞夫佞夫靈王子景王弟佞夫弗知戊子儋括圍蒍逐成愆林蒍周邑成愆蒍邑大夫蒍干委反成愆奔平畤平畤周邑畤音止又音市五月癸巳尹言多劉毅單蔑甘鞏成殺佞夫五子周大夫過音戈鞏力勇反括瑕廖奔晉杜括廖不書賤也林瑕廖皆儋括之黨廖力彫反又敕留反書曰天王殺其弟佞夫罪在王也杜佞夫不知故經書在宋災下從赴或叫于宋大廟叫呼也叫古弔反大音泰曰譆譆出出譆譆熱也出出戒伯姬譆許其反出如字鳥鳴于亳社杜殷社如曰譆譆皆火妖也甲午宋大災宋伯姫卒待姆也杜姆女師林伯姫待姆而後下堂故為火所焚而死姆音茂字林亡又反一音母君子謂宋共姫女而不婦林言共姫知為女之道而不知為婦之道女待人杜待人而行婦義事也杜義從宜也伯姫時年六十左右六月鄭子産如陳涖盟歸復命告大夫曰陳亡國也不可與也不可與結好聚禾粟繕城郭恃此二者而不撫其民林恃此木粟之多城郭之固二者而不撫恤其民人則城非不髙池非不深禾粟非不多必有委而去之之患矣繕上戰反其君弱植公子侈大子卑大夫敖政多門杜政不由一人植直吏反又時力反敖五報反以介於大國介間也能無亡乎不過十年矣為昭八年楚滅陳傳秋七月叔弓如宋葬共姫也傷伯姫之遇災故使卿共葬共音恭鄭伯有耆酒為窟室杜窟室地室耆市志反窟口忽反而夜飲酒擊鐘焉朝至未己林為長夜之飲奏樂於地室之中至天明伯有之家臣來朝者已至而飲酒猶未巳朝者曰公焉在杜家臣故謂伯有為公焉於䖍反其人曰吾公在壑谷杜壑谷窟室壑呼洛反皆自朝布路而罷杜布路分散罷皮買反徐扶彼反既而朝杜伯有朝鄭君則又將使子晳如楚前年既和今又欲强使子晳奉使于楚歸而飲酒庚子子晳以駟氏之甲伐而焚之伯有奔雍梁雍梁鄭地雍於用反醒而後知之林及伯有酒醒而後知家毁身出醒星頂反遂奔許大夫聚謀林鄭大夫聚謀所以處駟良之道子皮曰仲虺之志仲虺湯左相云亂者取之亡者侮之推亡固存林滅亡者推而蹶之安存者固而重之國之利也罕駟豐同生罕子皮駟子晳豐公孫叚也三家本同母兄弟伯有汰侈故不免杜三家同出而伯有孤特又汰侈所以亡汰音泰人謂子産就直助彊林時人或告子産當就子晳之直助三家之強以共攻伯有子産曰豈為我徒杜徒黨也言不以駟良為黨國之禍難誰知所敝林國家之有禍難誰能預知其所終敝或主彊直難乃不生杜言能強能直則可弭難今三家未能則伯有方爭難乃旦反下同姑存吾所杜欲以無所附著為所辛丑子産歛伯有氏之死者而殯之不及謀而遂行杜不與於國謀斂力豔反下同印叚從之林義子産子皮止之衆曰人不我順何止焉林人謂子産也言其不順駟氏又何必止而留之子皮曰夫子禮於死者况生者乎林夫子謂子産加禮於死者為之殯歛則其加禮於我生者可知遂自止之壬寅子産入癸卯子石入杜子石印叚皆受盟于子晳氏乙巳鄭伯及其大夫盟于大宫杜大宫祖廟盟國人于師之梁之外師之梁鄭城門伯有聞鄭人之盟已也怒聞子皮之甲不與攻已也喜曰子皮與我矣癸丑晨自墓門之瀆入墓門鄭城門瀆音豆因馬師頡介于襄庫以伐舊北門林頡即羽頡子羽孫也為馬師之官介甲也用襄庫之兵甲以伐鄭伯之舊北門頡戸結反駟帶率國人以伐之杜駟帶子西子晳之宗主皆召子産杜駟氏伯有俱召子産曰兄弟而及此吾從天所與林子晳伯有皆子産兄弟兄弟恩等故無所偏助伯有死於羊肆杜羊肆市列子産禭之枕之股而哭之斂而殯諸伯有之臣在市側者既而葬諸斗城杜斗城鄭地名禭音遂枕之鳩反子駟氏欲攻子産子皮怒之曰禮國之幹也殺有禮禍莫大焉乃止杜斂葬伯有為冇禮於是游吉如晉還聞難不入懼禍并及難乃旦反復命於介杜介副使也八月甲子奔晉駟帶追之及酸棗與子上盟用兩珪質于河杜子上駟帶也沈珪於河為信也酸棗陳留縣質如字又音致使公孫肸入盟大夫已已復歸杜游吉歸也肸許乙反書曰鄭人殺良霄不稱大夫言自外入也既出位絶非復鄭大夫於子蟜之卒也杜子蟜公孫蠆卒在十九年蟜居表反將葬公孫揮與禆竈晨㑹事焉杜㑹葬事過伯有氏其門上生莠子羽曰其莠猶在乎杜子羽公孫揮以莠喻伯有伯有侈知其不能乆存莠羊九反草也於是歳在降婁降婁中而旦杜降婁奎婁也周七月今五月降婁中而天明降户江反下同禆竈指之曰猶可以終歳杜指降婁也歳星十二年而一終歳不及此次也已林歳星不再及此降婁之次伯有必先亡也及其亡也歳在娵訾之日林娵訾營室東壁二十八年歳星滛在𤣥枵今三十年在娵訾是歳星停在𤣥枵二年娵子湏反訾子斯反其明年乃及降婁杜果如禆竈歳不及此次之言僕展從伯有與之皆死僕展鄭大夫伯有黨羽頡出奔晉為任大夫杜羽頡馬師頡任晉縣今屬廣平郡任音壬雞澤之㑹在三年鄭樂成奔楚遂適晉羽頡因之與之比而事趙文子言伐鄭之說焉以宋之盟故不可宋盟約弭兵故比毗志反子皮以公孫鉏為馬師杜鉏子罕之子代羽頡楚公子圍殺大司馬蒍掩而取其室蒍掩二十五年為大司馬申無宇曰王子必不免無宇芋尹善人國之主也王子相楚國將善是封殖而虐之是禍國也且司馬令尹之偏偏佐也相息亮反而王之四體也杜俱殷肱也絶民之主去身之偏艾王之體以禍其國無不祥大焉何以得免杜為賂十三年楚弑靈王傳艾魚廢反為宋災故諸候之大夫㑹以謀歸宋財林謀以財歸宋縣其災患為于偽反冬十月叔孫豹㑹晉趙武齊公孫蠆宋向戌衞北宫佗佗北宫括之子佗徒河反鄭罕虎杜虎子皮及小邾之大夫㑹于澶淵既而無歸于宋故不書其人君子曰信其不可不慎乎澶淵之㑹卿不書不信也夫諸侯之上卿㑹而不信寵名皆棄不信之不可也如是林寵謂族也族與名皆棄不書夫音扶詩曰文王陟降在帝左右信之謂也杜詩大雅言文主所以能上接天下接人動順帝者唯以信又曰淑慎爾止無載爾偽杜逸詩也言當善慎舉止無載行詐偽不信之謂也林恐其不信不合於天徳也書曰某人某人㑹于澶淵宋災故尤之也傳云既而無歸所以釋諸候大夫之不書也又云宋災故尤之所以釋向戌之并貶也戍為正卿深致火災燒殺其夫人未聞克已之意而以求財合諸侯故與不歸財者同文不書魯大夫諱之也向戌既以災求財諸大夫許而不歸客主皆貶君子以尊尊之義也君親有隠故畧不書魯大夫以示例鄭子皮授子産政伯有死子皮知政以子産賢故讓之辭曰國小而偪杜偪近大國偪彼力反族大寵多林公族盛大而恃寵者多不可為也為猶治也子皮曰虎帥以聽誰敢犯子林虎子皮名言虎帥公族以聽命誰敢犯子之命令子善相之國無小杜言在治政小能事大國乃寛言為大所恤故也子産為政有事伯石賂與之邑杜伯石公孫叚有事欲使之子大叔曰國皆其國也奚獨賂焉杜言鄭大夫共憂鄭國事何為獨賂之子産曰無欲實難言人不能無欲皆得其欲以從其事而要其成非我有成其在人乎林若人皆得其所欲以從國家之事而要責其成功事既有成乃出於我豈在於他人乎要一遥反何愛於邑邑將焉徃杜言猶在國焉於䖍反子大叔曰若四國何杜恐為四鄰所笑子産曰非相違也而相從也杜言賂以邑欲為和順四國何尤焉尤怪也鄭書有之杜鄭國史書曰安定國家必大焉先杜先和大族而後國家安姑先安大以待其所歸杜要其成也既伯石懼而歸邑卒與之杜卒終也伯有既死使大史命伯石為卿辭大史退則請命焉杜請大史更命已復命之又辭如是三乃受䇿入拜杜伯石乃受策命以入拜謝於君三息暫反又如字子産是以惡其為人也杜惡其虚飾惡烏路反使次已位畏其作亂故寵之子産使都鄙有章杜國都及邉鄙車服尊卑各有分部上下有服公卿大夫服不相踰田有封洫杜封疆也洫溝也廬井有伍杜廬舍也九夫為井使五家相保大人之忠儉者杜謂卿大夫從而與之泰侈者因而斃之杜因其有罪而斃踣之豐卷將祭請田焉弗許林豐卷字子張將祭於家請田獵以供祭卷眷勉反徐居阮反曰唯君用鮮杜鮮野獸衆給而已杜衆臣祭以芻豢為足子張怒杜子張豐卷退而徴役出召兵欲攻子産子産奔晉子皮止之而逐豐卷豐卷奔晉子産請其田里杜請於公不没入三年而復之反其田里及其入焉杜田里所收入從政一年輿人誦之曰取我衣冠而禇之杜禇畜也奢侈者畏法故畜藏禇張吕反取我田疇而伍之林並畔為疇兼并者失志故取田疇而伍結之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之杜殖生也殖時力反徐是力反子産而死誰其嗣之杜嗣續也傳言鄭所以興經己未三十有一年春王正月夏六月辛巳公薨于楚宫公不居先君之路寢而安所樂失其所也秋九月癸巳子野卒不書葬未成君己亥仲孫羯卒冬十月滕子來㑹葬杜諸侯㑹葬非禮林諸侯來㑹葬於是始癸酉葬我君襄公十有一月莒人弑其君密州杜不稱弑者主名君無道也犂比公弑展輿立傳三十一年春王正月穆叔至自㑹杜澶淵㑹還見孟孝伯語之曰趙孟將死矣其語偷不似民主杜偷苟且語魚據反下同且年未盈五十而諄諄焉如八九十者弗能久矣杜成二年戰於鞌趙朔已死於是趙文子始生至襄三十年㑹澶淵葢年四十七八故言未盈五十林諄諄鄭重之貌諄之閏反又之純反若趙孟死為政者其韓子乎杜韓子韓起吾子盍與季孫言之可以樹善林使季武子早與韓宣子樹立交道之善盍户臘反君子也言韓起有君子之徳晉君將失政矣若不樹焉使早備魯使韓子早為魯備既而政在大夫林晉君失政則散在諸大夫之家韓子懦弱大夫多貪求欲無厭齊楚未足與也林魯不堪晉求雖欲改事齊楚未有足恃者懦乃亂反厭於鹽反魯其懼哉孝伯曰人生㡬何誰能無偷朝不及夕將安用樹穆叔出而告人曰孟孫將死矣吾語諸趙孟之偷也而又甚焉杜言朝不及夕偷之甚也㡬豈居反又與季孫語晉故如與孟孫言季孫不從及趙文子卒在昭元年晉公室卑政在侈家韓宣子為政不能圖諸侯魯不堪晉求讒慝𢎞多是以有平丘之㑹平丘㑹在昭十三年晉人執季孫意如齊子尾害閭丘嬰欲殺之林子尾即公孫蠆以閭丘嬰為已害欲以計殺嬰使帥師以伐陽州陽州魯地我問師故魯以師徃問齊何故伐我夏五月子尾殺閭丘嬰以說于我師杜言伐魯者嬰所為也伐陽州不書不成伐說如字工僂灑渻竈孔虺賈寅出奔莒四子嬰之黨僂力候反灑所蟹反舊所綺反渻生領反虺許鬼反出羣公子為昭十年欒髙之難復羣公子起本公作楚宫杜適楚好其宫歸而作之穆叔曰大誓云民之所欲天必從之今尚書大誓亦無此文故諸儒疑之大音泰君欲楚也夫故作其宫林襄公欲從楚故好楚而作其宮夫音扶若不復適楚必死是宫也六月辛巳公薨于楚宫叔仲帶竊其拱璧杜拱璧公大璧以與御人納諸其懐而從取之由是得罪杜得罪謂魯人薄之故子孫不得志於魯立胡女敬歸之子子野胡歸姓之國敬歸襄公妾次于季氏秋九月癸巳卒毁也過哀毁瘠以致滅性己亥孟孝伯卒終穆叔言立敬歸之娣齊歸之子公子禂杜齊諡禂昭公名娣大計反禂直由反穆叔不欲曰大子死有母弟則立之無則立長杜立庻子則以年長丁丈反年鈞擇賢義鈞則卜古之道也杜先人事後卜筮也義鈞謂賢等非適嗣何必娣之子杜言子野非適嗣適丁歴反且是人也居䘮而不哀在慼而有嘉容是謂不度不度之人鮮不為患若果立之必為季氏憂林其後二十五年果攻季氏鮮息淺反武子不聽卒立之比及葬三易衰衰衽如故衰林衰喪服也昭公所衣衰輙弊凡三次更易新者衽裳下也衰已三易其裳下復如舊衰可見其嬉戯無度比必利反三如字又息暫反衰七雷反社而甚反徐而鳩反於是昭公十九年矣林昭公立時巳年十九歳猶有童心君子是以知其不能終也為昭二十五年公孫於齊傳冬十月滕成公來㑹葬惰而多涕惰不敬也惰徒臥反涕他禮反子服惠伯曰滕君將死矣怠於其位而哀已甚兆於死所矣杜有死兆能無從乎林能無從之而死乎為昭三年滕子卒傳癸酉葬襄公公薨之月子産相鄭伯以如晉晉候以我䘮未之見也子産使盡壊其舘之垣而納車馬焉士文伯讓之曰敝邑以政刑之不修宼盜充斥杜充滿斥見言其多相息亮反盡津忍反壊音怪下皆同舘古亂反字從食字云客舍也旁作舍非垣音袁牆也無若諸侯之屬辱在寡君者何是以令吏人完客所館杜館舍也令力呈反髙其閈閎林閈閭也里門曰閈閎門也衡門謂之閎閈戸旦反閎獲耕反厚其牆垣以無憂客使杜無令客使憂宼盜使所吏反今吾子壊之雖從者能戒其若異客何林雖鄭之從者知所戒備他國賔客來者何以待之從才用反下同以敝邑之為盟主繕完葺牆杜葺覆也葺侵入反徐音集又子入反謂以革覆牆以待賔客若皆毁之其何以共命寡君使匄請命林士文伯名匄字伯瑕與范宣子士匄同族同名杜請問毁垣之命共音恭匄本作焉古害反對曰以敝邑𥚹小介於大國介問也𥚹必以反誅求無時杜誅責也是以不敢寜居悉索敝賦以來㑹時事杜隨時來朝㑹索所白反又悉名反逢執事之不閒而未得見又不獲聞命未知見時不敢輸幣亦不敢暴露其輸之則君之府實也非薦陳之不敢輸也林薦陳猶獻見也不敢以非禮輸納於府庫閒音閔見賢遍反暴歩下反下同其暴露之則恐燥濕之不時而朽蠧以重敝邑之罪僑聞文公之為盟主也杜僑子産名文公晉重耳燥素早反蠧丁故反蟲敗也重直用反下同僑其驕反宫室卑庳無觀臺榭以崇大諸侯之館館如公寢庫廐繕修司宫以時平易道路林晉君所居宫室務從卑小惟諸侯之館舎則崇大之館中藏幣之庫養馬之廐莫不繕治修葺司空掌邦土故使之以時平治道路又易治也庳音婢亦音卑觀古亂反土高曰臺有木曰榭廐九又反易以豉反圬人以時塓館宫室杜圬人塗者塓塗也圬圬同音烏塓莫厯反諸侯賔至甸設庭燎杜庭燎設火於庭燎力妙反徐力遥反庭燎大燭僕人巡宫杜巡宫行夜車馬有所杜有所處賔從有代杜代客役巾車脂轄巾車主車之官轄户瞎反𨽻人牧圉各瞻其事林各瞻視客之所為以供其事百官之屬各展其物杜展陳也謂羣官各陳其物以待賔公不留賔而亦無廢事賔得速去則事不廢憂樂同之事則巡之林賔之憂樂晉則同其好惡事之得失晉則巡其當否杜巡行也樂音洛教其不知而恤其不足賔至如歸無寧菑患林賔至客館百用備給如歸私家見遇如此寧當復有菑患邪無寧寧也菑音災不畏宼盜而亦不患燥濕今銅鞮之宫數里林銅鞮晉離宫鞮丁兮反數所主反而諸侯舍於𨽻人館舍如𨽻人舍門不容車而不可踰越杜門牆之内迫迮又有牆垣之限盜賊公行而夭癘不戒杜癘猶災也言水潦無時賔見無時命不可知林召見之命不可知測見賢遍反若又勿壊是無所藏幣以重罪也敢請執事將何所命之問晉命已所正之宜雖君之有魯䘮亦敝邑之憂也言鄭與魯亦有同姓之憂若獲薦幣杜薦進也修垣而行杜行去也君之惠也敢憚勤勞文伯復命杜反命於晉君趙文子曰信杜信如子産言我實不徳而以𨽻人之垣以贏諸候林贏受也所以受諸候館舍之垣牆誠如徒𨽻所居贏音盈是吾罪也使士文伯謝不敏焉晉候見鄭伯有加禮杜禮加敬厚其宴好而歸之乃築諸候之館叔向曰辭之不可以已也如是夫子産有辭諸候頼之若之何其釋辭也林諸候皆恃頼之以得改築館舍好呼報反夫音扶讀者以其夫為下句首詩曰辭之輯矣民之協矣辭之繹矣民之莫矣杜詩大雅言辭輯睦則民恊同辭說繹則民安定莫猶也輯音集又七八反繹音亦其知之矣謂詩人知辭之有益鄭子皮使印叚如楚林時鄭伯在晉故言子皮使印叚如楚以適晉告禮也得事大國之禮莒犂比公生去疾及展輿杜犂比莒子密州之號犂力私反又力兮反比音毘既立展輿杜立以為世子又廢之犂此公虐國人患之十一月展輿因國人以攻莒子弑之乃立杜展輿立為君去疾奔齊齊出也林母齊女也展輿呉出也為明年奔呉傳書曰莒人弑其君買朱鉏杜買朱鉏密州之字言罪之在也杜罪在鉏也傳始例申明君臣書弑今者父子故重復明例呉子使屈狐庸聘于晉狐庸巫臣之子也成七年適呉為行人屈居勿反通路也通呉晉之路趙文子問焉曰延州來季子其果立乎杜延州來季札邑巢隕諸樊在二十五年隕于敏反閽戕戴呉杜在二十九年戴呉餘祭閽音昏戕在良及天似啓之何如對曰不立是二王之命也林言此乃諸樊戴呉之天命當死非啓季子也若天所啓其在今嗣君乎嗣若謂夷昧甚徳而度林徳行修而度量廣徳不失民杜民歸徳度不失事杜審事情民親而事有序其天所啓也有呉國者必此君之子孫實終之季子守節者也雖有國不立杜言其三光雖欲傳國與之終不肯立十二月北宫文子相衛襄公以如楚杜文子北宫佗襄公獻公子相息亮反宋之盟故也杜晉楚之從交相見也過鄭印叚廷勞于棐林如聘禮而以勞辭杜用聘禮而用郊勞之辭過古禾反廷于况反勞力報反下同棐芳尾反文子入聘杜報印叚子羽為行人馮簡子與子大叔逆客杜逆文子事畢而出言於衞侯曰鄭有禮其數世之福也其無大國之討乎詩云誰能執熱逝不以濯杜詩大雅濯以水濯手數所主反濯直角反禮之於政如熱之有濯也濯以救熱林有禮以節其政如有濯以救其熱何患之有杜此以上文子辭子産之從政也擇能而使之馮簡子能斷大事子大叔美秀而文杜其貌美其才秀斷丁亂反下同公孫揮能知四國之為杜知諸侯所欲為而辨於其大夫之族姓班位貴賤能否而又善為辭令林凡諸侯之臣族姓之同異班位之髙下人物之貴賤才具之能否皆能辨别又且長於應對禆諶能謀謀於野則獲謀於邑則否林謀於寛閒之野則得其所謀謀於喧囂之邑則不得其所謀此其才性之敝禆婢支反諶市林反鄭國將有諸侯之事子産乃問四國之為於子羽且使多為辭令與禆謀乘以適野使謀可否而告馮簡子使斷之事成乃授子大叔使行之以應對賔客是以鮮有敗事北宫文子所謂有禮也杜傳跡子産行事北宫文子之言乘䋲證反鮮息淺反鄭人游於鄉校鄉之學校也校戸孝反下同鄭國謂學為校以論執政杜論其得失然明謂子産曰毁鄉校如何杜患人於中謗議國政子産曰何為夫人朝夕退而游焉以議執政之善否林早見曰朝暮見曰夕夫音扶下同朝直遥反書如字其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之我聞忠善以損怨杜為忠善則怨謗息惡烏路反又如字不聞作威以防怨杜欲毁鄉校即作威豈不遽止然猶防川遽畏懼也大決所犯傷人必多吾不克救也不如小決使道杜道通也道音導不如吾聞而藥之也杜以為已藥石然明曰蔑也今而後知吾子之信可事也小人實不才若果行此其鄭國實頼之豈唯二三臣仲尼聞是語也曰以是觀之人謂子産不仁吾不信也杜仲尼以二十二年生於是十歳長而後聞之子皮欲使尹何為邑為邑大夫子産曰少未知可否尹何年少少詩照反子皮曰愿吾愛之不吾叛也杜愿謹善也愿音願使夫徃而學焉夫亦愈知治矣杜夫謂尹何子産曰不可人之愛人求利之也今吾子愛人則以政杜以政與之猶未能操刀而使割也其傷實多杜多自傷操七刀反子之愛人傷之而已其誰敢求愛於子子於鄭國棟也棟折榱崩僑將厭焉敢不盡言杜榱椽也棟所以架椽楝毁折則椽崩壊屋壊則人將覆壓故言僑將壓焉欀所追反厭於甲反徐於輙反下同子有美錦不使人學製焉杜製裁也製音制大官大邑身之所庇也而使學者製焉其為美錦不亦多乎杜言宫邑之重多於美錦庇必利反又音祕僑聞學而後入政未聞以政學者也若果行此必有所害譬如田獵射御貫則能獲禽杜貫習也貫古患反若未嘗登車射御則敗績厭覆是懼何暇思獲子皮曰善哉虎不敏吾聞君子務知大者逺者小人務知小者近者我小人也衣服附在吾身我知而慎之大官大邑所以庇身也我逺而慢之杜慢易也覆芳服反微子之言吾不知也他日我曰子為鄭國我為吾家以庇焉其可也今而後知不足自知謀慮不足謀其家自今請雖吾家聽子而行子産曰人心之不同如其面焉吾豈敢謂子面如吾面乎抑心所謂危亦以告也林子面不如吾面吾心豈如子心安敢使子之家事皆聽我而後行也抑我心以此事為危而不安則亦不敢不告於子子皮以為忠故委政焉子産是以能為鄭國杜傳言子産之治乃子皮之力衞侯在楚北宫文子見令尹圍之威儀言於衞侯曰令尹似君矣將有他志言語贍視行步不常雖獲其志不能終也林雖使得遂篡國之志必不善終詩云靡不有初鮮克有終終之實難令尹其將不免公曰子何以知之對曰詩云敬慎威儀惟民之則令尹無威儀民無則焉民所不則以在民上不可以終林民之所不取法而居民上以君臨之不可以善保其終鮮息淺反公曰善哉何謂威儀對曰有威而可畏謂之威有儀而可象謂之儀君有君之威儀其臣畏而愛之則而象之故能有其國家令聞長世林畏而愛之則非暴虐之威法而象之則非具文之儀故能保有其國家美名埀世永逺無窮聞音問臣有臣之威儀其下畏而愛之林不言則而象之承上文也故能守其官職保族宜家順是以下皆如是是以上下能相固也林順是君臣以下至於父子兄弟夫婦朋友士農工商皂𨽻牧圉各有威儀是以上下相安堅固如此衞詩曰威儀棣棣不可選也杜詩邶風棣棣富而閒也選數也此邶風刺衛頃公故曰衛詩棣直計反言君臣上下父子兄弟内外大小皆有威儀也周詩曰朋友攸攝攝以威儀杜詩大雅攸所也攝佐也言朋友之道必相教訓以威儀也周書數文王之徳杜逸書此舉周書太誓篇曰大國畏其力小國懐其徳言畏而愛之也林此觧書以證上文畏而愛之之說詩云不識不知順帝之則言則而象之也杜大雅又言文王行事無所斟酌唯在則象上天林此觧詩以證上文則而象之之說紂囚文王七年諸侯皆從之囚紂於是乎懼而歸之可謂愛之文王伐崇再駕而降為臣杜文王聞崇徳亂而伐之三旬不降退修教而復伐之因壘而降降戸江反蠻夷帥服可謂畏之文王之功天下誦而歌舞之可謂則之文王之行至今為法可謂象之有威儀也林此以下詳言君子之威儀行下孟反下同故君子在位可畏施舍可愛進退可度周旋可則容止可觀作事可法徳行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也林度則法皆法也五言之者文法之變樂音洛又音岳左傳杜林合注卷三十三
