body:
  text: 左傳杜林合注卷四十明王道焜趙如源同編昭公七經戊寅十有九年春宋公伐邾為鄅夏五月戊辰許世子止弑其君買杜加弑者責止不舍藥物林悼公弑止奔晉斯立己卯地震無傳秋齊高發帥師伐莒冬葬許悼公無傳傳十九年春楚工尹赤遷隂于下隂杜隂縣今屬南鄉郡令尹子瑕城郟林子瑕即陽匄郟亦楚邑叔孫昭子曰楚不在諸侯矣林言楚無復經畧中原之志其僅自完也遷隂城郟皆欲以自完守以持其世而已林以保持其世言無遠謀也楚子之在蔡也蓋為大夫時往聘蔡郥陽封人之女奔之生大子建郥陽蔡邑郥古闃反及即位使伍奢為之師伍奢伍舉之子伍員之父費無極為少師無寵焉欲譛諸王曰建可室矣室妻也少詩照反王為之聘於秦無極與逆勸王取之正月楚夫人嬴氏至自秦王自取之故稱夫人至為下拜夫人起為于偽反與音預嬴音盈鄅夫人宋向戌之女也故向寧請師杜寜向戌子也請於宋公伐邾向傷亮反戌音恤二月宋公伐邾圍蟲三月取之蟲邾邑不書圍取不以告乃盡歸鄅俘夏許悼公瘧林瘧痁疾瘧魚畧反五月戊辰飲大子止之藥卒杜止獨進藥不由醫太子奔晉書曰弑其君君子曰盡心力以事君林言事君之道但當盡其忠心與其實力舍藥物可也藥物有毒當由醫非凡人所知譏止不舍藥物所以加弑君之名舍音捨邾人郳人徐人㑹宋公乙亥同盟于蟲終宋公伐邾事郳五兮反楚子為舟師以伐濮濮南夷也濮音卜費無極言於楚子曰晉之伯也邇於諸夏而楚辟陋故弗能與争若大城城父而寘大子焉城父今襄城城父縣伯音霸辟匹亦反父音甫以通北方王收南方是得天下也林兼收南北是得天下矣王説從之故大子建居于城父令尹子瑕聘于秦拜夫人也杜為明年譛大子張本改以為夫人遣謝秦説音悦秋齊髙發帥師伐莒莒不事齊故莒子奔紀鄣杜紀鄣莒邑也東海贛榆縣東北有紀城鄣音章使孫書伐之孫書陳無宇之子子古也初莒有婦人莒子殺其夫已為嫠婦寡婦為嫠嫠力之反及老託於紀鄣紡焉以度而去之林紡麻縷為纑以所紡纑度紀鄣之城藏其纑以待外攻者欲為夫報讐去藏也紡芳徃反度待洛反去起吕反及師至則投諸外杜投繩城外隨之而出或獻諸子占子占使師夜縋而登杜縁繩登城登者六十人縋絶師鼓譟城上之人亦譟莒共公懼啓西門而出七月丙子齊師入紀傳言怨不在大共音恭是嵗也鄭駟偃卒子游娶於晉大夫生絲弱杜子游駟偃也弱幼少其父兄立子瑕杜子瑕子游叔父駟乞子産憎其為人也杜憎子瑕且以為不順舍子立叔不順禮也弗許亦弗止杜許之為違禮止之為違衆故中立駟氏聳聳懼也他日絲以告其舅冬晉人使以幣如鄭問駟乞之立故杜問駟氏何故舍子而立叔駟氏懼駟乞欲逃子産弗遣請龜以卜亦弗予大夫謀對子産不待而對客曰鄭國不天杜不穫天福寡君之二三臣札瘥天昏林夭死曰札小疫曰瘥短折曰夭未明曰昏此言相繼而死札側八反瘥才何反今又喪我先大夫偃其子㓜弱其一二父兄懼隊宗主私族於謀而立長親杜於私族之謀宜立親之長者喪息浪反隊查類反長于丈反寡君與其二三老曰抑天實剥亂是吾何知焉杜言天自欲亂駟氏其國所知諺曰無過亂門民有兵亂猶憚過之而况敢知天之所亂林凡民有兵戈之亂他人猶畏憚不敢輒過其門况天意之所欲剥亂敢過而知之乎過古禾反下同今大夫將問其故抑寡君實不敢知其誰實知之林駟氏鄭臣也鄭君尚不敢與知其事鄭之諸臣又誰敢與知其事平丘之㑹在十三年君尋舊盟曰無或失職若寡君之二三臣其即世者晉大夫而専制其位是晉之縣鄙也何國之為辭客幣而報其使晉人舍之杜遣人報晉使林晉人置之不問傳言子産有辭使所吏反楚人城州來沈尹戌曰楚人必敗杜十二年吴縣州來今就城而取之戌莊王曾孫葉公諸梁父也戌音恤昔吳滅州來在十三年子旗請伐之王曰吾未撫吾民今亦如之林今亦未撫吾民如前十三年而城州來以挑吴能無敗乎侍者曰王施舍不倦息民五年可謂撫之矣戌曰吾聞撫民者節用於内而樹徳於外民樂其性而無冦讐今宫室無量民人日駭勞罷死轉忘寢與食林平王營創宫室無有量度非節用樹徳也人民日以驚駭勞苦罷困死亡轉徙日忘其食夜忘其寢非樂其性而無冦讐也樂音洛罷音皮非撫之也傳言平王所以不能霸鄭大水林凡平原出水為大水龍鬬于時門之外洧淵杜時門鄭城門也洧水出滎陽密縣東南至潁川長平入潁洧于軌反國人請為禜焉子産弗許曰我鬭龍不我覿也杜覿見也林言我若相鬬龍必不覿見於我禜為命反覿大厯反龍鬬我獨何覿焉禳之則彼其室也淵龍之室吾無求於龍龍亦無求於我乃止也傳言子産之知令尹子瑕言蹶由於楚子杜蹶由吴王弟五年靈王執以歸蹶九衛反曰彼何罪諺所謂室於怒市於色者楚之謂矣杜言靈王怒吴子而執其弟猶人忿於室家而作色於市人舍前之忿可也乃歸蹶由杜言楚子能用善言經己卯二十年春王正月夏曺公孫㑹自鄸出奔宋杜無傳甞有玉帛之使來告故書鄸曺邑鄸莫公反又亡増反秋盜殺衛侯之兄縶杜齊豹作而不義故書曰盜所謂求名而不得縶張立反冬十月宋華亥向寧華定出奔陳與君爭而出皆書名惡之華户化反十有一月辛卯蔡侯廬卒杜無傳未同盟而赴以名林平公卒太子宋立廬方於反又力烏反傳二十年春王二月己丑日南至杜是嵗朔旦冬至之嵗也當言正月己丑朔日南至時史失閏閏更在二月後故經因史而書正月傳更具於二月記南至日以正厯也梓慎望氛氛氣也時魯侯不行登臺之禮使梓慎望氛氛芳云反曰今兹宋有亂國幾亡三年而後弭蔡有大喪為宋華向出奔蔡侯卒傳叔孫昭子曰然則戴桓也戴族華氏桓族向氏汰侈無禮已甚亂所生也傳言妖由人興汰音泰費無極言於楚子曰建與伍奢將以方城之外叛林時建居城父故言將以方城之外叛自以為猶宋鄭也齊晉又交輔之將以害楚其事集矣王信之問伍奢伍奢對曰君一過多矣杜一過納建妻何信讒言王執伍奢杜忿奢切言使城父司馬奮揚殺太子未至而使遣之林奮揚楚大夫時為城父司馬亦在楚故使往就殺太子奮揚受命未至城父知太子寃故遣令去三月太子建奔宋王召奮揚奮揚使城父人執已以至林示不逃刑王曰言出於余口入於爾耳誰告建也對曰臣告之君王命臣曰林此曰字下一句乃楚平王命奮揚為司馬之辭事建如事余臣不佞佞才也不能苟貳林不能苟且而懷貳心奉初以還奉初命以周旋不忍後命故遣之既而悔之亦無及己王曰而敢來何也對曰使而失命召而不來是再奸也杜奸犯也使所吏反又如字逃無所入林雖欲逃避無所可入王曰歸從政如他日杜善其言舍使還無極曰奢之子材若在吴必憂楚國盍以免其父召之彼仁林彼謂伍奢之子仁愛其父必來不然將為患王使召之曰來吾免而父棠君尚謂其弟員杜棠君奢之長子尚也為棠邑大夫員尚弟子胥員音云曰爾適吴我將歸死吾知不逮杜自以知不及員知音智下同我能死爾能報聞免父之命不可以莫之奔也親戚為戮不可以莫之報也奔死免父孝也度功而行仁也杜仁者貴成功林奔死以求免吾父尚不失為孝度功而求行汝志員不失為仁䖍待洛反擇任而往知也知死不辟勇也林擇能任報仇而獨出奔員不失為智知歸則必死而獨不避尚不失為勇任音壬父不可棄俱去為棄父名不可廢俱死為廢名爾其勉之相從為愈杜愈差也林比之相從俱奔俱死皆為差勝也伍尚歸奢聞員不來曰楚君大夫其旰食乎將有吳憂不得早食旰古旦反楚人皆殺之員如吴言伐楚之利於州子杜州子吴子僚公子光曰是宗為戮而欲反其讐不可從也杜光吴公子闔廬也反復也員曰彼將有他志杜光欲弑僚不利員用事故破其議而員亦知之余姑為之求士而鄙以待之林計未得用故進勇士以求入於光退居邊鄙為于偽反乃見鱄設諸焉杜鱄諸勇士見賢遍反鱄音専而耕於鄙為二十七年吳弑僚傳宋元公無信多私而惡華向華定華亥與向寧謀曰亡愈於死先諸恐元公殺己欲先作亂惡烏路反華亥偽有疾以誘羣公子公子問之則執之夏六月丙申殺公子寅公子御戎公子朱公子固公孫援公孫丁拘向勝向行於其廩杜八子皆公黨御魚吕反又如字公如華氏請焉弗許遂刼之刼公癸卯取大子欒與母弟辰公子地以為質杜欒景公也辰及地皆元公弟林辰地皆大子欒兄弟質音致下同公亦取華亥之子無慼向寧之子羅華定之子啓與華氏盟以為質杜為此冬華向出奔傳衛公孟縶狎齊豹公孟靈公兄也齊豹齊惡之子為衛司冦狎輕也奪之司冦與鄄杜鄄豹邑鄄音絹有役則反之杜縶足不良故有役則以官邑還豹使行無則取之杜若無征役則取其邑公孟惡北宫喜褚師圃欲去之杜喜貞子惡烏路反褚中吕反公子朝通于襄夫人宣姜宣姜靈公嫡母朝如字懼而欲以作亂故齊豹北宫喜褚師圃公子朝作亂初齊豹見宗魯於公孟杜薦違也見賢遍反為驂乗焉杜為公孟驂乗驂七南反乗繩證反下皆同將作亂而謂之曰公孟之不善子所知也勿與乗吾將殺之對曰吾由子事公孟子假吾名焉故不吾逺也杜言子借我以善名故公孟親近我與音預又如字逺于萬反雖其不善吾亦知之抑以利故不能去是吾過也今聞難而逃是僣子也杜使子言不信也難乃旦反子行事乎吾將死之以周事子周猶終竟也而歸死於公孟其可也丙辰衛侯在平夀平夀衛下邑公孟有事於蓋獲之門外杜有事祭也蓋獲衛郭門齊子氏帷於門外言齊豹先具帷設於蓋獲門外若今看位而伏甲焉使祝鼃寘戈於車薪以相從謂要其前也鼃烏媧反使一乗從公孟以出杜亦如前車置戈於薪尋其後從如字又才用反使華齊御公孟宗魯驂乗及閎中杜閎中門中茟戸化反下同閑音宏齊氏用戈擊公孟宗魯以背蔽之㫁肱以中公孟之肩皆殺之公聞亂乗驅自閲門入林閲門衛城名㫁丁管反中丁仲反慶比御公公南楚驂乗使華寅乗貳車杜公副車比如字又昆志反及公宫鴻駵魋駟乗于公鴻駵魋復就公乗一車四人駵音留魋徒囘反公載寶以出褚師子申遇公于馬路之衢林馬路衢名衢共俱反遂從杜從公出從才用反過齊氏使華寅肉袒執蓋以當其闕杜肉袒示不敢與齊氏爭執蓋蔽公而去闕空也以蓋當侍從空闕之處袒徒旱反齊氏射公中南楚之背林南楚驂乗故中其背射食亦反公遂出寅閉郭門不敢合追者出踰而從公杜踰郭出從才用反又如字下同公如死鳥杜死鳥衛地析朱鉏宵從竇出徒行從公朱鉏成子黑背孫鉏仕居反竇音豆齊侯使公孫青聘于衛杜青頃公之孫既出聞衛亂使請所聘公曰猶在竟内則衛君也林言衛侯猶在衛之竟内則猶為衛君未失國竟音境乃將事焉杜將事行聘事遂從諸死鳥請將事辭曰亡人不佞失守社稷越在草莽吾子無所辱君命賓曰林即公孫青寡君命下臣於朝曰阿下執事杜阿比也命已使比衛臣下臣不敢貳杜貳違命也主人曰君若恵顧先君之好照臨敝邑鎮撫其社稷則有宗祧在言受聘當在宗廟也好呼報反乃止止不行聘事衛侯固請見之杜欲與青相見不獲命以其良馬見杜以為相見之禮見賢遍反為未致使故也未致使故不敢以客禮見為于偽反使所吏反衛侯以為乗馬杜喜其敬已故貴其物乗繩證反又如字賓將掫杜掫行夜林青將行夜以助守備掫側九反又祖侯反主人辭曰亡人之憂不可以及吾子草莽之中不足以辱從者敢辭賓曰寡君之下臣君之牧圉也若不獲扞外役是不有寡君也杜有相親有従才用反扞戸旦反臣懼不免於戾請以除死林請助夜行以除死罪親執鐸終夕與於燎設火燎以守備與音預下同燎九召反齊氏之宰渠子召北宫子杜北宫喜也林渠子為齊氏宰召之同叛北宫氏之宰不與聞謀殺渠子遂伐齊氏滅之丁巳晦公入與北宫喜盟于彭水之上杜喜本與齊氏同謀故公先與喜盟秋七月戊午朔遂盟國人八月辛亥公子朝褚師圃子玉霄子髙魴出奔晉皆齊氏黨閏月戊辰殺宣姜與公子朝通謀故衛侯賜北宫喜諡曰貞子滅齊氏故賜析朱鉏諡曰成子霄從公故而以齊氏之墓予之皆未死而賜諡及墓田傳終而言之衛侯告寧于齊且言子石杜子石公孫青言其有禮齊侯將飲酒徧賜大夫曰二三子之教也杜喜青敬衛侯苑何忌辭曰與於青之賞必及於其罰杜何忌齊大夫言青若有罪亦當并受其罰苑於元反在康誥曰父子兄弟罪不相及杜尚書康誥况在羣臣臣敢貪君賜以干先王杜言受賜則犯康誥之義琴張聞宗魯死琴張孔子弟子字子開名牢將往弔之仲尼曰齊豹之盜而孟縶之賊女何弔焉杜言齊豹所以為盜孟縶所以見賊皆由宗魯女音汝君子不食姦知公孟不善而受其禄是食姦也不受亂許豹行事是受亂也不為利疚於囘杜疚病囘邪也以利故不能去是病身於邪為于偽反疚居又反不以囘待人杜知難不告是以邪待人不蓋不義以周事豹是蓋不義不犯非禮杜以二心事縶是非禮宋華向之亂公子城平公子公孫忌樂舍舍樂喜孫司馬彊向宜向鄭宜鄭皆向戌子楚建楚平王之亡太子郳甲小邾穆公子郳五兮反出奔鄭杜八子宋大夫皆公黨辟難出其徒與華氏戰于鬼閻杜八子之徒衆也潁川長平縣西北有閻亭閻似廉反又似冉反敗子城子城適晉杜子城為華氏所敗别走至晉為明年子城以晉師至起本華亥與其妻必盥而食所質公子者而後食林華亥與妻每日必盥手先食所質公子而後敢食盥古緩反食音嗣公與夫人每日必適華氏食公子而後歸華亥患之林亥以元公數來為患欲歸公子向寧曰唯不信故質其子若又歸之死無日矣公請於華費遂將攻華氏費遂大司馬華氏族質音致下同費扶味反對曰臣不敢愛死無乃求去憂而滋長乎杜言公欲攻華氏將以去其憂患也恐殺太子而憂患益長長丁丈反臣是以懼敢不聴命公曰子死亡有命余不忍其訽杜訽恥也訽許侯反冬十月公殺華向之質而攻之戊辰華向奔陳華登奔吴杜登費遂之子黨華向者向寧欲殺大子華亥曰干君而出又殺其子其誰納我且歸之有庸可以為功善使少司冦牼以歸杜以三公子歸公也牼華亥庶兄少詩照反牼若耕反曰子之齒長矣不能事人林謂牼之年齒己長不能出外服事他人以三公子為質必免杜質信也送公子歸可以自明不叛之信質如字公子既入華牼將自門行杜從公門去公遽見之執其手曰余知而無罪也入復而所杜而女也所所居官齊侯疥遂痁杜痁瘧疾林疥當作痎字之誤也因痎變為瘧疾也疥音戒痁失廉反期而不瘳諸侯之賓問疾者多在杜多在齊期音基瘳勅留反梁丘據與裔款二子齊嬖大夫言於公曰吾事鬼神豐於先君有加矣今君疾病為諸侯憂是祝史之罪也諸侯不知其謂我不敬林是大祝大史不能薦美以祈鬼神之祐也諸侯之國不知其由將謂我不能致敬鬼神以獲福佑君盍誅於祝固史嚚以辭賓杜欲殺嚚固以辭謝來問疾之賓嚚魚巾反公説告晏子晏子曰日宋之盟日往日也宋盟在襄二十七年説音悦屈建問范會之徳於趙武林屈建即楚子木范㑹即晉士㑹范武子趙武曰夫子之家事治言於晉國竭情無私其祝史祭祀陳信不愧其家事無猜其祝史不祈杜家無猜疑之事故祝史無求於鬼神猜七才反建以語康王杜楚王語魚據反康王曰神人無怨宜夫子之光輔五君以為諸侯主也杜五君文襄靈成景公曰據與款謂寡人能事鬼神故欲誅於祝史子稱是語何故林言二子以我能事鬼神而不獲福祐故欲誅祝史以懲不恪晏子乃稱范武子之德此何説也對曰若有徳之君外内不廢杜無廢事上下無怨動無違事其祝史薦信無愧心矣杜君有功徳祝史陳説之無所愧是以鬼神用饗國受其福祝史與焉杜與受國福與音預下同其所以蕃祉老夀者為信君使也其言忠信於鬼神林以其為誠信之君所使是以與受其福其所以告於鬼神者皆忠直誠信之言也為于偽反又如字下同其適遇淫君外内頗邪上下怨疾動作辟違從欲厭私杜使私情厭足頗普何反辟匹亦反從才用反下同或如字厭於豔反高臺深池林極游觀之美撞鐘舞女林極聲色之樂斬刈民力輸掠其聚杜掠奪取也林盡用民力如刈草菅奪取民財如逢冦掠刈魚廢反掠音亮以成其違不恤後人暴虐淫從肆行非度無所還忌還猶顧也不思謗讟不憚鬼神神怒民痛無悛於心其祝史薦信是言罪也杜以實白神是為言君之罪悛七全反其蓋失數美是矯誣也杜蓋掩也數所主反進退無辭則虚以求媚杜作虚辭以求媚於神是以鬼神不享其國以禍之祝史與焉所以天昏孤疾者為暴君使也其言僣嫚於鬼神林以其為暴虐之君所使是以與受其禍其所以告於鬼神者皆不信欺嫚之言也公曰然則若之何對曰不可為也言非誅祝史所能治山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞侯守之海之鹽蜃祈望守之杜衡鹿舟鮫虞候祈望皆官名也言公専守山澤之利不與民共萑音丸蒸之丞反麄曰薪細曰蒸蜃市軫反縣鄙之人入從其政偪介之闗暴征其私杜介隔也迫近國都之闗言邊鄙既入服政役又為近闗所征税枉暴奪其私物政如字一音征承嗣大夫强易其賄杜承嗣大夫世位者强其丈反布常無藝杜藝法制也言布政無法制徵歛無度宫室日更淫樂不違違去也内寵之妾肆奪於市杜肆放也外寵之臣僭令於鄙詐為教令於邊鄙私欲養求不給則應林嬖寵臣妾縱其私欲長養求覔所求不給則應之以罪民人苦病夫婦皆詛祝有益也詛亦有損杜祝史禱祝若有所益夫婦詛祝亦有所損詛莊慮反祝之又反下同聊攝以東杜聊攝齊西界也平原聊城縣東北有攝城姑尤以西杜姑尤齊東界也姑水尤水皆在城陽郡東南入海其為人也多矣雖其善祝豈能勝億兆人之詛杜萬萬曰億萬億曰兆君若欲誅於祝史修徳而後可公説使有司寛政毁闗去禁杜毁偪介之闗去梁澤之禁説音悦薄歛已責杜除逋責責又作債音同十二月齊侯田于沛杜言疾愈行獵沛澤名沛音貝招虞人以弓不進虞人掌山澤之官公使執之辭曰昔我先君之田也旃以招大夫弓以招士皮冠招虞人林禮孤卿建旃故以旃招大夫詩翹翹車乗招我以弓故以弓招士諸侯服皮冠以田虞人掌田獵故以皮冠招虞人臣不見皮冠故不敢進乃舍之仲尼曰守道不如守官君招當往道之常也非物不進官之制也君子韙之韙是也齊侯至自田晏子侍于遄臺子猶馳而造焉林遄臺臺名杜子猶梁丘據遄市専反造七報反公曰唯據與我和夫晏子對曰據亦同也焉得為和公曰和與同異乎對曰異和如羮焉水火醯醢鹽梅以烹魚肉燀之以薪杜燀炊也夫音扶焉於䖍反燀章善反宰夫和之齊之以味濟其不及以洩其過林宰夫治庖之官杜濟益也洩減也齊才細反又如字君子食之以平其心杜味和則心自平君臣亦然杜亦如羮君所謂可而有否焉杜否不可也臣獻其否以成其可獻君之否以成君可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心故詩曰亦有和羮既戒既平杜詩頌殷中宗言中宗能與賢者和齊可否其政如羮敬戒且平和羮備五味異於大羮鬷嘏無言時靡有爭杜鬷總也嘏大也言總大政能使上下皆如和羮鬷子工反嘏古雅反先王之濟五味杜濟成也和五聲也以平其心成其政也林聲味皆和故其心平其心既平其政始成聲亦如味林齊和五聲亦如齊和五味一氣林樂須氣以動故氣居第一二體杜舞者有文武三類杜風雅頌四物杜雜用四方之物以成器五聲杜宫商角徵羽六律黄鐘太簇姑洗㽔賔夷則無射也陽聲為律隂聲為吕此十二月氣七音杜宫商角徴羽變宫變徵也周武王伐紂自午至子凡七日王因此以數合之以聲昭之故以七同其數以律和其聲謂之七音八風林八方之風東北曰條風又名融風東方曰明庶風東南曰清明風南方曰景風又名凱風西南曰涼風西方曰閶闔風西北曰不周風北方曰廣莫風九歌林九功之徳皆可歌也六府三事謂之九功水火金木土穀謂之六府正徳利用厚生謂之三事以相成也言此九者合然後相成為和樂清濁小大短長疾徐哀樂剛柔遲速高下出入周疏以相濟也杜周密也樂音洛下同君子聴之以平其心心平徳和故詩曰徳音不瑕杜詩豳風也義取心平則徳音無瑕闕今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之専壹誰能聴之同之不可也如是飲酒樂公曰古而無死其樂若何晏子對曰古而無死則古之樂也君何得焉昔爽鳩氏始居此地爽鳩氏少皡氏之司冦也季萴因之季萴虞夏諸侯代爽鳩氏者萴仕側反有逢伯陵因之逢伯陵殷諸侯姜姓蒲姑氏因之蒲姑氏殷周之間代逢公者而後大公因之古若無死爽鳩氏之樂非君所願也杜齊侯甘於所樂志於不死晏子稱古以節其情願大音泰鄭子産有疾謂子大叔曰我死子必為政唯有徳者能以寛服民其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而翫之杜狎輕也鮮息淺反則多死焉故寛難杜難以治疾數月而卒大叔為政不忍猛而寛鄭國多盜取人於萑苻之澤萑苻澤名於澤中刼人萑音丸苻音蒲又如字大叔悔之曰吾早從夫子不及此興徒兵以攻萑苻之盜盡殺之盜少止仲尼曰善哉政寛則民慢慢則糾之以猛杜糾猶攝也猛則民殘殘則施之以寛寛以濟猛猛以濟寛政事以和詩曰民亦勞止汔可小康恵此中國以綏四方施之以寛也杜詩大雅汔其也康綏皆安也周厲王暴虐民勞於苛政故詩人刺之欲其施之以寛汔詩乙反母從詭隨杜詭人隨人無正心不可從從子用反以謹無良杜謹勑慎也式遏冦虐慘不畏明糾之以猛也杜式用也遏止也慘曾也言為宼虐曽不畏明法者亦當用猛政糾治之慘七感反柔逺能邇以定我王平之以和也杜柔安也邇近也逺者懷附近者各以能進則王室定又曰不競不絿不剛不柔杜詩殷頌言湯政得中和競强也絿急也絿音求布政優優百禄是遒杜優優和也遒聚也遒在由反又子國反和之至也及子産卒仲尼聞之出涕曰古之遺愛也杜子産見愛有古人之遺風經庚辰二十有一年春王三月葬蔡平公夏晉侯使士鞅來聘晉頃公即位通嗣君宋華亥向寧華定自陳入于宋南里以叛自外至故曰入據其邑故曰叛南里宋城内里名秋七月壬午朔日有食之八月乙亥叔輒卒叔弓之子伯張冬蔡侯朱出奔楚杜朱為太子則失位遂微弱為國人所逐故以自出為文林朱奔悼公東國立公如晉至河乃復晉人辭公故還𫝊二十一年春天王將鑄無射周景王也無射鐘名律中無射射音亦泠州鳩曰王其以心疾死乎杜泠樂官州鳩其名也泠力丁反夫樂天子之職也杜制禮作樂天子職所當主夫音樂之輿也樂因音而行而鐘音之器也音由器以發天子省風以作樂杜省風俗作樂以移之器以鍾之鍾聚也以器聚音輿以行之杜樂須音而行小者不窕林小者不至於窕細而不满窕他彫反大者不槬林大者不至於槬横而不入槬戸化反則和於物物和則嘉成林小大適均則能和物物既平和則嘉樂告成故和聲入於耳而藏於心心億則樂億安也樂音洛窕則不咸槬則不容心是以感感實生疾今鍾槬矣王心弗堪其能久乎林窕細則不充满於人心横大則心不堪容不满不容然後感於人心心有所感則隨所感而生七情之疾今無射之鐘槬而横大矣王心將不堪容其能久居其位乎杜為明年天王崩傳咸如字或作感户暗反三月葬蔡平公蔡大子朱失位位在卑杜不在適子位以長幼齒大夫送葬者歸見昭子昭子問蔡故以告林大夫以大子失位對昭子歎曰蔡其亡乎若不亡是君也必不終詩曰不解于位民之攸暨杜詩大雅暨息也林言不懈怠於其職位民之所由安息也解佳賣反暨許器反今蔡侯始即位而適卑身將從之林蔡侯即大子朱始即君位而長㓜齒序位適在卑則其身將従之而卑杜為蔡侯朱出奔傳夏晉士鞅來聘叔孫為政叔孫昭子以三命為國政季孫欲惡諸晉杜憎叔孫在已上位欲使得罪於晉惡烏路反使有司以齊鮑國歸費之禮為士鞅鮑國歸費在十四年牢禮各如其命數魯人失禮故為鮑國七牢費音祕士鞅怒曰鮑國之位下其國小而使鞅從其牢禮是卑敝邑也將復諸寡君林言將告于晉君而討魯罪魯人恐加四牢焉為十一牢言魯不能以禮事大國且為哀末年吴徵百牢起宋華費遂生華貙華多僚華登貙為少司馬多僚為御士杜公御士貙勑俱反少詩照反與貙相惡乃譛諸公曰貙將納亡人杜亡人茟亥等惡如字又烏路反亟言之公曰司馬以吾故亡其良子杜司馬謂費遂為大司馬良子謂華登林前年奔吳亟欺冀反死亡有命吾不可以再亡之對曰君若愛司馬則如亡杜君若愛大司馬則當亡走失國死如可逃何逺之有杜言亡可以逃死勿慮其逺以恐動公公懼使侍人召司馬之侍人宜僚飲之酒而使告司馬杜告司馬使逐貙飲於鳩反下同司馬歎曰必多僚也林言此必多僚讒譛之所為吾有讒子而弗能殺吾又不死抑君有命可若何乃與公謀逐華貙能使田孟諸而遣之公飲之酒厚酬之林元公既與費遂定謀乃飲華貙以酒厚以酒幣侑歡賜及從者司馬亦如之杜亦如公賜從才用反張匄尤之張匄華貙臣尤怪賜之厚匄古害反曰必有故使子皮承宜僚以劒而訊之林訊問也子皮即華貙以劒脅宜僚下問其詳委宜僚盡以告杜告欲因田以遺之張匄欲殺多僚子皮曰司馬老矣登之謂甚杜言登亡傷司馬心已甚吾又重之不如亡也五月丙申子皮將見司馬而行則遇多僚御司馬而朝張匄不勝其怒遂與子皮曰任鄭翩殺多僚杜任翩亦貙家臣重直用反見賢遍反勝音升任音壬刼司馬以叛而召亡人壬寅華向入樂大心豐愆華牼禦諸横杜梁國睢陽縣南有横亭愆起䖍反華氏居盧門以南里叛杜盧門宋東城南門六月庚午宋城舊鄘及桑林之門而守之杜舊鄘故城也桑林城門名秋七月壬午朔日有食之公問於梓慎曰是何物也禍福何為物事也對曰二至二分杜二至冬至夏至二分春分秋分日有食之不為災日月之行也分同道也至相過也杜二分日夜等均曰同道二至長短極故相過其他月則為災陽不克也故常為水隂侵陽是陽不勝隂於是叔輒哭日食意在於憂災昭子曰子叔將死非所哭也林非其所當哭而哭之精爽己逝矣八月叔輒卒林如昭子之言冬十月華登以吴師救華氏登前年奔吴齊烏枝鳴戍宋林烏枝鳴齊大夫助宋戍守厨人濮曰杜濮宋厨邑大夫軍志有之先人有奪人之心後人有待其衰林先事而掩人者奪其心志也後事而勝人者待其衰竭也先悉薦反後戸豆反盍及其勞且未定也伐諸若入而固則華氏衆矣林何不早及吴師逺來之勞若且營壘未定先伐吴師若吴師得入南里為城以為固則華氏益以吴師不勝衆矣悔無及也從之丙寅齊師宋師敗吴師于鴻口杜梁國睢陽縣東有鴻口亭獲其二帥公子苦翎偃州員二帥吴大夫帥色類反翎古含反員音云又音圓華登帥其餘杜吴餘師以敗宋師林宋師恃勝故華登復敗之公欲出杜出奔厨人濮曰吾小人可藉死杜可藉使死難而不能送亡君請待之請君待復戰決勝負而不能送亡君絶句乃徇日揚徽者公徒也杜徵識也衆從之林衆從其言皆揚徵以自别公自揚門見之杜見國人皆揚徽睢陽正東門名揚門下而巡之曰國亡君死二三子之恥也豈專孤之罪也林言宋國若亡君死於難此大夫國人之所共恥也豈專孤一人之罪蓋元公以此言激勵其衆齊烏枝鳴曰用少莫如齊致死齊致死莫如去備杜備長兵也林言以少擊衆莫如齊致其死力齊致死力莫如去長兵用短兵彼多兵矣請皆用劔從之華氏北復即之杜北敗走厨人濮以裳裹首而荷以走曰得華登矣林厨人濮以下衣裹死人首而荷其首以走詐言得華登之首矣荷何可反又音何遂敗華氏于新里新里華氏所取邑翟僂新居于新里既戰説甲于公而歸林翟僂新公臣杜居華氏地而助公戰僂力主反説他活反華姓居于公里亦如之杜姓華氏族故助華氏亦如僂新説甲歸傳言古之為軍不皆小忿姓他口反十一月癸未公子城以晉師至城以前年奔晉今還救宋曺翰胡曺大夫翰音寒又戸旦反㑹晉荀吴中行穆子齊苑何忌齊大夫衛公子朝前年出奔晉今還衛救宋丙戌與華氏戰于赭丘赭丘宋地赭音者鄭翩願為鸛其御願為鵝杜鄭翩華氏黨鸛鵝皆陳名子禄御公子城莊堇為右杜子禄向宜堇音謹干犨御吕封人華豹張匄為右杜吕封人華豹華氏黨犨尺由反相遇城還華豹曰城也城怒而反之杜怒其呼己反還戰將注豹則闗矣杜注傅矢闗引弓闗烏環反曰平公之靈尚輔相余杜平公公子城之父相息亮反豹射出其間出子城子禄之間射食亦反又食夜反下同將注則又闗矣曰不狎鄙杜狎更也林城謂豹曰若不與我更射則汝為鄙夫抽矢豹止不射城射之殪豹死殪一計反張匄抽殳而下殳長丈二在車邊殳音殊射之折股扶伏而撃之折軫林城射張匄折匄之股張匄力疾匍匐撃公子城折城車軫折之設反下同扶伏並如字又上音蒲北反或作匍匐同又射之死匄死干犨請一矢林干犨棄豹車御求一矢恨死城曰余言女於君欲活之女音汝對曰不死伍乗軍之大刑也林同乗具伍死則皆死今干犨同軍三人其二已死故曰不死伍乗乗繩證反下同干刑而從子君焉用之子速諸乃射之殪犨又死焉於䖍反大敗華氏圍諸南里華亥搏膺而呼林膺胷也搏音博見華貙曰吾為欒氏矣林晉欒盈還入作亂而死事在襄二十三年言我舉事不成而死與欒氏同矣貙曰子無我廷不幸而後亡林廷恐也言汝無恐我事至不幸而後奔亡未至死滅迋求枉反使華登如楚乞師華貙以車十五乗徒七十人犯師而出犯公師出送華登食於睢上哭而送之乃復入杜入南里睢音雖楚薳越帥師將逆華氏大宰犯諫曰林犯楚大宰薳于委反諸侯唯宋事其君林言諸侯之國皆有君臣之亂惟宋猶能事其君今又爭國釋君而臣是助無乃不可乎王曰而告我也後既許之矣杜為明年華向出奔楚傳蔡侯朱出奔楚費無極取貨於東國杜東國隠大子之子平侯廬之弟朱叔父也而謂蔡人曰朱不用命於楚君王將立東國若不先從王欲楚必圍蔡蔡人懼出朱而立東國朱愬于楚楚子將討蔡無極曰平侯與楚有盟故封盟于鄧依陳蔡人以國其子有二心故廢之杜子謂朱也靈王殺隠大子其子與君同惡杜楚靈王殺蔡世子有在十一年平侯與公子比彀靈王故言隱大子之子與君同惡徳君必甚又使立之不亦可乎且廢置在君蔡無他矣言權在楚則蔡無他患公如晉及河鼓叛晉杜晉克鼓在十五年至是鼓又叛晉屬鮮虞晉將伐鮮虞故辭公杜將有軍事無暇於待諸侯故辭公歸左傳杜林合注卷四十
