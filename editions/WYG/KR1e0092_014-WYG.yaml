body:
  text: 左傳杜林合注卷十四明王道焜趙如源同編僖公六經庚寅二十有九年春介葛盧來杜介東夷國也在城陽黔陬縣葛盧介君名也不稱朝不見公且不能行朝禮雖不見公國賓禮之故書介音戒公至自圍許杜無傳夏六月㑹王人晉人宋人齊人陳人蔡人秦人盟於翟泉杜翟泉在洛陽城内大倉西南池水也魯侯諱盟天子大夫諸侯大夫又違禮盟公侯王子虎違禮下盟故不言公㑹又皆稱人翟直厯反秋大雨雹雨十付反傳同雹蒲學反冬介葛盧來傳二十九年春介葛盧來朝舍於昌衍之上杜魯縣東南有昌平城衍以善反公在㑹林時公㑹圍許未返國饋之芻米禮也杜嫌公行不當致饋故曰禮也饋其媿反芻初俱反夏公㑹王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憖盟於翟泉尋踐土之盟且謀伐鄭也杜經書蔡人而傳無名氏即微者秦小子憖在蔡下者若宋向戌之後㑹轅音袁濤音桃憖魚覲反卿不書罪之也杜晉侯始霸翼戴天子諸侯輯睦王室無虞而王子虎下盟列國以瀆大典諸侯大夫上敵公侯虧禮傷教故貶諸大夫諱公與盟在禮卿不㑹公侯㑹伯子男可也林在㑹盟之禮公侯爵尊卿不敢敵之㑹盟大國之卿當小國之君故可以㑹伯子男諸卿之見貶亦兼有此闕故傳重發之秋大雨雹為災也林周之秋今之五六七月也故為災冬介葛盧來以未見公故復來朝禮之加燕好杜燕燕禮也好好貨也一歲再來故加之復扶又反好呼報反介葛盧聞牛鳴曰是生三犧皆用之矣其音云問之而信林葛盧能識其聲曰是牛已生三犢皆為犧用之宗廟之祭矣其聲如此試問之牧人果然傳言人聽或通鳥獸之情犧許宜反經卒邜三十年春王正月夏狄侵齊秋衛殺其大夫元咺及公子瑕杜咺見殺稱名者訟君求直又先歸立公子瑕非國人所與罪之也瑕立經年未㑹諸侯故不稱君衛侯鄭歸於衛杜魯為之請故從諸侯納之例例在成十八年晉人秦人圍鄭杜晉軍函陵秦軍氾南各使微者圍鄭故稱人林於是秦伯私與鄭盟戍鄭而去之秦晉之怨自此始介人侵蕭杜無傳林蕭宋附庸國冬天王使宰周公來聘杜周公天子三公兼冢宰也公子遂如京師遂如晉杜如京師報宰周公林魯始聘周聘晉傳三十年春晉人侵鄭以觀其可攻與否狄聞晉之有鄭虞也夏狄侵齊林狄以晉有鄭之憂乃乘其間隙杜齊晉與國間間厠之間晉侯使醫衍酖衛侯杜衍醫名晉侯實怨衛侯欲殺而罪不及死故使醫因治疾而加酖毒衍以善反酖音鴆甯俞貨醫使薄其酖不死杜甯俞視衛侯衣食故得知之公為之請納玉於王與晉侯皆十㲄王許之杜雙玉曰㲄公本與衛同好故為之請為于偽反㲄音角秋乃釋衛侯衛侯使賂周歂冶厪曰苟能納我吾使爾為卿杜恐元咺距已故賂周冶歂市專反冶音也厪音覲又音謹人名也漢書音義云古勤字也鄭氏音勤周冶殺元咺及子適子儀林子適即公子瑕杜子儀瑕毋弟不書殺賤也適丁厯反公入祀先君周冶既服將命杜服卿服將入廟受命周歂先入及門遇疾而死杜及廟門忽遇暴疾而死冶厪辭卿杜見周歂死而懼九月甲午晉侯秦伯圍鄭以其無禮於晉杜文公亡過鄭鄭不禮之且貳於楚也晉軍函陵秦軍氾南杜此東氾也在滎陽中牟縣南佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退杜佚之孤燭之武皆鄭大夫佚音逸公從之辭曰臣之壯也猶不如人今老矣無能為也已林蓋怨其不用而卑辭以拒之也公曰吾不能早用子今急而求子是寡人之過也然鄭亡子亦有不利焉林若鄭國為晉秦所㓕則子之宗族家室亦有所不免於害許之夜縋而出杜縋縣城而下縋丈偽反見秦伯曰秦晉圍鄭鄭既知亡矣若亡鄭而有益於君敢以煩執事杜執事亦謂秦越國以鄙遠君知其難也林鄭在東秦在西晉居其間杜設得鄭以為秦邊邑則越晉而難保焉用亡鄭以陪鄰林安用㓕鄭而以其土地陪益鄰國鄰謂晉也焉於䖍反下焉取之同陪蒲冋反鄰之厚君之薄也若舍鄭以為東道主行李之往來共其乏困林鄭在東故言東道主行李使人也乏闕也困憊也言供其舍館資量之闕乏舍音捨又如字共音恭本亦作供君亦無所害且君嘗為晉君賜矣許君焦瑕朝濟而夕設版焉君之所知也杜晉君謂恵公也焦瑕晉河外五城之二邑朝濟河而夕設版築以距秦言背秦之速朝如字版音板夫晉何厭之有既東封鄭又欲肆其西封杜封疆也肆申也林既滅鄭以其土地為東方封疆之界又欲申廣其西方之封土厭於鹽反若不闕秦將焉取之闕秦以利晉唯君圖之林闕猶削小也若不削小秦之土地將安所從取之言晉强必為秦害秦伯説與鄭人盟使杞子逢孫揚孫戍之乃還杜三子秦大夫反為鄭守説音悦子犯請擊之公曰不可微夫人之力不及此杜請擊秦也夫人謂秦穆公夫音扶因人之力而敝之不仁失其所與不知林秦不同心而與之共事是失也知音智以亂易整不武杜秦晉和整而還相攻更為亂也吾其還也亦去之初鄭公子蘭出犇晉杜蘭鄭穆公從於晉侯伐鄭請無與圍鄭林蘭自以鄭為宗國請於晉文公不與於圍鄭之役與音預許之使待命于東杜晉東界鄭石甲父侯宣多逆以為大子以求成于晉晉人許之杜二子鄭大夫言穆公所以立冬王使周公閲來聘饗林天子之三公也名閱來聘魯僖公為設享禮閲音悦有昌歜白黒形鹽杜昌歜昌蒲葅白熬稻黑熬黍形鹽鹽形象虎歜在感反辭林宰閲辭禮曰國君文足昭也武可畏也則有備物之享以象其德薦五味羞嘉穀鹽虎形杜嘉穀熬稻黍也以象其文也鹽虎形以象武也以獻其功吾何以堪之東門襄仲將聘于周遂初聘于晉林東門襄仲即公子周遂杜公既命襄仲聘未行故曰將又命自周聘晉故曰遂自入春秋魯始聘晉故曰初經壬辰三十有一年春取濟西田杜晉分曹田以賜魯故不繋曹不用師徒故曰取公子遂如晉夏四月四卜郊不從乃免牲杜龜曰卜不從不吉也卜郊不吉故免牲免猶縱也林諸侯之有郊禘東周之僣禮也魯之郊禘恵公請之猶未率以為常僖公始作頌以誇其盛於是四卜不從猶三望故特書以示譏猶三望杜三望分野之星國中山川皆因郊祀望而祭之魯廢郊天而修其小祀故曰猶猶者可止之辭秋七月冬杞伯姬來求婦杜無傳自為其子成昬秋圍衛十有二月衛遷于帝丘杜辟狄難也帝丘今東郡濮陽縣故帝顓頊之墟故曰帝丘傳三十一年春取濟西田分曹地也杜二十八年晉文討曹分其地竟界未定至是乃以賜諸侯使臧文仲往林魯使臧文仲往晉受地宿于重館杜高平方與縣西北有重鄉城重直龍反重館人告曰晉新得諸侯必親其共不速行將無及也林言晉文公新得諸侯為伯必親䁥其恭順有禮之人文仲若不速行則先至者受地已盡後至者將無及於事從之分曹地自洮以南東傅于濟盡曹地也杜文仲不書請田而已非聘享㑹同也濟水自滎陽東過魯之西至樂安入海洮吐刀反傅音附盡津忍反襄仲如晉拜曹田也夏四月四卜郊不從乃免牲非禮也杜諸侯不得郊天魯以周公故得用天子禮樂故郊為魯常祀林左氏以郊為魯之常祀故以不郊免牲為非禮其説未得為正然直解當從其文姑置勿論可也猶三望亦非禮也林左氏亦以廢郊而望為非禮不卜常祀林常祀不卜必以其時而卜其牲日杜卜牲與日知吉凶牛卜日曰牲杜既得吉日則牛改名曰牲牲成而卜郊上怠慢也林蓋卜牛在卜日之前今經書免牲則是既得吉日改牛名牲矣方復卜郊之可否是上之人怠於古典而慢瀆龜䇿望郊之細也林望祭山川郊禮之細㣲者也不郊亦無望可也秋晉蒐于清原作五軍以禦狄杜二十八年晉作三行今罷之更為上下新軍河東聞喜縣北有清原趙衰為卿杜二十七年命趙衰為卿讓於欒枝今始從原大夫為新軍帥冬狄圍衛衛遷于帝丘卜曰三百年林灼龜曰卜言都帝丘有三百年之安衛成公夢康叔曰相奪予享杜相夏后啓之孫居帝丘享祭也日音越或人實反相息亮反下同公命祀相甯武子不可曰鬼神非其族類不歆其祀杜歆猶饗也歆許金反杞鄫何事杜言杞鄫夏後自當祀相相之不享於此久矣非衛之罪也杜言帝丘久不祀相非衛所絶不可以間成王周公之命祀林成王周公封建諸侯諸侯以受命各有常祀不可以間其祀命間間厠之間請改祀命杜改祀相之命鄭洩駕惡公子瑕鄭伯亦惡之故公子瑕出奔楚杜瑕文公子傳為納瑕張本洩駕亦鄭大夫隱五年洩駕距此九十年疑非一人惡烏路反下同經癸巳三十有二年春王正月夏四月己丑鄭伯㨗卒杜無傳文公也三同盟林文公卒穆公蘭立㨗在妾反衛人侵狄杜報前年狄圍衛秋衛人及狄盟杜不地者就狄廬帳盟冬十有二月己夘晉侯重耳卒杜同盟踐土翟泉林晉文公卒子襄公驩立晉襄公繼伯傳三十二年春楚鬭章請平于晉林楚自城濮與晉不平至是請平晉陽處父報之晉楚始通杜陽處父晉大夫晉楚自春秋以來始交使命為和同夏狄有亂衛人侵狄狄請平焉秋衛人及狄盟冬晉文公卒庚辰將殯于曲沃杜殯窆棺也曲沃有舊宫焉出絳杜絳晉都柩有聲如牛杜如牛呴聲柩其救反禮云在牀曰尸在棺曰柩卜偃使大夫拜曰君命大事將有西師過軼我擊之必大㨗焉杜聲自柩出故曰君命大事戎事也卜偃聞秦宻謀故因柩聲以正衆心林秦居西方故言將有西師過古禾反又古卧反軼直結反又音逸杞子自鄭使告于秦杜三十年秦使大夫杞子戌鄭曰鄭人使我掌其北門之管杜管籥也若潛師以來國可得也穆公訪諸蹇叔蹇叔曰勞師以襲遠非所聞也杜蹇叔秦大夫林勞頓兵師以掩襲遠方之國我未聞其能濟事也蹇紀輦反師勞力竭遠主備之無乃不可乎師知所為鄭必知之勤而無所必有悖心林兵師勞苦其力必盡遠方之主必知而為之備言不可以得鄭也秦師既知其所欲為之事鄭國必得而知之秦兵勤勞而無所得必生悖戾之心害及良善悖必内反且行千里其誰不知林自秦至鄭師行千里遠渉傳播其誰不知師之所為公辭焉杜辭不受其言召孟明西乞白乙使出師於東門之外杜孟明百里孟明視西乞西乞術白乙白乙丙蹇叔哭之曰孟子林呼孟明而告之孟子本或作孟兮吾見師之出而不見其入也公使謂之曰爾何知中壽爾墓之木拱矣杜合手曰拱言其過老悖不可用林人生上壽百二十年中壽百年下壽八十年毁之以為汝但中壽汝墓之木已拱死將至矣壽音授又如字拱九勇反蹇叔之子與師哭而送之曰晉人禦師必於殽杜殽在𢎞農澠池縣西林殽即今之函谷闗殽本又作崤户交反劉昌宗音豪殽有二陵焉杜大阜曰陵其南陵夏后臯之墓也杜臯夏桀之祖父夏户雅反臯古刀反其北陵文王之所辟風雨也杜此道在二殽之間南谷中谷深委曲兩山相嶔故可以辟風雨古道由此魏武帝西討巴漢惡其險而更開北山髙道辟音避必死是間杜以其深險故余收爾骨焉秦師遂東林鄭在秦東故秦師東行杜為明年晉敗秦于殽傳經甲午三十有三年春王二月秦人入滑林滑姬姓國滅而書入不能有其地齊侯使國歸父來聘夏四月辛巳晉人及姜戎敗秦師于殽杜晉侯諱背喪用兵故通以賤者告姜戎姜姓之戎居晉南鄙戎子駒支之先也晉人角之諸戎犄之不同陳故言及林晉秦七十二年之爭始於殽而終於十三國之伐癸巳葬晉文公狄侵齊公伐邾取訾婁訾子斯反秋公子遂帥師伐邾晉人敗狄于箕杜大原陽邑縣南有箕城郤缺稱人者未為卿冬十月公如齊十有二月公至自齊乙巳公薨于小寢杜小寢内寢也乙巳十一月十二日經書十二月誤隕霜不殺草李梅實杜無傳書時失也周十一月今九月霜當微而重重而不能殺草所以為災隕于敏反晉人陳人鄭人伐許傳三十三年春秦師過周北門左右免胄而下杜王城之北門冑兠鍪兵車非大將御者在中故左右下御不下胄直救反超乘者三百乘林超乘謂超上車而乘之葢左右免胄而下超乘而上欲其速也乘繩證反王孫滿尚㓜觀之言于王曰秦師輕而無禮必敗杜謂過天子門不卷甲束兵超乘示勇輕遣政反下同輕則寡謀無禮則脱林輕狂則謀慮必然寡少無禮則待敵必然踈脫杜脫易也脫他活反入險而脱又不能謀能無敗乎林入險地而踈脱又無深謀遠慮能不為人所敗乎及滑鄭商人弦高將市於周遇之以乘韋先牛十二犒師林商行賈也弦姓高名將市易於周道遇秦師乘四也韋熟革也古者將獻遺於人必有以先之皆以輕先重此鄭商將獻年於秦故以四韋先先悉薦反犒苦報反曰寡君聞吾子將步師出於敝邑敢犒從者不腆敝邑為從者之淹居則具一日之積行則備一夕之衛林言知孟明將行師出於鄭國敢以十二牛犒勞秦之從者敝邑不甚富厚但為秦從者淹久在外之故若秦師尚留居鄭則為秦異一日芻米薪菜之積若秦師徑行過鄭則為秦備一夕捍禦外侮之衛步猶行也從才用反下同腆他典反為于偽反下同積子賜反且使遽告于鄭林遽傳車猶今之驛逓也告鄭使為備遽其據反鄭穆公使視客館林鄭得商人之報使人視秦杞子等三大夫戍鄭之館舍則束載厲兵秣馬矣杜嚴兵待秦師秣音末穀馬也説文作䬴云食馬穀也使皇武子辭焉林鄭穆公乃使大夫皇武子謝辭秦大夫戍鄭者使去曰吾子淹久於敝邑唯是脯資餼牽竭矣杜資糧也生曰餼牽謂牛羊豕餼許氣反牲腥曰餼牲生曰牽為吾子之將行也杜示知其情鄭之有原圃猶秦之有具囿也杜原圃具囿皆囿名圃布古反吾子取其麋鹿以閒敝邑若何杜使秦戍自取麋鹿以為行資令敝邑得閒睱若何猶如何滎陽中牟縣西有圃田澤麋亡悲反閒音閑杞子奔齊逢孫楊孫奔宋林杞子即秦大夫戍鄭而掌鄭人北門之管者知謀泄故奔齊二子亦秦大夫與杞子同戍者同謀不濟不敢歸秦故亦奔宋孟明曰鄭有備矣不可冀也林不可冀望其國攻之不克圍之不繼林攻而伐之則有備不可必勝環而圍之則兵少奠有後繼吾其還也滅滑而還林此蹇叔所謂勤而無所必有悖心者也齊國莊子來聘林即國歸父自郊勞至于贈賄禮成而加之以敏杜迎來曰郊勞送去曰贈賄敏審當於事勞力報反賄呼罪反臧文仲言於公曰國子為政齊猶有禮君其朝焉臣聞之服於有禮社稷之衛也杜為公如齊傳晉原軫曰秦違蹇叔而以貪勤民天奉我也杜奉與也林秦違棄蹇叔之忠諌而以貪於得鄭勤勞其民是天與我以勝秦之機㑹奉扶用反下同奉不可失敵不可縱縱敵患生違天不祥必伐秦師欒枝曰未報秦施而伐其師其為死君乎杜言以君死故忘秦施縱子用反施始豉反下同先軫曰秦不哀吾喪而伐吾同姓秦則無禮何施之為杜言秦以無禮加已施不足顧吾聞之一日縱敵數世之患也謀及子孫可謂死君乎杜言不可謂背君數所主反遂發命遽興姜戎林以𫝊車起姜戎之兵欲速也子墨衰絰林晉文公未葬故襄公稱子以凶服從戎故墨染其衰而加絰衰七雷反絰直結反梁𢎞御戎萊駒為右夏四月辛巳敗秦師于殽獲百里孟明視西乞術白乙丙以歸遂墨以葬文公晉於是始墨杜後遂常以為俗記禮所由變萊音來文嬴請三帥杜文嬴晉文公始適秦秦穆公所妻夫人襄公嫡母三帥孟明等嬴音盈帥所類反曰彼實搆吾二君寡君若得而食之不厭君何辱討焉使歸就戮于秦以逞寡君之志若何林言彼三帥實交搆我秦晉二君致有今日之敗秦君怨此三人若生得而食其肉猶未厭足於腹何辱晉君執而戮之使三帥歸秦以就刑戮使秦君得快意戮之如何厭於艶反又於鹽反戮音六选勑領反公許之先軫朝問秦囚公曰夫人請之吾舍之矣先軫怒曰武夫力而拘諸原婦人暫而免諸國杜暫猶卒也拘音俱墮軍實而長宼讐林墮毁晉國之軍實而崇長秦人之宼讐墮許規反長丁丈反亡無日矣不顧而唾林不顧襄公在前而咳唾於地此無禮之甚也唾他卧反公使陽處父追之及諸河則在舟中矣釋左驂以公命贈孟明林矯稱襄公命已以馬贈孟明欲使還拜謝因而執之驂七南反孟明稽首林孟明知其詐乃遥於舟中稽首拜命曰君之惠不以纍臣釁鼓杜纍囚繫也殺人以血塗鼓謂之釁鼓纍律追反釁許覲反使歸就戮于秦寡君之以為戮死且不朽林若秦君治亡師之罪加之以戮此身雖死此心感恩終不朽腐若從君惠而免之三年將拜君賜杜意欲報伐晉秦伯素服郊次杜待之於郊鄉師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也大夫何罪且吾不以一𤯝掩大德林降名稱孤云孤實違棄蹇叔之忠諌致子三帥困辱於晉此皆我之罪戾不廢孟明之師而使之取敗此皆我之過失孟明何罪之有且三帥皆賢吾終不以一敗之小過而掩其終身之大徳鄉許亮反替他計反𤯝所景反掩於檢反狄侵齊因晉喪也林齊晉之與國因晉有文公之喪也公伐邾取訾婁以報升陘之役杜在二十二年邾人不設備林魯帥退而邾人伏不設戰守之備秋襄仲復伐邾杜魯亦因晉以陵小國復扶又反狄伐晉林乘晉喪及箕八月戊子晉侯敗狄于箕郤缺獲白狄子杜白狄狄别種也故西河郡有白部胡林白狄之君子爵也箕音基先軫曰匹夫逞志於君杜謂不顧而唾而無討敢不自討乎免胄入狄師死焉林力戰而死狄人歸其元杜元首也面如生杜言其有異於人初臼季使過冀見冀缺耨其妻饁之杜臼季胥臣也冀晉邑耨鋤也野饋曰饁林冀缺即郤缺耨耘苖也臼具九反使所吏反過古禾及耨乃豆反饁于輒反字林于劫反敬相待如賓與之歸林胥臣知其賢乃與郤缺俱歸晉國言諸文公曰敬德之聚也能敬必有德德以治民林唯有德者可以治民君請用之臣聞之出門如賓杜如見大賓承事如祭杜常謹敬也仁之則也林主一如此是為仁之法則公曰其父有罪可乎杜缺父冀苪欲殺文公在二十四年對曰舜之罪也殛鯀其舉也興禹林鯀湮洪水舜加之罪殛鯀于羽山鯀之子曰禹能治水舜復舉而用之管敬仲桓之賊也實相以濟林管仲射齊桓公中𢃄鈎故曰賊實相桓公以濟伯業康誥曰父不慈子不祇兄不友弟不共不相及也杜康誥周書祗敬也林言康誥各正其罪不以父罪而及其子弟罪而及其兄也詩曰采葑采菲無以下體君取節焉可也杜詩國風也葑菲之菜上善下惡食之者不以其惡而棄其善言可取其善節文公以為下軍大夫反自箕襄公以三命命先且居將中軍杜且居先軫之子其父死敵故進之林周禮三命受位以再命命先茅之縣賞胥臣曰舉郤缺子之功也杜先茅絶後故取其縣以賞胥臣林周禮再命受服以一命命郤缺為卿復與之冀杜還其父故邑亦未有軍行杜雖登卿位未有軍列冬公如齊朝且弔有狄師也林朝於齊昭公且弔齊為狄所侵反薨於小寢即安也杜小寢夫人寢也譏公就所安不終于路寢晉陳鄭伐許討其貳於楚也林討其從楚不肯服晉楚令尹子上侵陳蔡林子上即鬭勃陳蔡成杜陳蔡與楚為成遂伐鄭將納公子瑕杜三十一年瑕奔楚門于桔柣之門瑕覆于周氏之汪林桔柣鄭門名杜車傾覆池水中外僕髠屯禽之以獻林鄭之外僕髠髪而名也者禽瑕殺之以其尸獻鄭伯文夫人斂而葬之鄫城之下杜鄭文公夫人也鄫城故鄫國在滎陽宻縣東北傳言穆公所以遂有國晉陽處父侵蔡杜蔡即楚故楚子上救之與晉師夾泜而軍杜泜水出魯陽縣東經襄城定陵入汝陽子患之使謂子上曰吾聞之文不犯順武不違敵林有文徳者不肯犯順意謂相約涉水而伐其師是犯順也文者必不肯為有武德者不肯棄敵意謂相約退舍而自棄去是違敵也武者必不肯為子若欲戰則吾退舍子濟而陳杜欲辟楚使渡成陳而後戰遲速唯命不然紓我杜紓緩也老師費財亦無益也杜師久為老乃駕以待林駕馬於車以待楚之命子上欲涉大孫伯曰林即成大心子玉之子不可晉人無信半涉而薄我悔敗何及不如紓之乃退舍杜楚退欲使晉渡陽子宣言曰楚師遁矣遂歸楚師亦歸太子商臣譖子上曰受晉賂而辟之楚之恥也罪莫大焉王殺子上杜商臣怨子上止王立已故譖之葬僖公緩杜文公元年經書四月葬僖公僖公實以今年十一月薨并閏七月乃葬故傳云緩自此以下遂因説作主祭祀之事文相次也皆當次在經葬僖公下今在此簡編倒錯作主非禮也杜文二年乃作主遂因葬文通譏之凡君薨葬哭而祔祔而作主特祀於主材既葬及虞則免喪故曰卒哭哭止也以新死之神祔之於祖尸柩已遠孝子思慕故造木主立几筵焉特用喪禮祭祀於寢不同之於宗廟言凡君者謂諸侯以上不通於卿大夫烝嘗禘於廟杜冬祭曰烝秋祭曰嘗新主既立特祀於寢則宗廟四時常祀自如舊也三年禮畢又大禘乃皆同於吉左傳杜林合注卷十四
