body:
  text: 左傳杜林合注卷二十六明王道焜趙如源同編襄公二經丙申八年春王正月公如晉夏葬鄭僖公無傳鄭人侵蔡獲蔡公子燮杜鄭子國稱人刺其無故侵蔡以生國患燮蔡莊公子燮息協反季孫宿㑹晉侯鄭伯齊人宋人衛人邾人于邢丘時公在晉晉悼難勞諸侯唯使大夫聽命故季孫在㑹而公先歸邢徐音刑公至自晉無傳莒人伐我東鄙秋九月大雩冬楚公子貞帥師伐鄭晉侯使士匄來聘傳八年春公如晉朝且聽朝聘之數晉悼復修霸業故朝而稟其多少鄭羣公子以僖公之死也謀子駟子駟先之林謀殺子駟而討其罪子駟乃先羣公子作難先悉薦反又如字夏四月庚辰辟殺子狐子熙子侯子丁杜辟罪也加罪以戮之辟婢亦反熙許其反徐音怡孫擊孫惡出奔衛杜二孫子狐之子庚寅鄭子國子耳侵蔡獲蔡司馬公子燮杜鄭侵蔡欲以求媚於晉子耳子良之子不言敗唯以獲告鄭人皆喜唯子產不順子產子國子不順衆而喜曰小國無文徳而有武功禍莫大焉楚人來討能勿從乎從之晉師必至晉楚伐鄭自今鄭國不四五年弗得寧矣子國怒之曰爾何知國有大命而有正卿童子言焉將為戮矣杜大命起師行軍之命五月甲辰㑹於邢丘以命朝聘之數使諸侯之大夫聽命季孫宿齊髙厚宋向戌衛寗殖諸大夫㑹之杜晉難重煩諸侯故使大夫聽命鄭伯獻捷於㑹故親聽命杜獻蔡捷也大夫不書尊晉侯也晉悼復文襄之業制朝聘之節儉而有禮徳義可尊故退諸侯大夫以崇之莒人伐我東鄙以疆鄫田莒既滅鄫魯侵其西界故伐魯東鄙以正其封疆疆居良反秋九月大雩旱也冬楚子囊伐鄭討其侵蔡也林果如子產之言子駟子國子耳欲從楚子孔子蟜子展欲待晉杜待晉來救子孔穆公子子蟜子游子子展子罕子蟜居表反子駟曰周詩有之曰俟河之清人壽㡬何杜逸詩也言人壽促而河清遲喻晉之不可待林黄河水濁一千年而一清壽音授或如字幾居豈反兆云詢多職競作羅杜兆卜詢謀也職主也言既卜且謀多則競作羅網之難無成功謀之多族民之多違杜族家也林鄭之主謀多有族類民各有心多相違戾事滋無成杜兹益也民急矣姑從楚以紓吾民材紓緩也以紓吾民之死紓音舒晉師至吾又從之敬共幣帛以待來者小國之道也犧牲玉帛待於二竟林犧牲以為盟玉帛以講㑹杜二竟晉楚界上共音恭竟音境以待彊者而庇民焉宼不為害民不罷病不亦可乎林以待晉楚兵力之疆者而服從之以庇吾民晉楚之宼無侵暴之患害鄭國之民無爭戰之罷病庇必利反又音秘不同罷音皮子展曰小所以事大信也小國無信兵亂日至亡無日矣五㑹之信杜謂三年㑹雞澤五年㑹戚又㑹城棣七年㑹鄬八年㑹邢丘今將背之雖楚救我將安用之杜言失信得楚不足貴背音佩親我無成林晉以鄭為同姓之親反不與成鄙我是欲杜楚欲以鄭為鄙邑而反欲與成不可從也杜言子駟不可從不如待晉晉君方明四軍無闕八卿和睦必不棄鄭杜四軍謂上中下新軍也軍有二卿楚師遼逺糧食將盡必將速歸何患焉舍之聞之舍之子展名杖莫如信完守以老楚杖信以待晉不亦可乎林人之可倚杖者莫如誠信完全守備以老楚師倚杖誠信以待晉救如此不亦可乎杖直亮反守手又反或如字下同子駟曰詩云謀夫孔多是用不集杜詩小雅孔甚也集就也言人欲為政是非相亂而不成發言盈庭誰敢執其咎杜言謀者多若有不善無適受其咎咎其九反下同如匪行邁謀是用不得于道杜匪彼也行邁謀謀於路人也不得于道衆無適從請從楚騑也受其咎林騑子駟名子駟決於從楚故請受從楚不當之咎騑芳非反乃及楚平使王子伯駢告于晉杜伯駢鄭大夫駢扶賢反曰君命敝邑修而車賦儆而師徒以討亂畧蔡人不從敝邑之人不敢寧處悉索敝賦以討于蔡林言晉嘗命鄭邑修治汝衆之車兵儆戒汝之師旅徒以討治作亂而侵畧之人蔡人不從晉之命合鄭國之君臣不敢安居悉盡敝邑之兵賦以討蔡人不服之罪杜索盡也索悉各反獲司馬夑獻於邢丘今楚來討曰女何故稱兵于蔡杜稱舉也女音汝焚我郊保郭外曰郊保守也馮陵我城郭杜馮追也林城外曰郭馮皮水反敝邑之衆夫婦男女不遑啓處以相救也遑暇也啓跪也翦焉傾覆無所控告杜翦盡也控引也林言盡有傾危覆滅之憂無所控引而告訴覆芳服反控苦貢反民死亡者非其父兄即其子弟夫人愁痛林凡民之死亡於敵者非其家之父兄長上即其家之子弟卑幼夫人猶人人也夫音扶不知所庇民知窮困而受盟于楚孤也與其二三臣不能禁止杜孤鄭伯不敢不告知武子使行人子員對之曰君有楚命杜見討之命亦不使一介行李告于寡君一介獨使也行李行人也介古賀反而即安于楚林受盟于楚以就便安君之所欲也誰敢違君寡君將帥諸侯以見于城下唯君圖之為明年晉伐鄭傳見賢遍反或如字晉范宣子來聘且拜公之辱杜謝公此春朝告將用師于鄭公享之宣子賦摽有梅杜摽有梅詩召南摽落也梅盛極則落詩人以興女色盛則有衰衆士求之宜及其時宣子欲魯及時共討鄭取其汲汲相赴摽徐扶妙反又扶表反季武子曰誰敢哉杜言誰敢不從命今譬於草木寡君在君君之臭味也林如草木香氣滋味之同者杜言同類歡以承命何時之有林遲速惟命何拘於時武子賦角弓杜角弓詩小雅取其兄弟婚姻無相逺矣賓將出武子賦彤弓彤弓天子賜有功諸侯之詩欲使晉君繼文之業復受彤弓於王彤徒冬反宣子曰城濮之役在僖二十八年濮音卜我先君文公獻功于衡雍受彤弓於襄王以為子孫藏藏之以示子孫雍於用反藏如字徐才浪反匄也先君守官之嗣也敢不承命杜言已嗣其父祖為先君守官不敢廢命欲匡晉君君子以為知禮彤弓之義義在晉君故范匄受之所謂知禮經丁酉九年春宋災天火曰災來告故書夏季孫宿如晉五月辛酉夫人姜氏薨成公母秋八月癸未葬我小君穆姜無傳四月而葬速冬公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭十有二月己亥同盟于戲杜伐鄭而書同盟則鄭受盟可知傳言十一月己亥以長厯推之十二月無己亥經誤戲音羲鄭地楚子伐鄭傳九年春宋災樂喜為司城以為政樂喜子罕也為政卿知將有火災素戒為備火之政使伯氏司里杜伯氏宋大夫司里里宰火所未至徹小屋塗大屋林小屋易徹故徹之以開火道大屋難徹就塗之以殺火勢陳畚挶具綆缶畚簣籠挶土轝綆汲索缶汲器畚音本革器也挶九録反綆古杏反缶方九反備水器杜盆缶之屬量輕重杜計人力所任蓄水潦積土塗巡丈城繕守備杜巡行也丈度也繕治也行度守備之處恐因災有亂蓄敕不反潦音老表火道火起則從其所趣標表之使華臣具正徒華臣華元子為司徒正徒役徒也司徒之所主也令隧正納郊保奔火所隧正官名也五縣為隧納聚郊野保守之民使隨火所起往救之隧音遂使華閲討右官官庀其司杜亦華元之後代元為右師討治也庀具也使具其官屬庀芳婢反向戌討左亦如之杜向戌左師使樂遄庀刑器亦如之杜樂遄司宼刑器刑書林亦具其官屬如左右師遄市專反使皇鄖命校正出馬工正出車備甲兵庀武守杜皇鄭皇父充石之後校正主馬工正主車使各備其官鄖音云校戸教反出如字徐尺遂反守手又反下同使西鉏吾庀府守杜鉏吾大宰也府六官之典吾音魚令司宫巷伯儆宫杜司宫奄臣巷伯寺人皆掌宫内之事二師令四卿正敬享林二師左右二師也卿正卿大夫也二師令四卿之大夫敬用享祀祝宗用馬于四墉祀盤庚于西門之外杜祝大祝宗宗人墉城也用馬祭于四城以禳火盤庚殷王宋之逺祖城積陰之氣故祀之凡天災有幣無牲用馬祀盤庚皆非禮晉侯問於士弱杜弱士渥濁之子莊子曰吾聞之宋灾於是乎知有天道何故杜問宋何故自知天道將災對曰古之火正或食於心或食於咮以出内火是故咮為鶉火心為大火林古之火正掌火有功封為上公祀為貴神心大火東方星也咮鶉火南方栁星也或以火正配食於大火之心星或以火正配食於鶉火之栁星季春建辰之月鶉火星昏在南方則令民放火是謂出火季秋建戌之月大火星伏在日下夜不得見則禁民放火是謂内火咮竹又反徐丁遘反出如字徐尺遂反内如字徐音納鶉音純陶唐氏之火正閼伯居商丘陶唐堯有天下號閼伯髙辛氏之子傳曰遷閼伯于商丘主辰辰大火也今為宋星然則商丘在宋地閼於葛反祀大火而火紀時焉杜謂出内火時相土因之故商主大火杜相土契孫商之祖也始代閼伯之後居商丘祀大火相息亮反商人閱其禍敗之釁必始於火是以曰知其有天道也杜閱猶數也商人數所更厯恒多火災宋是殷商之後故知天道之災必火林日字不必疆為之說釁許靳反公曰可必乎對曰在道國亂無象不可知也林在其君行道與否耳國無道則禍亂生殊無一定之象或多難以興其邦或無難以喪其邦不可必知夏季武子如晉報宣子之聘也宣子聘在八年穆姜薨於東宫太子宫也穆姜淫僑如欲廢成公故徙居東宫事在成十六年始往而筮之遇艮之八杜艮下艮上周禮大卜掌三易然則雜用連山歸藏周易二易皆以七八為占故言遇艮之八林遇艮之八前後説者皆不通遂疆指為連山歸藏周易獨朱文公曰是謂艮之隨蓋五爻皆變推二得易故不變愚按乾爻七九坤爻六八此其大凡也然乾爻用九而不用七坤爻用六而不用八用九故老陽變為少陰用六故老陰變而為少陽不用七八故少陰少陽不變此言遇艮之八蓋艮卦六爻三上以九變初四五以六變惟二得八不變文公之說直發明先儒所未到艮古根反史曰是謂艮之隨杜震下兌上隨史疑占易遇八為不利故更以周易古變爻得隨卦而論之林此變卦蓋艮五爻皆變為隨隨其出也林史謂隨非閑固之卦有出之義君必速出林君謂穆姜必速出不久居東宫姜曰亡亡猶無也亡如字或音無是於周易曰隨元亨利貞无咎杜易筮皆以變者占遇一爻變義異則論彖故姜亦以彖為占也史據周易故指言周易以折之元體之長也亨嘉之㑹也利義之和也貞事之幹也體仁足以長人嘉徳足以合禮利物足以和義貞固足以幹事然故不可誣也是以雖隨无咎林元始也元之為義於時為春於徳為元於五常為仁故曰體之長亨通也亨之為義於時為夏於徳為亨於五常為禮故曰嘉美之㑹也利宜也利之為義於時為秋於徳為利於五常為義故曰利宜之和也貞正也貞之為義於時為冬於徳為貞於五常為智故曰貞事之幹也體仁體元也比而效之謂之體體法於乾之仁乃為君長之道足以長人也得㑹通之嘉乃合於禮也不合禮則非禮豈得為嘉又安得亨乎和於義乃能利物豈有不得其宜而能利物乎貞固所以能幹事也杜言不誣四徳乃遇隨無咎明無四徳者則為淫而相隨非吉事長丁少反嘉徳易作嘉㑹今我婦人而與於亂固在下位而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利棄位而姣不可謂貞林婦人卑於大夫固在下位而有淫亂不仁之事不可謂之體元欲廢成公去季孟是不安靖其國家不可謂之亨嘉作亂而自害其身幽廢於東宫不可謂之利物棄夫人之位而與僑如淫姣不可謂之貞固杜姣淫之别名與音預姣户交反徐如字移叔反音效有四徳者隨而无咎我皆无之豈隨也哉我則取惡能无咎乎必死於此弗得出矣傳言穆姜辯而不德秦景公使士雃乞師于楚林士雃秦大夫雃苦田反將以伐晉楚子許之子囊曰不可當今吾不能與晉爭晉君類能而使之林隨人所能各以其類而任使之舉不失選杜得所選選息戀反官不易方林方猶官也所官之人不變其宜其卿讓於善杜讓勝已者其大夫不失守杜各任其職其上競於教杜奉上命其庶人力於農穡種曰農收曰穡商工皂𨽻不知遷業林商貿遷有無者工執伎者皂𨽻為僕𨽻厮投者杜四民不雜韓厥老矣知罃禀焉以為政林伐韓厥將中軍咨禀韓厥以為晉政范匄少於中行偃而上之使佐中軍林偃遷匄居已上使匄佐中軍偃將上軍少詩照反下同行户郎反韓起少於欒黶而欒黶士魴上之使佐上軍林黶魴讓起起佐上軍黶將下軍魴佐之黶於斬反魏綘多功以趙武為賢而為之佐林武將新軍綘佐新軍君明臣忠上讓下競尊官相讓勞職力競當是時也晉不可敵事之而後可君其圖之王曰吾既許之矣雖不及晉必將出師林雖不及晉國必將出師以踐其言秋楚子師于武城以為秦援林武城楚地秦人侵晉晉饑弗能報也杜為十年晉伐秦傳冬十月諸侯伐鄭鄭從楚也庚午季武子齊崔杼宋皇鄖從荀罃士匄門于鄟門杜鄭城門也三國從中軍鄟音專衛北宫括曹人邾人從荀偃韓起門于師之梁杜師之梁亦鄭城門三國從上軍滕人薛人從欒黶士魴門于北門杜二國從下軍杞人郳人從趙武魏綘斬行栗杜二國從新軍行栗表道樹行如字行道也甲戌師于汜杜衆軍還聚汜汜鄭地東汜汜音凡令於諸侯曰修器備杜兵器戰備盛餱糧杜餱乾食盛音成餱音侯歸老幼示將久師居疾于虎牢杜諸侯已圍鄭虎牢故使諸軍疾病息其中肆𤯝圍鄭林肆緩也眚過也肆赦宥軍之有過𤯝者而後圍鄭杜不事圍鄭逆服不成圍眚生領反徐所幸反鄭人恐乃行成杜與晉成也恐丘勇反中行獻子曰遂圍之以待楚人之救也而與之戰不然無成杜獻子荀偃也恐楚救鄭鄭復屬之知武子曰許之盟而還師以敝楚人敝罷也吾三分四軍杜分四軍為三部與諸侯之銳以逆來者杜來者楚也於我未病楚不能矣晉各一動而楚三來故曰不能猶愈於戰杜勝聚戰暴骨以逞不可以爭言爭當以謀不可以暴骨暴蒲卜反徐扶沃反大勞未艾君子勞心小人勞力先王之制也杜艾息也言當從勞心之勞艾魚廢反又五蓋反諸侯皆不欲戰乃許鄭成十一月己亥同盟於戲鄭服也杜鄭服故言同盟將盟鄭六卿公子騑子駟公子發子國公子嘉子孔公孫輒子耳公孫蠆子蟜蠆敕邁反公孫舍之子展及其大夫門子皆從鄭伯杜門子卿之適子從才用反晉士莊子為載書杜莊子士弱載書盟書曰自今日既盟之後鄭國而不唯晉命是聽而或有異志者有如此盟林如違盟之罰公子騑趨進曰天禍鄭國使介居二大國之間介猶間也介音界大國不加徳音而亂以要之杜謂以兵亂之力強要鄭要一遙反下同使其鬼神不獲歆其禋祀其民人不獲享其士利夫婦辛苦墊隘無所底告墊隘猶委頓底至也歆許今反墊丁念反隘於懈反底音旨自今日既盟之後鄭國而不唯有禮與彊可以庇民者是從而敢有異志者亦如之林亦如此盟誓之罰庇必利反荀偃曰改載書杜子駟亦以所言載於䇿故欲改之公孫舍之曰昭大神要言焉杜要誓以告神若可改也大國亦可叛也林若載書之言可改則大國之人亦可得而叛知武子謂獻子曰我實不徳而要人以盟豈禮也哉非禮何以主盟姑盟而退修徳息師而來終必獲鄭何必今日我之不徳民將棄我豈唯鄭若能休和逺人將至何恃於鄭林言我實無徳可以服鄭而疆要鄭人以為盟誓豈禮之所當然也哉既非有禮何以主諸侯之盟不如且為盟而退修我之徳安我之衆而來討鄭終久必得服鄭何必欲速在於今日我若終於無徳晉國之民亦將棄我豈唯鄭國不肯服晉若能休諸侯之力以和其心逺方之人猶將來至豈恃一鄭以為安哉休許糾反乃盟而還杜遂兩用載書晉人不得志於鄭以諸侯復伐之十二月癸亥門其三門杜三門鄟門師之梁北門也癸亥月五日晉果三分其軍各攻一門復扶又反閏月戊寅濟於陰阪侵鄭杜以長厯參校上下此年不得有閏月戊寅戊寅是十二月二十日疑閏月當為門五日五字上與門合為閏則後學者自然轉日為月晉人三番四軍更攻鄭門門各五日晉各一攻鄭三受敵欲以苦之癸亥去戊寅十六日以癸亥始攻攻輒五日凡十五日鄭故不服而去明日戊寅濟於陰阪復侵鄭外邑陰阪洧津閏月依注讀為門五日阪音反又扶板反次於陰口而還陰口鄭地名子孔曰晉師可擊也師老而勞且有歸志必大克之子展曰不可傳言子展能守信公送晉侯晉侯以公宴于河上問公年林襄公幼小未冠故問公年季武子對曰㑹于沙隨之歲寡君以生林沙隨在成十六年晉侯曰十二年矣是謂一終一星終也杜歲星十二歳而一周天國君十五而生子冠而生子禮也杜冠成人之禮故必冠而後生子冠古亂反下皆同君可以冠矣大夫盍為冠具林大夫謂季武子何不為魯君加冠之具武子對曰君冠必以祼享之禮行之杜祼謂灌鬯酒也享祭先君也盍户臘反祼古亂反以金石之樂節之以鐘磬為舉動之節以先君之祧處之林諸侯以始祖之廟為祧必加冠于先君之廟祧他彫反今寡君在行未可具也請及兄弟之國而假備焉林魯君在于行役未可具備此等禮樂之文還及同姓兄弟之國假借鐘磬之備以行禮晉侯曰諾公還及衛冠于成公之廟杜成公今衛獻公之曽祖父也假鐘磬焉禮也林得冠禮之正楚子伐鄭與晉成故也子駟將及楚平子孔子蟜曰與大國盟口血未乾而背之可乎子駟子展曰吾盟固云唯彊是從今楚師至晉不我救則楚彊矣盟誓之言豈敢背之林盟誓言惟強是從豈敢背叛其言且要盟無質神弗臨也林質主也所臨唯信林神之所臨惟在於有信信者言之瑞也杜瑞符也善之主也是故臨之杜神臨之明神不蠲要盟背之可也林明神不以要盟為蠲潔背戲之盟可也杜蠲潔也乃及楚平公子罷戎入盟同盟于中分杜中分鄭城中里名罷戎楚大夫罷音皮徐音被中如字徐音于仲反楚莊夫人卒杜共王母王未能定鄭而歸晉侯歸謀所以息民魏綘請施舍施恩恵舍勞殺輸積聚以貸林輸盡其積聚以貸借於民積子賜反下同聚才住反貸仲代反自公以下苟有積者盡出之國無滯積杜散在民亦無困人杜不匱乏公無禁利杜與民共亦無貪民杜禮讓行祈以幣更杜祈禱於神以幣易牲賓以特牲杜務崇省器用不作林器用仍舊不作新巧車服從給杜足給事也行之期年國乃有節林晉國上下乃有節度三駕而楚不能與爭杜三駕三興師謂十年師於牛首十一年師於向其秋觀兵於鄭東門自是鄭遂服期音基本亦作朞經戊戌十年春公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光㑹吳于柤杜吳子在柤晉以諸侯往㑹之故曰㑹吳吳不稱子従所稱也柤楚地柤莊加反夏五月甲午遂滅偪陽杜偪陽妘姓國今彭城𫝊陽縣也因柤㑹而滅之故曰遂林此通吳晉往來之道也偪徐甫自反又彼力反公至自㑹無傳楚公子貞鄭公孫輒帥師伐宋晉師伐秦杜荀罃不書不親兵也秋莒人伐我東鄙公㑹晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯杞伯小邾子伐鄭杜齊世子光先至於師為盟主所尊故在滕上林此三駕之一冬盜殺鄭公子騑公子發公孫輒杜非國討當兩稱名氏殺者非卿故稱盜以盜為文故不得言其大夫林盜賤者也以賤者而一曰殺三卿鄭之失政甚矣是故書盜自此始戌鄭虎牢明伐鄭諸侯各受晉命戍虎牢不復為告命故獨書魯戍而不叙諸侯林向也曰虎牢今也曰鄭虎牢何不繫之鄭者為天下城之也繫之鄭者為鄭戌之也是故楚丘不繫之衛緣陵不繫之杞梁山沙麓不繋之晉皆非一國之辭也郱鄑郚繫之杞彭城繫之宋皆一國之亂也楚公子貞帥師救鄭林楚數救鄭矣寅元年蒍賈二年闗椒成九年子重十六年楚子十七年子重公子申皆不書至是始書救鄭以為晉悼復伯楚欲救而不能也是故書救陳見晉之終失陳書救鄭見楚之終失鄭云爾公至自伐鄭無傳傳十年春㑹于柤㑹吳子壽夢也杜夀夢吳子乗夢莫公反三月癸丑齊高厚相大子光以先㑹諸侯于鍾離不敬杜吳子未至光從東道與東諸侯㑹遇非本期地故不書㑹髙厚髙固子也癸丑月二十六日相息亮反下同士莊子曰髙子相大子以㑹諸侯將社稷是衛而皆不敬杜厚與光俱不敬棄社稷也其將不免乎為十九年齊殺髙厚二十五年弑其君光傳夏四月戊午㑹于柤經書春書始行也戊午月一日晉荀偃士匄請伐偪陽而封宋向戌焉林向戊宋大夫以宋常事晉而向戌有賢行故欲封之為附庸荀罃曰城小而固勝之不武弗勝為笑固請丙寅圍之弗克丙寅四月九日孟氏之臣秦董父輦重如役杜堇父孟獻子家臣步挽重車以從師董徐音謹偪陽人啓門諸侯之士門焉杜見門開故攻之縣門發林縣門蓋城門之捍發之以通上下此偪陽人發縣門以閉攻門之士縣音𤣥下同郰人紇抉之以出門者杜門者諸侯之士在門内者也紇郰邑大夫仲尼父叔梁紇也郰邑魯縣東南莝城是也言紇多力抉舉縣門出在内者郰側留反紇恨發反抉烏宂反徐古宂反出如字又尺遂反狄虒彌建大車之輪而蒙之以甲以為櫓杜狄虒彌魯人也蒙覆也櫓大楯林蓋以大車輪蒙甲代大楯之用以示有力虒音斯櫓音魯左執之右拔㦸以成一隊林虒彌左手執車輪蒙甲之櫓右手自拔一㦸自當一隊杜百人為隊隊徒對反徐徒猥反孟獻子曰詩所謂有力如虎者也杜詩邶風也主人縣布堇父登之及堞而絶之林偪陽人縣布於城外以試外勇者秦堇父緣所縣布以登其城偪陽人伺其登城如及女牆則絶斷其布堞音牒徐養涉反隊則又縣之蘇而復上者三林堇父既隊城下則又縣其布以試之堇父蘇醒復縁布而上城者三次隊直類反上時掌反三息暫反又如字主人辭焉乃退杜主人嘉其勇故辭謝不復縣布帶其斷以徇於軍三日杜帶其斷布以示勇斷徒亂反徇似俊反諸侯之師久於偪陽荀偃士匄請於荀罃曰水潦將降懼不能歸杜向夏恐有久雨從丙寅至庚寅二十五日故曰久潦音老請班師班還也知伯怒杜知伯荀罃知音智投之以機出於其間出偃匄之間曰女成二事而後告余杜二事伐偪陽封向戌女音汝下同余恐亂命以不女違杜既成改之為亂命女既勤君而興諸侯牽帥老夫以至于此既無武守而又欲易余罪林既無武功可以執守而又欲變易其罪於我曰是實班師不然克矣杜謂偃匄將言爾余羸老也可重任乎杜不任受女此責羸劣危反重直用反任音壬七日不克必爾乎取之杜言當取女以謝不克之罪五日庚寅月四日荀偃士匄帥卒攻偪陽親受矢石躬在矢石間卒子忍反甲午滅之月八日書曰遂滅偪陽言自㑹也言其因㑹以滅國非之也以與向戌向戌辭曰君若猶辱鎮撫宋國而以偪陽光啓寡君羣臣安矣其何貺如之杜言見賜之厚無過此若専賜臣是臣興諸侯以自封也其何罪大焉敢以死請乃予宋公宋公享晉侯於楚丘請以桑林桑林殷天子之樂名荀罃辭杜辭讓之荀偃士匄曰諸侯宋魯林言諸侯之有宋魯二國於是觀禮林宋王者後魯以周公故皆用天子禮樂故可觀魯有禘樂賓祭用之禘三年大祭則作四代之樂别祭羣公則用諸侯樂禘大計反宋以桑林享君不亦可乎林言魯得以禘樂待賓客而宋得以桑林享晉君舞師題以旌夏林舞師樂師也杜旌夏大旌也題識也以大旌表識其行列題大兮反夏户雅反晉侯懼而退入于房杜旌夏非常卒見之人心偶有所畏林房更衣之舍去旌卒享而還及著雍疾杜晉侯疾也著壅晉地著徐都慮反壅於用反卜桑林見杜祟見於卜兆見賢遍及荀偃士匄欲奔請禱焉杜奔走還宋禱謝荀罃不可曰我辭禮矣彼則以之杜以用也林言我辭桑林之禮矣宋則用之猶有鬼神於彼加之言自當加罪於宋晉侯有間間疾差也以偪陽子歸林子爵也獻于武宫謂之夷俘諱俘中國故謂之夷俘芳夫反偪陽妘姓也使周内史選其族嗣納諸霍人禮也杜霍晉邑内史掌爵祿廢置者使選偪陽宗族賢者令居霍奉妘姓之祀善不滅姓故曰禮也使周史者示有王命師歸孟獻子以秦堇父為右杜嘉其勇力生秦丕兹林堇父生子名丕兹一本作秦不兹事仲尼言堇父以力相尚子事仲尼以德相髙六月楚子囊鄭子耳伐宋師于訾毋杜宋地訾子斯反毋音無庚午圍宋門于桐門林不成圍而攻其城門桐門宋城門名晉荀罃伐秦報其侵也杜侵在九年衛侯救宋杜衛獻公從晉故救宋師于襄牛鄭子展曰必伐衛不然是不與楚也得罪於晉又得罪於楚國將若之何林言必以師伐衛若不伐衛是不専心與楚也既有二心而得罪於晉國又不専心而得罪於楚國將如鄭國何子駟曰國病矣師數出疲病也子展曰得罪於二大國必亡病不猶愈於亡乎諸大夫皆以為然故鄭皇耳帥師侵衛楚令也杜亦兼受楚之勑命也皇耳皇武子孫文子卜追之獻兆於定姜姜氏問繇杜繇兆辭繇直救反曰兆如山陵有夫出征而喪其雄林言繇辭曰兆如山陵之多有大夫出往征討之事而喪失其大夫雄大夫之象喪息浪反下同姜氏曰征者喪雄禦冦之利也林言出征之夫而喪失其雄此禦冦者之所利也禦魚吕反大夫圖之行人追之孫蒯獲鄭皇耳于犬丘蒯孫林父子蒯苦怪反秋七月楚子囊鄭子耳侵我西鄙於魯無所恥諱而不書其義未聞還圍蕭八月丙寅克杜蕭宋邑九月子耳侵宋北鄙孟獻子曰鄭其有災乎師競已甚林競爭競也言鄭師伐魯圍蕭克蕭侵宋爭競已甚周猶不堪競況鄭乎杜周謂天王有災其執政之三士乎鄭簡公幼少子駟子國子耳秉政故知三士任其禍也為下盜殺三大夫傳莒人間諸侯之有事也故伐我東鄙杜諸侯有討鄭之事間間厠之間諸侯伐鄭齊崔杼使大子光先至于師故長於滕大子宜賓之以上卿而今晉悼以一時之宜令在滕侯上故傳從而釋之長丁丈反己酉師于牛首杜鄭也初子駟與尉止有爭將禦諸侯之師而黜其車杜禦牛首師也黜減損林子駟以私憾黜減尉止之車尉止獲又與之爭杜獲囚俘子駟抑尉止曰爾車非禮也杜言女車猶多過制遂弗使獻杜不使獻所獲初子駟為田洫司氏堵氏侯氏子師氏皆喪田焉杜洫田畔溝也子駟為田洫以正封疆而侵四族田洫況域反堵音賭或丁古反喪息浪反下同故五族聚羣不逞之人因公子之徒以作亂杜八年子駟所殺公子熙等之黨於是子駟當國攝君事也子國為司馬子耳為司空子孔為司徒冬十月戊辰尉止司臣侯晉堵女父子師僕帥賊以入晨攻執政於西宫之朝杜公宫殺子駟子國子耳劫鄭伯以如北宫子孔知之故不死子孔公子嘉也知難不告利得其處也為十九年殺公子嘉傳書曰盜言無大夫焉杜尉止等五人皆士也大夫謂卿子西聞盜不儆而出杜子西公孫夏子駟子林不儆戒守備而出儆音景尸而追盜杜先臨尸而追賊盜入於北宫乃歸授甲臣妾多逃器用多喪子產聞盜杜子國子為門者置守門庀羣司杜具衆官庀匹婢反閉府庫慎閉藏完守備成列而後出兵車十七乘千二百七十五人藏才浪反又如字守手又反乘繩證反尸而攻盜於北宫子蟜帥國人助之殺尉止子師僕盜衆盡死侯晉奔晉堵女父司臣尉翩司齊奔宋尉翩尉止子司齊司臣子翩音篇子孔當國代子駟為載書以位序聽政辟杜自羣卿諸司各守其職位以受執政之法不得與朝政林辟法也辟婢亦反大夫諸司門子弗順將誅之子孔欲誅不順者子産止之請為之焚書既止子孔又勸令燒除載書為于為反子孔不可曰為書以定國衆怒而焚之是衆為政也國不亦難乎杜難以至治子產曰衆怒難犯專欲難成合二難以安國危之道也不如焚書以安衆子得所欲杜欲為政也衆亦得安不亦可乎専欲無成犯衆興禍子必從之林専一已之欲不得成功犯衆人之怒必興禍難子必從衆以焚載書乃焚書於倉門之外衆而後定杜不於朝内燒欲使逺近見所燒諸侯之師城虎牢而戌之晉師城梧及制杜欲以偪鄭也不書成魯不與也梧制皆鄭舊地梧音吾士魴魏綘戌之書曰戌鄭虎牢非鄭地也言將歸焉杜二年晉城虎牢而居之今鄭復叛故修其城而置戌鄭服則欲以還鄭故夫子追書繫之于鄭以見晉志鄭及晉平楚子囊救鄭十一月諸侯之師還鄭而南至於陽陵杜還繞也陽陵鄭地還戸闗反徐音患楚師不退知武子欲退曰今我逃楚楚必驕驕則可與戰矣杜武子荀罃林言今我逃避楚師楚必驕侈自大驕則不修守備可以與楚戰矣欒黶曰逃楚晉之恥也合諸侯以益恥不如死我將獨進師遂進己亥與楚師夾潁而軍杜潁水出城陽至下蔡入淮子蟜曰杜公孫蠆諸侯既有成行必不戰矣杜言有成去之志從之將退不從亦退從猶服也退楚必圍我猶將退也林楚見晉退必來圍鄭晉雖見楚圍鄭猶將退師而去不如從楚亦以退之杜以退楚宵涉潁與楚人盟杜夜渡畏晉知之欒黶欲伐鄭師杜伐涉潁者荀罃不可曰我實不能禦楚又不能庇鄭鄭何罪不如致怨焉而還杜致怨為後伐之資禦魚吕反庇必利反今伐其師楚必救之戰而不克為諸侯笑克不可命勝負難要不可命以必克不如還也丁未諸侯之師還侵鄭北鄙而歸杜欲以致怨楚人亦還杜鄭服故也王叔陳生與伯輿爭政二子王卿上輿本又作與音同王右伯輿右助也右音又王叔陳生怒而出奔及河王復之欲奔晉殺史姣以說焉杜說王叔也姣古卯反說音悅又如字不入遂處之杜處叔河上晉侯使士匄平王室王叔與伯輿訟焉杜爭曲直王叔之宰宰家臣與伯輿之大夫瑕禽瑕禽伯輿屬大夫坐獄於王庭獄訟也周禮命夫命婦不躬坐獄訟故使宰與屬大夫對爭曲直士匄聽之王叔之宰曰篳門閨竇之人而皆陵其上其難為上矣杜篳門柴門閨竇小户穿壁為户上銳下方狀如圭也言伯輿微賤之家篳音必閨音圭亦作圭竇音豆瑕禽曰昔平王東遷吾七姓從王牲用備具王賴之而賜之騂旄之盟杜平王徙時大臣從者有七姓伯輿之祖皆在其中主為王備犧牲其祭祀王恃其用故與之盟使世守其職騂旄赤牛也舉騂旄者言得重盟使世守其職騂旄赤牛也舉騂旄者言得重盟不以犬雞從才用反又如字騂息營反字林許營反旄音毛曰世世無失職若篳門閨竇其能來東底乎且王何賴焉言我若貧賤何能來東使王恃其用而與之盟邪底至也底音旨今自王叔之相也政以賄成林隨財賄之多少以制其政相息亮反下同賄呼罪反而刑放於寵林視寵臣之厚簿以専其刑官之師旅不勝其富師旅之長皆受賂勝音升吾能無篳門閨竇乎言王叔之屬富故使吾貧唯大國圖之杜圖猶議也下而無直林在下而無求直之地則何謂正矣正者不失下之直何或作可誤也范宣子曰天子所右寡君亦右之所左亦左之宣子知伯輿直不欲自専故推之於王右音又左音佐左右亦位如字使王叔氏與伯輿合要杜合要辭王叔氏不能舉其契杜理曲無以為答故不能舉其契要之辭契苦計反王叔犇晉不書不告也單靖公為卿士以相王室代王叔左傳杜林合注卷二十六
