body:
  text: 左傳杜林合注卷九明王道焜趙如源同編僖公一公名申莊公之子閔公之兄母成風諡法小心畏懼曰僖周惠王十八年魯僖公八年惠王崩子襄王立鄭文公十四年魯僖公三十二年文公卒子穆公蘭立齊桓公二十七年魯僖公十七年桓公卒寺人貂作亂立無虧僖十八年殺無虧孝公昭立僖二十七年孝公卒弟昭公潘立宋桓公二十三年魯僖公九年桓公卒子襄公兹父立僖十九年盟于曹南宋襄公圖霸僖二十一年為鹿上之盟以求諸侯於楚僖二十二年及楚戰敗于泓二十三年襄公卒子成公王臣立晉獻公十八年魯僖公九年獻公卒子奚齊立冬殺奚齊卓子立僖十年弑卓子惠公夷吾立僖二十三年惠公卒懷公圍立僖二十四年殺懷公文公重耳立僖二十八年使先軫將中軍敗楚人于城濮合諸侯于踐土晉文公主霸魯僖公三十二年文公卒子襄公驩立僖三十三年敗秦于殽晉襄公繼霸是年敗狄于箕先軫卒先日居將中軍衞文公元年魯僖公二十五年文公卒子成公立僖二十八年成公奔楚衞元咺奉叔武以受盟于踐土衞成復歸殺叔武晉人執衞侯衞元咺立公子瑕僖三十年殺瑕衞成公歸衞蔡穆侯十六年魯僖公十四年穆侯卒子莊公甲午立曹昭公三年魯僖公七年昭公卒子共公襄立僖二十八年晉文公執曹伯畀宋人是年曹伯歸曹滕詳見隠公元年魯僖公十九年宋執滕宣公陳宣公三十四年魯僖公十二年宣公卒子穆公款立僖二十八年穆公卒子共公朔立杞杜氏年表武公二十九年入春秋至僖公二十三年始載杞成公卒弟桓公姑容立而攷之史記自武公靖公共公徳公至桓公姑容立共九十六年而無成公一代世本譙周索隠徐廣所説又云惠公生成公桓公名有互異又如春秋所書隠四年伐杞桓二年來朝三年命杞莊三十五年伯姬歸杞傳並不載何公今但當以左傳所載桓公及杜氏年表為正薛魯莊公三十一年載薛伯卒莒詳見隠公元年魯僖公二十六年傳見莒兹平公邾文公七年許穆公三十九年魯僖公四年穆公卒于師僖公業立小邾魯莊公五年書郳黎來至魯僖公七年始書小邾子始爵命也自郳黎來為小邾子天下無未命諸侯矣楚成王十三年魯僖公元年始書楚僖四年齊桓公服楚屈完僖二十二年楚敗宋于泓皆子文為令尹時也僖二十三年子文使子玉為令尹僖二十八年晉敗楚于城濮秦穆公元年魯僖公十五年戰韓始見經僖二十四年納晉文公僖三十三年晉襄公敗秦于殽遂成晉秦七十二年兵爭之始吳詳見隐公元年越詳見隠公元年經壬戌元年春王正月齊師宋師曹伯次于聶北救邢杜齊帥諸侯之師救邢次于聶北者案兵觀釁以待事也次例在莊三年聶北邢地聶女輒反夏六月邢遷于夷儀邢遷如歸故以自遷為辭夷儀邢地齊師宋師曹師城邢杜傳例曰救患分災禮也一事而再列三國於文不可言諸侯師故秋七月戊辰夫人姜氏薨于夷齊人以歸傳在閔二年不言齊人殺諱之書地者明在外薨楚人伐鄭杜荆始改號曰楚八月公會齊侯宋公鄭伯曹伯邾人于檉檉宋地陳國陳縣西北有檉城公及其㑹而不書盟還不以盟告林衣裳之㑹六檉勑呈反九月公敗邾師于偃偃邾地冬十月壬午公子友帥師敗莒師于酈獲莒挐酈魯地挐莒子之弟不書弟者非卿非卿則不應書書嘉季友之功故特書其所獲大夫生死皆曰獲獲例在昭二十三年酈力知反挐女居反又女加反十有二月丁巳夫人氏之喪至自齊杜僖公請而葬之故告於廟而書喪至也齊侯既殺哀姜以其尸歸絶之於魯僖公請其喪而還不稱姜闕文傳元年春不稱即位公出故也杜國亂身出復入故即位之禮有闕公出復入不書諱之也諱國惡禮也杜掩惡揚善義存君親故通有諱例皆當時臣子率意而隠故無深淺常準聖賢從之以通人理有時而聽之可也諸侯救邢實大夫而曰諸侯總衆國之辭邢人潰出奔師杜奔聶北之師也邢潰不書不告也潰戸内反師遂逐狄人具邢器用而遷之師無私焉林具邢器用如歸衛祭服牛羊豕鷄狗門材魚軒乘馬重錦之類杜皆撰具還之無所私取夏邢遷于夷儀諸侯城之救患也凡諸侯救患分災討罪禮也杜侯伯州長也林攘夷狄以禦外患分穀帛以别天災修文告以討有罪此侯伯之禮也分甫問反又如字秋楚人伐鄭鄭即齊故也盟于犖謀救鄭也杜犖即檉也地有二名犖音洛又力角反九月公敗邾師于偃虛丘之戌將歸者也虗丘邾地邾人既送哀姜還齊人殺之因戊虚丘欲以侵魯公以義求齊齊送姜氏之喪邾人懼乃歸故公要而敗之虚起居反冬莒人來求賂林莒以師來臨魯求還慶父之賂公子友敗諸酈獲莒子之弟挐非卿也林古者命郷帥師經書獲挐傳以非卿釋之明挐在行非帥師也嘉獲之也杜莒既不能為魯討慶父受魯之賂而又重來其求無厭故嘉季友之獲而書之公賜季友汶湯之田及費杜汶陽田汶水北地汶水出泰山萊蕪縣西入濟林嘉季友之功故賜以汶陽之田及費傳著季氏之所以盛汶音問費音秘夫人氏之喪至自齊君子以齊人之殺哀姜也爲已甚矣女子從人者也言女子有三從之義在夫家有罪非父母家所冝討也經癸亥二年春王正月城楚丘杜楚丘衛邑不言城衛衞未遷林以魯辭書之不以封衞累齊桓公也以為天下之公義也觀木𤓰以美齊定中以美衛則春秋書楚丘以善辭居然可見矣夏五月辛巳葬我小君哀姜杜無傳反哭成喪故稱小君例在定十五年虞師晉師滅下陽杜下陽虢邑在河東大陽縣晉於此始赴見經滅例在襄十三年秋九月齊侯宋公江人黄人盟于貰貰宋地梁國蒙縣西北有貰城貰與貫字相似江國在汝南安陽縣林衣裳之㑹不在九合之數貰古亂反冬十月不雨傳在三年楚人侵鄭傳二年春諸侯城楚丘而封衞焉杜君死國滅故傳言封不書所會林不書所㑹之諸傒後也諸侯既罷而魯後至諱不及期故以獨城為文晉荀息請以屈産之乘與垂棘之璧假道於虞以伐虢杜荀息荀叔也屈地生良馬垂棘出美玉故以為名四馬曰乗自晉適虢途出於虞故借道屈求勿反又居勿反乘繩證反公曰是吾寳也對曰若得道於虞猶外府也林府庫也言以璧馬與虞終必滅虞而取之猶寄之在外之府庫必無所失公曰宫之竒存焉杜宫之竒虞忠臣竒其宜反對曰宫之竒之爲人也懦而不能强諌懦弱也懦本又作穤乃亂反又乃貨反字林作愞音乃亂反强其良反又其丈反且少長於君林宫之竒自少長養於公宫少詩照反長丁丈反君䁥之雖諫將不聽杜親而狎之必輕其言䁥女乙反乃使荀息假道於虞曰冀爲不道入自顚軨伐鄍三門杜前是冀伐虞至鄍鄍虞邑河東大陽縣東北有顚軨坂軨音零鄍亡丁反冀之既病則亦唯君故杜言虞報伐冀使病將欲假道故稱虞彊以說其心冀國名平陽皮氏縣東北有冀亭今虢為不道保於逆旅杜逆旅客舍也虢稍遺人分依客舍以聚衆抄晉邊邑以侵敝邑之南鄙敢請假道以請罪于虢杜問虢伐已以何罪虞公許之且請先伐虢杜喜於厚賂而欲求媧宫之竒諌不聽遂起師夏晉里克荀息帥師會虞師伐虢滅下陽杜晉猶主兵不信虞先書虞賄故也杜虞非倡兵之首而先書之惡貪賄也賄呼罪反秋盟于貰服江黄也江黄楚與國也始來服齊故為合諸侯齊寺人貂始漏師于多魚杜寺人内奄官豎貂也多魚地名闕齊桓多嬖寵内則如夫人者六人外則幸豎貂易牙之等終以此亂國傳言貂於此始檀貴寵漏洩桓公軍事為齊亂張本寺如字又音侍貂音彫虢公敗戎于桑田杜桑田虢地在𢎞農陜縣東北晉卜偃曰虢必亡矣亡下陽不愳而又有功是天奪之鑒林下陽為晉所滅而不恐懼而又有敗戎之功是天奪之鑒使不得以自照而益其疾也杜驕則生疾必易晉而不撫其民矣不可以五稔杜稔熟也爲下五年晉滅虢張本易以䜴反稔入甚反冬楚人伐鄭鬭章囚鄭􅅨伯經書侵而言伐本以伐興權行侵掠為後年楚伐鄭鄭伯欲成張本􅅨乃甘反經甲子三年春王正月不雨夏四月不雨杜一時不雨則書首月傳例曰不曰旱不為災徐人取舒杜無傳徐國在下邳僮縣東南舒國今廬江舒縣勝國而不用大師亦曰取例在襄十三年林舒楚之同類詩所謂荆舒者也徐附齊故為齊取楚之與國六月雨示旱不竟夏秋齊侯宋公江人黄人會于陽穀杜陽穀齊地在東平須昌縣北林衣裳之㑹不在九合之數冬公子友如齊涖盟杜涖臨也林吾君大夫如齊自僖之初年始前此適他邦必有故也涖音利又音類楚人伐鄭傳三年春不雨夏六月雨自十月不雨至于五月不曰旱不為災也杜周六月夏四月於播種五稼無損秋會于陽穀謀伐楚也杜二年楚侵鄭故齊侯爲陽穀之會來尋盟冬公子友如齊涖盟公時不會陽穀故齊侯自陽穀遺人詣魯來尋盟魯使上卿詣齊受盟謙也爲于僞反楚人伐鄭鄭伯欲成孔叔不可曰齊方勤我杜孔叔鄭大夫勤恤鄭難弃德不祥杜祥善也齊侯與蔡姬乘舟于囿蕩公杜蔡姬齊侯夫人蕩搖也囿苑也蓋魚池在苑中囿音又公懼變色禁之不可公怒歸之未之絶也蔡人嫁之爲明年齊侵蔡傳經乙丑四年春王正月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰杜民逃其上曰潰例在文三年遂伐楚次于陘杜遂兩事之辭楚强齊欲綏之以德故不速進而次陘陘楚地潁川召陵縣南有陘亭林侵蔡遂伐楚以見齊霸侵陳遂侵宋以見楚霸陘音刑夏許男新臣卒杜未同盟而赴以名林即許叔也穆公卒僖公業立楚屈原來盟于師盟于召陵杜屈完楚大夫也楚子遣完如師以觀齊屈完覩齊之盛因而求盟故不稱使以完來盟為文齊桓退舍以禮楚故盟召陵召陵潁川縣也林不戰服楚也齊人執陳轅濤塗轅濤塗陳大夫轅本又作袁濤音桃秋及江人黄人伐陳杜受齊命討陳之罪而以與謀為文者時齊不行使魯為主與謀例在宣七年八月公至自伐楚杜無傳告于廟葬許穆公冬十有二月公孫兹帥師會齊人宋人衛人鄭人許人曹人侵陳公孫兹叔牙子叔孫戴伯傳四年春齊侯以諸侯之師侵蔡蔡潰林齊桓公霸諸侯攘夷狄尊天子蔡自北杏一與中國之會而棄我諸侯甘心黨楚故齊帥諸侯伐楚而先事侯蔡潰蔡者先披楚之黨也遂伐楚楚子使與師言曰君處北海寡人處南海唯是風馬牛不相及也杜楚界猶未至南海因齊處北海遂稱所近牛馬風逸蓋未界之微事故以取喻林牝牡相誘曰風言雖牛馬風逸牝牡相誘亦不相及喻齊楚遠不相干也不虞君之渉吾地也何故林問師之伐楚以何名管仲對曰昔召康公命我先君大公杜召康公周大保召公奭也林此下皆舉召公命大公之辭大音泰曰五侯九伯女實征之以夾輔周室杜五等諸侯九州之伯皆得征討其罪齊桓因此命以夸楚林帥諸侯來時輔佐我周王女音汝夾古洽反舊古恊反賜我先君履東至于海西至于河南至于穆陵北至于無棣杜穆陵無棣皆齊竟也履所踐履之界齊桓又因以自言其盛林索隠曰今淮南有故穆陵門是楚之境無棣在遼西孤竹服䖍以為大公受封境界所至不然也蓋言其征伐所至之城也愚按是時管仲相齊子文相楚正是的對楚既以渉地何故為問則齊不應厯言受封境界以自狹當以征伐所至為正棣大計反爾貢包茅不入王祭不共無以縮酒寡人是徵林以下皆音楚討罪之辭杜包裹束也茅菁茅也束茅而灌之以酒為縮酒尚書苞匭菁茅茅之為異未審共本亦作供音恭下同縮所六反昭王南征而不復寡人是問杜昭王成王之孫南廵守渉漢船壊而溺周人諱而不赴諸侯不知其故故問之對曰貢之不入寡君之罪也敢不共給昭王之不復君其問諸水濵杜昭王時漢非楚竟故不受罪濱音賓師進次于陘杜楚不服罪故復進師林楚語云先君蚡冒之所以服陘隰也陘必為楚之要也故齊以諸侯之師進而據之焉夏楚子使屈完如師如陘之師觀强弱師退次于召陵杜完請盟故齊侯陳諸侯之師與屈完乘而觀之杜乘其載乘繩證反齊侯曰豈不穀是為先君之好是繼與不穀同好如何杜言諸侯之附從非為已乃尋先君之好謙而自廣因求與楚同好孤寡不穀諸侯謙稱為于偽反好呼報反對曰君惠徼福於敝邑之社稷辱收寡君林言齊嘉惠徼求楚國社稷之福不以收拾寡君同好為齊之辱徼古堯反要也寡君之願也齊侯曰以此衆戰誰能禦之以此攻城何城不克對曰君若以德綏諸侯誰敢不服君若以力楚國方城以為城漢水以為池方城山在南陽葉縣南以言竟土之遠漢水出武都至江夏南入江言其險固以當城池漢水以為池本或作漢以為池水衍字雖衆無所用之屈完及諸侯盟陳轅濤塗謂鄭申侯曰師出於陳鄭之間國必甚病杜申侯鄭大夫當有共給之費故若出於東方觀兵於東夷循海而歸其可也杜東夷郯莒徐夷也觀兵示威林其可免二國共給之擾耳申侯曰善濤塗以告齊侯許之許出東方申侯見曰師老矣林言兵出久疲敝若出於東方而遇敵懼不可用也若出於陳鄭之間共其資糧屝屨其可也杜屝草屨見賢遍反糧音良屝符費反齊侯說與之虎牢杜還以鄭邑賜之說音悦執轅濤塗秋伐陳討不忠也杜以濤塗爲誤軍道許穆公卒于師葬之以侯禮也杜男而以侯禮加等林得賞功之禮凡諸侯薨于朝會加一等諸侯命有三等公為上等侯伯中等子男為下等死王事加二等杜謂以死勤事於是有以衮歛衮衣公服也謂加二等衮古本反歛力驗反冬叔孫戴伯帥師會諸侯之師侵陳陳成歸轅濤塗林戴伯即公孫兹也齊復侵陳以討不忠之罪杜陳服罪故歸其大夫戴諡也初晉獻公欲以驪姬爲夫人林事在莊公二十八年傳卜之不吉筮之吉公曰從筮林獻公溺愛驪姬故欲違卜從筮卜人曰筮短龜長不如從長杜物生而後有象象而後有滋滋而後有數龜象筮數故象長數短林象在先數在後故以先為長以後為短如依字讀或音而據反且其繇曰專之渝攘公之羭杜繇卜兆辭渝變也攘除也羭美也言變乃除公之美林言專寵之變必將奪公之所美蓋指申生言奪公之嫡也繇直救反渝羊朱反下羭同音攘如羊反一薰一蕕十年尚猶有臭林薫香草譬申生之徒蕕臭草譬驪姬之黨言香臭共處則香不勝臭猶美不勝惡十年尚猶有臭言善易消惡難除也薫許云反蕕音由必不可弗聽立之生奚齊其娣生卓子及將立奚齊既與中大夫成謀林中大夫里克也獻公欲廢大子憚里克未敢廢里克曰中立其免乎是成謀也卓吐濁反姬謂大子曰君夢齊姜必速祭之杜齊姜大子母言求食大子祭于曲沃歸胙于公杜胙祭之酒肉胙才故反公田姬寘諸宫六日公至毒而獻之杜毒酒經宿輒敗而經六日明公之惑寘之豉反公祭之地地墳林驪姬謂公酒食自外來不可不試故令公祭地毒酒至地地為墳起墳扶粉反與犬犬斃與小臣小臣亦斃姬泣曰賊由太子大子奔新城杜新城曲沃斃婢世反公殺其傅杜原款或謂大子子辭君必辯焉林子若有辭于公以六日之狀自理獻公必辨其詐款苦管反辯兵免反大子曰君非姬氏居不安食不飽我辭姬必有罪君老矣吾又不樂杜吾自理則姬死姬死則君必不樂不樂為由吾也樂音洛曰子其行乎大子曰君實不察其罪被此名也以出林獻公實不察其罪之有無被此欲弑君父之罪名以出奔被皮寄反又皮綺反人誰納我十二月戊申縊于新城姬遂譛二公子曰皆知之重耳奔蒲夷吾奔屈杜二子時在朝為明年晉殺申生傳縊一賜反譛側鴆反經丙寅五年春晉侯殺其世子申生稱晉侯惡用䜛書春從告杞伯姬來朝其子杜無傳伯姬來寧寧成風也朝其子者時子年在十嵗左右因有諸侯子得行朝義而卒不成朝禮故繫于母而曰朝其子杞伯姬來絶句朝其子猶言其子朝夏公孫兹如牟杜叔孫戴伯娶于牟卿非君命不越竟故奉公命聘于牟因自為逆公及齊侯宋公陳侯衛侯鄭伯許男曹伯會王世子于首止杜惠王大子鄭也不名而殊㑹尊之也首止衛地陳畱襄邑縣東南有首鄉林衣裳之㑹七殊㑹世子不以世子夷于諸侯所以定世子也秋八月諸侯盟于首止杜閒無異事復稱諸侯者王世子不盟故也王之世子尊與王同齊桓行霸翼戴天子尊崇王室故殊貴世子鄭伯逃歸不盟杜逃其師而歸也逃例在文三年楚人滅弦弦子奔黄杜弦國在弋陽􅋴縣東南林夷狄始滅中國九月戊申朔日有食之無傳冬晉人執虞公杜虞公貪璧馬之寳距絶忠諌稱人以執同於無道於其民之例例在成十五年所以罪虞且言易也晉侯修虞之祀而歸其職貢於王故不以滅同姓為譏傳五年春王正月辛亥朔日南至林周正月今之十一月蓋十一月一日冬至也自秋分日行南陸至冬至之日日南極公既視朔遂登觀臺以望而書禮也杜視朔親告朔也觀臺臺上搆屋可以遠觀者也朔旦冬至厯數之所始治厯者因此則可以明其術數審别隂陽叙事訓民魯君不能常修此禮故善公之得禮觀古亂反臺以望絶句而書本或作而書雲物非也凡分至啓閉必書雲物杜分春秋分也至冬夏至也啓立春立夏閉立秋立冬雲物氣色災變也傳重申周典不言公者日官掌其職爲備故也素察妖祥逆為之備晉侯使以殺大子申生之故來告杜釋經必須告乃書初晉侯使士蔿為二公子築蒲與屈林為重耳築蒲為夷吾築屈事並在莊十六年爲于偽反不愼寘薪焉林不謹愼寘薪於上雜而築之不堅實寘之䜴反夷吾訴之公使讓之杜譴讓之士蒍稽首而對曰臣聞之無喪而慼憂必讐焉杜讐猶對也無戎而城讐必保焉杜保而守之冦讐之保又何愼焉林言獻公今無戎而築二城終為冦讐之所保守又何必謹愼為之堅築哉守官廢命不敬固讐之保不忠失忠與敬何以事君林言若不堅築則守官而廢君之命恐負不敬之罪若固築則是為冦讐而固其保守恐負不忠之罪若失忠敬二者何以盡事君之道此言士蒍所以築城而不敢堅固詩云懐德惟寧宗子惟城杜詩大雅懷徳以安則宗子之固若城君其脩德而固宗子何城如之杜言城不如固宗子三年將尋師焉焉用愼杜尋用也林三年之後君將用師于蒲屈焉蓋當時驪姬欲殺二公子之謀已露焉於䖍反退而賦曰狐裘尨茸一國三公吾誰適從林以狐腰為裘貴者之裘也尨茸亂貌言貴者之多蒲屈大都耦國故獻公與二子鼎立為三公杜士蒍自作之詩也言城不堅則為公子所訴為公所讓堅之則為固讐不忠無以事君故不知所從尨莫江反又音蒙茸如容反適丁厯反及難林及驪姬之難難乃旦反公使寺人披伐蒲重耳曰君父之命不挍乃徇曰挍者吾讐也踰垣而走披斬其袪遂出奔翟林言披以君父之命來伐不敢與校强弱勝負敢與披校者我當反讐怨之也杜袪披也披普皮反挍音敎徇似俊反垣音衰袪起魚反翟音狄夏公孫兹如牟娶焉杜因聘而娶故傳實其事娶本或作取七喻反㑹于首止會王大子鄭謀寧周也杜惠王以惠后故將廢大子鄭而立王子帶故齊桓帥諸侯會王大子以定其位林謀定世子以安周室也陳轅宣仲怨鄭申侯之反已於召陵宣仲轅濤塗故勸之城其賜邑曰美城之大名也子孫不忘吾助子請乃為之請於諸侯而城之美林四年齊桓公以虎牢賜鄭申侯故濤塗勸申侯城其所賜之邑城虎牢而美設樓櫓之備可以存莫大之名傳之子孫不忘其功美城之絶句遂譛諸鄭伯曰美城其賜邑將以叛也申侯由是得罪林言申侯城其賜邑美設樓櫓將負固保險以叛鄭國鄭伯信濤塗之譛故猜忌申侯由此得罪為七年鄭伯殺申侯傳秋諸侯盟王使周公召鄭伯曰吾撫汝以從楚輔之以晉可以少安杜周公宰孔也王恨齊桓定大子之位故召鄭伯使叛齊也晉楚不服於齊故以鎭安鄭秋諸侯盟本或此下更有于首止三字非女音汝鄭伯喜於王命而懼其不朝於齊也林以得王命為喜又以不朝于齊為懼故逃歸不盟孔叔止之曰國君不可以輕輕則失親杜孔叔鄭大夫親黨援也林言國君舉動不可以輕易輕易則失其黨援輕遣政反下同失親患必至病而乞盟所喪多矣君必悔之弗聽逃其師而歸林若失黨援則禍患必至及至為齊所伐病困而後乞盟于齊鄭之所喪失者為已多矣君行師從時鄭文公已㑹首止故逃其師而歸喪息浪反楚鬬穀於莵滅弦弦子奔黄於是江黄道栢方睦於齊皆弦姻也杜姻外親也道國在汝南安陽縣南栢國名汝南西平縣有栢亭弦子恃之而不事楚又不設備故亡晉侯復假道於虞以伐虢宫之竒諌曰虢虞之表也虢亡虞必從之晉不可啓寇不可翫林以虢為表以虞為裏言虢為虞之外䕶晉心無厭不可開啓晉兵為寇不可翫習復扶又反一之謂甚其可再乎杜為二年假晉道滅下陽諺所謂輔車相依唇亡齒寒者其虞虢之謂也杜輔煩輔車牙車林言虞如牙車如齒在裏虢如輔頰如唇在表二國相須以主去一不可車尺奢反公曰晉吾宗也豈害我哉對曰大伯虞仲大王之昭也大伯不從是以不嗣杜大伯虞仲皆大王之子不從父命俱讓適呉仲雍支子别封西呉虞公其後也林大王於周為穆穆生昭故大王之子爲昭大音泰下同昭上饒反後昭穆放此虢仲虢叔王季之穆也杜王季者大伯虞仲之母弟也虢仲虢叔王季之子文王之母弟也叔仲皆虢君字林王季於周為昭昭生穆故王季之子為穆爲文王卿士勲在王室藏於盟府林王功曰勲言有王功在周室杜盟府司盟之官將虢是滅何愛於虞林言虞虢皆與晉同宗今晉且將滅虢晉不愛虢而獨有愛於虞乎且虞能親於桓莊乎其愛之也桓莊之族何罪而以為戮不唯偪乎杜桓叔莊伯之族晉獻公之從祖昆弟獻公患其偪盡殺之事在莊二十五年偪彼力反親以寵偪猶尚害之况以國乎林至親而以恃寵偪害晉國獻公猶尚盡殺害之况以虞有一國之寵利晉豈無並吞虞公之心公曰吾享祀豐潔神必據我杜據猶安也享興兩反對曰臣聞之鬼神非人實親惟徳是依故周書曰皇天無親惟徳是輔杜周書逸書又曰黍稷非馨明徳惟馨杜馨香之遠聞林言感鬼神者非以黍稷粢盛之馨香蓋以君之明徳惟馨香之遠聞也又曰民不易物惟徳繄物杜黍稷牲玉無徳則不見饗有徳則見饗言物一而異用繄烏兮反是也如是則非徳民不和神不享矣神所馮依將在徳矣若晉取虞而明徳以薦馨香神其吐之乎弗聽許晉使宫之竒以其族行林夫民神之主也故以民和為先民和而後神享其祭鬼神之所馮附而依頼者將在徳之厚薄若晉滅虞而取其國而以明徳薦其馨香禮事神祗則虞之山川鬼神豈不享其祭而吐之乎言不必據虞之享祀宫之竒知虞必滅故挈其族去適他國以避禍也馮皮冰反使所吏反曰虞不臘矣林臘嵗終祭衆神之名言虞不及臘祭之期臘力盍反在此行也晉不更舉矣杜不更舉兵林言將滅虢而遂舉滅虞八月甲午晉侯圍上陽杜上陽虢國都在𢎞農陜縣東南問於卜偃曰吾其濟乎對曰克之公曰何時對曰童謠云丙之晨龍尾伏辰杜龍尾尾星也日月之會日辰日在尾故尾星伏不見林言丙日之朔旦也謠音遙均服振振取虢之旂戎事上下同服振振盛貌旂軍之旌旗林旂司馬公曰當與詩庭燎旂字皆叶句音芹勝虢故取其旂均如字字書作袧音同振音眞鶉之賁賁天䇿焞焞火中成軍虢公其奔杜鶉鶉火星也賁賁鳥星之體也天䇿博說星時近日星微焞焞無光耀也言丙子平旦鶉火中軍事有成功也此以上皆童謠言也童齓之子未有念慮之感而會成嬉戲之言似若有馮者其言或中或否博覽之士能懼思之人兼而志之以為鑒戒以為將來之驗有益於世教鶉述春反又常倫反賁音犇焞他門反其九月十月之交乎杜以星驗推之如九月十月之交謂夏之九月十月也交晦朔交㑹丙子旦日在尾月在策杜是夜日月合朔扵尾月行疾故至旦而過在䇿鶉火中必是時也林鶉火星見扵南方言中言序以南方為正必以此時滅虢冬十二月丙子朔晉滅虢虢公醜奔京師林醜虢公名皆如童謠之言杜不書不告也周十二月夏之十月師還館于虞遂襲虞滅之執虞公及其大夫井伯以媵秦穆姬杜秦穆姬晉獻公女送女曰媵以屈辱之而修虞祀且歸其職貢於王林修虞之所命祀且歸虞之職貢于周室故書曰晉人執虞公罪虞且言易也林以虞貪璧馬而亡其國假道而因取虞不煩于戈故言易也易以豉反經丁卯六年春王正月夏公會齊侯宋公陳侯衛侯曹伯伐鄭圍新城杜新城鄭新密今滎陽密縣秋楚人圍許杜楚子不親圍以圍者告林夷狄始圍中國諸侯遂救許皆伐鄭之諸侯故不復更叙冬公至自伐鄭無傳傳六年春晉侯使賈華伐屈夷吾不能守盟而行杜賈華晉大夫非不欲挍力不能守言不如重耳之賢林與屈人盟必不背已而去將奔狄郤芮曰後出同走罪也林郤芮夷吾之臣言夷吾後重耳出奔而同走狄嫌與重耳同謀相隨是負罪也郤去逆反芮如銳反不如之梁梁近秦而幸焉乃之梁杜以梁為秦所親幸秦既入國且穆姬在焉故欲因以求入近附近之近夏諸侯伐鄭以其逃首止之盟故也杜首止盟在五年圍新密鄭所以不時城也實新密而經言新城者鄭以非時興土功齊桓聲其罪以告諸侯秋楚子圍許以救鄭諸侯救許乃還林圍許以救鄭者攻其所必救也冬蔡穆侯將許僖公以見楚子於武城杜楚子退舍武城猶有忿志而諸侯各罷兵故蔡將許君歸楚武城楚地在南陽宛縣北見賢遍反許男面縳衘璧大夫衰絰士輿櫬杜縳手於後未見其面以璧為贊手縛故衘之林君將受死故使大夫衰絰從有喪者之服櫬棺也使士與棺而從之衰七雷反絰直結反櫬初覲反楚子問諸逢伯林逢伯楚大夫楚子問以受降之禮對曰昔武王克殷微子啓如是杜微子啓紂庻兄宋之祖也武王親釋其縳受其璧而袚之杜祓除凶之禮祓芳弗反徐音廢說文云除惡之祭也焚其櫬禮而命之使復其所林待之以禮而命之以辭使復安其處所楚子從之經戊辰七年春齊人伐鄭夏小邾子來朝杜無傳郳黎來始得王命而來朝也邾之别封故曰小邾林自郳黎來為小邾子而天子無未命諸侯自晉處父為陽處父而天下無未命大夫鄭殺其大夫申侯杜申侯鄭卿專利而不厭故稱名以殺罪之也例在文六年秋七月公會齊侯宋公陳世子款鄭世子華盟于甯毋杜高平方與縣東有泥毋亭音如甯林衣裳之會八毋如字又音無曹伯班卒杜無傳五年同盟于首止林昭公卒子共公襄立公子友如齊無傳罷盟而聘謝不敏也冬葬曹昭公無傳傳七年春齊人伐鄭孔叔言於鄭伯曰諺有之曰心則不競何憚於病杜競强也憚難也林言心既不能自强何畏難於卑弱之病憚徒旦反既不能强又不能弱所以斃也國危矣請下齊以救國林謂卑下服齊以救鄭國之社稷下戸嫁反公曰吾知其所由來矣姑少待我林我知其禍之所從來矣且少待我處分杜欲以申侯說對曰朝不及夕何以待君林言鄭國之危朝不保暮何可待君之處分朝如字夏鄭殺申侯以說于齊且用陳轅濤塗之譛也杜濤塗譛在五年初申侯申出也杜姊妹之子為出有寵於楚文王文王將死林仕於楚而得寵幸於文王文王死在莊十九年與之璧使行曰唯我知女女專利而不厭子取予求不女疵瑕也從我取從我求我不以女為罪釁女音汝下皆同疵似斯反又疾移反後之人將求多於女杜謂嗣君也求多以禮義大望責之女必不免我死女必速行無適小國將不女容焉杜政狭法峻既葬出奔鄭又有寵于厲公子文聞其死也曰古人有言曰知臣莫若君弗可改也已林言知其臣之賢否莫如其君之明古人此言弗可改易必然如此秋盟于甯母謀鄭故也林以鄭未服故謀其事管仲言於齊侯曰臣聞之招攜以禮懐遠以徳徳禮不易無人不懐林諸侯之攜離者惟有禮可以招徠之遠方之叛服者惟有徳可以懐服之徳禮持心無所改易遠近之人無不懐附齊侯修禮於諸侯諸侯官受方物杜諸侯官司各於齊受其方所當貢天子之物林蓋東周衰微貢賦多闕故諸侯各受其貢物鄭伯使大子華聽命於會言於齊侯曰洩氏孔氏子人氏三族實違君命杜三族鄭大夫洩息列反若君去之以為成我以鄭為内臣君亦無所不利焉林若齊君去此三族以與鄭國為平我以鄭事齊如齊封内之臣鄭既内屬不侵不叛齊亦無所不得其利去起吕反齊侯將許之管仲曰君以禮與信屬諸侯而以姦終之毋乃不可乎林齊君自創伯以來以有禮與有信聯屬諸侯之國而終之以子華奸邪之謀言其不可之甚子父不奸之謂禮守命共時之謂信杜守君命共時事奸音干共音恭違此二者姦莫大焉公曰諸侯有討於鄭未捷今茍有釁從之不亦可乎杜子華犯父命是其釁隙林從其言以服鄭不亦可以有功乎對曰君若綏之以徳加之以訓辭林言齊君若以徳而撫綏鄭國加以教訓之辭責其逃盟之罪而帥諸侯以討鄭鄭將覆亡之不暇豈敢不懼若總其罪人以臨之杜總將領也子華奸父之命即罪人覆方服反鄭有辭矣何懼杜以大義為辭且夫合諸侯以崇徳也會而列姦何以示後嗣林合諸侯之會盟以尊崇有徳也今會而用子華之奸謀是列子華之奸於會何以示後嗣之子孫夫諸侯之會其徳刑禮義無國不記記姦之位君盟替矣杜重言諸侯會同之事綏之以徳威之以刑親之以禮訓之以義諸侯之國皆記其事位㑹位也記子華之奸人列在會位齊君之盟自此廢矣林替廢也替他計反作而不記非盛徳也杜君舉必書雖復齊史隠諱亦損盛徳君其勿許鄭必受盟林鄭必感徳而受盟于齊夫子華既為大子而求介於大國以弱其國亦必不免杜介因也林求因齊大國之力去三族而以鄭為齊封内之臣是弱其國亦必不免於禍介音界鄭有叔詹堵叔師叔三良為政未可間也齊侯辭焉子華由是得罪於鄭冬鄭伯使請盟于齊杜以齊侯不聼子華故林為十六年殺子華傳堵丁古反又音者間間厠之間閏月惠王崩襄王惡大叔帶之難杜襄王惠王大子鄭也大叔帶襄王弟惠王之子也有寵于惠后惠后欲立之未及而卒惡鳥路反大音秦叔又作州懼不立不𤼵喪而告難于齊為八年盟洮傳經己巳八年春王正月公會王人齊侯宋公衛侯許男曹伯陳世子款盟于洮杜王人與諸侯盟不譏者王室有難故洮曹地林兵車之㑹一鄭伯乞盟杜新服未與㑹故不序列别言乞盟夏狄伐晉秋七月禘于太廟用致夫人杜禘三年大祭之名大廟周公廟致者致新死之主於廟而列之昭穆夫人淫而與殺不薨於寢於禮不應致故僖公疑其禮厯三禘今果行之嫌異常故書之此致哀姜之主于廟也向曽曰夫人氏之喪而不言姜見絶於國之辭也今曰致夫人而不言氏見絶於宗廟之辭也大音泰冬十有二月丁未天王崩林惠王崩子襄王立實以前年閏月崩以今年十二月丁未告傳八年春盟于洮謀王室也林謀王室之難也鄭伯乞盟請服也襄王定位而後𤼵喪王人會洮還而後王定位晉里克帥師梁由靡御虢射為右以敗狄于采桑杜傳言前年事也平陽北屈縣西南有采桑津林未陳曰敗射食亦反梁由靡曰狄無恥從之必大克杜不恥走故可逐里克曰懼之而已無速衆狄林言敗其師使之知畏而已杜恐怨深而羣黨來報虢射曰期年狄必至示之弱矣林言一期之後狄必來伐晉不追其師是我先示之弱矣期音基本或作朞夏狄伐晉報采桑之役也復期月明期年之言驗秋禘而致哀姜焉非禮也凡夫人不薨于寢不殯于廟不赴于同不祔于姑則弗致也杜寢小寢同同盟將葬又不以殯遇廟據經襄姜薨葬之文則為殯廟赴同祔姑今當以不薨于寢不得致也祔音附冬王人來告喪難故也是以緩杜有大叔帶之難林傳明非慢也宋公疾大子兹父固請曰目夷長且仁君其立之杜兹父襄公也目夷兹父庻兄子魚也父者甫長丁丈反公命子魚子魚辭曰能以國讓仁孰大焉臣不及也且又不順林言大子能以宋國讓仁愛之道孰大於此臣之徳不及太子立嫡子以長順也今立庻子不順禮遂走而退林言畢遂走而退示必不敢當左傳杜林合注卷九
