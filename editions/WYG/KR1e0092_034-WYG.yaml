body:
  text: 左傳杜林合注卷三十四明王道焜趙如源同編昭公一公名裯襄公子母齊歸在位二十五年遜于齊在外八年凡三十三年薨于乾候諡法威儀恭明曰昭周景王四年魯昭公二十二年景王崩王猛立是年卒王室亂弟敬王立昭二十三年尹氏立王子朝昭二十六年敬王入于成周王子朝出奔楚鄭簡公二十五年魯昭公十二年簡公卒子定公立昭二十八年定公卒子獻公蠆立齊景公七年宋平公三十五年魯昭公十年平公卒子元公佐立昭二十五年元公卒子景公頭曼立晉平公十七年晉趙武為政魯昭公元年冬趙武卒韓起為政魯昭公十年平公卒子昭公夷立魯昭公十六年晉昭公卒子頃公去疾立昭二十八年魏舒為政昭三十年頃公卒子定公午立衛襄公三年魯昭公七年襄公卒子靈公元立蔡靈公三年魯昭公十一年楚殺蔡靈公滅蔡昭十三年楚平王封蔡蔡侯廬立是為平公昭二十年平公卒大子朱立昭二十一年朱奔楚平公弟悼公東國立昭二十三年悼公卒弟昭公申立曺武公十四年魯昭公十四年武公卒子平公須立昭十八年平公卒子悼公午立昭二十七年悼公卒弟聲公野立昭三十二年平公弟通弑聲公代立是為隱公滕成公三十五年魯昭公三年成公卒悼公寧立昭二十八年悼公卒頃公結立陳哀公二十八年魯昭公八年哀公卒楚滅陳昭十三年楚平王封陳陳侯呉立是為恵公杞文公九年魯昭公六年文公卒弟平公郁釐立昭二十四年平公卒子悼公成立薛魯昭三十一年見薛獻公榖卒自入春秋來薛始書名子襄公定立莒展輿元年魯昭公元年齊納莒公子去疾是為著丘公展輿奔呉昭十四年著丘公卒子郊公立是年奔齊著丘公弟庚輿立是為共公昭二十三年庚輿來奔齊納郊公邾悼公十五年魯昭公元年悼公卒莊公穿立許悼公六年魯昭公九年遷于夷昭十八年遷于白羽昭十九年悼公弑斯立小邾穆公二十一年魯昭公十七年小邾穆公來朝楚郟敖四年魯昭公元年楚圍弑郟敖而自立改名虔是為靈王楚薳罷為令尹昭十三年靈王弑平王居立即棄疾使子旂為令尹昭十四年殺成然子瑕為令尹昭二十三年子常為令尹昭二十三年平王卒子昭王軫立秦景公三十六年魯昭公五年景公卒子哀公立吳夷昧三年魯昭公十五年夷昩卒子王僚立昭二十七年僚弑闔廬立一名光諸樊子越魯昭公五年越㑹楚伐呉始見經即書人經庚申元年春王正月公即位無傳叔孫豹㑹晉趙武楚公子圍齊國弱宋向戌衞齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢杜招實陳侯母弟不稱弟者義與莊二十五年公子友同今讀舊書則楚當先晉而先書趙武者亦取宋盟貴武之信故尚之也衛在陳蔡上先至於㑹招常遥反虢瓜百反三月取鄆杜不稱將卑師少書取言易也於是季孫宿伐莒取鄆則書法何以異於宣十年歸父伐邾歸父伐邾猶公命也此專取邑而已鄆音運夏秦伯之弟鍼出奔晉稱弟罪秦伯鍼其廉反六月丁巳邾子華卒杜無傳三同盟悼公卒莊公穿立晉荀呉帥師敗狄于大鹵杜大鹵太原晉陽縣林晉自悼公以來狄師不出敗狄至是而再見其再見何晉彌衰也至伐鮮虞春秋遂狄晉矣大如字徐音泰鹵音魯穀梁傳云中國曰太原夷狄曰大鹵秋莒去疾自齊入于莒杜國逆而立之曰入前言齊無知弑其君後言齊小白入于齊前言莒人弑其君後言去疾入于莒則不與弑之辭也前言衞候入于齊陳乞弑其君與弑之辭也辭有先後罪有大小故曰屬辭比事春秋教也去起吕反莒展輿出奔呉杜弑君賊未㑹諸候故不稱爵叔弓帥師疆鄆田春取鄆今正其封疆疆居良反葬邾悼公無傳冬十有一月己酉楚子麋卒楚以痛疾赴故不書弑麋九倫反楚公子比出奔晉書名罪之傳元年春楚公子圍聘于鄭且娶於公孫段氏伍舉為介林叚子石也伍舉椒舉介副也將入館杜就客舍鄭人惡之知楚懐詐惡烏路反使行人子羽與之言乃館於外杜舍城外既聘將以衆逆以兵入逆婦子産患之使子羽辭曰以敝邑􅄶小不足以容從者請墠聽命杜欲於城外除地為墠行昏禮􅄶必淺反下同從才用反墠音善令尹命大宰伯州犂對曰林令尹即公子圍伯州犂時從行故使對答子羽君辱貺寡大夫圍謂圍將使豐氏撫有而室杜豐氏公孫段也言將使公孫段之女撫有汝之室家圍布几筵告於莊共之廟而來莊王圍之祖共王圍之父共音恭若野賜之林若於城外為墠是賜之於郊野是委君貺於草莽也是寡大夫不得列于諸卿也杜言不得從卿禮不寧唯是又使圍䝉其先君杜䝉欺也告先君而來不得成禮於女氏之廟故以為欺先君將不得為寡君老大臣稱老懼辱而黜退其蔑以復矣唯大夫圖之子羽曰小國無罪恃實其罪杜恃大國而無備則是罪將恃大國之安靖已而無乃包藏禍心以圖之林鄭之婚楚本欲恃楚以安靖其國家今楚以兵入逆無乃包藏禍心以圖襲鄭小國失恃而懲諸候使莫不憾者距違君命而有所壅塞不行是懼杜言已失所恃則諸候懲恨以距君命壅塞不行所懼唯此不然蔽邑館人之屬也杜館人守舍人也其敢愛豐氏之祧杜祧逺祖廟祧他彫反伍舉知其有備也請櫜而入杜埀櫜示無弓櫜古刀反衣衣也許之正月乙未入逆而出遂㑹于虢杜虢鄭地尋宋之盟也宋盟在襄二十七年祁午謂趙文子曰宋之盟楚人得志于晉杜得志謂先㰱午祁奚子今令尹之不信諸候之所聞也子弗戒愳又如宋杜恐楚復得志子木之信稱於諸候猶詐晉而駕焉杜駕猶陵也詐謂衷甲駕如字又音加下同况不信之尤者乎尤甚也楚重得志於晉晉之恥也林重再也重直用反子相晉國以為盟主於今七年矣杜襄二十五年始為政以春言故云七年相息亮反再合諸侯襄二十五年㑹夷儀二十六年㑹澶淵三合大夫杜襄二十七年㑹于宋三十年㑹澶淵及今㑹虢也服齊狄寧東夏杜襄二十八年齊侯白狄朝晉林齊狄服則東方諸候皆安平秦亂襄二十六年秦晉為成城淳于襄二十九年城杞之淳于杞遷都淳音純師徒不頓國家不罷民無謗讟讟誹也罷音皮讟音獨諸候無怨天無大災子之力也有令名矣而終之以恥午也是懼吾子其不可以不戒文子曰武受賜矣杜受午言然宋之盟子木有禍人之心武有仁人之心是楚所以駕於晉也林子木稱兵是有禍人之心武欲弭兵是有愛人之心此楚所以得志陵駕於晉今武猶是心也楚又行僭僭不信僭子念反下同非所害也武將信以為本循而行之譬如農夫是穮是蓘林穮耘也壅苖為蓘穮彼驕反蓘古本反雖有饑饉必有豐年杜言耕鉏不以水旱息必獲豐年之收林以喻守信者有所屈必有所伸僅其靳反且吾聞之能信不為人下吾未能也自恐未能信也詩曰不僭不賊鮮不為則信也杜詩大雅僭不信賊害人也鮮息淺反能為人則者不為人下矣吾不能是難楚不為患楚令尹圍請用牲讀舊書加于牲上而已杜舊書宋之盟書楚恐晉先㰱故欲從舊書加于牲上不歃血經所以不書盟難乃旦反晉人許之三月甲辰盟楚公子圍設服離衞杜設君服二人執戈陳於前以自衞離陳也叔孫穆子曰楚公子美矣君哉杜美服似君鄭子皮曰二執戈者前矣禮國君行有二執戈者在前蔡子家曰蒲宫有前不亦可乎杜公子圍在㑹特緝蒲為王殿屋屏蔽以自殊異言既造王宫而居之雖服君服無所怪也楚伯州犂曰此行也辭而假之寡君林言公子圍此役嘗以辭令假借君服於楚君杜間諸大夫譏之故言假以飾令尹過鄭行人揮曰假不反矣杜言將遂為君伯州犂曰子姑憂子晳之欲背誕也襄三十年鄭子晳殺伯有背命放誕將為國難言子且自憂此無為憂令尹不反戈背音佩誕音但子羽曰當璧猶在假而不反子其無憂乎杜子羽行人揮當璧謂棄疾事在昭十三年言棄疾有當璧之命圍雖取國猶將有難不無憂也齊國子曰吾代二子愍矣杜國子國弱也二子謂王子圍及伯州犂圍此冬便簒位不能自終州犂亦尋為圍所殺故言可愍陳公子招曰不憂何成二子樂矣杜言以憂生事事成而樂樂音洛下同衞齊子曰苟或知之雖憂何害杜齊子齊惡言先知為備雖有憂難無所損害宋合左師曰大國令小國共吾知共而已杜共承大國命不能知其禍福共音恭晉樂王鮒曰小旻之卒章善矣吾從之杜小旻詩小雅其卒章義取非唯暴虎馮河之可畏也不敬小人亦危殆王鮒從斯義故不敢譏議公子圍鮒音附旻亡巾反退㑹子羽謂子皮曰叔孫絞而婉杜絞切也譏議似君反謂之美故曰婉絞古卯反姺紆阮反宋左師簡而禮無所臧否故曰簡共事大國故曰禮樂王鮒字而敬字愛也不犯凶人所以自愛敬子與子家持之杜子子皮子家蔡公孫歸生持之言無所取與皆保世之主也齊衞陳大夫其不免乎國子代人憂子招樂憂齊子雖憂弗害林國弱云代二子愍故為代人憂陳公子招云不憂何成二子樂矣是以憂為樂衛齊惡云雖憂何害是以憂為無害夫弗及而憂與可憂而樂與憂而弗害皆取憂之道也憂必及之大誓曰民之所欲天必從之杜逸書三大夫兆憂憂能無至乎言開憂兆也言以知物其是之謂矣杜物類也察言以知禍福之類八年陳招殺大子國弱齊惡當身各無患季武子伐莒取鄆兵未加莒而鄆服故書取而不言伐莒人告於㑹楚告于晉曰尋盟未退杜尋弭兵之盟而魯伐莒瀆齊盟林瀆慢齊一之盟請戮其使杜時叔孫豹在㑹欲戮之使所吏反下同樂桓子相趙文子杜桓子樂王鮒相佐也相息亮反欲求貨於叔孫而為之請使請帶焉杜難指求貨故以帶為辭為子偽反弗與梁其踁曰貨以藩身子何愛焉杜踁叔孫家臣林言人之有貨賄所以藩衞其身如藩籬然何愛於貨不以免禍踁戸定反藩方元反叔孫曰諸候之㑹衞社稷也我以貨免魯必受師言不戮其使必伐其國是禍之也何衞之為人之有牆以蔽惡也喻已為國衞如牆為人蔽牆之隙壊誰之咎也林既為垣牆而有隙可窺有壊可踰是不能蔽惡其咎在牆也隙去逆反衞而惡之吾又甚焉林既為國衞而露其惡則吾之罪又甚于牆雖怨季孫魯國何罪杜怨季孫之伐莒叔出季處有自來矣吾又誰怨杜季孫守國叔孫出使所從來乆今遇此戮無所怨也然鮒也賄弗與不已召使者裂裳帛而與之曰帶其􅄶矣言帶􅄶盡故裂裳示不相逆賄呼罪反趙孟聞之曰臨患不忘國忠也杜謂言魯國何罪思難不越官信也杜謂言叔出季處難乃旦反下同圖國忘死貞也杜謂不以貨免謀主三者義也杜三者忠信貞有是四者又可戮乎杜併義而四乃請諸楚曰魯雖有罪其執事不辟難執事謂叔孫畏威而敬命矣謂不敢辟戮子若免之以觀左右可也若子羣吏處不辟汚杜污勞事汚音烏下同出不逃難杜不苟免其何患之有患之所生汚而不治難而不守所由來也能是二者又何患焉不靖其能其誰從之杜安靖賢能則衆附從魯叔孫豹可謂能矣請免之以靖能者子㑹而赦有罪杜不伐於魯又賞其賢赦叔孫諸候其誰不欣焉望楚而歸之視逺如邇林視楚之逺如在近境不憚勤勞以事楚國疆場之邑一彼一此何常之有言今哀世疆場無定主疆居良反場音昜王伯之令也杜言三王五伯有令命時引其封疆杜引正也正封界而樹之官杜樹立也立官以守國舉之表旗杜旌旗以表貴賤而著之制令為諸侯作制度法令使不得相侵犯過則有刑猶不可壹於是乎虞有三苗三苗饕餮於三危者夏有觀扈杜觀國今頓丘衞縣扈在始平鄠縣書序曰啓與有扈戰于甘之野觀音館舊音官扈音戸商有姺邳杜二國商諸候邳今下邳縣姺西典反又西禮反邳皮悲反周有徐奄二國皆嬴姓書序曰成王伐淮夷遂踐奄徐即淮夷自無令王諸候逐進逐猶競也狎主齊盟其又可壹乎杜彊弱無常故更主盟狎戸甲反恤大舎小足以為盟主林憂恤其大者如篡弑滅亡之禍舎棄其小者如戰伐侵奪之事又焉用之杜焉用治小事焉於䖍反封疆之削何國蔑有主齊之盟者誰能辯焉杜辨治也吳濮有釁楚之執事豈其顧盟杜吴在東濮在南今建寧郡南有濮夷釁過也言濮有過於楚楚之為執政者豈有顧弭兵之盟不稱兵以治其過濮音卜釁許靳反莒之疆事楚勿與知諸候無煩不亦可乎莒魯爭鄆為日久矣苟無大害於其社稷可無亢也林苟不為莒國社稷之大害不必亢禦之可也輿音預亢苦浪反徐音剛去煩宥善莫不競勸林去煩細之事宥善良之人則人莫不争勸於為善子其圖之固請楚人許之乃免叔孫令尹享趙孟賦大明之首章杜大明詩大雅首章言文王明明照於下故能赫赫盛於上令尹意在首章故特稱首章以自光大趙孟賦小宛之二章杜小宛詩小雅二章取其各敬爾儀天命不又言天命一去不可復還以戒令尹宛紆阮反事畢趙孟謂叔向曰令尹自以為王矣何如問將能成否對曰王弱令尹彊其可哉杜言可成雖可不終趙孟曰何故對曰彊以克弱而安之彊不義也林以臣之彊勝君之弱而安之以為當然是臣彊而不義不義而彊其斃必速詩曰赫赫宗周褒姒滅之彊不義也杜詩小雅褒如周幽王后幽王惑焉而不行義遂至滅亡言雖赫赫盛彊不義足以滅之令尹為王必求諸候晉少懦矣杜懦弱也懦乃亂反諸候將徃若獲諸侯其虐滋甚滋益也民弗堪也將何以終夫以彊取杜取不以道不義而克必以為道道以淫虐弗可久已矣林身既不義而又克勝必以不義為道以淫縱暴虐為常道不能久居天位也已為十二年楚弑靈王傳夏四月趙孟叔豹曹大夫入于鄭杜㑹罷過鄭鄭伯兼享之子皮戒趙孟戒享期禮終趙孟賦瓠葉杜受所戒禮畢而賦詩瓠葉詩小雅義取古人不以微薄廢禮雖瓠葉兔首猶與賔客享之瓠戶故反子皮遂戒穆叔且告之杜告以趙孟賦瓠葉穆叔曰趙孟欲一獻杜瓠葉詩義取薄物而以獻酧知欲一獻子其從之子皮曰敢乎杜言不敢穆叔曰夫人之所欲也又何不敢杜夫人趙孟夫音扶及享具五獻之籩豆於幕下朝聘之制大國之卿五獻私於子産杜私語曰武請於冡宰矣杜冡宰子皮請謂賦瓠葉乃用一獻趙孟為客禮終乃宴卿㑹公候享宴皆折爼不體薦穆叔賦鵲巢杜鵲巢詩召南言鵲有巢而鳩居之喻晉君有國趙孟治之趙孟曰武不堪也又賦采蘩杜亦詩召南義取蘩菜薄物可以薦公候享其信不求其厚蘩音煩曰小國為蘩大國省穡而用之其何實非命杜穆叔言小國微薄猶蘩菜大國能省愛用之而不棄則何敢不從命穡愛也省所景反徐所幸反子皮賦野有死麕之卒章杜野有死麕詩召南卒章曰舒而脫脫兮無感我帨兮無使尨也吠脫脫安徐帨佩巾義取君子徐以禮來無使我失節而使狗驚吠喻趙孟以義撫諸候無以非禮相加陵麕九倫反趙孟賦常棣杜常棣詩小雅取其凡今之人莫如兄弟言欲親兄弟之國棣直計反且曰吾兄弟比以安尨也可使無吠林受子皮之詩言我兄弟比合以安靖尨狗可使無驚吠之恐比毘志反尨武江反穆叔子皮及曹大夫興拜杜三大夫皆兄弟國興起也舉兕爵曰小國頼子知免於戾矣杜兕爵所以罸不敬言小國䝉趙孟徳比以安自知免此罸戮兕徐履反戾力計反下同飲酒樂趙孟出曰吾不復此矣杜不復見此樂樂音洛天王使劉定公勞趙孟于潁館於雒汭杜王周景王定公劉夏潁水出陽城縣雒汭在河南鞏縣南水曲流為汭勞力報反下同潁營井反汭如鋭反劉子曰美哉禹功杜見河雒而思禹功明徳逺矣微禹吾其魚乎吾與子弁冕端委以治民臨諸候禹之力也杜弁冕冠也端委禮衣言今得共服冠冕有國家者皆由禹之功子盍亦逺績禹功而大庇民乎杜勸趙孟使纂禹功盍戸獵反績或作續庇必利反又音秘對曰老夫罪戾是懼焉能恤逺吾儕偷食朝不謀夕何其長也言欲苟免目前不能念長久焉於䖍反下同劉子歸以語王曰諺所謂老將知而耄及之者杜八十曰耄耄亂也林言人至老當有智識而耄亂反及之語魚㨿反知音智耄莫報反其趙孟之謂乎為晉正卿以主諸候而儕于隸人朝不謀夕杜言其自比於賤人而無恤民之心棄神人矣民為神主不恤民故神人皆去神怒民叛何以能乆趙孟不復年矣杜言將死不復見明年神怒不歆其祀民叛不即其事林神所忿怒不歆享其祭祀民所怨叛不即就其事功祀事不從又何以年為此冬趙孟卒起本叔孫歸杜虢㑹歸曽天御季孫以勞之旦及日中不出杜恨季孫伐莒使已幾被戮天於非反曽夭謂曽阜曽阜叔孫家臣阜扶九反曰旦及日中吾知罪矣魯以相忍為國也林言魯國褊小但以能相容忍故立國不為人所叛忍其外不忍其内焉用之欲受楚戮是忍其外日中不出是不忍其内阜曰數月于外言叔孫勞役在外數月數所主反一旦於是庸何傷林言季孫一旦相待於此用何傷害賈而欲贏而惡囂乎言譬如商賈求贏利者不得惡誼囂之聲賈音古贏音盈惡烏路反下同囂許驕反徐五髙反阜謂叔孫曰可以出矣叔孫指楹曰雖惡是其可去乎乃出見之杜楹柱也以喻魯有季孫猶屋有柱鄭徐吾犯之妹美杜犯鄭大夫公孫楚聘之矣杜楚子南穆公孫公孫黑又使强委禽焉禽鴈也納采用鳫强其丈反犯懼告子産子産曰是國無政非子之患也林言此乃鄭國政令不正所致非徐吾氏之憂唯所欲與犯請於二子請使女擇焉皆許之子晳盛飾入布幣而出杜布陳贄幣子晳公孫黒子南戎服入左右射超乘而出女自房觀之曰子晳信美矣抑子南夫也杜言丈夫乘繩證反夫夫婦婦所謂順也適子南氏子晳怒既而櫜甲以見子南欲殺之而取其妻子南知之執戈逐之及衝擊之以戈杜衝交道子晳傷而歸告大夫曰我好見之不知其有異志也故傷大夫皆謀之子産曰直鈞㓜賤有罪罪在楚也杜先聘子南直也子南用戈子晳直也子産力未能討故鈞其事歸罪于楚好如字又呼報反直鈞音均絶句乃執子南而數之曰國之大節有五女皆奸之奸犯也女音汝下皆同奸音干畏君之威聽其政尊其貴事其長養其親五者所以為國也今君在國女用兵焉不畏威也奸國之紀不聽政也杜奸國之紀謂傷人長丁丈反養如字下同子晳上大夫女嬖大夫而弗下之不尊貴也幼而不忌不事長也杜忌畏也嬖必計反下戸嫁反兵其從兄林子晳子南之從父兄也而以兵傷之從如字又才用反不養親也君曰余不女忍殺宥女以逺勉速行乎無重而罪林稱鄭伯之命言我不忍遽然而便殺汝始從寛宥放汝於逺地女可自勉速行逺去無增重汝之罪重直用反又直勇反五月庚辰鄭放游楚於吳林游楚即公孫楚子南也子産咨于太叔大叔游楚之兄子大叔曰吉不能亢身焉能亢宗杜亢蔽也亢苦浪反彼國政也非私難也林彼謂子南被逐乃國之政令非私家之患難也難乃且反子圖鄭利則行之又何疑焉周公殺管叔而蔡蔡叔杜蔡放也昔周公攝政二叔流言周公乃辟管叔于商囚蔡叔于郭鄰上蔡字素葛反說文作􅔁音同云􅔁散之也下蔡叔如字夫豈不愛王室故也吉若獲戾子將行之何有於諸游為二年鄭殺公孫黑傳夫音扶秦后子有寵於桓如二君於景杜后子秦桓公子景公母弟鍼也其權寵如兩君其母曰弗去懼選選數也恐景公數其罪而加戮選息轉反徐素短反下同癸卯鍼適晉其車千乘書曰秦伯之弟鍼出奔晉罪秦伯也杜罪失敎乘繩證反下同后子享晉侯為晉侯設享禮造舟于河造舟為梁通秦晉之道造七報反李廵注爾雅云比其船而度也郭云併舟為橋十里舎車杜一舎八乘為八反之備自雍及絳林雍秦都絳晉都杜雍絳相去千里用車八百乘雍于用反歸取酬幣杜備九獻之儀始禮自齎其一故續送其八酧酒幣終事八反每十里以八乘車各以次載幣相授而還不徑至故言八反千里用車八百乘其二百乘以自隨故言千乘傳言秦鍼之出極奢富以成禮欲盡敬於所赴司馬侯問焉曰子之車盡於此而已乎對曰此之謂多矣若能少此吾何以得見言已坐車多故出奔見賢遍反女叔齊以告公杜叔齊司馬侯女音汝且曰秦公子必歸臣聞君子能知其過必有令圖令圖天所贊也后子見趙孟趙孟曰吾子其曷歸杜問何時當歸對曰鍼懼選於寡君是以在此將待嗣君趙孟曰秦君何如對曰無道趙孟曰亡乎對曰何為一世無道國未艾也杜艾絶也林先君之徳澤在人心國未艾絶也艾魚廢反國於天地有與立焉言欲輔助之者多不數世淫弗能斃也趙孟曰天乎對曰有焉趙孟曰其幾何對曰鍼聞之國無道而年榖和熟天贊之也杜贊佐助也幾居豈反下同鮮不五稔杜鮮少也少尚當歴五年多則不啻鮮息淺反稔而甚反趙孟視蔭曰朝夕不相及誰能待五杜蔭日景也趙孟意衰以日景自喻故言朝夕不相及誰能待五蔭於金反后子出而告人曰趙孟將死矣主民翫歳而愒日林翫愒皆貪也言執政為民之主反而貪翫歲日翫五喚反愒苦蓋其與幾何言不能久與如字又音預鄭為游楚故杜游楚子南為于偽反六月丁巳鄭伯及其大夫盟于公孫段氏罕虎公孫僑公孫段印段游吉駟帶私盟于閨門之外實薰隧杜閨門鄭城門薰隧門外道名實之者為明年子産數子晳罪稱薰隧盟起本閨音圭薰許云反隧音遂公孫黑彊與於盟使大史書其名且曰七子自欲同於六卿故曰七子彊其丈反與音預子産弗討杜子晳彊討之恐亂國晉中行穆子敗無終及羣狄于大原杜即大鹵也無終山戎大音泰崇卒也杜崇聚也卒子忽反下同將戰魏舒曰彼徒我車所遇又阨言地險不便車阨本又作隘於懈反以什共車必克更增十人以當一車之用共音恭困諸阨又克車每困於阨道今去車故為必克請皆卒去車為歩卒自我始乃毁車以為行魏舒先自毁其屬車為步陳行户即反五乘為三伍乘車者車三人五乘十五人今改去車更以五人為伍分為三伍乘繩證反荀吴之嬖人不肻即卒斬以徇杜魏舒輒斬之荀吴不恨所以能立功徇辭俊反為五陳以相離林制步卒為五陳互相救援蓋以道阨難於用衆故臨時之宜制為五陳不相聨屬易於進退如下文所云兩於前伍於後專為右角參為左角偏為前拒林其居前之陳名日兩一也其居後之陳名曰伍二也其右軍之陳名曰專三也其左軍之陳名曰參四也其前拒之陳名曰偏五也此皆臨時處置之名拒九甫反以誘之翟人笑之笑其失常未陳而薄之林乘狄人未陳迫而擊之大敗之傳言荀吴能用善謀莒展輿立而奪羣公子秩公子召去疾于齊按前年去疾奔齊今羣公子怒展輿故召欲立之秋齊公子鉏納去疾齊雖納去疾莒人先召之故從國逆例書入展輿奔吴杜吴外孫叔弓帥師疆鄆田因莒亂也此春取鄆今正其疆界疆居良反於是莒務婁瞀胡及公子滅明以大厖與常儀靡奔齊杜二子展輿黨大厖常儀靡莒二邑務如字又音謀一音無瞀音茂一音謀厖武江反君子曰莒展之不立林莒展即展輿不終立為君棄人也夫奪羣公子秩是棄人夫音扶人可弃乎詩曰無競維人善矣杜詩周頌言惟得人則國家彊競彊也言莫彊於用人晉侯有疾鄭伯使公孫僑如晉聘且問疾叔向問焉曰寡君之疾病卜人曰實沈臺駘為祟史莫之知敢問此何神也子産曰昔髙辛氏有二子伯曰閼伯季曰實沈杜髙辛帝嚳駘他才反祟息遂反閼於葛反居于曠林不相能也曠林地闕能如字又奴代反日尋干戈以相征討杜尋用也后帝不臧杜后帝堯也臧善也不善二子所為遷閼伯于商丘主辰杜商丘宋地主祀辰星辰大火也商人是因故辰為商星杜商人湯先相土封商丘因閼伯故國祀辰星遷實沈于大夏主參杜大夏今晉陽縣林參水星也主祀參星參所林反唐人是因以服事夏商杜唐人若劉累之等累遷魯縣此在大夏其季世曰唐叔虞杜唐人之季世其君曰叔虞當武王邑姜方震大叔邑姜武王后齊大公之女懐胎為震大叔成王之弟叔虞震本又作娠之慎反又音申大音泰下同夢帝謂己余命而子曰虞杜帝天取唐君之名將與之唐屬諸參林屬諸參星之分野而蕃育其子孫及生有文在其手曰虞遂以命之及成王滅唐而封大叔焉故參為晉星叔虞封唐是為晉侯屬之王反蕃音煩由是觀之則實沈參神也昔金天氏有裔子曰昧為𤣥㝠師生允格臺駘杜金天氏帝少皥裔逺也𤣥㝠水官昧為水官之長裔以制反臺駘能業其官林纂昧之業宣汾洮宣猶通也汾洮二水名汾扶云反洮他刀反障大澤杜陂障之障之尚反又音章以處大原大原音陽也臺駘之所居帝用嘉之封諸汾川杜帝顓頊沈姒蓐黄實守其祀四國臺駘之後沈音審姒音以今晉主汾而滅之矣杜滅四國由是觀之則臺駘汾神也抑此二者不及君身林抑此二神所降災福不及國君之身生其疾病山川之神則水旱癘疫之災於是乎禜之杜有水旱之災則禜祭山川之神若臺駘者周禮四曰禜祭為營攅用幣以祈福祥癘音例疫音役禜音詠徐音榮日月星辰之神則雪霜風雨之不時於是乎禜之杜星辰之神若實沈者若君身則亦出入飲食哀樂之事也山川星辰之神又何為焉杜言實沈臺駘不為君疾樂音洛僑聞之君子有四時朝以聽政晝以訪問夕以修令夜以安身杜一日之中君子分為四時各治其事且氣清明又事之始故以聽治國政日中為市衆之所聚故以訪問可否日之所為夕而念之故以修節號令夜氣所存良心可復安故安息身體於是乎節宣其氣宣散也勿使有所壅閉湫底以露其體林壅謂氣止而不行閉謂氣塞而不通湫謂氣聚而不散底謂氣泄而不快露羸也節宣失時則血氣集滯而肌體羸露也湫子小反徐音秋底丁禮反兹心不爽而昏亂百度杜茲此也爽明也百度百事之節今無乃壹之言同四時也則生疾矣僑又聞之内官不及同姓杜内官嬪御其生不殖林殖長也蓋男女同姓雖有生産不能長殖美先盡矣則相生疾杜同姓之相與先美矣美極則盡盡則生疾君子是以惡之故志曰買妾不知其姓則卜之林卜而得吉必非同姓者矣惡如字又烏路反違此二者古之所慎也杜壹四時取同姓二者古人所慎男女辨姓禮之大司也杜辨别也今君内實有四姬焉杜同姓姬四人其無乃是也乎林其毋乃由是生疾乎若由是二者弗可為也已為治也四姬有省猶可無則必生疾矣林言平公平時若據異姓去同姓於四姬進御猶有減省則病猶可已若無減省則必美盡而生疾矣省所景反徐所幸反叔向曰善哉肸未之聞也此皆然矣叔向出行人揮送之杜送叔向叔向問鄭故焉且問子晳對曰其與幾何杜言將敗不久與如字又音預幾豈居反無禮而好陵人怙富而卑其上林無禮而剛故好陵犯於人怙富而驕故敢卑弱其上好呼報反怙音戸弗能久矣為明年鄭殺公孫黑傳晉侯聞子産之言曰博物君子也重賄之晉侯求醫於秦秦伯使醫和視之曰疾不可為也是謂近女室疾如蠱杜蠱惑疾蠱音古非鬼非食林非由鬼神非由飲食惑以喪志杜惑女色而失志喪息浪反良臣將死天命不祐杜良臣不匡救君過故將死而不為天所祐祐昔又公曰女不可近乎對曰節之林言女色非不可近伹當有節先王之樂所以節百事也故有五節杜五聲之節遲速本末以相及林其為聲也由遲而速由本而未以成中和之聲中聲以降五降之後不容彈矣林降罷退也此謂先王之樂得中聲聲成而罷退五降而息不容彈作降音絳下同或戸江反彈徒丹反又徒且反於是有煩手淫聲慆堙心耳乃忘平和君子弗聽也林五降不息則襍聲並奏非彈之正是為煩手非聲之正是為淫聲慆藏其心堙塞其耳乃忘平和之聲所為鄭衞之聲慆吐刀反下同堙音因物亦如之言百事皆如樂不可失節至于煩乃舎也巳無以生疾杜煩不舍則生疾舍音捨君子之近琴瑟以儀節也非以慆心也杜為心之節儀使動不過度天有六氣謂陰陽風雨晦明也降生五味謂金味辛木味酸水味鹹火味苦土味甘皆由陰陽風雨而生發為五色辛色白酸色青鹹色黑苦色赤甘色黄發見也徵為五聲言白聲商青聲角黑聲羽赤聲徵黄聲宫徵驗也淫生六疾杜淫過也滋味聲色所以養人然過則生害六氣曰陰陽風雨晦明也分為四時序為五節杜六氣之化分而序之則成四時得五行之節過則為菑陰淫寒疾寒過則為冷菑音災下同陽淫熱疾熱過則喘渴風淫末疾杜未四支也風為緩急雨淫腹疾杜雨濕之氣為洩注晦淫惑疾晦夜生為晏寢過節則心惑亂明淫心疾明晝也思慮煩多心勞生疾女陽物而晦時淫則生内熱惑蠱之疾杜女常隨男故言陽物家道常在夜故言晦時林以其陽淫故生内熱之疾以其晦淫故生惑蠱之疾今君不節不時能無及此乎林好樂既無其節宴寢不有其時能無至此不可治療之疾乎出告趙孟趙孟曰誰當良臣對曰主是謂矣主相晉國於今八年晉國無亂諸侯無闕可謂良矣和聞之國之大臣榮其寵禄任其大節有菑禍興而無改焉必受其咎林享君之尊寵厚禄以為已榮受君之政事節度以為已任國家將有失道之禍而不能改行以救其災必自受其咎殃相自亮反今君至于淫以生疾將不能圖恤社稷禍孰大焉主不能禦吾是以云也林趙孟身為大臣不能格君而禦止之我是以云趙孟將死也趙孟曰何謂蠱對曰淫溺惑亂之所生也杜溺沈沒於嗜欲於文皿蟲為蠱杜文字也皿器也器受蟲害者為蠱血命景反字林音猛榖之飛亦為蠱言穀久積則變為飛蟲名曰蠱在周易女惑男風落山謂之蠱杜巽下艮上蠱林巽為長女艮為少男少男而說長女非匹蠱惑之象巽為風艮為山山木為風所落蠱壊之象皆同物也林物猶類也言此三者為蠱皆同物類也趙孟曰良醫也厚其禮而歸之杜贈賄之禮楚公子圍使公子黑肱伯州犂城犨櫟郟杜黑肱王子圍之弟子晳也犨縣屬南陽郟縣屬襄城櫟今河南陽翟縣三邑本鄭地犨尺州反櫟音歴徐失灼反郟古洽反鄭人懼子産曰不害令尹將行大事林令尹即公子圍謂將弑而先除二子也杜二子謂黒肱伯州犂禍不及鄭何患焉冬楚公子圍將聘于鄭伍舉為介未出竟聞王有疾而還伍舉遂聘十一月己酉公子圍至入問王疾縊而殺之杜縊絞也孫卿曰以冠纓絞之長厯推己酉十二月六日經傳皆言十一月月誤也竟音境縊一鼔反遂殺其二子幕及平夏杜皆郟敖子右尹子干出奔晉杜子干王子比宫廐尹子晳出奔鄭杜因築城而去廏居又反殺大宰伯州犂于郟林因州犂城卯而殺之葬王于郟謂之郟敖杜郟放楚子麋林楚人謂未成君為敖使赴于鄭伍舉問應為後之辭焉言伍舉時奉使在鄭問使者以應立為楚後之辭對曰寡大夫圍伍舉更之曰共王之子圍為長言伍舉更赴辭使從禮此告終稱嗣不以簒弑赴諸侯其音恭長丁丈反子干奔晉從車五乘叔向使與秦公子同食杜食禄同從才用反乘繩證反下同皆百人之餼百人一卒也其禄足百人餼許氣反趙文曰秦公子富杜謂秦鍼富強秩禄不宜與子干同叔向曰底禄以徳林底致也徳之厚薄致禄因也底音㫖徳鈞以年年同以尊公子以國林徳厚薄鈞則以年齒為髙下年長幼同則以尊卑為髙下皆公子也則以其國大小為髙下不聞以富且夫以千乘去其國彊禦己甚詩曰不侮鰥寡不畏彊禦杜詩大雅侮陵也夫音扶鰥古顔反秦楚匹也使后子與子干齒杜以年齒為髙下而坐辭曰鍼懼選楚公子不獲是以皆來亦唯命杜不獲不得自安言俱奔事有優劣唯主人命所處謙辭且臣與羈齒無乃不可乎后子先來仕欲自同於晉臣為主人子干后來奔以為羈旅之客史佚有言曰非羈何忌林忌敬也言不敬羈客當誰敬哉秦鍼欲謙辭以自别楚靈王即位薳罷為令尹薳啟彊為大宰杜靈王公子圍也即位易名熊䖍罷音皮彊其良反又居良反鄭游吉如楚葬郟敖且聘立君歸謂子産曰具行器矣楚王汰侈而自說其事必合諸侯吾往無日矣林言可具如楚之器備靈王驕汰奢侈且自喜其彊而不義之事必合諸侯以圖伯業我往㑹楚必不久矣汰音泰說音悦又始悦反子産曰不數年未能也林不數年之後未能合諸侯也為四年㑹申𫝊數所主反十二月晉既烝烝冬祭也趙孟適南陽將㑹孟子餘孟子餘趙衰趙武之曽祖其廟在於晉之南陽温縣往㑹祭之甲辰朔烝于温杜趙氏烝祭甲辰十二月朔晉既烝趙孟乃烝其家廟則晉烝當在甲辰之前𫝊言十二月月誤庚戌卒杜十二月七日終劉定公秦后子之言鄭伯如晉弔及雍乃復杜弔趙氏蓋趙氏辭之而還𫝊言大夫彊諸侯畏而弔之雍於用反左傳杜林合注卷三十四
