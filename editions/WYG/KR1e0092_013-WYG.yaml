body:
  text: 左傳杜林合注卷十三明王道焜趙如源同編僖公五經戊子二十有七年春杞子來朝夏六月庚寅齊侯昭卒杜十九年與魯大夫盟于齊林孝公卒弟昭公潘立秋八月乙未葬齊孝公杜無傳三月而葬速乙巳公子遂帥師入杞杜弗地曰入八月無乙巳乙巳九月六日冬楚人陳侯蔡侯鄭伯許男圍宋杜傳言楚子使子玉去宋經書人者恥不得志以微者告猶序諸侯之上楚主兵故林楚序諸侯上而稱人嫌予楚以霸也十有二月甲戍公㑹諸侯盟于宋杜無傳諸侯伐宋公與楚有好而往㑹之非後期宋方見圍無嫌於與盟故直以宋地傳二十七年春杞桓公來朝用夷禮故曰子杜杞先代之後而迫於東夷風俗雜壊言語衣服有時而夷故杞子卒傳言其夷也今稱朝者始於朝禮終而不全異於介葛盧故唯貶其爵公卑杞杞不共也杜杞用夷禮故賤之共音恭本亦作恭夏齊孝公卒有齊怨杜前年齊再伐魯不廢喪紀禮也杜弔贈之數不有廢林得交鄰之禮秋入杞責無禮也杜責不共也責無禮本或作責禮也楚子將圍宋使子文治兵於睽杜子文時不為令尹故云使治兵習號令也睽楚邑睽苦圭反又音圭終朝而畢不戮一人杜終朝自旦及食時也子文欲委重於子玉故略其事朝如字戮音六子玉復治兵於蒍杜子玉為令尹故蒍楚邑復扶又反蒍又于委反終日而畢鞭七人貫三人耳林以矢穿其耳貫音官又古亂反國老皆賀子文子文飲之酒林國老卿大夫之致仕者也皆賀子文使子玉為令尹能堪其事飲於鴆反蒍賈尚幼後至不賀杜蒍賈伯嬴孫叔敖之父幼少也嬴音盈子文問之對曰不知所賀林言不知所以可賀之由子之傳政於子玉曰以靖國也靖諸内而敗諸外所獲幾何林述子文二十三年答叔伯之言一時雖獲安靖於内而異日驕功生事必致喪敗於外言所得不補所喪傳自專反幾居豈反子玉之敗子之舉也舉以敗國將何賀焉林子玉若敗楚師於外由子文實舉以自代舉子玉而以敗國事將何足以為賀子玉剛而無禮不可以治民過三百乘其不能以入矣茍入而賀何後之有林言子玉力小任重將不能以入其衆而治之也茍子玉能入其衆而舉賀典未為後時而失禮言不勝其任不足賀杜三百乘二萬二千五百人乘繩證反冬楚子及諸侯圍宋宋公孫固如晉告急杜公孫固宋莊公孫林即二十二年大司馬固先軫曰報施救患取威定霸於是乎在矣杜先軫晉下軍之佐原軫也林報宋贈馬之施救宋被圍之患取威重於諸侯定霸業於晉國四事皆在救宋之一舉矣軫之忍反施式豉反狐偃曰楚始得曹而新昏於衛若伐曹衛楚必救之則齊宋免矣杜前年楚使申叔侯戍穀以逼齊於是乎蒐于被廬杜晉常以春蒐禮改政令敬其始也被廬晉地林蒐治兵也蒐所求反被皮義反廬力居反作三軍杜閔元年晉獻公作二軍今復大國之禮謀元帥林諮謀于衆以誰可當中軍大帥之任帥所類反趙衰曰郤縠可臣亟聞其言矣説禮樂而敦詩書詩書義之府也禮樂德之則也德義利之本也夏書曰賦納以言明試以功車服以庸林言臣數聞郤縠之言其所喜説者禮樂之事其所崇敦者詩書之文詩備美刺善惡書載帝王興廢此義理之府藏也禮以導中樂以導和此德行之法則也德行義理利國利民之本也杜尚書虞夏書也取納以言觀其志也明試以功考其事也車服以庸報其勞也賦猶取也庸功也縠本又作穀同胡本反亟欺冀反數也説音説君其試之林言臣既聞其言君盍明試以功乃使郤縠將中軍郤溱佐之使狐偃將上軍讓於狐毛而佐之杜狐毛偃之兄將子匠反下皆同溱側巾反命趙衰為卿林將下軍讓於欒枝先軫杜欒枝貞子也欒賓之孫欒魯官反使欒枝將下軍先軫佐之荀林父御戎魏犫為右杜荀林父中行桓子晉侯始入而敎其民二年欲用之杜二十四年入子犯曰民未知義未安其居林無義則茍生用之易至於逃散於是乎出定襄王二十五年定襄王以示事君之義入務利民民懐生矣林民皆懐生安居知生之可樂將用之子犯曰民未知信未宣其用杜宣明也未明於見用之信於是乎伐原以示之信杜伐原在二十五年林待三日糧退三十里以示之信民易資者不求豐焉明徴其辭林民以貨物易資財者不詐以求豐多明定其辭不二價重言信也公曰可矣乎子犯曰民未知禮未生其共於是乎大蒐以示之禮杜蒐順少長明貴賤作執秩以正其官杜執秩主爵秩之官秩直乙反民聽不惑而後用之林民知義知信知禮則聽上之命而不疑惑然後用民以圖霸業如下文所云出穀戍釋宋圍杜楚子使申叔去穀子玉去宋一戰而霸文之教也杜謂明年戰城濮林由晉侯以文徳教民故也經己丑二十有八年春晉侯侵曹晉侯伐衛杜再舉晉侯者曹衛兩來告林晉文公始圖霸自此至踐土凡五書晉侯予晉以霸也公子買戍衛不卒戍刺之杜公子買魯大夫子叢也内殺大夫皆書刺言用周禮三刺之法示不枉濫也公實畏晉殺子叢而遂誣叢以廢戍罪恐不為遠近所信故顯書其罪刺七賜反楚人救衛三月丙午晉侯入曹執曹伯畀宋人杜畀與也執諸侯當以歸京師晉欲怒楚使戰故以與宋所謂譎而不正畀必利反夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績杜宋公齊國歸父秦小子憖既次城濮以師屬晉不與戰也子玉及陳蔡之師不書楚人恥敗告文略也大崩曰敗績林城濮衛地濮音卜楚殺其大夫得臣杜子玉違其君命以取敗稱名以殺罪之衛侯出奔楚五月癸丑公㑹晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土杜踐土鄭地王子虎臨盟不同歃故不書衛侯出奔其弟叔武攝位受盟非王命所加從未成君之禮故稱子而序鄭伯之下經書癸丑月十八日也傳書癸亥月二十八日經傳必有誤踐侣淺反土如字或又音杜陳侯如㑹杜無傳陳本與楚楚敗懼而屬晉來不及盟故曰如㑹公朝于王所杜無傳王在踐土非京師故曰王所林書朝王始此先朝王而後盟是以天子與斯盟也書盟而後朝春春秋不以天子與斯盟之辭也六月衛侯鄭自楚復歸于衛杜復其位曰復歸晉人感叔武之賢而復衛侯衛侯之入由于叔武故以國逆為文例在成十八年衛元咺出奔晉杜元咺衛大夫雖為叔武訟訴失君臣之節故無賢文奔例在宣十年咺况晩反陳侯款卒杜無傳凡四同盟林穆公卒子共公朔立秋杞伯姬來杜無傅荘公女歸寜曰來公子遂如齊杜無傳聘也冬公㑹晉侯齊侯宋公蔡侯鄭伯陳子莒子邾人秦人于温杜陳共公稱子先君未葬例在九年宋襄公稱子自在本班陳共公稱子降在鄭下陳懐公稱子而在鄭上傳無義例蓋主㑹所次非褒貶也天王狩于河陽杜晉地今河内有河陽縣晉實召王為其辭逆而意順故經以王狩為辭林晉侯召王以諸侯見是先狩而后㑹也春秋先書㑹后書狩者書狩而后㑹是以天子與斯㑹也先書㑹后書狩春秋不以天子與私㑹之辭也狩本又作守音同壬申公朝于王所杜壬申十月十日有日而無月史闕文晉人執衛侯歸之于京師杜稱人以執罪及民也例在成十五年諸侯不得相治故歸之京師衛元咺自晉復歸于衞杜元咺與衛侯訟得勝而歸從國逆例者明衛侯無道于民國人與元咺諸侯遂圍許杜㑹温諸侯也許比再㑹不至故因㑹共伐之曹伯襄復歸于曹杜晉感侯獳之言而復曹伯故從國逆例遂㑹諸侯圍許杜言遂得復而行不歸國也傳二十八年春晉侯將伐曹假道于衛杜曹在衛東故衛人弗許還自南河濟杜從汲郡南渡自衛南而東侵曹伐衛林無鐘鼔曰侵有鐘鼓曰伐正月戊申取五鹿杜五鹿衞地二月晉郤縠卒原軫將中軍胥臣佐下軍上德也杜先軫以下軍佐超將中軍故曰上徳胥臣司空季子將子匠反胥思徐反晉侯齊侯盟于斂盂杜斂孟衛地林齊侯以谷戍之迫故從晉求援斂徐音亷又力儉反盂音于衛侯請盟晉人弗許衛侯欲與楚國人不欲故出其君以説于晉衛侯出居于襄牛林晉文公怨其不禮又不假道故不許衛盟衛人以其君欲從楚故逐出其君以自解説于晉杜襄牛衛地説音悦或如字公子買戍衛杜晉伐衛衛楚之昏姻魯欲與楚故戍衛楚人救衛不克公懼於晉殺子叢以説焉林楚欲救衛而不能魯見晉强楚弱故懼晉討杜召子叢而殺之以謝晉説音悦謂楚人曰不卒戍也杜詐告楚人言子叢不終戍事而歸故殺之殺子叢在楚救衛下經在上者救衛赴晩至晉侯圍曹門焉多死林攻曹城門晉人多死曹人尸諸城上杜磔晉死人于城上晉侯患之聽輿人之謀曰稱舍于墓林晉文公患其搖動軍心聽衆人之計謀順衆心也杜輿衆也舍墓為將發冢輿音餘師遷焉曹人兇懼杜遷至曹人墓兇兇恐懼聲兇凶勇反為其所得者棺而出之因其兇也而攻之林為其所得晉人棺斂其尸而出之于外欲加禮于晉師以免發冢之禍晉師因曹人之兇攻曹之城棺古患反一音官三月丙午入曹數之以其不用僖負羈而乘軒者三百人也且曰獻狀杜軒大夫車言其無德居位者多故責其功狀軒許言反令無入僖負羈之宫而免其族報施也杜報飱璧之施施始䜴反魏犫顛頡怒曰勞之不圖報於何有林二子各有從亡之勞故怒言從亡之勞苦尚不圖謀何有于報人之微施頡户結反爇僖負羈氏杜爇燒也爇如悦反魏犫傷於胸公欲殺之而愛其材使問且視之病將殺之杜文公欲討其違命而愛其有材力使人責問魏犫且視其傷胸之病將待其復命而殺之魏犫束胸見使者曰以君之靈不有寧也杜言不以病故自安寧也見賢遍反使所吏反距躍三百曲踊三百杜距躍超越也曲踊跳踊也百猶勵也林蓋距地向前超躍越物而過凡三次勉勵而為之距音巨躍羊略反三如字又息暫反百音陌下放此乃舍之林文公以其有禮乃赦不殺舍如字又音捨下同殺顛頡以徇于師立舟之僑以為戎右杜舟之僑故虢臣閔二年奔晉以代魏犫為先歸張本林蓋赦魏犫而黜其職徇似俊反宋人使門尹般如晉師告急杜門尹般宋大夫林楚人猶未解圍故告急般音斑公曰宋人告急舍之則絶杜與晉絶告楚不許林告楚釋宋楚又不許蓋兵交使在其間此必晉嘗為宋請傳不備載我欲戰矣齊秦未可若之何林齊秦二國未肯助我與楚戰先軫曰使宋舍我而賂齊秦林設計使宋捨晉而以賂求救于齊秦舍音捨藉之告楚杜假借齊秦使為宋請藉在亦反我執曹君而分曹衛之田以賜宋人林欲以激怒楚師楚愛曹衛必不許也杜不許齊秦之請喜賂怒頑能無戰乎杜言齊秦喜得宋賂而怒楚之頑必自戰也不可告請故曰頑公説執曹伯分曹衛之田以畀宋人林盡如先軫之計説音悦畀必利反楚子入居于申杜申在方城内故曰入使申叔去穀二十六年申叔戌穀使子玉去宋林二十七年楚圍宋今使撤圍而去曰無從晉師林言無得從晉師與之爭戰晉侯在外十九年矣而果得晉國杜晉侯生十七年而亡亡十九年而反凡三十六年至此四十矣險阻艱難備嘗之矣民之情偽盡知之矣天假之年林難險備嘗則志慮堅情偽盡知則見識明杜獻公之子九人唯文公在故曰天假之年而除其害杜除惠懐吕郤天之所置其可廢乎軍志曰允當則歸杜軍志兵書杜引此蓋謂齊秦既為宋請則赦宋而歸可謂允當無求過分當丁浪反又曰知難而退又曰有德不可敵林蓋謂晉師武臣力難以勝之可以退也晉侯備嘗難險盡知情偽為有德不可與之敵也此三志者晉之謂矣杜謂今與晉遇當用此三志子玉使伯棼請戰林伯棼子越椒也鬭伯比之孫請戰于楚成王求益師與晉戰也棼扶云反又扶粉反曰非敢必有功也願以間執䜛慝之口杜間執猶塞也䜛慝若蒍賈之言謂子玉不能以三百乘入間間厠之間慝吐得反王怒林楚成王怒其不肯去宋而請兵以戰少與之師唯西廣東宫與若敖之六卒實從之林楚子還申遣此兵以就前圍宋之衆楚有左右廣又大子有宫甲分取以給之若敖楚武王之祖父葬若敖者子玉之祖也六卒子玉宗人之兵六百人言不悉師以益之廣古曠反卒子忽反子玉使宛春告於晉師曰請復衛侯而封曹臣亦釋宋之圍林宛春楚大夫杜衛侯未出竟曹伯見執在宋已失位故言復衛封曹宛于元反又于阮反子犯曰子玉無禮哉君取一臣取二杜君取一以釋宋圍惠晉侯臣取二復曹衛為已功不可失矣林言可伐其罪勿失此機㑹矣先軫曰子與之定人之謂禮楚一言而定三國我一言而亡之我則無禮何以戰乎不許楚言是弃宋也救而弃之謂諸侯何林先軫以子犯之言為不然故曰子許之言安定人國謂之有禮子玉一言而復衛封曹釋宋是安三國晉不許楚則晉亡曹衛楚亦亡宋是亡三國我則無禮可以安定三國何以為戰之本乎不許楚復曹衛之言是棄宋不欲楚解圍而去救宋而反棄之將為諸侯所怪楚有三施我有三怨怨讐已多將何以戰不如私許復曹衛以攜之林此下乃先軫畫䇿杜私許二國使告絶于楚而後復之攜離也施始䜴反執宛春以怒楚既戰而後圖之杜須勝負決乃定計公説乃拘宛春於衛且私許復曹衛曹衛告絶於楚子玉怒從晉師林從晉師求戰也説音悦拘音俱晉師退軍吏曰以君辟臣辱也且楚師老矣何故退林以晉君而避子玉故曰以君辟臣且楚師連年在外疲敝已極何故退師避之子犯曰師直為壯曲為老豈在久乎林凡用師之道理直為强壯理曲為衰老豈以久出為老乎微楚之惠不及此林重耳過楚楚成王有贈送之惠退三舍辟之所以報也杜一舍三十里初楚子云若反國何以報我故以退三舍為報背惠食言以亢其讐杜亢猶當也讐謂楚也林背楚之惠而自食其避楚之言以當楚人之讐怨背音佩下同亢苦浪反我曲楚直其衆素飽不可謂老杜直氣盈飽我退而楚還我將何求若其不還君退臣犯曲在彼矣退三舍楚衆欲止子玉不可夏四月戊辰晉侯宋公齊國歸父崔夭秦小子憖次于城濮杜國歸父崔夭齊大夫也小子憖秦穆公子也城濮衛地林師過信為次夭於表反楚師背酅而舍杜酅丘陵險阻名林蓋楚從晉師舍止之地其背負險此所謂君退臣犯也酅户圭反晉侯患之聽輿人之誦杜恐衆畏險故聽其歌誦曰原田每每舍其舊而新是謀杜髙平曰原喻晉君美盛若原田之草每每然可以謀立新功不足念舊惠每亡回反又梅對反舍音捨公疑焉杜疑衆謂已背舊謀子犯曰戰也戰而捷必得諸侯若其不捷表裏山河必無害也杜晉國外河而内山公曰若楚惠何欒貞子曰漢陽諸姬楚實盡之杜貞子欒枝也水北曰陽姬姓之國在漢北者楚盡滅之思小惠而忘大恥不如戰也林思楚贈送之小惠而忘其滅諸姬之大恥不如與楚一戰以決勝負晉侯夢與楚子搏杜搏手搏搏音博楚子伏已而盬其腦杜盬啑也林夢搏時楚子伏晉侯之上而以口啑具腦也盬音古腦乃老反是以懼子犯曰吉我得天楚伏其罪吾且柔之矣杜晉侯上向故得天楚子下向地故伏其罪腦所以柔物子犯審見事宜故權言以答夢子玉使鬭勃請戰杜鬭勃楚大夫曰請與君之士戲林以戰為戲可見子玉輕用民命君馮軾而觀之得臣與寓目焉林得臣子玉名杜寓寄也馮皮氷反軾音式與音預寓音遇晉侯使欒枝對曰寡君聞命矣楚君之惠未之敢忘是以在此為大夫退其敢當君乎林言晉君聞楚欲戰之命矣楚君皆日贈送之惠中心未敢弭忘是以未敢決戰遲回在此大夫謂子玉言為子玉退三舍其何敢輒與君敵乎為于偽反既不獲命矣杜不獲止命敢煩大夫謂二三子杜煩鬭勃令戒勅子玉子西之屬戒爾車乘敬爾君事詰朝將見杜詰朝平旦林言平旦將以軍禮見乘繩證反下皆同詰起吉反朝如字見如字又賢遍反晉車七百乘韅靷鞅靽杜五萬二千五百人在背曰韅在胸曰靷在腹曰鞅在後曰靽言駕乘修備林一云著掖皮曰韅軸曰靷頸皮曰鞅縶曰靽韅許見反王又去見反説文作靷以忍反鞅於杖反靽音半晉侯登有莘之虛以觀師曰少長有禮其可用也杜有莘故國名少長猶言大小林登高以觀晉師之强弱少者在前長者在後如軍禮也莘所巾反虛丘魚反少詩照反長丁丈反遂伐其木以益其兵杜伐木以益攻戰之具輿曳柴亦是也己巳晉師陳于莘北胥臣以下軍之佐當陳蔡子玉以若敖之六卒將中軍曰今日必無晉矣子西將左子上將右林莘北即城濮胥臣佐下軍自以其軍當陳人蔡人子玉以其宗人之兵六百人為親兵自衛以將中軍子玉自誇其强言今日必盡滅晉師杜子西鬬宜申子上鬬勃陳直覲反卒子忽反下同將于匠反下同胥臣蒙馬以虎皮先犯陳蔡林馬見虎則伏胥臣以虎皮蒙馬欲使楚馬見之而懼也陳蔡奔楚右師潰杜陳蔡屬楚右師潰户内反狐毛設二斾而退之杜斾火旗也又建二斾而退使若大將稍却斾濤具反欒枝使輿曳柴而偽遁杜曳柴起塵詐為衆走遁徒困反楚師馳之杜楚師見二斾先退曳柴塵起以為晉師已走故馳而逐之原軫郤溱以中軍公族横擊之林原軫即先軫杜公族公所率之軍狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績子玉收其卒而止故不敗杜三軍唯中軍完是大崩夾古洽反又音頰晉師三日館穀杜館舍也食楚軍穀三日及癸酉而還甲午至于衡雍作王宫于踐土杜衡雍鄭地今滎陽卷縣襄王聞晉戰勝自徃勞之故為作宫雍於用反鄉役之三月杜鄉猶屬也城濮役之前三月鄉許亮反又作卿同鄭伯如楚致其師為楚師既敗而懼使子人九行成于晉杜子人氏九名林行成求服也為于偽反晉欒枝入盟鄭伯五月丙午晉侯及鄭伯盟于衡雍丁未獻楚俘于王駟介百乘徒兵千杜駟介四馬被甲徒兵步卒駟音四介音界鄭伯傅王用平禮也杜傅相也以周平王享晉文侯仇之禮享晉侯己酉王享醴命晉侯宥杜既享又命晉侯助以束帛以將厚意王命尹氏及王子虎内史叔興父策命晉侯為侯伯杜以策書命晉侯為伯也周禮九命作伯尹氏王子虎皆王卿士也叔興父大夫也三官命之以寵晉賜之大輅之服戎輅之服林大輅金輅也祭祀所乘其服鷩冕戎輅戎車也兵事所乘其服韋弁輅音路彤弓一彤矢百玈弓矢千杜彤赤弓玈黑弓弓一犬百則矢千弓十矣諸侯賜弓矢然後專征伐彤徒冬反玈音盧本或作旅字非也矢千本或作玈弓十玈矢千後人専輒加也秬鬯一卣杜秬黑黍鬯香酒所以降神卣器名秬音巨鬯勅亮反卣音酉又音由爾雅云卣中尊也虎賁三百人林周禮虎賁氏以虎士三百人先後王而趍侯伯始受此賜賁音奔曰王謂叔父敬服王命以綏四國糾逖王慝林晉與周同姓故稱曰叔父敬謹佩服王室之休命以撫綏四方諸侯之國杜逖遠也有惡於王者糾而遠之逖勅歴反慝他得反晉侯三辭從命曰重耳敢再拜稽首奉揚天子之丕顯休命杜稽首首至地丕大也休美也三息暫反又如字丕普悲反休許虯反受策以出出入三覲杜出入猶去來也從來至去凡三見王衛侯聞楚師敗懼出奔楚遂適陳杜自襄牛出使元咺奉叔武以受盟林元咺衛大夫叔武衛侯弟杜奉使攝君事癸亥王子虎盟諸侯于王庭杜踐王宫之庭書踐土别於京師要言曰皆奬王室無相害也有渝此盟明神殛之俾隊其師無克祚國林載書要約之言使諸侯同心奬助王室無得私相侵害有敢渝變今日盟誓之言則明神共誅殛之使隕墜其師衆無能世祚其國家奬將丈反渝羊朱反殛紀力反本又作極下是殛同俾本亦作卑必爾反隊直類反祚才故反及其𤣥孫無有老幼林曾孫之子曰𤣥孫自𤣥孫而下無問老幼俱受變盟之禍君子謂是盟也信杜合義信謂晉於是役也能以德攻杜以文徳教民而後用之攻如字一音公送反初楚子玉自為瓊弁玉纓未之服也杜弁以鹿子皮為之瓊美玉之别名次之以飾弁及纓詩云㑹弁如星林纓所以結於頷下而埀者瓊求營反説文云赤玉弁本又作玣皮彦反先戰夢河神謂已曰畀余林先城濮未戰時子玉自夢有河之神謂已言以弁纓與我先如字又悉薦反畀必利反與也余賜女孟諸之麋杜孟諸宋藪澤水草之交曰麋林蓋神言以宋之地利送子玉女音汝麋亡皮反弗致也大心與子西使榮黄諫杜大心子玉之子子西子玉之族子玉剛愎故因榮黄榮黄榮季也林諌子玉使以弁纓禱于河神弗聽榮季曰死而利國猶或為之况瓊玉乎是糞土也而可以濟師將何愛焉林言死而可以利國家忠臣義士猶或肯為之况瓊弁玉纓之屬乎不過糞土之類爾言其不足愛也杜因神之欲以附百姓之願濟師之理糞弗問反弗聽出告二子曰非神敗令尹令尹其不勤民實自敗也杜盡心盡力無所愛惜為勤林蓋禱河本無預于戰而足以繫屬民心今子玉吝惜瓊玉不為民禱戰是無勤民之心實自取禍敗既敗王使謂之曰大夫若入其若申息之老何杜申息二邑子弟皆從子玉而死言何以見其父老子西孫伯曰得臣將死二臣止之曰君其將以為戮杜孫伯即大心子玉子也二子以此答王使言欲令子玉往就君戮及連穀而死杜至連穀王無赦㑹故自殺也文十年傳曰城濮之役王使止子玉曰無死不及子西亦自殺縊而縣絶故得不死王時别遣追前使連穀楚地殺得臣經在踐土盟上傳在下者説晉事畢而次及楚屬文之宜穀胡木反晉侯聞之而後喜可知也杜喜見于顔色曰莫余毒也已蒍吕臣實為令尹奉已而已不在民矣林言子玉既死莫有為我之毒害也已蒍吕臣即叔伯代子玉為令尹但能奉已苟幸無過而已杜言其自守無大志或訴元咺於衛侯曰立叔武矣其子角從公公使殺之林訴猶譖也而有緩急之異語曰浸潤之譖膚受之愬是譖如水之潤物以漸而入訴如風寒之襲人以暴而至此言訴蓋暴至也杜角元咺子從才用反又如字咺不廢命奉夷叔以入守林咺不敢以子殺之故廢衛侯之命奉夷叔以入衛守國夷叔即叔武杜夷謚守手又反六月晉人復衛侯杜以叔武受盟于踐土故聽衛侯歸甯武子與衛人盟于宛濮杜武子甯俞也陳留長垣縣西南有宛亭近濮水宛於阮反曰天禍衛國君臣不協以及此憂也杜衛侯欲與楚國人不欲故不和也今天誘其衷杜衷中也林上天悔禍而誘掖衛人之中心衷音忠或丁仲反下同使皆降心以相從也不有居者誰守社稷不有行者誰扞牧圉杜牛曰牧馬曰圉扞户旦反牧音目不協之故林恐居者行者不和協相安之故用昭乞盟于爾大神以誘天衷林以誘掖中心之天理自今日以往既盟之後行者無保其力居者無懼其罪有渝此盟以相及也明神先君是糾是殛林凡從君出行者無保恃其宣效勞力凡在國不出者無恐懼其遭罹罪戾苟有渝變此盟誓以惡相及司盟之明神與衛國之先君糾正其罪而誅殛其人國人聞此盟也而後不貳林然後各安其所無有二心杜傳言叔武之賢甯俞之忠衛侯所以書復歸衛侯先期入杜不信叔武先悉薦反甯子先長牂守門以為使也與之乘而入杜甯子患公之欲速故先入欲安喻國人林長牂衛大夫時為衛守門以甯子為成公使衛共載而入國牂子郎反使所吏反公子歂犬華仲前驅杜衛侯遂驅掩寗子未備二子衛大夫歂市專反華户化反又如字叔武將沐聞君至喜捉髪走出前驅射而殺之公知其無罪也枕之股而哭之杜公以叔武尸枕其股射食亦反枕支鴆反歂犬走出杜手射叔武故公使殺之元咺出奔晉杜元咺以衛侯驅入殺叔武故至晉愬之城濮之戰晉中軍風于澤杜牛馬因風而走皆失之牛馬牝牡相誇曰風兦大斾之左旃杜大斾旗名繫旐曰斾通帛曰旃旃章然反爾雅云因章曰旃祁瞞奸命杜掌此二事而不修為奸軍令瞞莫干反奸音干司馬殺之以徇于諸侯使茅茷代之師還壬午濟河舟之僑先歸林舟之僑為戎右棄其職而先歸茷扶廢反僑其驕反士㑹攝右杜權之代舟僑也士㑹隨武子士蒍之孫秋七月丙申振旅愷以入于晉林入曰振旅整行列也長者在前少者在後殿師之義也軍樂曰愷師出有功則愷歌入國以獻于社愷開在反獻俘授馘飲至大賞杜獻楚俘於廟林授數也數所截耳馘馘古獲反徴㑹討貳杜徴召諸侯將冬㑹于温林討諸侯之有二心者殺舟之僑以徇于國民於是大服君子謂文公其能刑矣三罪而民服杜三罪顛頡祁瞞舟之僑詩云惠此中國以綏四方不失賞刑之謂也杜詩大雅言賞刑不失則中國受惠四方安靖冬㑹於温討不服也杜討衛許衛侯與元咺訟杜爭殺叔武事甯武子為輔鍼莊子為坐士榮為大士杜大士治獄官也周禮命夫命婦不躬坐獄訟元咺又不宜與其君對坐故使鍼莊子為坐又使衛之忠臣及其獄官質正元咺傳曰王叔之宰與伯輿之大夫坐獄於王庭各不身親蓋今長吏有罪先驗吏卒之義鍼其亷反坐如字或音才卧反衛侯不勝杜三子辭屈殺士榮刖鍼莊子謂甯俞忠而免之執衛侯歸之于京師寘諸深室林斷足曰刖杜深室别為囚室刖音月又五割反寘之豉反甯子職納橐饘焉杜甯俞以君在幽隘故親以衣食為已職槖衣囊饘麋也言其忠至所慮者深槖音託饘之然反元咺歸于衛立公子瑕杜瑕衛公子適也是㑹也晉侯召王以諸侯見且使王狩杜晉侯大合諸侯而欲尊事天子以為名義自嫌强大不敢朝周喻王出狩因得盡羣臣之禮皆譎而不正之事見賢遍反仲尼曰以臣召君不可以訓故書曰天王狩于河陽言非其地也杜使若天王自狩以失地故書河陽實以屬晉非王狩地林水北為陽且明德也杜隠其召君之闕欲以明晉之功徳河陽之狩趙盾之弑泄冶之罪皆違凡變例以起大義危疑之理故特稱仲尼以明之壬申公朝于王所杜執衛侯經在朝王下傳在上者告執晚丁丑諸侯圍許杜十月十五日有日無月晉侯有疾曹伯之豎侯獳貨筮史杜豎掌通内外者林曹共公之小臣姓侯名儒納貨賂于晉大史之掌卜筮者使曰以曹為解杜以滅曹為解故解户賣反又古買反齊桓公為㑹而封異姓杜封邢衛今君為㑹而滅同姓曹叔振鐸文之昭也杜叔振鐸曹始封君文王之子鐸待洛反先君康叔武之穆也且合諸侯而滅兄弟非禮也林曹與晉為兄弟之國而晉滅之非盟主之禮也與衛偕命杜私許復曹衛而不與偕復非信也林已復衛侯而曹不與衛同時俱復非出令之信也同罪異罰非刑也林曹衛皆有不禮從楚之罪而衛復曹否非罰罪之刑也禮以行義信以守禮刑以正邪舍此三者君將若之何公説復曹伯遂㑹諸侯圍許邪似嗟反舍音捨説音悦晉侯作三行以禦狄荀林父將中行屠擊將右行先蔑將左行杜晉置上中下三軍今復増置三行以辟天子六軍之名三行無佐疑大夫帥行户郎反將子匠反屠音徒擊古狄反一音計蔑亡結反左傳杜林合注卷十三
