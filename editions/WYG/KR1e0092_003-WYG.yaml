body:
  text: 左傳杜林合注卷三明王道焜趙如源同編桓公一公名軌惠公之子隱公之弟弑兄自立史記亦名允諡法辟土服遠曰桓周桓王九年魯桓公十五年桓王崩子莊王立鄭莊公三十三年魯桓公十一年莊公卒子昭公忽立是年忽奔衛厲公突立桓十五年厲公奔蔡昭公歸鄭秋鄭伯突入于櫟桓十七年昭公弑立子舋桓十八年齊弑舋鄭祭仲立子儀齊僖公二十年魯桓公十四年僖公卒子襄公諸兒立宋殤公九年魯桓公二年殤公弑莊公馮立晉翼哀侯七年魯桓公二年哀侯侵陘庭陘庭與曲沃武公謀桓三年曲沃伐翼獲哀侯晉人立其子小子侯桓七年曲沃武公殺小子侯桓八年曲沃㓕翼曲沃武公五年王命虢仲立晉哀侯之弟緡于晉衛宣公八年魯桓公十二年宣公卒惠公朔立桓十六年惠公奔齊公子黔牟立蔡桓侯四年魯桓公十七年桓侯卒子哀侯獻舞立曹桓公四十六年魯桓公十年曹桓公卒莊公射姑立滕詳見隱公元年陳桓公三十四年魯桓公五年陳桓公卒陳佗殺大子免而自立桓六年蔡人殺陳佗厲公躍立桓十二年厲公卒莊公林立杞武公詳見隠公元年薛詳見隱公元年莒詳見隱公元年邾儀父詳見隱公元年許許叔詳見隱公元年魯桓公十五年許叔入于許小邾詳見隠公元年楚武王三十年魯桓公六年伐隨使隨請周尊楚號周室不聽還報楚桓公八年熊通怒自立為楚武王與隨人盟而去詳見莊公四年傳註秦詳見隠公元年吳詳見隠公元年越詳見隠公元年經庚午元年春王正月公即位杜嗣子位定於初喪而改元必湏踰年者繼父之業成父之志不􅃘有變於中年也諸侯每首歳必有禮於廟諸遭喪繼位者因此而改元正位百官以序故國史亦書即位之事於䇿桓公簒立而用常禮欲自同於遭喪繼位者釋例論之偹矣林春秋自隠至文六君惟桓文書即位亦惟桓文書錫命請命之禮廢矣成公以後皆書即位而無錫命王室感諷諸侯之意不復講也三月公會鄭伯于垂鄭伯以璧假許田林假不返也假舉下反夏四月丁未公及鄭伯盟于越杜公以簒立而修好於鄭鄭因而迎之成禮於垂終易二田然後結盟垂大丘衛地也越近垂地名鄭求祀周公魯聽受祊田令鄭廢泰山之祀知其非禮故以璧假為文時之所隠林結祊成也秋大水杜書災也傳例曰凡平原出水為大水冬十月傳元年春公即位脩好于鄭鄭人請復祀周公卒易祊田林隠公八年鄭人請釋泰山之祀而祀周公以泰山之祊易許田魯雖已入祊而猶未肯易許田故鄭人復請祀周公之别廟在許者以成易祊之約復扶又反公許之三月鄭伯以璧假許田為周公祊故也杜魯不冝聽鄭祀周公又不冝易取祊田犯二不冝以動故隱其實不言祊稱璧假言若進璧以假田非久易也林周公祊二事也為許為周公湯沐之邑祊為鄭人從祀泰山朝宿之邑皆有關王制不冝私易故託辭璧假以文其非禮之實也為于偽反夏四月丁未公及鄭伯盟于越結祊成也結成易二田之事也傳以經不書祊故獨見祊盟曰渝盟無享國杜渝變也林變此盟誓則不能長享其國家渝羊未反享許丈反秋大水凡平原出水為大水林廣平曰原凡廣平之原皆出水則為水災冬鄭伯拜盟杜鄭伯若自來則經不書若遣使則當言鄭人不得稱鄭伯疑謬誤林鄭莊公拜謝于越之盟或親來或遣使皆不可考宋華父督見孔父之妻于路杜華父督宋戴公孫也孔父嘉孔子六世祖林督見孔父之妻于道路之間冶容誨淫可知華戸化及大夫氏也後皆同督音篤目逆而送之曰美而豔杜色美日豔豔以瞻反經辛未二年春王正月戊申宋督弑其君與夷及其大夫孔父杜稱督以弑罪在督也孔父稱名者内不能治其閨門外取怨於民身死而禍及其君林殤公弑莊公立滕子來朝無傳隠十一年稱侯今稱子者葢時王所黜三月公會齊侯陳侯鄭伯于稷以成宋亂杜成平也宋有弑君之亂故為㑹欲以平之稷宋地夏四月取郜大鼎于宋戊申納于大廟杜宋以鼎賂公大廟周公廟也始欲平宋之亂終於受賂故僃書之戊申五月十日郜古報反大廟音泰傳大廟倣此秋七月杞侯來朝杜公即位而來朝蔡侯鄭伯會于鄧杜潁川召陵縣西南有鄧城林此懼楚之始也蔡鄭鄧三國為㑹以懼楚也九月入杞杜不稱主帥微者也弗地曰入公及戎盟于唐冬公至自唐杜傳例曰告于廟也特相㑹故致地也凡公行還不書至者皆不告廟也隱不書至謙不敢自同於正君書勞策勲林此書至㑹之始傳二年春宋督攻孔氏殺孔父而取其妻公怒督懼遂弑殤公君子以為有無君之心而後動於惡杜雖有君若無也林督雖有君心實無之而後動惡念以殺孔父無所忌憚也故先書弑其君林據弑君在殺孔父後而經書弑君及孔父故傳以此釋之㑹于稷以成宋亂為賂故立華氏也杜經稱平宋亂者葢以魯君受賂立華氏貪縱之甚惡其指斥故逺言始與齊陳鄭為會之本意也傳言為賂故立華氏明經本書平宋亂為公諱諱在受賂立華氏也猶璧假許田為周公祊故所謂婉而成章督未死而賜族督之妄也為于偽反宋殤公立十年十一戰杜殤公以隠四年立十一戰皆在隱公世民不堪命林宋之民皆不堪殤公爭戰之命孔父嘉為司馬督為大宰故因民之不堪命先宣言曰司馬則然杜言公之數戰則司馬使爾嘉孔父字大音泰已殺孔父而弑殤公召莊公于鄭而立之以親鄭杜穆公之子馮也隱三年出居于鄭馮入宋不書不告也立之以為君因莊公以親睦鄭國以郜大鼎賂公杜郜國所造器也故繫命於郜濟隂成武縣東南有北郜城齊陳鄭皆有賂故遂相宋公林曹稷諸侯皆有賂也言督所以相宋莊公相息亮反夏四月取郜大鼎于宋戊申納于大廟非禮也林言受弑逆者之賂器而納于大廟以汙祖宗之盛徳非禮之甚也臧哀伯諫曰臧哀伯魯大夫僖伯之子君仁者將昭徳塞違以臨照百官猶懼或失之故昭令徳以示子孫杜謂為人之君者將昭明善徳閉塞惡邪以此道臨照百官如日月之照臨猶恐或失其道故昭明美徳以示其子孫是以清廟茅屋以茅餙屋著儉也清廟肅然清淨之稱也大路越席大路玉路祀天車也越席結革越戸括反大羮不致大羮肉汁不致五味粢食不鑿杜黍稷曰粢不精鑿粢音咨食音嗣餅也鑿子洛反精米也字林作糓子沃反云糲米一斛舂為八斗昭其儉也杜此四者皆示儉衮冕黻珽杜衮畫衣也冕冠也黻韋韠以蔽膝也珽玉笏也若今吏之持簿衮古本反黻音弗下同珽他項反帶裳幅舄帶革帶也衣下曰裳幅若今行縢者舄複履幅音逼舄音昔衡紞紘綖衡維持冠者紞冠之垂者紘纓從下而上者綖冠上覆紞多敢反字林丁坎反紘獲耕反綖音延字林弋善反昭其度也杜尊卑各有制度藻率鞸鞛杜藻率以韋為之所以藉玉也王五采公侯伯三采子男二采鞸佩刀削上飾鞛下飾率音律鞸補頂反鞛布孔反鞶厲游纓鞶紳帶也一名大帶厲大帶之垂者游旌旗之游纓在馬膺前如索羣鞶歩于反游音留昭其數也杜尊卑各有數火龍黼黻杜火畫火也龍畫龍也白與黑謂之黼形若斧黑與青謂之黻兩已相戾林此上衣下裳之飾黼音甫昭其文也杜以文章明貴賤五色比象昭其物也杜車服器械之有五色皆以比象天地四方以示器物不虛設比并是反鍚鸞和鈴昭其聲也鍚在馬額鸞在鑣和在衡鈐在旂動皆有鳴聲鍚音揚馬面當盧三辰旂旗昭其明也杜三辰日月星也畫於旂旗象天之明夫徳儉而有度登降有數文物以紀之聲明以發之以臨照百官百官於是乎戒懼而不敢易紀律今滅徳立違而寘其賂器於大廟以明示百官百官象之其又何誅焉林夫人君之徳儉而有尊卑之制度不為苦節之儉尊卑有降殺之數則不為上下無别文章器物所以紀載此徳也徳聲大明所以𤼵揚此徳也以此徳照臨百官然後百官有所戒謹恐懼而不敢變易國家之紀綱法律桓公受賂滅其善徳而立違邪之臣華督寘其所賂郜鼎之器於魯之大廟以賄賂明示於百官上所好者下必甚焉故百官從而象法之不可復誅責也寘之豉反置也國家之敗由官邪也官之失徳寵賂章也郜鼎在廟章孰甚焉林言國家所以敗由百官之違邪也百官之所以至失正徳而違邪者由寵臣之受賄賂章明無所忌憚也今桓公以郜鼎納于大廟賄賂章明孰甚於此邪似嗟反武王克商遷九鼎于雒邑杜九鼎殷所受夏九鼎也武王克商乃營雒邑而後去之又遷九鼎焉時但營雒邑未有都城至周公乃卒營雒邑謂之王城即今河南城也故傳曰成王定鼎于郏鄏林九鼎夏禹所鑄三代相傳以為有國之寳故武王克商遷九鼎于成周之雒邑焉雒音洛本亦作洛義士猶或非之而況將昭違亂之賂器於大廟其若之何林義士伯夷之屬猶或不以武王為是而況昭明受亂人之賄器納之大廟其何以治國家照臨百官公不聽周内史聞之曰臧孫達其有後於魯乎君違不忘諫之以徳杜内史周大夫官也僖伯諫隠觀魚其子哀伯諫桓納鼎積善之家必有餘慶故曰其有後於魯林周内史聞其事而美之曰臧哀伯其後必有餘慶於魯君有違邪之事不忘以徳諫其君秋七月杞侯來朝不敬杞侯歸乃謀伐之林公即位而來朝行禮不恭朝畢歸國謀伐杞以討不恭之罪蔡侯鄭伯會于鄧始懼楚也杜楚國今南郡江陵縣北紀南城也楚武王始僭號稱王欲害中國蔡鄭姬姓近楚故懼而會謀九月入杞討不敬也林討來朝不敬公及戎盟于唐修舊好也杜惠隠之好好呼報反冬公至自唐告于廟也凡公行告于宗廟反行飲至舍爵策勲焉禮也杜爵飲酒器也既飲置爵則書勲勞於策言速紀有功也林凡公出行謂盟㑹征伐之役告于祖宗之廟反自行役告至于廟而飲酒數者皆出入之禮也舍音赦舊音捨特相會往來稱地讓事也杜特相㑹公與一國㑹也㑹必有主二人獨㑹則莫肯為主兩讓㑹事不成故但書地林往出㑹也來告至也稱地如會于唐至自唐是也自參以上則往稱地來稱會成事也林自參國以上言㑹于某至自㑹成㑹事也參七南反亦音三上時掌反初晉穆侯之夫人姜氏以條之役生大子命之曰仇杜條晉地大子文侯也意取於戰相仇怨林穆侯七年戰條以是年生大子文侯仇音求其弟以千畝之戰生命之曰成師杜桓叔也西河界休縣南有地名千畝意取能成其衆林穆侯十年戰千畝有功以是年又生子師服曰異哉君之名子也師服晉大夫名如字或彌政反夫名以制義杜名之必可言也林義者宜也名子以制其宜也義以出禮杜禮從義出林得其宜則禮敬生故義所以出禮禮以體政杜政以禮成林政者正也禮者天下之正位故禮所以體政政以正民是以政成而民聽易則生亂杜反易禮義則亂生也嘉耦曰妃怨耦曰仇古之命也杜自古有此言林嘉善之配耦則名之曰妃怨讐之配耦則名之曰仇古之命名如此耦五口反妃芳非反今君命大子曰仇弟曰成師始兆亂矣兄其替乎杜穆侯愛少子桓叔俱取於戰以為名所附意異故師服知桓叔之黨必盛於晉以傾宗國故因名以諷諫林穆侯以怨仇之意名大子以得衆之義名其次子嫡庶之名反逆晉國之亂始兆於此矣替他計反廢也惠之二十四年晉始亂故封桓叔于曲沃杜惠魯惠公也晉文侯卒子昭侯元年危不自安封成師為曲沃伯林危不自安故曰始亂靖侯之孫欒賔傅之靖侯桓叔之高祖父言得貴寵公孫為傳相靖才并反欒力官反師服曰吾聞國家之立也本大而末小是以能固林國家之所以能植立者根本强大而枝葉弱小末枝葉也以大制小故能安固故天子建國林惟天子至尊得建立公侯伯子男五等諸侯之國諸侯立家林諸侯位卑故但可立卿大夫之家卿置側室杜側室衆子也得立此一官大夫有貳宗杜適子為小宗次者為貳宗以相輔貳士有𨽻子弟士卑自以其子弟為僕𨽻庶人工商各有分親皆有等衰杜庶人無復尊卑以親疏為分别也衰殺也林庶人為農者工執技藝者商行商貿遷有無者各有親疏以相分别自天子至於庶人各有等第降殺此皆本大而末小所以辨上下定民志也分扶問反又如字親七刃反又如字衰初危反是以民服事其上而下無覬覦林民志素定故能盡心力以事其上不敢冀望上位覬音冀覦羊朱反字林羊住反說文云欲也今晉甸侯也而建國本既弱矣其能久乎林晉甸服之諸侯也而封建桓叔於曲沃大都耦國是先自弱其根本矣言不久必為曲沃所并也甸徒練反惠之三十年晉潘父弑昭侯而納桓叔不克杜潘父晉大夫也昭侯文侯子林是時桓叔欲入晉晉人𤼵兵攻桓叔桓叔敗還歸曲沃晉人立孝侯杜昭侯子也惠之四十五年曲沃莊伯伐翼弑孝侯杜莊伯桓叔子翼晉國所都翼人立其弟鄂侯鄂侯生哀侯林曲沃莊伯弑孝侯晉人攻莊伯莊伯復入曲沃晉人復立孝侯之子郄為鄂侯鄂侯以魯隠公五年奔隨其年秋王立鄂侯之子先于翼是為哀侯哀侯侵陘庭之田林陘庭翼南鄙邑侵奪其田也陘音刑陘庭南鄙啟曲沃伐翼林翼哀侯所都啟曲沃伐翼葢開而導之也經壬申三年春正月公㑹齊侯于嬴杜經之首時必書王明此厯天王之所班也其或廢法違常失不班厯故不書王嬴齊邑今泰山嬴縣經三年正月從此盡十七年皆無王唯十年有王傳以為義或有王字者非羸音盈夏齊侯衛侯胥命于蒲杜申約言以相命而不歃血也蒲衛地在陳留長垣縣西南林書惟天子稱命此私相命也諸侯不請命而私相命於是始六月公會杞侯于郕秋七月壬辰朔日有食之既杜無傳既盡也厯家之説謂日光以望時遙奪月光故月食日月同會月奄日故日食食有上下者行有高下日光輪存而中食者相奄密故日光溢出皆既者正相當而相奄間疏也然聖人不言月食日而以日食為文闕於所不見公子翬如齊逆女杜禮君有故則使卿逆九月齊侯送姜氏于讙杜讙魯地濟北蛇丘縣西有下讙亭已去齊國故不言女未至於魯故不稱夫人讙呼端反公會齊侯于讙無傳夫人姜氏至自齊杜無傳告於廟也不言翬以至者齊侯送之公受之於讙冬齊侯使其弟年來聘有年無傳五穀皆熟書有年傳三年春曲沃武公伐翼次于陘庭林魯隠公十年晉哀侯三年曲沃莊伯卒子稱代立是為曲沃武公凡師再宿為信過信為次此數宿于陘庭之地韓萬御戎梁𢎞為右杜韓萬莊伯弟也御戎僕也右戎車之右逐翼侯于汾隰杜汾隰汾水邊林曲沃武公逐哀侯于汾水邊也下濕曰隰汾扶云反汾水名驂絓而止林驂騑馬葢哀侯驂結於木而止驂七南反絓戸卦反夜獲之及欒共叔杜共叔桓叔之傳欒賔之子也身傳翼侯父子各殉所奉之主故并見獲而死共音恭會于嬴成昬于齊也公不由媒介自與齊侯會而成昬非禮也夏齊侯衛侯胥命于蒲不盟也公會杞侯于郕杞求成也二年入杞故今來求成秋公子翬如齊逆女修先君之好故曰公子杜昬禮雖奉時君之命其言必稱先君以為禮辭故公子翬逆女傳稱修先君之好公子遂逆女傳稱尊君命互舉其義好呼報反齊侯送姜氏非禮也凡公女嫁于敵國姊妹則上卿送之以禮於先君林以加禮於先君之遺體齊侯送姜氏本或作送姜氏于讙公子則下卿送之林公所自生之女降姊妹一等於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之冬齊仲年來聘致夫人也杜古者女出嫁又使大夫隨加聘問存謙敬序殷勤也在魯而出則曰致女在他國而來則總曰聘故傳以致夫人釋之芮伯萬之母芮姜惡芮伯之多寵人也故逐之出居于魏杜為明年秦侵芮張本芮國在馮翊臨晉縣魏國河東河北縣林芮國名萬芮伯名姜母之姓以芮伯内寵外寵皆非賢徳之人故逐芮伯芮如銳反惡烏路反經癸酉四年春正月公狩于郎杜冬獵曰狩行三驅之禮得田狩之時故傳曰書時禮也周之春夏之冬也田狩從夏時郎非國内之狩地故書地狩乎又反夏天王使宰渠伯糾來聘杜宰官渠氏伯糾名也王官之宰當以才授位而伯糾攝父之職出聘列國故書名以譏之國史之記必書年以集此公之事書首時以成此年之嵗故春秋有空時而無事者今不書秋冬首月史闕文他皆倣此糾居黝反傳四月春正月公狩于郎書時禮也杜郎非狩地故唯時合禮夏周宰渠伯糾來聘父在故名秋秦師侵芮敗焉小之也秦以芮小輕之故為芮所敗冬王師秦師圍魏執芮伯以歸杜三年芮伯出居魏芮更立君秦為芮所敗故以芮伯歸將欲納之林秦以芮伯居魏故圍魏君為十年秦納芮傳經甲戌五年春正月甲戌己丑陳侯鮑卒杜未同盟而書名者來赴以名故也甲戌前年十二月二十一日己丑此年正月六日陳亂故再赴赴雖日異而皆以正月起文故但書正月慎疑審事故從赴兩書鮑歩飽反夏齊侯鄭伯如紀杜外相朝皆言如齊欲滅紀紀人懼而來告故書天王使仍叔之子來聘杜仍叔天子之大夫稱仍叔之子本於父字幼弱之辭也譏使童子出聘葬陳桓公無傳城祝丘無傳齊鄭將襲紀故秋蔡人衛人陳人從王伐鄭杜王自為伐鄭之主君臣之辭也王師敗不書不以告林從王伐鄭君臣之辭也自伐鄭無功而後王命始不行於天下從如字又才用反大雩杜傳例曰書不時也失龍見之時林書大雩之始雩音于祭名螽無傳蚣蝑之屬為災故書螽音終冬州公如曹杜不書奔以朝出也為下實來書也曹國今濟隂定陶縣傳五年春正月甲戌己丑陳侯鮑卒再赴也於是陳亂文公子佗殺大子免而代之杜佗桓公弟五父也稱文公子明佗非桓公母弟也免桓公太子林言文子佗以見佗不當立殺太子免而代之簒也佗大何反免音問公疾病而亂作國人分散故再赴林當陳侯疾病而陳佗作亂國人懼而分散釋陳所以再赴之故夏齊侯鄭伯朝于紀欲以襲之紀人知之林假朝禮將以襲紀紀人知其詐襲音習王奪鄭伯政鄭伯不朝杜奪不使知王政秋王以諸侯伐鄭鄭伯禦之王為中軍虢公林父將右軍蔡人衛人屬焉林桓王以三國伐鄭鄭不受伐故禦王師桓王自將中軍虢公林父為王卿士故將右軍將子匠反下同周公黑肩將左軍陳人屬焉杜黑肩周桓公也鄭子元請為左拒以當蔡人衛人杜子元鄭公子拒方陳拒俱甫反下同為右拒以當陳人曰陳亂民莫有鬭心若先犯之必奔林陳軍不整莫有戰鬭之心若先犯陳師陳必先奔王卒顧之必亂蔡衛不枝固將先奔既而萃於王卒可以集事從之林顧見陳奔必驚而亂蔡衛不能枝持固將先王卒而奔敗既敗諸國聚攻王卒可以成勝敵之事杜萃聚也集成也卒尊忽反下同萃似類反曼伯為右拒杜曼伯檀伯曼音萬祭仲足為左拒原繁高渠彌以中軍奉公為魚麗之陳先偏後伍伍承彌縫杜司馬法車戰二十五乘為偏以車居前以伍次之承偏之隙而彌縫闕漏也五人為伍此蓋魚麗陳法麗力知反縫扶容反戰于繻葛杜繻葛鄭地繻音須命二拒曰旝動而鼓杜旝旃也通帛為之葢今大將之麾也執以為號令林鄭人命其左右二拒見旝動則各鳴鼔以進軍也旝古外反又古沽反本亦作檜建大木置石其上𤼵機以磓敵蔡衛陳皆奔王卒亂鄭師合以攻之王卒大敗祝聃射王中肩王亦能軍雖軍敗身傷猶殿而不奔故言能軍射食亦反中丁仲反祝聃請從之公曰君子不欲多上人況敢陵天子乎茍自救也社稷無隕多矣林言君子不欲多出人之上况敢侵犯桓王乎茍自救其禍難鄭國杜稷不至顛隕所幸多矣杜鄭於此收兵自退隕于敏反夜鄭伯使祭足勞王且問左右杜祭足即祭仲之字葢名仲字仲足也勞王問左右言鄭志在茍免王討之非也林莊公使祭仲問勞桓王問左右安否此皆恭而無禮之辭勞力報反仍叔之子弱也杜仍叔之子來聘童子將命無速反之心久留在魯故經書夏聘傳釋之於未秋秋大雩書不時也十二公傳唯此年及襄二十六年有兩秋此𤼵雩祭之例欲顯天時以指事故重言秋異於凡事凡祀啟蟄而郊言凡祀通下三句天地宗廟之事也啟蟄夏正建寅之月祀天南郊蟄直立反龍見而雩龍見建已之月蒼龍宿之體昬見東方萬物始盛待雨而大故祭天逺為百穀祈膏雨見賢遍反始殺而嘗建酉之月隂氣始殺嘉榖始熟故薦嘗於宗廟閉蟄而烝建亥之月昆蟲閉户萬物皆成可薦者衆故烝祭宗廟釋例論之備矣閉必計反又必結反字林芳結反烝之承反過則書十日有吉否過次節則書以譏慢也冬淳于公如曹度其國危遂不復杜淳于州國所都城陽淳于縣也國有危難不能自安故出朝而遂不還度待洛反復音服後不音者皆同經乙亥六年春正月寔來杜寔實也不言州公者承上五年冬經如曹問無異事省文從可知寔時力反夏四月公會紀侯于成杜成魯地在泰山鉅平縣東南秋八月壬午大閲齊為大國以戎事徵諸侯之戍嘉美鄭忽而忽欲以有功為班怒而訴齊魯人懼之故以非時簡車馬林書大閲之始閲音悅蔡人殺陳佗杜佗立踰年不稱爵者篡立未㑹諸侯也傳例在莊二十二年林魯莊公二十二年傳陳厲公蔡出也故蔡人殺五父而立之陳厲公躍立九月丁卯子同生杜桓公子莊公也十二公唯子同是適夫人之長子備用大子之禮故史書之於䇿不稱大子者書始生也冬紀侯來朝傳六年春自曹來朝書曰寔來不復其國也杜亦承五年冬傳淳于公如曹也言奔則來行朝禮言朝則遂留不去故變文言寔來楚武王侵隨杜隨國今義陽隨縣林漢東姬姓國使薳章求成焉杜薳章楚大夫林楚反使其大夫薳章先求成於隨薳于委反軍於瑕以待之杜瑕隨也林楚軍於瑕以待隨之報瑕下加反隨人使少師董成杜少師隨大夫董正也林少師隨侯之有寵大夫使少師正二國之成也少詩照反後皆放此鬭伯比言於楚子曰吾不得志於漢東也我則使然杜鬭伯比楚大夫令尹子文之父林言我楚之不得逞志於漢東諸侯也我則失䇿而使之然漢東居漢水之東我張吾三軍而被吾甲兵以武臨之彼則懼而協以謀我故難間也漢東之國隨為大隨張必棄小國小國離楚之利也林我且張大吾三軍之衆而被吾之堅甲利兵以威武而臨漢東之諸侯彼諸侯則恐懼而叶心以謀禦我之䇿故難離間其心此楚之失䇿隨若自張大必棄絶小國而不叶心以謀楚小國離心則隨勢自孤隨勢孤而無援此楚國之利也杜張自侈大也被皮寄反問間厠之間張猪亮反一音如字少師侈請羸師以張之林隨少師之心素自侈大諸楚子藏其精兵示以羸弱以張大少師之心使忽楚杜羸弱也侈昌氏反又式氏反羸劣追反下同熊率且比曰季梁在何益杜熊率且比楚大夫季梁隨賢臣率音律且子余反鬭伯比曰以為後圖少師得其君杜言季梁之諫不過一見從隨侯卒當以少師為計故云以為後圖二年蔡侯鄭伯㑹于鄧始懼楚楚子自此遂盛終於抗衡中國故傳備言其事以終始之林解且比之意以為後舉之圖言今雖未行吾計後舉必墮吾計中季梁雖賢不如少師有寵得君之深若其言不行則浸潤膚受無所不至此所以後舉必墮吾計也王毁軍而納少師杜從伯比之謀少師歸請追楚師隨侯將許之杜信楚弱也季梁止之曰天方授楚楚之羸其誘我也君何急焉臣聞小之能敵大也小道大淫所謂道忠於民而信於神也上思利民忠也祝史正辭信也今民餒而君逞欲祝史矯舉以祭臣不知其可也林楚自若敖蚡冒以來方强盛故曰天方授之也楚之示羸葢欲誘我以墮其計當緩以圖之何必急焉小國之能敵大國也小國有道大國淫虐無道盡心為民為忠誠實事神為信此所謂有道而後可敵大國也傳曰小大之獄雖不能察必以情曰忠之屬也此即上思利民之忠其祝史陳信於鬼神無媿辭此即祝史正辭之信今民皆饑餒而君獨縱欲是無上思利民之忠祝史詐稱功徳以誑于鬼神是無祝史正辭之信墮國無道如此臣未知其可以敵楚也祝太祝史太史皆主祭餒奴罪反餓也矯居兆反公曰吾牲牷肥腯粢盛豐備何則不信杜牲牛羊豕也牷純色完全也腯亦肥也黍稷曰粢在器曰盛牷音全腯徒忽反對曰夫民神之主也杜言鬼神之情依民而行是以聖王先成民而後致力於神杜先養人民使之成就而後致力於事鬼神故奉牲以告曰博碩肥腯謂民力之普存也杜博廣也碩大也謂其畜之碩大蕃滋也謂其不疾瘯蠡也謂其備腯咸有也杜雖告神以博碩肥腯其實皆當兼此四謂民力適完則六畜既大而滋也皮毛無疥癬兼備而無有所闕畜吁又反下皆同蕃音煩瘯七木反本又作蔟同蠡力果反說文作瘰云瘯瘰皮肥也奉盛以告曰絜粢豐盛謂其三時不害而民和年豐也林不奪農時春夏秋無有災害使得盡力耕耘故和氣致祥而年穀豐登也奉酒醴以告曰嘉栗㫖酒林嘉善也栗謹敬也言有加善敬謹之徳以將其美酒謂其上下皆有嘉徳而無違心也所謂馨香無讒慝也杜馨香之遠聞林此言牲牷粢盛酒醴之所以馨香者上下皆無讒諛邪慝之行所以馨香也書曰黍稷非馨明徳惟馨此即無讒慝也慝他得反故務其三時林此以下言先成民之事脩其五敎杜父義母慈兄友弟共子孝林脩君臣父子兄弟夫婦朋友五者之敎親其九族以致其禋祀禋㓗敬也九族謂外祖父外祖母從母子及妻父妻母姑之子姊妹之子女子之子并已之同族皆外親有服而異族者也林此言後致力於神之事九族杜釋與孔安國鄭𤣥不同禋音因於是乎民和而神降之福故動則有成今民各有心而鬼神乏主林以忠於民而得民和以信於神而神降之福故動則有成功孔子曰我戰則克祭則受福是也今隨國之民各有異心而不和民心不和是鬼神無主也杜民饑餒也君雖獨豐其何福之有林君雖獨豐於事神神將吐之其何降福之有君姑脩政而親兄弟之國庶免於難林君且内修政事以成民為先而親睦漢東諸姬兄弟之國庻幾可免於楚之禍難難乃旦反隨侯懼而修政楚不敢伐林為八年楚伐隨張本夏會于成紀來諮謀齊難也杜齊欲滅紀故來謀之難乃旦反北戎伐齊林言北戎以别戎之種類襍處於中國者齊侯使乞師于鄭鄭太子忽帥師救齊六月大敗戎師獲其二帥大良少良甲首三百以獻於齊杜甲首被甲者首帥所類反少詩照反於是諸侯之大夫戍齊齊人饋之餼林諸侯以戎難故遣大夫助齊戍守生曰餼饋諸侯之大夫生餼饋其媿反遺也餼許既反牲腥曰餼使魯為其班後鄭杜班次也魯親班齊饋則亦使大夫戍齊矣經不書蓋史闕文林鄭伯爵故鄭忽之班後於諸侯鄭忽以其有功也怒林驕功故怒魯之後已故有郎之師郎師在十年公之未昬於齊也齊侯欲以文姜妻鄭大子忽林蓋文姜未嫁魯之前齊僖公先欲以嫁鄭忽妻七計反下同大子忽辭人問其故大子曰人各有耦齊大非吾耦也詩云自求多福林言人各有配耦齊大國也鄭小國非齊大國之耦杜詩大雅文王言求福由已非由人也在我而已大國何為君子曰善自為謀林在我反求諸己而已何為倚大國以為重杜言獨潔其身謀不及國及其敗戎師也齊侯又請妻之杜欲以佗女妻之固辭人問其故大子曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸是以師昬也林言往時未有功於齊吾猶不敢娶齊女今奉君命赴救奔齊之急難而受妻室以歸是以師要齊而得昬也民其謂我何杜言必見怪於民遂辭諸鄭伯杜假父之命以為辭為十一年鄭忽出奔衛傳秋大閱簡車馬也九月丁卯子同生以大子生之禮舉之林魯十二公唯子同生是適夫人之長子故備用大子之禮舉之接以大牢大牢牛羊豕也以禮接夫人重適也接如字鄭注禮記作捷讀此者亦或捷音卜士負之士妻食之杜禮世子生三日卜士負之射人以桑弧蓬矢射天地四方卜士之妻為乳母食音嗣公與文姜宗婦命之杜世子生三月君夫人沐浴於外寢立於阼階西鄉世婦抱子升自西階君命之乃降蓋同宗之婦林公與文姜及同宗之婦命之名也公問名於申繻對曰名有五有信有義有象有假有類申繻魯大夫繻音須以名生為信以徳命為義以類命為象取於物為假取於父為類林若唐叔虞魯公子友宋仲子生而有文在其手故曰以名生若文王名昌知其必能昌盛周邦武王名𤼵知其必能𤼵兵誅暴故曰以徳命若孔子首象尼丘因命名曰丘而字仲尼故曰以類命若伯魚生而有人饋之魚因名曰鯉故曰取於物若今子同生與父同日因名之曰同故曰取於父不以國國君之子不自以本國為名也不以官林不以本國官職之號不以山川林不以本國山川之名不以隱疾杜隱痛疾患辟不祥也不以畜牲杜畜牲六畜不以器幣杜幣玉帛周人以諱事神名終將諱之杜君父之名固非臣子所斥然禮既卒哭以木鐸狥曰舍故而諱新謂舍親盡之祖而諱新死者故言以諱事神名終將諱之自父至高祖皆不敢斥言林此周禮也殷以前未有諱法周人以諱事神名衆家多以名字屬下句故以國則廢名杜國不可易故廢名以官則廢職以山川則廢主以畜牲則廢祀以器幣則廢禮林以官為名則因諱名而廢其職國主山川今以山川為名當改其山川之名是廢王以畜牲為名則名猪廢猪名羊廢羊是廢祭祀大牢少牢之禮以器幣為名則不敢用此器幣是廢祭祀爼豆玉帛之禮晉以僖侯廢司徒杜僖侯名司徒廢為中軍宋以武公廢司空杜武公名司空廢為司城先君獻武廢二山杜二山具敖也魯獻公名具武公名敖更以其鄉名山是以大物不可以命林是以國家大物如官職山川畜牲器幣皆不可以命名公曰是其生也與吾同物命之曰同杜物類也謂同日冬紀侯來朝請王命以求成于齊公告不能杜紀微弱不能自通於天子欲因公以請王命公無寵於王故告不能左傳杜林合注卷三
