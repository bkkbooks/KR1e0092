body:
  text: 左傳杜林合注卷二十四明王道焜趙如源同編成公四經丙戌十有六年春王正月雨水冰無傳記寒過節水封著樹雨水冰如字公羊傳云雨而水冰也傳子付反夏四月辛未滕子卒杜不書名未同盟林文公卒成公原立鄭公子喜帥師侵宋杜喜穆公子子罕也六月丙寅朔日有食之無傳晉侯使欒黶來乞師杜將伐鄭黶欒書子黶於斬反徐於玷反甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績杜楚師未大崩楚子傷目而退故曰楚子敗績鄢陵鄭地今屬潁川郡鄢謁晩反又於建反楚殺其大夫公子側側子反背盟無禮卒以敗師故書名秋公㑹晉侯齊侯衛侯宋華元邾人于沙隨杜沙隨宋地梁國寧陵縣北有沙隨亭不見公不及鄢陵戰故不諱者恥於執止公至自會無傳公會尹子晉侯齊國佐邾人伐鄭杜尹子王卿士子爵林於是始以王臣與伐曹伯歸自京師杜為晉侯所赦故書歸諸侯歸國或書名或不書名或言歸自某或言自某歸傳無義例從告辭九月晉人執季孫行父舍之于苕丘苕丘晉地舍之苕丘明不以歸不稱行人非使人苕音條冬十月乙亥叔孫僑如出奔齊杜公未歸命國人逐之十有二月乙丑季孫行父及晉卻犫盟于扈晉許魯平故盟公至自㑹無傳伐而以㑹致史異文乙酉刺公子偃魯殺大夫皆言刺義取於周禮三刺之法刺本又作㓨七賜反爾雅云殺也傳十六年春楚子自武城使公子成以汝隂之田求成于鄭杜汝水之南近鄭地鄭叛晉子駟從楚子盟于武城杜為晉伐鄭起夏四月滕文公卒鄭子罕伐宋滕宋之與國鄭因滕有喪而伐宋故𫝊舉滕侯卒侵伐經傳異文經從古傳言實他皆放此宋將鉏樂懼敗諸汋陂杜敗鄭師也樂懼戴公六世孫將鉏樂氏族鉏仕魚反汋七藥反徐音酌陂彼宜反退舍於夫渠不儆宋帥不儆備夫音扶儆京領反鄭人覆之林鄭人乗其不備覆而掩之覆徐敷目反又芳又反敗諸汋陵獲將鉏樂懼宋恃勝也杜汋陂夫渠汋陵皆宋地衛侯伐鄭至于鳴雁為晉故也杜鳴雁在陳留雍丘縣西北為于偽反晉侯將伐鄭范文子曰若逞吾願諸侯皆叛晉可以逞逞快也晉厲公無道三卻驕故欲使諸侯叛冀其懼而思徳若唯鄭叛晉國之憂可立俟也欒武子曰不可以當吾世而失諸侯林言不可以當我執政之世而失諸侯必伐鄭乃興師欒書將中軍士燮佐之代苟庚卻錡將上軍代士燮荀偃佐之杜代卻錡偃荀庚子韓厥將下軍卻至佐新軍荀罃居守荀罃下軍佐於是卻犫代趙旃將新軍新上下軍罷矣守手又反卻犫如衛遂如齊皆乞師焉欒黶來乞師孟獻子曰有勝矣杜卑讓有禮故知其將勝楚戊寅晉師起鄭人聞有晉師使告于楚姚句耳與往杜句耳鄭大夫與往非使也為先歸張木句古侯反與音預楚子救鄭司馬將中軍杜子反令尹將左杜子重右尹子辛將右杜公子壬夫過申子反入見申叔時叔時老在申過古禾反曰師其何如對曰徳林澤也刑林法也詳林祥也義林宜也禮林理也信林實也戰之器也杜器猶用也林有此六者則可以戰如器用之不可闕徳以施惠刑以正邪詳以事神義以建利禮以順時信以守物林徳澤可以施恩恵于民刑法可以正奸邪于國詳以事神則休祥降義以建利則利皆得宜人皆知禮則順時而動不妄人皆知信則守物而事無失邪似嗟反民生厚而徳正杜財足則思無邪林徳以施恵故民生冨厚刑以正邪故民徳歸正用利而事節杜動不失利則事得其節林義以生利故民用自利祥以事神故祀事有節時順而物成杜羣生得所林禮以順時故民時皆順信以守物故百物用成上下和睦周旋不逆杜動順理求無不具杜下應上各知其極林極中也各知其中無有貳心故詩曰立我烝民莫匪爾極杜烝衆也極中也詩頌言先王立其民民無不得中正烝之乗反是以神降之福時無災害民生敦龎和同以聴杜敦厚也龎大也林和同以心惟君上之為聴龎莫邦反莫不盡力以從上命致死以補其闕杜闕戰死者此戰之所由克也今楚内棄其民杜不施惠而外絶其好杜義不建利好呼報反瀆齊盟杜不詳事神瀆徒木反而食話言杜信不守物話户快反奸時以動杜禮不順時周四月今二月妨農業奸音兼而疲民以逞杜刑不正邪而苟快意疲本亦作罷音皮民不知信進退罪也人恤所底其誰致死林民不知君上之信或進或退皆陷罪戾不知所從人各憂恤其所底至之地其誰肯致死力以與晉戰底徐音㫖又之履反子其勉之吾不復見子矣言其必敗不反復見一本無復字復扶又反姚句耳先歸子駟問焉對曰其行速過險而不整速則失志言不思慮也不整喪列志失列喪將何以戰楚懼不可用也杜楚救鄭之師恐不可用也喪息浪反下同五月晉師濟河聞楚師將至范文子欲反曰我偽逃楚可以紓憂杜紓緩也林言我詐為畏怯逃避楚兵君臣修省可以緩晉國之憂紓音舒夫合諸侯非吾所能也以遺能者我若羣臣輯睦以事君多矣武子曰不可六月晉楚遇於鄢陵范文子不欲戰卻至曰韓之戰惠公不振旅杜衆散敗也在僖十五年遺唯季反輯音集又七八反箕之役先軫不反命杜死於狄也在僖三十三年邲之師荀伯不復從杜荀林父奔走不復故道在宣十二年從徐子容反或如字皆晉之恥也子亦見先君之事矣杜見先君成敗之事今我避楚又益恥也文子曰吾先君之亟戰也有故亟數也亟去吏反秦狄齊楚皆彊不盡力子孫將弱今三彊服矣杜齊秦狄敵楚而已唯聖人能外内無患自非聖人外寕必有内憂盍釋楚以為外懼乎林聖人安不忘危治不忘亂故外患既息内患不生至於中才常主外患既平未有不以驕亢而生在内之憂患者何不姑釋楚患不治以為晉君之敵國外患乎甲午晦楚晨壓晉軍而陳杜壓乗其未備壓於甲反徐於輒反陳直覲反下同軍吏患之范匄趨進杜匄士爕子匄古害反曰塞井夷竈陳於軍中而疏行首林軍屯必鑿井結竈以自結今為楚壓晉軍戰地迫狹故自塞其井自平其竈以為戰地楚壓晉軍不可出陳故結陳於晉之軍中杜疏行首者當陳前決開營壘為戰道行户郎反又如字晉楚唯天所授何患焉文子執戈逐之曰國之存亡天也童子何知焉林其父執戈以逐范匄怒其多言言晉軍勝楚是天蹙晉於亂亡晉軍不勝是天俾晉以安存童子豈知此意欒書曰楚師輕窕林窕亦輕也窕勑彫反又勑弔反固壘而待之三日必退退而撃之必獲勝焉卻至曰楚有六間不可失也其二卿相惡林子重子反二卿相惡不和一間也惡如字又烏路反王卒以舊林楚王之親兵罷老不代二間也卒子忽反下皆同鄭陳而不整林鄭師從楚雖成陣而不整齊三間也蠻軍而不陳林蠻夷從楚雖成軍而不結陣四間也陳不違晦林晦月終隂盡兵家所忌今楚壓晉軍而陳不避晦日五間也在陳而嚻杜嚻喧嘩也嚻許驕反徐讀曰嗷五髙反合而加嚻杜陳合宜静而益有聲各顧其後莫有鬭心林人恤所底各懐後顧莫有戰鬬之心六間也舊不必良林王卒以舊必非精兵以犯天忌我必克之楚子登巢車以望晉軍杜巢車車上為櫓巢說文作轈云兵車髙如巢以望敵也子重使大宰伯州犂侍于王後杜州犂晉伯宗子前年奔楚大音泰王曰騁而左右何也林言晉軍有騁走者或左或右何也曰召軍吏也林軍吏散居軍中故左右走而召之皆聚於中軍矣曰合謀也張幕矣曰䖍卜於先君也杜䖍敬也幕音莫徹幕矣曰將發命也甚嚻且塵上矣曰將塞井夷竈而為行也杜夷平也上時掌反行户郎反下公行同皆乗矣左右執兵而下矣曰聴誓也左將帥右車右乗繩證反下同戰乎曰未可知也乗而左右皆下矣曰戰禱也杜禱請於鬼神禱丁老反或丁報反伯州犂以公卒告王杜公晉侯林伯州犂晉人知晉之情故以晉侯之卒告其王苖賁皇在晉侯之側亦以王卒告杜賁皇楚鬪椒子宣四年奔晉林賁皇知楚之情故亦以楚王之卒告晉侯賁扶云反皆曰國士在且厚不可當也杜晉侯左右皆以伯州犁在楚知晉之情且謂楚衆多故憚合戰與苖賁皇意異苖賁皇言於晉侯曰楚之良在其中軍王族而已請分良以撃其左右而三軍萃於王卒林請分晉精兵以撃楚之左右二軍既撃楚左右軍乃以晉三軍聚合而撃楚中軍之王卒杜萃集也萃以醉反必大敗之公筮之史曰吉其卦遇復杜震下坤上復無變曰南國䠞射其元王中厥目杜此卜者辭也復陽長之卦陽氣起于南行推隂故曰南國䠞也南國勢䠞則離受其咎離為諸侯又為目陽氣激南飛矢之象故曰射其元王中厥目䠞子六反射食亦反下射之同中丁仲反國䠞王傷不敗何待公從之從其言而戰有淖於前杜淖泥也淖乃孝反徐徒較反乃皆左右相違於淖杜違避也林晉師乃皆左右行相違避於淖步毅御晉厲公欒鍼為右步毅即卻毅彭名御楚共王潘黨為右石首御鄭成公唐苟為右欒范以其族夾公行杜二族强故在公左右共音恭夾古洽反陷於淖欒書將載晉侯林晉厲公之車陷於泥淖中欒書見公車陷淖故欲載晉侯以行鍼曰書退國有大任焉得專之杜在君前故子名其父大任謂元帥之職林言書既當大任又安得専命復為戎御焉於䖍反且侵官冒也杜載公為侵官冒莫報反徐莫北反失官慢也杜去將而御失官也離局姦也杜逺其部曲為離局離力智反有三罪焉不可犯也乃掀公以出於淖杜掀舉也掀徐許言反云捧轂舉之則公軒起也又丘近反癸巳潘尫之黨與養由基蹲甲而射之徹七札焉杜黨潘尫之子蹲聚也一發達七札言其能陷堅尫烏黄反蹲在尊反徐在損反又才言反禮側八反徐側乙反以示王曰君有二臣如此何憂於戰杜二于以射夸王王怒曰大辱國杜賤其不尚知謀詰朝爾射死藝杜言女以射自多必當以藝死也詰朝猶明朝是戰日朝如字吕錡夢射月中之退入於泥吕錡魏錡射食亦反中丁仲反下皆同占之曰姬姓日也杜周世姬姓尊異姓月也杜異姓卑必楚王也射而中之退入於泥亦必死矣杜錡自入泥亦死象及戰射共王中目王召養由基與之兩矢使射吕錡中項伏弢杜弢弓衣林中吕錡之項伏於弓衣而死項戸講反弢他刀反以一矢復命杜言一發而中卻至三遇楚子之卒見楚子必下免冑而趨風林免其首胄而趨走疾如風皆致恭楚子使工尹襄問之以弓杜問遺也林工尹楚官名襄楚共王使遺卻至以弓答其意曰方事之殷也杜殷盛也有韎韋之跗注君子也杜韎赤色跗注戎服若袴而屬於跗與袴連林韋熟皮也韎莫拜反又音妹徐莫葢反附方于反注之樹反識見不榖而趨無乃傷乎杜恐其傷林此皆問勞卻至之辭卻至見客免胄承命林免胄以承楚王之命示敬曰君之外臣至從寡君之戎事以君之靈間蒙甲胄間猶近也不敢拜命林禮介者不拜介甲也故不敢拜楚君之命敢告不寕君命之辱杜以君辱賜命故不敢自安為事之故敢肅使者杜言君辱命女問以有軍事不得答故肅使者肅手至地若今㯛為于為反使所吏反下同三肅使者而退晉韓厥從鄭伯杜從逐也其御杜溷羅曰速從之其御屢顧不在馬可及也林鄭伯之御屢回顧心不在御馬逐之可及溷戸昏戸本二反韓厥曰不可以再辱國君乃止杜二年鞍戰韓厥已辱齊侯卻至從鄭伯其右茀翰胡曰諜輅之余從之乗而俘以下杜欲遣輕兵單進以距鄭伯車前而自後登其車以執之茀府勿反翰徐音韓諜音牒輅五嫁反乗繩證反卻至曰傷國君有刑亦止石首曰衛懿公唯不去其旗是以敗於熒乃内旌於弢中熒戰在閔二年去起吕反熒戸扃反旌音精唐苟謂石首曰子在君側敗者壹大我不如子子以君免我請止乃死杜敗者壹大謂君大崩也言石首亦君之親臣而執御與車右不同故首當御君以退已當死職楚師薄於險杜薄迫也叔山冉謂養由基曰林叔山冉楚人雖君有命為國故子必射杜王有死藝命冉如炎反為于偽反乃射再發盡殪林殪死也言所射盡死矢無虚發殪於計反叔山冉搏人以投中車折軾晉師乃止林叔山冉以手搏晉人以投其車中晉人之車而折其軾杜言二子皆有過人之能搏音搏中丁仲反折之設反又市列反試音式囚楚公子茷為卻至見譛張本茷扶廢反欒鍼見子重之旌請曰楚人謂夫旌子重之麾也彼其子重也林言楚人請夫所見之旌旗令尹子重之麾節也彼其子重之所在也夫音扶麾許危反曰臣之使於楚也子重問晉國之勇臣對曰好以衆整林言晉國好以整齊軍旅為勇使所吏反好乎報反下皆同曰又何如杜又問其餘臣對曰好以暇林雖急遽之中好以閒暇為勇今兩國治戎行人不使不可謂整臨事而食言不可謂暇林兵交使在其間今不使行人使于楚不可謂之整齊如一臨事而消食其好整之言不可謂之閒暇不迫請攝飲焉杜攝持也持飲往飲子重公許之使行人執榼承飲造于子重林榼飲器杜承奉也榼苦臘反造七報反曰寡君乏使使鍼御持矛是以不得犒從者使某攝飲林使行人致辭車右主撃刺持矛其職也故云使欒鍼侍君而持矛某行人名犒若報反從才用反子重曰夫子甞與吾言於楚必是故也不亦識乎林不亦識於禮乎杜知其以往言好暇故致飲受而飲之免使者而復鼓林免脱也既脱使者而復鳴鼓旦而戰見星未巳子反命軍吏察夷傷杜夷亦傷也補卒乗杜補死亡乗繩登反下同繕甲兵杜繕治也展車馬杜展陳也雞鳴而食唯命是聴復欲戰晉人患之苖賁皇徇曰蒐乗補卒林蒐閱車乗補益士卒徇似俊反蒐所留反秣馬利兵林秣穀戰馬修利兵器秣音末脩陳固列林修明行陳堅固伍列陳直覲反又如字蓐食申禱林食於寢蓐之間申重祈祝蓐音辱明日復戰乃逸楚囚杜逸縱也王聞之召子反謀榖陽豎獻飲於子反子反醉而不能見榖陽子反内豎見賢遍反王曰天敗楚也夫余不可以待乃宵遁晉入楚軍三日榖杜食楚粟三日也夫音扶范文子立於戎馬之前曰君幼諸臣不佞佞才也何以及此君其戒之一戒勿驕周書曰惟命不于常有徳之謂杜周書康誥言勝無常命惟徳是與楚師還及瑕杜瑕楚地王使謂子反曰先大夫之覆師徒者君不在杜謂子玉敗城濮時王不在軍覆芳服反子無以為過不榖之罪也林言今共王自在軍中子反無以為己之過杜王引過亦所以責子反子反再拜稽首曰君賜臣死死且不朽臣之卒實奔臣之罪也林時子反為中軍帥故言臣之卒實奔卒從此己前皆子忽反子重使謂子反曰初隕師徒者而亦聞之矣盍圖之林而汝也言初時子玉隕喪師徒汝亦聞子玉自殺之事矣何不圖謀其事今自殺也杜終二卿相惡隕于敏反盍户臘反對曰雖微先大夫有之大夫命側側敢不義林大夫謂子重也側子反名言雖無先大夫子玉自殺之事子重以義責我已敢不引義自裁側亡君師敢忘其死王使止之弗及而卒戰之曰齊國佐髙無咎至于師無咎髙固子衛侯出于衛林衛獻公亦以是日出師於衛公出于壊隤杜壊隤魯邑齊衛皆後非獨魯明晉以僑如故不見公壊户怪反徐音懐隤走回反宣伯通於穆姜林宣伯即僑如杜穆姜成公母欲去季孟而取其室杜季文子孟獻子將行林成公將去㑹晉師穆姜送公而使逐二子公以晉難告杜㑹晉伐鄭難乃旦反曰請反而聴命姜怒公子偃公子鉏趨過杜二子公庶弟鉏仕居反指之曰女不可是皆君也言欲廢公更立君女音汝公待於壞隤申宫儆備設守而後行是以後林申重公宫儆戒守備設置留守而後去㑹晉師是以後於晉楚戰期儆京領反守手又反使孟獻子守于公宫林此即上文所謂設守秋㑹于沙隨謀伐鄭也鄭猶未服宣伯使告卻犫曰魯侯待于壞隤以待勝者林觀晉楚之勝負待勝者以從之卻犫將新軍且為公族大夫以主東諸侯杜主齊魯之屬取貨于宣伯而訴公于晉侯林訴猶譖也而有緩急之異此訴公於晉侯葢膚受也晉侯不見公曺人請于晉曰自我先君宣公即世在十三年國人曰若之何憂猶未弭弭息也既葬國人皆將從子臧所謂憂未息弭亡氏反而又討我寡君杜前年晉侯執曺伯以亡曺國社稷之鎮公子杜謂子臧逃奔宋是大泯曺也杜泯滅也先君無乃有罪乎言今君無罪而見討得無以先君故若有罪則君列諸㑹矣諸侯雖有簒弑之罪侯伯已與之㑹則不復討前年㑹于戚曺伯在列盟畢乃執之故曺人以為無罪君唯不遺徳刑以伯諸侯豈獨遺諸敝邑敢私布之林遺失也言晉君惟不失其德刑以為諸侯方伯豈獨以執曺伯之故而失德刑於敝邑杜為曺伯歸不以名告傳伯如字又音霸七月公㑹尹武公及諸侯伐鄭將行姜又命公如初林姜即穆姜杜復欲使公逐季孟公又申守而行諸侯之師次于鄭西我師次于督揚不敢過鄭杜督揚鄭東地林畏鄭强故不敢過鄭守手又反過古卧反又古禾反子叔聲伯使叔孫豹請逆于晉師豹叔孫僑如弟也僑如於是遂作亂豹因奔齊為食於鄭郊林聲伯為食于鄭之郊師逆以至聲伯戒叔孫以必須所逆晉師至乃食聲伯四日不食以待之食使者而後食林晉逆四日不至聲伯凡四日不食以待之使者豹之介及晉逆既至聲伯又先食豹之介而後聲伯自食言其忠也食音嗣使所吏反諸侯遷于制田杜熒楊宛陵縣東有制澤林伐鄭之師遷屯于此知武子佐下軍杜武子荀罃以諸侯之師侵陳至于鳴鹿杜陳國式平縣西南有鹿邑遂侵蔡未反杜侵陳蔡不書公不與諸侯遷于潁上戊午鄭子罕宵軍之林鄭子罕以夜攻諸侯之軍宋齊衛皆失軍杜將士與軍相失宋衛不書後也曺人復請于晉晉侯謂子臧反吾歸而君以曺人重子臧故子臧反曺伯歸杜子臧自宋還子臧盡致其邑與卿而不出林子臧盡致其禄邑與卿之職守於君而不出仕宣伯使告卻犫曰魯之有季孟猶晉之有欒范也政令於是乎成林言魯國政令成於季孟猶晉國政令成於欒范今其謀曰晉政多門不可從也林言晉國政令不一出於多門不可從其命令寜事齊楚有亡而已蔑從晉矣蔑無也若欲得志於魯請止行父而殺之杜行父季文子也我斃蔑也蔑孟獻子時留守公宫斃婢世反而事晉蔑有貳矣林無有貳心也魯不貳小國必睦不然歸必叛矣九月晉人執季文子于苕丘林用僑如之譖公還待于鄆鄆魯西邑東郡廩丘縣東有鄆城使子叔聲伯請季孫于晉卻犫曰苟去仲孫蔑而止季孫行父吾與子國親於公室杜親魯甚於晉公室去起吕反對曰僑如之情子必聞之矣杜聞其淫慝情若去蔑與行父是大棄魯國而罪寡君也若猶不棄而恵徼周公之福使寡君得事晉君則夫二人者魯國社稷之臣也林二子存亡闗於魯之社稷故謂魯國社稷之臣夫音扶若朝亡之魯必夕亡林夕隨之亡屬於他國朝如字以魯之宻邇仇讎杜仇讎謂齊楚亡而為讎治之何及杜言魯屬齊楚則還為晉讎卻犫曰吾為子請邑對曰嬰齊魯之常𨽻也林卻犫喜聲伯之言故欲為聲伯請益禄邑嬰齊聲伯名杜𨽻賤官為于為反敢介大國以求厚焉林敢因介於晉之大國以自求富貴承寡君之命以請承奉也若得所請吾子之賜多矣又何求范文子謂欒武子曰季孫於魯相二君矣杜二君宣成相息亮反妾不衣帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何林謂受僑如之譖執季孫之賢必為諸侯之所譏也衣於既反食舊如字對上句應作嗣音子叔嬰齊奉君命無私杜不受卻犫請邑謀國家不貳杜謂四日不食以堅事晉圖其身不忘其君辭邑不食皆先君而後身若虛其請是棄善人也林善人謂聲伯子其圖之乃許魯平赦季孫冬十月出叔孫僑如而盟之僑如奔齊諸大夫共盟以僑如為戒十二月季孫及卻犫盟于扈歸刺公子偃偃與鉏俱為姜所指而獨殺偃偃與謀召叔孫豹于齊而立之杜近此七月聲伯侵豹請逆於晉聞魯人將討僑如豹乃辟其難先奔齊生二子而魯乃召之故襄二年豹始見經傳於此因言其終齊聲孟子通僑如杜聲孟子齊靈公母宋女使立於髙國之間杜位比二卿僑如曰不可以再罪林僑如自以在魯淫于穆姜得罪不可在齊再以滛于聲孟子得罪奔衛亦間於卿傳亦終言僑如之佞間徐音間厠之間讀者或如字晉侯使卻至獻楚捷于周與單襄公語驟稱其伐杜伐功也單子語諸大夫曰温季其亡乎林温季即卻至食邑於温季其字言將有滅亡之禍語魚據反位於七人之下杜佐新軍位在八而求掩其上杜稱已之伐掩上功怨之所聚亂之本也多怨而階亂何以在位林積怨而多是階他人為亂何以久在其位言必亡也夏書曰怨豈在明不見是圖杜逸書也不見細㣲也林夏書五子之歌言民怨豈在於明白之時當及其未見而圖度之見賢遍反又如字將慎其細也今而明之其可乎杜言卻至顯稱已功所以明怨咎林為明年晉殺三卻傳經丁亥十有七年春衛北宫括帥師侵鄭杜括成公曾孫括古活反夏公㑹尹子單子晉侯齊侯宋公衛侯曺伯邾人伐鄭杜晉未能服鄭故假天子威周使二卿㑹之晉為兵主而猶先尹單尊王命也單伯稱子葢降爵六月乙酉同盟于柯陵杜柯陵鄭西地言同盟尹單與盟之辭也柯古河反秋公至自㑹無傳齊髙無咎出奔莒九月辛丑用郊無傳九月郊祭非禮明矣書用郊従史文晉侯使荀罃來乞師無傳將伐鄭冬公㑹單子晉侯宋公衛侯曺伯齊人邾人伐鄭杜鄭猶未服故也十有一月公至自伐鄭無傳壬申公孫嬰齊卒于貍脤杜十一月無壬申日誤也貍脤闕貍力之反脤市軫反十有二月丁巳朔日有食之無傳邾子貜且卒杜無傳五同盟林定公卒宣公牼立貜俱縳反徐居碧反且字餘反晉殺其大夫卻錡卻犫卻至楚人滅舒庸傳十七年春王正月鄭子駟侵晉虛滑虛滑晉二邑滑故滑國為秦所滅時屬晉後屬周虛起居反衛北宫括救晉侵鄭至于髙氏杜不書救以侵告髙氏在陽翟縣西南夏五月鄭大子髠頑侯獳為質於楚林侯獳鄭大夫鄭懼晉故使二子為質於楚髠苦門反獳乃侯反質音致楚公子成公子寅戍鄭林楚使二子戍鄭以備晉公㑹尹武公單襄公及諸侯伐鄭自戲童至于曲侑杜今新汲縣治曲洧城臨洧水戲許宜反洧于軌反晉范文子反自鄢陵杜前年鄢陵戰還使其祝宗祈死杜祝宗主祭祀祈禱者林祝大祝宗宗人曰君驕侈而克敵是天益其疾也林言晉厲公本自驕侈而又克勝强敵是天益晉侯驕侈之疾也侈尺氏反又尸氏反難將作矣愛我者唯祝我使我速死無及於難范氏之福也六月戊辰士燮卒傳言厲公無道故賢臣憂懼因禱自裁難乃旦反下同祝之又反乙酉同盟于柯陵尋戚之盟也戚盟在十五年楚子重救鄭師于首止林首止衛地諸侯還畏楚强齊慶克通于聲孟子與婦人蒙衣乗輦而入于閎杜慶克慶封父蒙衣亦為婦人服與婦人相冒閎巷門與如字徐音預閎音宏鮑牽見之以告國武子鮑牽鮑叔牙之曾孫武子召慶克而謂之林召慶克而告之使改其所為慶克久不出杜慙卧於家夫人所以怪之而告夫人曰國子謫我謫遣責也謫直革反夫人怒國子相靈公以㑹杜㑹伐鄭相息亮反下同髙鮑處守杜髙無咎鮑牽守手又反及還將至閉門而索客杜蒐索備姦人索所白反孟子訴之曰髙鮑將不納君而立公子角國子知之角頃公子秋七月壬寅刖鮑牽而逐髙無咎無咎奔莒髙弱以盧叛林斷足為刖杜弱無咎子盧髙氏邑刖音月又五刮反齊人來召鮑國而立之杜國牽之弟文子初鮑國去鮑氏而來為施孝叔臣林先時鮑國去齊鮑氏而來魯為施孝叔家臣施氏卜宰匡句須吉杜卜立冢宰林匡句須亦施氏家臣卜兆告吉句其俱反施氏之宰有百室之邑林施氏有百室之邑以為其家宰禄邑與匡句須邑使為宰以讓鮑國而致邑焉林匡句須以宰讓遜鮑國且致其邑不受施孝叔曰子實吉對曰能與忠良吉孰大焉林能以職位遜與忠良其為吉莫大於此鮑國相施氏忠故齊人取以為鮑氏後仲尼曰鮑荘子之知不如葵葵猶能衛其足杜葵傾葉向日以蔽其根言鮑牽居亂不能危行言孫知音智冬諸侯伐鄭杜前夏未得志故十月庚午圍鄭楚公子申救鄭師于汝上十一月諸侯還不書圍畏楚救不成圍而還初聲伯夢涉洹杜洹水出汲郡林慮縣東北至魏郡長樂縣入清水洹音桓一音桓今上俗音袁或與己瓊瑰食之杜瓊玉瑰珠也食珠玉含象瓊求營反瑰古回反泣而為瓊瑰盈其懐杜淚下化為珠玉滿其懷從而歌之曰濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懐乎社從就也夢中為此歌林再言歸乎必死之兆懼不敢占也還自鄭壬申至于貍脤而占之曰余恐死故不敢占也今衆繁而従余三年矣無傷也林衆人繁多而從於我又過三年矣言其夢無傷於己或應在他事言之之莫而卒杜傳戒數占夢莫音暮齊侯使崔杼為大夫使慶克佐之帥師圍盧杜討髙弱杼直吕反國佐從諸侯圍鄭以難請而歸杜請於諸侯難乃旦反下同遂如盧師殺慶克以榖叛杜疾克淫亂故殺之齊侯與之盟于徐闗而復之十二月盧降使國勝告難于晉待命于清杜勝國佐子使以髙氏難告晉齊欲討國佐故留其子於外清陽平樂縣是為明年殺國佐傳降户江反晉厲公侈多外嬖杜外嬖愛幸大夫嬖必計反反自鄢陵欲盡去羣大夫而立其左右林自鄢陵役歸愈驕侈欲盡去晋之諸大夫而立其嬖幸左右之人杜終如士燮言去起吕反胥童以胥克之廢也怨卻氏杜童胥克之子宣八年卻缺廢胥克而嬖於厲公卻錡奪夷陽五田五亦嬖於厲公卻犫與長魚矯争田執而梏之杜梏械也林足械曰梏矯居表反梏古毒反與其父母妻子同一轅杜繋之車轅既林既卒事也矯亦嬖於厲公欒書怨卻至以其不從已而敗楚師也欲廢之杜鄢陵戰欒書欲固壘卻至言楚有六閒以取勝也使楚公子茷告公曰此戰也卻至實召寡君杜鄢陵戰晉囚公子茷以歸卻至嘗使召楚故言卻至實楚君以東師之未至也杜齊魯衛之師與軍帥之不具也曰此必敗杜荀罃佐下軍居守卻犫將新軍乞師故言不具林以東方諸侯之師未至晉之軍帥不備卻至且曰此役晉必敗帥所類反吾因奉孫周以事君林孫周晉襄公曾孫悼公也言卻欲因晉敗立孫周以事楚君公告欒書書曰其有焉不然豈其死之不恤而受敵使乎杜謂鄢陵戰時楚子問卻至以弓使所吏反君盍嘗使諸周而察之杜嘗試也林言晉君何不試使卻至奉使於周室而察其有無欲奉孫周之意時孫周在周故云盍戸臘反使所吏反又如字卻至聘于周欒書使孫周見之公使覘之信杜覘伺也林果見有卻至孫周交通之跡覘勑㢘反遂怨卻至厲公田與婦人先殺而飲酒後使大夫殺休田獵之禮尊者先殺杜傳言厲公無道先婦人而後卿佐卻至奉豕杜進之於公寺人孟張奪之杜寺人奄士卻至射而殺之公曰季子欺余杜季子卻至公反以為卻至奪孟張豕射食亦反厲公將作難林将作禍難去諸大夫胥童曰必先三卻族大多怨林其族既大又且多怨去大族不偪杜不偪公室偪彼力反下同敵多怨有庸杜計多怨者易有功公曰然郤氏聞之卻錡欲攻公曰雖死君必危林言雖無攻而死厲公亦必危亡卻至曰人所以立信知勇也信不叛君知不害民勇不作亂失兹三者其誰與我死而多怨將安用之杜言俱死無多用其怨咎知音智下同君實有臣而殺之其謂君何林言不可如君何我之有罪吾死後矣若殺不辜將失其民林我若有罪而見殺吾之死已晚矣若殺無罪之人則民心不服君將自失其民欲安得乎杜言不得安君位待命而已受君之禄是以聚黨有黨而争命罪孰大焉林言人臣受其君之爵禄故以餘禄聚其私黨既有私黨而與其君争一旦之死命其為罪孰大於此傳言卻至無反心壬午胥童夷羊五帥甲八百將攻郤氏杜八百人長魚矯請無用衆公使清沸魋助之杜沸魋亦嬖人沸甫味反魋徒回反抽戈結衽杜衽裳際衽而甚反徐而鴆反而偽訟者林偽若二人將訟曲直於卻氏者三卻將謀於榭杜榭講武堂矯以戈殺駒伯苦成叔於其位杜位所坐處也駒伯卻錡苦成叔卻犫温季曰逃威也遂趨卻至本意欲稟君命而死今矯等不以君命而來故欲逃凶賊為害故曰威言可畏也或曰畏當為藏矯及諸其車以戈殺之皆尸諸朝杜陳其尸於朝胥童以甲刧欒書中行偃於朝矯曰不殺二子憂必及君林言二子必為公害公曰一朝而尸三卿余不忍益也對曰人將忍君杜人謂書與偃朝如字臣聞亂在外為姦在内為軌御姦以徳杜德緩逺御魚吕反下同御軌以刑杜刑治近不施而殺不可謂徳臣偪而不討不可謂刑杜不施徳於三卻而遽殺之不可謂御姦之徳欒范偪君而不能討不可謂御軌之刑施如字或式豉反徳刑不立姦軌並至臣請行遂出奔狄杜行去也林長魚矯請去以避禍公使辭於二子杜辭謝書與偃曰寡人有討於卻氏卻氏既伏其辜矣大夫無辱其復職位杜胥童刼而執之故云辱皆再拜稽首曰君討有罪而免臣於死君之恵也二臣雖死敢忘君徳乃皆歸公使胥童為卿公遊于匠麗氏杜匠麗嬖大夫家欒書中行偃遂執公焉召士匄士匄辭杜辭不往召韓厥韓厥辭曰昔吾畜於趙氏孟姬之讒吾能違兵杜畜養也違去也韓厥少為趙盾所待養及孟姬之亂晉將討趙氏而厥去其兵示不與黨言此者明已無所偏助孟姬亂在八年林孟姬即趙荘姬古人有言曰殺老牛莫之敢尸而況君乎二三子不能事君焉用厥也林尸主也言老牛而殺之猶莫之敢主而況國君之尊乎二三子不能事其君而欲殺之安欲召我為也焉䖍䖍反舒庸人以楚師之敗也杜敗於鄢陵舒庸東夷國道吳人圍巢伐駕圍釐虺杜巢駕釐虺楚四邑道音導下同駕如字一音加釐力之反虺許鬼反遂恃吳而不設備楚公子槖師襲舒庸滅之槖他洛反閏月乙夘晦欒書中行偃殺胥童杜以其刼已故民不與卻氏胥童道君為亂故皆書曰晉殺其大夫杜厲公以私欲殺三卻而三卻死不以無罪書書偃以家怨害胥童而胥童受國討又明卻氏失民胥童道亂宜其為國戮經戊子十有八年春王正月晉殺其大夫胥童傳在前年經在今春從告庚申晉弑其君州蒲杜不稱臣君無道林厲公弑悼公周立齊殺其大夫國佐國武子公如晉夏楚子鄭伯伐宋宋魚石復入于彭城杜傳例曰以惡入也彭城宋邑今彭城縣復扶又反公至自晉晉侯使士匄來聘秋杞伯來朝八月邾子來朝築鹿囿築牆為鹿苑囿音又己丑公薨于路寢冬楚人鄭人侵宋杜子重先遣輕軍侵宋故稱人而不言伐晉侯使士魴來乞師魴音房十有二月仲孫蔑㑹晉侯宋公衛侯邾子齊崔杼同盟于虛朾杜虛朾地闕虛起居反朾他工反丁未葬我君成公傳十八年春王正月庚申晉欒書中行偃使程滑弑厲公程滑晉大夫葬之于翼東門之外以車一乗林翼晉故都杜言不以君禮葬諸侯葬車七乗乗繩證反使荀罃士魴逆周子于京師而立之杜悼公周生十四年矣大夫逆于清原周子曰孤始願不及此雖及此豈非天乎杜言有命抑人之求君使出命也立而不從將安用君林言人之所以求君將使其君出命令以治國既立為君而不從其命令則安用立君為哉二三子用我今日否亦今日共而從君神之所福也林恭敬事君而從其命臣盡臣道此鬼神之所福祐也傳言其少有才所以能自固對曰羣臣之願也敢不惟命是聴庚午盟而入杜與諸大夫盟館于伯子同氏杜晉大夫家館舍也辛巳朝于武宫杜武公曲沃始命君逐不臣者七人杜夷羊五之屬周子有兄而無慧不能辨菽麥故不可立杜菽大豆也豆麥殊形易别故以為癡者之証不慧葢世所謂曰癡林傳著悼公所以立菽音叔齊為慶氏之難前年國佐殺慶克為于偽反難乃旦反故甲申晦林故字當屬上句杜注屬下句姑從之齊侯使士蕐免以戈殺國佐于内宫之朝蕐免齊大夫内宫夫人宫師逃于夫人之宫杜㐲兵内宫恐不勝書曰齊殺其大夫國佐棄命林以國佐棄㑹伐鄭之命而先歸專殺以榖叛故也言國佐本疾淫亂殺慶克齊以是討之嫌其罪不及死故傳明言其三罪使清人殺國勝杜勝國佐子前年待命于清者國弱來奔弱勝之弟王湫奔萊杜湫國佐黨湫子小反萊音來慶封為大夫慶佐為司宼杜封佐皆慶克子旣林旣卒事也齊侯反國弱使嗣國氏禮也佐之罪不及不祀二月乙酉朔晉悼公卽位于朝朝廟五日而即位也厲公殺絶故悼公不以嗣子居喪始命百官杜始為政施舍己責施恩惠舍勞役止逋責施如字又始䜴反逮鰥寡杜惠及微林無妻曰鰥無夫曰寡窮而無告之人鰥古頑反振廢滯杜起舊德匡乏困救災患匡亦救也禁淫慝薄賦歛宥罪戾杜宥寛也慝他得反歛力驗反宥音又戾力制反節器用杜節省也時用民使民以時欲無犯時林不縱私欲以奪農時使魏相士魴魏頡趙武為卿杜相魏錡子魴士㑹子頡魏顆子武趙朔子此四人其父祖皆有勞於晉國相息亮反頡户結反荀家荀㑹林二荀杜注不言其所出欒黶韓無忌為公族大夫使訓卿之子弟共儉孝弟杜無忌韓厥子林國語荀家惇㑹荀㑹文敏黶也果敢無忌鎮静使兹四人為之使士渥濁為大傅使修范武子之法杜渥濁士貞子武子為景公大傅林范武子即士㑹作執秩之法故使士貞子修之國語君知士貞子帥志博聞宣惠於教使為大𫝊渥於角反右行辛為司空使修士蔿之法杜辛將右行因以為氏林士蔿獻公司空使修建都邑起宫室經溝洫之法國語知右行辛能以數宣物定功也使為元司空行户郎反蔿于委反弁糾御戎校正屬焉杜弁糾欒糾也校正主馬官林國語知欒糾之能御以和于政使為戎御弁皮彦反糾居黝反校月孝反使訓諸御知義杜戎士尚節義荀賔為右司士屬焉杜司士車右之官林國語知荀賔之有力而不暴也使為戎右使訓勇力之士時使杜勇力皆車右也勇力多不順命故訓之以共時之使卿無共御立軍尉以攝之杜省卿戎御令軍尉攝御而已祁奚為中軍尉羊舌職佐之林國語知祁奚之果而不淫也使為元尉知羊舌職之聰敏肅給也使佐之魏絳為司馬杜魏犫子也林國語知魏絳之勇而不亂也使為元司馬張老為候奄林候奄中軍主斥候之官國語知張老之智而不詐也使為元侯鐸遏寇為上軍尉籍偃為之司馬杜偃籍談父為上軍司馬林國語知鐸遏宼之恭敬而侵疆也使為輿尉知籍偃之惇帥舊職而恭給也使為輿司馬鐸待洛反遏於葛反徐音謁使訓卒乘親以聽命杜相親以聽上命卒子忽反乘繩證反下同程鄭為乘馬御六騶屬焉使訓羣騶知禮杜程鄭荀氏别族乘馬御乗車之僕也六騶六閑之騶周禮諸侯有六閑馬乘車尚禮容故訓羣騶使知禮林國語知程鄭端而不淫好諫不隱使為贊僕騶側留反凡六官之長皆民譽也林皆民之所譽望者也杜大國三卿晉時置六卿為軍帥故總舉六官則知羣官無非其人長丁丈反舉不失職官不易方杜官守其業無相踰易爵不踰德杜量德授爵師不陵正旅不偪師杜正軍將命卿也師二千五百人之師也旅五百人之帥也言上下有禮不相陵偪民無謗言所以復霸也杜此以上通言悼公所行未必皆在卽位之年復扶又反公如晉朝嗣君也夏六月鄭伯侵宋及曹門外杜曹門宋城門遂㑹楚子伐宋取朝郟楚子辛鄭皇辰侵城郜取幽丘同伐彭城杜朝郟城郜幽丘皆宋邑林彭城亦宋邑吳晉徃來之道也朝如字郟古洽反郜古報反納宋魚石向為人鱗朱向帶魚府焉杜五子以十五年出奔楚獨書魚石為帥告以三百乘戍之而還書曰復入惡其依阻大國以兵威還故書復入乘繩證反凡去其國國逆而立之曰入林謂身本無位本國迎而立之以繼人後故書曰入復其位曰復歸林謂身本有位本國迎而復其位故書曰復歸復音服又扶又反諸侯納之曰歸謂諸侯以言語告請而納之有位無位皆曰歸以惡曰復入謂身為戎首稱兵入伐害國殄民者也此四條所以明外内之援辨逆順之辭通君臣有國有家之大例宋人患之林宋人以楚納五大夫於彭城為患害西鉏吾曰何也西鉏吾宋大夫鉏仕居反徐在居反吾音魚若楚人與吾同惡以德於我吾固事之也不敢貳矣林不令之臣天下所同惡若楚人與我同惡魚石等以施恩德於我我感楚德則堅固事楚也不敢有携貳之心矣大國無厭鄙我猶憾言巳事之則以我為鄙邑猶憾不足此吾患也厭於鹽反憾戸暗反不然而收吾憎使贊其政林收我國所憎嫉之人以為己用杜謂不同惡魚石而用之使佐政以間吾釁亦吾患也今將崇諸侯之姦而披其地杜崇長也謂楚今取彭城以封魚石披猶分也間如字又間厠之間釁許覲反披曾彼反長丁丈反以塞夷庚夷庚吳晉往來之要道楚封魚石於彭城欲以絶呉晉之道逞姦而攜服毒諸侯而懼呉晉吾庸多矣非吾憂也杜使奸邪者得快其志而服從者皆有攜心毒害諸侯而隔吳晉之道使之恐懼吾之有功多矣非宋國之憂患也且事晉何為晉必恤之杜言宋常事晉何為顧有此患難公至自晉晉范宣子來聘且拜朝也杜拜謝公朝君子謂晉於是乎有禮杜有卑讓之禮秋杞桓公來朝勞公且問晉故公以晉君語之杜語其德政勞力報反語魚據反杞伯於是驟朝于晉而請為昏為平公不徹樂張本七月宋老佐蕐喜圍彭城老佐卒焉言所以不克彭城八月邾宣公來朝即位而來見也見賢遍反築鹿囿書不時也杜非士功時己丑公薨于路寢言道也在路寢得君薨之道冬十一月楚子重救彭城伐宋杜使偏師與鄭人侵宋子重為後鎮宋蕐元如晉告急韓獻子為政於是欒書卒韓厥代將中軍曰欲求得人必先勤之林言晉欲求得諸侯之從己必先勤恤其急成霸安疆自宋始矣林昔者晉文公成就霸業而致安疆之功僖二十八年亦以救宋始事故敗楚遂成數世之伯晉侯師于台谷以救宋台谷地闕台勑才反一音臺遇楚師於靡角之谷楚師還杜畏晉強也靡角宋地晉士魴來乞師杜將救宋季文子問師數於臧武仲武仲宣叔之子對曰伐鄭之役知伯實來下軍之佐也杜知伯荀罃今彘季亦佐下軍杜彘季士魴彘直例反如伐鄭可也伐鄭在十七年事大國無失班爵而加敬焉禮也林事大國之道無失班爵之序而加恭敬於其使者此事大國之禮從之杜從武仲言十二月孟獻子㑹于虚朾謀救宋也宋人辭諸侯而請師以圍彭城杜不敢煩諸侯故但請其師為襄元年圍彭城傳孟獻子請于諸侯而先歸㑹葬丁未葬我君成公書順也杜薨于路寢五月而葬國家安静世適承嗣故曰書順也左傳杜林合注卷二十四
