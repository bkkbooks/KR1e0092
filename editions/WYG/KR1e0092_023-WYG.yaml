body:
  text: 左傳杜林合注卷二十三明王道焜趙如源同編成公三經辛巳十有一年春王三月公至自晉正月公在晉不書諱見止晉侯使郤犫來聘己丑及郤犫盟杜郤犫郤克従父兄弟犫尺由反夏季孫行父如晉秋叔孫僑如如齊僑其驕反冬十月傳十一年春王三月公至自晉晉人以公為貳於楚故止公公請受盟而後使歸前年七月公如晉弔至是乃得歸郤犫來聘且涖盟公請受盟故使大夫來臨之涖音利又音類聲伯之母不聘聲伯之母叔肸之妻不聘無媒禮聘本亦作娉四政反穆姜曰吾不以妾為姒杜昆弟之妻相謂為姒穆姜宣公夫人宣公叔肸同母昆弟林穆姜言不以聲伯之母為姒姒音似生聲伯而出之嫁於齊管于奚生二子而寡以歸聲伯林以其所生之子一男一女歸於聲伯聲伯以其外弟為大夫杜外弟管于奚之子為魯大夫而嫁其外妹於施孝叔林孝叔魯恵公五世孫郤犫來聘求婦於聲伯聲伯奪施氏婦以與之林郤犫為其子求婦於聲伯聲伯畏郤犫無以應命乃奪其外妹已嫁于施孝叔者以與郤氏婦人曰鳥獸猶不失儷杜儷耦也林聲伯外妹謂其夫言雖鳥獸之微亦能自庇其配耦者儷力計反子將若何曰吾不能死亡林言不與郤犫婦懼其怒致我死亡之禍婦人遂行生二子於郤氏郤氏亡林郤氏亡在十七年傳言郤犫淫縱所以亡也自此以下皆傳終言施氏婦事非在今年事晉人歸之施氏施氏逆諸河沈其二子杜沈之於河沈徐直蔭反一音如字婦人怒曰己不能庇其伉儷而亡之杜伉敵也己音以又音紀庇必利反又音祕伉苦浪反又不能字人之孤而殺之字愛也將何以終遂誓施氏杜約誓不復為之婦也夏季文子如晉報聘且涖盟也郤犫文子交盟魯晉之君其意一也故但書來盟舉重略輕周公楚惡惠襄之逼也杜惠王襄王之族惡烏路反且與伯與争政杜伯與周卿士與音餘本亦作與不勝怒而出及陽樊陽樊晉地王使劉子復之盟于鄄而入三日復出奔晉杜王既復之而復出所以自絶於周為明年周公出奔𫝊鄄周邑鄄音絹秋宣伯聘于齊以修前好杜鞌以前之好好呼報反晉郤至與周争鄇田杜鄇温别邑今河内懐縣西南有鄇人亭鄇音侯字林音候王命劉康公單襄公訟諸晉郤至曰温吾故也故不敢失杜言温郤氏舊邑單音善劉子單子曰昔周克商使諸侯撫封杜各撫有其封内之地蘇忿生以温為司寇與檀伯達封于河杜蘇忿生周武王司寇蘇公也與檀伯達俱封於河内檀徒丹反蘇氏即狄又不能於狄而奔衛事在僖十年襄王勞文公而賜之温杜在僖二十五年勞力報反狐氏陽氏先處之杜狐溱陽處父先食温地而後及子若治其故則王官之邑也子安得之林若欲治其故舊所有則温舊為王官之邑郤至安得指温以為故物晉侯使郤至勿敢争傳言郤至貪所以亡宋華元善於令尹子重又善於欒武子聞楚人既許晉糴茷成而使歸復命矣杜在往年華户化反冬華元如楚遂如晉合晉楚之成為明年盟宋西門外張本秦晉為成林秦晉交兵不和至是為成將㑹于令狐晉侯先至焉秦伯不肯涉河林秦桓公見晉侯先至遂懐疑不肯涉河令力丁反次于王城使史顆盟晉侯于河東杜史顆秦大夫顆苦果反晉郤犫盟秦伯于河西杜就盟王城范文子曰是盟也何益齊盟所以質信也杜齊一心質成也㑹所信之始也始之不従其可質乎林所地也言約㑹之所乃二國質信之始始約㑹所而不能従其何以成信乎秦伯歸而背晉成為十三年伐秦傳背音佩經壬午十有二年春周公出奔晉夏公㑹晉侯衛侯于瑣澤杜瑣澤地闕林此晉楚為成也於是晉士燮㑹楚公子罷許偃盟于宋西門之外不書存中國也瑣素果反依字宜作璅秋晉人敗狄于交剛交剛地闕冬十月傳十二年春王使以周公之難來告書曰周公出奔晉林周公奔晉前年經書在今年従告也難乃旦反凡自周無出周公自出故也杜天子無外故奔者不言出周公為王所復而自絶於周故書出以非之宋華元克合晉楚之成杜終前年事夏五月晉士燮㑹楚公子罷許偃二子楚大夫罷音皮癸亥盟于宋西門之外曰凡晉楚無相加戎好惡同之林自曰字以下十六句皆為盟載書之辭戎兵也好惡並如字又上呼報反下烏路反同恤菑危備救凶患若有害楚則晉伐之在晉楚亦如之交贄往來道路無壅林若二國有災害危難則同心拯恤之有凶荒患害則備力以救援之諸侯謀害楚國則晉興兵為楚伐之此晉與楚同惡諸侯謀害晉國楚亦如約為晉伐之此楚與晉同惡二國交執贄幣以通往来道路之間無得壅塞此晉楚二國同好菑音災贄之二反壅於勇反謀其不協而討不庭杜討背叛不来在王庭者有渝此盟明神殛之杜殛誅也渝羊朱反殛本又作極紀力反俾隊其師無克胙國林胙報也使隊失其師衆無能享國家之報俾本又作卑必爾反隊直類反胙才故反鄭伯如晉聴成杜聴猶受也晉楚既成鄭往受命㑹于瑣澤成故也杜晉既與楚成合諸侯以申成好狄人間宋之盟以侵晉而不失備秋晉人敗狄于交剛林乗狄之無備也間間厠之間晉郤至如楚聘林晉楚既成好故晉使郤至如楚修聘且涖盟楚子享之子反相為地室而縣焉林為樂室於地之下而懸鐘鼓相息亮反縣音𤣥卻至将登杜登堂金奏作於下杜擊鐘而奏樂驚而走出子反曰日云莫矣莫音暮寡君須矣吾子其入也賔曰林即郤至君不忘先君之好施及下臣貺之以大禮重之以備樂杜貺賜也林賜之以享燕之大禮重之以軒縣之備樂施以豉反重直用反如天之福兩君相見何以代此下臣不敢林若蒙上天之福使晉楚二國之君以和好相見何以代此為兩君相見之禮子反曰如天之福兩君相見無亦唯是一矢以相加遺焉用樂杜言兩君戰乃相見無用此樂遺唯季反焉於䖍反寡君須矣吾子其入也賔曰傳諸交讓得賔主辭者多曰賔主以明之若讓之以一矢禍之大者其何福之為林言若二國有相責讓之言而以一矢相加遺此禍患之大者豈得以為上天之福世之治也諸侯間於天子之事則相朝也杜王事間缺則修私好治直吏反間音閑於是乎有享宴之禮享以訓共儉杜享有體薦設几而不倚爵盈而不飲肴乾而不食所以訓共儉享許丈反又許亮反本亦作享宴於見反徐於顯反宴以示慈恵杜宴則折俎相與共食共儉以行禮而慈恵以布政政以禮成民是以息林名安其分而得其安息百官承事朝而不夕杜國家安静無事故朝治其事而不夕見朝直遥反徐音朝旦之朝此公侯之所以扞城其民也杜扞蔽也言享宴結好鄰國所以蔽扞其民扞戸旦反故詩曰赳赳武夫公侯干城詩周南之風赳赳武貌干扞也言公侯之與武夫止于扞難而已赳居黝反一音居醜反于户旦反又如字及其亂也諸侯貪冒侵欲不忌争尋常以盡其民林好財曰貪盡利曰冒侵奪嗜欲無所顧忌杜八尺曰尋倍尋曰常言争尺丈之地以相攻伐冒莫報反又亡牝反畧其武夫以為己腹心股肱爪牙杜畧取也言世亂則公侯制禦武夫以従已志使侵害鄰國為搏噬之用無己故詩曰赳赳武夫公侯腹心舉詩之正以駮亂義詩言治世則武夫能合德公侯外為扞城内制其腹心天下有道則公侯能為民干城而制其腹心林上文乃舉治世之事以證亂世之事故重言天下有道則公侯能為其民人扞蔽城郭以禦外患而自制其腹心之欲非以縱腹心之欲為于偽反又如字亂則反之杜略其武夫以為己腹心爪牙今吾子之言亂之道也不可以為法然吾子主也至敢不従遂入卒事歸以語范文子文子曰無禮必食言吾死無日矣夫杜言晉楚不能乆和必復相伐為十六年鄢陵戰張本語魚據反夫音扶本亦無此字冬楚公子罷如晉聘且涖盟報郤至十二月晉侯及楚公子罷盟于赤棘杜晉地經癸未十有三年春晉侯使郤錡来乞師将伐秦也侯伯當召兵而乞師謙辭錡魚綺反三月公如京師伐秦道過京師因朝王夏五月公自京師遂㑹晉侯齊侯宋公衛侯鄭伯曺伯邾人滕人伐秦曺伯盧卒于師杜五同盟林宣公卒成公負芻立盧力吳反秋七月公至自伐秦無傳冬葬曺宣公傳十三年春晉侯使郤錡来乞師將事不敬杜将事致君命孟獻子曰卻氏其亡乎禮身之幹也敬身之基也卻子無基林禮所以立故在身如樹木之有幹敬所以守故在身如垣牆之有基卻錡不敬是無基也且先君之嗣卿也受命以求師將社稷是衛而惰棄君命也不亡何為杜郤錡卻克子故曰嗣卿為十七年晉殺卻錡𫝊惰徒臥反三月公如京師宣伯欲賜林宣伯即僑如欲王賜已請先使王以行人之禮禮焉杜不加厚使所吏反孟獻子従王以為介而重賄之介輔相威儀者獻子相公以禮故王重賜之従才用反介音界公及諸侯朝王遂従劉康公成肅公㑹晉侯伐秦杜劉康公王季子劉成二公不書兵不加秦林朝王畢事遂従劉成二公㑹晉侯伐秦𫝊明晉厲公不與朝成子受脤于社不敬杜脤宜社之内也盛以脤器故曰脤宜出兵祭社之名脤市軫反劉子曰吾聞之民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也林中者至正大中之理凡民皆受天地大中之理以生所謂上天賦命即此大中之理則法也聖人因天理之自然而為之節文是以有動作禮義威儀之法則所以安定上天所賦之命而使之勿失能者養之以福杜養威儀以致福不能者敗以取禍是故君子勤禮小人盡力林在上君子以勤禮臨下為天命在下小人以盡力事上為天命盡津忍反下同勤禮莫如致敬盡力莫如敦篤敬在養神篤在守業林致敬之道在養其神明之舍敦篤之道在守其本然之業國之大事在祀與戎祀有執膰林膰祭肉膰音煩戎有受脤神之大節也杜交神之大節今成子惰棄其命矣杜惰則失中和之氣其不反乎杜為成肅公卒于瑕張本夏四月戊午晉侯使吕相絶秦杜吕相魏錡子葢口宣已命相息亮反曰昔逮我獻公及穆公杜晉獻公秦穆公逮晉代又大討反相好戮力同心申之以盟誓重之以昏姻林二公盟雖不載於經傳然好必有盟可以意曉杜穆公夫人獻公之女好呼報反下同戮音六嵇康力幽反字林音遼天禍晉國文公如齊恵公如秦林晉文公以僖五年奔狄處狄十二年而行及齊齊桓公妻之晉恵公奔梁在僖六年秦納恵公在僖九年杜辟驪姬也不言狄梁舉所恃大國無禄獻公即世林即世卒也在僖九年穆公不忘舊徳俾我恵公用能奉祀于晉杜僖十年秦納恵公又不能成大勲林不能始終成就其立惠之大功而為韓之師杜僖十五年秦伐晉獲恵公亦悔于厥心用集我文公林集成也用能成我文公而納之于晉在僖二十四年是穆之成也杜成功於晉文公躬擐甲胄䟦履山川林擐貫也在身曰甲在首曰胄杜草行為䟦擐音患䟦蒲末反踰越險阻征東之諸侯虞夏商周之𦙍而朝諸秦則亦既報舊徳矣林難下曰險難上曰阻秦居西方故以諸侯為東言東方諸侯皆四代之嗣諸侯朝秦事無所攷想當是時必有往朝于秦者因文致之耳鄭人怒君之疆埸我文公帥諸侯及秦圍鄭杜晉自以鄭貳於楚故圍之鄭非侵秦也晉以此誣秦事在僖三十年疆居良反埸音亦秦大夫不詢于我寡君擅及鄭盟杜詢謀也盟者秦伯謙言大夫詢思巡反擅市戰反諸侯疾之將致命于秦杜致死命而討秦時無諸侯葢諸侯遥致此意文公恐懼綏静諸侯秦師克還無害則是我有大造于西也杜造成也言晉有成功於秦無禄文公即世林在僖三十二年穆為不弔杜不見弔傷蔑死我君寡我襄公林輕蔑文公以已死以襄公新立為寡弱迭我殽地奸絶我好伐我保城殄滅我費滑杜伐保城誣之費滑滑國都於費今緱氏縣林秦滅滑在僖三十三年迭直結反徐音逸殽户交反好音于費扶味反滑于八反散離我兄弟撓亂我同盟林滑晉同姓國故言離散我兄弟滑鄭皆従晉國故云撓亂我同盟撓乃夘反徐許髙反傾覆我國家林謂秦伐滑圖鄭為欲傾危覆滅晉之國家覆孚服反下同我襄公未忘君之舊勲杜納文公之勲而懼社稷之隕是以有殽之師在僖三十三年隕于敏反下同猶願赦罪于穆公杜晉欲求解於秦穆公弗聴而即楚謀我天誘其衷成王隕命杜秦使鬬克歸楚求成事見文十四年文元年楚弑成王穆公是以不克逞志于我杜逞快也逞勅景反穆襄即世康靈即位文六年晉襄秦穆皆卒康公我之自出杜晉外甥又欲闕剪我公室傾覆我社稷帥我蝥賊以來蕩揺我邊疆林此亦文致之辭闕猶掘也剪截斷之也杜蝥賊食禾稼蟲名謂秦納公子雍闕其月反徐如字蝥莫侯反爾雅蟲食苗為蝥食節為賊我是以有令狐之役在文七年康猶不悛入我河曲杜悛改也林黄河千里而一曲河曲晉地故曰入我河曲悛七全反伐我洓川俘我王官杜洓水出河東聞喜縣西南至蒲坂縣入河洓徐息録反又音速俘芳夫反剪我羈馬我是以有河曲之戰在文十二年東道之不通則是康公絶我好也杜言康公自絶故不復東通晉及君之嗣也杜君秦桓公事在宣五年我君景公引領西望曰庶撫我乎林引領猶翹首也杜望秦撫恤晉君亦不恵稱盟杜不肯稱晉望而共盟稱尺證反利吾有狄難杜謂晉滅潞氏時難方旦反入我河縣焚我箕郜芟夷我農功杜箕郜晉二邑焚火攻之也夷傷也箕音基一音其郜古報反芟所衘反䖍劉我邊垂䖍劉皆殺也我是以有輔氏之聚杜聚衆也在宣十五年聚才喻反君亦悔禍之延延長也而欲徼福于先君獻穆杜晉獻秦穆徼古堯反使伯車來命我景公杜伯車秦桓公子曰吾與女同好棄惡復修舊徳以追念前勲林言我與女同結新好共棄舊惡再修舊日之徳以追念前人之功勲女音汝下同好呼報反又如字復音服又扶又反言誓未就景公即世林在十年我寡君是以有令狐之㑹令狐㑹在十一年申厲公之命宜言寡人稱君誤也君又不祥杜祥善也背棄盟誓林十一年盟于河西秦伯歸而背晉成白狄及君同州杜及與也林白狄與秦同居西方雍州君之仇讐而我之昏姻也杜季隗廧咎如赤狄之女也自狄伐而獲之納諸文公君來賜命曰吾與女伐狄寡君不敢顧昏姻畏君之威而受命于吏君有二心於狄曰晉將伐女狄應且憎是用告我杜言狄雖應答秦而心實憎秦無信應應對之應楚人惡君之二三其徳也亦來告我曰林此曰字以下至以懲不壹皆楚告晉之辭惡烏路反秦背令狐之盟而來求盟于我昭告昊天上帝林以功用謂之天以主宰謂之帝昊户老反秦三公楚三王杜三公穆康共三王成穆莊曰余雖與晉出入余唯利是視林曰字下兩句乃秦楚誓辭出入猶往來也言秦雖與晉相来往我惟視其利而従之不以誠心與晉不穀惡其無誠徳是用宣之以懲不壹林此不穀乃楚共告晉自稱懲直升反諸侯備聞此言斯是用痛心疾首暱就寡人杜疾亦痛也䁥親也林言諸侯哀心疾首惡秦之甚䁥女乙反寡人帥以聴命唯好是求君若恵顧諸侯矜哀寡人而賜之盟則寡人之願也其承寧諸侯以退杜承君之意以寕静諸侯豈敢徼亂杜徼要也君若不施大恵寡人不佞其不能以諸侯退矣林當以諸侯之兵與秦大戰敢盡布之執事俾執事實圖利之杜俾使也林圖度其利害而行之秦桓公既與晉厲公為令狐之盟而又召狄與楚欲道以伐晉諸侯是以睦於晉杜晉辭多誣秦故傳據此三事以正秦罪道音導晉欒書將中軍荀庚佐之杜庚代荀首將子匠反凡將某軍者放此士燮將上軍代荀庚郤錡佐之代士燮韓厥將下軍代郤錡荀罃佐之代趙同趙旃將新軍代韓厥旃之然反郤至佐之代趙括郤毅御戎欒鍼為右郤毅郤至弟欒鍼欒書子鍼其亷反孟獻子曰晉帥乗和師必有大功帥軍帥乗車上帥所類反乗繩證反五月丁亥晉師以諸侯之師及秦師戰于麻隧秦師敗績獲秦成差及不更女父林戰敗績不書者葢以晉禀周命以伐秦師直有功且不使秦得與晉及諸侯戰也成差女父皆秦大夫杜不更秦爵戰敗績不書以為晉直秦曲則韓役書戰時公在師復不須告克獲有功亦無所諱葢經文闕漏傳文獨存隧音遂差初佳反徐初宜反更音庚女音汝曺宣公卒于師師遂濟涇及侯麗而還杜涇水出安定東南經扶風京兆髙陸縣入渭也麗力馳反迓晉侯于新楚杜迓迎也既戰晉侯止新楚故師還過迎之麻隧侯麗新楚皆秦地迓本又作迎五嫁反成肅公卒于瑕杜終劉子之言瑕晉也六月丁夘夜鄭公子班自訾求入于大宫不能殺子印子羽杜訾鄭地大宫鄭祖廟十年班出奔許今欲還為亂子印子羽皆穆公子訾子斯反大音泰下同反軍于市林公子班自訾歸屯軍于鄭國之市己巳子駟帥國人盟于大宫子駟穆公子遂従而盡焚之林子駟既盟國人遂従公子班之師于市而盡焚燒其市殺子如子駹孫叔孫知杜子如公子班子駹班弟孫叔子如子孫知子駹子駹武邦反曺人使公子負芻守使公子欣時逆曺伯之喪杜二子皆曺宣公庶子芻初俱反守手又反秋負芻殺其大子而自立也杜宣公大子諸侯乃請討之晉人以其役之勞請俟他年林晉人以伐秦従役之勞苦請於晉君俟他年而討曺冬葬曺宣公既葬子臧將亡杜子臧公子欣時國人皆將従之杜不義負芻故成公乃懼杜成公負芻告罪且請焉林告罪於子臧且請留子臧以繋國人之心乃反而致其邑林子臧乃反曺國而致其私邑於成公不食其禄為十五年執曺伯傳經甲申十有四年春王正月莒子朱卒杜無傳九年盟于蒲林即渠丘公卒黎比公宻州立夏衛孫林父自晉歸于衛晉納之故曰歸秋叔孫僑如如齊逆女成公逆夫人最為得體而經無納幣者文闕絶也鄭公子喜帥師伐許九月僑如以夫人婦姜氏至自齊林婦姜氏有姑之常稱也若妾姑則不書氏是故有成風則出姜不氏有敬嬴則穆姜不氏所以别嫡姑也冬十月庚寅衛侯臧卒杜五同盟林定公卒子獻公衎立秦伯卒杜無傳二年大夫盟於蜀而不赴以名例在隠七年林桓公卒子景公立傳十四年春衛侯如晉晉侯强見孫林父焉杜林父以七年奔晉强見欲歸之强其丈反見賢遍反下同定公不可夏衛侯既歸晉侯使卻犫送孫林父而見之衛侯欲辭定姜曰不可杜定姜定公夫人林言不可不受林父是先君宗卿之嗣也林林父孫良夫之子是衛同姓之卿之嗣子也大國又以為請不許將亡雖惡之不猶愈於亡乎君其忍之杜違大國必見伐故亡為如字或于偽反惡烏路反安民而宥宗卿不亦可乎林不激晉伐則為安民赦林父罪則為宥宗卿宥音又衛侯見而復之杜復林父位衛侯饗苦成叔杜成叔卻犫甯恵子相杜相佐禮恵子甯殖相息亮反苦成叔傲甯子曰苦成家其亡乎古之為享食也以觀威儀省禍福也故詩曰兕觵其觩㫖酒思柔林君有君之威儀臣有臣之威儀故可以觀贍其威儀謙抑則受福驕滿則受禍故可以省察其禍福杜詩小雅言君子好禮飲酒皆思柔徳雖設兕觵觩然不用以兕角為觵所以罰不敬觩陳設之貌敝五報反下同食音嗣兄徐辭姊反觵古横反觩徐音蚪又巨彪反又巨秋反彼交匪傲萬福來求杜彼之交於事而不惰傲乃萬福之所求今夫子傲取禍之道也林謙者自然受福則傲者自然取禍此必然之理為十七年卻氏亡傳秋宣伯如齊逆女稱族尊君命也林為君逆故稱叔孫以尊君命八月鄭子罕伐許敗焉林子罕即經書公子喜杜為許所敗敗必邁反戊戌鄭伯復伐許庚子入其郛杜郛郭也復扶又及許人平以叔申之封四年鄭公孫中疆許田許人敗之不得定其封疆今許以是所封田求和於鄭九月僑如以夫人婦姜氏至自齊舍族尊夫人也杜舍族謂不稱叔孫舍音捨故君子曰春秋之稱㣲而顯林稱權衡也言春秋書法權衡其輕重辭㣲而義顯稱尺證反志而晦志記也晦亦微也謂約言以記事事叙而文微晦呼内反婉而成章婉曲也謂曲屈其辭有所辟諱以示大順而成篇章婉怨晩反盡而不汙謂直言其事盡其事實無所汙曲汙憂于反懲惡而勸善杜善名必書惡名不滅所以為懲勸非聖人誰能修之杜修史䇿成此五者衛侯有疾使孔成子甯恵子立敬姒之子衎以為大子杜成子孔達之孫敬姒定公妾衎獻公衎徐苦旦反冬十月衛定公卒夫人姜氏既哭而息見天子之不哀也不内酌飲杜夫人姜氏即定姜既哭定公而止息見大子衎無哀戚之容痛憤不能食故不納酌飲内如字徐音納歎曰是夫也將不唯衛國之敗其必始於未亡人林夫賤者之稱杜定姜言獻公行無禮必從己始下言暴妾使余是也烏呼天禍衛國也夫吾不獲鱄也使主社稷鱄衎之母弟夫音扶鱄徐市變反一音専大夫聞之無不􅋍懼孫文子自是不敢舍其重器於衛林孫文子即林父重器寳器也孫文子懼禍故不敢舍其寳器於衛國􅋍息勇反舍音赦或音捨盡寘諸戚杜寘置也戚孫氏邑寘之豉反而甚善晉大夫杜備亂起欲以為援為襄十四年衛侯出奔傳經乙酉十有五年春王二月葬衛定公無傳三月乙巳仲嬰齊卒杜無傳襄仲子公孫歸父弟宣十八年逐東門氏既而又使嬰齊紹其後日仲氏癸丑公㑹晉侯衛侯鄭伯曺伯宋世子成齊國佐邾人同盟于戚成音城晉侯執曺伯歸于京師杜不稱人以執者曺伯罪不及民歸之京師禮也林特書晉侯討有罪也公至自㑹無傳夏六月宋公固卒杜四同盟林共公卒子平公成立楚子伐鄭秋八月庚辰葬宋共公三月而葬速共音恭宋華元出奔晉宋華元自晉歸于宋明華元欲挾晉以自重故以外納告宋殺其大夫山杜不書氏明背其族林此蕩澤稱國以殺而山不書氏有司法守之辭也宋魚石出奔楚公子目夷之魯孫冬十有一月叔孫僑如㑹晉士燮齊髙無咎宋華元衛孫林父鄭公子鰌邾人㑹吳于鍾離杜吳夷未甞與中國㑹今始来通晉帥諸侯大夫而㑹之故殊㑹明本非同好鍾離楚邑淮南縣林此㑹吳之始亦晉以諸侯之大夫㑹吳之始自是大夫自為㑹矣燮息協反咎其九反鰌音秋許遷于葉杜許畏鄭南依楚故以自遷為文葉今南葉縣也林傳曰葉在楚國方城外之蔽也葉舒涉反傳十五年春㑹于戚討曺成公也杜討其殺大子而自立事在十三年執而歸諸京師書曰晉侯執曺伯不及其民也林左氏謂曺成公惡不及民故不稱人以執此春秋例也愚按稱晉侯執曺伯此為討罪特書不可以例為拘凡君不道於其民諸侯討而執之則曰某人執某侯林此左氏稱人之例以為衆所欲執也不然則否林謂身犯不義者傳例自不可廢但不可以為拘諸侯將見子臧於王而立之子臧辭曰前志有之曰聖達節林志書也節禮節也聖人應天順人不拘常禮如唐虞禪夏殷周繼湯武革命達其禮節無可無不可見賢遍反次守節杜謂賢者下失節杜愚者妄動為君非吾節也雖不能聖敢失守乎遂逃奔宋夏六月宋共公卒為下宋亂起楚將北師林楚居南方將争鄭衛故曰北師子囊曰新與晉盟而背之無乃不可乎子反曰敵利則進何盟之有杜晉楚盟在十二年子囊荘王子公子卣囊乃郎反申叔時老矣在申老歸本邑聞之曰子反必不免信以守禮禮以庇身信禮之亡欲免得乎林盟誓之信所以守㑹同之禮㑹同之禮所以庇卿大夫之身棄信背禮是亡之也言不得免庇必利反又音祕楚子侵鄭及暴隧林鄭地遂侵衛及首止林衛地鄭子罕侵楚取新石林新石楚邑欒武子欲報楚韓獻子曰無庸杜庸用也使重其罪民将叛之杜背盟數戰罪也林楚國之民不直其君則將有叛無民孰戰為明年晉敗楚於鄢陵傳秋八月葬宋共公於是華元為右師魚石為左師蕩澤為司馬杜蕩澤公孫夀之孫蕩意諸之子華喜為司徒華父督之𤣥孫公孫師為司城荘公孫向為人為大司寇鱗朱為少司寇鱗矔孫少詩照反下同向􅙮為大宰魚府為少宰蕩澤弱公室殺公子肥杜輕公室以為弱故殺其枝黨肥文公子􅙮音帶本又作帶太音泰華元曰我為右師君臣之訓師所司也林几宋國敎訓君臣上下之道此右師職守之所司主也今公室卑而不能正杜不能討蕩澤吾罪大矣不能治官敢賴寵乎林不能治其官守敢倚賴其君之寵禄乎乃出奔晉二華戴族也司城荘族也林華元右師華喜司徒宋戴公之子孫公孫師宋荘公之子孫六官者皆桓族也杜魚石蕩澤向為人鱗朱向􅙮魚府皆出桓公魚石將止華元魚府曰右師反必討是無桓氏也杜恐華元還討蕩澤并及六族魚石曰右師苟獲反雖許之討必不敢杜言畏桓族强且多大功國人與之不反懼桓氏之無祀於宋也華元大功克合晉楚之成刼子反以免宋圍林恐國人怨桓氏逐華元遂滅其族是不得祭祀於宋國也右師討猶有戌在杜向戌桓公曾孫言其賢華元必不討戌音恤桓氏雖亡必變杜偏不盡魚石自止華元于河上請討林華元請討蕩澤許之乃反使華喜公孫師帥國人攻蕩氏殺子山杜喜師非桓族故使攻之林子山即蕩澤書曰宋殺其大夫山言背其族也杜蕩氏宋公族還害公室故去族以示其罪魚石向為人鱗朱向􅙮魚府出舍於睢上睢水名五大夫畏同族罪及將出奔睢音雖徐許惟反又音綏華元使止之不可冬十月華元自止之不可乃反杜五子不止華元還魚府曰今不従不得入矣不得復入宋右師視速而言疾有異志焉若不我納今將馳矣登丘而望之則馳騁而従之林魚府乃登髙丘而望華元之歸果馳騁而去五大夫亦騁而逐之欲與華元俱歸登丘而望之則馳絶句馳敕景反則決睢澨閉門登陴矣林澨水涯也華元已決壊睢水之涯閉宋城門登陴守禦澨市制反陴毗支反左師二司宼二宰遂出奔楚林四大夫不書獨魚石告為十八年魚石復入彭城傳華元使向戌為左師老佐為司馬樂裔為司寇以靖國人老佐戴公五世孫裔以制反晉三郤害伯宗林晉三卻卻錡卻至卻犫也疾害伯宗之賢譖而殺之及欒弗忌欒弗忌晉賢大夫伯州黎奔楚杜伯宗子黎力兮反韓獻子曰卻氏其不免乎善人天地之紀也而驟絶之不亡何待杜既殺伯宗又及弗忌故曰驟也為十七年晉殺三卻傳驟杜救反初伯宗每朝其妻必戒之曰盜憎主人民惡其上子好直言必及於難林言主人非得罪於盜賊而盜賊每憎嫉之上人非得罪於下民而下民每毁惡之直言非有約於禍難而祸難每隨及之𫝊見雖婦人之言不可廢惡烏路反好呼報反難乃旦反十一月㑹吳于鍾離始通吳也杜始與中國接許靈公畏偪于鄭請遷于楚辛丑楚公子申遷許于葉左傳杜林合注卷二十三
