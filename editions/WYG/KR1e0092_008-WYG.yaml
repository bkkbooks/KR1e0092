body:
  text: 左傳杜林合注卷八明王道焜趙如源同編閔公公名啟方荘公之子史記云名開諡法在國遭難曰閔周恵王十六年鄭文公十二年齊桓公二十五年管仲為政宋桓公二十一年晉獻公十六年軍是年晉作二衛懿公八年于魯閔公二年狄滅衛宋桓公立衛戴公以廬曹戴公名申立其年卒而立文公蔡穆公十四年曹昭公元年滕詳見隠公元年陳宣公三十二年杞詳見隠公元年及僖公元年薛魯荘公三十一年薛伯卒莒詳見隠公元年邾文公五年許穆公三十七年小邾見荘公元年楚成王十一年政令尹子文為秦詳見隠公元年吳詳見隠公元年越詳見隠公元年經庚申元年春王正月齊人救邢夏六月辛酉葬我君荘公秋八月公及齊侯盟于落姑落姑齊地季子来歸杜季子公子友之字季子忠于社稷為國人所思故賢而字之齊侯許納故曰歸林是為季氏奔陳如邾不書賢季子故全之也冬齊仲孫来杜仲孫齊大夫以事出疆因来省難非齊侯命故不稱使也還使齊侯務寜魯難故嘉而字之来者事實省難其志也故經但書仲孫之来而傳尋仲孫之志傳元年春不書即位亂故也杜國亂不得成禮狄人伐邢狄伐邢在往年冬管敬仲言于齊侯曰戎狄豺狼不可厭也杜敬仲管夷吾林言狄既逞志于邢又将荐食諸侯豺仕皆反狼音郎厭一鹽反諸夏親暱不可弃也杜諸夏中國也暱近也夏户雅反暱反乙反宴安酖毒不可懐也杜以宴安比之酖毒宴於見反本又作晏音同一音烏諫反酖直䕃反詩云豈不懐歸畏此簡書杜詩小雅也文王為西伯勞來諸侯之詩林言將帥出征豈不懐歸家之念所以不敢懐歸者畏此簡䇿之所書簡書同惡相恤之謂也杜同恤所惡林蓋戎狄亂華人所同惡簡書所載不過分災救患爾請救邢以從簡書齊人救邢夏六月葬莊公亂故是以緩十一月乃葬秋八月公及齊侯盟于落姑請復季友也林閔公初立國家多難以季子忠賢故請霸主而復之齊侯許之使召諸陳公次于郎以待之杜非師旅之事故不書次季子來歸嘉之也冬齊仲孫湫來省難湫仲孫名湫子小反書曰仲孫亦嘉之也仲孫歸曰不去慶父魯難未已杜時慶父亦還魯去起呂反下同公曰若之何而去之對曰難不已將自斃杜斃踣也斃婢世反君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以本也臣聞之國將亡本必先顛而後枝葉從之魯不弃周禮未可動也君其務寧魯難而親之親有禮因重固林國之有禮如木之有根本根本必先顚仆而後枚葉從而彫枯言禮亡則國亡今魯不弃周公之典禮則其根本尚固言其未可動搖也魯秉周禮而親睦之是親有禮魯國根本安重堅固因而成就之是因重固間攜貳杜離而相疑者則當因而間之間間厠之間覆昏亂杜覆敗也林昏迷而暴亂者乃可覆而取之覆芳服反霸王之器也杜霸王所用故以器為喻王于況反晉侯作二軍杜周制大國三軍次國二軍小國一軍晉本大國自曲沃武公覆滅宗國魯莊公十六年僖王命曲沃伯以一軍為晉侯遂從小國之制今始作二軍公將上軍大子申生將下軍趙夙御戎畢萬為右杜為公御右也夙趙襄兄畢萬魏犫祖父將子匠反下同以滅耿滅霍滅魏杜平陽皮氏縣東南有耿鄉永安縣東北有霍大山三國皆姬姓耿古幸反還為大子城曲沃賜趙夙耿賜畢萬魏以為大夫士蔿曰大子不得立矣分之都城而位以卿先為之極又焉得立林先是荘公二十八年使大子居曲沃蓋未修城至是始為之増築卿始有軍行今大子將下軍故曰位以卿先為大子之極處又安得復立為後蓋天下事未極則有増已極則無以復加此必然之理為于偽反焉於䖍反不如逃之無使罪至為吳大伯不亦可乎杜大伯周太王之適子知其父欲立季厯故譲位而適呉大音泰猶有令名與其及也杜言雖去猶有令名勝於畱而及禍且諺曰心茍無瑕何恤乎無家天若祚大子其無晉乎林言吾心苟無瑕疵之可指則不必以無家為憂恤也天若福祚大子其無晉國乎杜為晉殺申生傳諺音彦祚在路反卜偃曰畢萬之後必大杜卜偃晉掌卜大夫林此以下言畢萬事萬盈數也魏大名也以是始賞天啓之矣林自一至十百千萬而滿故萬為數之至滿魏之為名其義至大獻公以魏始賞畢萬之功是天開啓畢萬而將昌其子孫天子曰兆民諸侯曰萬民今名之大以從盈數其必有衆林十萬為兆天子主有天下故曰兆民十千為萬諸侯主有一國故曰萬民以魏封軍萬是以魏從萬從盈數也此得國得民之象初畢萬筮仕於晉遇屯杜震下坎上屯屯張倫反之比杜坤下坎上比屯初九變而為比比毗志反下同辛廖占之曰吉杜辛廖晉大夫廖力彫反屯固比入吉孰大焉其必蕃昌屯險難所以為堅固比親宻所以得入蕃音煩震為土杜震變為坤車從馬杜震為車坤為馬震變為坤故車從馬足居之林震為足動而遇坤安静之象故居之兄長之林震為長男兄也初又最長故長之長下丈反母覆之杜坤為母衆歸之杜坤為衆六體不易初一爻變有此六義不可易也合而能固安而能殺公侯之卦也林水地比有合之義水雷屯有固之義以此承屯之變故合而能固比之下卦有坤坤為土安之象屯之下卦有震震為雷殺之象以坤承震之變故安而能殺此合屯固坤安震殺故曰公侯之卦屯之初九曰利建侯比之大象曰建萬國親諸侯亦公侯之卦公侯之子孫必復其始林畢萬畢公髙之子孫言其子孫必復其始為公侯也傳為魏之子孫衆多張本經辛酉二年春王正月齊人遷陽杜無傳陽國名蓋齊人偪徙之夏五月乙酉吉禘于莊公杜三年喪畢致新死者之主於廟廟之逺主當遷入祧因是大祭以審昭穆謂之禘莊公喪制未關時别立廟廟成而吉祭又不於大廟故詳書以示譏林禘天子之禮魯之郊禘惠公請之東周之僭禮也故孔子曰魯之郊禘非禮也又曰吾不欲觀之矣禘大計反秋八月辛丑公薨實弑書薨又不地者皆史䇿諱之九月夫人姜氏孫于邾哀姜外淫故孫稱姜氏孫音遜公子慶父出奔莒杜弑閔公故林是為孟氏冬齊高子來盟無傳葢髙傒也齊侯使來平魯亂僖公新立因遂結盟故不稱使也魯人貴之故不書名子男子之美稱十有二月狄入衞杜書入不能有其地例在襄十三年鄭棄其師杜高克見惡久不得還師潰而克奔陳故克狀其事以告魯也傳二年春虢公敗犬戎于渭汭犬戎西戎别在中國者渭水出隴西東入河水之隈曲曰汭汭如鋭反舟之僑曰無徳而禄殃也殃將至矣遂奔晉杜舟之僑虢大夫林虢公無君人之徳而享大禄蓋敗戎斥地必有所獲故總言祿驟勝而驕殃咎將至驕音喬夏吉禘于莊公速也初公傅奪卜齮田公不禁杜卜齮魯大夫也公即位年八嵗知愛其傅而遂成其意以奪齮田齮忿其傅并及公故慶父因之齮魚綺反秋八月辛丑共仲使卜齮賊公于武闈林宮中小門謂之闈杜共仲即慶仲賊殺也共音恭闈音韋一音軃成季以僖公適邾杜僖公閔公庻兄成風之子共仲奔莒乃入立之林慶父殺般又殺閔公國人不與故出奔莒季友乃以僖公入魯立之為君以賂求共仲于莒莒人歸之杜按僖无年莒人來求賂知此許賂之也及密使公子魚請杜密魯地琅琊費縣北有密如亭公子魚奚斯也林慶父使奚斯請免其死不許哭而往共仲曰奚斯之聲也林公子魚難面言故哭而往報慶父識奚斯之聲而解其意乃縊杜慶父之罪雖重季子推親親之恩欲同之叔牙存孟氏之族故略其罪不書卒縊一賜反閔公哀姜之娣叔姜之子也故齊人立之林叔姜齊女故齊人欲立其所出共仲通於哀姜哀姜欲立之閔公之死也哀姜與知之故孫于邾林哀姜懼討故出奔邾内奔曰孫與音預孫音遜齊人取而殺之于夷以其尸歸林蓋齊惡哀姜之淫亂而為魯討也杜為僖元年齊人殺哀姜傳夷魯地僖公請而葬之哀姜之罪已重而僖公請其䘮還者外欲固齊以居厚内存母子不絶之義為國家之大計成季之將生也桓公使卜楚丘之父卜之杜卜楚丘魯掌卜大夫曰男也其名曰友在公之右林凡人皆以右手用事在公之右當用事相魯間于兩社為公室輔杜兩杜周社毫杜兩社之間朝廷執政所在季氏亡則魯不昌林言季氏之後當與魯國相為存亡也又筮之遇大有杜乾下離上大有之乾杜乾下乾上乾大有六五變而為乾曰同復于父敬如君所林筮者之辭也乾為君父離變為乾故曰同復於父見敬與君同及生有文在其手曰友遂以命之杜遂以為名冬十二月狄人伐衞林狄禍自邢及衛此管仲所謂南夷與北夷交中國不絶如綫也衞懿公好鶴鶴有乘軒者杜軒大夫車好呼報反鶴戸谷反軒許言反將戰國人受甲者皆曰使鶴鶴實有禄位余焉能戰林凡國人之受甲以禦狄者合辭皆曰使鶴與狄戰此蓋激辭言鶴乘軒實有大夫之禄與位我平時不得君之寵禄安能與狄戰乎焉於䖍反公與石祁子玦與甯莊子矢使守杜莊子甯速也玦玉玦玦古穴反守手又反下告守同曰以此贊國擇利而為之杜贊助也玦示以當決㫁矢示以禦難與夫人繡衣曰聽於二子杜取其文章順序渠孔禦戎子伯為右黄夷前驅孔嬰齊殿林前驅先鋒備不虞殿師後殿反禦也傳言衞侯失民有素雖臨事而戒猶無所及殿可練反及狄人戰于熒澤衞師敗績遂滅衞杜此熒澤當在河北君死國敗經不書滅者狄不能赴衞之君臣皆盡無復文告齊桓為之告諸侯言狄已去言衞之存故但以入為文熒戸扄反衞侯不去其旗是以甚敗林師之耳目在旗衞懿公既敗而不去其旗是以甚敗至君臣皆盡也去起呂反藏也一云除也狄人囚史華龍滑與禮孔以逐衞人二人曰我大史也實掌其祭不先國不可得也林夷狄畏鬼故恐之言若不使我先往白神鬼神不佑則衞國不可得也華户化反大音泰乃先之至則告守曰不可待也杜守石寗二大夫杜言狄師盛强不可坐而待滅也夜與國人出林二子信其言不敢固守狄入衞遂從之又敗諸河衞將東走渡河狄復逐而敗之初惠公之即位也少杜蓋年十五六少詩照反齊人使昭伯烝於宣姜不可强之林昭伯惠公庻兄宣公子頑也林宣姜即宣公所取急子之妻姜齊女故齊人使烝之昭伯不可烝之承反强其丈反生齊子戴公文公宋桓夫人許穆夫人林昭伯烝宣姜而生男女五人牆有茨詩云公子頑通乎君母即其事也文公為衞之多患也先適齊林先適齊以避衞難及敗宋桓公逆諸河杜迎衞敗衆宵濟杜夜渡畏狄衞之遺民男女七百有三十人益之以共滕之民為五千人共及滕衞别邑共音泰立戴公以廬于曹杜廬舍也曹衛下邑戴公名申立其年卒而立文公廬力居反曹詩作漕音同許穆夫人賦載馳杜載馳詩衞風也許穆夫人痛衞之亡思歸唁之不可故作詩以言志齊侯使公子無虧帥車三百乘甲士三千人以戍曹林無虧齊桓公子武孟也車甲之賦異扵常故傳别見之戍曹為衛禦狄也虧去危反乗繩證反下同歸公乘馬祭服五稱牛羊豕鷄狗皆三百與門材杜歸遺也四馬曰乘林衣單複具曰稱祭服重宗廟也五牲各三百事所以備祭祀軍國之用材木也遺之門材使先立門戶稱尺證及狗音苟歸夫人魚軒杜魚軒夫人車以魚皮為飾重錦三十兩重錦錦之熟細者以二丈雙行故曰兩三十兩三十匹也鄭人惡高克使帥師次于河上久而弗召師潰而歸高克奔陳杜高克鄭大夫也好利而不顧其君文公惡之而不能逺故使帥師而不召林高克身惡衆散故懼罪而奔陳惡烏路反鄭人為之賦清人清人詩鄭風也刺文公退臣不以道危圖亡師之本為于僞反晉侯使大子申生伐東山臯落氏杜赤狄别種也臯落其氏族林臯古刀反里克諫曰大子奉冡祀社稷之粢盛杜里克晉大夫冡大也林言大子奉國家之祭祀與社禝之粢盛粢音咨盛音成以朝夕視君膳者也杜膳㕑膳林君之㕑膳則大子朝夕視之蓋大子有視膳之禮朝如字又張遙反膳市戰及故曰冡子君行則守有守則從從曰撫軍守曰監國古之制也林號曰冡子言其大異於諸子也君有朝㑹征伐行殺之事則代君守國君使大臣守國則大子從君而行從君號曰撫軍言助君鎭撫士卒守國號曰監國言代君監臨國家守手又反下同從才用反下同監古銜反夫帥師專行謀杜帥師者必專謀軍事誓軍旅杜宣號令也君與國政之所圖也非大子之事也杜國政正卿師在制命而已杜命將軍所制稟命則不威專命則不孝林若大子帥師稟君之命而後行事則權不在已而無威重專制命令則失子之道是為不孝故君之嗣適不可以帥師君失其官帥師不威将焉用之杜大子統師是失其官也専命則不孝是為師必不威也適丁歴反本又作嫡下配適同焉於䖍反且臣聞臯落氏將戰君其舍之林臯落氏將與晉兵接戰里克恐大子軍敗得罪故陳説利害以説獻公使捨大子勿使將公曰寡人有子未知其誰立焉林蓋微示里克以欲廢申生之意不對而退見大子大子曰吾其廢乎對曰告之以臨民杜謂居曲沃敎之以軍旅杜謂將下軍將子匠反不共是懼何故廢乎且子懼不孝無懼弗得立修已而不責人則免於難林言大子當以任大責重不共其職為懼何故以廢立為懼乎修飭其身而不怨尤於人如此則順時委命可免于禍患矣共音恭本又作供難乃旦反下同太子帥師公衣之偏衣偏衣左右異色其半似公服衣于既反下衣身之偏衣之純衣之厖服同佩之金玦林玦如環而不連以金為之為偏衣之佩飾狐突御戎先友為右杜狐突伯行重耳外祖父也為申生御申生以大子將上軍梁餘子養御罕夷先丹木為右杜罕夷晉下軍卿也梁餘子養為罕夷御羊舌大夫為尉杜羊舌大夫叔向祖父也尉軍尉先友曰衣身之偏杜偏半也握兵之要謂佩金玦將上軍在此行也林兼是二羙在此一行子其勉之偏躬無慝分身衣之半非惡意也慝他得反兵要逺災杜威權在已可以遠害遠于萬反下同親以無災林有偏衣之親而無災害又何患焉狐突歎曰時事之徵也杜歎以先友為不知君心林在天為時事之徴應可以知終始衣身之章也佩衷之旗也林在身為衣身之文章可以别貴賤在腰為佩中心之表旗可以明向背杜旗表也衷音忠旗音其故敬其事則命以始杜賞以春夏林謂君若敬大子之事當命以四時之始服其身則衣之純杜必以純色為服用其衷則佩之度杜衷中也佩玉者士君子常度今命以時卒閟其事也杜冬十二月閟盡之時閟音必衣之厖服逺其躬也杜尨雜色尨莫江反佩以金玦弃其衷也服以遠之時以閟之尨凉冬殺金寒玦離胡可恃也雖欲勉之狄可盡乎林衣之尨雜則有涼薄之意命以窮冬則有肅殺之意金屬秋方其性剛而寒玦如環而缺離不相連屬皆無温潤無一可恃雖欲勉之以從戎事東山之狄可得而盡滅之乎梁餘子養曰帥師者受命於廟受脤於社杜脤宜社之肉盛以脤噐脤市軫反有常服矣不獲而尨命可知也杜韋弃服軍之常也林不獲韋便之常服而衣尨雜之偏衣君命亦可知也死而不孝林雖死而使父有殺子之名是為不孝不如逃之罕夷曰尨竒無常雜色奇怪非常之服金玦不復林剛玦而缺離不復反之象雖復何為君有心矣杜有害大子之心先丹木曰是服也狂夫阻之杜阻疑也言雖狂夫猶知有疑阻莊呂反曰盡敵而反曰公辭盡子忍反下同敵可盡乎雖盡敵猶有内䜛不如違之杜違去也林猶有驪姬二五在内之䜛譛不如去之以免其禍孤突欲行杜行亦去也羊舌大夫曰不可違命不孝弃事不忠雖知其寒惡不可取子其死之杜寒薄也林雖知君心寒薄然而不孝不忠之畱名不可取大子將戰狐突諫曰不可昔辛伯諗周桓公杜諗告也事在桓十八年諗音審説文云深謀云内寵並后外寵二政嬖子配適大都耦國亂之本也周公弗從故及於難今亂本成矣杜驪姬為内寵二五為外寵奚齊為嬖子曲沃為大都故曰亂本成矣立可必乎孝而安民子其圖之杜奉身為孝不戰為安民與其危身以速罪也杜有功益見害故言孰與危身以召罪成風聞成季之繇乃事之林成風荘公之妾僖公之母也聞卜楚丘占成季之繇辭乃禮事成季繇卦北之占辭繇直救反而屬僖公焉故成季立之僖之元年齊桓公遷邢于夷儀二年封衞于楚丘邢遷如歸衞國忘亡杜齊桓具邢器用而遷之故邢遷夷儀如歸其國衞國被齊安集之恩亡其滅亡之國衞文公大布之衣大帛之冠林衞文公名燬戴公之弟也杜大布麤布大帛厚繒蓋用諸侯諒闇之服衞文公大布之衣本或作衣大布之衣誤務材訓農通商惠工林務蓄材木以立門戸宗廟宫室廬舍訓飭農事服田力穡通達商旅貿遷有無加惠百工賴其利器用敬敎勸學林敬重五敎勸勉為學之士授方任能杜方百事之宜也元年革車三十乘季年乃三百乘杜衞文公以此年冬立齊桓公始平魯亂故傳因言齊之所以霸衞之所由興革車兵車季年在僖二十五年篕招懐迸散故能致十倍之衆乘繩證反下同左傳杜林合注卷八
