body:
  text: 左傳杜林合注卷三十九明王道焜趙如源同編昭公六經癸酉十有四年春意如至自晉杜書至者喜得免林大夫不至必見執也而後至亦危之也三月曺伯滕卒杜無傳四同盟林武公卒子平公頃立夏四月無傳秋葬曺武公無傳八月莒子去疾卒杜未同盟林著丘公卒郊公立是年奔齊著丘之弟庚輿立是為共公去起吕反冬莒殺其公子意恢杜以禍亂告不必繫於為卿故雖公子亦書意恢與亂君為黨故書名惡之恢苦回反傳十四年春意如至自晉尊晉罪已也以舍族為尊晉罪已尊晉罪己禮也杜禮修已而不責人南蒯之將叛也林叛季氏在十二年盟費人林要費人為盟以叛司徒老祁慮癸二人南蒯家臣偽廢疾使請於南蒯曰臣願受盟而疾興若以君靈不死請待間而盟杜間差也許之二子因民之欲叛也請朝衆而盟欲因合衆以作亂遂刼南蒯曰羣臣不忘其君君謂季氏刼居業反畏子以及今三年聴命矣子若弗圖費人不忍其君將不能畏子矣杜將不畏子之威言將叛之畏子以及今絶句子何所不逞欲請送子送使出奔請期五日杜南蒯請期冀有變遂奔齊侍飲酒於景公公曰叛夫言戲之對曰臣欲張公室也林張强也言臣非叛君乃欲强公室弱私家子韓晳曰齊大夫晳星厯反家臣而欲張公室罪莫大焉言越職司徒老祈慮癸來歸費林二子既逐南蒯乃奉費邑歸之于魯齊侯使鮑文子致之南蒯雖叛費人不従未専屬齊二子逐蒯而復其舊故經不書歸費齊使文子致邑欲以假好非事實也夏楚子使然丹簡上國之兵於宗丘且撫其民杜上國在國都之西西方居上流故謂之上國宗丘楚地分貧振窮分與也振救也分如字徐甫問反長孤㓜養老疾收介特杜介特單身民也收養不使流散長丁丈反救災患宥孤寡杜寛其賦税宥音又赦罪戾詰姦慝杜詰責問也詰起吉反舉淹滯杜淹滯有才能而未叙者禮新叙舊林羈旅方新者禮待之勲故有舊者叙用之禄勲合親杜勲功也親九族任良物官物事也使屈罷簡東國之兵於召陵兵在國都之東者罷音皮召上照反亦如之林如然丹好於邊疆結好四鄰好呼報反疆居良反息民五年而後用師禮也林以安民為禮秋八月莒著丘公卒郊公不慼郊公著丘公子著直居反國人弗順欲立著丘公之弟庚輿杜庚輿莒共公輿音餘蒲餘侯惡公子意恢而善於庚輿蒲餘侯莒大夫兹夫也意恢莒羣公子惡烏路反下同郊公惡公子鐸而善於意恢鐸亦羣公子鐸待洛反公子鐸因蒲餘侯而與之謀曰爾殺意恢我出君而納庚輿許之為下冬殺意恢傳楚令尹子旗有徳於王不知度林子旗即蔓成然有佐立之徳於平王不知國家之法度與養氏比而求無厭杜養氏子旗之黨養由基之後比毗志反厭於鹽反王患之九月甲午楚子殺鬬成然而滅養氏之族使鬬辛居鄖以無忘舊勲杜辛子旗之子鄖公辛鄖音云冬十二月蒲餘侯兹夫殺莒公子意恢林兹夫蒲餘侯名用公子鐸之謀也郊公奔齊公子鐸逆庚輿於齊齊隰黨公子鉏送之有賂田莒賂齊以田鉏仕居反晉邢侯與雍子争鄐田邢侯楚申公巫臣之子也雍子亦故楚人鄐許六反又超六反久而無成杜乆訟而獄不决士景伯如楚士景伯晉理官叔魚攝理請攝代景伯韓宣子命斷舊獄罪在雍子雍子納其女於叔魚叔魚蔽罪邢侯林叔魚受賂乃曲斷其罪於邢侯斷丁亂反蔽世世反邢侯怒殺叔魚與雍子于朝宣子問其罪於叔向叔向曰三人同罪施生戮死可也杜施行罪也雍子自知其罪而賂以買直鮒也鬻獄邢侯専殺其罪一也己惡而掠美為昏林掠取也昏亂也已有惡而取人之美謂之昏亂鬻芉六反掠音亮貪以敗官為墨林墨不潔之稱貪欲而敗其官守謂之汙墨殺人不忌為賊杜専輒殺人無所忌畏謂之賊害夏書曰昏墨賊殺杜逸書三者皆死刑臯陶之刑也請従之乃施邢侯而尸雍子與叔魚於市仲尼曰叔向古之遺直也杜言叔向之直有古人遺風陶音遙施如字治國制刑不隠於親杜謂國之大問已所答當也至於他事則宜有隠三數叔魚之惡不為末減未薄也減輕也皆以正言之數色主反又色其反下同為于偽反曰義也夫可謂直矣於義未安直則有之夫音扶又芳于反平丘之㑹數其賄也杜謂言凟貨無厭以寛衛國晉不為暴歸魯季孫稱其詐也謂言鮒也能以寛魯國晉不為虐邢侯之獄言其貪也林謂言鮒也鬻獄以正刑書晉不為頗三言而除三惡加三利杜三惡暴虐頗也三惡除則三利加殺親益榮杜榮名益已猶義也夫三罪唯答宣子問不可以不正其餘則以直傷義故重疑之經甲戌十有五年春王正月吳子夷未卒杜無傳未同盟林夷卒卒王僚立二月癸酉有事于武宫籥入叔弓卒去樂卒事略書有事為叔弓卒起也武宫魯武公廟成六年復立之去起吕反夏蔡朝吳出奔鄭朝吳不逺讒人所以見逐而書名六月丁巳朔日有食之無傳秋晉荀吳帥師伐鮮虞林嘗狄晉矣荀吳何以無貶于初伐貶實録而已示冬公如晉傳十五年春將禘于武公戒百官杜齊戒禘大計反梓慎曰禘之日其有咎乎吾見赤黑之祲非祭祥也喪氛也杜祲妖氣也葢見於宗廟故以為非祭祥也氛惡氣也祲子鴆反氛芳云反其在涖事乎杜涖臨也涖音利二月癸酉禘叔弓涖事籥入而卒林案公羊傳曰弓者何干舞也籥者何羽舞也此云籥入葢羽舞入而叔弓卒去樂卒事禮也杜大臣卒故為之去樂林得禮之變去起吕反楚費無極害朝吳之在蔡也朝吳蔡大夫有功於楚平王故無極恐其有寵疾害之費扶味反欲去之乃謂之曰王唯信子故處子於蔡子亦長矣而在下位辱必求之吾助子請杜請求上位長丁丈反又謂其上之人杜蔡人在上位者曰王唯信吳故處諸蔡二三子莫之如也而在其上不亦難乎弗圖必及於難夏蔡人逐朝吳朝吳出奔鄭王怒曰余唯信吳故寘諸蔡且微吳吾不及此女何故去之女謂費無極何事使蔡人逐之難乃旦反寘之豉反汝音汝無極對曰臣豈不欲吳杜非不欲善吳然而前知其為人之異也杜言其多權謀吳在蔡蔡必速飛去吳所以剪其翼也杜以鳥喻也言吳在蔡必能使蔡速叛而背楚六月乙丑王太子夀卒周景王子秋八月戊寅王穆后崩太子夀之母也傳為晉荀躒如周葬穆后起晉荀吳帥師伐鮮虞圍鼓杜鼓白狄之别鉅鹿下曲陽縣有鼓聚鼓人或請以城叛穆子弗許左右曰師徒不勤而可以獲城何故不為穆子曰吾聞諸叔向曰好惡不愆民之所適事無不濟林愆過也在上者好善惡惡無有過差則在下者曉然知上之好惡有所適歸是故舉事無有不成叔向之言止此好呼報反惡烏路反或以吾城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何杜無以復如所好若其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而邇姦所喪滋多使鼓人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色姑修而城軍吏曰獲城而弗取勤民而頓兵何以事君穆子曰吾以事君也獲一邑而敎民怠將焉用邑邑以賈怠不如完舊林賈猶買也得一邑而買人之怠惰不如使人保守其舊之為愈也完猶保守也庇必利反喪息浪反守手又反降户江反見賢遍反焉於䖍反賈音古下同賈怠無卒林卒終也不能善終棄舊不祥鼓人能事其君我亦能事我君林鼓人堅守其邑能事鮮虞之君我敎民不怠亦能事晉國之君卒義不爽爽差也好惡不愆城可獲而民知義所杜知義所在也荀吳必其能獲故因以示義有死命而無二心林盡忠以死君命無敢懐二心者不亦可乎鼔人告食竭力盡而後取之克鼓而反不戮一人以鼓子䳒鞮歸䳒鞮鼓君名䳒悦全反鞮丁兮反冬公如晉平丘之㑹故也平丘㑹公不與盟季孫見執今既得免故往謝之十二月晉荀躒如周葬穆后籍談為介既葬除喪以文伯晏樽以魯壺杜文伯荀躒也魯壺魯所獻壺樽躒力狄反王曰伯氏林晉周之同姓故曰伯氏諸侯皆有以鎮撫王室晉獨無有何也杜感魯壺而言也鎮撫王室謂貢獻之物林蓋是時晉為盟主不修職貢文伯揖籍談文伯無辭揖籍談使對對曰諸侯之封也皆受明器於王室杜謂明徳之分器以鎮撫其社稷故能薦彛器於王杜薦獻也彝常也謂可常寳之器若魯壺之屬彝以之反晉居深山戎狄之與鄰而逺於王室王靈不及拜戎不暇杜言王寵靈不見及故數為戎所加陵林拜謝戎師且不得暇逺于萬反又如字其何以獻器王曰叔氏而忘諸乎林叔籍談字而汝也叔父唐叔成王之母弟也其反無分乎密須之鼓與其大路文所以大蒐也杜密須姑姓國也在安定隂密縣文王伐之得其鼓路以蒐蒐所求反闕鞏之甲武所以克商也杜闕鞏國所出鎧鞏九勇反唐叔受之以處參虛匡有戎狄參虛實沈之次晉之分野參所金反其後襄之二路周襄王所賜晉文公大路戎路鏚鉞秬鬯鏚斧也鉞金鉞柜黑黍鬯香酒鏚音戚鉞音越柜音巨鬯音暢彤弓虎賁文公受之以有南陽之田杜事在僖二十八年彤徒冬反賁音奔撫征東夏非分而何夫有勲而不廢杜加重賞夏户雅反有績而載杜書功於䇿奉之以土田杜有南陽撫之以彛器杜弓鉞之屬旌之以車服杜襄之二路明之以文章杜旌旗子孫不忘所謂福也福祚之不登叔父焉在杜言福祚不在叔父當在誰邪福祚之不登叔父絶句焉於於䖍反下同昔而髙祖孫伯黶司晉之典籍以為大政故曰籍氏孫伯黶晉正卿籍談九世祖黶以斬反及辛有之二子董之晉於是乎有董史杜辛有周人也其二子適晉為太史籍黶與之共董督晉典因為董氏董狐其後女司典之後也何故忘之籍談不能對賔出王曰籍父其無後乎數典而忘其祖杜忘祖業女音汝數色主反籍談歸以告叔向叔向曰王其不終乎吾聞之所樂必卒焉林心之所樂必終於此今王樂憂若卒以憂不可謂終扶景王居喪當憂而樂若終之以憂亂不可謂之終其天下王一嵗而有三年之喪二也天子絶期唯服三年故后雖期通謂之三年喪期居其反於是乎以喪賔宴林以弔喪之賔共晏樂又求彞器樂憂甚矣且非禮也林天子無求故曰非禮彛器之來嘉功之由非由喪也林諸侯有善功乃作彜器籍手以獻非由弔喪來獻彜器三年之喪雖貴遂服禮也天子諸侯除喪當在卒哭今王既葬而除故譏其不遂王雖弗遂宴樂以早亦非禮也杜言今雖不能遂服猶當靜嘿而便宴樂又失禮也禮王之大經也一動而失二禮無大經矣杜夫二禮謂既不遂服又設宴樂言以考典杜考成也典以志經忘經而多言舉典林忘其經常而徒恃言語舉引典故將焉用之為二十三年王室亂傳經乙亥十有六年春齊侯伐徐杜齊景有志於代興也楚子誘戎蠻子殺之林戎蠻子嘉也不名名之則疑于蔡侯般夏公至自晉秋八月己亥晉侯夷卒杜未同盟林昭公卒子頃公去疾立九月大雩季孫意如如晉冬十月葬晉昭公三月而葬速傳十六年春王正月公在晉晉人止公不書諱之也杜猶以取郠故也公為晉人所執止故諱不書齊侯伐徐楚子聞蠻氏之亂也與蠻子之無質也林又聞戎蠻子素失信於人質信也質之實反或音致使然丹誘戎蠻子嘉殺之遂取蠻氏既而復立其子焉禮也杜詐之非也立其子禮也河南新城縣東南有蠻城二月丙申齊師至于蒲隧杜蒲隧徐地下邳取慮縣東有蒲如陂隧音遂徐人行成徐子及郯人莒人㑹齊侯盟于蒲隧賂以申父之鼎林郯莒畏齊討己故従徐子從齊受盟杜甲父古國名髙平昌邑縣東南有甲父亭徐人得甲父鼎以賂齊郯音談父音甫叔孫昭子曰諸侯之無伯害哉為小國害齊君之無道也興師而伐逺方㑹之有成而還莫之亢也杜無亢禦亢苦浪反無伯也夫詩曰宗周既滅靡所止戾正大夫離居莫知我肄杜詩小雅戾定也肄勞也言周舊為天下宗今乃衰滅亂無息定執政大夫離居異心無有念民勞者也夫音扶肄以制反徐以自反其是之謂乎傳言晉之衰三月晉韓起聘于鄭鄭伯享之子産戒曰苟有位於朝無有不共恪林子産戒飭百官言苟有位列于朝廷無敢有不共敬而恪謹者孔張後至立於客間杜孔張子孔之孫林禮大夫立於東夾南面張立於客間者葢賔未升階侍立於西方孔張誤立于客間也執政禦之杜執政掌位列者禦止也禦魚吕反下同適客後又禦之適縣間杜張又移立於客之西執政又禦止之張又益西方立于樂肆之縣間縣音𤣥客従而笑之事畢富子諫杜富子鄭大夫諫子産也曰夫大國之人不可不慎也㡬為之笑而不陵我杜言數見笑則心陵侮我㡬居豈反服音機我皆有禮夫猶鄙我杜鄙賤也夫音扶國而無禮何以求榮孔張失位君子之耻也子産怒林怒富子責已不當曰發命之不衷杜發號施令不得其當衷丁仲反又音患出令之不信林朝行夕敗不守其信刑之頗類縁事類以成偏頗頗普多反類如字又力對反獄之放紛林放縱也紛亂也紛芳云反㑹朝之不敬杜謂國無禮敬之心使命之不聴杜下不従上命取陵於大國罷民而無功罪及而弗知僑之恥也孔張君之昆孫子孔之後也昆兄也子孔鄭襄公兄孔張之祖父罷音皮執政之嗣也子孔嘗執鄭國之政為嗣大夫承命以使屬於諸侯國人所尊諸侯所知立於朝而祀於家杜卿得自立廟於家使所史反下同有禄於國曽受禄邑有賦於軍軍出即賦百乗喪祭有職杜有所主受脤歸脤受脤謂君祭以肉賜大夫祭脤謂大夫祭歸肉於公皆社之戎祭也脤市軫反其祭在廟已有著位在位數世世守其業而忘其所僑焉得恥之林其助祭於君之宗廟已有表著之位祖父數世居於卿位世守其祖父之職業而志其所當立之位我安得受其恥辱數色主反焉於䖍反下同辟邪之人而皆及執政是先王無刑罰也言謂過謬者自應用刑罰辟匹亦反邪似嗟反子寧以他規我杜規正也宣子有環其一在鄭商杜玉環也林葢玉人所攻璞玉成雙環宣子有其一鄭商亦有其一故宣子欲得而雙之宣子謁諸鄭伯謁請也子産弗與曰非官府之守器也寡君不知子大叔子羽謂子産曰韓子亦無㡬求杜言所求少㡬居豈反晉國亦未可以貳晉國韓子不可偷也杜偷薄也若屬有讒人交鬬其間鬼神而助之以興其凶怒悔之何及吾子何愛於一環其以取憎於大國也盍求而與之子産曰吾非偷晉而有二心將終事之是以弗與忠信故也林將終乆以事晉是故不以玉環與之所以盡忠於宣子而守與晉之信也屬音燭僑聞君子非無賄之難立而無令名之患僑聞為國非不能事大字小之難無禮以定其位之患夫大國之人令於小國而皆獲其求將何以給之一共一否為罪滋大林若今日有求而與之後曰有求而不與則得罪於大國益大難乃且反共音恭下同大國之求無禮以斥之何饜之有吾且為鄙邑則失位矣林若惟命是聴則鄭且為晉邊鄙之邑不復成國饜於鹽反若韓子奉命以使而求玉焉貪淫甚矣獨非罪乎出一玉以起二罪吾又失位韓子成貪將焉用之且吾以玉賈罪不亦鋭乎杜鋭細小也言以細事徼大罪賈音古下同鋭恱嵗反韓子買諸賈人既成賈矣商人曰必告君大夫韓子請諸子産曰日起請夫環執政弗義弗敢復也杜復重求也成賈音嫁請夫音扶今買諸商人商人曰必以聞敢以為請子産對曰昔我先君桓公與商人皆出自周鄭本在周畿内桓公東遷并與商人俱庸次比耦林庸用也用次更相従耦耕比毗志反以艾殺此地林以除治此地之荒穢艾魚廢反斬之蓬蒿藜藿林去其惡草藿徒弔反而共處之世有盟誓以相信也曰爾無我叛我無强賈並無强市其物强其丈反下同又其良反母或匄奪爾有利市寳賄我勿與知恃此質誓林質信也杜毋音無下同與音預故能相保以至于今今吾子以好來辱而謂敝邑强奪商人是教敝邑背盟誓也母乃不可乎吾子得玉而失諸侯必不為也若大國令而共無藝鄭鄙邑也亦弗為也杜藝法也林若大國有所號令而供給無有藝法是鄭為晉邊鄙之邑亦不肯為此事好乎報反下同背音佩僑若獻玉不知所成敢私布之杜布陳也韓子辭玉曰起不敏敢求玉以徼二罪林以要失諸侯鄙鄭國之二罪徼古堯反敢辭之傳言子産知禮宣子能改過夏四月鄭六卿餞宣子於郊杜餞送行飲酒宣子曰二三君子請皆賦起亦以知鄭志杜詩言志也子齹賦野有蔓草子齹子皮之子嬰齊也野有蔓草詩鄭風取其邂逅相遇適我願兮齹才何反宣子曰孺子善哉吾有望矣杜君子相願已所望也孺如住反子産賦鄭之羔裘杜言鄭别於唐羔裘也取其彼己之子舍命不渝邦之彦兮以美韓子宣子曰起不堪也不堪國之司直子大叔賦褰裳褰裳詩曰子恵思我褰裳涉溱子不我思豈無他人言宣子思已將有褰裳之志如不我思亦豈無他人褰起䖍反宣子曰起在此敢勤子至於他人乎杜言已今崇好在此不復令子適他人子大叔拜謝宣子之有鄭宣子曰善哉子之言是乃是褰裳不有是事其能終乎韓起不欲令鄭求他人子大叔拜以答之所以晉鄭終善子游賦風雨杜子游駟帶之子駟偃也風雨詩取其既見君子云胡不夷子旗賦有女同車杜子旗公孫叚之子豐施也有女同車取其洵美且都愛樂宣子之志子栁賦蘀兮杜子栁印段之子印癸也蘀兮詩取其倡予和女言宣子倡已將和従之蘀他洛反宣子喜曰鄭其庶乎杜庶㡬於興盛二三君子以君命貺起賦不出鄭志六詩皆鄭風故曰不出鄭志皆昵燕好也昵親也賦不出其國以示親好昵女乙反二三君子數世之主也可以無懼矣宣子皆獻馬焉而賦我將杜我將詩頌取其日靖四方我其夙夜畏天之威言志在靖亂畏懼天威數色主反子産拜使五卿皆拜曰吾子靖亂敢不拜徳宣子私覲於子産以玉與馬曰子命起舍夫玉是賜我玉而免吾死也敢不藉手以拜以玉馬藉手拜謝子産舍音捨大音扶公至自晉晉人聴公得歸子服昭伯語季平子杜昭伯恵伯之子子服回也隨公従晉還語魚遽反曰晉之公室其將遂卑矣君㓜弱六卿彊而奢傲將因是以習習實為常将因君㓜弱而習為恃强奢傲之事習慣自然必以輕君為常能無卑乎平子曰爾幼惡識國杜昭伯尚少平子不信其言惡烏路反秋八月晉昭公卒為下平子如晉葬起九月大雩旱也鄭大旱使屠擊祝款豎柎有事於桑山三子鄭大夫有事祭也柎音附又方干反斬其木不雨子産曰有事於山蓻山林也杜蓻養䕶令繁殖蓻音藝而斬其木其罪大矣奪之官邑冬十月季平子如晉葬昭公平子曰子服回之言猶信自往見之乃信回言子服氏有子哉有賢子也經丙子十有七年春小邾子來朝夏六月甲戌朔日有食之秋郯子來朝八月晉荀吳帥師滅陸渾之戎林自是凡滅不復稱人矣滅不書大夫者吳也吳無大夫也渾户門反冬有星孛于大辰大辰房心尾也妖變非常故書孛音佩楚人及吳戰于長岸杜吳楚兩敗莫肯告負故但書戰而不書敗也長岸楚地林吳楚始書戰自是楚後書人君臣不見經者十八年吳入郢矣傳十七年春小邾穆公來朝公與之燕季平子賦采叔杜采叔詩小雅取其君子來朝何錫與之以穆公比君子穆公賦菁菁者莪杜菁菁者莪亦詩小雅取其既見君子樂且有儀以答平子昭子曰不有以國林以用也言穆公若無用國之才其能久乎杜嘉其能答賦言其賢故能久有國夏六月甲戌朔日有食之祝史請所用幣杜禮正陽之月日食當用幣於社故請之昭子曰日有食之天子不舉不舉盛饌伐鼔於社林社者羣隂之聚故伐鼔以責之諸侯用幣於社杜社位上公故用幣以請救伐鼓于朝杜退自責禮也平子禦之杜禦禁也曰止也林言止不須用幣唯正月朔慝未作日有食之於是乎有伐鼓用幣禮也其餘則否太史曰在此月也正月謂建巳正陽之月也於周為六月於夏為四月慝隂氣也四月純陽用事隂氣未動而侵陽災重故有伐鼔用幣之禮也平子以為六月非正月故大史答言在此月也正音政日過分而未至杜過春分而未夏至三辰有災三辰日月星也日月相侵又犯是宿故三辰皆為災於是百官降物杜降物素服君不舉辟移時辟正寝過日食時樂奏鼓祝用幣史用辭林樂人伐鼔大祝用幣於社大史用辭以自責故夏書曰辰不集于房林舉夏書𦙍征篇杜逸書也集安也房舍也日月不安其舍則食瞽奏鼓杜鼓樂師瞽音古嗇夫馳庶人走林嗇夫主幣之官杜車馬曰馳步曰走為救日食備也嗇音色此月朔之謂也林謂此建巳正陽之月朔也當夏四月謂之孟夏言此六月當夏家之四月平子弗従昭子退曰夫子將有異志不君君矣若安於無事故曰有異志秋郯子來朝公與之宴昭子問焉曰少皡氏鳥名官何故也少皡金天氏黄帝之子已姓之祖也問何故以鳥名官少詩照反郯子曰吾祖也我知之昔者黄帝氏以雲紀故為雲師而雲名杜黄帝軒轅氏姬姓之祖也黄帝受命有雲瑞故以雲紀事百官師長皆以雲為名號縉雲氏葢其一官也炎帝氏以火紀故為火師而火名杜炎帝神農氏姜姓之祖也亦有火瑞以火紀事名百官共工氏以水紀故為水師而水名杜共工以諸侯霸有九州者在神農前大皡後亦受水瑞以水名官共音恭大皡氏以龍紀故為龍師而龍名杜大皡伏羲氏風姓之祖也有龍瑞故以龍命官我髙祖少皡摰之立也鳯鳥適至故紀於鳥為鳥師而鳥名鳯鳥氏厯正也杜鳯鳥知天時故以名厯正之官摰音至𤣥鳥氏司分者也杜𤣥鳥燕也以春分来秋分去伯趙氏司至者也杜伯趙伯勞也以夏至鳴冬至止青鳥氏司啟者也杜青鳥鶬鶊也以立春鳴立夏止丹鳥氏司閉者也杜丹鳥鷩雉也以立秋来立冬去入大木為蜃上四鳥皆厯正之屬官祝鳩氏司徒也杜祝鴆鷦鳩也鷦鳩孝故為司徒主教民鴡鳩氏司馬也杜鴡鳩王鴡也鷙而有别故為司馬主法制鴡七徐反鳲鳩氏司空也杜鳲鳩鴶鵴也鳲鳩平均故為司空平水土爽鳩氏司宼也杜爽鳩鷹也鷙故為司寇主盜賊鶻鳩氏司事也杜鶻鳩鶻鵰也春来冬去故為司事五鳩鳩民者也鳩聚也治民上聚故以鳩為名五雉為五工也杜五雉雉有五種西方曰鷷雉東方曰鶅雉南方曰翟雉北方曰鵗雉伊洛之南曰翬雉林賈逵曰西方曰鷷雉攻木之工也東方曰鶅雉塼埴之工也南方曰翟雉攻金之工也北方曰鵗雉攻皮之工也伊洛而南曰翬雉設五色之工也利器用正度量夷民者也林利便民之器用正丈尺之度斗斛之量夷平也便度量器用平也量音亮九扈為九農正杜扈有九種也春扈鳻鷅夏扈竊𤣥秋扈竊藍冬扈竊黄棘扈竊丹行扈踖踖宵扈嘖嘖桑扈竊脂老扈鷃鷃以九扈為九農之號各隨其宜以教民事林賈逵云春扈鳻鶞相五土之宜趣民耕種者也夏扈竊𤣥趣民耘苖者也秋扈竊藍趣民收歛者也冬扈竊黄趣民葢藏者也棘扈竊丹為果驅鳥者也行扈唶唶晝為民驅鳥者也宵扈嘖嘖夜為農驅獸者也桑扈竊脂為蠶驅雀者也老扈鷃鷃趣民収麥令不得晏起者也扈音戸扈民無淫者也扈止也止民使不淫放自顓頊以来不能紀逺乃紀於近為民師而命以民事則不能故也杜顓頊氏代少皡者徳不能致逺瑞而以民事命官顓音専頊許玉反仲尼聞之見於郯子而學之於是仲尼年二十八既而告人曰吾聞之天子失官學在四夷猶信杜失官官不修其職也傳言聖人無常師晉侯使屠蒯如周請有事於雒與三塗杜屠蒯晉侯之膳宰也以忠諫見進雒雒水也三塗山名在陸渾南林請祭於此山川之神蒯苦怪反雒音洛萇𢎞謂劉子曰客容猛非祭也其伐戎乎陸渾氏甚睦於楚必是故也君其備之林萇𢎞周大夫劉子周卿士客謂屠蒯乃警戎備警戒以備戍也欲因晉以合勢九月丁夘晉荀吳帥師涉自棘津河津名使祭史先用牲于雒陸渾人弗知師従之庚午遂滅陸渾數之以其貳於楚也陸渾子奔楚其衆奔甘鹿甘鹿周地周大獲杜先警戎備故獲宣子夢文公攜荀吳而授之陸渾故使穆子帥師獻俘于文宫欲以應夢冬有星孛于大辰西及漢夏之八月辰星見在天漢西今孛星出辰西光芒東及天漢申須曰彗所以除舊布新也杜申湏魯大夫林彗象如旗如箒故有除舊布新之象彗似銳反又息遂反天事恒象杜天道恒以象類告示人今除於火火出必布焉諸侯其有火災乎杜今火向伏故知當湏火出乃布散為災梓慎曰往年吾見之是其徵也徵始有形象而微也火出而見杜前年火出時見賢遍反下同今兹火出而章必火入而伏杜今年火出之月而孛益章明其終也孛星必隨大火而滅沒其居火也久矣杜厯二年其與不然乎言必然也與如字又音預火出於夏為三月杜謂昏見於商為四月於周為五月夏數得天得天正若火作其四國當之在宋衛陳鄭乎宋大辰之虛也大辰大火宋分野虛起居反下同陳大皡之虛也大皡居陳本火所自出鄭祝融之虛也祝融髙辛氏之火正居鄭皆火房也房舍也星孛及漢漢水祥也杜天漢水也衛顓頊之虛也故為帝丘杜衛今濮陽縣昔帝顓頊居之其城内有顓頊家其星為大水衛星營室營室水也水火之牡也林牡雄也水為雄火為雌牡茂后反其以丙子若壬午作乎水火所以合也杜丙午火壬子水水火合而相薄水少而火多故水不勝火若火入而伏必以壬午尚未知今孛星當復隨火星俱伏不故言若不過其見之月杜火災不過来年大火出見之月謂周五月也鄭禆竈言於子産曰宋衛陳鄭將同日火若我用瓘斝玉瓚鄭必不火杜瓘珪也斝玉爵也瓚勺也欲以禳火禆婢支反瓘古亂反斝古雅反瓚才旦反子産弗與以為火災流行非禳所息故也為明年宋衛陳鄭災傳吳伐楚陽匄為令尹卜戰不吉杜陽匄穆王曾孫令尹子瑕匄古害反司馬子魚曰我得上流何故不吉杜子魚公子魴也順江而下易用勝敵且楚故司馬令龜我請改卜令曰魴也以其屬死之楚師繼之尚大克之吉得吉兆戰于長岸子魚先死楚師繼之大敗吳師獲其乗舟餘皇杜餘皇舟名乗如字又繩證反下同使隨人與後至者守之環而塹之及泉杜環周也林使隨人與楚師之後至者守餘皇之舟周環餘皇而塹其地深至於泉盈其隧炭陳以待命林隧出入道也炭火置火满於隧道之兩間師結為陣以待楚命言其守之嚴宻吳公子光杜光諸樊子闔盧請於其衆曰喪先王之乗舟豈唯光之罪衆亦有焉請藉取之以救死杜藉衆之力以取舟喪息浪反衆許之使長鬛者三人長鬛多髭鬚與吳人異形状詐為楚人鬛力輒反潛伏於舟側曰我呼餘皇則對師夜従之杜師吳師也三呼皆迭對杜迭更也楚人従而殺之楚師亂林夜戰不知虛實但見吳人已伏舟側故紛亂吳人大敗之取餘皇以歸傳言吳光有謀經丁丑十有八年春王三月曺伯湏卒杜未同盟而赴以名林平公卒子悼公午立夏五月壬午宋衛陳鄭災來告故書天火曰災六月邾人入鄅杜鄅國今琅邪聞陽縣林鄅小國姒姓禹之後鄅音禹又音矩秋葬曺平公冬許遷于白羽林自葉遷也畏鄭而樂遷故以自遷為文傳十八年春王二月乙夘周毛得殺毛伯過毛伯過周大夫得過之族過古禾及而代之杜代居其位萇𢎞曰毛得必亡是昆吾稔之日也杜昆吾夏伯也稔熟也侈惡積熟以乙夘日與桀同誅萇直良反稔而審反侈故之以林以其侈汰之故而毛得以濟侈於王都不亡何待為二十六年毛伯奔楚傳三月曺平公卒為下㑹葬見原伯起本夏五月火始昏見杜火心星見賢遍反丙子風梓慎曰是謂融風火之始也東北曰融風融風木也木火母故曰火之始七日其火作乎杜従丙子至壬午七日壬午水火合之相故知當火作戊寅風甚壬午火甚宋衛陳鄭皆火梓慎登大庭氏之庫以望之大庭氏古國名在魯城内魯於其處作庫髙顯故登以里氣參近古以審前年之言曰宋衛陳鄭也數日皆來告火杜言經所以書數所主反裨竈曰不用吾言鄭又將火前年裨竈欲用瓖斝禳火子産不聴今復請用之鄭人請用之信竈言子産不可子大叔曰寳以保民也若有火國㡬亡可以救亡子何愛焉子産曰天道逺人道邇非所及也何以知之竈焉知天道是亦多言矣豈亦或信杜多言者或時有中㡬音祈又音機下同焉知於䖍反遂不與亦不復火傳言天道難明雖裨竈猶不足以盡知之鄭之未災也里析告子産曰將有大祥杜里析鄭大夫祥變異之氣民震動國㡬亡吾身泯焉弗良及也杜言將先災死泯而忍反國遷其可乎子産曰雖可吾不足以定遷矣杜子産知天災不可逃非遷所免故託以知不足及火里析死矣未葬子産使輿三十人遷其柩杜以其當與已言故火作子産辭晉公子公孫于東門晉人新来未入故辭不使前也使司宼出新客杜新来聘者林未知虚實出之使去禁舊客勿出於宫為其知國情不欲令去使子寛子上巡羣屏攝至于大宫二子鄭大夫屏攝祭祀之位大宫鄭祖廟巡行宗廟不得使火及之使公孫登徙大龜登闈卜大夫使祝史徙主袥於周廟告卜先君杜祏廟主石函周廟厲王廟也有火災故合羣主於祖廟易救䕶袥音石使府人庫人各儆其事林府庫貨財所聚故使其人各儆備火商成公儆司宫杜商成公鄭大夫司宫巷伯寺人之官出舊宫人寘諸火所不及杜舊宫人先公宫女司馬司冦列居火道杜司馬主兵司冦主刑列居火道備非常也行火所焮杜焮炙也焮許勤反城下之人伍列登城為部伍登城備姦也明日使野司冦各保其徵野司冦降亡也火之明日四方乃聞災故戒保所徵役之人郊人助祝史除於國北林郊外之人助大祝大史除治祭處於國北方就大隂禳火禳火于𤣥㝠囘禄𤣥㝠水神囘禄火神祈于四鄘鄘城也城積土隂氣所聚故祈祭之以禳火之餘災鄘音容書焚室而寛其征與之材林籍記被焚之家寛其征歛賦税與之材木以助營建三日哭林君大夫三日舉哀國不市杜亦憂戚不㑹市使行人告於諸侯宋衛皆如是陳不救火許不弔災君子是以知陳許之先亡也林陳不舉行火政不恤民也許不弔恤火災不畏天也杜不義所以亡六月鄅人藉稻鄅妘姓國也其君自出藉稻蓋履行之邾人襲鄅鄅人將閉門邾人羊羅攝其首焉斬得閉門者首遂入之盡俘以歸鄅子曰余無歸矣從帑於邾林帑妻子也言我妻子盡獲今無所歸矣乃從其妻子於邾帑音奴邾莊公反鄅夫人而舍其女林舍止也杜為明年宋伐邾起秋葬曺平公往者見周原伯魯焉林魯人往曺㑹葬者見周大夫原伯魯焉與之語不説學林原伯不善學問之道説音悦歸以語閔子馬閔子馬曰周其亂乎夫必多有是説而後及其大人杜國亂俗壞言者適多漸以及大人大人在位者語魚據反大人患失而惑又曰可以無學無學不害杜患有學而失道者以惑其意不害而不學則苟而可杜以為無害遂不學則皆懷苟且於是乎下陵上替能無亂乎夫學殖也不學將落原氏其亡乎杜殖生長也言學之進徳如農之殖苗日新日益林不好學問如苖之不殖則田萊荒蕪衰落而已七月鄭子産為火故大為社為治也為火于偽反下將為同祓禳於四方振除火災禮也杜振棄也林得敬天恤民之禮祓芳弗反乃簡兵大蒐將為蒐除治兵於廟城内地迫故除廣之子大叔之廟在道南其寢在道北其庭小庭蒐場過期三日處小不得一時畢使除徒陳於道南廟北林使除道之衆嚮家廟而立曰子産過女而命速除乃毁於而鄉杜而女也毁女所向女音汝鄉許亮反子産朝朝君過而怒之杜怒不毁除者南毁子産及衝使從者止之曰毁於北方杜言子産仁不忍毁人廟從才用反火之作也子産授兵登陴子大叔曰晉無乃討乎辭晉公子公孫而授兵似若叛晉子産曰吾聞之小國忘守則危况有災乎國之不可小有備故也林國雖小而不可犯者以有能修守備故也既晉之邊吏讓鄭曰鄭國有災晉君大夫不敢寧居卜筮走望不愛牲玉林龜卜蓍筮並走羣望不愛犧牲與其玉帛鄭之有災寡君之憂也今執事􅏌然授兵登陴􅏌然勁忿貌􅏌遐板及將以誰罪邊人恐懼不敢不告子産對曰若吾子之言敝邑之災君之憂也敝邑失政天降之災又懼讒慝之間謀之以啓貪人薦為敝邑不利林懼讒譛邪慝之徒間厠火災而圖謀之開啓貪人之心重為鄭國之害杜薦重也以重君之憂幸而不亡猶可説也林猶可解説授兵之罪重直用及不幸而亡君雖憂之亦無及也鄭有他竟望走在晉杜言鄭雖與他國為竟但瞻望晉歸赴之竟音境既事晉矣其敢有二心傳言子産有備楚左尹王子勝言於楚子曰許於鄭仇敵也而居楚地以不禮於鄭十五年平王復遷邑許自夷還居葉恃楚而不事鄭晉鄭方睦鄭若伐許而晉助之楚喪地矣君盍遷許許不専於楚杜自以舊國不専心事楚喪息浪反鄭方有令政林鄭有賢臣政事方美許曰余舊國也杜許先鄭封鄭曰余俘邑也隠十一年鄭滅許而復存之故曰我俘邑葉在楚國方城外之蔽也杜為方城外之蔽障士不可易杜易輕也易以豉反國不可小杜謂鄭許不可俘讐不可啓君其圖之楚子説冬楚子使王子勝遷許於析實白羽於傳時白羽改為析説音悦左傳杜林合注卷三十九
