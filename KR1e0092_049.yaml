body:
  text: 左傳杜林合注卷四十九明王道焜趙如源同編哀公三經庚申十有四年春西狩獲麟麟者仁獸聖王之嘉瑞也時無明王出而過獲仲尼傷周道之不興感嘉瑞之無應故因魯春秋而修中興之教絶筆於獲麟之一句所感而作固所以為終也冬獵曰狩蓋虞人修常職故不書狩者火野在魯西故言西狩得用曰獲小邾射以句繹來奔射小邾大夫句繹地名春秋止于獲麟故射不在三叛人之數自此以下至十九年皆魯史記之文弟子欲存孔子卒故并録以續孔子所修之經射音亦句古侯反夏四月齊陳恒執其君寘于舒州庚戌叔還卒無傳五月庚申朔日有食之無傳陳宗豎出奔楚無傳宋向魋入于曹以叛曹宋邑莒子狂卒無傳狂其廷反六月宋向魋自曹出奔衛宋向巢來奔齊人弑其君壬于舒州秋晉趙鞅帥師伐衛無傳八月辛丑仲孫何忌卒冬陳宗豎自楚復入于陳陳人殺之無傳陳轅買出奔楚無傳有星孛無傳不言所在史失之饑無𫝊傳十四年春西狩于大野叔孫氏之車子鉏商獲麟杜大野在髙平鉅野縣東北大澤是也車子微者鉏商名以為不祥以賜虞人時所未嘗見故怪之虞人掌山澤之官仲尼觀之曰麟也然後取之言魯史所以得書獲麟小邾射以句繹來奔曰使季路要我吾無盟矣杜子路信誠故欲得與相要誓而不須盟孔子弟子既續書魯策以繫于經丘明亦隨而傳之終于哀公以卒前事其異事則皆略而不傳故此經無傳者多要于妙反又一遙反使子路子路辭季康子使冉有謂之曰千乗之國不信其盟而信子之言子何辱焉林何辱于子而不與邾射要言乗繩證反對曰魯有事于小邾不敢問故死其城下可也林言魯若有征伐之事于小邾不敢問其伐之之故雖使我戰死于小邾之城下其亦可也彼不臣林彼謂邾射竊地叛君不臣于小邾而濟其言是義之也由弗能杜濟成也齊簡公之在魯也闞止有寵焉杜簡公悼公陽生子壬也闞止子我也事在六年闞苦暫反及即位林在十年使為政陳成子憚之驟顧諸朝林成子陳常心不安故數顧之諸御鞅言于公鞅齊大夫曰陳闞不可並也君其擇焉擇用一人弗聴子我夕夕視事陳逆殺人逢之杜陳逆子行陳氏宗也子我逢之遂執以入執逆至朝陳氏方睦欲謀齊國故宗族和使疾而遺之潘沐備酒肉焉林使詐病因内潘沐并得内酒肉潘米汁可以沐頭遺唯季反潘方表反饗守囚者醉而殺之而逃子我盟諸陳于陳宗失陳逆懼其反為患故盟之初陳豹欲為子我臣豹亦陳氏族使公孫言己言已介達之已有喪而止既而言之既終喪也曰有陳豹者長而上僂杜肩背僂長如字又丁丈反僂力主反望視目望陽事君子必得志林君子謂闞止言若使服事闞止必得君子之意欲為子臣吾憚其為人也杜恐多詐故緩以告子我曰何害是其在我也林言陳族何害在我用之而已使為臣他日與之言政説遂有寵謂之曰我盡逐陳氏而立女若何對曰我逺于陳氏矣杜言已疏逺説音悦女音汝逺如字又于萬反且其違者不過數人杜違不從也何盡逐焉遂告陳氏子行曰林子行即陳逆彼得君弗先必禍子子行舍于公宫子行逃而隱于陳氏今又隱于公宫夏五月壬申成子兄弟四乗如公成子之兄弟昭子莊簡子齒宣子夷穆子安廪丘子意兹子盈恵子得凡八人二人共一乗子我在幄幄帳也聴政之處出逆之遂入閉門杜子成入反閉門不納子我侍人禦之杜子我侍人子行殺侍人杜素在内故得殺之公與婦人飲酒于檀臺成子遷諸寢杜徙公使居正寢公執戈將撃之杜疑其欲作亂大史子餘曰非不利也將除害也杜言將為公除害大音泰成子出舍于庫杜以公怒故聞公猶怒將出曰何所無君林言何國無君可事子行抽劔曰需事之賊也杜言需疑則害事誰非陳宗言陳氏宗族衆多所不殺子者有如陳宗言子若欲出我必殺子明如陳宗乃止子我歸屬徒攻闈與大門林屬㑹也杜闈宫中小門大門公門也屬之欲反皆不勝乃出陳氏追之失道于弇中適豐丘杜弇中狹路豐丘陳氏邑弇於檢反又音淹豐丘入執之以告林執闞止以告陳氏殺諸郭關杜齊關名成子將殺大陸子方子方子我臣陳逆請而免之以公命取車于道杜子方取道中行人車及耏衆知而東之知其矯命奪車逐使東耏音而出雍門齊城門也雍于用反陳豹與之車弗受曰逆為余請豹與余車余有私焉林言陳逆為我請免罪陳豹以車送我出奔是我有私于陳氏為于偽反事子我而有私于其讐何以見魯衛之士林子方欲奔衛故言無以見魯衛之士杜傳言陳氏務施東郭賈奔衛杜賈即子方庚辰陳恒執公于舒州公曰吾早從鞅之言不及此杜悔不誅陳氏宋桓魋之寵害于公林桓魋恃寵驕盈為景公之患害公使夫人驟請享焉而將討之杜夫人景公母也數請享飲欲囚請討之未及魋先謀公請以鞍易薄鞍向魋邑薄公邑欲因易邑爲公享宴而作亂鞍音安公曰不可薄宗邑也宗廟所在乃益鞍七邑而請享公焉杜偽喜于受賜以日中為期家備盡往林私家甲兵之備盡往享所公知之告皇野曰余長魋也杜少長肓之皇野司馬子仲長丁丈反今將禍余請即救司馬子仲曰有臣不順神之所惡也而况人乎敢不承命不得左師不可杜左師向魋兄向巢也惡烏路反請以君命召之左師每食撃鐘聞鐘聲公曰夫子將食既食又奏杜奏樂公曰可矣以乗車往林使皇野以乗車往迎向巢曰迹人來告杜主迹禽獸者曰逢澤有介麋焉林地理志言逢澤在滎陽開封縣東北逺疑非介大也麋亡悲反公曰雖魋未來得左師吾與之田若何皇野稱公命君憚告子難以游戲煩大臣野曰嘗私焉林嘗試私請焉君欲速故以乗車逆子與之乗至公告之故拜不能起林向巢下拜懼不能起司馬曰林即司馬子仲皇野也君與之言杜使公與要誓公曰所難子者上有天下有先君杜言雖誅魋要不負言使禍難及子難乃且反對曰魋之不共宋之禍也敢不唯命是聴司馬請瑞焉杜瑞符節以發兵以命其徒攻桓氏杜桓氏向魋其父兄故臣曰不可司馬故臣與桓魋無怨者其新臣曰從吾君之命遂攻之子頎騁而告桓司馬子頎桓魋弟桓司馬即魋也頎音祈司馬欲入林司馬桓司馬也欲入攻君子車止之杜車亦魋弟曰不能事君而又伐國民不與也祗取死焉向魋遂入于曹以叛哀八年宋滅曹以為邑祗音支六月使左師巢伐之欲質大夫以入焉杜巢不能克魋恐公怒欲得國内大夫為質還入國質音致下同不能亦入于曹取質杜不能得大夫故入曹劫曹人子弟而質之欲以自固魋曰不可既不能事君又得罪于民將若之何乃舍之舍曹子弟舍音赦又音捨民遂叛之向魋奔衛向巢來奔宋公使止之曰寡人與子有言矣不可以絶向氏之祀辭曰臣之罪大盡滅桓氏可也若以先臣之故而使有後君之惠也若臣則不可以入矣司馬牛致其邑與珪焉而適齊杜牛桓魋弟也珪守邑符信向魋出于衛地公文氏攻之公文氏衛大夫求夏后氏之璜焉與之他玉而奔齊陳成子使為次卿司馬牛又致其邑焉而適吴杜亦不與魋同吴人惡之而反趙簡子召之陳成子亦召之卒于魯郭門之外阬氏葬諸丘輿杜阬氏魯人也泰山南城縣西北有輿城錄其卒葬所在愍賢者失所阬苦庚反或音岡甲午齊陳恒弑其君壬于舒州杜壬簡公也孔丘三日齊而請伐齊三公曰魯為齊弱乆矣子之伐之將若之何對曰陳恒弑其君民之不與者半以魯之衆加齊之半可克也公曰子告季孫孔子辭杜辭不告日齊側皆反三如字又息暫反退而告人曰吾以從大夫之後也故不敢不言杜嘗為大夫而去故言後初孟孺子洩將圉馬于成杜洩孟懿子之子孟武伯也圉畜養也成孟氏邑成宰公孫宿不受曰孟孫為成之病不圉馬焉杜病謂民貧困為于僞反孺子怒襲成從者不得入乃反成有司使孺子鞭之林成備禦嚴固孺子之從者不得入成孺子乃歸成有司使者至孟氏孺子恨恚故鞭成有司之使人從才用反使所吏反秋八月辛丑孟懿子卒成人奔喪弗内袒免哭于衢聴共弗許杜謂聴命共使内如字又音納袒音但免音問共音恭懼不歸不敢歸成為明年成叛傳經辛酉十有五年春王正月成叛夏五月齊髙無㔻出奔北燕無傳鄭伯伐宋無傳秋八月大雩無傳晉趙鞅帥師伐衛無傳冬晉侯伐鄭無傳及齊平魯與齊平衛公孟彄出奔齊無傳彄苦侯反傳十五年春成叛于齊武伯伐成不克遂城輸杜以偪成夏楚子西子期伐吴及桐汭林宣城廣德縣西南有桐水出白石山西北入丹陽湖汭水曲也汭始鋭反陳侯使公孫貞子弔焉杜弔為楚所伐及良而卒良吴地將以尸入聘禮若賓死未將命則既歛于棺造于朝介將命吴子使大宰嚭勞且辭曰以水潦之不時無乃廩然隕大夫之尸林廩然傾動貌恐傾動隕墮貞子之棺勞力報反以重寡君之憂寡君敢辭上介芋尹蓋對杜蓋陳大夫貞子上介林上介正使也重直用反敢辭上介絶句芋于付反曰寡君聞楚為不道薦伐吴國薦重也滅厥民人寡君使蓋備使弔君之下吏林備猶副也言下吏不敢斥尊備使所吏反下同無祿使人逢天之慼大命隕隊絶世于良杜絶世猶言弃世廢日共積廢行道之日以共具殯歛所積聚之用共音恭積子賜反又如字一日遷次一日便遷次不敢留君命今君命逆使人曰無以尸造于門是我寡君之命委于草莽也且臣聞之曰事死如事生禮也于是乎有朝聘而終以尸將事之禮朝聘道死以尸行事又有朝聘而遭喪之禮杜遭所聘之喪若不以尸將命是遭喪而還也無乃不可乎林若聘使道死不得以尸將命是遭所朝聘之喪則須自還也即此較彼不可明矣以禮防民猶或踰之今大夫曰死而棄之是棄禮也其何以為諸侯主杜謂主盟也先民有言曰無穢虐士杜虐士死者林無以死者為穢惡備使奉尸將命苟我寡君之命達于君所雖隕于深淵則天命也非君與涉人之過也林雖使尸柩隕子深淵之中則上天一定之命也非吴君與舟人濟涉之故吴人内之傳言芋尹蓋知禮内如字又音納秋齊陳瓘如楚瓘陳恒之兄子玉也過衛仲由見之杜仲由子路過古禾反曰天或者以陳氏為斧斤既斵喪公室而他人有之不可知也其使終饗之亦不可知也杜饗受也喪息浪反若善魯以待時不亦可乎何必惡焉仲由事孔子故為魯言子玉曰然吾受命矣子使告我弟杜弟成子也冬及齊平子服景伯如齊子贛為介見公孫成杜公孫成成宰公孫宿也曰人皆臣人而有背人之心况齊人雖為子役其有不貳乎杜言子叛魯齊人亦將叛子背音佩子周公之孫也多饗大利猶思不義利不可得而喪宗國將焉用之杜喪宗國謂以邑入齊使魯有危亡之禍焉於䖍反成曰善哉吾不早聞命傳言仲尼之徒皆忠于魯國陳成子館客使景伯子贛就館曰寡君使恒告曰寡人願事君如事衛君言衛與齊同好而魯未肯景伯揖子贛而進之對曰林子贛答寡君之願也昔晉人伐衛在定八年齊為衛故伐晉冠氏喪車五百杜在定九年冠氏陽平館陶縣為于偽反冠如字又古喚反因與衛地自濟以西禚媚杏以南書社五百二十五家為一社籍書而致之濟子禮反禚諸若反吴人加敝邑以亂在八年齊因其病取讙與闡亦在八年寡君是以寒心林齊待衛厚待魯薄魯君是以寒心而恐懼若得視衛君之事君也則固所願也成子病之乃歸成杜病其言也公孫宿以其兵甲入于嬴林嬴齊邑避魯也衛孔圉取大子蒯聵之姊生悝杜孔圍孔文子也蒯聵姊孔伯姬蒯苦怪反聵魚怪反悝苦回反孔氏之豎渾良夫長而美林豎小臣也長下丈反又如字孔文子卒通于内杜通伯姬大子在戚孔姬使之焉杜使良夫詣大子所使所吏反又如字大子與之言曰苟使我入獲國服冕乗軒三死無與杜冕大夫服軒大夫車三死死罪三無與音預與之盟為請于伯姬杜良夫為大子請閏月良夫與大子入舍于孔氏之外圃杜圃園昏二人蒙衣而乗杜二人大子與良夫蒙衣為婦人服也乗繩證反下同寺人羅御如孔氏孔氏之老欒寧問之稱姻妾以告自稱婚姻家妾遂入適伯姬氏既食孔伯姬杖戈而先大子與五人介輿豭從之杜介被甲輿豭豚欲以盟豭音加迫孔悝于厠强盟之杜孔氏専政故劫孔悝欲令逐輒强其丈反遂劫以登臺欒寧將飲酒炙未熟聞亂使告季子季子子路也為孔子氏宰炙章夜反下同召獲駕乗車杜召獲衛大夫駕乗車言不欲戰召上照反行爵食炙奉衛侯輒來奔季子將入遇子羔將出子羔衛大夫高柴孔子弟子將出奔曰門已閉矣季子曰吾姑至焉杜且欲至門子羔曰弗反不踐其難杜言政不及己可不須踐其難難乃旦反下同季子曰食焉不辟其難謂食孔氏祿子羔遂出子路入及門公孫敢門焉守門曰無入為也言輒已出無為復入季子曰是公孫也求利焉而逃其難由不然林言此公孫敢也既求其利禄又逃其禍難我不如此利其祿必救其患有使者出乃入杜因門開而入使所吏反曰大子焉用孔悝雖殺之必或繼之杜言已必繼孔悝為難攻大子焉于䖍反且曰大子無勇若燔臺半必舍孔叔林孔叔即孔悝若燔燒所居臺之半必懼而舍孔悝燔音煩舍音捨又如字大子聞之懼下石乞孟黶敵子路杜二子蒯瞶黨敵當也黶於咸反以戈撃之㫁纓子路曰君子死冠不免杜不使冠在地㫁丁管反結纓而死孔子聞衛亂曰柴也其來由也死矣孔悝立莊公杜莊公蒯瞶也莊公害故政林蒯瞶既立以輒之臣執政者為已害欲盡去之先謂司徒瞞成曰寡人離病于外乆矣子請亦嘗之歸告禇師比欲與之伐公不果杜比禇師聲子為明年瞞成奔起瞞莫干反經壬戌十有六年春王正月己夘衛世子蒯瞶自戚入于衛衛侯輒來奔書此春皆從告二月衛子還成出奔宋即瞞成還音旋夏四月己丑孔丘卒杜仲尼既告老去位猶書卒者魯之君臣宗其聖徳殊而異之魯襄二十二年生至今七十三也四月十八日乙丑無己丑己丑五月十二日日月必有誤林孔子卒孔子作春秋終于獲麟之一句公羊穀梁經是也弟子欲記聖師之卒故採魯史記以續夫子之經而終于此丘明因隨而作傳終于哀公從此已下無復經矣傳十六年春瞞成禇師比出奔宋欲伐莊公不果而奔衛侯使鄢武子告于周杜武子衛大夫肸也鄢子晚反曰蒯瞶得罪于君父君母逋竄于晉晉以王室之故不棄兄弟寘諸河上杜河上戚也天誘其衷獲嗣守封焉使下臣肸敢告執事王使單平公對曰肸以嘉命來告余一人往謂叔父余嘉乃成世復爾祿次敬之哉杜繼父之世還居君之祿次單音善嘉乃成世絶句方天之休杜言天方受爾以休弗敬弗休悔其可追傳終蒯瞶之事夏四月己丑孔丘卒公誄之曰旻天不弔不憖遺一老俾屏余一人以在位杜仁覆閔下故稱旻天弔恤也憖且也俾使也屏蔽也誄力軌反説文云諡也屏必領反㷀㷀余在疚嗚呼哀哉尼父無自律杜疚病也律法也言喪尼父無以自為法㷀求營反父音甫子贛曰君其不没于魯乎夫子之言曰禮失則昏名失則愆失志為昏失所為愆林昏亂者必失其志愆過者必失其所生不能用死而誄之非禮也稱一人非名也天子稱一人非諸侯之名君兩失之六月衛侯飲孔悝酒于平陽杜東郡燕縣東北有平陽亭飲于鴆反重酬之大夫皆有納焉杜納財賄也醉而送之夜半而遣之夜半者慙負孔悝不欲令人見載伯姬于平陽而行林孔悝被遣載其母俱去及西門杜平陽門使貳車反祏于西圃杜使副車還取廟主西圃孔氏廟所在祏藏主石函祏音石子伯季子初為孔氏臣新登于公升為大夫請追之林請追孔悝遇載祏者殺而乗其車杜子伯殺載祏者許公為反祏林許公為人姓名杜孔悝怪載祏者乆不來使公為反逆之遇之林遇伯子于道曰與不仁人爭明無不勝杜不仁人謂子伯季子也明無不勝言必勝必使先射林必使子伯先射以騐天理射食亦反下同射三發皆逺許為許為射之殪杜傳言子伯不仁所以死也逺于萬反或以其車從杜從公為從才用反又如字得祏于橐中孔悝出奔宋楚大子建之遇讒也自城父奔宋在昭十九年父音甫又辟華氏之亂于鄭在昭二十年華户化反鄭人甚善之又適晉與晉人謀襲鄭乃求復焉鄭人復之如初林鄭人復子建待之如初時晉人使諜于子木請行而期焉杜請行襲鄭之期子木即建也子木暴虐于其私邑邑人訴之鄭人省之得晉諜焉遂殺子木其子曰勝在吴子西欲召之葉公曰吾聞勝也詐而亂無乃害乎杜葉公子髙沈諸梁也葉始涉反子西曰吾聞勝也信而勇不為不利林不為害人之事舍諸邊竟使衛藩焉使為藩屏之衛竟音境下同葉公曰周仁之謂信周親也率義之謂勇率行也吾聞勝也好復言言之所許必欲復行之不顧道理好呼報反而求死士殆有私乎杜私謀復讐復言非信也期死非勇也杜期必也子必悔之弗從召之使處吴竟為白公杜白楚邑也汝隂褒信縣西南有白亭林楚邑宰皆僣稱公請伐鄭子西曰楚未節也言楚國新復政令猶未得節制不然吾不㤀也他日又請許之未起師晉人伐鄭楚救之與之盟勝怒曰鄭人在此讐不逺矣林比子西于鄭人言我欲復讐不逺在鄭而近在子西矣勝自厲劔子期之子平見之曰王孫何自厲也林子期即公子結曰勝以直聞不告女庸為直乎將以殺爾父平以告子西子西曰勝如卵余翼而長之林言勝如鳥之卵我如鳥覆翼而長育之女音汝長丁丈反楚國第杜用士之次第我死令尹司馬非勝而誰勝聞之曰令尹之狂也林令尹謂子西狂易妄言得死乃非我言我必殺之若得自死我乃不復成人子西不悛勝謂石乞杜石乞勝之徒悛七全反曰王與二卿士杜二卿士子西子期皆五百人當之則可矣乞曰不可得也杜五百人不可得曰市南有熊宜僚者林熊宜僚勇士也居于市之南若得之可以當五百人矣乃從白公而見之與之言説告之故辭杜告欲作亂宜僚辭距之説音悦承之以劔不動杜按劔指其喉勝曰不為利諂不為威惕不洩人言以求媚者去之吴人伐慎白公敗之杜汝隂慎縣也為于偽反請以戰備獻杜與吴戰之所得鎧杖兵器皆備而獻之欲因以為亂許之遂作亂秋七月殺子西子期于朝而劫惠王子西以袂掩面而死慙于葉公子期曰昔者吾以力事君不可以弗終林不可不終于所事抉豫章以殺人而後死杜以效其多力豫章大木抉烏穴反石乞曰焚庫弑王不然不濟林焚府庫以息覬覦弑惠王以絶觀望白公曰不可弑王不祥焚庫無聚將何以守矣乞曰有楚國而治其民以敬事神可以得祥且有聚矣何患弗從葉公在蔡蔡遷州來楚并其地方城之外皆曰可以入矣子髙曰吾聞之以險徼幸者其求無饜偏重必離杜險猶惡也所求無饜則不安譬如物偏重則離敗欲須其斃而討之聞其殺齊管修也而後入管修楚賢大夫故齊管仲之後聞其殺賢知其可討白公欲以子閭為王子閭平王子啟五辭王者子閭不可遂劫以兵子閭曰王孫若安靖楚國匡正王室而後庇焉啓之願也敢不聴從若將専利以傾王室不顧楚國有死不能不能徒遂殺之林遂殺子閭而以王如髙府髙府楚别府石乞尹門杜為門尹圉公陽穴宫負王林圉公陽楚大夫穴髙府之宫而負恵王以如昭夫人之宫杜昭夫人王母越女葉公亦至及北門或遇之曰君胡不胄國人望君如望慈父母焉盜賊之矢若傷君是絶民望也若之何不冑乃胄而進又遇一人曰君胡胄國人望君如望嵗焉嵗年穀也日月以幾杜冀君來幾音冀若見君面是得艾也杜艾安也艾魚廢反又五蓋反民知不死其亦夫有奮心猶將旌君以徇于國林民知脱于死亾其亦皆有奮發討罪之心猶將旌表葉公以徇告楚國之人也而又掩面以絶民望不亦甚乎乃免胄而進杜言葉公得民心遇箴尹固帥其屬將與白公杜欲與白公并子髙曰微二子者楚不國矣杜二子子西子期也柏舉之敗二子功多棄德從賊其可保乎乃從葉公使與國人以攻白公白公奔山而縊其徒微之林微匿也白公之黨共匿其尸與一本作興謂興發也生拘石乞而問白公之死焉對曰余知其死所而長者使余勿言杜長者謂白公也長丁丈反曰不言將烹乞曰此事也林白公簒國事克則為卿不克則烹固其所也何害乃烹石乞王孫燕奔頯黄氏杜燕勝弟頯黄吴地燕烏賢反又烏練反頯求龜反舊求悲反沈諸梁兼二事林沈諸梁即葉公子髙杜二事令尹司馬國寧杜寧安也乃使寧為令尹子西之子子國也使寛為司馬子期之子而老子葉傳終言之葉始涉反衛侯占夢嬖入林以能占夢見愛求酒于大叔僖子僖子大叔隨大音泰下同不得與卜人比而告公曰君有大臣在西南隅弗去懼害杜託占卜夢而言比毗志反乃逐大叔遺遺奔晉衛侯謂渾良夫曰吾繼先君而不得其器若之何國之寳器輒皆將去良夫代執火者而言杜將密謀屏左右曰疾與亡君皆君之子也召之而擇材焉可也林疾大子疾也亡君出公輒也言二人皆莊公所生之子召輒擇其有材者立之若不材器可得也杜輒若不材可廢其身因得其器豎告大子杜大子疾大子使五人輿豭從已劫公而强盟之盟求必立己强其丈反且謀殺良夫公曰其盟免三死杜盟在十五年曰請三之後有罪殺之公曰諾哉左傳杜林合注卷四十九
