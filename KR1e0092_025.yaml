body:
  text: 左傳杜林合注卷二十五明王道焜趙如源同編襄公一公名午成公子母定姒諡法因事有功曰襄辟土有德曰襄周簡王十四年魯襄公元年簡王崩子靈王立襄二十八年靈王崩子景王立鄭成公十三年魯襄公二年成公卒子僖公髠頑立襄七年僖公卒簡公嘉立齊靈公十年魯襄公十九年靈公卒子莊公光立襄二十五年莊公弒弟景公杵臼立宋平公四年晉悼公復霸元年韓厥為政襄七年知罃為政襄十一年㑹于蕭魚服鄭襄十三年荀偃為政襄十五年悼公卒子平公彪立襄十九年士丐為政襄二十五年趙武為政襄二十七年晉楚盟于宋南北分霸始此衛獻公五年魯襄公十四年獻公奔齊衛立公孫剽是為殤公襄二十六年殤公弒獻公復歸于衛襄公二十九年獻公卒子襄公立蔡景公二十年魯襄公三十年景公弒子靈公般立曹成公六年魯襄公十八年成公卒子武公膝立滕成公三年陳成公二十七年魯襄公四年成公卒子哀公弱立杞桓公六十五年魯襄公六年桓公卒子孝公丐立襄二十三年孝公卒弟文公益姑立薛詳見僖公元年莒黎比公五年魯襄公十六年晉執黎比公襄三十二年黎比公弒子展輿立邾宣公二年魯襄公十六年晉執宣公襄十七年宣公卒悼公華立襄十九年晉執悼公許靈公十八年魯襄公二十六年靈公卒于楚悼公買立小邾魯襄公七年小邾穆公來朝楚共王十九年子重為令尹魯襄公三年子重伐吳卒子辛為令尹襄五年楚殺子辛子囊為令尹襄十三年共王卒子康王昨立襄十五年子庚為令尹襄二十一年子南為令尹二十二年薳子馮為令尹襄二十五年子木為令尹襄二十八年康王卒郟敖麋立秦景公五年吳壽夢十四年魯襄公十二年夀夢卒諸樊立一名遏襄二十五年遏門于巢卒餘祭立一名載襄二十九年餘祭卒夷昧立一名餘昧越詳見隱公元年及昭公元年經己丑元年春王正月公即位無傳於是公年四歲仲孫蔑㑹晉欒黶宋華元衛寧殖曹人莒人邾人滕人薛人圍宋彭城林討魚石也杜魯與謀於虛杼而書㑹者稟命霸主非匹敵故夏晉韓厥帥師伐鄭仲孫蔑㑹齊崔杼曹人邾人杞人次于鄫杜鄫鄭地在陳留襄邑縣東南書次兵不加鄭次鄫以待晉師林書次從晉而未決也亦以見復霸之難鄫才陵反秋楚公子壬夫帥師侵宋九月辛酉天王崩杜無傳辛酉九月十五日林簡王崩子靈王立邾子來朝冬衛侯使公孫剽來聘杜剽子叔黑背子剽匹妙反字林匹召反晉侯使荀罃來聘杜冬者十月初也王崩赴未至皆未聞喪故各得行朝聘之禮而傳善之傳元年春己亥圍宋彭城杜下有二月則此己亥為正月正月無己亥日誤非宋地追書也成十八年楚取彭城以封魚石故曰非宋地夫子治春秋追書繫之宋於是為宋討魚石故稱宋且不登叛人也登成也不與其專邑叛君故使彭城還繫宋為于僞反謂之宋志稱宋亦以成宋志彭城降晉晉人以宋五大夫在彭城者歸置諸瓠丘杜彭城降不書賤略之瓠丘晉地河東東垣縣東南有壺丘五大夫魚石向為人鱗朱向帶魚府降戶江反置之䜴反瓠徐侯吳反又户故反齊人不㑹彭城晉人以為討二月齊太子光為質於晉光齊靈公太子質音致夏五月晉韓厥荀偃帥諸侯之師伐鄭入其郛荀偃不書非元帥郛芳夫反敗其徒兵於洧上杜徒兵步兵洧水出密縣東南至長平入潁林敗鄭徒步之兵於洧水之上非車戰也洧于軌反於是東諸侯之師次于鄫以待晉師杜齊魯曹邾杞晉師自鄭以鄫之師侵楚焦夷及陳杜於是孟獻子自鄫先歸不與侵陳楚故不書焦如字徐在堯反晉侯衛侯次于戚以為之援杜為韓厥援秋楚子辛救鄭侵宋吕留杜吕留二縣今屬彭城郡鄭子然侵宋取犬丘杜譙國鄼縣東北有犬丘城迂回疑九月邾子來朝禮也林邾宣公林襄公新立故曰禮也冬衛子叔林即公孫剽晉知武子林即知罃來聘禮也凡諸侯即位小國朝之杜小事大大國聘焉杜大字小以繼好結信謀事補闕禮之大者也林繼先君之好結二國之信謀國家之事補過闕之舉杜闕猶過也禮以安國家利民人為大好呼報反經庚寅二年春王正月葬簡王無傳五月而葬速鄭師伐宋書伐從告夏五月庚寅夫人姜氏薨林襄公適母也六月庚辰鄭伯睔卒杜未與襄同盟而赴以名庚辰七月九日書六月經誤林成公卒子僖公髠頑立睔古囷反徐胡叔反晉師宋師衛寧殖侵鄭杜宋雖非卿師重故叙衛上殖市力反秋七月仲孫蔑㑹晉荀罃宋華元衛孫林父曹人邾人于戚己丑葬我小君齊姜齊諡也三月而葬速齊如字諡法執心克莊曰齊或音側皆反非叔孫豹如宋杜豹于此始自齊還為卿冬仲孫蔑㑹晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢杜以逼鄭林虎牢一名北制在漢為滎陽成臯楚殺其大夫公子申傳二年春鄭師侵宋楚令也林楚以宋降彭城故令鄭人侵宋齊侯伐萊萊人使正輿子賂夙沙衛以索馬牛皆百匹林萊東夷小國正輿子萊大夫夙沙衛齊寺人索簡擇好者萊音來輿音餘索所白反齊師乃還君子是以知齊靈公之為靈也林國之大事莫大于用兵今進退繫于寺人之口君子是以知靈公之為靈者諡法亂而不損曰靈言諡應其行也夏齊姜薨初穆姜使擇美檟檟梓之屬檟古雅反木名以自為櫬與頌琴杜櫬棺也頌琴琴名猶言雅琴皆欲以送終櫬初覲反季文子取以葬君子曰非禮也禮無所逆婦養姑者也虧姑以成婦逆莫大焉杜穆姜成公母齊姜成公婦林季文子取穆姜所為之櫬與琴以葬齊姜非尊事君祖母之禮禮以順為敬故無所逆為婦之道將以奉養其姑者也今取穆姜之櫬琴以葬齊姜是虧姑以成婦其為不順莫大於此養徐余亮反詩曰其惟哲人告之話言順德之行杜詩大雅哲知也話善也言知者行事無不順話户怪反季孫於是為不哲矣杜言逆德一本作不為哲矣且姜氏君之妣也襄公適母故曰君之妣妣必履反詩曰為酒為醴蒸畀祖妣以洽百禮降福孔偕杜詩周頌蒸進也畀與也偕遍也言敬事祖妣則鬼神降福季氏葬姜氏不以禮是不敬祖妣蒸之承反畀必利反洽户夾反齊侯使諸姜宗婦來送葬杜宗婦同姓大夫之婦婦人越疆送葬非禮召萊子林萊姜姓故召之萊子不㑹故晏弱城東陽以逼之杜為六年滅萊傳東陽齊竟上邑鄭成公疾子駟請息肩於晉杜欲辟楚役以負擔喻公曰楚君以鄭故親集矢於其目謂鄢陵戰晉射楚王目非異人任寡人也杜言楚子任此患不為他人蓋在己非異人任絶句任音壬一讀至人字絶句若背之是棄力與言其誰䁥我林若背楚從晉是棄楚救鄭之力與盟誓之言其誰肯與我親䁥背音佩棄力服本作棄功䁥女乙反徐乃吉反免寡人林免寡人棄過背言之力唯二三子秋七月庚辰鄭伯睔卒於是子罕當國攝君事子駟為政為政卿子國為司馬晉師侵鄭杜晉伐喪非禮諸大夫欲從晉子駟曰官命未改杜成公未葬嗣君未免喪故言未改不欲違先君意㑹于戚謀鄭故也杜鄭人叛晉謀討之孟獻子曰請城虎牢以逼鄭虎牢舊鄭邑今屬晉知武子曰善鄫之㑹吾子聞崔子之言今不來矣杜元年孟獻子與齊崔杼次于鄫崔杼有不服晉之言獻子以告知武子滕薛小邾之不至皆齊故也杜三國齊之屬寡君之憂不唯鄭杜言復憂齊叛罃將復於寡君而請於齊杜以城事自晉君而請齊㑹之欲以觀齊志得請而告吾子之功也得請謂齊人應命告諸侯㑹築虎牢若不得請事將在齊杜將伐齊吾子之請諸侯之福也城虎牢足以服鄭息征伐豈唯寡君賴之傳言荀罃能用善謀穆叔聘于宋通嗣君也林襄公新立通好於宋冬復㑹于戚齊崔武子及滕薛小邾之大夫皆㑹知武子之言故也林崔武子即崔杼杜武子言事將在齊齊人懼帥小國而㑹之遂城虎牢鄭人乃成如孟獻子之謀楚公子申為右司馬多受小國之賂以逼子重子辛杜逼奪其權勢楚人殺之故書曰楚殺其大夫公子申杜言所以致國討之文經辛卯三年春楚公子嬰齊帥師伐吳林楚始伐吳公如晉夏四月壬戌公及晉侯盟于長樗林長樗晉地杜晉侯出其國都與公盟于外樗勑居反公至自晉無傳不以長樗至本非㑹六月公㑹單子晉侯宋公衛侯鄭伯莒子邾子齊世子光己未同盟于雞澤林雞澤衛地杜雞澤在廣平曲梁縣西南周靈王新即位使王官伯出與諸侯盟以安王室故無譏單音善陳侯使袁僑如㑹杜陳疾楚政而來屬晉本非召㑹而自來故言如㑹僑其驕反戊寅叔孫豹及諸侯之大夫及陳袁僑盟杜諸侯既盟袁僑乃至故使大夫别與之盟言諸侯之大夫則在雞澤之諸侯也殊袁僑者明諸侯大夫所以盟盟袁僑也據傳盟在秋長厯推戊寅七月十三日經誤林諸侯在而大夫自為盟於是始秋公至自㑹無傳冬晉荀罃帥師伐許傳三年春楚子重伐吳為簡之師簡選練也克鳩兹至于衡山鳩兹吳邑在丹陽蕪湖縣東今臯夷也衡山在吳興烏程縣南使鄧廖帥組甲三百被練三千杜組甲被練皆戰備也組甲漆甲成組文被練練袍廖力雕反組音祖下皆同被皮義反以侵吳吳人要而擊之林子重止于衡山使鄧廖師之以侵吳吳人要其中路而擊之要於遙反獲鄧廖其能免者組甲八十被練三百而已子重歸既飲至三日吳人伐楚取駕駕良邑也鄧廖亦楚之良也君子謂子重於是役也所獲不如所亡杜當時君子楚人以是咎子重子重病之遂遇心疾而卒林楚人以挑釁生事歸咎于子重子重亦以是為己之病杜憂恚故成心疾咎其九反公如晉始朝也杜公即位而朝夏盟于長樗孟獻子相公稽首杜相儀也稽首首至地相息亮反知武子曰天子在而君辱稽首寡君懼矣杜稽首事天子之禮孟獻子曰以敝邑介在東表密邇仇讎杜仇讎謂齊楚與晉爭介音界寡君將君是望林望晉君以安國家定社稷敢不稽首傳言獻子能固事盟主晉為鄭服故且欲修吳好鄭服在前年為于僞反好呼報反將合諸侯使士丐告于齊曰寡君使丐以歲之不易不虞之不戒寡君願與一二兄弟相見杜列國之君相謂兄弟林言晉君使丐奉使以歲事之多難不可虞度之事不可戒備願與列國之君相見易以䜴反以謀不協請君臨之使丐乞盟齊侯欲勿許而難為不協林齊靈公欲不許士丐之請而難自為不和協乃盟於耐外杜與士丐盟耐水名耐音而祁奚請老杜老致仕晉侯問嗣焉杜嗣續其職者稱解狐其讎也將立之而卒杜解狐卒解音蟹又問焉對曰午也可午祁奚子於是羊舌職死矣晉侯曰孰可以代之對曰赤也可杜赤職之子伯華於是使祁午為中軍尉羊舌赤佐之杜各代其父君子謂祁奚於是能舉善矣稱其讎不為諂立其子不為比舉其偏不為黨杜諂媚也偏屬也林稱解狐不為諂佞以媚其讎立祁午不為親比以私其子稱羊舌赤不為阿黨以與其偏諂他撿反比毗志反商書曰無偏無黨王道蕩蕩杜商書洪範也蕩蕩平正無私其祁奚之謂矣解狐得舉杜未得位故曰得舉祁午得位伯華得官林官亦位耳文勢之變建一官而三物成杜一官軍尉物事也林建立一軍尉之官而得位得舉得官三事皆成能舉善也夫唯善故能舉其類林惟祁奚為善人故能舉其善類夫音扶絶句一讀以夫為下句首詩云惟其有之是以似之祁奚有焉杜詩小雅言唯有德之人能舉似己者六月公㑹單頃公及諸侯己未同盟于雞澤杜單頃公王卿士林晉悼公復霸假寵于周故單子㑹盟于雞澤晉侯使荀㑹逆吳子于淮上林吳通中國道自淮南故晉使逆吳子于淮上吳子不至杜道逺多難楚子辛為令尹侵欲于小國陳成公使袁僑如㑹求成杜患楚侵也袁僑濤塗四世孫晉侯使和組父告于諸侯杜告陳服秋叔孫豹及諸侯之大夫及陳𡊮僑盟陳請服也杜其君不來使大夫盟之匹敵之宜晉侯之弟揚干亂行於曲梁杜行陳次林曲梁晉地行戶郎反魏絳戮其僕姓僕御也晉侯怒謂羊舌赤曰合諸侯以為榮也揚干為戮何辱如之必殺魏絳無失也林言合諸侯為㑹盟以為晉國之榮也揚干乃為三軍戮何恥辱如之必殺魏絳以報此恥為我執之勿失也對曰絳無二志事君不辟難有罪不逃刑其將來辭何辱命焉林言魏絳無攜二之志其事君也患難有所不辟不為苟生其有罪也刑罰有所不逃不為苟免其將自來陳其辭狀何辱君命使人執之言終魏絳至授僕人書杜僕人晉侯御僕將伏劍士魴張老止之公讀其書曰日君乏使使臣斯司馬林斯此也使臣為此司馬之官臣聞師衆以順為武杜順莫敢違林行師御衆以順承上命莫敢拒違見為威武軍事有死無犯為敬杜守官行法雖死不敢有違君合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及揚干無所逃罪林今君之師衆違命亂行是不武也臣治軍事畏死廢法是不敬也二者之罪莫大於此臣懼不討而有死罪又以此罪纍及揚干是罪重將無所逃也杜懼自犯不武不敬之罪不能致訓至於用鉞杜用鉞斬揚干之僕鉞音越臣之罪重敢有不從以怒君心杜言不敢不從戮請歸死於司寇致尸於司寇使戮之公跣而出林悼公感悟乃匆遽不暇躡履跣足走出曰寡人之言親愛也吾子之討軍禮也寡人有弟弗能教訓使干大命林使干犯軍旅之大命令跣先典反寡人之過也子無重寡人之過杜魏絳死為重過重直用反敢以為請請使無死晉侯以魏絳為能以刑佐民矣林以魏絳刑當其罪能以刑佐治民之事反役林反自雞澤之殺與之禮食使佐新軍杜羣臣旅㑹今欲顯絳故特為設禮食食音嗣又如字張老為中軍司馬代魏絳士富為候奄杜代張老士富士㑹别族楚司馬公子何忌侵陳陳叛故也許靈公事楚不㑹于雞澤冬晉知武子帥師伐許經壬辰四年春王三月己酉陳侯午卒杜前年大夫盟雞澤三月無己酉日誤林成公卒子哀公弱立夏叔孫豹如晉秋七月戊子夫人姒氏薨成公妾襄公母姒杞姓葬陳成公無傳八月辛亥葬我小君定姒無傳定諡也赴同祔姑反哭成喪皆以正夫人禮母以子貴踰月而葬速冬公如晉陳人圍頓傳四年春楚師為陳叛故猶在繁陽前年何忌之師侵陳今猶未還繁陽楚地在汝南鮦陽縣南為于僞反韓獻子患之言於朝曰文王帥殷之叛國以事紂唯知時也杜知時未可爭今我易之難哉林今我未能服楚而反易文王之道與楚爭陳時之不可難以濟哉三月陳成公卒楚人將伐陳聞喪乃止軍禮不伐喪陳人不聽命杜不聽楚命臧武仲聞之曰陳不服於楚必亡大國行禮焉而不服在大猶有咎而况小乎林言楚不伐陳喪以行禮於陳而猶不服於有禮雖在大國猶有凶咎而况小國乎咎其九反夏楚彭名侵陳陳無禮故焉杜為下陳圍頓傳穆叔如晉林即叔孫豹報知武子之聘也武子聘在元年晉侯享之金奏肆夏之三不拜肆夏樂曲名周禮以鐘鼓奏九夏其二曰肆夏一名樊三曰韶夏一名遏四曰納夏一名渠蓋擊鐘而奏此三夏曲夏户雅反九夏一曰王夏二曰肆夏三曰韶夏四曰納夏五曰章夏六曰齊夏七曰族夏八月陔夏九曰驁夏肆夏一名樊國語云金奏肆夏樊遏渠後遂分為三夏之别名吕叔玉云肆夏時邁也樊遏執競也渠思丈也工歌文王之三又不拜杜工樂人也文王之三大雅之首文王大明綿歌鹿鳴之三三拜杜小雅之首鹿鳴四牡皇皇者華林每歌一曲則穆叔一拜謝韓獻子使行人子員問之行人通使之官員音云曰子以君命辱於敝邑先君之禮藉之以樂以辱吾子杜藉薦也藉在夜反吾子舍其大而重拜其細林舍肆夏文王之大者不拜而三起拜謝於鹿鳴三篇之細舍音捨重直用反下皆同敢問何禮也對曰三夏天子所以享元侯也使臣弗敢與聞杜元侯牧伯與音預文王兩君相見之樂也臣不敢及杜及與也文王之三皆稱文王之德受命作周故諸侯㑹同以相樂鹿鳴君所以嘉寡君也敢不拜嘉杜晉以叔孫為嘉賔故歌鹿鳴之詩取其我有嘉賔叔孫奉君命而來嘉叔孫乃所以嘉魯君林謝晉君嘉己之意此所以一拜四牡君所以勞使臣也敢不重拜杜詩言使臣乘四牡騑騑然行不止勤勞也晉以叔孫來聘故以此勞之林謝晉君勞己之意所以再拜勞力報反皇皇者華君教使臣曰必咨於周杜皇皇者華君遣使臣之詩言忠臣奉使能光輝君命如華之皇皇然又當咨于忠信以補己不及忠信為周其詩曰周爰咨諏周爰咨謀周爰咨度周爰咨詢言必於忠信之人咨此四事臣聞之訪問於善為咨林此句乃總說詩中咨字之義言訪問善道乃謂之咨咨親為詢杜問親戚之義咨禮為度杜問禮宜咨事為諏杜問政事咨難為謀杜問患難難乃旦反臣獲五善敢不重拜杜五善為咨詢度諏謀林謝晉君教己之意此所以三拜秋定姒薨不嬪于廟無櫬不虞杜櫬親身棺季孫以定姒本賤既無器備議其喪制欲殯不過廟又不反哭林虞祭也匠慶謂季文子匠慶魯大夫曰子為正卿而小君之喪不成杜謂如季孫所議則為夫人禮不成不終君也慢其母是不終事君之道君長誰受其咎言襄公長將責季孫長丁丈反初季孫為己樹六檟於蒲圃東門之外杜蒲圃場圃名季文子樹檟欲自為櫬為于僞反匠慶請木杜為定姒作櫬季孫曰略不以道取為略匠慶用蒲圃之檟季孫不御杜御止也傳言遂得成禮故經無異文御魚吕反君子曰志所謂多行無禮必自及也其是之謂乎林此言始則季文子無禮於穆姜取其櫬及頌琴以葬齊姜終則匠慶無禮於季孫取其樹檟以葬定姒吻合多行無禮必自及也之助語冬公如晉聽政受貢賦多少之政晉侯享公公請屬鄫杜鄫小國也欲得使屬魯如須句顓㬰之比使助魯出貢賦公時年七嵗蓋相者為之言鄫今琅邪鄫縣晉侯不許孟獻子曰以寡君之密邇於仇讎而願固事君無失官命林言以魯國之密邇於齊楚仇讎之國而願堅固一心以事晉君無失晉官徴發之命鄫無賦於司馬杜晉司馬文掌諸侯之賦為執事朝夕之命敝邑敝邑褊小闕而為罪杜闕不共也褊必淺反寡君是以願借助焉借鄫以自助借子亦反晉侯許之為明年叔孫豹鄫世子巫如晉傳楚人使頓間陳而侵伐之故陳人圍頓間伺間缺間間厠之間無終子嘉父使孟樂如晉無終山戎國名孟樂其使臣林子爵也嘉父其君名因魏莊子納虎豹之皮以請和諸戎杜欲戎與晉和莊子魏絳晉侯曰戎狄無親而貪不如伐之魏絳曰諸侯新服陳新來和將觀於我我德則睦否則攜二勞師於戎而楚伐陳必弗能救是棄陳也諸華必叛杜勞頓晉師以伐戎而楚若伐陳國則晉必不能救陳是棄絶陳國之好也中國諸侯見晉不救陳必皆背叛戎禽獸也獲戎失華無乃不可乎夏訓有之曰有窮后羿杜夏訓夏書有窮國名后君也羿有窮君之號夏户雅反下皆同羿音詣公曰后羿何如怪其言不次故問之對曰昔有夏之方衰也后羿自鉏遷于窮石因夏民以代夏政杜禹孫大康淫放失國夏人立其弟仲康仲康亦微弱仲康卒子相立羿遂代相號曰有窮鉏羿本國名鉏仕居反恃其射也杜羿善射不修民事而淫于原獸杜淫放原野棄武羅伯因熊髠尨圉杜四子皆羿之賢臣髠苦門反尨莫邦反圉魚吕反而用寒浞寒浞伯明氏之讒子弟也林寒國名浞人名伯明寒國君名寒浞乃伯明氏好讒之子弟杜寒國北海平夀縣東有寒亭浞仕角反徐在角反伯明后寒棄之夷羿收之林伯明之君惡其好讒寒棄之而不用夷羿之氏也羿善其好讒收録而為己用信而使之以為己相浞行媚于內杜內宫人而施賂于外愚弄其民杜欺罔之而虞羿于田杜樂之以游田樹之詐慝以取其國家杜樹立也慝他得反外內咸服杜信浞詐羿猶不悛杜悛改也悛七全反將歸自田杜羿獵還家衆殺而亨之以食其子林羿之家衆為浞殺羿而烹煮之以羿之肉食羿之子亨曽彭反煮也食音嗣其子不忍食諸死于窮門杜殺之於國門靡奔有鬲氏杜靡夏遺臣事羿者有鬲國名今平原鬲縣鬲音革浞因羿室杜就其妃妾生澆及豷恃其讒慝詐僞而不德于民使澆用師滅斟灌及斟尋氏杜二國夏同姓諸侯仲康之子后相所依樂安夀光縣東南有灌亭北海平夀縣東南有斟亭澆五弔反豷許器反斟之林反灌古亂反處澆于過處豷于戈杜過戈皆國名東萊掖縣北有過鄉戈在宋鄭之間過古何反掖音亦靡自有鬲氏收二國之燼杜燼遺民林收斟灌斟尋二國餘民之燼燼才刃反以滅浞而立少康少康夏后相之子少詩照反少康滅澆于過后杼滅豷于戈杜后杼少康子杼直吕反有窮由是遂亡失人故也杜浞因羿室故不改有窮之號昔周辛甲之為太史也命百官官針王闕杜辛甲周武王大史闕過也使百官各為針辭戒王過針之林反於虞人之針杜虞人掌田獵曰芒芒禹跡畫為九州林自此曰字以下連十五句皆虞針之辭杜芒芒逺貌畫分也芒莫郎反畫乎麥反經啓九道杜啓開九州之道民有寢廟獸有茂草各有攸處德用不擾林民人之屬則有寢以安其生有廟以祀其死禽獸之屬則有茂草以樓其形杜人神各有所歸故德不亂擾如小反在帝夷羿冒于原獸杜冒貪也冒莫報反又亡北反亡其國恤而思其麀牡林忘其國家之憂恤而思念田獵麀鹿之牡杜言但念獵麀音憂鹿牡也牡茂后反武不可重杜重猶數也林言有國家者不可數重武事重直用反下同用不恢于夏家羿以好武雖有夏家而不能恢大之獸臣司原敢告僕夫杜獸臣虞人告僕夫不敢斥尊虞針如是可不懲乎於是晉侯好田故魏絳及之杜及后羿事公曰然則莫如和戎乎對曰和戎有五利焉戎狄薦居貴貨易土杜薦聚也易猶輕也林以貨財為貴重以土地為輕易荐在薦反又才遜反或云草也易以豉反土可賈焉一也林其土地所産可資商賈賈音古邊鄙不聳民狎其野穡人成功二也杜聳懼狎習也林晉之邊鄙與戎為和更不恐懼民皆狎習於其田野耕曰農斂曰穡收斂之人成其嵗功聳息勇反戎狄事晉四鄰振動諸侯威懷三也林四方諸侯皆畏威而懷德以德綏戎師徒不勤甲兵不頓四也杜頓壞也鑒于后羿而用德度杜以后羿為鑒戒林用明德為諸侯度逺至邇安五也君其圖之公說使魏絳盟諸戎修民事田以時杜修農民三時之事四時之田獵皆於農隙不奪農時林傳言晉侯能用善謀說音悅冬十月邾人莒人伐鄫臧紇救鄫莒邾敗於狐駘杜臧紇武仲也鄫屬魯故救之狐駘邾地魯國蕃縣東南有目台亭紇恨發反駘徒來反徐勑才反國人逆喪者皆髽魯於是乎始髽杜髽麻髮合結也遭喪者多故不能備凶服髽而已林著喪禮之始變髽側瓜反國人誦之曰臧之狐裘敗我於狐駘臧紇時服狐裘我君小子朱儒是使朱儒朱儒使我敗於邾杜襄公幼弱故曰小子臧紇短小故曰朱儒敗不書魯人諱之林重呼朱儒言其知小無能為經癸巳五年春公至自晉夏鄭伯使公子發來聘杜發子産父叔孫豹鄫世子巫如晉杜比魯大夫故書巫如晉仲孫蔑衛孫林父㑹吳于善道杜魯衛俱受命於晉故不言及吳先在善道二大夫往㑹之故曰㑹吳善道地關秋大雩楚殺其大夫公子壬夫林書名罪其貪公㑹晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚杜穆叔使鄫人聽命于㑹故鄫見經不復殊吳者吳來㑹于戚林於是盟于戚吳初與諸侯盟也不書盟于晉諱也吳晉之盟春秋終諱之見哀十三年公至自㑹無傳冬戍陳杜諸侯在戚㑹皆受命戍陳各還國遣戍不復有告命故獨書魯戍林戍不書惟悼公之戍陳鄭也特書之楚公子貞帥師伐陳公㑹晉侯宋公衛侯鄭伯曹伯齊世子光救陳十有二月公至自救陳無傳辛未季孫行父卒傳五年春公至自晉公在晉既聽屬鄫聞其見伐遙命臧紇出救故傳稱經公至以明之王使王叔陳生訴戎于晉杜王叔周卿士也戎陵暴周室故告訴於盟主訴悉路反晉人執之士魴如京師言王叔之二於戎也杜王叔反有二心於戎失奉使之義故晉執之夏鄭子國來聘通嗣君也鄭僖公初即位穆叔覿鄫太子于晉以成屬鄫杜覿見也前年請屬鄫故將鄫太子巫如晉以成之覿直歷反書曰叔孫豹鄫太子巫如晉言比諸魯大夫也杜豹與巫俱受命於魯故經不書及比之魯大夫吳子使壽越如晉夀越吳大夫辭不㑹于雞澤之故三年㑹雞澤吳不至今來謝之且請聽諸侯之好杜更請㑹好呼報反晉人將為之合諸侯使魯衛先㑹吳且告㑹期以其道逺故使魯衛先告期為于僞反故孟獻子孫文子㑹吳于善道二子皆受晉命而行秋大雩旱也雩夏祭所以祈甘雨若旱則又修其禮故雖秋雩非書過也然經與故雩同文是以傳每釋之日旱也雩而獲雨故書雩而不書旱楚人討陳叛故杜討治也曰由令尹子辛實侵欲焉林言陳之叛由令尹子辛侵欲無藝所致乃殺之書曰楚殺其大夫公子壬夫貪也君子謂楚共王於是不刑陳之叛楚罪在子辛共王既不能素明法教陳叛之日又不能嚴斷威刑以謝小國而擁其罪人興兵致討加禮於陳而陳恨彌篤乃怨而歸罪子辛子辛之貪雖足以取死然其王用刑為失其節故言不刑共音恭詩曰周道挺挺我心扃扃講事不令集人來定杜逸詩也挺挺正直也扃扃明察也講謀也言謀事不善當聚致賢人以定之挺他頂反扃工迥反徐孔穎反己則無信而殺人以逞不亦難乎杜共王伐宋封魚石背盟敗于鄢陵殺子反公子申及壬夫八年之中戮殺三卿欲以屬諸侯故君子以為不可夏書曰成允成功亦逸書也允信也言信成然後有成功九月丙午盟于戚㑹吳且命戍陳也杜公及其㑹而不書盟非公後㑹蓋不以盟告廟穆叔以屬鄫為不利使鄫大夫聽命于㑹杜鄫近魯竟故欲以為屬國既而與莒有忿魯不能救恐致譴責故復乞還之傳言鄫人所以見於戚㑹楚子囊為令尹杜公子貞囊乃郎反范宣子曰我喪陳矣楚人討二而立子囊必改行杜改子辛所行喪息浪反行如字徐下孟反而疾討陳疾急也陳近於楚民朝夕急能無往乎林陳之土地既近於楚其國之民危急之患在於朝夕能無往從於楚乎有陳非吾事也無之而後可杜言晉力不能及陳故七年陳侯逃歸冬諸侯戍陳杜備楚子囊伐陳十一月甲午㑹于城棣以救之杜公及救陳而不及㑹故不書城棣城棣鄭地陳留酸棗縣西南有棣城棣力計反一音徒妹反季文子卒大夫入斂公在位杜在阼階西鄉宰庀家器為葬備杜庀具也林季氏之宰庀其家器為喪葬之備庀匹婢反無衣帛之妾無食粟之馬無藏金玉無重器備杜器備謂珍寶甲兵之物衣於既反食如字又音嗣重如字又直龍反君子是以知季文子之忠於公室也林君子觀季文子恭儉於其私家可知其忠愛於公室相三君矣而無私積可不謂忠乎林非成公忘私不能及此可謂忠矣相息亮反積子賜反經甲午六年春王三月壬午杞伯姑容卒林桓公卒子孝公丐立夏宋華弱來奔杜華椒孫秋葬杞桓公無傳滕子來朝莒人滅鄫冬叔孫豹如邾季孫宿如晉行父之子十有二月齊侯滅萊杜書十二月從告傳六年春杞桓公卒始赴以名同盟故也杜杞入春秋未嘗書名桓公三與成同盟故赴以名宋華弱與樂轡少相狎長相優又相謗也杜狎親習也優調戲也林華弱樂轡皆宋大夫調戲之過輒相謗也少詩照反狎户甲反長丁丈反子蕩怒以弓梏華弱于朝杜子蕩樂轡也張弓以貫其頸若械之在手故曰梏梏古毒反平公見之曰司武而梏於朝難以勝矣司武司馬言其懦弱不足以勝敵懦乃亂反又乃臥反遂逐之夏宋華弱來奔司城子罕曰同罪異罰非刑也專戮於朝罪孰大焉林言樂轡與華弱相狎相優其罪本同一逐一否其罰乃異非用刑平一之道且樂轡專輒以弓梏戮華弱於朝無君之罪孰大於此遂逐子蕩子蕩射子罕之門曰幾日而不我從杜言我射女門女亦當以不勝任見逐林幾日言不久也射食亦反幾居豈反子罕善之如初杜言子罕雖見辱不追忿所以得安秋滕成公來朝始朝公也林滕子即位始朝襄公莒人滅鄫鄫恃賂也鄫有貢賦之賂在魯恃之而慢莒故滅之冬穆叔如邾聘且修平平四年狐駘戰晉人以鄫故來討曰何故亡鄫杜鄫屬魯恃賂而慢莒魯不致力輔助無何以還晉尋便見滅故晉責魯季武子如晉見且聽命林季武子即季孫宿杜始代父為卿見大國且謝亡鄫聽命受罪見賢遍反十一月齊侯滅萊萊恃謀也杜賂夙沙衛之謀也事在二年於鄭子國之來聘也四月晏弱城東陽而遂圍萊杜子國聘在五年二年晏弱城東陽至五年四月復託治城因遂圍萊甲寅堙之環城傅於堞杜堞女牆也堙土山也周城為土山及女牆堙音因環户關反又音患傅音附堞音牒亦謂之陴倪徐養涉反及杞桓公卒之月杜此年三月乙未王湫帥師及正輿子棠人軍齊師杜王湫故齊人成十八年奔萊正輿子萊大夫棠萊邑也北海即墨縣有棠鄉三人帥别邑兵來解圍湫子小反徐子鳥反齊師大敗之杜敗湫等丁未入萊萊共公浮柔奔棠林浮柔萊共公名共音恭正輿子王湫奔莒莒人殺之林莒附齊故殺正輿子王湫四月陳無宇獻萊宗器于襄宫杜無宇桓子陳桓元孫襄宫齊襄公廟晏弱圍棠十一月丙辰而滅之遷萊于郳遷萊子于郳國郳五兮反高厚崔杼定其田杜定其疆界高厚高固子經乙未七年春郯子來朝郯音談夏四月三卜郊不從乃免牲稱牲既卜日也卜郊又非禮也小邾子來朝城費杜南遺假事難而城之林費季氏邑自城費而季氏始強費音祕秋季孫宿如衛八月螽無傳為災故書冬十月衛侯使孫林父來聘壬戌及孫林父盟楚公子貞帥師圍陳十有二月公㑹晉侯宋公陳侯衛侯曹伯莒子邾子于鄬杜謀救陳陳侯逃歸不成救故不書救也鄬鄭地鄬于軌反鄭伯髠頑如㑹未見諸侯丙戍卒于鄵杜實為子駟所弒以瘧疾赴故不書弒稱名為書卒同盟故也如㑹㑹於鄬也未見諸侯未至㑹所而死鄵鄭地不欲再稱鄭伯故約文上其名于㑹上林僖公弒簡公嘉立鄵七報反又采南反陳侯逃歸杜畏楚逃晉而歸林自是凡㑹同無陳矣傳七年春郯子來朝始朝公也林郯子至此始朝于魯夏四月三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也郊祀后稷以配天后稷周始祖能播殖者是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也杜啓蟄夏正建寅之月耕謂春分林周四月是建卯之月既春分而後卜郊宜卜筮之不從也言已過時蟄直立反南遺為費宰叔仲昭伯為隧正杜隧正主役徒昭伯叔仲惠伯之孫隧音遂欲善季氏而求媚於南遺謂遺請城費杜使遺請城吾多與而役故季氏城費傳言祿去公室季氏所以強小邾穆公來朝亦始朝公也杜亦郯子也秋季武子如衛報子叔之聘且辭緩報非二也杜子叔聘在元年言國家多難故不時報林子叔即公孫剽冬十月晉韓獻子告老公族穆子有廢疾穆子韓厥長子成十八年為公族大夫將立之代厥為卿辭曰詩曰豈不夙夜謂行多露詩言雖欲早夜而行懼多露之濡已義取非禮不可妄行又曰弗躬弗親庶民弗信杜詩小雅言譏在位者不躬親政事則庶民不奉信其命言已有疾不能躬親政事無忌不才讓其可乎請立起也林言已無才能以位避讓賢者可乎杜無忌穆子名起無忌弟宣子也與田蘇游而曰好仁杜田蘇晉賢人蘇言起好仁好呼報反下同詩曰靖共爾位好是正直神之聽之介爾景福杜靖安也介助也景大也詩小雅言君子當思不出其位求正直之人與之並立如是則神明順之致大福也共音恭恤民為德靖共其位所以恤民正直為正杜正己心正曲為直杜正人曲參和為仁杜德正直三者備乃為仁參七南反或音三如是則神聽之介福降之立之不亦可乎杜言起有此三德故可立庚戌使宣子朝林使韓起為卿而朝於君遂老杜韓厥致仕晉侯謂韓無忌仁使掌公族大夫林無忌能讓所以為仁掌主也穆子初為公族大夫令使主之為師長也衛公文子來聘且拜武子之言杜緩報非二之言而尋孫桓子之盟盟在成三年公登亦登禮登階臣後君一等叔孫穆子相趨進曰諸侯之㑹寡君未嘗後衛君杜敵體並登相息亮反下同今吾子不後寡君寡君未知所過林寡君未知何所過失而致有此不遜吾子其少安安徐也孫子無辭亦無悛容杜悛改也悛七全反穆叔曰孫子必亡為臣而君過而不悛亡之本也林為人臣而與國君抗禮有過而不悛改此滅亡之本也詩曰退食自公委蛇委蛇杜委蛇順貌詩召南言人臣自公門入私門無不順禮委於危反蛇以支反下同謂從者也杜從順行衡而委蛇必折杜衡橫也橫不順道必毁折為十四年林父逐君起本楚子囊圍陳㑹于鄬以救之杜晉㑹諸侯鄭僖公之為太子也於成之十六年杜魯成公與子罕適晉不禮焉又與子豐適楚亦不禮焉子豐穆公子及其元年朝于晉鄭僖元年魯襄三年子豐欲訴諸晉而廢之子罕止之及將㑹于鄬子駟相又不禮焉侍者諫不聽又諫殺之及鄵子駟使賊夜弒僖公而以瘧疾赴于諸侯傳言經所以不書弒簡公生五年奉而立之杜僖公子陳人患楚楚圍陳故慶虎慶寅謂楚人曰吾使公子黃往而執之二慶陳執政大夫公子黃哀公弟楚人從之杜為執黃二慶使告陳侯于㑹杜鄬之㑹曰楚人執公子黃矣君若不來羣臣不忍社稷宗廟懼有二圖杜背君屬楚陳侯逃歸杜鄬㑹所以不書救左傳杜林合注卷二十五
