body:
  text: 左傳杜林合注卷五十明王道焜趙如源同編哀公四傳癸亥十七年春衛侯為虎幄于藉圃杜于藉田之圍新造幄幕皆以虎獸為飾成求令名者而與之始食焉林始食以落其成成絶句大子請使良夫以良夫應為令名良夫乘衷甸兩牡衷甸一轅卿車紫衣狐裘紫衣君服至林至虎幄袒裘不釋劔而食杜食而熱故偏袒亦不敬袒音但大子使牽以退數之以三罪而殺之杜三罪紫衣袒裘帶劔三月越子伐吳吳子禦之笠澤夾水而陳越子為左右句卒句卒鉤伍相著别為左右屯陳直覲反句古侯反使夜或左或右鼓譟而進吳師分以御之越子以三軍潛涉當吳中軍而鼓之吳師大亂遂敗之杜左右句卒為聲勢以分吳軍而三軍精卒并力擊其中軍故得勝也晉趙鞅使告于衛曰君之在晉也志父為主林志父趙鞅名言我實主莊公請君若大子來以免志父林請莊公來朝或使大子來朝以免我于罪不然寡君其曰志父之為也杜恐晉君謂志父教使不來衛侯辭以難大子又使椓之杜椓訴父欲速得其處難乃旦反夏六月趙鞅圍衛齊國觀陳瓘救衛林國觀國書之子陳瓘陳恆兄觀王喚反得晉人之致師者子玉使服而見之杜釋凶服服其本服林子玉即陳瓘曰國子實執齊柄而命瓘曰無辟晉師豈敢廢命欲必敵晉子又何辱杜言不須來致師自將往戰簡子曰我卜伐衛未卜與齊戰乃還杜畏子玉楚白公之亂陳人恃其聚而侵楚杜聚積聚也楚既寧將取陳麥楚子問帥于大師子穀與葉公諸梁子穀曰右領差車與左史老林二人皆楚大夫皆相令尹司馬以伐陳其可使也杜言此二人皆嘗輔相子西子期伐陳今復可使帥所類反相息亮反下同子髙曰率賤民慢之懼不用命焉杜右領左史皆楚賤官率所類反下同子穀曰觀丁父鄀俘也武王以為軍率杜楚武王鄀音若是以克州蓼服隨唐大啓羣蠻彭仲爽申俘也文王以為令尹實縣申息杜楚文王滅申息以為縣朝陳蔡封畛于汝開封畛北至汝水畛之忍反一音真唯其任也何賤之有子髙曰天命不諂諂疑也諂徒刀反令尹有憾于陳杜十五年子西伐吳陳使貞子弔吳以此為恨天若亡之其必令尹之子是與林天意若欲亡陳其必與子西之子以為功君盍舍焉杜舍右領與左史舍音捨又音赦臣懼右領與左史有二俘之賤而無其令德也林二俘謂觀丁父彭仲爽王卜之武城尹吉武城尹子西子公孫朝使帥師取陳麥陳人御之敗遂圍陳秋七月己卯楚公孫朝帥師滅陳終鄭裨竈言五及鶉火陳卒亡王與葉公枚卜子良以為令尹枚卜不斥言所卜以令龜子良惠王弟沈尹朱曰吉過于其志杜志望也葉公曰王子而相國過將何為過相將為王也他日改卜子國而使為令尹杜子國寧也衛侯夢于北宫見人登昆吾之觀杜衛有觀在古昆吾氏之虛今濮陽城中觀工喚反被髮北面而譟曰登此昆吾之虛辭繇生之瓜綿綿瓜初生也良夫言已有以小成大之功若瓜之初生謂使衛侯得國虛去魚反余為渾良夫叫天無辜本盟當免三死而并數一時之事為三罪殺之故自謂無辜公親筮之胥彌赦占之杜赦衛筮史曰不害林言所夢不害于事與之邑置之而逃奔宋言衛侯無道卜人不敢以實對懼難而逃也衛侯貞卜正卜夢之吉凶其繇曰如魚竀尾杜竀赤也魚勞則尾赤繇直又反竀敕呈反衡流而方羊裔焉杜橫流方羊不能自安裔水邊言衛侯將若此魚衡華盲反又如字方蒲郎反大國滅之將亡闔門塞竇乃自後踰此皆繇辭冬十月晉復伐衛春伐未得志故入其郛將入城簡子曰止叔向有言曰怙亂滅國者無後不欲乘人之衰衛人出莊公而與晉平晉立襄公之孫般師而還十一月衛侯自鄄入般師出辟蒯瞶也般音班鄄音絹初公登城以望見戎州戎州戎邑問之以告林問此何地從者以戎州告公曰我姬姓也何戎之有焉杜言姬姓國何故有戎邑翦之翦壞其邑聚公使匠久久不休息公欲逐石圃杜石圃衛卿石惡從子未及而難作辛巳石圃因匠氏攻公公閉門而請弗許踰于北方而隊折股終如卜言乃自後踰隊直類反戎州人攻之大子疾公子青踰從公杜青疾弟戎州人殺之林殺大子疾公子青公入于戎州己氏己氏戎人姓己音紀又音祀初公自城上見己氏之妻髮美使髠之以為吕薑髢吕薑莊公夫人髢髲也髠苦存反髢大計反既入焉而示之璧曰活我吾與女璧己氏曰殺女璧其焉往遂殺之而取其璧衛人復公孫般師而立之十二月齊人伐衛衛人請平立公子起起靈公子女音汝焉於虔反執般師以歸林般師乃晉所立故執以歸舍諸潞杜潞齊邑公會齊侯盟于蒙杜齊侯簡公弟平公敖也蒙在東莞蒙隂縣西故蒙隂城也孟武伯相齊侯稽首公拜齊人怒武伯曰非天子寡君無所稽首武伯問于高柴曰諸侯盟誰執牛耳執牛耳尸盟者相息亮反季羔曰鄫衍之役吳公子姑曹杜季羔髙柴也鄫衍在七年發陽之役衛石魋杜發陽鄖也在十二年石魋石曼姑之子武伯曰然則彘也彘武伯名也鄫衍則大國執發陽則小國執據時執者無常故武伯自以為可執宋皇瑗之子麋杜瑗宋右師麋九皮反有友曰田丙而奪其兄酁般邑以與之林奪酁般邑以與田丙酁仕感反酁般愠而行告桓司馬之臣子儀克杜克在下邑不與魋亂故在子儀克適宋告夫人曰麋將納桓氏公問諸子仲杜子仲皇野初子仲將以杞姒之子非我為子杜為適子杞姒子仲妻麋曰必立伯也伯非我兄是良材子仲怒弗從故對曰林皇野對景公右師則老矣不識麋也杜言右師老不能為亂麋則不可知公執之執麋皇瑗奔晉林執其子故瑗懼禍出奔召之復召令還傳甲子十八年春宋殺皇瑗公聞其情林景公徐聞其情實復皇氏之族使皇緩為右師杜言宋景公無常也緩瑗從子巴人伐楚圍鄾林巴近楚小國鄾楚邑鄾音憂初右司馬子國之卜也觀瞻曰如志杜子國未為令尹時卜為右司馬得吉兆如其志觀瞻楚問卜大夫觀從之後故命之杜命以為右司馬及巴師至將卜帥王曰寧如志何卜焉杜寧子國也帥所類反使帥師而行請承承佐王曰寢尹工尹勤先君者也柏舉之役寢尹吳由于以背受戈工尹固執燧象奔吳師皆為先君勤勞三月楚公孫寧吳由于薳固敗巴師于鄾故封子國于析君子曰惠王知志杜知用其意薳干委反夏書曰官占唯能蔽志昆命于元龜林舉虞書大禹謨杜逸書也官占卜筮之官蔽斷也昆後也言當先斷意後用龜也其是之謂乎志曰聖人不煩卜筮惠王其有焉杜不疑故不卜也夏衛石圃逐其君起起奔齊齊所立故衛侯輒自齊復歸逐石圃林以圃逐兩君故逐之而復石魋與大叔遺皆蒯瞶所逐傳乙丑十九年春越人侵楚以誤吳也誤吳使不為備夏楚公子慶公孫寬追越師至冥不及乃還杜冥越地秋楚沈諸梁伐東夷報越三夷男女及楚師盟于敖杜從越之夷三種敖東夷地冬叔青如京師敬王崩故也杜言敬王能終其世終萇𢎞言東王必大克叔青叔還子林案左氏敬王崩在此年世族譜云敬王四十二年崩敬王子元王十年春秋之傳終矣則敬王崩當在哀十七年史記周本紀及十二諸侯年表敬王四十二年崩子元王仁立則敬王是魯哀十八年崩也六國年表起自元王及本紀皆云元王八年崩子定王介立是魯哀公之二十七年與杜預世族譜為異又世本云魯哀公二十年是定王介崩子元主赤立衆説不同未詳其正也傳丙寅二十年春齊人來徴會夏會于廩丘為鄭故謀伐晉杜十五年晉伐鄭廩力甚反為于偽反下同鄭人辭諸侯林不敢伐晉秋師還終叔向言晉公室卑吳公子慶忌驟諫吳子曰不改必亡弗聽杜吳子弗聽出居于艾杜艾吳邑豫章有艾縣艾五蓋反遂適楚聞越將伐吳冬請歸平越遂歸欲除不忠者以説于越吳人殺之杜言其不量力説如字又音悅十一月越圍吳趙孟降于喪食杜趙孟襄子無恤時有父簡子之喪林飲食又降于居喪楚隆曰三年之喪親昵之極也主又降之無乃有故乎杜楚隆襄子家臣趙孟曰黃池之役先主與吳王有質杜黃池在十三年先主簡子質盟信也曰好惡同之今越圍吳嗣子不廢舊業而敵之嗣子襄子自謂欲敵越救吳非晉之所能及也吾是以為降林吳晉相距甚逺非晉力之所能及也我是以為降于喪食楚隆曰若使吳王知之若何趙孟曰可乎隆曰請嘗之杜嘗試也乃往先造于越軍曰吳犯間上國多矣聞君親討焉諸夏之人莫不欣喜唯恐君志之不從請入視之林請入吳而視其動息造七報反間間厠之間許之告于吳王曰寡君之老無恤林大夫稱老無恤襄子名也使陪臣隆敢展謝其不共杜展陳也共音恭黃池之役君之先臣志父林即趙簡子得承齊盟曰好惡同之今君在難無恤不敢憚勞非晉國之所能及也使陪臣敢展布之王拜稽首曰寡人不佞不能事越以為大夫憂拜命之辱與之一簟珠杜簟小笥難乃旦反使問趙孟問遺也曰句踐將生憂寡人寡人死之不得矣林言句踐將使我生受其憂患我雖欲為之死不可得矣句古侯反主曰溺人必笑吾將有問也杜以自喻所問不急猶溺人不知所為而反笑史黯何以得為君子林史黯即晉大史蔡墨也杜晉史黯云不及四十年吳當亡吳王感問此也對曰黯也進不見惡時行則行退無謗言時止則止王曰宜哉林宜其為君子也傳丁卯二十一年夏五月越人始來越既勝吳欲霸中國始遣使適魯秋八月公及齊侯邾子盟于顧齊人責稽首杜責十七年齊侯為公稽首不見答顧齊地因歌之曰魯人之臯數年不覺使我髙蹈杜臯緩也髙蹈猶逺行也言魯人臯緩數年不知答齊稽首故使我髙蹈來為此會唯其儒書以為二國憂杜二國齊邾也言魯據周禮不肯答稽首令齊邾逺至是行也公先至于陽穀杜先期至也齊閭丘息曰君辱舉玉趾以在寡君之軍杜息閭丘明之後林先至齊地故言在寡君之軍羣臣將傳遽以告寡君比其復也君無乃勤為僕人之未次林為魯君僕從之人未有次舍傳中戀反比必利反為于偽反請除館于舟道舟道齊地辭曰敢勤僕人杜不敢勤齊僕為魯除館傳戊辰二十二年夏四月邾隱公自齊奔越曰吳為無道執父立子越人歸之大子革奔越邾隱公八年為吳所囚十年奔齊冬十一月丁卯越滅吳杜越自二十年圍吳至是滅之請使吳王居甬東甬東越地會稽句章縣東海中州也甬音勇辭曰孤老矣焉能事君乃縊越人以歸以其尸歸終史墨子胥之言也焉于虔反傳己巳二十三年春宋景曹卒杜景曹宋元公夫人小邾女季桓子外祖母季康子使冉有弔林冉有季氏家臣且送葬曰敝邑有社稷之事使肥與有職競焉肥康子名競遽也與音預是以不得助執紼林送葬者必執紼使求從輿人杜求冉有名輿衆也曰以肥之得備彌甥也彌逺也康子父之舅氏故稱彌甥有不腆先人之産馬使求薦諸夫人之宰林薦進也進諸夫人之宰不敢斥尊其可以稱旌繁乎稱舉也繁馬飾繁纓也終樂祈之言政在季氏繁步干反夏六月晉荀瑶伐齊荀瑶荀躒之孫知伯襄子髙無丕帥師禦之知伯視齊師林智伯即荀瑶馬駭遂驅之曰齊人知余旗其謂余畏而反也及壘而還將戰長武子請卜杜武子晉大夫知伯曰君告于天子而卜之以守龜于宗祧吉矣吾又何卜焉且齊人取我英丘君命瑶非敢耀武也治英丘也杜治齊取英丘守手又反以辭伐罪足矣何必卜壬辰戰于犂丘杜犂丘隰也齊師敗績知伯親禽顔庚杜顔庚齊大夫顔涿聚秋八月叔青如越始使越也越諸鞅來聘報叔青也使所吏也傳庚午二十四年夏四月晉侯將伐齊使來乞師曰昔臧文仲以楚師伐齊取穀在僖二十六年宜叔以晉師伐齊取汶陽在成二年寡君欲徼福于周公願乞靈于臧氏以臧氏世勝齊故欲乞其威靈臧石帥師會之取廩五石臧賓如之子軍吏令繕將進杜晉軍吏也繕治戰備萊章曰君卑政暴杜萊章齊大夫林晉君卑小晉政暴虐往嵗克敵禽顔庚今又勝都取廩丘天奉多矣又焉能進是躗言也林躗過也是過謬不信之言也焉于虔反躗户快反役將班矣林言晉之役已將班逺晉師乃還林果如萊章之言餼臧石牛杜生曰餼大史謝之杜晉大史大音泰曰以寡君之在行杜在軍行牢禮不度杜不如禮度敢展謝之杜終臧氏有後于魯邾子又無道越人執之以歸杜終子贛之言而立公子何何亦無道何大子革弟公子荆之母嬖荆哀公庶子將以為夫人使宗人釁夏獻其禮林宗人禮官釁夏名使獻立夫人之禮對曰無之公怒曰女為宗司立夫人國之大禮也何故無之對曰周公及武公娶于薛杜武公敖也女音汝孝惠娶于商杜孝公稱惠公弗皇商宋也林稱商避定公諱也自桓以下娶于齊杜桓公始娶文薑此禮也則有林君娶列國之女則有此禮若以妾為夫人則固無其禮也公卒立之而以荆為大子國人始惡之杜惡公惡烏路反閏月公如越得大子適郢杜適郢越王大子得相親説也將妻公而多與之地公孫有山使告于季孫季孫懼使因大宰嚭而納賂焉乃止杜嚭故吳臣也季孫恐公因越討己故懼妻七計反嚭普美反傳辛未二十五年夏五月庚辰衛侯出奔宋杜衛侯輒也衛侯為靈臺于藉圃與諸大夫飲酒焉褚師聲子襪而登席林聲子即褚師比古者見君解襪公怒辭曰臣有疾異于人杜足有創疾若見之君將殼之殼嘔吐也殼許角反又許各反是以不敢不敢解襪公愈怒大夫辭之不可杜共辭謝公公不可解褚師出公戟其手杜使其手屈肘如戟形曰必斷而足聞之褚師與司寇亥乘曰今日幸而後亡恐死以得亡為幸斷丁管反乘繩證反公之入也林在十八年奪南氏邑杜南氏子南之子公孫彌牟而奪司寇亥政公使侍人納公文懿子之車于池杜懿子公文要公有忿使人投其車于池水中初衛人翦夏丁氏在十一年以其帑賜彭封彌子杜彭封彌子彌子瑕帑音奴彌子飲公酒納夏戊之女嬖以為夫人其弟期大叔疾之從孫甥也杜期夏戊之子姊妹之孫為從孫甥與孫同列飲于鴆反大音泰從如字又才用反少畜于公以為司徒夫人寵衰期得罪公使三匠久公使優狡盟拳彌優狡俳優也拳彌衛大夫使俳優盟之欲恥辱也少時照反而甚近信之故褚師比襪登席者公孫彌牟喪邑者公文要失車者司寇亥奪政者司徒期林得罪者因三匠杜久沒者與拳彌林優狡盟者以作亂皆執利兵無者執斤斤工匠所執使拳彌入于公宫信近之故得入而自大子疾之宫林大子疾蒯瞶大子也詩疾已死故宫尚存譟以攻公鄄子士請禦之鄄子士衛大夫鄄音絹彌援其手曰子則勇矣將若君何林言不可救不見先君乎君何所不逞欲杜先君蒯瞶也亂不速奔故為戎州所殺欲令早去且君嘗在外矣豈必不反當今不可衆怒難犯休而易間也林輒出奔嘗以十八年復歸故言豈必不反其國當今不可與爭衆之方怒必不可犯衆怒休息而後易間易以䜴反間間厠之間乃出將適蒲蒲近晉邑彌曰晉無信不可將適鄄鄄齊晉界上邑彌詐不知謀故公信之彌曰齊晉爭我不可將適泠泠近魯邑泠力丁反彌曰魯不足與請適城鉏杜城鉏近宋邑以鉤越越有君林宋南近越轉相鉤牽越句踐方強故言有君乃適城鉏彌曰衛盜不可知也請速自我始乃載寶以歸杜欺衛君言君以寶自隨將致衛盜請速行已為先發而同載寶歸衛也公為支離之卒支離陳名因祝史揮以侵衛揮衛祝史衛人病之懿子知之杜知揮為內間見子之杜子之公孫彌牟文子也請逐揮文子曰無罪懿子曰彼好專利而妄杜妄不法好呼報反夫見君之入也將先道焉杜若見君有入勢必道助之若逐之必出于南門而適君所杜雖知其為君間不審察私共評之夫越新得諸侵將必請師焉揮在朝使吏遣諸其室難而逐之先逐其家揮出信弗內再宿為信內如字又音納五日乃館諸外里外里公所在遂有寵使如越請師杜請師伐衛求入六月公至自越前年行今還季康子孟武伯逆于五梧杜魯南鄙也郭重僕為公僕重直龍反又直用反見二子曰惡言多矣君請盡之二子不臣之言甚多欲使公盡極以觀之公宴于五梧武伯為祝祝上壽酒惡郭重曰何肥也杜訾毁其貌惡烏路反季孫曰請飲彘也杜飲罰之飲于鴆反以魯國之密邇仇讐臣是以不獲從君克免于大行又謂重也肥言重隨君逺行劬勞不宜稱肥從才用反又如字公曰是食言多矣能無肥乎以激三桓之數食言飲酒不樂林言語相猜故飲酒失觀樂音洛公與大夫始有惡為二十七年公孫邾起傳壬申二十六年夏五月叔孫舒帥師會越臯如后庸宋樂茷納衛侯杜舒武叔之子文子也臯如后庸越大夫樂茷宋司城子潞衛侯輒也茷扶廢反文子欲納之林文子即彌牟懿子曰君愎而虐少待之必毒于民乃睦于子牟林言衛君愎狠而暴虐若少待之必貽毒于吾民民畏君虐乃親睦于子矣愎皮逼反師侵外州大獲越納輒之師出禦之大敗衛師敗掘褚師定子之墓焚之于平莊之上杜定子褚師比之父也平莊陵名也文子使王孫齊私于臯如杜齊衛大夫王孫賈之子昭子也曰子將大滅衛乎抑納君而已乎臯如曰寡君之命無他納衛君而已文子致衆而問焉曰君以蠻夷伐國國幾亡矣請納之衆曰勿納曰彌牟亡而有益請自北門出林文子自言若我出亡而有補于衛國請自衛北門以出奔杜欲以觀衆心幾音祈又音機衆曰勿出林衆方親睦于文子故使勿出重賂越人申開守陴而納公杜申重也開重門而嚴設守備欲以恐公使不敢入陴毗支反公不敢入師還立悼公悼公蒯瞶庶弟公子黚也南氐相之林南氏即公孫彌牟相息亮反以城鉏與越人公曰期則為此杜司徒期也林言逐君之事司徒期為之令苟有怨于夫人者報之杜夫人期姊也怒期而不得加戮故敕宫女令苦困期姊令力呈反司徒期聘于越杜為悼公聘公攻而奪之幣期告王杜越王也王命取之期以衆取之公怒殺期之甥之為大子者忿期而及其姊為夫人者遂復其夫人之子遂卒于越終言之也終效夷言死于夷宋景公無子取公孫周之子得與啓畜諸公宫杜周元公孫子高也得昭公也啓得弟畜養也未有立焉于是皇緩為右師皇非我為大司馬皇懷為司徒皇懷非我從昆弟靈不緩為左師不緩子靈圍龜之後樂茷為司城茷樂溷之子樂朱鉏為大司寇朱鉏樂挽之子六卿林右師大司馬司徒左師司城大司寇三族降聽政杜三族皇靈樂也降和同也因大尹以達大尹近官有寵者六卿因之以自通達于君大尹常不告而以其欲稱君命以令杜不告君也國人惡之司城欲去大尹左師曰縱之使盈其罪杜盈滿也惡烏路反重而無基能無敝乎杜言勢重而無德以為基必敗也冬十月公遊于空澤空澤宋邑辛巳卒于連中連中館名大尹興空澤之士千甲甲士千人奉公自空桐入如沃宫杜奉公尸也梁國虞縣東南有地名空桐沃宫宋都內宫名使召六子曰聞下有師君請六子畫林言下國將有師旅宋君請六卿共畫計䇿六子至以甲劫之曰君有疾病請二三子盟乃盟于少寢之庭曰無為公室不利大尹立啓奉喪殯于大宫三日而後國人知之司徒茷使宣言于國曰大尹惑蠱其君而専其利今君無疾而死死又匿之是無他矣大尹之罪也言大尹所弒少詩照反大宫音泰得夢啓北首而寢于盧門之外林得即昭公景公所畜公孫周之子也杜盧門宋東門北首死象在門外失國也首手又反己為烏而集于其上林得又自夢身化為烏而集于啓之上咮加于南門尾加于桐門曰余夢美必立林咮鳥啄也杜桐門北門咮張又反大尹謀曰我不在盟杜少寢盟但以君命盟六卿大尹不盟無乃逐我復盟之乎林復與六卿為盟而後可使祝為載書六子在唐盂地名將盟之祝襄以載書告皇非我杜襄祝名皇非我因子潞杜子潞樂茷門尹得杜樂得左師謀曰民與我逐之乎林言宋國之民與我親昵何不逐大尹皆歸授甲使徇于國曰大尹惑蠱其君以陵虐公室與我者救君者也衆曰與之大尹徇曰戴氏皇氏將不利公室戴氏即樂氏與我者無憂不富衆日無别惡其號令與君無别别彼列反戴氏皇氏欲伐公公謂啓樂得曰不可彼以陵公有罪林彼謂大尹我伐公則甚焉使國人施于大尹杜施罪于大尹大尹奉啓以奔楚乃立得司城為上卿盟曰三族共政無相害也衛出公自城鉏使以弓問子贛且曰吾其入乎子贛稽首受弓對曰臣不識也林言臣不識其所由入私于使者曰昔成公孫于陳僖二十八年衛成公奔楚遂適陳使所吏反孫音遜寧武子孫莊子為宛濮之盟而君入杜盟在僖二十八年濮音卜獻公孫于齊在襄十四年孫音遜下同子鮮子展為夷儀之盟而君入杜在襄二十六年今君再在孫矣杜謂十五年孫魯今又孫宋內不聞獻之親外不聞成之卿林內而兄弟則不聞有獻公推挽之義外而諸臣又不聞有成公盡忠之卿則賜不識所由入也詩曰無競惟人四方其順之杜詩周頌言無強惟得人也林按詩大雅抑詩周頌烈文詩並有此二句皆作四方其訓之若得其人四方以為主杜為主主四方而國于何有傳癸酉二十七年春越子使后庸來聘且言邾田封于駘上杜欲使魯還邾田封竟至駘上駘他來反又音臺二月盟于平陽西平陽三子皆從季康子叔孫文子孟武伯皆從后庸盟康子病之杜恥從蠻夷盟言及子贛思子贛曰若在此吾不及此夫杜不及與越盟林蓋子贛十二年嘗辭吳盟故思之夫音扶武伯曰然何不召曰固將召之文子曰他日請念言季孫不能用子贛臨難而思之夏四月己亥季康子卒公弔焉降禮禮不備也言公之多妄晉荀瑤帥師伐鄭次于桐丘林荀瑤即知襄子鄭駟𢎞請救于齊𢎞駟歂子齊師將興陳成子屬孤子三日朝屬會死事者之子使朝三日以禮之屬音燭設乘車兩馬繫五邑焉杜乘車兩馬大夫服又加之五邑乘繩證反下同召顔涿聚之子晉曰隰之役而父死焉杜隰役在二十三年以國之多難未女恤也今君命女以是邑也服車而朝毋廢前勞乃救鄭及留舒違穀七里穀人不知杜言其整也留舒齊地違去也難乃旦反女音汝毋音無及濮雨不涉濮水在陳留酸棗縣傍河東北經濟隂至髙平入濟子思曰大國在敝邑之宇下是以告急今師不行恐無及也杜子思國參成子衣製杖戈製雨衣也衣于既反立于阪上馬不出者助之鞭之杜軍中之馬畏而不肯出者助軍入鞭其馬知伯聞之林即知襄子乃還畏其得衆心曰我卜伐鄭不卜敵齊使謂成子曰大夫陳子陳之自出陳之不祀鄭之罪也十七年楚獨滅陳非鄭之罪蓋知伯誣陳子故陳子怒謂其多陵人故寡君使瑤察陳衷焉林衷善也謂晉君使已察陳之善以討鄭罪謂大夫其恤陳乎若利本之顛瑤何有焉杜言陳滅于已無傷成子怒曰多陵人者皆不在知伯其能久乎林言人之多侵侮他人者皆不在于其位知伯陵人如此其能久于其位乎中行文子告成子杜文子荀寅此時奔在齊行户郎反曰有自晉師告寅者將為輕車千乘以厭齊師之門則可盡也成子曰寡君命恆曰無及寡無畏衆林寡弱者無陵暴之衆強者無畏避之雖過千乘敢避之乎將以子之命告寡君杜成子疑其有為晉之心也輕遣政反厭于甲反又于輒反文子曰吾乃今知所以亡杜自恨己無知君子之謀也始衷終皆舉之而後入焉杜謀一事則當慮此三變然後入而行之所謂君子三思今我三不知而入之不亦難乎悔其言不可復公患三桓之侈也欲以諸侯去之杜欲求諸侯師以逐三桓三桓亦患公之妄也故君臣多間杜間隙也公遊于陵阪遇孟武伯于孟氏之衢曰請有問于子余及死乎問已可得以夀死不對曰臣無由知之三問卒辭不對公欲以越伐魯而去三桓秋八月甲戌公如公孫有陘氏杜有陘氏即有山氏因孫于邾乃遂如越國人施公孫有山氏林施罪于有山氏以公自其家出故也終子贛之言君不沒于魯因孫音遜悼之四年晉荀瑶帥師圍鄭悼公哀公之子寧也哀公出孫魯人立悼公未至鄭駟𢎞曰知伯愎而好勝早下之則可行也杜行去也林早服而為之下則可以去其師好呼報反下户嫁反乃先保南里以待之林保守也南里在城外知伯入南里門于桔柣之門鄭人俘􅈶魁壘杜􅈶魁壘晉士桔户結反柣入結反􅈶户圭反賂之以知政欲使反為鄭閉其口而死林晉魁壘閉口不答而死將門杜攻鄭門知伯謂趙孟入之對曰主在此主謂知伯言主在此何不自入知伯曰惡而無勇何以為子杜惡貌醜也簡子廢嫡子伯魯而立襄子故知伯言其醜且無勇何故立以為子對曰以能忍恥庶無害趙宗乎知伯不悛趙襄子由是惎知伯惎毒也悛七全反惎其冀反遂喪之知伯貪而愎故韓魏反而喪之史記晉懿公之四年魯悼公之十四年知伯帥韓魏圍趙襄子于晉陽韓魏反與趙氏謀殺知伯于晉陽之下在春秋後二十七年喪息浪反左傳杜林合注卷五十
