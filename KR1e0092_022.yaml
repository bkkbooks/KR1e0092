body:
  text: 左傳杜林合注卷二十二明王道焜趙如源同編成公二經甲戌四年春宋公使華元來聘林宋使聘魯三月壬申鄭伯堅卒杜無傳二年大夫盟于蜀壬申二月二十八日襄公卒悼公費立杞伯來朝夏四月甲寅臧孫許卒無傳公如晉葬鄭襄公無傳秋公至自晉冬城鄆無傳公欲叛晉故城而為備鄆音運鄭伯伐許傳四年春宋華元來聘通嗣君也杜宋共公即位杞伯来朝歸叔姬故也杜將出叔姬先備禮朝魯言其故夏公如晉侯侯見公不敬季文子曰晉侯必不免杜言将不能夀終也後十年陷厠而死詩曰敬之敬之天惟顯思命不易哉杜詩頌言天道顯明受其命甚難不可不敬以奉之易以䜴反夫晉侯之命在諸侯矣可不敬乎林夫晉侯之受天命在得諸侯而為伯矣敬諸侯則得天命可不盡敬乎秋公至自晉欲求成于楚而叛晉林成公以晉侯不見禮故欲叛晉而求成於楚季文子曰不可晉雖無道未可叛也國大臣睦而邇於我杜邇近也諸侯聴焉未可以貳杜聴服也史佚之志有之杜周文王大史曰非我族類其心必異楚雖大非吾族也其肯字我乎公乃止林言凡人之非我宗族儔類者則必不能與我同心楚雖大國與魯異姓必不肯字愛於我也冬十一月鄭公孫申帥師疆許田杜前年鄭伐許侵其田今正其界疆居良反許人敗諸展陂鄭伯伐許取鉏任泠敦之田杜展陂亦許地林鄭悼公怒乃親伐許取許鉏任泠敦之田陂彼皮反鉏仕居反任音壬泠力丁反晉欒書將中軍代卻克將子匠反荀首佐之士燮佐上軍林荀庚將上軍不行故佐獨出以救許伐鄭取汜祭杜汜祭鄭地成臯縣東有汜水汜音凡或音祀祭側介反楚子反救鄭鄭伯與許男訟焉杜於子反前争曲直皇戍攝鄭伯之辭杜代之對子反不能決也曰君若辱在寡君寡君與其二三臣共聴兩君之所欲成其可知也林君若屈辱自至楚國楚君與其二三卿士共聴二國之君之所欲為二國之平其可知也成平也不然側不足以知二國之成杜側子反名為明年許愬鄭於楚張本晉趙嬰通于趙荘姬杜趙嬰趙盾弟荘姬趙朔妻朔盾之子言趙嬰通于荘姬是叔父下淫其姪婦經乙亥五年春王正月杞叔姬来歸出也傳在前年仲孫蔑如宋夏叔孫僑如㑹晉荀首于穀穀齊地梁山崩杜記異也梁山在馮翊夏陽縣北秋大水無傳冬十有一月己酉天王崩杜定王崩簡王立十有二月己丑公㑹晉侯齊侯宋公衛侯鄭伯曺伯邾子杞伯同盟于蟲牢杜蟲牢鄭地陳留郡封丘縣北有桐牢傳五年春原屏放諸齊杜放趙嬰也原同屏季嬰之兄林放者宥之以逺也屏步丁反嬰曰我在故欒氏不作我亡吾二昆其憂哉林言我仕晉國故欒氏不敢作亂以害趙氏我若出亡原屏其有憂患哉言必為欒氏所害且人各有能有不能杜言已雖滛而能今莊姬䕶趙氏舍我何害弗聴嬰夢天使謂已林夢上天使人謂已舍音捨又音赦聴吐丁反祭余余福女使問諸士貞伯貞伯曰不識也既而告其人林貞伯不欲顯答故對曰不知也既答趙嬰使者而貞伯自告其従人女音汝曰神福仁而禍淫淫而無罰福也林言鬼神之道仁愛者降之福滛亂者降之禍所行淫亂而罰不及此即天之所謂福也祭其得亡乎杜以得放遣為福祭之之明曰而亡為八年晉殺趙同趙括傳孟獻子如宋報華元也杜前年宋華元来聘夏晉荀首如齊逆女故宣伯餫諸榖林荀首晉次卿宣伯即僑如野饋曰餫運糧饋之敬大國也餫音鄆梁山崩晉侯以傳召伯宗杜傳驛傳中戀反下同伯宗辟重曰辟重林伯宗道遇重載之車使之避已曰辟傳車辟匹亦反徐甫赤反本又作僻曰辟音避重人曰待我不如捷之速也杜捷邪出林言車重行遲若待我回避不如傳車邪出之為速捷在妾反問其所林伯宗見其言有理因問其所居曰絳人也問絳事焉曰梁山崩将召伯宗謀之問將若之何曰山有朽壤而崩可若何國主山川林言山以土壤朽腐故崩不可如何也主謂所主祭言國所主祭者山川也絳古巷反壤如丈反故山崩川竭君為之不舉林去盛饌不舉樂為于偽反降服捐盛服乗縵杜車無文縵武旦反又莫半反徹樂息八音出次杜舍於郊祝幣杜陳玉帛史辭林大史修言辭以謝過責己以禮焉杜禮山川其如此而已雖伯宗若之何伯宗請見之杜見之於晉君見賢遍反不可杜不肯見遂以告而従之杜従重人言許靈公愬鄭伯于楚前兩年鄭伐許故六月鄭悼公如楚訟不勝楚人執皇戍及子國杜以鄭伯不直故也子國鄭穆公子故鄭伯歸使公子偃請成于晉林鄭伯怨楚不直已故請成于晉秋八月鄭伯及晉趙同盟于垂棘垂棘晉地宋公子圍龜為質于楚而歸杜圍龜文公子質音致華元享之請鼓譟以出鼓譟以復入杜出入輒撃鼓譟素報反復扶又反曰習攻華氏宋公殺之杜葢宣十五年宋楚平後華元使圍龜代己為質故怨而欲攻華氏冬同盟于蟲牢鄭服也諸侯謀復㑹宋公使向為人辭以子靈之難杜子靈圍龜也宋公不欲㑹以新誅子靈為辭為明年侵宋傳向舒亮反難乃旦反一本無之難二字十一月己酉定王崩經在蟲牢盟上傳在下月倒錯衆家傳悉無此八字或衍文經丙子六年春王正月公至自㑹無傳二月辛巳立武宫魯人自鞌之功至今無患故築武軍又作先君武公宫以告成事欲以示後世取鄟杜附庸國也鄟徐音専又市臠反衛孫良夫帥師侵宋夏六月邾子来朝無傳公孫嬰齊如晉嬰齊叔肹子壬申鄭伯費卒杜前年同盟蟲牢林悼公卒弟成公睔立費音祕秋仲孫蔑叔孫僑如帥師侵宋楚公子嬰齊帥師伐鄭林楚始書大夫將也自是必圍滅也而後貶人之冬季孫行父如晉晉欒書帥師救鄭傳六年春鄭伯如晉拜成杜謝前年再盟子游相杜子游公子偃相息亮反下甯相同授玉于東楹之東杜禮授玉兩楹之間鄭伯行疾故東過士貞伯曰鄭伯其死乎自棄也已視流而行速不安其位宜不能久林視流不端諦也行速不詳緩也兩楹之間諸侯授玉之位也今東過故言不安其位二月季文子以鞌之功立武宫非禮也宣十二年潘黨勸楚子立武軍楚子答以武有七徳非已所堪其為先君宫告成事而已今魯倚晉之功又非霸主而立武宫故譏之聴於人以救其難不可以立武立武由己非由人也言請人救難勝非己功難乃旦反取鄟言易也林不用師徒言易取也易以豉反三月晉伯宗夏陽説衛孫良夫甯相鄭人伊雒之戎陸渾蠻氏侵宋杜夏陽説晉大夫蠻氏戎别種也河南新城縣東南有蠻城經惟書衛孫良夫獨衛告也夏户雅反説音悦渾户門反以其辭㑹也辭㑹在前年師于鍼衛人不保杜不守備鍼其亷反一音針說欲襲衛曰雖不可入多俘而歸有罪不及死林言雖不可入衛之國多執俘獲而歸縱使有罪不至當死伯宗曰不可衛唯信晉故師在其郊而不設備若襲之是棄信也雖多衛俘而晉無信何以求諸侯乃止師還衛人登陴林城之有陴所以備戰鬬也衛人登陴聞夏陽說之謀故陴毗支反晉人謀去故絳杜著復命新田為絳故謂此故絳諸大夫皆曰必居郇瑕氏之地杜郇瑕古國名河東解縣西北有郇城郇音旬沃饒而近盬杜盬鹽也猗氏縣盬池是林言其地沃衍其俗富饒且近盬鹽之地盬音占國利君樂不可失也林民富則國享其利國利則君享其樂樂音洛下謂樂同韓獻子將新中軍且為僕大夫林韓獻子即韓厥三年晉作六軍韓獻子將新中軍兼大僕之職將子匠反公揖而入獻子従公立於寢庭言韓獻子欲進計乃従公而入立於路寝之庭謂獻子曰何如杜問諸大夫言是非對曰不可郇瑕氏土薄水淺杜土薄地下其惡易覯杜惡疾疢覯成也易以豉反覯古豆反易覯則民愁民愁則墊隘杜墊隘羸困也林惡疾易成則民人愁歎民人愁歎則必至羸困墊丁念反隘於賣反於是乎有沈溺重膇之疾杜沈溺濕疾重膇足腫溺乃厯反膇治偽反一音直嫓反不如新田杜今平陽絳邑縣土厚水深居之不疾以髙深故有汾澮以流其惡杜汾水出太原經絳北西南入河澮水出平陽絳縣南西入汾惡垢穢汾扶云反澮古外反且民従敎杜無災患林其民醇厚従上之敎令十世之利也林國君即位為一世此言十世之利取其數之小成也夫山澤林盬國之寳也林髙阜為山止水為澤草木為林鹽鹵為盬四者乃利源所出故為有國之寳國饒則民驕佚杜財易致則民驕侈佚音迭近寳公室乃貧不可謂樂林近寳則民皆逐末而不務本貧富不等富者不可増税貧者易致流亡此公室所由以貧困也公說従之夏四月丁丑晉遷于新田為季孫如晉傳説音悅六月鄭悼公卒終士貞伯之言子叔聲伯如晉命伐宋杜晉人命聲伯林聲伯即嬰齊秋孟獻子叔孫宣伯侵宋晉命也楚子重伐鄭鄭従晉故也杜前年従晉盟冬季文子如晉賀遷也林賀晉遷都新田晉欒書救鄭與楚師遇於繞角繞角鄭地楚師還晉師遂侵蔡楚公子申公子成以申息之師救蔡杜申息楚二縣禦諸桑隧杜汝南朗陵縣東有桑里在上蔡西南隧音遂趙同趙括欲戰請於武子武子將許之杜武子欒書知荘子荀首中軍佐范文子士燮上軍佐韓獻子韓厥新中軍將諫曰不可吾來救鄭楚師去我吾遂至於此是遷戮也林本意為来救鄭楚子重還師不與我校吾遂事侵蔡以至於此是因救鄭而遷怒以戮蔡戮而不己又怒楚師戰必不克遷戮不義怒敵難當故不克雖克不令言雖勝楚師而不可以號令於衆成師以出而敗楚之二縣何榮之有焉杜六軍悉出故曰成師以大勝小不足為榮若不能敗為辱已甚不如還也乃遂還於是軍帥之欲戰者衆或謂欒武子曰聖人與衆同欲是以濟事子盍従衆杜盍何不也師所類反盍户臘反子為大政杜中軍元帥將酌於民者也杜酌取民心以為政子之佐十一人杜六軍之卿佐其不欲戰者三人而已杜知范韓也欲戰者可謂衆矣商書曰三人占從二人衆故也杜商書洪範林言今若使三人同占吉凶若二人言吉一人言凶則當従二人所言武子曰善鈞従衆杜鈞等也林言所見皆善鈞等如一則以其衆而従之夫善衆之主也三卿為主可謂衆矣林人心所同然者善故曰衆之主也杜三卿皆晉之賢人從之不亦可乎傳善欒書得從衆之義經丁丑七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛無傳稱牛未十日免放也免牛可也不郊非禮也鼷音兮吳伐郯林吳始見經吳始入伐中國郯音談夏五月曺伯來朝不郊猶三望無傳書不郊猶有事三望非禮秋楚公子嬰齊帥師伐鄭公㑹晉侯齊侯宋公衛侯曺伯莒子邾子杞伯救鄭八月戊辰同盟于馬陵杜馬陵衛地陽平元城縣東南有地名馬陵林史記馬陵道陿而旁多阻隘可伏兵公至自㑹無傳吳入州來杜州来楚邑淮南下蔡縣是也林吳楚之交兵不書至是始書之傳曰是以始大通吳於上國晉人為之也冬大雩無傳書過衛孫林父出奔晉傳七年春吳伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤杜伐整也旅衆也林傳例出曰治兵入曰振旅此言中國不振旅者葢以晉景自邲之敗中國不能振整師旅而歸無弔者也夫言中國不能相愍恤故夷狄内侵夫音扶詩曰不弔昊天亂靡有定其此之謂乎詩小雅刺在上者不能弔愍下民故號天告亂林言昊天不愍弔下民禍亂靡有定時昊户老反有上不弔其誰不受亂杜上謂霸主林言有伯主而不愍弔小國其誰不被受蠻夷之禍亂吾亡無日矣君子曰知懼如是斯不亡矣林謂季文子因吳伐郯而知恐懼修省之道斯不至於滅亡矣鄭子良相成公以如晉見且拜師謝前年晉救鄭之師為楚伐鄭張本想息亮反見賢遍反夏曺宣公来朝秋楚子重伐鄭師于汜汜鄭地在襄城縣南汜音凡諸侯救鄭鄭共仲侯羽軍楚師杜二子鄭大夫也軍楚師攻楚師也共音恭囚鄖公鍾儀林鍾儀是鄖縣大夫鄖音云獻諸晉八月同盟于馬陵尋蟲牢之盟且莒服故也杜蟲牢盟在五年莒本屬齊齊服故莒従之晉人以鍾儀歸囚諸軍府軍藏府也為九年晉侯見鍾儀張本楚圍宋之役在宣十四年師還子重請取於申吕以為賞田王許之林申吕楚二邑杜分申吕之田以自賞申公巫臣曰不可此申吕所以邑也是以為賦以御北方若取之是無申吕也杜言申吕賴此田成邑耳不得此田則無以出兵賦而二邑壊也所以邑也一本作所邑也御魚吕反晉鄭必至于漢王乃止子重是以怨巫臣子反欲取夏姬巫臣止之遂取以行林事俱載在元年傳巫臣與夏姬滛奔並在二年子反亦怨之及共王即位杜楚共王以魯成公元年即位共音恭子重子反殺巫臣之族子閻子蕩及清尹弗忌杜皆巫臣子族閻音鹽及襄公之子黑要杜以夏姬故并怨黑要要一遥反而分其室子重取子閻之室使沈尹與王子罷分子蕩之室子反取黑要與清尹之室巫臣自晉遺二子書杜子重子反罷音皮下同遺唯季反曰爾以讒慝貪惏事君而多殺不辜林讒慝指其譖善貪惏指其分室也慝他得反惏力舍反余必使爾罷於奔命以死巫臣請使於吳晉侯許之吳子夀夢說之乃通吳于晉杜夀夢季札父林先是吳人自安僻陋未甞與中國相通至是巫臣困楚乃通吳于晉使所吏反夢莫公反說音悦以兩之一卒適吳舍偏兩之一焉杜司馬法百人為卒二十五人為兩車九乗為小偏十五乗為大偏葢留九乗車及一兩二十五人今吳習之卒子忽反舍音赦舊音捨與其射御敎吳乗車敎之戰陳敎之叛楚林先是吳末甞射御故巫臣與其射御未甞乗車故巫臣教吳乗車未識戰陳之法故巫臣教之戰陣吳甞反屬楚故巫臣敎之叛楚陳直覲寘其子狐庸焉使為行人於吳吳始伐楚伐巢伐徐杜巢徐楚屬國寘之豉反子重奔命杜救徐巢馬陵之㑹吳入州来子重自鄭奔命杜因伐鄭而行子重子反於是乎一嵗七奔命杜吳人一嵗之間七為楚害故子重子反凡七奔命蠻夷屬於楚者吳盡取之是以始大通吳於上國杜上國諸夏衛定公惡孫林父冬孫林父出奔晉林父孫良夫之子惡烏路反衛侯如晉晉反戚焉杜戚林父邑林父出奔戚隨屬晉林晉因衛来朝而反其戚邑戚七犾反經戊寅八年春晉侯使韓穿来言汶陽之田歸之于齊齊服事晉故晉来語魯使還二年所取田晉欒書帥師侵蔡公孫嬰齊如莒宋公使華元来聘夏宋公使公孫夀来納幣杜昏聘不使卿今華元將命故特書之宋公無主昏者自命之故稱使也公孫夀蕩意諸之父晉殺其大夫趙同趙括傳曰原屏咎之徒也明本不以徳義自居宜其見討故従告辭而稱名秋七月天子使召伯來賜公命杜諸侯即位天子賜以命圭與之合瑞八年乃來緩也天子天王王者之通稱林賜命止此冬十月癸卯杞叔姬卒前五年来歸者女既適人雖見出棄猶以成人禮書之終為杞伯所葬故稱杞叔姬晉侯使士燮來聘叔孫僑如㑹晉士燮齊人邾人伐郯先謀而稱㑹盟主之命不同之於列國衛人來媵古者諸侯取適夫人及左右媵各有姪娣皆同姓之國國三人凡九女所以廣繼嗣也魯將嫁伯姬於宋故衛來媵之媵以證反傳八年春晉侯使韓穿來言汶陽之田歸之于齊季文子餞之杜餞送行飲酒餞錢淺反送去食也字林子扇反毛詩箋云祖而舍軷飲酒於其側曰餞私焉杜私與之言曰大國制義以為盟主是以諸侯懐徳畏討無有貳心林言大國制合宜之義以為諸侯之盟主是以諸侯懐盟主之恩徳而畏盟主之討伐不敢有攜貳之心謂汶陽之田敝邑之舊也而用師於齊使歸諸敝邑杜用師鞌之戰今有二命曰歸諸齊信以行義義以成命林人之守信所以行其合宜之義人之守義所以成其惟行不惟反之命令小國所望而懐也信不可知義無所立林言守一之信則或予或奪而信不可知言合宜之義則奪魯予齊而義無所立四方諸侯其誰不解體杜言不復肅敬於晉詩曰女也不爽士貳其行士也罔極二三其徳杜爽差也極中也詩衛風婦人怨大夫不一其行喻魯事晉猶女之事夫不敢過差而晉有罔極之心反二三其徳行下孟反七年之中一與一奪二三孰甚焉士之二三猶喪妃耦而況霸主林丈夫一身也若二三其徳女有怨心猶喪失其妃耦何況晉國實為諸侯之霸主喪息浪反妃音配霸主將徳是以杜以用也林為霸主者将德是用而二三之其何以長有諸侯乎詩曰猶之未逺是用大簡杜猶圖也簡諫也詩大雅言王者圖事不逺故用大道諫之長如字一音丁丈反行父懼晉之不逺猶而失諸侯也是以敢私言之晉欒書侵蔡六年未得志故遂侵楚獲申驪杜申驪楚大夫林生死皆曰獲驪方馳反楚師之還也杜謂六年遇於繞角時晉侵沈獲沈子揖初従知范韓也杜繞角之役欒書従知荘子范文子韓獻子之言不與楚戰自是常従其謀師出有功故𫝊善之沈國今汝南平與縣揖徐音集又於立反君子曰従善如流宜哉林言欒書従知范韓之善如流水之赴壑杜宜冇功也如流愈速詩曰豈弟君子遐不作人杜遐逺也作用也詩大雅言文王能逺用善人不語助愷開在反樂也悌徒禮反易也求善也夫作人斯有功績矣是行也鄭伯將㑹晉師杜㑹伐蔡之師夫音扶門于許東門大獲焉杜過許見其無備因攻之聲伯如莒逆也自為逆婦而書者因聘而逆婦宋華元來聘聘共姬也杜穆姜之女成公姊妹為宋共公夫人聘不應使卿故傳發其事而已共音恭夏宋公使公孫夀來納幣禮也約幣應使卿晉趙荘姬為趙嬰之亡故譖之于晉侯杜趙嬰亡在五年曰原屏將為亂欒郤為徵杜欒氏卻氏亦徵其為亂六月晉討趙同趙括武従姬氏畜于公宫杜趙武莊姬之子荘姬晉成公女畜養也以其田與祁奚韓厥言於晉侯曰成季之勲宣孟之忠林成季即趙哀有従晉文公出亡之勲宣孟即趙盾有相晉擁立靈成之忠祁互之反字林上尸反而無後為善者其懼矣三代之令王皆數百年保天之禄夫豈無辟王賴前哲以免也杜言三代亦有邪辟之君但賴其先人以免禍耳數所主反辟匹亦反哲陟列反周書曰不敢侮鰥寡所以明徳也杜周書康誥言文王不侮鰥寡而妻徳益明欲使晉侯之法文王無曰鰥無夫曰寡厥欲晉景恤趙孤以法文王侮亡甫反鰥古頑反乃立武而反其田焉林以賜祁奚之田復歸趙氏秋召桓公來賜公命杜召桓公周卿士林即召伯晉侯使申公巫臣如吳假道于莒與渠丘公立於池上杜渠丘公莒子朱也池城池也渠丘邑名莒縣有蘧里曰城已惡莒子曰辟陋在夷其孰以我為虞杜虞度也林言莒國僻陋介在蠻夷其孰虞度思併我國已惡如字己猶大也本或作城已惡矣對曰夫狡焉杜狡猾之人狡交夘反思啟封疆以利社稷者何國蔑有唯然故多大國矣林唯其如此所以强凌弱衆暴寡大國日衆疆居良反唯音維本或作雖後人改也唯或思或縱也杜世有思開封疆者有縱其暴掠者莒人當唯此為命勇夫重閉況國乎林匹夫之勇而且重闗以待暴客況有國有家而不設備乎杜為明年莒潰傳重直龍反又直勇反閉補計反又蒲結反一音户旦反冬杞叔姬卒來歸自杞故書愍其見出来歸故書卒也若更適大夫則不復書卒晉士燮来聘言伐郯也以其事吳故七年郯與吳成公賂之請緩師文子不可杜文子士燮曰君命無貳失信不立禮無加貨事無二成林言受君命者不敢有攜貳之心失信於君則無以自立朝聘有贈賄之禮無以加貨況受賂乎公私之事不能兩成君後諸侯是寡君不得事君也杜欲與魯絶後如字徐音胡豆反燮將復之林燮將以魯請緩師復於晉君季孫懼使宣伯帥師㑹伐郯衛人來媵共姬禮也林同姓相媵故為有禮凡諸侯嫁女同姓媵之異姓則否必以同姓者參骨肉至親所以息隂訟經己夘九年春王正月杞伯來逆叔姬之喪以歸公㑹晉侯齊侯宋公衛侯鄭伯曺伯莒子杞伯同盟于蒲杜蒲衛地在長垣縣西南公至自㑹無傳二月伯姬歸于宋宋不使卿逆非禮夏季孫行父如宋致女女嫁三月又使大夫隨加聘問謂之致女所以致成婦禮篤昏姻之好晉人來媵媵伯姬也秋七月丙子齊侯無野卒杜無傳五同盟丙子六月一日書七月従赴林頃公卒子靈公環立晉人執鄭伯杜鄭伯既受盟于蒲又受楚賂㑹於鄧故晉執之稱人者晉以無道於民告諸侯例在十五年晉欒書帥師伐鄭冬十有一月葬齊頃公無傳頃音傾楚公子嬰齊帥師伐莒庚申莒潰杜民逃其上曰潰楚人入鄆杜鄆莒别邑也楚偏師入鄆故稱人林伐稱名入稱人書法與㑹蜀盟蜀同秦人白狄伐晉鄭人圍許城中城杜魯邑也在東海廩丘縣西南此閏月城在十一月之後十二月之前故傳曰書時傳九年春杞桓公来逆叔姬之喪請之也杜叔姬已絶於杞魯復强請杞使還取葬杞叔姬卒為杞故也還為杞婦故卒稱杞為于偽反下為歸汶陽同逆叔姬為我也杜既棄而復逆其喪明為魯故逆叔姬絶句為我也本或無為同為歸汶陽之田故諸侯貳於晉杜歸田在前年林諸侯不義於晉皆有貳心晉人懼㑹於蒲以尋馬陵之盟馬陵在七年季文子謂范文子曰徳則不競尋盟何為杜競强也林言晉不自强於修徳徒尋盟誓何所能為范文子曰勤以撫之寛以待之堅彊以御之明神以要之柔服而伐貳徳之次也林勤力以撫諸侯寛恕以待諸侯堅恕强毅以駕御諸侯質信明神以要結諸侯懐柔諸侯之服従者討伐諸侯之攜貳者此數者雖不可比於俢徳抑亦徳之次也御魚吕反要一遥反是行也將始㑹吳吳人不至為十五年㑹鍾離傳二月伯姬歸于宋為致女復命起楚人以重賂求鄭鄭伯㑹楚公子成于鄧為晉人執鄭伯傳夏季文子如宋致女復命公享之賦韓奕之五章杜韓奕詩大雅篇名其五章言蹶父嫁女於韓侯為女相所居莫如韓樂文子喻魯侯有蹶父之德宋公如韓侯宋土如韓樂穆姜出于房再拜曰大夫勤辱不忘先君以及嗣君施及未亡人杜穆姜伯姬母閒文子言宋樂喜而出謝其勞婦人夫死自稱未亡人施以豉反先君猶有望也言先君亦望文子之若此敢拜大夫之重勤又賦緑衣之卒章而入杜緑衣詩弼風也取其我思古人實獲我心喻文子言得已意重直勇反又直用反晉人來媵禮也杜同姓故秋鄭伯如晉晉人討其貳於楚也執諸銅鞮銅鞮晉别縣在上黨鞮丁兮反欒書伐鄭鄭人使伯蠲行成林伯蠲鄭行人行成求成于晉也蠲古𤣥反又音圭晉人殺之非禮也兵交使在其間可也林非待行人之禮二國以兵相交使者在於兩師之間可也林明殺行人例使所吏反楚子重侵陳以救鄭杜陳與晉故晉侯觀于軍府見鍾儀問之曰南冠而縶者誰也杜南冠楚冠縶拘執縶中立反有司對曰鄭人所獻楚囚也使税之杜鄭獻鍾儀在七年税解也税吐活反徐始鋭反召而弔之林召鍾儀而弔其被囚再拜稽首問其族對曰泠人也杜泠人樂官泠力丁反依字作伶公曰能樂乎對曰先父之職官也敢有二事杜言不敢學他事使與之琴操南音杜南音楚聲操七刀反下同公曰君王何如對曰非小人之所得知也固問之對曰其為大子也師保奉之以朝于嬰齊而夕于側也杜嬰齊令尹子重側司馬子反言其尊卿敬老不知其他公語范文子文子曰楚囚君子也言稱先職不背本也樂操王風不忘舊也林言稱先父之職官是不違背其父祖之本業琴作南風之操是不遺忘其風土之舊俗語魚據反背音佩下同稱天子抑無私也杜舍其近事而逺稱少小以示性所自然明至誠名其二卿尊君也杜尊晉君也不背本仁也不忘舊信也無私忠也尊君敏也林不背本業是為愛親之仁不忘舊俗是為安上之信無所私黨是為盡已之忠尊君卑臣是為臨事之敏敏達也仁以接事信以守之忠以成之敏以行之事雖大必濟林愛有差等故應接事物當以仁為主信不可易故以信而守之忠無所偏故以忠而成之敏無不達故以敏而行之杜言有此四徳必能成大事君盍歸之使合晉楚之成公従之重為之禮使歸求成杜為下十二月晉楚結成張本盍户臘反冬十一月楚子重自陳伐莒圍渠丘渠丘城惡衆潰奔莒戊申楚入渠丘杜月六日渠丘莒邑莒人囚楚公子平楚人曰勿殺吾歸而俘林而汝也莒人殺之楚帥圍莒莒城亦惡庚申莒潰杜月十八日楚遂入鄆莒無備故也杜終巫臣之言君子曰恃陋而不備罪之大者也林自取滅亡故為罪之大備豫不虞善之大者也林居安慮危故為善之大莒恃其陋而不脩城郭浹辰之間而楚克其三都無備也夫林浹周匝也辰日辰也浹辰葢謂自子至亥周匝十二日也浹子恊反徐音子答反夫音扶詩曰雖有絲麻無棄菅蒯雖有姬姜無棄蕉萃凡百君子莫不代匱言備之不可以已也杜逸詩也林絲可為帛麻可為布菅蒯皆草之可為雜用者言雖有精細之物粗物亦不可棄姬姜大國之女蕉萃賤陋之人言雖有大國之女賤陋之人亦不可棄凡百君子在位之人亦有匱乏之時須得人承代菅古顔反蒯苦怪反蕉伐遥反萃在醉反匱其位反秦人白狄伐晉諸侯貳故也林諸侯攜貳於晉故秦狄乗而伐之鄭人圍許示晉不急君也林此狄晉執鄭伯鄭不肯求服於晉而出師以圍許葢示晉以不以執君為急也是則公孫申謀之曰我出師以圍許杜示不畏晉為將改立君者而紓晉使杜紓緩也勿亟遣使請晉示欲更立君為将並如字或作偽將紓音舒使所吏反晉必歸君杜晉恐鄭别立君而執一人無益必歸鄭伯為明年晉侯歸鄭伯張本城中城書時也十二月楚子使公子辰如晉報鍾儀之使請修好結成杜鍾儀奉晉命歸故楚報之好呼報反經庚辰十年春衛侯之弟黑背帥師侵鄭夏四月五卜郊不従乃不郊杜無傳卜常祀不郊皆非禮故書五月公㑹晉侯齊侯宋公衛侯曺伯伐鄭杜晉侯大子州蒲也稱爵見其生代父居位失人子之禮齊人來媵無傳媵伯姬也異姓來媵非禮也丙午晉侯獳卒杜六同盟據傳丙午六月七日有日無月林景公卒大子州蒲五月先立以伐鄭孺八侯反秋七月公如晉冬十月傳十年春晉侯使糴茷如楚糴茷晉大夫糴徐徒弔反一音杜敖反又士弔反茷扶廢反一音蒲發反又蒲艾反報大宰子商之使也杜子商楚公子辰使在前年大音泰使所吏反衛子叔黑背侵鄭晉命也晉命衛使侵鄭鄭公子班聞叔申之謀杜改立君之謀林叔申即公孫申也三月子如立公子繻杜子如公子班繻音須夏四月鄭人殺繻立髠頑子如奔許髠頑鄭成公大子髠苦門反頑如字徐五班反欒武子曰鄭人立君我執一人焉何益不如伐鄭而歸其君以求成焉晉侯有疾五月晉立大子州蒲以為君而㑹諸侯伐鄭杜生立子為君此父不父子不子經因書晉侯其惡明鄭子罕賂以襄鐘杜子罕穆公子襄鐘鄭襄公之廟鐘子然盟于脩澤子駟為質杜子然子駟皆穆公子榮陽卷縣東有修武亭質音致辛巳鄭伯歸杜鄭伯歸不書鄭不告人晉侯夢大厲被髮及地搏膺而踊曰殺余孫不義杜厲鬼也趙氏之先祖也八年晉侯殺趙同趙栝故怒林膺胷也以手搏胷而踊躍被皮寄反搏音漙踊音勇余得請於帝矣壊大門及寢門而入公懼入于室又壊户公覺召桑田巫杜桑田晉邑壊音怪下同及寢門一本無及字覺古孝反巫言如夢杜巫云鬼怒如公所夢公曰何如曰不食新矣杜言公不得及食新麥公疾病求醫于秦秦伯使醫緩為之杜緩醫名為猶治也未至公夢疾為二豎子林景公夢疾病化為二豎子曰彼良醫也懼傷我焉逃之林恐秦緩治病或能傷害我安所逃避之懼傷我絶句焉徐於䖍反一讀如字屬上句逃之絶句其一曰居肓之上膏之下若我何杜肓鬲也心下為膏肓徐音荒説文云心下鬲上也鬲音革醫至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也林攻熨灸也言不可以火攻達針也言不可以針達至於用藥又不至焉言疾不可治也公曰良醫也厚為之禮而歸之六月丙午晉侯欲麥周六月今四月麥始熟使甸人獻麥甸人主為公田者甸徒練反饋人為之召桑田巫示而殺之林饋麥之人為景公召桑田之巫以其言不食新故示以新麥而殺之饋其位反為如字将食張如厠陷而卒杜張腹滿也林陷于厠中而死竟不及食新麥張中亮反小臣有晨夢負公以登天及日中負晉侯出諸厠遂以為殉傳言巫以明術見殺小臣以言夢自禍鄭伯討立君者戊申殺叔申叔禽叔禽叔申弟君子曰忠為令徳非其人猶不可況不令乎林言盡忠於君實為美徳若用非其人猶不以為可而見殺何況不美之事乎言叔申為忠不得其人還害身秋公如晉親弔非禮晉人止公使送葬於是糴茷未反是春晉使糴茷至楚結成晉謂魯貳於楚故留公須糴茷還驗其虛實冬葬晉景公公送葬諸侯莫在魯人辱之林魯人以為恥辱故不書諱之也杜諱不書晉楚也左傳杜林合注卷二十二
