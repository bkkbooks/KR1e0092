body:
  text: 左傳杜林合注卷三十五明王道焜趙如源同編昭公二經辛酉二年春晉侯使韓起來聘夏叔弓如晉叔弓叔老子秋鄭殺其大夫公孫黑書名惡之薰隧盟子産不討遂以為卿故書之冬公如晉至河乃復弔少姜也晉人辭之故還季孫宿如晉杜致襚服也公實以秋行冬還乃書傳二年春晉侯使韓宣子來聘杜公即位故林韓宣子即韓起且告為政而來見禮也杜代趙武為政雖盟主而修好周盟故曰禮見賢遍反觀書於大史氏見易象與魯春秋曰周禮盡在魯矣杜易象上下經之象辭魯春秋史記之策書春秋遵周公之典以序事故曰周禮盡在魯矣吾乃今知周公之德與周之所以王也易象春秋文王周公之制當此時儒道廢諸國多闕唯魯備故宣子適魯而說之王之况反公享之季武子賦綿之卒章杜綿詩大雅卒章義取文王有四臣故能以綿綿致興盛以晉侯比文王以韓子比四輔韓子賦角弓杜角弓詩小雅取其兄弟昏姻無胥逺矣言兄弟之國宜相親季武子拜曰敢拜子之彌縫敝邑寡君有望矣杜彌縫猶補合也謂以兄弟之義縫扶恭反武子賦節之卒章杜節詩小雅卒章取式訛爾心以畜萬邦以言晉德可以畜萬邦節才結反徐如字既享宴于季氏有嘉樹焉宣子譽之杜譽其好也譽音餘武子曰宿敢不封殖此樹以無忘角弓杜封厚也殖長也遂賦甘棠杜甘棠詩召南召伯息於甘棠之下詩人思之而愛其樹武子欲封殖嘉樹如甘棠以宣子比召伯宣子曰起不堪也無以及召公宣子遂如齊納幣杜為平公聘少姜見子雅子雅召子旗子旗子雅之子使見宣子宣子曰非保家之主也不臣杜志氣亢林亢極將有無君之心見賢遍反下同見子尾子尾見彊彊子尾之子宣子謂之如子旗杜亦不臣大夫多笑之林齊諸大夫笑其遏言唯晏子信之曰夫子君子也杜夫子韓起君子有信其有以知之矣為十年齊欒施高彊來奔張本自齊聘於衛衛侯享之北宫文子賦淇澳杜淇澳詩衛風美武公也言宣子有武公之德淇音其澳於六反宣子賦木瓜杜木瓜亦衛風義取於欲厚報以為好夏四月韓須如齊逆女須韓起之子逆少姜齊陳無宇送女致少姜少姜有寵於晉侯晉侯謂之少齊杜為立别號所有寵異之少詩照反謂陳無宇非卿杜欲使齊以適夫人禮送少姜執諸中都杜中都晉邑在西河界休縣東南少姜為之請曰送從逆班林班列也言送女當從逆女之班畏大國也猶有所易是以亂作杜韓須公族大夫陳無宇上大夫言齊畏晉改易禮制使上大夫送遂致此執辱之罪蓋少姜謙以示譏叔弓聘于晉報宣子也杜此春韓宣子來聘晉侯使郊勞聘禮賔至近郊君使卿勞之勞力報反辭曰寡君使弓來繼舊好固曰女無敢為賓徹命於執事敝邑𢎞矣杜徹達也女音汝下同敢辱郊使請辭杜辭郊勞使所使反下同致館辭曰寡君命下臣來繼舊好好合使成臣之祿也杜已通君命則於得為榮祿敢辱大館杜敢不敢叔向曰子叔子知禮哉林子叔子即叔弓吾聞之曰忠信禮之器也卑讓禮之宗也杜宗猶主也辭不忘國忠信也杜謂稱舊好先國後已卑讓也杜始稱敝邑之𢎞先國也次稱臣之祿後已也詩曰敬慎威儀以近有德夫子近德矣杜詩大雅林夫子謂叔弓秋鄭公孫黑將作亂欲去游氏而代其位游氏大叔之族黑為游楚所傷故欲害其族傷疾作而不果杜前年游楚所擊創駟氏與諸大夫欲殺之駟氏黑之族子産在鄙聞之懼弗及乘遽而至林遽傳車驛馬也乘遽欲速至也遽其據反使吏數之杜責數其罪曰伯有之亂杜在襄二十年以大國之事而未爾討也杜務共大國之命不腵治女罪爾有亂心無厭國不女堪專伐伯有而罪一也昆弟爭室而罪二也杜謂爭徐吾犯之妹厭於鹽反薰隧之盟杜在元年六月女矯君位而罪三也謂使大史書七子矯居表反有死罪三何以堪之不速死大刑將至再拜稽首辭曰死在朝夕林言已傷重不久將死無助天為虐子産曰人誰不死凶人不終命也作凶事為凶人不助天其助凶人乎請以印為禇師杜印子晳之子禇師市官禇張吕反子産曰印也若才君將任之不才將朝夕從女女罪之不恤而又何詩焉不速死司寇將至七月壬寅縊尸諸周氏之衢林衢道也陳子晳之尸於衢道以示戮加木焉書其罪於木以加尸上晉少姜卒公如晉及河晉侯使士文伯來辭曰非伉儷也杜晉侯溺於所幸為少姜行夫人之服故諸侯弔不敢以私煩諸侯故止之伉若浪反儷力計反請君無辱公還季孫宿遂致服焉杜致少姜之襚服公以末秋行始冬還還乃書之放經在冬叔向言陳無宇於晉侯曰彼何罪杜彼無宇君使公族逆之齊使上大夫送之猶曰不共君求以貪林送過逆班猶以齊為不共是晉之求於齊已過於貪國則不共逆卑於送是晉國不共而執其使君刑已頗何以為盟主杜頗不平使所吏反頗普多反且少姜有辭杜謂請無字之辭冬十月陳無宇歸杜晉侯赦之十一月鄭印段如晉弔杜弔少姜經壬戌三年春王正月丁未滕子原卒杜襄二十五年盟重丘林成公卒悼公寧立夏叔弓如滕五月葬滕成公卿共小國之葬禮過厚葬襄公滕子來㑹故魯厚報之秋小邾子來朝八月大雩冬大雨雹無傳記災雨于付反雹蒲學反北燕伯款出奔齊不書大夫逐之而言奔罪之也書名從告傳三年春王正月鄭游吉如晉送少姜之葬梁丙與張躍見之二子晉大夫躍他厯反梁丙曰甚矣哉子之為此來也杜卿共妾葬過禮甚為于僞反子太叔曰將得已乎言不得止昔文襄之霸也杜晉文公襄公其務不煩諸侯令諸侯三嵗而聘五嵗而朝有事而㑹不協而盟杜明王之制嵗聘問朝在十二年今簡之君薨大夫弔卿共葬事夫人士弔大夫送葬先王之制諸侯之喪士弔大夫送葬在三十年蓋時俗過制故文襄雖節之猶過於古足以昭禮命事謀闕而已杜朝聘以昭禮盟㑹以謀闕命事則總朝聘盟㑹而言之無加命矣杜命有常今嬖寵之喪不敢擇位而數於守適杜不敢以其位卑而令禮數如守適夫人然則時適夫人之喪弔送之禮己過文襄之制數所具反徐所主反適丁歷反下同唯懼獲戾豈敢憚煩少姜有寵而死齊必繼室杜繼室復薦女今兹吾又將來賀不唯此行也張躍曰善哉吾得聞此數也然自今子其無事矣譬如火焉杜火心星火中寒暑乃退杜心以季夏昏中而暑退季冬旦中而寒退此其極也能無退乎杜季夏暑極季冬寒極極則必退理之必然以喻晉强之極宜漸衰弱晉將失諸侯諸侯求煩不獲杜言將不能復煩諸侯二大夫退子太叔告人曰張躍有知其猶在君子之後乎林君子為專者諱親者諱譏其不為晉諱故在君子之後也知音智丁未滕子原卒同盟故書名杜同盟於襄之世亦應從同盟之禮故傳發之齊侯使晏嬰請繼室于晉復以女繼少姜曰寡君使嬰曰寡人願事君朝夕不倦將奉質幣以無失時則國家多難是以不獲杜不得自來質之二反又扣字難乃旦反不腆先君之適杜謂少姜腆他燕反以備內官焜耀寡人之望杜焜明也耀照也焜胡本反又音昆耀羊照反則又無祿早世隕命寡人失望君若不忘先君之好惠顧齊國辱收寡人徼福於大公丁公杜徼要也二公齊先君言收恤寡人則先君輿之福也隕于敏反好呼報反徼古堯反大音泰照臨敝邑鎮撫其社稷則猶有先君之適杜適夫人之女及遺姑姊妹遺餘也若而人杜言如常人不敢譽君若不棄敝邑而辱使董振擇之以備嬪嫡寡人之望也杜董正也振整也嬪嬙婦官振之刃反一音真韓宣子使叔向對曰寡君之願也寡君不能獨任其社稷之事未有伉儷在縗絰之中是以未敢請制夫人之服則葬訖君臣乃釋服任音壬縗上雷反絰直結反君有辱命惠莫大焉若惠顧敝邑撫有晉國賜之內主豈唯寡君舉羣臣實受其貺其自唐叔以下實寵嘉之杜唐叔晉之祖既成昏許昏成晏子受禮杜受賔享之禮叔向從之宴相與語叔向曰齊其柯如杜問興衰晏子曰此季世也吾弗知齊其為陳氏矣杜不知其他唯知齊將為陳氏吾弗知絶句公棄其民而歸于陳氏杜棄民不恤齊舊四量豆區釜鍾林此四等量之别名量音亮下同區烏侯反四升為豆各自其四以登於釜杜四豆為區區斗六升四區為釜釜六斗四升登成也林自豆而區自區而釜各加其四而成釜之數釜十則鍾杜六斛四斗陳氏三量林豆區釜三等之董皆登一焉鍾乃大矣林登加也加一謂加舊量之一也以五升為豆五豆為區五區為釡則區二斗釜八斗鍾八斛以家量貸而以公量收之杜貸厚而收薄貸他代反山木如市弗加於山魚鹽蜃蛤弗加於海林如往也山木往賣於市價如在山不加貴海之雜利往賣於市價如在海不加貴蜃食軫反蛤古答反民參其力二入於公而衣食其一林齊國之民三分其力役之所得其二分入於公而共衣食其一分言公重賦斂參七南反又音三公聚朽蠧而三老凍餒杜三老謂上壽中壽下壽皆八十已上不見養過聚在喻反又在主反國之諸市屨賤踊貴杜踊刖足者屨言刑多屨九具反踊音勇民人痛疾而或燠休之杜燠休痛念之聲謂陳氏也燠於喻反又於六反休虛喻反徐許留反賈云燠厚也休美也其愛之如父母而歸之如流水欲無獲民將焉辟之箕伯直柄虞遂伯戲四人皆舜後陳氏之先焉於䖍反戲許宜反其相胡公大姬已在齊矣杜胡公四人之後周始封陳之祖大姬其妃也言陳氏雖為人臣然將有國其先祖鬼神已與胡公共在齊相息亮反大音泰叔向曰然雖吾公室今亦季世也戎馬不駕卿無軍行林晉國衰弱不能征討故戎車不復駕馬晉政離散不能統一故諸卿不備軍行行戶郎反公乘無人卒列無長杜百人為卒言人皆非其人非其長乘繩證反卒子忽反長丁丈反庶民罷敝而宫室滋侈杜滋益也罷音皮道殣相望饑死為殣殣音覲而女富溢尤林嬖寵女家富貴過甚民聞公命如逃寇讐欒郤胥原狐續慶伯降在皂𨽻杜人姓晉舊臣之族也皂𨽻賤官政在家門杜大夫專政民無所依君日不悛以樂慆憂杜慆藏也悛改也林以逸樂之過藏憂患之萌悛七全反樂音洛又音嶽慆他刀反公室之卑其何日之有杜言今日讒鼎之銘杜讒鼎名也讒仕咸反服示疾讒之鼎也曰昧旦㔻顯後世猶怠杜昧旦早起也㔻大也言夙興以務大顯後世猶解怠昧音妹㔻普悲反况日不悛其能久乎晏子曰子將若何杜問何以免此難叔向曰晉之公族盡矣肸聞之公室將卑其宗族枝葉先落則公從之林國家之有宗族如樹木之有枝葉也本將撥枝葉必先衰落公族衰落則國家從之肸許乙反肸之宗十一族杜同祖為宗唯羊舌氏在而已肸又無子無賢子公室無度杜無法度幸而得死杜言得以壽終為幸豈其獲祀杜言必不祀初景公欲更晏子之宅曰子之宅近市湫隘囂塵不可以居湫下隘小囂聲塵土湫子小反徐音秋又在酒反隘於賣反囂許驕反又五髙反請更諸爽塏者杜爽明塏燥塏苦代反辭曰君之先臣容焉杜先臣晏子之先人臣不足以嗣之於臣侈矣杜侈奢也且小人近市朝夕得所求小人之利也敢煩里旅杜旅衆也不敢勞衆為已宅公笑曰子近市識貴賤乎對曰既利之敢不識乎公曰何貴何賤於是景公繁于刑杜繁多也有鬻踊者故對曰踊貴屨賤既已告於君故與叔向語而稱之傳護晏子令不與張躍同譏鬻羊六反賣也景公為是省於刑君子曰仁人之言其利博哉晏子一言而齊侯省刑詩曰君子如祉亂庶遄已杜詩小雅如行也祉福也遄疾也言君子行福則庶幾亂疾止也為干僞反省所景反下同祉音恥遄市專反其是之謂乎及晏子如晉公更其宅反則成矣既拜杜拜謝新宅乃毁之而為里室皆如其舊杜本壞里室以大晏子之宅故復之壞音怪則使宅人反之林使其宅之人各還其故室且詩曰非宅是卜唯鄰是卜杜卜良鄰諺音彥二三子先卜鄰矣二三子謂鄰人違卜不祥君子不犯非禮去儉即奢為非禮小人不犯不祥林違卜遷居為不祥古之制也吾敢違諸乎卒復其舊宅林卒復其鄰人之舊宅公弗許因陳桓子以請乃許之傳言齊晉之衰賢臣懷憂且言陳氏之興夏四月鄭伯如晉公孫段相甚敬而卑禮無違者晉侯嘉焉授之以策杜策賜命之書相息亮反曰子豐有勞於晉國子豐段之父余聞而弗忘賜女州田杜州縣今屬河內郡女音汝以胙乃舊勳林以胙報汝父舊日之勳勞伯石再拜稽首受策以出君子曰禮其人之急也乎林言人莫急於禮伯石之汰也杜汰驕也汰音泰一為禮於晉猶荷其祿况以禮終始乎詩曰人而無禮胡不遄死其是之謂乎林反證伯石有禮可取荷戶可反任也初州縣欒豹之邑也杜欒豹盈族及欒氏亡林在襄二十三年范宣子趙文子韓宣子皆欲之文子曰溫吾縣也州本屬溫溫趙氏邑二宣子曰自郤稱以别三傳矣杜郤稱晉大夫始受州自是州與溫别至今傳三家稱尺證反以别絶句傳直尊反晉之别縣不唯州誰獲治之杜言縣邑既别甚多無有得追而治取之文子病之乃舍之二子曰吾不可以正議而自與也林言我不可以正議責人而自取其邑舍音赦又音捨下同皆舍之及文子為政趙獲曰可以取州矣獲趙文子之子文子曰退使獲退也二子之言義也杜二子二宣子也違義禍也余不能治余縣又焉用州林我若招禍且將不能治我之縣又安用州為哉焉於䖍反其以徼禍也君子曰弗知實難杜患不知禍所起知而弗從禍莫大焉有言州必死杜有敢言取州者坐以死罪豐氏故主韓氏故猶舊也豐氏至晉舊以韓氏為主人伯石之獲州也韓宣子為之請之為其復取之之故後若還晉因自欲取之為十年豐氏歸州張本為于僞反五月叔弓如滕葬滕成公子服椒為介及郊遇懿伯之忌敬子不入杜忌怨也懿伯椒之叔父敬子叔弓也叔弓禮椒為之辟仇惠伯曰公事有公利無私忌椒請先入乃先受館敬子從之杜惠伯子服椒也傳言叔弓之有禮晉韓起如齊逆女杜為平公逆公孫蠆為少姜之有寵也以其子更公女而嫁公子更嫁公女蠆敕邁反人謂宣子子尾欺晉晉胡受之宣子曰我欲得齊而逺其寵寵將來乎杜寵謂子尾林我欲得齊人之心子尾有寵于齊而我反疏逺之子尾其將以齊歸我乎逺于萬反秋七月鄭罕虎如晉賀夫人且告曰楚人日徴敝邑以不朝立王之故杜楚靈王新立敝邑之往則畏執事其謂寡君而固有外心其不往則宋之盟云杜云交相見進退罪也林往朝則恐得罪於晉不往則恐得罪於楚寡君使虎布之杜布陳也宣子使叔向對曰君若辱有寡君在楚何害林言鄭君若有心服事晉君雖在楚國何害於好修宋盟也君苟思盟寡君乃知免於戾矣君若不有寡君雖朝夕辱於敝邑寡君猜焉猜疑也猜七才反君實有心何辱命焉杜言若有事晉心至楚可不須告君其往也苟有寡君在楚猶在晉也張躍使謂大叔曰自子之歸也歸在此年春小人糞除先人之敝廬曰子其將來今子皮實來小人失望大叔曰吉賤不獲來杜賤非上卿畏大國尊夫人也且孟曰而將無事吉庶幾焉杜孟張躍也庶幾如躍言小邾穆公來朝季武子欲卑之不欲以諸侯禮待之穆叔曰不可曹滕二邾實不忘我好敬以逆之猶懼其二又卑一睦焉一睦謂小邾逆羣好也林是不順和好而逆衆心也好呼報反其如舊而加敬焉志曰能敬無災又曰敬逆來者天所福也季孫從之八月大雩旱也齊侯田於莒杜莒齊東竟盧蒲嫳見泣且請曰余髮如此種種余奚能為杜嫳慶封之黨襄二十八年放之於竟種種短也自言衰老不能復為害嫳普結反又因舌反見賢遍反種章勇反公曰諾吾告二子杜二子子雅子尾歸而告之子尾欲復之子雅不可曰彼其髮短而心甚長其或寢處我矣林彼謂盧蒲嫳其髮雖短而心之所圖甚長襄二十八年盧蒲嫳謂子雅子尾譬如禽獸吾寢處之矣故子雅謂其不可測以此為對九月子雅放盧蒲嫳于北燕杜恐其復作亂燕簡公多嬖寵欲去諸大夫而立其寵人冬燕大夫比以殺公之外嬖杜比相親比比毗志反公懼奔齊書曰北燕伯款出奔齊罪之也款罪輕於衛衎重于蔡朱故舉中示例十月鄭伯如楚子産相楚子享之賦吉日杜吉日詩小雅宣王田獵之詩楚王欲與鄭伯共田故賦之相息亮反既享子産乃具田備王以田江南之夢楚之雲夢跨江南北夢如字徐莫公反齊公孫竈卒杜竈子雅司馬竈見晏子司馬竈齊大夫曰又喪子雅矣晏子曰惜也子旗不免殆哉林子旗子雅之子其父既死子旗必不免於危殆也杜以其不臣喪息浪反姜族弱矣而媯將始昌杜媯陳氏媯九危反二惠競爽猶可林子雅子尾皆齊惠公之孫競彊也爽明也言子雅子尾二惠彊明猶可以為國又弱一個焉姜其危哉林宗族公室之枝葉也姜之公族衰落國必危矣故齊終為陳氏所有個古賀反經癸亥四年春王正月大雨雹當雪而雹故以為災而書之雨于付反傳同雹蒲學反夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷㑹于申杜楚靈王始合諸侯林楚專合諸侯始此以楚莊之賢辰陵之盟從之者陳鄭焉耳申之㑹合十有二國楚之得志於中國未有盛於此時也沈音審楚人執徐子杜稱人以執以不道於其民告林書執徐子危㑹申之諸侯也秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳杜因申㑹以伐吳不言諸侯者鄭徐滕小邾宋不在故也胡國汝陰縣西北有胡城執齊慶封殺之楚子欲行霸為齊討慶封故稱齊遂滅賴九月取鄫鄫莒邑傳例曰克邑不用師徒曰取鄫才陵反冬十有二月乙卯叔孫豹卒傳四年春王正月許男如楚楚子止之欲與俱田遂止鄭伯復田江南許男與焉杜前年楚子已與鄭伯田江南故言復與音預使椒舉如晉求諸侯林楚靈王欲專㑹諸侯使椒舉往晉求之二君待之杜二君鄭許椒舉致命曰寡君使舉曰日君有惠賜盟于宋宋盟在襄二十七年曰晉楚之從交相見也以嵗之不易杜不易言有難易以豉反寡人願結歡於二三君杜欲得諸侯謀事補闕歡喚端反使舉請問君若苟無四方之虞杜虞度也間音間又如字則願假寵以請於諸侯杜欲借君之威寵以致諸侯晉侯欲勿許司馬侯曰不可楚王方侈天或者欲逞其心以厚其毒而降之罰未可知也其使能終亦未可知也晉楚唯天所相杜相助也逞敕景反相息亮反不可與爭君其許之而修德以待其歸杜增修晉德以待楚君之所歸若歸於德吾猶將事之况諸侯乎若適淫虐楚將棄之林雖楚國猶將棄之不以為君吾又誰與爭公曰晉有三不殆其何敵之有殆危也殆直改反國險而多馬齊楚多難林表裏山河是國險也冀北産馬是多馬也齊楚多篡弒之禍是多難也有是三者何鄉而不濟對曰恃險與馬而虞鄰國之難是三殆也四嶽林東嶽岱山在兖州西嶽華山在雍州南嶽衛山在荆州北嶽恆山在冀州鄉許亮反三塗林山名大行轘轅崤黽也在河南陸渾縣南陽城在陽城縣城北大室杜在河南陽城縣西南林即中嶽嵩高山也在豫州大音泰下同荆山在新城汴鄉縣南中南在始平武功縣南九州之險也是不一姓杜雖是天下至險無德則滅亡冀之北土燕代馬之所生無興國焉恃險與馬不可以為固也從古以然是以先王務修德音以亨神人林亨通也幽則德通於神明則德通於人亨許庚反不聞其務險與馬也鄰國之難不可虞也或多難以固其國啓其疆土或無難以喪其國失其守宇杜於國則四垂為字疆居良反喪息浪反下同若何虞難齊有仲孫之難而獲桓公至今賴之杜仲孫公孫無知事在莊九年晉有里㔻之難而獲文公是以為盟主里克㔻鄭事在僖九年衛邢無難敵亦喪之閔二年狄滅衛僖二十五年衛滅邢邢音刑故人之難不可虞也恃此三者而不修政德亡於不暇又何能濟君其許之紂作淫虐文王惠和殷是以隕周是以興夫豈爭諸侯林殷以不德而隕滅周以有德而興盛興亡惟在於德豈在爭諸侯哉乃許楚使使叔向對曰寡君有社稷之事是以不獲春秋時見杜言不得自往謙辭使所吏反見賢遍反諸侯君實有之何辱命焉椒舉遂請昏蓋楚子遣舉時兼使求昏晉侯許之楚子問於子産林子産時從鄭簡公在楚故楚子問之曰晉其許我諸侯乎對曰許君晉君少安不在諸侯杜安於小小不能逺圖其大夫多求杜貪也莫匡其君在宋之盟又曰如一晉楚同也若不許君將焉用之焉用宋盟焉於䖍反王曰諸侯其來乎對曰必來從宋之盟承君之歡不畏大國杜大國晉也何故不來不來者其魯衛曹邾乎曹畏宋邾畏魯魯衛逼於齊而親於晉唯是不來其餘君之所及也誰敢不至杜言楚威力所能及逼彼力反王曰然則吾所求者無不可乎對曰求逞于人不可逞快也求人以快意人必達之與人同欲盡濟杜為下㑹申傳大雨雹季武子問于申豐曰雹可禦乎杜禦止也申豐魯大夫對曰聖人在上無雹雖有不為災古者日在北陸而藏氷陸道也謂夏十二月日在虛危氷堅而藏之西陸朝覿而出之杜謂夏三月日在昴畢蟄蟲出而用氷春分之中奎星朝見東方朝如字覿徒厯反其藏氷也深山窮谷固隂沍寒於是乎取之林深山窮谷氷之所積固隂沍寒陽之所鬱杜沍閉也必取積險之氷所以達道其氣使不為災沍户故反其出之也朝之祿位賓食喪祭於是乎用之林朝廷之臣食祿在位者公私皆得用氷不獨其君之用其藏之也黑牡秬黍以享司寒杜黑牡黑牲也秬黑黍也司寒𤣥冥北方之神故物皆用黑有事於氷故祭其神牡筏后反秬音巨其出之也桃弧棘矢以除其災杜桃弧棘箭所以攘除凶邪將御至尊故弧音胡其出入也時食肉之祿氷皆與焉杜食肉之祿謂在朝廷治其職事就官食者與音預大夫命婦喪浴用氷杜命婦大夫妻林天時向熱則喪浴皆得用氷祭寒而藏之杜享司寒獻羔而啓之杜謂二月春分獻羔祭韭始開氷室公始用之杜公先用優尊火出而畢賦火星昏見東方謂三月四月中自命夫命婦至于老疾無不受氷杜老致仕在家者山人取之縣人傳之杜山人虞官縣人遂屬傳直專反輿人納之隸人藏之杜輿隸皆賤官夫水以風壯杜水因風寒而堅而以風出順春風而散用其藏之也周杜周密也其用之也遍杜及老疾則冬無愆陽杜愆過也謂冬溫夏無伏隂杜伏隂謂夏寒春無凄風凄寒也凄七西反秋無苦雨杜霖雨為人所患苦雷出不震杜震霆也無菑霜雹癘疾不降杜癘惡氣也林時和故癘疾不降菑音災下同癘音例民不天札短折為天天死為札札側八反又音戲今藏川池之氷棄而不用杜既不藏深山窮谷之氷又大出不畢賦有餘則棄之風不越而殺雷不發而震杜越散也言隂陽失序雷風為害殺如字又色界反雹之為菑誰能禦之七月之卒章藏氷之道也杜七月詩豳風卒章曰二之日鑿氷沖沖謂十二月鑿而取之三之日納于凌隂凌隂氷室也四之日其蚤獻羔祭韭謂二月春分蚤開氷室以薦宗廟夏諸侯如楚魯衛曹邾不㑹曹邾自以為難公辭以時祭衛侯辭以疾杜如子産言難乃旦反鄭伯先待于申林自楚先至㑹地六月丙午楚子合諸侯于申椒舉言於楚子曰臣聞諸侯無歸禮以為歸林諸侯無常依歸惟有禮者乃依歸之今君始得諸侯其慎禮矣霸之濟否在此㑹也夏啓有鈞臺之享杜啓禹子也河南陽翟縣南有鈞臺陂蓋啓享諸侯於此商湯有景亳之命河南鞏縣西南有湯亭或言亳即偃師亳步各反周武有孟津之誓將伐紂也成有岐陽之搜杜周成王歸自奄大搜於岐山之陽岐山在扶風美陽縣西北康有酆宫之朝杜酆在始平鄠縣東有靈臺康王於是朝諸侯酆芳弓反穆有塗山之㑹杜周穆王㑹諸侯於塗山塗山在壽春東北齊桓有召陵之師在僖四年召上照反晉文有踐土之盟在僖二十八年君其何用林君謂靈王當於六王二公之事擇用何禮宋向戌鄭公孫僑在諸侯之良也君其選焉杜選擇所用向舒亮反戍音恤僑其驕反王曰吾用齊桓用㑹召陵之禮王使問禮於左師與子産左師曰小國習之大國用之敢不薦聞言所聞謙示所未行獻公合諸侯之禮六杜其禮六儀也宋爵公故獻公禮子産曰小國共職敢不薦守獻伯子男㑹公之禮六杜鄭伯爵故獻伯子男㑹公之禮其禮同所從言之異共音恭守手又反君子謂合左師善守先代子産善相小國王使椒舉侍於後以規過杜規正二子之過相息亮反卒事不規王問其故對曰禮吾未見者有六焉又何以規杜左師子産所獻六禮楚皆未嘗行宋太子佐後至王田於武城久而弗見椒舉請辭焉請王辭謝之王使往曰屬有宗祧之事於武城杜言為宗廟田獵屬章玉反適也祧他肜反寡君將墮幣焉敢謝後見杜恨其後至故言將因諸侯㑹布幣乃相見經并書宋太子佐知此言在㑹前墮詩規反布也輸反見如字又賢遍反徐子吳出也以為二焉故執諸申言楚子以疑罪執諸侯楚子示諸侯侈杜自奢侈椒舉曰夫六王二公之事六王啓湯武成康穆也二公齊桓晉文皆所以示諸侯禮也諸侯所由用命也夏桀為仍之㑹有緡叛之杜仍緡皆國名緡亡中反商紂為黎之搜東夷叛之黎東夷國名周幽為大室之盟戎狄叛之杜大室中嶽皆所以示諸侯汰也諸侯所由棄命也今君以汰無乃不濟乎王弗聽子産見左師曰吾不患楚矣汰而愎諫林愎狠也汰侈而愎狠以拒諫諍愎皮逼反不過十年林十數之小成也故知其不能過十年左師曰然不十年侈其惡不逺逺惡而後棄惡及逺方則人棄之善亦如之德逺而後興林善不積不足以成名故亦如惡久而復興杜為十三年楚弒其君傳秋七月楚子以諸侯伐吳宋大子鄭伯先歸經所以更敘諸侯也時晉之屬國皆歸獨言二國者鄭伯久於楚宋太子不得時見故慰遣之宋華費遂鄭大夫從杜從伐吳以答見慰費扶味反從才用反使屈申圍朱方朱方吳邑齊慶封所封也屈申屈蕩之子屈居勿反八月甲申克之執齊慶封而盡滅其族杜慶封以襄二十八年奔吳八月無甲申日誤林楚假大義為齊討慶封故盡滅慶氏之族將戮慶封椒舉曰臣聞無瑕者可以戮人慶封唯逆命是以在此杜逆命謂性不恭順其肯從於戮乎杜言不肯默而從戮播於諸侯焉用之林播揚也將戮慶封而日播揚其惡於諸侯安用如此焉于䖍反王弗聽負之斧鉞以徇於諸侯林使慶封自負斧鉞以徇告於諸侯使以為戒使言曰無或如齊慶封弒其君弱其孤以盟其大夫杜齊崔杼弒君慶封其黨也故以弒君罪責之林襄二十五年盟于大宫日不與崔慶者慶封曰無或如楚共王之庶子圍弒其君兄之子麋而代之以盟諸侯王使速殺之遂以諸侯滅賴賴子面縛銜璧士袒輿櫬從之造於中軍林賴子賴之君自縛惟露其面手縛故口銜璧以為質士袒衣輿載棺以從賴子之後示歸死中軍王所將故造焉共音恭櫬初覲反造七報反王問諸椒舉對曰成王克許在僖六年許僖公如是王親釋其縛受其璧焚其櫬王從之杜從舉言縛如字舊扶臥反還賴於鄢杜鄢楚邑鄢於晚及又於建反楚子欲遷許於賴使鬭韋龜與公子棄疾城之而還杜為許城也韋龜子文之𤣥孫申無宇曰楚禍之首將在此矣召諸侯而來伐國而克城竟莫校杜謂築城於外竟諸侯無與爭竟音境王心不違林王之欲心莫有違者民其居乎杜言將有事不得安也民之不處其誰堪之不堪王命乃禍亂也九月取鄫言易也莒亂著丘公立而不撫鄫鄫叛而來故曰取凡克邑不用師徒曰取杜著丘公去疾也不書奔者潰散而來將帥微也重發創者以通叛而自來易以豉反著直居反徐直據反鄭子産作丘賦丘十六井當出馬一匹牛三頭今子産别賦其田如魯之田賦田賦在哀十一年國人謗之杜謗毁也曰其父死於路謂子國為尉氏所殺已為蠆尾林謂子産重賦毒害百姓如蜂蠆之尾以令於國國將若之何子寬以告子寬鄭大夫子産曰何害苟利社稷死生以之杜以用也且吾聞為善者不改其度故能有濟也民不可逞度不可改杜度法也林欲為善者不改其所守之法度故能有成功民心不可使之逞快法度不可使之改變詩曰禮義不愆何恤於人言杜逸詩子産自以為權制濟國於禮義無愆吾不遷矣杜遷移也渾罕曰國氏其先亡乎杜渾罕子寬林國氏以子産父字為氏也言其斂怨於民先亡渾侯溫反罕許但反君子作法於涼其敝猶貪林涼薄也言君子作法什一取民斂從其薄其流敝猶至於貪涼音良徐音亮作法於貪敝將若之何言不可久行姬在列者杜在列國也蔡及曹滕其先亡乎逼而無禮林蔡逼楚曹滕逼宋又無禮以為之本鄭先衛亡逼而無法林鄭逼於晉楚而無法以為之備政不率法而制於心民各有心何上之有子産權時救急渾罕譏以正道冬吳伐楚入棘櫟麻杜棘櫟麻皆楚東鄙邑譙國鄼縣東北有棘亭汝隂新蔡縣東北有櫟亭櫟力狄反徐失灼反以報朱方之役未方役在此年秋楚沈尹射奔命於夏汭夏汭漢水曲入江今夏口也吳兵在東北楚盛兵在東南以絶其後射食夜反又食亦反汭如鋭反針尹宜咎城鍾離宜咎本陳大夫襄二十四年奔楚針之林反薳啓疆城巢然丹城州來然丹鄭穆公孫襄十九年奔楚薳子委反疆其良反又居良反東國水不可以城杜東國郡賴之故國也時大水不可興城築之役彭生罷賴之師杜彭生楚大失罷鬬韋龜城賴之師罷皮買反徐甫綺反初穆子去叔孫氏及庚宗杜成十六年辟僑如之難奔齊庚宗魯地遇婦人使私為食而宿焉問其行告之故哭而送之杜婦人聞而哭之適齊娶於國氏國氏齊正卿姜姓生孟丙仲壬夢天壓已弗勝林穆子夢天墜壓已力不能勝壓於申反又於輒反勝音升下同顧而見人黑而上僂林色黑而肩上僂傴僂力主反深目而豭喙林目深而口象猪豭音加喙許穢反號之曰牛助余乃勝之旦而皆召其徒無之杜徒從者林穆子夜夢既旦皆召其徒黨而視之無人相貌名牛與所夢相似號胡到反又戶刀反下同且曰志之杜志識也及宣伯奔齊饋之杜宣伯僑如穆子之兄成十六年奔齊穆子饋宣伯饋求位反餉也宣伯曰魯以先子之故杜先子宣伯生人將存吾宗必召女召女何如對曰願之久矣杜兄始為亂已則有今日之願蓋忿言女音汝下同魯人召之不告而歸林不告僑如而歸既立杜在齊生孟丙仲壬魯召之立為卿襄二年始見經所宿庚宗之婦人獻以雉杜獻穆子問其姓杜問有子否女生日姓姓謂子也對曰余子長矣能奉雉而從我矣杜襄二年豎牛五六嵗長丁丈反下同奉芳勇反召而見之則所夢也未問其名號之曰牛林試號其名曰牛以驗所夢曰唯皆召其徒使視之遂使為豎豎小臣也傳言從夢未必吉唯維癸反徐以永反有寵林穆子以牛應夢故寵愛之長使為政杜為家政公孫明知叔孫於齊杜公孫明齊大夫子明也與叔孫相親知歸未逆國姜子明取之國姜孟仲母姜七佳反又如字故怒其子長而後使逆之杜子孟丙仲壬田於丘蕕林穆子田獵於丘蕕之地蕕音由遂遇疾焉豎牛欲亂其室而有之强與孟盟不可杜欲使從已孟不肯强其丈反下同叔孫為孟鐘林叔孫為其子孟丙鑄鐘為于僞反又如字曰爾未際杜際接也孟未與諸大夫相接也饗大夫以落之以豭猪血釁鐘曰落既具杜饗禮具使豎牛請日杜請饗日入弗謁杜謁白也林豎牛既入弗謁告於叔孫出命之日杜許命日及賓至聞鐘聲林叔孫不知享賓聞鐘聲而怪之牛曰孟有北婦人之客杜北婦人國姜也客謂公孫明林蓋豎牛投穆子所忌謂孟丙享公孫明以落鐘怒將往牛止之賓出使拘而殺諸外杜殺孟丙牛又强與仲盟不可仲與公御萊書觀於公杜萊書公御士名仲與之私遊觀於公宫萊音來觀古亂反又如字公與之環林賜玉環使牛入示之林仲壬使豎牛以賜環入示叔孫入不示出命佩之牛謂叔孫見仲而何杜而何如何見賢遍反下同叔孫曰何為杜怪牛言曰不見既自見矣杜言仲已自往見公公與之環而佩之矣遂逐之奔齊疾急命召仲牛許而不召杜泄見告之饑渴授之戈杜杜泄叔孫氏宰也牛不食叔孫叔孫怒欲使杜泄殺之泄息列反對曰求之而至又何去焉杜言求食可得無為去豎牛蓋杜泄力不能去設辭以勉豎牛曰夫子疾病不欲見人使置饋于個而退杜置置也個東西廂置之豉反個東賀反牛弗進則置虛命徹杜寫器令空示若叔孫已食命去之十二月癸丑叔孫不食乙卯卒杜二日絶糧牛立昭子而相之昭子豹之庶子叔孫婼也相息亮反公使杜泄葬叔孫豎牛賂叔仲昭子與南遺杜昭子叔仲帶也南遺季氏家臣使惡杜泄於季孫而去之杜憎泄不與已同志惡烏路反杜泄將以路葬且盡卿禮杜路王所賜叔孫車南遺謂季孫曰叔孫未乘路葬焉用之且冢卿無路介卿以葬不亦左乎杜冢卿謂季孫介次也左不便焉於䖍反下同左如字舊音佐季孫曰然使杜泄舍路杜舍置也舍式夜反或音捨不可曰夫子受命於朝而聘於王杜在襄二十四年夫子謂叔孫王思舊勳而賜之路杜感其有禮以念其先人復命而致之君杜豹不敢自乘君不敢逆王命而復賜之使三官書之吾子為司徒實書名杜謂季孫也書名定位號夫子為司馬與工正書服杜謂叔孫也服車服之器工正所書孟孫為司空以書勳杜勳功也今死而弗以是棄君命也書在公府而弗以是廢三官也杜書名書服書勳皆在公府而弗用是廢三官之所書也若命服生弗敢服死又不以將焉用之乃使以葬季孫謀去中軍豎牛曰夫子固欲去之杜誣叔孫以媚季孫左傳杜林合注卷三十五
