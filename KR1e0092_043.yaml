body:
  text: 左傳杜林合注卷四十三明王道焜趙如源同編昭公十經戊子二十有九年春公至自乾侯居于鄆以乾侯至不得見晉侯故齊侯使高張來唁公杜唁公至晉不見受高張高偃子公如晉次于乾侯復不見受往乾侯夏四月庚子叔詣卒無傳秋七月冬十月鄆潰無傳民逃其上曰潰潰散叛公傳二十九年春公至自乾侯處于鄆齊侯使高張來唁公稱主君林大夫稱主君比魯公於大夫也子家子曰齊卑君矣君祗辱焉林言往事齊適取辱祇音支公如乾侯杜為齊所卑故復適晉冀見恤三月己夘京師殺召伯盈林二十六年逐子朝者召王照反尹氏固及原伯魯之子杜皆子朝黨也稱伯魯子終不説學尹固之復也二十六年尹固與子朝俱奔楚而道還有婦人遇之周郊尤之曰處則勸人為禍行則數日而反是夫也其過三嵗乎林言尹固處周則勸子朝為禍亂出奔則數日而亟反是夫賤尹固之稱其能過三嵗而不亡乎夏五月庚寅王子趙車入于鄻以叛隂不佞敗之杜趙車子朝之餘也見王殺伯盈等故叛鄻周邑林隂不佞周大夫鄻列免反平子每嵗賈馬杜賈買也賈音古具從者之衣屨而歸之于乾侯公執歸馬者賣之杜賣其馬從才用反下同乃不歸馬衛侯來獻其乗馬曰啓服杜啓服馬名乗如字又繩證反塹而死杜墮塹死也塹士斬反公將為之櫝杜為作棺也為如字又丁偽反子家子曰從者病矣請以食之林請以作棺之費飲食從者食音嗣乃以幃裹之禮曰敝幃不棄為埋馬也公賜公衍羔裘使獻龍輔於齊侯龍輔玉名遂入羔裘林公衍遂以羔裘繼入為獻齊侯喜與之陽穀杜陽穀齊邑公衍公為之生也其母偕出林公衍公為皆昭公子其初生時二母同出之産舍公衍先生公為之母曰相與偕出請相與偕告杜留公衍母使待己共白公三日公為生其母先以告公為為兄林先告故公為為兄而公衍反為弟公私喜於陽穀而思於魯林昭公私以得陽穀為喜且追思失魯之禍曰務人為此禍也杜務人公為也始與公若謀逐季氏且後生而為兄其誣也乆矣乃黜之而以公衍為太子秋龍見于絳郊絳晉國都見賢遍反下同魏獻子問於蔡墨杜蔡墨晉大史曰吾聞之蟲莫知於龍以其不生得也謂之知信乎對曰人實不知非龍實知杜言龍無知乃人不知之耳莫知音智下謂之知實知同古者畜龍故國有豢龍氏有御龍氏杜豢御養也獻子曰是二氏者吾亦聞之而不知其故是何謂也對曰昔有飂叔安杜飂古國也叔安其君名飂力謬反有裔子曰董父裔逺也𤣥孫之後為裔實甚好龍能求其耆欲以飲食之龍多歸之乃擾畜龍林擾順也乃順龍所欲而畜養之好呼報反耆時志反飲於鴆反食音嗣下同以服事帝舜帝賜之姓曰董氏曰豢龍豢龍官名官有世功則以官氏封諸鬷川鬷夷氏其後也鬷水上夷皆董姓鬷子工反故帝舜氏世有畜龍及有夏孔甲擾于有帝孔甲少康之後九世君也其德能順於天帝賜之乗龍河漢各二林四龍為一乗此言天帝賜孔甲以四龍河漢之龍各二杜合為四乗繩證反各有雌雄孔甲不能食林孔甲得龍而不能飲食之而未獲豢龍氏有陶唐氏既衰其後有劉累林陶唐堯所治地劉累堯之子孫學擾龍于豢龍氏以事孔甲能飲食之夏后嘉之賜氏曰御龍杜夏后孔甲以更豕韋之後更代也以劉累代彭姓之豕韋累尋遷魯縣豕韋復國至商而滅累之後世復承其國為豕韋氏在襄二十四年更音庚龍一雌死濳醢以食夏后杜濳藏也藏以為醢明龍不知夏后饗之既而使求之杜求致龍也懼而遷於魯縣杜不能致龍故懼遷魯縣自貶退也魯縣今魯陽也范氏其後也杜晉范氏也獻子曰今何故無之對曰失物物有其官官修其方林好是物者必有其官守以主掌之居其官者必修其方法以終始之朝夕思之一日失職則死及之杜失職有罪失官不食杜不食祿官宿其業杜宿猶安也其物乃至杜設水官修則龍至若泯棄之物乃坻伏林若泯滅棄絶其官守則其物乃坁止伏匿坻音㫖又丁禮反鬱湮不育杜鬱滯也湮塞也育生也故有五行之官是謂五官實列受氏姓封為上公杜爵上公祀為貴神社稷五祀是尊是奉杜五官之君長能修其業者死皆配食於五行之神為王者所尊奉木正曰句芒正官長也取木生句曲而有芒角也其祀重焉句古侯反下同火正曰祝融杜祝融明貌其祀犂焉金正曰蓐收杜秋物摧蓐而可收也其祀該焉蓐音辱水正曰𤣥㝠水隂而幽㝠其祀修及熙焉土正曰后土土為羣物主故稱后也其祀句龍焉在家則祀中霤在野則為社龍水物也水官棄矣故龍不生得葉廢也不然周易有之言若不爾周易無緣有龍在乾乾下乾上乾之姤巽下乾上姤乾初九變姤古豆反曰濳龍勿用乾初九爻辭其同人離下乾上同人乾九二變曰見龍在田乾九二爻辭其大有乾下離上大有乾九五變曰飛龍在天乾九五爻辭其夬乾下兌上夬乾上九變夬古快反曰亢龍有悔乾上九爻辭其坤坤下坤上坤乾六爻皆變曰見羣龍無首吉乾用九爻辭坤之剥坤下艮上剝坤上六變曰龍戰于野坤上六爻辭若不朝夕見誰能物之物謂上六卦所稱龍各不同也今説易者皆以龍喻陽氣如史墨之言則為皆是真龍獻子曰社稷五祀誰氏之五官也問五官之長皆是誰對曰少皥氏有四叔少皥金天氏少詩照反曰重曰該曰修曰熙實能金木及水能治其官重直龍反該古咳反使重為句芒木正該為蓐收金正修及熙為𤣥㝠二子相代為水正世不失職遂濟窮桑此其三祀也窮桑少皥之號也四子能治其官使不失職濟成少皥之功死皆為民所祀窮桑地在魯北顓頊氏有子曰犂為祝融犂為火正共工氏有子曰句龍為后土共工在大皥後神農前以水名官者其子句龍能平水土故死而見祀共音恭此其二祀也后土為社方答社稷故明言為社稷田正也掌播殖也有烈山氏之子曰柱為稷烈山氏神農世諸侯自夏以上祀之祀柱周棄亦為稷棄周之始祖能播百穀湯既勝夏廢柱而以棄代之自商以來祀之傳言蔡墨之博物冬晉趙鞅荀寅帥師城汝濱趙鞅趙武孫也荀寅中行荀吴之子汝濱晉所取陸渾地遂賦晉國一鼔鐵以鑄刑鼎令晉國各出功名共鼓石為鐵計令一鼓而足因軍役而為之故言遂著范宣子所為刑書焉仲尼曰晉其亡乎失其度矣夫晉國將守唐叔之所受法度以經緯其民卿大夫以序守之序位次也民是以能尊其貴貴是以能守其業貴賤不愆所謂度也文公是以作執秩之官為被廬之法杜僖二十七年文公蒐被廬修唐叔之法被皮義反以為盟主今棄是度也而為刑鼎民在鼎矣林民知爭端皆在鼎矣何以尊貴棄禮徴書故不尊貴貴何業之守民不奉上則上失業貴賤無序何以為國且夫宣子之刑夷之蒐也晉國之亂制也杜范宣子所用刑乃夷蒐之法也夷蒐在文六年一蒐而三易中軍帥賈季箕鄭之徒遂作亂故曰亂制若之何以為法蔡史墨曰范氏中行氏其亡乎蔡史墨即蔡墨中行寅為下卿而千上令擅作刑器以為國法是法姦也又加范氏焉范宣子刑書中既廢矣今復興之是成其咎易之亡也林是交易范氏速之使亡也其及趙氏趙孟與焉林趙孟即趙鞅亦與於鑄鼎之役與音預然不得已若德可以免杜鑄刑鼎本非趙鞅意不得已而從之若能修德可以免禍為定十三年荀寅士吉射入朝歌以叛經己丑三十年春王正月公在乾侯釋不朝正子廟夏六月庚辰晉侯去疾卒杜未同盟而赴以名頃公卒子定公午立秋八月葬晉頃公三月而葬速頃音傾冬十有二月吴滅徐徐子章禹奔楚杜徐子稱行以名告也傳三十年春王正月公在乾侯不先書鄆與乾侯非公且徵過也杜徴明也二十七年二十八年公在鄆二十九年公在乾侯而經不釋朝正之禮者所以非責公之妄且明過謬猶可掩故不顯書其所在使若在國然自是鄆人潰叛齊晉卑公子家忠謀終不能用内外棄之非復過誤所當掩塞故每嵗書公所在徴直升反夏六月晉頃公卒秋八月葬鄭游吉弔且送葬魏獻子使士景伯詰之曰悼公之喪子西弔子蟜送葬在襄十五年詰起吉反蟜居表反今吾子無貳何故林貳副也吾子謂子大叔弔喪其使無有副貳對曰諸侯所以歸晉君禮也禮也者小事大大字小之謂事大在共其時命杜隨時共所求共音恭字小在恤其所無以敝邑居大國之間共其執貢與其備御不虞之患豈㤀共命言不敢㤀共命以所備御者多不及辨之御魚吕反先王之制諸侯之喪士弔大夫送葬唯嘉好聘享三軍之事于是乎使卿晉之喪事敝邑之間先君有所助執紼矣林知晉之有喪事其遇鄭國閒暇之時鄭之先君亦有㑹葬于晉執紼者矣紼輓素也禮送葬必執紼好呼報反間音閑下同紼音弗若其不間雖士大夫有所不獲數矣林若遇鄭國多事之時雖欲使士弔大夫送葬亦有不得如先王之禮數者矣大國之惠亦慶其加杜慶善也謂善其君自行而不討其乏明底其情林底致也明致小國有無之情底音㫖取備而已以為禮也靈王之喪在襄二十九年我先君簡公在楚我先大夫印段實往敝邑之少卿也杜少年少也少詩照反王吏不討恤所無也今大夫曰女盍從舊杜盍何不也女音汝舊有豐有省不知所從從其豐則寡君幼弱是以不共從其省則吉在此矣唯大夫圖之晉人不能詰傳言大叔之敏省所景反下同吴子使徐人執掩餘使鍾吾人執燭庸杜二十七年奔故二公子奔楚楚子大封而定其徙杜大封與土田定其所徙之居使監馬尹大心逆吴公子使居養杜二子奔楚楚使逆之於竟也養即所封之邑監古銜反莠尹然左司馬沈尹戌城之杜城養取於城父與胡田以與之杜胡田故胡子之地將以害吴也林將以為吴邊疆之害子西諫曰吴光新得國而親其民視民如子辛苦同之將用之也若好吴邊疆使柔服焉猶懼其至杜柔服謂不與吴搆怨好呼報反疆居良反吾又疆其讐以重怒之無乃不可乎林讐謂二公子乃王僚母弟闔廬之仇也重直用反吴周之胄裔也林大伯仲雍周大王之子故為周之族胄逺裔而棄在海濱不與姬通今而始大比于諸華光又甚文將自同於先王先王謂大王王季亦自西戎始比諸華不知天將以為虐乎使剪喪吴國而封大異姓乎其抑亦將卒以祚吴乎其終不逺矣林不知天意將使之為暴虐乎使闔廬用兵以自剪削喪滅吴國而以其土地封大異姓諸侯乎或者其終以福祚吴國乎其事行可知不乆逺矣喪息浪反我盍姑億吾鬼神億安也而寜吾族姓以待其歸杜善惡之歸將焉用自播揚焉播揚猶勞動也焉於䖍反播被我反又波賀反王弗聴吴子怒冬十二月吴子執鍾吾子遂伐徐防山以水之防壅山水以灌徐己夘滅徐徐子章禹㫁其髪㫁髪自刑示懼㫁丁緩反攜其夫人以逆吴子吴子唁而送之使其邇臣從之遂奔楚杜邇近也楚沈尹戌帥師救徐弗及遂城夷使徐子處之杜夷城父也吴子問于伍員曰初而言伐楚在二十年員音云余知其可也而恐其使余往也又惡人之有余之功也林人謂王僚恐其使我帥師以伐楚又惡伐楚之功為王僚所有惡烏路反今余將自有之矣伐楚何如對曰楚執政衆而乖莫適任患林言楚執政衆多而意向乖異不相統一莫肯為國家任患難適丁厯反任音壬若為三師以肄焉肄猶勞也肄以利反下同一師至彼必皆出彼出則歸彼歸則出楚必道敝杜罷敝於道亟肄以罷之林亟數也數勞肄之使之罷敝亟欺冀反罷音皮多方以誤之林聲東擊西使之迷誤既罷而後以三軍繼之必大克之闔廬從之楚于是乎始病杜為定四年吴入楚傳經庚寅三十有一年春王正月公在乾侯季孫意如㑹晉荀躒于適厯林適厯晉地書公在乾侯季孫意如㑹晉于適厯以見晉人釋君而助臣也晉士鞅㑹諸侯之大夫于扈將以納公取貨於季孫而遂不果荀躒復為此㑹昭公所以死于外也襄昭之際大夫無君之禍晉人為之也躒力狄反適丁厯反夏四月丁巳薛伯穀卒杜襄二十五年盟重丘林獻公卒子襄公定立晉侯使荀躒唁公于乾侯將使意如迎公故荀躒來唁秋葬薛獻公無傳冬黑肱以濫來奔杜黑肱邾大夫濫東海昌慮縣不書邾史闕文林傳言邾黑肱也其不係之邾濫嘗自别於邾也圍戚不曰圍衛戚取鄆不曰取我鄆皆如二君之辭也濫力甘反或力蹔反十有二月辛亥朔日有食之傳三十一年春王正月公在乾侯言不能外内也公内不容於臣子外不容於齊晉所以乆在乾侯晉侯將以師納公范獻子曰若召季孫而不來則信不臣矣然後伐之若何晉人召季孫獻子使私焉曰子必來我受其無咎言我為子受無咎之任季孫意如㑹晉荀躒于適厯荀躒曰寡君使躒謂吾子何故出君有君不事周有常刑子其圖之季孫練冠麻衣跣行杜示憂慼跣素典反伏而對曰事君臣之所不得也敢逃刑命杜言願事君君不肯還不敢辟罪君若以臣為有罪請囚于費以待君之察也亦唯君若以先臣之故不絶季氏而賜之死杜雖賜以死不絶其後費音祕若弗殺弗亡君之惠也死且不朽若得從君而歸則固臣之願也敢有異心杜君皆謂魯侯也蓋季孫探言罪己輕重以答荀躒夏四月季孫從知伯如乾侯杜知伯荀躒知音智子家子曰君與之歸一慙之不忍而終身慙乎林一時慙恥不能少忍與之歸國則身死于外將為終身之慙恥公曰諾衆曰在一言矣君必逐之杜言晉既憂君君以一言使晉晉必逐之荀躒以晉侯之命唁公且曰寡君使躒以君命討於意如意如不敢逃死君其入也公曰君惠顧先君之好施及亡人將使歸糞除宗祧以事君則不能見夫人已所能見夫人者有如河杜糞掃也已昭公自稱林夫人謂季孫也言若見季孫已當受禍明如河以自誓好呼報反夫音扶荀躒掩耳而走杜怪公所言示不忍聴曰寡君其罪之恐敢與知魯國之難杜言恐獲不納君之罪今納而不入何敢復知耶與音預難乃旦反臣請復於寡君退而謂季孫君怒未怠子姑歸祭林言魯君忿怒尚未倦怠季孫且歸攝行君事子家子曰君以一乗入于魯師季孫必與君歸林勸公棄其從者單車入于季孫之軍季孫見君單歸勢難拒絶必與君歸乗繩證反公欲從之衆從者脅公不得歸林衆從者恐公獨歸不得復入故脅制昭公杜傳言君弱不得復自任衆從才用反薛伯穀卒同盟故書杜謂書名也入春秋來薛始書名故發傳經在荀躒唁公上傳在下者欲魯事相次秋吴人侵楚伐夷侵濳六皆楚邑楚沈尹戌帥師救濳吴師還楚師遷濳於南岡而還吴師圍弦左司馬戌右司馬稽帥師救弦及豫章杜左司馬沈尹戌稽音啓又古兮反吴師還始用子胥之謀也謀在前年冬邾黑肱以濫來奔賤而書名重地故也黑肱非命卿故曰賤君子曰名之不可不慎也如是杜是黑肱也夫有所有名而不如其已杜有所謂有地也言雖有名不如無名已止也以地叛雖賤必書地以名其人終為不義弗可滅已杜凡竊邑叛君者雖非命卿必書以某地以著其人之名終身為不義之人𫝊之萬世不可冺滅是故君子動則思禮行則思義不為利回林先正其心不以利欲陷身于回邪為于偽反下同不為義疚杜疚病也見義則為之或求名而不得或欲蓋而名章懲不義也林或本欲求名而春秋不書其名或本欲隱蓋而春秋稱著其名所以懲戒不義之人誅其心也齊豹為衛司寇守嗣大夫守先人嗣言其尊作而不義其書為盜杜求名而不得也二十年豹殺衛侯兄欲求不畏彊禦之名邾庶其在襄二十一年莒牟夷在五年邾黑肱以土地出求食而已林庶其以漆閭丘牟夷以牟婁防兹黑肱以濫不過求食其地而已不求其名賤而必書杜春秋叛者多唯取三人來適魯者三人皆小國大夫故曰賤此二物者所以懲肆而去貪也杜物事也肆放也齊豹書盜懲肆也三叛人名去貪也若艱難其身杜身為艱難以險危大人杜大人在位者而有名章徹杜謂得勇名攻難之士將奔走之杜攻猶作也奔走猶赴趣也難乃旦反若竊邑叛君以徼大利而無名杜謂不書其人名徼古堯反貪冒之民將寘力焉盡力為之不顧於見書冐亡北反又亡報反是以春秋書齊豹曰盜三叛人名以懲不義數惡無禮其善志也無禮惡逆皆數而不志記事之善者也數所主反故曰春秋之稱林稱權衡也春秋權衡之法稱尺證反微而顯文微而義著婉而辨辭婉而㫖别上之人能使昭明杜上之人謂在位者在位者能行其法非賤人所能善人勸焉淫人懼焉是以君子貴之林善人得褒而知所勸勉淫人畏貶而知所恐懼是以春秋之法為君子之所貴十二月辛亥朔日有食之是夜也趙簡子夢童子臝而轉以歌杜轉婉轉也臝力果反旦占諸史墨曰吾夢如是今而日食何也簡子夢適與日食㑹謂咎在己故問之對曰六年及此月也吴其入郢乎終亦弗克史墨知夢非日食之應故釋日食之咎而不釋其夢郢以井反又羊政反入郢必以庚辰庚日有變日在辰尾故曰以庚辰定四年十一月庚辰吴入郢日月在辰尾辰尾龍尾也周十二月今之十月日月合朔於辰尾而食庚午之日日始有謫火勝金故弗克杜謫變氣也庚午十月十九日去辛亥朔四十一日雖食在辛亥更以始變為占也午南方楚之位也午火庚金也日以庚午有變故災在楚楚之仇敵唯吴故知入郢必吴火勝金者金為火妃食在辛亥亥水也水數六故六年也林午火勝庚金楚氣猶壯故終亦不克謫直革反經辛夘三十有二年春王正月公在乾侯取闞無傳公别居乾侯遣人誘闞而取之不用師徒闞口暫反夏吴伐越林吴始伐越秋七月冬仲孫何忌㑹晉韓不信齊高張宋仲幾衛世叔申鄭國參曹人莒人薛人杞人小邾人城成周杜世叔申世叔儀孫也國參子産之子不書盟時公在外未及告公公已薨林諸侯有事于京師皆不書僖十三年十六年戍周不書襄二十四年城周不書以是為常事也書城成周則請而後城之是非常也是役也晉魏舒南面韓不信專執于京師宋仲幾不受功齊高張後大夫之無王甚矣其不曰京師而曰成周以見周與列國等耳參七南反十有二月己未公薨于乾侯十五日傳三十二年春王正月公在乾侯言不能外内又不能用其人也杜其人謂子家羈也言公不能用其人故於今猶在乾侯夏吴伐越始用師於越也自此之前雖疆事小爭未嘗用大兵史墨曰不及四十年越其有吴乎杜存亡之數不過三紀嵗星三周二十六嵗故曰不及四十年哀二十二年越滅吴至此三十八嵗越得嵗而吴伐之必受其凶杜此年嵗在星紀星紀吴越之分也嵗星所在其國有福吴先用兵故反受其殃秋八月王使富辛與石張如晉林富辛石張皆周大夫請城成周子朝之亂其餘黨多在王城敬王畏之徙都成周成周狹小故請城之天子曰天降禍于周俾我兄弟並有亂心以為伯父憂杜俾使也兄弟謂子朝也伯父謂晉侯我一二親昵甥舅不皇啓處於今十年謂二十三年二師圍郊至于今昵女乙反勤戍五年謂三十八年晉籍秦致諸侯之戍至于今余一人無日㤀之杜念諸侯勞閔閔焉如農夫之望嵗懼以待時閔閔憂貌王憂亂常閔閔冀望安定如農夫之憂饑冀望來嵗之將熟伯父若肆大惠復二文之業弛周室之憂杜肆展放也二文謂文侯仇文公重耳弛猶解也徼文武之福以固盟主林以固其主盟之權宣昭令名則余一人有大願矣昔成王合諸侯城成周以為東都崇文德焉杜作成周遷殷民以為京師之東都所以崇文王之德今我欲徼福假靈于成王修成周之城俾戍人無勤諸侯用寧蝥賊逺屏晉之力也杜蝥賊喻災害其委諸伯父使伯父實重圖之俾我一人無徵怨于百姓杜徵召也而伯父有榮施先王庸之庸功也先王之靈以為大功范獻子謂魏獻子曰與其戍周不如城之天子實云杜云欲罷戍而城雖有後事杜築城之後成有他變異之事晉勿與知可也從王命以紓諸侯晉國無憂是之不務而又焉從事魏獻子曰善使伯音對杜伯音韓不信與音預紓音舒焉於䖍反曰天子有命敢不奉承以奔告于諸侯遲速衰序杜衰差也序次也衰初危反於是焉在杜在周所命冬十一月晉魏舒韓不信如京師合諸侯之大夫于狄泉尋盟且令城成周杜尋平丘盟魏子南面居君位衛彪徯曰魏子必有大咎干位以令大事非其任也杜彪徯衛大夫林干犯君位以令城周之大事非其德之所能當也彪彼蚪反徯音兮詩曰敬天之怒不敢戲豫敬天之渝不敢馳驅杜詩大雅戒王者言當敬畏天之譴怒不可遊戲逸豫馳驅自恣渝變也况敢干位以作大事乎己丑士彌牟營成周林士彌牟即士景伯訃丈數計所當城之丈數也揣高卑林度高曰揣揣版幹高卑之宜揣丅果反又初委反度厚薄仞溝洫杜度深曰仞林度量本末厚薄之制仞溝洫深淺之凖度待洛反洫况域反物土方議逺邇杜物相也相取土之方而逺近之宜量事期知事幾時畢計徒庸知用幾人功慮材用知費幾財用書餱糧知用幾糧食以令役於諸侯林號令於諸侯使供其役屬役賦丈林屬所當役之數賦所當城丈尺屬之欲反書以授帥帥諸侯之大夫帥所類反而效諸劉子杜效致也韓簡子臨之以為成命林韓簡子即韓不信杜臨履其事以命諸侯經所以不書魏舒十二月公疾徧賜大夫杜從公者大夫不受賜子家子雙琥杜琥玉器琥音虎一環一璧輕服細好之服受之大夫皆受其賜己未公薨子家子反賜於府人曰吾不敢逆君命也大夫皆反其賜書曰公薨于乾侯言失其所也杜不薨路寢為失所趙簡子問於史墨曰季氏出其君而民服焉諸侯與之君死於外而莫之或罪也對曰物生有兩有三有五有陪貳故天有三辰杜謂有三陪蒲回反地有五行杜謂有五體有左右杜謂有兩各有妃耦杜謂陪貳妃音配王有公諸侯有卿皆有貳也天生季氏以貳魯侯為日乆矣民之服焉不亦宜乎魯君世從其失季氏世修其勤民㤀君矣雖死於外其誰矜之社稷無常奉林奉之無常人言唯德也從子用反本亦作縱君臣無常位自古以然杜史墨跡古今以實言故詩曰高岸為谷深谷為陵杜詩小雅言高下有變易三后之姓於今為庶主所知也杜三后虞夏商林夏商周三后之子孫本高貴也今或降而為衆庶此言貴賤有時而變易也在易卦雷乗乾曰大壯乾下震上大壯震在乾上故曰雷乗乾天之道也乾為天子震為諸侯而在乾上君臣易位猶臣大强壯若天上有雷昔成季友桓之季也林即公子友魯桓公之季子也文姜之愛子也始震而卜卜人謁之杜震妊娠也謁告也震如字一音身曰生有嘉聞杜嘉名聞於世聞音問其名曰友為公室輔及生如卜人之言有文在其手曰反詳見閔二年傳遂以名之既而有大功於魯杜立僖公名武政反受費以為上卿林僖公賜以汶陽之田及費在僖元年費音祕至於文子武子杜文子行父武子宿世増其業不廢舊績魯文公薨而東門遂殺適立庶魯君於是乎失國林文十八年公子遂殺惡及視而立宣公魯君於是始失其國之權適丁厯反政在季氏於此君也四公矣林宣成襄昭民不知君何以得國是以為君慎器與名不可以假人杜器車服名爵號林惟魯公不能謹此初假季氏權至失政為所逐左傳杜林合注卷四十三
