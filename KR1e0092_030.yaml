body:
  text: 左傳杜林合注卷三十明王道焜趙如源同編襄公六經壬子二十有四年春叔孫豹如晉賀克欒氏仲孫羯帥師侵齊夏楚子伐吳秋七月甲子朔日有食之既無傳齊崔杼帥師伐莒大水無傳八月癸巳朔日有食之無傳公會晉侯宋公衛侯鄭伯曺伯莒子邾子滕子薛伯杞伯小邾子于夷儀冬楚子蔡侯陳侯許男伐鄭公至自會無傳陳針宜咎出奔楚陳敬仲八世孫慶氏之黨書名惡之也鉞其亷反叔孫豹如京師大飢林無傳大飢者一飢居疑反又音機傳二十四年春穆叔如晉范宣子逆之問焉曰古人有言曰死而不朽何謂也穆叔未對宣子曰昔丐之祖自虞以上為陶唐氏杜陶唐堯所治地大原晉陽縣也終虞之世以為號故曰自虞以上上時掌反在夏為御龍氏杜謂劉纍也事見昭二十九年在商為豕韋氏杜豕韋國名東郡白馬縣東南有韋城在周為唐杜氏杜唐杜二國名殷未豕韋國于唐周成主滅唐遷之于杜為杜伯杜伯之子隰叔奔晉四世及士會食邑于范復為范氏林今京兆杜縣晉主夏盟為范氏其是之謂乎晉為諸夏盟主范氏復為之佐言巳世為興家穆叔曰以豹所聞此之謂世祿非不朽也魯有先大夫曰臧文仲既沒其言立杜立謂不廢絶其是之謂乎豹聞之大上有立德其次有立功其次有立言林大上謂黃帝堯舜立德以垂世範其次如禹稷立功以垂世則其次如史佚周任臧文仲立言以垂世教大音泰雖久不廢此之謂不朽若夫保姓受氏以守宗祊祊廟門祊布彭反世不絶祀無國無之祿之大者不可謂不朽傳善穆叔之知言范宣子為政諸侯之幣重鄭人病之二月鄭伯如晉子産寓書於子西以告宣子杜寓寄也林子西相鄭伯如晉故子産寄書於子西以勸告宣子曰子為晉國四鄰諸侯不聞令德而聞重幣僑也惑之僑聞君子長國家者非無賄之患而無令名之難夫諸侯之賄聚于公室則諸侯二杜二離也林君生驕侈必致諸侯之離二長丁丈反難如字又方旦反若吾子賴之則晉國二杜賴恃用之林執政驕侈必致晉國之離二諸侯二則晉國壞晉國二則子之家壞何沒沒也林沒沒沈滅也書何必沈滅于貨賄如此沒如字一音妹將焉用賄夫令名德之輿也杜德須令名以逺聞焉於虔反德國家之基也林美德植國家以久立故為國之基有基無壞無亦是務乎林有德以為基故國家不壞勸宣子必以德為先務有德則樂樂則能久林有德在身則樂與人同樂與人同則能久居其位樂並音洛詩云樂只君子邦家之基有令德也夫杜小雅言君子樂美其道為邦家之基所以濟令德夫音扶下同上帝臨女無二爾心有令名也夫杜詩大雅言武王為天所臨不敢懷二心所以濟今名女音汝恕思以明德則令名載而行之是以逺至邇安林忠恕存心而自明其德則令名如輿載美德而行是以逺人慕德而來至邇人懷德而安靖母寧使人謂子子實生我杜無寧寧也林言宣子實生養於我母音無而謂子浚我以生乎杜浚取也言取我財以自生浚思後反象有齒以焚其身賄也杜焚斃也焚扶云反服云焚讀曰僨僨僵也宣子説乃輕幣是行也鄭伯朝晉為重幣故且請伐陳也鄭伯稽首宣子辭杜宣子為晉侯辭不敢受稽首説音悅為子偽反子西相曰以陳國之介恃大國而陵虐于敝邑杜介因也大國楚也相息亮反寡君是以請罪焉杜請得罪于陳也敢不稽首為明年鄭入陳傳孟孝伯侵齊杜孟孝伯即仲孫羯晉故也前年齊伐晉魯為晉報侵夏楚子為舟師以伐吳杜舟師水軍不為軍政不設賞罰之差無功而還為下吳召舒鳩起本齊侯既伐晉而懼將欲見楚子楚子使薳啓疆如齊聘且請期杜請會期疆其良反又居良反齊社搜軍實使客觀之杜祭社因閲數軍器以示薳啓疆搜所求反陳文子曰林即陳須無齊將有冦吾聞之兵不戢必取其族杜戢藏也族類也取其族還自害也秋齊侯聞將有晉師杜夷儀之師使陳無宇從薳啓疆如楚辭且乞師林陳無宇齊大夫杜辭有晉師未得相見崔杼帥師送之遂伐莒侵介根杜介根莒邑今城陽黔陬縣東北計基城是也齊既與莒平因兵出侵之言無信也會於夷儀將以伐齊故不克杜晉合諸侯以報前年見伐冬楚子伐鄭以救齊門於東門次於棘澤杜以齊無宇乞師故也諸侯還救鄭林夷儀諸侯晉侯使張骼輔躒致楚師求御於鄭林二子晉大夫致師挑戰杜欲得鄭人自御知其地利故也骼庚百反又古洛反躒立狄及徐音洛鄭人卜宛射犬吉杜射犬鄭公孫宛於元反射食亦反徐神石反子太叔戒之曰大國之人不可與也杜言不可與等也欲使卑下之太叔遊吉大音泰對曰無有衆寡其上一也杜言在已上者有常分無大小國之異大叔曰不然部婁無松柏杜部婁小阜松柏大木喻小國異於大國部蒲口反徐扶苟反婁本或作塿路口反徐力侯反二子在幄坐射犬于外杜二子張骼輔躒幄帳也幄於角反既食而後食之林言二子不為之禮後嗣音食使御廣車而行杜廣車兵車廣古曠反已皆乘乘車乘車安車乘繩證反下同將及楚師而後從之乘林將近及楚師而後二子同射犬乘兵車皆踞轉而鼓琴林轉衣裝也二子皆箕踞衣裝而鼓琴示間暇踞居慮反轉張戀反下同近不告而馳之杜射犬恨故近敵不告而馳皆取胄於櫜而胄入壘皆下搏人以投收禽挾囚林胄兜鍪也二子取胄於櫜中而加於首入楚營壘三子皆下車手搏楚人以投其車收其禽獲挾其囚虜櫜古毛反搏音博徐甫各反挾音協弗待而出杜射犬又不待二子皆超乘抽弓而射林二子皆超乘而登車各抽弓而射楚人既免復踞轉而鼓琴曰公孫同乘兄弟也杜言同乘義如兄弟胡再不謀杜謂不告而馳不待而出對曰曩者志入而已今則怯也林言曩者不告而馳志於入壘今則怯敵故不待而出曩奴黨反嚮也怯去業反皆笑曰公孫之亟也杜亟急也言其性急不能受屈亟居力反楚子自棘澤還使薳啓疆帥師送陳無宇傳言相楚固相齊也吳人為楚舟師之役故在此年夏為于偽反召舒鳩人舒鳩人叛楚杜舒鳩楚屬國召欲與共伐楚楚子師于荒浦荒浦舒鳩地浦叛五反使沈尹夀與師祁犂讓之林二子楚大夫楚子先使二子責讓舒鳩人犂力兮反又利之反舒鳩子敬逆二子而告無之林告二子以無叛楚之事且請受盟二子復命王欲伐之薳子曰不可杜令尹薳子馮彼告不叛且請受盟而又伐之伐無罪也姑歸息民以待其卒杜卒終也林且歸楚以安息吾民以待其終之叛否卒而不二吾又何求若猶叛我無辭有庸乃還林若舒鳩終不攜二我又何求於舒鳩若猶叛楚與吳則以兵討之彼自無辭而我有功庸矣杜為明年楚滅舒鳩傳陳人復討慶氏之黨針宜咎出奔楚杜言宜咎所以稱名齊人城郟郟王城也於是穀雒鬬毁王宮齊叛晉欲求媚於天子故為王城之郟古洽反穆叔如周聘且賀城王嘉其有禮也賜之大路大路天子所賜車之總名為昭四年叔孫以所賜路葬張本晉侯嬖程鄭使佐下軍杜代欒盈也鄭行人公孫揮如晉聘杜揮子羽也程鄭問焉曰敢問降階何由杜問自降下之道子羽不能對歸以語然明杜然明鬷蔑語魚據反然明曰是將死矣不然將亡貴而知懼懼而思降乃得其階林言程鄭殆將死矣若其不死將出亡凡人貴而知畏懼懼其高危則思降下乃得其道階猶道也下人而已又何問焉林不過降下於人而已此最易知又何必問下户嫁反且夫既登而求降階者知人也林且夫人既登貴位而知降下之道者明智之人乃能思降夫音扶知音智不在程鄭其有亡釁乎不然其有惑疾林若不在程鄭之身其家將有出亡之釁若其不亡其必程鄭身有惑易喪志之疾將死而憂也林鄭本小人其必將死而憂始問降階之道為明年程鄭卒張本經癸丑二十有五年春齊崔杼帥師伐我北鄙夏五月乙亥齊崔杼殺其君光杜齊侯雖背盟主未有無道於民故書臣罪崔杼也林莊公弒弟景公杵自立公會晉侯宋公衛侯鄭伯曺伯莒子邾子滕子薛伯杞伯小邾子于夷儀六月壬子鄭公孫舍之帥師八陳杜子産之言陳以不義見入故舍之無譏釋例詳之秋八月己巳諸侯同盟于重丘杜夷儀之諸侯也重丘齊地己巳七月十一日經誤重直龍反公至自會無傳衛侯入于夷儀夷儀本邢地衛滅邢而為衛邑晉愍衛衎失國使衛分之一邑書入者自外而入之辭非國逆之例楚屈建帥師滅舒鳩傳在衛侯入夷儀上經在下從告冬鄭公孫夏帥師伐陳陳猶未服十有二月吳子遏伐楚門于巢卒杜遏諸樊也為巢守臣所弒不書弒者楚人不獲其尸吳以卒告未同盟而赴以名林諸樊卒餘祭立遏於葛反徐音謁傳二十五年春齊崔杼帥師伐我北鄙以報孝伯之師也前年魯使孟孝伯為晉伐齊公患之使告于晉孟公綽曰崔子將有大志杜志在弒君孟公綽魯大夫綽昌若反不在病我必速歸何患焉其來也不冦杜不為冦害使民不嚴杜欲得民心異於他日林言崔杼之用師與他日異齊師徒歸徒空也齊棠公之妻東郭偃之姊也林棠公齊棠邑大夫姊女兄也東郭偃臣崔武子棠公死偃御武子以弔焉見棠薑而美之杜美其色也使偃取之杜為已取也取如字又七住反偃曰男女辨姓林辨别也古者娶妻不娶同姓故男女辨姓今君出自丁齊丁公崔杼之祖臣出自桓不可杜齊桓公小白東郭偃之祖同薑姓故不可婚武子筮之遇困杜坎下兑上困之大過杜巽下兑上大過困六三變為大過史皆曰吉杜阿崔子示陳文子文子曰夫從風杜坎為中男故曰夫變而為巽故曰從風風隕妻不可娶也杜風能隕落物者變而隕落故曰妻不可娶隕於敏反且其繇曰困于石據于蒺藜入于其宮不見其妻凶杜困六三爻辭林六三處三陽之間進而遇九四九五之剛困于石之象退而乘九二之剛據于蒺藜之象六三上六非陰陽徒敵則又不見其妻之象繇直又反蒺音疾藜力利反困于石往不濟也杜坎為險為水水之險者石不可以動據于蒺藜所恃傷也杜坎為險兑為澤澤之生物而險者蒺藜將恃之則傷入于其宮不見其妻凶無所歸也易曰非所困而困名必辱非所據而據身必危既辱且危死其將至妻其可得見耶今卜昏而遇此卦六三失位無應則喪其妻失其所歸也崔子曰嫠也何害先夫當之矣杜寡婦曰嫠言棠公已當此凶嫠本又作釐力之反遂取之莊公通焉驟如崔氏林驟數也驟愁又反又在遘反以崔子之冠賜人侍者曰不可公曰不為崔子其無冠乎杜言雖不為崔子猶自應有冠林謾詞崔子因是杜因是怒公又以其間伐晉也杜間晉之難而伐之間間厠之間難乃旦反曰晉必將報欲弒公以説於晉而不獲間公鞭侍人賈舉而又近之乃為崔子間公林侍人賈舉怨公鞭已乃為崔杼伺公間隙説音悅又如字為于偽反下同夏五月莒為且于之役故莒子朝于齊杜且于役在二十三年且子餘反甲戌饗諸北郭崔子稱疾不視事欲使公來乙亥公問崔子杜問疾遂從薑氏薑入於室與崔子自側户出公拊楹而歌杜歌以命薑拊芳甫反拍也侍人賈舉止衆從者而入閉門林為崔子閉公此所謂間公也杜重言侍人者别下賈舉從才用反甲興林崔子伏甲以待莊公至是甲興公登臺而請弗許林請免請盟弗許請自刃於廟弗許杜求還廟自殺也皆曰君之臣杼疾病不能聽命不能親聽公命近於公宫言崔子宫近公宫或淫者詐稱公陪臣干掫有淫者不知二命杜干掫行夜言行夜得淫人受崔子命討之不知他命干徐讀曰犴胡旦反服音如字掫側栁反徐子俱反又作侯反説文云掫夜戒有所擊也從手取聲字林同音子侯反服本作諏子須反謀也今傳本或作諏猶依掫音公踰牆又射之中股反隊遂殺之賈舉州綽邴師公孫敖封具鐸父襄伊僂堙皆死林此非侍人賈舉也八子皆齊勇力之臣為公所嬖者與公共死於崔子之宮射亦亦反中丁仲反隊直類反鐸待洛反僂力侯反堙音因祝他父祭於髙唐林祝他父齊莊公之嬖杜髙唐有齊别廟也他徒河反至復命不説辨而死於崔氏杜爵辨祭服説他活皮辨皮彥反申蒯侍漁者侍漁監取魚之官蒯苦怪反退謂其宰曰爾以帑免杜帑宰之妻子帑音奴我將死其宰曰免是反子之義也與之皆死林言我若以妻子免是反申蒯死君之義也與申蒯皆死於崔氏崔氏殺鬷蔑于平陰鬷蔑平陰大夫公外嬖傳言莊公所養非國士故其死難皆嬖寵之人鬷子公反晏子立於崔氏乏門外林晏子即晏平仲杜聞難而來其人曰死乎曰獨吾君也乎哉吾死也林言已與衆臣無異豈獨我君也乎哉我何為而獨死也曰行乎曰吾罪也乎哉吾亡也林言我獨罪於君逃也乎哉我何為而亡也曰歸乎曰君死安歸杜言安可以歸君民者豈以陵民社稷是主臣君者豈為其口實社稷是養杜言君不徒居民上臣不徒求祿皆為社稷林口實祿養也為于偽反下同故君為社稷死則死之為社稷亡則亡之杜謂以公義死亡若為已死而為已亡非其私䁥誰敢任之杜私䁥所親愛也非所親愛無為當其禍䁥女乙反任音壬且人有君而弒之吾焉得死之而焉得亡之林人謂崔杼杜言已非正卿見待無異於衆臣故不得死其難也焉於虔反下同將庸何歸杜將用死亡之義何所歸趣門啓而入枕尸股而哭林以公尸枕已股枕之鳩反興林既哭而起三踊而出人謂崔子必殺之崔子曰民之望也舍之得民杜舍置也林言晏子之賢民之所仰望也置而不殺可得民心踊羊寵反盧蒲嫳奔晉王何奔莒二子莊公黨為二十八年殺慶舍張本叔孫宣伯之奔齊也宣伯魯叔孫僑如成十六年奔齊叔孫還納其女於靈公嬖生景公杜還齊景公子納宣伯女於靈公還音旋丁丑崔杼立而相之慶封為左相盟國人於大宮杜大宮大公廟相息亮反下同大音泰曰所不與崔慶者晏子仰天歎曰嬰所不唯忠於君利社稷者是與有如上帝乃歃杜盟書云所不與崔慶者有如上帝讀書未終晏子抄答易其辭因自歃林嬰晏平仲名言崔慶若不忠於君不利社稷不敢與也歃所洽反父所甲及辛巳公與大夫及莒子盟莒子朝齊遇崔杼作亂未去故復與景公盟大史書曰崔杼弒其君崔子殺之其弟嗣書而死者二人杜嗣續也并前有三人死其弟又書乃舍之南史氏聞大史盡死執簡以往聞既書矣乃還林南史氏齊史之在外者古之書者必以汗青之簡故執簡往欲以書其罪傳言齊有直史崔杼之罪所以聞閭丘嬰以帷縳其妻而載之與申鮮虞乘而出杜二子莊公近臣帷位悲反縳直轉反乘繩證反鮮虞推而下之杜下嬰妻也推如字又他同反曰君昏不能匡危不能救死不能死而知匿其昵杜昵藏也昵親也匿女力反䁥女乙反其誰納之行及弇中將舍弇中俠道弇於檢反又於亷反嬰曰崔慶其追我鮮虞曰一與一誰能懼我林言道狹一人與一人戰耳衆無所用遂舍枕轡而寢杜恐失馬也枕之鳩反食馬而食林先食馬而後食食馬音嗣駕而行出弇中謂嬰曰速驅之崔慶之衆不可當也遂來奔杜道廣衆得用故不可當崔氏側莊公于北郭林側痤埋之不殯於廟丁亥葬諸士孫之里杜士孫人姓因名里死十三日便葬不待五月四翣喪車之飾諸侯不翣翣所甲反不蹕杜蹕止行人蹕音必下車七乘不以兵甲杜下車逆葬之車齊舊依上公禮九乘又有甲兵今皆降損乘繩證反晉侯濟自泮林泮水名地闕泮普半反會于夷儀伐齊以報朝歌之役朝歌役在二十三年不書伐齊齊人逆服兵不加齊人以莊公説杜以弒莊公説晉也説如字又音悅使隰鉏請成慶封如師杜慶封獨使於晉不通諸侯故不書鉏隰朋之曾孫鉏仕居反男女以班林班辨也齊之男女各以其辨賂晉侯以宗器樂器宗器祭祀之器樂器宗磬之屬自六正杜三軍之六卿五吏三十帥杜五吏文職三十帥武職皆軍卿之屬官帥所類反三軍之大夫百官之正長師旅杜百官正長羣有司也師旅小將帥長丁丈反及處守者皆有賂杜皆以男女為賂處守守國者守手又反晉侯許之杜晉侯受賂還不譏者齊有喪師自宜退使叔向告於諸侯杜告齊服公使子服惠伯對曰君舍有罪以靖小國林子服惠伯即孟椒言晉軍縱舍齊之罪戾以安靖從役之小國君之惠也寡君聞命矣晉侯使魏舒宛沒逆衛侯杜衛獻公以十四年奔齊林晉平公愍其失國故使二子迎之于晉宛於元反將使衛與之夷儀林晉將使衛殤公剽割夷儀以與衛獻公崔子止其帑以求五鹿杜崔杼欲得衛之五鹿故留衛侯妻子於齊以質之初陳侯會楚子伐鄭在前年當陳隧者井堙木刋杜隧徑也堙塞也刋除也林當陳之隧徑者有井則堙塞之有木則刋除之隧音遂徐徒猥反下同刋苦于反鄭人怨之六月鄭子展子産帥車七百乘伐陳宵突陳城林突穿也乘夜穿突陳城遂入之陳侯扶其大子偃師奔墓杜欲逃冡間遇司馬桓子曰載余杜陳之司馬曰將巡城不欲載公以巡城辭遇賈獲杜賈獲陳大夫載其母妻下之而授公車公曰舍而母林謂賈獲置汝之母於車辭曰不祥杜雖急猶不欲男女無别與其妻扶其母以奔墓亦免子展命師無入公宮與子産親御諸門杜欲服之而已故禁侵掠林御止也御魚呂反陳侯使司馬桓子賂以宗器陳侯免擁社杜免喪服擁社抱社主示服免音問徐音萬喪冠也擁於勇反使其衆男女别而纍以待於朝杜纍自囚係以待衛纍類悲反又呂軌反子展執縶而見林縶馬韁也子展執之而見陳哀公修臣僕之禮縶陟立反見賢遍反再拜稽首承飲而進獻杜承飲奉觴示不失臣敬子美入數俘而出杜子美子産也但數其所獲人數不將以歸數所主反俘芳夫反祝祓社司徒致民司馬致節司空致地乃還杜祓除也節兵苻陳亂故正其衆官修其所職以安定之乃還也祓芳弗反徐音廢秋七月己巳同盟于重丘齊成故也伐齊而稱同盟以明齊亦同盟趙文子為政杜趙武代范丐令薄諸侯之幣而重其禮以重禮待諸侯穆叔見之謂穆叔曰自今以往兵其少弭矣弭止也弭亡氏及齊崔慶新得政將求善於諸侯武也知楚令尹林言與楚令尹子木相知若敬行其禮道之以文辭以靖諸侯兵可以弭為二十七年晉楚盟于宋傳道音導楚薳子馮卒屈建為令尹杜屈建子木屈蕩為莫敖代屈建宣十二年邲之役楚有屈蕩為左廣之右世本屈蕩屈建之祖父今此屈蕩與之同姓名舒鳩人卒叛前年辭不叛楚令尹子木伐之及離城杜離城舒鳩城吳人救之子木遽以右師先杜先至舒鳩遽其據反子疆息桓子捷子駢子盂帥左師以退五人不及子木與吳相遇而退捷在接反駢蒲賢反又蒲丁反盂音于吳人居其間七日杜居楚兩軍之間子疆曰久將墊隘隘乃禽也不如速戰杜墊隘慮水雨林言相持則慮水雨若遇水雨必為吳獲墊丁念反方言云下也隘於解反請以其私卒誘之簡師陳以待我簡閲精兵駐後為陳卒子忽反下同陳直覲反我克則進奔則亦視之杜視其形勢而救視之乃可以免不然必為吳禽從之五人以其私卒先擊吳師吳師奔登山以望見楚師不繼復逐之傅諸其軍杜吳還逐五子至其本軍傅音附簡師會之林楚人先所簡閲精兵為陳者會合而擊之吳師大敗遂圍舒鳩舒鳩潰八月楚滅舒鳩杜五子既敗吳師遂前及子木共圍滅舒鳩衛獻公入于夷儀為下自夷儀與寧喜言張本鄭子産獻捷于晉杜獻入陳之功而不獻其俘戎服將事杜戎服軍旅之衣異於朝服晉人問陳之罪對曰昔虞閼父為周陶正以服事我先王杜閼父舜之後當周之興閼父為武王陶正閼於葛反我先王賴其利器用也與其神明之後也杜舜聖故謂之神明庸以元女大姫配胡公庸用也元女武王之長女胡公閼父之子滿也大音泰而封諸陳以備三恪周得天下封夏殷二王後又封舜後謂之恪并二王後為三國其禮轉降示敬而已故曰三恪恪苦洛反則我周之自出至于今自賴杜言陳周之甥至今賴周德桓公之亂蔡人欲立其出杜陳桓公鮑卒於是陳亂事在魯桓五年蔡出桓公之子厲公也我先君莊公奉五父而立之杜五父他桓公弟殺大子免而代之鄭莊公因就定其位蔡人殺之杜欲立其出故我又與蔡人奉戴厲公奉戴猶奉事至于莊宣皆我之自立杜陳莊公宣公皆厲公子夏氏之亂成公播蕩又我之自入君所知也杜播蕩流移失所宣十一年陳夏徵舒弒靈公靈公之子成公奔晉自晉因鄭而入也今陳忘周之大德蔑我大惠棄我姻親介恃楚衆以馮陵我敝邑不可億逞杜億度也逞盡也林逞快也不可億度其快志馮皮氷反我是以有往年之告杜謂鄭伯稽首告晉請伐陳未獲成命杜未得代陳命則有我東門之役前年陳從楚伐鄭東門當陳隧者井堙木刋敝邑大懼不競而恥大姫杜上辱大姫之靈天誘其𠂻啓敝邑心杜啓開也開道其心故得勝衷音忠陳知其罪授手于我林謂陳侯喪服擁社使男女自囚待命是授手于我用敢獻功晉人曰何敢侵小對曰先王之命唯罪所在各致其辟林辟誅也言唯視罪之所在各隨罪而致其誅言陳有罪當誅辟婢亦反且昔天子之地一圻杜方千里圻音祈列國一同杜方百里自是以衰杜衰言降林謂次國七十里小國五十里衰初危反今大國多數圻矣若無侵小何以至焉晉人曰何故戎服對曰我先君武莊為平桓卿士杜鄭武公莊公為周平王桓王卿士數色主反下同城濮之役文公布命曰各復舊職即晉文公濮音卜命我文公戎服輔王以授楚捷不敢廢王命故也林言今日所以戎服者不敢廢棄王室之命故也城濮在僖二十八年士莊伯不能詰杜士莊伯士弱也復於趙文子文子曰其辭順犯順不祥杜言不為神所祐乃受之冬十月子展相鄭伯如晉拜陳之功杜謝晉受其功相息亮反子西復伐陳陳及鄭平杜前雖入陳服之而已故更伐以繼成仲尼曰杜孔子追論其事志有之杜志古書言以足志文以足言杜足猶成也林人之有言所以成其志之趨向也言之有文所以成其言之華采也足將住反又如字不言誰知其志言之無文行而不逺杜雖得行猶不能及逺晉為伯鄭入陳非文辭不為功慎辭哉杜樞機之發榮辱之主楚蒍掩為司馬蒍子馮之子子木使庀賦杜庀治庀匹婢反數甲兵杜閲數之甲午蒍掩書土田書土地之所宜度山林度量山林之材以共國用度待洛反鳩藪澤鳩聚也聚成藪澤使民不得焚燎壞之欲以備田獵之處藪素口反辨京陵辨别也絶髙曰京大阜曰陵别之以為塜墓之地表淳鹵淳鹵埆薄之地表異輕其賦稅淳音純鹵音異説文云鹵西方鹹也數疆潦疆界有流潦者計數減其租八疆居良反規偃豬偃豬下濕之地規度其受水多少偃於建反又如字豬陟魚反尚書傳云停水曰豬町原防廣平曰原防隄也隄防間地不得方正如井田别為小頃町町徒頂反牧隰臯隰卑水崖下濕為芻牧之地井衍沃衍沃平美之地則如周禮制以為井田六尺為步步百為畝畝百為夫九夫為井衍以善反賈云下平曰衍有流曰沃量入修賦量九土之所入而治理其賦稅量音良又音壳賦車林周制六十四井為甸出長轂一乘戎馬四匹牛十二頭甲士三人步卒七十二人楚制雖無可考亦可類推籍馬籍疏其毛色歲齒以備軍用賦車兵林車兵甲士徒卒步卒卒子忽反甲楯之數杜使器杖有常數楯食凖反又音尹既成以授子木禮也得治國之禮傳言楚之所以興十二月吳子諸樊伐楚以報舟師之役舟師在二十四年也門于巢杜攻巢門巢牛臣曰吳王勇而輕若啓之將親門林牛臣巢人言諸樊有勇而輕狂若開巢門將親來攻門杜啓開門也輕遣正反我獲射之必殪殪死也射食亦反下同殪於計反是君也死疆其少安林若諸樊死吳之疆盛其可少息疆居良反從之吳子門焉牛臣隱於短牆以射之卒楚子以滅舒鳩賞子木辭曰先大夫蒍子之功也以與蒍掩杜往年楚子將伐舒鳩蒍子馮請退師以須其叛楚子從之卒獲舒鳩故子木辭賞以與其子晉程鄭卒子産始知然明杜前年然明謂程鄭將死今如其言故知之問為政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀也林鷹鸇之於鳥雀見則必遂為政之於不仁見則必誅鷹於陵反鸇之然反又居延反子産喜以語子大叔且曰他日吾見蔑之面而已杜蔑然明名語魚據反今吾見其心矣子大叔問政於子産子産曰政如農功日夜思之思其始而成其終林政之治民如農之治田日以繼夜欲興利而除害有利必興有害必除既思其始必成其終朝夕而行之行無越思林朝夕之問人所易忽故必朝夕勤以行之思而後行所行不敢過於所思如農之有畔杜言有次其過鮮矣衛獻公自夷儀使與寧喜言杜求復國也寧喜許之大叔文子聞之杜大叔儀也曰烏乎詩所謂我躬不説皇恤我後者寧子可謂不恤其後矣杜皇恤也詩小雅言令我不能自容説何暇念其後乎謂寧子必身受禍不得恤其後也説音悅詩作悅容也將可乎哉殆必不可林寧子所為如此將可以濟事乎哉言其甚不可也君子之行思其終也思使終可成思其復也思其可復行書曰慎始而敬終終以不困杜逸書林謹其創始敬其成終故其終無困廢之患今書蔡仲之命云慎厥初惟厥終終以不困詩曰夙夜匪懈以事一人杜舉大雅蒸民詩杜一人以喻君解佳買反今寧子視君不如奕棋杜奕圍棋也奕音亦棋音其其何以免乎奕者舉棋不定不勝其耦林耦對敵也而况置君而弗定乎必不免矣九世之卿族一舉而滅之可哀也哉杜寧氏出自衛武公及喜九世也林明年衛獻歸國二十七年果殺寧喜左傳杜林合注卷三十
