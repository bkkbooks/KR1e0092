body:
  text: 左傳杜林合注卷四十五明王道焜趙如源同編定公二經丙申五年春王三月辛亥朔日有食之無傳夏歸粟于蔡蔡為楚所圍飢之故魯歸之粟於越入吳林於發聲也向曰越人今曰於越復從其舊號也越未有聞也昭定之春秋吳楚爭而後越入中國昭五年會于瑣也越常夀過始見於經而亟稱人後三十年而入吳不復稱人矣晉楚之初春秋未以敵言之戰于邲也則楚稱子矣吳楚之初春秋未以敵言之戰于柏舉也則吳稱子矣至於吳越終春秋不以敵言之也是故越入吳書吳入越不書六月丙申季孫意如卒秋七月壬子叔孫不敢卒無傳冬晉士鞅帥師圍鮮虞傳五年春王人殺子朝于楚因楚亂也終閔馬父之言夏歸粟干蔡以周亟矜無資林亟急也以周濟蔡人之亟難矜哀蔡人之無資糧亟紀力反越入吳吳在楚也林乘吳之在楚而入其國也六月季平子行東野東野季氏邑行下孟反下同還未至丙申卒于房陽貨將以璵璠斂杜璵璠美玉君所佩璵音餘璠音煩又方煩反斂力驗反仲梁懷弗與懷亦季氏家臣曰改步改玉杜昭公之出季縣行君事佩璵璠祭宗廟今定公立復臣位改君步則亦當去璵璠陽貨欲逐之告公山不狃不狃曰彼為君也子何怨焉杜不狃季氏臣費宰子泄也為君不欲使僣林君謂意如狃女九反為于偽反既葬桓子行東野杜桓子意如子季孫斯及費子泄為費宰逆勞於郊桓子敬之勞仲梁懷仲梁懷弗敬杜懷時從桓子行輕慢子泄勞力報反下同子泄怒謂陽貨子行之乎杜行逐懷也為下陽貨囚桓子起申包胥以秦師至秦子蒲子虎帥車五百乘以救楚五百乘三萬七千五百人乘繩證反子蒲曰吾未知吳道林道猶法術也言我未知制吳之法術使楚人先與吳人戰而自稷會之大敗夫槩王于沂杜稷沂皆楚地吳人獲薳射於柏舉薳射楚大夫射食亦反又食夜反其子帥奔徒杜奔徒楚散卒以從子西敗吳師於軍祥楚地秋七月子期子蒲滅唐杜從吳伐楚故九月夫槩王歸自立也以與王戰而敗自立為吳王號夫槩奔楚為堂溪氏傳終言之吳師敗楚師于雍澨秦師又敗吳師吳師居麇麇地名麇九倫反下同子期將焚之林楚子期將以火攻吳師子西曰父兄親暴骨焉不能收又焚之不可杜前年楚人與吳戰多死麇中言不可并焚暴步卜反子期曰國亡矣死者若有知也可以歆舊祀杜言焚吳復楚則祭祀不廢豈憚焚之焚之而又戰吳師敗又戰于公壻之溪楚地名吳師大敗吳子乃歸囚闉輿罷闉輿罷請先遂逃歸杜輿罷楚大夫請先至吳而逃歸言吳唯得楚一大夫復失之所以不克闉音因罷音皮葉公諸梁之弟后臧從其母於吳不待而歸諸梁司馬沈尹戌之子葉公子高也吳入楚獲后臧之母楚定臧棄母而歸葉舒涉反從如字又才用反葉公終不正視杜不義之乙亥陽貨囚季桓子及公父文伯文伯季桓子從父昆弟也陽貨欲為亂恐二子不從故囚之父音甫而逐仲梁懷林以其不順已故冬十月丁亥殺公何藐藐季氏族己丑盟桓子于稷門之內魯南城門庚寅大詛林詛謂違盟者當受罰詛莊慮反逐公父歜及秦遄皆奔齊杜歜即文伯也秦遄平子姑壻也傳言季氏之亂歜昌欲反楚子入于郢吳師已歸初鬭辛聞吳人之爭宫也曰吾聞之不讓則不和不和不可以逺征吳爭於楚必有亂有亂則必歸焉能定楚林吳始入楚已有所爭爭而不已其勢必亂禍亂既起其勢必歸安能定楚之地焉於虔反王之奔隨也將涉於成自江夏竟陵縣有白水出聊屈山西南入漢白其久反藍尹亹涉其帑林亹楚大夫先在白水涉其妻子亹亡匪反帑音奴不與王舟及寧王欲殺之杜寧安定也子西曰子常唯思舊怨以敗君何效焉王曰善使復其所吾以志前惡林惡過也我用此以識前日之過王賞鬭辛王孫由于王孫圉鍾建鬭巢申包胥王孫賈宋木鬭懷九子皆從王有大功者子西曰請舍懷也杜以初謀弒王也舍音捨又音赦王曰大德滅小怨道也杜終從其兄免王大難是大德申包胥曰吾為君也非為身也君既定矣又何求且吾尤子旗其又為諸林言我乞師於秦王欲為君救難非以為身求賞今君既已安定在我又復何求且我常以子旗為過其可又為子旗所為以自速禍杜子旗蔓成然也以有德于平王求欲無厭平王殺之在昭十四年為君為身于偽反遂逃賞王將嫁季芊季芊辭曰所以為女子逺丈夫也鍾建負我矣林前年楚大夫鍾建負季芊以從奔鄖逺于萬反以妻鍾建以為樂尹杜司樂大夫妻七計反王之在隨也子西為王輿服以保路國于脾泄杜脾泄楚邑也失王恐國人潰散故偽為王車服立國脾泄以保安道路人聞王所在而後從王王使由于城麇杜於麇築城復命子西問髙厚焉弗知子西曰不能如辭杜言自知不能當辭勿行城不知髙厚小大何知林築城尚不知其髙厚小大之數當復與知何事對曰固辭不能子使余也人各有能有不能王遇盜於雲中余受其戈其所猶在杜其被傷處猶在袒而視之背曰此余所能也脾泄之事余亦弗能也傳言昭王所以復國有賢臣也袒音但晉士鞅圍鮮虞報觀虎之役也三年鮮虞獲晉觀虎經丁酉六年春王正月癸亥鄭遊速帥師滅許以許男斯歸杜遊速大叔子林斯執元公成立二月公侵鄭林自宣之季年凡伐不言公魯無君將者八十年矣至是書侵鄭則以公出不狃侯犯陽虎之専也故曰政逮于大夫四世矣故夫三桓之子孫微矣公至自侵鄭無傳夏季孫斯仲孫何忌如晉秋晉人執宋行人樂祁犂稱行人言非其罪冬城中城無傳公為晉侵鄭故懼而城之季孫斯仲孫忌帥師圍鄆杜無傳何忌不言何闕文鄆二於齊故圍之鄆音運傳六年春鄭滅許因楚敗也林因楚敗故滅其與國二月公侵鄭取匡為晉討鄭之伐胥靡也杜胥靡周地也周儋翩因鄭人以作亂鄭為之伐胥靡故晉使魯討之匡鄭地取匡不書歸之晉為于偽反往不假道於衛及還陽虎使季孟自南門入出自東門陽貨將逐三桓欲使得罪於鄰國舍於豚澤衛侯怒使彌子瑕追之彌子瑕衛嬖大夫公叔文子老矣杜文子公叔發輦而如公曰尤人而效之非禮也林尤責也責人之過而倣效其所為知禮者宜不為此昭公之難君將以文之舒鼎衛文公之鼎難乃旦反成之昭兆杜寶龜定之鞶鑑杜鞶帶而以鏡為飾也今西方羌胡猶然古之遺服鞶步丹反苟可以納之擇用一焉公子與二三臣之子諸侯苟憂之林諸侯苟有憂恤魯侯者將以為之質林為質求納魯昭公質音致此羣臣之所聞也今將以小忿蒙舊德蒙覆也無乃不可乎大姒之子大姒文王妃大音泰唯周公康叔為相睦也而效小人以棄之不亦誣乎天將多陽貨之罪以斃之林陽虎本有罪天意又欲甚其罪而後斃踣之言此不假道皆陽貨所為君姑待之若何乃止杜止不伐魯師夏季桓子如晉獻鄭俘也獻此春取匡之俘陽貨強使孟懿子往報夫人之幣虎欲困辱三桓并求媚於晉故強使正卿報晉夫人之聘強其丈反晉人兼享之杜賤魯故不復兩設禮明經所以不備書孟孫立于房外杜孟孫即孟懿子立於更衣房之外謂范獻子曰陽貨若不能居魯而息肩於晉所不以為中軍司馬者有如先君林息肩猶任重者止息其兼擔之勞此言陽貨不能任重於魯而求息肩於晉若為陽貨請晉必處之以中軍司馬之官杜稱先君以徴其言若欲使晉必厚待之獻子曰寡君有官將使其人杜擇得其人鞅何知焉獻子謂簡子曰魯人患陽貨矣孟孫知其釁以為必適晉故強為之請以取入焉杜欲令晉人聞虎當逃走故強設請託之辭因此言以入晉令晉素知之為之于偽反四月己丑吳大子終纍敗楚舟師杜終纍闔廬子夫差兄舟師水戰纍力追反又力軌反獲潘子臣小惟子二于楚舟師之帥惟位悲反本又作帷亦如字及大夫七人楚國大惕懼亡子期又以陵師敗于繁揚杜陵師陸軍林以上文有舟師故以陵師别之令尹子西喜曰乃今可為矣言知懼而後可治於是乎遷郢於鄀林改鄀為郢故曰遷郢於鄀鄀音若而改紀其政林改其政而新之紀其政而理之以定楚國傳言楚賴子西以安周儋翩率王子朝之徒因鄭人將以作亂于周枉儋翩子朝餘黨鄭於是乎伐馮滑胥靡負黍狐人闕外杜鄭伐周六邑在魯伐鄭取匡前於此見者為戍周起也陽城縣西南有負黍亭見賢遍反下同六月晉閻沒戍周且城胥靡杜為下天王出君姑蕕起秋八月宋樂祁言於景公曰諸侯唯我事晉今使不往晉其憾矣樂祁告其宰陳寅杜以與公言告之使所吏反陳寅曰必使子往他日公謂樂祁曰唯寡人説子之言子必往陳寅曰子立而後行寅知晉政多門往必有難故使樂祁立後而行説音悅吾室亦不亡林已為先人立後故雖身死不亡其家唯君亦以我為知難而行也林亦使宋君知樂祁此行為不易見溷而行杜溷樂祁子也見子君立以為後溷侯溫反又侯困反趙簡子逆而飲之酒於綿上獻楊楯六十於簡子林楯干楯也以楊木為之飲於鴆反楯食允反又音允陳寅曰昔吾主范氏今子主趙氏又有納焉以楊楯賈禍弗可為也已林納猶獻也寅知范氏必怨將得禍賈音古然子死晉國子孫必得志於宋杜以其為國死范獻子言於晉侯曰以君命越疆而使未致喪而私飲酒不敬二君不可不討也乃執樂祁杜獻子怒祁比趙氏經所以稱行人使所吏反下同陽虎又盟公及三桓於周社盟國人于亳社詛于五父之衢傳言三桓微陪臣専政為八年陽虎作亂起詛側慮反父音甫冬十二月天王處于姑蕕杜姑蕕周地辟儋翩之亂也杜為明年單劉逆王起經戊戌七年春王正月夏四月秋齊侯鄭伯盟于鹹杜衛地林此特相盟也特相盟自齊桓以來未之有也於是再見諸侯無主盟矣是故書石門以志諸侯之合書鹹以志諸侯之散此春秋之終始也齊人執衛行人北宫結以侵衛稱行人非使人之罪齊侯衛侯盟于沙杜結叛晉也陽平元城縣東南有沙亭大雩無傳過也齊國夏帥師伐我西鄙夏國佐孫九月大雩無傳過也冬十月傳七年春二月周儋翩入于儀栗以叛儀栗周邑齊人歸鄆陽關陽虎居之以為政杜鄆陽關皆魯邑中二於齊齊今歸之不書虎専之夏四月單武公穆公子劉桓公文公子敗尹氏于窮谷杜尹氏復黨儋翩共為亂也秋齊侯鄭伯盟于鹹徵會于衛杜徵召也衛侯欲叛晉杜屬齊鄭也諸大夫不可使北宫結如齊而私於齊侯曰執結以侵我欲以齊師懼諸大夫齊侯從之乃盟于瑣瑣即沙也為明年涉他捘衛侯手起齊國夏伐我杜齊叛晉故陽虎御季桓子公斂處父御孟懿子杜處父孟氏家臣成宰公斂陽斂力檢反又音亷將宵軍齊師林將乘夜以攻齊師齊師聞之墮伏而待之杜墮毁其軍以誘敵而設伏兵將夾擊之墮許規反處父曰處不圖禍而必死林言陽虎汝不圖度禍難以攻齊師汝必當死而女也苫夷曰虎陷二子於難杜苫夷季氏家臣二子季孟苫始占反難乃旦反不待有司余必殺女不待魯之有司討治汝罪余必先自殺汝女音汝虎懼乃還不敗傳言陪臣強能自相制季孟不敢有心冬十一月戊午單子劉子逆王于慶氏杜慶氏守姑蕕大夫天王前年出居於此故單劉逆王以歸晉籍秦送王己巳王入于王城杜己巳十二月五日有日無月館于公族黨氏杜黨氏周大夫黨音掌而後朝于莊宫杜莊王廟也經己亥八年春王正月公侵齊報前年伐我西鄙公至自侵齊無傳二月公侵齊杜未得志故林見魯之後於棄晉也三月公至自侵齊無傳曹伯露卒杜無傳四年盟臯鼬林靖公卒子伯陽立夏齊國夏帥師伐我西鄙公會晉師于瓦杜瓦衛地將來救魯公逆會之東郡燕縣東北有瓦亭林不曰會士鞅而曰會晉師重師也鞍之戰公會晉師于上隕不書諱之也四卿並將而以禽鄭自師逆公三家之張成於此矣故諱之也於是齊師伐我晉士鞅趙鞅荀寅救我公會晉師于瓦勿諱可也公至自瓦無傳秋七月戊辰陳侯栁卒杜無傳四年盟臯鼬林懷公卒子閔公越立晉士鞅帥師侵鄭遂侵衛杜兩事故曰遂林此其言遂何晉始伐與國也於襄之二十三年齊始叛晉取朝歌去年鄭始叛晉盟齊于鹹衛始叛晉盟齊于沙于是侵鄭衛又明年及齊平雖魯亦叛晉矣故悉書之也葬曹靖公無傳九月葬陳懷公無傳三月而葬速季孫斯仲孫何忌帥師侵衛冬衛侯鄭伯盟于曲濮杜無傳結叛晉曲濮衛地濮音卜從祀先公杜從順也先公閔公僖公也將正二公之位次所順非一親盡故通言先公林陽虎欲去三桓而為此也盜竊寶玉大弓杜盜謂陽虎也家臣賤名氏不見故曰盜寶玉夏后氏之璜大弓封父之繁弱林書曰盜竊寶玉大弓魯無人之辭也是故陪臣叛皆不書書陽虎為盜是治陪臣也君子之作春秋治至於陪臣斯極矣傳八年春王正月公侵齊門于陽州杜攻其門士皆坐列言無鬭志曰顔高之弓六鈞顔髙魯人三十斤為鈞六鈞百八十斤古稱重故以為異強皆取而傳觀之陽州人出顔髙奪人弱弓籍丘子鉏擊之與一人俱斃杜子鉏齊人斃仆也傳直專反偃且射子鉏林顔髙雖為子鉏所擊偃仆在地猶射子鉏射食亦反下同中頰殪杜子鉏死林見顔髙有力善射中丁仲反下同顔息射人中睂顔息魯人退曰我無勇吾志其目也林言志射其目乃誤中眉益謙以自矜師退冉猛偽傷足而告杜猛魯人欲先歸其兄會乃呼曰猛也殿杜會見師退而猛不在列乃大呼詐言猛在後為殿傳言魯無軍政殿丁電反二月己丑單子伐穀城劉子伐儀栗杜討儋翩之黨穀城在河南縣西單音善辛卯單子伐簡城劉子伐孟林亦討儋翩之黨以定王室傳終王室之亂趙鞅言於晉侯曰諸侯唯宋事晉好逆其使猶懼不至今又執之是絶諸侯也將歸樂祁士鞅曰林即范獻子好呼報反使所吏反三年止之無故而歸之宋必叛晉林執祁在六年故曰三年止之宋不求晉是無故而歸之獻子私謂子梁杜獻子范鞅子梁樂祁曰寡君懼不得事宋君是以止子子姑使溷代子杜溷樂祁子溷侯溫反又侯困反子梁以告陳寅陳寅曰宋將叛晉是棄溷也不如待之林言宋怨晉勢將背叛如宋必叛而以溷自代是棄之也不如且自留晉以待其定勿以子自代樂祁歸卒于大行杜大行晉東南山大音泰行户郎反一音衡士鞅曰宋必叛不如止其尸以求成焉乃止諸州州晉地為明年宋公使樂大心如晉張本公侵齊攻廩丘之郛杜郛郭也主人焚衝杜衝戰車林此蓋齊人焚魯攻廩郛者之戰車衝昌容反説文作䡴云陷陳車也或濡馬褐以救之杜馬褐馬衣遂毁之杜毁郛主人出林廩丘入出戰師奔杜攻郛人少故遣後師走往助之陽虎偽不見冉猛者曰猛在此必敗杜陽州之役猛先歸言若在此必復敗猛逐之顧而無繼偽顛林冉猛聞言怒逐廩丘人反顧莫有繼其後者復偽顛仆而止虎曰盡客氣也杜言皆客氣非勇苫越生子將待事而名之杜苫越苫夷苫式占反陽州之役獲焉林苫夷獲俘焉名之曰陽州欲自比僑如夏齊國夏高張伐我西鄙杜報上二侵晉士鞅趙鞅荀寅救我杜救不書齊師已去未入竟公會晉師于瓦范獻子執羔趙簡子中行文子皆執雁魯於是始尚羔杜獻子士鞅也簡子趙鞅也中行文子荀寅也禮卿執羔大夫執雁魯則同之今始知執羔之尊也卿不書禮不敵公史略之行户郎反晉師將盟衛侯于剸澤杜自瓦還就衛地盟剸音専又市轉反趙簡子曰羣臣誰敢盟衛君者前年衛叛晉屬齊簡子意欲摧辱之涉他成何曰我能盟之二子晉大夫他徒何反衛人請執牛耳盟禮尊者涖牛耳主次盟者衛侯與晉大夫盟自以當涖牛耳故請成何曰衛吾溫原也焉得視諸侯杜言衛小可比晉縣不得從諸侯禮焉於虔反將歃涉他捘衛侯之手及捥杜捘擠也血至捥歃所治反捘子對反捥烏喚反衛侯怒王孫賈趨進杜賈衛大夫曰盟以信禮也信猶明也有如衛君其敢不唯禮是事而受此盟也言晉無禮不欲受其盟衛侯欲叛晉而患諸大夫王孫賈使次于郊大夫問故杜問不入故公以晉詬語之杜詬恥也詬呼豆反語魚據反且曰寡人辱社稷其改卜嗣寡人從焉杜使改卜他公子以嗣先君我從大夫所立大夫曰是衛之禍豈君之過也公曰又有患焉謂寡人必以而子厚與大夫之子為質杜為質於晉質音致下同大夫曰苟有益也公子則往羣臣之子敢不皆負羈絏以從林羈馬絡頭絏馬韁也言從公子之賤役絏息列反從才用反下同將行王孫賈曰苟衛國有難工商未嘗不為患使皆行而後可林言苟衛國有侵伐之禍難亦未嘗不為工商之患使工商皆行欲激國人使皆怒難乃旦反公以告大夫乃皆將行之行有日有期日公朝國人使賈問焉曰若衛叛晉晉五伐我病何如矣皆曰五伐我猶可以能戰林尚可竭其材能以戰賈曰然則如叛之病而後質焉何遲之有乃叛晉晉人請改盟弗許林晉亦自悔無禮故請改盟秋晉士鞅會成桓公侵鄭圍蟲牢報伊闕也杜桓公周卿士不書監帥不親侵也六年鄭伐周闕外晉為周報之遂侵衛杜討叛九月師侵衛晉故也魯為晉討衛季寤季桓子之弟公鉏極杜公彌曽孫桓子族子公山不狃杜費宰狃女九反皆不得志於季氏叔孫輒無寵於叔孫氏輒叔孫氏之庶子叔仲志不得志於魯志叔孫帶之孫皆為國人所薄故五人因陽虎陽虎欲去三桓林孟叔季三族皆出自桓公號三桓以季寤更季氏杜代桓子更音庚舊古孟反下同以叔孫輒更叔孫氏杜代孟叔已更孟氏杜陽虎自代懿子冬十月順祀先公而祈焉杜將作大事欲以順祀取媚辛卯禘于僖公辛卯十月二日不於大廟者順祀之義當退僖公懼於僖神故於僖廟行順祀壬辰將享季氏于蒲圃而殺之戒都車曰癸巳至杜都邑之兵車也陽虎欲以壬辰夜殺季孫明日癸巳以都車攻二家成宰公斂處父告孟孫曰季氏戒都車何故孟孫曰吾弗聞處父曰然則亂也必及於子先備諸與孟孫以壬辰為期處父期以兵救孟氏壬辰先癸巳一日陽虎前驅林楚御桓子虞人以鈹盾夾之林鈹劔也盾干櫓也虞人之官以鈹盾夾衛桓子鈹普皮反盾食允反又音允陽越殿越陽虎從弟殿丁見反將如蒲圃桓子咋謂林楚林咋暫也季桓子覺其景象頓異乃咋謂林楚咋仕詐反曰而先皆季氏之良也林而汝也言汝之先人皆季氏之良大夫也爾以是繼之杜欲使林楚免己於難以繼其先人之良對曰臣聞命後杜後猶晚也陽虎為政魯國服焉違之徵死林若違之必速召其死死無益於主桓子曰何後之有林言未為差晚而能以我適孟氏乎對曰不敢愛死懼不免主桓子曰往也言必往孟氏選圉人之壯者三百人以為公期築室於門外杜實欲以備難不欲使人知故偽築室於門外因得聚衆公期孟氏支子為干偽反林楚怒馬及衢而騁林林楚乃激怒其馬及通達之衢而馳騁以走孟氏陽越射之不中築者闔門杜季孫既得入乃閉門射食亦反下同中丁仲反有自門間射陽越殺之陽虎劫公與武叔杜武叔叔孫不敢之子州仇也以伐孟氏公斂處父帥成人自上東門入林處父與孟氏期以壬辰故帥成人自魯東城之北門入救孟氏與陽氏戰于南門之內弗勝又戰于棘下杜城內地名陽氏敗陽虎説甲如公宫林示無所畏説他活反取寶玉大弓以出舍于五父之衢寢而為食其徒曰追其將至虎曰魯人聞余出喜于徵死何暇追余杜徴召也陽虎召季氏於蒲圃將殺之今得脫必喜故言喜於召死從者曰嘻速駕公斂陽在杜嘻懼聲林公斂陽即處父言其必來追己嘻許其反公斂陽請追之孟孫弗許杜畏陽虎陽欲殺桓子杜欲因亂討季氏以強孟氏孟孫懼而歸之杜不敢殺子言辨舍爵於季氏之廟而出杜子言季寤辨猶周遍也遍告廟飲酒示無懼辨音遍陽虎入于歡陽關以叛杜叛不書略家臣歡音歡鄭駟歂嗣子大叔為政杜歂駟乞子子然也為明反年殺鄧析張本歂市専經庚子九年春王正月夏四月戊申鄭伯蠆卒杜無傳四年盟臯鼬林獻公卒子聲公勝立蠆敕邁反得寶玉大弓弓玉國之分器得之足以為榮失之足以為辱故重而書之六月葬鄭獻公無傳三月而葬速秋齊侯衛侯次于五氏杜五氏晉地不書伐者諱伐盟主以次告林外會書次自厥貉以來未之有也於是再見其再見何中國無伯也齊衛伐盟主則其不書伐何春秋重絶晉也於襄之二十三年嘗書齊伐晉至是而不書何齊始叛晉諸侯猶有盟主也前年鄭叛晉盟齊于鹹衛叛晉盟齊于沙明年及齊平魯亦叛晉諸侯無盟主矣有盟主非美事也無盟主非細故也是故春秋重絶晉也秦伯卒杜無傳不書名未同盟林哀公卒孫惠公立冬葬秦哀公無傳傳九年春宋公使樂大心盟于晉且逆樂祁之尸辭偽有疾乃使向巢如晉盟且逆子梁之尸林巢向戌曽孫子梁即樂祁子明謂桐門右師出杜子明樂祁之子溷也右師樂大心子明族父也右師往到子明舍子明逐使出門去曰吾猶衰絰而子擊鐘何也忿其不逆父喪因責其無同族之恩衰七雷反右師曰喪不在此故也林言樂祁之喪未歸故不廢樂既而告人曰已衰絰而生子余何故舍鐘杜己子明也林言生子罪重不廢樂罪輕舍音捨子明聞之怒言於公曰右師將不利戴氏樂氏戴公族不肯適晉將作亂也不然無疾乃逐桐門右師逐之在明年終叔孫昭子之言鄭駟歂殺鄧析而用其竹刑杜鄧析鄭大夫欲改鄭所鑄舊制不受君命而私造刑法書之於竹簡故言竹刑君子謂子然於是不忠林子然即駟歂謂其殺賢能不忠於國苟有可以加於國家者棄其邪可也杜加猶益也棄不責其邪惡也邪似嗟反靜女之三章取彤管焉杜詩弼風也言靜女三章之詩雖説美女意在彤管彤管赤管筆女史記事規誨之所執竿旄何以告之取其忠也杜詩鄘風也録竿旄詩者恥其中心願告人以善道也言此二詩皆以一善見采而鄧析不以善存身故用其道不棄其人林以其道可為世用如彤管素絲之類則説懌美女彼姝者子皆不可棄詩云蔽芾甘棠勿翦勿伐召伯所茇杜詩召南也召伯決訟於蔽芾甘棠之下詩人思之不伐其樹茇草舍也芾方味反召音邵茇畔末反思其人猶愛其樹况用其道而不恤其人乎子然無以勸能矣傳言子然嗣大叔為政鄭所以衰弱夏陽虎歸寶玉大弓無益近用而祗為名故歸之書曰得器用也凡獲器用曰得杜器用者謂物之成器可為人用者也得用焉曰獲謂用器物以有獲若麟為田獲俘為戰獲六月伐陽關討陽虎也陽虎使焚萊門陽關邑門師驚林魯師見火起故驚犯之而出林陽虎犯師而出奔齊請師以伐魯曰三加必取之杜三加兵於魯齊侯將許之鮑文子諫曰臣嘗為𨽻於施氏矣杜施氏魯大夫文子鮑國也成十七年齊人召而立之至今七十四嵗於是文子蓋九十餘矣魯未可取也上下猶和衆庶猶睦能事大國杜大國晉也而無天災若之何取之陽虎欲勤齊師也齊師罷大臣必多死亡已於是乎奮其詐謀林陽虎之意但欲勤勞齊師耳齊師疲敝卿大夫必多死於戰鬬始欲奮其詐謀以圖齊國災音災罷音皮夫陽虎有寵於季氏而將殺季孫以不利魯國而求容焉杜求自容親富不親仁林惟親富人以圖其利不親仁人以圖其道君焉用之君富於季氏而大於魯國兹陽虎所欲傾覆也魯免其疾林陽虎出奔魯得免其疾害焉於虔反覆芳服反而君又收之無乃害乎齊侯執陽虎將東之陽虎願東陽虎欲西奔晉知齊必反己故詐以東為願乃囚諸西鄙盡借邑人之車鍥其軸麻約而歸之杜鍥刻也林陽虎盡借所居邑人之車刻其軸使易毁折以麻約縳刻處而歸之其主欲絶追者鍥苦結反載蔥靈寢於其中而逃林蔥靈輜車名蓋車之有障蔽者蔥初江反追而得之囚於齊又以蔥靈逃奔宋遂奔晉適趙氏仲尼曰趙氏其世有亂乎杜受亂人故秋齊侯伐晉夷儀為衛討也敝無存之父將室之辭以與其弟杜無存齊人也室之為取婦林無存辭不願娶以所娶室先與其弟曰此役也不死反必娶於高國杜高氏國氏齊貴族也無存欲必有功還娶卿相之女先登求自門出死於霤下杜既入城夷儀人不服故鬬死於門屋霤下也霤力又反東郭書讓登杜登城非人所樂故讓衆使後而已先登犂彌從之曰子讓而左我讓而右使登者絶而後下林子謂東郭書讓衆而立於城之左我犂彌自稱讓衆而立於城之右使登城若盡終而後下入城蓋彌恐書先下故又譎以讓之書左彌先下杜書從彌言左行彌遂自先下亦讓也書與王猛息林王猛齊人戰訖共止息猛曰我先登書斂甲曰曩者之難今又難焉杜斂甲起欲擊猛林言昔者有登城之難今又有王猛之難難乃旦反猛笑曰吾從子如驂之靳杜靳車中馬也猛不敢與書爭言己從書如驂馬之隨靳也傳言齊師和所以能克靳居覲反晉車千乘在中牟杜救夷儀也今滎陽有中牟縣迥逺疑非也乘繩證反衛侯將如五氏齊侯在五氏將往助之卜過之龜焦衛至五氏道遇中牟畏晉故卜龜焦兆不成不可以行事也衛侯曰可也衛車當其半寡人當其半敵矣林衛侯怒晉甚不復顧卜故言可也衛之兵車當晉五百乘自欲以身當五百乘其數可以相敵矣乃過中牟中牟人欲伐之衛褚師圃亡在中牟林褚師圃衛舊大夫時已奔在中牟褚中吕反曰衛雖小其君在焉未可勝也齊師克城而驕其帥又賤杜城謂夷儀也帥謂東郭書林非命卿故賤帥所類反遇必敗之不如從齊乃伐齊師敗之獲齊車五百乘事見哀十五年齊侯致禚媚杏於衛杜三邑皆齊西界以答謝衛意禚諸若反杏户猛反齊侯賞犂彌犂彌辭曰有先登者臣從之晳幘而衣貍製杜晳白也幘齒上下相值製裘也幘音策又音責衣於既反公使視東郭書曰乃夫子也林夫子謂東郭書吾貺子杜貺賜也公賞東郭書辭曰彼賓旅也林彼謂犂彌杜言彼與我若賓主相讓旅俱進退乃賞犂彌齊師之在夷儀也齊侯謂夷儀人曰得敝無存者以五家免給其五家令常不共役事乃得其尸公三襚之禭衣也比殯三加襚深禮厚之與之犀軒與直蓋杜犀軒卿車直蓋髙蓋而先歸之林先歸敝無存之喪坐引者以師哭之杜停喪車以盡哀也君方為位而哭故挽喪者不敢立親推之三齊侯自推喪車輪三轉推如字又他回反左傳杜林合注卷四十五
