body:
  text: 左傳杜林合注卷三十二明王道焜趙如源同編襄公八經丙辰二十有八年春無冰前年知其再失閏頓置兩閏以應天正故此年正月建子得以無冰為災而書夏衛石惡出奔晉寧喜之黨書名惡之邾子來朝秋八月大雩仲孫羯如晉告將朝楚羯居謁反冬齊慶封來奔崔柕之黨耆酒荒淫而出書名罪之自魯奔吳不書以絶位不為卿十有一月公如楚杜為宋之盟故朝楚林於是公及宋公陳侯鄭伯許男如楚諸夏之君旅見於楚始於此是故書公朝王所以見王業之衰書公如楚以見伯業之衰十有二月甲寅天王崩林靈王崩景王立乙未楚子昭卒杜十二月無乙未日誤林康王卒郟敖立傳二十八年春無冰梓慎曰今兹宋鄭其飢乎杜梓慎魯大夫今年鄭遊吉宋向戌言之明年飢甚傳乃詳其事梓音子歲在星紀而淫於玄枵杜歲歲星也星紀在丑斗牛之次玄枵在子虛危之次十八年晉董叔曰天道多在西北是歲星在亥至此年十一歲故在星紀明年乃當在玄枵今已在玄枵淫行失次枵許驕反以有時災隂不堪陽杜時災無冰也盛隂用事而溫無冰是隂不勝陽地氣發泄災音災蛇乘龍蛇玄武之宿虛危之星龍歲星歲星木也木為青龍失次出虛危下為蛇所乘龍宋鄭之星也歲星本位在東方東方房心為宋角亢為鄭故以龍為宋鄭之星宋鄭必飢玄枵虛中也杜玄枵三宿虛星在其中枵耗名也土虛而民耗不飢何為歲為宋鄭之星今失常淫入虛耗之次時復無冰地氣發泄故曰士虛民耗耗呼報反夏齊侯陳侯蔡侯北燕伯杞伯胡子沈子白狄朝于晉宋之盟故也杜陳侯蔡侯胡子沈子楚屬也宋盟日晉楚之從交相見故朝晉燕國今薊縣林宋盟在二十七年燕烏賢反齊侯將行慶封曰我不與盟何為於晉杜以宋盟釋齊秦故言齊不與盟何為而朝於晉與音預下同陳文子曰先事後賄禮也事大國當先從其政事而後薦賄以副已心小事大未獲事焉從之如志禮也杜言當從大國請事以順其志雖不與盟敢叛晉乎重丘之盟未可忘也子其勸行重丘盟在二十五年重直龍反衛人討寧氏之黨故石惡出奔晉衛人立其從子圃以守石氏之祀禮也石惡之先石碏有大功於衛國惡之罪不及不祀故曰禮從才用反邾悼公來朝時事也傳言來朝非宋盟宋盟唯施於朝晉楚秋八月大雩旱也林為旱而雩非過時也蔡侯歸自晉入于鄭鄭伯享之不敬子産曰蔡侯其不免乎杜不免禍日其過此也杜在日至晉時過古未反又古卧反君使子展廷勞於東門之外而傲杜廷往也廷于况反後同勞力報反傲五報反下同吾曰猶將更之今還受享而惰乃其心也林是不敬乃出其中心君小國事大國而惰傲以為已心將得死乎林為小國之君服大國之事而以怠惰驕傲為已之常心將得善終而死乎惰徒卧反若不免必繇其子其為君也淫而不父杜通太子班之妻僑聞之如是者恆有子禍林凡人之所為如此者禍亂常起於父子之間為三十年蔡世子班弒其君傳孟孝伯如晉告將為宋之盟故如楚也林孟孝伯即仲孫羯杜魯晉屬故告晉而行為于偽反蔡侯之如晉也鄭伯使遊吉如楚及漢楚人還之林遊吉即子大叔楚人不受遊吉之使而命之還曰宋之盟君實親辱杜君謂鄭伯今吾子來寡君謂吾子姑還吾將使馹奔問諸晉而以告林馹傳車也杜問鄭君應來朝否馹人實反子大叔曰宋之盟君命將利小國而亦使安定其社稷鎮撫其民人以禮承天之休此君之憲令而小國之望也林言在宋之盟楚君之命將以弭兵為小國之利亦使小國解兵釋甲得以安定其社稷服田力穡得以鎮撫其民人使得興其禮遜以承受上天之福祿此楚君之憲章命令而小國之所仰望於楚者也杜憲法也寡君是故使吉奉其皮幣聘用乘皮束帛以歲之不易聘於下執事杜言歲有飢荒之難故鄭伯不得自朝楚易以䜴反今執事有命曰女何與政令之有林言汝小國大夫何得與楚國之政令女音汝與音預必使而君棄而封守林而汝也跋涉山川林草行為跋水行為涉跋自末反蒙犯霜露以逞君心小國將君是望敢不唯命是聽無乃非盟載之言以闕君德而執事有不利焉小國是懼林失德則諸侯背楚亦將為楚君不利小國恐懼正坐於此不然其何勞之敢憚子大叔歸復命告子展曰楚子將死矣不修其政德而貪昧於諸侯以逞其願欲久得乎周易有之在復震下坤上復之頤震下艮上頤復上六變得頤頤以之反曰迷復凶復上六爻辭也復反也極陰反陽之卦上處極位迷而復反失道已逺逺而無應故凶其楚子之謂乎欲復其願杜謂欲得鄭朝以復其願而棄其本杜不修德復歸無所是謂迷復失道已逺又無所歸能無凶乎君其往也送葬而歸以快楚心杜言楚子必死君往當送其葬楚不幾十年未能恤諸侯也杜幾近也言失道逺者復之亦難幾居依反又音祈吾乃休吾民矣杜休息也言楚不能復為害禆竈曰今茲周王及楚子皆將死禆竈鄭大夫禆避支反歲棄其次而旅於明年之次以害鳥帑周楚惡之杜旅客處也歲星棄星紀之次客在玄枵歲星所在其國有福失次於北禍衝在南南為朱鳥鳥尾曰帑鶉火鶉尾周楚之分故周王楚子受其咎俱論歲星過次梓慎則曰宋鄭飢禆竈則曰周楚王死傳故備舉以示卜占惟人所在帑音奴惡如字又烏路反九月鄭遊吉如晉告將朝于楚以從宋之盟子産相鄭伯以如楚舍不為壇至敵國郊除地封土為壇以受郊勞相怠亮反下同壇徒丹反外僕言曰昔先大夫相先君適四國未嘗不為壇杜外僕掌次舍者自是至今亦皆循之今子草舍無乃不可乎子産曰大適小則為壇小適大苟舍而已焉用壇僑聞之大適小有五美宥其罪戾赦其過失救其災患賞其德刑杜刑法也焉於虔反下同災音災教其不及小國不困懷服如歸是故作壇以昭其功宣告後人無怠於德杜怠解也小適大有五惡説其罪戾杜自解説也請其不足杜請謝其不足惟恐被譴行其政事奉行大國之政共其職貢從其時命言從朝會之命共音恭不然則重其幣帛以賀其福而弔其凶皆小國之禍也焉用作壇以昭其禍所以告子孫無昭禍焉可也杜無昭禍以告子孫齊慶封好田而耆酒與慶舍政杜舍慶封子慶封當國不自為政以付舍好呼報反耆市志反則以其內實遷于盧蒲嫳氏杜內實寶物妻妾也移而居嫳家易內而飲酒數日林慶封與盧蒲嫳交易其內人而飲酒數日不已數所主反國遷朝焉杜就於盧蒲氏朝見封使諸亡人得賊者以告而反之杜亡人辟崔氏難出奔者林能捕執得盜賊以賊告而反其身使以功贖已罪故反盧蒲癸癸臣子之林盧蒲癸莊公黨以告賊得反子之即慶舍盧蒲癸臣事之有寵妻之杜子之以其女妻癸妻七計反慶舍之士謂盧蒲癸曰男女辨姓子不辟宗何也辨别也别姓而後可相取慶氏盧蒲氏皆薑姓曰宗不余辟杜言舍欲妻已余獨焉辟之賦詩斷章余取所求焉惡識宗杜言已苟欲有求於慶氏不能復顧禮譬如賦詩者取其一章而已斷音短惡音烏癸言王何而反之二人皆嬖杜二子皆莊公黨二十五年崔氏弒莊公癸何出奔今還求寵於慶氏欲為莊公報讐嬖必計反下同使執寢戈而先後之寢戈親近兵杖先悉薦反後戶豆反公膳日雙雞杜卿大夫之膳食膳市戰反謂公家供卿大夫之常膳饔人竊更之以鶩御者知之則去其肉而以其洎饋御進食者饔人御者欲使諸大夫怒慶氏減其膳蓋盧蒲癸王何之謀騖徐音木鴨也洎其器反肉汁也説文云洎灌釡也字林已蒞反子雅子尾怒二子皆惠公孫慶封告盧蒲嫳杜以二子怒告嫳盧蒲嫳曰譬之如禽獸吾寢處之矣杜言能殺而席其皮使析歸父告晏平仲杜欲與其謀子雅子尾平仲曰嬰之衆不足用也知無能謀也言弗敢出有盟可也林言其兵衆不足用以討亂其知謀不足用以慮事不敢出言以泄慶氏之謀請為盟以誓不敢泄知音智子家曰子之言云杜子家析歸父又焉用盟告北郭子車杜子車齊大夫子車曰人各有以事君非佐之所能也杜佐子車名言凡人各有材能以事其君非佐之材所能及陳文子謂桓子杜桓子文子之子無宇曰禍將作矣吾其何得林言齊之禍亂將起矣我其當得何物對曰得慶氏之木百車於莊慶封時有此木積於六軌之道文子曰可慎守也已林善其子不志於貨財言可慎守其家也盧蒲癸王何卜攻慶氏示子之兆林以龜兆示慶舍曰或卜攻讐敢獻其兆林敢獻兆請問其吉凶子之曰克見血林主殺戮見血冬十月慶封田于萊陳無宇從丙辰文子使召之請曰無宇之母疾病請歸林詐言其母疾病請先歸視其母萊音來從才用反慶季卜之杜季慶封林為無宇卜母疾病示之兆曰死奉龜而泣杜無宇泣奉芳勇反乃使歸慶嗣聞之嗣慶封之族曰禍將作矣謂子家速歸子家慶封字禍作必於嘗杜嘗秋祭歸猶可及也子家弗聽亦無悛志悛改悟也悛七全反子息曰亡矣幸而獲在吳越杜子息慶嗣陳無宇濟水而戕舟發梁林戕害其舟楫發壞其橋梁不欲慶封得救難戕在羊反盧蒲薑謂癸曰有事而不告我必不捷矣杜薑癸妻慶舍女癸告之杜告欲殺慶舍薑曰夫子愎莫之止將不出我請止之夫子謂慶舍愎皮逼反癸曰諾十一月乙亥嘗于太公之廟慶舍涖事林臨祭事天音泰盧蒲薑告之且止之弗聽曰誰敢者林慶舍之女告其父以有變且止其父勿出臨祭慶舍不從言誰敢為亂者以此見其愎也遂如公杜至公所麻嬰為尸為祭尸慶集為上獻上獻先獻者集戶結反盧蒲癸王何執寢戈林二人執親兵以從慶舍慶氏以其甲環公宫林廟在公宫之肉故慶氏以其私甲環衛公宫環如字徐音忠陳氏鮑氏之圉人為優林陳鮑二氏養馬人為優俳之獻優於求反慶氏之馬善驚士皆釋甲束馬杜束絆之也而飲酒且觀優至於魚里林魚里里名優在魚里就觀之欒髙陳鮑之徒介慶氏之甲杜欒子雅髙子尾陳陳須無鮑鮑國林介因也慶氏之士釋甲而觀優故四族因慶氏之甲子尾抽桷擊扉三桷椽也扉門闔也以桷擊扉為期桷音角扉音非門扇也盧蒲癸自後刺子之王何以戈擊之解其左肩猶援廟桷動於甍杜甍屋棟林慶舍雖傷重猶能援大廟之掾動於屋角刺七亦反援音爰甍亡耕反以俎壺投殺人而後死林俎壺皆祭器杜言其多力遂殺慶繩麻嬰杜慶繩慶集公懼鮑國曰羣臣為君故也杜言欲尊公室非為亂階為于偽反須無以公歸稅服而如內宫林稅祭服而往內宫言公懼於外難稅叶活反又如字慶封歸遇告亂者丁亥伐西門弗克還伐北門克之入伐內宫林陳鮑在公所故弗克反陳于嶽嶽里名陳直覲反請戰弗許遂來奔獻車於季武子美澤可以鑑杜光鑑形也展莊叔見之杜魯大夫曰車甚澤人必瘁宜其亡也林竭民力而為車人必困瘁竭人以奉已宜其滅亡也瘁在罪反叔孫穆子食慶封慶封汜祭禮食有祭示有所先也汜祭逺散所祭不共食音嗣汜芳劍反穆子不説使工為之誦茅鴟工樂師茅鴟逸詩刺不敬説音悅鴟人之反亦不知既而齊人來讓杜讓魯受慶封奔吳吳勾餘豫之朱方杜勾餘吳子夷未也朱方吳邑勾古侯反下勾瀆同聚其族焉而居之富於其舊子服惠伯謂叔孫曰天殆富淫人慶封又富矣穆子曰善人富謂之賞淫人富謂之殃天其殃之也其將聚而殱旃杜殱盡也旃之也為昭四年殺慶封傳殱子潛反癸巳天王崩未來赴亦未書林經書十二月甲寅禮也嫌時已聞喪當書故發例崔氏之亂喪羣公子故鉏在魯叔孫還在燕賈在句瀆之丘在襄二十一年喪息浪反鉏仕居反公子鉏也瀆音豆及慶氏亡皆召之具其器用而反其邑焉皆反還也與晏子邶殿其鄙六十杜邶殿齊别都以邶殿邊鄙六十邑與晏嬰邶蒲對反殿多薦反又如字弗受子尾曰富人之所欲也何獨弗欲對曰慶氏之邑足欲故亡林慶封邑多厭足其欲驕侈橫生故有滅亡之禍吾邑不足欲也益之以邶殿乃足欲足欲亡無日矣在外不得宰吾一邑林若奔亡在外國雖我之一邑亦不可得而宰制不受邶殿非惡富也恐失富也且夫富如布帛之有幅焉為之制度使無遷也林如織布帛須有幅尺為之制度使其富不可遷移惡鳥路反夫音扶幅音福夫民生厚而用利林生理豐厚財用利益於是乎正德以幅之杜言厚利皆人之所欲唯正德可以為之幅使無黜嫚杜黜猶故也黜勑作反嫚音慢謂之幅利杜謂用利之幅尺利過則為敗林利過驕生禍敗必至吾不敢貪多所謂幅也與北郭佐邑六十受之與子雅邑辭多受少與子尾邑受而稍致之杜致還公公以為忠故有寵釋盧蒲嫳于北竟釋放也竟音境求崔杼之尸將戮之不得叔孫穆子曰必得之武王有亂臣十人亂治也崔杼其有乎不十人不足以葬葬必須十人崔氏不能令十人同心故必得既崔氏之臣曰與我其拱璧杜崔氏大璧拱居勇反徐音恭吾獻其柩於是得之十二月乙亥朔齊人遷莊公殯于大寢杜更殯之於路寢也十二月戊戌朔乙亥誤林二十五年崔氏側莊公于北郭今始遷其柩以其棺尸崔杼於市崔氏弒莊公又葬不如禮故以莊公棺著崔杼尸邊以章其罪國人猶知之皆曰崔子也杜始求崔杼之尸不得故傳云國人皆知之為宋之盟故公及宋公陳侯鄭伯許男如楚公過鄭鄭伯不在杜已在楚為干偽反過古禾反伯有廷勞於黃崖不敬杜滎陽宛陵縣西有黃水西南至新鄭城西入洧勞力報反穆叔曰伯有無戾於鄭鄭必有大咎杜伯有不受戮必還為鄭國害敬民之主也而棄之何以承守言無以承先祖守其家鄭人不討必受其辜濟澤之阿杜言薄土齊子禮反行潦之蘋藻杜言賤菜潦音老蘋音頻藻音早置諸宗室杜薦宗廟季蘭尸之敬也杜言取蘋藻之菜於阿澤之中使服蘭之女而為之主神猶享之以其敬也敬可棄乎杜為三十年鄭殺良霄傳及漢楚康王卒公欲反叔仲昭伯曰我楚國之為豈為一人行也杜昭伯叔仲帶林言我之朝楚為楚國而來豈為康王一人而來為于偽反下同子服惠伯曰君子有逺慮小人從邇杜邇近也飢寒之不恤誰遑其後杜遑睱也林目前飢寒尚不憂恤誰睱憂其後不如姑歸也叔孫穆子曰叔仲子專之矣杜言足專任子服子始學者也此言未識逺榮成伯曰逺圖者忠也杜成伯榮駕鵝公遂行杜從昭伯謀宋向戌曰我一人之為非為楚也飢寒之不恤誰能恤楚姑歸而息民待其立君而為之備宋公遂反楚屈建卒趙文子喪之如同盟禮也杜未盟有𠂻甲之隙不以此廢好故曰禮喪如字又息浪反王人來告喪問崩日以甲寅告林實十一月癸巳崩而以十二月甲寅告故書之以徵過也徵審也此緩告非有事宜直臣子怠慢故於此發例徴音真本作懲誤經癸巳二十有九年春王正月公在楚杜公在外闕朝正之禮甚多而唯書此一年者魯公如楚既非常比公又踰年故發此一事以明常也夏五月公至自楚庚午衛侯衎卒杜無傳四同盟林獻公卒子襄公立衎苦旦反閽弒吳子餘祭杜閽守門者下賤非士故不言盜林餘祭卒夷昧立一名餘昧閽音昏祭側界反仲孫羯會晉荀盈齊高止宋華定衛世叔儀鄭公孫段曹人莒人滕人薛人小邾人城杞杜公孫段伯石也三十年伯有死乃命為卿今蓋以攝卿行羯居謁反晉侯使士鞅來聘杞子來盟杜杞復稱子用夷禮也林傳曰書曰子賤之也凡來盟皆大夫也杞伯親之故賤之也杞雖稱子矣前乎此夷儀之會稱伯後乎此卒復稱伯來盟特稱子見春秋之貶諸侯也春秋之褒貶君大夫莫備於隱桓莊之世成襄而下舍杞子無削其爵者舍楚子虔無生名之者經之變文也吳子使札來聘杜吳子餘祭既遣札聘上國而後死札以六月到魯未聞喪也不稱公子其禮未同於上國林吳始聘始書子始君臣並見吳驟強也札側八反秋九月葬衛獻公無傳齊高止出奔北燕杜止髙厚之子杜北燕始見經燕音煙冬仲孫羯如晉傳二十九年春王正月公在楚釋不朝正于朝也釋解也告廟在楚解公所以不朝正楚人使公親禭諸侯有遣使賵禭之禮今楚欲依遣使之比禭音遂説文云衣死人衣公患之穆叔曰袚殯而襚則布幣也先使巫袚除殯之凶邪而行襚禮與朝而布幣無異袚音拂徐音廢乃使巫以桃茢先袚殯茢黍穰茢音列徐音例鄭注周禮云茢苕帚楚人弗禁既而悔之禮君臨臣喪乃袚殯故楚悔之二月癸卯齊人葬莊公於北郭杜兵死不入兆城故葬北郭夏四月葬楚康王林經不書葬略夷狄也公及陳侯鄭伯許男送葬至于西門之外諸侯之大夫皆至于墓楚郟敖即位郟敖康王子熊麇也郟古治反王子圍為令尹圍康王弟鄭行人子羽曰是謂不宜必代之昌松柏之下其草不殖杜言楚君弱令尹強物不兩盛為昭元年圍弒郟敖起本公還及方城季武子取卞杜取卞邑以自益卞皮産反使公冶問杜問公起居公冶季氏屬大夫冶音也璽書追而與之杜璽印也璽音徙廣雅云卬謂之璽説文作璽從上云玉者印也籕文從王曰林書辭曰聞守卞者將叛臣師徒以討之既得之矣敢告林飾辭公冶致使而退杜致季氏使命使所吏反及舍而後聞取卞杜發書乃聞之公曰欲之而言叛祗見疏也杜言季氏欲得卞而欺我言叛益疏我祇音支公問公冶曰吾可以入乎以季氏疏已故不敢入對曰君實有國誰敢違君公與公冶冕服杜以卿服玄冕賞之固辭強之而後受公欲無入榮成伯賦式微乃歸杜式微詩弼風曰式微式微胡不歸式用也義取寄寓之微陋勸公歸也強其丈反五月公至自楚公冶致其邑於季氏杜本從季氏得邑故還之而終不入焉杜不入季孫家曰欺其君何必使余林言季氏欲欺其君以取邑何必使我往使季孫見之則言季氏如他日不見則終不言季氏林季武子若就其家見之則公冶言季氏政事如前日若不見季武子則已不肯復言季氏政事及疾聚其臣杜大夫家臣曰我死必無以冕服斂非德賞也言公畏季氏而賞其使非以我有德斂力驗反且無使季氏葬我林不義李氏欺君故生不入季氏之家死不受季氏之葬葬靈王杜不書魯不會鄭上卿有事林時鄭簡公在楚鄭上卿有居守之事子展使印段往伯有曰弱不可印段年少官卑子展曰與其莫往弱不猶愈乎林言與其不遣人往周會葬官卑年少猶愈於不往也詩云王事靡盬不遑啓處杜詩小雅盬不堅固也啓跪也言王事無不堅固故不暇跪處盬音古東西南北誰敢寧處杜謂上卿堅事晉楚以蕃王室也杜言我固事晉楚乃所以蕃屏王室蕃芳元反王事無曠何常之有林供王室之事無有曠失足矣亦有何常法遂使印段如周傳言周哀卑於晉楚吳人伐越獲俘焉以為閽林吳刖越俘之足以為閽人使守舟吳子餘祭觀舟閽以刀弒之杜言以刀近刑人鄭子展卒子皮印位林子皮即罕虎代父為上卿於是鄭飢而未及麥民病林民病於乏食子皮以子展之命餼國人粟戶一鍾林餼猶饋也因在喪故以父命也六斛四斗曰鍾是以得鄭國之民故罕氏常掌國政以為二卿宋司城子罕聞之曰鄰於善民之望也林言鄰近於善人民亦望君為善宋亦飢請於平公出公粟以貸使大夫皆貸司城氏貸而不書林司城氏即子罕氏貨而不書於策施而不以為德也貸他代反下同為大夫之無者貸林子罕為宋大夫之無粟者貸宋無飢人叔向聞之曰鄭之罕林鄭子皮氏向許丈反宋之樂林宋子罕氏其後亡者也二者其皆得國乎林得掌國政民之歸也施而不德樂氏加焉其以宋升降乎杜升降隨宋盛衰晉平公杞出也林晉平公母杞女故治杞杜治理其地修其城六月知悼子合諸侯之大夫以城杞孟孝伯會之鄭子大叔與伯石往杜大叔不書不親事林知悼子即晉荀盈孟孝伯即仲孫羯子大叔即遊吉伯石即公孫段知音智大叔音泰下同子大叔見大叔文子杜文子衛大叔儀與之語文子曰甚乎其城杞也子大叔曰若之何哉晉國不恤周宗之闕而夏肄是屏杜周宗諸姬也夏肄杞也肄餘也屏城也肄以二反詩傳云斬而復生曰肄方言云枿餘也秦晉之間日肄其棄諸姬亦可知也已諸姬是棄其誰歸之林晉姬姓也棄我諸姬所厚者薄其誰望晉而歸之吉也聞之棄同即異是謂離德詩曰協比其鄰昏姻孔云杜詩小雅言王者和協近親則昏姻甚歸附也林孔甚也云猶旋旋歸之比毗志反晉不鄰矣其誰云之杜晉不恤鄰近之親其誰旋旋而歸之齊髙子容與宋司徒見知伯女齊相禮杜子容髙止也司徒華定也知伯荀盈也女齊司馬侯也相禮侍威儀也女音汝相息亮反賔出司馬侯言於知伯曰二子皆將不免子容專専自是也司徒侈林侈驕縱也侈昌氏反皆亡家之主也知伯曰何如杜言二子禍福之遲速何如對曰專則速及言速及禍也侈將以其力斃杜力盡而自斃斃其世反專則人實斃之將及矣為此秋髙止出奔燕昭二十年華定出奔陳傳専則人實斃之絶句范獻子來聘拜城杞也杜范獻子即士鞅林謝魯為杞城公享之展莊叔執幣杜公將以酬賓射者三耦二人為耦耦五口反公臣不足取於家臣家臣展瑕展玉父為一耦公臣公巫召伯仲顔莊叔為一耦鄫鼓父黨叔為一耦杜言公室卑微公臣不能備於三耦召上昭反鄫才陵反黨音掌晉侯使司馬女叔侯來治杞田杜司馬女叔侯即司馬侯杜使魯歸前侵杞田所歸少故不書弗盡歸也晉悼夫人愠曰齊也取貨杜夫人平公母杞女也謂叔侯取貨於魯故不盡歸杞田愠紆運反先君若有知也不尚取之不尚叔侯之取貨公告叔侯叔侯曰虞虢焦滑霍揚韓魏皆姬姓也杜八國皆晉所滅焦在陕縣揚屬平陽郡虢瓜百反滑乎八反晉是以大若非侵小將何所取武獻以下兼國多矣武公獻公晉始盛之君誰得治之杞夏餘也而即東夷杜行夷禮魯周公之後也而睦於晉以杞封魯猶可而何有焉杜以杞土地加封於魯於理猶可何有盡歸杞伯魯之於晉也職貢不乏玩好時至公卿大夫相繼於朝史不絶書杜書魯之朝聘好呼報反下同府無虛月杜無月不受魯貢如是可矣何必瘠魯以肥杞且先君而有知也毋寧夫人而焉用老臣杜言先君毋寧怪夫人之所為無用責我瘠在亦反毋音無焉於虔反杞文公來盟魯歸其田故來盟書曰子賤之也賤其用夷禮吳公子札來聘見叔孫穆子説之謂穆子曰子其不得死乎杜不得以夀死説音悅好善而不能擇人林心雖好善而智不能決擇人之賢否吾聞君子務在擇人吾子為魯宗卿而任其大政不慎舉何以堪之禍必及子為昭四年豎牛作亂起本請觀於周樂魯以周公故有天子禮樂使工為之歌周南召南杜此皆各依其本國歌所常用聲曲召上照反曰美哉杜美其聲始基之矣周南召南王化之基猶未也猶有商紂未盡善也然怒而不怨矣杜未能安樂然其音不怨怒為之歌邶鄘衛杜武王伐紂分其地為三監三監叛周公滅之更封康叔并三監之地故三國盡被康叔之化鄘音庸曰美哉淵乎憂而不困者也淵深也亡國之音哀以思其民因衛康叔武公德化深逺雖遭宣公淫亂懿公滅亡民猶秉義不至於困吾聞衛康叔武公之德如是是其衛風乎康叔周公弟武公康叔九世孫皆衛之令德君也聽聲以為别故有疑言為之歌王杜王黍離也幽王過西戎之禍平王東遷王政不行於天下風俗下與諸候同故不為雅曰美哉思而不懼其周之東乎宗周隕滅故憂思猶有先王之遺風故不懼為之歌鄭杜詩第七曰美哉其細已甚民弗堪也是其先亡乎既美其有治政之音譏其煩碎知不能久為之歌齊杜詩第八曰美哉泱乎大風也哉杜泱泱𢎞大之聲泱於良反又於浪反韋昭於康反表東海者其大公乎杜大公封齊為東海之表式大音泰國未可量也杜言其或將復興為之歌豳杜詩第十五豳周之舊國在新平漆縣東北豳彼貧反曰美哉蕩乎樂而不淫其周公之東乎杜蕩乎蕩然也樂而不淫言有節周公遭管蔡之變東征三年為成王陳后稷先公不敢荒淫以成王業故言其周公之東乎樂音嶽又音洛下放此為之歌秦杜詩第十一後仲尼剛定故不同曰此之謂夏聲夫能夏則大大之至也其周之舊乎杜秦本在西戎汧隴之西秦仲始有車馬禮樂去戎狄之音而有諸夏之聲故謂之夏聲及襄公佐周平王東遷而受其故地故曰周之舊為之歌魏杜詩第九魏姬姓國閔元年晉獻公滅之曰美哉渢渢乎大而婉險而易行以德輔此則明主也杜渢渢中庸之聲婉約也險當為儉字之誤也大而約則險節易行惜其國小無明君也渢扶弓反徐敷劍反韋昭音凡婉紆阮反險依注音儉易以豉反為之歌唐杜詩第十此晉詩也而謂之唐本唐叔虞始封之地曰思深哉其有陶唐氏之遺民乎不然何憂之逺也杜晉本唐地故有堯之遺風憂深思逺情發於聲思息嗣反非令德之後誰能若是為之歌陳杜詩第十二曰國無主其能久乎杜淫聲放蕩無所畏忌故曰國無主自鄫以下無譏焉杜鄫第十三曹第十四言季子聞此二國歌不復譏論之以其微也鄫古外反為之歌小雅小雅小正亦樂歌之常曰美哉思而不二思文武之德無二叛之心怨而不言杜怨商紂之政而能忍而不言其周德之衰乎林衰小也此周德尚小之時乎猶有先王之遺民焉杜謂有殷王餘俗故未大為之歌大雅大雅陳文王之德以正天下曰廣哉熙熙乎杜熙熙和樂聲曲而有直體杜其聲委曲而有正直之體其文王之德乎雅頌所以詠盛德形容故伹歌其美者不皆歌變雅為之歌頌頌者以其成功告於神明曰至矣哉杜言道備直而不倨杜直者易至於倨傲故以不傲為德倨音據徐音居曲而不屈林曲者易至於屈撓故以不撓為德邇而不逼林近者易至於逼害故以不害為德逼彼力反逺而不攜林逺者易至於携二故以不二為德遷而不淫復而不厭林遷動者淫蕩之漸以德自守不過蕩矣反復者厭棄之漸以德自守常日新矣厭於端反又於瞻反哀而不愁杜知命樂而不荒杜節之以禮用而不匱杜德𢎞大廣而不宣杜不自顯施而不費杜因民所利而利之施始䜴反費芳味反取而不貪杜義然後取處而不底林守之以道雖復止處不底滯也底丁禮反行而不流林制之以義雖常運行不流放也五聲和宫商角徴羽謂之五聲八風平八方之氣謂之八風節有度守有序八音克諧節有度也無相奪倫守有序也盛德之所同也頌有殷魯故曰盛德之所同見舞象簫南籥者象簫舞所執南籥以籥舞也皆文王之樂簫音朔籥羊略反曰美哉猶有憾杜美哉美其容也文王恨不及已致太平憾戶暗反見舞大武者杜武王樂曰美哉周之盛也其若此乎見舞韶濩者杜殷湯樂韶上昭及濩音護徐戶郭反曰聖人之𢎞也而猶有慙德杜慙於始伐聖人之難也林聖人處世變之難也見舞大夏者杜禹之樂曰美哉勤而不德非禹其誰能修之杜盡力溝洫勤也林勤勞水土而不自矜其德非禹之聖誰能修治其功見舞韶簫者杜舜樂簫音簫曰德至矣哉大矣如天之無不幬也幬覆也幬徒報反如地之無不載也雖甚盛德其蔑以加於此矣觀止矣若有他樂吾不敢請已杜魯用四代之樂故及韶簫而季子知其終也季札賢明才博在吳雖已涉見此樂歌之文然末聞中國推聲故請作周樂欲聽其聲然後依聲以參時政知其興衰也聞秦詩謂之夏聲聞頌曰五聲和八風平皆論聲以參政也舞畢知其樂終是素知其篇數其出聘也通嗣君也杜吳子餘祭嗣立故遂聘于齊説晏平仲謂之曰子速納邑與政杜納歸之公説音悅下皆同無邑無政乃免於難齊國之政將有所歸未獲所歸難未歇也歇盡也難乃且反下皆同歇許謁反故晏子因陳桓子以納政與邑是以免於欒高之難林樂子雅高子尾難在昭八年聘於鄭見子産如舊相識杜見如故交二子相知以心也與之縞帶子産獻紵衣焉杜大帶也吳地貴縞鄭地貴紵故各獻已所貴示損已而不為彼貨利縞古老反徐古到反繒也紵直吕反謂子産曰鄭之執政侈難將至矣政必及子子為政慎之以禮不然鄭國將敗杜侈謂伯有林明年子晳果殺伯有適衛説蘧瑗林蘧伯玉瑗于眷反史狗史朝之子文子史鰌史魚鰌音秋公子荆林字南楚公叔發公叔文子公子朝曰衛多君子未有患也自衛如晉將宿於戚戚孫文子之邑聞鐘聲焉林聞孫文子奏樂擊鐘之聲曰異哉吾聞之也辨而不德必加於戮杜辨猶爭也夫子獲罪於君以在此杜孫文子以戚叛懼猶不足而又何樂夫子之在此也猶燕之巢于幕上杜言至危君又在殯而可以樂乎林衛獻公卒未葬禮為舊君有服豈可作樂遂去之杜不止宿文子聞之終身不聽琴瑟杜聞義能改適晉説趙文子韓宣子魏獻子曰晉國其萃於三族乎杜言晉國之政事將集於三家萃在薛反説叔向將行謂叔向曰吾子勉之君侈而多良林晉君汰侈而多自賢其臣大夫皆富政將在家杜富必厚施故政在家吾子好直必思自免於難秋九月齊公孫蠆公孫竈放其大夫高止於北燕杜蠆子尾竈子雅放者宥之以逺蠆楚邁反乙未出書曰出奔罪髙止也杜實放書奔所以示罪髙止好以事自為功且專故難及之林髙止好掠人之善以為已功且專權故禍難及於其身杜好呼報反冬孟孝伯如晉報范叔也范叔士鞅也此年夏來聘為髙氏之難故髙豎以盧叛豎髙止子為于偽反豎上主反十月庚寅閭邱嬰帥師圍盧髙豎曰苟使髙氏有後請致邑杜還邑於君齊人立敬仲之曾孫酀杜敬仲髙傒酀於顯反良敬仲也杜良猶賢也十一月乙卯髙豎致盧而出奔晉晉人城綿而置旃杜晉人善其致邑林旃猶之也置之䜴反旃之然反鄭伯有使公孫黑如楚杜黑子晳辭曰楚鄭方惡而使余往是殺余也伯有曰世行也杜言女世為行人子晳曰可則往難則已何世之有伯有將強使之子晳怒將伐伯有氏大夫和之十二月己巳鄭大夫盟於伯有氏禆諶曰是盟也其與幾何杜言不能久也禆諶鄭大夫強其丈反禆婢支反諶市林反與如字或音預幾居豈反詩曰君子屢盟亂是用長杜舉小雅巧言詩屢盟則無信無信則情疏此禍亂所以滋長也屢力住反今是長亂之道也禍未歇也必三年而後能紓紓解也長丁丈反下同紓直吕反徐音舒然明曰政將焉往禆諶曰善之代不善天命也其焉辟子産言政必歸子産焉於虔反下同舉不踰等則位班也子産位班次應知政擇善而舉則世隆也林子産之德為世所髙天又除之奪伯有魄杜喪其精神為子産驅除子西即世將焉辟之天禍鄭久矣其必使子産息之乃猶可以戾戾定也不然將亡矣左傳杜林合注卷三十二
